自養。宣武得牋大喜，即詔轉公督五郡，會稽太守。", "치사공(郗司空)이 북부(北府)에 있을 때, 환선무(桓宣武)가 그가 병권을 쥐고 있음을 싫어했다. 치공은 평소 사태의 기미에 어두워, 환온(桓溫)에게 편지를 보내 \"바야흐로 함께 왕실을 돕고 능원(園陵)을 수복하고자 합니다\"라고 했다. 세자 가빈(嘉賓)이 외출하다가 길에서 사자가 이르렀다는 말을 듣고 급히 편지를 빼앗아 다 보고는 마디마디 찢어버리고 곧 돌아왔다. 돌아와 다시 편지를 지어, 스스로 늙고 병들어 인간세상을 감당하지 못하니 한가한 땅을 얻어 몸을 보양하기를 청한다고 했다. 선무가 편지를 얻고 크게 기뻐하여 즉시 조서로 치공을 다섯 군을 감독하는 회계태수(會稽太守)로 옮겼다.", ["술수", "지혜", "권력"]], ["捷悟", 7, "王東亭作宣武主簿，嘗春月與石頭兄弟乘馬出郊。時彥同遊者，連鑣俱進。唯東亭一人常在前，覺數十步，諸人莫之解。石頭等既疲倦，俄而乘輿回，諸人皆似從官，唯東亭弈弈在前。其悟捷如此。", "왕동정(王東亭)이 선무(宣武)의 주부(主簿)였을 때, 일찍이 봄날에 석두(石頭)의 형제들과 말을 타고 교외로 나갔다. 그때 함께 노닌 명사들이 재갈을 나란히 하여 함께 나아갔다. 오직 동정 한 사람만이 항상 앞에 있어 수십 보를 앞섰는데 여러 사람이 그 까닭을 알지 못했다. 석두 등이 이미 지치자 이윽고 수레가 돌아오니, 여러 사람은 모두 종관(從官) 같았고 오직 동정만이 의젓하게 앞에 있었다. 그의 깨달음과 민첩함이 이와 같았다.", ["지혜", "재능"]], ["夙惠", 1, "賓客詣陳太丘宿，太丘使元方、季方炊。客與太丘論議，二人進火，俱委而竊聽。炊忘箸箄，飯落釜中。太丘問：「炊何不餾？」元方、季方長跪曰：「大人與客語，乃俱竊聽，炊忘箸箄，飯今成糜。」太丘曰：「爾頗有所識不？」對曰：「仿佛志之。」二子俱說，更相易奪，言無遺失。太丘曰：「如此，但糜自可，何必飯也？」", "손님이 진태구(陳太丘)를 찾아와 묵게 되자, 태구가 원방(元方)과 계방(季方)에게 밥을 짓게 했다. 손님이 태구와 더불어 논의하니, 두 사람이 불을 때다가 모두 그것을 내버려두고 몰래 엿들었다. 밥 짓는데 시루받침을 두는 것을 잊어 밥이 솥 안으로 떨어졌다. 태구가 묻기를 \"밥을 어찌 찌지 않았느냐?\"라고 했다. 원방과 계방이 무릎을 꿇고 말하기를 \"아버님께서 손님과 이야기하시기에 저희가 모두 몰래 엿듣다가 밥 짓는데 시루받침 두기를 잊어 밥이 지금 죽이 되었습니다\"라고 했다. 태구가 \"너희가 자못 들은 것이 있느냐?\"라고 물으니, 대답하기를 \"어렴풋이 기억합니다\"라고 했다. 두 아들이 함께 말하면서 서로 번갈아 주고받으니 빠뜨린 말이 없었다. 태구가 말하기를 \"이와 같다면 죽이라도 좋으니 어찌 굳이 밥이어야 하겠느냐?\"라고 했다.", ["신동", "학문", "효"]], ["夙惠", 2, "何晏七歲，明惠若神，魏武奇愛之。因晏在宮內，欲以為子。晏乃畫地令方，自處其中。人問其故？答曰：「何氏之廬也。」魏武知之，即遣還。", "하안(何晏)이 일곱 살에 총명함이 신과 같으니 위무제(魏武帝)가 기특히 여겨 사랑했다. 하안이 궁 안에 있었으므로 그를 아들로 삼고자 했다. 하안이 이에 땅에 네모를 그려 그 안에 스스로 앉았다. 사람이 그 까닭을 물으니, 대답하기를 \"하씨(何氏)의 집입니다\"라고 했다. 위무제가 이를 알고 곧 돌려보냈다.", ["신동", "기지"]], ["夙惠", 3, "晉明帝數歲，坐元帝厀上。有人從長安來，元帝問洛下消息，潸然流涕。明帝問何以致泣？具以東渡意告之。因問明帝：「汝意謂長安何如日遠？」答曰：「日遠。不聞人從日邊來，居然可知。」元帝異之。明日集羣臣宴會，告以此意，更重問之。乃答曰：「日近。」元帝失色，曰：「爾何故異昨日之言邪？」答曰：「舉目見日，不見長安。」", "진명제(晉明帝)가 몇 살일 때 원제(元帝)의 무릎 위에 앉아 있었다. 어떤 사람이 장안(長安)에서 왔으므로 원제가 낙양(洛陽)의 소식을 묻고는 줄줄 눈물을 흘렸다. 명제가 어찌 우시는지 물으니, 동쪽으로 건너온 뜻을 자세히 일러주었다. 이어 명제에게 묻기를 \"네 생각에 장안과 해 가운데 어느 것이 더 머냐?\"라고 했다. 대답하기를 \"해가 멉니다. 사람이 해 가에서 왔다는 말은 듣지 못했으니 자연히 알 수 있습니다\"라고 했다. 원제가 기특히 여겼다. 이튿날 신하들을 모아 잔치하며 이 뜻을 알리고 다시 거듭 물었다. 이에 대답하기를 \"해가 가깝습니다\"라고 했다. 원제가 낯빛을 잃고 \"너는 어찌 어제의 말과 다르냐?\"라고 하니, 대답하기를 \"눈을 들면 해는 보이나 장안은 보이지 않습니다\"라고 했다.", ["신동", "기지"]], ["夙惠", 4, "司空顧和與時賢共清言，張玄之、顧敷是中外孫，年並七歲，在牀邊戲。于時聞語，神情如不相屬。瞑於燈下，二兒共敘客主之言，都無遺失。顧公越席而提其耳曰：「不意衰宗復生此寶。」", "사공(司空) 고화(顧和)가 당시의 현인들과 함께 청담(淸談)을 했다. 장현지(張玄之)와 고부(顧敷)는 내외(內外)의 손자로 나이가 모두 일곱 살이었는데 평상 곁에서 놀고 있었다. 그때 이야기를 들으면서도 신정(神情)이 마치 무관한 듯했다. 등불 아래서 졸다가 두 아이가 함께 손님과 주인의 말을 서술하니 전혀 빠뜨림이 없었다. 고공이 자리를 넘어가 그 귀를 잡으며 말하기를 \"뜻밖에 쇠한 집안에 다시 이런 보배가 났구나\"라고 했다.", ["신동", "청담"]], ["夙惠", 5, "韓康伯數歲，家酷貧，至大寒，止得襦。母殷夫人自成之，令康伯捉熨斗，謂康伯曰：「且箸襦，尋作複。」兒云：「已足，不須複也。」母問其故？答曰：「火在熨斗中而柄熱，今既箸襦，下亦當煗，故不須耳。」母甚異之，知為國器。", "한강백(韓康伯)이 몇 살일 때 집이 몹시 가난하여, 큰 추위에 이르도록 다만 저고리(襦)만 입을 수 있었다. 어머니 은부인(殷夫人)이 손수 그것을 만들면서 강백에게 다리미를 잡게 하고 강백에게 말하기를 \"우선 저고리를 입어라. 머지않아 겹옷을 지어주마\"라고 했다. 아이가 말하기를 \"이미 충분하니 겹옷은 필요없습니다\"라고 했다. 어머니가 그 까닭을 물으니, 대답하기를 \"불이 다리미 안에 있으면 자루가 뜨겁습니다. 이제 저고리를 입었으니 아래도 마땅히 따뜻할 것이라 겹옷은 필요없습니다\"라고 했다. 어머니가 매우 기특히 여겨 나라의 그릇(國器)이 될 줄 알았다.", ["신동", "청빈", "지혜"]], ["夙惠", 6, "晉孝武年十二，時冬天，晝日不箸複衣，但箸單練衫五六重，夜則累茵褥。謝公諫曰：「聖體宜令有常。陛下晝過冷，夜過熱，恐非攝養之術。」帝曰：「晝動夜靜。」謝公出嘆曰：「上理不減先帝。」", "진효무제(晉孝武帝)가 열두 살일 때, 겨울날에 낮에는 겹옷을 입지 않고 다만 홑명주 적삼을 대여섯 겹만 입었으나, 밤에는 자리와 요를 겹쳐 깔았다. 사공(謝公)이 간하여 말하기를 \"성체(聖體)는 마땅히 일정함이 있어야 합니다. 폐하께서 낮에는 지나치게 춥고 밤에는 지나치게 더우시니 섭생(攝養)의 방법이 아닐까 두렵습니다\"라고 했다. 황제가 말하기를 \"낮에는 움직이고 밤에는 고요하지 않은가\"라고 했다. 사공이 나와 탄식하기를 \"황상의 이치가 선제(先帝)에 못지않다\"라고 했다.", ["신동", "간언", "지혜"]], ["夙惠", 7, "桓宣武薨，桓南郡年五歲，服始除，桓車騎與送故文武別，因指語南郡：「此皆汝家故吏佐。」玄應聲慟哭，酸感傍人。車騎每自目己坐曰：「靈寶成人，當以此坐還之。」鞠愛過於所生。", "환선무(桓宣武)가 죽었을 때, 환남군(桓南郡)은 나이 다섯 살이었는데 상복을 막 벗었다. 환거기(桓車騎)가 옛 부하 문무관들과 작별하면서 남군을 가리켜 말하기를 \"이들은 모두 네 집안의 옛 관리와 보좌들이다\"라고 했다. 현(玄)이 그 말에 응하여 통곡하니 그 슬픔이 곁의 사람들을 감동시켰다. 거기가 매번 스스로 자기 자리를 가리키며 말하기를 \"영보(靈寶)가 어른이 되면 마땅히 이 자리를 그에게 돌려주리라\"라고 했다. 길러주고 사랑함이 친자식보다 더했다.", ["효", "죽음", "신동"]], ["豪爽", 1, "王大將軍年少時，舊有田舍名，語音亦楚。武帝喚時賢共言伎蓺事。人皆多有所知，唯王都無所關，意色殊惡，自言知打鼓吹。帝令取鼓與之，於坐振袖而起，揚槌奮擊，音節諧捷，神氣豪上，傍若無人。舉坐嘆其雄爽。", "왕대장군(王大將軍)이 젊었을 때 본래 시골뜨기(田舍)라는 별명이 있었고 말씨 또한 초(楚) 지방 사투리였다. 무제(武帝)가 당시의 현인들을 불러 함께 기예(伎藝)에 관한 일을 논했다. 사람들이 모두 아는 것이 많았으나 오직 왕만은 전혀 관여하는 바가 없어 안색이 자못 좋지 않더니, 스스로 북치는 것을 안다고 했다. 황제가 북을 가져다 주게 하니, 자리에서 소매를 떨치며 일어나 북채를 들고 힘껏 두드리는데 음절이 어울리고 빨라 신기(神氣)가 호방하게 솟구쳐 곁에 사람이 없는 듯했다. 온 좌중이 그 웅장하고 시원함을 감탄했다.", ["음악", "풍류", "재능"]], ["豪爽", 2, "王處仲世許高尚之目，嘗荒恣於色，體為之弊。左右諫之，處仲曰：「吾乃不覺爾。如此者，甚易耳！」乃開後閤，驅諸婢妾數十人出路，任其所之，時人嘆焉。", "왕처중(王處仲)이 세상에서 고상하다는 평을 받았으나, 일찍이 색(色)에 빠져 방종하여 몸이 그 때문에 쇠약해졌다. 좌우가 그것을 간하니, 처중이 말하기를 \"나는 미처 깨닫지 못했다. 이와 같은 것이라면 매우 쉽다\"라고 했다. 이에 뒤쪽 문을 열어 여러 비첩 수십 명을 길로 내쫓아 가는 대로 맡기니, 당시 사람들이 그를 감탄했다.", ["부부", "도량", "뉘우침"]], ["豪爽", 3, "王大將軍自目：「高朗疎率，學通左氏。」", "왕대장군(王大將軍)이 스스로 평하기를 \"높고 명랑하며 소탈하고 거침없으니, 학문은 좌씨(左氏)에 통달했다\"라고 했다.", ["오만", "비평", "학문"]], ["豪爽", 4, "王處仲每酒後輒詠「老驥伏櫪，志在千里。烈士暮年，壯心不已」。以如意打唾壺，壺口盡缺。", "왕처중(王處仲)이 매번 술 마신 뒤면 늘 \"늙은 준마는 마구간에 엎드려 있어도 뜻은 천 리에 있고, 열사는 늘그막에도 장한 마음이 그치지 않는다\"라고 읊었다. 여의(如意)로 타호(唾壺)를 두드려 호의 주둥이가 모두 이지러졌다.", ["풍류", "술과취흥", "용기"]], ["豪爽", 5, "晉明帝欲起池臺，元帝不許。帝時為太子，好養武士。一夕中作池，比曉便成。今太子西池是也。", "진명제(晉明帝)가 연못과 누대를 만들고자 했으나 원제(元帝)가 허락하지 않았다. 명제는 그때 태자였는데 무사 기르기를 좋아했다. 하룻밤 사이에 연못을 만들어 새벽이 되자 곧 완성했다. 지금의 태자 서지(西池)가 그것이다.", ["권력", "재능"]], ["豪爽", 6, "王大將軍始欲下都處分樹置，先遣參軍告朝廷，諷旨時賢。祖車騎尚未鎮壽春，瞋目厲聲語使人曰：「卿語阿黑：何敢不遜！催攝面去，須臾不爾，我將三千兵，槊腳令上！」王聞之而止。", "왕대장군(王大將軍)이 처음 도성으로 내려가 인사를 조처하여 심으려 할 때, 먼저 참군(參軍)을 보내 조정에 알리고 당시의 현인들에게 뜻을 넌지시 비쳤다. 조거기(祖車騎)가 아직 수춘(壽春)을 진수하기 전이었는데, 눈을 부릅뜨고 사나운 소리로 사자에게 말하기를 \"그대는 아흑(阿黑)에게 전하라. 어찌 감히 불손한가! 빨리 거두어 물러가라. 잠시라도 그렇지 않으면 내가 삼천 병사로 창으로 다리를 찔러 올려보내겠다!\"라고 했다. 왕이 이를 듣고 그만두었다.", ["용기", "분노", "권력"]], ["豪爽", 7, "庾穉恭既常有中原之志，文康時權重，未在己。及季堅作相，忌兵畏禍，與穉恭歷同異者久之，乃果行。傾荊、漢之力，窮舟車之勢，師次于襄陽。大會參佐，陳其旌甲，親授弧矢曰：「我之此行，若此射矣！」遂三起三疊，徒眾屬目，其氣十倍。", "유치공(庾穉恭)이 일찍이 중원(中原)을 회복할 뜻을 늘 품고 있었으나, 문강(文康)이 그때 권세가 무거워 자기에게 있지 않았다. 계견(季堅)이 재상이 되자 군사를 꺼리고 화를 두려워하여 치공과 이견의 같고 다름을 오래도록 다투다가, 마침내 결행했다. 형주(荊州)와 한수(漢水)의 힘을 기울이고 배와 수레의 형세를 다하여 군대가 양양(襄陽)에 머물렀다. 참모와 보좌들을 크게 모아 깃발과 갑옷을 늘어놓고, 친히 활과 화살을 잡고 말하기를 \"나의 이번 출정은 이 활쏘기와 같으리라!\"라고 했다. 마침내 세 번 일어나 세 번 명중시키니, 무리가 주목하여 그 기세가 열 배가 되었다.", ["용기", "권력", "재능"]], ["豪爽", 8, "桓宣武平蜀，集參僚置酒於李勢殿，巴、蜀縉紳，莫不來萃。桓既素有雄情爽氣，加爾日音調英發，敘古今成敗由人，存亡繫才。其狀磊落，一坐嘆賞。既散，諸人追味餘言。于時尋陽周馥曰：「恨卿輩不見王大將軍。」", "환선무(桓宣武)가 촉(蜀)을 평정하고 참모와 막료들을 모아 이세(李勢)의 궁전에서 술자리를 베푸니, 파(巴)·촉(蜀)의 사대부들이 모여들지 않는 이가 없었다. 환은 본래 웅대한 정과 시원한 기운을 지녔는데, 게다가 그날 음조가 영발(英發)하여 고금의 성패가 사람에게 달려 있고 존망이 인재에 매여 있음을 서술하니, 그 모습이 뇌락(磊落)하여 온 자리가 감탄하고 칭송했다. 자리가 파한 뒤 사람들이 그 남은 말을 음미했다. 그때 심양(尋陽)의 주복(周馥)이 말하기를 \"그대들이 왕대장군(王大將軍)을 보지 못한 것이 한스럽소\"라고 했다.", ["풍류", "비평", "권력"]], ["豪爽", 9, "桓公讀高士傳，至於陵仲子，便擲去曰：「誰能作此溪刻自處！」", "환공(桓公)이 『고사전(高士傳)』을 읽다가 어릉중자(於陵仲子)에 이르러 곧 던져버리며 말하기를 \"누가 능히 이렇게 각박하게 처신하겠는가!\"라고 했다.", ["비평", "은둔"]], ["豪爽", 10, "桓石虔，司空豁之長庶也。小字鎮惡。年十七八未被舉，而童隸已呼為鎮惡郎。嘗住宣武齋頭。從征枋頭，車騎沖沒陳，左右莫能先救。宣武謂曰：「汝叔落賊，汝知不？」石虔聞之，氣甚奮。命朱辟為副，策馬於數萬眾中，莫有抗者，徑致沖還，三軍嘆服。河朔後以其名斷瘧。", "환석건(桓石虔)은 사공(司空) 환활(桓豁)의 맏서자다. 어릴 적 이름은 진악(鎮惡)이었다. 나이 열일고여덟에 아직 천거되지 않았는데도 어린 종들이 이미 그를 진악랑(鎮惡郎)이라 불렀다. 일찍이 선무(宣武)의 서재 곁에 머물렀다. 방두(枋頭) 정벌을 따라갔을 때, 거기(車騎) 환충(桓沖)이 적진에 빠졌는데 좌우가 능히 먼저 구하지 못했다. 선무가 말하기를 \"네 숙부가 적에게 떨어졌는데 너는 아느냐?\"라고 했다. 석건이 이를 듣고 기운이 몹시 떨쳐올랐다. 주벽(朱辟)을 부장으로 삼아 수만 무리 가운데로 말을 달리니 막아서는 자가 없어, 곧장 환충을 데려 돌아오니 삼군이 감탄하고 탄복했다. 하삭(河朔) 사람들이 뒤에 그의 이름으로 학질을 떼었다.", ["용기", "재능"]], ["豪爽", 11, "陳林道在西岸，都下諸人共要至牛渚會。陳理既佳，人欲共言折。陳以如意拄頰，望雞籠山嘆曰：「孫伯符志業不遂！」於是竟坐不得談。", "진림도(陳林道)가 서쪽 강가에 있을 때, 도성의 여러 사람이 함께 그를 우저(牛渚)로 청하여 모였다. 진의 이치(理)가 이미 훌륭하여 사람들이 함께 논박하고자 했다. 진이 여의(如意)로 뺨을 괴고 계롱산(雞籠山)을 바라보며 탄식하기를 \"손백부(孫伯符)가 뜻과 사업을 이루지 못했구나!\"라고 했다. 이에 끝내 온 자리가 담론하지 못했다.", ["청담", "오만", "기지"]], ["豪爽", 12, "王司州在謝公坐，詠「入不言兮出不辭，乘回風兮載雲旗」。語人云：「當爾時，覺一坐無人。」", "왕사주(王司州)가 사공(謝公)의 자리에 있을 때 \"들어와서도 말하지 않고 나가면서도 인사하지 않으며, 회오리바람을 타고 구름 깃발을 싣는다\"라고 읊었다. 사람들에게 말하기를 \"그때 온 자리에 사람이 없는 듯이 느껴졌다\"라고 했다.", ["풍류", "오만"]], ["豪爽", 13, "桓玄西下，入石頭。外白：「司馬梁王奔叛。」玄時事形已濟，在平乘上笳鼓並作，直高詠云：「簫管有遺音，梁王安在哉？」", "환현(桓玄)이 서쪽에서 내려와 석두(石頭)로 들어갔다. 밖에서 아뢰기를 \"사마양왕(司馬梁王)이 달아나 배반했습니다\"라고 했다. 현은 그때 일의 형세가 이미 이루어져, 평승(平乘) 위에서 호드기와 북이 함께 울리는 가운데 곧장 높이 읊기를 \"퉁소와 피리에 남은 소리 있건만 양왕(梁王)은 어디에 있는가?\"라고 했다.", ["권력", "풍류", "술수"]], ["容止", 1, "魏武將見匈奴使，自以形陋，不足雄遠國，使崔季珪代，帝自捉刀立牀頭。既畢，令間諜問曰：「魏王何如？」匈奴使答曰：「魏王雅望非常，然牀頭捉刀人，此乃英雄也。」魏武聞之，追殺此使。", "위무제(魏武帝)가 흉노의 사자를 만나려 하면서, 스스로 용모가 추하여 먼 나라에 위엄을 보이기에 부족하다고 여겨, 최계규(崔季珪)로 대신하게 하고 자신은 칼을 잡고 평상 머리에 섰다. 만남이 끝나자, 간첩을 시켜 묻기를 \"위왕(魏王)이 어떠한가?\"라고 했다. 흉노 사자가 대답하기를 \"위왕의 고아한 풍모가 비상하나, 평상 머리에서 칼을 잡은 사람, 그가 바로 영웅입니다\"라고 했다. 위무제가 이를 듣고 사람을 보내 이 사자를 뒤쫓아 죽였다.", ["용모", "기지", "원한"]], ["容止", 2, "何平叔美姿儀，面至白；魏明帝疑其傅粉。正夏月，與熱湯。既噉，大汗出，以朱衣自拭，色轉皎然。", "하평숙(何平叔)은 자태와 거동이 아름답고 얼굴이 지극히 희었다. 위명제(魏明帝)가 그가 분을 바른 것이 아닌가 의심했다. 바로 여름철에 뜨거운 국수를 주었다. 다 먹고 나서 크게 땀이 나니, 붉은 옷으로 스스로 닦았으나 낯빛이 도리어 더욱 희고 깨끗해졌다.", ["용모"]], ["容止", 3, "魏明帝使后弟毛曾與夏侯玄共坐，時人謂「蒹葭倚玉樹」。", "위명제(魏明帝)가 황후의 아우 모증(毛曾)을 하후현(夏侯玄)과 함께 앉게 하니, 당시 사람들이 \"갈대가 옥나무에 기댔다\"라고 했다.", ["용모", "비평"]], ["容止", 4, "時人目「夏侯太初朗朗如日月之入懷，李安國頹唐如玉山之將崩」。", "당시 사람들이 평하기를 \"하후태초(夏侯太初)는 밝고 밝아 해와 달이 품에 들어온 듯하고, 이안국(李安國)은 무너질 듯하여 옥산(玉山)이 막 무너지려는 듯하다\"라고 했다.", ["용모", "비평"]], ["容止", 5, "嵇康身長七尺八寸，風姿特秀。見者歎曰：「蕭蕭肅肅，爽朗清舉。」或云：「肅肅如松下風，高而徐引。」山公曰：「嵇叔夜之為人也，巖巖若孤松之獨立；其醉也，傀俄若玉山之將崩。」", "혜강(嵇康)은 신장이 일곱 자 여덟 치였고 풍자(風姿)가 특별히 빼어났다. 본 자가 감탄하기를 \"소소하고 숙숙하며, 상쾌하고 명랑하며 맑게 빼어났다\"라고 했다. 혹은 \"숙숙하기가 소나무 아래 바람 같아 높으면서도 천천히 끄는 듯하다\"라고 했다. 산공(山公)이 말하기를 \"혜숙야(嵇叔夜)의 사람됨은 우뚝하기가 외로운 소나무가 홀로 선 듯하고, 그가 취하면 무너질 듯 옥산(玉山)이 막 무너지려는 듯하다\"라고 했다.", ["용모", "비평"]], ["容止", 6, "裴令公目王安：「豐眼爛爛如巖下電。」", "배령공(裴令公)이 왕안(王安)을 평하기를 \"풍성한 눈이 번쩍번쩍하여 바위 아래 번개 같다\"라고 했다.", ["용모", "비평"]], ["容止", 7, "潘岳妙有姿容，好神情。少時挾彈出洛陽道，婦人遇者，莫不連手共縈之。左太沖絕醜，亦復效岳遊遨，於是羣嫗齊共亂唾之，委頓而返。", "반악(潘岳)은 묘하게 자태와 용모가 있고 신정(神情)을 좋아했다. 젊었을 때 탄궁을 끼고 낙양(洛陽)의 길로 나가면, 마주치는 부인들이 손을 잡고 함께 그를 에워싸지 않는 이가 없었다. 좌태충(左太沖)은 몹시 추했는데, 또한 반악을 본떠 노닐러 나가니, 이에 여러 노파들이 일제히 함께 어지러이 침을 뱉어, 풀이 죽어 돌아왔다.", ["용모", "비평"]], ["容止", 8, "王夷甫容貌整麗，妙於談玄，恆捉白玉柄麈尾，與手都無分別。", "왕이보(王夷甫)는 용모가 단정하고 아름다웠으며 현담(玄談)에 묘했는데, 늘 백옥 자루의 주미(麈尾)를 잡았으니 손과 전혀 분간이 없었다.", ["용모", "청담"]], ["容止", 9, "潘安仁、夏侯湛並有美容，喜同行，時人謂之「連璧」。", "반안인(潘安仁)과 하후담(夏侯湛)이 모두 아름다운 용모가 있어 함께 다니기를 좋아하니, 당시 사람들이 그들을 \"연벽(連璧)\"이라 불렀다.", ["용모", "우정"]], ["容止", 10, "裴令公有儁容姿，一旦有疾至困，惠帝使王夷甫往看，裴方向壁臥，聞王使至，強回視之。王出語人曰：「雙眸閃閃，若巖下電，精神挺動，體中故小惡。」", "배령공(裴令公)은 뛰어난 용모와 자태가 있었는데, 하루는 병이 들어 위독한 지경에 이르렀다. 혜제(惠帝)가 왕이보(王夷甫)를 보내 가서 보게 하니, 배는 마침 벽을 향해 누워 있다가 왕의 사자가 이르렀다는 말을 듣고 억지로 돌아보았다. 왕이 나와 사람들에게 말하기를 \"두 눈동자가 반짝반짝하여 바위 아래 번개 같고 정신이 꼿꼿이 움직이니, 몸은 다만 조금 좋지 않을 뿐이다\"라고 했다.", ["용모", "병과늙음", "비평"]], ["容止", 11, "有人語王戎曰：「嵇延祖卓卓如野鶴之在雞羣。」答曰：「君未見其父耳！」", "어떤 사람이 왕융(王戎)에게 말하기를 \"혜연조(嵇延祖)는 우뚝하기가 들판의 학이 닭 무리 가운데 있는 듯하다\"라고 했다. 대답하기를 \"그대가 그 아비를 보지 못했을 뿐이오!\"라고 했다.", ["용모", "비평"]], ["容止", 12, "裴令公有儁容儀，脫冠冕，麤服亂頭皆好。時人以為「玉人」。見者曰：「見裴叔則如玉山上行，光映照人。」", "배령공(裴楷)은 빼어난 용모와 거동을 지녔으니, 관을 벗고 거친 옷에 흐트러진 머리를 해도 모두 아름다웠다. 당시 사람들은 그를 '옥인(玉人)'이라 여겼다. 그를 본 자가 말하였다. \"배숙칙(裴楷)을 보면 옥산 위를 거니는 듯하여 그 빛이 사람을 비춘다.\"", ["용모", "비평"]], ["容止", 13, "劉伶身長六尺，貌甚醜顇，而悠悠忽忽，土木形骸。", "유령(劉伶)은 키가 여섯 자에 용모가 매우 못생기고 초췌하였으나, 유유하고 활달하여 흙과 나무처럼 자기 몸을 내버려 두었다.", ["용모", "풍류"]], ["容止", 14, "驃騎王武子是衛玠之舅，儁爽有風姿，見玠輒歎曰：「珠玉在側，覺我形穢！」", "표기장군 왕무자(王武子)는 위개(衛玠)의 외삼촌으로, 빼어나고 시원스러우며 풍채가 있었는데, 위개를 볼 때마다 탄식하며 말하였다. \"주옥이 곁에 있으니 내 모습이 추하게 느껴진다!\"", ["용모", "비평", "겸손"]], ["容止", 15, "有人詣王太尉，遇安豐、大將軍、丞相在坐；往別屋見季胤、平子。還，語人曰：「今日之行，觸目見琳琅珠玉。」", "어떤 사람이 왕태위(王衍)를 찾아갔다가, 안풍(王戎)과 대장군(王敦)과 승상(王導)이 자리에 함께 있는 것을 만났고, 다른 방으로 가서 계윤과 평자를 보았다. 돌아와서 사람들에게 말하였다. \"오늘의 걸음은 눈길 닿는 곳마다 아름다운 주옥을 보았다.\"", ["용모", "비평"]], ["容止", 16, "王丞相見衛洗馬曰：「居然有羸形，雖復終日調暢，若不堪羅綺。」", "왕승상(王導)이 위세마(衛玠)를 보고 말하였다. \"확연히 여윈 모습이라, 비록 종일토록 조화롭고 화창하더라도 비단옷조차 감당하지 못할 듯하다.\"", ["용모", "비평"]], ["容止", 17, "王大將軍稱太尉：「處眾人中，似珠玉在瓦石間。」", "왕대장군(王敦)이 태위(王衍)를 칭하여 말하였다. \"뭇사람 가운데 있으니, 주옥이 기와와 돌 사이에 있는 듯하다.\"", ["용모", "비평"]], ["容止", 18, "庾子嵩長不滿七尺，腰帶十圍，頹然自放。", "유자숭(庾子嵩)은 키가 일곱 자가 못 되었으나 허리띠가 열 아름이었고, 늘어진 채 스스로를 거리낌 없이 내버려 두었다.", ["용모", "풍류"]], ["容止", 19, "衛玠從豫章至下都，人久聞其名，觀者如堵牆。玠先有羸疾，體不堪勞，遂成病而死。時人謂「看殺衛玠」。", "위개(衛玠)가 예장(豫章)에서 하도(下都)에 이르니, 사람들이 그 이름을 오래 들었던 터라 구경하는 자가 담장처럼 늘어섰다. 위개는 본래 여윈 병이 있어 몸이 수고로움을 감당하지 못하였는데, 마침내 병이 되어 죽었다. 당시 사람들은 \"위개를 보아서 죽였다\"고 하였다.", ["용모", "죽음", "병과늙음"]], ["容止", 20, "周伯仁道桓茂倫：「嶔崎歷落可笑人。」或云謝幼輿言。", "주백인(周顗)이 환무륜(桓溫)을 평하였다. \"우뚝하고 빼어나며 두드러져 사람을 웃게 하는 자다.\" 혹은 사유여(謝鯤)의 말이라고도 한다.", ["용모", "비평"]], ["容止", 21, "周侯說王長史父：形貌既偉，雅懷有概，保而用之，可作諸許物也。", "주후(周顗)가 왕장사(王濛)의 부친을 평하였다. 형모가 이미 위대하고, 우아한 회포에 기개가 있어, 그것을 잘 지녀 쓰면 여러 가지 일을 해낼 만하다.", ["용모", "비평"]], ["容止", 22, "祖士少見衛君長云：「此人有旄仗下形。」", "조사소(祖逖)가 위군장(衛玠)을 보고 말하였다. \"이 사람은 깃발과 의장 아래 설 만한 모습이 있다.\"", ["용모", "비평"]], ["容止", 23, "石頭事故，朝廷傾覆。溫忠武與庾文康投陶公求救，陶公云：「肅祖顧命不見及，且蘇峻作亂，釁由諸庾，誅其兄弟，不足以謝天下。」\n于時庾在溫船後聞之，憂怖無計。別日，溫勸庾見陶，庾猶豫未能往，溫曰：「溪狗我所悉，卿但見之，必無憂也！」庾風姿神貌，陶一見便改觀。談宴竟日，愛重頓至。", "석두(石頭)의 변고로 조정이 무너졌다. 온충무(溫嶠)가 유문강(庾亮)과 함께 도공(陶侃)에게 가서 구원을 청하니, 도공이 말하였다. \"숙조(肅祖)의 고명(顧命)에 나는 끼지 못하였고, 또 소준(蘇峻)의 난은 그 빌미가 여러 유씨에게서 비롯되었으니, 그 형제를 베어도 천하에 사죄하기에 부족하다.\" 그때 유량은 온교의 배 뒤에 있다가 이를 듣고, 근심하고 두려워하며 어찌할 바를 몰랐다. 다른 날 온교가 유량에게 도공을 만나보라 권하니, 유량이 머뭇거리며 가지 못하였다. 온교가 말하였다. \"계구(溪狗)는 내가 잘 아는 자이니, 그대는 만나기만 하면 반드시 근심할 것이 없을 것이오!\" 유량의 풍자와 신모(神貌)에 도공은 한 번 보고 곧 보는 눈을 바꾸었다. 종일토록 담소하며 잔치하니, 사랑하고 중히 여김이 단번에 지극해졌다.", ["용모", "권력", "도량"]], ["容止", 24, "庾太尉在武昌，秋夜氣佳景清，使吏殷浩、王胡之之徒登南樓理詠。音調始遒，聞函道中有屐聲甚厲，定是庾公。俄而率左右十許人步來，諸賢欲起避之。公徐云：「諸君少住，老子於此處興復不淺！」因便據胡牀，與諸人詠謔，竟坐甚得任樂。後王逸少下，與丞相言及此事。丞相曰：「元規爾時風範，不得不小穨。」右軍答曰：「唯丘壑獨存。」", "유태위(庾亮)가 무창(武昌)에 있을 때, 가을밤 기운이 아름답고 경치가 맑았다. 관리인 은호(殷浩)와 왕호지(王胡之) 무리로 하여금 남루(南樓)에 올라 시를 읊게 하였다. 음조가 막 무르익으려는데, 복도 가운데서 나막신 소리가 매우 사납게 들리니, 분명 유공이었다. 이윽고 좌우 열 명 남짓을 거느리고 걸어오니, 여러 어진 이들이 일어나 피하려 하였다. 유공이 천천히 말하였다. \"여러분, 잠시 머무시오. 이 늙은이가 이곳에서의 흥취가 또한 얕지 않소!\" 그러고는 호상(胡牀)에 기대어 여러 사람과 함께 시를 읊고 농담하니, 끝내 좌중이 자유로운 즐거움을 흠뻑 누렸다. 뒤에 왕일소(王羲之)가 내려와 승상(王導)과 이 일을 이야기하게 되었다. 승상이 말하였다. \"원규(庾亮)가 그때의 풍범(風範)이라면, 다소 무너지지 않을 수 없었겠지요.\" 우군(王羲之)이 답하였다. \"오직 산수의 정취만은 홀로 남아 있었지요.\"", ["풍류", "자연과산수", "도량"]], ["容止", 25, "王敬豫有美形，問訊王公。王公撫其肩曰：「阿奴恨才不稱！」又云：「敬豫事事似王公。」", "왕경예(王坦之)는 아름다운 형모를 지녔는데, 왕공(王導)에게 안부를 물으니, 왕공이 그 어깨를 어루만지며 말하였다. \"아노(阿奴)는 재주가 모습에 걸맞지 못함이 한스럽구나!\" 또 말하기를 \"경예는 일마다 왕공을 닮았다\"고 하였다.", ["용모", "비평", "재능"]], ["容止", 26, "王右軍見杜弘治，歎曰：「面如凝脂，眼如點漆，此神仙中人。」時人有稱王長史形者，蔡公曰：「恨諸人不見杜弘治耳！」", "왕우군(王羲之)이 두홍치(杜弘治)를 보고 탄식하였다. \"얼굴은 엉긴 기름 같고 눈은 점찍은 옻칠 같으니, 이는 신선 가운데 사람이다.\" 당시 사람 가운데 왕장사(王濛)의 형모를 칭찬하는 이가 있자, 채공(蔡公)이 말하였다. \"여러 사람이 두홍치를 보지 못한 것이 한스러울 뿐이다!\"", ["용모", "비평"]], ["容止", 27, "劉尹道桓公：鬢如反猬皮，眉如紫石稜，自是孫仲謀、司馬宣王一流人。", "유윤(劉惔)이 환공(桓溫)을 평하였다. 살쩍은 거꾸로 선 고슴도치 가죽 같고, 눈썹은 자줏빛 돌의 모서리 같으니, 본래 손중모(孫仲謀)와 사마선왕(司馬宣王) 같은 부류의 사람이다.", ["용모", "비평"]], ["容止", 28, "王敬倫風姿似父，作侍中，加授桓公，公服從大門入。桓公望之，曰：「大奴固自有鳳毛。」", "왕경륜(王坦之)은 풍자가 부친을 닮았다. 시중이 되어 환공(桓溫)에게 가관(加官)될 때, 관복을 입고 대문으로 들어왔다. 환공이 그를 바라보며 말하였다. \"큰 종놈에게는 본래 봉황의 털이 있구나.\"", ["용모", "비평"]], ["容止", 29, "林公道王長史：「斂衿作一來，何其軒軒韶舉！」", "임공(支遁)이 왕장사(王濛)를 평하였다. \"옷깃을 여미고 한 번 다가오니, 어찌 그리 의젓하고 아름다운 거동인가!\"", ["용모", "비평"]], ["容止", 30, "時人目王右軍：「飄如遊雲，矯若驚龍。」", "당시 사람들이 왕우군(王羲之)을 평하였다. \"떠도는 구름처럼 표연하고, 놀란 용처럼 굳세다.\"", ["용모", "비평"]], ["容止", 31, "王長史嘗病，親疎不通。林公來，守門人遽啟之曰：「一異人在門，不敢不啟。」王笑曰：「此必林公。」", "왕장사(王濛)가 일찍이 병들어 친소를 막론하고 통하지 못하게 하였다. 임공(支遁)이 오자 문지기가 황급히 아뢰었다. \"기이한 사람 하나가 문에 있어 감히 아뢰지 않을 수 없습니다.\" 왕장사가 웃으며 말하였다. \"이는 분명 임공이다.\"", ["용모", "비평", "우정"]], ["容止", 32, "或以方謝仁祖不乃重者。桓大司馬曰：「諸君莫輕道，仁祖企腳北窗下彈琵琶，故自有天際真人想。」", "어떤 사람이 사인조(謝尚)를 그다지 중히 여기지 않는 자에 견주었다. 환대사마(桓溫)가 말하였다. \"여러분은 가벼이 말하지 마시오. 인조가 북창 아래 다리를 뻗고 비파를 타니, 본래 천제(天際)의 진인(眞人) 같은 상상이 절로 든다오.\"", ["비평", "음악", "풍류"]], ["容止", 33, "王長史為中書郎，往敬和許。爾時積雪，長史從門外下車，步入尚書，著公服。敬和遙望，歎曰：「此不復似世中人！」", "왕장사(王濛)가 중서랑이 되어 경화의 처소로 갔다. 그때 눈이 쌓여 있었는데, 왕장사가 문밖에서 수레를 내려 걸어서 상서성으로 들어가니, 관복을 입고 있었다. 경화가 멀리 바라보며 탄식하였다. \"이는 더 이상 세상 사람 같지 않구나!\"", ["용모", "비평"]], ["容止", 34, "簡文作相王時，與謝公共詣桓宣武。王珣先在內，桓語王：「卿嘗欲見相王，可住帳裏。」二客既去，桓謂王曰：「定何如？」王曰：「相王作輔，自然湛若神君，公亦萬夫之望。不然，僕射何得自沒？」", "간문제(簡文帝)가 상왕(相王)이던 때, 사공(謝安)과 함께 환선무(桓溫)를 찾아갔다. 왕순(王珣)이 먼저 안에 있었는데, 환온이 왕순에게 말하였다. \"그대가 일찍이 상왕을 만나보고자 하였으니, 휘장 안에 머물러 있으라.\" 두 손님이 떠난 뒤, 환온이 왕순에게 말하였다. \"과연 어떠하던가?\" 왕순이 말하였다. \"상왕이 보필을 맡으니 자연히 깊고 그윽함이 신군(神君)과 같았고, 공 또한 만인이 우러르는 분이었습니다. 그렇지 않다면 복야(僕射)가 어찌 스스로 가라앉을 수 있었겠습니까?\"", ["비평", "용모"]], ["容止", 35, "海西時，諸公每朝，朝堂猶暗；唯會稽王來，軒軒如朝霞舉。", "해서공(海西公) 때, 여러 공이 조회할 때마다 조당(朝堂)이 오히려 어두웠으나, 오직 회계왕(會稽王)이 오면 의젓하여 마치 아침놀이 솟는 듯하였다.", ["용모", "비평"]], ["容止", 36, "謝車騎道謝公：「遊肆復無乃高唱，但恭坐捻鼻顧睞，便自有寢處山澤閒儀。」", "사거기(謝玄)가 사공(謝安)을 평하였다. \"노닐며 즐길 때도 높이 읊조림이 없고, 다만 공손히 앉아 코를 매만지며 좌우를 돌아볼 뿐인데, 그 자체로 산수에 누워 지내는 거동이 있었다.\"", ["비평", "풍류", "자연과산수"]], ["容止", 37, "謝公云：「見林公雙眼，黯黯明黑。」孫興公見林公：「稜稜露其爽。」", "사공(謝安)이 말하였다. \"임공(支遁)의 두 눈을 보니, 검고도 밝게 빛나더라.\" 손흥공(孫綽)이 임공을 보고 말하였다. \"모가 나고 날카로워 그 시원함을 드러낸다.\"", ["용모", "비평"]], ["容止", 38, "庾長仁與諸弟入吳，欲住亭中宿。諸弟先上，見羣小滿屋，都無相避意。長仁曰：「我試觀之。」乃策杖將一小兒，始入門，諸客望其神姿，一時退匿。", "유장인(庾亮)이 여러 아우와 함께 오(吳) 땅에 들어가 정자 안에서 묵으려 하였다. 여러 아우가 먼저 올라가 보니 잡인들이 방에 가득하여 전혀 비켜줄 뜻이 없었다. 장인이 말하였다. \"내가 한번 살펴보겠다.\" 이에 지팡이를 짚고 어린아이 하나를 데리고 막 문에 들어서니, 여러 손님이 그 신자(神姿)를 바라보고는 일시에 물러나 숨었다.", ["용모", "도량"]], ["容止", 39, "有人歎王恭形茂者，云：「濯濯如春月柳。」", "어떤 사람이 왕공(王恭)의 빼어난 형모를 탄식하며 말하였다. \"윤기 흐르는 것이 봄날의 버들 같다.\"", ["용모", "비평"]], ["自新", 1, "周處年少時，兇彊俠氣，為鄉里所患。又義興水中有蛟，山中有邅跡虎，並皆暴犯百姓，義興人謂為三橫，而處尤劇。或說處殺虎斬蛟，實冀三橫唯餘其一。處即刺殺虎，又入水擊蛟，蛟或浮或沒，行數十里，處與之俱。經三日三夜，鄉里皆謂已死，更相慶，竟殺蛟而出。聞里人相慶，始知為人情所患，有自改意。乃自吳尋二陸，平原不在，正見清河，具以情告，幷云：「欲自修改，而年已蹉跎，終無所成。」清河曰：「古人貴朝聞夕死，況君前途尚可。且人患志之不立，亦何憂令名不彰邪？」處遂改勵，終為忠臣孝子。", "주처(周處)는 젊었을 때 흉포하고 강하며 협기가 있어 향리의 근심거리가 되었다. 또 의흥(義興)의 물속에는 교룡이 있고 산중에는 발자국을 끄는 호랑이가 있어, 모두 백성을 사납게 해치니, 의흥 사람들은 이를 세 가지 횡포라 일컬었는데, 주처가 더욱 심하였다. 어떤 이가 주처에게 호랑이를 죽이고 교룡을 베라고 권하였으니, 실은 세 가지 횡포 중 하나만 남기를 바란 것이었다. 주처가 곧 호랑이를 찔러 죽이고, 또 물에 들어가 교룡을 쳤다. 교룡이 떴다 가라앉았다 하며 수십 리를 갔는데, 주처도 함께 갔다. 사흘 밤낮이 지나도록 향리에서는 모두 그가 이미 죽었다 여겨 서로 경하하였으나, 마침내 교룡을 죽이고 나왔다. 마을 사람들이 서로 경하한다는 말을 듣고서야 비로소 자기가 사람들의 근심거리였음을 알고, 스스로 고치려는 뜻을 품었다. 이에 오(吳)로 가서 두 육씨를 찾았는데, 평원(陸機)은 없고 마침 청하(陸雲)만 보았다. 사정을 갖추어 고하고 아울러 말하였다. \"스스로 닦아 고치고자 하나 나이가 이미 어그러져 끝내 이룰 바가 없을까 합니다.\" 청하가 말하였다. \"옛사람은 아침에 도를 들으면 저녁에 죽어도 좋다 하였거늘, 하물며 그대의 앞길은 아직 가능함에랴. 또 사람은 뜻을 세우지 못함을 근심할 뿐이니, 어찌 훌륭한 이름이 드러나지 않음을 근심하겠소?\" 주처가 마침내 고치고 힘써, 끝내 충신이요 효자가 되었다.", ["뉘우침", "용기", "학문"]], ["自新", 2, "戴淵少時，遊俠不治行檢，嘗在江、淮間攻掠商旅。陸機赴假還洛，輜重甚盛。淵使少年掠劫，淵在岸上，據胡牀，指麾左右，皆得其宜。淵既神姿峯頴，雖處鄙事，神氣猶異。機於船屋上遙謂之曰：「卿才如此，亦復作劫邪？」淵便泣涕，投劍歸機，辭厲非常。機彌重之，定交，作筆薦焉。過江，仕至征西將軍。", "대연(戴淵)은 젊었을 때 협객 노릇을 하며 품행을 다스리지 않아, 일찍이 강수와 회수 사이에서 상인과 나그네를 노략질하였다. 육기(陸機)가 휴가에서 낙양으로 돌아오는데 짐이 매우 많았다. 대연이 젊은이들을 시켜 노략질하게 하면서, 자신은 언덕 위에서 호상(胡牀)에 기대어 좌우를 지휘하니 모두 마땅함을 얻었다. 대연은 본래 신자(神姿)가 우뚝하고 빼어나, 비록 비천한 일에 처하였으나 신기(神氣)는 여전히 남달랐다. 육기가 배의 지붕 위에서 멀리 그에게 말하였다. \"그대의 재주가 이러한데 또한 노략질을 한단 말인가?\" 대연이 곧 눈물을 흘리며 칼을 던지고 육기에게 귀의하니, 말씨가 비상하였다. 육기가 더욱 그를 중히 여겨 사귐을 맺고, 글을 지어 천거하였다. 강을 건너 벼슬이 정서장군에 이르렀다.", ["뉘우침", "재능", "우정"]], ["企羡", 1, "王丞相拜司空，桓廷尉作兩髻、葛帬、策杖，路邊窺之，歎曰：「人言阿龍超，阿龍故自超。」不覺至臺門。", "왕승상(王導)이 사공에 제수되니, 환정위(桓溫)가 두 갈래로 상투를 틀고 갈포 치마를 입고 지팡이를 짚고서 길가에서 엿보며 탄식하였다. \"사람들이 아룡(阿龍)이 빼어나다 하더니, 아룡은 과연 빼어나구나.\" 그러고는 자신도 모르게 대문(臺門)에 이르렀다.", ["용모", "비평"]], ["企羡", 2, "王丞相過江，自說昔在洛水邊，數與裴成公、阮千里諸賢共談道。羊曼曰：「人久以此許卿，何須復爾？」王曰：「亦不言我須此，但欲爾時不可得耳！」", "왕승상(王導)이 강을 건넌 뒤, 옛날 낙수 가에 있을 때 배성공(裴楷)과 완천리(阮瞻) 등 여러 어진 이와 함께 도를 담론하던 일을 스스로 이야기하였다. 양만(羊曼)이 말하였다. \"사람들이 오래도록 이 일로 그대를 높이 여겼는데, 어찌 다시 그러시오?\" 왕승상이 말하였다. \"또한 내가 이것을 자랑할 것은 못 되나, 다만 그때를 다시 얻을 수 없음이 아쉬울 뿐이오!\"", ["청담", "겸손", "우정"]], ["企羡", 3, "王右軍得人以蘭亭集序方金谷詩序，又以已敵石崇，甚有欣色。", "왕우군(王羲之)은 어떤 사람이 「난정집서(蘭亭集序)」를 「금곡시서(金谷詩序)」에 견주고, 또 자신을 석숭(石崇)에 맞먹게 하는 것을 듣고 매우 기뻐하는 빛이 있었다.", ["서화", "오만", "비평"]], ["企羡", 4, "王司州先為庾公記室參軍，後取殷浩為長史。始到，庾公欲遣王使下都。王自啟求住曰：「下官希見盛德，淵源始至，猶貪與少日周旋。」", "왕사주(王胡之)가 먼저 유공(庾亮)의 기실참군이 되었다가, 뒤에 은호(殷浩)를 장사로 데려왔다. 은호가 막 도착하자 유공이 왕사주를 하도(下都)로 보내고자 하였다. 왕사주가 스스로 아뢰어 머물기를 청하며 말하였다. \"제가 성덕(盛德)을 보기를 바랐는데, 연원(殷浩)이 막 이르렀으니, 그래도 며칠이나마 함께 지내기를 탐내옵니다.\"", ["비평", "우정"]], ["企羡", 5, "郗嘉賓得人以己比符堅，大喜。", "치가빈(郗超)은 어떤 사람이 자기를 부견(符堅)에 견주는 것을 듣고 크게 기뻐하였다.", ["비평", "오만"]], ["企羡", 6, "孟昶未達時，家在京口。嘗見王恭乘高輿，被鶴氅裘。于時微雪，昶於籬間窺之，歎曰：「此真神仙中人！」", "맹창(孟昶)이 아직 현달하지 못하였을 때, 집이 경구(京口)에 있었다. 일찍이 왕공(王恭)이 높은 수레를 타고 학창의(鶴氅裘)를 걸친 것을 보았는데, 그때 가는 눈이 내렸다. 맹창이 울타리 사이로 엿보며 탄식하였다. \"이는 참으로 신선 가운데 사람이로다!\"", ["용모", "비평"]], ["傷逝", 1, "王仲宣好驢鳴。既葬，文帝臨其喪，顧語同遊曰：「王好驢鳴，可各作一聲以送之。」赴客皆一作驢鳴。", "왕중선(王粲)은 나귀 울음소리를 좋아하였다. 장사를 지낸 뒤, 문제(文帝)가 그 상에 임하여 함께 노닐던 이들을 돌아보며 말하였다. \"왕중선이 나귀 울음을 좋아하였으니, 각자 한 소리씩 내어 그를 보내자.\" 조문 온 손님들이 모두 한 차례 나귀 울음을 내었다.", ["죽음", "우정", "풍류"]], ["傷逝", 2, "王濬沖為尚書令，著公服，乘軺車，經黃公酒壚下過，顧謂後車客：「吾昔與嵇叔夜、阮嗣宗共酣飲於此壚，竹林之遊，亦預其末。自嵇生夭、阮公亡以來，便為時所羈紲。今日視此雖近，邈若山河。」", "왕준충(王戎)이 상서령이 되어 관복을 입고 초거(軺車)를 타고 황공의 술집 아래를 지나가다가, 뒷수레의 손님을 돌아보며 말하였다. \"내가 옛날 혜숙야(嵇康), 완사종(阮籍)과 함께 이 술집에서 흠뻑 마셨고, 죽림(竹林)의 노닒에도 그 말석에 참여하였다. 혜강이 요절하고 완공이 죽은 뒤로는 곧 시속에 얽매이게 되었다. 오늘 이곳을 보니 비록 가깝지만 산하처럼 아득하구나.\"", ["죽음", "우정", "풍류"]], ["傷逝", 3, "孫子荊以有才，少所推服，唯雅敬王武子。武子喪時，名士無不至者。子荊後來，臨屍慟哭，賓客莫不垂涕。哭畢，向靈牀曰：「卿常好我作驢鳴，今我為卿作。」體似真聲，賓客皆笑。孫舉頭曰：「使君輩存，令此人死！」", "손자형(孫綽)은 재주가 있다 하여 남을 인정하고 따르는 일이 드물었으나, 오직 왕무자(王武子)만은 우러러 공경하였다. 왕무자가 죽었을 때 이름난 선비로 이르지 않은 이가 없었다. 손자형이 뒤늦게 와서 주검 앞에서 통곡하니, 손님들이 눈물을 흘리지 않는 이가 없었다. 곡을 마치고 영상(靈牀)을 향하여 말하였다. \"그대가 늘 내가 나귀 울음 내는 것을 좋아하였으니, 이제 내가 그대를 위해 내겠소.\" 그 소리가 진짜 같으니 손님들이 모두 웃었다. 손자형이 머리를 들고 말하였다. \"그대들 같은 무리는 살려 두고, 이 사람을 죽게 하였구나!\"", ["죽음", "우정", "풍류"]], ["傷逝", 4, "王戎喪兒萬子，山簡往省之，王悲不自勝。簡曰：「孩抱中物，何至於此？」王曰：「聖人忘情，最下不及情；情之所鍾，正在我輩。」簡服其言，更為之慟。", "왕융(王戎)이 아들 만자(萬子)를 잃자, 산간(山簡)이 가서 위문하니, 왕융이 슬픔을 스스로 가누지 못하였다. 산간이 말하였다. \"품 안의 아이일 뿐인데, 어찌 이 지경에 이르렀습니까?\" 왕융이 말하였다. \"성인은 정(情)을 잊고, 가장 못난 자는 정에 미치지 못하니, 정이 모이는 곳은 바로 우리 같은 무리에게 있소.\" 산간이 그 말에 감복하여 다시 그를 위해 통곡하였다.", ["죽음", "효", "도량"]], ["傷逝", 5, "有人哭和長輿曰：「峨峨若千丈松崩。」", "어떤 사람이 화장여(和嶠)를 곡하며 말하였다. \"우뚝하기가 천 길의 소나무가 무너지는 듯하다.\"", ["죽음", "비평", "용모"]], ["傷逝", 6, "衛洗馬以永嘉六年喪，謝鯤哭之，感動路人。咸和中，丞相王公教曰：「衛洗馬當改葬。此君風流名士，海內所瞻，可脩薄祭，以敦舊好。」", "위세마(衛玠)가 영가(永嘉) 6년에 죽으니, 사곤(謝鯤)이 그를 곡하여 길 가던 사람들까지 감동시켰다. 함화(咸和) 연간에 승상 왕공(王導)이 교(敎)를 내려 말하였다. \"위세마를 마땅히 개장(改葬)해야 한다. 이 분은 풍류 있는 명사로 천하가 우러르던 바이니, 박한 제사라도 마련하여 옛 정을 도탑게 함이 옳다.\"", ["죽음", "용모", "풍류"]], ["傷逝", 7, "顧彥先平生好琴，及喪，家人常以琴置靈牀上。張季鷹往哭之，不勝其慟，遂徑上牀，鼓琴，作數曲竟，撫琴曰：「顧彥先頗復賞此不？」因又大慟，遂不執孝子手而出。", "고언선(顧愷之의 일족 顧榮)은 평생 거문고를 좋아하였는데, 죽자 집안사람들이 늘 거문고를 영상(靈牀) 위에 놓아두었다. 장계응(張翰)이 가서 곡하다가 그 슬픔을 이기지 못하고, 마침내 곧장 영상에 올라가 거문고를 타서 몇 곡을 마친 뒤, 거문고를 어루만지며 말하였다. \"고언선은 자못 이를 다시 감상하시는지요?\" 그러고는 또 크게 통곡하고, 마침내 효자의 손을 잡지도 않고 나가 버렸다.", ["죽음", "음악", "우정"]], ["傷逝", 8, "庾亮兒遭蘇峻難遇害。諸葛道明女為庾兒婦，既寡，將改適，與亮書及之。亮答曰：「賢女尚少，故其宜也。感念亡兒，若在初沒。」", "유량(庾亮)의 아들이 소준(蘇峻)의 난을 만나 해를 입었다. 제갈도명(諸葛道明)의 딸이 유량 아들의 아내였는데, 과부가 되자 다시 시집가게 되어, 유량에게 보내는 편지에서 이를 언급하였다. 유량이 답하였다. \"어진 따님이 아직 젊으니 진실로 마땅한 일이오. 죽은 아들을 생각하니, 마치 막 죽었을 때와 같소.\"", ["죽음", "부부", "도량", "제갈씨"]], ["傷逝", 9, "庾文康亡，何揚州臨葬云：「埋玉樹箸土中，使人情何能已已！」", "유문강(庾亮)이 죽자, 하양주(何充)가 장사에 임하여 말하였다. \"옥수(玉樹)를 흙 속에 묻으니, 사람의 정이 어찌 그칠 수 있겠는가!\"", ["죽음", "비평", "용모"]], ["傷逝", 10, "王長史病篤，寢臥燈下，轉麈尾視之，歎曰：「如此人，曾不得四十！」及亡，劉尹臨殯，以犀柄麈尾箸柩中，因慟絕。", "왕장사(王長史)가 병이 위독하여 등불 아래 누워 있다가, 주미(麈尾)를 돌려보며 탄식하기를 \"이런 사람이 마흔도 못 채우다니!\"라고 하였다. 그가 죽자 유윤(劉尹)이 빈소에 임하여 무소뿔 자루의 주미를 관 속에 넣고는 이내 통곡하다가 까무러쳤다.", ["죽음", "병과늙음", "우정"]], ["傷逝", 11, "支道林喪法虔之後，精神霣喪，風味轉墜。常謂人曰：「昔匠石廢斤於郢人，牙生輟絃於鍾子，推己外求，良不虛也！冥契既逝，發言莫賞，中心蘊結，余其亡矣！」卻後一年，支遂殞。", "지도림(支道林)이 법건(法虔)을 잃은 뒤로 정신이 무너지고 풍취가 점점 쇠하였다. 늘 사람들에게 말하기를 \"옛날 장석(匠石)이 영(郢) 땅 사람을 잃자 도끼질을 그만두었고, 백아(伯牙)가 종자기(鍾子期)를 잃자 거문고 줄을 끊었다 하니, 내 처지로 미루어 헤아려 보건대 참으로 헛된 말이 아니로다! 그윽이 통하던 벗이 이미 떠나니 말을 해도 알아줄 이가 없고, 마음속에 응어리가 맺히니 나도 곧 죽겠구나!\"라고 하였다. 그 뒤 일 년이 지나 지둔(支遁)도 마침내 세상을 떠났다.", ["죽음", "우정", "병과늙음"]], ["傷逝", 12, "郗嘉賓喪，左右白郗公「郎喪」，既聞，不悲，因語左右：「殯時可道。」公往臨殯，一慟幾絕。", "치가빈(郗嘉賓)이 죽자 좌우에서 치공(郗公)에게 \"낭(郎)께서 돌아가셨습니다\"라고 아뢰었다. 듣고서도 슬퍼하지 않고 좌우에게 이르기를 \"빈소를 차릴 때 말하라\"고 하였다. 치공이 가서 빈소에 임하여서는 한 번 통곡하다가 거의 까무러쳤다.", ["죽음", "도량"]], ["傷逝", 13, "戴公見林法師墓，曰：「德音未遠，而拱木已積。冀神理緜緜，不與氣運俱盡耳！」", "대공(戴公)이 임법사(林法師)의 무덤을 보고 말하기를 \"덕음(德音)이 아직 멀어지지 않았는데 무덤가 나무는 벌써 한 아름이 되었구나. 신령한 이치(理)가 면면히 이어져 기운(氣運)과 함께 다하지 않기를 바랄 뿐이다!\"라고 하였다.", ["죽음", "병과늙음"]], ["傷逝", 14, "王子敬與羊綏善。綏清淳簡貴，為中書郎，少亡。王深相痛悼，語東亭云：「是國家可惜人！」", "왕자경(王子敬)은 양수(羊綏)와 사이가 좋았다. 양수는 맑고 순박하며 간소하고 고귀하여 중서랑(中書郎)이 되었으나 젊어서 죽었다. 왕자경이 깊이 애통해하며 동정(東亭, 왕순王珣)에게 말하기를 \"이 사람은 나라로서도 아까운 사람이다!\"라고 하였다.", ["죽음", "우정", "비평"]], ["傷逝", 15, "王東亭與謝公交惡。王在東聞謝喪，便出都詣子敬道：「欲哭謝公。」子敬始臥，聞其言，便驚起曰：「所望於法護。」王於是往哭。督帥刁約不聽前，曰：「官平生在時，不見此客。」王亦不與語，直前，哭甚慟，不執末婢手而退。", "왕동정(王東亭, 왕순王珣)이 사공(謝公, 사안謝安)과 사이가 나빴다. 왕동정이 동쪽에 있다가 사안의 부음을 듣고는 곧바로 도성으로 나와 자경(子敬, 왕헌지)을 찾아가 말하기를 \"사공을 위해 곡하고자 한다\"고 하였다. 자경이 마침 누워 있다가 그 말을 듣고 놀라 일어나 말하기를 \"법호(法護)에게 바라던 바로다\"라고 하였다. 왕동정이 이에 가서 곡하였다. 독수(督帥) 조약(刁約)이 앞으로 나아가지 못하게 하며 말하기를 \"관(官, 사안)께서 평생 살아 계실 때 이 손님을 보지 못하셨다\"고 하였다. 왕동정은 그와 말을 섞지 않고 곧장 앞으로 나아가 매우 애통하게 곡하였으며, 상주의 손을 잡지 않고 물러났다.", ["죽음", "절교", "우정"]], ["傷逝", 16, "王子猷、子敬俱病篤，而子敬先亡。子猷問左右：「何以都不聞消息？此已喪矣！」語時了不悲。便索輿來奔喪，都不哭。子敬素好琴，便徑入坐靈牀上，取子敬琴彈，弦既不調，擲地云：「子敬！子敬！人琴俱亡。」因慟絕良久，月餘亦卒。", "왕자유(王子猷, 왕휘지)와 자경(子敬, 왕헌지)이 모두 병이 위독하였는데 자경이 먼저 죽었다. 자유가 좌우에게 묻기를 \"어찌하여 도무지 소식이 들리지 않는가? 이는 이미 죽은 것이다!\"라고 하는데, 말할 때 조금도 슬퍼하지 않았다. 이내 수레를 가져오라 하여 상가로 달려갔으나 전혀 곡하지 않았다. 자경은 평소 거문고를 좋아했으므로 곧장 들어가 영상(靈牀) 위에 앉아 자경의 거문고를 가져다 탔다. 줄이 고르지 않자 땅에 던지며 말하기를 \"자경아! 자경아! 사람도 거문고도 다 떠났구나\"라고 하였다. 이에 통곡하다가 한참을 까무러쳤고, 달포 뒤에 그 역시 죽었다.", ["죽음", "음악", "우정"]], ["傷逝", 17, "孝武山陵夕，王孝伯入臨，告其諸弟曰：「雖榱桷惟新，便自有黍離之哀！」", "효무제(孝武帝)의 능을 조성하던 저녁에 왕효백(王孝伯, 왕공王恭)이 들어가 곡하고는 여러 아우들에게 일러 말하기를 \"비록 서까래는 새로 갈렸으나 곧 절로 「서리(黍離)」의 슬픔이 있구나!\"라고 하였다.", ["죽음", "권력"]], ["傷逝", 18, "羊孚年三十一卒，桓玄與羊欣書曰：「賢從情所信寄，暴疾而殞，祝予之歎，如何可言！」", "양부(羊孚)가 서른한 살에 죽자 환현(桓玄)이 양흔(羊欣)에게 편지를 보내 말하기를 \"어진 종형은 정으로 믿고 의지하던 바였는데 급작스러운 병으로 죽었으니, '나를 저주하는구나' 하는 탄식을 어찌 말로 할 수 있겠는가!\"라고 하였다.", ["죽음", "우정"]], ["傷逝", 19, "桓玄當篡位，語卞鞠云：「昔羊子道恆禁吾此意。今腹心喪羊孚，爪牙失索元，而怱怱作此詆突，詎允天心？」", "환현(桓玄)이 제위를 찬탈하려 할 때 변국(卞鞠)에게 일러 말하기를 \"옛날 양자도(羊子道)는 늘 나의 이 뜻을 막았다. 이제 심복으로는 양부(羊孚)를 잃고 손발로는 색원(索元)을 잃었으니, 이렇게 황급히 무모한 일을 벌인들 어찌 하늘의 뜻에 맞겠는가?\"라고 하였다.", ["권력", "죽음", "술수"]], ["棲逸", 1, "阮步兵嘯，聞數百步。蘇門山中，忽有真人，樵伐者咸共傳說。阮籍往觀，見其人擁厀巖側。籍登嶺就之，箕踞相對。籍商略終古，上陳黃、農玄寂之道，下考三代盛德之美，以問之，仡然不應。復敘有為之教，棲神導氣之術以觀之，彼猶如前，凝矚不轉。籍因對之長嘯。良久，乃笑曰：「可更作。」籍復嘯。意盡，退，還半嶺許，聞上然有聲，如數部鼓吹，林谷傳響。顧看，迺向人嘯也。", "완보병(阮步兵, 완적阮籍)의 휘파람은 수백 보 밖에서도 들렸다. 소문산(蘇門山) 가운데 홀연히 진인(眞人)이 있다고 나무꾼들이 모두 함께 전하여 말하였다. 완적이 가서 보니 그 사람이 바위 곁에서 무릎을 안고 앉아 있었다. 완적이 고개에 올라 그에게 다가가 다리를 뻗고 마주 앉았다. 완적이 태곳적 일을 헤아려, 위로는 황제(黃帝)와 신농(神農)의 그윽하고 고요한 도를 펴고 아래로는 삼대(三代)의 성덕(盛德)의 아름다움을 살펴 그에게 물었으나, 의연히 응답하지 않았다. 다시 유위(有爲)의 가르침과 정신을 깃들이고 기운을 이끄는 술법을 펴서 그의 기색을 살폈으나, 그는 여전히 앞서와 같아 응시한 채 눈동자를 돌리지 않았다. 완적이 이에 그를 마주하여 길게 휘파람을 불었다. 한참 만에 그가 웃으며 말하기를 \"다시 해 보라\"고 하였다. 완적이 다시 휘파람을 불었다. 흥이 다하여 물러나, 고개 중턱쯤에 이르렀을 때 위에서 무슨 소리가 울리는데, 마치 여러 부대의 고취(鼓吹)와도 같아 숲과 골짜기에 메아리가 퍼졌다. 돌아보니 곧 아까 그 사람의 휘파람이었다.", ["음악", "은둔", "청담"]], ["棲逸", 2, "嵇康遊於汲郡山中，遇道士孫登，遂與之遊。康臨去，登曰：「君才則高矣，保身之道不足。」", "혜강(嵇康)이 급군(汲郡)의 산속에서 노닐다가 도사 손등(孫登)을 만나 마침내 그와 어울려 노닐었다. 혜강이 떠나려 할 때 손등이 말하기를 \"그대의 재주는 높으나 몸을 보전하는 도가 부족하다\"고 하였다.", ["은둔", "예언", "비평"]], ["棲逸", 3, "山公將去選曹，欲舉嵇康；康與書告絕。", "산공(山公, 산도)이 선조(選曹)를 떠나려 할 때 혜강(嵇康)을 천거하고자 하였다. 혜강은 그에게 절교의 편지를 보냈다.", ["절교", "은둔", "거절"]], ["棲逸", 4, "李廞是茂曾第五子，清貞有遠操，而少羸病，不肯婚宦。居在臨海，住兄侍中墓下。既有高名，王丞相欲招禮之，故辟為府掾。廞得牋命，笑曰：「茂弘乃復以一爵假人！」", "이흠(李廞)은 무증(茂曾)의 다섯째 아들로, 맑고 곧으며 원대한 지조가 있었으나 어려서부터 몸이 약하고 병이 있어 혼인하거나 벼슬하려 하지 않았다. 임해(臨海)에 살면서 형인 시중(侍中)의 무덤 아래 머물렀다. 이미 높은 명성이 있었으므로 왕승상(王丞相, 왕도)이 그를 불러 예우하고자 부의 연(掾)으로 불러들였다. 이흠이 임명 문서를 받고 웃으며 말하기를 \"무홍(茂弘, 왕도)이 또한 벼슬 하나로 사람을 빌리려 하는구나!\"라고 하였다.", ["은둔", "거절", "병과늙음"]], ["棲逸", 5, "何驃騎弟以高情避世，而驃騎勸之令仕。答曰：「予第五之名，何必減驃騎？」", "하표기(何驃騎)의 아우가 높은 뜻으로 세상을 피하니, 표기가 그에게 벼슬하기를 권하였다. 그가 답하기를 \"제 다섯째라는 이름이 어찌 반드시 표기보다 못하겠습니까?\"라고 하였다.", ["은둔", "거절", "기지"]], ["棲逸", 6, "阮光祿在東山，蕭然無事，常內足於懷。有人以問王右軍，右軍曰：「此君近不驚寵辱，雖古之沈冥，何以過此？」", "완광록(阮光祿)이 동산(東山)에 있으면서 쓸쓸히 일이 없었으나 늘 마음속으로 스스로 만족하였다. 어떤 사람이 이를 왕우군(王右軍, 왕희지)에게 물으니, 우군이 말하기를 \"이 사람은 가까이로는 영예와 치욕에 놀라지 않으니, 비록 옛날의 침잠한 은자라 한들 어찌 이보다 낫겠는가?\"라고 하였다.", ["은둔", "청빈", "비평"]], ["棲逸", 7, "孔車騎少有嘉遁意，年四十餘，始應安東命。未仕宦時，常獨寢，歌吹自箴誨，自稱孔郎，遊散名山。百姓謂有道術，為生立廟。今猶有孔郎廟。", "공거기(孔車騎)는 젊어서부터 아름다운 은둔의 뜻이 있었는데, 마흔이 넘어서야 비로소 안동(安東)의 부름에 응하였다. 벼슬하기 전에는 늘 홀로 자며 노래하고 휘파람 불어 스스로를 경계하고 가르쳤으며, 스스로 공랑(孔郎)이라 일컫고 이름난 산들을 노닐며 다녔다. 백성들은 그가 도술이 있다 여겨 살아 있는 그를 위해 사당을 세웠다. 지금도 공랑묘(孔郎廟)가 남아 있다.", ["은둔", "풍류"]], ["棲逸", 8, "南陽劉驎之，高率善史傳，隱於陽岐。于時符堅臨江，荊州刺史桓沖將盡訏謨之益，徵為長史，遣人船往迎，贈貺甚厚。驎之聞命，便升舟，悉不受所餉，緣道以乞窮乏，比至上明亦盡。一見沖，因陳無用，翛然而退。居陽岐積年，衣食有無常與村人共。值己匱乏，村人亦如之。甚厚，為鄉閭所安。", "남양(南陽)의 유린지(劉驎之)는 고상하고 솔직하며 사서와 전기에 밝았는데 양기(陽岐)에 은거하였다. 그때 부견(符堅)이 장강에 임박해 있어, 형주자사(荊州刺史) 환충(桓沖)이 큰 계책의 도움을 다하고자 그를 장사(長史)로 불러 사람과 배를 보내 맞이하게 하고 선물을 매우 후하게 주었다. 유린지는 명을 듣자 곧 배에 올랐으나 보내온 선물은 모두 받지 않고 길을 따라가며 궁핍한 이들에게 나누어 주어, 상명(上明)에 이르렀을 때는 다 떨어졌다. 환충을 한 번 보고는 자신은 쓸모없다고 아뢰고 유유히 물러났다. 양기에 여러 해 살면서 입을 것과 먹을 것의 있고 없음을 늘 마을 사람들과 함께 나누었고, 자기가 궁핍할 때면 마을 사람들도 그와 같이 하였다. 매우 후덕하여 마을 사람들이 그를 편안히 여겼다.", ["은둔", "베풂", "거절"]], ["棲逸", 9, "南陽翟道淵與汝南周子南少相友，共隱于尋陽。庾太尉說周以當世之務，周遂仕，翟秉志彌固。其後周詣翟，翟不與語。", "남양(南陽)의 적도연(翟道淵)과 여남(汝南)의 주자남(周子南)은 어려서부터 서로 벗하여 함께 심양(尋陽)에 은거하였다. 유태위(庾太尉, 유량)가 주자남에게 당세의 일을 권하니 주자남이 마침내 벼슬에 나아갔고, 적도연은 뜻을 지킴이 더욱 굳었다. 그 뒤 주자남이 적도연을 찾아갔으나 적도연은 그와 말을 섞지 않았다.", ["은둔", "절교", "우정"]], ["棲逸", 10, "孟萬年及弟少孤，居武昌陽新縣。萬年遊宦，有盛名當世，少孤未嘗出，京邑人士思欲見之，乃遣信報少孤，云「兄病篤」。狼狽至都。時賢見之者，莫不嗟重，因相謂曰：「少孤如此，萬年可死。」", "맹만년(孟萬年)과 아우 소고(少孤)는 무창(武昌) 양신현(陽新縣)에 살았다. 맹만년은 벼슬길을 돌며 당세에 큰 명성이 있었으나, 소고는 일찍이 세상에 나온 적이 없었다. 경읍(京邑)의 인사들이 그를 보고 싶어 하여 이에 소고에게 기별을 보내 \"형이 병이 위독하다\"고 알렸다. 소고가 황급히 도성에 이르렀다. 그때 어진 이들 가운데 그를 본 자들이 탄복하고 중히 여기지 않는 이가 없어, 이에 서로 일러 말하기를 \"소고가 이러하니 만년은 죽어도 좋겠다\"고 하였다.", ["은둔", "비평", "술수"]], ["棲逸", 11, "康僧淵在豫章，去郭數十里，立精舍。旁連嶺，帶長川，芳林列於軒庭，清流激於堂宇。乃閒居研講，希心理味，庾公諸人多往看之。觀其運用吐納，風流轉佳。加已處之怡然，亦有以自得，聲名乃興。後不堪，遂出。", "강승연(康僧淵)이 예장(豫章)에 있을 때 성곽에서 수십 리 떨어진 곳에 정사(精舍)를 세웠다. 곁으로는 산봉우리가 이어지고 긴 냇물이 둘러 있으며, 향기로운 숲이 처마와 뜰에 늘어서고 맑은 물이 당우(堂宇)에 부딪쳐 흘렀다. 이에 한가로이 머물며 강론을 닦고 이치의 맛(理味)에 마음을 두니, 유공(庾公, 유량)을 비롯한 여러 사람이 자주 그를 보러 갔다. 그가 학문을 펼치고 토론하는 것을 보니 풍류가 점점 아름다워졌다. 게다가 그 자리에 처함이 태연하여 또한 스스로 터득한 바가 있으니, 명성이 이에 일어났다. 뒤에 견디지 못하여 마침내 그곳을 떠났다.", ["은둔", "청담", "자연과산수"]], ["棲逸", 12, "戴安道既厲操東山，而其兄欲建式遏之功。\n謝太傅曰：「卿兄弟志業，何其太殊？」戴曰：「下官『不堪其憂』，家弟『不改其樂』。」", "대안도(戴安道, 대규)는 이미 동산(東山)에서 지조를 닦고 있었으나 그 형은 적을 막아 지키는 공을 세우고자 하였다. 사태부(謝太傅, 사안)가 말하기를 \"그대 형제의 뜻과 사업이 어찌 그리 크게 다른가?\"라고 하였다. 대안도가 답하기를 \"하관(下官)은 '그 근심을 견디지 못하고', 제 아우는 '그 즐거움을 바꾸지 않습니다'\"라고 하였다.", ["은둔", "학문", "비평"]], ["棲逸", 13, "許玄度隱在永興南幽穴中，每致四方諸侯之遺。或謂許曰：「嘗聞箕山人，似不爾耳！」許曰：「筐篚苞苴，故當輕於天下之寶耳！」", "허현도(許玄度, 허순)가 영흥(永興) 남쪽의 그윽한 동굴에 은거하면서 늘 사방 제후들의 선물을 받았다. 어떤 이가 허순에게 말하기를 \"일찍이 들으니 기산(箕山)의 은자는 이렇지 않았다고 합니다\"라고 하였다. 허순이 말하기를 \"광주리에 담은 선물이야 본디 천하의 보배보다는 가벼운 것이지요!\"라고 하였다.", ["은둔", "기지", "거절"]], ["棲逸", 14, "范宣未嘗入公門。韓康伯與同載，遂誘俱入郡。范便於車後趨下。", "범선(范宣)은 일찍이 관청 문에 들어간 적이 없었다. 한강백(韓康伯)이 그와 함께 수레를 타고 마침내 그를 꾀어 함께 군(郡)으로 들어가려 하였다. 범선은 곧 수레 뒤로 종종걸음으로 내려가 버렸다.", ["은둔", "거절"]], ["棲逸", 15, "郗超每聞欲高尚隱退者，輒為辦百萬資，并為造立居宇。在剡為戴公起宅，甚精整。戴始往舊居，與所親書曰：「近至剡，如官舍。」郗為傅約亦辦百萬資，傅隱事差互，故不果遺。", "치초(郗超)는 고상하게 은퇴하려는 자가 있다는 말을 들을 때마다 번번이 백만의 자금을 마련해 주고 아울러 거처할 집까지 지어 주었다. 섬(剡)에서 대공(戴公, 대규)을 위해 집을 지어 주었는데 매우 정교하고 단정하였다. 대공이 처음 옛 거처에 갔다가 친한 이에게 편지를 보내 말하기를 \"요사이 섬에 이르니 관사(官舍)와도 같구나\"라고 하였다. 치초가 부약(傅約)을 위해서도 백만의 자금을 마련했으나, 부약의 은거 일이 어긋났으므로 결국 보내지 못하였다.", ["베풂", "은둔"]], ["棲逸", 16, "許掾好遊山水，而體便登陟。時人云：「許非徒有勝情，實有濟勝之具。」", "허연(許掾, 허순)은 산수에서 노니는 것을 좋아하였고 몸이 산을 오르내리기에 알맞았다. 당시 사람들이 말하기를 \"허순은 그저 빼어난 정취만 있는 것이 아니라 실로 명승을 누빌 만한 몸까지 갖추었다\"고 하였다.", ["자연과산수", "풍류", "비평"]], ["棲逸", 17, "郗尚書與謝居士善。常稱：「謝慶緒識見雖不絕人，可以累心處都盡。」", "치상서(郗尚書)는 사거사(謝居士)와 사이가 좋았다. 늘 칭찬하기를 \"사경서(謝慶緒)는 식견이 비록 남보다 뛰어나지는 않으나, 마음을 얽매는 것들은 다 끊어 버린 사람이다\"라고 하였다.", ["은둔", "비평"]], ["賢媛", 1, "陳嬰者，東陽人。少脩德行，箸稱鄉黨。秦末大亂，東陽人欲奉嬰為主，母曰：「不可！自我為汝家婦，少見貧賤，一旦富貴，不祥！不如以兵屬人：事成，少受其利；不成，禍有所歸。」", "진영(陳嬰)은 동양(東陽) 사람이다. 젊어서 덕행을 닦아 향당에 이름이 드러났다. 진(秦)나라 말 큰 난리에 동양 사람들이 진영을 받들어 우두머리로 삼으려 하자, 어머니가 말하기를 \"안 된다! 내가 너희 집안의 며느리가 된 이래 줄곧 빈천하게 지냈는데, 하루아침에 부귀하게 되는 것은 상서롭지 못하다! 차라리 군사를 남에게 맡기는 것만 못하다. 일이 이루어지면 조금이나마 그 이익을 받을 것이고, 이루어지지 못해도 화가 돌아갈 데가 있을 것이다\"라고 하였다.", ["여인", "지혜", "겸손"]], ["賢媛", 2, "漢元帝宮人既多，乃令畫工圖之，欲有呼者，輒披圖召之。其中常者，皆行貨賂。王明君姿容甚麗，志不苟求，工遂毀為其狀。後匈奴來和，求美女於漢帝，帝以明君充行。既召見而惜之。但名字已去，不欲中改，於是遂行。", "한(漢)나라 원제(元帝)는 궁인이 워낙 많아 화공에게 그들을 그리게 하고, 부르고자 할 때면 그림을 펼쳐 불렀다. 그 가운데 평범한 자들은 모두 뇌물을 바쳤다. 왕명군(王明君)은 자태와 용모가 매우 아름다웠으나 구차하게 구하려 하지 않으니, 화공이 마침내 그 모습을 추하게 그렸다. 뒤에 흉노가 화친을 청하며 한나라 황제에게 미녀를 구하자, 황제가 명군을 보내기로 하였다. 불러 보고서야 아까워하였으나, 이미 이름이 정해진 뒤라 도중에 바꾸고 싶지 않아 마침내 보냈다.", ["여인", "술수", "용모"]], ["賢媛", 3, "漢成帝幸趙飛燕，飛燕讒班婕妤祝詛，於是考問。辭曰：「妾聞死生有命，富貴在天。脩善尚不蒙福，為邪欲以何望？若鬼神有知，不受邪佞之訴；若其無知，訴之何益？故不為也。」", "한(漢)나라 성제(成帝)가 조비연(趙飛燕)을 총애하였는데, 조비연이 반첩여(班婕妤)가 저주를 하였다고 참소하여 이에 신문하게 되었다. 반첩여가 진술하기를 \"제가 듣건대 죽고 사는 것은 명(命)에 달려 있고 부귀는 하늘에 달려 있다 하였습니다. 선을 닦아도 오히려 복을 받지 못하거늘, 사악한 짓을 하여 무엇을 바라겠습니까? 만약 귀신이 안다면 사악하고 아첨하는 호소를 받아들이지 않을 것이요, 만약 알지 못한다면 호소한들 무슨 이로움이 있겠습니까? 그러므로 하지 않았습니다\"라고 하였다.", ["여인", "질투", "지혜"]], ["賢媛", 4, "魏武帝崩，文帝悉取武帝宮人自侍。及帝病困，卞后出看疾。太后入戶，見直侍並是昔日所愛幸者。太后問：「何時來邪？」云：「正伏魄時過。」因不復前而歎曰：「狗鼠不食汝餘，死故應爾！」至山陵，亦竟不臨。", "위무제(魏武帝)가 죽자 문제(文帝)가 무제의 궁인을 모두 데려다 자기 시중을 들게 하였다. 문제가 병이 위독해지자 변후(卞后)가 나와 병을 살폈다. 태후가 방문에 들어서니 곁에서 시중드는 자들이 모두 옛날 무제가 아끼고 총애하던 자들이었다. 태후가 묻기를 \"언제 왔느냐?\"고 하니, \"막 혼백을 부르실 무렵에 왔습니다\"라고 하였다. 이에 태후는 더 나아가지 않고 탄식하며 말하기를 \"개나 쥐도 네가 남긴 것은 먹지 않을 것이니, 죽어 마땅하다!\"라고 하였다. 능에 모실 때에도 끝내 곡하러 가지 않았다.", ["여인", "분노", "죽음"]], ["賢媛", 5, "趙母嫁女，女臨去，敕之曰：「慎勿為好！」女曰：「不為好，可為惡邪？」母曰：「好尚不可為，其況惡乎？」", "조씨 어머니(趙母)가 딸을 시집보내며, 딸이 떠나려 할 때 경계하여 말하기를 \"부디 좋은 일을 하지 말라!\"고 하였다. 딸이 말하기를 \"좋은 일을 하지 말라 하시면 나쁜 일을 하라는 것입니까?\"라고 하니, 어머니가 말하기를 \"좋은 일도 해서는 안 되거늘 하물며 나쁜 일이겠느냐?\"라고 하였다.", ["여인", "지혜", "간언"]], ["賢媛", 6, "許允婦是阮衛尉女，德如妹，奇醜。交禮竟，允無復入理，家人深以為憂。會允有客至，婦令婢視之，還答曰：「是桓郎。」桓郎者，桓範也。婦云：「無憂，桓必勸入。」桓果語許云：「阮家既嫁醜女與卿，故當有意，卿宜察之。」許便回入內。既見婦，即欲出。婦料其此出，無復入理，便捉裾停之。」許因謂曰：「婦有四德，卿有其幾？」婦曰：「新婦所乏唯容爾。然士有百行，君有幾？」許云：「皆備。」婦曰：「夫百行以德為首，君好色不好德，何謂皆備？」允有慚色，遂相敬重。", "허윤(許允)의 아내는 완위위(阮衛尉)의 딸이요 덕여(德如)의 누이로, 몹시 못생겼다. 혼례를 마치고 나서 허윤은 다시 들어갈 마음이 없으니 집안사람들이 깊이 근심하였다. 마침 허윤에게 손님이 오자 아내가 시비에게 살펴보게 하니, 돌아와 답하기를 \"환랑(桓郎)입니다\"라고 하였다. 환랑이란 환범(桓範)이다. 아내가 말하기를 \"근심할 것 없다. 환범이 반드시 들어가라 권할 것이다\"라고 하였다. 환범이 과연 허윤에게 말하기를 \"완씨 집안이 못생긴 딸을 그대에게 시집보낸 데는 까닭이 있을 것이니, 그대는 마땅히 잘 살펴보라\"고 하였다. 허윤이 곧 돌아 안으로 들어갔다. 아내를 보고는 이내 나가려 하니, 아내는 그가 이번에 나가면 다시는 들어올 리 없음을 헤아려 곧 옷자락을 붙잡아 멈추게 하였다. 허윤이 이에 말하기를 \"부인에게는 네 가지 덕이 있다는데, 그대는 그 가운데 몇 가지를 갖추었소?\"라고 하였다. 아내가 말하기를 \"제게 부족한 것은 오직 용모뿐입니다. 그러나 선비에게는 백 가지 행실이 있다는데, 당신은 몇 가지나 갖추셨습니까?\"라고 하였다. 허윤이 \"다 갖추었소\"라고 하자, 아내가 말하기를 \"무릇 백 가지 행실은 덕을 으뜸으로 삼는데, 당신은 색을 좋아하고 덕을 좋아하지 않으니 어찌 다 갖추었다 하겠습니까?\"라고 하였다. 허윤이 부끄러운 기색을 보이고는 마침내 서로 공경하고 중히 여기게 되었다.", ["부부", "용모", "지혜", "여인"]], ["賢媛", 7, "許允為吏部郎，多用其鄉里，魏明帝遣虎賁收之。其婦出誡允曰：「明主可以理奪，難以情求。」既至，帝覈問之。允對曰：「『舉爾所知。』臣之鄉人，臣所知也。陛下檢校為稱職與不？若不稱職，臣受其罪。」既檢校，皆官得其人，於是乃釋。允衣服敗壞，詔賜新衣。初，允被收，舉家號哭。阮新婦自若云：「勿憂，尋還。」作粟粥待，頃之允至。", "허윤(許允)이 이부랑(吏部郎)이 되어 자기 고향 사람을 많이 등용하니, 위명제(魏明帝)가 호분(虎賁)을 보내 그를 잡아오게 하였다. 그 아내가 나와 허윤을 경계하여 말하기를 \"밝은 임금은 이치로 설득할 수는 있어도 정으로 구하기는 어렵습니다\"라고 하였다. 허윤이 이르자 황제가 캐물었다. 허윤이 대답하기를 \"'네가 아는 사람을 천거하라' 하였습니다. 신의 고향 사람은 신이 아는 자들입니다. 폐하께서 직책에 걸맞은지 아닌지를 살펴 주십시오. 만약 직책에 걸맞지 않다면 신이 그 죄를 받겠습니다\"라고 하였다. 살펴보니 모두 관직에 마땅한 사람을 얻었으므로 이에 풀어 주었다. 허윤의 옷이 해어졌으므로 조서를 내려 새 옷을 하사하였다. 처음에 허윤이 잡혀갈 때 온 집안이 울부짖었으나, 완씨 며느리는 태연히 말하기를 \"근심하지 마십시오. 곧 돌아올 것입니다\"라고 하였다. 좁쌀죽을 쑤어 기다리니 얼마 안 되어 허윤이 돌아왔다.", ["여인", "지혜", "기지"]], ["賢媛", 8, "許允為晉景王所誅，門生走入告其婦。婦正在機中，神色不變，曰：「蚤知爾耳！」門人欲藏其兒，婦曰：「無豫諸兒事。」後徙居墓所，景王遣鍾會看之，若才流及父，當收。兒以咨母。母曰：「汝等雖佳，才具不多，率胸懷與語，便無所憂。不須極哀，會止便止。又可少問朝事。」兒從之。會反以狀對，卒免。", "허윤(許允)이 진(晉) 경왕(景王)에게 죽임을 당하자, 문하생이 달려 들어가 그 아내에게 알렸다. 아내는 마침 베틀에 앉아 있었는데, 안색을 바꾸지 않고 말하였다. \"진작에 이리 될 줄 알았소.\" 문인들이 그 아이들을 숨기려 하자 아내가 말하였다. \"아이들과는 상관없는 일이오.\" 뒤에 묘소가 있는 곳으로 옮겨 살게 되었는데, 경왕이 종회(鍾會)를 보내 살펴보게 하면서, 만약 재능이 아비에 미치면 잡아들이라 하였다. 아이들이 어머니에게 여쭈니 어머니가 말하였다. \"너희가 비록 뛰어나기는 하나 재능이 많지 않으니, 마음속에 있는 대로 솔직히 말하면 걱정할 것이 없다. 지나치게 슬퍼할 것 없이 종회가 그치면 너희도 그쳐라. 또 조정 일을 조금 물어도 좋다.\" 아이들이 그대로 따랐다. 종회가 돌아가 그 상황을 보고하니, 끝내 화를 면하였다.", ["여인", "죽음", "지혜", "담대한죽음"]], ["賢媛", 9, "王公淵娶諸葛誕女。入室，言語始交，王謂婦曰：「新婦神色卑下，殊不似公休！」婦曰：「大丈夫不能仿佛彥雲，而令婦人比蹤英傑！」", "왕공연(王公淵)이 제갈탄(諸葛誕)의 딸을 아내로 맞았다. 신방에 들어 비로소 말을 나누는데, 왕(王)이 아내에게 말하였다. \"신부의 신색(神色)이 비루하니, 도무지 공휴(公休)를 닮지 않았구려.\" 아내가 말하였다. \"대장부가 언운(彥雲)을 비슷이라도 따르지 못하면서, 부인더러 영걸의 발자취를 따르라 하시는군요.\"", ["부부", "기지", "용모", "제갈씨"]], ["賢媛", 10, "王經少貧苦，仕至二千石，母語之曰：「汝本寒家子，仕至二千石，此可以止乎！」經不能用。為尚書，助魏，不忠於晉，被收。涕泣辭母曰：「不從母敕，以至今日！」母都無慽容，語之曰：「為子則孝，為臣則忠。有孝有忠，何負吾邪？」", "왕경(王經)은 젊어서 가난하게 고생하다가, 벼슬이 이천석(二千石)에 이르렀다. 어머니가 그에게 말하였다. \"너는 본래 한미한 집안의 자식인데 벼슬이 이천석에 이르렀으니, 이쯤에서 그만두어도 좋겠다.\" 그러나 왕경은 따르지 못하였다. 상서(尙書)가 되어 위(魏)를 돕고 진(晉)에 충성하지 않다가 잡혀갔다. 눈물을 흘리며 어머니께 작별하면서 말하였다. \"어머니의 말씀을 따르지 않아 오늘에 이르렀습니다.\" 어머니는 조금도 슬픈 기색이 없이 그에게 말하였다. \"자식이 되어서는 효도하고, 신하가 되어서는 충성하는 법이다. 효도도 있고 충성도 있으니, 무엇이 나를 저버린 것이겠느냐?\"", ["충직", "효", "간언"]], ["賢媛", 11, "山公與嵇、阮一面，契若金蘭。山妻韓氏，覺公與二人異於常交，問公。公曰：「我當年可以為友者，唯此二生耳！」妻曰：「負羈之妻亦親觀狐、趙，意欲窺之，可乎？」他日，二人來，妻勸公止之宿，具酒肉。夜穿墉以視之，達旦忘反。公入曰：「二人何如？」妻曰：「君才致殊不如，正當以識度相友耳。」公曰：「伊輩亦常以我度為勝。」", "산공(山公, 산도)이 혜강(嵇康)·완적(阮籍)과 한 번 만나고는 사귐이 금란(金蘭)처럼 두터웠다. 산공의 아내 한씨(韓氏)는 산공이 두 사람과 사귀는 것이 보통의 사귐과 다름을 알아채고 산공에게 물었다. 산공이 말하였다. \"내 평생에 벗으로 삼을 만한 사람은 오직 이 두 사람뿐이오.\" 아내가 말하였다. \"부기(負羈)의 아내도 호언(狐偃)과 조최(趙衰)를 친히 살펴보았다 하니, 저도 그들을 엿보고 싶은데 되겠습니까?\" 다른 날 두 사람이 오자, 아내는 산공에게 권하여 그들을 묵어가게 하고 술과 고기를 갖추었다. 밤에 담장을 뚫어 그들을 엿보다가 날이 새도록 돌아갈 줄 몰랐다. 산공이 들어와 말하였다. \"두 사람이 어떻소?\" 아내가 말하였다. \"당신의 재주와 운치는 도무지 그들만 못하니, 다만 식견과 도량으로 벗을 삼아야 할 것입니다.\" 산공이 말하였다. \"저들도 늘 내 도량이 낫다고 여긴다오.\"", ["우정", "여인", "비평"]], ["賢媛", 12, "王渾妻鍾氏生女令淑，武子為妹求簡美對而未得。有兵家子，有儁才，欲以妹妻之，乃白母曰：「誠是才者，其地可遺，然要令我見。」武子乃令兵兒與羣小雜處，使母帷中察之。既而，母謂武子曰：「如此衣形者，是汝所擬者，非邪？」武子曰：「是也。」母曰：「此才足以拔萃，然地寒，不有長年，不得申其才用。觀其形骨，必不壽，不可與婚。」武子從之。兵兒數年果亡。", "왕혼(王渾)의 아내 종씨(鍾氏)가 아름답고 정숙한 딸을 낳았는데, 무자(武子, 왕제)가 누이를 위해 어질고 잘난 배필을 구하였으나 얻지 못하였다. 어떤 병가(兵家)의 아들이 빼어난 재주가 있어, 누이를 그에게 시집보내고자 어머니께 아뢰었다. \"참으로 재주 있는 자라면 그 출신은 괜찮습니다만, 다만 제가 그를 보아야겠습니다.\" 무자가 그 병가의 아들을 여러 천한 무리들과 뒤섞여 있게 하고, 어머니로 하여금 휘장 안에서 살펴보게 하였다. 이윽고 어머니가 무자에게 말하였다. \"이러이러한 옷차림과 모습을 한 자가 네가 점찍은 사람이 아니냐?\" 무자가 말하였다. \"그렇습니다.\" 어머니가 말하였다. \"그 재주는 무리에서 뛰어날 만하나 출신이 한미하고, 또 오래 살 사람이 아니니 그 재능을 펼치지 못할 것이다. 그 형체와 골상을 보니 반드시 장수하지 못할 것이라 혼인시킬 수 없다.\" 무자가 그 말을 따랐다. 병가의 아들은 몇 년 뒤 과연 죽었다.", ["여인", "예언", "비평"]], ["賢媛", 13, "賈充前婦，是李豐女。豐被誅，離婚徙邊。後遇赦得還，充先已取郭配女。武帝特聽置左右夫人。李氏別住外，不肯還充舍。郭氏語充：「欲就省李。」充曰：「彼剛介有才氣，卿往不如不去。」郭氏於是盛威儀，多將侍婢。既至，入戶，李氏起迎，郭不覺腳自屈，因跪再拜。既反，語充，充曰：「語卿道何物？」", "가충(賈充)의 전처는 이풍(李豐)의 딸이다. 이풍이 주살되자 이혼하고 변방으로 유배되었다. 뒤에 사면을 만나 돌아올 수 있게 되었는데, 가충은 이미 곽배(郭配)의 딸을 아내로 맞은 뒤였다. 무제(武帝)가 특별히 좌·우 두 부인을 두는 것을 허락하였다. 이씨는 따로 바깥에 거처하며 가충의 집으로 돌아오려 하지 않았다. 곽씨가 가충에게 말하였다. \"이씨에게 가서 문안하고자 합니다.\" 가충이 말하였다. \"그녀는 강직하고 재기(才氣)가 있으니, 당신이 가는 것이 가지 않느니만 못하오.\" 곽씨가 이에 위의(威儀)를 성대히 갖추고 시비들을 많이 거느리고 갔다. 이르러 문에 들어서니 이씨가 일어나 맞이하는데, 곽씨는 자기도 모르게 다리가 절로 굽혀져 무릎을 꿇고 두 번 절하였다. 돌아와 가충에게 말하니, 가충이 말하였다. \"당신에게 무어라 말하더이까?\"", ["여인", "부부", "도량"]], ["賢媛", 14, "賈充妻李氏作女訓，行於世。李氏女，齊獻王妃，郭氏女，惠帝后。充卒，李、郭女各欲令其母合葬，經年不決。賈后廢，李氏乃祔，葬遂定。", "가충(賈充)의 아내 이씨(李氏)가 『여훈(女訓)』을 지었는데 세상에 널리 퍼졌다. 이씨의 딸은 제헌왕(齊獻王)의 비(妃)요, 곽씨의 딸은 혜제(惠帝)의 황후이다. 가충이 죽자 이씨와 곽씨의 딸이 각기 자기 어머니를 합장하고자 하여 여러 해가 지나도록 결말이 나지 않았다. 뒤에 가후(賈后)가 폐위되자 이씨를 합장하니 장례가 마침내 정해졌다.", ["여인", "죽음", "학문"]], ["賢媛", 15, "王汝南少無婚，自求郝普女。司空以其癡，會無婚處，任其意，便許之。既婚，果有令姿淑德。生東海，遂為王氏母儀。或問汝南何以知之？曰：「嘗見井上取水，舉動容止不失常，未嘗忤觀。以此知之。」", "왕여남(王汝南)은 젊어서 혼처가 없어 스스로 학보(郝普)의 딸에게 구혼하였다. 사공(司空)은 그가 어리석은 데다 마침 혼처도 없던 터라 그 뜻대로 하게 두어 곧 허락하였다. 혼인하고 보니 과연 아름다운 자태와 정숙한 덕을 갖추었다. 동해(東海, 왕승)를 낳아 마침내 왕씨 집안의 모범이 되었다. 누군가 왕여남에게 어떻게 그것을 알았느냐 물으니, 그가 말하였다. \"일찍이 우물가에서 물을 긷는 것을 보았는데, 거동과 몸가짐이 평상시 모습을 잃지 않았고 한 번도 거슬리게 보이지 않았소. 이로써 알았소.\"", ["부부", "여인", "지혜"]], ["賢媛", 16, "王司徒婦，鍾氏女，太傅曾孫，亦有俊才女德。鍾、郝為娣姒，雅相親重。鍾不以貴陵郝，郝亦不以賤下鍾。東海家內，則郝夫人之法。京陵家內，範鍾夫人之禮。", "왕사도(王司徒)의 아내는 종씨(鍾氏)의 딸로, 태부(太傅)의 증손녀이며 또한 빼어난 재주와 여자의 덕을 갖추었다. 종씨와 학씨(郝氏)는 동서 사이였는데, 서로 매우 친애하고 존중하였다. 종씨는 귀하다 하여 학씨를 업신여기지 않았고, 학씨도 천하다 하여 종씨에게 자신을 낮추지 않았다. 동해(東海)의 집안에서는 학부인의 법도를 본받았고, 경릉(京陵)의 집안에서는 종부인의 예법을 본받았다.", ["여인", "겸손", "도량"]], ["賢媛", 17, "李平陽，秦州子，中夏名士。于時以比王夷甫。孫秀初欲立威權，咸云：「樂令民望不可殺，減李重者又不足殺。」遂逼重自裁。初，重在家，有人走從門入，出髻中疏示重。重看之色動，入內示其女，女直叫「絕」。了其意，出則自裁。此女甚高明，重每咨焉。", "이평양(李平陽)은 진주(秦州)의 아들로 중원의 명사였다. 당시 사람들이 왕이보(王夷甫, 왕연)에 견주었다. 손수(孫秀)가 처음 권위를 세우고자 할 때, 모두가 말하였다. \"악령(樂令, 악광)은 백성의 신망이 있어 죽일 수 없고, 이중(李重)보다 못한 자는 또 죽일 만하지 못하다.\" 그리하여 이중을 핍박하여 자결하게 하였다. 처음 이중이 집에 있을 때, 어떤 사람이 문으로 달려 들어와 상투 속에서 글을 꺼내 이중에게 보였다. 이중이 그것을 보고 안색이 변하더니, 안으로 들어가 그 딸에게 보이니 딸이 곧장 \"끝났다\"고 외쳤다. 그 뜻을 알아채고는 나가서 자결하였다. 이 딸은 매우 고명하여 이중이 늘 그녀에게 의논하였다.", ["죽음", "여인", "지혜"]], ["賢媛", 18, "周浚作安東時，行獵，值暴雨，過汝南李氏。李氏富足，而男子不在。有女名絡秀，聞外有貴人，與一婢於內宰豬羊，作數十人飲食，事事精辦，不聞有人聲。密覘之，獨見一女子，狀貌非常，浚因求為妾。父兄不許。絡秀曰：「門戶殄瘁，何惜一女？若連姻貴族，將來或大益。」父兄從之。遂生伯仁兄弟。絡秀語伯仁等：「我所以屈節為汝家作妾，門戶計耳！汝若不與吾家作親親者，吾亦不惜餘年。」伯仁等悉從命。由此李氏在世，得方幅齒遇。", "주준(周浚)이 안동(安東)으로 있을 때, 사냥을 나갔다가 폭우를 만나 여남(汝南)의 이씨(李氏) 집에 들렀다. 이씨는 부유하였으나 남자가 집에 없었다. 낙수(絡秀)라는 딸이 있었는데, 바깥에 귀인이 왔다는 말을 듣고 한 여종과 함께 안에서 돼지와 양을 잡아 수십 명의 음식을 마련하니, 일마다 정교하게 갖추어졌으나 사람 소리는 들리지 않았다. 가만히 엿보니 한 여자만 보이는데 모습이 비범하였다. 주준이 이에 첩으로 삼기를 청하였다. 아버지와 오라비가 허락하지 않았다. 낙수가 말하였다. \"가문이 쇠퇴하였는데 어찌 딸 하나를 아끼겠습니까? 만약 귀족과 혼인을 맺으면 장래에 혹 큰 이익이 있을 것입니다.\" 아버지와 오라비가 그 말을 따랐다. 마침내 백인(伯仁, 주의) 형제를 낳았다. 낙수가 백인 등에게 말하였다. \"내가 절개를 굽혀 너희 집의 첩이 된 까닭은 가문을 위한 계책일 뿐이다. 너희가 만약 우리 집안을 친척으로 대우하지 않는다면, 나도 남은 목숨을 아끼지 않겠다.\" 백인 등이 모두 명을 따랐다. 이로 말미암아 이씨 집안은 세상에서 반듯한 대우를 받게 되었다.", ["여인", "지혜", "부부"]], ["賢媛", 19, "陶公少有大志，家酷貧，與母湛氏同居。同郡范逵素知名，舉孝廉，投侃宿。于時冰雪積日，侃室如懸磬，而逵馬僕甚多。侃母湛氏語侃曰：「汝但出外留客，吾自為計。」湛頭髮委地，下為二髲，賣得數斛米，斫諸屋柱，悉割半為薪，剉諸薦以為馬草。日夕，遂設精食，從者皆無所乏。逵既歎其才辯，又深愧其厚意。明旦去，侃追送不已，且百里許。逵曰：「路已遠，君宜還。」侃猶不返，逵曰：「卿可去矣！至洛陽，當相為美談。」侃迺返。逵及洛，遂稱之於羊晫、顧榮諸人，大獲美譽。", "도공(陶公, 도간)은 젊어서 큰 뜻을 품었으나 집안이 몹시 가난하여 어머니 담씨(湛氏)와 함께 살았다. 같은 고을의 범규(范逵)는 평소 이름이 알려진 이로, 효렴(孝廉)에 천거되어 도간의 집에 들러 묵었다. 그때는 눈과 얼음이 며칠째 쌓여 있었고, 도간의 집은 텅 비어 매단 경쇠처럼 가난한데 범규의 말과 종복은 매우 많았다. 도간의 어머니 담씨가 도간에게 말하였다. \"너는 그저 나가서 손님을 머무르게 하여라. 내가 알아서 마련하마.\" 담씨는 땅에 끌리는 머리채를 잘라 두 다래로 만들어 팔아 쌀 몇 섬을 얻고, 집의 기둥들을 깎아 모두 반씩 잘라 땔감으로 삼았으며, 깔개들을 썰어 말꼴로 삼았다. 날이 저물자 마침내 정갈한 음식을 차려 내니 따르는 자들도 모두 부족함이 없었다. 범규는 그 재주와 언변에 감탄하고, 또 그 두터운 마음에 깊이 감격하였다. 이튿날 아침 떠날 때 도간이 따라가 전송하기를 그치지 않아 거의 백 리쯤에 이르렀다. 범규가 말하였다. \"길이 이미 멀어졌으니 그대는 돌아가는 것이 좋겠소.\" 도간이 그래도 돌아가지 않으니, 범규가 말하였다. \"그대는 이제 돌아가도 좋소. 낙양(洛陽)에 이르면 그대를 위해 좋은 말을 해주겠소.\" 도간이 그제야 돌아갔다. 범규는 낙양에 이르러 마침내 양탁(羊晫)·고영(顧榮) 등 여러 사람에게 그를 칭찬하니, 도간이 크게 아름다운 명성을 얻었다.", ["효", "청빈", "베풂", "여인"]], ["賢媛", 20, "陶公少時，作魚梁吏，嘗以坩餉母。母封付使，反書責侃曰：「汝為吏，以官物見餉，非唯不益，乃增吾憂也。」", "도공(陶公, 도간)이 젊을 때 어량(魚梁)의 관리가 되어, 일찍이 절인 생선 한 단지를 어머니께 보냈다. 어머니는 그것을 봉하여 심부름꾼에게 돌려보내며, 편지로 도간을 꾸짖어 말하였다. \"네가 관리가 되어 관청의 물건을 내게 보내니, 이는 도움이 되지 않을 뿐 아니라 도리어 내 근심을 더할 뿐이다.\"", ["청빈", "효", "간언"]], ["賢媛", 21, "桓宣武平蜀，以李勢妹為妾，甚有寵，常著齋後。主始不知，既聞，與數十婢拔白刃襲之。正值李梳頭，髮委藉地，膚色玉曜，不為動容。徐曰：「國破家亡，無心至此。今日若能見殺，乃是本懷。」主慚而退。", "환선무(桓宣武, 환온)가 촉(蜀)을 평정하고 이세(李勢)의 누이를 첩으로 삼았는데, 매우 총애하여 늘 서재 뒤에 두었다. 부인(공주)이 처음에는 몰랐으나, 듣고 나서 수십 명의 여종과 함께 흰 칼날을 빼들고 그녀를 습격하였다. 마침 이씨가 머리를 빗고 있었는데, 머리채가 땅에 드리워지고 살결이 옥처럼 빛났으며, 조금도 안색을 바꾸지 않았다. 천천히 말하였다. \"나라가 망하고 집안이 무너져 마음에 없이 여기까지 이르렀습니다. 오늘 만약 죽임을 당할 수 있다면 그것이 곧 본래의 바람입니다.\" 부인은 부끄러워하며 물러갔다.", ["담대한죽음", "용기", "부부", "여인"]], ["賢媛", 22, "庾玉臺，希之弟也。希誅，將戮玉臺。玉臺子婦，宣武弟桓豁女也。\n徒跣求進，閽禁不內。女厲聲曰：「是何小人？我伯父門，不聽我前！」因突入，號泣請曰：「庾玉臺常因人腳短三寸，當復能作賊不？」宣武笑曰：「壻故自急。」遂原玉臺一門。", "유옥대(庾玉臺)는 유희(庾希)의 아우이다. 유희가 주살되자 유옥대도 죽이려 하였다. 유옥대의 며느리는 선무(宣武, 환온)의 아우 환활(桓豁)의 딸이었다. 맨발로 들어가 뵙기를 청하였으나 문지기가 막아 들이지 않았다. 며느리가 소리 높여 말하였다. \"이게 무슨 소인배냐? 내 백부의 문인데 나를 들이지 않다니!\" 그러고는 곧장 뛰어들어 통곡하며 청하였다. \"유옥대는 늘 남보다 다리가 세 치나 짧은데 다시 도적질을 할 수 있겠습니까?\" 선무가 웃으며 말하였다. \"사위가 본디 다급한 게로구나.\" 마침내 유옥대 한 집안을 용서하였다.", ["기지", "용기", "도량", "여인"]], ["賢媛", 23, "謝公夫人幃諸婢，使在前作伎，使太傅暫見，便下幃。太傅索更開，夫人云：「恐傷盛德。」", "사공(謝公, 사안)의 부인이 여종들에게 휘장을 치고 앞에서 기예를 펼치게 한 다음, 태부(太傅)로 하여금 잠깐 보게 하고는 곧 휘장을 내렸다. 태부가 다시 열기를 청하니, 부인이 말하였다. \"성덕(盛德)을 해칠까 두렵습니다.\"", ["여인", "질투", "부부"]], ["賢媛", 24, "桓車騎不好箸新衣。浴後，婦故送新衣與。車騎大怒，催使持去。婦更持還，傳語云：「衣不經新，何由而故？」桓公大笑，箸之。", "환거기(桓車騎, 환충)는 새 옷 입기를 좋아하지 않았다. 목욕한 뒤에 부인이 일부러 새 옷을 보내자, 거기가 크게 노하여 빨리 가져가라고 재촉하였다. 부인이 다시 그 옷을 가지고 돌아와 말을 전하였다. \"옷이 새것을 거치지 않으면 어찌 헌것이 되겠습니까?\" 환공이 크게 웃고는 그것을 입었다.", ["부부", "기지", "여인"]], ["賢媛", 25, "王右軍郗夫人謂二弟司空、中郎曰：「王家見二謝，傾筐倒庋；見汝輩來，平平爾。汝可無煩復往。」", "왕우군(王右軍, 왕희지)의 부인 치씨(郗氏)가 두 아우 사공(司空)과 중랑(中郎)에게 말하였다. \"왕씨 집안은 두 사씨(謝氏)를 보면 광주리를 기울이고 시렁을 다 쏟아 대접하더니, 너희가 오면 그저 그러할 뿐이다. 너희는 번거롭게 다시 갈 것 없다.\"", ["여인", "비평", "우정"]], ["賢媛", 26, "王凝之謝夫人既往王氏，大薄凝之。既還謝家，意大不說。太傅慰釋之曰：「王郎，逸少之子，人材亦不惡，汝何以恨迺爾？」荅曰：「一門叔父，則有阿大、中郎。羣從兄弟，則有封、胡、遏、末。不意天壤之中，乃有王郎！」", "왕응지(王凝之)의 아내 사부인(謝夫人)이 왕씨 집안에 시집간 뒤 응지를 몹시 가벼이 여겼다. 친정 사씨 집으로 돌아와서는 마음이 매우 언짢았다. 태부(太傅, 사안)가 위로하여 말하였다. \"왕랑(王郎)은 일소(逸少, 왕희지)의 아들이고 인재로도 나쁘지 않은데, 너는 어찌 그토록 한탄하느냐?\" 대답하였다. \"한 집안의 숙부로는 아대(阿大)와 중랑(中郎)이 있고, 사촌 형제로는 봉(封)·호(胡)·알(遏)·말(末)이 있습니다. 천지간에 왕랑 같은 사람이 있을 줄은 생각지도 못했습니다.\"", ["여인", "비평", "부부"]], ["賢媛", 27, "韓康伯母，隱古几毀壞，卞鞠見几惡，欲易之。答曰：「我若不隱此，汝何以得見古物？」", "한강백(韓康伯)의 어머니가 기대던 낡은 안석이 망가져 있었는데, 변국(卞鞠)이 안석이 나쁜 것을 보고 바꾸어 드리려 하였다. 어머니가 대답하였다. \"내가 만약 이것에 기대지 않는다면, 네가 어찌 옛 물건을 볼 수 있겠느냐?\"", ["여인", "청빈", "겸손"]], ["賢媛", 28, "王江州夫人語謝遏曰：「汝何以都不復進，為是塵務經心，天分有限。」", "왕강주(王江州)의 부인이 사알(謝遏, 사현)에게 말하였다. \"너는 어찌하여 도무지 더 나아가지 못하느냐. 속된 일에 마음을 쓰기 때문이냐, 아니면 타고난 분수가 한정이 있어서냐?\"", ["여인", "비평"]], ["賢媛", 29, "郗嘉賓喪，婦兄弟欲迎妹還，終不肯歸。曰：「生縱不得與郗郎同室，死寧不同穴！」", "치가빈(郗嘉賓, 치초)이 죽자 아내의 형제들이 누이를 맞아 데려가려 하였으나, 끝내 돌아가려 하지 않았다. 누이가 말하였다. \"살아서 비록 치랑(郗郎)과 한 방에서 함께하지 못하더라도, 죽어서야 어찌 한 무덤에 들지 못하겠는가!\"", ["부부", "여인", "죽음"]], ["賢媛", 30, "謝遏絕重其姊，張玄常稱其妹，欲以敵之。有濟尼者，並遊張、謝二家。人問其優劣？答曰：「王夫人神情散朗，故有林下風氣。顧家婦清心玉映，自是閨房之秀。」", "사알(謝遏, 사현)은 자기 누이를 지극히 존중하였고, 장현(張玄)은 늘 자기 누이를 칭찬하여 그에 맞서고자 하였다. 제니(濟尼)라는 비구니가 있어 장씨와 사씨 두 집을 다 드나들었다. 사람들이 그 우열을 물으니 대답하였다. \"왕부인(王夫人, 사도온)은 신정(神情)이 시원하고 밝아 본래 죽림(竹林)의 풍기가 있고, 고씨 집안의 부인(장현의 누이)은 마음이 맑아 옥처럼 빛나니 본디 규방의 빼어난 인물입니다.\"", ["비평", "여인"]], ["賢媛", 31, "王尚書惠嘗看王右軍夫人，問：「眼耳未覺惡不？」答曰：「髮白齒落，屬乎形骸；至於眼耳，關於神明，那可便與人隔？」", "왕상서 혜(王尚書惠)가 일찍이 왕우군(王右軍, 왕희지)의 부인을 찾아뵙고 물었다. \"눈과 귀가 아직 나빠지지 않으셨습니까?\" 부인이 대답하였다. \"머리가 세고 이가 빠지는 것은 형체에 속하는 일이거니와, 눈과 귀로 말하면 신명(神明)에 관계되는 것이니 어찌 쉬이 남과 막히겠는가?\"", ["여인", "기지", "병과늙음"]], ["賢媛", 32, "韓康伯母殷，隨孫繪之之衡陽，於闔廬洲中逢桓南郡。卞鞠是其外孫，時來問訊。謂鞠曰：「我不死，見此豎二世作賊！」在衡陽數年，繪之遇桓景真之難也，殷撫屍哭曰：「汝父昔罷豫章，徵書朝至夕發。汝去郡邑數年，為物不得動，遂及於難，夫復何言？」", "한강백(韓康伯)의 어머니 은씨(殷氏)가 손자 회지(繪之)를 따라 형양(衡陽)으로 가다가 합려주(闔廬洲)에서 환남군(桓南郡, 환현)을 만났다. 변국(卞鞠)은 그 외손이었는데 그때 와서 문안하였다. 은씨가 변국에게 말하였다. \"내가 죽지 않고 이 더벅머리 놈이 이대(二代)에 걸쳐 도적질하는 것을 보는구나.\" 형양에서 몇 해를 지내는 동안 회지가 환경진(桓景眞)의 난을 당하니, 은씨가 시신을 어루만지며 통곡하여 말하였다. \"네 아버지가 옛날 예장(豫章)에서 벼슬을 그만둘 때, 부르는 글이 아침에 이르자 저녁에 떠났다. 너는 군읍을 떠난 지 몇 해가 되도록 사람됨이 움직일 줄을 몰라 마침내 화를 당하고 말았으니, 다시 무슨 말을 하겠느냐?\"", ["여인", "죽음", "예언"]], ["術解", 1, "荀勖善解音聲，時論謂之闇解。遂調律呂，正雅樂。每至正會，殿庭作樂，自調宮商，無不諧韻。阮咸妙賞，時謂神解。每公會作樂，而心謂之不調。既無一言直勖，意忌之，遂出阮為始平太守。後有一田父耕於野，得周時玉尺，便是天下正尺。荀試以校己所治鐘鼓、金石、絲竹，皆覺短一黍，於是伏阮神識。", "순욱(荀勖)은 음악과 소리를 잘 풀이하여 당시 사람들은 그를 두고 어두운 가운데서도 풀이한다고 하였다. 마침내 율려(律呂)를 조율하고 아악(雅樂)을 바로잡았다. 매번 정월 조회 때에 궁정 뜰에서 음악을 연주할 적에 스스로 궁상(宮商)을 조율하면 음운이 맞지 않는 것이 없었다. 완함(阮咸)은 음악을 절묘하게 감상하니 당시에 신묘하게 풀이한다고 하였다. 매번 공식 모임에서 음악을 연주할 때마다 마음속으로 음이 맞지 않다고 여겼으나, 한마디도 순욱에게 직언하지 않으니 순욱이 그를 꺼려 마침내 완함을 내보내어 시평태수(始平太守)로 삼았다. 뒤에 한 농부가 들에서 밭을 갈다가 주(周)나라 때의 옥자[玉尺]를 얻었는데, 곧 천하의 바른 자였다. 순욱이 시험 삼아 자기가 다스린 종과 북, 금석(金石), 사죽(絲竹)을 견주어 보니 모두 기장 한 알만큼 짧음을 깨달았으니, 이에 완함의 신묘한 식견에 탄복하였다.", ["음악", "재능", "질투"]], ["術解", 2, "荀勖嘗在晉武帝坐上食筍進飯，謂在坐人曰：「此是勞薪炊也。」坐者未之信，密遣問之，實用故車腳。", "순욱(荀勖)이 일찍이 진무제(晉武帝)의 자리에서 죽순과 밥을 먹다가 자리에 앉은 사람들에게 말하였다. \"이것은 헌 수레로 불을 때어 지은 것입니다.\" 자리에 있던 이들이 믿지 않고 몰래 사람을 보내 물어보니, 실로 낡은 수레의 바퀴굴대를 썼던 것이었다.", ["지혜", "재능"]], ["術解", 3, "人有相羊祜父墓，後應出受命君。祜惡其言，遂掘斷墓後，以壞其勢。相者立視之曰：「猶應出折臂三公。」俄而祜墜馬折臂，位果至公。", "어떤 이가 양호(羊祜)의 아버지 무덤을 보고는 후에 마땅히 천명을 받을 임금이 나올 자리라 하였다. 양호가 그 말을 싫어하여 마침내 무덤 뒤를 파서 끊어 그 형세를 망가뜨렸다. 관상 보는 이가 곧장 그것을 보고 말하였다. \"그래도 팔이 부러진 삼공(三公)은 나오겠소.\" 얼마 뒤 양호가 말에서 떨어져 팔이 부러졌고, 지위는 과연 삼공에 이르렀다.", ["예언", "권력"]], ["術解", 4, "王武子善解馬性。嘗乘一馬，箸連錢障泥。前有水，終日不肯渡。王云：「此必是惜障泥。」使人解去，便徑渡。", "왕무자(王武子)는 말의 성질을 잘 풀이하였다. 일찍이 한 말을 탔는데 동전 무늬가 이어진 진흙받이를 매고 있었다. 앞에 물이 있었는데 종일토록 건너려 하지 않았다. 왕무자가 말하였다. \"이는 필시 진흙받이를 아끼는 것이다.\" 사람을 시켜 풀어 치우게 하니 곧장 건넜다.", ["재능", "지혜"]], ["術解", 5, "陳述為大將軍掾，甚見愛重。及亡，郭璞往哭之，甚哀，乃呼曰：「嗣祖，焉知非福！」俄而大將軍作亂，如其所言。", "진술(陳述)이 대장군(大將軍)의 속관(掾)이 되어 매우 사랑과 존중을 받았다. 그가 죽자 곽박(郭璞)이 가서 곡하며 몹시 슬퍼하다가 이내 부르짖었다. \"사조(嗣祖)여, 이것이 복이 아님을 어찌 알겠는가!\" 얼마 뒤 대장군이 난을 일으켰으니, 그 말과 같았다.", ["예언", "죽음"]], ["術解", 6, "晉明帝解占塚宅，聞郭璞為人葬，帝微服往看。因問主人：「何以葬龍角？此法當滅族！」主人曰：「郭云：『此葬龍耳，不出三年，當致天子。』」帝問：「為是出天子邪？」答曰：「非出天子，能致天子問耳。」", "진명제(晉明帝)는 무덤과 집터의 점을 풀이할 줄 알았는데, 곽박(郭璞)이 어떤 이를 위해 장사를 지낸다는 말을 듣고 미복(微服) 차림으로 가서 보았다. 이에 상주에게 물었다. \"어찌하여 용의 뿔[龍角]에 장사를 지내는가? 이 법대로라면 마땅히 일족이 멸할 것이다!\" 상주가 말하였다. \"곽박이 이르기를 '이는 용의 귀[龍耳]에 장사를 지내는 것이니, 삼 년이 못 되어 마땅히 천자(天子)를 이르게 할 것이다'라 하였습니다.\" 명제가 물었다. \"이는 천자가 나오게 된다는 것인가?\" 대답하였다. \"천자가 나오는 것이 아니라, 천자가 물어오게 할 수 있다는 것입니다.\"", ["예언", "술수"]], ["術解", 7, "郭景純過江，居于暨陽，墓去水不盈百步，時人以為近水。景純曰：「將當為陸。」今沙漲，去墓數十里皆為桑田。其詩曰：「北阜烈烈，巨海混混；壘壘三墳，唯母與昆。」", "곽경순(郭景純, 곽박)이 강을 건너와 기양(暨陽)에 살았는데, 무덤이 물에서 백 보도 채 떨어지지 않아 당시 사람들이 물에 너무 가깝다고 여겼다. 경순이 말하였다. \"장차 마땅히 뭍이 될 것이다.\" 지금은 모래가 불어나 무덤에서 수십 리 떨어진 곳까지 모두 뽕밭이 되었다. 그 시에 이르기를 \"북쪽 언덕은 우뚝하고 큰 바다는 넘실넘실, 겹겹의 세 무덤은 오직 어머니와 형제뿐이라네\" 하였다.", ["예언", "죽음"]], ["術解", 8, "王丞相令郭璞試作一卦，卦成，郭意色甚惡，云：「公有震厄！」王問：「有可消伏理不？」郭曰：「命駕西出數里，得一柏樹，截斷如公長，置牀上常寢處，災可消矣。」王從其語。數日中，果震柏粉碎，子弟皆稱慶。大將軍云：「君乃復委罪於樹木。」", "왕승상(王丞相, 왕도)이 곽박(郭璞)에게 시험 삼아 점괘 하나를 뽑게 하니, 괘가 이루어지자 곽박의 안색이 몹시 좋지 않으며 말하였다. \"공께서는 벼락의 액운이 있습니다!\" 왕도가 물었다. \"없앨 수 있는 이치가 있는가?\" 곽박이 말하였다. \"수레를 몰아 서쪽으로 몇 리쯤 나가면 잣나무 하나를 얻을 것이니, 공의 키만큼 잘라 평소 주무시는 침상 위에 두십시오. 그러면 재앙을 없앨 수 있습니다.\" 왕도가 그 말을 따랐다. 며칠 안에 과연 잣나무가 벼락에 가루처럼 부서지니 자제들이 모두 경하하였다. 대장군(大將軍, 왕돈)이 말하였다. \"그대는 도리어 죄를 나무에 떠넘겼구려.\"", ["예언", "지혜"]], ["術解", 9, "桓公有主簿善別酒，有酒輒令先嘗。好者謂「青州從事」，惡者謂「平原督郵」。青州有齊郡，平原有鬲縣。「從事」言「到臍」，「督郵」言在「鬲上住」。", "환공(桓公, 환온)에게는 술을 잘 가리는 주부(主簿)가 있었는데, 술이 있으면 늘 먼저 맛보게 하였다. 좋은 것은 '청주종사(靑州從事)'라 하고 나쁜 것은 '평원독우(平原督郵)'라 하였다. 청주(靑州)에는 제군(齊郡)이 있고 평원(平原)에는 격현(鬲縣)이 있다. '종사(從事)'란 배꼽[臍]까지 이른다는 말이요, '독우(督郵)'란 횡격막[鬲] 위에 머무른다는 말이다.", ["기지", "술과취흥"]], ["術解", 10, "郗愔信道甚精勤，常患腹內惡，諸醫不可療。聞于法開有名，往迎之。既來，便脈云：「君侯所患，正是精進太過所致耳。」合一劑湯與之。一服，即大下，去數段許紙如拳大；剖看，乃先所服符也。", "치음(郗愔)은 도(道)를 매우 정밀하고 부지런히 믿었는데, 늘 뱃속이 좋지 않아 여러 의원이 치료하지 못하였다. 우법개(于法開)가 이름이 높다는 말을 듣고 가서 그를 맞이하였다. 그가 와서 곧 맥을 짚고 말하였다. \"군후(君侯)께서 앓으시는 바는 바로 정진(精進)이 지나친 까닭에 생긴 것일 뿐입니다.\" 탕약 한 제를 지어 주었다. 한 번 복용하자 곧 크게 설사하여 주먹만 한 크기의 종이 몇 덩이가 나왔는데, 갈라 보니 곧 전에 복용한 부적이었다.", ["재능", "기지", "지혜"]], ["術解", 11, "殷中軍妙解經脉，中年都廢。有常所給使，忽叩頭流血。浩問其故？云：「有死事，終不可說。」詰問良久，乃云：「小人母年垂百歲，抱疾來久，若蒙官一脈，便有活理。訖就屠戮無恨。」浩感其至性，遂令舁來，為診脉處方。始服一劑湯，便愈。於是悉焚經方。", "은중군(殷中軍, 은호)은 경맥(經脈)을 절묘하게 풀이하였으나 중년에 이르러 모두 그만두었다. 늘 부리던 심부름꾼이 갑자기 머리를 조아려 피를 흘렸다. 은호가 그 까닭을 물으니 말하였다. \"죽을 일이 있으나 끝내 말씀드릴 수 없습니다.\" 한참을 캐물으니 그제야 말하였다. \"소인의 어미가 나이 백 세에 가까운데 병을 안고 지낸 지 오래입니다. 만약 나리께서 한 번 맥을 짚어 주신다면 살아날 도리가 있겠습니다. 그러고 나면 도륙을 당해도 한이 없겠습니다.\" 은호가 그 지극한 성정(性)에 감동하여 마침내 그 어미를 메고 오게 하여 진맥하고 처방하였다. 처음 탕약 한 제를 복용하자 곧 나았다. 이에 경방(經方)을 모두 불태웠다.", ["재능", "효", "도량"]], ["巧蓺", 1, "彈棊始自魏宮內，用妝奩戲。文帝於此戲特妙，用手巾角拂之，無不中。有客自云能，帝使為之。客箸葛巾角，低頭拂棊，妙踰於帝。", "탄기(彈棊)는 위(魏)나라 궁중에서 비롯되었는데, 화장갑[妝奩]을 가지고 놀이하던 것이다. 문제(文帝)가 이 놀이에 특히 빼어났으니, 수건의 모서리로 튕겨도 맞히지 않는 것이 없었다. 어떤 손이 스스로 할 수 있다 하자, 문제가 그더러 해 보게 하였다. 손이 칡베 두건의 모서리를 대고 머리를 숙여 알을 튕기니, 그 절묘함이 문제보다 뛰어났다.", ["재능", "풍류"]], ["巧蓺", 2, "陵雲臺樓觀精巧，先稱平眾木輕重，然後造構，乃無錙銖相負揭。臺雖高峻，常隨風搖動，而終無傾倒之理。魏明帝登臺，懼其勢危，別以大材扶持之，樓即穨壞。論者謂輕重力偏故也。", "능운대(陵雲臺)의 누각은 정교하였으니, 먼저 여러 목재의 가볍고 무거움을 헤아려 고르게 한 뒤에 짜 올려, 조금[錙銖]도 서로 어긋남이 없었다. 누대가 비록 높고 가팔라 늘 바람을 따라 흔들렸으나 끝내 기울어 무너질 이치는 없었다. 위명제(魏明帝)가 누대에 올랐다가 그 형세가 위태로움을 두려워하여 따로 큰 재목으로 떠받치게 하니, 누각이 곧 무너졌다. 논하는 이들은 가볍고 무거운 힘이 치우친 까닭이라 하였다.", ["재능", "지혜"]], ["巧蓺", 3, "韋仲將能書。魏明帝起殿，欲安榜，使仲將登梯題之。既下，頭鬢皓然，因敕兒孫：「勿復學書。」", "위중장(韋仲將)은 글씨를 잘 썼다. 위명제(魏明帝)가 전각을 세우고 현판을 달고자 하여 위중장으로 하여금 사다리에 올라 글씨를 쓰게 하였다. 다 쓰고 내려오니 머리와 살쩍이 하얗게 세었다. 이에 자손에게 분부하였다. \"다시는 글씨를 배우지 말라.\"", ["서화", "재능", "뉘우침"]], ["巧蓺", 4, "鍾會是荀濟北從舅，二人情好不協。荀有寶劍，可直百萬，常在母鍾夫人許。會善書，學荀手跡，作書與母取劍，仍竊去不還。荀勖知是鍾而無由得也，思所以報之。後鍾兄弟以千萬起一宅，始成，甚精麗，未得移住。荀極善畫，乃潛往畫鍾門堂，作太傅形象，衣冠狀貌如平生。二鍾入門，便大感慟，宅遂空廢。", "종회(鍾會)는 순제북(荀濟北, 순욱)의 외사촌이었는데, 두 사람은 사이가 좋지 않았다. 순욱에게 백만의 값어치가 나가는 보검이 있었는데, 늘 어머니 종부인(鍾夫人) 곁에 두었다. 종회는 글씨를 잘 썼는데, 순욱의 필적을 흉내 내어 어머니에게 편지를 써서 검을 받아 가지고는 훔쳐 가서 돌려주지 않았다. 순욱은 이것이 종회의 짓임을 알았으나 되찾을 길이 없자, 보복할 방법을 궁리하였다. 뒤에 종씨 형제가 천만의 돈으로 집 하나를 지었는데, 막 완성되어 매우 정교하고 화려하였으나 아직 옮겨 살지는 못하였다. 순욱은 그림을 매우 잘 그렸으니, 이에 몰래 가서 종씨 집의 대청에 그림을 그려 태부(太傅, 종회 부친)의 형상을 그렸는데, 의관과 모습이 살아 있을 때와 같았다. 두 종씨가 문에 들어서자 곧 크게 감동하여 통곡하니, 집은 마침내 비어 황폐해졌다.", ["원한", "술수", "서화"]], ["巧蓺", 5, "羊長和博學工書，能騎射，善圍棊。諸羊後多知書，而射、弈餘蓺莫逮。", "양장화(羊長和)는 박학하고 글씨에 능했으며 말타기와 활쏘기를 할 줄 알고 바둑을 잘 두었다. 여러 양씨가 후에 글씨를 아는 이가 많았으나, 활쏘기와 바둑 등 나머지 재예(才藝)는 그에게 미치지 못하였다.", ["재능", "서화"]], ["巧蓺", 6, "戴安道就范宣學，視范所為：范讀書亦讀書，范抄書亦抄書。唯獨好畫，范以為無用，不宜勞思於此。戴乃畫南都賦圖；范看畢咨嗟，甚以為有益，始重畫。", "대안도(戴安道, 대규)가 범선(范宣)에게 나아가 배우면서 범선이 하는 것을 보아, 범선이 책을 읽으면 자기도 책을 읽고 범선이 책을 베끼면 자기도 베꼈다. 다만 홀로 그림 그리기를 좋아했는데, 범선은 그것을 쓸모없다 여겨 이에 마음을 쓰는 것이 마땅치 않다고 하였다. 대규가 이에 「남도부(南都賦)」를 그림으로 그리니, 범선이 보고 나서 감탄하며 매우 유익하다 여기고는 비로소 그림을 중히 여겼다.", ["서화", "학문"]], ["巧蓺", 7, "謝太傅云：「顧長康畫，有蒼生來所無。」", "사태부(謝太傅, 사안)가 말하였다. \"고장강(顧長康, 고개지)의 그림은 백성이 생긴 이래로 없던 것이다.\"", ["서화", "비평"]], ["巧蓺", 8, "戴安道中年畫行像甚精妙。庾道季看之，語戴云：「神明太俗，由卿世情未盡。」戴云：「唯務光當免卿此語耳。」", "대안도(戴安道, 대규)가 중년에 불상[行像]을 그린 것이 매우 정묘하였다. 유도계(庾道季)가 그것을 보고 대규에게 말하였다. \"신명(神明)이 너무 세속적이니, 이는 그대의 세속적 감정이 아직 다 가시지 않은 탓이오.\" 대규가 말하였다. \"오직 무광(務光)이라야 그대의 이런 말을 면할 수 있을 것이오.\"", ["서화", "비평"]], ["巧蓺", 9, "顧長康畫裴叔則，頰上益三毛。人問其故？顧曰：「裴楷儁朗有識具，正此是其識具。」看畫者尋之，定覺益三毛如有神明，殊勝未安時。", "고장강(顧長康, 고개지)이 배숙칙(裴叔則, 배해)을 그릴 때 뺨 위에 터럭 세 가닥을 더 그렸다. 사람들이 그 까닭을 물으니 고개지가 말하였다. \"배해는 준수하고 명랑하며 식견[識具]이 있는데, 바로 이것이 그 식견이오.\" 그림을 보는 이들이 살펴보니, 정녕 터럭 세 가닥을 더한 것이 마치 신명(神明)이 있는 듯하여, 더하기 전보다 훨씬 나음을 깨달았다.", ["서화", "재능"]], ["巧蓺", 10, "王中郎以圍棊是坐隱，支公以圍棊為手談。", "왕중랑(王中郎)은 바둑을 두고 은거하는 것[坐隱]이라 하였고, 지공(支公, 지둔)은 바둑을 손으로 하는 청담[手談]이라 하였다.", ["청담", "은둔", "비평"]], ["巧蓺", 11, "顧長康好寫起人形。欲圖殷荊州，殷曰：「我形惡，不煩耳。」顧曰：「明府正為眼爾。但明點童子，飛白拂其上，使如輕雲之蔽日。」", "고장강(顧長康, 고개지)은 사람의 모습 그리기를 좋아하였다. 은형주(殷荊州)를 그리고자 하니 은형주가 말하였다. \"내 모습은 흉하니 수고롭게 하지 마시오.\" 고개지가 말하였다. \"명부(明府)께서는 바로 눈 때문이지요. 다만 눈동자를 밝게 점찍고 그 위에 비백(飛白)으로 슬쩍 스치게 하여, 마치 엷은 구름이 해를 가린 듯하게 하면 됩니다.\"", ["서화", "재능"]], ["巧蓺", 12, "顧長康畫謝幼輿在巖石裏。人問其所以？顧曰：「謝云：『一丘一壑，自謂過之。』此子宜置丘壑中。」", "고장강(顧長康, 고개지)이 사유여(謝幼輿, 사곤)를 바위 속에 그렸다. 사람들이 그 까닭을 물으니 고개지가 말하였다. \"사곤이 이르기를 '언덕 하나와 골짜기 하나에서 노니는 것은 스스로 그대보다 낫다고 여기오'라 하였소. 이 사람은 마땅히 언덕과 골짜기 가운데 두어야 하오.\"", ["서화", "은둔"]], ["巧蓺", 13, "顧長康畫人，或數年不點目精。人問其故？顧曰：「四體妍蚩，本無關於妙處；傳神寫照，正在阿堵中。」", "고장강(顧長康, 고개지)은 사람을 그리되 더러 몇 해가 지나도록 눈동자를 점찍지 않았다. 사람들이 그 까닭을 물으니 고개지가 말하였다. \"사지(四體)의 아름다움과 추함은 본디 절묘한 곳과 관계가 없소. 정신을 전하고 모습을 그려 내는 것[傳神寫照]은 바로 이 눈동자[阿堵] 가운데 있소.\"", ["서화", "재능"]], ["巧蓺", 14, "顧長康道畫：「手揮五絃易，目送歸鴻難。」", "고장강(顧長康, 고개지)이 그림에 대해 말하였다. \"손으로 오현금을 타는 것은 그리기 쉽고, 눈으로 돌아가는 기러기를 보내는 것은 그리기 어렵다.\"", ["서화", "재능"]], ["寵禮", 1, "元帝正會，引王丞相登御牀，王公固辭，中宗引之彌苦。王公曰：「使太陽與萬物同暉，臣下何以瞻仰？」", "원제(元帝)가 정월 조회 때에 왕승상(王丞相, 왕도)을 이끌어 어좌(御牀)에 오르게 하니, 왕공(王公)이 한사코 사양하였다. 중종(中宗, 원제)이 이끄는 것이 더욱 간곡하였다. 왕공이 말하였다. \"태양으로 하여금 만물과 더불어 빛을 같이하게 하신다면, 신하들이 무엇을 우러러보겠습니까?\"", ["겸손", "거절", "권력"]], ["寵禮", 2, "桓宣武嘗請參佐入宿，袁宏、伏滔相次而至，蒞名府中，復有袁參軍，彥伯疑焉，令傳教更質。傳教曰：「參軍是袁、伏之袁，復何所疑？」", "환선무(桓宣武, 환온)가 일찍이 막료들을 청하여 숙직하게 하였는데, 원굉(袁宏)과 복도(伏滔)가 잇따라 이르렀다. 부중(府中)에 이름을 적으니, 또 원참군(袁參軍)이 있어 언백(彦伯, 원굉)이 의아해하며 전령을 시켜 다시 따져 묻게 하였다. 전령이 말하였다. \"참군은 원(袁)·복(伏)의 그 원씨이니, 다시 무엇을 의심하십니까?\"", ["기지", "비평"]], ["寵禮", 3, "王珣、郗超並有奇才，為大司馬所眷拔。珣為主簿，超為記室參軍。超為人多須，珣狀短小。于時荊州為之語曰：「髯參軍，短主簿。能令公喜，能令公怒。」", "왕순(王珣)과 치초(郗超)는 모두 빼어난 재주가 있어 대사마(大司馬, 환온)에게 사랑받고 발탁되었다. 왕순은 주부(主簿)가 되고 치초는 기실참군(記室參軍)이 되었다. 치초는 사람됨이 수염이 많고 왕순은 키가 작고 왜소하였다. 그때 형주(荊州)에서 그들을 두고 이렇게 말하였다. \"수염 난 참군, 키 작은 주부. 공을 기쁘게도 하고, 공을 노하게도 한다네.\"", ["비평", "용모", "재능"]], ["寵禮", 4, "許玄度停都一月，劉尹無日不往，乃歎曰：「卿復少時不去，我成輕薄京尹！」", "허현도(許玄度, 허순)가 도성에 한 달을 머무는데 유윤(劉尹, 유담)이 하루도 찾지 않는 날이 없었다. 이에 탄식하며 말하였다. \"그대가 다시 얼마간 떠나지 않으면, 나는 경박한 경윤(京尹)이 되고 말겠소!\"", ["우정", "기지"]], ["寵禮", 5, "孝武在西堂會，伏滔預坐。還，下車呼其兒，語之曰：「百人高會，臨坐未得他語，先問『伏滔何在？在此不？』此故未易得。為人作父如此，何如？」", "효무제(孝武帝)가 서당(西堂)에서 모임을 열었는데 복도(伏滔)가 자리에 참석하였다. 돌아와 수레에서 내려 그 아들을 불러 말하였다. \"백 사람이 모인 큰 모임에서, 자리에 임하시어 다른 말씀을 하시기 전에 먼저 '복도는 어디 있는가? 여기 있느냐?'고 물으셨다. 이는 참으로 쉽게 얻을 수 있는 일이 아니다. 남의 아비 된 자가 이러하니 어떠하냐?\"", ["권력", "비평"]], ["寵禮", 6, "卞範之為丹陽尹，羊孚南州暫還，往卞許，云：「下官疾動不堪坐。」卞便開帳拂褥，羊徑上大牀，入被須枕。卞回坐傾睞，移晨達莫。羊去，卞語曰：「我以第一理期卿，卿莫負我。」", "변범지(卞範之)가 단양윤(丹陽尹)이 되었을 때, 양부(羊孚)가 남주(南州)에서 잠시 돌아와 변범지에게 가서 말하였다. \"하관(下官)이 병이 도져 앉아 있을 수가 없습니다.\" 변범지가 곧 휘장을 걷고 요를 털어 놓으니, 양부가 곧장 큰 침상에 올라 이불 속에 들어가 베개를 챙겨 베었다. 변범지가 돌아앉아 정을 기울여 바라보며, 아침부터 저물녘까지 함께하였다. 양부가 떠나자 변범지가 말하였다. \"나는 제일가는 이치[第一理]로 그대에게 기대하니, 그대는 나를 저버리지 마시오.\"", ["우정", "풍류"]], ["任誕", 1, "陳留阮籍，譙國嵇康，河內山濤，三人年皆相比，康年少亞之。預此契者：沛國劉伶，陳留阮咸，河內向秀，琅邪王戎。七人常集于竹林之下，肆意酣暢，故世謂「竹林七賢」。", "진류(陳留)의 완적(阮籍), 초국(譙國)의 혜강(嵇康), 하내(河內)의 산도(山濤), 이 세 사람은 나이가 모두 서로 비슷하였고 혜강이 그다음으로 조금 어렸다. 이 모임에 함께한 이로는 패국(沛國)의 유령(劉伶), 진류(陳留)의 완함(阮咸), 하내(河內)의 향수(向秀), 낭야(琅邪)의 왕융(王戎)이 있었다. 일곱 사람이 늘 대숲 아래 모여 마음껏 거나하게 즐겼으므로 세상에서 '죽림칠현(竹林七賢)'이라 일렀다.", ["풍류", "우정", "은둔"]], ["任誕", 2, "阮籍遭母喪，在晉文王坐，進酒肉。司隸何曾亦在坐，曰：「明公方以孝治天下，而阮籍以重喪，顯於公坐，飲酒食肉，宜流之海外，以正風教。」文王曰：「嗣宗毀頓如此，君不能共憂之，何謂？且有疾而飲酒食肉，固喪禮也！」籍飲噉不輟，神色自若。", "완적(阮籍)이 어머니 상을 당하였는데, 진문왕(晉文王, 사마소)의 자리에서 술과 고기를 들었다. 사례(司隸) 하증(何曾)도 자리에 있다가 말하였다. \"명공(明公)께서 바야흐로 효(孝)로써 천하를 다스리시거늘, 완적은 무거운 상중에 공의 자리에 드러내 놓고 술 마시고 고기를 먹으니, 마땅히 바다 밖으로 내쳐 풍교(風敎)를 바로잡아야 합니다.\" 문왕이 말하였다. \"사종(嗣宗, 완적)이 이처럼 슬픔에 야위어 무너졌거늘, 그대가 함께 근심하지는 못할망정 무슨 말인가? 또 병이 있어 술 마시고 고기 먹는 것은 본디 상례(喪禮)에 맞는 일이다!\" 완적은 마시고 먹기를 그치지 않았으며, 안색이 태연자약하였다.", ["술과취흥", "효", "죽음"]], ["任誕", 3, "劉伶病酒，渴甚，從婦求酒。婦捐酒毀器，涕泣諫曰：「君飲太過，非攝生之道，必宜斷之！」伶曰：「甚善。我不能自禁，唯當祝鬼神，自誓斷之耳！便可具酒肉。」婦曰：「敬聞命。」供酒肉於神前，請伶祝誓。伶跪而祝曰：「天生劉伶，以酒為名，一飲一斛，五斗解酲。婦人之言，慎不可聽。」便引酒進肉，隗然已醉矣。", "유령(劉伶)이 술병이 나서 목이 몹시 말라 아내에게 술을 청하였다. 아내가 술을 쏟아 버리고 그릇을 깨뜨리며 눈물 흘려 간하였다. \"당신은 마시는 것이 너무 지나치니, 양생(攝生)의 도리가 아닙니다. 반드시 끊으셔야 합니다!\" 유령이 말하였다. \"참 좋소. 내 스스로 금할 수 없으니, 다만 마땅히 귀신께 빌어 스스로 끊기를 맹세하리다! 곧 술과 고기를 갖추시오.\" 아내가 말하였다. \"분부를 삼가 받들겠습니다.\" 술과 고기를 신 앞에 차리고 유령에게 빌어 맹세하기를 청하였다. 유령이 꿇어앉아 빌며 말하였다. \"하늘이 유령을 내시매 술로써 이름을 삼으니, 한 번 마시면 한 섬이요 닷 말로 해장을 한다네. 아녀자의 말은 삼가 들을 것이 못 되도다.\" 그러고는 술을 끌어당겨 고기를 먹으니, 어느새 무너지듯 이미 취하였다.", ["술과취흥", "부부"]], ["任誕", 4, "劉公榮與人飲酒，雜穢非類，人或譏之。答曰：「勝公榮者，不可不與飲；不如公榮者，亦不可不與飲；是公榮輩者，又不可不與飲。」故終日共飲而醉。", "유공영(劉公榮)이 사람들과 술을 마시는데 잡되고 거칠어 동류가 아닌 자들과도 어울리니, 어떤 이가 그를 나무랐다. 그가 대답하였다. \"공영보다 나은 자와는 함께 마시지 않을 수 없고, 공영만 못한 자와도 함께 마시지 않을 수 없으며, 공영과 같은 무리와도 또한 함께 마시지 않을 수 없소.\" 그리하여 종일토록 함께 마시며 취하였다.", ["술과취흥", "도량"]], ["任誕", 5, "步兵校尉缺，廚中有貯酒數百斛，阮籍乃求為步兵校尉。", "보병교위(步兵校尉) 자리가 비었는데, 그 주방에 술 수백 섬이 쌓여 있었다. 완적(阮籍)은 이에 보병교위가 되기를 청하였다.", ["술과취흥", "권력"]], ["任誕", 6, "劉伶恆縱酒放達，或脫衣裸形在屋中，人見譏之。伶曰：「我以天地為棟宇，屋室為衣，諸君何為入我中？」", "유령(劉伶)은 늘 술을 마시며 거리낌 없이 분방하였는데, 더러 옷을 벗고 알몸으로 방 안에 있었다. 사람들이 보고 나무라니 유령이 말하였다. \"나는 천지를 집으로 삼고 방을 잠방이로 삼는데, 그대들은 어찌하여 내 잠방이 속으로 들어왔는가?\"", ["술과취흥", "오만"]], ["任誕", 7, "阮籍嫂嘗還家，籍見與別。或譏之。籍曰：「禮豈為我輩設也？」", "완적(阮籍)의 형수가 한번은 친정으로 돌아가게 되자, 완적이 만나 작별 인사를 나누었다. 어떤 이가 이를 나무라니 완적이 말했다. \"예법(禮)이 어찌 우리 같은 무리를 위해 마련된 것이겠는가?\"", ["술과취흥", "오만"]], ["任誕", 8, "阮公鄰家婦有美色，當壚酤酒。阮與王安豐常從婦飲酒，阮醉，便眠其婦側。夫始殊疑之，伺察，終無他意。", "완공(阮公, 阮籍)의 이웃집 아낙이 미색이 있어 술청에서 술을 팔았다. 완적은 왕안풍(王安豐, 王戎)과 늘 그 아낙에게 가서 술을 마셨는데, 완적이 취하면 곧 그 아낙 곁에서 잠들곤 하였다. 남편이 처음에는 몹시 의심하여 엿보아 살폈으나, 끝내 다른 뜻이 없었다.", ["술과취흥", "도량"]], ["任誕", 9, "阮籍當葬母，蒸一肥豚，飲酒二斗，然後臨訣，直言「窮矣」！都得一號，因吐血，廢頓良久。", "완적(阮籍)이 어머니의 장례를 치르게 되자, 살찐 돼지 한 마리를 쪄서 술 두 말을 마신 뒤에야 영결에 임하였는데, 다만 \"끝났구나(窮矣)!\"라고만 말하였다. 모두 한 번 곡하고는 그대로 피를 토하고 오래도록 쓰러져 있었다.", ["술과취흥", "효", "죽음"]], ["任誕", 10, "阮仲容、步兵居道南，諸阮居道北。北阮皆富，南阮貧。七月七日，北阮盛曬衣，皆紗羅錦綺。仲容以竿挂大布犢鼻於中庭。人或怪之，答曰：「未能免俗，聊復爾耳！", "완중용(阮仲容, 阮咸)과 보병(步兵, 阮籍)은 길 남쪽에 살고, 여러 완씨(阮氏)는 길 북쪽에 살았다. 북쪽 완씨는 모두 부유하고 남쪽 완씨는 가난하였다. 칠월 칠일에 북쪽 완씨들이 옷을 성대하게 내다 말렸는데, 모두 비단과 무늬 있는 옷감이었다. 중용은 장대에 굵은 베로 만든 잠방이를 마당 가운데에 걸어두었다. 어떤 이가 이를 괴이하게 여기니, 그가 대답하였다. \"속됨을 면치 못하여 그저 이렇게 해본 것일 뿐이오!\"", ["청빈", "풍류"]], ["任誕", 11, "阮步兵喪母，裴令公往弔之。阮方醉，散髮坐牀，箕踞不哭。裴至，下席於地，哭弔喭畢，便去。或問裴：「凡弔，主人哭，客乃為禮。阮既不哭，君何為哭？」裴曰：「阮方外之人，故不崇禮制；我輩俗中人，故以儀軌自居。」時人歎為兩得其中。", "완보병(阮步兵, 阮籍)이 어머니 상을 당했을 때, 배령공(裴令公, 裴楷)이 조문하러 갔다. 완적은 마침 취하여 머리를 풀어 헤치고 평상에 앉아 두 다리를 뻗고 있었으며 곡을 하지 않았다. 배해(裴楷)가 이르러 땅에 자리를 깔고 곡하며 조문을 마치고는 곧 떠났다. 어떤 이가 배해에게 물었다. \"무릇 조문이란 주인이 곡을 하면 손님이 예를 행하는 것입니다. 완적이 곡을 하지 않았는데 그대는 어찌하여 곡을 하였소?\" 배해가 말했다. \"완적은 세속 밖의 사람이라 예법과 제도를 숭상하지 않지만, 우리 같은 무리는 세속 안의 사람이라 의례와 법도로 처신하는 것이오.\" 당시 사람들은 두 사람이 모두 그 중도를 얻었다고 감탄하였다.", ["술과취흥", "죽음", "도량"]], ["任誕", 12, "諸阮皆能飲酒，仲容至宗人閒共集，不復用常桮斟酌，以大甕盛酒，圍坐，相向大酌。時有羣豬來飲，直接去上，便共飲之。", "여러 완씨(阮氏)는 모두 술을 잘 마셨는데, 중용(仲容, 阮咸)이 일족 사람들과 함께 모일 때면 더 이상 보통 술잔으로 따라 마시지 않고 큰 항아리에 술을 담아 둘러앉아 서로 마주하여 크게 퍼마셨다. 그때 돼지 떼가 와서 마시면 곧바로 윗부분을 떠내고는 함께 마셨다.", ["술과취흥", "풍류"]], ["任誕", 13, "阮渾長成，風氣韻度似父，亦欲作達。步兵曰：「仲容已預之，卿不得復爾。」", "완혼(阮渾)이 장성하니, 기풍과 운치가 아버지를 닮아 또한 통달한 행세를 하려 하였다. 보병(步兵, 阮籍)이 말했다. \"중용(仲容, 阮咸)이 이미 그러한 무리에 끼어 있으니, 너는 다시 그래서는 안 된다.\"", ["풍류", "간언"]], ["任誕", 14, "裴成公婦，王戎女。王戎晨往裴許，不通徑前。裴從牀南下，女從北下，相對作賓主，了無異色。", "배성공(裴成公, 裴楷)의 아내는 왕융(王戎)의 딸이다. 왕융이 아침에 배해(裴楷)의 처소에 갔는데, 알리지도 않고 곧장 들어갔다. 배해는 평상의 남쪽으로 내려오고 딸은 북쪽으로 내려와, 서로 마주하여 손님과 주인의 예를 갖추었으며 조금도 이상한 기색이 없었다.", ["부부", "용모"]], ["任誕", 15, "阮仲容先幸姑家鮮卑婢。及居母喪，姑當遠移，初云當留婢，既發，定將去。仲容借客驢箸重服自追之，累騎而返。曰：「人種不可失！」即遙集之母也。", "완중용(阮仲容, 阮咸)이 일찍이 고모 집의 선비(鮮卑) 여종을 가까이하였다. 어머니 상중에 있을 때 고모가 먼 곳으로 옮겨 가게 되었는데, 처음에는 여종을 남겨두겠다고 하였으나 막상 떠날 때는 결국 데리고 가버렸다. 중용은 손님의 나귀를 빌려 상복을 입은 채 직접 뒤쫓아가서 함께 말을 타고 돌아왔다. 그가 말했다. \"사람의 씨앗을 잃을 수는 없다!\" 이가 바로 요집지(遙集之)의 어머니이다.", ["술과취흥", "여인", "부부"]], ["任誕", 16, "任愷既失權勢，不復自檢括。或謂和嶠曰：「卿何以坐視元裒敗而不救？」和曰：「元裒如北夏門，拉攞自欲壞，非一木所能支。」", "임개(任愷)는 권세를 잃은 뒤로 다시는 스스로를 단속하지 않았다. 어떤 이가 화교(和嶠)에게 말했다. \"그대는 어찌하여 원부(元裒, 任愷)가 무너지는 것을 앉아서 보기만 하고 구하지 않는가?\" 화교가 말했다. \"원부는 북하문(北夏門)과 같으니, 비스듬히 기울어 스스로 무너지려 하는데 나무 하나로 떠받칠 수 있는 것이 아니오.\"", ["비평", "권력"]], ["任誕", 17, "劉道真少時，常漁草澤，善歌嘯，聞者莫不留連。有一老嫗，識其非常人，甚樂其歌嘯，乃殺豚進之。道真食豚盡，了不謝。嫗見不飽，又進一豚，食半餘半，迺還之。後為吏部郎，嫗兒為小令史，道真超用之。不知所由，問母；母告之。於是齎牛酒詣道真，道真曰：「去！去！無可復用相報。」", "유도진(劉道眞)이 젊었을 때 늘 늪에서 고기를 잡았는데, 노래와 휘파람을 잘하여 듣는 이마다 머물러 떠나지 못하였다. 한 노파가 있어 그가 범상치 않은 사람임을 알아보고 그의 노래와 휘파람을 매우 즐거워하여 돼지를 잡아 대접하였다. 도진은 돼지를 다 먹고도 전혀 고마워하지 않았다. 노파가 그가 배부르지 않은 것을 보고 또 돼지 한 마리를 대접하니, 절반을 먹고 나머지 절반은 그대로 돌려주었다. 뒤에 이부랑(吏部郞)이 되었는데, 노파의 아들이 하급 영사(令史)가 되어 있자 도진이 그를 파격적으로 등용하였다. 그 까닭을 알지 못하여 어머니에게 물으니 어머니가 그 일을 일러주었다. 이에 소와 술을 가지고 도진을 찾아가니, 도진이 말했다. \"가시오! 가시오! 보답으로 더 등용할 자리가 없소.\"", ["베풂", "음악"]], ["任誕", 18, "阮宣子常步行，以百錢挂杖頭，至酒店，便獨酣暢。雖當世貴盛，不肯詣也。", "완선자(阮宣子, 阮脩)는 늘 걸어 다녔는데, 백 전(錢)을 지팡이 끝에 걸고 술집에 이르면 곧 혼자서 흠뻑 취하도록 마셨다. 비록 당대의 귀하고 권세 있는 자라 해도 찾아가려 하지 않았다.", ["술과취흥", "은둔", "청빈"]], ["任誕", 19, "山季倫為荊州，時出酣暢。人為之歌曰：「山公時一醉，徑造高陽池。日莫倒載歸，茗艼無所知。復能乘駿馬，倒箸白接籬。舉手問葛彊，何如并州兒？」高陽池在襄陽。彊是其愛將，并州人也。", "산계륜(山季倫, 山簡)이 형주(荊州)에 있을 때 때때로 나가 흠뻑 취하곤 하였다. 사람들이 그를 위해 노래를 지어 불렀다. \"산공(山公)이 때로 한 번 취하면 곧장 고양지(高陽池)로 간다네. 날 저물면 거꾸로 실려 돌아오니 곤드레만드레 아무것도 모른다네. 또 능히 준마를 타고 백접리(白接籬)를 거꾸로 쓴다네. 손을 들어 갈강(葛彊)에게 묻기를, 병주(并州)의 사내와 비하면 어떠한가?\" 고양지는 양양(襄陽)에 있다. 갈강은 그가 아끼던 장수로 병주 사람이다.", ["술과취흥", "풍류", "음악"]], ["任誕", 20, "張季鷹縱任不拘，時人號為江東步兵。或謂之曰：「卿乃可縱適一時，獨不為身後名邪？」答曰：「使我有身後名，不如即時一桮酒！」", "장계응(張季鷹, 張翰)은 제멋대로 행동하며 거리낌이 없어 당시 사람들이 강동(江東)의 보병(步兵)이라 불렀다. 어떤 이가 그에게 말했다. \"그대는 한때 마음껏 즐길 수는 있으나, 어찌 죽은 뒤의 명성은 생각하지 않는가?\" 그가 대답했다. \"나에게 죽은 뒤의 명성이 있게 하느니, 차라리 지금 한 잔의 술을 마시는 것이 낫소!\"", ["술과취흥", "풍류"]], ["任誕", 21, "畢茂世云：「一手持蟹螯，一手持酒桮，拍浮酒池中，便足了一生。」", "필무세(畢茂世, 畢卓)가 말했다. \"한 손에는 게의 집게발을 들고 한 손에는 술잔을 들고서 술 못 속에 둥둥 떠다닌다면, 곧 한평생을 마치기에 충분하다.\"", ["술과취흥", "풍류"]], ["任誕", 22, "賀司空入洛赴命，為太孫舍人。經吳閶門，在船中彈琴。張季鷹本不相識，先在金閶亭，聞絃甚清，下船就賀，因共語。便大相知說。問賀：「卿欲何之？」賀曰：「入洛赴命，正爾進路。」張曰：「吾亦有事北京。」因路寄載，便與賀同發。初不告家，家追問迺知。", "하사공(賀司空, 賀循)이 낙양(洛陽)으로 들어가 명을 받들어 태손사인(太孫舍人)이 되었다. 오(吳) 땅의 창문(閶門)을 지날 때 배 안에서 거문고를 탔다. 장계응(張季鷹, 張翰)은 본래 그와 알지 못하였는데, 먼저 금창정(金閶亭)에 있다가 거문고 소리가 매우 맑은 것을 듣고는 배에서 내려 하순(賀循)에게 다가가 함께 이야기를 나누었다. 곧 서로 크게 마음이 통하여 기뻐하였다. 하순에게 물었다. \"그대는 어디로 가시오?\" 하순이 말했다. \"낙양으로 들어가 명을 받들고자 마침 길을 가는 중이오.\" 장한이 말했다. \"나도 북경(北京)에 볼일이 있소.\" 그러고는 길에서 그 배에 얹혀 타고 하순과 함께 떠났다. 처음에 집에는 알리지 않았고, 집에서 뒤쫓아 물은 뒤에야 알게 되었다.", ["우정", "음악", "풍류"]], ["任誕", 23, "祖車騎過江時，公私儉薄，無好服玩。王、庾諸公共就祖，忽見裘袍重疊，珍飾盈列，諸公怪問之。祖曰：「昨夜復南塘一出。」祖于時恆自使健兒鼓行劫鈔，在事之人，亦容而不問。", "조거기(祖車騎, 祖逖)가 강을 건너왔을 때, 공사 간에 모두 검소하고 빈약하여 좋은 옷이나 패물이 없었다. 왕씨(王氏)와 유씨(庾氏) 등 여러 공이 함께 조적(祖逖)을 찾아갔는데, 갑자기 갖옷과 도포가 겹겹이 쌓여 있고 진귀한 장식이 가득 늘어선 것을 보았다. 여러 공이 괴이하게 여겨 물으니 조적이 말했다. \"어젯밤에 또 남당(南塘)을 한 번 다녀왔소.\" 조적은 당시 늘 건장한 병졸들을 시켜 북을 치며 나아가 약탈하게 하였는데, 일을 맡은 자들도 너그러이 보아 넘기고 묻지 않았다.", ["술수", "베풂"]], ["任誕", 24, "鴻臚卿孔羣好飲酒。王丞相語云：「卿何為恆飲酒？不見酒家覆瓿布，日月糜爛？」羣曰：「不爾，不見糟肉，乃更堪久。」羣嘗書與親舊：「今年田得七百斛秫米，不了麴蘖事。」", "홍려경(鴻臚卿) 공군(孔羣)이 술을 즐겨 마셨다. 왕승상(王丞相, 王導)이 그에게 말했다. \"그대는 어찌하여 늘 술을 마시는가? 술집의 항아리를 덮은 베가 날이 갈수록 문드러지는 것을 보지 못하였는가?\" 공군이 말했다. \"그렇지 않습니다. 술지게미에 절인 고기가 오히려 더 오래 견디는 것을 보지 못하셨습니까?\" 공군이 일찍이 친구와 옛 벗에게 편지를 써서 보냈다. \"올해 밭에서 차조 칠백 곡(斛)을 얻었으나 누룩으로 술 담그는 일을 다 감당하지 못하겠네.\"", ["술과취흥", "기지"]], ["任誕", 25, "有人譏周僕射：「與親友言戲，穢雜無檢節。」周曰：「吾若萬里長江，何能不千里一曲。」", "어떤 이가 주복야(周僕射, 周顗)를 나무랐다. \"친구들과 농담을 나눌 때 더럽고 잡스러워 절도가 없습니다.\" 주의(周顗)가 말했다. \"나는 만 리의 긴 강과 같으니, 어찌 천 리에 한 번쯤 굽이가 없을 수 있겠는가.\"", ["술과취흥", "기지"]], ["任誕", 26, "溫太真位未高時，屢與揚州、淮中估客樗蒱，與輒不競。嘗一過，大輸物，戲屈，無因得反。與庾亮善，於舫中大喚亮曰：「卿可贖我！」庾即送直，然後得還。經此數四。", "온태진(溫太眞, 溫嶠)이 지위가 아직 높지 않았을 때, 자주 양주(揚州)와 회중(淮中)의 장사꾼들과 저포(樗蒱) 노름을 하였는데, 할 때마다 이기지 못하였다. 한번은 크게 물건을 잃어 노름에 곤궁해져서 돌아갈 방도가 없게 되었다. 유량(庾亮)과 사이가 좋았으므로, 배 안에서 유량을 크게 불러 말했다. \"그대가 나를 좀 구해주게!\" 유량이 곧 돈을 보내준 뒤에야 돌아갈 수 있었다. 이런 일을 서너 차례 겪었다.", ["술과취흥", "우정"]], ["任誕", 27, "溫公喜慢語，卞令禮法自居。至庾公許，大相剖擊。溫發口鄙穢，庾公徐曰：「太真終日無鄙言。」", "온공(溫公, 溫嶠)은 함부로 하는 말을 좋아하였고, 변령(卞令, 卞壼)은 예법으로 처신하였다. 유공(庾公, 庾亮)의 처소에 이르러 서로 크게 따지고 공격하였다. 온교가 입을 열어 비속하고 더러운 말을 하니, 유량이 천천히 말했다. \"태진(太眞, 溫嶠)은 종일토록 비속한 말이 없구려.\"", ["술과취흥", "비평"]], ["任誕", 28, "周伯仁風德雅重，深達危亂。過江積年，恆大飲酒。嘗經三日不醒，時人謂之「三日僕射」。", "주백인(周伯仁, 周顗)은 풍모와 덕망이 우아하고 중후하였으며 위태로움과 혼란에 깊이 통달하였다. 강을 건너온 지 여러 해 동안 늘 크게 술을 마셨다. 일찍이 사흘이 지나도록 깨어나지 않은 적이 있어 당시 사람들이 그를 \"사흘 복야(三日僕射)\"라 불렀다.", ["술과취흥", "용모"]], ["任誕", 29, "衛君長為溫公長史，溫公甚善之。每率爾提酒脯就衛，箕踞相對彌日。衛往溫許，亦爾。", "위군장(衛君長, 衛永)이 온공(溫公, 溫嶠)의 장사(長史)가 되었는데, 온공이 그를 매우 좋아하였다. 매번 거리낌 없이 술과 마른안주를 들고 위영(衛永)을 찾아가 두 다리를 뻗고 마주 앉아 종일을 보냈다. 위영이 온교의 처소에 갈 때도 또한 그러하였다.", ["우정", "술과취흥", "풍류"]], ["任誕", 30, "蘇峻亂，諸庾逃散。庾冰時為吳郡，單身奔亡，民吏皆去。唯郡卒獨以小船載冰出錢塘口，蘧篨覆之。時峻賞募覓冰，屬所在搜檢甚急。卒捨船市渚，因飲酒醉還，舞棹向船曰：「何處覓庾吳郡？此中便是。」冰大惶怖，然不敢動。監司見船小裝狹，謂卒狂醉，都不復疑。自送過淛江，寄山陰魏家，得免。後事平，冰欲報卒，適其所願。卒曰：「出自廝下，不願名器。少苦執鞭，恆患不得快飲酒。使其酒足餘年畢矣，無所復須。」冰為起大舍，市奴婢，使門內有百斛酒，終其身。時謂此卒非唯有智，且亦達生。", "소준(蘇峻)의 난 때 여러 유씨(庾氏)가 도망쳐 흩어졌다. 유빙(庾冰)은 당시 오군(吳郡) 태수였는데, 홀몸으로 달아나니 백성과 관리가 모두 떠나버렸다. 오직 군졸 하나만이 작은 배에 유빙을 태워 전당(錢塘) 어귀로 빠져나가, 거적으로 그를 덮었다. 그때 소준이 상을 걸고 유빙을 찾으니, 곳곳에서 수색이 매우 급박하였다. 군졸이 배를 시장 물가에 대놓고 술을 마셔 취해서는 돌아와, 노를 휘두르며 배를 향해 말했다. \"어디서 유오군(庾吳郡)을 찾는가? 이 안에 바로 있도다.\" 유빙이 크게 두려워하였으나 감히 움직이지 못하였다. 감독하는 관리가 배가 작고 짐칸이 좁은 것을 보고, 군졸이 미친 듯이 취했다 여겨 더 이상 의심하지 않았다. 군졸이 직접 절강(淛江)을 건너 보내 산음(山陰)의 위씨(魏氏) 집에 의탁하게 하여 화를 면하게 하였다. 뒤에 일이 평정되자 유빙이 군졸에게 보답하고자 그가 원하는 바를 들어주려 하였다. 군졸이 말했다. \"천한 하인 출신이라 명예나 벼슬은 바라지 않습니다. 어려서부터 채찍 잡는 일에 고생하였고, 늘 술을 실컷 마시지 못함을 근심하였습니다. 남은 평생 술이나 넉넉히 하게 해주신다면 그뿐, 더 바랄 것이 없습니다.\" 유빙이 그를 위해 큰 집을 지어주고 노비를 사주었으며, 집 안에 술 백 곡(斛)을 두게 하여 평생토록 하게 하였다. 당시 사람들은 이 군졸이 지혜가 있을 뿐만 아니라 또한 삶에 통달하였다고 하였다.", ["지혜", "용기", "술과취흥"]], ["任誕", 31, "殷洪喬作豫章郡，臨去，都下人因附百許函書。既至石頭，悉擲水中，因祝曰：「沈者自沈，浮者自浮，殷洪喬不能作致書郵。」", "은홍교(殷洪喬, 殷羨)가 예장군(豫章郡)의 태수가 되어 떠날 즈음에, 도읍 사람들이 백여 통의 편지를 그에게 부탁하였다. 석두(石頭)에 이르자 모두 물속에 던져 넣고는 이렇게 빌었다. \"가라앉을 것은 절로 가라앉고 뜰 것은 절로 뜨라. 은홍교는 편지 배달부 노릇을 할 수 없노라.\"", ["풍류", "오만"]], ["任誕", 32, "王長史、謝仁祖同為王公掾。長史云：「謝掾能作異舞。」謝便起舞，神意甚暇。王公熟視，謂客曰：「使人思安豐。」", "왕장사(王長史, 王濛)와 사인조(謝仁祖, 謝尚)가 함께 왕공(王公, 王導)의 속관이 되었다. 장사가 말했다. \"사 속관(謝掾, 謝尚)은 기이한 춤을 잘 춥니다.\" 사상이 곧 일어나 춤을 추니 정신과 뜻이 매우 한가로웠다. 왕공이 찬찬히 바라보고 손님에게 말했다. \"사람으로 하여금 안풍(安豐, 王戎)을 생각나게 하는구려.\"", ["풍류", "비평", "음악"]], ["任誕", 33, "王、劉共在杭南，酣宴於桓子野家。謝鎮西往尚書墓還，葬後三日反哭。諸人欲要之，初遣一信，猶未許，然已停車。重要，便回駕。諸人門外迎之，把臂便下，裁得脫幘箸帽。酣宴半坐，乃覺未脫衰。", "왕씨(王氏, 王濛)와 유씨(劉氏, 劉惔)가 함께 항남(杭南)에 있으면서 환자야(桓子野, 桓伊)의 집에서 흥겹게 잔치를 벌였다. 사진서(謝鎭西, 謝尚)가 상서(尙書)의 묘에 갔다가 돌아오는 길이었는데, 장례 후 사흘째 되는 날 곡을 하고 돌아오는 중이었다. 여러 사람이 그를 청하고자 처음 한 번 사람을 보내니 아직 허락하지 않았으나, 이미 수레는 멈춰 있었다. 거듭 청하니 곧 수레를 돌렸다. 여러 사람이 문밖에서 그를 맞이하여 팔을 잡고 곧 내리게 하니, 겨우 두건을 벗고 모자를 쓸 수 있었다. 흥겹게 잔치하던 자리가 절반쯤 지나서야 아직 상복을 벗지 못한 것을 깨달았다.", ["술과취흥", "풍류", "우정"]], ["任誕", 34, "桓宣武少家貧，戲大輸，債主敦求甚切，思自振之方，莫知所出。陳郡袁躭，俊邁多能。宣武欲求救於躭，躭時居艱，恐致疑，試以告焉。應聲便許，略無嫌吝。遂變服懷布帽隨溫去，與債主戲。躭素有蓺名，債主就局曰：「汝故當不辦作袁彥道邪？」遂共戲。十萬一擲，直上百萬數。投馬絕叫，傍若無人，探布帽擲對人曰：「汝竟識袁彥道不？」", "환선무(桓宣武, 桓溫)는 젊어서 집이 가난하였는데, 노름에 크게 져서 빚쟁이의 독촉이 매우 다급하였으나 스스로 떨쳐 일어날 방도를 생각해도 어찌할 바를 몰랐다. 진군(陳郡)의 원탐(袁躭)은 빼어나고 재능이 많은 사람이었다. 환온이 원탐에게 도움을 청하고자 하였으나, 원탐이 당시 상중에 있어 의심을 살까 두려워, 시험 삼아 그 일을 알렸다. 원탐은 말이 떨어지기 무섭게 승낙하며 조금도 꺼리거나 인색해하지 않았다. 마침내 옷을 갈아입고 베로 만든 모자를 품에 넣은 채 환온을 따라가 빚쟁이와 노름을 하였다. 원탐은 본디 노름 재주로 이름이 있었는데, 빚쟁이가 판에 다가와 말했다. \"너는 설마 원언도(袁彥道, 袁躭)처럼 할 수는 없겠지?\" 마침내 함께 노름을 하였다. 십만 전을 한 번에 던져 곧장 백만의 액수까지 올라갔다. 패를 던지며 큰 소리로 외치고 곁에 사람이 없는 듯이 행동하더니, 품에서 베 모자를 꺼내 상대에게 던지며 말했다. \"너는 끝내 원언도를 알아보겠느냐 못 알아보겠느냐?\"", ["술수", "우정", "재능"]], ["任誕", 35, "王光祿云：「酒，正使人人自遠。」", "왕광록(王光祿, 王蘊)이 말했다. \"술이란 바로 사람마다 스스로 초연해지게 한다.\"", ["술과취흥", "풍류"]], ["任誕", 36, "劉尹云：「孫承公狂士，每至一處，賞翫累日，或回至半路卻返。」", "유윤(劉尹, 劉惔)이 말했다. \"손승공(孫承公, 孫統)은 미친 선비라, 어느 곳에 이를 때마다 며칠씩 구경하며 즐기고, 어떤 때는 돌아오다가 반쯤 와서 다시 되돌아가기도 한다.\"", ["자연과산수", "풍류"]], ["任誕", 37, "袁彥道有二妹：一適殷淵源，一適謝仁祖。語桓宣武云：「恨不更有一人配卿。」", "원언도(袁彥道, 袁躭)에게는 두 누이가 있었는데, 하나는 은연원(殷淵源, 殷浩)에게 시집가고 하나는 사인조(謝仁祖, 謝尚)에게 시집갔다. 환선무(桓宣武, 桓溫)에게 말했다. \"한 사람을 더 두어 그대에게 짝지어 주지 못함이 한스럽소.\"", ["부부", "기지"]], ["任誕", 38, "桓車騎在荊州，張玄為侍中，使至江陵，路經陽岐村，俄見一人，持半小籠生魚，徑來造船云：「有魚，欲寄作膾。」張乃維舟而納之。問其姓字，稱是劉遺民。張素聞其名，大相忻待。劉既知張銜命，問：「謝安、王文度並佳不？」張甚欲話言，劉了無停意。既進膾，便去，云：「向得此魚，觀君船上當有膾具，是故來耳。」於是便去。張乃追至劉家，為設酒，殊不清旨。張高其人，不得已而飲之。方共對飲，劉便先起，云：「今正伐荻，不宜久廢。」張亦無以留之。", "환거기(桓車騎, 桓沖)가 형주(荊州)에 있을 때, 장현(張玄)이 시중(侍中)이 되어 강릉(江陵)에 사신으로 갔는데, 길에 양기촌(陽岐村)을 지나다가 문득 한 사람을 보니, 작은 광주리에 생선을 반쯤 들고서 곧장 배로 다가와 말했다. \"생선이 있으니 회를 떠 만들었으면 합니다.\" 장현이 이에 배를 매어 그를 들였다. 그 성명을 물으니 유유민(劉遺民)이라 하였다. 장현은 본래 그 이름을 들어왔던지라 크게 기뻐하며 대접하였다. 유유민은 장현이 명을 받들고 가는 줄 알고 물었다. \"사안(謝安)과 왕문도(王文度, 王坦之)는 모두 잘 지내십니까?\" 장현이 무척 이야기를 나누고 싶어 하였으나, 유유민은 도무지 머물 뜻이 없었다. 회를 들이고 나자 곧 떠나며 말했다. \"아까 이 생선을 얻었는데, 그대 배에 회 뜨는 도구가 있을 듯하여 그래서 온 것뿐이오.\" 이에 곧 떠났다. 장현이 유유민의 집까지 뒤쫓아가니 술을 차려주었는데 도무지 맑고 좋지 않았다. 장현은 그 사람을 높이 여겨 마지못해 그 술을 마셨다. 막 마주하여 마시려는데 유유민이 곧 먼저 일어나 말했다. \"지금 마침 갈대를 베는 중이라 오래 멈추는 것은 마땅치 않소.\" 장현도 그를 붙잡을 도리가 없었다.", ["은둔", "풍류", "거절"]], ["任誕", 39, "王子猷詣郗雍州，雍州在內，見有毾，云：「阿乞那得此物？」令左右送還家。郗出覓之，王曰：「向有大力者負之而趨。」郗無忤色。", "왕자유(王子猷, 王徽之)가 치옹주(郗雍州, 郗恢)를 찾아갔는데, 옹주가 안에 있을 때 모담요(毾㲪)가 있는 것을 보고 말했다. \"아걸(阿乞)은 어디서 이런 물건을 얻었는가?\" 그러고는 곁의 사람을 시켜 그것을 자기 집으로 보내게 하였다. 치회(郗恢)가 나와서 그것을 찾으니 왕휘지(王徽之)가 말했다. \"아까 힘센 자가 그것을 짊어지고 달아났소.\" 치회는 거스르는 기색이 없었다.", ["기지", "오만", "도량"]], ["任誕", 40, "謝安始出西戲，失車牛，便杖策步歸。道逢劉尹，語曰：「安石將無傷？」謝乃同載而歸。", "사안(謝安)이 처음 서쪽으로 나가 놀다가 수레의 소를 잃고는, 곧 지팡이를 짚고 걸어서 돌아왔다. 도중에 유윤(劉尹, 劉惔)을 만나니, 그가 말했다. \"안석(安石, 謝安)은 상하지 않으셨소?\" 사안은 이에 함께 수레를 타고 돌아왔다.", ["풍류", "우정"]], ["任誕", 41, "襄陽羅友有大韻，少時多謂之癡。嘗伺人祠，欲乞食，往太蚤，門未開。主人迎神出見，問以非時，何得在此？答曰：「聞卿祠，欲乞一頓食耳。」遂隱門側。至曉，得食便退，了無怍容。為人有記功，從桓宣武平蜀，按行蜀城闕觀宇，內外道陌廣狹，植種果竹多少，皆默記之。後宣武漂洲與簡文集，友亦預焉。共道蜀中事，亦有所遺忘，友皆名列，曾無錯漏。宣武驗以蜀城闕簿，皆如其言。坐者歎服。謝公云：「羅友詎減魏陽元！」後為廣州刺史，當之鎮，刺史桓豁語令莫來宿。答曰：「民已有前期。主人貧，或有酒饌之費，見與甚有舊，請別日奉命。」征西密遣人察之。至日，乃往荊州門下書佐家，處之怡然，不異勝達。在益州語兒云：「我有五百人食器。」家中大驚。其由來清，而忽有此物，定是二百五十沓烏樏。", "양양(襄陽)의 나우(羅友)는 큰 운치가 있었으나, 젊었을 때에는 사람들이 그를 어리석다 여기는 일이 많았다. 일찍이 남이 제사 지내는 것을 엿보아 음식을 얻어먹으려 했는데, 너무 일찍 가서 문이 아직 열리지 않았다. 주인이 신을 맞이하러 나오다가 그를 보고, 때도 아닌데 어찌 여기 있느냐고 물으니, 그가 답하기를 \"그대가 제사 지낸다는 말을 듣고 한 끼 밥을 얻어먹으려 했을 뿐이오\"라 하고는, 마침내 문 옆에 숨어 있었다. 새벽이 되자 음식을 얻고서 곧 물러갔는데, 전혀 부끄러워하는 기색이 없었다. 사람됨이 기억력이 뛰어나, 환선무(환온, 桓溫)를 따라 촉(蜀)을 평정할 때, 촉성(蜀城)의 궐과 누대 사당, 안팎의 길이 넓고 좁은 것, 심은 과실과 대나무가 많고 적은 것을 두루 둘러보고 모두 묵묵히 기억하였다. 뒤에 선무(환온)가 표주(漂洲)에서 간문제(簡文)와 모였는데 나우 또한 그 자리에 참석하였다. 함께 촉중의 일을 이야기하다가 잊어버린 것이 있어도, 나우가 모두 조목조목 들어 말하니 한 군데도 틀리거나 빠진 것이 없었다. 선무가 촉성 궐의 장부로 대조해 보니 모두 그의 말과 같았다. 자리에 있던 이들이 탄복하였다. 사공(사안, 謝安)이 말하기를 \"나우가 어찌 위양원(魏陽元)만 못하겠는가!\"라 하였다. 뒤에 광주자사(廣州刺史)가 되어 부임지로 가려 할 때, 자사 환활(桓豁)이 그에게 내일은 와서 묵으라고 일렀다. 그가 답하기를 \"제게는 이미 먼저 한 약속이 있습니다. 그 주인은 가난하여 혹 술과 음식 차리는 비용이 들 터인데, 저와는 매우 오랜 친분이 있으니, 다른 날 명을 받들기를 청합니다\"라 하였다. 정서장군(환활)이 몰래 사람을 보내 그를 살피게 하였다. 그날이 되니 그는 형주(荊州)의 문하 서좌(書佐)의 집으로 가서, 그곳에 태연히 거하기를 뛰어난 명사를 대하는 것과 다름없이 하였다. 익주(益州)에 있을 때 아들에게 말하기를 \"내게 오백 인분의 식기가 있다\"라 하니, 집안에서 크게 놀랐다. 그는 본래 청렴하였는데 갑자기 이런 물건이 있다 하니, 알고 보니 검은 칠을 한 식합(食盒) 이백오십 개였다.", ["기지", "재능", "청빈"]], ["任誕", 42, "桓子野每聞清歌，輒喚：「奈何！」謝公聞之曰：「子野可謂一往有深情。」", "환자야(환이, 桓伊)는 맑은 노랫소리를 들을 때마다 곧 \"어쩌란 말인가!\"라 외쳤다. 사공(사안, 謝安)이 이를 듣고 말하기를 \"자야는 한결같이 깊은 정을 지녔다 할 만하다\"라 하였다.", ["음악", "풍류"]], ["任誕", 43, "張湛好於齋前種松柏。時袁山松出遊，每好令左右作挽歌。時人謂「張屋下陳屍，袁道上行殯」。", "장담(張湛)은 서재 앞에 소나무와 잣나무 심기를 좋아하였다. 그때 원산송(袁山松)은 놀러 나갈 때마다 늘 좌우에게 만가(挽歌)를 부르게 하기를 좋아하였다. 당시 사람들이 이를 두고 \"장담은 집 아래에 시체를 늘어놓고, 원산송은 길 위에서 상여를 행한다\"라 하였다.", ["풍류", "죽음"]], ["任誕", 44, "羅友作荊州從事，桓宣武為王車騎集別。友進坐良久，辭出，宣武曰：「卿向欲咨事，何以便去？」答曰：「友聞白羊肉美，一生未曾得喫，故冒求前耳。無事可咨。今已飽，不復須駐。」了無慚色。", "나우(羅友)가 형주(荊州)의 종사(從事)로 있을 때, 환선무(환온, 桓溫)가 왕거기(王車騎)를 위해 송별 모임을 베풀었다. 나우가 들어가 앉은 지 한참 만에 하직하고 나가려 하니, 선무가 말하기를 \"그대는 아까 일을 여쭈려 하더니 어찌 곧 가는가?\"라 하였다. 그가 답하기를 \"제가 흰 양고기가 맛있다는 말을 들었으나 평생 한 번도 먹어본 적이 없어, 그래서 무릅쓰고 와서 앞에 나아갔을 뿐입니다. 여쭐 일은 없습니다. 이제 이미 배가 부르니 더 머무를 필요가 없습니다\"라 하고는, 전혀 부끄러워하는 기색이 없었다.", ["기지", "오만", "풍류"]], ["任誕", 45, "張驎酒後挽歌甚悽苦，桓車騎曰：「卿非田橫門人，何乃頓爾至致？」", "장린(張驎)이 술 마신 뒤에 부르는 만가가 매우 처량하고 애절하니, 환거기(환충, 桓沖)가 말하기를 \"그대는 전횡(田橫)의 문인도 아닌데 어찌 이리도 절절한 경지에 이르는가?\"라 하였다.", ["음악", "술과취흥"]], ["任誕", 46, "王子猷嘗暫寄人空宅住，便令種竹。或問：「暫住何煩爾？」王嘯詠良久，直指竹曰：「何可一日無此君？」", "왕자유(왕휘지, 王徽之)가 일찍이 잠시 남의 빈집을 빌려 묵게 되었는데, 곧 대나무를 심게 하였다. 누군가 묻기를 \"잠시 머무는데 어찌 그리 번거롭게 하시오?\"라 하니, 왕이 한참 휘파람 불며 읊조리다가 곧장 대나무를 가리키며 말하기를 \"어찌 하루인들 이 군자 없이 지낼 수 있겠는가?\"라 하였다.", ["풍류", "은둔"]], ["任誕", 47, "王子猷居山陰，夜大雪，眠覺，開室，命酌酒。四望皎然，因起仿偟，詠左思招隱詩。忽憶戴安道，時戴在剡，即便夜乘小船就之。經宿方至，造門不前而返。人問其故，王曰：「吾本乘興而行，興盡而返，何必見戴？」", "왕자유(왕휘지, 王徽之)가 산음(山陰)에 살았는데, 밤에 큰 눈이 내려 잠에서 깨어 방문을 열고 술을 따르게 하였다. 사방을 둘러보니 온통 환하게 밝아, 이에 일어나 거닐며 좌사(左思)의 「초은시(招隱詩)」를 읊었다. 문득 대안도(대규, 戴逵)가 생각났는데, 그때 대규는 섬(剡)에 있었다. 곧바로 밤에 작은 배를 타고 그를 찾아갔다. 밤을 새워 비로소 이르렀으나, 문 앞에 이르고도 들어가지 않고 돌아왔다. 사람들이 그 까닭을 물으니, 왕이 말하기를 \"나는 본래 흥에 겨워 갔다가 흥이 다해 돌아왔으니, 어찌 꼭 대규를 만나야 하겠는가?\"라 하였다.", ["풍류", "자연과산수", "술과취흥"]], ["任誕", 48, "王衛軍云：「酒正自引人箸勝地。」", "왕위군(왕희지, 王羲之)이 말하기를 \"술은 참으로 사람을 좋은 경지로 끌어들인다\"라 하였다.", ["술과취흥", "풍류"]], ["任誕", 49, "王子猷出都，尚在渚下。舊聞桓子野善吹笛，而不相識。遇桓於岸上過，王在船中，客有識之者云：「是桓子野。」王便令人與相聞云：「聞君善吹笛，試為我一奏。」桓時已貴顯，素聞王名，即便回下車，踞胡牀，為作三調。弄畢，便上車去。客主不交一言。", "왕자유(왕휘지, 王徽之)가 도성으로 가던 중, 아직 물가에 머물러 있었다. 전부터 환자야(환이, 桓伊)가 피리를 잘 분다는 말은 들었으나 서로 알지는 못하였다. 마침 환이가 강 언덕 위를 지나가는데, 왕은 배 안에 있었고, 손님 중에 그를 아는 이가 말하기를 \"저 사람이 환자야요\"라 하였다. 왕이 곧 사람을 시켜 그에게 전하기를 \"그대가 피리를 잘 분다 들었으니, 한번 나를 위해 한 곡 불어주시오\"라 하였다. 환이는 그때 이미 귀하고 현달한 신분이었으나 평소 왕의 명성을 들어왔던 터라, 곧 수레를 돌려 내려와 호상(胡牀)에 걸터앉아 세 곡조를 불어주었다. 다 부르고 나서는 곧 수레에 올라 떠났다. 손님과 주인은 한마디도 나누지 않았다.", ["음악", "풍류"]], ["任誕", 50, "桓南郡被召作太子洗馬，船泊荻渚。王大服散後已小醉，往看桓。桓為設酒，不能冷飲，頻語左右：「令溫酒來！」桓乃流涕嗚咽，王便欲去。桓以手巾掩淚，因謂王曰：「犯我家諱，何預卿事？」王歎曰：「靈寶故自達。」", "환남군(환현, 桓玄)이 부름을 받아 태자세마(太子洗馬)가 되어, 배를 적저(荻渚)에 댔다. 왕대(왕침, 王忱)가 산(散)을 복용한 뒤 이미 약간 취해 있었는데, 환현을 보러 갔다. 환현이 그를 위해 술을 차렸으나, 왕대가 찬 술은 마시지 못하여 자꾸 좌우에게 \"따뜻한 술을 가져오라!\"라고 하였다. 그러자 환현이 눈물을 흘리며 흐느꼈다. 왕대가 곧 떠나려 하니, 환현이 수건으로 눈물을 가리며 왕대에게 말하기를 \"제 집안의 휘(諱)를 범한 것이니, 어찌 그대의 일이겠소?\"라 하였다. 왕대가 탄식하며 말하기를 \"영보(靈寶)는 참으로 통달한 사람이로다\"라 하였다.", ["효", "술과취흥", "죽음"]], ["任誕", 51, "王孝伯問王大：「阮籍何如司馬相如？」王大曰：「阮籍胸中壘塊，故須酒澆之。」", "왕효백(왕공, 王恭)이 왕대(왕침, 王忱)에게 묻기를 \"완적(阮籍)은 사마상여(司馬相如)와 견주면 어떠합니까?\"라 하니, 왕대가 답하기를 \"완적은 가슴속에 쌓인 응어리가 있어, 그래서 술로 씻어내야 했던 것이오\"라 하였다.", ["술과취흥", "비평"]], ["任誕", 52, "王佛大歎言：「三日不飲酒，覺形神不復相親。」", "왕불대(왕침, 王忱)가 탄식하여 말하기를 \"사흘만 술을 마시지 않으면 몸과 정신이 다시는 서로 친하지 않은 듯하다\"라 하였다.", ["술과취흥"]], ["任誕", 53, "王孝伯言：「名士不必須奇才。但使常得無事，痛飲酒，熟讀離騷，便可稱名士。」", "왕효백(왕공, 王恭)이 말하기를 \"명사(名士)에게 반드시 뛰어난 재주가 있어야 하는 것은 아니다. 다만 늘 일 없이 지내며 술을 실컷 마시고 『이소(離騷)』를 익히 읽기만 하면 곧 명사라 일컬을 만하다\"라 하였다.", ["술과취흥", "비평", "풍류"]], ["任誕", 54, "王長史登茅山，大慟哭曰：「琅邪王伯輿，終當為情死。」", "왕장사(왕몽, 王濛)가 모산(茅山)에 올라 크게 통곡하며 말하기를 \"낭야(琅邪)의 왕백여(王伯輿)는 끝내 정(情) 때문에 죽으리라\"라 하였다.", ["풍류", "죽음"]], ["簡傲", 1, "晉文王功德盛大，坐席嚴敬，擬於王者。唯阮籍在坐，箕踞嘯歌，酣放自若。", "진(晉)나라 문왕(사마소, 司馬昭)은 공덕이 성대하여, 그 자리에는 엄숙하고 공경스러움이 마치 왕자(王者)를 대하는 것 같았다. 오직 완적(阮籍)만은 그 자리에 있으면서 두 다리를 뻗고 앉아 휘파람 불며 노래하고, 술에 취해 거리낌 없이 평소처럼 행동하였다.", ["술과취흥", "오만", "풍류"]], ["簡傲", 2, "王戎弱冠詣阮籍，時劉公榮在坐。阮謂王曰：「偶有二斗美酒，當與君共飲。彼公榮者，無預焉。」二人交觴酬酢，公榮遂不得一桮。而言語談戲，三人無異。或有問之者，阮答曰：「勝公榮者，不得不與飲酒；不如公榮者，不可不與飲酒；唯公榮，可不與飲酒。」", "왕융(王戎)이 약관의 나이에 완적(阮籍)을 찾아갔는데, 그때 유공영(劉公榮)이 자리에 있었다. 완적이 왕융에게 말하기를 \"마침 좋은 술 두 말이 있으니, 마땅히 그대와 함께 마셔야겠소. 저 공영이라는 자는 끼지 못하오\"라 하였다. 두 사람은 술잔을 주고받으며 마셨으나 공영은 끝내 한 잔도 얻지 못하였다. 그러나 이야기를 나누고 농담하는 데에는 세 사람이 다름이 없었다. 누군가 그 까닭을 물으니, 완적이 답하기를 \"공영보다 나은 자와는 함께 술을 마시지 않을 수 없고, 공영만 못한 자와도 함께 술을 마시지 않을 수 없으나, 오직 공영만은 함께 술을 마시지 않아도 되오\"라 하였다.", ["술과취흥", "우정", "비평"]], ["簡傲", 3, "鍾士季精有才理，先不識嵇康。鍾要于時賢儁之士，俱往尋康。康方大樹下鍛，向子期為佐鼓排。康揚槌不輟，傍若無人，移時不交一言。鍾起去，康曰：「何所聞而來？何所見而去？」鍾曰：「聞所聞而來，見所見而去。」", "종사계(종회, 鍾會)는 빼어난 재주와 명리(名理)를 지녔으나, 앞서 혜강(嵇康)과는 알지 못하였다. 종회가 당시의 어질고 빼어난 인사들을 불러 함께 혜강을 찾아갔다. 혜강은 마침 큰 나무 아래에서 쇠를 두드리고 있었고, 향자기(향수, 向秀)가 풀무질을 도와주고 있었다. 혜강은 망치를 휘두르기를 그치지 않으며 곁에 아무도 없는 듯이 하여, 한참이 지나도록 한마디도 나누지 않았다. 종회가 일어나 떠나려 하니, 혜강이 말하기를 \"무엇을 듣고 왔으며, 무엇을 보고 떠나는가?\"라 하니, 종회가 답하기를 \"들은 것을 듣고 왔으며, 본 것을 보고 떠나오\"라 하였다.", ["기지", "오만", "청담"]], ["簡傲", 4, "嵇康與呂安善，每一相思，千里命駕。\n安後來，值康不在，喜出戶延之，不入。題門上作「鳳」字而去。喜不覺，猶以為欣，故作。「鳳」字，凡鳥也。", "혜강(嵇康)은 여안(呂安)과 사이가 좋아, 서로 그리울 때마다 천 리 길에도 수레를 몰았다. 여안이 뒤에 찾아왔을 때 마침 혜강이 없었는데, 혜희(嵇喜)가 문을 나서 그를 맞아들이려 했으나 여안은 들어가지 않고, 문 위에 \"봉(鳳)\" 자를 써놓고 떠났다. 혜희는 그 뜻을 깨닫지 못하고 도리어 기뻐하였으니, 그래서 \"봉\" 자를 쓴 것이었다. \"봉(鳳)\" 자는 곧 보통의 새〔凡鳥〕라는 뜻이었다.", ["우정", "기지", "비평"]], ["簡傲", 5, "陸士衡初入洛，咨張公所宜詣；劉道真是其一。陸既往，劉尚在哀制中。性嗜酒，禮畢，初無他言，唯問：「東吳有長柄壺盧，卿得種來不？」陸兄弟殊失望，乃悔往。", "육사형(육기, 陸機)이 처음 낙양(洛陽)에 들어갔을 때, 장공(장화, 張華)에게 찾아가 마땅히 만나야 할 사람을 물으니, 유도진(劉道眞)이 그중 하나였다. 육기가 찾아갔을 때 유도진은 아직 상중(喪中)에 있었다. 그는 천성이 술을 즐겼는데, 예를 마치고 나서도 처음에는 다른 말은 없이 다만 묻기를 \"동오(東吳)에는 자루가 긴 표주박이 있다는데, 그대는 그 씨앗을 얻어 왔는가?\"라고만 하였다. 육기 형제는 몹시 실망하여, 찾아온 것을 후회하였다.", ["술과취흥", "오만"]], ["簡傲", 6, "王平子出為荊州，王太尉及時賢送者傾路。時庭中有大樹，上有鵲巢。平子脫衣巾，徑上樹取鵲子。涼衣拘閡樹枝，便復脫去。得鵲子還，下弄，神色自若，傍若無人。", "왕평자(왕징, 王澄)가 형주(荊州)로 나가게 되자, 왕태위(왕연, 王衍)와 당시의 어진 이들이 전송하느라 길을 가득 메웠다. 그때 뜰 가운데 큰 나무가 있고 그 위에 까치집이 있었다. 평자가 옷과 두건을 벗고 곧장 나무에 올라가 새끼 까치를 잡았다. 속옷이 나뭇가지에 걸리자 곧 그것마저 벗어버렸다. 새끼 까치를 잡아 내려와서는 그것을 가지고 놀았는데, 신색(神色)이 태연하여 곁에 아무도 없는 듯하였다.", ["오만", "풍류"]], ["簡傲", 7, "高坐道人於丞相坐，恆偃臥其側。見卞令，肅然改容云：「彼是禮法人。」", "고좌(高坐) 도인이 승상(왕도, 王導)의 자리에서 늘 그 곁에 누워 있었다. 그러나 변령(卞壼)을 보면 엄숙히 낯빛을 고치며 말하기를 \"저분은 예법(禮法)을 지키는 사람이오\"라 하였다.", ["풍류", "비평"]], ["簡傲", 8, "桓宣武作徐州，時謝奕為晉陵。先粗經虛懷，而乃無異常。及桓還荊州，將西之間，意氣甚篤，奕弗之疑。唯謝虎子婦王悟其旨。\n每曰：「桓荊州用意殊異，必與晉陵俱西矣！」俄而引奕為司馬。奕既上，猶推布衣交。在溫坐，岸幘嘯詠，無異常日。宣武每曰：「我方外司馬。」遂因酒，轉無朝夕禮。桓舍入內，奕輒復隨去。後至奕醉，溫往主許避之。主曰：「君無狂司馬，我何由得相見？」", "환선무(환온, 桓溫)가 서주(徐州)를 다스릴 때, 그 무렵 사혁(謝奕)은 진릉(晉陵)을 맡고 있었다. 앞서 대략 마음을 터놓은 정도였을 뿐, 별다른 사이는 아니었다. 환온이 형주(荊州)로 돌아가 장차 서쪽으로 가려 할 무렵에는 정의가 매우 도타워졌으나, 사혁은 이를 의심하지 않았다. 오직 사호자(謝虎子)의 아내 왕씨만이 그 뜻을 알아차렸다. 그녀는 늘 말하기를 \"환형주(환온)의 마음 씀이 자못 별스러우니, 반드시 진릉(사혁)과 함께 서쪽으로 갈 것이다!\"라 하였다. 이윽고 사혁을 끌어다 사마(司馬)로 삼았다. 사혁은 부임한 뒤에도 여전히 포의(布衣)의 사귐을 내세웠다. 환온의 자리에서 두건을 비스듬히 쓰고 휘파람 불며 읊조리기를 평소와 다름없이 하였다. 선무는 늘 말하기를 \"나의 방외(方外)의 사마로다\"라 하였다. 마침내 술에 기대어 더욱 아침저녁의 예의도 없어졌다. 환온이 자리를 떠나 안으로 들어가면 사혁은 그때마다 또 따라 들어갔다. 뒤에 사혁이 취하기에 이르자, 환온은 안주인의 처소로 가서 그를 피하였다. 안주인이 말하기를 \"그대에게 미친 사마가 없었다면, 내가 어찌 그대를 만날 수 있었겠소?\"라 하였다.", ["우정", "예언", "풍류"]], ["簡傲", 9, "謝萬在兄前，欲起索便器。于時阮思曠在坐曰：「新出門戶，篤而無禮。」", "사만(謝萬)이 형 앞에서 일어나 요강을 찾으려 하였다. 그때 완사광(阮思曠)이 자리에 있다가 말하기를 \"새로 일어난 가문이라 도탑긴 하나 예의가 없구나\"라 하였다.", ["오만", "비평"]], ["簡傲", 10, "謝中郎是王藍田女壻，嘗箸白綸巾，肩輿徑至揚州聽事見王，直言曰：「人言君侯癡，君侯信自癡。」藍田曰：「非無此論，但晚令耳。」", "사중랑(사만, 謝萬)은 왕남전(왕술, 王述)의 사위였는데, 일찍이 흰 윤건(綸巾)을 쓰고 가마를 타고 곧장 양주(揚州)의 청사로 가서 왕술을 보고는 대뜸 말하기를 \"사람들이 군후(君侯)께서 어리석다 하더니, 군후께서는 참으로 어리석으십니다\"라 하였다. 남전(왕술)이 말하기를 \"그런 말이 없는 것은 아니다. 다만 내가 늦게야 이름을 얻었을 뿐이다\"라 하였다.", ["오만", "기지"]], ["簡傲", 11, "王子猷作桓車騎騎兵參軍，桓問曰：「卿何署？」答曰：「不知何署，時見牽馬來，似是馬曹。」桓又問：「官有幾馬？」答曰：「不問馬，何由知其數？」又問：「馬比死多少？」答曰：「未知生，焉知死？」", "왕자유(왕휘지, 王徽之)가 환거기(환충, 桓沖)의 기병참군(騎兵參軍)이 되었는데, 환충이 묻기를 \"그대는 어느 관서에 있는가?\"라 하니, 답하기를 \"어느 관서인지 모르겠으나, 때때로 말을 끌고 오는 것을 보니 마조(馬曹)인 듯합니다\"라 하였다. 환충이 또 묻기를 \"관아에 말이 몇 마리 있는가?\"라 하니, 답하기를 \"말을 묻지 않거늘 어찌 그 수를 알겠습니까?\"라 하였다. 또 묻기를 \"근래 말이 죽은 것은 얼마나 되는가?\"라 하니, 답하기를 \"삶도 아직 모르거늘 어찌 죽음을 알겠습니까?\"라 하였다.", ["기지", "오만", "청담"]], ["簡傲", 12, "謝公嘗與謝萬共出西，過吳郡。阿萬欲相與共萃王恬許，太傅云：「恐伊不必酬汝，意不足爾！」萬猶苦要，太傅堅不回，萬乃獨往。坐少時，王便入門內，謝殊有欣色，以為厚待已。良久，乃沐頭散髮而出，亦不坐，仍據胡牀，在中庭曬頭，神氣傲邁，了無相酬對意。謝於是乃還。未至船，逆呼太傅。安曰：「阿螭不作爾！」", "사공(사안, 謝安)이 일찍이 사만(謝萬)과 함께 서쪽으로 나가다가 오군(吳郡)을 지나게 되었다. 아만(사만)이 함께 왕념(王恬)의 처소에 가 머물려 하니, 태부(사안)가 말하기를 \"아마 그가 반드시 너를 상대해 주지는 않을 것이고, 내키지 않아 할 것이다\"라 하였다. 사만이 그래도 간곡히 청하니, 태부가 굳이 마음을 돌리지 않으므로 사만이 혼자 갔다. 앉은 지 얼마 되지 않아 왕념이 곧 문 안으로 들어가니, 사만은 자못 기뻐하는 빛이 있어 자기를 후하게 대접하는 것이라 여겼다. 한참 만에 왕념은 머리를 감고 머리를 풀어헤친 채 나왔는데, 앉지도 않고 그대로 호상(胡牀)에 걸터앉아 뜰 가운데서 머리를 말리며, 신기(神氣)가 오만하고 거만하여 전혀 상대하려는 뜻이 없었다. 사만은 이에 곧 돌아왔다. 배에 이르기도 전에 멀리서 태부를 불렀다. 사안이 말하기를 \"아리(阿螭, 왕념)는 그러지 않을 것이다\"라 하였다.", ["오만", "비평"]], ["簡傲", 13, "王子猷作桓車騎參軍。桓謂王曰：「卿在府久，比當相料理。」初不答，直高視，以手版拄頰云：「西山朝來，致有爽氣。」", "왕자유(왕휘지, 王徽之)가 환거기(환충, 桓沖)의 참군이 되었다. 환충이 왕에게 말하기를 \"그대가 부(府)에 있은 지 오래되었으니, 마땅히 그대 일을 처리해 주어야겠소\"라 하였다. 왕은 처음에는 답하지 않고 그저 높이 바라보다가, 손에 든 홀(笏)로 뺨을 괴며 말하기를 \"서산(西山)에 아침이 오니, 자못 상쾌한 기운이 이르는구나\"라 하였다.", ["오만", "풍류"]], ["簡傲", 14, "謝萬北征，常以嘯詠自高，未嘗撫慰眾士。謝公甚器愛萬，而審其必敗，乃俱行。從容謂萬曰：「汝為元帥，宜數喚諸將宴會，以說眾心。」萬從之。因召集諸將，都無所說，直以如意指四坐云：「諸君皆是勁卒。」諸將甚忿恨之。謝公欲深箸恩信，自隊主將帥以下，無不身造，厚相遜謝。及萬事敗，軍中因欲除之。復云：「當為隱士。」故幸而得免。", "사만(謝萬)이 북벌(北征)에 나섰을 때, 늘 휘파람 불며 읊조리기로 스스로 높은 체하고, 한 번도 여러 장병들을 위로한 적이 없었다. 사공(사안, 謝安)은 사만을 매우 아꼈으나 그가 반드시 패할 것을 살펴 알고, 이에 함께 갔다. 조용히 사만에게 일러 말하기를 \"너는 원수(元帥)이니, 마땅히 여러 장수들을 자주 불러 연회를 베풀어 뭇 사람의 마음을 기쁘게 해야 한다\"라 하였다. 사만이 그 말을 따랐다. 이에 여러 장수들을 불러 모았으나 아무 말도 하지 않고, 그저 여의(如意)로 사방의 자리를 가리키며 말하기를 \"그대들은 모두 굳센 병졸이오\"라 하였다. 여러 장수들이 그를 몹시 분하게 여기고 원망하였다. 사공이 깊이 은혜와 신의를 베풀고자 하여, 부대의 우두머리 장수로부터 그 아래에 이르기까지 몸소 찾아가지 않은 곳이 없이 두텁게 겸손히 사례하였다. 사만의 일이 실패하기에 이르러 군중(軍中)에서 그를 죽이려 하였다. 그러나 다시 말하기를 \"이분(사안)을 위해서라도 은사(隱士)로 두는 것이 마땅하다\"라 하였다. 그래서 다행히 화를 면할 수 있었다.", ["겸손", "도량", "권력"]], ["簡傲", 15, "王子敬兄弟見郗公，躡履問訊，甚脩外生禮。及嘉賓死，皆箸高屐，儀容輕慢。命坐，皆云：「有事，不暇坐。」既去，郗公慨然曰：「使嘉賓不死，鼠輩敢爾！」", "왕자경(왕헌지, 王獻之) 형제가 치공(치음, 郗愔)을 뵐 때에는 신을 끌며 문안드리고 외숙에 대한 예를 매우 정중히 갖추었다. 그러나 가빈(치초, 郗超)이 죽고 나서는 모두 굽 높은 나막신을 신고 와서 거동이 가볍고 거만하였다. 앉으라 명하면 모두 \"일이 있어 앉을 겨를이 없습니다\"라 하였다. 그들이 떠난 뒤에 치공이 개탄하며 말하기를 \"가빈(치초)이 죽지 않았다면 쥐새끼 같은 놈들이 감히 이러겠는가!\"라 하였다.", ["오만", "원한"]], ["簡傲", 16, "王子猷嘗行過吳中，見一士大夫家，極有好竹。主已知子猷當往，乃灑埽施設，在聽事坐相待。王肩輿徑造竹下，諷嘯良久。主已失望，猶冀還當通，遂直欲出門。主人大不堪，便令左右閉門不聽出。王更以此賞主人，乃留坐，盡歡而去。", "왕자유(왕휘지, 王徽之)가 일찍이 오중(吳中)을 지나다가 한 사대부의 집에 매우 좋은 대나무가 있는 것을 보았다. 주인은 이미 자유가 오리라는 것을 알고 물 뿌리고 청소한 뒤 자리를 마련하고 청사(聽事)에 앉아 기다렸다. 왕은 가마를 타고 곧장 대나무 아래로 가서 한참 동안 읊조리며 휘파람을 불었다. 주인은 이미 실망하였으나, 그래도 돌아갈 때는 마땅히 들러 인사하리라 바랐는데, 왕은 마침내 곧장 문을 나서려 하였다. 주인이 몹시 참지 못하여 곧 좌우에게 문을 닫고 나가지 못하게 하였다. 왕은 이 일로 도리어 주인을 가상히 여겨, 마침내 머물러 앉아 흥을 다하고 떠났다.", ["풍류", "도량"]], ["簡傲", 17, "王子敬自會稽經吳，聞顧辟疆有名園。先不識主人，徑往其家，值顧方集賓友酣燕。而王遊歷既畢，指麾好惡，傍若無人。顧勃然不堪曰：「傲主人，非禮也；以貴驕人，非道也。失此二者，不足齒人，傖耳！」便驅其左右出門。王獨在輿上回轉，顧望左右移時不至，然後令送箸門外，怡然不屑。", "왕자경(王獻之)이 회계(會稽)에서 오(吳)를 지나다가 고벽강(顧辟疆)에게 이름난 정원이 있다는 말을 들었다. 그는 본래 주인과 면식이 없었으나 곧장 그 집으로 갔는데, 마침 고벽강은 빈객과 벗들을 모아 흥겹게 잔치를 벌이고 있었다. 그런데 왕자경은 정원을 두루 거닐고 나서 좋고 나쁨을 손가락질하며 평하기를, 곁에 사람이 없는 듯 하였다. 고벽강이 발끈하여 참지 못하고 말하였다. \"주인에게 오만한 것은 예가 아니요, 귀함으로 남에게 교만한 것은 도가 아니다. 이 두 가지를 잃었으니 사람 축에 들 것이 못 되는 촌놈일 뿐이다!\" 그러고는 좌우를 시켜 그를 문 밖으로 몰아냈다. 왕자경은 홀로 수레 위에서 빙빙 돌며 좌우의 종자들을 기다렸으나 한참이 지나도 오지 않았다. 그런 뒤에야 고벽강이 그를 문 밖으로 내보내게 하니, 왕자경은 태연하여 개의치 않았다.", ["오만", "도량"]], ["排調", 1, "諸葛瑾為豫州，遣別駕到臺，語云：「小兒知談，卿可與語。」連往詣恪，恪不與相見。後於張輔吳坐中相遇，別駕喚恪：「咄咄郎君。」恪因嘲之曰：「豫州亂矣，何咄咄之有？」答曰：「君明臣賢，未聞其亂。」恪曰：「昔唐堯在上，四凶在下。」答曰：「非唯四凶，亦有丹朱。」於是一坐大笑。", "제갈근(諸葛瑾)이 예주(豫州)를 다스릴 때 별가(別駕)를 도성(臺)으로 보내며 말하였다. \"내 아들이 담론을 할 줄 아니, 그대가 더불어 이야기해 볼 만하오.\" 별가가 잇따라 제갈각(諸葛恪)을 찾아갔으나 제갈각은 만나 주지 않았다. 뒤에 장보오(張輔吳)의 자리에서 서로 만났는데, 별가가 제갈각을 부르며 \"기세 등등한 도련님이로다\" 하였다. 제갈각이 이에 그를 조롱하여 말하였다. \"예주가 어지러운데 무슨 기세 등등함이 있겠소?\" 별가가 대답하였다. \"임금이 밝고 신하가 어진데 어지럽다는 말은 듣지 못했소.\" 제갈각이 말하였다. \"옛날 당요(唐堯)가 위에 계실 때에도 아래에 사흉(四凶)이 있었소.\" 별가가 대답하였다. \"사흉뿐 아니라 단주(丹朱)도 있었소.\" 이에 좌중이 크게 웃었다.", ["기지", "비평", "제갈씨"]], ["排調", 2, "晉文帝與二陳共車，過喚鍾會同載，即駛車委去。比出，已遠。既至，因嘲之曰：「與人期行，何以遲遲？望卿遙遙不至。」會答曰：「矯然懿實，何必同羣？」帝復問會：「臯繇何如人？」答曰：「上不及堯、舜，下不逮周、孔，亦一時之懿士。」", "진(晉) 문제(司馬昭)가 두 진씨(陳氏)와 함께 수레를 타고 가다가 종회(鍾會)를 지나며 불러 함께 타게 하였는데, 곧바로 수레를 몰아 버려두고 떠나 버렸다. 종회가 나왔을 때는 이미 멀리 가 있었다. 종회가 당도하자 문제가 그를 조롱하여 말하였다. \"사람과 동행하기로 약속하고서 어찌 그리 늦었는가? 그대가 멀리서 오지 않을까 바라보았네.\" 종회가 대답하였다. \"꿋꿋하고 아름다운 덕을 지녔으니 어찌 굳이 무리와 함께하겠습니까?\" 문제가 다시 종회에게 물었다. \"고요(臯繇)는 어떤 사람인가?\" 종회가 대답하였다. \"위로는 요(堯)·순(舜)에 미치지 못하고 아래로는 주공(周公)·공자(孔子)에 미치지 못하나, 또한 한 시대의 아름다운 선비입니다.\"", ["기지", "비평"]], ["排調", 3, "鍾毓為黃門郎，有機警，在景王坐燕飲。時陳羣子玄伯、武周子元夏同在坐，共嘲毓。景王曰：「臯繇何如人？」對曰：「古之懿士。」顧謂玄伯、元夏曰：「君子周而不比，羣而不黨。」", "종육(鍾毓)이 황문랑(黃門郎)으로 있을 때 기지와 민첩함이 있었는데, 경왕(景王)의 자리에서 잔치하며 술을 마셨다. 그때 진군(陳羣)의 아들 현백(玄伯)과 무주(武周)의 아들 원하(元夏)가 함께 자리에 있어 종육을 조롱하였다. 경왕이 말하였다. \"고요(臯繇)는 어떤 사람인가?\" 종육이 대답하였다. \"옛날의 아름다운 선비입니다.\" 그러고는 현백과 원하를 돌아보며 말하였다. \"군자는 두루 사귀되 편당하지 않고, 무리를 이루되 패거리를 짓지 않는다.\"", ["기지", "비평"]], ["排調", 4, "嵇、阮、山、劉在竹林酣飲，王戎後往。步兵曰：「俗物已復來敗人意！」王笑曰：「卿輩意，亦復可敗邪？」", "혜강(嵇康)·완적(阮籍)·산
