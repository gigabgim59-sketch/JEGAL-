      .liumen-subgroup-btn{ font-size:12px; }
      .liumen-subgroup-btn small{ font-size:9.5px; }
    }
    .liumen-card[data-pgroup-hidden="1"]{ display:none; }
  `;
  document.head.appendChild(style);

  // 4) liumenHtml 한 겹 더 감싸기
  const _prev = liumenHtml;
  liumenHtml = function(){
    // 人 탭이 아닐 때는 sub-그룹을 리셋해 두고 그대로 통과
    if (liumenCat !== "person") {
      window.personSubGroup = "all";
      return _prev();
    }
    let html = _prev();
    const sg = window.personSubGroup || "all";

    // (a) sub-toolbar 마크업 만들기 (각 그룹의 인원수도 함께)
    const persons = OBJECTS.filter(o=>o.type==="person");
    const counts = {};
    PERSON_GROUPS.forEach(g=>counts[g.key]=0);
    persons.forEach(o=>{
      const k = ID2GROUP[o.id];
      if (k) counts[k] = (counts[k]||0) + 1;
    });
    counts.all = persons.length;

    let bar = `<div class="liumen-subgroup">`;
    PERSON_GROUPS.forEach(g=>{
      bar += `<button class="liumen-subgroup-btn ${sg===g.key?"on":""}" `
           + `data-pgroup="${g.key}">${g.han}`
           + `<small>${g.ko} ${counts[g.key]||0}</small></button>`;
    });
    bar += `</div>`;
    if (sg !== "all") {
      const cur = PERSON_GROUPS.find(g=>g.key===sg);
      if (cur) bar += `<p class="liumen-subgroup-meta">${cur.han} (${cur.ko}) — ${counts[sg]||0}人</p>`;
    }

    // (b) 검색 박스 뒤(있다면), 또는 .liumen-tabs 닫힘 直後에 삽입
    //     原 HTML: …<div class="liumen-tabs"> ... </div><div class="liumen-cards">…
    html = html.replace(
      /(<div class="liumen-tabs">[\s\S]*?<\/div>)(\s*<div class="liumen-cards">)/,
      `$1${bar}$2`
    );

    // (c) 카드에 data-pgroup 부여 + 현재 그룹이 아니면 hidden 마크
    //     원본 카드 출력 순서는 items(=persons) 순서와 동일.
    let i = 0;
    html = html.replace(/<div class="liumen-card(?: on)?">/g, (m)=>{
      const o = persons[i++];
      if (!o) return m;
      const gk = ID2GROUP[o.id] || "?";
      const hidden = (sg !== "all" && gk !== sg) ? ` data-pgroup-hidden="1"` : "";
      return m.replace(/">$/, `" data-pgroup="${gk}" data-pid="${o.id}"${hidden}>`);
    });

    return html;
  };

  // 5) 이벤트 위임: sub-그룹 버튼 클릭 → 상태 갱신 후 render
  document.addEventListener("click", function(e){
    const btn = e.target.closest && e.target.closest(".liumen-subgroup-btn");
    if (!btn) return;
    const k = btn.dataset.pgroup;
    if (!k) return;
    window.personSubGroup = k;
    // 카드는 그대로 두고 표시/숨김만 토글하는 가벼운 경로 ── 펼침 상태 보존.
    const cur = window.personSubGroup;
    document.querySelectorAll(".liumen-subgroup-btn").forEach(b=>{
      b.classList.toggle("on", b.dataset.pgroup === cur);
    });
    document.querySelectorAll(".liumen-card[data-pgroup]").forEach(card=>{
      const gk = card.getAttribute("data-pgroup");
      if (cur === "all" || gk === cur) card.removeAttribute("data-pgroup-hidden");
      else card.setAttribute("data-pgroup-hidden", "1");
    });
    // meta 文구 갱신
    const meta = document.querySelector(".liumen-subgroup-meta");
    const PG = PERSON_GROUPS.find(g=>g.key===cur);
    const cnt = cur==="all"
      ? OBJECTS.filter(o=>o.type==="person").length
      : OBJECTS.filter(o=>o.type==="person" && ID2GROUP[o.id]===cur).length;
    if (cur === "all") { if (meta) meta.remove(); }
    else {
      const txt = `${PG.han} (${PG.ko}) — ${cnt}人`;
      if (meta) meta.textContent = txt;
      else {
        const sub = document.querySelector(".liumen-subgroup");
        if (sub) {
          const p = document.createElement("p");
          p.className = "liumen-subgroup-meta";
          p.textContent = txt;
          sub.parentNode.insertBefore(p, sub.nextSibling);
        }
      }
    }
    // 첫 카드로 부드럽게
    const firstVisible = document.querySelector(".liumen-card[data-pgroup]:not([data-pgroup-hidden])");
    if (firstVisible) firstVisible.scrollIntoView({behavior:"smooth", block:"start"});
  });

  console.log("[Phase 7] 人物 시대 그룹 필터(전체·後漢末·建安正始·竹林西晉·東晉前中期·東晉後末) 작동 중");
})();


/* ════════════════════════════════════════════════════════════════════
   Phase 8 : 「맨 위로」 버튼  +  「직전 위치로」 뒤로가기 스택
   ─────────────────────────────────────────────────────────────────
   ▸ 序說·六門百科 등 긴 화면을 위해 우측 하단에 고정 FAB을 둔다.
     ① ▲ 맨 위로  ── 스크롤이 일정 이상 내려갔을 때만 노출
     ② ← 직전 위치로 ── jumpToObject 가 호출되어 키워드로 점프했을 때만 노출
   ▸ jumpToObject 한 겹을 감싸 직전 상태(view·liumenCat·펼침·스크롤·副그룹)를
     스택에 쌓는다. 뒤로가기는 스택을 한 단씩 pop 하여 그대로 복원.
   ▸ 홈으로 가거나 상단 메인 네비게이션 버튼을 누르면 스택은 초기화한다
     (그쪽은 「점프 直前 위치 복귀」의 의미가 아니라 명시적 화면 전환이므로).
   ════════════════════════════════════════════════════════════════════ */
(function(){
  // 1) CSS
  const style = document.createElement("style");
  style.textContent = `
    .fab-stack{ position:fixed; right:18px; bottom:22px; display:flex; flex-direction:column;
      gap:8px; align-items:flex-end; z-index:9999; pointer-events:none; }
    .fab-btn{ pointer-events:auto; display:inline-flex; align-items:center; gap:7px;
      font-family:var(--tc); font-size:13px; font-weight:700; letter-spacing:.05em;
      padding:9px 13px 8px; background:var(--paper, #fdf6e8); color:var(--ink, #2a2218);
      border:1.5px solid var(--ink, #2a2218); border-radius:24px; cursor:pointer;
      box-shadow:0 2px 6px rgba(0,0,0,.18); transition:opacity .25s ease, transform .15s ease;
      opacity:0; transform:translateY(6px); }
    .fab-btn.show{ opacity:1; transform:translateY(0); }
    .fab-btn:hover{ background:var(--ink, #2a2218); color:var(--paper, #fdf6e8); }
    .fab-btn .fab-glyph{ font-size:15px; line-height:1; }
    .fab-btn small{ font-family:var(--serif); font-size:10.5px; font-weight:normal;
      opacity:.75; margin-left:2px; }
    .fab-btn[disabled], .fab-btn.hidden{ opacity:0; pointer-events:none;
      transform:translateY(6px); }
    @media (max-width: 680px){
      .fab-stack{ right:10px; bottom:14px; }
      .fab-btn{ font-size:12px; padding:8px 11px 7px; }
    }
  `;
  document.head.appendChild(style);

  // 2) FAB DOM (document.body 직속 — render() 영향 받지 않음)
  const stack = document.createElement("div");
  stack.className = "fab-stack";
  stack.innerHTML = `
    <button class="fab-btn fab-back hidden" type="button" aria-label="직전 위치로">
      <span class="fab-glyph">←</span><span>직전 위치로</span><small class="fab-back-n"></small>
    </button>
    <button class="fab-btn fab-top hidden" type="button" aria-label="맨 위로">
      <span class="fab-glyph">▲</span><span>맨 위로</span>
    </button>
  `;
  document.body.appendChild(stack);
  const btnTop  = stack.querySelector(".fab-top");
  const btnBack = stack.querySelector(".fab-back");
  const backN   = stack.querySelector(".fab-back-n");

  // 3) 「맨 위로」 — 스크롤 임계치 기반 표시
  const TOP_THRESHOLD = 360;
  function syncTopBtn(){
    const y = window.scrollY || document.documentElement.scrollTop || 0;
    if (y > TOP_THRESHOLD) btnTop.classList.remove("hidden");
    else                    btnTop.classList.add("hidden");
    // 첫 화면(entered=false)에는 숨김
    if (typeof entered !== "undefined" && !entered) btnTop.classList.add("hidden");
  }
  window.addEventListener("scroll", syncTopBtn, { passive:true });
  window.addEventListener("resize", syncTopBtn);
  btnTop.addEventListener("click", ()=>{
    window.scrollTo({ top:0, behavior:"smooth" });
  });

  // 4) 뒤로가기 스택
  const back = [];
  window._navBackStack = back;          // 디버깅 노출

  function snapshot(){
    return {
      view: view,
      liumenCat: (typeof liumenCat !== "undefined" ? liumenCat : null),
      liumenExpanded: (typeof liumenExpanded !== "undefined" ? new Set(liumenExpanded) : null),
      activeChapter: (typeof activeChapter !== "undefined" ? activeChapter : null),
      activeTopic:   (typeof activeTopic   !== "undefined" ? activeTopic   : null),
      activePerson:  (typeof activePerson  !== "undefined" ? activePerson  : null),
      personSubGroup: window.personSubGroup || "all",
      lastPicks: (window._lastPicks || []),
      scrollY: window.scrollY || document.documentElement.scrollTop || 0
    };
  }
  function restore(s){
    view = s.view;
    if (s.liumenCat !== null && typeof liumenCat !== "undefined") liumenCat = s.liumenCat;
    if (s.liumenExpanded && typeof liumenExpanded !== "undefined") {
      liumenExpanded.clear();
      s.liumenExpanded.forEach(id => liumenExpanded.add(id));
    }
    if (typeof activeChapter !== "undefined") activeChapter = s.activeChapter;
    if (typeof activeTopic   !== "undefined") activeTopic   = s.activeTopic;
    if (typeof activePerson  !== "undefined") activePerson  = s.activePerson;
    window.personSubGroup = s.personSubGroup || "all";
    render(s.lastPicks || []);
    // render 가 setTimeout 등으로 추가 작업하므로 약간 뒤에 스크롤 복원
    setTimeout(()=>{ window.scrollTo({ top:s.scrollY, behavior:"smooth" }); }, 60);
  }
  function syncBackBtn(){
    if (back.length > 0) {
      btnBack.classList.remove("hidden");
      backN.textContent = back.length > 1 ? `(${back.length})` : "";
    } else {
      btnBack.classList.add("hidden");
      backN.textContent = "";
    }
  }
  btnBack.addEventListener("click", ()=>{
    if (!back.length) return;
    const s = back.pop();
    syncBackBtn();
    restore(s);
  });
  // ESC 키로도 뒤로가기 — 입력창에서 타이핑 중일 때는 무시
  document.addEventListener("keydown", (e)=>{
    if (e.key !== "Escape") return;
    if (!back.length) return;
    const tag = (e.target && e.target.tagName) || "";
    if (tag === "INPUT" || tag === "TEXTAREA") return;
    e.preventDefault();
    const s = back.pop();
    syncBackBtn();
    restore(s);
  });

  // 5) jumpToObject 감싸기 — 점프 直前 상태를 스택에 push
  if (typeof jumpToObject === "function") {
    const _origJump = jumpToObject;
    jumpToObject = function(objid){
      try {
        // 같은 카드를 다시 누른 경우엔 push 안 함 (스택 부풀림 방지)
        const o = OBJECTS.find(x => x.id === objid);
        const inLiumen = (view === "liumen");
        if (o && inLiumen && liumenCat === o.type) {
          // 이미 같은 탭에 있고 카드만 찾는 경우 — push 하되 펼침 차이가 있으면 의미 있음
        }
        back.push(snapshot());
        // 너무 깊어지지 않도록 상한
        if (back.length > 50) back.shift();
        syncBackBtn();
      } catch(e){ console.warn("[Phase 8] snapshot 실패:", e); }
      return _origJump(objid);
    };
    // 전역에도 다시 노출
    window.jumpToObject = jumpToObject;
  } else {
    console.warn("[Phase 8] jumpToObject 가 정의돼 있지 않다 — 뒤로가기 wrap 실패");
  }

  // 6) 명시적 화면 전환(homeBtn, 메인 nav-btn)에서는 스택 비우기
  //    bind() 가 render 시마다 다시 부착하므로 위임 처리.
  document.addEventListener("click", function(e){
    const t = e.target;
    if (!t || !t.closest) return;
    if (t.closest("#homeBtn") || t.closest(".nav-btn") || t.closest("[data-view-target]")) {
      back.length = 0;
      syncBackBtn();
    }
  }, true); // capture: 원 핸들러보다 먼저 비워 둠

  // 7) render 이후마다 FAB 상태 동기화 (스크롤 위치 변동 가능)
  const _renderForFab = render;
  render = function(picks){
    _renderForFab(picks);
    // 화면이 새로 그려졌으므로 위치 점검
    setTimeout(()=>{ syncTopBtn(); syncBackBtn(); }, 0);
  };

  // 초기 동기화
  syncTopBtn();
  syncBackBtn();

  console.log("[Phase 8] FAB(맨 위로 · 직전 위치로) 작동 중");
})();


/* ============================================================
   Phase 9 : 어디서든 六門百科 키워드 自動 連結
   ─────────────────────────────────────────────────────────
   六門百科(OBJECTS)에 등록되어 있는 모든 키워드(人·族·事·思·制·物)의
   名(漢字)·韓·異名(PEOPLE_SYN의 모든 키)이, 序說·六門百科·三十六篇·
   주제로 찾기·인물로 찾기·무작위로 제시 ── 어느 화면 어느 자리에서든
   平文(plain text)으로 노출되어 있더라도 그 자리에서 直接 클릭하여
   <육문백과>의 해당 카드로 移動이 가능하도록 한다.
   原 linkifyEm(<em>..</em>)으로 이미 連結된 자리는 건드리지 않는다.
============================================================ */
(function(){
  // 1) 同形異義의 위험이 큰 韓國語 키워드는 차단한다.
  //    예) "사상" → 謝安의 異名이지만 동시에 "思想"이라는 보통 名詞.
  const BLACKLIST = new Set(["사상"]);

  // 2) OBJECTS · PEOPLE_SYN으로부터 全 이름 → objid 사전을 만든다.
  const nameToId = new Map();

  function maybeAdd(name, id){
    if(!name) return;
    if(BLACKLIST.has(name)) return;
    if(name.length < 2) return;   // 一字의 이름은 誤認이 잦아 제외
    if(nameToId.has(name)) return;
    nameToId.set(name, id);
  }

  if(typeof OBJECTS !== "undefined"){
    for(const o of OBJECTS){
      maybeAdd(o.han, o.id);
      maybeAdd(o.ko, o.id);
    }
  }
  if(typeof PEOPLE_SYN !== "undefined" && typeof OBJECTS !== "undefined"){
    for(const k of Object.keys(PEOPLE_SYN)){
      const han = PEOPLE_SYN[k];
      const o = OBJECTS.find(x => x.type==="person" && x.han===han);
      if(o) maybeAdd(k, o.id);
    }
  }

  // 3) 매치는 항상 「긴 이름 먼저」가 옳다. (예: "낭야 왕씨" → "왕씨")
  const names = [...nameToId.keys()].sort((a,b)=> b.length - a.length);
  if(!names.length){ console.warn("[Phase 9] 등록된 키워드가 없다."); return; }
  function escRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }
  const PATTERN_SRC = names.map(escRe).join("|");

  // 4) 通過 금지 자리.
  //    a) 이미 連結된 <a> 안.   b) 入力·버튼·SVG 등.
  //    c) 索引/탭 등 짧은 이름이 同形으로 박혀 있는 자리.
  const SKIP_TAGS = new Set(["A","BUTTON","INPUT","TEXTAREA","SELECT","STYLE","SCRIPT","SVG"]);
  const SKIP_CLASS_SELECTOR =
    ".liumen-card-name, .ix-han, .ix-ko, .chap, .chap-ko, .chap-ord, " +
    ".mode-btn, .nav-btn, .draw, .liumen-tab, .liumen-tab-sub, " +
    ".scroll-svg, .entry-title, .liumen-search-input, " +
    ".topic-search input, .topic-search button";

  function shouldSkipParent(node){
    let p = node.parentNode;
    while(p && p.nodeType === 1){
      if(SKIP_TAGS.has((p.tagName||"").toUpperCase())) return true;
      if(p.matches && p.matches(SKIP_CLASS_SELECTOR)) return true;
      p = p.parentNode;
    }
    return false;
  }

  // 5) .wrap 안의 全 텍스트 노드를 走査하여 키워드를 <a class="ref">로 두른다.
  function autoLinkAll(){
    const root = document.querySelector(".wrap");
    if(!root) return;
    if(typeof entered !== "undefined" && !entered) return;

    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode(n){
        if(!n.nodeValue) return NodeFilter.FILTER_REJECT;
        if(!n.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
        if(shouldSkipParent(n)) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });

    const targets = [];
    while(walker.nextNode()) targets.push(walker.currentNode);

    for(const node of targets){
      const text = node.nodeValue;
      // 매 노드마다 새 정규식(상태 충돌 방지)
      const re = new RegExp(PATTERN_SRC, "g");
      let m, last = 0, matched = false;
      const frag = document.createDocumentFragment();
      while((m = re.exec(text)) !== null){
        matched = true;
        if(m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
        const a = document.createElement("a");
        a.className = "ref";
        a.dataset.objid = nameToId.get(m[0]);
        a.textContent = m[0];
        frag.appendChild(a);
        last = m.index + m[0].length;
        // 무한루프 방지(0길이 매치는 일어나지 않지만 안전책)
        if(re.lastIndex === m.index) re.lastIndex++;
      }
      if(!matched) continue;
      if(last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
      node.parentNode.replaceChild(frag, node);
    }

    // 새로 생긴 a.ref에 클릭 핸들러를 단다.
    // (原 bind()은 .onclick=로 元素를 한 번만 설정하므로,
    //  나중에 생성된 노드도 별도로 매다는 것이 안전하다.)
    document.querySelectorAll("a.ref").forEach(a=>{
      if(a._phase9Bound) return;
      a._phase9Bound = true;
      a.addEventListener("click", (e)=>{
        e.preventDefault();
        if(typeof jumpToObject === "function"){
          jumpToObject(a.dataset.objid);
        }
      });
    });
  }

  // 6) 매 render마다 자동 실행.
  if(typeof render === "function"){
    const _origRender = render;
    render = function(picks){
      _origRender(picks);
      // DOM이 다 그려진 다음 tick에 자동 연결.
      setTimeout(autoLinkAll, 0);
    };
  }

  // 7) 첫 화면(render([])이 곧 호출될 것이지만, 안전을 위해 한 번 더).
  setTimeout(autoLinkAll, 0);

  console.log("[Phase 9] 어디서든 六門百科 키워드 자동 연결 — 작동 중 (등록 키워드 "+names.length+"개)");
})();


/* ============================================================
   Phase 10 : 輿地圖 ── 魏晉 時期의 地圖을 보다
   ─────────────────────────────────────────────────────────
   세설신어가 다루는 時代(後漢末 ~ 東晉, 약 150~420)에 해당하는
   주요 역사 지도를, 외부의 신뢰 가능한 자료(Wikimedia Commons,
   Wikipedia)와 연결하여 한 자리에서 열람할 수 있게 한다.

   설계:
   1) navbar 우측 끝에 「輿地圖」 第七 버튼을 부착한다.
   2) view === "atlas" 로 전환되면 본문 영역을 지도 카드로 채운다.
   3) 카드는 시기 순서(後漢末→三國→西晉→東晉·十六國→총람)이며,
      각각 ① 縮約 미리보기(Wikimedia 직링크) ② 외부 자세히 보기를
      제공한다. 이미지가 막히면 카드 안에서 안내문으로 갈음한다.
============================================================ */
(function(){
  // 1) 자료 정의 ── 각 항목의 thumb은 Special:FilePath(영구 redirect)를

  // viewBox(980×680) 위의 대강 위치 (정확한 강역도 아님)
  // x = (lon - 100) × 42 + 30,  y = (40 - lat) × 37 + 70 정도로 환산했으나

  // link 가 있으면 클릭 시 六門百科의 해당 자리로 이동(jumpToObject).
  // anchor:"end" 이면 라벨을 왼쪽으로 단다.
  const CITIES = [
    { x:420, y:215, han:"平陽", ko:"평양", cap:true, link:"person.劉聰"           },
    { x:559, y:202, han:"鄴",   ko:"업",   cap:true                               },
    { x:473, y:268, han:"洛陽", ko:"낙양", cap:true, link:"event.永嘉의 亂", anchor:"end" },
    { x:346, y:283, han:"長安", ko:"장안", cap:true                               },
    { x:519, y:298, han:"許昌", ko:"허창"                                          },
    { x:618, y:350, han:"壽春", ko:"수춘",                                  anchor:"end" },
    { x:735, y:348, han:"廣陵", ko:"광릉",            link:"institution.BeiFuBing" },
    { x:735, y:374, han:"京口", ko:"경구",            link:"institution.BeiFuBing" },
    { x:692, y:402, han:"建康", ko:"건강", cap:true,  link:"event.DongJinFound",
                                                                          anchor:"end" },
    { x:537, y:430, han:"武昌", ko:"무창",            link:"person.王敦"          },
    { x:455, y:438, han:"江陵", ko:"강릉",                                  anchor:"end" },
    { x:455, y:380, han:"襄陽", ko:"양양",                                  anchor:"end" },
    { x:178, y:425, han:"成都", ko:"성도"                                          },
    { x:770, y:455, han:"山陰", ko:"산음",            link:"event.LanTing"        },
  ];
  const EVENTS = [
    { x:638, y:374, han:"淝水", ko:"비수",            link:"event.淝水大戰"       },
    { x:692, y:425, han:"新亭", ko:"신정",            link:"person.王導",   anchor:"end" },
  ];
  // 산: vertical=true 면 縱走 산맥(태항산처럼)으로 봉우리 3단을 그린다.
  const MOUNTAINS = [
    { x:500, y:245, han:"太行山", ko:"태항산", vertical:true },
    { x:260, y:312, han:"秦嶺",   ko:"진령"   },
    { x:602, y:475, han:"廬山",   ko:"여산"   },
    { x:790, y:495, han:"會稽山", ko:"회계산" },
    { x:820, y:540, han:"天台山", ko:"천태산" },
  ];

  // ── 2) 스타일 ─────────────────────────────────────────
  if(!document.getElementById("atlas-style")){
    const st = document.createElement("style");
    st.id = "atlas-style";
    st.textContent = `
      .atlas-head{font-family:var(--tc);font-size:20px;font-weight:700;letter-spacing:.14em;color:var(--ink);margin:6px 0 4px;text-align:center;}
      .atlas-sub{font-family:var(--serif);font-size:13px;color:var(--ink-soft);text-align:center;margin:0 0 16px;font-style:italic;letter-spacing:.02em;}
      .atlas-map-wrap{margin:8px auto 6px;background:linear-gradient(180deg,#f3ead2,#ebe0c0);border:1px solid var(--line);border-radius:2px;padding:14px 14px 10px;box-shadow:0 2px 8px rgba(60,45,20,.10);max-width:1000px;}
      .atlas-map{display:block;width:100%;height:auto;}
      .am-sea{fill:#d8e1d4;opacity:.55;}
      .am-coast{stroke:#7d8273;stroke-width:.7;fill:none;opacity:.55;}
      .am-river{fill:none;stroke:#946b3b;stroke-linecap:round;opacity:.6;}
      .am-river-major{stroke-width:3.6;opacity:.7;}
      .am-river-minor{stroke-width:1.8;opacity:.5;}
      .am-river-label{font-family:var(--tc);font-size:13px;fill:#946b3b;font-weight:700;letter-spacing:.1em;}
      .am-river-label.minor{font-size:11px;opacity:.8;}
      .am-mt{fill:none;stroke:var(--ink-soft);stroke-width:1.3;opacity:.6;stroke-linecap:round;stroke-linejoin:round;}
      .am-mt-label{font-family:var(--tc);font-size:11.5px;fill:var(--ink-soft);font-style:italic;letter-spacing:.05em;}
      .am-city.clickable{cursor:pointer;}
      .am-city-dot{fill:var(--ink);}
      .am-city-cap-square{fill:var(--seal);stroke:var(--ink);stroke-width:1.2;}
      .am-city-han{font-family:var(--tc);font-size:14px;font-weight:700;fill:var(--ink);letter-spacing:.05em;}
      .am-city-han.cap{font-size:15.5px;fill:var(--seal);}
      .am-city.clickable:hover .am-city-han{text-decoration:underline;}
      .am-city-ko{font-family:var(--serif);font-size:10.5px;fill:var(--ink-soft);letter-spacing:.02em;}
      .am-evt{cursor:pointer;}
      .am-evt-mark{fill:none;stroke:var(--seal);stroke-width:1.6;}
      .am-evt-label{font-family:var(--tc);font-size:12.5px;fill:var(--seal);font-style:italic;font-weight:700;letter-spacing:.04em;}
      .am-evt:hover .am-evt-label{text-decoration:underline;}
      .am-compass{font-family:var(--tc);font-size:17px;fill:var(--ink-soft);font-weight:700;}
      .atlas-legend{display:flex;flex-wrap:wrap;justify-content:center;gap:8px 22px;margin:8px 0 14px;font-family:var(--serif);font-size:12px;color:var(--ink-soft);letter-spacing:.02em;}
      .atlas-legend .lg-item{display:inline-flex;align-items:center;gap:6px;}
      .atlas-legend .lg-cap{width:10px;height:10px;background:var(--seal);border:1px solid var(--ink);display:inline-block;}
      .atlas-legend .lg-city{width:7px;height:7px;background:var(--ink);border-radius:50%;display:inline-block;}
      .atlas-legend .lg-evt{color:var(--seal);font-style:italic;}
      .atlas-foot{margin:18px 0 0;padding:14px 0 0;border-top:1px solid var(--line);font-family:var(--serif);font-size:12px;color:var(--ink-soft);text-align:center;line-height:1.8;letter-spacing:.01em;font-style:italic;}
    `;
    document.head.appendChild(st);
  }

  // ── 3) 헬퍼: 마커 생성 ────────────────────────────────
  function cityMarker(c){
    const linkAttr = c.link ? ` data-objid="${c.link}"` : "";
    const linkCls  = c.link ? " clickable" : "";
    const left     = c.anchor === "end";
    const tx       = left ? "end" : "start";
    const dx       = left ? -9 : 9;
    const inner    = c.cap
      ? `<rect class="am-city-cap-square" x="-6" y="-6" width="12" height="12"/>
         <circle cx="0" cy="0" r="2.2" fill="#fff"/>`
      : `<circle class="am-city-dot" cx="0" cy="0" r="3.5"/>`;
    const hanCls   = "am-city-han" + (c.cap ? " cap" : "");
    return `<g class="am-city${linkCls}"${linkAttr} transform="translate(${c.x},${c.y})">
      ${inner}
      <text class="${hanCls}" x="${dx}" y="-2" text-anchor="${tx}">${c.han}</text>
      <text class="am-city-ko" x="${dx}" y="10" text-anchor="${tx}">${c.ko}</text>
    </g>`;
  }
  function eventMarker(e){
    const linkAttr = e.link ? ` data-objid="${e.link}"` : "";
    const left     = e.anchor === "end";
    const tx       = left ? "end" : "start";
    const dx       = left ? -8 : 8;
    return `<g class="am-evt"${linkAttr} transform="translate(${e.x},${e.y})">
      <path class="am-evt-mark" d="M -5,0 L 5,0 M 0,-5 L 0,5 M -3.5,-3.5 L 3.5,3.5 M -3.5,3.5 L 3.5,-3.5"/>
      <text class="am-evt-label" x="${dx}" y="4" text-anchor="${tx}">${e.han} ${e.ko}</text>
    </g>`;
  }
  function mtMarker(m){
    if(m.vertical){
      // 縱走山脈: 위·중·아래에 3봉(峰) 묶음
      const peaks = (cy)=>{
        const x = m.x;
        return `<path class="am-mt" d="M ${x-13},${cy} l 6,-11 l 6,11 m -3,0 l 6,-13 l 6,13 m -3,0 l 6,-10 l 6,10"/>`;
      };
      return `<g>
        ${peaks(m.y-46)}
        ${peaks(m.y)}
        ${peaks(m.y+46)}
        <text class="am-mt-label" x="${m.x+22}" y="${m.y+4}">${m.han} ${m.ko}</text>
      </g>`;
    }
    return `<g>
      <path class="am-mt" d="M ${m.x-12},${m.y} l 6,-11 l 6,11 m -3,0 l 6,-13 l 6,13 m -3,0 l 6,-10 l 6,10"/>
      <text class="am-mt-label" x="${m.x-8}" y="${m.y+17}">${m.han} ${m.ko}</text>
    </g>`;
  }

  // ── 4) SVG 구성 ────────────────────────────────────
  function buildMapSVG(){
    return `
<svg class="atlas-map" viewBox="0 0 980 680" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-label="魏晉 시기 지도">
  <!-- 바다 (동쪽 가장자리) -->
  <path class="am-sea"   d="M 830,30 Q 870,170 830,300 Q 800,400 850,500 Q 860,600 820,680 L 980,680 L 980,30 Z"/>
  <path class="am-coast" d="M 830,30 Q 870,170 830,300 Q 800,400 850,500 Q 860,600 820,680"/>

  <!-- 黃河 -->
  <path class="am-river am-river-major" d="M 30,225 Q 130,195 230,205 Q 320,215 410,210 Q 470,205 530,225 Q 600,240 680,232 Q 750,225 830,250"/>
  <text class="am-river-label" x="60" y="195">黃河</text>

  <!-- 渭水 (長安 평원) -->
  <path class="am-river am-river-minor" d="M 180,300 Q 250,290 340,285"/>
  <text class="am-river-label minor" x="195" y="295">渭水</text>

  <!-- 淮水 -->
  <path class="am-river am-river-minor" d="M 360,335 Q 470,345 560,335 Q 660,330 770,348 Q 805,355 830,365"/>
  <text class="am-river-label minor" x="380" y="328">淮水</text>

  <!-- 漢水 -->
  <path class="am-river am-river-minor" d="M 320,335 Q 380,365 430,400 Q 460,420 530,430"/>
  <text class="am-river-label minor" x="345" y="358">漢水</text>

  <!-- 長江 -->
  <path class="am-river am-river-major" d="M 30,470 Q 110,475 178,432 Q 250,415 320,440 Q 400,448 463,440 Q 530,432 600,425 Q 660,415 700,410 Q 760,405 830,425"/>
  <text class="am-river-label" x="60" y="495">長江</text>

  <!-- 산 -->
  ${MOUNTAINS.map(mtMarker).join("")}

  <!-- 도시 -->
  ${CITIES.map(cityMarker).join("")}

  <!-- 사건의 자리 -->
  ${EVENTS.map(eventMarker).join("")}

  <!-- 나침반 -->
  <g transform="translate(905,72)">
    <text class="am-compass" text-anchor="middle">北</text>
    <line x1="0" y1="8" x2="0" y2="30" stroke="var(--ink-soft)" stroke-width="1"/>
    <path d="M -4,14 L 0,6 L 4,14 Z" fill="var(--ink-soft)"/>
  </g>
</svg>`;
  }

  // ── 5) renderAtlas ───────────────────────────────
  function renderAtlas(){
    return `
      <div class="atlas-head">輿 地 圖</div>
      <p class="atlas-sub">魏晉의 한 폭 ─ 黃河와 長江 사이, 세설신어의 무대</p>
      <div class="atlas-map-wrap">${buildMapSVG()}</div>
      <div class="atlas-legend">
        <span class="lg-item"><span class="lg-cap"></span> 도읍 (平陽·鄴·洛陽·長安·建康)</span>
        <span class="lg-item"><span class="lg-city"></span> 주요 성읍</span>
        <span class="lg-item">▲ 산</span>
        <span class="lg-item lg-evt">✕ 사건의 자리</span>
      </div>
      <p class="atlas-foot">
        성읍과 사건의 자리에 표시된 라벨(굵은 검은색·붉은색)을 누르면 六門百科의 해당 자리로 이어집니다.<br>
        도식은 위치 대강을 보이는 것이며, 정확한 강역도가 아닙니다.
      </p>`;
  }

  // ── 6) 클릭 → 六門 이동 ───────────────────────────
  //   SVG 의 <g data-objid="..."> 안에서 클릭이 일어나면(텍스트/도형 어느 자리든)
  //   closest로 g를 찾아 jumpToObject 호출. Phase 9의 a.ref 핸들러와 충돌하지 않음.
  document.addEventListener("click", (e)=>{
    if(!e.target || !e.target.closest) return;
    const g = e.target.closest("g[data-objid]");
    if(!g) return;
    if(typeof jumpToObject === "function") jumpToObject(g.dataset.objid);
  });

  // 5) navbar에 「輿地圖」 第七 버튼을 注入하고, view==="atlas" 일 때
  //    본문을 교체한다. render() 를 감싸서 매 회 처리.
  if(typeof render !== "function"){
    console.warn("[Phase 10] render 가 보이지 않음 — 중단");
    return;
  }
  const _origRender = render;
  render = function(picks){
    _origRender(picks);

    // 진입 화면(序說 전) 이전에는 navbar 자체가 없다.
    const nav = document.querySelector(".navbar");
    if(!nav) return;

    // (a) 버튼 부착(중복 방지)
    if(!nav.querySelector('[data-view="atlas"]')){
      const btn = document.createElement("button");
      btn.className = "nav-btn";
      btn.dataset.view = "atlas";
      btn.textContent = "輿地圖";
      btn.addEventListener("click", ()=>{
        // view 는 스크립트 스코프의 let. window.view 와 별개이므로
        // 반드시 렉시컬 식별자에 직접 대입해야 한다.
        try { view = "atlas"; } catch(e) { window.view = "atlas"; }
        try { if(typeof activeChapter !== "undefined") activeChapter = null; } catch(e){}
        try { if(typeof activeTopic   !== "undefined") activeTopic   = null; } catch(e){}
        try { if(typeof activePerson  !== "undefined") activePerson  = null; } catch(e){}
        try { if(typeof randomSubMode !== "undefined") randomSubMode = null; } catch(e){}
        render([]);
      });
      const prefaceBtn = nav.querySelector('[data-view="preface"]');
      if(prefaceBtn && prefaceBtn.nextSibling) nav.insertBefore(btn, prefaceBtn.nextSibling);
      else if(prefaceBtn) nav.appendChild(btn);
      else nav.insertBefore(btn, nav.firstChild);
    }

    // (b) 활성 표시
    nav.querySelectorAll(".nav-btn").forEach(b=>{
      if(b.dataset.view === "atlas"){
        b.classList.toggle("on", (typeof view !== "undefined" && view === "atlas"));
      }
    });

    // (c) 본문 교체
    if(typeof view !== "undefined" && view === "atlas"){
      // 본문 후보를 차례로 찾는다 (cards / empty / preface 자리 등 무엇이든)
      const wrap = document.querySelector(".wrap");
      if(!wrap) return;
      // navbar 뒤의 모든 콘텐츠 블록을 걷어낸다
      let node = nav.nextSibling;
      const removed = [];
      while(node){
        const next = node.nextSibling;
        // foot 영역은 보존(있다면)
        if(node.nodeType === 1 && node.classList && node.classList.contains("foot")){
          // keep
        } else {
          removed.push(node);
          node.parentNode.removeChild(node);
        }
        node = next;
      }
      // 지도 영역 삽입(.foot 앞에 두는 형식)
      const atlas = document.createElement("div");
      atlas.id = "atlasView";
      atlas.innerHTML = renderAtlas();
      const foot = wrap.querySelector(".foot");
      if(foot) wrap.insertBefore(atlas, foot);
      else wrap.appendChild(atlas);
    }
  };

  console.log("[Phase 10] 輿地圖 메뉴 작동 중 — 한 폭 지도(도시 "+CITIES.length+"·산 "+MOUNTAINS.length+"·사건 "+EVENTS.length+")");
})();


/* ============================================================
   Phase 11 : 두루마리(掛軸) 全景·快進 도구
   ─────────────────────────────────────────────────────────
   세로 두루마리는 SCROLL_DATA(160~425) × pxPerYear(9) = 약 2,500px
   짜리 길고 가는 화폭이라, 한눈에 들어오지 않고 위·아래로 끝없이
   끌어내려야 한다. 또 min-width:1000px가 걸려 좁은 화면에선
   가로 스크롤까지 겹친다. 이를 풀기 위해:
     1) view === "scroll" 일 때 .scroll-view 상단에 끈끈이 도구 막대를 부착
     2) [한눈에 / 50% / 75% / 100%] 4단 축소·복귀
     3) [後漢末·三國·西晉·東晉·淝水·末年] 시대 직행
   * SVG의 width를 직접 px로 설정해 stylesheet의 min/max를 덮어쓴다.
   * preserveAspectRatio="xMidYMin meet" 라서 width만 정하면 height는
     viewBox 비율로 자동 결정된다.
============================================================ */
(function(){
  // 1) SVG 좌표계 상수 (scrollHtml과 동일)
  const SD_START = 160, PX_PER_YEAR = 9, PAD_T = 78;
  const SVG_W_NAT = 1100;                 // viewBox width
  const SVG_H_NAT = 78 + (425-160)*9 + 44; // ≈ 2507

  // 2) 시대 빠른 이동 — (라벨, 도착年)
  const JUMPS = [
    ["後漢末",  166],
    ["三國",   220],
    ["西晉",   265],
    ["東晉",   317],
    ["淝水",   383],
    ["末年",   420],
  ];

  // 3) 스타일 주입 (한 번만)
  if(!document.getElementById("scrollbar-style")){
    const st = document.createElement("style");
    st.id = "scrollbar-style";
    st.textContent = `
      .scroll-toolbar{
        position:sticky; top:0; z-index:50;
        display:flex; flex-wrap:wrap; align-items:center; gap:6px 10px;
        padding:9px 14px; margin:0 22px 10px;
        background:rgba(244,236,216,.96);
        border:1px solid var(--line); border-radius:2px;
        backdrop-filter:blur(2px);
        font-family:var(--serif);
        box-shadow:0 2px 8px rgba(60,45,20,.10);
      }
      .stb-group{ display:flex; align-items:center; gap:4px; }
      .stb-label{ font-family:var(--tc); font-size:11.5px; color:var(--seal); letter-spacing:.12em; font-weight:700; margin-right:3px; }
      .stb-btn{
        font-family:var(--serif); font-size:12px; padding:5px 9px;
        background:transparent; border:1px solid var(--ink); color:var(--ink-soft);
        border-radius:2px; cursor:pointer; letter-spacing:.02em; transition:.13s;
      }
      .stb-btn:hover{ background:rgba(0,0,0,.05); color:var(--ink); }
      .stb-btn.on{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
      .stb-sep{ width:1px; height:18px; background:var(--line); margin:0 2px; }
      @media (max-width:560px){
        .scroll-toolbar{ margin:0 16px 10px; padding:7px 10px; gap:5px 7px; }
        .stb-btn{ font-size:11px; padding:4px 7px; }
        .stb-label{ font-size:10.5px; }
      }
    `;
    document.head.appendChild(st);
  }

  // 4) 현 scale 값을 SVG에 반영
  let currentScale = 1;
  function applyScale(s){
    const svg = document.querySelector(".scroll-svg-v");
    if(!svg) return;
    currentScale = s;
    if(s === "fit"){
      // 「한눈에」: 뷰포트 높이에 SVG 전체가 들어오도록 폭을 줄인다
      const vh = Math.max(window.innerHeight - 200, 360);
      const ratio = vh / SVG_H_NAT;       // 높이 기준 축소율
      const w = SVG_W_NAT * ratio;
      svg.style.width = w + "px";
      svg.style.minWidth = "0";
      svg.style.maxWidth = "none";
      svg.style.margin = "0 auto";
    } else {
      const w = SVG_W_NAT * s;
      svg.style.width = w + "px";
      svg.style.minWidth = "0";
      svg.style.maxWidth = "none";
      svg.style.margin = "0 auto";
    }
    // 활성 버튼 표시
    document.querySelectorAll(".stb-zoom").forEach(b=>{
      b.classList.toggle("on", b.dataset.scale === String(s));
    });
  }

  // 5) 특정 年으로 page 스크롤
  function jumpToYear(year){
    const svg = document.querySelector(".scroll-svg-v");
    if(!svg) return;
    const rect = svg.getBoundingClientRect();
    const svgTopAbs = rect.top + window.scrollY;
    // 실제 그려진 폭으로부터 현 scale 환산
    const scale = rect.width / SVG_W_NAT;
    const yInSvg = (PAD_T + (year - SD_START) * PX_PER_YEAR) * scale;
    // 도구 막대(끈끈이) 높이 만큼 여유
    const toolbar = document.querySelector(".scroll-toolbar");
    const tbH = toolbar ? toolbar.getBoundingClientRect().height : 0;
    window.scrollTo({ top: svgTopAbs + yInSvg - tbH - 12, behavior:"smooth" });
  }

  // 6) 도구 막대 HTML
  function buildToolbar(){
    const zoom = [
      ["한눈에", "fit"],
      ["50%",   "0.5"],
      ["75%",   "0.75"],
      ["100%",  "1"],
    ];
    const z = zoom.map(([t,v])=>`<button class="stb-btn stb-zoom" data-scale="${v}">${t}</button>`).join("");
    const j = JUMPS.map(([t,y])=>`<button class="stb-btn stb-jump" data-year="${y}">${t}</button>`).join("");
    return `
      <div class="scroll-toolbar" id="scrollToolbar">
        <span class="stb-group"><span class="stb-label">縮</span>${z}</span>
        <span class="stb-sep"></span>
        <span class="stb-group"><span class="stb-label">時代</span>${j}</span>
      </div>`;
  }

  // 7) view === "scroll" 진입 시 도구 막대 삽입 + 이벤트 매기
  function install(){
    if(typeof view === "undefined" || view !== "scroll") return;
    const sv = document.querySelector(".scroll-view");
    if(!sv) return;

    // (선택) 思想 영역 제거 — 원본 scrollHtml은 손대지 않고 DOM에서만 걷어낸다
    //   ① 사상 범례 통째로 삭제
    const legend = sv.querySelector(".thought-legend");
    if(legend) legend.remove();
    //   ② SVG 안의 思想 띠·라벨·한글 부제 삭제
    sv.querySelectorAll(".scroll-svg-v .thought-band, .scroll-svg-v .thought-label, .scroll-svg-v .thought-ko")
      .forEach(n=> n.remove());
    //   ③ "思想" 列 헤더(맨 위) 삭제 — col-header text 중 내용이 "思想"인 것만
    sv.querySelectorAll(".scroll-svg-v text.col-header").forEach(t=>{
      if((t.textContent||"").trim() === "思想") t.remove();
    });

    if(sv.querySelector(".scroll-toolbar")) return;  // 중복 방지

    // .scroll-head 바로 다음에 끼운다 (없으면 맨 앞)
    const head = sv.querySelector(".scroll-head");
    const tmp = document.createElement("div");
    tmp.innerHTML = buildToolbar().trim();
    const bar = tmp.firstChild;
    if(head && head.nextSibling) sv.insertBefore(bar, head.nextSibling);
    else sv.insertBefore(bar, sv.firstChild);

    // 이벤트
    bar.querySelectorAll(".stb-zoom").forEach(b=>{
      b.addEventListener("click", ()=>{
        const v = b.dataset.scale;
        applyScale(v === "fit" ? "fit" : parseFloat(v));
      });
    });
    bar.querySelectorAll(".stb-jump").forEach(b=>{
      b.addEventListener("click", ()=> jumpToYear(parseInt(b.dataset.year,10)));
    });

    // 기본 100%로 표시 (단, 좁은 화면에선 「한눈에」가 더 친절)
    const startScale = (window.innerWidth < 700) ? "fit" : 1;
    applyScale(startScale);
  }

  // 8) render 후 매번 install (다른 view로 떠나면 자연히 사라진다)
  if(typeof render !== "function"){
    console.warn("[Phase 11] render 가 없어 중단");
    return;
  }
  const _orig = render;
  render = function(picks){
    _orig(picks);
    setTimeout(install, 0);
  };

  // 9) 윈도우 크기 변경 시 「한눈에」 재계산
  window.addEventListener("resize", ()=>{
    if(typeof view === "undefined" || view !== "scroll") return;
    if(currentScale === "fit") applyScale("fit");
  });

  console.log("[Phase 11] 두루마리 도구 막대 작동 중");
})();


/* ============================================================
   Phase 12 : 7개 메뉴를 3그룹으로 묶고, 표제(masthead) 숨김
   ─────────────────────────────────────────────────────────
   (1) 기존 7개 nav-btn을 보존하되 화면에서는 감춘다.
       대신 위에 3개의 「그룹 버튼」을 놓는다.
         展(펴기) — 序說 읽기 · 輿地圖 · 六門百科
         探(찾기) — 三十六篇 · 주제로 찾기 · 인물로 찾기
         籤(뽑기) — 무작위로 제시  (단일 항목, 바로 실행)
       그룹을 누르면 하단에 그 그룹의 하위 버튼이 펼쳐진다.
       하위 버튼 클릭은 숨겨진 원 버튼을 programmatic click → 기존
       핸들러가 그대로 동작 (view 전이·render).
   (2) 표제 .masthead 우상단에 × 버튼을 단다. 클릭하면 표제가
       사라지고 그 자리에 「▸ 표제 다시 보기」 한 줄이 남는다.
       선택은 localStorage 에 저장해 다음 방문에도 유지된다.
   ─ 원본 markup / scrollHtml / prefaceHtml 은 손대지 않는다.
============================================================ */
(function(){
  const GROUPS = [
    { id:"g1", han:"展", label:"펴기", hint:"序說·輿地圖·六門",
      items:["preface","atlas","liumen"] },
    { id:"g2", han:"探", label:"찾기", hint:"三十六篇·主題·人物",
      items:["chapter","topic","person"] },
    { id:"g3", han:"籤", label:"뽑기", hint:"無作爲",
      items:["random"], direct:true },
  ];
  let activeGroup = null;

  // ── 1) 스타일 ─────────────────────────────────────
  if(!document.getElementById("phase12-style")){
    const st = document.createElement("style");
    st.id = "phase12-style";
    st.textContent = `
      .groupbar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:22px 0 6px;}
      .grp-btn{display:flex;flex-direction:column;align-items:center;gap:3px;
        font-family:var(--serif);padding:13px 6px;background:transparent;
        border:1.5px solid var(--ink);border-radius:2px;color:var(--ink);
        cursor:pointer;transition:.15s;}
      .grp-btn:hover{background:rgba(0,0,0,.04);}
      .grp-btn.on{background:var(--ink);color:var(--paper);}
      .grp-han{font-family:var(--tc);font-size:18px;font-weight:700;letter-spacing:.12em;}
      .grp-label{font-size:11.5px;letter-spacing:.06em;opacity:.85;}
      .subbar{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 16px;justify-content:center;
        animation:rise .28s ease both;}
      .sub-btn{font-family:var(--serif);font-size:13px;padding:8px 14px;background:transparent;
        border:1.2px solid var(--line);border-radius:2px;color:var(--ink-soft);
        cursor:pointer;transition:.13s;letter-spacing:.02em;}
      .sub-btn:hover{background:rgba(0,0,0,.04);color:var(--ink);border-color:var(--ink-soft);}
      .sub-btn.on{background:var(--seal);color:var(--paper);border-color:var(--seal);}
      .masthead{position:relative;}
      .masthead.mh-hidden{display:none;}
      .masthead-close{position:absolute;top:6px;right:6px;width:22px;height:22px;
        display:flex;align-items:center;justify-content:center;background:transparent;
        border:1px solid var(--line);border-radius:2px;font-family:var(--serif);
        font-size:14px;color:var(--ink-soft);cursor:pointer;line-height:1;padding:0;
        transition:.13s;}
      .masthead-close:hover{background:rgba(0,0,0,.05);color:var(--ink);border-color:var(--ink-soft);}
      .masthead-restore{display:block;margin:0 0 14px;font-family:var(--serif);font-size:11.5px;
        color:var(--ink-soft);background:transparent;border:none;cursor:pointer;
        letter-spacing:.05em;text-decoration:underline dotted;opacity:.6;padding:2px 0;}
      .masthead-restore:hover{opacity:1;color:var(--ink);}
      @media(max-width:560px){
        .grp-han{font-size:16px;}
        .grp-label{font-size:10.5px;}
        .sub-btn{font-size:12px;padding:7px 11px;}
      }
    `;
    document.head.appendChild(st);
  }

  // ── 2) 그룹 메뉴 설치 / 동기화 ──────────────────────
  function installGroupBar(){
    if(typeof entered !== "undefined" && !entered) return;
    const nav = document.querySelector(".navbar");
    if(!nav) return;
    if(nav.parentNode.querySelector(".groupbar")) { syncBar(); return; }

    nav.style.display = "none"; // 원 navbar는 숨김 (핸들러는 살아 있음)

    const gb = document.createElement("div");
    gb.className = "groupbar";
    gb.innerHTML = GROUPS.map(g => `
      <button class="grp-btn" data-grp="${g.id}" title="${g.hint}">
        <span class="grp-han">${g.han}</span>
        <span class="grp-label">${g.label}</span>
      </button>`).join("");
    nav.parentNode.insertBefore(gb, nav);

    const sb = document.createElement("div");
    sb.className = "subbar";
    nav.parentNode.insertBefore(sb, nav);

    gb.querySelectorAll(".grp-btn").forEach(b=>{
      b.addEventListener("click", ()=>{
        const grp = GROUPS.find(g=>g.id===b.dataset.grp);
        if(grp.direct){
          // 단일 항목 그룹(뽑기) — 곧장 실행
          const tgt = nav.querySelector(`[data-view="${grp.items[0]}"]`);
          if(tgt) tgt.click();
          activeGroup = grp.id;
          return;
        }
        // 펴기/찾기 ─ 항상 그 그룹의 첫 항목으로 진입.
        //   그래야 직전이 '뽑기(random)' 였더라도 본문이 깨끗이
        //   교체되고 randomSubMode 도 원래 핸들러에서 null이 된다.
        //   같은 그룹을 재클릭해 첫 항목으로 되돌아가는 것도 동일 동작.
        activeGroup = grp.id;
        const tgt = nav.querySelector(`[data-view="${grp.items[0]}"]`);
        if(tgt) tgt.click();
      });
    });
    syncBar();
  }

  function syncBar(){
    const gb = document.querySelector(".groupbar");
    const sb = document.querySelector(".subbar");
    const nav = document.querySelector(".navbar");
    if(!gb || !sb || !nav) return;

    // activeGroup 미지정이면 현재 view로부터 추론
    if(activeGroup === null && typeof view !== "undefined" && view){
      const found = GROUPS.find(g=>g.items.includes(view));
      if(found) activeGroup = found.id;
    }
    gb.querySelectorAll(".grp-btn").forEach(b=>{
      b.classList.toggle("on", b.dataset.grp === activeGroup);
    });

    sb.innerHTML = "";
    if(!activeGroup){ sb.style.display = "none"; return; }
    const grp = GROUPS.find(g=>g.id===activeGroup);
    if(!grp || grp.direct){ sb.style.display = "none"; return; }
    sb.style.display = "flex";
    grp.items.forEach(vn=>{
      const orig = nav.querySelector(`[data-view="${vn}"]`);
      if(!orig) return;
      const btn = document.createElement("button");
      btn.className = "sub-btn" + (orig.classList.contains("on") ? " on" : "");
      btn.textContent = orig.textContent.trim();
      btn.addEventListener("click", ()=> orig.click());
      sb.appendChild(btn);
    });
  }

  // ── 3) 표제(masthead) 숨김 ──────────────────────────
  const MH_KEY = "seseol_masthead_hidden_v1";
  function isMastheadHidden(){
    try { return localStorage.getItem(MH_KEY) === "1"; } catch(e){ return false; }
  }
  function setMastheadHidden(v){
    try { localStorage.setItem(MH_KEY, v ? "1" : "0"); } catch(e){}
  }

  function installMasthead(){
    if(typeof entered !== "undefined" && !entered) return;
    const m = document.querySelector(".masthead");
    if(!m) return;

    // 닫기(×) 버튼 부착 (중복 방지)
    if(!m.querySelector(".masthead-close")){
      const x = document.createElement("button");
      x.className = "masthead-close";
      x.textContent = "×";
      x.title = "표제 숨기기";
      x.setAttribute("aria-label","표제 숨기기");
      x.addEventListener("click",(e)=>{
        e.stopPropagation();
        setMastheadHidden(true);
        m.classList.add("mh-hidden");
        ensureRestoreLink();
      });
      m.appendChild(x);
    }

    // 저장된 상태 반영
    if(isMastheadHidden()){
      m.classList.add("mh-hidden");
      ensureRestoreLink();
    } else {
      m.classList.remove("mh-hidden");
      const r = m.parentNode.querySelector(".masthead-restore");
      if(r) r.remove();
    }
  }

  function ensureRestoreLink(){
    const m = document.querySelector(".masthead");
    if(!m) return;
    if(m.parentNode.querySelector(".masthead-restore")) return;
    const r = document.createElement("button");
    r.className = "masthead-restore";
    r.textContent = "▸ 표제 다시 보기";
    r.addEventListener("click",()=>{
      setMastheadHidden(false);
      m.classList.remove("mh-hidden");
      r.remove();
    });
    m.parentNode.insertBefore(r, m.nextSibling);
  }

  // ── 4) render 후 매번 설치 ─────────────────────────
  if(typeof render === "function"){
    const _orig = render;
    render = function(picks){
      _orig(picks);
      setTimeout(()=>{
        installMasthead();
        installGroupBar();
      }, 0);
    };
  }
  setTimeout(()=>{
    installMasthead();
    installGroupBar();
  }, 0);

  console.log("[Phase 12] 3그룹 메뉴 + 표제 숨김 작동 중");
})();


/* ============================================================
   Phase 13 : 「人物·事件 關係圖」 핸들러
   ─ scrollHtml() 이 돌려준 HTML 은 innerHTML 로 주입되므로
     그 안의 <script> 는 작동하지 않는다. 여기서 render 후마다
     view==="scroll" 일 때 클릭 핸들러를 부착한다.
============================================================ */
(function(){
  function installRelmap(){
    if(typeof view === "undefined" || view !== "scroll") return;
    const root = document.querySelector(".relmap-view");
    if(!root) return;
    if(root.dataset.bound === "1") return;
    root.dataset.bound = "1";

    const data = window.__RELMAP_DATA || {EV_PEOPLE:{}, PERSON_EV:{}, PERSON_CL:{}};
    const EV_PEOPLE = data.EV_PEOPLE, PERSON_EV = data.PERSON_EV, PERSON_CL = data.PERSON_CL;
    let mode = null;

    function applyClear(){
      root.querySelectorAll(".rm-ev.on, .rm-person.on, .rm-person.hot, .rm-person.warm, .rm-cluster.has-hot")
        .forEach(n=> n.classList.remove("on","hot","warm","has-hot"));
      root.classList.remove("rm-active");
      mode = null;
    }
    function applyEv(year){
      applyClear();
      const li = root.querySelector('.rm-ev[data-ev="'+year+'"]');
      if(!li) return;
      li.classList.add("on");
      (EV_PEOPLE[year]||[]).forEach(p=>{
        const btn = root.querySelector('.rm-person[data-person="'+p+'"]');
        if(btn){
          btn.classList.add("hot");
          const cl = btn.closest(".rm-cluster");
          if(cl) cl.classList.add("has-hot");
        }
      });
      root.classList.add("rm-active");
      mode = {kind:"ev", key:year};
    }
    function applyPerson(name){
      applyClear();
      const btn = root.querySelector('.rm-person[data-person="'+name+'"]');
      if(!btn) return;
      btn.classList.add("on","hot");
      const clId = PERSON_CL[name];
      if(clId){
        const cl = root.querySelector('.rm-cluster[data-cluster="'+clId+'"]');
        if(cl){
          cl.classList.add("has-hot");
          cl.querySelectorAll(".rm-person").forEach(b=>{ if(b!==btn) b.classList.add("warm"); });
        }
      }
      (PERSON_EV[name]||[]).forEach(y=>{
        const li = root.querySelector('.rm-ev[data-ev="'+y+'"]');
        if(li) li.classList.add("on");
      });
      root.classList.add("rm-active");
      mode = {kind:"person", key:name};
    }

    root.querySelectorAll(".rm-ev").forEach(li=>{
      li.addEventListener("click", ()=>{
        const y = +li.dataset.ev;
        if(mode && mode.kind==="ev" && mode.key===y) applyClear();
        else applyEv(y);
      });
    });
    root.querySelectorAll(".rm-person").forEach(b=>{
      b.addEventListener("click", ()=>{
        const n = b.dataset.person;
        if(mode && mode.kind==="person" && mode.key===n) applyClear();
        else applyPerson(n);
      });
    });
    const clearBtn = root.querySelector("#rmClearBtn");
    if(clearBtn) clearBtn.addEventListener("click", applyClear);
  }

  if(typeof render === "function"){
    const _orig = render;
    render = function(picks){
      _orig(picks);
      setTimeout(installRelmap, 0);
    };
  }
  setTimeout(installRelmap, 0);
  console.log("[Phase 13] 人物·事件 關係圖 핸들러 작동 중");
})();


/* ============================================================
   Phase 14 : 序說 ― 소제목을 누르면 목차로 돌아간다
============================================================ */
(function(){
  function installTocJump(){
    if(typeof view === "undefined" || view !== "preface") return;
    const toc = document.getElementById("preface-toc");
    if(!toc) return;
    document.querySelectorAll(".preface-chap > h3").forEach(h=>{
      if(h.dataset.tocBound === "1") return;
      h.dataset.tocBound = "1";
      h.setAttribute("title","목차로 돌아가기");
      h.addEventListener("click", ()=>{
        toc.scrollIntoView({ behavior:"smooth", block:"start" });
      });
    });
  }
  if(typeof render === "function"){
    const _orig = render;
    render = function(picks){
      _orig(picks);
      setTimeout(installTocJump, 0);
    };
  }
  setTimeout(installTocJump, 0);
  console.log("[Phase 14] 序說 소제목 → 목차 점프 작동 중");
})();


render([]);
</script>
