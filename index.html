 진짜 영웅이오</em> 답했다는 일화 역시 〈용지(容止)〉의 한 명장면이다.\n\n또 한 자리는 〈첩오(捷悟)〉의 <em>계륵(鷄肋)</em> 일화다. 한중(漢中)에서 진퇴를 두고 망설이며 군중의 암호를 <em>계륵</em>이라 내리자, <em>양수(楊脩)</em>가 곧 <em>닭의 갈비는 버리기는 아깝고 먹자니 살이 없으니, 공께서 곧 물러나실 것</em>이라 풀이해 짐을 꾸렸다. 조조의 속을 너무 잘 읽은 양수는 결국 그 영민함 때문에 죽임을 당했다. 조조의 가장 어두운 면 — 자기보다 앞서 가는 재능을 견디지 못하는 — 이 이 한 자리에 응축돼 있다.\n\n220년 정월, 조조는 낙양에서 죽었다. 향년 66세였다. 그가 죽고 그해 안에 <em>조비</em>가 한 헌제로부터 선양을 받아 위를 세웠다. 후한 사백 년이 그렇게 끝났다. 『세설신어』가 그리는 위진 명사의 무대는 곧 그가 닦아 놓은 위의 터 위에 펼쳐진 것이며, 그의 다면적 그림자 — 영걸과 간웅, 시인과 잔혹한 군주 — 가 〈가휼〉·〈첩오〉·〈용지〉·〈호상〉편 곳곳에 길게 드리워져 있다.", "storyCount": 4}, {"id": "person.謝萬", "type": "person", "han": "謝萬", "ko": "사만", "sub": "만석(萬石) · 320~361", "title": "사안의 동생, 청담 명사", "short": "풍자(風姿)와 청담에 능함. 그러나 자부심이 지나치고 군사들을 돌보지 않아 북벌 중 군이 무너져 폐서인됨. 출정 전 사안이 \"장수가 되어 어찌 한 번도 사졸을 위로하지 않는가\" 충고. 패주 직전, 사안이 사졸을 일일이 다독여 화를 면하게 함. 출세 외에는 늘 형의 그늘에 있음.", "long": "謝萬은 자가 만석(萬石)이다. 진군(陳郡) 양하(陽夏)의 사씨 출신으로, <em>사부(謝裒)</em>의 아들이며 <em>사혁</em>의 아우이자 <em>사안</em>의 동생이다. 320년에 나서 361년에 죽었다. 사안이 <em>동산</em>에 은거하던 시절, 정사의 일선에 먼저 나아간 형제 중 하나가 만이다.\n\n만은 풍자(風姿)가 빼어났다. 흰 얼굴에 시원한 눈매로, 서서 옥주미를 들면 자리의 빛이 되었다 한다. 청담에도 능했다. <em>지도림</em>·<em>왕몽</em>·<em>유담</em>과 어울려 명리(名理)를 논하면 그 응답이 민첩했고, 한 자리의 주(主)가 되면 풍모가 좌중을 압도했다. 〈상예〉·〈품조〉편에 그의 풍자를 기리는 자리가 적지 않다. <em>환온</em>조차 그의 청담을 한 번 듣고 <em>사가의 아이들이 모두 이렇구나</em> 감탄했다 전한다.\n\n그러나 자부심이 지나쳤다. 자기 풍자와 명리에 스스로 취해, 사람을 대하는 데 거만했다. <em>오만한 기색을 감추지 못하는</em> 자리가 잦았다 한다. 형 사안이 이를 늘 걱정했다. 사안은 동생의 재주를 알았으나, 그 재주가 <em>자기 자리를 모르는 재주</em>임을 또한 알았다. 만이 사람을 깔보는 말을 할 때마다 사안이 옆에서 <em>만석아, 그러지 마라</em> 부드럽게 막았다는 일화가 전한다.\n\n승평(升平) 3년(359), 만이 <em>예주자사(豫州刺史)</em>가 되어 북벌의 한 갈래를 맡았다. 북으로 <em>연(燕)</em>의 <em>모용씨</em>를 치는 길이다. 사안이 출정 전에 동생에게 정색하고 말했다. <em>장수가 되어 어찌 한 번도 사졸을 위로하지 않는가. 군대는 풍자로 거느리는 것이 아니다.</em> 만이 마지못해 장수들을 한자리에 불러 모았다. 그러나 그가 옥주미를 들고 한참 말이 없다가 손가락으로 좌중을 가리키며 <em>제군은 모두 굳센 군졸이다(諸君皆勁卒)</em> 한마디를 던졌을 뿐이다. <em>졸(卒)</em>이라는 말이 장수들의 가슴에 박혔다. 그날 이후 막부의 장수들이 모두 만에게서 마음이 떠났다.\n\n북상한 군이 <em>허창(許昌)</em>에 못 미쳐 무너졌다. 적과 제대로 부딪치기도 전에 안에서 흩어졌다. 일설에는 장수들이 이참에 만을 죽이려 했다고도 한다. 그 직전에 사안이 형으로서 군중을 돌며 사졸을 일일이 다독였다. <em>내 동생의 허물은 내가 안다. 그대들의 노고는 내가 안다.</em> 그 한마디로 칼을 든 손이 풀렸다. 만은 단신으로 도망쳐 화를 면했고, 곧 폐서인되었다.\n\n폐서인의 충격은 진군 사씨 전체를 흔들었다. 형 <em>사혁</em>은 이미 죽은 뒤였고, 만이 무너지자 가문의 무게가 한순간에 비었다. 이것이 곧 사안이 마흔의 나이로 <em>동산</em>에서 나오게 된 직접적 계기다. 동생의 좌절이 형의 출사를 불렀다.\n\n361년, 만은 폐서인의 신분에서 풀려나 산기상시(散騎常侍)에 임명되었으나 부임하기 전에 죽었다. 향년 42세였다. 풍자와 청담에 능했으되 자기 그릇을 몰랐고, 출세에서나 사상에서나 늘 형의 그늘에 있던 사람이다.\n\n『세설신어』에서 그는 〈상예〉·〈품조〉·〈경저〉·〈간오〉편 등에 등장한다. 序說 12章이 그리는 <em>사씨 형제의 명암</em>에서, 만은 사안의 그늘이자 사안을 동산에서 끌어낸 한 자락의 바람이었다.", "storyCount": 17}, {"id": "person.王獻之", "type": "person", "han": "王獻之", "ko": "왕헌지", "sub": "자경(子敬) · 344~386", "title": "왕희지의 일곱째 아들, 서가", "short": "부친의 서법을 잇고 일가를 이루어 부친과 함께 \"이왕(二王)\"으로 병칭됨. 풍채와 재기가 빼어남. 효무제·사안의 총애를 받음. 부인 치도무(郗道茂)와 강제로 헤어진 후 평생을 슬퍼함. 어려서 부친이 뒤에서 붓을 빼앗으려 했으나 잡힌 붓이 빠지지 않으니, 부친이 \"이 아이가 큰 명필이 될 것이다\" 함.", "long": "王獻之는 자가 자경(子敬)이다. <em>왕희지(王羲之)</em>의 일곱째 아들이다. <em>낭야 왕씨(琅邪王氏)</em> 가문에서 부친의 서법을 이어 일가를 이루었고, 후대에 부친과 함께 <em>이왕(二王)</em>으로 병칭된다. 동진의 한낮에 태어나, 동진의 가을이 깊어 가던 무렵에 마흔셋의 나이로 세상을 떠났다.\n\n어려서의 일화 한 자락이 그의 일생을 미리 비춘다. 어린 헌지가 글씨를 쓰고 있을 때 부친 <em>왕희지</em>가 뒤에서 가만히 다가가 붓을 빼앗으려 했다. 그러나 아이의 손에 잡힌 붓이 빠지지 않았다. 희지가 <em>이 아이가 훗날 큰 명필이 되리라</em> 했다 한다. <em>붓을 쥐는 힘</em>이 곧 글씨의 골격이라는 서법의 한 비결이 이 한 장면에 응축되어 있다. 〈숙혜〉편의 명장면이다.\n\n자라서 그의 서법은 부친의 길을 따르되 부친을 그대로 답습하지 않았다. 부친의 글씨가 <em>내경(內勁)</em>과 단정의 풍이라면, 헌지의 글씨는 <em>외척(外拓)</em>과 분방의 풍이다. 한 글자를 한 호흡에 이어 쓰는 <em>일필서(一筆書)</em>의 행초(行草)에서 헌지가 특히 빼어났다. 부친에게 <em>글씨의 격을 어찌 더 올릴 수 있겠습니까</em> 물으니 부친이 <em>장초(章草)를 익히라</em> 답했다 한다. 부친이 죽은 뒤 헌지는 부친의 자리를 메우는 동진 제일의 서가로 일컬어졌다.\n\n풍채와 재기 또한 한 시대의 정점이었다. <em>사안</em>이 그를 매우 아꼈고, 효무제(孝武帝) 또한 그를 가까이 두었다. 어느 자리에서 사안이 <em>그대의 글씨가 부친에 비하면 어떠한가</em> 묻자, 헌지가 <em>각각 한 자리가 있을 뿐입니다</em> 했다. 부친을 높이지도 자기를 낮추지도 않은 이 한마디가 〈품조〉편의 한 자리에 남았다. <em>환온</em>의 아들 <em>환현</em>이 후에 헌지의 글씨를 수집해 평생의 보물로 삼은 것도 이 시기 헌지의 위상을 보여 준다.\n\n그러나 그의 일생을 가장 깊이 갈라놓은 것은 서법이 아니라 한 여인이었다. 첫 부인 <em>치도무(郗道茂)</em>는 외숙의 딸로, 어릴 적부터 정혼한 사이였다. 부부의 정이 두터웠다 전한다. 그러나 <em>신안공주(新安公主)</em>가 헌지를 사모해 황실이 강제로 치도무를 내치게 하고 공주를 헌지에게 시집보냈다. 헌지는 거역하지 못했고, 치도무는 친정으로 돌아가 평생을 외롭게 살다 죽었다 한다. 헌지가 임종 직전 도사(道士)에게 <em>생애에 무슨 한이 있는가</em> 물음을 받고 <em>다른 일은 기억나지 않으나, 다만 치씨와 헤어진 일이 한이로다</em> 답했다 한다. 한 시대의 풍류 명사가 평생을 한 여인의 그림자에 끌려 간 셈이다.\n\n효무제 때 중서령(中書令)에 이르렀으므로 후세에 <em>왕대령(王大令)</em>으로도 일컬어진다. 부친이 <em>우군(右軍)</em>이라면 그가 <em>대령(大令)</em>이다. 386년에 병으로 죽었다. 향년 43세. 부친보다 짧은 생애였으나, 동진 서법의 한 봉우리를 부친과 나란히 세우고 떠났다.\n\n『세설신어』에서 헌지는 〈언어〉·〈아량〉·〈품조〉·〈숙혜〉·〈용지〉·〈배조〉 등 여러 편에 그 모습이 흩어져 있다. 부친 <em>왕희지</em>의 한낮 옆에 한 그루 또 한 그루의 송백처럼 선 아들의 모습이 그것이다.", "storyCount": 17}, {"id": "person.顧愷之", "type": "person", "han": "顧愷之", "ko": "고개지", "sub": "장강(長康) · 약 344~405", "title": "동진의 화가, 삼절(三絶)", "short": "인물화에 신묘하여 \"재절(才絶)·화절(畵絶)·치절(癡絶)\"의 삼절이라 불림. 사람을 그릴 때 수 년간 눈동자를 찍지 않으면서, \"전신(傳神)은 바로 이 속에 있다\" 함. 배해의 광대뼈에 털 세 가닥을 더 그려 신령함을 살림. 어수룩한 면이 많아 환현에게 자주 속음.", "long": "顧愷之는 자가 장강(長康), 어릴 적 자는 호두(虎頭)다. 진릉(晉陵) 무석(無錫) 사람으로, 동진 중기에서 후기에 걸쳐 살았다. <em>환온(桓溫)</em>의 막부에 들어 참군(參軍)이 되었고, 환온이 죽은 뒤에는 그 아들 <em>환현(桓玄)</em>과 <em>은중감(殷仲堪)</em>의 막하를 오갔다. 벼슬은 산기상시(散騎常侍)에 이르렀다. 그러나 그의 이름이 천 년을 가는 까닭은 관직에 있지 않다. 그는 <em>그림</em>으로 동진을 대표하는 자리에 섰다.\n\n당시 사람들은 그를 <em>삼절(三絶)</em>로 일컬었다. <em>재절(才絶)</em>·<em>화절(畵絶)</em>·<em>치절(癡絶)</em>이다. 재주가 절세요, 그림이 절세요, 어리숙함마저 절세라는 말이다. 앞의 둘은 칭송이고 셋째는 농(弄)이지만, 동진 명사 문화에서 이 셋이 한 사람에게 모인 것 자체가 한 인격의 완성으로 여겨졌다. 모자라 보이는 한 자리가 곧 <em>진(眞)</em>의 표지였기 때문이다.\n\n그의 그림은 <em>인물화</em>에서 한 시대의 정점을 이뤘다. 사람을 그리되 형(形)을 닮게 그리는 것이 아니라 그 사람의 <em>신(神)</em>을 옮기는 것을 으뜸으로 삼았다. 그가 남긴 <em>전신사조(傳神寫照)</em>라는 말, 그리고 <em>형은 신에 따라 그려진다</em>는 사유가 그것이다. 사람을 그릴 때 그는 흔히 수 년이 지나도록 <em>눈동자</em>를 찍지 않았다. 누가 까닭을 물으면 <em>사지의 곱고 못함은 본래 신묘함과 관계가 없다, 전신사조는 바로 이 속에 있다(傳神寫照, 正在阿堵中)</em> 답했다 한다. <em>아도(阿堵)</em>는 <em>이것</em>이라는 구어인데, 곧 <em>눈동자</em>를 가리킨다. 사람의 정신이 두 눈에 모이는 자리, 그 한 점을 찍을 자리에 이르러서야 비로소 붓을 댄 것이다.\n\n<em>배해(裴楷)</em>를 그릴 때의 일화도 유명하다. 고개지가 배해의 광대뼈 위에 털 세 가닥을 더 그려 넣었다. 누가 <em>왜 그러느냐</em> 묻자 <em>배해는 본래 식견이 깊은 사람이니, 이 세 가닥이 곧 그의 신명(神明)이다</em> 답했다. 그림을 보던 사람들이 과연 한층 신령해 보인다 했다. 형을 더한 것이 아니라 신을 더한 것이다. 같은 사유로, <em>사곤(謝鯤)</em>을 그릴 때는 그를 바위 사이에 두었다. <em>이 사람은 본래 산수의 사이에 두어야 마땅하다</em>는 까닭이다. 인물 한 사람을 그리는 데 배경의 자리까지 그 사람의 신에 맞춰 골랐다.\n\n그러나 그는 한편으로 <em>치절</em>이라 일컬어질 만큼 어수룩했다. <em>환현</em>이 곧잘 그를 속였다. 한 번은 고개지가 자기 그림을 상자에 넣어 봉한 뒤 환현에게 맡겼는데, 환현이 뒤로 상자를 뜯어 그림을 빼고 도로 봉해 돌려주었다. 고개지가 받아 보고 그림이 없어진 줄 알았으나 봉인이 멀쩡한 것을 보고 <em>묘한 그림은 신통하여 변화해 사라진 것이니, 마치 사람이 신선이 되어 오르는 것과 같다</em> 감탄했다 한다. 속은 줄 모르고 도리어 그림의 신묘함으로 풀어낸 것이다. 그의 어리숙함이 곧 그의 진실함과 한 자리였다.\n\n그가 남긴 화론(畵論)으로 <em>논화(論畵)</em>·<em>위진승류화찬(魏晉勝流畵贊)</em>·<em>화운대산기(畵雲臺山記)</em>가 전한다. <em>전신</em>·<em>천상묘득(遷想妙得)</em>·<em>이형사신(以形寫神)</em>의 개념이 모두 여기서 나왔다. 후세에 <em>오도자(吳道子)</em>에 이르기까지의 인물화 전통이 모두 이 한 사람에게서 갈라져 나왔다 해도 지나치지 않다. 현전하는 <em>여사잠도(女史箴圖)</em>·<em>낙신부도(洛神賦圖)</em>가 그의 작이라 전하나, 모두 후대의 모본(摹本)이다. 그러나 그 모본에서도 옷자락의 <em>춘잠토사(春蠶吐絲)</em> 같은 선과 인물의 눈빛에 그의 자취가 어른거린다.\n\n『세설신어』에서 그는 〈문학〉·〈아량〉·〈배조〉·〈교예〉편 등에 모습을 드러낸다. 동진 명사 문화가 청담과 시문과 서법을 한 인격에 모으려 했다면, 고개지에 이르러 그 자리에 <em>그림</em>이 더해졌다. <em>전신</em>이라는 한 말, 그것이 곧 동진 인물 사유의 회화적 결산이다.", "storyCount": 14}, {"id": "person.王澄", "type": "person", "han": "王澄", "ko": "왕징", "sub": "평자(平子) · 269~312", "title": "광달(曠達)의 명사", "short": "왕연의 동생. 광달한 풍모로 일찍부터 명성. 청담과 음주를 즐기고, 옷을 풀어헤친 채 나무에 올라 우는 까치 새끼를 손에 쥐는 등 거리낌이 없음. 형주자사로 나갔다가 왕돈에게 시기당해 살해됨. 형 왕연이 \"우리 아우의 사람됨은 헤아릴 수 없다\" 평.", "long": "王澄은 자가 평자(平子)다. 낭야(琅邪) 왕씨 출신으로, 형이 곧 서진 말의 청담 영수 <em>왕연(王衍)</em>이다. 형제가 함께 한 시대의 명사로 일컬어졌으며, 형이 <em>옥같이 단정한 풍모</em>라면 동생은 <em>광달(曠達)한 풍모</em>로 일찍부터 이름을 얻었다.\n\n어릴 적부터 풍격이 남달랐다 한다. 형 왕연이 한 번은 <em>우리 아우의 사람됨은 헤아릴 수 없다(我家阿平, 不可量)</em>라 평했다. 같은 가문의 <em>왕돈(王敦)</em>·<em>왕도(王導)</em>와 함께 <em>낭야 사왕(四王)</em>으로 일컬어진 자리에서, 평자는 가장 거리낌 없는 인물로 통했다. <em>완적(阮籍)</em>과 <em>혜강(嵇康)</em> 이래의 <em>임탄(任誕)</em>의 풍속이 그에게서 다시 한 번 꽃을 피웠다.\n\n일화가 많다. 옷을 풀어헤치고 머리를 산발한 채 나무 위에 올라 까치 새끼를 손에 쥐었다는 이야기가 〈간오〉편에 전한다. 좌중이 모두 놀라는데 평자는 까치 새끼를 어루만지며 태연히 내려왔다. <em>위개(衛玠)</em>가 죽기 전 <em>평자의 광달함을 한 번 보고 싶다</em> 청해 두 사람이 만난 자리도 한 시대의 풍경이었다. 술을 즐겨 잔을 들면 끝을 보지 않고는 놓지 않았으며, 곁의 사람을 가리지 않고 청담을 펼쳤다. 그의 옥주미가 한 번 들리면 좌중이 조용해졌다 한다.\n\n광달한 풍격은 <em>현학</em>의 한 자연스러운 발현이었다. <em>명교(名敎)</em>의 격식을 벗고 <em>자연(自然)</em>에 맡긴다는 정시 이래의 명제가, 평자에게서는 거의 몸의 습관이 되어 있었다. 다만 그 광달이 <em>왕연</em>처럼 정치를 비워 두는 쪽으로 흘렀던 점은 형제의 공통이었다. 형이 청담의 자리에 머물러 <em>팔왕의 난</em>의 한가운데서 정사를 비웠다면, 동생은 변방의 책무를 맡고도 그 자리를 지키지 못했다.\n\n영가(永嘉) 연간, 평자는 형주자사(荊州刺史)로 나갔다. 변방의 무거운 자리였으나, 도착해서도 청담과 음주를 놓지 않고 <em>유민(流民)</em>과 <em>호족(豪族)</em>의 분란을 다스리지 못했다. <em>두도(杜弢)</em>의 난이 일어나자 군세는 흩어지고 형주의 정세는 무너졌다. 평자는 임지를 버리고 동쪽으로 달아나야 했다.\n\n피난길에 <em>왕돈</em>에게 의지했다. 그러나 왕돈은 일찍부터 평자의 명성을 시기해 두고 있었다. 평자가 광달한 풍격으로 좌중을 압도하고 왕돈을 가볍게 여긴 일이 거듭 쌓여 있던 터였다. 형주에서의 실정(失政)이 좋은 구실이 되었다. 312년, 왕돈이 그를 자기 군중에 청해 두고 장사(力士)를 시켜 목 졸라 죽이게 했다. 향년 44세였다. 한 시대 <em>광달</em>의 한 정점이 그렇게 꺾였다.\n\n평자의 죽음은 서진 말 명사 문화의 한 그림자다. 청담과 광달이 한 인격을 길렀으나, 그 인격이 변방의 정사와 가문의 권력 다툼 앞에서는 무력했다. 형 <em>왕연</em>이 <em>석륵(石勒)</em>에게 잡혀 <em>나는 본래 정사에 뜻이 없었다</em> 변명하다 죽은 것이 같은 해의 일이다. 형제가 한 해에 무너지면서 서진 명사 문화의 한 시대가 함께 닫혔다.\n\n『세설신어』에서 평자는 〈상예〉·〈품조〉·〈임탄〉·〈간오〉·〈호상〉편에 두루 등장한다. 그 일화들은 한결같이 그의 광달함을 빛내지만, 그 빛 뒤에 어른거리는 것은 곧 서진의 황혼이다.", "storyCount": 13}, {"id": "person.裴楷", "type": "person", "han": "裴楷", "ko": "배해", "sub": "숙칙(叔則) · 237~291", "title": "서진의 명사, 옥인(玉人)", "short": "용모가 빼어나 \"옥인(玉人)\"이라 일컬어짐. 청담과 현담에 능함. 화교(和嶠)·왕융과 함께 인물 품평의 일가. 사람을 보면 그 진면목을 한 마디로 짚어내, 한 번 평가하면 그것이 곧 정평이 됨. 풍모만으로도 사람의 마음을 움직였다고 함.", "long": "裴楷는 자가 숙칙(叔則)이다. 하동(河東) 문희(聞喜)의 <em>배씨(裴氏)</em> 출신이다. 하동 배씨는 위진을 통틀어 으뜸가는 문벌의 하나로, <em>배수(裴秀)</em>가 지도학으로, <em>배해(裴楷)</em>가 풍모와 청담으로, <em>배위(裴頠)</em>가 사상으로 한 세대를 빛냈다. 그 가운데서도 숙칙은 <em>옥인(玉人)</em>이라는 한 마디로 시대의 기억에 새겨졌다.\n\n어려서부터 그릇이 다르다는 소리를 들었다. <em>종회(鍾會)</em>가 그를 한 번 보고 <em>재주가 청통(淸通)하니 가히 더불어 도(道)를 논할 만하다</em> 평했다 한다. 자라서 노장(老莊)과 주역에 깊이 들어가 <em>삼현(三玄)</em>을 두루 꿰었고, 특히 『노자』·『주역』을 강할 때면 듣는 이가 그 말의 결을 따라 저도 모르게 옷깃을 여몄다 전한다. 위 말의 <em>현학(玄學)</em> 풍속이 서진(西晉)으로 건너오는 길목에 그가 서 있었다.\n\n그의 풍모는 따로 전한다. 키가 크고 얼굴이 맑아, 사람들이 그를 보고 <em>옥인(玉人)</em>이라 했다. 한 번은 누가 그를 길에서 보고 <em>옥산(玉山)이 다가오는 듯하다</em> 했다 한다. 또 그가 병들어 누웠을 때 <em>왕융(王戎)</em>이 찾아와 <em>준령(峻嶺)에 송백이 시든 듯, 그 풍치는 그대로다</em> 탄식했다는 일화가 〈용지(容止)〉편에 전한다. 풍모만으로 좌중을 가라앉히는 힘이 그에게 있었다.\n\n그러나 그를 단지 미남으로만 기억하면 그를 잃는다. 숙칙의 진면목은 <em>인물 품평(人物品藻)</em>에 있었다. 그는 사람을 한 번 보면 그 됨됨이의 한가운데를 한 마디로 짚었다. <em>왕융이 험준한 바위 사이의 단애(斷崖) 같다</em>든가, <em>산도(山濤)는 옥과 돌이 섞여 있어 가려 쓰면 모두 그릇이 된다</em>든가, 한 마디를 던지면 그것이 그대로 그 사람의 정평(定評)이 되었다. <em>화교(和嶠)</em>·<em>왕융</em>과 더불어 당대 품조의 일가를 이뤘으나, 그 가운데서도 숙칙의 평이 가장 부드럽고 가장 깊다 일컬어졌다.\n\n품평의 자리에서 그는 남을 깎지 않았다. <em>깎으면 그 사람을 잃고, 띄우면 그 자리를 잃는다</em>는 것이 그의 자세였다 한다. 그러므로 그의 한 마디는 칭찬이되 과장이 없고, 비판이되 모서리가 없었다. <em>왕연(王衍)</em>이 그를 평해 <em>숙칙의 말은 옥을 굴리는 듯, 모서리에 다치지 않는다</em> 했다. 〈품조(品藻)〉·〈상예(賞譽)〉 두 편의 한 결이 그에게서 나왔다.\n\n벼슬은 무제(武帝) 사마염(司馬炎) 아래에서 시중(侍中)·중서령(中書令)에 이르렀다. <em>가충(賈充)</em>·<em>순욱(荀勖)</em>이 권세를 다투던 시기에도 그는 어느 한쪽에 깊이 기울지 않고 한 걸음 물러섰다. 무제가 새로 즉위해 시초점을 쳤다가 <em>一</em>이 나와 낯빛이 변하자, 숙칙이 <em>천(天)이 一을 얻어 맑고, 지(地)가 一을 얻어 편안하고, 왕후가 一을 얻어 천하의 곧음이 됩니다</em> 풀어 올려 좌중을 누그러뜨린 일화가 전한다. 노자의 한 구절을 빌려 임금의 마음을 가라앉힌, 현담이 곧 정사의 자리에 들어간 한 본보기다.\n\n만년에 그는 <em>팔왕의 난</em>이 일기 직전의 어수선한 도성에 머물렀다. 권세를 탐하지 않고 청담의 자리만 지켰으나, 시대의 바람을 끝내 피하지는 못했다. 영평(永平) 원년(291), 가후(賈后)의 정변이 일어나기 직전에 병으로 죽었다. 향년 55세였다. 사람들이 <em>옥인이 가니 한 자리의 빛이 꺼졌다</em> 했다 한다.\n\n『세설신어』에서 그는 〈덕행〉·〈언어〉·〈품조〉·〈상예〉·〈용지〉·〈아량〉 여러 편에 모습을 드러낸다. 위 말의 <em>정시(正始)</em> 풍류와 서진의 청담을 잇는 한 다리로서, 그의 <em>옥인</em>이라는 한 마디는 위진 명사 미학의 한 표지가 되었다.", "storyCount": 13}, {"id": "person.韓康伯", "type": "person", "han": "韓康伯", "ko": "한강백", "sub": "강백(康伯) · 332~380", "title": "동진의 청담가·현학가", "short": "이름은 백(伯), 자가 강백(康伯). 『주역(周易)』 계사전의 주(注)로 유명. 어려서 추운 겨울에 어머니가 한 벌의 옷밖에 못 지어 주자 \"다리는 짧고 머리는 뜨거우니 옷은 더 필요 없습니다\"라 하여 모친을 감동시킴. 모친 은씨(殷氏) 또한 현명한 부인으로 알려짐.", "long": "韓康伯의 이름은 백(伯)이고 자가 강백(康伯)이다. 영천(潁川) 장사(長社) 출신으로, 어머니가 <em>殷氏(은씨)</em>다. 외가가 곧 위진의 명문 진군(陳郡) 은씨여서, 외삼촌이 동진 한 시기의 정사를 쥐락펴락한 <em>은호(殷浩)</em>다. 이 두 줄, 곧 <em>은씨</em> 외가의 학풍과 자기 한씨의 청빈이, 한강백이라는 인물의 골격을 만들었다.\n\n어려서의 한 일화가 그를 평생 따라다닌다. 집이 가난해 추운 겨울에도 어머니가 옷을 두 벌 지어 주지 못했다. 한 벌 위에 다리를 덥힐 것이 없으니 어머니가 안쓰러워하자, 어린 강백이 <em>다리는 짧고 머리는 뜨거우니 옷은 더 필요치 않습니다</em> 답했다 한다. 어머니가 그 말에 눈물을 흘리고, 이 아이가 큰 그릇이 되리라 알았다 전한다. 이 한 마디는 〈숙혜(夙惠)〉편에 실려 한강백의 유년을 대표하는 자리가 되었다.\n\n어머니 <em>은씨</em>는 동진 명사 부인 가운데 손꼽히는 현부(賢婦)였다. 가난을 부끄러워하지 않고 학문을 굽히지 않게 길렀다. 자라서 한강백은 외삼촌 <em>은호</em>의 문하에 드나들며 <em>현학(玄學)</em>과 <em>명리(名理)</em>의 자리를 익혔다. 은호가 그를 <em>우리 집 천리마</em> 격으로 일컬었다 한다. 외삼촌이 <em>환온(桓溫)</em>과의 정쟁에서 폐서인되어 동양(東陽)으로 쫓겨난 뒤에도, 한강백은 끝까지 그 곁을 지키며 명리의 자리를 이어 받았다.\n\n그의 학문은 한 자리에 그치지 않았다. 일찍이 <em>왕필(王弼)</em>이 『주역(周易)』의 경문(經文)에 주를 달았으나 <em>계사전(繫辭傳)</em> 이하의 십익(十翼)에는 손을 대지 못한 채 요절했다. 그 비어 있던 자리를 메운 것이 한강백이다. 그가 지은 <em>계사전 주</em>·<em>설괘전 주</em>·<em>서괘전 주</em>·<em>잡괘전 주</em>는 왕필의 경문 주와 짝을 이루어 위진 <em>현학 易學</em>의 한 완성을 보였다. 후대에 당(唐) <em>공영달(孔穎達)</em>이 『주역정의』를 편찬할 때 경문은 왕필을, 십익은 한강백을 택해 두 사람의 주가 한 책에 묶이게 된 것이 그 증거다. 한강백의 손을 거치며 <em>體와 用</em>, <em>言과 意</em>, <em>無와 有</em>의 위진적 사유가 『주역』 안에 그대로 들어앉았다.\n\n청담의 자리에서도 그의 풍모는 알려졌다. 외삼촌 <em>은호</em>가 폐서인된 뒤에도 명리의 한 가지를 들어 보일 때면 한강백을 곁에 두고 <em>이 아이만 한 객(客)이 없다</em> 평했다 한다. <em>사안(謝安)</em>과 <em>왕탄지</em>의 시대에 그는 한 세대 아래의 명리가(名理家)로서 <em>손작</em>·<em>허순</em>의 자리를 잇는 자리에 섰다. 다만 외숙의 그늘과 청빈의 천성 탓에 정사의 한가운데로는 깊이 들어가지 않았다. 벼슬은 단양윤(丹陽尹)·이부상서(吏部尚書)에 이르렀고, 380년에 마흔아홉으로 죽었다.\n\n『세설신어』에서 한강백은 〈숙혜〉·〈문학〉·〈언어〉편에 두루 나타난다. 어머니의 한 벌 옷 앞에 <em>머리가 뜨겁다</em> 답한 그 한 마디와, 왕필이 남긴 빈자리에 <em>계사전</em>의 주를 채워 넣은 그 한 학문이 곧 한강백 한 사람의 두 얼굴이다.", "storyCount": 13}, {"id": "person.石崇", "type": "person", "han": "石崇", "ko": "석숭", "sub": "계륜(季倫) · 249~300", "title": "서진의 거부(巨富)", "short": "형주자사 시절 상인을 약탈해 천하의 재산을 모음. 왕개(王愷)와 부 자랑을 다툰 산호수 일화로 유명. 진무제의 외숙 왕개가 자랑하는 두 자(尺) 산호를 철여의(鐵如意)로 부수고 더 크고 화려한 것을 내보임. 애첩 녹주(綠珠) 때문에 손수(孫秀)에게 미움받아 일족과 함께 처형됨.", "long": "石崇은 자가 계륜(季倫)이다. 발해(渤海) 남피(南皮) 사람으로, 아버지 <em>석포(石苞)</em>가 <em>서진(西晉)</em> 개국의 공신이라 어려서부터 귀공자로 자랐다. 석포가 죽을 때 여러 아들에게 재산을 나누어 주면서 막내 석숭에게는 한 푼도 주지 않았다 한다. 사람들이 까닭을 묻자 석포가 <em>이 아이는 비록 작으나 능히 스스로 얻으리라</em> 답했다. 그 말이 그대로 들어맞아, 석숭은 한 시대의 가장 부유한 사람이 되었다.\n\n그 부의 출처가 떳떳하지는 않았다. 형주자사(荊州刺史)로 있을 때 <em>오가는 상인을 약탈해</em> 천하의 보화를 자기 창고에 쌓았다. 비단·산호·진주·향료·서역의 기물이 그의 <em>금곡원(金谷園)</em>에 산같이 쌓였다 전한다. 금곡원은 낙양 서쪽 금곡(金谷)에 지은 그의 별장으로, 못과 누대와 화원이 한 사람의 사저라기에는 지나치게 호사로웠다. 이곳에서 <em>반악(潘岳)</em>·<em>육기</em>·<em>좌사</em>를 비롯한 한 시대의 문사들이 모여 시회(詩會)를 열었으니, 이것이 곧 <em>금곡원의 모임</em>이며 후대 <em>난정(蘭亭)</em>의 한 선례로 일컬어진다.\n\n석숭의 부는 곧 자랑이 되었다. 그가 <em>왕개(王愷)</em>와 벌인 <em>부 자랑</em>은 그 시대의 한 장관(壯觀)이다. 왕개는 <em>진무제(晉武帝)</em>의 외숙으로 황실의 비호 아래 천하의 사치를 다투던 사람이다. 왕개가 엿(飴)으로 솥을 닦으면 석숭은 밀랍으로 땔감을 삼았다. 왕개가 자줏빛 비단으로 사십 리의 보장(步障)을 치면 석숭은 비단으로 오십 리의 보장을 쳤다. 왕개가 적석지(赤石脂)로 벽을 바르면 석숭은 산초(山椒)로 벽을 발랐다.\n\n그 절정이 <em>산호수</em> 일화다. 진무제가 외숙 왕개를 도우려고 궁중에 간직했던 두 자(尺) 남짓한 산호수를 내려 주었다. 가지가 무성하고 빛이 영롱해 천하에 짝이 없다 했다. 왕개가 이를 석숭에게 자랑하자, 석숭이 곁에 있던 <em>철여의(鐵如意)</em>를 들어 그 자리에서 산호수를 쳐 부쉈다. 왕개가 낯빛을 잃고 <em>내 보물을 시기해 부쉈구나</em> 꾸짖자, 석숭이 웃으며 <em>애석해 할 것 없으니 이제 갚으리다</em> 하고는 자기 집의 산호수를 죄다 꺼내 오게 했다. 서너 자 되는 것이 예닐곱 그루요, 두 자짜리는 헤아릴 수 없었다. 왕개가 망연자실했다 한다. 이 일화가 〈태치(汰侈)〉편의 백미다.\n\n부와 사치가 극에 달하면 시기가 따르는 법이다. 그에게는 <em>녹주(綠珠)</em>라는 애첩이 있었다. 피리를 잘 불고 자색이 빼어났다. 당시 권신 <em>조왕(趙王) 사마륜(司馬倫)</em>의 측근 <em>손수(孫秀)</em>가 녹주를 탐해 사람을 보내 청했다. 석숭이 자기의 첩 수십을 늘어놓고 <em>마음대로 고르라</em> 했으나, 손수의 사자는 <em>오직 녹주뿐</em> 이라 답했다. 석숭이 끝내 거절했다.\n\n손수가 앙심을 품고 <em>조왕 사마륜</em>을 부추겨 석숭을 <em>회남왕(淮南王)의 모반</em>에 엮어 넣었다. 300년, <em>팔왕의 난(八王之亂)</em>의 한복판에서 군사가 금곡원을 에워쌌다. 석숭이 누대 위에서 <em>내 너 때문에 죽는구나</em> 하니, 녹주가 <em>마땅히 군 앞에서 죽어 보답하리이다</em> 하고는 누대에서 몸을 던졌다. 석숭은 형장으로 끌려가며 <em>이 도적들이 내 재산을 탐냈을 뿐</em> 이라 한탄했다. 형리가 <em>재산이 화근인 줄 알았으면 어찌 일찍 흩지 않았는가</em> 비웃었다 한다. 일족이 함께 죽임을 당했고, 향년 52세였다.\n\n석숭은 『세설신어』의 〈태치〉·〈수오(讎隟)〉·〈문학〉·〈품조〉편에 거듭 등장한다. 그의 자리는 곧 <em>서진 사치 풍속</em>의 한 표본이다. <em>현학</em>이 사상의 깊이에서 사교의 의례로 풍속화되던 그 시대에, 부와 사치 또한 <em>명사 됨</em>의 한 표지로 풍속화되었다. 석숭의 일생은 그 풍속이 어디까지 갈 수 있는가, 그리고 그 끝에 무엇이 기다리는가를 한 인물의 운명으로 보여 준다. 금곡원의 시회와 산호수의 파편과 녹주의 추락이 한 시대의 한 얼굴이다.", "storyCount": 11}, {"id": "person.王坦之", "type": "person", "han": "王坦之", "ko": "왕탄지", "sub": "문도(文度) · 330~375", "title": "동진의 명신", "short": "사안과 함께 환온의 찬위 시도를 막아내고 효무제를 옹위. 강직하고 효심이 깊음. 자작 「폐장론(廢莊論)」으로 청담을 비판하기도. 부친 왕술(王述)이 그에게 노할 때면 늙은 부친의 무릎에 앉음, 사십이 되어서도 그러함. 환온이 그를 두려워해 \"왕문도(王文度)는 만만치 않다\" 함.", "long": "王坦之는 자가 문도(文度)다. 태원(太原) 진양(晉陽)의 <em>왕씨</em> 출신으로, 아버지가 <em>왕술(王述)</em>이다. 태원 왕씨는 의관남도해 온 명문이지만 <em>낭야 왕씨</em>에 비해 한 발 뒤에 섰는데, 왕술과 왕탄지 부자 대(代)에 이르러 동진 일류의 자리에 올랐다. 왕탄지가 살아 있는 동안은 <em>사안</em>과 함께 동진 정사의 두 기둥이었다.\n\n어려서부터 <em>반악</em>에 비길 만한 풍채로 일컬어졌다. 당시에 <em>왕문도가 양주의 으뜸</em>이라는 말이 돌았다. 곁에서 그를 본 사람들이 <em>동산의 사안석과 함께 강좌의 두 옥</em>이라 했다 한다. 그러나 그는 사안의 부드러움과 달리 <em>강직(剛直)</em>이 표지였다. 옳다고 본 자리에서 물러서지 않았고, 환온(桓溫) 같은 권신 앞에서도 낯빛이 변하지 않았다.\n\n효심이 깊은 일화가 〈덕행〉편에 전한다. 아버지 <em>왕술</em>은 성정이 매우 급해 자식에게도 자주 노했다. 왕탄지는 이미 사십을 넘기고 조정의 중신이 된 뒤에도, 아버지가 노하면 늙은 아버지의 무릎에 가서 앉아 노여움이 풀릴 때까지 머물렀다 한다. 좌중이 그 모습을 보고 <em>재상의 위엄과 자식의 자리가 한 몸에 들어 있다</em> 감탄했다. 사십에 부친 무릎에 앉는 일을 부끄러워하지 않은 한 사람이 곧 왕문도였다.\n\n청담의 자리에서 그는 <em>옥주미</em>를 들기보다 비판하는 자리에 섰다. 자작 「폐장론(廢莊論)」을 지어 <em>장자</em>의 무리가 명교(名敎)를 흐트러뜨린다 비판했다. <em>현학</em>의 한가운데서 그 풍속을 흔든 한 자리다. 청담의 명사들이 술과 약과 옥주미로 자기 자리를 꾸미는 동안, 왕탄지는 <em>명교</em>의 자리로 돌아가야 한다고 보았다. 그러나 그 자신이 청담을 못한 것은 아니다. <em>지도림</em>과 명리를 다투었고, <em>손작</em>과도 자주 어울렸다. 다만 그 끝에서 한 발 빼는 것이 그의 자리였다.\n\n정사에서의 정점은 환온의 마지막 해(373)에 왔다. 환온이 도성에 들어와 <em>구석(九錫)</em>을 청하며 사실상 찬위를 시도했다. 좌중이 모두 떨었다. <em>사안</em>과 왕탄지가 함께 환온을 맞으러 나갔는데, 사안은 태연했으나 왕탄지는 손에 든 홀(笏)이 거꾸로 잡힌 줄도 몰랐다 한다. 그러나 막상 환온의 앞에 서서는 한 치도 물러서지 않고 <em>구석의 문서</em>를 고치고 또 고치며 시간을 끌었다. 환온이 그 사이에 병이 깊어 죽었다. 동진의 사직이 이 두 사람의 한 자리에서 살아남았다. 환온이 일찍이 <em>왕문도는 만만치 않다</em>고 두려워한 그 자리가 이때 결판났다.\n\n환온이 죽은 뒤 효무제(孝武帝)를 옹위하는 자리에 사안과 나란히 섰다. 중서령(中書令)·서주자사(徐州刺史)를 거치며 강북의 군무를 맡았다. 그러나 천운은 짧았다. 375년, 마흔여섯의 나이로 죽었다. 사안보다 십 년 먼저 떠난 셈이다. 그가 죽은 뒤 사안이 홀로 동진의 한낮을 떠받쳤다.\n\n『세설신어』에서 그는 〈덕행〉·〈방정〉·〈아량〉·〈배조〉·〈경저〉편 등에 두루 등장한다. 청담의 한복판에 살면서도 청담을 비판한 한 사람, 사십에 부친 무릎에 앉기를 마다하지 않은 한 사람, 환온 앞에서 홀을 거꾸로 쥐고도 끝내 사직을 지킨 한 사람 — 왕문도의 자리가 곧 동진 명교파(名敎派)의 한 정점이다.", "storyCount": 12}, {"id": "person.鍾會", "type": "person", "han": "鍾會", "ko": "종회", "sub": "사계(士季) · 225~264", "title": "위 말의 모사(謀士)", "short": "사마씨의 모주. 일찍이 혜강을 찾아갔으나 혜강이 무시하니 원한을 품어, 후에 사마소에게 참소하여 혜강을 죽임. 후일 등애(鄧艾)와 함께 촉을 정벌, 그 공으로 거만해져 모반을 꾀하다 살해됨. 재기와 모략이 비상하나 인격은 비방을 면치 못함.", "long": "鍾會는 자가 사계(士季)다. 영천(潁川) 장사(長社)의 종씨로, 위(魏)의 태부 <em>종요(鍾繇)</em>의 막내아들이다. 어머니 장씨의 가르침을 받아 어려서부터 경(經)과 사(史)를 두루 익혔고, 글재주와 변설이 일찍 알려졌다. 다섯 살에 <em>장제(蔣濟)</em>가 그를 보고 <em>이 아이는 비상한 그릇이다</em> 평했다 전한다.\n\n소년기의 종회는 형 <em>종육(鍾毓)</em>과 함께 자주 일화의 주인공이 되었다. 한 번은 형제가 함께 아버지의 술을 훔쳐 마실 때, 형은 절하고 마셨으나 종회는 절하지 않고 마셨다. 까닭을 물으니 <em>훔치는 일에 어찌 예가 있겠습니까</em> 답했다 한다. 또 문제(文帝)를 알현하던 자리에서 형은 땀을 흘리고 종회는 흘리지 않았는데, 그 까닭을 묻자 형은 <em>전전긍긍하여 땀이 물 흐르듯 합니다</em> 답하고, 종회는 <em>전전율율하여 땀이 감히 나오지 못합니다</em> 답했다 한다. 〈언어〉·〈숙혜〉편의 한 자리다. 그 재기의 빛과 동시에 그 응대의 영악함이 이미 드러나 있다.\n\n사상의 측면에서 종회는 정시(正始) 이래의 <em>현학(玄學)</em> 흐름 안에 있었다. <em>왕필(王弼)</em>의 노자 주를 깊이 읽고, 스스로 「四本論」을 지어 <em>재성(才性)</em>의 <em>동(同)·이(異)·합(合)·리(離)</em> 네 자리를 가르고, 그 가운데 한 자리를 자기 입론으로 세웠다. 「四本論」은 위진 <em>명리(名理)</em>의 한 대표 저작으로 일컬어졌다. 그러나 종회의 명리는 청담의 자리에 머무르지 않았다. 그것은 곧 <em>사마씨(司馬氏)</em>의 정사 한가운데로 들어갔다.\n\n<em>고평릉의 정변(249)</em> 이후 <em>사마사</em>·<em>사마소</em> 형제의 막부에서 종회는 가장 가까운 모주(謀主)가 되었다. <em>관구검</em>의 난, <em>제갈탄</em>의 난을 평정하는 자리마다 종회의 책략이 들어 있었다. 사람들이 그를 <em>자방(子房)에 견준다</em>고 말할 정도였다. 사마소는 그를 <em>나의 장량</em> 이라 부르며 가까이 두었다.\n\n그러나 종회의 이름이 후세에 가장 무겁게 남은 것은 <em>혜강(嵇康)</em>과의 일이다. 종회가 「四本論」을 완성하고 혜강에게 보이고자 했으나 차마 들이지 못하고 담 너머로 던지고 달아났다 한다. 뒤에 위세를 갖춰 다시 혜강을 찾았을 때, 혜강은 마침 <em>향수(向秀)</em>와 함께 쇠를 두드리고 있었다. 종회가 한참을 서 있어도 혜강이 한마디도 건네지 않았다. 종회가 끝내 돌아서려 할 때 혜강이 비로소 <em>무엇을 듣고 왔다가 무엇을 보고 가는가</em> 물었다. 종회는 <em>들을 것을 듣고 와서 볼 것을 보고 갑니다</em> 답하고 떠났다. 그 한 자리의 모욕을 종회는 잊지 않았다. 훗날 <em>산도(山濤)</em>가 혜강을 자기 자리에 추천한 일을 빌미로 혜강이 <em>여안(呂安)</em> 사건에 휘말리자, 종회가 사마소에게 <em>혜강은 와룡(臥龍)이니 키워서는 안 됩니다</em> 참소했고, 혜강은 <em>광릉산(廣陵散)</em>을 마지막으로 형장에서 죽었다. 〈간오〉·〈아량〉편의 한 어둠이 이 자리에서 비롯한다.\n\n263년, 종회는 <em>등애(鄧艾)</em>와 함께 촉(蜀)을 정벌했다. 검각(劍閣)에서 <em>강유(姜維)</em>와 대치하던 사이 등애가 음평(陰平)의 샛길로 성도에 먼저 이르러 <em>유선(劉禪)</em>의 항복을 받았다. 그 공이 등애에게 돌아가자 종회의 야망과 시기가 한꺼번에 솟았다. 등애를 모반으로 무고해 함거에 가두게 하고, 항복한 강유와 손을 잡아 촉의 옛 땅에서 스스로 일어서려 했다. 그러나 그 모의가 곧 새어 부장들이 반란을 일으켰고, 종회와 강유가 함께 살해되었다(264년 정월). 향년 40세였다.\n\n『세설신어』에서 종회는 〈언어〉·〈문학〉·〈숙혜〉·〈배조〉·〈간오〉편 여러 자리에 등장한다. 재기는 한 시대의 으뜸이었으나 그 재기가 끝내 인격의 그릇을 채우지 못한 사람의 표본으로, 위(魏)에서 진(晉)으로 넘어가는 한 어두운 길목에 그의 그림자가 길게 누워 있다.", "storyCount": 11}, {"id": "person.蘇峻", "type": "person", "han": "蘇峻", "ko": "소준", "sub": "자고(子高) · ?~328", "title": "소준의 난(蘇峻之亂)의 주역", "short": "역양태수(歷陽太守). 동진 명제 사후 유량(庾亮)의 강경한 견제 정책에 반발, 조약(祖約)과 함께 거병. 건강(建康)을 함락하고 횡포를 부리다, 도간(陶侃)·온교(溫嶠)에게 토벌됨. 그의 난으로 동진 초의 명사들이 큰 곤욕을 치름.", "long": "蘇峻은 자가 자고(子高)다. 장광(長廣) 액현(掖縣) 사람이다. 본래 북방의 한 호족 출신으로, <em>영가의 난</em> 뒤 향당의 무리 수천 가구를 거느리고 회수(淮水)를 건너 남으로 내려왔다. 그가 거느린 무리는 곧 한 사적 군대였고, 이 <em>유민 부곡(部曲)</em>이라는 무력이 그의 운명을 결정했다.\n\n동진 초, 그는 <em>왕돈의 난</em>을 평정하는 데 큰 공을 세웠다. 322년 <em>왕돈</em>이 처음 거병했을 때 조정의 정규 군세로는 막기 어려웠다. 명제(明帝, 사마소)가 즉위한 뒤 두 번째 거병이 일어나자, 소준이 자기 부곡을 이끌고 도성으로 들어와 결정적인 한 축을 담당했다. 그 공으로 관내후(冠軍將軍)·역양태수(歷陽太守)에 봉해졌다. 도성에서 멀지 않은 <em>역양</em>에 정예 부곡 만여 명을 거느리고 주둔한 그는, 조정에서 보기에 한 <em>길들이지 못한 칼</em>이었다.\n\n명제가 일찍 죽고(325) 어린 성제(成帝)가 즉위하자, 외척 <em>유량(庾亮)</em>이 정사를 잡았다. 유량은 강직하나 <em>조급한</em> 사람이었다. 소준의 부곡을 위태롭게 본 그는 소준을 중앙으로 불러올려 병권을 떼려 했다. <em>왕도</em>가 <em>그를 건드리면 반드시 반한다</em> 거듭 만류했고, <em>온교(溫嶠)</em>도 글을 올려 말렸으나, 유량은 듣지 않았다. <em>그를 도성에 둔 채 묶어 두는 것이 산속의 호랑이를 두는 것보다 위태롭다</em>는 것이 유량의 명분이었다.\n\n327년 겨울, 소준이 마침내 거병했다. 회북의 <em>조약(祖約)</em> — <em>조적(祖逖)</em>의 아우 — 과 연합해 <em>유량을 친다</em>는 명분을 내세웠다. 부곡의 정예가 회수를 건너 단숨에 <em>고숙(姑孰)</em>을 깨뜨리고 이듬해 봄 <em>건강(建康)</em>에 닥쳤다. 유량이 친히 막아 보았으나 패주했고, 도성이 함락되었다. 어린 성제가 소준의 손에 잡혔다.\n\n건강을 차지한 뒤 소준의 횡포는 극심했다. 궁궐의 보화를 약탈하고, 백관을 가두고 매질하고, 명사들을 <em>짐꾼</em>으로 부려 곡식을 나르게 했다. <em>왕도</em>만이 거의 유일하게 그 앞에서 의연한 자세를 잃지 않아 어린 황제 곁에 머무를 수 있었다 한다. <em>환이</em>의 아버지 <em>환이(桓彝)</em>는 끝까지 항거하다 죽었고, 다수의 사대부 가문이 이때 큰 곤욕을 치렀다. 〈아량〉·〈방정〉편 곳곳의 일화가 이 <em>소준의 난</em> 한가운데서 나왔다.\n\n토벌의 중심은 형주(荊州)의 <em>도간(陶侃)</em>과 강주(江州)의 <em>온교</em>였다. 두 사람은 처음에는 서로 의심했으나, <em>온교</em>가 <em>도간</em>에게 머리를 숙여 맹주(盟主)로 받들면서 연합군이 짜였다. 328년 가을, 백석루(白石壘) 아래의 결전에서 소준이 술에 취해 단기로 적진에 돌격하다 화살을 맞고 말에서 떨어져 죽었다. 그의 무리가 그 자리에서 무너졌고, 이듬해 봄 잔당이 모두 평정되었다.\n\n소준의 난은 한 무인의 반란에 그치지 않는다. 동진 초의 <em>문벌 명사 정치</em>가 <em>유민 부곡</em>이라는 또 한 무력의 힘 앞에 얼마나 취약한가를 드러낸 사건이었다. 명사들은 청담의 옥주미를 든 채 짐꾼이 되었고, 도성이 한 번 불탔다. 『세설신어』 〈아량〉·〈방정〉·〈우회〉·〈출면〉편의 어두운 그림자 한 자락이 모두 이 <em>소준</em>의 이름에 걸려 있다.", "storyCount": 11}, {"id": "person.何晏", "type": "person", "han": "何晏", "ko": "하안", "sub": "평숙(平叔) · ?~249", "title": "위의 현학가, 청담의 비조", "short": "조조의 양자. 위(魏)의 명사이자 현학의 비조. 노장학을 일으켜 청담의 종을 엶. 분(粉)을 발라 미모를 가꾼 풍속의 시조로, 한여름에도 곱고 흰 얼굴에 사람들이 \"분을 바른 것인가\" 의심. 사마의의 정변(高平陵之變) 때 처형됨. 『논어집해(論語集解)』를 편찬.", "long": "何晏은 자가 평숙(平叔)이다. 후한 말의 대장군 何進의 손자라고 하지만 실은 그 庶孫이다. 부친이 일찍 죽고 모친 윤씨(尹氏)가 조조에게 재가해, 하안은 조조의 가문에서 자랐다. 후에 조조의 딸 금향공주(金鄕公主)와 혼인해 위 황실의 부마가 되었다. 출신 자체가 <em>조씨와 깊이 얽힌 자리</em>에 있었던 것이다.\n\n어려서부터 미모와 명민으로 일컬어졌다. 한여름에도 곱고 흰 얼굴을 유지하니, 위 명제가 <em>분을 발랐는가</em> 의심해 뜨거운 국수를 먹게 했다는 일화가 〈용지(容止)〉편에 있다. 땀을 흘려 옷으로 닦았는데도 얼굴이 더 희고 깨끗하니, 황제도 의심을 거두었다 한다. 사실은 분이 아니라 <em>오석산(五石散)</em>을 복용한 부작용이었다는 후대의 해석이 유력하다. 한식산(寒食散)으로도 불리는 이 약은 위진 명사들 사이에 크게 유행했는데, 복용 후 몸에 열이 솟아 찬 음식과 시원한 옷이 필요했으며, 피부가 희고 투명해 보이는 부작용이 있었다. 하안이 그 풍속의 시조라는 설이 있다.\n\n학문에서는 노장(老莊)과 주역을 중심에 두는 새 학풍을 일으켰다. 그가 편찬한 『논어집해(論語集解)』는 노장의 시각으로 공자를 다시 읽는 시도였고, 「無名論」·「無爲論」 같은 글에서 <em>근본은 無이며, 만물은 그 無에서 생긴다</em>는 본체론을 정립했다. 이것이 곧 <em>현학(玄學)</em>의 출발점이다. 그가 옥주미(玉麈尾)를 들고 명리를 논할 때 듣는 이가 황홀했다 하는데, 청담의 자리에서 <em>주(主)</em>와 <em>객(客)</em>이 주미를 주고받으며 토론하는 형식 자체가 그에게서 표준이 되었다.\n\n정치적으로는 위 명제 사후 보정 대신 <em>조상(曹爽)</em>의 막부에 들어가 이부상서를 지냈다. 같은 정시(正始) 명사인 <em>하후현(夏侯玄)</em>·<em>이풍(李豐)</em>·<em>등양(鄧颺)</em>·<em>정밀(丁謐)</em> 등과 함께 조상의 정권을 사상적으로 떠받쳤다. 그러나 다른 한편의 보정 대신 <em>사마의</em>와는 일찍부터 사이가 좋지 않았다. 사마의는 병들었다 칭하고 물러나 있었으나, 하안 등은 그가 정말로 늙어 무력해진 것이라 오판했다.\n\n249년 정월, 황제 조방이 고평릉으로 행차한 사이 사마의가 거사를 일으켰다. <em>고평릉의 정변(高平陵之變)</em>이다. 조상이 잡혀 죽고, 하안도 종족과 함께 처형되었다. 일설에 사마의가 하안에게 정변 가담자의 명단을 작성하게 했는데, 하안이 자기 이름은 빼고 일곱 명을 적었다. 사마의가 <em>하나 더 있지 않은가</em> 묻자 하안이 <em>제 이름을 말씀이십니까</em> 답하니 <em>그렇다</em> 하고는 함께 죽였다 한다.\n\n하안의 죽음으로 정시 명사 문화는 단숨에 꺾였다. 그러나 그가 일으킨 현학과 청담의 형식은 후일 <em>왕필</em>(요절했으나)과 죽림칠현, 다시 동진의 명사들에게로 흘러갔다. 한 시대를 연 사람이자 그 시대의 끝에 함께 묻힌 사람이다. 『세설신어』에서는 〈언어〉·〈문학〉·〈상예〉·〈용지〉·〈식감〉 등 여러 편에 그의 모습이 다채롭게 그려진다.", "storyCount": 10}, {"id": "person.劉伶", "type": "person", "han": "劉伶", "ko": "유령", "sub": "백륜(伯倫) · 약 221~300", "title": "죽림칠현의 호주가", "short": "호주가(好酒家) 중의 호주가. 「주덕송(酒德頌)」을 지음. 사슴이 끄는 작은 수레에 술병을 싣고, 종에게 삽을 메고 따르게 하며 \"내가 죽거든 그 자리에 묻으라\" 함. 알몸으로 집에 누워 있다가 객이 비웃자 \"천지가 내 옷, 집이 내 속옷이니, 그대들은 왜 내 속옷 안에 들어왔는가\" 답.", "long": "劉伶은 자가 백륜(伯倫)이다. 패국(沛國) 사람으로, <em>죽림칠현(竹林七賢)</em> 가운데 한 사람이다. 키가 여섯 자에 지나지 않았고, 용모가 보잘것없으며, 말수도 적었다 한다. 그러나 한 번 술을 들면 천지가 좁고, 한 번 입을 열면 한 시대의 명사들이 옷깃을 여몄다. 위진 명사 가운데 <em>술</em>을 자기 사상의 한가운데로 끌어올린 사람을 꼽으라면 가장 먼저 그의 이름이 온다.\n\n그는 <em>완적(阮籍)</em>·<em>혜강(嵇康)</em>과 더불어 산양(山陽)의 죽림에서 노닐었다. 완적이 <em>예법의 안에서 예법을 비웃는</em> 사람이라면, 혜강이 <em>예법의 바깥으로 한 발 나간</em> 사람이라면, 유령은 <em>애초에 예법이 무엇인지 모르는 척하는</em> 사람이었다. 그 무지를 가장한 자리가 곧 그의 사상이다. <em>명교(名敎)</em>의 그물을 정면으로 찢기보다, 술 한 잔으로 그물의 존재 자체를 잊어버리는 길을 택했다.\n\n그의 행적 가운데 가장 널리 전하는 것이 <em>녹거(鹿車)</em>의 일화다. 사슴이 끄는 작은 수레에 술 한 병을 싣고, 종에게 삽 한 자루를 메고 뒤따르게 했다. 사람들이 어디로 가느냐 물으면 <em>내가 죽거든 그 자리에 묻으라(死便埋我)</em> 했다. 살아 있는 동안의 한 걸음 한 걸음이 곧 묻힐 자리로 가는 길이라는 것. 위진 명사의 <em>생사관(生死觀)</em>이 한 문장에 응축된 자리다.\n\n또 한 일화는 <em>나신(裸身)</em>의 일이다. 집 안에서 옷을 벗고 누워 술을 마시고 있는데, 손님이 들어와 비웃었다. 유령이 태연히 답했다. <em>나는 천지(天地)를 집으로 삼고, 집을 속옷으로 삼는다. 그대들은 어찌하여 내 속옷 안에 들어왔는가(我以天地爲棟宇, 屋室爲褌衣, 諸君何爲入我褌中).</em> 〈임탄(任誕)〉편의 백미다. 한 마디 농담 같으나, <em>장자(莊子)</em>의 <em>제물(齊物)</em>과 <em>소요(逍遙)</em>가 그 속에 다 들어 있다. 옷이 곧 집이고 집이 곧 천지라면, 가리고 드러내는 모든 구분이 본래 허망하다는 것.\n\n그의 사상이 글로 결정된 것이 「주덕송(酒德頌)」이다. 한 <em>대인선생(大人先生)</em>이 있어 천지를 한 아침, 만기(萬期)를 한 순간으로 여기고, 해와 달을 창문으로 삼아 술 한 항아리를 끼고 산다. <em>귀개공자(貴介公子)</em>와 <em>진신처사(縉紳處士)</em>가 예법을 들고 와 따져 물어도, 대인선생은 술잔을 들고 수염을 쓸며 한 마디도 응하지 않는다. 그저 취해 누울 뿐이다. 글 전체가 <em>명교</em>에 대한 가장 부드러우면서도 가장 단호한 거절이다. 위진 <em>현학(玄學)</em>이 <em>자연(自然)</em>의 한쪽 끝까지 밀고 간 한 자리가 곧 이 송(頌)이다.\n\n아내가 술을 끊으라 울며 빌었을 때의 일도 전한다. 유령이 <em>내가 스스로는 끊지 못하니, 귀신에게 빌어야겠다</em> 하고는 제물(祭物)을 차리게 한 뒤, 그 자리의 술과 고기를 다 먹고 또 취해 버렸다 한다. 한 가정의 풍경마저도 그에게는 한 자리의 청담이었다.\n\n벼슬길에서는 일찍 물러났다. 한때 건위참군(建威參軍)에 올랐으나, 무제(武帝)가 정사의 길을 묻자 <em>무위(無爲)</em>로 답해 쓰이지 못했다. 본인이 바라던 바였다 한다. 그 뒤로는 끝까지 술과 더불어 살다, 정확히 알 수 없는 어느 해 자기 자리에서 죽었다. 향년이 여든에 가까웠다 전한다. 죽림칠현 가운데 가장 오래 산 사람이다.\n\n『세설신어』에서 그는 〈임탄〉·〈용지(容止)〉·〈문학〉편에 거듭 등장한다. 한 시대의 명사들이 <em>명교와 자연</em>의 그물 위에서 줄을 타고 있을 때, 유령은 그 그물 아래에 자리를 깔고 누워 술을 마셨다. 위진 풍도(風度)의 한 극단이 곧 그의 자리다.", "storyCount": 7}, {"id": "person.阮咸", "type": "person", "han": "阮咸", "ko": "완함", "sub": "중용(仲容) · ?~?", "title": "죽림칠현의 음률가", "short": "완적의 조카로 죽림칠현의 일원. 음률에 통달, 비파의 일종 완함(阮咸)이 그의 이름에서 유래. 7월 7일 사대부들이 비단옷을 햇볕에 너는 날, 그는 깁고 낡은 잠방이를 장대에 걸고 \"풍속을 면치 못한다\" 농함. 부친 상중에도 형수의 호인을 따라잡으러 나귀를 타고 쫓아간 일화.", "long": "阮咸은 자가 중용(仲容)이다. 진류(陳留) 위씨(尉氏) 출신으로, <em>완적(阮籍)</em>의 조카다. 숙질이 함께 <em>죽림칠현(竹林七賢)</em>에 든 것이 위진 사상사의 한 진풍경이다. 사람들은 숙부 완적을 <em>대완(大阮)</em>, 조카 완함을 <em>소완(小阮)</em>이라 불렀다. 한 가문에서 두 명사가 죽림에 함께 들어간 자리는 그 외에 없다.\n\n완씨는 본디 가난한 일족이었다. 같은 마을 안에서도 길 북쪽의 부유한 완씨와 길 남쪽의 가난한 완씨가 갈렸는데, 완적과 완함은 남쪽 완씨였다. 7월 7일은 사대부가 비단옷을 햇볕에 너는 날이었다. 북쪽 완씨가 마당 가득 비단을 펼쳐 햇볕에 말리는데, 완함은 장대 끝에 깁고 또 기운 <em>잠방이</em> 한 벌을 걸어 마당에 세웠다. 사람들이 무엇 하는 짓이냐 묻자 <em>나 또한 풍속을 면치 못한다(未能免俗, 聊復爾耳)</em> 했다. 〈임탄〉편의 한 절창이다. 가난을 가난으로 받고, 풍속을 풍속으로 받되, 그 한 자리에서 풍속을 비틀어 명사의 자유를 드러낸 자리.\n\n부친의 상중 일화는 더 깊다. 모친의 상중이었다 전하기도 한다. 상복을 입은 채 그는 한 <em>선비족 여종</em>과 정을 통하고 있었다. 누군가 그 여종을 데리고 가 버리자 완함은 상복을 벗을 새도 없이 손님이 타고 온 <em>나귀</em>를 빌려 타고 쫓아갔다. 따라잡은 뒤 <em>씨를 잃을 수는 없다(人種不可失)</em> 한마디 하고 함께 돌아왔다. 뒷날 그 여종에게서 난 아이가 <em>완부(阮孚)</em>다. <em>예법</em>의 자리에서 보면 거듭된 파격이지만, <em>명교(名敎)에 갇히지 않고 자연(自然)을 따른다</em>는 죽림의 한 명제가 이만큼 몸에 붙은 자리도 드물다.\n\n음률에 통한 것이 그의 또 한 본령이다. 그가 <em>비파</em>의 한 종류를 손수 개량해 즐겨 탔는데, 후대 사람들이 그 악기를 그의 이름을 따 <em>완함(阮咸)</em>이라 불렀다. 사람의 이름이 곧 악기의 이름이 된 자리는 동아시아 악기사에 드물다. <em>순욱(荀勖)</em>이 음률을 의논하는 자리에 완함이 함께 했는데, 완함이 순욱의 율(律)에 한 음의 어긋남이 있음을 짚어 냈다 한다. 순욱이 이를 꺼려 완함을 시평태수(始平太守)로 내보냈다 전한다. 음률의 한 자리에서 명리(名理)의 한 자리까지 — 그의 귀가 그만큼 밝았다.\n\n그의 자리는 <em>혜강(嵇康)</em>과 <em>완적</em>의 자리만큼 사상의 무게를 지지는 않는다. 그러나 완함이 있어 죽림의 한 자리가 음악으로 채워졌다. 혜강이 <em>광릉산(廣陵散)</em>을 안고 죽고, 완적이 <em>영회시(詠懷詩)</em>에 자기의 한을 묻을 때, 완함은 비파를 안고 그 한가운데 앉아 있었다. 술과 비파와 파격 — 그 셋이 완함의 표지다.\n\n『세설신어』에서 그는 〈임탄〉·〈술해〉·〈배조〉편 등에 거듭 등장한다. 7월 7일의 잠방이와 상중의 나귀 — 이 두 장면이 곧 죽림의 자유가 한 명사의 몸에 어떻게 새겨졌는지를 보여 주는 가장 선명한 자리다.", "storyCount": 6}, {"id": "person.向秀", "type": "person", "han": "向秀", "ko": "향수", "sub": "자기(子期) · 약 227~272", "title": "죽림칠현, 『장자』 주의 대가", "short": "혜강의 절친. 혜강이 죽은 뒤 옛 거처를 지나며 이웃에서 울리는 피리 소리에 「사구부(思舊賦)」를 지어 그를 추모. 『장자』 주(注)에 정심하여, 후에 곽상(郭象)이 그 주를 거의 그대로 자기 것으로 삼음. 사마씨의 부름에 마지못해 출사하니, 종회가 \"기산(箕山)의 뜻은 어찌 되었는가\" 농함.", "long": "향수(向秀)는 자가 자기(子期)다. 하내(河內) 회현(懷縣) 사람이다. <em>죽림칠현(竹林七賢)</em> 가운데 한 자리를 차지하지만, 그 일곱 사람 중 향수만큼 <em>그늘에 선 사람</em>도 드물다. <em>혜강(嵇康)</em>과 <em>완적(阮籍)</em>의 빛이 너무 강해 그 옆자리의 향수는 늘 한 걸음 뒤에 서 있었으나, 정작 위진 <em>현학(玄學)</em>의 한 정점은 그의 붓끝에서 나왔다.\n\n향수는 일찍부터 <em>혜강</em>의 가장 가까운 벗이었다. 산양(山陽)의 혜강 거처 옆에서 함께 <em>대장간 일</em>을 거들었다는 일화가 전한다. 혜강이 쇠를 두드리면 향수가 풀무를 잡았다. 두 사람은 말없이 종일 일하고, 일이 끝나면 함께 술을 마시고 <em>삼현(三玄)</em>을 논했다. 손에는 망치와 풀무가, 입에는 노장(老莊)의 한 구절이 함께 있던 그 자리가 <em>죽림</em>의 가장 정확한 풍경 중 하나다. <em>산도(山濤)</em>가 두 사람을 두고 <em>지란(芝蘭)이 함께 자란다</em> 평한 일이 있다 한다.\n\n향수의 가장 큰 공은 『장자(莊子)』의 <em>주(注)</em>다. 한대 이래 『장자』는 읽히되 풀이되지 않는 책이었다. 향수가 처음으로 그 전편에 정심한 주를 달았다. 그가 주를 짓는다는 소문이 나자 <em>혜강</em>이 <em>장자는 주를 달 수 있는 책이 아니다</em> 하며 말렸다 한다. 향수는 묵묵히 주를 완성해 혜강에게 보였다. 혜강이 다 읽고 <em>현풍(玄風)이 다시 떨치는구나</em> 탄식했다 전한다. 향수의 주는 <em>소요(逍遙)</em>와 <em>제물(齊物)</em>을 <em>명교(名敎)</em>의 자리와 화해시키는 길을 열었으니, 이것이 곧 이후 <em>곽상(郭象)</em>의 『장자』 주가 서는 토대다.\n\n景元 4년(263), <em>혜강</em>이 <em>종회(鍾會)</em>의 무함으로 처형되었다. <em>광릉산(廣陵散)</em>이 끊긴 그 자리에서 <em>죽림</em>은 사실상 흩어졌다. 향수는 그 충격을 견디지 못했다. <em>사마씨</em>의 부름이 거듭 닿자, 그는 마지못해 출사했다. 낙양에 이르러 <em>사마소(司馬昭)</em>를 알현했을 때, 곁에 있던 <em>종회</em>가 짓궂게 물었다. <em>그대가 본디 기산(箕山)의 뜻을 품지 않았던가, 어찌 여기까지 왔는가.</em> 향수가 답했다. <em>허유(許由)는 고집스러운 선비라, 본받을 만하지 못합니다.</em> 좌중이 웃었으나, 그 웃음 뒤의 비참함을 향수만이 알았다. 〈언어〉편에 실린 이 한 자리는 <em>명교</em>와 <em>자연</em>의 어긋남이 한 인격을 어떻게 무너뜨리는가를 압축한다.\n\n낙양으로 옮겨 가는 길에 향수는 옛 <em>산양</em>의 <em>혜강</em>의 거처를 지났다. 해는 기울고 이웃집에서 누군가 피리를 불었다. 그 가락이 옛날 혜강이 즐기던 것과 같았다. 향수는 그 자리에서 <em>「사구부(思舊賦)」</em>를 지었다. 짧은 부였다. <em>길게 쓰지 못함</em>이 곧 그 글의 형식이었다. 시대가 길게 말하는 것을 허락하지 않았던 까닭이다. 혜강의 이름을 직접 부르지도 못하고, 다만 <em>옛 벗을 그리워한다</em>는 한 마디로 끊었다. 위진 산문 가운데 가장 짧고 가장 무거운 한 편이다.\n\n만년의 향수는 <em>황문시랑(黃門侍郞)</em>·<em>산기상시(散騎常侍)</em> 따위의 한직에 있었다. 출사했으나 정사에 마음을 두지 않았고, 그렇다고 옛 <em>죽림</em>의 자유로 돌아갈 길도 없었다. 약 272년 무렵 세상을 떴다 한다. 그가 남긴 『장자』 주는 완성을 보지 못한 채 세상에 떠돌았다. 그 미완의 원고를 <em>곽상</em>이 가져다 보충하고 다듬어 자기 이름으로 펴냈다는 비판이 동시대부터 있었다. 후대에 <em>향곽(向郭)의 주</em>라 함께 일컫는 것은 그 시비를 절충한 호칭이다. <em>독화(獨化)</em>와 <em>자이(自爾)</em>의 개념틀이 곽상의 것으로 알려져 있으나, 그 씨앗이 향수에게 있었음은 부정하기 어렵다.\n\n『세설신어』에서 향수는 〈언어〉·〈문학〉·〈상서〉·〈서일〉편에 등장한다. <em>죽림</em>의 일곱 사람 중 가장 적게 말하고 가장 깊이 슬퍼한 사람이며, 위진 현학의 한 정점을 가장 조용한 손으로 받쳐 든 사람이다.", "storyCount": 6}, {"id": "person.ChenZhongJu", "type": "person", "han": "陳仲擧", "ko": "", "sub": "진중거 (?~168), 이름 蕃", "title": "", "short": "후한 말 청류 사대부의 영수. 외척 두무(竇武)와 함께 환관 일소를 도모하다 패해 죽음. 예장태수로 부임하자마자 서유자(徐孺子)부터 찾았다는 일화로 〈덕행〉편 첫머리를 장식. <em>수레에 올라 고삐를 잡으면 천하를 깨끗이 다스리려는 뜻을 품었다</em>. 명사 정신의 시조 가운데 한 사람.", "long": "陳蕃은 자가 중거(仲擧)다. 여남(汝南) 평여(平輿) 사람으로, 후한 말 환제(桓帝)·영제(靈帝) 연간의 <em>청류(淸流)</em> 사대부를 한 몸에 짊어진 영수다. 그가 죽고 나서 한실은 더 버티지 못하고 <em>황건의 난</em>으로, 다시 <em>동탁</em>의 입경으로 무너져 갔다. 한 시대의 마지막 정의가 그의 어깨에 걸려 있었던 셈이다.\n\n어려서 한 일화가 있다. 열다섯 살 무렵, 한 방에 홀로 거처하면서 뜰을 쓸지 않아 어지러웠다. 아버지의 벗 <em>설근(薛勤)</em>이 찾아와 <em>어찌 손을 들어 빈객을 맞을 자리를 쓸지 않느냐</em> 나무라자, 진번이 답했다. <em>대장부가 세상에 처(處)함에 마땅히 천하를 쓸 것이지, 어찌 한 방을 쓸리오(大丈夫處世, 當掃除天下, 安事一室乎).</em> 설근이 그 말에 놀라 그를 비범하게 여겼다 한다. 이 한마디가 곧 그의 평생을 끌고 갔다.\n\n또 한 일화는 〈덕행〉편 첫머리에 놓였다. 예장태수(豫章太守)에 부임하자 자리에 앉기도 전에 <em>서유자(徐孺子)</em>의 거처부터 물었다. 좌중이 <em>우선 관사에 드시지요</em> 청했으나, 진번이 <em>주(周) 무왕(武王)이 상용(商容)의 마을을 지날 때 자리에 미처 따뜻해질 새가 없었거늘, 내 어찌 어진 이를 먼저 보지 않으랴</em> 했다. 서유자는 평생 출사하지 않은 <em>징사(徵士)</em>였다. 그 서유자가 올 때만은 진번이 별도로 <em>榻(탑)</em> 하나를 마련해 두었다가, 그가 떠나면 다시 걸어 두었다. <em>陳蕃下榻</em>이라는 사자성어가 곧 여기서 나왔다.\n\n또 <em>수레에 올라 고삐를 잡으면 곧 천하를 깨끗이 다스리려는 뜻을 품었다(登車攬轡, 慨然有澄淸天下之志)</em>는 평이 〈덕행〉편에 전한다. 한 관리가 부임지로 떠날 때의 평범한 한 동작에 천하의 짐을 얹은 말이다. 그 한 줄이 곧 후한 말 사대부의 자기 규정이 되었다. <em>명사 정신</em>의 첫 한마디를 진번이 남긴 것이다.\n\n벼슬길에서 진번은 거듭 직간(直諫)으로 좌천되었다. 외척과 환관이 갈마들며 조정을 흔드는 자리마다 그가 글을 올려 따졌다. 자리를 두려워하지 않았다. 환제 말년에 태위(太尉)에 올랐고, 영제가 즉위하자 태부(太傅)로 <em>두무(竇武)</em>와 함께 정사를 맡았다. 두무는 영제의 외척이었으나 진번과 뜻이 같았다. 두 사람이 함께 <em>환관 일소</em>를 도모했다.\n\n168년 9월의 일이다. 일이 누설되어 환관 <em>조절(曹節)</em>·<em>왕보(王甫)</em> 등이 먼저 군사를 일으켰다. 두무는 패해 자결했다. 진번이 그 소식을 듣고도 도망하지 않았다. 일흔이 넘은 노구를 이끌고 부하 학생 팔십여 명과 더불어 칼을 차고 승명문(承明門)으로 들어가 <em>국가의 큰 도적이 어디 있느냐</em> 호령했다. 환관들이 그를 잡아 그날 옥에서 죽였다. 그의 죽음이 곧 <em>제2차 당고(黨錮)의 화</em>의 신호였고, 청류 사대부 수백 명이 그 뒤로 죽고 갇히고 금고되었다.\n\n진번이 죽고 한 세대가 지나 한실이 무너졌다. 그러나 그가 남긴 <em>천하를 쓴다</em>는 한마디와 <em>榻을 내린다</em>는 한 자세는 위진의 <em>명사</em>에게 그대로 이어졌다. <em>곽태(郭泰)</em>·<em>이응(李膺)</em>과 더불어 그는 위진 명사의 정신적 시조다. 『세설신어』가 〈덕행〉편의 첫머리를 진번으로 연 까닭이 여기에 있다. 한 시대의 끝에 선 사람이 다음 시대의 첫머리에 다시 놓인 것이다.", "storyCount": 0}, {"id": "person.GuoLinZong", "type": "person", "han": "郭林宗", "ko": "", "sub": "곽임종 (128~169), 이름 太", "title": "", "short": "후한 말의 명사. 인물 품평으로 천하에 이름났다. 직접 출사하지 않고 한 마디 평으로 사대부의 흥망을 가른 자. <em>月旦評</em>의 허소(許劭)와 더불어 후한 말 인물 품평 풍속의 양대 영수. 그가 머리에 두건을 비뚤게 쓴 모습이 곧 <em>林宗巾</em>이라는 풍속이 되었다.", "long": "郭林宗은 이름이 태(太)이고 자가 임종(林宗)이다. 태원(太原) 개휴(介休) 사람이다. 후한 말, 정치가 환관과 외척의 손에 무너지던 시절에 그는 출사하지 않고 한 마디의 평으로 천하 사대부의 향배를 가른 인물 품평의 영수다. 같은 시기 여남(汝南)의 <em>허소(許劭)</em>가 매달 초하루마다 인물을 평한 <em>월단평(月旦評)</em>과 더불어, 그의 품평은 후한 말 <em>청의(淸議)</em> 풍속의 두 봉우리를 이뤘다.\n\n집안은 한미했다. 어려서 아비를 잃고 어미를 모셨다. 어미가 그에게 현의 아전 자리를 권하자 <em>대장부가 어찌 두斗의 곡식에 매이겠는가</em> 하고 거절하고 성고(成皋)의 <em>굴백언(屈伯彦)</em>에게 가서 배웠다 한다. 삼 년을 두문불출하고 <em>삼분오전(三墳五典)</em>과 <em>제자백가</em>를 두루 익혔다. 학문이 이뤄지자 낙양으로 나갔다.\n\n낙양에서 그를 알아본 이가 <em>이응(李膺)</em>이다. 당시 <em>천하 모범(天下楷模)</em>으로 일컬어지던 이응은 한 번 곽임종을 보고 <em>내가 사람을 많이 보았으나 임종 같은 이는 없다</em> 했다. 곽임종이 고향으로 돌아갈 때 낙양의 사대부 수천 인이 황하 가까지 배웅을 나왔는데, 그가 이응 한 사람과만 같은 배에 올랐다. 강을 건너는 두 사람을 본 이들이 <em>신선과 같다</em> 했다 한다. 곽임종의 이름이 이때부터 천하에 퍼졌다.\n\n그의 품평은 사람의 <em>그릇</em>을 보았다. <em>모용(茅容)</em>이 빗속에 나무 아래서 의관을 단정히 한 것을 보고 발길을 멈춰 하룻밤을 청하고는 그가 어머니께만 닭을 올리고 자기는 채소를 먹는 것을 보고 큰 그릇이라 평했다. <em>맹민(孟敏)</em>이 시루를 떨어뜨려 깨고도 돌아보지 않자 <em>이미 깨졌으니 돌아보아 무엇하랴</em> 하는 그 한마디로 그릇을 알아보고 가르쳤다. <em>위소(魏昭)</em>가 시중을 들겠다 청하자 받아들여 사람으로 길러 냈다. 출세한 자도 있고 은거한 자도 있으나, 그의 평을 거친 이가 <em>육십여 인</em>에 이르렀다 전한다.\n\n품평의 자리에서 그가 사람을 가르는 결은 <em>명교(名敎)와 행실</em>의 일치였다. 빈천에서도 어버이를 섬기는가, 작은 실수에 매이지 않는가, 학문이 자기를 닦는 데로 향하는가를 보았다. 이것이 곧 후한 <em>당고(黨錮)</em>의 시대 <em>청의</em>가 세우려 한 한 인간의 기준이며, 곽임종은 그 기준을 사람 하나하나의 몸으로 가려낸 사람이었다.\n\n그럼에도 그는 출사하지 않았다. <em>당고의 화</em>가 일어 이응을 비롯한 수많은 명사가 죽거나 금고되는 가운데, 곽임종만은 화를 입지 않았다. <em>그가 평은 했으되 정사의 자리에 서지 않았기 때문</em>이며, 또 <em>그의 평이 사람을 살리는 쪽으로 기울었기 때문</em>이라 한다. 환관들조차 그를 어찌하지 못했다.\n\n한 일화가 그의 풍모를 전한다. 길을 가다 비를 만나 두건의 한 모서리가 꺾였다. 사람들이 그 모습을 보고 일부러 두건의 한 귀를 꺾어 쓰는 풍속을 만들었으니 이것이 곧 <em>임종건(林宗巾)</em>이다. 한 사람의 무심한 모습이 한 시대의 의관 풍속이 된 것이다. 그가 어떻게 받아들여졌는가를 이 한 가지 일이 말한다.\n\n169년 마흔둘에 죽었다. <em>채옹(蔡邕)</em>이 비문을 짓고 <em>내가 비문을 많이 지었으되 부끄러움 없이 지은 것은 곽유도(郭有道, 임종의 시호) 한 사람뿐이다</em> 했다 전한다. 곽임종이 죽고 얼마 안 되어 후한이 무너지고, <em>위진</em>이 열렸다. 그의 인물 품평의 풍속은 위(魏)의 <em>구품관인법(九品官人法)</em>으로 제도화되었고, 또 한편으로는 위진 명사의 <em>품조(品藻)</em> 문화로 옷을 갈아입어 『세설신어』〈품조〉·〈식감〉·〈상예〉편의 먼 뿌리가 되었다. 명사 시대의 첫 문은 곽임종이 열었다.", "storyCount": 0}, {"id": "person.XuShao", "type": "person", "han": "許劭", "ko": "", "sub": "허소 (150~195)", "title": "", "short": "후한 말의 인물 비평가. 매월 초하루마다 인물평을 발표해 한 마디가 사람의 흥망을 가른다 했다(<em>月旦評</em>). 조조가 그에게 자기 평을 청해 <em>치세의 능신, 난세의 간웅(治世之能臣, 亂世之奸雄)</em>이라는 평을 받은 일화로 유명.", "long": "許劭는 자가 자장(子將)이다. 여남(汝南) 평여(平輿) 사람이다. 후한 말 <em>인물 비평</em>이라는 한 풍속의 정점에 선 사람이며, 그의 한 마디가 한 사람의 출세와 몰락을 갈랐다 한다. 위진 <em>품조(品藻)</em>와 <em>식감(識鑒)</em>의 풍속이 거슬러 올라가는 한 머리에 그가 있다.\n\n집안은 여남의 명문 허씨다. 사촌형 <em>허정(許靖)</em>과 함께 어려서부터 사람을 알아보는 데 뛰어났다. 두 사람이 매월 초하루마다 향리의 인물을 품평해 한 자리에 올렸는데, 이를 <em>月旦評(월단평)</em>이라 했다. 매달 초하루에 새 평이 나왔으므로 그 말이다. 한 사람의 풍골과 그릇을 한 줄 평으로 잘라 보이는 자리였으니, 평이 좋으면 그날부터 그 사람이 천하의 인재로 일컬어졌고, 평이 나쁘면 향리에서조차 자리가 좁아졌다.\n\n월단평이 한 시대의 풍속이 된 까닭은 후한 말의 사정에 있다. <em>외척</em>과 <em>환관</em>의 다툼으로 조정의 인재 선발이 무너지고, <em>향거리선(鄕擧里選)</em>의 공정성도 흔들리던 때였다. 누가 참 인재인가를 향리의 평이 대신 가렸으니, 허소 형제의 월단평이 곧 그 빈자리를 메운 셈이다. 한 마디 평이 곧 <em>명실(名實)</em>을 가르는 한 자리였다.\n\n가장 유명한 일화가 <em>조조(曹操)</em>와의 만남이다. 젊은 조조가 아직 알려지지 않았을 때 허소를 찾아와 자기 평을 청했다. 허소가 그의 인물됨이 범상치 않음을 알아보았으나 좋게도 나쁘게도 말하기 어려워 입을 다물었다 한다. 조조가 거듭 다그치자 마침내 <em>그대는 치세의 능신이요 난세의 간웅이다(治世之能臣, 亂世之奸雄)</em> 한 줄을 내놓았다. 조조가 크게 웃으며 돌아갔다 전한다. 한 시대를 가른 한 사람을 한 줄로 잘라 보인 자리이며, 동시에 인물평이라는 한 풍속의 정점이 된 자리다.\n\n허소의 평은 짧고 날카로웠다. <em>번자소(樊子昭)</em>를 일컬어 <em>반드시 한 자리를 얻을 사람</em>이라 했고, <em>원소(袁紹)</em>가 향리로 돌아올 때 수레와 종자가 화려하자 <em>오자장(吾子將)이 어찌 나를 보랴</em> 하며 종자를 줄여 들어왔다 한다. 한 사람의 한 마디가 천하의 호걸을 두렵게 했으니, 인물평의 권위가 그에 이르러 한 정점이었다.\n\n말년에 허소는 난세를 피해 여러 곳을 떠돌다 양주(揚州)에서 <em>유요(劉繇)</em>에게 의탁했고, 195년 그 막부에서 죽었다 한다. 향년 46세였다. 사촌형 허정은 더 멀리 떠나 끝내 촉(蜀)에 이르러 <em>유비(劉備)</em>의 조정에서 자리를 얻었으나, 허소는 그 풍파의 끝을 보지 못했다.\n\n허소가 남긴 것은 한 권의 책이 아니라 한 풍속이었다. <em>人物을 品하는 자리</em>, 곧 <em>月旦</em>과 <em>品藻</em>의 풍속이다. 위(魏)에 들어 <em>진군(陳群)</em>의 <em>구품관인법(九品官人法)</em>이 이 풍속을 제도로 흡수했고, 위진 사대부의 <em>식감</em>과 <em>품조</em>의 자리가 그 풍속을 다시 청담의 한 갈래로 끌어올렸다. 『세설신어』의 〈식감〉·〈품조〉 두 편이 곧 그 흐름의 한 결실이며, 그 머리에 허소의 월단평이 있다.", "storyCount": 0}, {"id": "person.LiYuanLi", "type": "person", "han": "李元禮", "ko": "", "sub": "이원례 (110~169), 이름 膺", "title": "", "short": "후한 말 청류의 영수. 사예교위(司隸校尉)를 지내며 환관의 횡포를 다스렸다. 그의 문에 들어가는 것을 <em>용문에 오른다(登龍門)</em>고 일컬었으니, 사대부 천거의 한 정점이었다. 黨錮의 화에 휘말려 죽었다.", "long": "李元禮는 자가 원례(元禮)이고 이름이 응(膺)이다. 영천(潁川) 양성(襄城) 사람으로, 후한 말 사대부 <em>청류(淸流)</em>의 영수다. 그가 살았던 시대(110~169)는 후한 황실이 외척과 환관의 손에 흔들리던 시대였으며, <em>환관(宦官)</em>의 횡포가 조정과 군현을 함께 갉아먹던 시대였다. 이 시대에 사대부의 자존을 한 몸으로 짊어진 사람이 곧 이응이다.\n\n그는 어려서부터 풍모가 엄정해 사람들이 함부로 다가서지 못했다 한다. 일찍 <em>순숙(荀淑)</em> 문하의 풍기를 흠모해 <em>진식(陳寔)</em>·<em>곽태(郭泰)</em>와 어울렸다. 청년의 이응을 두고 <em>천하의 모범은 이원례(天下楷模李元禮)</em>라는 한 줄이 돌았다. 그 한 줄이 곧 이응의 평생을 가른 자리다. 청류 사대부 사이에서 그는 살아 있는 동안 이미 한 시대의 표준이 되었다.\n\n벼슬길에서 그는 곧고 거셌다. 청주(靑州) 자사로 나갔을 때 부정한 군수와 현령들이 그의 부임을 듣자마자 인끈을 풀고 도망쳤다 한다. 한 사람의 이름이 한 주(州)를 바로잡았다. 뒤에 <em>사예교위(司隸校尉)</em>로 들어와 도성과 그 인근 군현의 풍기를 맡았다. 환관 <em>장양(張讓)</em>의 아우 <em>장삭(張朔)</em>이 야왕(野王) 현령으로 있으며 사람을 함부로 죽이고 장양의 집에 숨어들자, 이응이 친히 군사를 이끌고 장양의 집 기둥을 부수고 들어가 장삭을 끌어내 처형했다. 환제(桓帝)가 노해 이응을 불러 꾸짖었으나, 이응이 <em>법대로 했을 뿐이다</em> 답하니 임금이 도리어 말을 잃었다 전한다. 환관의 무리가 그 뒤로 도성 안에서 함부로 다니지 못했다.\n\n그의 문에 드나드는 일이 곧 사대부의 한 영광이 되었다. 한 번 이응에게 천거를 받으면 그 사람의 이름이 곧 천하에 섰다. 사람들이 그것을 일컬어 <em>용문에 오른다(登龍門)</em>라 했다. <em>황하의 용문(龍門)을 거슬러 오르는 잉어가 용이 된다</em>는 옛 전설에서 따온 말이다. <em>순상(荀爽)</em>이 한 번 이응의 수레를 몰고서는 돌아와 <em>오늘 이군(李君)의 수레를 몰았다</em> 자랑했다는 일화가 〈덕행〉편 앞머리에 전한다. 어린 <em>공융(孔融)</em>이 열 살에 이응의 문을 두드리며 <em>나는 이군과 대대의 통가(通家)다</em> 한 일화 또한 〈언어〉편의 첫머리를 장식한다. 이응의 문이 곧 후한 말 사대부 천거의 한 정점이었음을 그 두 일화가 함께 말해 준다.\n\n그러나 곧음은 곧 화를 불렀다. 환관의 무리가 황제의 귀를 사로잡아 <em>당인(黨人)을 모반의 무리로 모는</em> 옥사를 일으켰다. 이것이 곧 <em>당고(黨錮)의 화</em>다. 1차 당고(166)에서 이응은 옥에 갇혔다 풀려났으나, 2차 당고(169)에서 끝내 다시 잡혀 옥중에서 죽었다. 향년 60세였다. 함께 죽은 청류의 무리가 백여 명이며, 금고에 묶인 사람이 육칠백에 이르렀다.\n\n후한이 멸망한 뒤에도 그의 이름은 오히려 더 커졌다. 위진의 사대부들이 자기네 풍격의 한 근원을 <em>이원례</em>에게 두었다. 『세설신어』가 〈덕행〉편 두 번째 자리에 이응을 올린 까닭이며, 〈언어〉편의 공융 일화가 곧 이응의 문을 빌려 시작되는 까닭이다. 위진 <em>명사(名士)</em>가 자기를 비추는 한 거울로 삼은 한대(漢代)의 마지막 큰 얼굴이 곧 이원례다.", "storyCount": 0}, {"id": "person.HuangShuDu", "type": "person", "han": "黃叔度", "ko": "", "sub": "황숙도 (75~122)", "title": "", "short": "후한의 명사. 청고한 풍모로 일컬어졌다. 곽임종이 그를 보고 <em>천 길의 큰 호수 같으니, 흐려도 흐려지지 않고 맑아도 맑아지지 않는다(汪汪如萬頃之陂)</em>라 평한 일이 인물 평의 한 정점.", "long": "黃叔度는 자가 숙도(叔度), 이름은 헌(憲)이다. 후한 여남(汝南) 신양(愼陽) 사람으로, 75년에 태어나 122년에 죽었다. 한미한 집안 출신으로, 아버지는 소를 치는 사람이었다 전한다. 그러나 그 인품의 깊이가 후한 일대(一代)의 명사 평(評)에 한 표준이 되었다.\n\n황숙도는 어려서부터 <em>조용한 그릇</em>으로 일컬어졌다. 같은 군의 <em>순숙(荀淑)</em>이 신양에 들렀다가 열네 살의 황숙도를 만나 종일 이야기하고는 떠나기를 잊었다 한다. 헤어질 때 순숙이 <em>그대는 나의 스승이다</em> 하고 자리를 떴다. 순숙은 <em>순씨팔룡(荀氏八龍)</em>의 아버지이며 당대의 큰 학자였다. 그가 한낱 소년에게 <em>스승</em>이라 한 일이 여남 일대에 퍼져, 황숙도의 이름이 그때부터 알려졌다.\n\n그를 한 시대의 표상으로 끌어올린 사람은 <em>곽임종(郭林宗)</em>이다. 후한 말 인물 품평의 최고 권위였던 곽임종이 황숙도의 집에 들러 며칠을 머물고 돌아와 사람들에게 이렇게 말했다 한다. <em>숙도는 천 길의 큰 호수와 같다. 맑게 하려 해도 더 맑아지지 않고, 흐리게 하려 해도 흐려지지 않는다(汪汪如萬頃之陂, 澄之不淸, 淆之不濁). 그 그릇은 헤아릴 수 없다(其器深廣, 難測量也).</em> 이 한마디가 후한·위진 인물 평의 한 정점으로 굳어, 그 뒤 천 년 동안 <em>깊고 흐리지 않는 인격</em>을 가리키는 표준 비유가 되었다.\n\n황숙도의 깊이는 <em>드러내지 않음</em>에 있었다. 그는 경전을 강설하지도, 청론(淸論)으로 좌중을 누르지도 않았다. 곁에 앉으면 말이 많지 않고, 물으면 짧게 답하고, 그 답이 자리를 가라앉혔다 한다. <em>진번(陳蕃)</em>과 <em>주거(周擧)</em>가 일찍이 서로 말하기를, <em>한 달 동안 황숙도를 보지 않으면 비루하고 인색한 마음(鄙吝之心)이 다시 싹튼다</em> 했다. 곁에 있는 것만으로 사람의 속을 씻기는 인격, 그것이 황숙도의 자리였다.\n\n벼슬은 거의 하지 않았다. 군에서 효렴(孝廉)으로 천거되고 공부(公府)에서 불렀으나 모두 나가지 않았다. 한 번 경사(京師)에 이르렀다가 곧 돌아왔다. 사람들이 까닭을 묻자 다만 웃고 답하지 않았다 한다. 후한 말의 <em>당고(黨錮)의 화</em>가 닥치기 전에 그는 이미 세상을 떠났다. 향년 48세였다. 그가 일찍 죽었으되 그 이름이 <em>팔준(八俊)</em>·<em>팔고(八顧)</em>의 위에 놓인 까닭은, 벼슬도 저술도 남기지 않고 오직 <em>사람됨</em> 하나로 한 시대의 표준이 되었기 때문이다.\n\n후한의 인물 평이 위진의 <em>품조(品藻)</em>로 이어지는 그 길목에, 황숙도가 한 원형으로 서 있다. <em>천 길의 큰 호수</em>라는 한 비유가 곧 그 뒤 <em>왕융</em>·<em>사안</em>의 <em>아량</em>을 재는 한 자가 되었다. 『세설신어』〈덕행〉편의 첫머리가 <em>진중거(陳仲擧)</em>·<em>이원례(李元禮)</em>와 더불어 황숙도의 일화로 열리는 까닭이 여기에 있다.", "storyCount": 0}, {"id": "person.CaoPi", "type": "person", "han": "曹丕", "ko": "", "sub": "조비 (187~226)", "title": "", "short": "위 文帝. 조조의 큰아들. 220년 한 헌제의 양위를 받아 위(魏)를 세웠다. 시문에 능해 <em>건안문학</em>의 한 봉우리. 「典論」 같은 문론을 남겼다. 동생 조식과의 <em>칠보시(七步詩)</em> 일화로 유명하나 후대의 정착.", "long": "曹丕는 자가 자환(子桓)이다. <em>조조(曹操)</em>의 둘째 아들이지만 맏아들 <em>조앙(曹昂)</em>이 일찍 <em>완성(宛城)</em>의 싸움에서 죽었으므로, 실질적인 적장자의 자리를 차지했다. 187년에 태어나 226년에 마흔으로 죽었다. 한(漢)의 마지막 황제 <em>헌제(獻帝)</em>에게서 양위를 받아 <em>위(魏)</em>를 세운 사람이며, 곧 <em>위 문제(魏文帝)</em>다.\n\n어려서부터 활쏘기와 칼쓰기에 능했고 동시에 시문에 밝았다. <em>조조</em>가 아들들을 데리고 군중(軍中)을 떠돌던 시절, 조비는 말 위에서 책을 읽고 활을 쏘았다고 전한다. 그러나 그의 한가운데에는 동생 <em>조식(曹植)</em>이 있었다. 조식의 재주가 한때 조조의 마음을 사로잡아, 후계의 자리를 두고 두 형제가 오래 다투었다. <em>오질(吳質)</em>과 <em>사마의(司馬懿)</em>가 조비의 편에 섰고 <em>양수(楊修)</em>와 <em>정의(丁儀)</em>가 조식의 편에 섰다. 결국 조비가 이겼다. 그 승부의 그늘이 평생 그를 따라다녔다.\n\n220년 정월, <em>조조</em>가 죽었다. 그해 시월, 조비가 <em>헌제</em>에게서 양위의 형식을 빌려 황제가 되었다. 한 사백 년이 끝나는 자리였고, 동시에 <em>선양(禪讓)</em>이라는 형식이 <em>찬탈(簒奪)</em>의 새 의례로 굳어진 자리이기도 했다. 이후 <em>사마염</em>이 위에서 진(晉)을 받을 때, <em>유유</em>가 동진에서 송(宋)을 받을 때, 모두 조비의 이 의례를 본떴다. 한 시대의 한 끝이자 다음 시대의 한 시작이 한 사람의 손에서 매듭지어진 셈이다.\n\n황제가 된 뒤의 그는 동생들에게 엄격했다. <em>조식</em>을 <em>진사왕(陳思王)</em>으로 봉해 변방을 떠돌게 했고, <em>조창(曹彰)</em>은 도성에 불러 두었다 의문스럽게 죽었다. 후대의 <em>칠보시(七步詩)</em> 일화 — <em>콩깍지를 태워 콩을 삶으니 콩이 솥 안에서 운다(豆在釜中泣)</em> — 는 곧 이 형제 사이의 그늘을 압축한 한 자리지만, 그 시 자체는 후대에 정착된 것으로 본다. 그러나 일화가 후대의 것일지라도, 그 일화가 그에게 들러붙은 까닭은 분명하다.\n\n그러나 조비를 정치의 한 얼굴로만 보면 그를 다 보지 못한다. 그는 한 시대의 문학 영수였다. <em>조조</em>·<em>조식</em>과 함께 <em>삼조(三曹)</em>로 일컬어지며 <em>건안문학(建安文學)</em>의 한 봉우리를 이룬다. <em>건안칠자(建安七子)</em> — <em>공융</em>·<em>왕찬</em>·<em>유정</em>·<em>진림</em>·<em>완우</em>·<em>서간</em>·<em>응창</em> — 와 같은 자리에서 술을 마시고 시를 짓고 부(賦)를 겨루었다. 그의 「燕歌行」은 칠언시(七言詩) 한 형식의 한 첫 자리로 일컬어진다.\n\n특히 그가 남긴 「典論」은 중국 문학비평사의 한 첫머리에 놓인다. 그 안의 「論文」 한 편이 가장 유명하다. <em>문장은 경국(經國)의 큰 일이며, 불후의 성대한 일이다(蓋文章經國之大業, 不朽之盛事)</em>라 했다. 시문을 한낱 여기(餘技)로 두던 한 시대의 풍속을 깨고, 글쓰기를 한 사람의 한 일생의 무게로 끌어올린 자리다. 또 <em>건안칠자</em>의 한 사람 한 사람을 <em>기(氣)</em>를 들어 품평했다. <em>문(文)은 기(氣)를 위주로 한다(文以氣爲主)</em>는 그의 명제는 후대의 <em>기론(氣論)</em>적 문학관의 한 시작이 되었다.\n\n그가 한 시대에서 차지하는 자리는 이중적이다. 한편으로 그는 한을 끝내고 위를 세운 <em>선양</em>의 의례를 처음 만든 정치가이며, 다른 한편으로 <em>명사(名士)</em>의 풍모를 황제의 한 자리에까지 끌어올린 첫 사람이다. 황제이면서 시인이고, 시인이면서 비평가였다. 위진의 <em>명사 문화</em>가 곧 그의 형제와 그의 신하들 — <em>건안칠자</em>와 그 다음 세대의 <em>하안</em>·<em>완적</em>·<em>혜강</em> — 로 이어진다는 점에서, 그는 한 시대의 한 문턱이다.\n\n『세설신어』에서 그는 자주 <em>문제(文帝)</em> 또는 <em>위문제</em>로 호명된다. 〈문학〉편의 <em>칠보시</em> 자리, 〈상서(傷逝)〉편의 <em>왕찬</em>의 무덤에서 나귀 울음으로 곡을 대신한 자리 — <em>왕중선이 평소 나귀 울음을 좋아했으니 한 번씩 울어 그를 보내자</em>는 한마디 — 가 특히 그를 잘 그린다. 한 사람의 한 자리 안에 정사와 시문과 형제의 그늘과 명사의 풍모가 모두 들어 있는 셈이다.", "storyCount": 0}, {"id": "person.CaoFang", "type": "person", "han": "曹芳", "ko": "", "sub": "조방 (232~274)", "title": "", "short": "위 齊王. 명제(조예) 사후 8세에 즉위. 보정 대신 조상과 사마의의 사이에서 어린 황제로 살았다. 249년 <em>고평릉의 정변</em> 때 종묘 행차 중. 254년 사마사에게 폐위됨.", "long": "曹芳은 위(魏)의 제3대 황제다. 자는 난경(蘭卿)이며, <em>명제(明帝, 曹叡)</em>의 양자로 들어와 황태자가 되었다. 출생의 내력은 분명치 않다. 명제에게 친아들이 없어 종실 어딘가에서 데려와 길렀다 전한다. 232년에 태어났다고 하나 그것조차 확실치 않다. 이름을 모르는 채로 황제의 자리에 앉은 어린아이가 그였다.\n\n239년 정월, 명제가 위독해지자 여덟 살의 조방이 황태자로 세워지고 그날로 즉위했다. 명제는 임종의 자리에서 <em>조상(曹爽)</em>과 <em>사마의(司馬懿)</em> 두 사람에게 어린 황제를 부탁했다. 종실의 <em>조상</em>과 중신의 <em>사마의</em>가 함께 받드는 <em>보정(輔政)</em>의 형식이다. 그러나 이 두 축의 균형은 처음부터 위태로웠다. 어린 황제는 이 두 축 사이에 놓인 가운데의 자리에 지나지 않았다.\n\n처음 몇 해 동안은 <em>조상</em>이 권력을 잡았다. 조상은 <em>하안(何晏)</em>·<em>등양(鄧颺)</em>·<em>정밀(丁謐)</em>·<em>이승(李勝)</em> 같은 정시(正始) 명사들을 자기 막부에 두고 정치를 새로 짜려 했다. 이것이 곧 <em>정시(正始)</em>의 한 정치적 한낮이며, 동시에 <em>현학(玄學)</em>이 낙양 정계의 한복판에 들어선 시기다. 사마의는 병을 핑계로 물러나 있었다. 어린 조방은 그 사이에서 글을 배우고 활을 익히며 자랐다.\n\n249년 정월, 운명의 날이 왔다. 조방이 <em>조상</em>과 그 형제들을 거느리고 <em>고평릉(高平陵)</em>의 명제 능에 참배하러 도성을 나선 사이, <em>사마의</em>가 군을 일으켜 낙양 성문을 닫았다. <em>고평릉의 정변</em>이다. 능에서 돌아오는 길의 조방은 사실상 사마의의 손에 잡혔다. 조상은 항복했고, 며칠 뒤 삼족이 멸해졌다. <em>하안</em>·<em>등양</em>·<em>정밀</em>이 한꺼번에 죽었다. 한 시대의 청담의 한낮이 한 도성의 하룻밤에 끝났다. 그때 조방은 열여덟 살이었다.\n\n이후의 조방은 살아 있되 황제가 아니었다. <em>사마의</em>가 죽자(251) 아들 <em>사마사(司馬師)</em>가 그 자리를 이었다. 조방의 주위에는 <em>이풍(李豐)</em>·<em>하후현(夏侯玄)</em>·<em>장집(張緝)</em> 같은 신하들이 남아 있었으나, 254년 이들이 사마사를 제거하고 황제의 친정을 회복하려 한 계획이 발각되어 모두 죽었다. <em>하후현</em>은 형장에서도 낯빛이 변하지 않아 〈방정〉편의 한 정점이 된다. 조방은 그 모든 일을 곁에서 보고도 한마디도 하지 못했다.\n\n같은 해 9월, <em>사마사</em>가 <em>곽태후(郭太后)</em>의 이름을 빌려 조방을 폐위했다. 죄목은 <em>황음과 정사를 게을리한다</em>는 것이었지만, 실상은 황제가 자기 편 사람을 두려 한 죄였다. 조방은 <em>제왕(齊王)</em>의 옛 봉호로 강등되어 도성 밖으로 나갔다. 스물세 살이었다. 그 자리에 다시 <em>고귀향공(高貴鄕公, 曹髦)</em>이 세워졌고, 그 또한 몇 해 뒤 <em>사마소</em>의 칼 아래 죽는다.\n\n폐위된 뒤의 조방은 이십 년을 더 살았다. 위가 <em>진(晉)</em>에 자리를 넘겨준(265) 뒤로도 그는 살아 있었다. 진은 그를 죽이지 않고 <em>소릉현공(邵陵縣公)</em>으로 두었다. 274년 마흔셋의 나이로 죽었다. 자기 시대를 한 줄도 자기 손으로 쓰지 못한 황제의 긴 여생이었다.\n\n『세설신어』에서 조방은 거의 이름으로만 비친다. <em>고평릉의 정변</em>의 한 배경, <em>하후현</em>의 죽음의 한 배경, <em>하안</em>과 <em>왕필</em>의 정시 청담의 한 배경으로서, 어린 황제는 그 시대의 한가운데 앉아 있었으되 그 시대의 어느 일화에도 주인공이 되지 못했다. 그러나 그가 앉은 자리가 비어 있었기에 <em>사마씨</em>가 그 자리를 채워 갈 수 있었고, 그가 능에 나간 그 하루에 위진 백 년의 운명이 결정되었다. 〈방정〉·〈언어〉편의 정시 일화 뒤에 그 어린 그림자가 늘 한 자리 비껴 서 있다.", "storyCount": 0}, {"id": "person.CaoShuang", "type": "person", "han": "曹爽", "ko": "", "sub": "조상 (?~249)", "title": "", "short": "위 종친. 명제의 종질로, 그의 사후 보정 대신이 되었다. 정시 명사들을 측근으로 등용했으나 정치적 결단이 부족했다. 249년 사마의의 정변 때 황제를 모시고 고평릉에서 돌아오던 길에 결단을 못 내려 도성으로 돌아갔다 처형됨.", "long": "曹爽은 자가 소백(昭伯)이다. 위(魏)의 종친으로, <em>조진(曹眞)</em>의 맏아들이며 명제(明帝, <em>조예</em>)의 종질에 해당한다. 명제가 어려서부터 그를 가까이 두어 함께 자랐다. 키가 크고 풍채가 좋았으나 사람됨이 너그러워 결단력이 부족했다는 평이 일찍부터 따라다녔다.\n\n명제가 임종할 때(239), 후사로 어린 <em>조방(曹芳)</em>을 세우고 조상과 <em>사마의(司馬懿)</em>에게 함께 보정(輔政)을 맡겼다. 조상은 대장군(大將軍)이 되고 사마의는 태위(太尉)가 되었다. 처음에는 조상이 사마의를 부형(父兄)의 예로 받들어 큰일을 반드시 물어 처리했다 한다. 그러나 <em>하안(何晏)</em>·<em>등양(鄧颺)</em>·<em>정밀(丁謐)</em>·<em>필궤(畢軌)</em>·<em>이승(李勝)</em>이 그의 측근으로 들어오면서 분위기가 바뀌었다. 이들이 조상에게 <em>사마의가 늙은 여우이니 권력을 나눠 가져서는 안 된다</em> 권하자, 조상은 사마의를 태부(太傅)로 올려 실권에서 떼어 냈다.\n\n이들이 곧 <em>정시 명사</em>의 한 무리다. 하안이 그 영수로, <em>왕필(王弼)</em>과 더불어 낙양의 청담을 이끌어 <em>현학</em>의 정점을 빚어낸 그 인물이다. 조상의 막부는 곧 정시 청담의 정치적 후원자였다. 하안이 이부상서(吏部尙書)가 되어 인사를 쥐고, <em>삼현</em>을 함께 읽은 명사들이 줄지어 요직에 올랐다. 사상사의 한낮과 정치사의 한낮이 한 막부에 겹쳐 있던 자리다.\n\n그러나 정치적 솜씨는 사상의 정밀함을 따라가지 못했다. 244년 조상이 친히 군을 이끌고 <em>촉(蜀)</em>을 쳤다가 <em>낙곡(駱谷)</em>에서 크게 패해 돌아왔다. 위신이 한 번 꺾였다. 도성에 돌아와서는 사치가 깊어졌다. 황실의 의장과 기물을 사사로이 쓰고, 명제의 후궁을 데려와 두고, 동생들 <em>조희(曹羲)</em>·<em>조훈(曹訓)</em>에게 금군(禁軍)을 나눠 맡겼다. 조정 안에서는 <em>왕릉</em>·<em>장제</em> 같은 노신들이 입을 닫고 물러섰다. 사마의는 병을 칭하고 집에 들어앉아 일체 정사를 멀리하는 모양을 지었다.\n\n이승이 형주자사(荊州刺史)로 부임하기 전 사마의의 병문안을 가서 그 동정을 살핀 일화가 유명하다. 사마의가 일부러 죽을 흘리고 옷섶을 풀어 헤치며 <em>형주(荊州)를 병주(幷州)로</em> 잘못 알아듣는 시늉을 하자, 이승이 돌아와 조상에게 <em>공이 다 늙어 정신이 흐려졌으니 염려할 것이 없습니다</em> 보고했다. 조상은 그 말을 그대로 믿었다.\n\n249년 정월, 조상이 어린 황제 <em>조방</em>을 모시고 <em>고평릉(高平陵)</em>으로 명제의 능을 참배하러 나갔다. 도성이 비자 사마의가 일어났다. <em>영가의 정변</em>에 앞서는 위진 정치사 최대의 정변, 이른바 <em>고평릉의 변</em>이다. 사마의가 <em>곽태후(郭太后)</em>의 영을 빌려 성문을 닫고 조상의 죄를 들며 <em>대장군의 직만 거두고 후(侯)의 자리는 보전케 한다</em>는 약속을 조상에게 보냈다.\n\n성 밖의 조상에게는 길이 두 갈래였다. 한 갈래는 황제를 모시고 <em>허창(許昌)</em>으로 가서 군을 모아 사마의와 결전하는 길이고, 또 한 갈래는 약속을 믿고 도성으로 돌아가는 길이다. <em>환범(桓範)</em>이 <em>천자를 끼고 천하의 군을 부르면 누가 따르지 않겠습니까</em> 절규했으나, 조상은 밤새 망설이다 <em>부귀(富貴)만 보전하면 된다</em> 한마디로 결단을 내려놓았다. 칼을 내려놓고 도성으로 돌아갔다.\n\n며칠 뒤 모반의 죄가 더해져 조상과 세 동생, 그리고 하안·등양·정밀·필궤·이승·환범이 모두 삼족과 함께 죽었다. 한 정변으로 <em>정시 명사</em>의 한 세대가 통째로 사라졌다. 이때부터 위의 권병(權柄)은 사마씨에게 옮겨 갔고, 십육 년 뒤 <em>서진(西晉)</em>의 건국으로 이어진다.\n\n조상의 자리는 무엇이었던가. 그는 한 사람의 무능한 종친이기 이전에, <em>정시 청담</em>의 정치적 그늘이었다. 그가 막부를 열어 두었기에 하안과 왕필의 한낮이 있었고, 그가 결단을 못 내렸기에 그 한낮이 한 번에 저물었다. <em>고평릉</em>에서 그가 칼을 내려놓은 그 순간이 곧 <em>죽림(竹林)</em>의 시대가 열리는 그 순간이다. 『세설신어』에서 조상의 이름은 자주 나오지 않으나, 〈규잠〉·〈현원〉편의 정시 명사들의 그늘에 그가 늘 함께 서 있다.", "storyCount": 0}, {"id": "person.XiaHouXuan", "type": "person", "han": "夏侯玄", "ko": "", "sub": "하후현 (209~254)", "title": "", "short": "정시 명사. 자는 太初. 조상의 종매와 혼인한 부마이며, 하안과 더불어 玄學의 한 영수. 「樂毅論」을 남겼다. 고평릉의 정변에서 살아남았으나 254년 司馬師에게 반란 혐의로 처형됨. <em>옥산(玉山)이 무너지듯이</em> 죽었다 한다.", "long": "夏侯玄은 자가 태초(太初)이며, 패국(沛國) 초현(譙縣)의 하후씨에서 났다. 부친 <em>하후상(夏侯尙)</em>은 위 무제 <em>조조</em>를 따라 공을 세운 장군이며, 모친은 <em>조진(曹眞)</em>의 누이다. 그러니까 하후현은 위 황실의 외척이자, <em>조상(曹爽)</em>의 종매(從妹)와 혼인한 부마였다. 위 정시 연간 명사의 한가운데 자리는 거의 그의 혈통 위에 놓여 있었다고 해도 좋다.\n\n어려서부터 풍모가 빼어났다. 한 번은 어린 하후현이 <em>조예(曹叡, 명제)</em>의 자리에 불려 가 사촌과 나란히 앉았는데, 명제가 종실의 아이를 그의 위에 두자 낯빛이 변했다 한다. 명제가 그 까닭을 묻자 <em>예에 차서가 있는 법인데 자리가 어긋났습니다</em> 답했다는 일화가 〈방정〉편에 전한다. 어린 나이의 <em>방정(方正)</em>이 이미 한 자리를 이루고 있었다.\n\n자라서는 <em>하안(何晏)</em>과 더불어 정시 명사의 두 영수로 일컬어졌다. 하안이 <em>노자</em>와 <em>논어</em>의 자리에서 <em>無를 근본으로 삼는</em> 본체론을 세웠다면, 하후현은 <em>명교(名敎)</em>와 <em>자연(自然)</em>의 관계를 정사의 자리로 끌어들이는 데에 더 무게를 두었다. 그의 <em>본현론(本玄論)</em>과 <em>낙의론(樂毅論)</em>이 그 자취다. 특히 「樂毅論」은 <em>악의(樂毅)가 제(齊)를 다 치지 않은 까닭</em>을 풀이하며, <em>덕으로써 굴복시키는 자가 진정한 왕도</em>라는 자리를 폈다. 뒷날 <em>왕희지</em>가 이 글을 정성껏 베껴 그의 소해(小楷)의 한 표준으로 삼은 것이 〈교예〉의 한 자리에 남았다.\n\n청담의 자리에서도 하후현의 풍모는 따로 일컬어졌다. 그가 옥주미를 들고 자리에 앉으면 <em>한 자리의 빛이 그쪽으로 옮겨 갔다</em> 전한다. <em>시중(時人)이 하후태초를 보고 마치 해와 달이 품 안에 들어오는 듯하다(朗朗如日月之入懷) 평했다</em>는 일화가 〈용지〉편의 한 정점이다. 풍모와 명리(名理)와 정사가 한 인격에 모인 자리, 그것이 곧 정시 명사의 이상이었고, 하후현은 그 이상의 한 화신이었다.\n\n정사의 자리에서 그는 <em>조상</em>의 무리에 들었다. <em>정서장군(征西將軍)</em>에 임명되어 관중을 다스리며 <em>촉(蜀)</em>에 대한 방어를 맡았다. 244년의 <em>낙곡(駱谷)의 역(役)</em> — 조상이 무리하게 일으킨 촉 정벌 — 에서 하후현이 부장의 자리에 있었으나 성과 없이 물러났다. 그 뒤로 그의 정치적 입지가 흔들리기 시작했다.\n\n249년, <em>고평릉(高平陵)의 정변</em>이 왔다. <em>사마의(司馬懿)</em>가 <em>조상</em>을 쳐 그의 일족과 <em>하안</em>·<em>등양</em>·<em>정밀</em>·<em>필궤</em> 등 정시 명사의 무리를 한꺼번에 멸했다. 그런데 하후현만은 살아남았다. 외임에 있던 까닭도 있고, 사마의가 그의 명망을 함부로 베지 못한 까닭도 있다 한다. 그러나 그는 도성으로 불려 들어와 <em>대홍려(大鴻臚)</em>·<em>태상(太常)</em>의 한직에 옮겨졌다. 살아 있었으나 이미 죽은 자리에 놓인 셈이다.\n\n이 무렵 그의 풍모를 두고 한 사람이 <em>옛날의 하후태초가 아니다</em> 한탄하자, 곁의 이가 <em>그래도 옥산(玉山)이 무너진다 한들 어찌 그 빛이 사라지겠는가</em> 답했다 전한다. 정시의 한낮이 이미 저물고, 그 자신도 그 저묾의 한가운데에 서 있다는 자각이 그의 일상에 배어 있었다. 사람들이 그의 일을 물어도 그는 다만 묵묵히 앉아 옥주미를 어루만질 뿐이었다 한다.\n\n254년, <em>이풍(李豐)</em>과 <em>장집(張緝)</em>이 <em>사마사(司馬師)</em>를 폐하고 하후현을 보정(輔政)에 세우려는 모의를 일으켰다. 일이 새어 이풍이 먼저 잡혀 죽고, 하후현도 끌려 들어갔다. 옥에서 그는 끝내 자복하지 않았고, 형장에 끌려 나가는 순간까지 <em>낯빛이 바뀌지 않았다(顏色不變)</em> 한다. 동시(東市)에서 베어졌다. 향년 46세였다. <em>옥산이 무너지듯이(玉山之將崩)</em> 죽었다는 한마디가 〈용지〉편에 그의 끝을 새겼다.\n\n『세설신어』에서 그는 〈덕행〉·〈언어〉·〈방정〉·〈아량〉·〈용지〉·〈상예〉·〈품조〉편에 거듭 등장한다. <em>하안</em>과 더불어 정시 명사의 두 영수로 호명되지만, 하안이 사상의 한 정점이라면 하후현은 풍모와 정사의 한 정점이다. 그가 <em>옥산이 무너지듯이</em> 쓰러진 자리에서 위(魏)의 한낮은 끝났고, 곧 <em>사마씨</em>의 시대 — 다시 말해 <em>죽림</em>의 시대 — 가 열렸다.", "storyCount": 0}, {"id": "person.LiFeng", "type": "person", "han": "李豐", "ko": "", "sub": "이풍 (?~254)", "title": "", "short": "위 정시 명사. 중서령(中書令)을 지냄. 하후현과 더불어 사마씨에 맞서다 254년 처형됨. 그 죽음 직전의 의연함이 〈방정〉편의 한 정점.", "long": "李豐은 자가 안국(安國)이다. 풍익(馮翊) 동향(東鄉)의 이씨 출신이며, 아버지 <em>이의(李義)</em>가 위 문제·명제 두 대(代)에 걸쳐 위위(衛尉)에 이른 명사 가문이다. 이풍은 어려서부터 명망이 높았다. 십대 후반에 이미 그 이름이 <em>업하(鄴下)</em>에 들렸다. 오(吳)의 장수가 위에 항복해 왔을 때, <em>위에서 누가 가장 이름이 났는가</em> 묻자 답하여 <em>이안국이라는 이가 있다</em>고 했다 한다. 한 청년의 이름이 적국에까지 건너간 셈이다.\n\n위 명제(明帝) 때 출사해 <em>황문랑(黃門郞)</em>·<em>급사중(給事中)</em>을 거쳤다. 정시(正始) 연간에는 <em>상서복야(尙書僕射)</em>에까지 올랐다. 그러나 이풍은 본디 청신(淸愼)한 사람으로, 권세 있는 자리에 머무르되 권세를 부리지 않았다. 받은 녹은 가난한 친족과 옛 벗에게 나누어 주고 집에 쌓아두지 않았다 한다. <em>얼굴빛이 맑고 행보가 가벼웠다</em>는 평이 따라다녔다. 정시 명사의 한 전형이며, <em>하안</em>·<em>등양</em>·<em>하후현</em>과 같은 자리에 들어가는 인물이다.\n\n249년 <em>고평릉의 정변</em>은 위 정시 명사의 한 시대를 한꺼번에 끊었다. <em>사마의(司馬懿)</em>가 <em>조상(曹爽)</em> 일파를 일거에 베어 없애고 위의 실권을 잡으면서, 하안·등양 등 정시 청담의 영수들이 모두 죽임을 당했다. 그러나 이풍은 그 도륙을 비껴갔다. 조상에게도, 사마의에게도 한쪽으로 치우치지 않았던 처신 덕분이었다. 사마의 사후 <em>사마사(司馬師)</em>가 권을 이어받자 이풍은 <em>중서령(中書令)</em>에 올랐다. 황실의 기밀을 다루는 자리다. 사마사가 그를 곁에 둔 것은 그 명망을 자기 권위로 빌리려는 뜻이었다.\n\n그러나 이풍의 마음은 사마씨에 있지 않았다. 위 황실의 사위인 <em>하후현(夏侯玄)</em>과 더불어, 그리고 황후의 부친 <em>장집(張緝)</em>과 더불어, 그는 사마사를 폐하고 하후현으로 <em>대장군</em>을 삼으려는 모의를 안고 있었다. 위의 정통을 위 황실로 돌리려는 마지막 한 시도였다. 정시 명사의 마지막 한 사람이 정시의 끝물에서 정시를 위해 칼을 잡으려 한 셈이다.\n\n254년 봄, 일이 새어 사마사가 이풍을 불렀다. 이풍이 들어가니 사마사가 정면으로 물었다 한다. 이풍은 숨기지 않았다. <em>경(卿)의 부자(父子)가 권을 쥐고 사직을 마음대로 하니, 나는 사직을 위해 일을 도모했을 따름이다.</em> 사마사가 노해 칼자루로 그의 허리를 쳐 그 자리에서 죽였다. 향년이 얼마인지는 분명치 않으나 오십 안팎이었다 한다. 곧이어 하후현·장집이 처형되고, 이풍의 삼족이 멸해졌다. 그 가을에 사마사는 <em>위 폐제(廢帝, 조방)</em>마저 폐위한다. 이풍의 모의가 헛되이 끝난 것이 아니라, 사마사로 하여금 마지막 칼을 빼게 한 셈이다.\n\n그 죽음 직전의 의연함이 『세설신어』 〈방정(方正)〉편의 한 정점이다. 칼이 코앞에 와도 말의 결이 흔들리지 않고, <em>사직을 위해</em> 했다는 한마디로 자기 자리를 끝까지 지킨 그 풍모. 정시 명사가 청담의 자리에서 옥주미를 들 때의 그 결이, 형장(刑場)의 자리에서도 그대로 이어진 것이다. <em>명사 됨</em>은 자리가 바뀌어도 결이 바뀌지 않는 것이라는 한 증거.\n\n이풍의 죽음으로 정시 명사는 사실상 끝났다. 같은 해의 <em>하후현</em>의 죽음, 그 다음 해의 <em>관구검</em>의 거병, 그리고 <em>죽림칠현</em>의 시대 — <em>혜강</em>의 죽음(263)까지 이어지는 한 흐름이 여기서 시작된다. 정시의 청담이 시대의 칼 앞에서 어떻게 무너지는가, 그리고 그 무너짐 속에서 명사의 결이 어떻게 마지막 한 자리를 지키는가. 이풍은 그 두 물음의 한가운데 서 있는 사람이다. 〈방정〉편의 그 한 줄을 다시 읽을 때마다, 한 시대가 칼 끝에서 다시 일어선다.", "storyCount": 0}, {"id": "person.SiMaYan", "type": "person", "han": "司馬炎", "ko": "", "sub": "사마염 (236~290)", "title": "", "short": "진(西晉) 武帝. 사마의의 손자, 사마소의 큰아들. 265년 위의 마지막 황제 조환에게 양위를 받아 진을 세웠다. 280년 오를 멸해 천하 통일. 그러나 후계 결정에서 어그러져 어리석은 둘째 사마충을 세웠고, 이것이 곧 팔왕의 난과 영가의 난의 원인이 되었다.", "long": "司馬炎은 자가 안세(安世)다. 하내(河內) 온현(溫縣) 사마씨 출신으로, <em>사마의(司馬懿)</em>의 손자이자 <em>사마소(司馬昭)</em>의 큰아들이다. <em>고평릉의 정변</em> 이래 위(魏)의 정권을 사실상 장악해 온 사마씨 삼대(三代)의 마지막에 서서, 위의 마지막 황제 <em>조환(曹奐)</em>에게서 선양(禪讓)의 형식으로 황제 자리를 받아 진(晉)을 세운 인물이 곧 그다.\n\n265년, 사마소가 죽고 사마염이 진왕(晉王)의 자리를 이었다. 그 해 12월, 조환에게서 양위를 받아 황제가 되었다. 위가 한(漢)을 받았던 그 <em>선양</em>의 형식을 그대로 되풀이한 것이다. 사마염은 국호를 진(晉)이라 하고 연호를 <em>태시(泰始)</em>로 고쳤다. 이로써 <em>조비</em>의 위가 끝나고 사마씨의 진이 시작되었다. 사람들이 <em>위가 한을 거두더니 진이 위를 거두는구나</em> 수군거렸다 한다. 후한 말 이래의 한 거대한 매듭이 여기서 묶였다.\n\n즉위 초의 사마염은 보기 드물게 너그러운 군주였다. <em>완적</em>·<em>산도</em>·<em>왕융</em> 같은 죽림(竹林)의 옛 명사들을 거두어 조정에 앉히고, 위에서 진으로 옮겨 오는 인물들의 자존심을 다치지 않게 했다. 통일에 앞서 호적과 토지 제도를 정비해 <em>점전제(占田制)</em>와 <em>과전제(課田制)</em>를 펼쳤고, <em>구품관인법(九品官人法)</em>은 그대로 두어 <em>문벌(門閥)</em>의 지지를 단단히 했다. 그 너그러움이 진초(晉初)의 짧은 한 평온을 만들었다.\n\n280년, 사마염은 <em>왕준(王濬)</em>·<em>두예(杜預)</em>·<em>왕혼(王渾)</em>에게 명해 <em>오(吳)</em>를 쳤다. 익주(益州)에서 만든 누선(樓船)이 장강을 내려가 건업(建業)에 이르자, 오의 마지막 황제 <em>손호(孫晧)</em>가 결박된 채 항복했다. 후한 말 이래 백 년에 가까이 갈라져 있던 천하가 이 해에 비로소 다시 하나가 되었다. <em>삼국의 한 시대가 끝나고 통일의 한 시대가 열렸다</em>는 것이 당시의 감회였다. 사마염은 <em>태강(太康)</em>으로 개원하고, <em>태강의 치(太康之治)</em>라 일컫는 한 짧은 번영을 누렸다.\n\n그러나 통일 이후의 사마염은 빠르게 흐트러졌다. 후궁이 만 명에 이르렀다 전한다. 어느 후궁의 처소를 갈지 정하지 못해 양이 끄는 수레에 몸을 맡겨 양이 멈춘 곳에서 자게 했다는 일화가 있을 만큼, 그의 만년은 사치와 방종으로 기울었다. 외척 <em>양준(楊駿)</em>과 <em>가충(賈充)</em>의 무리가 조정에서 다투었고, 종실의 여러 왕에게 군권을 두텁게 나누어 준 <em>분봉(分封)</em>의 제도가 뒷날의 한 화근이 되었다.\n\n가장 어그러진 한 자리는 후계의 결정이었다. 태자 <em>사마충(司馬衷)</em>은 영민하지 못한 인물이었다. <em>백성이 굶는다</em> 아뢰자 <em>어찌 고기죽을 먹지 않는가(何不食肉糜)</em> 되물었다는 그 사람이다. 신하들이 다른 황자를 세우자 거듭 권했으나, 사마염은 끝내 사마충을 폐하지 못했다. 손자 <em>사마휼(司馬遹)</em>이 영특하다는 한 가닥 기대 때문이었다 한다. 게다가 태자비로 <em>가충</em>의 딸 <em>가남풍(賈南風)</em>을 들였으니, 어리석은 황제와 사나운 황후의 한 쌍이 이로써 예비되었다.\n\n290년 4월, 사마염이 죽었다. 향년 55세였다. 묘호는 세조(世祖), 시호는 무황제(武皇帝)다. 그가 눈을 감자마자 <em>양준</em>과 <em>가남풍</em>의 권력 다툼이 시작되었고, 종실의 여러 왕이 차례로 군을 일으켜 <em>팔왕의 난(八王之亂)</em>이 펼쳐졌다. 그 난이 진의 골수를 비우자, <em>永嘉 5년(311)</em> <em>영가의 난</em>에서 흉노의 <em>유총(劉聰)</em>이 낙양을 깨고 회제(懷帝)를 사로잡았다. 통일을 이룬 그 사람의 손에서 통일이 무너지는 한 도화선이 함께 놓인 셈이다.\n\n『세설신어』에서 사마염 자신의 일화는 많지 않다. 그의 시대는 〈언어〉·〈식감〉·〈규잠〉편 곳곳에 <em>완적</em>·<em>산도</em>·<em>왕융</em>·<em>양호(羊祜)</em>·<em>두예</em>의 모습으로 비친다. 그러나 그의 한 그림자가 위진 사대부의 한 시대 전체에 길게 드리워 있다. 통일을 이룬 군주이자 그 통일을 스스로 무너뜨릴 한 후계를 남긴 군주 — 그것이 사마염이 위진 백 년의 한가운데에 선 자리다.", "storyCount": 0}, {"id": "person.SiMaZhong", "type": "person", "han": "司馬衷", "ko": "", "sub": "사마충 (259~307)", "title": "", "short": "진 惠帝. 어리석은 황제. <em>백성이 굶주린다</em>는 보고에 <em>고기를 먹지 그러는가(何不食肉糜)</em> 답한 일화로 유명. 그의 황후 賈氏의 농단이 팔왕의 난을 일으켰고, 그 자신은 永興 원년(304) 사마월에게 사실상 인질이 되어 옮겨 다니다 독살되었다.", "long": "司馬衷은 자가 정도(正度)이며 *진 무제(晉武帝)* 사마염(司馬炎)의 둘째 아들이다. 형 사마궤(司馬軌)가 일찍 죽어 적장자의 자리에 올랐고, 泰始 3년(267) 아홉 살에 황태자가 되었다. *서진(西晉)* 왕조의 두 번째 황제 *혜제(惠帝)*가 곧 그다.\n\n어려서부터 그의 어리석음은 궁 안에 알려져 있었다. 무제도 그것을 걱정해 한 번 시험해 보았다 한다. 정사의 한 안건을 봉해 태자궁에 내려 답안을 올리게 했더니, 태자비 *가남풍(賈南風)*이 다른 사람을 시켜 그럴듯한 글을 지어 올렸고, 그 글을 본 무제가 안심해 폐위 논의를 거두었다 전한다. *위관(衛瓘)*이 일찍이 무제 앞에서 어좌를 어루만지며 *이 자리가 아깝다* 탄식한 것도 이 무렵의 일이다.\n\n태희(太熙) 원년(290) 무제가 죽고 사마충이 즉위했다. 즉위 직후의 일화 한 자리가 그를 천 년 동안 따라다닌다. 어느 해 큰 흉년이 들어 백성이 굶어 죽는다는 보고가 올라오자, 혜제가 *쌀이 없으면 어찌 고기죽을 먹지 않는가(何不食肉糜)* 되물었다. 〈배조(俳調)〉의 자리에 둘 일화가 아니라, 한 왕조의 무게가 그의 한 마디 위에 얹혀 있던 자리다.\n\n정사는 곧 황후 *가남풍*의 손에 들어갔다. 가후는 외척 *양준(楊駿)*을 무너뜨리고, 종실 *사마량*·*사마위*를 차례로 이용하다 버려, 조정 안의 견제 세력을 한 사람씩 잘라 냈다. 그러나 그 권력의 자리가 곧 *팔왕(八王)의 난*의 문을 열었다. 永康 원년(300) *조왕(趙王) 사마륜(司馬倫)*이 가후를 폐살하고 이듬해 스스로 황위에 올라 혜제를 *태상황*으로 밀어 두자, 종실 제왕(諸王) 사이의 무력 충돌이 본격적으로 터졌다.\n\n이후 7년 동안 사마충은 한 사람의 황제이기보다 *옥새가 붙은 인질*에 가까웠다. *제왕(齊王) 사마경*, *장사왕(長沙王) 사마예*, *성도왕(成都王) 사마영*, *하간왕(河間王) 사마옹*이 차례로 그를 끼고 자기의 정통을 주장했다. 탕음(蕩陰)의 싸움에서는 화살이 그의 얼굴을 맞혀 피가 흘렀고, 곁의 신하 *혜소(嵇紹)*가 그를 막다 죽었다. 그 피 묻은 옷을 빨려 하자 혜제가 *혜시중(嵇侍中)의 피다, 씻지 말라* 했다는 일화가 〈방정(方正)〉에 가까운 자리로 전한다. 어리석은 황제의 가장 사람다운 한 순간이다.\n\n永興 원년(304) 이후로는 *동해왕(東海王) 사마월(司馬越)*이 그를 차지했다. 사마월이 그를 끼고 낙양으로 돌아왔고, 光熙 원년(306) 혜제는 갑작스레 죽었다. 떡을 먹다 중독되었다는 말이 돌아, 사마월의 *독살*로 의심되었다. 향년 마흔여덟이었다. 시호가 *혜(惠)*로 정해진 것은, 그 한 글자에 한 시대의 모든 한이 응축된 셈이다.\n\n그가 황제로 있던 17년이 곧 서진 왕조가 무너져 내린 17년이다. 가후의 농단, 팔왕의 난, *영가의 난(永嘉之亂)*의 전조가 모두 그의 치세에 들어 있다. 『세설신어』에서 그는 〈우회(尤悔)〉·〈혹닉(惑溺)〉의 변두리에 어른거리고, *하불식육미*의 한 마디가 후대 <em>혼군(昏君)</em>의 대명사가 되어 그의 이름 위에 얹혔다. 동진의 명사들이 강을 건너 강남에서 새 자리를 펴게 된 그 멀고 깊은 원인이, 이 한 사람의 자리 위에 있다.", "storyCount": 0}, {"id": "person.JiaHou", "type": "person", "han": "賈皇后", "ko": "", "sub": "가황후 (257~300), 이름 南風", "title": "", "short": "진 혜제의 황후. 賈充의 딸. 어리석은 남편 대신 정사를 농단해 시아버지의 사촌형 사마량을 죽이는 일에서 <em>팔왕의 난</em>을 일으켰다. 300년 사마륜(司馬倫)에게 폐위·살해됨.", "long": "가황후(賈皇后)의 이름은 남풍(南風)이다. 자는 <em>가남풍(賈南風)</em>. 평양(平陽) 양릉(襄陵)의 가씨 출신으로, <em>서진(西晉)</em> 개국공신 <em>가충(賈充)</em>의 딸이다. 그는 <em>진 혜제(晉惠帝, 사마충司馬衷)</em>의 황후로서, 어리석은 남편을 대신해 십 년 가까이 서진 조정을 사실상 농단했고, 그 농단의 끝에서 <em>팔왕의 난</em>이 터졌다. 서진 멸망의 첫 단추가 곧 이 한 여인의 손에서 풀려 나왔다.\n\n가남풍의 입궁에는 미리부터 그늘이 있었다. <em>무제(武帝, 사마염)</em>는 본디 <em>위관(衛瓘)</em>의 딸을 태자비로 들이려 했다. <em>위씨의 딸은 다섯 가지가 좋고 가씨의 딸은 다섯 가지가 나쁘다 — 살결이 검고, 키가 작고, 투기가 심하고, 자식을 적게 낳고, 아름답지 않다</em>는 말이 그때 이미 돌았다 한다. 그러나 <em>가충</em>의 처 <em>곽괴(郭槐)</em>가 황후 <em>양씨</em>에게 뇌물을 두루 써서 결국 가씨의 딸이 동궁에 들어갔다(272년). 들어가는 순간부터 그 한 자리에 <em>팔왕</em>의 씨가 떨어진 셈이다.\n\n그의 <em>투기</em>는 동궁 시절부터 유명했다. 다른 궁녀가 태자의 아이를 가지자 손수 창으로 찔러 떨어뜨렸다는 일이 전한다. 무제가 노해 폐비를 논의했으나, <em>양황후</em>와 <em>양준(楊駿)</em>이 가까스로 막았다. 290년 무제가 죽고 어리석은 <em>혜제</em>가 즉위하자, 가남풍은 비로소 황후로서 자기 자리를 잡았다. <em>혜제</em>는 백성이 굶주려 죽는다는 보고를 받고 <em>어찌 고기죽을 먹지 않는가(何不食肉糜)</em> 했다는 그 황제다. 그 빈자리를 가황후가 채웠다.\n\n먼저 외척 <em>양준</em>이 정사를 잡고 있었다. 가황후는 종실의 <em>여남왕 사마량(司馬亮)</em>과 초왕(楚王) <em>사마위(司馬瑋)</em>를 끌어들여 양준을 죽이고 그 일족을 멸했다(291년 3월). 이어 사마량이 보정(輔政)을 맡자, 다시 <em>사마위</em>를 부추겨 <em>사마량</em>과 원로 <em>위관</em>을 죽이게 했다. 그러고는 <em>조서를 거짓으로 꾸며 종실을 함부로 죽였다</em>는 죄목으로 그 사마위마저 처형했다. 한 해 안에 세 사람을 차례로 베어 낸 솜씨가 차갑다. 이로써 가황후는 조정의 모든 견제 세력을 쓸어 내고 친정 <em>가씨</em>와 외종 <em>가밀(賈謐)</em>을 통해 십 년의 전권을 잡았다.\n\n그 십 년 동안 표면상 서진은 안정되어 보였다. <em>가밀</em>의 사랑방에는 <em>석숭(石崇)</em>·<em>반악(潘岳)</em>·<em>육기(陸機)</em>·<em>좌사(左思)</em> 등 당대의 문장가들이 모여 <em>이십사우(二十四友)</em>라 불렸다. <em>금곡원(金谷園)</em>의 잔치와 <em>낙양</em>의 사치가 그 시대의 한 표면이다. 그러나 정사는 <em>가밀</em>과 황후 일족의 농단에 기울었고, 풍속은 <em>왕연</em>류의 헛된 청담에 흘렀다. 후대가 <em>서진의 풍속이 곧 망국의 풍속</em>이라 한 그 한가운데가 이 시기다.\n\n치명적인 실수는 <em>태자 사마휼(司馬遹)</em> 사건이다. 태자는 가황후가 낳은 자식이 아니라 다른 후궁의 소생이었다. 가황후는 자기 자리를 위협하는 그 태자를 거짓 조서로 폐서인하고(299년), 이듬해 짐주(鴆酒)로 죽였다. 종실의 분노가 한꺼번에 터졌다. <em>조왕 사마륜(司馬倫)</em>이 이를 명분 삼아 군을 일으켜 입궁했고, 가황후를 폐해 금용성(金墉城)에 가두었다가 금설주(金屑酒)를 마시게 해 죽였다(300년). 향년 44세였다.\n\n가황후의 죽음으로 끝났다면 한 외척의 비극에 그쳤을 일이, 그것으로 끝나지 않았다는 점이 이 인물의 무게다. <em>사마륜</em>이 곧 제위를 찬탈하자, 종실 제왕들이 다시 들고 일어났다. <em>제왕 사마경</em>·<em>성도왕 사마영</em>·<em>하간왕 사마옹</em>·<em>장사왕 사마예</em>·<em>동해왕 사마월</em> — 이른바 <em>팔왕</em>이 차례로 군을 끌고 낙양으로 향했다. 십육 년의 <em>팔왕의 난</em>이다. 그 끝에 <em>영가의 난(311)</em>이 왔고, 서진이 멸망하고 <em>의관남도</em>가 시작되었다.\n\n『세설신어』는 이 여인을 정면에 길게 그리지 않는다. 그러나 〈혹닉(惑溺)〉편의 <em>가오(賈午)</em>와 <em>한수(韓壽)</em>의 일화, 〈우회(尤悔)〉편의 <em>가충</em>과 <em>위관</em>의 일화, 〈태치(汰侈)〉편의 <em>석숭</em>과 <em>왕개</em>의 호화 경쟁 — 그 모든 가씨와 그 사돈의 풍경 너머에 가황후의 그림자가 늘 어려 있다. <em>명사</em>의 청담이 한낮의 햇빛이라면, 가황후의 손은 그 햇빛이 짙게 떨어뜨린 한 그늘이다.", "storyCount": 0}, {"id": "person.WangKai", "type": "person", "han": "王愷", "ko": "", "sub": "왕개 (?~?)", "title": "", "short": "진 무제의 외삼촌. 외척으로 부를 누리며 <em>석숭</em>과 부 자랑을 다투었다. 산호수 일화, 자색 비단 장막 일화로 〈태치(汰侈)〉편의 표상이 되었다.", "long": "王愷는 자가 군부(君夫)다. 동해(東海) 담현(郯縣) 사람으로, <em>문명황후(文明皇后)</em> 왕씨의 동생이다. 곧 <em>진 무제(晉武帝)</em> 사마염(司馬炎)의 외삼촌이며, 서진(西晉) 초기 외척 가운데 가장 화려한 부를 누린 인물이다. 후장군(後將軍)을 지냈고 산기상시(散騎常侍)에 이르렀다 한다. 그러나 그의 이름이 남은 자리는 관직이 아니라 <em>부의 다툼</em>이다.\n\n서진 무제 시기의 낙양은 <em>태강(太康)의 성세</em>라 일컬어졌다. 천하가 통일된 직후의 짧은 평화 속에서, 사대부와 외척의 사치가 한꺼번에 펼쳐졌다. <em>하증(何曾)</em>이 하루 식비로 만 전을 쓰고도 <em>젓가락 내릴 곳이 없다</em> 했고, 그 아들 <em>하소(何劭)</em>는 그보다 더했다 한다. 그러나 그 모든 사치의 정점에 <em>왕개</em>와 <em>석숭(石崇)</em>의 다툼이 있었다. 한쪽은 황실 외척, 한쪽은 형주(荊州)에서 상인의 재물을 털어 거부가 된 자사. 출신이 다른 두 부자가 낙양 한복판에서 <em>부를 겨루는 경기</em>를 벌였다.\n\n가장 알려진 자리가 <em>산호수</em> 일화다. 무제가 외삼촌을 편들어 궁중의 산호수 한 그루를 내려 주었다. 두 자 남짓 되는 것으로 가지가 곱고 빛이 맑아 천하에 짝이 없다고 일컬어졌다. 왕개가 의기양양해 석숭에게 보였다. 석숭은 보자마자 철여의(鐵如意)를 들어 그 자리에서 산호수를 깨뜨려 버렸다. 왕개가 낯빛이 변해 따지자 석숭이 웃으며 <em>아까워 마시오, 이제 갚으리다</em> 하고는 자기 집의 산호수를 꺼내 보였다. 세 자·네 자짜리가 예닐곱 그루, 왕개의 것에 견줄 만한 것이 또 여러 그루였다. 왕개가 망연자실해 물러섰다 한다. 〈태치〉편의 백미다.\n\n다른 자리도 한둘이 아니다. 왕개가 <em>엿당(飴糖)</em>으로 솥을 닦자 석숭은 <em>밀랍</em>으로 장작을 삼아 밥을 지었다. 왕개가 <em>자색 비단 장막</em>을 사십 리에 둘러쳐 길손을 위압하자 석숭은 <em>비단 장막</em>을 오십 리에 둘러쳤다. 왕개가 <em>적석지(赤石脂)</em>로 담벼락을 발랐다는 말에 석숭은 <em>산초(山椒) 가루</em>로 자기 집 벽을 발랐다. 무제가 외삼촌을 도와 진귀한 보물을 자주 내렸으나, 한 자리마다 석숭에게 졌다 한다. 부의 경기에서 황실의 곳간이 한 사가(私家)의 곳간을 이기지 못한 셈이다.\n\n이 다툼은 단순한 호사담이 아니다. 서진의 한낮이 곧 사치의 한낮이었고, 그 사치의 뿌리에 <em>외척과 신흥 거부의 결탁</em>, 그리고 <em>현학의 풍속화</em>가 함께 있었다. <em>왕연</em>이 옥주미를 들고 청담을 즐기던 그 같은 낙양에서 왕개와 석숭이 산호수를 깨뜨리고 있었다. 깊이의 사상과 표면의 사치가 같은 사대부의 두 얼굴이었던 것이다. 그 끝이 곧 <em>팔왕의 난</em>이며 <em>영가의 난</em>이었다. 석숭은 <em>손수(孫秀)</em>에게 죽었고, 왕개의 자손도 그 난리 속에 흩어졌다.\n\n『세설신어』에서 왕개는 〈태치〉편을 중심으로 〈우회〉·〈수오〉편 곳곳에 그림자를 드리운다. 그의 이름을 부르면 곧 서진 태강 연간의 그 어지러운 한낮이 따라 일어선다.", "storyCount": 0}, {"id": "person.LiuYuan", "type": "person", "han": "劉淵", "ko": "", "sub": "유연 (251~310)", "title": "", "short": "흉노 출신의 황제. 304년 산서에서 <em>한(漢, 後趙의 전신)</em>을 세웠다. 자기를 한 황실의 후예라 칭해 정통의 명분을 세웠다. 그의 아들 劉聰이 311년 낙양을 함락해 영가의 난을 일으켰다.", "long": "劉淵은 자가 원해(元海)다. 흉노 좌부수(左部帥) <em>유표(劉豹)</em>의 아들로, 남흉노 <em>어부라(於夫羅)</em> 선우의 손자다. 흉노 귀종(貴種) 가운데서도 가장 높은 자리에 속했다. 그러나 그가 역사에 남긴 자취는 흉노의 한 영수로서가 아니라, 중국 안의 한 황제로서다. 그가 세운 나라의 이름이 <em>한(漢)</em>이다.\n\n남흉노는 후한 이래 산서 북부에 흩어져 살며 중국의 호적에 편입되어 있었다. 조위(曹魏)가 그 부락을 다섯으로 나누어 <em>오부(五部)</em>로 두었고, 유표가 그 중 좌부의 수장이었다. 유연은 어려서 낙양의 인질로 보내져 한문 교양을 익혔다. <em>모시(毛詩)</em>·<em>상서(尙書)</em>·<em>춘추좌씨전</em>을 두루 읽고, 손오의 병법까지 통했다 한다. 진(晉) 무제(武帝)가 그를 보고 풍채와 기량을 칭찬했다는 이야기가 전한다. 그는 흉노의 핏줄을 입고 중국의 문(文)을 가진 사람이었다.\n\n태강(太康) 연간 이래 유연은 <em>오부대도독(五部大都督)</em>에 올라 흉노 부락의 실질적 영수가 되었다. 그러나 그가 남쪽 정사의 한 자리에 오르려 할 때마다 <em>왕혼</em>·<em>왕제</em> 등 진의 명문이 <em>비아족류(非我族類)</em>를 경계해 막았다. 한문을 다 갖춘 그가 끝내 진의 신하로 자리잡을 길은 없었다. 그 답답함이 그의 뒷날을 결정했다.\n\n기회는 <em>팔왕의 난</em>에서 왔다. 종실의 여러 왕이 서로 군세를 끌고 다투자, 흉노 부락의 무력이 다시 값을 가지게 되었다. 304년, <em>성도왕 사마영</em>의 패전을 틈타 유연은 좌국성(左國城)으로 돌아가 <em>대선우(大單于)</em>를 칭하고, 곧이어 <em>한왕(漢王)</em>에 올랐다. 도읍을 <em>이석(離石)</em>에 두었다가 뒤에 <em>평양(平陽)</em>으로 옮겼다.\n\n나라 이름을 <em>漢</em>으로 한 것이 그의 정치적 결단의 핵심이다. 그는 자기를 <em>한 황실의 외손</em>이라 칭했다. 한 고조(高祖)가 <em>형제의 맹세</em>로 흉노 선우에게 종실의 여인을 주었으니, 흉노의 선우 가문은 곧 한 황실의 외척이며, 한이 끊긴 뒤 그 정통을 외손인 자기가 잇는다는 논리다. 그는 <em>유선(劉禪)</em>까지를 정통으로 올려 제사하고, 한 고조 이래 촉한의 황제들을 함께 모셨다. 이로써 흉노의 군세는 <em>오랑캐의 침입</em>이 아니라 <em>한실의 부흥</em>이라는 명분을 얻었다. 중국 안의 호족(胡族)이 중국의 정통을 자기 것으로 끌어쓴 첫 자리다.\n\n308년, 그는 마침내 <em>황제</em>를 칭했다. 진의 <em>영가(永嘉)</em> 연간이다. 그의 막하에 <em>유총(劉聰)</em>·<em>유요(劉曜)</em>·<em>석륵(石勒)</em>·<em>왕미(王彌)</em>가 모였다. 모두 뒷날 화북을 흔드는 영수들이다. 유연은 그들을 거느리고 낙양을 거푸 두드렸으나, 끝내 낙양의 함락을 자기 눈으로 보지는 못했다. 310년, 그는 평양에서 죽었다.\n\n이듬해 311년, 아들 <em>유총</em>이 <em>석륵</em>과 함께 낙양을 함락하고 <em>회제(懷帝)</em>를 사로잡았다. 이것이 <em>영가의 난</em>이다. 화북의 사대부가 강을 건너 <em>의관남도(衣冠南渡)</em>하는 그 큰 흐름이 이로부터 일어났다. 유연이 평양에서 세운 한 자리가 사실상 <em>오호십육국</em>의 첫 깃발이며, 동시에 <em>동진</em>의 시작점이기도 하다. 위진 사상사의 한 절반이 그가 일으킨 파도 위에서 흘러간다.\n\n『세설신어』는 그를 정면으로 다루지 않는다. 그러나 序說 8章이 다루는 바로 그 <em>영가의 난</em>의 발원이 곧 이 사람이다. 강을 건넌 명사들이 <em>신정(新亭)</em>에 올라 <em>풍경은 다르지 않은데 산하가 다르다</em> 울던 그 풍경의 뒤편에, 평양에서 황제를 칭한 한 흉노 귀종의 그림자가 길게 드리워 있다.", "storyCount": 0}, {"id": "person.LiuCong", "type": "person", "han": "劉聰", "ko": "", "sub": "유총 (?~318)", "title": "", "short": "유연의 아들. 310년 한의 황위를 이어, 311년 낙양을 함락하고 회제를 잡아갔다. <em>영가의 난</em>의 주역. 316년 장안의 민제까지 잡아 서진을 완전히 끝냈다.", "long": "劉聰은 자가 현명(玄明)이다. 흉노 <em>屠各部</em>의 <em>劉淵</em>의 넷째 아들이다. 어머니가 한족 측실이었으나, 유연이 가장 아끼던 아들이라 한다. 어려서부터 한문(漢文)에 능해 <em>모시(毛詩)</em>·<em>상서(尙書)</em>·<em>춘추좌씨전</em>을 두루 외었고, <em>손오병법(孫吳兵法)</em>에도 밝았다. 시문도 곧잘 지어 <em>낙양</em>의 사대부들과 어울렸다 전한다. 활을 당기면 삼백 근을 들었다 하니, 문무를 한 몸에 갖춘 사람이었다.\n\n그의 아버지 유연은 <em>영흥 원년(304)</em> <em>좌국성(左國城)</em>에서 일어나 <em>한(漢)</em>을 칭한 인물이다. 흉노 선우의 후예로서 <em>한실(漢室)의 외손(外孫)</em>을 자처하며 <em>유(劉)</em>를 성으로 삼고, <em>유선(劉禪)</em>까지 종묘에 모셨다. 곧 한족 왕조의 정통을 <em>우리가 잇는다</em>는 정치적 명분이었다. 유총은 그 한의 <em>대선우(大單于)</em>에 봉해져 군사의 일선을 맡았다.\n\n<em>영가 4년(310)</em> 유연이 죽었다. 태자 <em>劉和</em>가 즉위했으나 형제 사이의 의심으로 곧 정변이 일어났다. 유화가 동생들을 치려 하자 유총이 먼저 군을 일으켜 유화를 베고 황위에 올랐다. 형의 자리를 빼앗는 길이었으나, 그는 <em>적장자</em>인 형 <em>劉乂</em>를 황태제(皇太弟)로 세워 명분을 갖추었다. 즉위 직후부터 그는 <em>진(晉)의 도성을 친다</em>는 한 가지 목표에 군세를 모았다.\n\n<em>영가 5년(311)</em>. 그는 <em>劉曜</em>와 <em>石勒</em>과 <em>王彌</em>에게 명해 낙양으로 진군하게 했다. <em>팔왕의 난</em>으로 자멸한 서진(西晉)은 이미 군세를 잃은 뒤였다. <em>동해왕 사마월</em>이 죽고 그 군이 <em>고현(苦縣)</em>에서 석륵에게 전멸당한 자리가 그 직전이다. 낙양은 거의 비어 있었다. 6월, 유요의 군이 성에 들어가 <em>회제(懷帝)</em> 사마치(司馬熾)를 사로잡았다. 종묘를 불태우고 능을 파헤쳤으며, 왕공 사대부 삼만여 명을 학살했다. <em>衣冠南渡</em>의 시작이며, 곧 <em>永嘉의 亂</em>이다.\n\n회제는 <em>평양(平陽)</em>으로 압송되어 유총 앞에 끌려 나왔다. 유총은 그에게 <em>회계공(會稽公)</em>을 봉하고 푸른 옷을 입혀 술자리의 시중을 들게 했다. 진의 옛 신하들이 그 광경에 눈물을 흘리니 유총이 곧 회제를 죽였다(313). 한족 왕조의 황제가 흉노의 술잔을 받드는 그 한 자리가 곧 <em>영가의 난</em>의 가장 깊은 상징이다.\n\n<em>建興 4년(316)</em>. 장안에서 즉위한 <em>민제(愍帝)</em> 사마업(司馬鄴)마저 유요의 군에 포위되어 항복했다. 민제도 평양으로 끌려와 같은 굴욕을 거친 뒤 이듬해 살해되었다. 이로써 <em>서진</em>은 완전히 끊겼다. 강남의 <em>사마예</em>가 <em>建武 원년(317)</em> <em>건강(建康)</em>에서 즉위해 <em>동진(東晉)</em>을 여는 것은 그 직후의 일이다.\n\n유총의 만년은 어두웠다. 두 황제를 사로잡은 위세 뒤에 <em>유찬(劉粲)</em>과 <em>근준(靳準)</em>의 무리가 궁중에서 다투었고, 황태제 <em>劉乂</em>는 무고로 폐살되었다. 후궁이 수천을 헤아렸고, 환관과 외척에게 정사를 맡겨 <em>한</em>의 안이 빠르게 비었다. <em>318년</em> 유총이 병으로 죽자 곧 <em>근준의 난</em>이 일어나 <em>한</em>의 황실이 거의 멸절되었다. 유요가 <em>전조(前趙)</em>로 국호를 고쳐 자리를 이었고, 석륵은 갈라져 <em>후조(後趙)</em>를 세웠다. <em>오호(五胡)</em>의 진정한 분열이 비로소 시작된 자리다.\n\n유총은 『세설신어』에 직접 등장하지는 않는다. 그러나 그가 <em>낙양</em>을 부수고 <em>회제</em>를 잡아간 그 한 해(311)가 곧 책 전체의 어두운 배경이다. <em>왕연</em>이 석륵에게 잡혀 죽은 일, <em>위개</em>가 강을 건너다 객사한 일, <em>왕도</em>가 <em>과강의 신정(新亭)</em>에서 <em>풍경은 다르지 않으나 산하가 달라졌다</em> 한 일 — 그 모든 일화의 뒤편에 유총이 서 있다. 그가 부순 낙양의 잿더미 위에서 동진의 <em>명사 문화</em>가 다시 시작되었다.", "storyCount": 0}, {"id": "person.ShiLe", "type": "person", "han": "石勒", "ko": "", "sub": "석륵 (274~333)", "title": "", "short": "갈족 출신의 무장. 본래 노예였으나 흉노 한의 휘하에서 일어났다. 후일 자립해 <em>후조(後趙)</em>를 세웠다(319). 王衍을 사로잡아 죽인 일화로 『세설신어』에 등장.", "long": "石勒은 자가 세룡(世龍)이다. 상당(上黨) 무향(武鄕)의 갈족(羯族) 출신이다. 갈은 흉노에 부속된 한 작은 종족으로, 그 사회적 지위는 흉노 본종(本宗)보다 한참 아래였다. 그 출신이 끝내 <em>후조(後趙)</em>의 천자(天子)에 올랐으니, 위진 남북조 전체에서도 가장 극적인 한 신분 상승의 자리다.\n\n어려서부터 가난했다. 스무 살 무렵 <em>병주(幷州)</em>에 큰 흉년이 들자, 진(晉)의 관리들이 갈족 사람들을 잡아 산동(山東)에 노예로 팔았다. 석륵도 그 가운데 한 사람으로, 두 사람씩 쇠고랑에 함께 묶여 끌려갔다 한다. 노예 신분으로 한 농장의 일을 했다. 그 농장 주인이 <em>그의 골상이 범상치 않다</em> 알아보고 풀어 주었다는 일화가 전한다. 노예에서 풀려난 그는 도적의 무리에 들어 <em>십팔기(十八騎)</em>라 불리는 한 패의 영수가 되었다.\n\n영가(永嘉)의 어지러움이 깊어지자 <em>흉노 한(漢)</em>의 <em>유연(劉淵)</em>에게 귀부했다. 곧 두각을 나타냈다. <em>유연</em>·<em>유총(劉聰)</em>의 휘하에서 그는 화북의 진군(晉軍)을 연이어 격파했다. 永嘉 5년(311), <em>영가의 난</em>의 한가운데서 그는 평성 부근의 <em>영평성(寧平城)</em>에서 <em>왕연(王衍)</em>이 이끄는 동해왕 <em>사마월</em>의 십만 호상(護喪) 군대를 포위해 섬멸했다. 西晉의 사대부 수백 명이 한자리에서 죽었다. 西晉이 사실상 이때 끝났다.\n\n이때의 <em>왕연</em>과의 한 자리가 『세설신어』의 한 장면이다. 사로잡힌 왕연이 석륵 앞에서 자기는 본래 정사에 뜻이 없었다 변명하며 <em>그대가 천하를 취해야 한다</em> 권했다. 석륵이 노해 <em>그대는 천하의 명사로 지위가 삼공에 올랐으면서 어찌 정사에 뜻이 없었다 하는가. 천하를 무너뜨린 자가 그대가 아니고 누구인가</em> 꾸짖고, 그 밤에 사람을 보내 담을 무너뜨려 깔려 죽게 했다. 한 시대 <em>청담</em>의 영수가 한 갈족 무장의 한마디 앞에서 무너진 자리. 〈경저(輕詆)〉편에 전하는 이 일화는 <em>현학</em>의 한 시대가 어떤 무게로 끝났는가를 보여주는 한 장면이다.\n\n그 뒤 석륵은 화북을 차근차근 평정했다. 319년 <em>조왕(趙王)</em>을 칭하고 <em>양국(襄國)</em>에 도읍해 <em>후조</em>를 세웠다. 흉노 한의 계승자 <em>유요(劉曜)</em>와 갈라져 한참을 싸우다, 328년 낙양 부근에서 유요를 사로잡아 죽이고 화북의 한 주인이 되었다. 330년에 황제 위에 올랐다.\n\n문맹(文盲)이었다 한다. 그러나 늘 사람을 시켜 사서(史書)를 읽혀 듣기를 좋아했다. <em>한 고조(高祖)</em>의 일을 듣고는 <em>내가 만약 그를 만났더라면 응당 그의 신하가 되어 </em>한신<em>·</em>팽월<em>과 어깨를 다투었으리라. </em>광무<em>를 만났더라면 함께 중원을 다투었을 것이다</em> 했다 한다. 자기의 자리를 안다는 점에서, 그는 한 시대를 읽는 사람이었다. <em>한인 사대부</em>를 우대해 <em>장빈(張賓)</em>을 모사(謀士)로 두었고, 노예 출신의 갈족 사람을 함부로 잡아 부리는 일을 금했다.\n\n333년 죽었다. 향년 60세였다. 후사를 둘러싼 그의 조카 <em>석호(石虎)</em>의 찬탈로 후조는 곧 폭정의 시대에 들어가 한 세대 만에 무너졌다. 그러나 <em>노예에서 황제로</em>라는 그의 일생은 그 자체로 위진 남북조의 한 표지다. 『세설신어』에서 그는 많이 등장하지 않지만, 〈경저〉편의 <em>왕연을 죽인 한 장면</em>만으로도 그는 西晉 명사 시대의 한 끝에 서 있다. 序說 8章이 그리는 <em>영가의 난</em>의 한가운데에 이 갈족의 한 사람이 서 있다.", "storyCount": 0}, {"id": "person.SiMaRui", "type": "person", "han": "司馬睿", "ko": "", "sub": "사마예 (276~322)", "title": "", "short": "진 元帝, 동진의 첫 황제. 본디 낭야왕(琅琊王)으로 강동에 진수하고 있었다. 영가의 난 후 <em>왕도</em>의 보좌로 강좌의 사대부를 끌어모아 318년 건강에서 즉위. <em>왕씨와 사마씨가 천하를 함께 한다</em>는 형국. 왕돈의 난을 겪으며 죽음.", "long": "司馬睿는 자가 경문(景文)이다. <em>사마의</em>의 증손이며 낭야왕(琅琊王) 사마근의 손자다. 종실로서는 본디 황통의 중심에서 멀리 떨어진 가지였다. 그가 동진의 첫 황제로 즉위하리라고는 <em>팔왕의 난</em> 직전까지 누구도 예감하지 못했다.\n\n젊어서 낭야왕을 이었다. 낭야는 산동의 한 모퉁이지만, 그곳에 <em>낭야 왕씨(琅琊 王氏)</em>라는 당대 일류 사족이 있었다. 그 가문의 <em>왕도(王導)</em>가 사마예와 일찍부터 깊이 사귀었다. 왕도는 사마예를 보고 <em>제왕의 그릇</em>이라 평했다 전한다. 사마예 쪽에서도 왕도를 <em>나의 소하(蕭何)</em>로 여겼다 한다. 두 사람의 사귐이 곧 뒷날 동진 한 왕조의 골격이다.\n\n팔왕의 난이 가라앉기 전, <em>동해왕 사마월</em>이 사마예를 안동장군(安東將軍)으로 삼아 <em>건업(建鄴)</em>에 진수하게 했다. 307년의 일이다. 강동(江東)은 본디 <em>손오</em>의 옛 땅으로, 의관남도해 온 중원의 사족이 아직 자리잡지 못한 곳이었다. <em>주의(周顗)</em>·<em>고영(顧榮)</em>·<em>하순(賀循)</em> 같은 강남의 옛 사족이 사마예를 데면데면 대했다. 사마예가 처음 건업에 들어왔을 때 한 달이 지나도록 강남 사족 한 사람도 찾아오지 않았다 한다.\n\n이 곤경을 푼 사람이 왕도다. 왕도가 <em>삼월 삼짇날의 계제(禊祭)</em>에 맞추어 사마예를 화려한 가마에 태우고, 왕도 자신과 사촌형 <em>왕돈(王敦)</em>이 말을 끌고 그 뒤를 따랐다. 낭야 왕씨의 두 영수가 친히 종자(從者)의 자리에 선 행렬이었다. 강남 사족이 길가에서 그 광경을 보고 놀라, 그 자리에서 <em>고영</em>이 먼저 길에 엎드려 절했다 한다. 그날부터 강남 사족이 차례로 사마예의 막부에 모여들었다. <em>왕여마, 공천하(王與馬, 共天下)</em> — 왕씨와 사마씨가 천하를 함께 한다 — 의 형국이 그 길 위에서 시작되었다.\n\n311년 <em>영가의 난</em>이 터졌다. 흉노 <em>유총</em>의 군이 낙양을 함락하고 <em>회제</em>를 사로잡았다. 316년에는 장안마저 떨어져 <em>민제</em>가 항복했다. 서진은 사실상 끝났다. 중원의 사족이 강을 건너 강좌(江左)로 내려왔다. <em>왕도</em>가 그들을 한 사람 한 사람 사마예 곁에 자리잡게 했다. 망한 중원의 의관(衣冠)이 모두 건업에 모인 격이었다.\n\n317년 사마예가 <em>진왕(晉王)</em>을 칭하고, 이듬해 318년 민제의 부음이 전해지자 <em>건강(建康)</em>에서 황제 자리에 올랐다. 동진의 첫 황제, 곧 <em>원제(元帝)</em>다. 즉위식에서 그는 어좌 옆자리를 비워 두고 <em>왕도여 함께 앉으시오</em> 청했다 한다. 왕도가 굳이 사양하며 <em>해가 만물을 비추거늘 어찌 만물과 자리를 함께하리이까</em> 답했다. 군신의 예가 그 한 자리에서 갈렸지만, <em>왕여마 공천하</em>의 실상은 그 사양의 안에 더 분명히 새겨졌다.\n\n원제의 치세는 그러나 곧 그 형국의 무게에 짓눌렸다. 사마예는 왕씨의 그늘에서 벗어나려 <em>유외(劉隗)</em>·<em>조협(刁協)</em>을 가까이 두고 왕씨를 견제했다. 형주(荊州)에 진수한 <em>왕돈</em>이 이를 빌미로 군을 일으켰다(322년). <em>왕돈의 난</em>이다. 왕돈의 군이 건강에 들어와 유외·조협을 죽이고 조정을 장악했다. 원제는 사실상 폐위된 황제처럼 궁에 갇혔다. 그해 윤 십일월, 사마예는 분(憤)과 병으로 죽었다. 향년 47세였다.\n\n원제는 천하를 회복하지 못했다. <em>조적(祖逖)</em>의 북벌을 끝까지 밀어주지 못한 것이 그 한 표지다. 그러나 그가 <em>왕도</em>와 함께 강좌에 한 왕조의 자리를 세운 것은 부정될 수 없다. 의관남도(衣冠南渡)의 사족이 그 자리에서 한 시대의 풍속을 다시 펼쳤고, 그 풍속이 곧 『세설신어』의 무대다.\n\n『세설신어』에서 원제는 〈언어〉·〈방정〉·〈우회〉·〈총례〉편 등에 등장한다. 황제의 권세보다 사족의 풍격이 더 무거웠던 한 시대의 첫 자리에, 그가 <em>왕도</em>와 나란히 서 있다.", "storyCount": 0}, {"id": "person.MingDi", "type": "person", "han": "司馬紹", "ko": "", "sub": "사마소 (299~325), 곧 동진 明帝", "title": "", "short": "동진의 두 번째 황제. 원제의 큰아들. <em>왕돈의 난</em>을 평정하고 정치적 회복을 이끌었다. 그러나 27세에 일찍 죽었다. 그의 후사가 어린 성제로, 외척 庾亮이 정사를 잡는 길을 열었다.", "long": "司馬紹는 자가 도기(道畿)다. <em>동진</em> 원제(元帝, <em>사마예</em>)의 큰아들로, 299년에 태어나 325년에 죽었다. 동진의 두 번째 황제이며, 시호가 명(明)이라 <em>진명제(晉明帝)</em>로 일컬어진다. 재위는 322년부터 325년까지, 햇수로 셋에 지나지 않는다. 그러나 그 짧은 셋이 동진의 운명을 한 번 돌려 놓은 셋이다.\n\n어려서부터 총명함이 알려졌다. 원제가 무릎에 앉히고 <em>해와 장안 가운데 어느 것이 더 머냐</em> 물었다 한다. 어린 사마소가 <em>해가 더 멉니다. 해에서 온 사람은 들은 적이 없고 장안에서 온 사람은 보았으니까요</em> 답했다. 다음 날 원제가 신하들 앞에서 자랑삼아 다시 물으니, 이번에는 <em>장안이 더 멉니다</em> 답했다. 원제가 까닭을 묻자 <em>고개를 들면 해는 보이는데 장안은 보이지 않으니까요</em> 했다. 〈숙혜(夙惠)〉편의 한 백미다. <em>낙양</em>과 <em>장안</em>을 잃고 강남에 떠밀려 온 한 왕조의 어린 황태자가, 보이지 않는 옛 도성을 한 번 더 멀리 둔 그 대답에 동진 초의 비애가 응축되어 있다.\n\n자라서는 <em>왕도</em>에게 배웠고 <em>온교(溫嶠)</em>·<em>유량(庾亮)</em>·<em>환이</em>와 가까이 했다. <em>현학</em>과 청담에도 일가를 이루었다 한다. 그러나 그가 황태자로서 마주한 가장 무거운 문제는 사상이 아니라 군사였다. 원제 말년에 <em>왕돈(王敦)</em>이 무창에서 거병해 도성을 위협했다. 왕돈은 <em>왕도</em>의 사촌 형으로, 동진 건국의 무장이었으나 점차 황실을 위협하는 한 권신이 되어 있었다. 원제가 이 압박 속에서 322년에 죽고, 사마소가 즉위했다.\n\n즉위 직후 <em>왕돈의 난</em>이 다시 격화되었다. 왕돈이 군을 일으켜 도성을 노렸다. 명제가 친히 군을 정돈하고 <em>온교</em>·<em>유량</em>·<em>소준(蘇峻)</em>·<em>도간(陶侃)</em> 등을 동원해 응전했다. 전하는 일화로, 명제가 변장하고 단신으로 왕돈의 진영을 정탐하러 갔다 한다. 황금 채찍을 들고 좋은 말을 타고 갔는데, 왕돈의 군사가 의심해 쫓아오자 채찍을 길가의 노파에게 맡기며 <em>뒤에 따라오는 자에게 보여 주라</em> 일렀다. 군사가 채찍을 보느라 시간을 끄는 사이 명제가 빠져나왔다는 이야기다. 사실 여부는 의심스러우나, 한 황제의 <em>과단(果斷)</em>을 시대가 어떻게 기억했는가가 그 안에 있다.\n\n324년 왕돈이 병들어 죽고 그의 잔당이 곧 무너졌다. 명제는 왕돈의 무리를 처단하되 <em>왕도</em>와 낭야 왕씨 본종은 보전했다. 한 가문을 멸하지 않고 한 인물만을 가른 이 정치적 절제가 동진을 한 번 더 살렸다. 또한 <em>유량</em>·<em>온교</em>·<em>치감(郗鑒)</em>을 적절히 배치해 외척과 종실, 북부의 군진과 남부의 사족 사이를 고르게 묶었다. <em>왕(王)과 마(馬)가 천하를 함께 다스린다</em>던 초기의 한 편향이 명제 대에 비로소 <em>여러 가문의 공치(共治)</em>로 옮아갔다.\n\n그러나 그 회복이 채 자리잡기 전에 명제는 병들었다. 325년 윤8월, 27세로 죽었다. 태자 <em>사마연(司馬衍)</em>이 다섯 살로 즉위하니 곧 <em>성제(成帝)</em>다. 황태후 <em>유씨</em>가 임조하고 그 오빠 <em>유량</em>이 정사를 잡았다. 명제가 한 번 묶어 놓은 균형이 외척 한 쪽으로 다시 기울었고, 그 기움이 곧 327년의 <em>소준의 난</em>을 불렀다.\n\n『세설신어』에서 사마소는 〈숙혜〉·〈언어〉·〈방정〉·〈호상〉편에 그 어린 날의 명민과 즉위 후의 과단이 함께 그려져 있다. 동진의 한 새벽이 그의 27년이며, 그가 일찍 진 뒤에야 진군 사씨가 황실의 한 자리를 채우러 들어오게 된다.", "storyCount": 0}, {"id": "person.SuJunZuYue", "type": "person", "han": "蘇峻·祖約", "ko": "", "sub": "소준·조약", "title": "", "short": "동진 초의 무장들. 소준은 역양태수, 조약은 예주자사. 유량의 강경한 견제에 반발해 327년 <em>소준의 난</em>을 일으켰다. 건강을 함락하고 황궁을 약탈했다. 328년 도간·온교의 토벌로 소준은 전사, 조약은 도주.", "long": "蘇峻은 자가 자고(子高)다. 장광(長廣) 액현(掖縣) 사람으로, 본디 북방 유민의 우두머리였다. <em>영가의 난</em> 뒤 산동 일대에서 수천 가(家)를 거느리고 <em>오두미</em>의 무리처럼 자위(自衛)하다가, <em>원제</em>가 강을 건너자 그 무리를 이끌고 남으로 귀부했다. 조정은 그를 회유해 회북(淮北)의 변경을 지키게 했다. <em>왕돈의 난</em> 때 그가 군을 이끌고 도성을 구원하니 그 공으로 <em>역양태수(歷陽太守)</em>가 되어 강북의 요충 역양에 진을 쳤다. 그의 휘하 <em>유민병(流民兵)</em>은 거칠고 사나워, 동진 초의 가장 강한 한 군단이었다.\n\n祖約은 자가 사소(士少)다. 범양(范陽) 조씨로, 곧 <em>조적(祖逖)</em>의 아우다. 형 조적이 <em>문계기무(聞鷄起舞)</em>의 뜻을 품고 북벌에 나서 한때 황하 남안을 회복했으나, 조정의 시기로 뜻을 펴지 못하고 죽었다. 조약이 그 군을 이어 <em>예주자사(豫州刺史)</em>가 되어 수춘(壽春)에 진을 쳤다. 그러나 그는 형의 그릇이 못 되었다. 휘하를 거느리는 데 인색했고, 조정에 대한 불만을 감추지 못했다.\n\n327년, <em>명제</em>가 죽고 어린 <em>성제</em>가 즉위하니 외숙 <em>유량(庾亮)</em>이 정사를 잡았다. 유량은 강북의 두 무장을 깊이 꺼렸다. 소준의 군은 사나워 통제가 어렵고, 조약은 형의 명성에 기대 거만하다 보았다. 유량이 소준을 도성으로 불러 <em>대사농(大司農)</em>에 임명해 병권을 빼앗으려 했다. <em>온교(溫嶠)</em>가 <em>소준을 자극하면 천하가 흔들린다</em> 만류했고, <em>변호(卞壺)</em>도 같은 뜻을 폈으나 유량은 듣지 않았다. 소준이 분노해 <em>내가 깊은 산이라도 들어가 살 곳을 얻을지언정 어찌 조정에 들어가 죽기를 기다리겠는가</em> 했다 한다.\n\n소준이 조약에게 사람을 보내 함께 일어나기를 청했다. 조약은 망설였으나 조정에 대한 묵은 원한이 깊어 응했다. 327년 11월, 두 사람의 군이 함께 일어났다. 명분은 <em>군측(君側)의 간신 유량을 친다</em>는 것이었다. 소준의 유민병은 강을 건너 단숨에 도성을 향해 진격했다.\n\n328년 봄, <em>건강(建康)</em>이 함락되었다. 변호가 두 아들과 함께 싸우다 죽고, 유량은 <em>심양(尋陽)</em>으로 달아났다. 소준의 군이 황궁에 들이닥쳐 약탈했다. 어린 성제를 <em>석두성(石頭城)</em>에 옮겨 가두고, 후궁의 비단과 보화를 모두 거두었다. 궁녀와 사대부의 부녀가 욕을 당했고, 사서(史書)는 <em>진의 사직이 끊어질 뻔했다</em>고 적었다. <em>왕도(王導)</em>가 성제 곁에서 몸으로 어가를 지키며 옥새를 잃지 않은 일이 〈방정〉편에 전한다.\n\n심양으로 달아난 유량이 <em>온교</em>와 함께 격문을 띄워 <em>도간(陶侃)</em>에게 맹주(盟主)가 되어 주기를 청했다. 도간은 처음 <em>나는 고명을 받은 신하가 아니다</em>며 망설였으나, 온교의 거듭된 간청에 마침내 군을 일으켰다. 형주(荊州)와 강주(江州)의 군이 강을 따라 내려와 석두성을 에워쌌다. 그해 9월, 소준이 진중에서 술에 취해 말을 달려 나갔다가 도간의 군에 둘러싸여 화살에 맞아 떨어졌다. 그 자리에서 베이니, 머리가 도성에 보내져 조리돌려졌다.\n\n조약은 소준이 죽자 무리가 흩어졌다. <em>수춘</em>을 버리고 북으로 달아나 <em>후조(後趙)</em>의 <em>석륵(石勒)</em>에게 항복했다. 석륵은 그를 받아들였으나 신뢰하지 않았다. 조적의 아우라는 이름이 오히려 화근이 되어, 얼마 뒤 석륵이 <em>조씨의 명망을 후환으로 남길 수 없다</em> 하며 조약과 그 종족 백여 명을 한꺼번에 베었다. 형 조적의 <em>중류격즙(中流擊楫)</em>의 맹세가 그 아우의 손에서 이렇게 끝났다.\n\n소준의 난은 <em>왕돈의 난</em>과 함께 동진 초의 두 큰 내란이다. 왕돈의 난이 <em>문벌의 군권</em>이 황실을 위협한 일이었다면, 소준의 난은 <em>변경의 유민병</em>이 도성을 짓밟은 일이었다. 이 두 난을 거치며 동진은 <em>형주(荊州)의 도간</em>과 <em>경구(京口)의 군부</em>에 변경의 군권을 맡기고, <em>건강</em>은 문벌의 청담에 맡기는 한 구조를 굳혔다. 『세설신어』는 이 난의 자리에서 <em>변호</em>의 절사(節死), <em>왕도</em>의 호가(護駕), <em>도간</em>의 결단, <em>온교</em>의 충간을 〈방정〉·〈덕행〉·〈언어〉편에 나누어 새겨 놓았다. 소준과 조약 두 이름은 그 어두운 배경으로만 거기에 남는다.", "storyCount": 0}, {"id": "person.TaoKan", "type": "person", "han": "陶侃", "ko": "", "sub": "도간 (259~334)", "title": "", "short": "동진 초의 명장. 한문(寒門) 출신으로 무력으로 일어났다. 형주자사로 <em>소준의 난</em>을 평정한 주역. 항상 자기 손에서 떠나지 않는 일을 강조해, <em>대우(大禹)도 분초를 아꼈는데 우리 같은 사람이 어찌 한가하랴</em>라 했다 한다.", "long": "陶侃은 자가 사행(士行)이다. 본관은 파양(鄱陽)이며, 뒤에 심양(尋陽)으로 옮겨 살았다. 동진 초의 명장이다. 그의 출신은 <em>왕도</em>나 <em>유량</em>과 같은 사족(士族)의 줄에 있지 않다. <em>한문(寒門)</em>에서 일어나 무력 하나로 형주자사·태위에 이른 인물이며, 그래서 그의 자리는 동진 정치 지형 안에서 특이하다.\n\n어린 시절 가난했다. 아버지를 일찍 여의고 어머니 <em>담씨(湛氏)</em>의 손에 자랐다. 담씨가 머리카락을 잘라 손님 상을 차려 아들의 벗을 대접했다는 일화가 전한다. 한문의 어머니가 아들을 사대부의 자리에 들이려 한 정성이 그 한 자락에 응축되어 있다. 도간이 처음 출사한 자리는 현의 한 작은 관직에 지나지 않았다. <em>장화(張華)</em>가 그를 한 번 보고 <em>이 사람이 큰 그릇이 되겠다</em> 했다 한다. 사족이 아닌 한문이 이름을 얻는 데에는 이렇게 알아주는 한 사람이 필요했다.\n\n동진이 강남에 자리잡는 길은 평탄하지 않았다. <em>왕돈의 난</em>과 뒤이은 <em>소준(蘇峻)의 난</em>이 도성을 흔들었다. 327년 소준이 도성으로 쳐들어와 <em>유량</em>이 도망치고 어린 성제(成帝)가 적의 손에 들어갔을 때, 형주에서 군대를 일으킨 사람이 도간이다. 처음에는 출병을 망설였으나 <em>온교(溫嶠)</em>가 거듭 청하자 마침내 맹주의 자리에 섰다. 329년 소준의 난이 평정되었다. 도간이 그 평정의 주역이다. 이 공으로 시중·태위에 올랐고, 형주·강주 등 팔주의 군사를 도독하는 자리에 앉았다. 동진 초 무력의 가장 큰 자리가 그의 손에 있었다.\n\n그러나 그는 <em>왕돈</em>처럼 그 무력을 도성으로 돌리지 않았다. 형주에 머무르며 자기 자리를 지켰다. 한문 출신이 사족의 도성 정치에 직접 뛰어들 수 없다는 자기 한정을 그는 알고 있었다 한다. <em>왕도</em>와의 사이에 긴장이 없지 않았으나 끝내 화를 일으키지 않았다. 이 자기 절제가 도간의 한 풍격이다.\n\n그의 풍격은 <em>근면(勤)</em> 한 글자에 모인다. 형주에 있을 때 매일 아침 백 개의 벽돌을 집 밖으로 옮겼다가 저녁이면 다시 집 안으로 들였다. 사람들이 까닭을 묻자 <em>중원을 회복할 날을 대비해 몸을 게으르게 두지 않으려는 것</em> 답했다 한다. 또 <em>대우(大禹)는 성인이면서도 한 치의 그늘(寸陰)을 아꼈다. 우리 같은 사람이야 분초(分陰)를 아껴 마땅하지 않으랴(大禹聖者, 乃惜寸陰, 至於衆人, 當惜分陰)</em> 했다. <em>촌음(寸陰)</em>과 <em>분음(分陰)</em>의 이 한 짝이 그의 평생 좌우명이다.\n\n배 만드는 자리에서 나온 톱밥과 대나무 뿌리까지 그는 버리지 않고 모아 두게 했다. 뒷날 <em>환온(桓溫)</em>이 촉(蜀)을 칠 때 그 톱밥을 진창에 깔고 그 대나무 뿌리로 못을 만들어 썼다는 일화가 〈정사〉편에 전한다. <em>분음을 아낀다</em>는 말이 단지 시간만의 일이 아니라 한 톱밥에까지 미쳤다.\n\n이 풍격은 <em>청담</em>에 길든 도성의 사족과 정반대 자리에 선다. <em>왕연</em>이 옥주미를 들고 명리를 가르는 동안 변경이 무너졌다는 비판이 <em>영가의 난</em> 직후 동진 사대부 안에 퍼져 있었다. 도간의 <em>근면</em>은 그 비판의 한 실천적 응답이다. 그는 청담을 <em>부화(浮華)한 일</em>이라 일컬어, 자기 막부에서 한가한 담론을 하는 자를 보면 옥주미를 빼앗아 강에 던졌다 한다. 동진의 한 자리에 <em>사안</em>과 <em>왕희지</em>의 결이 있다면, 다른 한 자리에 도간의 결이 있다. 두 결이 함께 동진을 받쳤다.\n\n334년 6월, 형주에서 죽었다. 향년 76세였다. 대사마(大司馬)에 추증되고 시호를 <em>환(桓)</em>이라 했다. 그의 증손이 곧 <em>도연명(陶淵明)</em>이다. 한문에서 일어난 한 무장의 핏줄이 동진 말에 와 <em>전원(田園)</em>의 한 시인으로 다시 피어난 셈이다.\n\n『세설신어』에서 도간은 많지 않은 일화로 등장한다. 〈정사〉·〈현원〉·〈규잠〉편에 그의 <em>분음을 아낀다</em>와 톱밥의 일화가 실려 있다. 동진의 한낮이 <em>사안</em>의 청담으로 빛났다면, 동진의 새벽은 도간의 <em>근면</em>으로 밝아 왔다.", "storyCount": 0}, {"id": "person.WenJiao", "type": "person", "han": "溫嶠", "ko": "", "sub": "온교 (288~329)", "title": "", "short": "동진 초의 명신. 강주자사로 소준의 난 평정에 큰 공. 〈방정〉편에 그의 의기로운 일화들이 전한다. 41세로 일찍 죽었다.", "long": "溫嶠는 자가 태진(太眞)이다. 태원(太原) 기현(祁縣)의 온씨 출신으로, 북방에서 <em>영가의 난</em>을 거친 뒤 강남으로 건너온 의관남도(衣冠南渡) 세대의 한 사람이다. 한미하지 않은 가문이었으나, 그가 동진 초의 한 기둥으로 선 것은 가문의 음덕이라기보다 그 자신의 <em>의기</em>와 <em>식견</em>에 까닭이 있었다.\n\n젊어서 <em>유곤(劉琨)</em>의 막부에서 일했다. 유곤은 북방에 마지막까지 남아 진(晉)의 깃발을 든 사람으로, 그의 막부는 곧 <em>중원 최후의 진영</em>이었다. 온교는 유곤의 신임 깊은 참좌로 북방의 풍상을 몸으로 겪었다. 유곤이 <em>단필제(段匹磾)</em>에게 살해되기에 앞서, 온교를 강남의 <em>사마예(司馬睿)</em>에게 보내 즉위를 권하게 했다. 표문을 받들고 강을 건너 건강(建康)에 이른 온교의 거동이 <em>왕도</em>·<em>주의</em>의 무리를 감복시켰다 한다. 북에서 온 사람의 핏기와 남에서 자란 사람의 맑음이 한 몸에 있었다.\n\n동진이 서자 온교는 <em>명제(明帝, 司馬紹)</em>의 곁에 섰다. 명제가 태자로 있을 때부터 그를 곁에 두고 <em>사부의 예</em>로 대했다. <em>왕돈(王敦)의 난</em>이 일어나자 온교는 명제의 한 팔이 되어 토벌을 도왔다. 왕돈이 그를 자기 막부에 끌어들여 회유하려 했을 때, 온교는 짐짓 따르는 척하다가 결정적인 자리에서 <em>옥주미</em>로 술상을 내리쳐 왕돈의 의심을 사고 빠져 나왔다는 일화가 〈가휼〉편에 전한다. 의기 있는 자의 임기응변이다.\n\n명제가 일찍 죽고 성제(成帝)가 어린 나이에 서자, 외척 <em>유량(庾亮)</em>이 정사를 잡았다. 유량의 강경한 외정(外政)이 <em>소준(蘇峻)</em>의 반발을 불렀고, 327년 소준이 군사를 일으켜 도성을 함락했다. 어린 황제가 적의 손에 들어가고 <em>왕도</em>가 가까스로 그 곁을 지키는 위급한 자리. 이때 강주자사(江州刺史)로 무창(武昌)에 있던 온교가 일어섰다.\n\n온교는 곧장 <em>도간(陶侃)</em>에게 사람을 보냈다. 도간은 형주(荊州)의 노장으로 군세가 가장 컸으나, 일찍이 <em>유량</em>에게 배척당한 일이 있어 도성을 위해 군을 일으키기를 주저했다. 온교가 친히 도간을 찾아 <em>천자가 욕을 당하시는데 신하가 어찌 사사로운 원망을 따지랴</em> 하고 눈물로 설득했다 한다. 도간이 마침내 군을 일으켜 온교의 강주군과 합치니, 이 <em>서부 연합군</em>이 곧 소준 토벌의 주력이 되었다. 328년 가을 도성을 회복하고 소준을 베었다. 동진 초기 최대의 내란을 평정한 자리에 온교의 한 결단이 있었다.\n\n난을 평정한 뒤 온교는 무창으로 돌아가는 길에 <em>우저(牛渚)</em>의 깊은 물을 지났다. 옛부터 물 속에 괴이가 산다 일컬어진 곳으로, 온교가 <em>서각(犀角)</em>에 불을 붙여 물 속을 비추어 보았다는 <em>온교연서(溫嶠燃犀)</em>의 일화가 〈술해〉편에 전한다. 비추자 기이한 물고기와 용 같은 것들이 어른거리며 노했고, 그날 밤 온교가 꿈에서 <em>어찌 유명(幽明)의 경계를 엿보았느냐</em> 꾸짖음을 들었다 한다. 얼마 뒤 이가 부러지는 병을 얻어 무창에 이르러 곧 죽었다. 329년, 향년 41세였다.\n\n『세설신어』에서 그는 〈방정〉·〈가휼〉·〈술해〉·〈언어〉·〈식감〉편에 거듭 등장한다. 북에서 의기를 가지고 내려와, 명제를 세우고 소준을 깨뜨리고, 마흔 한 살에 떠난 한 사람의 짧고 또렷한 자리. 동진 초의 <em>왕도</em>·<em>유량</em>·<em>도간</em> 사이에서 그의 이름이 빠지면 그 시대의 한 축이 무너진다.", "storyCount": 0}, {"id": "person.HuanYiFather", "type": "person", "han": "桓彝", "ko": "", "sub": "환이[彝] (?~328)", "title": "", "short": "환온의 부친. 자는 茂倫. 동진 명사로 〈품조〉·〈상예〉의 평에 자주 등장. <em>소준의 난</em> 때 선성(宣城)에서 끝까지 항거하다 절사(節死)했다. 그 충절로 환씨 가문이 동진 정권의 인정을 받았다.", "long": "환이(桓彝)는 자가 무륜(茂倫)이다. 초국(譙國) 용항(龍亢)의 환씨 출신으로, 한위(漢魏) 이래 그 가문이 사대부 사이에 큰 이름을 얻지는 못했다. 환씨가 동진 일류의 문벌로 올라서는 한 매듭이 환이의 죽음에 있다.\n\n젊은 시절 그는 <em>강좌팔달(江左八達)</em>의 한 사람으로 일컬어졌다. 의관남도 직후 강남의 사대부 사이에 <em>방달(放達)</em>의 풍이 일었을 때, 환이는 <em>왕도</em>·<em>유량</em>과 어울리며 그 자리에 든 한 명사였다. 다만 그 방달이 한낱 술과 광태에 그치지 않고, 시대를 보는 안목과 사람을 가리는 식견을 갖춘 점에서 환이의 자리는 달랐다. <em>온교(溫嶠)</em>가 강을 건너와 환이를 만나 본 뒤 <em>강좌에 이런 사람이 있으니, 다시 무엇을 근심하랴</em> 탄식했다 한다. 〈품조〉편에 그의 풍격을 들어 평한 자리가 여럿 전한다.\n\n그의 식감(識鑑)은 특히 <em>유량</em>과 <em>온교</em>를 알아본 데서 빛났다. 사람을 한 번 보고 그 그릇의 무게를 가늠하는 안목이 있어, 동진 초의 인물품평의 한 중심에 그가 있었다. 〈상예〉편의 한 자리는 그가 <em>유량</em>을 두고 <em>이 사람이 곧 정사의 그릇</em>이라 평한 일화다. 환이 자신은 큰 벼슬보다 <em>선성내사(宣城內史)</em>의 외임을 받아 강남의
