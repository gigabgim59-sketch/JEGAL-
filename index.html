const PREFACE_CHAPTERS=[{"id": "prc1", "title": "1. 序 ― 天下의 名士가 한 권에", "html": "<p>『세설신어(世說新語)』를 처음 펼치는 이는 곧 길을 잃는다. 한 페이지에 사람이 셋 등장하는데, 누가 누구의 형이고 누가 어떤 황제의 신하인지 알 수가 없다. 사건은 한 줄로 끝나는데, 그 한 줄이 어느 시대 어느 정변(政變)의 뒤끝인지 짚이지 않는다. 청담(淸談)·풍류(風流)·기지(機智)라는 말은 떠다니는데, 무엇을 청담이라 하는지 어떤 자리에서 그 풍류가 펼쳐졌는지는 잡히지 않는다.</p><p>까닭이 있다. 이 책은 위진(魏晉)을 산 사람들이 위진의 명사(名士)에 관하여, 그 시대의 사람들끼리 통하는 약호(略號)로 적어 둔 메모이기 때문이다. 그들에게 자명한 것이 우리에게는 컴컴하다. <em>사안(謝安)</em>이 누구인지, <em>비수대전(淝水大戰)</em>이 무엇인지, <em>환온(桓溫)</em>이 왜 황제를 폐립할 수 있었는지 ― 이런 것들이 모두 대전제로 깔린 책이다.</p><p>그러므로 일화를 펴기 전에 무대를 먼저 보아야 한다. 무대 위에 어떤 시대가 흘렀고, 어떤 가문이 그 시대의 권력을 나누어 가졌으며, 어떤 사상이 그들을 지배했고, 어떤 사건들이 그들의 운명을 갈랐는지. 이 글은 그것을 한 줄기로 들려주려 한다. 큰 그림을 먼저 펼친 뒤 시간을 따라 굽이굽이 들어가고, 끝에서 다시 묶어 三十六篇으로 돌아온다. 길게 한 번에 읽을 수도 있고, 章을 짚어 가며 필요한 곳만 들출 수도 있다. 본문 뒤의 부록(附錄) 카드는 가장 자주 호명되는 시대·무대·가문·사상·사건의 빠른 참조표다.</p>"}, {"id": "prc2", "title": "2. 한눈에 보는 二百年", "html": "<p>큰 그림이다. 『세설신어』가 담은 시대는 후한(後漢) 말부터 동진(東晉) 말까지, 거칠게 잡아 서기 184년부터 420년까지 약 240년이다. 이 길고 어지러운 시간은 다음과 같이 굴절한다.</p><p>184년 황건(黃巾)의 난과 환관·외척의 전횡으로 후한이 사실상 무너지자, 청류(淸流) 사대부들이 등장하면서 <em>명사(名士)</em>라는 새 인간형이 태어난다. 220년 조비(曹丕)가 한(漢)을 받아 위(魏)를 세우고, 곧 천하는 위·촉(蜀)·오(吳)로 갈라진다. 위에서는 240년대에 노장(老莊)과 주역(周易)을 새로 읽는 <em>현학(玄學)</em>이 솟아 청담의 비조가 되고, 그것을 일으킨 <em>하안(何晏)</em>과 어린 천재 <em>왕필(王弼)</em>이 정시(正始, 240~249) 명사들을 이끈다.</p><p>그러나 249년 사마의(司馬懿)의 정변(高平陵之變)으로 하안이 죽고, 살아남은 명사들이 산양(山陽)의 죽림으로 모여든다. <em>죽림칠현(竹林七賢)</em>의 시대다. 그 사이 사마씨가 위의 실권을 쥐고, 263년 촉을 멸하고, 265년 사마염(司馬炎)이 위에서 진(晉, 西晉)을 세우며, 280년 오를 마저 삼켜 천하를 통일한다.</p><p>그러나 서진의 평화는 길지 않았다. 291년 가황후(賈皇后)의 농단에서 시작된 <em>팔왕의 난(八王之亂)</em>으로 사마씨가 자기들끼리 싸우다 황실이 텅 비고, 311년 흉노 유총(劉聰)이 낙양을 함락하니 <em>영가의 난(永嘉之亂)</em>이다. 서진은 끝나고, 살아남은 사마예(司馬睿)가 강을 건너 건강(建康)에 자리 잡아 317년 동진(東晉)을 연다. 북방의 사대부도 함께 남도(南渡)하니, 이를 <em>의관남도(衣冠南渡)</em>라 한다. 한편 북방에는 흉노·갈·선비·저·강 등 다섯 종족이 차례로 십육국(五胡十六國)을 세우며 거듭 분열한다.</p><p>동진의 100년은 그러나 다시 한 번 명사 문화의 절정이다. <em>왕도(王導)</em>가 정략을 다잡아 강좌(江左) 정권을 안정시키고, 그 위에서 청담·서법·산수가 꽃핀다. 322년 왕돈의 난, 327년 소준의 난이 정권을 흔들지만, 환온이 일어나 세 차례 북벌하고, 그 호적수 <em>은호(殷浩)</em>는 청담의 영수로 맞선다. 그 다음 세대에 사안이 동산(東山)에서 나와 재상에 오르고, 383년 <em>비수대전</em>에서 부견(苻堅)의 백만 대군을 격파해 동진의 한낮을 만든다.</p><p>사안이 죽은 뒤(385) 정권은 갈래 친다. 외척과 종실, 형주(荊州)의 환씨가 다투다 403년 환현(桓玄)이 황위를 찬탈하니, 곧 유유(劉裕)가 토벌하고 420년 동진을 닫고 송(宋, 劉宋)을 세운다. 본서의 편자(編者) <em>유의경(劉義慶)</em>이 살았던 시대가 바로 이 송이다. 그는 한 세대 앞을 돌아보며 이 책을 묶었다.</p><p>이 240년의 굴곡 위에서 등장하는 인물·가문·사상이 모두 『세설신어』의 한 줄 한 줄에 깔려 있다. 이제 시간을 따라 천천히 들어간다.</p>"}, {"id": "prc3", "title": "3. 後漢이 무너지며 名士가 태어나다", "html": "<p>이야기의 시작은 후한 말의 정치적 파탄이다. 후한 후기는 외척과 환관이 번갈아 권력을 잡고 황제는 어려서 즉위해 일찍 죽으니, 정사가 안정되지 않았다. 이에 분노한 청류 사대부들이 환관의 전횡을 비판하다 도리어 <em>당고(黨錮)의 화(禍)</em>를 입는다. 166년과 169년에 걸쳐 환관들이 청류를 <em>당인(黨人)</em>으로 몰아 종신 금고하니, 수백 명의 학자·관료가 한꺼번에 정치 밖으로 밀려났다.</p><p>그런데 바로 이 시점부터, 정사 밖으로 밀려난 사대부들이 서로를 <em>품평(品評)</em>하는 풍속이 생겨난다. <em>곽임종(郭林宗, 곽태)</em>이 인물 보는 안목으로 일컬어졌고, <em>허소(許劭)</em>는 매월 초하루마다 인물평을 발표해 그 한마디가 사람의 흥망을 가른다 했다(月旦評). <em>진중거(陳仲擧, 陳蕃)</em>·<em>이원례(李元禮, 李膺)</em>·<em>황숙도(黃叔度)</em> 같은 이름이 이때 빛난다. 이들이 곧 명사의 비조다. 그들의 덕행과 말 한마디가 천하의 본보기가 된다는 인식 ― 이것이 『세설신어』 첫 두 편 〈덕행(德行)〉과 〈언어(言語)〉의 출발점이다. 〈품조(品藻)〉편 또한 이 인물 품평의 풍속이 굳어진 흐름의 연장이다.</p><p>흔히 인용되는 일화 한 편이 이 시기의 분위기를 잘 보여 준다. 진중거가 예장태수로 부임하자마자 서유자(徐孺子)가 있는 곳을 물었다. 주부(主簿)가 <em>여러 사람의 뜻은 부군께서 먼저 관사에 드시기를 바랍니다</em> 하니, 진중거는 <em>무왕(武王)은 상용(商容)의 마을에서 자리가 따뜻해질 겨를도 없이 예를 표하였소. 내가 어진 이에게 예를 다하는 것이 무슨 안 될 일이 있겠소</em> 했다. 정치 위에 어진 이의 자리를 두는 사대부의 자세 ― 이것이 곧 후한 명사의 정신이다.</p><p>184년 황건의 난이 일어나 한 황실은 사실상 무너지고, 군웅(群雄)이 천하를 갈라 차지했다. 그 가운데 <em>조조(曹操)</em>가 두각을 나타냈다. 조조는 한 헌제(獻帝)를 끼고 천하를 호령하면서, 동시에 명사 문화를 적극적으로 자기 정권 안에 흡수했다. 공융(孔融)·예형(禰衡)·왕찬(王粲) 같은 <em>건안칠자(建安七子)</em>가 그의 막부에 모였다. 명사 한 사람을 어떻게 대접하는가가 곧 권력의 정통성을 보이는 일이 되어 갔다. 〈가휼(假譎)〉편이 그리는 조조의 다면적 모습 ― 흉노 사신을 접견할 때 자신은 도부수(刀斧手)로 서고 대신 최염(崔琰)을 세워 사신의 평가를 받아 보았던 일, 양수(楊脩)와의 <em>계륵(鷄肋)</em> 일화 ― 모두 이 시기에 만들어진다.</p><p>이 무렵 또 한 명의 인물이 조용히 자라났다. 하내(河內) 사마씨의 <em>사마의(司馬懿)</em>이다. 그는 조조 막부의 한 모사(謀士)로 출사해, 위 문제(文帝, 曹丕)·명제(明帝, 曹叡)·소제(少帝, 曹芳)의 세 황제를 보좌하며 권력의 한가운데로 다가갔다. 이때까지는 그리 두드러지지 않는다. 그러나 위 후기에 그가 일으킬 쿠데타가 명사 문화의 운명을 바꾼다. 우선 그 이야기 전에, 위 정시(正始) 연간의 새 사상부터 보아야 한다.</p>"}, {"id": "prc4", "title": "4. 三國의 정립과 司馬씨의 부상", "html": "<p>220년 조비가 한을 받아 위를 세우자, 곧 손권(孫權)이 강동에서 오를 세우고 유비(劉備)가 촉을 세워 천하는 셋으로 갈렸다. <em>삼국정립(三國鼎立)</em>의 60여 년이다. 『세설신어』가 본격적으로 다루는 무대는 위와 그 뒤를 이은 진(西晉)·동진이지만, 위·오·촉의 인물들도 이따금 일화에 등장한다.</p><p>위 황실의 명운은 짧았다. 조비(220~226)와 조예(226~239)가 잇따라 일찍 죽고, 어린 <em>조방(齊王芳)</em>이 즉위하면서 정치는 보정(輔政) 대신의 손에 들어갔다. 보정 대신 가운데 한 명이 <em>사마의</em>이고, 또 한 명이 <em>조상(曹爽)</em>이었다. 조상은 위 황실의 종친 출신으로 정권을 주도하면서 신진 명사들을 등용했는데, 그 가운데 두드러진 이가 <em>하안</em>·<em>하후현(夏侯玄)</em>·<em>이풍(李豐)</em>이다. 모두 명사 문화의 한 갈래를 이끈 사람들이다. 하안은 본래 조조의 양자였으니, 조씨와 가까웠다. 그 때문에 그의 청담은 곧 위 황실의 청담이기도 했다.</p><p>이 무렵 명사 가운데서는 새로운 사상이 솟아나고 있었다. <em>현학(玄學)</em>이다. 그것을 본격적으로 들여다보아야 한다.</p>"}, {"id": "prc5", "title": "5. 玄學의 발생 ― 何晏·王弼의 길", "html": "<p>한대(漢代)는 경학(經學)의 시대였다. 사대부들이 평생을 들여 한 경전의 자구(字句)를 해석하고, 그 해석이 곧 학파를 이루었다. 그러나 후한 말에 이르러 경학은 자구에만 매달려 답답해진다. 시대가 변하고 정치가 어지러워지자, 사람들은 <em>경(經)이 답을 주지 않는다</em>는 의심을 품기 시작한다.</p><p>이 답답함을 뚫고 나온 것이 노자(老子)와 장자(莊子), 그리고 주역(周易)을 새로 읽으려는 흐름이다. 노장과 주역을 일러 <em>삼현(三玄)</em>이라 하니, 이 셋을 중심으로 한 새 학풍이 곧 <em>현학</em>이다. 사물의 자구가 아니라 사물의 <em>근본(本)</em>과 <em>그 너머(玄)</em>를 묻는다. 무위(無爲)·자연(自然)·도(道)·이름이 없는 자리(無名) 같은 개념을 도구로 삼아, 우주와 인간을 다시 설명한다.</p><p>이 새 학풍은 240년대 위의 수도 낙양에서 정시 연간을 거치며 정점에 이른다. <em>정시 명사</em>라 부른다. 그 가운데 두 사람의 이름이 빛난다.</p><p>첫째는 <em>하안</em>이다. 조조의 양자로 자라난 그는 미모로 일찍부터 유명했고, 한여름에도 곱고 흰 얼굴을 유지하니 사람들이 <em>분을 발랐는가</em> 의심했다 한다. 그는 『논어집해(論語集解)』를 편찬해 노장의 시각으로 공자를 다시 읽었고, 옥주미(玉麈尾)를 들고 명리(名理)를 논할 때 듣는 이가 황홀했다. 청담의 비조이자 정시 명사의 영수이다.</p><p>둘째는 <em>왕필(王弼)</em>이다. 하안보다 한참 어렸으나 천재였다. 열대여섯 살에 노자와 주역의 주(注)를 지어 후대 천 년의 표준이 되었으니, 그가 쓴 노자 주는 지금까지도 가장 권위 있는 주의 하나로 읽힌다. 그러나 그는 23살에 요절했다. <em>내가 죽으면 또 누가 노자를 알아 주랴</em>는 탄식이 따라왔다.</p><p>이 두 사람을 중심으로, 정시 연간의 낙양에는 청담의 자리가 무수히 펼쳐졌다. 단순히 한가한 토론이 아니라 <em>명리</em>를 가르는 일종의 지적 경기였다. 옥주미를 든 사람이 한 명제(命題)를 세우면 그 명제가 무너지는 자리까지 따져 묻고, 또 다른 명제로 응답하고, 그렇게 <em>주(主)</em>와 <em>객(客)</em>이 갈마들며 토론한다. 이긴 사람은 영예를, 진 사람은 옷을 벗어 옥주미를 넘긴다. 이것이 청담이다.</p><p>그러나 정시 명사들의 영광은 길지 않았다. 249년의 한 정변이 그 모두를 휩쓸어 버린다.</p>"}, {"id": "prc6", "title": "6. 高平陵의 政變, 그리고 竹林의 七賢", "html": "<p>249년 정월, 위의 황제 조방이 종묘에 제사 지내러 낙양을 떠나 고평릉(高平陵)으로 행차한 사이, 한 노인이 낙양 안에서 거사를 일으켰다. 그동안 병들어 있다 칭한 <em>사마의</em>였다. 그는 단숨에 도성을 장악하고 황제의 보정 대신 <em>조상</em>을 잡아 일족과 그 측근을 모두 죽였다. <em>하안</em>·<em>하후현</em>·<em>이풍</em>·<em>등양(鄧颺)</em>·<em>정밀(丁謐)</em> 등 정시 연간의 명사들이 한꺼번에 사라졌다. 이를 <em>고평릉의 정변(高平陵之變)</em>이라 한다.</p><p>이 정변은 단순한 정치 사건이 아니다. 그것은 한 시대의 사상 흐름까지 잘라 버렸다. 정시 명사의 정신적 영수들이 모두 죽었으니, 청담은 갑자기 <em>위험한 것</em>이 되었다. 너무 두드러지면 죽었다. 살아남은 명사들은 두 길로 갈렸다. 한 길은 사마씨에게 고개를 숙이고 출사하는 길이고, 또 한 길은 정치에서 멀리 벗어나 은거하는 길이다.</p><p>뒤의 길을 택한 이들이 곧 <em>죽림칠현</em>이다. 산양(山陽, 지금의 河南省 焦作市 부근)의 죽림에 모여, 술을 마시고 거문고를 타며 노장을 논했다. 일곱 사람은 <em>혜강(嵇康)</em>·<em>완적(阮籍)</em>·<em>산도(山濤)</em>·<em>왕융(王戎)</em>·<em>유령(劉伶)</em>·<em>향수(向秀)</em>·<em>완함(阮咸)</em>이다.</p><p>이 가운데 <em>혜강</em>이 영수다. 위 황실의 부마로서 중산대부(中散大夫)를 지내 <em>혜중산</em>이라 일컬어지나, 사마씨에게는 끝내 출사하지 않았다. 「양생론(養生論)」을 짓고 「산거원(山巨源)에게 보내는 절교서(與山巨源絕交書)」를 써, <em>명교(名敎, 유가적 예법)</em>를 비판하고 <em>자연(自然)</em>에 의탁할 것을 천명했다. 풍채가 우뚝하여 <em>외로운 소나무가 홀로 선 듯하다(孤松之獨立)</em>는 평을 받았다.</p><p><em>완적</em>은 또 다른 영수다. 청안(靑眼)과 백안(白眼)으로 사람을 가려, 마음에 맞으면 푸른 눈동자로 보고 그렇지 않으면 흰자위로 흘겨 봤다. 어머니의 상중에도 술을 마시고 슬픔에 피를 토했으니, 예법을 비웃는 동시에 <em>정의 본질</em>에 도달했다. 보병교위(步兵校尉)를 지내 <em>완보병</em>이라 불린다. 「영회시(詠懷詩)」 82수를 남겨, 시(詩)로 시대의 어두움을 우회했다.</p><p><em>산도</em>와 <em>왕융</em>은 후에 결국 출사하여 사마씨에게 봉사한다. 산도는 사도(司徒)에 올라 인재 천거를 공정하게 하여 <em>산공계사(山公啓事)</em>로 일컬어졌고, 왕융 또한 사도가 된다. 그러나 그가 혜강의 아들 <em>혜소(嵇紹)</em>를 거두어 키우고 출사시킨 일은, 칠현이 단순히 정치적 입장만으로 갈라진 것이 아니라 <em>우정과 인간</em>의 차원에서 서로 이해했음을 보여 준다. <em>유령</em>은 술의 사람으로, 「주덕송(酒德頌)」을 짓고 <em>내가 죽거든 그 자리에 묻으라</em>며 종에게 삽을 메고 따라다니게 했다. 알몸으로 집에 누워 있다가 객이 꾸짖자 <em>천지가 내 옷이요 집이 내 속옷이니, 그대들은 어찌 내 속옷 안에 들어왔는가</em> 답했다. <em>완함</em>은 완적의 조카로 음률에 정통해, 비파의 일종인 <em>완함</em>이 그의 이름에서 유래한다. <em>향수</em>는 혜강의 절친으로, 『장자』 주에 정심했다.</p><p>칠현이 모인 시기는 길지 않다. 263년 <em>사마소(司馬昭)</em> 시기에 <em>종회(鍾會)</em>가 혜강을 참소해 죽인다. 종회는 일찍이 혜강을 흠모해 그를 찾아갔으나 혜강이 무시한 일에 원한을 품었다 한다. 같은 해 촉이 멸망했다. 혜강은 형장에서 광릉산(廣陵散)을 한 곡 타고는 <em>광릉산이 오늘로 끊어지는구나</em> 하고 죽었다. 죽림의 시대도 그와 함께 끝났다.</p><p>그러나 죽림이 남긴 것은 컸다. <em>명교냐 자연이냐</em> ― 이 물음이 위진 사상의 한가운데에 자리 잡았다. 출사할 것인가 은거할 것인가, 예법을 지킬 것인가 정에 따를 것인가, 사회의 이름(名)에 머물 것인가 사물의 본질(實)에 갈 것인가. 이 물음들이 그 뒤 100년 동안 명사들의 머리를 떠나지 않았다. 이것이 〈임탄(任誕)〉편이 흥겹게 그리는 그 분방한 행실의 정신적 뿌리이다.</p>"}, {"id": "prc7", "title": "7. 西晉의 統一과 사치와 八王의 亂", "html": "<p>265년 <em>사마염</em>이 위의 마지막 황제 조환(曹奐)에게 양위(讓位)를 받아 진(晉, 西晉)을 세웠다. 그가 곧 진 무제(武帝)다. 280년에는 강남의 오까지 멸하여 천하를 통일했다. 후한 말의 분열로부터 거의 한 세기 만의 통일이었다.</p><p>하지만 통일의 평화는 풍속의 타락으로 곧장 이어졌다. 황실의 외척과 사마씨 종친, 그리고 새 통일에 편승해 부를 얻은 신진 호족들이 함께 사치를 다투었다. 가장 유명한 일화가 <em>왕개(王愷)와 석숭(石崇)의 부 자랑</em>이다. 무제의 외삼촌 왕개가 두 자(尺) 남짓한 산호수를 자랑하니, 형주에서 약탈로 재산을 모은 <em>석숭</em>이 철여의(鐵如意)로 그것을 부수고 그보다 더 크고 화려한 산호수를 여럿 내보였다. 이 한 장면이 서진 풍속의 정수다. 〈태치(汰侈)〉편은 이런 일화로 가득하다.</p><p>청담은 어떠했던가. 위가 망하면서 위험한 색채는 옅어졌다. 정시·죽림의 무거움이 빠지고, 청담은 <em>명사라면 응당 해야 하는 사교 의례</em>에 가까워졌다. 옥주미를 들고 명리를 논하는 자리가 무수히 펼쳐지지만, 그 토론이 정사를 책임지지는 않았다. 대표적 인물이 <em>왕연(王衍, 字 이보)</em>이다. 그는 미모와 청담의 으뜸으로 태위(太尉)에 올랐는데, 평생 <em>돈(錢)</em>이라는 글자를 입에 올리지 않을 만큼 청고함을 자처했다. 그러나 동시에 정치의 책임을 지지 않았다. 몰살의 위험을 피하려 자기 동생 <em>왕징(王澄)</em>을 형주에, 사촌 <em>왕돈(王敦)</em>을 청주에 보내 두세 굴(窟)을 마련해 두었다고도 한다.</p><p>이 가벼움의 정치적 결과가 곧 <em>팔왕의 난</em>이다. 무제의 황후 양씨가 일찍 죽고, 무제가 어리석은 둘째 아들 <em>사마충(司馬衷, 후의 惠帝)</em>을 세운 데서 일이 어그러졌다. 혜제는 정사를 보지 못했고, 황후 <em>가씨(賈氏)</em>가 농단하다 종친들과 충돌했다. 291년 가후가 시아버지의 사촌형 사마량(司馬亮)을 죽이는 일에서 시작된 이 사마씨 종친들의 내전은 16년 동안 이어지며, 여덟 명의 왕(汝南王 亮·楚王 瑋·趙王 倫·齊王 冏·長沙王 乂·成都王 穎·河間王 顒·東海王 越)이 차례로 일어났다가 차례로 죽었다. 종묘는 비고 군대는 흩어졌으며, 변방의 이민족이 차츰차츰 들어왔다.</p><p>이 폐허 위에 곧 진정한 재앙이 닥쳐온다. <em>영가의 난</em>이다.</p>"}, {"id": "prc8", "title": "8. 永嘉의 흙비, 衣冠의 南渡", "html": "<p>팔왕의 난이 막바지에 이르렀을 무렵, 흉노 출신의 유연(劉淵)이 한(漢, 후일 前趙)을 세워 북방에서 일어났다. 그의 아들 <em>유총(劉聰)</em>이 311년(永嘉 5년) 낙양을 함락하고 회제(懷帝)를 잡아갔다. 이를 <em>영가의 난(永嘉之亂)</em>이라 한다. 낙양은 불타고 종묘는 무너지고, 사대부들은 흙비처럼 잡혀가거나 흩어졌다.</p><p>이때 잡혀간 사람 가운데 한 명이 <em>왕연</em>이다. 갈족(羯族) 출신의 무장 <em>석륵(石勒)</em>이 그를 데리고 망명한 자리에서 책망하니, 왕연은 <em>내가 비록 헛된 말로 천하를 그르쳤으나, 어찌 이런 일에 이를 줄 알았겠는가</em> 탄식하며 죽었다. 청담만으로는 천하를 다스릴 수 없다는 자기 부정의 한 마디였다.</p><p>서진은 형식상 회제의 조카 민제(愍帝)가 장안에서 잠시 이었으나, 316년 그마저 한에 잡혀가니 서진은 끝났다. 살아남은 사마씨 종친 가운데 서남쪽 강동(江東)에 자리 잡고 있던 <em>사마예(司馬睿, 후일 元帝)</em>가 318년 건강(建康, 지금의 南京)에서 즉위해 <em>동진(東晉)</em>을 열었다.</p><p>이 과정에서 한 거대한 인구 이동이 일어났다. 북방의 사대부들이 가솔과 노복(奴僕)을 거느리고 강을 건너 강남(江南)으로 내려왔다. 이를 <em>의관남도(衣冠南渡)</em>라 한다. <em>의관</em>은 곧 사대부를 일컫는 말이다. 짧게는 영가의 난 직후 몇 해, 길게는 그 후 수십 년에 걸쳐 수십만의 인구가 남으로 흘러갔다. 강좌(江左, 강의 동쪽이라는 뜻이나 곧 강남 일대를 가리킴)의 정치 지형은 단숨에 바뀌었다.</p><p>이 시기의 비탄을 가장 잘 보여 주는 일화 한 편이 있다. 의관남도해 온 사대부들이 <em>신정(新亭, 建康 근처)</em>에서 잔치를 열다 한 사람이 <em>풍경은 옛과 다르지 않은데, 산하는 다 바뀌었구나</em> 탄식하니 좌중이 모두 눈물을 흘렸다. 이때 왕도가 일어나 <em>마땅히 함께 힘을 다하여 왕실을 도울 일이지, 어찌 초나라의 포로처럼 눈물만 흘릴까(當共戮力王室, 克復神州, 何至作楚囚相對)</em> 꾸짖었다. 의관남도의 비통과 다잡음이 한 자리에서 만난 장면이다.</p><p>한편 북방에는 흉노·갈(羯)·선비(鮮卑)·저(氐)·강(羌) 다섯 종족이 차례로 정권을 세웠다 무너뜨리며, 100여 년 동안 <em>오호십육국(五胡十六國)</em>의 분열기가 이어진다. 그 가운데 가장 큰 세력이 <em>부견</em>의 <em>전진(前秦)</em>인데, 그가 동진을 침공한 것이 후일의 비수대전이다.</p><p>새 무대 강좌에는 새 과제가 있었다. 토착 강남 호족(특히 顧·陸·朱·張의 4대 가문)과 어떻게 화해할 것인가, 떠밀려 내려온 북방 사대부들의 위계를 어떻게 정리할 것인가, 그리고 무엇보다 어린 황제와 그를 옹립한 종실·외척의 관계를 어떻게 다질 것인가. 이 모든 매듭을 풀어 낸 사람이 곧 <em>왕도</em>였다.</p>"}, {"id": "prc9", "title": "9. 江左에서의 새 出發 ― 王與馬, 共天下", "html": "<p><em>왕도(王導)</em>는 낭야(琅琊) 왕씨 출신이다. 낭야 왕씨는 후한 말부터 명문으로 이름났는데, 죽림칠현의 <em>왕융</em>이 이 가문 사람이다. 왕도는 사마예가 아직 낭야왕(琅琊王)이던 시절부터 그를 보좌해 함께 강을 건너왔다. 사촌형 <em>왕돈</em>은 무장으로서 형주를 거점 삼고, 자신은 문관으로서 건강에서 사마예를 옹립했다.</p><p>낭야 왕씨에 대한 강좌 사람들의 인식이 그것을 단적으로 보여 준다. <em>왕씨와 사마씨가 천하를 함께 한다(王與馬, 共天下)</em>. 정권의 정통성은 사마씨가 가지되, 실질의 정치는 낭야 왕씨가 잡았다. 왕도는 강남의 고씨(顧氏)·육씨(陸氏)와 적극적으로 통혼하며 화해했고, 의관남도해 온 북방 사대부들에게는 <em>교군(僑郡)</em>이라는 특수 행정단위를 두어 그 지위와 호적을 보장했다. 이 정략 덕분에 새 정권은 자리를 잡았다.</p><p>그러나 평화는 오래 가지 않았다. 왕도와 사촌형 왕돈의 관계가 어그러지기 시작했다. 왕돈은 형주에서 군권을 쥐고 점점 야망을 키웠고, 사마예가 그를 견제하려 하자 322년 군사를 일으켰다. <em>왕돈의 난(王敦之亂)</em>이다. 왕돈은 한때 건강까지 함락했으나 곧 병들었고, 324년 명제(明帝)가 즉위해 그의 군을 격파하니 난은 끝났다.</p><p>이 난의 한가운데서 가장 비극적인 일화가 <em>주의(周顗)의 죽음</em>이다. 주의는 자가 백인(伯仁)이다. 시중(侍中)을 지내고 호주(好酒)와 우스개로 이름났다. 왕돈이 일어나자 왕도가 일족을 데리고 궐에 엎드려 처벌을 청했는데, 주의가 곁을 지나며 한마디도 위로하지 않았다. 왕도는 마음속에 원망을 품었다. 그러나 주의는 안에 들어가 황제에게 강력히 상소해 왕도 일족을 살려 줄 것을 청했다. 왕도는 이를 몰랐다.</p><p>왕돈이 도성에 들어오자 왕도에게 <em>주의 같은 자를 어찌 처치할까</em> 물었다. 왕도는 침묵했다. 침묵이 곧 묵인이었다. 주의는 처형되었다. 후일 왕도가 옛 문서를 정리하다 주의가 자기를 위해 올린 상소를 보고는 통곡하며 말했다. <em>내가 백인을 죽인 것은 아니나, 백인은 나로 인해 죽었다(吾雖不殺伯仁, 伯仁由我而死)</em>. 이 한 마디는 그 후 천 년이 넘도록 인용된다.</p><p>왕돈의 난을 평정한 뒤에도 왕도는 정사의 한가운데에 있었다. 명제·성제 두 황제의 보정 대신이었고, 339년 죽을 때까지 강좌 정권의 중심이었다. 그러나 그가 죽은 뒤, 정권은 곧 새로운 외척의 손에 들어간다. <em>유량(庾亮)</em>의 시대다.</p>"}, {"id": "prc10", "title": "10. 庾亮·蘇峻의 亂, 그리고 桓溫의 그림자", "html": "<p><em>유량</em>은 자가 원규(元規)다. 하남(河南) 영천(潁川)의 유씨 출신으로, 명제의 황후의 오빠이니 외척이다. 풍채가 헌앙(軒昂)해 <em>달이 구름을 헤치고 나온 듯하다</em>는 평을 들었다. 명제가 일찍 죽고 어린 성제(成帝)가 즉위하자 그가 보정 대신이 되어 권력을 잡았다.</p><p>유량의 정사는 강경했다. 특히 변방의 무장 가운데 강성한 자들을 견제하려 했는데, 그 가운데 한 명이 <em>소준(蘇峻)</em>이었다. 소준은 역양(歷陽)을 거점으로 한 무장으로, 왕돈의 난 평정에 큰 공이 있었다. 유량은 그를 도성으로 불러올려 군권을 빼앗으려 했다. 소준은 응하지 않았다. 327년, 소준은 같은 처지의 <em>조약(祖約)</em>과 함께 거병해 건강을 함락하니, <em>소준의 난(蘇峻之亂)</em>이다.</p><p>이 난은 끔찍했다. 소준은 황궁을 약탈하고 어린 성제를 인질로 잡았다. 도성의 명사들은 도망갔다. 한 일화에서 유량 자신이 도주하다 작은 배 한 척을 만나 황급히 올랐는데, 사람들이 이미 그득해 배가 가라앉을 듯했다. 한 사람이 <em>유공이 정사를 그르쳐 이 지경에 이르렀거늘</em>이라며 욕설을 퍼부었다. 유량은 묵묵히 도망쳤다.</p><p>난을 평정한 사람은 <em>도간(陶侃)</em>과 <em>온교(溫嶠)</em>, <em>곽묵(郭默)</em>이다. 도간은 형주의 노장으로, 본디 유량과 사이가 좋지 않았으나 위급한 사세에 군을 일으켰다. 온교는 강주(江州)에서 함께 일어났다. 328년 가을, 소준은 전투 중에 죽고 도성은 회복되었다. 유량은 죄를 무릅쓰고 변방으로 좌천되었다 다시 형주로 자리를 옮겨 그곳에서 죽었다(340).</p><p>소준의 난이 평정된 폐허 위에서, 동진 정권은 다시 한 번 재편되었다. 이때 자라난 사람이 <em>환온(桓溫)</em>이다. 환온은 자가 원자(元子)다. 초국(譙國) 환씨로, 부친 환이(桓彝)가 소준의 난 중 절사(節死)했다. 그 충절 덕분에 환씨는 정권의 인정을 받았고, 환온은 명제의 사위가 되었다.</p><p>그는 형주자사(荊州刺史)로 부임해 강성한 무력을 길렀다. 347년에는 촉(蜀)에 자리 잡고 있던 성한(成漢)을 멸하여, 동진 건국 이래의 가장 큰 외적 성공을 이뤘다. 이를 발판으로 그는 <em>북벌(北伐)</em>에 나선다. 첫 번째 북벌(354)에서 장안에 다가갔고, 두 번째 북벌(356)에서는 낙양에 입성했다. 세 번째 북벌(369)은 그러나 패배로 끝났다.</p><p>환온은 야망이 컸다. 그가 어느 날 거울을 보고 한 말이 그대로 전한다. <em>기왕에 흐름을 남기지 못한다면, 만세에 악취라도 남기리라(旣不能流芳後世, 不足復遺臭萬載邪)</em>. 그는 마지막에는 황제를 폐립하여 정권을 자기 손에 넣으려 했다. 371년 그가 폐제(廢帝) 사마혁(司馬奕)을 폐하고 사마욱(司馬昱)을 세우니, 곧 <em>간문제(簡文帝)</em>다. 간문제는 자신을 옹립한 환온의 위협 아래에서 황제 노릇을 했지만, 청담과 풍류로 명사들의 존경을 받았다. <em>진실로 종묘를 잇는 자라면 어찌 두려워하랴</em> 하며 의연했다고 한다.</p><p>그러나 환온의 찬위(簒位) 시도는 끝내 이뤄지지 않았다. 그가 임종 직전 <em>구석(九錫, 황제 외의 신하가 받을 수 있는 최고의 예우)</em>을 요구했을 때, 두 사람이 그것을 지연시켰다. 한 사람은 후에 보겠으나, 다른 한 사람은 <em>왕탄지(王坦之)</em>다. 왕탄지가 환온의 손을 잡고 들어가 <em>상소문이 마땅한가 다시 한 번 보아 달라</em> 청해 시간을 끌었고, 그러는 사이 환온이 죽었다(373).</p><p>그렇다면 환온의 찬위를 막은 또 한 사람은 누구인가. 그를 만나기 전에, 환온의 시대 곧 4세기 중엽에 펼쳐진 청담의 한낮을 먼저 들여다보아야 한다.</p>"}, {"id": "prc11", "title": "11. 淸談이 風俗이 되다 ― 殷浩·支遁·王羲之", "html": "<p>환온과 동시대에, 그의 호적수로 일컬어진 사람이 <em>은호</em>다. 자는 심원(深源). 중군장군(中軍將軍)을 지내 <em>은중군</em>이라 불린다. 청담의 영수이자 인물 품평의 일가였다. 사람들은 그를 환온과 짝지어, <em>환·은의 우열을 가리기 어렵다</em> 했다. 환온이 <em>심원과 비교하면 내가 무엇이 모자라겠는가</em> 묻자, 한 명사가 <em>그대는 매와 사슴 같고, 심원은 옥과 거울 같다</em> 답했다.</p><p>은호는 자기 분수의 학문과 명리로는 천하 으뜸이었다. 그러나 환온이 그를 정치의 자리로 끌어내자 일이 어그러졌다. 353년 그는 북벌의 책임을 맡았으나 크게 패해 결국 폐서인되었다. 정치에서 밀려난 그는 시골에서 손가락으로 허공에 <em>돌돌괴사(咄咄怪事, 기괴한 일이로다)</em> 네 글자를 종일 썼다. 환온이 다시 그를 부르려 회답을 청했더니, 은호가 답서를 봉했다 다시 풀고 또 풀고 하다 결국 빈 봉투를 보내고 말았다. 환온은 그 빈 봉투를 받고 <em>심원이 끝내 부귀를 사양하는구나</em> 탄식했다. 부귀가 아니라 부끄러움이었으리라.</p><p>은호와 환온이 다투던 그 시대의 청담의 정점에는, 또 하나의 큰 무리가 있었다. 회계(會稽) 산음(山陰)을 중심으로 한 명사들이다. 그 가운데서 가장 빛난 이가 <em>왕희지(王羲之)</em>다.</p><p>왕희지는 자가 일소(逸少)이고, 우군장군(右軍將軍)을 지내 <em>왕우군</em>으로 불린다. 낭야 왕씨로 왕도의 조카뻘이다. 서법으로 천 년의 표준을 만들어 <em>서성(書聖)</em>이라 불린다. 그러나 그가 단지 명필이었던 것은 아니다. 그는 도교에 깊이 빠져, 거위를 사랑하여 한 도사가 가지고 있던 거위 떼를 받기 위해 그를 위해 『도덕경(道德經)』을 한 부 정성껏 써 주었다는 일화가 있다. 또 어려서 <em>치감(郗鑒)</em>이 사위를 고르러 왕씨 집에 사람을 보냈는데, 다른 자제들은 모두 잘 차려입고 단정히 앉아 있는 가운데 왕희지만은 동상(東床)에서 배를 드러내고 누워 떡을 먹고 있었다. 치감이 그 이야기를 듣고 <em>바로 그 자가 사윗감이다</em> 했다. <em>동상쾌서(東床快壻)</em>의 출전이다.</p><p>353년 늦봄, 회계의 <em>난정(蘭亭)</em>에서 왕희지가 주인이 되어 사안·<em>손작(孫綽)</em>·<em>허순(許詢)</em>을 비롯한 41명의 명사가 모였다. 흐르는 물에 술잔을 띄워, 잔이 자기 앞에 멈춘 사람은 시 한 수를 짓고, 짓지 못한 사람은 술을 마셨다. 그날의 시 모음에 왕희지가 머리말로 쓴 것이 곧 「난정서(蘭亭序)」다. <em>우주의 큼을 우러러보고 만물의 풍성함을 굽어본다. 시야가 닿는 곳마다 회포(懷抱)를 누비니, 듣고 보는 즐거움이 다하지 못함이 어찌 아니 즐겁겠는가</em>. 그러나 그 글의 후반부에는 곧 <em>그 사이 죽음이 다가오리니, 어찌 통탄하지 않겠는가</em>의 그늘이 깔린다. 풍류와 죽음이 함께 가는 것이 이 시대의 정서다. 〈상서(傷逝)〉편의 일화들이 그 정서의 결정체다.</p><p>이 회계 명사들의 자리에 또 하나의 두드러진 인물이 끼어 있다. <em>지도림(支道林)</em>이다. 자는 도림이고, 곧 <em>지둔(支遁)</em>이라 부른다. 동진의 고승이다. 그는 청담과 노장·반야학에 두루 통했다. <em>임공(林公)</em>이라 일컬어졌다. 그가 손작·왕희지와 어울리며 『장자』 〈소요유(逍遙遊)〉의 새 해석을 들고 나왔을 때, 좌중이 모두 그의 명민함에 놀랐다 한다. 학을 사랑하여 그것을 길렀는데, 학이 한 마리 날개를 다치자 풀어 주면서 <em>너는 본래 하늘의 새인데, 어찌 사람을 위해 노리개가 되리오</em> 했다. 말을 기른 까닭을 묻자 <em>그 신준(神駿)함을 사랑할 따름</em>이라 답했다.</p><p>지도림이 청담의 자리에 끼었다는 사실 자체가 의미심장하다. 인도에서 들어온 불교가, 노장의 옷을 입고 명사들의 살롱에 자리를 잡은 시기다. 이를 <em>격의불교(格義佛敎)</em>라 한다. <em>공(空)</em>은 <em>무(無)</em>의 다른 이름이고, <em>반야(般若)</em>는 <em>명리</em>의 다른 이름이며, <em>진여(眞如)</em>는 <em>도(道)</em>의 다른 이름이라 풀어 가르쳤다. 그 풀이는 후일 더 정밀해지지만, 첫 만남의 흥분이 가장 컸던 시대가 바로 이때다.</p><p>회계의 명사들이 청담과 산수와 시와 글씨와 불교를 한자리에서 즐기던 4세기 중후반, 동진은 그러나 정치적 위기를 향해 가고 있었다. 환온의 찬위 시도가 임박해 있었다. 그것을 막고 동진을 다시 한 번 일으킨 사람이 <em>사안</em>이다.</p>"}, {"id": "prc12", "title": "12. 謝安과 淝水, 東晉의 한낮", "html": "<p><em>사안</em>은 자가 안석(安石)이다. 진군(陳郡) 양하(陽夏) 사씨 출신이다. 진군 사씨는 본디 의관남도해 온 가문이지만, 사안 대에 이르러 단숨에 동진 일류의 명문이 되었다. 그 까닭이 사안 한 사람에게 있다.</p><p>사안은 젊어서는 출사를 사양했다. 형 <em>사혁(謝奕)</em>·동생 <em>사만(謝萬)</em>이 출사하는 사이에도, 그는 회계의 <em>동산(東山)</em>에 은거해 명사들과 어울려 시·금(琴)·산수의 즐거움을 누렸다. 사람들이 그에게 출사를 권하면 그는 웃었다. 한 일화에서 그가 사람들과 더불어 배를 타고 바다에 놀러 나갔다 풍랑이 일었다. 다른 사람들이 모두 낯빛이 변하는데 사안만은 태연했다. <em>지금 돌아가지 않으면 어쩌실 작정입니까</em> 물으니 그가 한참 뒤에야 <em>그럼 돌아가지</em> 했다. 풍문에 흔들리지 않는 이 진중함이 그의 성품이었다.</p><p>마흔이 되어서야 마지못해 출사했다. 동생 사만이 북벌 중에 폐서인되어 가문이 흔들리자, 사안이 비로소 환온의 막부에 들어갔다. 환온이 도성으로 들어오는 길에 사안을 막부에 두고 자기와 함께 가게 했다. 사람들이 <em>사안석이 동산에서 나오니, 천하의 일이 어떻게 될 것인가</em> 수군거렸다.</p><p>환온이 죽을 무렵(373), 사안은 도성에 들어와 효무제(孝武帝, 사마요)를 옹위하는 자리에 섰다. 환온의 찬위가 무산된 직후의 정사를 사안이 사실상 이끌었다. 외척·종실의 갈등을 부드럽게 다스리며, 한편으로는 동진의 군비를 다시 정돈했다. 조카 <em>사현(謝玄)</em>에게 <em>북부병(北府兵)</em>이라는 정예 부대를 길러 두게 한 것이 그 결과다. 북부병은 곧 동진 후기의 가장 강한 군대가 된다.</p><p>이 모든 정돈이 결정적으로 시험받은 것이 <em>비수대전</em>이다. 383년, 북방의 <em>전진(前秦)</em>을 통일한 <em>부견</em>이 백만 대군을 동원해 동진을 침공해 왔다. 동진 측 군세는 8만에 지나지 않았다. <em>부견이 일어나면 동진은 끝난다</em>는 것이 당시의 통념이었다.</p><p>사안이 막부의 총책임이었다. 그는 동생 <em>사석(謝石)</em>과 조카 <em>사현</em>·<em>사염(謝琰)</em>, 그리고 <em>환이(桓伊)</em>를 보내 응전케 했다. 결전이 <em>비수(淝水, 지금의 安徽省 壽縣 부근)</em>에서 벌어졌다. 부견의 군은 비수의 북안(北岸)에, 동진의 군은 남안(南岸)에 진을 쳤다. 사현이 부견에게 <em>조금만 군을 물려 주시면 우리가 강을 건너 결전하리이다</em> 청했다. 부견은 이를 받아들였다. 군을 물리다 그 큰 군세에 <em>동진 군이 다 우리를 쫓아 강을 건너 왔다</em>는 헛소문이 퍼지자 전군이 무너졌다. 사현의 군이 강을 건너 추격하니, 부견의 백만 대군이 자기들끼리 짓밟히며 패주했다. 부견은 단신으로 도망쳐 <em>바람 소리와 학 울음만 들어도 동진의 군이 따라오는 듯하다(風聲鶴唳)</em> 했다.</p><p>이 결전이 강좌의 사대부 사회를 구했다. 만약 그날 사안이 못 견뎠더라면, 동진은 그곳에서 끝났을 것이다. 그러나 사안의 〈아량(雅量)〉 일화는 또 한 단 위에 있다. 비수대전의 첩보가 전해진 그 순간, 사안은 손님과 <em>바둑</em>을 두고 있었다. 첩보를 받은 그는 무심히 그것을 옆에 놓고는 바둑을 계속 두었다. 손님이 <em>어찌 되었느냐</em> 묻자 그는 <em>아이들이 도적을 부수었소(小兒輩遂已破賊)</em> 한마디만 했다. 그러고는 손님이 돌아간 뒤, 그제야 안쪽으로 들어가다 문지방을 넘다 신발의 굽이 부러지는 줄도 몰랐다. 기쁨도 안에서 통어한 사람이다.</p><p>사안이 환온의 찬위를 막은 일화 또한 함께 기억할 만하다. 환온이 죽기 전 사안과 왕탄지를 자기 막부에 청해 두고 칼잡이를 곁에 세워 두었다. 좌중이 모두 떨었으나 사안만은 태연했다. 그는 환온에게 <em>예로부터 명재상이 손님을 청할 때 어찌 칼을 곁에 두었더이까</em> 묻고는 손수 음악 가락을 청해 흥겹게 노래했다. 환온도 그 기상에 눌려 칼잡이를 물렸다.</p><p>사안의 한낮이 곧 동진의 한낮이다. 그가 동산에서 나와 비수에서 부견을 격파하기까지, 약 20년이 동진 명사 문화의 절정이다. 청담과 풍류, 서법과 산수, 그리고 정치가 한 사람의 인격 안에서 통일된 이 그림은, 그 후 다시 오지 않았다.</p>"}, {"id": "prc13", "title": "13. 謝安 死後의 분열, 桓玄의 簒位, 그리고 끝", "html": "<p>사안은 비수대전 2년 뒤(385)에 죽었다. 그가 죽자 곧 동진의 균형이 무너지기 시작했다. 효무제는 자기 동생 <em>사마도자(司馬道子)</em>에게 정사를 맡기고, 자신은 술과 풍류에 빠졌다. 사마도자는 사안만 한 그릇이 못 되었다. 그가 측근 <em>왕국보(王國寶)</em> 등을 신임해 정사가 어지러워졌다.</p><p>이에 맞선 사람이 <em>왕공(王恭)</em>이다. 태원(太原) 왕씨로 효무제의 처남이다. 자는 효백(孝伯). 청고한 풍모로 이름났다. <em>이 사람은 봄날 강가의 버들 같다(此真濯濯如春月柳)</em>는 평을 받았다. 학의 깃으로 된 갖옷을 입고 눈길을 거니니, 사람들이 <em>신선이 내려온 듯하다</em> 했다.</p><p>왕공은 외척의 지위로 도성 안에서 사마도자를 견제하면서, 두 차례(397, 398) 군을 일으켜 정사의 쇄신을 요구했다. 첫 번째는 왕국보 등을 제거하는 데 성공했지만, 두 번째에서 그의 부하 <em>유뇌지(劉牢之)</em>에게 배반당해 패하고 처형되었다.</p><p>같은 시기에 형주에서는 <em>환현(桓玄)</em>이 일어났다. 환온의 막내아들이다. 자는 경도(敬道). 환씨 가문의 호화로움을 그대로 물려받았고, 서화에 조예가 깊었으며, 자부심이 매우 강했다. 부친 환온이 못 이룬 찬위의 꿈을 그는 끝내 이루기로 했다.</p><p>환현은 형주에서 군을 키워, 다른 형주자사 <em>은중감(殷仲堪)</em>과 다투다 그를 죽이고(399), 도성으로 진군해 사마도자 부자를 제거했다(402). 다음 해(403) 그는 안제(安帝)에게 양위를 받아 황위에 올라 국호를 <em>초(楚)</em>라 했다. 동진은 형식상 끝났다.</p><p>그러나 곧 토벌이 시작되었다. 사안의 <em>북부병</em>에서 자라난 <em>유유(劉裕)</em>가 군을 일으켰다. 유유는 한낱 평민 출신이었지만 비범한 무장이었다. 그가 광릉(廣陵)에서 거병해 환현을 격파하니, 환현은 형주로 도망쳤다가 결국 살해되었다(404). 동진은 형식상 다시 일어났지만 실질은 유유의 손에 있었다. 16년 뒤(420), 유유는 안제의 동생 공제(恭帝)에게 양위를 받아 <em>송(宋, 劉宋)</em>을 세우고 동진을 닫았다.</p><p>『세설신어』가 다루는 시대의 끝이다. 후한 말 184년 황건의 난에서 시작된 240년의 굴곡이 이로써 막을 내린다. 그 마지막을 보던 사람들이, 곧 이 책의 편자가 살았던 시대의 사람들이다.</p>"}, {"id": "prc14", "title": "14. 三十六篇으로 다시 보기 ― 劉義慶이 본 것", "html": "<p>이 책의 편자(編者) <em>유의경(劉義慶, 403~444)</em>은 송 무제 유유의 조카다. 황실의 종친으로 임천왕(臨川王)에 봉해졌고, 정치에서는 별로 두드러지지 않은 대신 문학과 학술을 사랑했다. 자기 막부에 사대부와 문인들을 모아 함께 책을 엮었다. 그 가운데 한 권이 『세설신어』다.</p><p>유의경이 살았던 시대는 한 세대 전 ― 곧 동진의 시대 ― 가 막 저물고, 그 시대를 살았던 마지막 명사들도 함께 사라져 가던 시점이다. 그는 멀지 않은 과거를 <em>영광이 끝난 어제</em>로 보았다. 그 어제의 인물들이 무엇을 하고 어떤 말을 했는지, 한 줄 한 줄을 모았다. 자기가 새로 지은 것이 아니라, 옛 문헌과 구전(口傳)에서 발췌해 <em>문류(門類)</em>에 따라 분류해 묶었다.</p><p>그 분류가 곧 36편이다. <em>덕행(德行)</em>과 <em>언어(言語)</em>로 시작해, <em>정사(政事)</em>·<em>문학(文學)</em>으로 정치와 학문을 보고, <em>방정(方正)</em>·<em>아량(雅量)</em>·<em>식감(識鑒)</em>·<em>상예(賞譽)</em>·<em>품조(品藻)</em>·<em>규잠(規箴)</em>으로 인물의 결을 더듬는다. <em>첩오(捷悟)</em>·<em>숙혜(夙惠)</em>·<em>호상(豪爽)</em>·<em>용지(容止)</em>로 재기와 풍채를 모으고, <em>자신(自新)</em>·<em>기선(企羡)</em>·<em>상서(傷逝)</em>·<em>서일(棲逸)</em>·<em>현원(賢媛)</em>으로 처세와 정을 본다. <em>술해(術解)</em>·<em>교예(巧蓺)</em>·<em>총례(寵禮)</em>에 이르러 재주와 영광을 추리고, <em>임탄(任誕)</em>·<em>간오(簡傲)</em>·<em>배조(排調)</em>·<em>경저(輕詆)</em>·<em>가휼(假譎)</em>·<em>출면(黜免)</em>에서는 분방함과 그 그늘을, <em>검색(儉嗇)</em>·<em>태치(汰侈)</em>·<em>분견(忿狷)</em>·<em>참험(讒險)</em>·<em>우회(尤悔)</em>·<em>비루(紕漏)</em>·<em>혹닉(惑溺)</em>·<em>구극(仇隟)</em>에 이르러서는 인물의 어두운 결을 모두 풀어 보인다.</p><p>이 분류를 가만히 들여다보면 한 가지가 분명하다. 이 책의 본질이 <em>인물 품평</em>이라는 사실이다. 사건의 기록이 아니라, 그 사건 속에서 사람이 어떤 결을 보였는지를 모으는 일이다. <em>언어 한 마디로 사람의 기량(器量)이 드러난다</em>는 후한 청류 사대부의 인식이, 이 책 36편 전체를 관통한다.</p><p>또 하나, 36편의 순서를 보면 <em>덕(德)에서 시작해 구극(仇隟, 원한)에서 끝난다</em>. 인물의 최고선부터 최악까지, 다양한 결을 골고루 풀어 보인다. <em>명교</em>만의 책도 아니고 <em>임탄</em>만의 책도 아니다. 둘 다를 보여 주고, 평가는 독자의 몫이다.</p><p>유의경은 자기 시대의 사대부들이 한 세대 전을 잊지 않도록, 그리고 그 잊지 않음 속에서 자기들의 처세와 인격을 다시 비추어 보도록, 이 책을 묶었다. 그 뜻이 이루어진 셈이다. 천 오백 년이 지난 우리도 이 책을 읽으며 그 시대의 사람을 만나는 것이다.</p>"}, {"id": "prc15", "title": "15. 結 ― 어떻게 이 책을 펼칠 것인가", "html": "<p>이제 무대를 알았다. 240년의 시간이 어떻게 흘렀는지, 누가 그 흐름의 매듭이었는지, 어떤 사상이 그 흐름의 지하수였는지, 어떤 가문이 그 흐름의 둑이었는지. 이것을 머릿속에 두고 다시 일화 한 편을 펴 보면, 비로소 그 한 줄이 그 시대의 한 점으로 잡힌다.</p><p>그러므로 처음 펴는 이에게는 〈덕행〉편이나 〈언어〉편의 한 편부터 천천히 읽기를 권한다. 막히면 그 인물이 등장하는 다른 편의 일화를 함께 펴 본다. 이름이 같은데 내가 모르는 인물이라면, 아래의 부록 카드를 들춘다. <em>인물로 찾기</em>를 활용하면 한 사람의 등장을 일거에 모을 수도 있다.</p><p>위진의 명사들은 우리에게서 멀다. 그러나 그들의 한 마디, 한 거동, 한 침묵은 천 오백 년이 지나도 빛이 바래지 않는다. 그것이 이 책이 천 년을 살아남은 이유이다.</p>"}];
const PREFACE_APPENDIX=[{"key": "時", "label": "시대구분", "cards": [{"name": "後漢 末", "sub": "184~220", "body": "환관과 외척의 전횡으로 정사가 거듭 어그러진 시기. 청류 사대부가 결집해 <em>당고의 화(166, 169)</em>를 입었다. 184년 황건의 난으로 황실의 권위는 사실상 무너지고, 군웅이 천하를 나누었다. 이 시기 곽임종·허소의 인물 품평 풍속에서 <em>명사</em>라는 새 인간형이 태어났다."}, {"name": "三國", "sub": "220~280", "body": "220년 조비가 한을 받아 위(魏)를 세우며 막을 연 분립의 시대. 손권의 오(吳)와 유비의 촉(蜀)이 함께 정립했다. 위는 240년대에 <em>현학</em>과 <em>청담</em>이 솟아나 정시 명사 문화의 한 정점을 이루었으나, 249년 사마의의 정변으로 그 빛이 잘렸다. 263년 촉, 280년 오의 멸망으로 진(西晉)이 통일을 이룬다."}, {"name": "西晉", "sub": "265~316", "body": "265년 사마염이 위에서 받아 세운 통일 왕조. 280년 오 멸망으로 천하를 합쳤다. 그러나 풍속은 사치로 흘렀고(왕개·석숭의 부 자랑), 청담은 정사 책임을 지지 않는 사교 의례가 되었다. 291년 시작된 <em>팔왕의 난</em>으로 황실이 무너지고, 311년 <em>영가의 난</em>으로 낙양이 함락되며 끝났다."}, {"name": "東晉", "sub": "317~420", "body": "사마예가 강을 건너 건강(建康)에 세운 동남부 정권. <em>왕도</em>의 정략으로 자리를 잡고, 청담·서법·산수가 꽃피며 명사 문화가 다시 한 번 절정을 이루었다. 왕돈·소준의 난, 환온의 북벌, 비수대전, 환현의 찬위를 거치며 100년을 버텼다. 420년 유유의 송에 양위하며 끝났다. 『세설신어』의 무대 중 가장 큰 비중."}, {"name": "五胡十六國", "sub": "304~439", "body": "영가의 난 전후로 북방에 차례로 일어난 흉노·갈·선비·저·강 다섯 종족의 정권들. 16개의 나라가 흥망을 거듭하며 100여 년 분열했다. 가운데 가장 강성한 세력이 저족 <em>부견</em>의 <em>전진(前秦)</em>으로, 379년 화북을 통일하고 383년 동진을 침공했다 비수에서 패했다."}]}, {"key": "事", "label": "결정적 사건", "cards": [{"name": "黨錮의 禍", "sub": "당고의 화 (166, 169)", "body": "후한 후기 환관과 외척의 전횡에 맞서 일어선 청류 사대부들을 환관들이 <em>당인</em>으로 몰아 종신 금고한 두 차례의 사건. 이원례(李膺)·진중거(陳蕃) 등 수백 명이 정치 밖으로 밀려났다. 역설적으로 이 압박 속에서 사대부들이 서로를 <em>품평</em>하는 풍속이 생겨, <em>명사</em>라는 새 인간형이 태어났다."}, {"name": "高平陵之變", "sub": "고평릉의 정변 (249)", "body": "위 황제 조방이 고평릉으로 행차한 사이, 병들었다 칭한 <em>사마의</em>가 일으킨 쿠데타. 보정 대신 <em>조상</em>과 그 측근 <em>하안</em>·<em>하후현</em>·<em>이풍</em>·<em>등양</em>·<em>정밀</em>이 한꺼번에 처형되었다. 정시 명사 문화가 단숨에 꺾이고, 청담은 <em>위험한 것</em>이 되었다. 살아남은 명사들이 죽림으로 모여드는 계기."}, {"name": "八王의 亂", "sub": "팔왕의 난 (291~306)", "body": "서진 혜제 시기, 황후 <em>가씨</em>의 농단에서 시작된 사마씨 종친 여덟 왕의 16년 내전. 여남왕 량·초왕 위·조왕 윤·제왕 경·장사왕 예·성도왕 영·하간왕 옹·동해왕 월이 차례로 일어났다 차례로 죽었다. 그 결과 황실은 텅 비고 군대는 흩어졌으며, 변방의 이민족이 차츰차츰 들어왔다. <em>영가의 난</em>의 직접적 배경."}, {"name": "永嘉의 亂", "sub": "영가의 난 (311)", "body": "흉노 출신의 <em>유총(劉聰)</em>이 낙양을 함락하고 회제(懷帝)를 잡아간 사건. 종묘는 불타고 사대부들은 흙비처럼 잡혀가거나 흩어졌다. 청담의 영수 <em>왕연</em>이 <em>내가 비록 헛된 말로 천하를 그르쳤으나, 이런 일에 이를 줄 알았겠는가</em> 탄식하며 죽은 것이 이때. 서진의 종말."}, {"name": "衣冠南渡", "sub": "의관남도", "body": "영가의 난 전후, 북방 사대부들이 가솔과 노복을 거느리고 강을 건너 강남으로 내려온 인구 이동. <em>의관</em>은 곧 사대부를 일컫는 말. 짧게는 영가의 난 직후 몇 해, 길게는 그 후 수십 년에 걸쳐 수십만이 남도(南渡)했다. 동진 강좌 정권의 인구·문화적 기반이 되었다."}, {"name": "王敦의 亂", "sub": "왕돈의 난 (322~324)", "body": "낭야 왕씨의 한 축으로 형주의 군권을 쥐고 있던 <em>왕돈</em>이 사마예의 견제에 반발해 일으킨 거병. 한때 건강을 함락했으나 곧 병들었고, 명제가 즉위해 격파했다. 이 난의 한가운데서 <em>주의(周顗)</em>가 사촌 왕도를 구명하려다 죽은 일이 <em>내가 백인을 죽인 것이 아니나…</em>의 출전이다."}, {"name": "蘇峻의 亂", "sub": "소준의 난 (327~328)", "body": "외척 <em>유량</em>의 강경한 견제에 반발한 역양 무장 <em>소준</em>이 <em>조약</em>과 함께 일으킨 반란. 건강을 함락하고 어린 성제를 인질로 잡았으며, 황궁을 약탈했다. <em>도간</em>·<em>온교</em>·<em>곽묵</em>이 군을 일으켜 평정했다. 동진 초기 정권의 가장 큰 위기 가운데 하나."}, {"name": "三次 北伐", "sub": "환온의 세 차례 북벌 (354, 356, 369)", "body": "<em>환온</em>이 형주의 군세를 발판으로 시도한 세 차례의 북방 정벌. 첫 번째에서 장안에 다가갔고, 두 번째에서 한때 낙양을 회복했으나, 세 번째에서 패주했다. 정치적으로는 환온의 명성을 키워 후일 <em>간문제</em> 옹립과 찬위 시도의 발판이 되었다."}, {"name": "淝水大戰", "sub": "비수대전 (383)", "body": "전진의 <em>부견</em>이 백만 대군으로 동진을 침공해 <em>비수</em>에서 결전. 동진 측은 8만에 불과했으나 <em>사현</em>의 청에 부견이 군을 물리다 <em>동진 군이 강을 건너 추격해 왔다</em>는 헛소문에 무너졌다. 부견은 단신으로 도망쳐 <em>風聲鶴唳</em> 했다. <em>사안</em>이 첩보를 받고도 바둑을 계속 둔 일화가 〈아량〉편의 백미다."}, {"name": "桓玄 簒位", "sub": "환현의 찬위 (403~404)", "body": "환온의 막내아들 <em>환현</em>이 형주에서 일어나 도성을 장악하고, 안제(安帝)에게 양위를 받아 국호를 <em>초(楚)</em>로 한 사건. 동진은 형식상 끝났으나, 곧 사안의 <em>북부병</em>에서 자라난 <em>유유(劉裕)</em>가 광릉에서 거병해 환현을 격파했다(404). 동진은 이름만 16년 더 이어지다 420년 유유에게 양위된다."}]}, {"key": "地", "label": "무대", "cards": [{"name": "洛陽", "sub": "낙양", "body": "후한·위·서진의 수도. 240년대 정시 명사들이 청담을 펼친 자리. 311년 영가의 난으로 흉노 유총에게 함락되어 종묘가 불탔다. 후에 환온의 두 번째 북벌(356)에서 한때 회복되었으나 다시 잃었다. 위진 사대부에게는 <em>옛 천하의 중심</em>의 상징."}, {"name": "建康", "sub": "건강", "body": "동진·송·제·양·진(陳)의 수도. 본래 손권의 오의 수도 <em>건업(建業)</em>이었던 자리. 의관남도 이후 사대부 사회의 새 중심이 되었다. 지금의 <em>남경(南京)</em>. 본 책의 대부분의 사건이 이곳을 무대로 펼쳐진다."}, {"name": "會稽 東山", "sub": "회계 동산", "body": "<em>사안</em>이 출사 전 은거한 산. 회계는 강좌의 산수 명승지로, 왕희지·손작·허순·지도림 등이 어울려 청담과 시·금을 즐긴 명사 문화의 한 살롱이었다. 353년 난정의 모임도 이 지역. <em>동산 재기(東山再起)</em>의 출전이다."}, {"name": "荊州", "sub": "형주", "body": "강한(江漢) 일대의 군사 요충. 형주자사가 곧 강좌 정권의 무력의 절반을 쥐었다. 왕돈·도간·유량·환온·은호·은중감·환현이 차례로 거점 삼았다. 도성 건강과 형주 사이의 견제와 협조가 동진 100년의 정치적 축이었다."}, {"name": "江左", "sub": "강좌", "body": "양자강의 동쪽이라는 뜻이나, 실상은 <em>강남</em>을 가리키는 동진 사대부 사회의 통칭. 회계·오·건강을 아우른다. 의관남도해 온 북방 사대부와 본래 강남에 있던 호족(顧·陸·朱·張)이 어우러진 새 사회. <em>강좌의 명사</em>라 하면 곧 동진의 사대부를 일컫는다."}]}, {"key": "族", "label": "명문가", "cards": [{"name": "琅琊王氏", "sub": "낭야 왕씨", "body": "동진 초의 으뜸 명문. 후한 말부터 일어났고 죽림칠현의 <em>왕융</em>도 이 가문. 동진에서는 <em>왕도</em>가 정략의 중심, <em>왕돈</em>이 군의 중심. <em>왕희지</em>·왕연·왕징·왕헌지·왕헌도 모두 이 가문. <em>왕씨와 사마씨가 천하를 함께 한다(王與馬, 共天下)</em>는 말이 이 가문에 붙은 평."}, {"name": "陳郡謝氏", "sub": "진군 사씨", "body": "본디 그리 두드러지지 않다 <em>사안</em> 한 사람으로 단숨에 일류 명문이 된 가문. 비수대전을 이끈 사현·사석·사염이 모두 사안의 형제·조카. 동생 사만, 외손 <em>사도온(謝道蘊)</em>도 이 가문. 4세기 후반의 동진 정치·문화의 한가운데."}, {"name": "譙國桓氏", "sub": "초국 환씨", "body": "환이(桓彝)가 소준의 난에 절사하여 동진 정권의 인정을 받고, 그 아들 <em>환온</em>이 형주를 거점으로 군권을 쥔 뒤 동진 후기의 한 축을 이루었다. <em>환충(桓沖)</em>·<em>환이(桓伊)</em>도 이 가문. 결국 환온의 막내아들 <em>환현</em>이 황위를 찬탈하나 곧 유유에게 토벌된다."}, {"name": "太原王氏", "sub": "태원 왕씨", "body": "낭야 왕씨와는 다른 또 하나의 왕씨 명문. <em>왕몽</em>·<em>왕탄지</em>·<em>왕공</em>이 대표 인물. 동진 중후기 청담과 풍류의 한 축. 왕몽은 풍류 명사로, 왕탄지는 환온의 찬위를 막은 강직한 신하로, 왕공은 청고한 외척으로 각기 일가를 이뤘다."}, {"name": "高平郗氏", "sub": "고평 치씨", "body": "<em>치감(郗鑒)</em>이 동진 초의 명문으로 자리 잡았다. 그가 왕희지를 사위로 골랐다는 <em>동상쾌서</em>의 일화로 유명. 그의 손자 <em>치초(郗超)</em>는 환온의 모주(謀主)로 권모의 한가운데 있었다. 부친 치음(郗愔)과의 갈등 또한 한 일화."}, {"name": "河南庾氏", "sub": "하남 유씨", "body": "<em>유량(庾亮)</em>을 중심으로 한 외척 가문. 명제의 황후의 친정이다. 명제·성제 시기 권력 중심에 있었으나, 그의 강경책이 <em>소준의 난</em>을 부르며 위신이 흔들렸다. 동생 유빙(庾冰)·유익(庾翼) 또한 정사의 중심에 있었다. 사안 이전 외척 정치의 한 단면."}]}, {"key": "思", "label": "사상과 문화", "cards": [{"name": "玄學", "sub": "현학", "body": "한대 경학의 자구 주석학에 대한 반동으로 솟아난 위진의 사상. <em>노자(老子)</em>·<em>장자(莊子)</em>·<em>주역(周易)</em>의 <em>삼현(三玄)</em>을 중심으로, 사물의 자구가 아니라 그 <em>근본(本)</em>과 <em>그 너머(玄)</em>를 묻는다. 무위·자연·도·무명을 도구 삼아 우주와 인간을 다시 설명한다. 정시 연간(240~249)이 정점."}, {"name": "淸談", "sub": "청담", "body": "현학의 명제를 <em>주(主)</em>와 <em>객(客)</em>이 갈마들며 토론하는 위진 명사들의 지적 사교. 옥주미(玉麈尾)를 든 사람이 명제를 세우고, 듣는 이가 반례를 들고, 그렇게 한 자리에서 명리(名理)를 가르는 <em>지적 경기</em>다. 진 사람은 옷을 벗어 옥주미를 넘긴다. 단순한 한담이 아니다."}, {"name": "名敎와 自然", "sub": "명교와 자연", "body": "유가의 <em>예법(名敎)</em>과 노장의 <em>자연</em>을 어떻게 조화시킬 것인가의 물음. 위진 사상의 한가운데에 자리한 대립이다. 죽림칠현 가운데 혜강·완적은 명교를 비판하고 자연을 택했고, 산도·왕융은 출사해 명교를 살았다. <em>명교가 곧 자연</em>이라는 절충도 후일 등장한다."}, {"name": "竹林七賢", "sub": "죽림칠현", "body": "고평릉의 정변(249) 이후 정치에서 벗어나 산양의 죽림에 모인 일곱 명사. <em>혜강</em>·<em>완적</em>·<em>산도</em>·<em>왕융</em>·<em>유령</em>·<em>향수</em>·<em>완함</em>. 술과 거문고와 노장을 즐겼다. 후일 산도·왕융은 결국 출사하고, 혜강은 사마씨에게 죽는다. 명교-자연 대립의 한 결정체."}, {"name": "格義佛敎", "sub": "격의불교", "body": "동진 시기 인도에서 들어온 불교가 노장의 개념으로 풀려 사대부에게 전해진 흐름. <em>공(空)</em>은 <em>무(無)</em>로, <em>반야(般若)</em>는 <em>명리</em>로, <em>진여(眞如)</em>는 <em>도(道)</em>로 풀어 가르쳤다. <em>지도림</em>(支遁)이 그 한가운데. 후일 더 정밀한 불교 해석으로 발전하지만, 첫 만남의 흥분은 이 시대가 가장 컸다."}, {"name": "風流와 任誕", "sub": "풍류와 임탄", "body": "예법에 매이지 않고 자기의 정에 충실한 위진 명사의 분방한 행실. 풍랑 속에서도 태연한 사안, 알몸으로 누운 유령, 동상에서 배를 드러낸 왕희지, 모친 상중에 술을 마신 완적 ― 이런 모습들이 모두 한 갈래. 〈임탄(任誕)〉편이 그 정수를 모은다. <em>명교-자연</em>의 자연 쪽 표현."}]}];

const OBJECTS=[{"id": "person.謝安", "type": "person", "han": "謝安", "ko": "사안", "sub": "안석(安石) · 320~385", "title": "동진의 명재상", "short": "동산(東山)에 사십 가까이 은거하다 출사하여 동진의 명재상이 됨. 비수대전(淝水之戰)에서 조카 사현(謝玄)과 환이(桓伊)를 보내 부견(苻堅)의 백만 대군을 격파, 강좌(江左)를 구해냄. 청담의 종장(宗匠)이자 풍류의 표상이며, 풍문에 놀라지 않는 진중함과 도량으로 일컬어짐.", "long": "謝安은 자가 안석(安石)이다. 진군(陳郡) 양하(陽夏)의 사씨 출신이다. 진군 사씨는 의관남도해 온 가문이지만, 사안 대(代)에 이르러 단숨에 동진 일류의 명문으로 올라섰다. 그 까닭이 사안 한 사람에게 있다.\n\n사안은 어려서부터 <em>왕도</em>에게 일컬어졌다. 왕도가 그를 보고 <em>이 아이의 풍격이 동산(東山)의 송백 같으니, 자라면 능히 큰 그릇이 되리라</em> 평했다 한다. 자라서는 회계의 <em>동산</em>에 은거해 조용히 살았다. 형 <em>사혁</em>과 동생 <em>사만</em>이 차례로 출사해 정사의 중심에 들어갔지만, 사안은 출사를 거부했다. 사람들이 권하면 웃으며 <em>어찌 동산을 떠나려 하랴</em> 답했다. 그가 <em>왕희지</em>·<em>손작</em>·<em>허순</em>·<em>지도림</em>과 어울려 산수와 시와 청담을 즐긴 자리가 곧 〈언어〉·〈상예〉·〈품조〉편의 한 정점이다.\n\n특히 그의 <em>아량</em>은 시험을 거치며 알려졌다. 한 번은 손작과 함께 배를 타고 바다에 놀러 나갔다 풍랑이 일었다. 다른 사람들이 모두 낯빛이 변하는데 사안만 태연했다. 손작이 <em>어찌하여 돌아가지 않으십니까</em> 다그치자 사안이 한참 뒤에야 <em>그럼 돌아가지(若如此, 將無歸)</em> 했다. 또 환온이 그와 <em>왕탄지</em>를 막부에 청해 두고 칼잡이를 곁에 세웠을 때도, 좌중이 모두 떨었으나 사안만 태연히 환온에게 <em>예부터 명재상이 손님을 청할 때 어찌 칼을 곁에 두었더이까</em> 묻고 손수 음악 가락을 청해 흥겹게 노래했다는 일화가 〈아량〉편의 백미다.\n\n마흔이 되어서야 출사했다. 동생 사만이 북벌 중에 폐서인되어 가문이 흔들리자, 사안이 비로소 환온의 막부에 들어갔다. 환온이 도성으로 들어오는 길에 사안을 막부에 두고 자기와 함께 가게 했다. 사람들이 <em>사안석이 동산에서 나오니, 천하의 일이 어떻게 될 것인가</em> 수군거렸다. 동산에서 나온 사람이 곧 <em>기왕에 흐름을 남기지 못한다면 만세에 악취라도 남기리라</em>라 호언한 그 환온의 호적수가 될 것이라는 예감이었다.\n\n환온이 죽을 무렵(373), 사안은 도성에 들어와 효무제(孝武帝, 사마요)를 옹위하는 자리에 섰다. 환온의 찬위가 무산된 직후의 정사를 사안이 사실상 이끌었다. 외척·종실의 갈등을 부드럽게 다스리며, 한편으로는 동진의 군비를 다시 정돈했다. 조카 <em>사현(謝玄)</em>에게 <em>북부병(北府兵)</em>이라는 정예 부대를 길러 두게 한 것이 그의 가장 큰 군사적 결단이다. 북부병은 곧 동진 후기의 가장 강한 군대가 된다.\n\n383년, <em>부견(苻堅)</em>의 백만 대군이 남하했다. <em>비수대전</em>이다. 동진 측 군세는 8만에 지나지 않았다. <em>부견이 일어나면 동진은 끝난다</em>는 것이 당시의 통념이었다. 사안이 막부의 총책임으로서 동생 <em>사석</em>과 조카 <em>사현</em>·<em>사염</em>, 그리고 <em>환이(桓伊)</em>를 보내 응전하게 했다. 결전에서 사현의 묘책으로 부견의 군이 자기들끼리 짓밟히며 패주했고, 부견은 단신으로 도망쳐 <em>風聲鶴唳</em>했다.\n\n그 첩보가 전해진 그 순간, 사안은 손님과 <em>바둑</em>을 두고 있었다. 그는 첩보를 무심히 옆에 놓고 바둑을 계속 두었다. 손님이 <em>어찌 되었느냐</em> 묻자 <em>아이들이 도적을 부수었소(小兒輩遂已破賊)</em> 한마디만 했다. 그러고는 손님이 돌아간 뒤, 그제야 안쪽으로 들어가다 문지방을 넘다 신발의 굽이 부러지는 줄도 몰랐다. 〈아량〉편의 정점이다.\n\n비수전의 영광 뒤에 사안은 정치적 견제에 시달렸다. 효무제의 아우 사마도자(司馬道子)의 무리가 그를 시기해 권력에서 멀어지게 했다. 그는 광릉(廣陵)으로 출진하다 병이 들어 도성으로 돌아와 죽었다(385년 8월). 향년 66세였다. 사후 태부(太傅)에 추증되어 <em>사태부(謝太傅)</em>로 일컬어진다.\n\n『세설신어』에서 그는 100편이 넘는 일화에 등장한다. 〈덕행〉·〈언어〉·〈정사〉·〈문학〉·〈방정〉·〈아량〉·〈식감〉·〈상예〉·〈품조〉·〈규잠〉·〈첩오〉·〈숙혜〉·〈호상〉·〈용지〉·〈서일〉·〈교예〉·〈배조〉 등 거의 모든 편에 그의 모습이 다채롭게 그려진다. 동진의 한낮은 곧 사안의 한낮이며, 그가 떠나면서 동진의 가을이 시작되었다.", "storyCount": 113}, {"id": "person.桓溫", "type": "person", "han": "桓溫", "ko": "환온", "sub": "원자(元子) · 312~373", "title": "동진의 명장이자 권신", "short": "형주자사로서 촉(蜀)을 멸하고 세 차례 북벌(北伐)하여 명성을 떨침. 후일 황제 폐립을 단행하고 찬위(簒位)를 꿈꿨으나 사안·왕탄지의 견제로 뜻을 이루지 못하고 병사. 거울을 보며 \"기왕에 흐름을 남기지 못한다면 만세에 악취라도 남기리라\"고 한 호언으로 유명. 호방함과 야심이 한 몸에 어우러진 인물.", "long": "桓溫은 자가 원자(元子)다. 초국(譙國) 용항(龍亢)의 환씨 출신이다. 부친 <em>환이(桓彝)</em>는 <em>소준의 난</em> 때 절개를 지키다 죽었다. 환온은 어려서부터 부친의 원수를 갚는 일을 자기 일로 삼아, 열여덟에 원수의 상가에 칼을 차고 들어가 그 자식을 베고 나왔다 한다. 이 한 일화가 그의 일생을 예감케 한다. 그의 호방함은 효(孝)의 외피를 쓰고 있었으나, 그 안에는 <em>천하를 흔들고자 하는 야심</em>이 일찍부터 자리잡고 있었다.\n\n자라서 <em>남강장공주(南康長公主)</em>에게 장가들어 황실의 부마가 되었다. 이로써 동진 정사의 한가운데로 들어가는 길이 열렸다. 형주자사에 임명되었을 때 그의 나이 서른넷이었다. 형주는 <em>왕돈</em>과 <em>유량</em>이 차례로 거점으로 삼았던 자리로, 도성을 위협할 수 있는 군사 요지였다. 환온이 그 자리에 앉은 순간부터 동진의 무게중심은 한쪽으로 기울기 시작했다.\n\n346년, 환온은 단독 결단으로 군을 일으켜 <em>촉(蜀)</em>의 <em>성한(成漢)</em>을 쳤다. 조정의 의논을 거치지 않은 출병이었다. 길이 험하고 군량이 모자라 모두가 실패를 예감했으나, 환온은 단숨에 성도(成都)로 밀고 들어가 성한의 <em>이세(李勢)</em>를 사로잡았다. 한 차례 출병으로 한 나라를 거두어들인 셈이다. 이 공으로 그의 명성은 도성을 압도했고, 조정은 그를 두려워하기 시작했다.\n\n이어 세 차례 <em>북벌(北伐)</em>을 감행했다. 첫 북벌(354)에서는 <em>부건(苻健)</em>의 전진(前秦)을 쳐 장안 근교까지 이르렀고, 길가의 백성들이 눈물을 흘리며 <em>오늘 다시 관군을 뵐 줄 몰랐다</em> 했다 한다. 두 번째 북벌(356)에서는 낙양을 되찾았다. 옛 도읍의 폐허에 서서 환온이 <em>신주(神州)가 가라앉아 백 년의 폐허가 되었으니, 왕이보(王夷甫, 왕연)의 무리가 그 죄를 면치 못하리라</em> 탄식한 일이 〈경저〉편에 전한다. 玄學의 풍속을 좇아 정사를 놓은 <em>왕연</em>의 무리에게 영가의 화의 책임을 묻는 한마디였다.\n\n세 번째 북벌(369)은 그러나 <em>지수(枳水)</em>에서 <em>모용수(慕容垂)</em>에게 크게 패하며 끝났다. 군량이 끊겨 군이 무너졌고, 환온의 명성에도 처음으로 금이 갔다. 이 좌절 뒤에 그의 야심은 안으로 향했다. <em>공을 세워 황위로 가는 길</em>이 막혔다면 <em>권력으로 가는 길</em>을 끝까지 밀고 가겠다는 결단이었다. 그가 어느 날 베개를 어루만지며 <em>기왕에 흐름을 남기지 못한다면 만세에 악취라도 남기리라(旣不能流芳後世, 不足復遺臭萬載邪)</em> 한 호언이 이 무렵의 일이다. 〈우회〉편의 한 정점이며, 그의 일생을 한 줄로 압축하는 자리.\n\n371년, 환온은 <em>황제 폐립</em>을 단행했다. 사마혁(司馬奕)을 폐해 <em>해서공(海西公)</em>으로 떨어뜨리고 <em>간문제(簡文帝)</em> 사마욱을 세웠다. 동진 황실의 정통이 환온 한 사람의 손에 좌우된 순간이었다. 간문제는 즉위한 지 일 년이 못 되어 죽으며 환온에게 <em>주공(周公)의 일을 부탁한다</em>는 유조를 남기려 했으나, <em>왕탄지(王坦之)</em>가 이 유조를 찢어 다시 쓰게 했다. 환온의 찬위로 가는 마지막 한 걸음이 그 한 장의 종이에서 막혔다.\n\n이듬해 환온은 도성으로 들어왔다. <em>구석(九錫)</em>을 받아 찬위의 외형을 갖추려 했다. 막부에 <em>사안</em>과 <em>왕탄지</em>를 청해 두고 칼잡이를 좌우에 세웠으나, 사안이 태연히 <em>예부터 명재상이 손님을 청할 때 어찌 칼을 곁에 두었더이까</em> 묻자 환온은 웃으며 칼잡이를 물렸다 한다. 〈아량〉편의 백미. 사안과 왕탄지는 구석 조서의 초안을 일부러 끌고 또 끌었고, 그 사이 환온의 병이 위중해졌다. 373년 가을, 환온은 구석을 받지 못한 채 죽었다. 향년 62세.\n\n『세설신어』에서 환온은 〈언어〉·〈품조〉·〈호상〉·〈우회〉·〈경저〉·〈배조〉의 곳곳에 등장한다. <em>호방</em>과 <em>야심</em>과 <em>비감(悲感)</em>이 한 몸에 어우러진 그의 모습은 동진 한낮의 그늘이며, 그가 죽으면서 비로소 <em>사안</em>의 한낮이 열렸다. 환온이 없었다면 동진은 더 일찍 무너졌을 것이고, 환온이 뜻을 이뤘다면 동진은 더 일찍 환씨의 것이 되었을 것이다. 그 사이의 아슬한 한 자리에 한 사람의 일생이 놓였다.", "storyCount": 71}, {"id": "person.劉惔", "type": "person", "han": "劉惔", "ko": "유담", "sub": "진장(眞長) · 약 311~347", "title": "청담의 영수", "short": "단양윤(丹陽尹)을 지내어 유윤(劉尹)으로도 일컬어짐. 청담의 영수이자 인물 품평의 일가로, 한 마디 평이 곧 우열을 가름. 환온의 동서로, 환온이 그의 식견을 두려워하였다고 함. 일찍 죽었으나 명사들 사이에서 그 자취는 길게 남음.", "long": "劉惔은 자가 진장(眞長)이다. 패국(沛國) 상현(相縣) 사람이며, 한 황실의 후예를 자처한 유씨 가운데서도 동진 초기 명사의 한 자리에 곧장 올라선 인물이다. 단양윤(丹陽尹)을 지냈으므로 흔히 <em>유윤(劉尹)</em>으로 일컬어진다. 동진 명사들 사이에서 그의 이름은 한 시대 <em>청담(淸談)</em>의 한 척도였다.\n\n집안은 일찍 기울었다. 어려서 가난하여 돗자리를 짜 어머니를 봉양했다 한다. 그러나 그 풍격이 일찍부터 빼어나, <em>왕도(王導)</em>가 한 번 보고 무겁게 여겼다. 자라서는 <em>원제(元帝)</em>의 딸 <em>여릉공주(廬陵公主)</em>에게 장가들어 부마(駙馬)가 되었다. 가난한 자리에서 황실의 사위에 이르는 한 길이, 그의 식견과 풍의(風儀)가 곧 자기 가문을 대신한다는 위진 명사 문화의 한 표지를 단적으로 보여 준다.\n\n그의 본령은 <em>청담</em>과 <em>인물 품평</em>에 있었다. 한때 동진의 청담을 이끌던 영수는 <em>왕도</em>·<em>유량</em>의 다음 세대로, <em>은호(殷浩)</em>와 유담 두 사람이 쌍벽으로 일컬어졌다. 은호가 <em>명리(名理)</em>의 깊이로 자리를 누른다면, 유담은 한 마디로 자리를 가르는 <em>예봉(銳鋒)</em>으로 알려졌다. 옥주미를 들고 그가 한 명제를 세우면 좌중이 숨을 죽였고, 한 인물을 평하면 그 평이 곧 그 사람의 우열이 되었다 한다. 〈품조〉·〈상예〉·〈문학〉편에 그의 한 줄 평이 거듭 등장하는 까닭이 여기 있다.\n\n특히 <em>환온(桓溫)</em>과의 관계가 그의 자취를 길게 만든다. 환온은 유담의 동서였다. 두 사람이 함께 <em>여릉공주</em>의 자매에게 장가들었던 것이다. 같은 처가의 사위였지만, 유담은 환온의 그릇을 일찍부터 꿰뚫어 보았다. 그가 <em>환온은 영웅의 자질이 있으나 그 끝이 어디로 갈지 알 수 없다</em>는 뜻의 평을 남겼다 전한다. 한 자리에서 <em>환원자(桓元子)는 도적의 그릇이오</em>라고까지 단언한 일이 있다고도 한다. 환온도 유담의 식견을 두려워하여, 살아 있는 동안은 함부로 야심을 드러내지 못하였다 한다. 후일 환온이 도성을 흔들 만한 권신이 되어서도 <em>유진장이 살아 있었다면</em>이라는 말을 자주 했다고 전한다.\n\n벼슬길에서는 단양윤에 이르렀다. 단양은 도성을 끼고 있는 자리라 그 윤(尹)은 곧 도성의 정사를 맡는 자리다. 유담은 그 자리에서 청담의 풍속을 다스리는 한편, 사람을 가려 쓰는 안목으로 이름났다. 〈정사〉편에 그가 단양윤으로서 한 일을 짧게 적은 자리가 남아 있다. 그러나 그는 큰 정치 무대에 오래 머물지 못했다. 영화(永和) 3년(347년) 무렵, 서른일곱의 한창 나이에 병으로 죽었다.\n\n이른 죽음이 곧 그의 한 자리를 더 무겁게 만들었다. <em>왕몽(王濛)</em>과 더불어 그는 동진 중기 청담의 두 봉우리로 일컬어졌고, 두 사람이 잇따라 일찍 세상을 뜨자 <em>청언(淸言)의 자리가 비었다</em>는 탄식이 한 시대를 덮었다. <em>손작</em>·<em>허순</em>·<em>왕희지</em>가 그를 회상하는 자리가 〈상서〉편 곳곳에 남는다. 환온이 권력을 손에 쥐고도 끝내 찬위에 이르지 못한 한 사상적 견제가, 죽은 유담의 한 마디에서 비롯되었다는 말까지 후대에 나왔다.\n\n『세설신어』에서 유담은 〈언어〉·〈정사〉·〈문학〉·〈방정〉·〈품조〉·〈상예〉·〈배조〉·〈경저〉편 등 곳곳에 등장한다. 짧은 삶이었으나 그의 한 마디 한 마디가 한 시대의 척도가 되었으니, 동진 청담의 한낮에 가장 먼저 떠올랐다가 가장 먼저 진 별이 곧 유진장이다.", "storyCount": 58}, {"id": "person.王導", "type": "person", "han": "王導", "ko": "왕도", "sub": "무홍(茂弘) · 276~339", "title": "동진 건국의 으뜸 공신", "short": "낭야 왕씨의 영수. 사마예(司馬睿)를 보좌해 강좌 정권을 안정시키니, 사람들이 \"왕씨와 사마씨가 천하를 함께한다(王與馬, 共天下)\"라 일컬음. 三朝의 승상으로 동진 초기 정국을 다스림. 사촌형 왕돈의 반란에 대해서도 종묘의 안위를 우선해 처신, 죽음을 무릅쓰고 충절을 지킴.", "long": "王導는 자가 무홍(茂弘)이다. 낭야 왕씨로, 사촌형 <em>왕연</em>과 사촌형 <em>왕돈</em>과 더불어 한 시대를 함께 산 사람이다. 그는 서진 영가(永嘉) 연간부터 이미 동남쪽 강동(江東)에 자리 잡고 있던 사마예(司馬睿, 후일 元帝)를 보좌하기 시작했다. 사마예가 아직 낭야왕(琅琊王)에 봉해져 건강(建康)에 진수하고 있을 때부터의 인연이다. 311년 영가의 난 이후 북방의 사대부들이 대거 강을 건너 남도해 오자, 왕도는 사마예를 옹립할 정략의 한가운데 섰다.\n\n가장 결정적인 일화가 <em>상사일(上巳日)의 가마 행렬</em>이다. 강좌의 토착 사대부들이 사마예를 황실의 후예로 인정하지 않고 거리를 두자, 왕도가 명을 내려 그날 음력 삼월 삼일, 사마예를 화려한 가마에 태우고 자신과 왕돈을 비롯한 북방의 명사들이 모두 말을 타고 호위하며 강을 따라 행진하게 했다. 강좌의 사대부들 — 특히 <em>고영(顧榮)</em>과 <em>기첨(紀瞻)</em> — 이 이 위엄에 압도되어 길가에 엎드려 절했다. 그날부터 강좌의 인심이 사마예에게 돌아섰다. 곧이어 왕도는 강좌의 일등 명문 <em>고씨</em>와 적극적으로 통혼하고, 남방의 의관 사대부에게 관직과 토지를 분배했다. <em>교군(僑郡)</em>이라는 특수 행정단위를 두어 의관남도해 온 북방 사대부들의 호적과 신분을 보장한 것도 그의 정략이다.\n\n이 모든 정략으로 동진은 자리를 잡았다. 강좌에 <em>왕씨와 사마씨가 천하를 함께 한다(王與馬, 共天下)</em>는 말이 돌았다. 즉위식에서 사마예가 왕도에게 함께 옥좌에 올라 자리를 나누어 받으라 청하니 왕도가 굳이 사양했다는 일화 — 이것이 동진의 권력 구조를 단적으로 보여 준다. 황제의 자리는 사마씨에게, 그러나 그 자리를 떠받치는 실질의 정사는 낭야 왕씨에게 있었다.\n\n그러나 평화는 길지 않았다. 사촌형 <em>왕돈</em>이 형주에서 군권을 쥐고 점차 야망을 키우자 사마예가 그를 견제했고, 왕돈은 322년 군을 일으켜 건강을 함락했다. <em>왕돈의 난</em>이다. 이 위기에서 왕도가 보인 처신이 그의 인격을 가장 분명히 드러냈다. 왕돈이 거사하자 왕도는 종족 수십 명을 거느리고 매일 아침 궐문에 엎드려 처벌을 자청했다. 황제와 종묘에 대한 충절을 가문의 사사로움보다 앞세운 것이다. 사촌형의 거사를 묵인하지도 않고, 그렇다고 가문을 무너뜨리지도 않은 미묘한 균형이었다.\n\n그러나 이 자리에서 또 한 비극이 일어났다. <em>주의(周顗)</em>의 죽음이다. 주의가 궐을 지나며 왕도의 청을 못 들은 척했지만, 안에 들어가서는 황제에게 강력히 상소해 왕도 일족을 구명했다. 왕도는 이를 모르고 주의를 원망했다. 왕돈이 도성에 들어와 <em>주의 같은 자를 어찌할까</em> 물었을 때 왕도의 침묵이 그의 죽음으로 이어졌다. 후일 진상을 알고 통곡한 <em>내가 백인을 죽인 것은 아니나 백인은 나로 인해 죽었다(吾雖不殺伯仁, 伯仁由我而死)</em>는 그 후 천 년을 사람의 입에 오른 명언이 되었다.\n\n왕돈의 난이 평정되고도 왕도는 정사의 중심에 있었다. 명제·성제 두 황제의 보정 대신이었고, 339년 죽을 때까지 강좌의 한가운데였다. 만년에는 청담에도 깊이 들어가, 그가 <em>해서(海西, 즉 海西公 사마혁)</em>에게 <em>과오는 잊고 좋은 것만 기억하라</em> 권한 일화나, 손님과 청담을 나누다 <em>내가 아직 환원(桓苑) 같은 사람을 잡아낼 만한 그릇은 못 되네</em> 자조한 일화가 〈언어〉편에 전한다. 정치와 청담, 종묘와 가문, 충절과 인정을 한 몸에 안은 그는 동진 명사 문화의 한 전형이다.\n\n『세설신어』에서는 〈덕행〉·〈언어〉·〈정사〉·〈방정〉·〈아량〉·〈규잠〉·〈첩오〉·〈숙혜〉·〈호상〉·〈상예〉·〈품조〉 등 거의 모든 편에 등장한다.", "storyCount": 34}, {"id": "person.支遁", "type": "person", "han": "支遁", "ko": "지도림", "sub": "도림(道林) · 314~366", "title": "동진의 고승, 청담의 명사", "short": "임공(林公)·지공(支公)으로도 불림. 청담과 노장·반야학에 두루 정통하여 사대부와 깊이 교유. 학을 사랑하여 풀어 날려보낸 일화, 말을 기른 까닭을 묻자 \"그 神駿함을 사랑할 따름\"이라 답한 일화로 유명. 즉색종(卽色宗)의 종장이며, 사안·왕희지와 막역.", "long": "支遁은 자가 도림(道林)이며, 사람들이 임공(林公) 혹은 지공(支公)이라 불렀다. 본디 진류(陳留) 사람으로, 일설에는 하동(河東) 임려(林慮) 사람이라 한다. 어려서 출가하여 불경을 익혔고, 자라서는 노장(老莊)에도 두루 통했다. 동진(東晉) 일대의 명승(名僧)이자 청담(淸談)의 한 영수로, <em>현학(玄學)</em>과 <em>불교</em>의 두 강이 한자리에서 만난 인물이다.\n\n지둔이 살던 동진 중기는 인도에서 들어온 <em>반야학(般若學)</em>이 막 <em>격의불교(格義佛敎)</em>의 형태로 사대부의 청담에 스미던 때였다. <em>공(空)</em>을 <em>무(無)</em>로, <em>진여</em>를 <em>도</em>로 옮겨 가르치는 그 자리에 지둔이 있었다. 그는 <em>즉색종(卽色宗)</em>의 종장으로 일컬어진다. <em>색(色) 그 자체가 곧 공(空)이며, 색을 떠나 따로 공을 구하지 않는다</em>는 한 명제를 세워, <em>본무(本無)</em>를 주장하던 다른 갈래들과 갈렸다. 노장의 <em>체용(體用)</em> 사유를 빌려 반야의 <em>空</em>을 푼 한 정점이 곧 그의 즉색의(卽色義)였다.\n\n『장자(莊子)』 「소요유(逍遙遊)」를 다시 읽은 일화가 가장 널리 전한다. 그때까지 <em>향수</em>와 <em>곽상</em>의 주(注)가 표준이었다. <em>큰 새는 크게 날고 작은 새는 작게 나니, 각각 그 본성에 자족하면 그것이 곧 소요</em>라는 것이 곽상의 풀이였다. 지둔이 백마사(白馬寺)에서 이를 듣고 <em>자족이 어찌 소요이겠는가, 욕망에 매여 있다면 자족도 굴레다</em>라며 새 풀이를 내었다. 좌중이 크게 놀라 <em>지리(支理)</em>라 일컬었고, 이후 사대부들은 곽상의 주를 버리고 지둔의 풀이를 따랐다 한다. 〈문학〉편의 한 절정이다.\n\n청담의 자리에서 지둔의 풍모는 유난히 빛났다. <em>왕몽</em>은 그를 두고 <em>조화(造化)의 정수가 그 한 사람에 모였다</em> 평했고, <em>손작</em>은 그를 <em>법사(法師)</em>의 자리에 두고 한 시대의 명사들과 나란히 품제했다. 옥주미(玉麈尾)를 들고 명리(名理)를 가르는 자리에서 그는 승복을 걸친 채로 <em>왕희지</em>·<em>허순</em>·<em>사안</em>과 갈마들며 주(主)와 객(客)을 오갔다. 회계(會稽)의 산음(山陰)·섬현(剡縣) 일대가 그 자리의 무대였다.\n\n<em>왕희지</em>와의 만남이 특히 유명하다. 처음에 왕희지는 <em>한낱 중이 무엇을 알겠는가</em> 하고 만나기를 꺼렸다. 어쩌다 한자리에 앉아 지둔이 「소요유」를 풀어내자 왕희지가 옷자락을 여미고 자리에서 일어나 떠나지 못하더라 한다. 그 뒤로 두 사람은 막역해졌다. <em>사안</em> 또한 그를 깊이 아껴, <em>임공과 한자리에 앉으면 사람의 흉금이 절로 맑아진다</em> 하였다.\n\n학과 말의 일화가 그의 인격을 가장 잘 드러낸다. 어떤 사람이 학 한 쌍을 선물했다. 지둔이 한동안 길렀으나, 날개가 자라자 새의 본성이 답답해함을 보고 <em>하늘을 나는 것이 어찌 사람의 뜰에 갇혀 있겠는가</em> 하며 풀어 날려보냈다. 또 늘 좋은 말을 곁에 두고 길렀는데, 어떤 이가 <em>승려가 어찌 말을 기르느냐</em> 비웃자, 지둔이 <em>내 그 신준(神駿)함을 사랑할 따름이다</em> 답했다. 학을 풀고 말을 사랑한 한 자리에 그의 <em>즉색</em>의 사유가 함께 있다. 색에 매이지도 않고 색을 떠나지도 않는다.\n\n만년에 그는 섬현 앙산(仰山)에 머물다 도성으로 불려 들어가 효무제 앞에서 강론하기도 했다. 다시 산으로 돌아가 366년 53세로 입적했다. 그가 떠나자 <em>사안</em>이 <em>임공이 가 버리니 더불어 말할 사람이 없다</em> 탄식했다 한다.\n\n『세설신어』에서 지둔은 〈언어〉·〈문학〉·〈품조〉·〈상예〉·〈서일〉·〈경저〉 등 여러 편에 거듭 등장한다. 그가 옥주미를 들었을 때 한 시대의 현학과 불교가 한자리에서 만났고, 그가 학을 풀어 날렸을 때 그 시대의 <em>명사(名士)</em>가 한 승려의 모습으로도 설 수 있음이 증명되었다.", "storyCount": 32}, {"id": "person.簡文帝", "type": "person", "han": "簡文帝", "ko": "간문제", "sub": "도만(道萬) · 320~372", "title": "동진의 풍류 황제", "short": "휘 욱(昱). 환온이 옹립한 풍류제왕으로, 본래 회계왕(會稽王)이었다가 즉위. 청담을 즐기고 명사들과 어울려 그 자신이 한 사람의 名士. 황제로서의 권위는 미약했으나 인격과 식견은 깊은 존경을 받음. 환온이 위협하자 \"진실로 종묘를 잇는 자라면 어찌 두려워하랴\" 하며 의연.", "long": "簡文帝의 휘는 욱(昱), 자는 도만(道萬)이다. <em>원제(元帝) 사마예</em>의 막내아들로, 형 <em>명제</em>·<em>성제</em>·<em>강제</em>·<em>목제</em>·<em>애제</em>·<em>폐제</em>의 뒤를 이어 동진의 여덟째 황제 자리에 올랐다. 즉위 전 오래도록 <em>회계왕(會稽王)</em>에 봉해져 있어, 사람들이 그를 <em>회계왕</em>이라 불렀다. 그가 즉위한 해는 372년, 향년 53세였으나 재위는 채 일 년이 못 되었다.\n\n본디 그는 황제의 그릇이 아니라 <em>명사(名士)</em>의 그릇이었다. 어려서부터 <em>현학(玄學)</em>에 깊이 들어가, 자라서는 <em>왕몽</em>·<em>유담(劉惔)</em>·<em>은호</em>·<em>손작</em>·<em>허순</em>·<em>지도림</em>과 어울려 <em>청담</em>의 한 자리를 이끌었다. 회계왕의 저택은 곧 동진 중기 청담의 한 본거지였다. <em>유담</em>이 그를 두고 <em>맑고 통하여 능히 사람과 더불어 명리를 가른다</em> 평했고, <em>손작</em>은 <em>회계왕의 풍신은 옥과 같다</em>고 했다 한다. 〈언어〉·〈문학〉·〈품조〉편의 곳곳에 그가 <em>주(主)</em>가 되어 옥주미를 들고 한 명제를 세우는 장면이 흩어져 있다.\n\n특히 <em>지도림</em>과의 교유가 깊었다. 지도림이 <em>반야</em>를 노장의 옷으로 풀어 가르치면, 회계왕이 응답하며 자리를 함께 짰다. 한 번은 지도림이 회계왕의 저택을 떠난 뒤 그가 <em>지공이 가고 나니 다시는 더불어 말할 사람이 없다</em> 탄식했다 전한다. 황제가 된 뒤에도 그 풍속은 변하지 않아, 정사 틈틈이 지도림을 궁중에 청해 <em>격의불교(格義佛敎)</em>의 자리를 폈다.\n\n그의 즉위는 <em>환온(桓溫)</em>의 손에 의한 것이었다. 환온이 <em>폐제(廢帝)</em> 사마혁을 폐위하고, 황실의 어른 가운데 가장 무게 있던 회계왕을 옹립했다. 환온의 속셈은 회계왕을 거쳐 자신의 <em>찬위(簒位)</em>로 가는 한 단계를 두려는 것이었다. 그러므로 간문제의 황제 자리는 처음부터 환온의 그림자 아래 놓여 있었다.\n\n그러나 간문제는 약하지 않았다. 환온이 군세를 끌고 도성에 가까이 들어와 위협의 뜻을 비치자, 좌우가 모두 떨었으나 그는 태연히 <em>진실로 종묘를 잇는 자라면 어찌 두려워하랴</em> 했다. 또 환온이 <em>구석(九錫)</em>을 받으려는 뜻을 비쳤을 때도, 그 조서를 <em>사안</em>과 <em>왕탄지</em>에게 맡겨 자꾸 손질하게 해 끝내 내려보내지 않았다. <em>황제의 권위</em>가 거의 남지 않은 자리에서 <em>명사의 식견</em>으로 환온을 막은 셈이다.\n\n재위 여덟 달 만에 병이 들었다. 임종 자리에서 환온에게 <em>그대가 능히 보좌하라, 능히 못하겠거든 스스로 취하라</em>는 유조를 내리려 했으나, <em>왕탄지</em>가 그 조서를 찢고 다시 쓰게 해 <em>제갈량과 왕도의 고사를 따르라</em>는 말로 바꾸어 보냈다 한다. 환온의 찬위를 가까스로 막은 한 자리다. 372년 7월에 죽으니, 묘호는 태종(太宗), 시호는 간문(簡文)이다.\n\n『세설신어』에서 그는 황제로보다 <em>한 사람의 명사</em>로 더 자주 등장한다. 〈언어〉·〈문학〉·〈방정〉·〈아량〉·〈품조〉·〈서일〉편이 그의 무대다. 동진 황실 가운데 가장 <em>현학</em>의 깊이를 지닌 한 사람이며, 그 자신이 곧 청담의 한 풍경이었다. 황제의 옷을 입은 명사 — 序說 10章이 그를 부르는 자리가 거기다.", "storyCount": 38}, {"id": "person.王濛", "type": "person", "han": "王濛", "ko": "왕몽", "sub": "중조(仲祖) · 309~347", "title": "동진 초의 풍류 명사", "short": "사도좌장사(司徒左長史)를 지내어 왕장사(王長史)로 불림. 용모가 빼어나고 청담에 능함. 빈천하면서도 거문고와 시를 즐긴 풍류 명사. 사위가 사안의 동생 사만(謝萬). 일찍 죽으니 유담이 그의 영전에서 슬피 울고는 \"인보(人寶)가 갔다\"고 함.", "long": "王濛은 자가 중조(仲祖)다. 태원(太原) 진양(晉陽)의 왕씨 출신으로, <em>낭야 왕씨</em>와는 다른 갈래의 <em>태원 왕씨</em> 한 사람이다. 동진 중기 <em>청담</em>의 자리에서 가장 빛난 명사 가운데 하나이며, 사도좌장사(司徒左長史)를 지내어 흔히 <em>왕장사(王長史)</em>로 불린다.\n\n왕몽의 첫째 표지는 <em>용모</em>다. 그가 거리에 나서면 행인이 길을 멈추고 보았다 한다. 한 번은 저자에서 <em>모자</em>를 하나 사려 했는데, 가게 주인이 그의 풍모를 보고 값을 받지 않고 그저 드리려 했다는 일화가 〈용지(容止)〉편에 전한다. 그 자신도 자기 용모를 자부해, 거울을 들여다보며 <em>우리 아버지가 어찌 이런 아들을 낳으셨던가</em> 농담했다 한다. 위진 명사가 용모를 인격의 한 자리로 여긴 풍속의 한 전형이다.\n\n청담에서도 그는 한 자리의 영수였다. <em>유담(劉惔)</em>과 한 짝을 이루어 <em>유왕(劉王)</em>으로 일컬어졌다. 둘이 한자리에 모이면 <em>명리(名理)</em>의 한 토막을 놓고 하루를 보냈고, 다른 이가 끼어들 틈이 없었다 한다. 왕몽이 <em>옥주미</em>를 들고 한 명제를 세우면 유담이 그 자리에서 응답하고, 다시 왕몽이 새 자리를 들어 보이는 그 갈마듦이 동진 중기 청담의 한 정점이었다. 〈문학〉편이 그 자리들의 한 장면을 거듭 옮긴다.\n\n그러나 그의 생활은 <em>빈천(貧賤)</em>했다. 벼슬이 높지 않고 가산이 두텁지 않아, 옷이 해지고 끼니가 거른 날이 잦았다. 그래도 그는 거문고를 안고 시를 읊으며 태연했다. 한 번은 <em>환온</em>이 그의 집을 찾았다가 살림의 빈한함에 놀라 말을 잇지 못했는데, 왕몽은 오히려 거문고 한 가락을 타 손님을 맞았다 한다. 빈천 속에서도 풍류를 잃지 않은 것이 곧 그의 명사 됨이다.\n\n사위는 <em>사안</em>의 동생 <em>사만(謝萬)</em>이다. 진군 사씨가 일류 문벌로 올라서기 직전, 태원 왕씨와의 이 혼인은 두 가문을 청담의 자리에서 한 자리로 묶었다. 왕몽의 자리에 <em>사안</em>·<em>유담</em>·<em>손작</em>이 드나들었고, 그 한낮의 풍경이 곧 동진 중기 명사 문화의 한 단면이다.\n\n그는 일찍 죽었다. 347년, 향년 서른아홉이었다. 임종 직전 그는 자기가 평생 들고 다닌 <em>옥주미</em>를 어루만지며 <em>이것이 다 무엇이었던가</em> 탄식했다 한다. 한 시대 청담의 풍속이 그 한 도구에 응축된 자리다. 유담이 영전에 찾아와 한참을 통곡하고는 <em>인보(人寶)가 갔다</em> 한마디 남겼다. 동진 중기 청담의 한 별이 진 자리.\n\n『세설신어』에서 그는 〈언어〉·〈문학〉·〈방정〉·〈아량〉·〈식감〉·〈상예〉·〈품조〉·〈용지〉·〈상서(傷逝)〉 등 여러 편에 거듭 모습을 보인다. 특히 〈용지〉의 빛과 〈상서〉의 그늘에 함께 새겨진 그 한 사람이 곧 왕장사다.", "storyCount": 18}, {"id": "person.庾亮", "type": "person", "han": "庾亮", "ko": "유량", "sub": "원규(元規) · 289~340", "title": "동진 명제 시기의 권신", "short": "명제(明帝)의 황후의 오빠로 외척. 명제 사후 조정을 농단하여 그의 강경책이 소준(蘇峻)의 난을 부름. 풍채가 헌앙(軒昂)하여 \"달이 구름을 헤치고 나온 듯\"이라는 평을 들음. 후일 형주자사로 한 지방을 거점 삼아 활약. 휘하의 노복이 그를 \"군자의 풍이 있다\" 평.", "long": "庾亮은 자가 원규(元規)다. 영천(潁川) 언릉(鄢陵)의 유씨 출신이다. 영천 유씨는 <em>왕씨</em>·<em>사씨</em>와 더불어 동진 일류의 문벌로 꼽히지만, 그 한 정점에 이 사람이 있다. 누이가 <em>명제(明帝)</em>의 황후가 되었고, 그 외척의 자리가 그의 정치적 운명을 결정했다.\n\n용모는 그의 한 자산이었다. 키가 크고 풍채가 헌앙(軒昂)해, 동시대 사람들이 <em>유원규를 보면 달이 구름을 헤치고 나오는 듯하다</em>고 했다. 〈용지〉편의 한 자리다. 그의 위엄이 너무 압도적이어서 <em>왕도</em>조차 그를 보고 부채로 얼굴을 가렸다 한다. 명사의 자리에서 그가 옥주미를 들면 좌중이 한 박자 늦게 응답했다. 그러나 이 풍채가 곧 그의 정치적 약점이 된다. <em>외척의 미모와 위엄</em>만큼 동진 사대부의 경계심을 부르는 조합이 없었다.\n\n청담의 자리에서도 그는 한 자리를 차지했다. <em>왕도</em>·<em>은호</em>·<em>온교</em>와 더불어 <em>명리(名理)</em>를 가르는 토론에 자주 끼었으며, 『장자』와 『노자』에 대한 그의 견해가 한 자리의 빛을 이뤘다 전한다. <em>명교(名敎)와 자연(自然)</em>의 한가운데서, 그는 명교의 쪽에 가까운 사람이었다. 그 점이 <em>자연</em>에 기울어 있던 당시 명사들의 풍속과 미묘한 거리를 만들었다.\n\n명제가 일찍 죽고(325) 성제(成帝)가 어린 나이에 즉위하자, 누이인 <em>명목황후(明穆皇后)</em>가 임조청정하고 유량이 <em>중서령</em>으로 정사를 장악했다. 이때부터 그의 정치적 무리(無理)가 시작된다. 그는 <em>명교</em>의 엄정함을 정사에 그대로 들이대, 종실과 외방의 장수들을 강하게 다스리려 했다. 특히 역양(歷陽)의 <em>소준(蘇峻)</em>을 의심해, 군권을 거두려 그를 도성으로 부르려 했다. 좌중이 모두 <em>소준은 거친 사람이라 부르면 반드시 반(反)한다</em> 만류했으나 유량이 듣지 않았다.\n\n과연 327년 <em>소준의 난</em>이 터졌다. 소준이 <em>조약(祖約)</em>과 손잡고 도성으로 쳐들어와 궁을 불태우고 어린 성제를 잡았다. 유량은 도성을 빠져나가 <em>온교(溫嶠)</em>·<em>도간(陶侃)</em>에게 몸을 의탁했다. 도간은 본래 유량을 미워하던 사람이었다. <em>천하의 화가 그대 한 사람에게서 났는데, 어찌 살아 나를 보러 왔는가</em> 면전에 쏘아붙였다 한다. 유량은 한마디 변명도 하지 않고 깊이 사죄했다. 도간이 그 <em>아량</em>에 마음을 풀어 함께 소준을 토벌했다. 난은 평정되었으나, 유량의 정치적 권위는 그 한 번에 무너졌다.\n\n도성으로 돌아온 그는 스스로 자리를 비키고 <em>예주자사</em>로 나갔다가 다시 <em>형주자사</em>로 옮겨, 무창(武昌)을 거점으로 한 지방을 다스렸다. 형주는 장강 중류의 요충이라 동진의 절반의 무게가 거기 있었다. 도성의 <em>왕도</em>가 그를 견제하고, 그가 도성의 왕도를 견제하는 <em>형주와 양주의 양립</em>이 이 무렵부터 동진 정치의 한 구도를 이뤘다. 후일의 <em>환온</em>·<em>환현</em>의 형주 거점도 그 연장에 있다.\n\n형주의 유량은 도성의 유량과 달랐다. 그는 막부의 사람들에게 너그러웠고, 휘하 사졸까지 한결같이 다스렸다. 한 번은 그의 노복(奴僕)이 다른 자리에서 그를 두고 <em>우리 주인은 군자의 풍(風)이 있다</em>고 평했다 한다. 노복에게서 그런 말을 듣는 주인이 흔치 않다. 도성에서의 그가 <em>명교</em>의 칼날을 휘둘렀다면, 형주에서의 그는 <em>명교</em>를 자기 몸에 새겨 다스리는 쪽으로 갔다.\n\n말년에는 북벌을 꿈꿨다. 후조(後趙)의 <em>석호(石虎)</em>가 흔들리는 틈을 보아 군을 일으키려 했으나, 부장 <em>모보(毛寶)</em>가 패하고 형세가 어그러져 뜻을 이루지 못했다. 그 좌절의 끝에 병이 들어 무창에서 죽었다(340). 향년 52세였다. 시호는 <em>문강(文康)</em>이다.\n\n『세설신어』에서 그는 〈용지〉의 <em>달이 구름을 헤치고 나온 듯</em>, 〈방정〉의 <em>도간 앞의 사죄</em>, 〈아량〉의 한 자락, 〈언어〉·〈품조〉의 청담 자리에 두루 등장한다. 외척의 위엄으로 일어났다 외척의 무리(無理)로 무너지고, 한 지방의 다스림으로 다시 일어선 그의 곡선이 곧 동진 초기 정치의 한 곡선이다. 그가 <em>왕도</em>와 더불어 떠받친 그 한낮이 지나간 뒤, 동진의 무대는 <em>환온</em>과 <em>사안</em>에게 넘어간다.", "storyCount": 23}, {"id": "person.王敦", "type": "person", "han": "王敦", "ko": "왕돈", "sub": "처중(處仲) · 266~324", "title": "동진 초의 대장군, 반란의 주역", "short": "왕도의 사촌형. 동진 건국 공신이자 대장군. 후일 권력을 다투어 두 차례 반란(王敦之亂)을 일으킴. 호방·강맹하나 의심 많고 잔혹. 술 마시면 조조의 「귀수수(龜雖壽)」를 唾壺를 두드리며 노래, 손에 든 唾壺가 모두 깨짐. 결국 병중에 패해 죽음.", "long": "王敦은 자가 처중(處仲)이다. 낭야(琅琊) 임기(臨沂) 왕씨로, <em>왕도(王導)</em>의 사촌형이다. 한 가문이 동진의 한 시대를 열었다는 <em>왕여마(王與馬), 공천하(共天下)</em>의 그 <em>왕</em>이 곧 왕도와 왕돈 두 사람이다. 그러나 두 사람의 길은 끝내 갈렸다. 왕도가 <em>진중함</em>으로 황실을 떠받친 손이었다면, 왕돈은 <em>강맹함</em>으로 황실을 흔든 손이었다.\n\n젊어서부터 그는 <em>호방</em>하기로 이름났다. <em>석숭(石崇)</em>의 <em>금곡원</em>에서 열린 호화로운 잔치에서, 미인이 권한 술을 객이 마시지 않으면 그 미인의 목을 베는 잔혹한 놀이가 있었다. 다른 객들은 차마 마시지 못해 죄 없는 미인을 죽게 할까 두려워 억지로 마셨으나, 왕돈은 끝내 술을 받지 않아 미인 셋이 차례로 목이 베였다 한다. 곁에 있던 <em>왕도</em>가 <em>어찌 이리도 모진가</em> 나무라자 왕돈이 <em>제 집 사람을 제가 죽이는데 그대가 무슨 상관인가</em> 답했다. 〈태치〉편에 전하는 이 일화가 그의 한 단면이다.\n\n서진 말의 어지러움 속에서 그는 일찍이 <em>사마예(司馬睿)</em>를 따라 강동으로 건너왔다. <em>영가의 난</em> 뒤 강남의 호족을 누르고 황실을 세우는 일에서, 왕도가 안의 정사를 맡고 왕돈이 밖의 군사를 맡았다. <em>왕여마, 공천하</em>라는 말이 곧 이 분담의 정확한 표현이다. 동진이 세워질 무렵 그는 이미 <em>대장군(大將軍)</em>에 <em>형주자사</em>로 장강 중류의 군권을 쥐고 있었다. 강동의 무게가 그의 한 손에 실린 셈이다.\n\n힘이 커지자 의심도 커졌다. <em>원제(元帝)</em>가 그의 세력을 두려워해 <em>유외(劉隗)</em>·<em>조협(刁協)</em>을 곁에 두고 견제하려 하자, 왕돈은 <em>군측의 간신을 친다</em>는 명분으로 군사를 일으켰다(322년). <em>제1차 王敦之亂</em>이다. 무창(武昌)에서 동으로 내려와 건강(建康)을 압박했고, 도성이 떨어졌다. 유외는 도망치고 조협은 죽었다. 원제는 <em>짐의 자리가 그렇게 탐난다면 가져가라</em> 한탄하다 곧 울적하게 죽었다. 그러나 왕돈은 끝내 황제 자리를 빼앗지는 않고 무창으로 물러났다. 그 사이에서 <em>왕도</em>가 가문을 끌고 궁에 엎드려 사죄해 일족의 도륙을 면하게 한 자리가, 동진 정사의 한 분기점이다.\n\n권력의 정점에서 그는 자주 술을 마시고 노래했다. 취하면 <em>조조(曹操)</em>의 「귀수수(龜雖壽)」 — <em>늙은 준마는 마구간에 매여도 뜻은 천리에 있다(老驥伏櫪, 志在千里)</em> — 를 <em>타호(唾壺)</em>를 두드리며 읊었다. 한 곡이 끝날 무렵에는 손에 든 타호의 가장자리가 모두 깨져 있었다 한다. 〈호상〉편의 그 한 장면이 그의 모든 것을 말한다. 늙어 가는 자기 시간이 안타까웠고, 천하의 흐름이 자기 손에서 빠져나가는 것을 견디지 못했다. 호방한 듯하나 그 안은 의심과 조급함으로 가득했다.\n\n<em>명제(明帝)</em>가 즉위하자 그는 다시 군사를 일으켰다(324년). <em>제2차 王敦之亂</em>이다. 그러나 이때 그는 이미 병이 깊었다. 양자 <em>왕응(王應)</em>과 형 <em>왕함(王含)</em>에게 군을 맡겨 건강으로 보냈으나, <em>온교(溫嶠)</em>·<em>유량(庾亮)</em>·<em>도간(陶侃)</em>의 응전 앞에 무너졌다. 병상의 왕돈이 그 패보를 듣고 일어서려다 다시 쓰러져 죽었다. 향년 59세였다. 사후 그의 시체는 끌어내어져 욕보여졌고, 머리가 저자에 걸렸다. 그러나 <em>왕도</em> 한 가지의 처신으로 낭야 왕씨 본가는 끝내 보전되었다.\n\n『세설신어』에서 그는 〈호상〉·〈태치〉·〈품조〉·〈우회〉·〈규잠〉·〈간오〉편에 두루 등장한다. 타호를 두드리며 「귀수수」를 읊던 그 한 자리만으로도 그는 위진 명사의 한 전형 — <em>호방의 끝에 잔혹이 있고, 강맹의 끝에 반역이 있는</em> 한 인간형 — 으로 남았다. 동진의 한 시대가 <em>왕도</em>의 손으로 세워졌다면, 그 한 시대의 첫 균열이 곧 왕돈의 손에서 났다.", "storyCount": 37}, {"id": "person.殷浩", "type": "person", "han": "殷浩", "ko": "은호", "sub": "심원(深源) · 303~356", "title": "청담의 영수, 환온의 호적수", "short": "중군장군(中軍將軍). 청담의 영수로 환온과 쌍벽을 이룸. 사람들이 두 사람을 두고 우열을 가리기 어렵다 함. 북벌에 실패해 폐서인되어, 손가락으로 허공에 \"돌돌괴사(咄咄怪事)\" 네 글자를 종일 쓰며 한탄. 환온이 다시 부르고자 했으나 회답이 빈 봉투로 가, 끝내 부름을 받지 못함.", "long": "殷浩는 자가 심원(深源)이다. 진군(陳郡) 장평(長平) 사람으로, <em>진군 은씨(陳郡殷氏)</em>의 한 갈래에서 났다. 아버지 <em>은선(殷羨)</em>이 예장태수를 지낸 명문의 자손이다. 어려서부터 <em>현언(玄言)</em>에 능해 약관에 이미 한 자리의 영수로 일컬어졌고, 『노자』와 『주역』에 정통해 <em>삼현(三玄)</em>의 명리(名理)를 가르는 자리마다 그의 옥주미가 있었다.\n\n그가 한창 이름을 떨치던 무렵, 동진의 청담은 정점에 있었다. <em>왕도</em>가 떠난 자리를 잇는 한 세대의 영수로 사람들이 그를 꼽았다. <em>유량</em>이 그를 보고 <em>심원의 청담은 능히 한 시대를 끌고 갈 만하다</em> 평했다 한다. <em>왕몽(王濛)</em>·<em>유담(劉惔)</em>과 어울려 명리를 따져 묻는 자리가 〈문학〉편의 한 정경이 되었으며, 특히 유담은 은호와의 청담을 마치고 <em>심원의 말은 천 길 깊이의 못 같다</em> 탄복했다 전한다.\n\n그러나 그는 십수 년을 산림에 누워 출사하지 않았다. <em>조부의 묘 아래에 은거한다</em>는 명분이었으나, 실은 시대를 가늠하는 자기 자리의 신중함이었다. 사람들이 그를 일컬어 <em>은호가 나오면 천하의 일이 어떻게 될 것인가, 은호가 나오지 않으면 백성을 어찌할 것인가</em>라 했다 한다. 이 말은 뒷날 <em>사안</em>에게도 그대로 옮겨 가는데, 동진 일대의 <em>은자(隱者) 명사</em>의 한 전형이 곧 은호에게서 비롯했다.\n\n그가 비로소 나온 것은 <em>환온(桓溫)</em>이 형주에서 일어나 군권을 거머쥐기 시작한 무렵이다. 조정이 환온을 견제할 한 사람을 찾아 은호를 <em>건무장군</em>에, 다시 <em>중군장군</em>에 앉혔다. 청담의 영수를 정사의 한가운데에 세워 무인의 영수에 맞세운 것이다. 이때부터 사람들이 두 사람을 두고 <em>은과 환의 우열을 가리기 어렵다</em> 했다. 환온 스스로도 어린 날 은호와 죽마(竹馬)를 함께 탔던 일을 들어 <em>내가 죽마를 버리면 심원이 주워 탔다, 그러므로 응당 내 아래에 있어야 한다</em> 했다는 일화가 〈품조〉편에 전한다. 자존(自尊)의 한 농(弄)이 곧 두 사람의 평생을 가른 자리다.\n\n문제는 그가 청담의 영수였지 군려(軍旅)의 영수가 아니었다는 데 있었다. 조정이 그에게 <em>북벌</em>을 맡겼다. 영화(永和) 9년(353), 그는 <em>허창</em>·<em>낙양</em>을 회복하겠다며 북상했으나, 강족의 <em>요양(姚襄)</em>에게 배반당해 군이 무너졌다. 다음 해 다시 출진했으나 또 패했다. 환온이 이 틈을 놓치지 않고 상소해 그의 죄를 물었고, 은호는 <em>폐서인</em>되어 <em>동양(東陽)</em>으로 쫓겨났다. 청담의 옥주미가 한 번의 군사적 실패로 깨끗이 부러진 것이다.\n\n동양에서의 그의 모습이 〈출면(黜免)〉편의 백미다. 그는 종일 손가락으로 허공에 글자를 썼다. 곁의 사람이 가만히 보니 <em>咄咄怪事(돌돌괴사)</em> 네 글자였다. <em>허, 이 무슨 괴이한 일인가.</em> 한탄도 아니고 욕도 아닌, 한 명사의 마지막 자존이 그 네 글자에 응축되어 있었다. 그는 그 외에는 일절 자기 처지를 말하지 않았다.\n\n만년에 환온이 마음을 돌려 그를 다시 부르려 했다. <em>상서령</em>의 자리를 비워 두고 사신을 보냈다. 은호는 회답의 글을 정성껏 써 봉투에 넣었다. 그런데 봉투를 풀고 다시 닫기를 수십 번 하다, 끝내 빈 봉투를 보내고 말았다. 환온이 빈 봉투를 받아 들고 <em>심원은 끝났다</em> 탄식했다 한다. 그 빈 봉투 한 장이 곧 한 시대 청담 명사의 마지막 답이었다. 그 이듬해(356) 그는 동양에서 죽었다. 향년 54세였다.\n\n『세설신어』에서 은호는 〈문학〉·〈품조〉·〈배조〉·〈경저〉·〈출면〉편을 두루 채운다. 청담의 한 정점과 정사의 한 좌절을 한 인격에 함께 안은 사람, 그러므로 <em>환온</em>의 그림자가 가장 짙게 드리운 사람. 동진의 한낮이 <em>사안</em>에게 오기 전, 그 한낮의 들머리에서 가장 긴 그림자를 드리우고 사라진 명사가 곧 은호다.", "storyCount": 35}, {"id": "person.王衍", "type": "person", "han": "王衍", "ko": "왕연", "sub": "이보(夷甫) · 256~311", "title": "서진의 태위, 청담의 으뜸", "short": "옥주미(玉麈尾)를 들고 명리(名理)를 논하니 듣는 이가 황홀. 미모와 청담의 으뜸으로 일컬어짐. 평생 \"전(錢)\"이라는 글자를 입에 올리지 않을 만큼 청고함을 자처. 영가의 난 중 석륵(石勒)에게 사로잡혀 \"내가 비록 헛된 말로 천하를 그르쳤으나 어찌 처벌받지 않으랴\" 탄식하며 살해됨.", "long": "王衍은 자가 이보(夷甫)다. 낭야(琅琊) 임기(臨沂)의 왕씨 출신으로, <em>왕도</em>의 사촌형이자 <em>왕융</em>의 사촌이다. 그러므로 그는 죽림칠현의 한 사람과 동진 건국의 일등 공신을 모두 형제로 둔 자리에 있었다. 죽림에서 동진까지를 한 가문이 잇는다는 사실의 가장 명료한 예가 곧 그 형제들이다.\n\n어려서부터 빼어났다. 산도가 일곱 살의 그를 보고 <em>어떤 노부인이 이렇게 깨끗한 자식을 낳았는가</em> 감탄했다 한다. 자라서는 <em>옥인(玉人)</em>이라 일컬어지는 미모와 청담의 명민으로 천하에 이름났다. 옥주미(玉麈尾)를 들고 명리를 논할 때, 옥의 빛깔과 그의 손이 구분되지 않을 만큼 살결이 희었다는 일화가 〈용지〉편에 전한다.\n\n성격은 결벽에 가까웠다. 평생 <em>돈(錢)</em>이라는 글자를 입에 올리지 않을 만큼 청고함을 자처해, 한 번은 아내가 잠든 사이 그의 침상 둘레에 동전을 쌓아 두어 그가 일어나 <em>각견물(却見物)</em>만 외치게 했다는 일화도 있다. <em>물건을 치워라</em>는 말로 <em>돈</em>이라는 글자를 끝내 피한 것이다.\n\n청담에서는 <em>口中雌黃</em>이라는 별호를 얻었다. 雌黃은 글자를 지우는 노란 광물인데, 그가 한 번 말한 것을 한 번 더 뒤집어 새 말로 만들고, 다시 뒤집어 또 새 말로 만들기를 거듭한 데서 나온 말이다. 명리의 자리에서 끝없이 자기를 갱신하는 명민함의 표현이지만, 후일 정치의 자리에서는 <em>책임을 지지 않는 변설</em>로 해석되었다.\n\n서진의 권력에서 그는 일찍부터 핵심에 있었다. 태자세마·황문시랑·중서령을 거쳐 태위(太尉)에 올랐다. 당시 태위는 삼공(三公)의 하나로 사실상 정부 수반이었으니, 그가 청담의 영수이자 정계의 영수였던 셈이다. 그러나 정치적 책임을 지는 일을 그는 일관되게 피했다. 八王의 난 가운데서 그는 어느 왕에게도 깊이 가담하지 않으며 자기를 보존했고, 동시에 <em>세 굴(三窟)</em>을 마련해 두기를 도모했다. 사촌동생 <em>왕도</em>를 청주의 군에 보내고, 또 다른 사촌 <em>왕징(王澄)</em>을 형주자사로, 사촌 <em>왕돈(王敦)</em>을 청주에 보내 <em>천하가 어지러우면 어디 한 곳은 살 자리</em>를 만들어 두었던 것이다. 결과적으로 이것이 동진 건국의 토대가 되었지만, 동시대인은 이를 비겁한 처세로 보았다.\n\n311년 <em>영가의 난</em>. 흉노 <em>유총</em>이 낙양을 함락하자 그는 다른 사대부들과 함께 피난길에 올랐다 갈족(羯族) 출신의 <em>석륵(石勒)</em>에게 사로잡혔다. 석륵이 그를 데리고 <em>천하가 어찌하여 이 지경에 이르렀는가</em> 물으니, 왕연이 <em>나는 어려서부터 일에 관여한 적이 없으니 모릅니다</em> 답했다. 또한 <em>공이 천하를 다스리라</em> 권하기까지 했다. 석륵이 노해 <em>이름이 사해에 떨치고 자리가 삼공에 이른 자가 어찌 일에 관여한 적이 없다 하느냐. 천하를 그르친 자가 곧 네가 아니냐</em> 꾸짖고, 그날 밤 군사들에게 담을 무너뜨려 그를 깔려 죽이게 했다.\n\n그가 죽기 전 <em>내가 비록 古人만은 못하나, 어찌 헛된 말로 천하를 그르쳤다 하랴. 그러나 이 지경에 이른 것은 청담의 죄가 아닌가(向若不祖尚浮虛, 戮力以匡天下, 猶可不至今日)</em>라 자책했다 한다. 한 시대 청담의 영수가 마지막에 청담을 자기 입으로 자책한 그 한 마디 — 그것이 곧 서진 명사 문화의 자기 부정이며, 동진이 새 무대에서 정사와 청담을 어떻게 다시 묶을 것인가의 출발점이 되었다.\n\n『세설신어』에서 그는 〈언어〉·〈상예〉·〈품조〉·〈용지〉·〈규잠〉·〈경저〉 등 여러 편에 등장한다.", "storyCount": 29}, {"id": "person.王羲之", "type": "person", "han": "王羲之", "ko": "왕희지", "sub": "일소(逸少) · 303~361", "title": "동진의 서성(書聖)", "short": "우군장군(右軍將軍)을 지내어 왕우군이라 불림. 「난정서(蘭亭序)」를 지어 千古의 명작을 남김. 왕도의 조카뻘이며 사안과 친교. 도교에 깊이 빠짐. 거위를 사랑하여 도사에게 거위를 받기 위해 『도덕경』을 써 주기도. 동상(東床)에서 배를 드러내고 누워 있던 사위가 곧 그.", "long": "王羲之는 자가 일소(逸少)다. 낭야(琅邪) 왕씨, 그 가운데서도 <em>왕도(王導)</em>의 종질에 해당한다. <em>왕광(王曠)</em>의 아들로 태어났으니 의관남도 한가운데서 자란 셈이다. 어려서 말이 늦었으나 자라며 풍골이 빼어났고, <em>왕도</em>가 일찍부터 그를 <em>우리 집안의 천리마</em>로 일컬었다 한다. 우군장군(右軍將軍)·회계내사(會稽內史)를 지내어 후대에 <em>왕우군(王右軍)</em>으로 불린다.\n\n젊어 <em>치감(郗鑒)</em>이 사윗감을 고르러 왕씨 자제들이 모인 자리에 사람을 보냈다. 다른 자제들이 모두 옷매를 가다듬고 단정히 앉았는데, 한 사람만이 동쪽 평상(東床)에 배를 드러내고 누워 떡을 먹고 있었다. 치감이 듣고 <em>바로 그 사람이다</em> 하여 사위로 삼았다. 그가 곧 왕희지다. <em>동상쾌서(東床快壻)</em>의 고사가 이로써 나왔다. 〈아량〉편 한 자리의 백미이며, <em>명사</em>가 어떤 자세로 세상을 대했는가를 한 장면이 다 말해 준다.\n\n벼슬길은 평탄하지도 화려하지도 않았다. <em>유량(庾亮)</em>의 막부에 들었고 뒤에 <em>은호(殷浩)</em>와 한때 가까웠으나, 은호가 북벌을 강행하려 할 때 글을 보내 말렸다. <em>백성의 힘이 다하였는데 또 군사를 일으키면 안에서 무너진다</em>는 요지였다. 은호가 듣지 않고 패한 뒤, 왕희지는 <em>왕술(王述)</em>과의 불화로 회계내사 자리에서 물러났다. 회계 산음(山陰)에 머무르며 다시는 출사하지 않겠다고 부친의 묘 앞에서 맹세했다.\n\n회계의 산수가 그의 한낮이었다. 영화(永和) 9년(353) 삼월 삼짇날, <em>난정(蘭亭)</em>에 <em>사안</em>·<em>손작</em>·<em>지도림</em>·<em>사만</em> 등 마흔한 사람이 모여 <em>유상곡수(流觴曲水)</em>의 자리를 열었다. 잔이 흘러와 멈춘 사람이 시를 짓고, 못 지으면 벌주를 마셨다. 그 자리의 시를 모은 책 머리에 왕희지가 서(序)를 썼다. 「난정서(蘭亭序)」다. <em>세상이 다르고 일이 달라도, 흥회가 이는 까닭은 한가지다(雖世殊事異, 所以興懷, 其致一也)</em>라는 구절에 위진 명사의 인생관이 응축되어 있다. 글의 뜻만이 아니라 글씨가 또한 천고의 절품이라, 후대에 <em>천하제일행서(天下第一行書)</em>로 일컬어진다.\n\n서법의 자리에서 왕희지는 한 시대의 변곡점이다. 한대의 예서(隸書)와 위의 <em>종요(鍾繇)</em>가 다진 해서(楷書)의 흐름을 이어, 행서(行書)와 초서(草書)를 한 인격의 표현 형식으로 끌어올렸다. 글씨가 곧 그 사람이라는 <em>서여기인(書如其人)</em>의 관념이 그에게서 비로소 무르익었다. 아들 <em>왕헌지(王獻之)</em>와 더불어 <em>이왕(二王)</em>으로 일컬어지며, 후대 동아시아 서법의 표준이 된다.\n\n도교(道敎)에 깊이 빠졌다. <em>천사도(天師道)</em>를 받든 가문에서 자라 단약(丹藥)을 복용했고, 도사들과 두루 사귀었다. 산음의 한 도사가 거위를 잘 길렀다. 왕희지가 그 거위를 보고 욕심을 냈는데, 도사가 <em>『도덕경』을 한 본 써 주시면 거위를 모두 드리겠다</em> 했다. 왕희지가 흔쾌히 다 써 주고 거위를 새장째 들고 돌아왔다. 〈서일〉편의 한 자리이며, 그가 무엇을 사랑하고 무엇을 가벼이 여겼는가를 한 장면이 다 보여 준다.\n\n만년에는 <em>사안</em>과 더불어 회계의 산수를 거닐며 <em>우주의 큼과 인생의 짧음</em>을 함께 탄식했다 전한다. 升平 5년(361) 산음에서 죽으니 향년 59세였다. 『세설신어』에서 그는 〈언어〉·〈아량〉·〈품조〉·〈서일〉·〈교예〉·〈상예〉편을 넘나든다. 동진 명사 문화의 한 한낮이 그의 붓끝에 있었다.", "storyCount": 33}, {"id": "person.王戎", "type": "person", "han": "王戎", "ko": "왕융", "sub": "준충(濬沖) · 234~305", "title": "죽림칠현 중 최연소", "short": "어려서 신동으로 일컬어졌고, 일곱 살에 호랑이 우리 앞에서도 동요치 않아 위 명제의 칭찬을 받음. 후일 사도(司徒)에 오름. 그러나 재물에 인색하기로 이름나, 좋은 자두를 팔 때 씨에서 종자를 얻을까 봐 송곳으로 모두 구멍을 뚫었다는 일화. 청담과 인색이 한 몸에 깃듦.", "long": "王戎은 자가 준충(濬沖)이다. 낭야(琅琊) 왕씨로, <em>왕융</em>은 <em>죽림칠현</em> 가운데 가장 어린 한 사람이다. 형 항렬에 해당하는 <em>완적</em>보다 스무 살 남짓 어렸으나, 완적이 일찍부터 그를 알아보고 <em>준충은 맑고 비범한 아이</em> 라 일컬었다 한다. 죽림의 자리에서 <em>혜강</em>·<em>완적</em>·<em>산도</em>·<em>상수</em>·<em>유영</em>·<em>완함</em>과 어울려 술과 청담을 나눈 막내였다.\n\n어려서부터 신동으로 일컬어졌다. 일곱 살 때 <em>위 명제(明帝)</em>가 낙양의 선무장(宣武場)에서 백성을 모아 호랑이 우리의 발톱과 어금니를 보여 줄 때 일이다. 호랑이가 우리를 흔들며 포효하자 어른들도 놀라 물러섰는데, <em>왕융</em>만 그 앞에 우두커니 서서 낯빛이 변하지 않았다. 명제가 그를 보고 <em>기이한 아이로다</em> 칭찬했다 한다. 또 길가 자두나무에 열매가 가득한데도 아이들이 따지 않는 것을 보고 <em>길가에 있는데도 남아 있다면 분명히 쓴 자두일 것이다</em> 단번에 짚었다는 일화가 〈숙혜〉편의 한 자리에 전한다. 일곱 살의 한 마디가 곧 한 인격의 식견의 싹이었다.\n\n자라서는 산도와 완적을 이어 출사했다. 위에서 진(晉)으로 넘어가는 격동의 한가운데서, <em>왕융</em>은 죽림의 다른 벗들과 달리 비교적 무리 없이 관로를 걸었다. <em>혜강</em>이 죽고 <em>완적</em>이 침묵하고 <em>유영</em>이 술에 잠긴 그 자리에서, 왕융과 <em>산도</em>는 진 조정의 한 모서리에 자리를 잡았다. 이윽고 <em>사도(司徒)</em>의 자리에까지 올랐으니, 죽림 가운데 관위(官位)로는 으뜸이었다.\n\n그러나 그를 일컬을 때 사람들이 먼저 떠올리는 것은 <em>인색</em>이다. 집에 <em>좋은 자두나무</em>가 있어 그 열매를 팔았는데, 사는 사람이 씨를 가져가 종자로 삼을까 두려워 <em>송곳으로 자두 씨마다 구멍을 뚫어</em> 팔았다 한다. 조카가 혼인할 때 홑옷 한 벌을 빌려주고는 식이 끝나자마자 곧 되찾아 갔고, 딸이 <em>배현(裴頠)</em>에게 시집가며 돈 몇만을 꾸어 가자 딸이 친정에 올 때마다 낯빛이 변했다가 돈을 갚자 비로소 풀어졌다는 이야기도 전한다. 밤마다 부인과 함께 <em>상아 산가지</em>를 들고 재산을 헤아렸다 한다. 〈검색(儉嗇)〉편의 거의 모든 자리가 그의 일화로 채워질 정도다.\n\n흥미로운 것은 그 <em>인색</em>과 <em>청담</em>과 <em>효심</em>이 한 인격에 함께 깃들었다는 점이다. 모친의 상을 당해서는 예법을 지키지 않고도 슬픔에 야위어 거의 죽을 지경이 되었다. 같은 무렵 같은 상중인 <em>화교(和嶠)</em>가 예법을 일일이 지키되 슬픔은 적었던 것과 대비되어, <em>화교는 살아 있는 효(生孝)요, 왕융은 죽어 가는 효(死孝)다</em> 라는 평이 났다. 〈덕행〉편의 한 자리다. 그러므로 그의 인색은 본성의 한 결일 뿐, 그의 정(情)이 메마른 것은 아니었다 한다.\n\n만년의 그는 <em>팔왕의 난</em>의 격동 한가운데에 있었다. 자기는 늘 한 발 물러서서 화를 피하려 했으나, 죽림의 옛 벗들과 같은 깊이의 발언은 더 이상 그에게서 나오지 않았다. 일찍이 <em>황공주(黃公酒)</em> 앞을 지나며 <em>혜숙야(혜강)와 완사종(완적)과 함께 여기서 술을 마셨건만, 그들이 죽은 뒤로 이 자리도 멀어졌다</em> 탄식한 일이 〈상서〉편에 전한다. 죽림의 막내가 그 모두를 보내고 홀로 남은 자리의 쓸쓸함.\n\n305년에 죽었다. 향년 72세였다. 『세설신어』에서 그는 〈덕행〉·〈언어〉·〈품조〉·〈숙혜〉·〈상서〉·〈검색〉·〈배조〉 등 여러 편에 다채롭게 등장한다. 신동의 식견, 죽림의 막내, 사도의 관위, 자두씨의 송곳, 모친 상의 야윔 — 이 모순된 듯한 결들이 한 인격에 깃든 자리가 곧 <em>왕융</em>이며, 그것이 위진 명사의 한 폭이 결코 단순하지 않음을 보여 주는 가장 정직한 예다.", "storyCount": 32}, {"id": "person.孫綽", "type": "person", "han": "孫綽", "ko": "손작", "sub": "흥공(興公) · 314~371", "title": "동진의 문장가", "short": "산수문학과 현언시(玄言詩)의 대표. 「유천태산부(遊天台山賦)」를 짓고는 친구에게 \"땅에 던지면 쇠와 옥의 소리가 나리라\" 자랑. 다소 자부심이 강해 동료들과 우열을 다툼. 인물 품평에도 한 마디씩 곁들이는 일이 잦아 사람들에게 핀잔을 사기도.", "long": "손작(孫綽)은 자가 흥공(興公)이다. 태원(太原) 중도(中都)의 손씨 출신으로, 조부 <em>손초(孫楚)</em>가 서진의 문장가로 이름이 높았다. 가문의 문재가 손작에 이르러 다시 한 번 피었고, 동진 일대(一代)의 사부(辭賦)와 시(詩)의 한 정점이 그의 붓끝에서 나왔다.\n\n젊어서 회계(會稽)에 살았다. <em>왕희지</em>·<em>허순</em>·<em>지도림</em>·<em>사안</em>과 어울려 산수와 청담을 즐긴 한 무리의 한가운데에 손작이 있었다. 353년의 <em>난정아집(蘭亭雅集)</em>에도 참여해 시를 남겼고, 그의 시는 한 권의 난정시(蘭亭詩) 가운데서도 빼어난 자리를 차지했다. 산음(山陰)의 산수가 동진 문학의 한 산실(産室)이 된 것은 <em>왕희지</em>의 필세와 손작의 시필이 함께 깃들었기 때문이라 해도 좋다.\n\n그의 문학적 위치는 두 갈래로 짚을 수 있다. 하나는 <em>현언시(玄言詩)</em>다. <em>현학</em>의 명리를 시에 담아 노래하는 양식으로, <em>허순</em>과 손작이 그 쌍벽이다. 당시 사람들이 <em>허순과 손작의 시가 한 시대의 으뜸</em>이라 일컬었다 한다. 또 하나는 <em>산수문학</em>이다. 산을 산으로, 물을 물로 노래하는 자리에 <em>현학</em>의 사색이 깃드는 양식이 곧 그의 손에서 한 모양을 갖췄다. 후대 <em>사령운(謝靈運)</em>의 산수시는 손작의 이 자리를 한 발 더 밀고 나간 결과다.\n\n대표작이 「유천태산부(遊天台山賦)」다. 천태산(天台山)을 실제로는 오르지 못했으나 <em>마음으로 노닐어</em> 지은 부(賦)라 전한다. 산의 험준함과 신선의 풍모, 그 사이에 깃든 <em>현(玄)</em>의 자리를 한 편에 담은 명작이다. 손작이 이 부를 짓고 친구 <em>범영기(范榮期)</em>에게 보이며 <em>그대가 이것을 땅에 던져 보라. 쇠와 옥의 소리가 날 것이다(卿試擲地, 當作金石聲)</em> 자랑했다 한다. 범영기가 처음에는 웃었으나 한 번 읽고는 곧 <em>과연 그렇다</em> 고개를 끄덕였다 한다. 〈문학〉편의 한 백미다.\n\n다만 그의 자부(自負)는 자주 입길에 올랐다. 인물 품평을 좋아해 한 마디씩 곁들이는 버릇이 있었다. <em>유담(劉惔)</em>이 그를 두고 <em>손흥공의 시가 비록 좋으나 그 사람됨이 좀 가볍다</em> 했다 한다. 우열을 다투는 자리에 자기를 <em>허순</em>과 나란히 두려는 기색이 있어 사람들이 핀잔하기도 했다. 한 번은 자기와 허순의 우열을 따지자 옆 사람이 <em>허순은 정(情)에서 빼어나고 그대는 사(辭)에서 빼어나니, 굳이 가를 일이 아니지 않은가</em> 답해 자리를 무마했다 전한다.\n\n벼슬은 정위경(廷尉卿)·산기상시(散騎常侍)에 이르렀다. 정사의 한가운데에 서기보다는 문단의 한가운데에 서는 자리를 택한 셈이다. 환온(桓溫)이 천도(遷都)를 건의했을 때 손작이 「간환온이도소(諫桓溫移都疏)」를 올려 정면으로 반대해 그 의(議)를 꺾었다 한다. 문장 한 편으로 한 시대의 정사를 돌이킨 자리다.\n\n371년에 세상을 떴다. 향년 58세였다. 그가 떠난 뒤 동진의 산수문학은 한 자리를 잃었고, 현언시의 시대는 다음 세대의 <em>사령운</em>으로 흘러가며 한 모양을 바꾸게 된다.\n\n『세설신어』에서 그는 〈언어〉·〈문학〉·〈품조〉·〈배조〉·〈경저〉편에 두루 등장한다. 그의 자부와 그의 명문이 한 인물의 두 얼굴로 함께 적혀, 동진 명사의 한 전형을 이룬다.", "storyCount": 32}, {"id": "person.周顗", "type": "person", "han": "周顗", "ko": "주의", "sub": "백인(伯仁) · 269~322", "title": "동진 초의 명신", "short": "시중(侍中)을 지냄. 호주가(好酒家)이며 우스개를 좋아함. 왕돈의 난 때 왕도의 일족 구명을 청 받았으나 겉으로 답하지 않고 안에서 상소로 변호함. 왕도가 이를 모르고 왕돈에게 그의 처벌을 묵인하니, 그가 죽임을 당함. 후에 진상을 안 왕도가 \"내가 백인을 죽인 것은 아니나 백인은 나로 인해 죽었다\" 탄식.", "long": "周顗는 자가 백인(伯仁)이다. 여남(汝南) 안성(安成)의 주씨 출신으로, 부친 <em>주준(周浚)</em>이 서진의 안동장군을 지낸 명문이다. <em>영가의 난</em>을 피해 강을 건너 <em>원제(元帝)</em> 사마예의 막부에 들어갔고, 동진 초기에 시중(侍中)에 올라 조정의 한가운데에 섰다.\n\n주의는 풍모가 단정하고 식견이 깊었다. <em>왕도</em>가 그를 두고 <em>우리 백인은 사람을 보면 그 속을 안다</em> 평했다 한다. 청담의 자리에서도 명리를 잘 가르고 사람의 됨됨이를 한눈에 짚어, 동진 초기 명사의 한 자리에 일찍이 들었다. <em>원제</em>가 그를 시중으로 두고 가까이 둔 까닭이 거기 있다.\n\n그러나 그의 가장 잘 알려진 면은 술이었다. <em>호주가(好酒家)</em>로 일컬어져, 한 번 잔을 들면 끝을 보지 못하면 그치지 않았다. 강을 건너온 뒤로 마음에 응어리가 깊어, 술이 아니면 그 응어리를 풀 길이 없다 했다. 〈임탄〉편에 그가 한 자리에서 <em>삼일복(三日僕)</em>이 되도록 마셨다는 일화가 전한다. 술이 깬 뒤에는 다시 단정한 시중으로 돌아왔으니, 그 두 모습의 낙차가 곧 주의의 풍격이었다.\n\n우스개를 좋아한 일도 자주 일컬어진다. <em>원제</em>의 자리에서도 농을 그치지 않아 임금이 <em>경은 어찌 이리 가벼운가</em> 나무란 적이 있다. 그러자 주의가 <em>신이 무거우면 폐하께서 외로우십니다</em> 답해 좌중이 다 웃었다 한다. 〈배조〉편의 한 자리다. 그 가벼움 안에 늘 한 자락의 무거움이 깔려 있어, <em>왕도</em>·<em>온교</em>·<em>유량</em> 같은 이들이 그를 가벼이 보지 못했다.\n\n322년, <em>왕돈(王敦)</em>의 난이 일어났다. <em>왕도</em>의 사촌형인 왕돈이 무창에서 거병해 도성으로 짓쳐들어오자, 도성에 남은 <em>왕도</em>와 그 일족 백여 명이 죄를 청하러 궁문 앞에 엎드렸다. 마침 주의가 입궐하는 길이었다. 왕도가 그를 붙들고 <em>백인, 내 집안 백여 명의 목숨이 그대에게 달렸다</em> 애원했다. 주의는 겉으로는 한 마디도 답하지 않고 그대로 궁 안으로 들어갔다.\n\n그러나 안에서는 달랐다. 주의는 원제 앞에서 <em>왕도의 충심을 신이 보증합니다</em> 거듭 아뢰고, 물러나와서는 상소를 올려 왕씨 일족의 무죄를 변호했다. 일을 마치고 나오는 길에 다시 왕도와 마주쳤으나 역시 한 마디도 하지 않았다. 왕도는 그 침묵을 <em>나를 버린 것</em>으로 알고 마음에 깊이 새겼다.\n\n왕돈이 도성을 차지한 뒤, <em>왕도</em>에게 <em>주의를 어찌할까</em> 물었다. 왕도가 세 번 물음에 세 번 다 답하지 않았다. 답하지 않음이 곧 묵인이었다. 왕돈이 주의를 잡아 죽였다. 향년 54세였다. 죽음에 임해 주의는 낯빛이 변하지 않고 <em>조정의 청명이 이리 흐려졌으니 죽음이 두렵지 않다</em> 했다 한다.\n\n뒤에 왕도가 중서성의 옛 문서를 정리하다 주의가 자기 일족을 변호한 상소를 발견했다. 한참을 울다 <em>내가 백인을 죽인 것은 아니나 백인은 나로 인해 죽었다(吾雖不殺伯仁, 伯仁由我而死)</em> 탄식했다. 이 한 마디가 〈우회〉편의 백미로 전한다. 침묵으로 사람을 살리고 침묵으로 죽은 한 명사의 자리.\n\n『세설신어』에서 주의는 〈언어〉·〈아량〉·〈임탄〉·〈배조〉·〈우회〉편에 두루 등장한다. 동진 초기 명사의 한 전형이며, 그의 죽음은 곧 <em>왕돈의 난</em>이 한 시대의 신의(信義)에 남긴 가장 깊은 상처의 이름이다.", "storyCount": 23}, {"id": "person.王恭", "type": "person", "han": "王恭", "ko": "왕공", "sub": "효백(孝伯) · ?~398", "title": "동진 후기의 청고한 외척", "short": "효무제의 처남. 청고한 풍모로 이름나, 사람들이 \"이 사람은 봄날 강가의 버들 같다\" 평. 학(鶴) 깃으로 된 갖옷을 입고 눈길을 거니니, 맹창(孟昶)이 담 너머로 보고 \"이는 곧 신선이다\" 함. 사마도자의 전횡에 반발해 거병했다 패해 처형됨.", "long": "王恭은 자가 효백(孝伯)이다. 태원(太原) 진양(晉陽)의 <em>왕씨</em> 출신이다. 부친은 <em>왕온(王蘊)</em>이며, 누이가 <em>효무제(孝武帝)</em>의 황후 <em>왕법혜(王法慧)</em>다. 곧 효무제의 처남이다. 외척의 자리에 앉되 외척의 속태를 멀리한 사람이라, 동진 말기 명사의 한 정점으로 일컬어졌다.\n\n왕공의 풍모에 대한 한 평이 곧 그의 사람됨이다. 누군가 그를 보고 <em>이 사람은 봄날 강가의 버들 같다(濯濯如春月柳)</em> 했다 한다. 가지가 가늘되 빛이 맑고, 흔들리되 속이 비지 않은 그 결을 이른 말이다. 〈용지(容止)〉편의 한 줄이 그를 동진 후기 미장부(美丈夫)의 한 표상으로 새겼다.\n\n또 한 일화가 그의 풍모를 굳혔다. 눈 내린 어느 날 왕공이 <em>학창의(鶴氅裘)</em> — 학의 깃털로 짠 갖옷 — 를 걸치고 천천히 눈길을 거닐었다. 마침 <em>맹창(孟昶)</em>이 담 너머로 그 모습을 엿보다가 자기도 모르게 <em>이 사람은 신선 가운데 사람이다(此真神仙中人也)</em> 탄식했다 전한다. 학창의와 눈과 그의 걸음이 한 그림이 되어, 〈기선(企羨)〉편의 백미가 되었다.\n\n청고함이 곧 그의 자부였다. 왕공이 일찍이 <em>명사라 한들 별난 재주가 있어야 하랴, 다만 늘 일이 없고 통음(痛飮)하고 『이소(離騷)』를 잘 외면 곧 명사라 할 만하다(名士不必須奇才, 但使常得無事, 痛飮酒, 熟讀離騷, 便可稱名士)</em> 했다 한다. <em>왕희지</em>·<em>사안</em>의 한낮이 지나고 명사가 풍속으로 굳어 가던 시절의 한 자기 정의다. 〈임탄(任誕)〉편이 이 한 줄로 한 시대의 결을 보인다.\n\n대나무 자리(竹席) 한 일화도 전한다. 왕공이 회계에서 돌아오자 <em>왕침(王忱)</em>이 그가 가져온 대자리를 보고 한 자리 청했다. 왕공이 곧 자기가 쓰던 것을 내어 주고 자기는 풀자리에 앉았다. 뒤에 누가 까닭을 묻자 <em>나는 본래 남은 물건이 없는 사람이다(吾平生無長物)</em> 했다. <em>장물(長物)</em> 한 마디가 그 뒤로 청빈한 명사의 표어가 되었다. 〈덕행〉편에 실린다.\n\n벼슬은 중서령(中書令)·전장군(前將軍)·청연이주자사(青兗二州刺史)에 이르렀다. 효무제가 죽고(396) 어린 <em>안제(安帝)</em>가 서자, 황제의 숙부 <em>사마도자(司馬道子)</em>가 정사를 농단했다. 사마도자가 측근 <em>왕국보(王國寶)</em>·<em>왕서(王緖)</em>를 끼고 외척의 권세를 휘두르자, 왕공은 외척의 자리에 있으면서도 그 전횡을 견디지 못해 397년 군사를 들어 <em>왕국보</em>의 주살을 청했다. 사마도자가 부득이 왕국보를 죽여 일이 한 번 가라앉았다.\n\n이듬해 398년 왕공이 다시 거병했다. 이번에는 <em>환현(桓玄)</em>·<em>은중감(殷仲堪)</em>과 함께 사마도자 부자를 치려는 거사였다. 그러나 자기 휘하의 <em>유뢰지(劉牢之)</em> — <em>북부병</em>을 거느린 장수 — 가 조정의 회유에 돌아서 왕공을 배반했다. 군세가 무너지고 왕공은 사로잡혔다. 처형되는 자리에서도 낯빛을 고치지 않고 수염과 머리를 가다듬은 뒤 형을 받았다 전한다. 죽음에 임해서도 봄날 강가의 버들 같았다는 평이 그에게 다시 돌아온다.\n\n왕공이 죽고 얼마 지나지 않아 동진은 <em>손은(孫恩)의 난</em>과 <em>환현의 찬위</em>로 무너져 간다. 그의 거병은 실패했으나 그 실패가 곧 동진 말의 정사가 더는 명사의 청고함으로 지탱되지 않음을 보인 한 분기점이었다. 『세설신어』에서 그는 〈덕행〉·〈언어〉·〈용지〉·〈임탄〉·〈기선〉·〈상예〉편 등에 두루 등장한다. 봄날 강가의 버들과 학창의의 신선, 그리고 <em>장물 없음</em>의 한 마디 — 그것이 동진의 마지막 명사 한 사람의 자리다.", "storyCount": 26}, {"id": "person.桓玄", "type": "person", "han": "桓玄", "ko": "환현", "sub": "경도(敬道) · 369~404", "title": "동진 말의 찬역자", "short": "환온의 막내아들. 동진 말기 권력을 잡고 황위를 찬탈해 초(楚)를 세움. 곧 유유(劉裕)에게 토벌되어 패사. 서화에 조예가 있고 자부심이 매우 강함. 명사들의 글씨와 그림을 좋아하여 거두어 모음. 어수룩한 고개지를 자주 속임.", "long": "桓玄은 자가 경도(敬道)다. 어릴 적 이름은 영보(靈寶)다. <em>환온(桓溫)</em>의 막내아들이며, 환온이 늘그막에 얻은 자식이다. 환온이 죽을 때 다섯 살이었다 한다. 아비의 작위인 남군공(南郡公)을 이어받았으므로, 사람들이 그를 <em>환남군</em>이라 불렀다.\n\n환온은 동진의 가장 강한 군벌이었고, 도성에 들어와 <em>찬위</em>를 도모한 끝에 <em>사안</em>과 <em>왕탄지</em>의 견제에 막혀 뜻을 이루지 못한 채 죽었다. 그 미완의 야심이 막내아들에게 그대로 흘렀다는 것이 후대의 평이다. 환현은 어려서부터 자부심이 매우 강했다. 한 번은 친척 어른이 그의 이름을 함부로 부르자 눈물을 흘리며 <em>선친의 휘를 어찌 가벼이 부르십니까</em> 했다 한다. 다섯 살에 아비를 여읜 아이의 말이라 좌중이 모두 숙연해졌다.\n\n자라서는 <em>형주(荊州)</em>를 근거로 삼았다. 형주는 곧 환씨 일가의 옛 군관구다. 아비 환온이 형주에서 일어나 도성을 흔들었고, 형 <em>환충(桓沖)</em>이 그 자리를 이어 <em>비수대전</em> 무렵 동진의 서쪽을 지켰다. 환현은 그 유산을 그대로 물려받은 셈이다. 효무제 말년에서 <em>사마도자(司馬道子)</em> 부자의 어지러운 정사가 이어지는 동안, 환현은 형주에서 힘을 길러 도성을 노렸다.\n\n그는 <em>서화(書畵)</em>에 조예가 깊었고, 명사들의 글씨와 그림을 광적으로 모았다. 왕희지·왕헌지 부자의 서첩을 거두고, <em>고개지(顧愷之)</em>의 그림을 손에 넣기 위해 갖은 수를 썼다. 고개지가 그림 상자를 봉해 환현에게 맡기자, 환현이 뒤를 뜯어 그림만 꺼내고 다시 봉해 돌려주었다. 고개지가 봉인이 그대로인 것을 보고 <em>묘한 그림이 신통하여 사람으로 화해 가 버렸구나</em> 탄식했다는 일화가 〈교예〉편에 전한다. 환현의 손버릇과 고개지의 어수룩함이 한 자리에 비친 장면이다.\n\n명사들과 어울리는 자리에서도 그는 만만하지 않았다. <em>은중감</em>·<em>왕순</em>과 청담의 자리를 다투었고, 옥주미를 들고 노장의 자리를 펴는 솜씨가 한 시대의 한 자리는 되었다 한다. 그러나 그의 청담에는 늘 <em>군주가 되고자 하는 자</em>의 그림자가 깔려 있었다는 것이 동시대의 험구다. 명사의 풍모와 권신의 야심이 한 몸에 있었다.\n\n원흥(元興) 원년(402), 환현이 군사를 일으켜 도성으로 들어와 <em>사마도자</em>·<em>사마원현</em> 부자를 죽이고 조정을 장악했다. 이듬해 안제(安帝)를 폐하고 스스로 황위에 올라 국호를 <em>초(楚)</em>라 했다. 환온이 못다 한 일을 막내아들이 마침내 이룬 셈이다. 즉위한 환현은 의례와 문장을 손수 다듬으며 <em>제왕의 풍모</em>를 갖추려 애썼다 한다. 그러나 그 자리는 오래가지 못했다.\n\n이듬해 <em>유유(劉裕)</em>가 <em>북부병(北府兵)</em>의 잔여를 끌어모아 경구(京口)에서 일어났다. <em>사안</em>이 길러 둔 그 군대가, 환현을 무너뜨리는 칼이 되었다. 환현의 군이 패주하고, 환현은 강릉(江陵)으로 도망하다 도중에 살해되었다(404년). 향년 36세였다. 초는 두 해를 채우지 못하고 사라졌고, 동진의 명운은 다시 몇 해 더 이어지다 끝내 유유의 <em>송(宋)</em>에 넘어갔다.\n\n환현은 동진을 끝낸 사람으로 기록되었지만, 동시에 동진 명사 문화의 마지막 한 자리이기도 했다. 서화의 안목, 청담의 솜씨, 자부심의 깊이 — 이 모든 것이 그의 한 몸에 있었고, 그 한 몸이 황위를 향해 기울어졌을 때 동진의 한 시대가 함께 무너졌다. 『세설신어』에서 그는 〈언어〉·〈품조〉·〈호상〉·〈치린〉·〈교예〉 등에 어지러이 등장한다. 환온의 그림자에서 시작해 유유의 칼 앞에 끝난 한 생애가, 그 책의 마지막 한 자락을 이룬다.", "storyCount": 22}, {"id": "person.郗超", "type": "person", "han": "郗超", "ko": "치초", "sub": "가빈(嘉賓) · 336~378", "title": "환온의 모주(謀主)", "short": "권모와 변재로 환온의 패업을 보좌. 불교에 깊이 귀의. 부친 치음(郗愔)이 충성스러웠음에도 환온을 도와 정변을 꾸미니, 부자 사이가 어그러짐. 사안과의 관계는 미묘하여, 사안이 그의 식견은 인정하면서도 거리를 둠. 죽음을 앞두고는 부친에게 환온과의 밀의를 적은 문서를 보여 사후의 누를 덜게 함.", "long": "치초(郗超)는 자가 가빈(嘉賓)이다. 고평(高平) 금향(金鄕)의 <em>치씨(郗氏)</em> 출신으로, 조부 <em>치감(郗鑒)</em>이 동진 초의 큰 공신이며, 부친 <em>치음(郗愔)</em>도 서주자사를 지낸 명문이다. 치씨는 본래 <em>왕씨</em>·<em>사씨</em>와 더불어 동진의 한 기둥을 이루었고, 치감의 딸이 <em>왕희지</em>의 부인이 되었으니, <em>왕씨</em>와는 인척 관계로 묶여 있었다.\n\n치초는 어려서부터 변재(辯才)와 식감(識鑑)으로 일컬어졌다. <em>명리</em>를 가려 묻는 자리에 들면 응답이 칼날 같고, 사람의 풍격을 알아보는 눈이 깊었다. 어른들이 <em>치가의 아이가 자라면 한 시대의 그릇이 되리라</em> 평했다 한다. 그는 또 일찍부터 <em>불교</em>에 깊이 귀의해 <em>지도림(支道林)</em>과 가까이 사귀었다. 지도림이 그를 두고 <em>치가빈의 신정(神情)은 능히 명리를 끝까지 좇는다</em> 평한 것이 〈상예〉편에 보인다. 그가 지은 「봉법요(奉法要)」는 동진 초기 사대부 불교의 한 정수로 전한다.\n\n문제는 그가 <em>환온(桓溫)</em>의 막부에 들어가면서부터다. 환온이 그의 변재와 모략을 알아보고 곁에 두었고, 치초는 환온의 모든 밀의(密議)에 참여했다. 사람들이 환온의 막부를 두고 <em>입막지빈(入幕之賓)</em>이라 부른 그 자리의 한가운데에 치초가 있었다. 환온의 북벌 계획, 그리고 도성으로 들어가 황제를 폐립하려는 권모까지, 치초의 손이 닿지 않은 자리가 없었다.\n\n그런데 부친 <em>치음</em>은 환온과 정반대의 자리에 있었다. 치음은 동진 황실에 충성스러운 신하로, 환온의 권력 팽창을 늘 경계했다. 한 번은 치음이 환온에게 <em>함께 황실을 보좌하자</em>는 뜻을 담은 편지를 보냈는데, 치초가 그 편지를 가로채 찢어 버리고, 대신 <em>늙어 물러나기를 청한다</em>는 사직 편지를 만들어 환온에게 올렸다 한다. 환온이 그것을 보고 기꺼이 치음의 병권을 거두어 자기에게 넘겼다. 부자 사이가 그렇게 어그러졌다.\n\n<em>사안(謝安)</em>과의 관계는 미묘하다. 한 번은 사안이 <em>왕탄지</em>와 함께 환온의 막부에 들었을 때, 휘장 뒤에 치초가 숨어 듣고 있었다. 바람이 휘장을 들치자 치초가 드러났는데, 사안이 웃으며 <em>치가빈은 가히 입막지빈이라 할 만하다</em> 한 일화가 〈배조〉편에 전한다. 사안은 그의 식견을 인정했으나, 환온의 칼이 된 그 자리만은 끝내 거리를 두었다. 치초 또한 사안을 두려워해, 사안이 도성에 들어선 뒤로 환온의 찬위 계획이 더 이상 나아가지 못한 한 까닭이 사안에게 있다 보았다 한다.\n\n378년, 마흔 셋의 나이에 병으로 죽었다. 환온이 죽은 지 다섯 해 뒤다. 죽음을 앞두고 그는 시종에게 한 상자를 내어 부친 치음에게 전하게 했다. 상자 안에는 환온과 주고받은 모든 밀의의 문서가 들어 있었다. <em>부친께서 내가 죽은 뒤 너무 슬퍼하시거든 이것을 보여 드려라</em> 했다. 치음이 아들의 죽음에 통곡하다 그 상자를 열어 보고는, 분노가 슬픔을 덮어 <em>이런 자식이 일찍 죽은 것이 차라리 다행이다</em> 했다 한다. 사후의 누를 부친에게서 덜고자 한 마지막 한 수였다.\n\n『세설신어』에서 그는 〈언어〉·〈문학〉·〈방정〉·〈아량〉·〈식감〉·〈상예〉·〈품조〉·〈배조〉 등 여러 편에 등장한다. 변재와 식감의 한 정점이면서 동시에 권모와 효의 갈림길에 선 인물 — 동진 명사의 한 어두운 결이 그의 한 생에 압축되어 있다.", "storyCount": 22}, {"id": "person.殷仲堪", "type": "person", "han": "殷仲堪", "ko": "은중감", "sub": "중감(仲堪) · ?~399", "title": "동진 후기의 형주자사", "short": "형주자사를 지냄. 청담과 현학에 두루 능함. 효성이 지극하여 부친의 병에 손가락을 잘라 약에 섞었다는 일화. 한 눈을 잃었으나 단호함을 잃지 않음. 정세의 격동 속에 환현(桓玄)과 다투다 패해 자살. 그 부지런함과 검소함이 사대부 사이에 회자됨.", "long": "殷仲堪은 진군(陳郡) 장평(長平)의 은씨 출신이다. 그의 가문은 한위(漢魏) 이래의 사족이었으나, 동진 후기에 이르러 그 한 사람으로 다시 일컬어졌다. 자는 전하지 않는 부분이 많으나 <em>중감</em>이라는 이름 자체가 그의 인격의 표지처럼 쓰였다.\n\n그는 어려서부터 <em>효성</em>으로 이름났다. 부친이 오래 병을 앓아 백약이 듣지 않자, 중감이 손가락 하나를 잘라 그 피를 약에 섞어 올렸다 한다. 부친의 병을 시중들며 몇 해를 한자리에 머물러 의서(醫書)를 손수 익혔고, 그 까닭에 그 자신이 의술에 통하게 되었다 전한다. 또 부친이 눈을 앓는 것을 곁에서 시중들다 잘못하여 약물이 튀어 한쪽 눈을 잃었다는 일화가 있다. 한 눈을 잃은 뒤에도 그는 그것을 부끄러워하지 않고, 도리어 <em>부친을 위해 잃은 눈인데 무엇이 아까우랴</em> 하였다 한다.\n\n학식 면에서 그는 <em>현학(玄學)</em>과 <em>청담(淸談)</em>에 두루 능했다. <em>삼현(三玄)</em>을 깊이 익혀 노장과 주역의 명리를 가르는 자리에 단정히 앉을 만했다. 효무제(孝武帝)가 그의 청담을 좋아해 자주 궁중에 불러 더불어 논하였다 한다. 그러나 그의 청담은 <em>왕연</em>의 부류처럼 풍속화된 사교의 의례가 아니었다. 그가 명리를 논할 때는 <em>명교(名敎)</em>와 <em>자연</em>의 자리를 단정히 가르는 결이 있었고, 그 결이 곧 그의 정사에도 이어졌다.\n\n벼슬길에서 그는 부지런하고 검소했다. 형주자사(荊州刺史)로 나갔을 때 그 부에 있는 동안 <em>밥상에 두 가지 반찬을 두지 않았다</em>고 한다. 한 번은 식사 중에 밥알이 상에 떨어지자 손수 집어 입에 넣었고, 좌중이 모두 놀랐으나 그가 <em>한 톨이라도 가벼이 여겨서는 안 된다</em> 하였다. 자사의 자리에 있으면서도 옷이 해지면 손수 기워 입었다 한다. 그 검소함이 사대부 사이에 두루 회자되어, <em>은형주(殷荊州)는 자사의 봉록을 어디에 쓰는가</em> 하는 농담이 떠돌 정도였다.\n\n그러나 그가 다스린 시대는 동진의 가을이었다. <em>사안</em>이 떠난 뒤 효무제와 <em>사마도자(司馬道子)</em>의 종실이 서로 다투고, 그 틈을 <em>왕공(王恭)</em>과 <em>환현(桓玄)</em>이 노렸다. 중감은 형주의 군세를 안고 <em>왕공</em>과 손잡아 도자 일파를 견제하려 했으나, 왕공이 먼저 무너지자 그의 처지가 외로워졌다. 곧 <em>환현</em>과의 미묘한 동맹과 알력이 시작되었다.\n\n환현은 <em>환온</em>의 아들로, 부친의 야망을 이어 형양(荊襄)을 손에 넣고자 했다. 중감과 환현은 처음에는 <em>양양(襄陽)의 양수(楊銓期)</em>까지 더해 셋이 서로 맹세하는 사이였으나, 환현의 야망 앞에 그 맹세가 오래갈 수 없었다. 399년, 환현이 군을 일으켜 중감을 쳤다. 중감은 형주의 군을 모아 응전했으나 패해 쫓겼다. 끝내 추격을 피하지 못하고, 한 정자에 이르러 <em>내가 어찌 환현의 손에 죽으랴</em> 하고 스스로 목숨을 끊었다.\n\n『세설신어』에서 그는 〈덕행〉·〈언어〉·〈문학〉·〈방정〉·〈아량〉·〈규잠〉편에 두루 등장한다. 손가락을 자른 효성과 한 톨의 밥알을 집어 든 검소함과 한 눈을 잃고도 단정한 풍모가 그 일화들의 결이다. 동진의 마지막 한 자리에서, <em>현학</em>과 <em>효</em>와 <em>검</em>을 한 인격에 담은 명사가 있었다는 것 — 그것이 殷仲堪의 자리다.", "storyCount": 21}, {"id": "person.嵇康", "type": "person", "han": "嵇康", "ko": "혜강", "sub": "숙야(叔夜) · 223~262", "title": "죽림칠현의 영수", "short": "중산대부(中散大夫)를 지내 혜중산이라 불림. 사마씨에게 출사를 거부하다 종회의 참소로 사형됨. 형장에서 광릉산(廣陵散)을 타며 \"광릉산이 오늘부터 끊어졌도다\" 탄식. 「양생론(養生論)」과 「산거원(山巨源)에게 보낸 절교서」의 저자. 풍채가 우뚝하여 \"외로운 소나무가 홀로 선 듯\"이라 평.", "long": "嵇康은 자가 숙야(叔夜)이고, 초군(譙郡) 질현(銍縣) 출신이다. 본래의 성은 해(奚)였는데, 부친이 회계의 嵇山 부근으로 옮겨 살면서 嵇씨를 받았다 한다. 위 황실의 장락정주(長樂亭主)와 혼인해 부마가 되었고, 중산대부(中散大夫)를 지내어 <em>혜중산(嵇中散)</em>이라 일컬어졌다. 그러므로 그는 위 황실의 친속이며, 사마씨의 부상에 결코 호의적일 수 없는 자리에 있었다.\n\n풍채가 우뚝하고 키가 일곱 자 여덟 치였다 한다. 산도가 그를 두고 <em>외로운 소나무가 홀로 선 듯하다(孤松之獨立)</em>, <em>취하면 옥산이 무너지려는 듯하다(玉山之將崩)</em> 평했다. 그러나 외모만으로 이름난 것은 아니다. 그는 노장에 정심했고, 시·금(琴)·서법·금속 단련(鍛鐵)에까지 두루 능했다. 그가 직접 쇠를 두드려 칼이나 그릇을 만들었다는 일화가 있는데, 일을 마치고 땀을 흘리며 명리를 논하는 자리에 돌아왔다. 이런 다재다능은 명사 문화 특유의 <em>생활 전체가 한 편의 시</em>가 되는 자세를 보여 준다.\n\n사상적으로는 「양생론(養生論)」과 「성무애락론(聲無哀樂論)」이 대표작이다. 양생론은 도가의 양생술을 체계화한 것이고, 성무애락론은 <em>소리 자체에는 슬픔이나 즐거움이 없으며, 그것을 듣는 자의 마음에서 정이 일어난다</em>는 음악 철학이다. 「난주(難自然好學論)」에서는 <em>학문은 자연스러운 것이 아니라 명교(名敎)의 산물이다</em>라 주장해, 죽림 영수다운 자연주의의 한 정점을 보였다.\n\n가장 유명한 글은 「산거원에게 보내는 절교서(與山巨源絕交書)」다. 죽림의 옛 벗 <em>산도</em>가 출사해 사마씨에게 봉사하면서 자기를 후임으로 천거하자, 하안은 격렬한 편지로 거절했다. <em>내가 견디지 못하는 일이 일곱이요, 매우 옳지 않다 여기는 일이 둘이다(七不堪, 二甚不可)</em>라 늘어놓으며 출사를 단호히 거부했다. 이 편지는 단순한 거절이 아니라 <em>명교</em>와 <em>자연</em>의 결별을 천명한 위진 사상사의 한 문서다.\n\n비극은 <em>종회(鍾會)</em>에게서 왔다. 종회는 일찍이 사마소의 모주로 자라난 자였는데, 어려서 자기가 쓴 「四本論」을 들고 하안을 찾아갔다 답을 못 들은 일이 있었다. 마당에 책을 던지고 도망쳤다는 일화가 있다. 후일 종회가 권력을 잡고 자기 무리와 함께 다시 하안을 찾았을 때 그는 큰 나무 아래 쇠를 두드리며 종회를 거들떠보지 않았다. 종회가 <em>무엇을 듣고 와서 무엇을 보고 가시는가</em> 떠보자 하안이 <em>듣고 와 들었고, 보고 와 보고 간다</em> 답했다. 종회는 깊이 원한을 품었다.\n\n263년, <em>여안(呂安)</em>이라는 친구가 형 여손에게 무고당하자 하안이 변호하는 글을 썼다. 종회가 이를 빌미로 사마소에게 <em>하안이 폭력을 조장하니 천하의 명교를 어지럽힌다</em>고 참소했다. 사마소가 그를 잡아 죽이라 명했다. 태학생 삼천 명이 그를 스승으로 모시고자 청원했으나 받아들여지지 않았다. 형장에서 그는 햇그림자를 보고는 아직 시간이 있음을 알고, 형 嵇喜에게 일러 거문고를 가져오게 해 <em>광릉산(廣陵散)</em>을 한 곡 탔다. 한 곡을 마친 뒤 <em>袁孝尼가 일찍이 이 곡을 배우고자 했으나 내가 가르치지 않았다. 광릉산이 오늘로 끊어지는구나(廣陵散於今絕矣)</em> 탄식하고 죽었다. 그의 나이 40세였다.\n\n『세설신어』에서 하안은 〈덕행〉·〈언어〉·〈정사〉·〈문학〉·〈방정〉·〈아량〉·〈상예〉·〈용지〉·〈서일〉·〈임탄〉 등 거의 모든 편에 등장한다. 그가 곧 명사의 한 전형이며, 명교와 자연의 갈림길에서 자연 쪽을 끝까지 산 사람의 결정체다.", "storyCount": 20}, {"id": "person.山濤", "type": "person", "han": "山濤", "ko": "산도", "sub": "거원(巨源) · 205~283", "title": "죽림칠현, 후일의 사도(司徒)", "short": "칠현 중 연장자. 후에 출사하여 이부상서·사도(司徒) 역임. 인재 천거가 공정하고 정밀하여 산공계사(山公啓事)로 일컬어짐. 혜강이 그에게 절교서를 보냈으나, 산도는 혜강의 아들 혜소를 거두어 정성껏 길러 출사시킴. 도량이 깊은 군자.", "long": "山濤는 자가 거원(巨源)이다. 하내(河內) 회현(懷縣) 사람이며, <em>죽림칠현</em>의 가장 연장자다. <em>혜강(嵇康)</em>보다 스무 살, <em>완적(阮籍)</em>보다 다섯 살 위였다. 칠현이 모이던 산양(山陽)의 죽림에서, 산도는 형이자 맏이의 자리에 있었다. 그러나 그의 생애는 칠현 가운데 가장 길고, 가장 멀리까지 갔다.\n\n집안이 한미했고 어려서 부모를 여의었다. 마흔이 다 되어서야 군의 주부(主簿)로 처음 벼슬길에 들었다. 그 전까지 그는 노장(老莊)을 깊이 익히고 <em>주역</em>에 통했다. 사람을 보는 눈이 일찍부터 알려져, <em>종회(鍾會)</em>와 <em>배수(裴秀)</em>가 다투던 자리에서 산도가 두 사람 사이를 조용히 가렸다는 일화가 전한다. 말이 적었으나 한 마디가 자리를 정했다.\n\n죽림에서의 산도는 술과 청담을 함께 하면서도 늘 한 발을 물려 두었다. 완적이 그를 두고 <em>그릇이 깊어 헤아릴 수 없다</em> 평했다 한다. <em>왕융(王戎)</em>은 산도를 일러 <em>옥돌 박힌 광석 같다, 다듬지 않아도 그 빛이 안에서 난다</em> 했다. 〈상예(賞譽)〉편에 거듭 나오는 산도의 풍모는 <em>깊음(深)</em>과 <em>무거움(重)</em> 두 글자에 모인다. 혜강의 날카로움, 완적의 광기, <em>유령</em>의 방탕과 달리, 산도는 죽림 안의 <em>어른</em>이었다.\n\n249년 <em>고평릉의 정변</em>을 전후하여 산도는 사마씨에게 기울었다. 사마의의 처족이라는 인연도 있었지만, 그보다 <em>시대가 이미 갈렸다</em>는 그의 판단이 컸다. 그가 <em>상서이부랑(尙書吏部郎)</em>으로 자리를 옮기며 후임에 혜강을 천거하자, 혜강이 그 유명한 <em>여산거원절교서(與山巨源絶交書)</em>를 보내 왔다. <em>나는 일곱 가지 견딜 수 없는 것이 있고 두 가지 해서는 안 될 일이 있다</em> 하며 출사를 거부하고 산도와의 교유까지 끊겠다 선언한 글이다. 산도는 이 글에 답하지 않았다. 다만 침묵으로 받았다.\n\n혜강이 263년 형장에 서기 직전, 아들 <em>혜소(嵇紹)</em>를 불러 일렀다. <em>거원이 있으니 너는 외롭지 않을 것이다(巨源在, 汝不孤矣).</em> 절교서를 보낸 그 산도에게 자기 아들을 맡긴 것이다. 산도는 혜소를 거두어 친자식처럼 길렀고, 자라서 출사할 자리가 되자 손수 천거해 비서승(秘書丞)에 앉혔다. 한 자락 절교서로 끊기지 않은 깊은 신뢰의 자리다. 〈정사(政事)〉·〈현원(賢媛)〉편에 그 자취가 깃들어 있다.\n\n서진(西晉)에 들어 산도는 <em>이부상서(吏部尙書)</em>에 올라 인사를 맡았다. 한 자리를 채울 때마다 몇 사람을 견주어 그 장단을 정밀하게 적어 올렸으니, 이 문서가 곧 <em>산공계사(山公啓事)</em>다. 사람들이 이르기를, <em>산공이 천거한 사람은 한 자리도 어그러진 적이 없다</em> 했다. 사람의 그릇을 보는 눈이 그만큼 깊고 정확했다. 후에 <em>사도(司徒)</em>에까지 이르렀으나, 그 자리에서도 청렴하고 조용했다.\n\n283년 일흔아홉으로 죽었다. 시호는 강(康)이다. 칠현 가운데 천수를 다 누리고 가장 멀리까지 간 한 사람이다. 그러나 사람들이 산도를 기억하는 자리는 <em>사도</em>의 자리도 <em>산공계사</em>의 자리도 아니고, <em>혜강의 아들을 거둔</em> 그 한 자리다. 절교서를 침묵으로 받고, 죽은 벗의 아들을 평생 품은 그 도량이 곧 위진 <em>명사</em>가 도달한 한 인격의 정점이었다.\n\n『세설신어』에서 산도는 〈덕행〉·〈언어〉·〈정사〉·〈상예〉·〈품조〉·〈현원〉편 등에 두루 등장한다. 죽림의 일곱 사람 가운데 가장 <em>말이 적게</em> 그려지지만, 그 적은 말의 무게가 어느 일화에서도 한 자리를 누른다.", "storyCount": 11}, {"id": "person.阮籍", "type": "person", "han": "阮籍", "ko": "완적", "sub": "사종(嗣宗) · 210~263", "title": "죽림칠현의 또 한 영수", "short": "보병교위(步兵校尉)를 지내 완보병이라 불림. 청안(靑眼)·백안(白眼)으로 사람을 가려 대함. 예법의 사대부를 만나면 흰자위로 흘기고, 마음 맞는 이에게는 푸른 눈동자로 봄. 모친 상중에도 술을 마시고 슬픔에 피를 토하는 등 형식을 비웃으면서도 정의 본질에 도달. 「영회시(詠懷詩)」 82수를 남김.", "long": "阮籍은 자가 사종(嗣宗)이다. 진류(陳留) 위씨(尉氏) 사람으로, <em>건안칠자(建安七子)</em> 중 한 사람인 <em>완우(阮瑀)</em>의 아들이다. 어려서 아버지를 여의고 가난한 가운데 자랐으나, 일찍부터 <em>노장(老莊)</em>에 깊이 빠져 한 번 문을 닫고 책을 읽으면 몇 달이 지나도록 나오지 않았다 한다. 산수에 올라 종일 휘파람을 불며 돌아오지 않은 적도 있었다.\n\n위(魏) 정시(正始) 말, <em>사마의(司馬懿)</em>가 <em>고평릉의 정변</em>으로 <em>조상(曹爽)</em>을 무너뜨리고 정권을 쥐자, 천하의 사대부는 일제히 침묵에 들어갔다. 완적이 살아낸 시대가 바로 그 시대다. <em>하안</em>과 <em>왕필</em>의 정시 명사가 한꺼번에 무대에서 사라진 자리에, <em>혜강(嵇康)</em>과 완적이 영수가 되어 <em>죽림칠현(竹林七賢)</em>의 자리를 펼쳤다. <em>산도</em>·<em>상수</em>·<em>유영</em>·<em>완함</em>·<em>왕융</em>이 그 동지였다. 산양(山陽)의 대숲에서 술과 거문고와 청담으로 날을 보낸 그 자리의 한가운데에 완적이 있었다.\n\n완적의 처세는 한마디로 <em>비웃음과 침묵</em>이다. 사마씨는 그를 자기편으로 끌어들이려 거듭 불렀고, 그는 거부할 명분을 찾지 못해 <em>보병교위(步兵校尉)</em>의 자리를 받았다. 그래서 후세에 <em>완보병(阮步兵)</em>이라 불린다. 그 자리를 받은 까닭이 또 우습다. 보병의 주방에 좋은 술이 삼백 곡(斛) 쌓여 있다는 말을 듣고 청했다 한다. 사마소(司馬昭)가 자기 아들 <em>사마염</em>과 완적의 딸을 혼인시키려 했을 때, 그는 <em>예순 날을 내리 취해</em> 말을 꺼낼 틈을 주지 않아 끝내 혼사를 무산시켰다. 시대의 칼날 위에서 술이 곧 그의 갑옷이었다.\n\n<em>청안(靑眼)과 백안(白眼)</em>의 일화가 그의 정체(正體)다. 마음 맞는 이가 오면 푸른 눈동자로 마주 보고, 예법을 들고 오는 사대부가 오면 흰자위로 흘겨 보냈다. 모친이 돌아가셨을 때, <em>혜희(嵇喜)</em>가 정장하고 조문하러 오자 백안으로 맞았고, 그 동생 <em>혜강</em>이 거문고와 술을 들고 오자 비로소 청안으로 반겼다 한다. 예법의 외피와 정의 본질을 한 눈으로 가른 셈이다.\n\n모친 상중의 처신은 그 시대의 한 사건이었다. 그는 상중에도 술을 마시고 고기를 먹었다. <em>하증(何曾)</em>이 사마소 앞에서 <em>명교를 어지럽히는 자이니 사방의 끝으로 내쳐야 한다</em>고 탄핵했다. 그러나 완적은 어머니의 장례 자리에서 한 번 통곡한 끝에 피를 두어 되나 토하고 오래도록 쓰러져 있었다 한다. <em>형식의 예</em>를 비웃었으되 <em>정의 본질</em>에는 그 누구보다 깊이 닿았다. 〈임탄(任誕)〉편이 그의 무대다.\n\n남긴 글로는 「영회시(詠懷詩)」 82수가 있다. 한 수 한 수가 가리키는 곳을 분명히 말하지 않아 <em>어둡고 깊어 풀기 어렵다</em>는 평이 후세에 따랐다. 그러나 그 어두움이 곧 시대의 어두움이며, <em>말로 다 할 수 없는 것을 시로 가린</em> 한 사람의 자기 보존이었다. 263년, <em>혜강</em>이 <em>종회</em>의 무함으로 형장에 끌려가 「광릉산(廣陵散)」을 한 곡 타고 죽은 그 해에, 완적도 세상을 떠났다. 향년 54세였다.\n\n『세설신어』에서 완적은 〈덕행〉·〈언어〉·〈문학〉·〈아량〉·〈임탄〉·〈간오〉·〈서일〉 곳곳에 등장한다. <em>명교(名敎)</em>의 한가운데에서 <em>자연(自然)</em>을 살아낸 한 사람의 그림자가, 죽림의 그 대숲을 떠난 뒤에도 동진의 청담 자리까지 길게 드리워졌다.", "storyCount": 17}, {"id": "person.曹操", "type": "person", "han": "曹操", "ko": "조조", "sub": "맹덕(孟德) · 155~220", "title": "위(魏)의 무제(武帝)", "short": "한 헌제를 끼고 천하를 호령. 시문에도 능한 영걸로 「단가행(短歌行)」 등이 전함. 『세설신어』에서는 가휼(假譎)·도량·잔혹 등 다면적 인물상으로 그려짐. 양수(楊脩)와의 \"鷄肋\" 일화, 흉노 사신을 접견할 때 자신 대신 최염을 세우고 자신은 도부수로 곁에 섰던 일화로 유명.", "long": "曹操는 자가 맹덕(孟德), 패국(沛國) 초현(譙縣) 사람이다. 환관 <em>조등(曹騰)</em>의 양손인 <em>조숭(曹嵩)</em>의 아들로, 한미하지도 명문도 아닌 어중간한 출신에서 출발해 후한(後漢)의 마지막 한 세대를 자기 손에 쥔 인물이다. 위(魏)는 그의 아들 <em>조비</em>가 세웠으나, 그 터를 닦은 사람은 어디까지나 조조다. 그래서 <em>위 무제(魏武帝)</em>로 추존된다.\n\n어려서 그는 <em>교활한 아이</em>로 일컬어졌다. <em>허소(許劭)</em>가 그를 보고 <em>치세의 능신, 난세의 간웅(治世之能臣, 亂世之姦雄)</em>이라 평했다는 한마디가 이후 그의 인물상을 평생 따라다녔다. 황건의 난을 진압하며 두각을 드러내고, <em>동탁</em>의 폭정 뒤 군웅이 갈라설 때 연주(兗州)를 근거로 자기 군세를 길렀다. 196년, 그는 떠돌던 <em>한 헌제(漢獻帝)</em>를 허(許)로 맞이해 천자를 자기 곁에 두었다. <em>천자를 끼고 제후를 호령한다(挾天子以令諸侯)</em>는 한 수가 그의 정치의 척추다.\n\n관도(官渡)에서 <em>원소</em>를 깨고 화북을 통일했다(200~207). 그러나 208년 <em>적벽</em>에서 <em>손권</em>·<em>유비</em>의 연합군에 패하면서 천하 통일은 끝내 그의 손에서 이뤄지지 않았다. 그래도 그가 남긴 위의 판도가 곧 삼국 정세의 골격이 되었고, 그가 둔전(屯田)과 구품관인법(九品官人法)의 전신이 되는 인재 등용의 길을 연 것이 후대 위진 제도의 출발선이 되었다. <em>재능만 있으면 쓴다(唯才是擧)</em>는 그의 인재령은 후한의 문벌적 관습을 흔든 한 결단이었다.\n\n시인으로서의 조조도 잊을 수 없다. 「단가행(短歌行)」의 <em>대주당가, 인생기하(對酒當歌, 人生幾何)</em>, 「관창해(觀滄海)」의 광활한 바다 풍경, 「귀수수(龜雖壽)」의 <em>노기복력, 지재천리(老驥伏櫪, 志在千里)</em> — 이 짧은 구절들이 <em>건안문학(建安文學)</em>의 정점이다. 아들 <em>조비</em>·<em>조식</em>과 함께 <em>삼조(三曹)</em>로 일컬어지고, 그 주위에 <em>건안칠자</em>가 둘러섰다. 위진 문학의 한 큰 줄기가 이 부자(父子)에게서 시작된다.\n\n『세설신어』에 그려진 조조는 단정하지 않다. 〈가휼(假譎)〉편이 특히 그의 자리다. 행군 중 갈증에 시달리는 병사들에게 <em>저 앞에 매실 숲이 있다</em>고 거짓을 일러 침을 삼키게 해 행군을 마치게 한 일, 자기가 잠결에 사람을 벨까 두렵다고 미리 일러 두고 한밤에 이불을 덮어 주려 다가온 시종을 정말 베어 버린 일 — 모두 그 편의 손꼽히는 일화다. 흉노의 사신을 맞을 때, 자기 풍채가 위엄이 모자란다 여겨 잘생긴 <em>최염(崔琰)</em>을 자리에 앉히고 자기는 칼을 든 <em>도부수</em>가 되어 곁에 섰다. 사신이 돌아간 뒤 <em>위왕은 어떠하더냐</em> 묻게 하니 <em>위왕도 훌륭하나 침상 곁에 칼을 잡고 선 사람이
