리로 옮겨 앉았다. 채자숙이 돌아와 사만이 거기 있는 것을 보고는 깔개째로 사만을 들어 땅에 내던지고 자기가 다시 앉았다. 사만은 관과 두건이 기울어 벗겨졌으나 천천히 일어나 옷을 털고 자리로 가니 신의(神意)가 매우 평온하여 노여움이나 낙담을 느끼지 않았다. 자리에 앉아 채자숙에게 말했다. \"그대는 기이한 사람이오, 하마터면 내 얼굴을 망칠 뻔했소.\" 채자숙이 답했다. \"나는 본래 그대 얼굴을 위해 헤아린 바 없소.\" 그 후로 두 사람은 모두 개의치 않았다.", ["도량", "분노"]], ["雅量", 32, "郗嘉賓欽崇釋道安德問，餉米千斛，修書累紙，意寄殷勤。道安答直云：「損米。」愈覺有待之為煩。", "치가빈(郗超)이 석도안(釋道安)의 덕망과 명성을 흠모하여 쌀 천 곡(斛)을 보내고 여러 장에 걸쳐 편지를 써서 그 정성스러운 뜻을 부쳤다. 도안은 답하여 다만 \"쌀을 보내 주어 고맙소\"라고만 하니, 오히려 받을 것이 있는 것이 번거롭다고 여기는 듯했다.", ["거절", "베풂", "청빈"]], ["雅量", 33, "謝安南免吏部尚書還東，謝太傅赴桓公司馬出西，相遇破岡。既當遠別，遂停三日共語。太傅欲慰其失官，安南輒引以它端。雖信宿中塗，竟不言及此事。太傅深恨在心未盡，謂同舟曰：「謝奉故是奇士。」", "사안남(謝奉)이 이부상서(吏部尙書)에서 면직되어 동쪽으로 돌아가고, 사태부(謝安)는 환공(桓溫)의 사마(司馬)로 부임하러 서쪽으로 나가다가 파강(破岡)에서 만났다. 멀리 헤어질 참이라 마침내 사흘을 머물며 함께 이야기했다. 태부가 그가 관직을 잃은 것을 위로하려 하면 안남은 번번이 다른 화제로 끌어갔다. 비록 도중에 이틀 밤을 묵었으나 끝내 이 일에 대해서는 말하지 않았다. 태부가 마음속에 못다 한 한이 깊어 같은 배에 탄 이에게 말했다. \"사봉(謝奉)은 참으로 기이한 선비로다.\"", ["도량", "우정", "권력"]], ["雅量", 34, "戴公從東出，謝太傅往看之。謝本輕戴，見但與論琴書。戴既無吝色，而談琴書愈妙。謝悠然知其量。", "대공(戴逵)이 동쪽에서 나오니 사태부(謝安)가 그를 찾아가 보았다. 사안은 본래 대규를 가벼이 여겨, 만나서는 다만 거문고와 글에 대해 논했을 뿐이다. 대규는 꺼리는 기색이 없었고, 거문고와 글에 대한 담론이 더욱 빼어났다. 사안은 유연히 그 기량(器量)을 알아보았다.", ["도량", "청담", "비평"]], ["雅量", 35, "謝公與人圍棊，俄而謝玄淮上信至。看書竟，默然無言，徐向局。客問淮上利害？答曰：「小兒輩大破賊。」意色舉止，不異於常。", "사공(謝安)이 어떤 이와 바둑을 두고 있는데, 이윽고 사현(謝玄)이 회수(淮水) 가에서 보낸 소식이 이르렀다. 편지를 다 읽고 나서 묵묵히 말이 없이 천천히 바둑판을 향했다. 객이 회수 가의 형세가 어떠한지 물었다. 답했다. \"아이들이 적을 크게 깨뜨렸소.\" 그 뜻과 낯빛과 거동이 평소와 다름이 없었다.", ["도량"]], ["雅量", 36, "王子猷、子敬曾俱坐一室，上忽發火。子猷遽走避，不惶取屐；子敬神色恬然，徐喚左右，扶憑而出，不異平常。世以此定二王神宇。", "왕자유(王徽之)와 자경(王獻之)이 일찍이 함께 한 방에 앉아 있었는데, 위에서 갑자기 불이 났다. 자유는 황급히 달려 피하느라 신발을 챙길 겨를도 없었으나, 자경은 신색(神色)이 태연하여 천천히 좌우를 불러 부축을 받으며 나가니 평소와 다름이 없었다. 세상에서는 이로써 두 왕씨의 신우(神宇)를 가늠했다.", ["도량", "용기", "비평"]], ["雅量", 37, "符堅遊魂近境，謝太傅謂子敬曰：「可將當軸，了其此處。」", "부견(符堅)이 떠도는 혼처럼 변경에 가까이 이르자, 사태부(謝安)가 자경(王獻之)에게 말했다. \"요직에 있는 자를 데려다가 이 일을 끝낼 수 있겠다.\"", ["권력", "비평"]], ["雅量", 38, "王僧彌、謝車騎共王小奴許集。僧彌舉酒勸謝云：「奉使君一觴。」謝曰：「可爾。」僧彌勃然起，作色曰：「汝故是吳興溪中釣碣耳！何敢譸張！」謝徐撫掌而笑曰：「衛軍，僧彌殊不肅省，乃侵陵上國也。」", "왕승미(王僧彌)와 사거기(謝玄)가 함께 왕소노(王小奴)의 처소에 모였다. 승미가 술잔을 들어 사현에게 권하며 말했다. \"사군(使君)께 한 잔 올립니다.\" 사현이 말했다. \"좋소.\" 승미가 발끈 일어나 낯빛을 바꾸며 말했다. \"너는 본래 오흥(吳興) 시냇가에서 낚시질하던 자일 뿐이다! 어찌 감히 큰소리치느냐!\" 사현이 천천히 손뼉을 치며 웃으며 말했다. \"위군(衛軍), 승미가 도무지 삼가 살피지 않아 도리어 상국(上國)을 능멸하는구려.\"", ["분노", "도량", "오만"]], ["雅量", 39, "王東亭為桓宣武主簿，既承藉，有美譽，公甚欲其人地為一府之望。初，見謝失儀，而神色自若。坐上賓客即相貶笑。公曰：「不然，觀其情貌，必自不凡。吾當試之。」後因月朝閣下伏，公於內走馬直出突之，左右皆宕仆，而王不動。名價於是大重，咸云「是公輔器也」。", "왕동정(王珣)이 환선무(桓溫)의 주부(主簿)가 되었는데, 좋은 가문을 이은 데다 아름다운 명성이 있어 공은 그 사람됨과 가문이 온 막부의 명망이 되기를 매우 바랐다. 처음에 그가 환온을 알현할 때 예의를 잃었으나 신색(神色)이 자약했다. 자리에 있던 빈객들이 곧 그를 헐뜯고 비웃었다. 공이 말했다. \"그렇지 않다. 그 표정과 모습을 보건대 반드시 범상치 않은 사람이다. 내가 시험해 보겠다.\" 후에 월초 조회 때 누각 아래에 엎드려 있을 때, 공이 안에서 말을 달려 곧장 뛰쳐나와 들이닥치니 좌우가 모두 자빠졌으나 왕동정은 움직이지 않았다. 명성과 평가가 이에 크게 높아져, 모두들 \"이는 재상의 그릇이다\"라고 했다.", ["용모", "예언", "도량"]], ["雅量", 40, "太元末，長星見，孝武心甚惡之。夜，華林園中飲酒，舉桮屬星云：「長星！勸爾一桮酒。自古何時有萬歲天子？」", "태원(太元) 말년에 혜성이 나타나니 효무제(孝武帝)가 마음속으로 몹시 그것을 싫어했다. 밤에 화림원(華林園)에서 술을 마시다가 잔을 들어 별을 향해 권하며 말했다. \"혜성아! 네게 한 잔 술을 권하노라. 예로부터 어느 때인들 만세를 누린 천자가 있었더냐?\"", ["담대한죽음", "술과취흥"]], ["雅量", 41, "殷荊州有所識，作賦，是束皙慢戲之流。殷甚以為有才，語王恭：「適見新文，甚可觀。」便於手巾函中出之。王讀，殷笑之不自勝。王看竟，既不笑，亦不言好惡，但以如意帖之而已。殷悵然自失。", "은형주(殷仲堪)에게 아는 이가 있어 부(賦)를 지었는데, 속석(束皙)이 희롱하던 부류였다. 은형주는 그것이 매우 재능이 있다고 여겨 왕공(王恭)에게 말했다. \"마침 새 글을 보았는데 매우 볼 만하오.\" 곧 수건 상자에서 그것을 꺼냈다. 왕공이 읽는 동안 은형주는 웃음을 참지 못했다. 왕공이 다 보고 나서는 웃지도 않고 좋다 나쁘다 말하지도 않으며, 다만 여의(如意)로 그것을 누를 뿐이었다. 은형주는 멍하니 실의에 빠졌다.", ["비평", "재능"]], ["雅量", 42, "羊綏第二子孚，少有儁才，與謝益壽相好，嘗蚤往謝許，未食。俄而王齊、王暏來。既先不相識，王向席有不說色，欲使羊去。羊了不眄，唯腳委几上，詠矚自若。謝與王敘寒溫數語畢，還與羊談賞，王方悟其奇，乃合共語。須臾食下，二王都不得餐，唯屬羊不暇。羊不大應對之，而盛進食，食畢便退。遂苦相留，羊義不住，直云：「向者不得從命，中國尚虛。」二王是孝伯兩弟。", "양수(羊綏)의 둘째 아들 부(孚)는 어려서부터 뛰어난 재능이 있어 사익수(謝益壽)와 사이가 좋았다. 일찍이 아침 일찍 사씨의 처소에 갔는데 아직 식사 전이었다. 이윽고 왕제(王齊)와 왕서(王暏)가 왔다. 본디 서로 알지 못한 터라 왕씨들이 자리를 향해 언짢은 기색으로 양부를 떠나게 하려 했다. 양부는 전혀 거들떠보지 않고 다만 다리를 안석 위에 걸친 채 시를 읊고 바라보기를 자약하게 했다. 사익수가 왕씨들과 안부 인사 몇 마디를 나누고 나서 다시 양부와 더불어 담론하며 감상하니, 왕씨들이 비로소 그 기이함을 깨닫고 함께 이야기에 어울렸다. 잠시 후 음식이 나오니, 두 왕씨는 도무지 먹지 못하고 오직 양부에게 권하기에 바빴다. 양부는 그들에게 크게 응대하지 않고 음식을 잔뜩 먹더니, 다 먹고는 곧 물러났다. 마침내 간곡히 만류했으나 양부는 의리상 머물지 않고 다만 말했다. \"아까 명을 따르지 못한 것은 뱃속이 아직 비었기 때문이오.\" 두 왕씨는 효백(孝伯)의 두 아우였다.", ["용모", "도량", "기지"]], ["識鑒", 1, "曹公少時見喬玄，玄謂曰：「天下方亂，羣雄虎爭，撥而理之，非君乎？然君實亂世之英雄，治世之姦賊。恨吾老矣，不見君富貴，當以子孫相累。」", "조공(曹操)이 젊었을 때 교현(喬玄)을 만났는데, 교현이 그에게 말했다. \"천하가 바야흐로 어지러워 뭇 영웅이 호랑이처럼 다투니, 이를 다스려 바로잡을 자는 그대가 아니겠는가? 그러나 그대는 실로 난세의 영웅이요 치세의 간적(姦賊)이로다. 내가 늙어 그대가 부귀해지는 것을 보지 못함이 한스러우니, 마땅히 자손을 그대에게 맡기겠소.\"", ["예언", "비평"]], ["識鑒", 2, "曹公問裴潛曰：「卿昔與劉備共在荊州，卿以備才如何？潛曰：「使居中國，能亂人，不能為治。若乘邊守險，足為一方之主。」", "조공(曹操)이 배잠(裴潛)에게 물었다. \"그대가 예전에 유비(劉備)와 함께 형주(荊州)에 있었는데, 그대는 유비의 재능을 어떻게 보았소?\" 배잠이 답했다. \"중원에 있게 한다면 사람을 어지럽힐 수는 있어도 다스리지는 못할 것이오. 만약 변경을 차지하여 험한 곳을 지킨다면 한 지방의 주인이 되기에 충분할 것이오.\"", ["비평", "예언"]], ["識鑒", 3, "何晏、鄧颺、夏侯玄並求傅嘏交，而嘏終不許。諸人乃因荀粲說合之，謂嘏曰：「夏侯太初一時之傑士，虛心於子，而卿意懷不可，交合則好成，不合則致隟。二賢若穆，則國之休，此藺相如所以下廉頗也。」傅曰：「夏侯太初，志大心勞，能合虛譽，誠所謂利口覆國之人。何晏、鄧颺有為而躁，博而寡要，外好利而內無關籥，貴同惡異，多言而妬前。多言多釁，妬前無親。以吾觀之：此三賢者，皆敗德之人爾！遠之猶恐罹禍，況可親之邪？」後皆如其言。", "하안(何晏), 등양(鄧颺), 하후현(夏侯玄)이 모두 부하(傅嘏)와 사귀기를 구했으나 부하는 끝내 허락하지 않았다. 여러 사람이 이에 순찬(荀粲)을 통해 화합시키려고 부하에게 말했다. \"하후태초(夏侯玄)는 한 시대의 걸출한 선비로 그대에게 마음을 비우고 있는데, 그대의 뜻은 받아들이지 않으니, 사귀어 화합하면 좋은 일이 이루어지고 화합하지 못하면 틈이 생기오. 두 현인이 화목하면 나라의 경사이니, 이는 인상여(藺相如)가 염파(廉頗)에게 몸을 낮춘 까닭이오.\" 부하가 말했다. \"하후태초는 뜻은 크나 마음이 수고로워, 헛된 명예를 모을 수는 있으나 참으로 이른바 말재주로 나라를 뒤엎을 사람이오. 하안과 등양은 일을 벌이되 조급하고, 박식하나 요체가 적으며, 밖으로는 이익을 좋아하되 안으로는 빗장이 없고, 같은 것을 귀히 여기고 다른 것을 싫어하며, 말이 많고 앞선 자를 시기하오. 말이 많으면 흠이 많고, 앞선 자를 시기하면 친한 이가 없는 법이오. 내가 보건대 이 세 현인은 모두 덕을 무너뜨릴 사람들일 뿐이오! 멀리해도 화를 입을까 두려운데, 하물며 가까이할 수 있겠소?\" 후에 모두 그 말과 같이 되었다.", ["비평", "거절", "예언"]], ["識鑒", 4, "晉武帝講武於宣武場，帝欲偃武修文，親自臨幸，悉召羣臣。山公謂不宜爾，因與諸尚書言孫、吳用兵本意。遂究論，舉坐無不咨嗟。皆曰：「山少傅乃天下名言。」後諸王驕汰，輕遘禍難，於是寇盜處處蟻合，郡國多以無備，不能制服，遂漸熾盛，皆如公言。時人以謂山濤不學孫、吳，而闇與之理會。王夷甫亦歎云：「公闇與道合。」", "진 무제(晉武帝)가 선무장(宣武場)에서 무예를 강습할 때, 제는 무를 거두고 문을 닦고자 하여 친히 임하고 뭇 신하를 모두 불렀다. 산공(山濤)이 그래서는 안 된다 여겨 여러 상서(尙書)들과 더불어 손무(孫武)와 오기(吳起)의 용병의 본뜻을 논했다. 마침내 깊이 따져 논하니 자리에 있던 모든 이가 감탄하지 않는 이가 없었다. 모두 말했다. \"산소부(山濤)야말로 천하의 명언이로다.\" 후에 여러 왕이 교만하고 사치하여 가벼이 환난을 일으키니, 이에 도적들이 곳곳에서 개미떼처럼 모였는데, 군국(郡國)이 대부분 방비가 없어 제압하지 못하니 마침내 점점 치성해진 것이 모두 공의 말과 같았다. 당시 사람들은 산도가 손무와 오기를 배우지 않았는데도 그 이치에 은연중 부합했다고 여겼다. 왕이보(王衍)도 감탄하여 말했다. \"공은 도(道)와 은연중 부합한다.\"", ["지혜", "예언", "간언"]], ["識鑒", 5, "王夷甫父乂為平北將軍，有公事，使行人論不得。時夷甫在京師，命駕見僕射羊祜、尚書山濤。夷甫時總角，姿才秀異，敘致既快，事加有理，濤甚奇之。既退，看之不輟，乃歎曰：「生兒不當如王夷甫邪？」羊祜曰：「亂天下者，必此子也！」", "왕이보(王衍)의 부친 왕예(王乂)가 평북장군(平北將軍)이 되었을 때 공무가 있어 사자를 보내 논했으나 해결되지 않았다. 그때 왕이보가 경사(京師)에 있어 수레를 명하여 복야(僕射) 양호(羊祜)와 상서(尙書) 산도(山濤)를 만났다. 왕이보는 그때 총각(總角)이었는데, 자태와 재능이 빼어나고 진술이 명쾌한 데다 일에 이치가 더해지니, 산도가 그를 매우 기특히 여겼다. 물러간 뒤에도 그를 바라보기를 그치지 않다가 탄식하며 말했다. \"아들을 낳으면 마땅히 왕이보 같아야 하지 않겠는가?\" 양호가 말했다. \"천하를 어지럽힐 자는 반드시 이 아이일 것이오!\"", ["신동", "예언", "비평"]], ["識鑒", 6, "潘陽仲見王敦小時，謂曰：「君蜂目已露，但豺聲未振耳。必能食人，亦當為人所食。", "반양중(潘陽仲)이 왕돈(王敦)이 어렸을 때 보고 그에게 말했다. \"그대는 벌의 눈이 이미 드러났으나, 다만 승냥이의 소리가 아직 떨치지 않았을 뿐이오. 반드시 사람을 잡아먹을 것이며, 또한 마땅히 사람에게 잡아먹힐 것이오.\"", ["예언", "비평"]], ["識鑒", 7, "石勒不知書，使人讀漢書。聞酈食其勸立六國後，刻印將授之，大驚曰：「此法當失，云何得遂有天下？」至留侯諫，迺曰：「賴有此耳！」", "석륵(石勒)은 글을 알지 못하여 사람을 시켜 『한서(漢書)』를 읽게 했다. 역이기(酈食其)가 여섯 나라의 후예를 세우자고 권하여 인장을 새겨 주려 했다는 대목을 듣고 크게 놀라 말했다. \"이 방법은 마땅히 실패할 터인데, 어찌 끝내 천하를 얻을 수 있었단 말인가?\" 유후(留侯, 장량)가 간언하는 데 이르러서야 곧 말했다. \"다행히 이런 사람이 있었구나!\"", ["학문", "지혜", "간언"]], ["識鑒", 8, "衛玠年五歲，神衿可愛。祖太保曰：「此兒有異，顧吾老，不見其大耳！」", "위개(衛玠)는 다섯 살 때 신금(神衿)이 사랑스러웠다. 조부 태보(太保)가 말했다. \"이 아이는 남다른 데가 있으나, 내가 늙은 것이 한스럽다. 이 아이가 크는 것을 보지 못하겠구나!\"", ["신동", "용모", "예언"]], ["識鑒", 9, "劉越石云：「華彥夏識能不足，彊果有餘。」", "유월석(劉越石)이 말했다. \"화언하(華彥夏)는 식견과 능력은 부족하나 굳세고 과단함은 넘친다.\"", ["비평"]], ["識鑒", 10, "張季鷹辟齊王東曹掾，在洛見秋風起，因思吳中菰菜羹、鱸魚膾，曰：「人生貴得適意爾，何能羈宦數千里以要名爵！」遂命駕便歸。俄而齊王敗，時人皆謂為見機。", "장계응(張季鷹)이 제왕(齊王)의 동조연(東曹掾)으로 불려갔는데, 낙양(洛陽)에서 가을바람이 이는 것을 보고는 오중(吳中)의 줄나물국과 농어회가 생각나 말했다. \"인생은 뜻에 맞게 사는 것이 귀할 따름이니, 어찌 수천 리 밖에서 벼슬에 매여 명예와 작위를 구할 수 있으랴!\" 마침내 수레를 명하여 곧 돌아갔다. 이윽고 제왕이 패망하니, 당시 사람들이 모두 그가 기미를 알아보았다고 했다.", ["은둔", "예언", "풍류"]], ["識鑒", 11, "諸葛道明初過江左，自名道明，名亞王、庾之下。先為臨沂令，丞相謂曰：「明府當為黑頭公。」", "제갈도명(諸葛道明)이 처음 강좌(江左)로 건너왔을 때 스스로 도명이라 이름하니, 명성이 왕씨와 유씨의 아래에 버금갔다. 앞서 임기(臨沂) 현령이 되었는데, 승상(왕도)이 그에게 말했다. \"명부(明府)께서는 마땅히 검은 머리의 삼공이 되실 것이오.\"", ["예언", "비평", "제갈씨"]], ["識鑒", 12, "王平子素不知眉子，曰：「志大其量，終當死塢壁間。」", "왕평자(王平子)는 본디 미자(眉子)를 인정하지 않아 말했다. \"뜻이 그 기량(器量)보다 크니, 끝내는 보루 사이에서 죽을 것이다.\"", ["예언", "비평"]], ["識鑒", 13, "王大將軍始下，楊朗苦諫不從，遂為王致力，乘「中鳴雲露車」逕前曰：「聽下官鼓音，一進而捷。」王先把其手曰：「事克，當相用為荊州。」既而忘之，以為南郡。王敗後，明帝收朗，欲殺之。帝尋崩，得免。後兼三公，署數十人為官屬。此諸人當時並無名，後皆被知遇，于時稱其知人。", "왕대장군(王敦)이 처음 내려올 때 양랑(楊朗)이 간곡히 간했으나 듣지 않으니, 마침내 왕돈을 위해 힘을 다하여 '중명운로거(中鳴雲露車)'를 타고 곧장 앞으로 나아가 말했다. \"하관(下官)의 북소리를 들으시오, 한 번 진격하면 이길 것이오.\" 왕돈이 먼저 그의 손을 잡고 말했다. \"일이 이루어지면 마땅히 그대를 형주(荊州)에 쓰겠소.\" 그러나 이내 잊고 남군(南郡)으로 삼았다. 왕돈이 패한 후 명제(明帝)가 양랑을 잡아 죽이려 했다. 제가 곧 붕어하여 화를 면했다. 후에 삼공을 겸하여 수십 명을 관속(官屬)으로 임명했다. 이 사람들은 당시에 모두 이름이 없었으나 후에 모두 인정을 받으니, 당시에 그가 사람을 알아본다고 칭송했다.", ["충직", "간언", "비평"]], ["識鑒", 14, "周伯仁母冬至舉酒賜三子曰：「吾本謂度江託足無所。爾家有相，爾等並羅列吾前，復何憂？」周嵩起，長跪而泣曰：「不如阿母言。伯仁為人志大而才短，名重而識闇，好乘人之弊，此非自全之道。嵩性狼抗，亦不容於世。唯阿奴碌碌，當在阿母目下耳！」", "주백인(周顗)의 모친이 동지에 술잔을 들어 세 아들에게 내리며 말했다. \"나는 본래 강을 건너면 발붙일 곳이 없으리라 여겼다. 너희 집안에는 좋은 상(相)이 있어 너희가 모두 내 앞에 늘어서 있으니, 다시 무엇을 근심하랴?\" 주숭(周嵩)이 일어나 길게 꿇어앉아 울며 말했다. \"어머님 말씀과는 같지 않습니다. 백인은 사람됨이 뜻은 크나 재능이 짧고, 명성은 무거우나 식견이 어두우며, 남의 약점을 타기를 좋아하니, 이는 스스로를 온전히 보전하는 길이 아닙니다. 저 숭은 성품이 거칠고 오만하여 역시 세상에 용납되지 못할 것입니다. 오직 아노(阿奴)만이 평범하여 마땅히 어머님 슬하에 있을 것입니다!\"", ["비평", "예언", "여인"]], ["識鑒", 15, "王大將軍既亡，王應欲投世儒，世儒為江州。王含欲投王舒，舒為荊州。含語應曰：「大將軍平素與江州云何？而汝欲歸之。」應曰：「此迺所以宜往也。江州當人彊盛時，能抗同異，此非常人所行。及覩衰厄，必興愍惻。荊州守文，豈能作意表行事？」含不從，遂共投舒。舒果沈含父子于江。彬聞應當來，密具船以待之，竟不得來，深以為恨。", "왕대장군(王敦)이 죽고 나서, 왕응(王應)은 세유(世儒)에게 의탁하려 하였으니, 세유는 강주(江州)자사였다. 왕함(王含)은 왕서(王舒)에게 의탁하려 하였으니, 서는 형주(荊州)자사였다. 함이 응에게 말하였다. \"대장군께서 평소 강주와 사이가 어떠하였느냐? 그런데 너는 그에게 가려 하느냐.\" 응이 말하였다. \"이것이 바로 마땅히 가야 할 까닭입니다. 강주는 사람이 강성할 때에 능히 다름을 맞서 내세웠으니, 이는 보통 사람이 행할 바가 아닙니다. 쇠하고 곤궁한 처지를 보면 반드시 측은한 마음을 일으킬 것입니다. 형주는 법문을 지킬 뿐이니 어찌 뜻 밖의 일을 행할 수 있겠습니까.\" 함은 따르지 않고 마침내 함께 서에게 의탁하였다. 서는 과연 함 부자를 강물에 빠뜨렸다. 빈(彬)은 응이 오리라는 말을 듣고 몰래 배를 갖추어 그를 기다렸으나 끝내 오지 못하자, 깊이 한스럽게 여겼다.", ["지혜", "원한", "죽음"]], ["識鑒", 16, "武昌孟嘉作庾太尉州從事，已知名。褚太傅有知人鑒，罷豫章還，過武昌，問庾曰：「聞孟從事佳，今在此不？」庾云：「卿自求之。」褚眄睞良久，指嘉曰：「此君小異，得無是乎？」庾大笑曰：「然！」于時既歎褚之默識，又欣嘉之見賞。", "무창(武昌)의 맹가(孟嘉)는 유태위(庾亮)의 주(州) 종사가 되었는데 이미 이름이 알려져 있었다. 저태부(褚太傅)는 사람을 알아보는 안목이 있었는데, 예장(豫章)에서 직임을 마치고 돌아오는 길에 무창을 지나며 유량(庾亮)에게 물었다. \"맹종사가 훌륭하다 들었는데, 지금 여기 있소?\" 유량이 말하였다. \"그대가 직접 찾아보시오.\" 저태부가 한참 동안 좌우를 둘러보더니 맹가를 가리키며 말하였다. \"이분이 조금 남다르니, 이 사람이 아니겠소?\" 유량이 크게 웃으며 말하였다. \"그렇소!\" 그때 사람들은 저태부의 말없이 알아보는 식견에 감탄하였고, 또 맹가가 그 인정을 받은 것을 기뻐하였다.", ["비평", "용모"]], ["識鑒", 17, "戴安道年十餘歲，在瓦官寺畫。王長史見之曰：「此童非徒能畫，亦終當致名。恨吾老，不見其盛時耳！」", "대안도(戴逵)는 나이 열 몇 살 때 와관사(瓦官寺)에서 그림을 그렸다. 왕장사(王濛)가 그를 보고 말하였다. \"이 아이는 다만 그림에 능할 뿐 아니라 끝내 마땅히 이름을 떨치리라. 내가 늙어 그 성대한 때를 보지 못함이 한스러울 따름이다!\"", ["신동", "서화", "예언"]], ["識鑒", 18, "王仲祖、謝仁祖、劉真長俱至丹陽墓所省殷揚州，殊有確然之志。既反，王、謝相謂曰：「淵源不起，當如蒼生何？」深為憂嘆。劉曰：「卿諸人真憂淵源不起邪？」", "왕중조(王濛)·사인조(謝尚)·유진장(劉惔)이 함께 단양(丹陽)의 묘소에 가서 은양주(殷浩)를 찾아보았는데, 그에게는 자못 확고한 뜻이 있었다. 돌아온 뒤 왕몽(王濛)과 사상(謝尚)이 서로 일러 말하였다. \"연원(殷浩)이 나서지 않으면 백성을 어찌하겠는가?\" 깊이 근심하며 탄식하였다. 유담(劉惔)이 말하였다. \"그대들은 정말로 연원이 나서지 않을까 근심하는 것이오?\"", ["은둔", "비평"]], ["識鑒", 19, "小庾臨終，自表以子園客為代。朝廷慮其不從命，未知所遣，乃共議用桓溫。劉尹曰：「使伊去，必能克定西楚，然恐不可復制。」", "소유(庾翼)가 임종할 때 스스로 표를 올려 아들 원객(園客)을 후임으로 삼고자 하였다. 조정은 그가 명을 따르지 않을까 염려하여 누구를 보낼지 알지 못하다가, 마침내 함께 의논하여 환온(桓溫)을 쓰기로 하였다. 유윤(劉惔)이 말하였다. \"그를 보내면 반드시 능히 서초(西楚)를 평정하리라. 그러나 다시는 제어할 수 없게 될까 두렵소.\"", ["예언", "권력", "비평"]], ["識鑒", 20, "桓公將伐蜀，在事諸賢咸以李勢在蜀既久，承藉累葉，且形據上流，三峽未易可克。唯劉尹云：「伊必能克蜀。觀其蒲博，不必得，則不為。」", "환공(桓溫)이 촉(蜀)을 치려 하자, 일을 맡은 여러 현인들은 모두 이세(李勢)가 촉에 있은 지 이미 오래고 여러 대를 이어받았으며, 또한 지세가 상류를 차지하고 있어 삼협(三峽)을 쉬이 이길 수 없다고 하였다. 오직 유윤(劉惔)만이 말하였다. \"그는 반드시 촉을 이길 수 있소. 그가 도박하는 것을 보면, 반드시 이기지 못할 것이면 하지 않습디다.\"", ["예언", "비평", "지혜"]], ["識鑒", 21, "謝公在東山畜妓，簡文曰：「安石必出。既與人同樂，亦不得不與人同憂。」", "사공(謝安)이 동산(東山)에 있을 때 기녀를 두었는데, 간문제(簡文帝)가 말하였다. \"안석(謝安)은 반드시 세상에 나오리라. 이미 남과 더불어 즐거움을 함께 하니, 또한 남과 더불어 근심을 함께 하지 않을 수 없을 것이다.\"", ["예언", "비평"]], ["識鑒", 22, "郗超與謝玄不善。符堅將問晉鼎，既已狼噬梁、岐，又虎視淮陰矣。于時朝議遣玄北討，人間頗有異同之論。唯超曰：「是必濟事。吾昔嘗與共在桓宣武府，見使才皆盡，雖履屐之間，亦得其任。以此推之，容必能立勳。」元功既舉，時人咸歎超之先覺，又重其不以愛憎匿善。", "치초(郗超)는 사현(謝玄)과 사이가 좋지 않았다. 부견(符堅)이 장차 진(晉)의 정권을 노려, 이미 양주(梁)·기주(岐)를 이리처럼 삼키고 또 회음(淮陰)을 호랑이처럼 노려보았다. 그때 조정의 의론은 사현을 보내 북으로 토벌하게 하려 하였는데, 세간에는 자못 찬반의 다른 의론이 있었다. 오직 치초만이 말하였다. \"이 사람은 반드시 일을 이루리라. 내가 예전에 환선무(桓溫)의 부에서 함께 있을 때, 그가 사람을 부리면 그 재능을 모두 다하게 하여, 비록 신발을 신고 끄는 사소한 일에 이르기까지 그 적임을 얻게 함을 보았소. 이로 미루어 보건대, 반드시 능히 공을 세우리라.\" 큰 공이 이루어지자, 당시 사람들은 모두 치초의 앞선 식견에 감탄하였고, 또 그가 애증으로 남의 좋은 점을 묻어두지 않음을 중히 여겼다.", ["예언", "비평", "도량"]], ["識鑒", 23, "韓康伯與謝玄亦無深好。玄北征後，巷議疑其不振。康伯曰：「此人好名，必能戰。」玄聞之甚忿，常於眾中厲色曰：「丈夫提千兵，入死地，以事君親，故發，不得復云為名。」", "한강백(韓康伯)도 사현(謝玄)과 깊은 친분은 없었다. 사현이 북으로 정벌하러 간 뒤, 거리의 의론은 그가 떨치지 못하리라 의심하였다. 한강백이 말하였다. \"이 사람은 이름을 좋아하니 반드시 능히 싸우리라.\" 사현이 이를 듣고 몹시 분개하여, 늘 여러 사람 가운데서 정색하고 말하였다. \"대장부가 천 명의 군사를 이끌고 사지에 들어가 임금과 어버이를 섬기는 까닭에 떨쳐 나서는 것이니, 다시는 이름을 위함이라 말할 수 없다.\"", ["비평", "충직", "예언"]], ["識鑒", 24, "褚期生少時，謝公甚知之，恆云：「褚期生若不佳者，僕不復相士。」", "저기생(褚期生)이 젊었을 때 사공(謝安)이 그를 매우 알아주어 늘 말하였다. \"저기생이 만약 훌륭하지 않다면, 나는 다시는 사람을 평하지 않으리라.\"", ["비평"]], ["識鑒", 25, "郗超與傅瑗周旋，瑗見其二子並總髮。超觀之良久，謂瑗曰：「小者才名皆勝，然保卿家，終當在兄。」即傅亮兄弟也。", "치초(郗超)가 부원(傅瑗)과 교유하였는데, 부원이 두 아들을 데려와 모두 머리를 묶고 있을 때였다. 치초가 한참 동안 그들을 살펴보고 부원에게 말하였다. \"작은아이가 재주와 명망이 모두 나으나, 그대의 가문을 보전할 자는 끝내 형에게 있을 것이오.\" 이가 곧 부량(傅亮) 형제이다.", ["예언", "비평", "신동"]], ["識鑒", 26, "王恭隨父在會稽，王大自都來拜墓。恭暫往墓下看之，二人素善，遂十餘日方還。父問恭：「何故多日？」對曰：「與阿大語，蟬連不得歸。」因語之曰：「恐阿大非爾之友。」終乖愛好，果如其言。", "왕공(王恭)은 아버지를 따라 회계(會稽)에 있었는데, 왕대(王大)가 도성에서 와서 성묘를 하였다. 왕공이 잠시 묘소로 가서 그를 보았는데, 두 사람은 본디 사이가 좋아 마침내 십여 일이 지나서야 돌아왔다. 아버지가 왕공에게 물었다. \"무슨 까닭으로 여러 날이 걸렸느냐?\" 대답하였다. \"아대(王大)와 이야기하느라 끊임없이 이어져 돌아올 수 없었습니다.\" 그리고 일러 말하였다. \"아마도 아대는 네 벗이 아닐 것이다.\" 끝내 사랑과 우의가 어긋나니, 과연 그 말과 같았다.", ["우정", "예언", "비평"]], ["識鑒", 27, "車胤父作南平郡功曹，太守王胡之避司馬無忌之難，置郡于酆陰。是時胤十餘歲，胡之每出，嘗於籬中見而異焉。謂胤父曰：「此兒當致高名。」後遊集，恆命之。胤長，又為桓宣武所知。清通於多士之世，官至選曹尚書。", "거윤(車胤)의 아버지는 남평군(南平郡)의 공조(功曹)였는데, 태수 왕호지(王胡之)가 사마무기(司馬無忌)의 난을 피하여 군을 풍음(酆陰)에 두었다. 이때 거윤은 나이 열 몇 살이었는데, 왕호지가 나갈 때마다 일찍이 울타리 안에서 그를 보고 기특하게 여겼다. 거윤의 아버지에게 일러 말하였다. \"이 아이는 마땅히 높은 명성을 이루리라.\" 뒤에 유연이 모일 때면 늘 그를 불렀다. 거윤이 자라서 또한 환선무(桓溫)에게 인정받았다. 인재가 많은 세상에서 청통(淸通)하여, 벼슬이 선조상서(選曹尙書)에 이르렀다.", ["예언", "비평", "신동"]], ["識鑒", 28, "王忱死，西鎮未定，朝貴人人有望。時殷仲堪在門下，雖居機要，資名輕小，人情未以方嶽相許。晉孝武欲拔親近腹心，遂以殷為荊州。事定，詔未出。王珣問殷曰：「陝西何故未有處分？」殷曰：「已有人。」王歷問公卿，咸云「非」。王自計才地必應在己，復問：「非我邪？」殷曰：「亦似非。」其夜詔出用殷。王語所親曰：「豈有黃門郎而受如此任？仲堪此舉迺是國之亡徵。」", "왕침(王忱)이 죽자 서쪽 진(鎭)이 정해지지 않아, 조정의 귀인들이 사람마다 바라는 마음이 있었다. 그때 은중감(殷仲堪)은 문하(門下)에 있어 비록 기요(機要)의 자리에 있었으나 자질과 명망이 가볍고 작아, 사람들은 그를 방악(方嶽)의 임무로 허락하지 않았다. 진효무제(晉孝武帝)는 친근한 심복을 발탁하고자 하여 마침내 은중감을 형주(荊州)자사로 삼았다. 일이 정해졌으나 조서는 아직 나오지 않았다. 왕순(王珣)이 은중감에게 물었다. \"섬서(陝西)는 무슨 까닭으로 아직 처분이 없소?\" 은중감이 말하였다. \"이미 사람이 정해졌소.\" 왕순이 공경(公卿)을 차례로 물으니 모두 \"아니다\"라고 하였다. 왕순은 스스로 헤아리기에 재주와 지위가 반드시 자기에게 있을 것이라 여겨, 다시 물었다. \"내가 아니오?\" 은중감이 말하였다. \"또한 아닌 듯하오.\" 그날 밤 조서가 나와 은중감을 쓴다 하였다. 왕순이 가까운 이에게 말하였다. \"어찌 황문랑(黃門郎)으로서 이러한 임무를 받는단 말인가? 중감의 이 거사는 곧 나라가 망할 조짐이다.\"", ["권력", "비평", "예언"]], ["賞譽", 1, "陳仲舉嘗歎曰：「若周子居者，真治國之器。譬諸寶劍，則世之干將。」", "진중거(陳蕃)가 일찍이 탄식하여 말하였다. \"주자거(周子居) 같은 이는 참으로 나라를 다스릴 그릇이다. 보검에 비유하자면 세상의 간장(干將)이다.\"", ["비평"]], ["賞譽", 2, "世目李元禮：「謖謖如勁松下風。」", "세상에서는 이원례(李膺)를 이렇게 평하였다. \"우뚝하기가 굳센 소나무 아래의 바람 같다.\"", ["비평", "용모"]], ["賞譽", 3, "謝子微見許子將兄弟曰：「平輿之淵，有二龍焉。」見許子政弱冠之時，歎曰：「若許子政者，有榦國之器。正色忠謇，則陳仲舉之匹；伐惡退不肖，范孟博之風。」", "사자미(謝子微)가 허자장(許子將) 형제를 보고 말하였다. \"평여(平輿)의 못에 두 마리 용이 있구나.\" 허자정(許子政)이 약관일 때 보고 탄식하여 말하였다. \"허자정 같은 이는 나라를 떠받칠 그릇이 있다. 정색하고 충직하기로는 진중거(陳蕃)의 짝이요, 악을 치고 못난 자를 물리침은 범맹박(范孟博)의 풍모이다.\"", ["비평", "충직"]], ["賞譽", 4, "公孫度目邴原：所謂雲中白鶴，非燕雀之網所能羅也。", "공손도(公孫度)가 병원(邴原)을 평하였다. \"이른바 구름 속의 흰 학이니, 제비나 참새 잡는 그물로 사로잡을 수 있는 바가 아니다.\"", ["비평", "은둔"]], ["賞譽", 5, "鍾士季目王安豐：阿戎了了解人意。謂裴公之談，經日不竭。吏部郎闕，文帝問其人於鍾會。會曰：「裴楷清通，王戎簡要，皆其選也。」於是用裴。", "종사계(鍾會)가 왕안풍(王戎)을 평하였다. \"아융(王戎)은 또렷하게 남의 뜻을 잘 이해한다.\" 배공(裴楷)의 담론을 평하기를, 온종일 이야기해도 다하지 않는다고 하였다. 이부랑(吏部郎) 자리가 비자, 문제(司馬昭)가 종회에게 그 적임자를 물었다. 종회가 말하였다. \"배해(裴楷)는 청통(淸通)하고 왕융(王戎)은 간요(簡要)하니, 모두 그 인선감입니다.\" 이에 배해를 썼다.", ["비평", "권력"]], ["賞譽", 6, "王濬沖、裴叔則二人，總角詣鍾士季。須臾去後，客問鍾曰：「向二童何如？」鍾曰：「裴楷清通，王戎簡要。後二十年，此二賢當為吏部尚書，冀爾時天下無滯才。」", "왕준충(王戎)과 배숙칙(裴楷) 두 사람이 더벅머리 시절에 종사계(鍾會)를 찾아갔다. 잠시 뒤 떠난 후에 객이 종회에게 물었다. \"방금 두 아이는 어떻소?\" 종회가 말하였다. \"배해는 청통(淸通)하고 왕융은 간요(簡要)하오. 이후 이십 년이면 이 두 현인이 마땅히 이부상서(吏部尙書)가 될 것이니, 바라건대 그때에는 천하에 묻힌 인재가 없으리라.\"", ["비평", "예언", "신동"]], ["賞譽", 7, "諺曰：「後來領袖有裴秀。」", "속담에 이르기를 \"후진의 영수에는 배수(裴秀)가 있다\"고 하였다.", ["비평"]], ["賞譽", 8, "裴令公目夏侯太初：「肅肅如入廊廟中，不脩敬而人自敬。」一曰：「如入宗廟，琅琅但見禮樂器。見鍾士季，如觀武庫，但覩矛戟。見傅蘭碩，江廧靡所不有。見山巨源，如登山臨下，幽然深遠。」", "배영공(裴楷)이 하후태초(夏侯玄)를 평하였다. \"엄숙하기가 마치 낭묘(廊廟)에 들어선 듯하여, 공경을 차리지 않아도 사람이 절로 공경하게 된다.\" 또 한 가지 설에는 이렇게 말하였다. \"종묘(宗廟)에 들어선 듯하여, 환하게 빛나는 예악(禮樂)의 기물만이 보인다. 종사계(鍾會)를 보면 무기고를 보는 듯하여 창과 극만이 보인다. 부란석(傅蘭碩)을 보면 강가의 담장처럼 없는 것이 없다. 산거원(山濤)을 보면 산에 올라 아래를 굽어보는 듯하여, 그윽하고 깊고 아득하다.\"", ["비평", "용모"]], ["賞譽", 9, "羊公還洛，郭奕為野王令。羊至界，遣人要之。郭便自往。既見，歎曰：「羊叔子何必減郭太業！」復往羊許，小悉還，又歎曰：「羊叔子去人遠矣！」羊既去，郭送之彌日，一舉數百里，遂以出境免官。復嘆曰：「羊叔子何必減顏子！」", "양공(羊祜)이 낙양(洛陽)으로 돌아갈 때, 곽혁(郭奕)이 야왕(野王) 현령이었다. 양공이 경계에 이르자 사람을 보내 그를 맞이하였다. 곽혁이 곧 직접 갔다. 만나 보고 나서 탄식하여 말하였다. \"양숙자(羊祜)가 어찌 반드시 곽태업(郭奕)보다 못하겠는가!\" 다시 양공의 처소에 가서 조금 머물다 돌아온 뒤 또 탄식하여 말하였다. \"양숙자는 남들보다 멀리 뛰어나구나!\" 양공이 떠나자 곽혁이 그를 온종일 배웅하여 단번에 수백 리를 가니, 마침내 경계를 벗어났다 하여 관직에서 면직되었다. 다시 탄식하여 말하였다. \"양숙자가 어찌 반드시 안자(顏子)보다 못하겠는가!\"", ["비평", "우정"]], ["賞譽", 10, "王戎目山巨源：「如璞玉渾金，人皆欽其寶，莫知名其器。」", "왕융(王戎)이 산거원(山濤)을 평하였다. \"가공하지 않은 옥과 제련하지 않은 쇠 같아서, 사람들이 모두 그 보배로움을 흠모하나 누구도 그 그릇을 무어라 이름할 줄 모른다.\"", ["비평"]], ["賞譽", 11, "羊長和父繇，與太傅祜同堂相善，仕至車騎掾。蚤卒。長和兄弟五人，幼孤。祜來哭，見長和哀容舉止，宛若成人，迺嘆曰：「從兄不亡矣！」", "양장화(羊長和)의 아버지 요(繇)는 태부 호(羊祜)와 사촌 형제로 서로 사이가 좋았는데, 벼슬이 거기연(車騎掾)에 이르렀다. 일찍 죽었다. 장화 형제 다섯 사람은 어려서 고아가 되었다. 양호가 와서 곡하다가, 장화의 슬퍼하는 모습과 거동이 완연히 성인과 같음을 보고 마침내 탄식하여 말하였다. \"종형이 죽지 않았구나!\"", ["비평", "효", "죽음"]], ["賞譽", 12, "山公舉阮咸為吏部郎，目曰：「清真寡欲，萬物不能移也。」", "산공(山濤)이 완함(阮咸)을 천거하여 이부랑(吏部郎)으로 삼으며 평하였다. \"맑고 진실하며 욕심이 적어, 만물이 그를 움직일 수 없다.\"", ["비평", "청빈"]], ["賞譽", 13, "王戎目阮文業：「清倫有鑒識，漢元以來，未有此人。」", "왕융(王戎)이 완문업(阮文業)을 평하였다. \"맑은 인륜과 감식(鑒識)이 있으니, 한(漢) 원제(元帝) 이래로 이런 사람이 없었다.\"", ["비평"]], ["賞譽", 14, "武元夏目裴、王曰：「戎尚約，楷清通。」", "무원하(武元夏)가 배해와 왕융을 평하였다. \"융(王戎)은 검약을 숭상하고, 해(裴楷)는 청통(淸通)하다.\"", ["비평", "청빈"]], ["賞譽", 15, "庾子嵩目和嶠：「森森如千丈松，雖磊砢有節目，施之大廈，有棟梁之用。」", "유자숭(庾子嵩)이 화교(和嶠)를 평하였다. \"우뚝하기가 천 길 소나무 같아서, 비록 울퉁불퉁 옹이가 있으나, 큰 집에 쓰면 동량(棟梁)의 쓸모가 있다.\"", ["비평"]], ["賞譽", 16, "王戎云：「太尉神姿高徹，如瑤林瓊樹，自然是風塵外物。」", "왕융(王戎)이 말하였다. \"태위(王衍)의 신묘한 자태는 높고 투철하여, 마치 옥의 숲과 옥의 나무 같으니, 자연히 풍진(風塵) 밖의 인물이다.\"", ["비평", "용모"]], ["賞譽", 17, "王汝南既除所生服，遂停墓所。兄子濟每來拜墓，略不過叔，叔亦不候。濟脫時過，止寒溫而已。後聊試問近事，答對甚有音辭，出濟意外，濟極惋愕。仍與語，轉造精微。濟先略無子姪之敬，既聞其言，不覺懍然，心形俱肅。遂留共語，彌日累夜。濟雖儁爽，自視缺然，乃喟然歎曰：「家有名士，三十年而不知！」濟去，叔送至門。濟從騎有一馬，絕難乘，少能騎者。濟聊問叔：「好騎乘不？」曰：「亦好爾。」濟又使騎難乘馬，叔姿形既妙，回策如縈，名騎無以過之。濟益嘆其難測，非復一事。既還，渾問濟：「何以暫行累日？」濟曰：「始得一叔。」渾問其故？濟具歎述如此。渾曰：「何如我？」濟曰：「濟以上人。」武帝每見濟，輒以湛調之曰：「卿家癡叔死未？」濟常無以答。既而得叔，後武帝又問如前，濟曰：「臣叔不癡。」稱其實美。帝曰：「誰比？」濟曰：「山濤以下，魏舒以上。」於是顯名。年二十八，始宦。", "왕여남(王述)이 생모의 상복을 벗고 나서, 마침내 묘소에 머물렀다. 형의 아들 제(王濟)가 성묘하러 올 때마다 거의 숙부에게 들르지 않았고, 숙부도 그를 찾지 않았다. 제가 어쩌다 들를 때면 안부만 묻고 그칠 뿐이었다. 뒤에 시험삼아 근래의 일을 물었더니, 대답하는 말이 자못 가락과 문채가 있어 제의 뜻 밖이었으니, 제는 몹시 놀라며 의아해하였다. 이에 더불어 이야기하자 점차 정밀하고 미묘한 데로 나아갔다. 제는 앞서 자질(子姪)로서의 공경이 거의 없었으나, 그 말을 듣고는 저도 모르게 두려운 듯 마음과 몸이 함께 엄숙해졌다. 마침내 머물러 함께 이야기하여 온종일 여러 밤을 이었다. 제는 비록 영준하고 시원스러웠으나 스스로 모자람을 깨닫고, 이에 한숨지으며 탄식하여 말하였다. \"집안에 명사가 있은 지 삼십 년인데도 알지 못하였구나!\" 제가 떠날 때 숙부가 문까지 배웅하였다. 제의 종자 가운데 한 마리 말이 있었는데, 몹시 타기 어려워 능히 탈 수 있는 자가 적었다. 제가 슬쩍 숙부에게 물었다. \"말 타기를 좋아하십니까?\" 대답하였다. \"또한 좋아한다.\" 제가 다시 타기 어려운 말을 타게 하였더니, 숙부의 자태가 이미 절묘하여 채찍을 돌림이 실을 감듯 하니, 이름난 기수도 그를 넘어설 수 없었다. 제는 더욱 그 헤아릴 수 없음에 감탄하였으니, 다시 한 가지 일에 그치지 않았다. 돌아오자 혼(王渾)이 제에게 물었다. \"어찌 잠시 다녀온다더니 여러 날이 걸렸느냐?\" 제가 말하였다. \"비로소 한 숙부를 얻었습니다.\" 혼이 그 까닭을 물으니, 제가 이같이 갖추어 탄식하며 서술하였다. 혼이 말하였다. \"나와 비하면 어떠냐?\" 제가 말하였다. \"저보다 윗사람입니다.\" 무제(武帝)는 제를 볼 때마다 늘 왕담(王湛)을 가지고 놀리며 말하였다. \"그대 집안의 어리석은 숙부는 죽었는가?\" 제는 늘 대답할 말이 없었다. 그 뒤 숙부를 알아본 다음, 무제가 또 전처럼 묻자 제가 말하였다. \"신의 숙부는 어리석지 않습니다.\" 그 실제의 아름다움을 일컬었다. 무제가 말하였다. \"누구에 견줄 만한가?\" 제가 말하였다. \"산도(山濤)의 아래요, 위서(魏舒)의 위입니다.\" 이에 이름이 드러났다. 나이 스물여덟에 비로소 벼슬하였다.", ["비평", "겸손", "재능"]], ["賞譽", 18, "裴僕射時人謂為言談之林藪。", "배복야(裴楷)를 당시 사람들은 언담(言談)의 숲이라 일컬었다.", ["비평", "청담"]], ["賞譽", 19, "張華見褚陶，語陸平原曰：「君兄弟龍躍雲津，顧彥先鳳鳴朝陽。謂東南之寶已盡，不意復見褚生。」陸曰：「公未覩不鳴不躍者耳！」", "장화(張華)가 저도(褚陶)를 보고 육평원(陸機)에게 말하였다. \"그대 형제는 구름 낀 나루에서 용처럼 뛰어오르고, 고언선(顧愷之)은 아침 햇살에 봉황처럼 운다. 동남(東南)의 보배가 이미 다하였다 여겼는데, 뜻밖에 다시 저생(褚陶)을 보게 되었구나.\" 육기가 말하였다. \"공께서 울지도 뛰어오르지도 않는 자를 보지 못하셨을 따름입니다!\"", ["비평", "기지"]], ["賞譽", 20, "有問秀才：「吳舊姓何如？」答曰：「吳府君聖王之老成，明時之儁乂。朱永長理物之至德，清選之高望。嚴仲弼九皋之鳴鶴，空谷之白駒。顧彥先八音之琴瑟，五色之龍章。張威伯歲寒之茂松，幽夜之逸光。陸士衡、士龍鴻鵠之裴回，懸鼓之待槌。\n凡此諸君：以洪筆為鉏耒，以紙札為良田。以玄默為稼穡，以義理為豐年。以談論為英華，以忠恕為珍寶。著文章為錦繡，蘊五經為繒帛。坐謙虛為席薦，張義讓為帷幙。行仁義為室宇，修道德為廣宅。」", "누군가 수재에게 물었다. \"오(吳) 지방의 옛 명문가들은 어떠합니까?\" 이렇게 답하였다. \"오부군(吳府君)은 성왕(聖王)의 노성한 신하요, 밝은 시대의 뛰어난 인재입니다. 주영장(朱永長)은 사물을 다스리는 지극한 덕이요, 맑은 인선의 높은 명망입니다. 엄중필(嚴仲弼)은 깊은 못가에서 우는 학이요, 빈 골짜기의 흰 망아지입니다. 고언선(顧彥先)은 팔음(八音)을 갖춘 거문고와 비파요, 오색의 용무늬입니다. 장위백(張威伯)은 추운 겨울에도 무성한 소나무요, 어두운 밤의 빼어난 빛입니다. 육사형(陸士衡)과 육사룡(陸士龍)은 큰 기러기와 고니가 배회하는 것이요, 매달린 북이 채를 기다리는 것입니다. 무릇 이 여러 군자들은 큰 붓을 호미와 쟁기로 삼고, 종이와 서찰을 좋은 밭으로 삼으며, 그윽한 침묵을 농사로 삼고, 의리(義理)를 풍년으로 삼으며, 담론을 꽃송이로 삼고, 충서(忠恕)를 보배로 삼으며, 문장을 지어 비단을 삼고, 오경(五經)을 쌓아 명주를 삼으며, 겸허함에 앉아 자리를 삼고, 의로운 사양을 펼쳐 휘장을 삼으며, 인의(仁義)를 행하여 집으로 삼고, 도덕을 닦아 너른 저택으로 삼습니다.\"", ["비평", "학문", "청담"]], ["賞譽", 21, "人問王夷甫：「山巨源義理何如？是誰輩？」王曰：「此人初不肯以談自居，然不讀老、莊，時聞其詠，往往與其旨合。」", "누군가 왕이보(王夷甫, 왕연王衍)에게 물었다. \"산거원(山巨源, 산도山濤)의 의리(義理)는 어떠하며, 누구의 무리에 견줄 만합니까?\" 왕연이 말하였다. \"이 사람은 애초에 담론으로 자처하려 하지 않았으나, 그렇다고 『노자(老子)』와 『장자(莊子)』를 읽지도 않았는데, 때때로 그가 읊는 것을 들어보면 왕왕 그 뜻과 부합하였다.\"", ["비평", "청담"]], ["賞譽", 22, "洛中雅雅有三嘏：劉粹字純嘏，宏字終嘏，漠字沖嘏，是親兄弟。王安豐甥，並是王安豐女壻。宏，真長祖也。洛中錚錚馮惠卿，名蓀，是播子。蓀與邢喬俱司徒李胤外孫，及胤子順並知名。時稱：「馮才清，李才明，純粹邢。」", "낙양(洛陽) 안에 우아하기로 이름난 세 명의 '하(嘏)'가 있었으니, 유수(劉粹)는 자가 순하(純嘏)요, 유굉(劉宏)은 자가 종하(終嘏)요, 유막(劉漠)은 자가 충하(沖嘏)로, 이들은 친형제이며 안풍후(安豐侯) 왕융(王戎)의 생질이자 모두 왕융의 사위였다. 유굉은 유진장(劉眞長, 유담劉惔)의 조부이다. 낙양에서 쟁쟁하기로는 풍혜경(馮惠卿)이 있으니 이름은 손(蓀)이요 풍파(馮播)의 아들이다. 풍손과 형교(邢喬)는 모두 사도(司徒) 이윤(李胤)의 외손이며, 이윤의 아들 이순(李順)과 더불어 모두 이름이 알려졌다. 당시 사람들이 일컫기를 \"풍씨는 재주가 맑고, 이씨는 재주가 밝으며, 형씨는 순수하다\"라고 하였다.", ["비평", "재능"]], ["賞譽", 23, "衛伯玉為尚書令，見樂廣與中朝名士談議，奇之曰：「自昔諸人沒已來，常恐微言將絕。今乃復聞斯言於君矣！」命子弟造之曰：「此人，人之水鏡也，見之若披雲霧覩青天。」", "위백옥(衛伯玉)이 상서령(尙書令)이 되었을 때, 악광(樂廣)이 중조(中朝)의 명사들과 담의(談議)하는 것을 보고 기이하게 여기며 말하였다. \"옛적 여러 사람들이 세상을 떠난 이래로, 늘 미언(微言)이 끊어질까 두려워하였는데, 이제 다시 그대에게서 이 말을 듣는구나!\" 그러고는 자제들에게 명하여 그를 찾아가게 하며 말하였다. \"이 사람은 사람들의 물거울(水鏡)이니, 그를 보면 마치 구름과 안개를 헤치고 푸른 하늘을 보는 것 같다.\"", ["비평", "청담"]], ["賞譽", 24, "王太尉曰：「見裴令公精明朗然，籠蓋人上，非凡識也。若死而可作，當與之同歸。」或云王戎語。", "왕태위(王太尉, 왕연王衍)가 말하였다. \"배령공(裴令公, 배해裴楷)을 보면 정밀하고 밝아 사람들 위에 우뚝 솟으니, 보통의 식견이 아니다. 만약 죽은 이를 다시 살릴 수 있다면, 마땅히 그와 함께 돌아가리라.\" 혹자는 왕융(王戎)의 말이라고도 한다.", ["비평", "용모"]], ["賞譽", 25, "王夷甫自嘆：「我與樂令談，未嘗不覺我言為煩。」", "왕이보(王夷甫, 왕연王衍)가 스스로 탄식하며 말하였다. \"내가 악령(樂令, 악광樂廣)과 담론하면, 내 말이 번거롭다고 느끼지 않은 적이 없다.\"", ["비평", "청담", "겸손"]], ["賞譽", 26, "郭子玄有儁才，能言老、莊。庾敳嘗稱之，每曰：「郭子玄何必減庾子嵩！」", "곽자현(郭子玄)은 뛰어난 재주가 있어 『노자』와 『장자』를 잘 논하였다. 유애(庾敳)가 일찍이 그를 칭찬하여 매번 말하였다. \"곽자현이 어찌 반드시 유자숭(庾子嵩, 유애庾敳)만 못하겠는가!\"", ["비평", "청담"]], ["賞譽", 27, "王平子目太尉：「阿兄形似道，而神鋒太儁。」太尉答曰：「誠不如卿落落穆穆。」", "왕평자(王平子)가 태위(太尉, 왕연王衍)를 평하였다. \"형님은 모습이 도(道)에 가까우나, 신기(神氣)의 칼날이 너무 빼어납니다.\" 태위가 답하였다. \"진실로 너의 시원시원하고 온화함만은 못하다.\"", ["비평", "용모"]], ["賞譽", 28, "太傅府有三才：劉慶孫長才，潘陽仲大才，裴景聲清才。", "태부부(太傅府)에 세 가지 재주가 있었으니, 유경손(劉慶孫)의 뛰어난 재주(長才), 반양중(潘陽仲)의 큰 재주(大才), 배경성(裴景聲)의 맑은 재주(淸才)였다.", ["비평", "재능"]], ["賞譽", 29, "林下諸賢，各有儁才子。籍子渾，器量弘曠。康子紹，清遠雅正。濤子簡，疏通高素。咸子瞻，虛夷有遠志。瞻弟孚，爽朗多所遺。秀子純、悌，並令淑有清流。戎子萬子，有大成之風，苗而不秀。唯伶子無聞。凡此諸子，唯瞻為冠，紹、簡亦見重當世。", "죽림(竹林)의 여러 현인들에게는 각기 뛰어난 재주를 가진 아들이 있었다. 완적(阮籍)의 아들 완혼(阮渾)은 기량(器量)이 넓고 트였다. 혜강(嵇康)의 아들 혜소(嵇紹)는 맑고 멀며 바르고 단정하였다. 산도(山濤)의 아들 산간(山簡)은 소통하고 고상하며 소박하였다. 완함(阮咸)의 아들 완첨(阮瞻)은 허심하고 평이하며 원대한 뜻이 있었다. 완첨의 아우 완부(阮孚)는 시원스러우나 빠뜨리는 것이 많았다. 향수(向秀)의 아들 향순(向純)과 향제(向悌)는 모두 어질고 맑은 풍류가 있었다. 왕융(王戎)의 아들 만자(萬子)는 크게 이룰 풍모가 있었으나 싹만 트고 꽃을 피우지 못하였다. 오직 유령(劉伶)의 아들만은 알려진 바가 없다. 무릇 이 여러 아들 중에 오직 완첨이 으뜸이요, 혜소와 산간도 당세에 중히 여겨졌다.", ["비평", "재능"]], ["賞譽", 30, "庾子躬有廢疾，甚知名。家在城西，號曰城西公府。", "유자궁(庾子躬)은 폐질(廢疾)이 있었으나 매우 이름이 알려졌다. 집이 성 서쪽에 있어 '성서공부(城西公府)'라 불렸다.", ["비평", "병과늙음"]], ["賞譽", 31, "王夷甫語樂令：「名士無多人，故當容平子知。」", "왕이보(王夷甫, 왕연王衍)가 악령(樂令, 악광樂廣)에게 말하였다. \"명사가 많지 않으니, 진실로 마땅히 평자(平子, 왕징王澄)는 인정해 주어야 합니다.\"", ["비평"]], ["賞譽", 32, "王太尉云：「郭子玄語議如懸河寫水，注而不竭。」", "왕태위(王太尉, 왕연王衍)가 말하였다. \"곽자현(郭子玄)의 말과 논의는 마치 매달린 강물을 쏟아붓는 듯하여, 끊임없이 흘러 마르지 않는다.\"", ["비평", "청담"]], ["賞譽", 33, "司馬太傅府多名士，一時儁異。庾文康云：「見子嵩在其中，常自神王。」", "사마태부부(司馬太傅府)에는 명사가 많아 한때의 빼어난 인재들이었다. 유문강(庾文康, 유량庾亮)이 말하였다. \"자숭(子嵩, 유애庾敳)이 그 가운데 있는 것을 보면, 늘 절로 신기(神氣)가 왕성하였다.\"", ["비평"]], ["賞譽", 34, "太傅東海王鎮許昌，以王安期為記室參軍，雅相知重。敕世子毗曰：「夫學之所益者淺，體之所安者深。閑習禮度，不如式瞻儀形。諷味遺言，不如親承音旨。王參軍人倫之表，汝其師之！」或曰：「王、趙、鄧三參軍，人倫之表，汝其師之！」謂安期、鄧伯道、趙穆也。袁宏作名士傳直云王參軍。或云，趙家先猶有此本。", "태부(太傅) 동해왕(東海王)이 허창(許昌)을 진수할 때, 왕안기(王安期)를 기실참군(記室參軍)으로 삼아 매우 알아주고 중히 여겼다. 세자 비(毗)에게 명하여 말하였다. \"무릇 배움으로 얻는 이익은 얕고, 몸소 익혀 편안해지는 바는 깊다. 예법을 익히는 것은 거동과 모습을 직접 우러러보는 것만 못하고, 남긴 말을 외고 음미하는 것은 직접 그 가르침을 받드는 것만 못하다. 왕참군은 인륜(人倫)의 표상이니, 너는 그를 스승으로 삼아라!\" 혹자는 \"왕(王)·조(趙)·등(鄧) 세 참군이 인륜의 표상이니, 너는 그들을 스승으로 삼아라\"라고 하였으니, 안기(安期)·등백도(鄧伯道)·조목(趙穆)을 이른다. 원굉(袁宏)이 지은 『명사전(名士傳)』에는 다만 왕참군이라 하였다. 혹자는 조씨 집안에 예전에 이 판본이 있었다고 한다.", ["학문", "비평", "간언"]], ["賞譽", 35, "庾太尉少為王眉子所知。庾過江，嘆王曰：「庇其宇下，使人忘寒暑。」", "유태위(庾太尉, 유량庾亮)는 젊어서 왕미자(王眉子)에게 인정을 받았다. 유량이 강을 건넌 뒤 왕미자를 찬탄하며 말하였다. \"그 처마 밑에 깃들면, 사람으로 하여금 추위와 더위를 잊게 하였다.\"", ["비평", "우정"]], ["賞譽", 36, "謝幼輿曰：「友人王眉子清通簡暢，嵇延祖弘雅劭長，董仲道卓犖有致度。」", "사유여(謝幼輿, 사곤謝鯤)가 말하였다. \"벗 왕미자(王眉子)는 맑고 통달하며 간결하고 화창하고, 혜연조(嵇延祖, 혜소嵇紹)는 너그럽고 우아하며 아름답고 뛰어나며, 동중도(董仲道)는 탁월하고 운치와 도량이 있다.\"", ["비평", "우정"]], ["賞譽", 37, "王公目太尉：「巖巖清峙，壁立千仞。」", "왕공(王公, 왕도王導)이 태위(太尉, 왕연王衍)를 평하였다. \"우뚝하게 맑게 솟아, 천 길 벼랑처럼 서 있다.\"", ["비평", "용모"]], ["賞譽", 38, "庾太尉在洛下，問訊中郎。中郎留之云：「諸人當來。」尋溫元甫、劉王喬、裴叔則俱至，酬酢終日。庾公猶憶劉、裴之才儁，元甫之清中。", "유태위(庾太尉, 유량庾亮)가 낙양에 있을 때 중랑(中郎, 왕탄지王坦之)에게 문안하였다. 중랑이 그를 붙잡으며 말하였다. \"여러 사람들이 올 것이오.\" 이윽고 온원보(溫元甫)·유왕교(劉王喬)·배숙칙(裴叔則, 배해裴楷)이 모두 이르러 하루 종일 술잔을 주고받았다. 유공(庾公)은 지금도 유교·배해의 빼어난 재주와 원보의 맑고 적중함을 기억한다.", ["비평", "술과취흥", "우정"]], ["賞譽", 39, "蔡司徒在洛，見陸機兄弟住參佐廨中，三間瓦屋，士龍住東頭，士衡住西頭。士龍為人，文弱可愛。士衡長七尺餘，聲作鍾聲，言多忼慨。", "채사도(蔡司徒)가 낙양에 있을 때, 육기(陸機) 형제가 참좌(參佐)의 관사 안에 거처하는 것을 보았는데, 세 칸 기와집에 사룡(士龍, 육운)은 동쪽 끝에, 사형(士衡, 육기)은 서쪽 끝에 거처하였다. 사룡의 사람됨은 문약(文弱)하여 사랑스러웠다. 사형은 키가 일곱 자 남짓이요, 목소리는 종소리 같았으며, 말에 강개함이 많았다.", ["비평", "용모"]], ["賞譽", 40, "王長史是庾子躬外孫，丞相目子躬云：「入理泓然，我已上人。」", "왕장사(王長史, 왕몽王濛)는 유자궁(庾子躬)의 외손이다. 승상(丞相, 왕도王導)이 자궁을 평하여 말하였다. \"이치(理)에 깊이 들어감이 그윽하여, 나보다 윗사람이다.\"", ["비평", "청담"]], ["賞譽", 41, "庾太尉目庾中郎：家從談談之許。", "유태위(庾太尉, 유량庾亮)가 유중랑(庾中郎, 유애庾敳)을 평하였다. \"우리 집안은 담담(談談, 담론)하는 것을 좇는다.\"", ["비평", "청담"]], ["賞譽", 42, "庾公目中郎：「神氣融散，差如得上。」", "유공(庾公, 유량庾亮)이 중랑(中郎, 유애庾敳)을 평하였다. \"신기(神氣)가 화락하고 트였으니, 그런대로 윗자리를 얻을 만하다.\"", ["비평"]], ["賞譽", 43, "劉琨稱祖車騎為朗詣，曰：「少為王敦所歎。」", "유곤(劉琨)이 조거기(祖車騎, 조적祖逖)를 일컬어 명쾌하고 통달했다(朗詣)고 하며 말하였다. \"젊어서 왕돈(王敦)의 찬탄을 받았다.\"", ["비평"]], ["賞譽", 44, "時人目庾中郎：「善於託大，長於自藏。」", "당시 사람들이 유중랑(庾中郎, 유애庾敳)을 평하였다. \"큰 것에 의탁하는 데 능하고, 스스로를 감추는 데 뛰어나다.\"", ["비평"]], ["賞譽", 45, "王平子邁世有儁才，少所推服。每聞衛玠言，輒歎息絕倒。", "왕평자(王平子)는 세상을 뛰어넘는 빼어난 재주가 있어, 젊어서는 추켜세우고 탄복하는 일이 드물었다. 그러나 매번 위개(衛玠)의 말을 들으면 곧 탄식하며 쓰러질 듯 감탄하였다.", ["비평", "재능"]], ["賞譽", 46, "王大將軍與元皇表云：「舒風概簡正，允作雅人，自多於邃。最是臣少所知拔。中間夷甫、澄見語：『卿知處明、茂弘。茂弘已有令名，真副卿清論；處明親疎無知之者，吾常以卿言為意，殊未有得，恐已悔之？』臣慨然曰：『君以此試，頃來始乃有稱之者。』言常人正自患知之使過，不知使負實。」", "왕대장군(王大將軍, 왕돈王敦)이 원황제(元皇帝)에게 올린 표문에서 말하였다. \"왕서(王舒)는 풍모와 기개가 간결하고 바르니 진실로 우아한 사람이 될 만하여, 절로 왕수(王邃)보다 낫습니다. 이는 신이 젊어서부터 알아보고 발탁한 바입니다. 그 사이에 왕이보(王夷甫, 왕연)와 왕징(王澄)이 신에게 말하기를 '그대는 왕처명(王處明)과 왕무홍(王茂弘, 왕도王導)을 알아보았소. 무홍은 이미 좋은 명성이 있어 진실로 그대의 맑은 평론에 부합하지만, 처명은 가깝건 멀건 그를 아는 자가 없으니, 내가 늘 그대의 말을 마음에 두었으나 도무지 얻은 바가 없소. 아마 이미 후회하지 않으시오?'라고 하였습니다. 신이 개연히 말하였습니다. '그대가 이로써 시험해 보시면, 근래에야 비로소 그를 칭찬하는 자가 있을 것이오.' 보통 사람은 다만 알아주는 것이 지나칠까만 근심하고, 알아주는 것이 실상을 저버릴까는 알지 못함을 말한 것입니다.\"", ["비평", "권력"]], ["賞譽", 47, "周侯於荊州敗績，還，未得用。王丞相與人書曰：「雅流弘器，何可得遺？」", "주후(周侯, 주의周顗)가 형주(荊州)에서 크게 패하고 돌아온 뒤 아직 등용되지 못하였다. 왕승상(王丞相, 왕도王導)이 어떤 사람에게 편지를 보내 말하였다. \"우아한 부류요 큰 그릇이니, 어찌 버려둘 수 있겠는가?\"", ["비평", "도량", "권력"]], ["賞譽", 48, "時人欲題目高坐而未能。桓廷尉以問周侯，周侯曰：「可謂卓朗。」桓公曰：「精神淵箸。」", "당시 사람들이 고좌(高坐) 도인을 평하고자 하였으나 능히 하지 못하였다. 환정위(桓廷尉)가 이를 주후(周侯, 주의周顗)에게 묻자, 주후가 말하였다. \"탁월하고 명랑하다(卓朗) 할 만하다.\" 환공(桓公)이 말하였다. \"정신이 깊고 분명하다.\"", ["비평"]], ["賞譽", 49, "王大將軍稱其兒云：「其神候似欲可。」", "왕대장군(王大將軍, 왕돈王敦)이 그 아들을 일컬어 말하였다. \"그 신기(神氣)와 기색이 그런대로 괜찮을 듯하다.\"", ["비평"]], ["賞譽", 50, "卞令目叔向：「朗朗如百間屋。」", "변령(卞令)이 숙향(叔向)을 평하였다. \"환하기가 백 칸 집과 같다.\"", ["비평"]], ["賞譽", 51, "王敦為大將軍，鎮豫章。衛玠避亂，從洛投敦，相見欣然，談話彌日。于時謝鯤為長史，敦謂鯤曰：「不意永嘉之中，復聞正始之音。阿平若在，當復絕倒。」", "왕돈(王敦)이 대장군이 되어 예장(豫章)을 진수할 때, 위개(衛玠)가 난리를 피해 낙양에서 왕돈에게 의탁하니, 서로 만나 기뻐하며 종일토록 담화하였다. 그때 사곤(謝鯤)이 장사(長史)였는데, 왕돈이 사곤에게 말하였다. \"영가(永嘉) 연간에 다시 정시(正始)의 소리를 들을 줄은 생각지도 못했소. 아평(阿平, 왕징王澄)이 있었다면 다시 쓰러질 듯 감탄하였을 것이오.\"", ["청담", "비평", "우정"]], ["賞譽", 52, "王平子與人書，稱其兒：「風氣日上，足散人懷。」", "왕평자(王平子)가 어떤 사람에게 편지를 보내 그 아들을 일컬어 말하였다. \"풍모와 기상이 날로 향상되어, 사람의 가슴속을 풀어주기에 족하다.\"", ["비평", "용모"]], ["賞譽", 53, "胡毋彥國吐佳言如屑，後進領袖。", "호무언국(胡毋彦國)은 아름다운 말을 옥가루처럼 토해내어, 후진(後進)들의 영수였다.", ["비평", "청담"]], ["賞譽", 54, "王丞相云：「刁玄亮之察察，戴若思之巖巖，卞望之之峯距。」", "왕승상(王丞相, 왕도王導)이 말하였다. \"조현량(刁玄亮)의 밝고 살핌, 대약사(戴若思, 대연戴淵)의 우뚝함, 변망지(卞望之)의 봉우리처럼 버팀이로다.\"", ["비평"]], ["賞譽", 55, "大將軍語右軍：「汝是我佳子弟，當不減阮主簿。」", "왕대장군(王大將軍, 왕돈王敦)이 우군(右軍, 왕희지王羲之)에게 말하였다. \"너는 나의 훌륭한 자제이니, 마땅히 완주부(阮主簿, 완유阮裕)에 못지않을 것이다.\"", ["비평"]], ["賞譽", 56, "世目周侯：嶷如斷山。", "세상에서 주후(周侯, 주의周顗)를 평하였다. \"높이 솟아 잘라낸 산과 같다.\"", ["비평", "용모"]], ["賞譽", 57, "王丞相招祖約夜語，至曉不眠。明旦有客，公頭鬢未理，亦小倦。客曰：「公昨如是，似失眠。」公曰：「昨與士少語，遂使人忘疲。」", "왕승상(王丞相, 왕도王導)이 조약(祖約)을 불러 밤에 이야기하다가 새벽에 이르도록 자지 못하였다. 이튿날 아침 손님이 왔는데, 공의 머리와 살쩍이 다듬어지지 않았고 또 조금 피곤해 보였다. 손님이 말하였다. \"공께서 어제 이러하셨으니, 잠을 못 주무신 듯합니다.\" 공이 말하였다. \"어제 사소(士少, 조약祖約)와 이야기하다 보니, 마침내 사람으로 하여금 피로를 잊게 하였소.\"", ["우정", "비평"]], ["賞譽", 58, "王大將軍與丞相書，稱楊朗曰：「世彥識器理致，才隱明斷，既為國器，且是楊侯淮之子。位望殊為陵遲，卿亦足與之處。」", "왕대장군(王大將軍, 왕돈王敦)이 승상(丞相, 왕도王導)에게 편지를 보내 양랑(楊朗)을 일컬어 말하였다. \"세언(世彥, 양랑)은 식견과 그릇이 사리에 닿고, 재주를 감추되 분명히 결단하니, 이미 나라의 그릇이요 또한 양후 양준(楊淮)의 아들입니다. 지위와 명망이 자못 침체되어 있으니, 그대도 그와 함께 지낼 만합니다.\"", ["비평", "재능", "권력"]], ["賞譽", 59, "何次道往丞相許，丞相以麈尾指坐呼何共坐曰：「來！來！此是君坐。」", "하차도(何次道)가 승상(丞相, 왕도王導)의 처소로 갔는데, 승상이 주미(麈尾)로 자리를 가리키며 하차도를 불러 함께 앉자고 하며 말하였다. \"오시오! 오시오! 이것이 그대의 자리요.\"", ["우정", "권력"]], ["賞譽", 60, "丞相治楊州廨舍，按行而言曰：「我正為次道治此爾！」何少為王公所重，故屢發此嘆。", "승상(丞相, 왕도王導)이 양주(楊州)의 관사를 수리할 때, 두루 살펴보며 말하였다. \"나는 바로 차도(次道, 하차도)를 위하여 이것을 수리할 따름이다!\" 하차도가 젊어서 왕공(王公)에게 중히 여겨졌으므로 누차 이런 탄식을 한 것이다.", ["우정", "권력"]], ["賞譽", 61, "王丞相拜司徒而嘆曰：「劉王喬若過江，我不獨拜公。」", "왕승상(王丞相, 왕도王導)이 사도(司徒)에 임명되자 탄식하며 말하였다. \"유왕교(劉王喬)가 만약 강을 건너왔다면, 나 혼자 공(公)에 임명되지는 않았을 것이다.\"", ["비평", "겸손"]], ["賞譽", 62, "王藍田為人晚成，時人乃謂之癡。\n王丞相以其東海子，辟為掾。常集聚，王公每發言，眾人競贊之。述於末坐曰：「主非堯、舜，何得事事皆是？」丞相甚相嘆賞。", "왕남전(王藍田, 왕술王述)은 사람됨이 늦게 이루어져, 당시 사람들은 그를 어리석다고 여겼다. 왕승상(王丞相, 왕도王導)이 그가 동해왕(東海王)의 아들이라 하여 불러 연(掾)으로 삼았다. 늘 사람들이 모일 때, 왕공이 매번 말을 하면 사람들이 다투어 그를 칭찬하였다. 왕술이 말석에서 말하였다. \"주인께서 요(堯)·순(舜)이 아니시거늘, 어찌 일마다 다 옳을 수 있겠습니까?\" 승상이 매우 그를 찬탄하고 칭상하였다.", ["간언", "비평"]], ["賞譽", 63, "世目楊朗：「沈審經斷。」蔡司徒云：「若使中朝不亂，楊氏作公方未已。」謝公云：「朗是大才。」", "세상에서 양랑(楊朗)을 평하였다. \"침착하고 신중하며 사리에 밝아 결단한다.\" 채사도(蔡司徒)가 말하였다. \"만약 중조(中朝)가 어지럽지 않았다면, 양씨가 공(公)이 되는 것이 그치지 않았을 것이다.\" 사공(謝公, 사안謝安)이 말하였다. \"양랑은 큰 재목이다.\"", ["비평", "재능"]], ["賞譽", 64, "劉萬安即道真從子。庾公所謂「灼然玉舉」。又云：「千人亦見，百人亦見。」", "유만안(劉萬安)은 곧 도진(道眞)의 종자(從子)이다. 유공(庾公, 유량庾亮)이 이른바 \"빛나는 옥처럼 빼어나다\"고 한 사람이다. 또 말하였다. \"천 사람 가운데서도 눈에 띄고, 백 사람 가운데서도 눈에 띈다.\"", ["비평", "용모"]], ["賞譽", 65, "庾公為護軍，屬桓廷尉覓一佳吏，乃經年。桓後遇見徐寧而知之，遂致於庾公曰：「人所應有，其不必有；人所應無，己不必無。真海岱清士。」", "유공(庾公, 유량庾亮)이 호군(護軍)이 되어 환정위(桓廷尉)에게 부탁하여 좋은 관리 하나를 찾게 하였는데, 한 해가 넘도록 못 찾았다. 환정위가 나중에 서녕(徐寧)을 만나 그를 알아보고 마침내 유공에게 천거하며 말하였다. \"사람이 마땅히 가져야 할 것을 그는 꼭 가진 것은 아니나, 사람이 마땅히 없어야 할 것을 그는 꼭 없는 것이 아닙니다. 참으로 바닷가의 맑은 선비입니다.\"", ["비평", "권력"]], ["賞譽", 66, "桓茂倫云：「褚季野皮裏陽秋。」謂其裁中也。", "환무륜(桓茂倫)이 말하였다. \"저계야(褚季野)는 가죽 속의 춘추(皮裏陽秋)다.\" 그가 마음속으로 시비를 가린다는 것을 이른 것이다.", ["비평", "지혜"]], ["賞譽", 67, "何次道嘗送東人，瞻望見賈寧在後輪中，曰：「此人不死，終為諸侯上客。」", "하차도(何次道)가 일찍이 동쪽 사람을 전송할 때, 가녕(賈寧)이 뒤쪽 수레 안에 있는 것을 바라보고 말하였다. \"이 사람이 죽지 않는다면, 끝내 제후의 상객(上客)이 될 것이다.\"", ["비평", "예언"]], ["賞譽", 68, "杜弘治墓崩，哀容不稱。庾公顧謂諸客曰：「弘治至羸，不可以致哀。」又曰：「弘治哭不可哀。」", "두홍치(杜弘治)의 무덤이 무너졌는데, 슬퍼하는 모습이 격에 맞지 않았다. 유공(庾公, 유량庾亮)이 돌아보며 여러 손님에게 말하였다. \"홍치는 지극히 허약하니, 슬픔을 다하게 할 수 없다.\" 또 말하였다. \"홍치는 곡(哭)을 해도 슬프게 할 수 없다.\"", ["죽음", "비평"]], ["賞譽", 69, "世稱「庾文康為豐年玉，稺恭為荒年穀」。庾家論云是文康稱「恭為荒年穀，庾長仁為豐年玉。」", "세상에서 \"유문강(庾文康, 유량庾亮)은 풍년의 옥이요, 치공(稺恭, 유익庾翼)은 흉년의 곡식이다\"라고 일컬었다. 유씨 집안의 논의로는 문강이 \"치공은 흉년의 곡식이요, 유장인(庾長仁)은 풍년의 옥이다\"라고 일컬었다고 한다.", ["비평"]], ["賞譽", 70, "世目「杜弘治標鮮，季野穆少」。", "세상에서 \"두홍치(杜弘治)는 빼어나고 산뜻하며, 계야(季野, 저부褚裒)는 화목하고 차분하다\"고 평하였다.", ["비평", "용모"]], ["賞譽", 71, "有人目杜弘治：「標鮮清令，盛德之風，可樂詠也。」", "어떤 사람이 두홍치(杜弘治)를 평하였다. \"빼어나고 산뜻하며 맑고 아름다워, 성대한 덕의 풍모이니, 즐거이 노래할 만하다.\"", ["비평", "용모"]], ["賞譽", 72, "庾公云：「逸少國舉。」故庾倪為碑文云：「拔萃國舉。」", "유공(庾公, 유량庾亮)이 말하였다. \"일소(逸少, 왕희지王羲之)는 나라의 빼어난 인물이다.\" 그러므로 유예(庾倪)가 비문을 지어 말하였다. \"무리에서 뛰어나 나라의 빼어난 인물이다.\"", ["비평", "재능"]], ["賞譽", 73, "庾稺恭與桓溫書，稱「劉道生日夕在事，大小殊快。義懷通樂，既佳，且足作友，正實良器，推此與君，同濟艱不者也。」", "유치공(庾稺恭, 유익庾翼)이 환온(桓溫)에게 편지를 보내 일컬어 말하였다. \"유도생(劉道生)은 밤낮으로 일에 임하니 크고 작은 일이 자못 시원스럽고, 의로운 마음과 통달한 즐거움이 이미 훌륭하며, 또한 벗으로 삼기에 족하고, 참으로 좋은 그릇입니다. 이를 미루어 그대에게 추천하니, 함께 어려움을 건널 만한 자입니다.\"", ["비평", "우정"]], ["賞譽", 74, "王藍田拜揚州，主簿請諱，教云：「亡祖先君，名播海內，遠近所知。內諱不出於外，餘無所諱。」", "왕남전(王藍田, 왕술王述)이 양주(揚州)에 임명되자, 주부(主簿)가 피휘(避諱)할 이름을 청하니, 명을 내려 말하였다. \"돌아가신 조부와 선친의 이름은 해내(海內)에 널리 알려져 원근이 다 아는 바이다. 안의 휘(內諱)는 밖으로 내지 않으니, 그 밖에는 피휘할 것이 없다.\"", ["효", "겸손"]], ["賞譽", 75, "蕭中郎，孫丞公婦父。劉尹在撫軍坐，時擬為太常，劉尹云：「蕭祖周不知便可作三公不？自此以還，無所不堪。」", "소중랑(蕭中郎)은 손승공(孫丞公)의 장인이다. 유윤(劉尹, 유담劉惔)이 무군(撫軍)의 자리에 있을 때, 그를 태상(太常)으로 추천하려 하니, 유윤이 말하였다. \"소조주(蕭祖周)는 곧 삼공(三公)이 될 수 있을지는 모르겠으나, 이로부터 그 아래로는 감당하지 못할 것이 없다.\"", ["비평", "권력"]], ["賞譽", 76, "謝太傅未冠，始出西，詣王長史，清言良久。去後，苟子問曰：「向客何如尊？」長史曰：「向客亹亹，為來逼人。」", "사안(謝安)이 아직 관례를 치르기 전, 처음으로 서쪽으로 나가 왕장사(王長史, 왕몽)를 찾아가 청언(淸言)을 나눈 지 한참이 되었다. 그가 떠난 뒤 구자(苟子)가 물었다. \"방금 그 손님은 아버님과 견주어 어떻습니까?\" 장사가 말했다. \"방금 그 손님은 말이 막힘없이 흘러나와 사람을 압도할 만하더라.\"", ["비평", "청담"]], ["賞譽", 77, "王右軍語劉尹：「故當共推安石。」劉尹曰：「若安石東山志立，當與天下共推之。」", "왕희지(王羲之)가 유담(劉惔)에게 말했다. \"마땅히 다 함께 사안(謝安)을 추대해야 합니다.\" 유담이 말했다. \"만약 사안이 동산(東山)에서의 뜻을 세운다면, 마땅히 천하 사람들과 함께 그를 추대해야 할 것입니다.\"", ["비평", "은둔"]], ["賞譽", 78, "謝公稱藍田：「掇皮皆真。」", "사안(謝安)이 남전(藍田, 왕술)을 일컬어 말했다. \"껍질을 벗겨 보아도 모두 진짜다.\"", ["비평"]], ["賞譽", 79, "桓溫行經王敦墓邊過，望之云：「可兒！可兒！」", "환온(桓溫)이 길을 가다 왕돈(王敦)의 묘 옆을 지나가게 되었는데, 그것을 바라보며 말했다. \"대단한 사람이로다! 대단한 사람이로다!\"", ["비평"]], ["賞譽", 80, "殷中軍道王右軍云：「逸少清貴人。吾於之甚至，一時無所後。」", "은호(殷浩)가 왕희지(王羲之)를 평하여 말했다. \"일소(逸少)는 맑고 귀한 사람이다. 나는 그에게 지극히 잘 대하니, 한때도 뒤처지는 바가 없다.\"", ["비평", "우정"]], ["賞譽", 81, "王仲祖稱殷淵源：「非以長勝人，處長亦勝人。」", "왕몽(王濛)이 은연원(殷淵源, 은호)을 일컬어 말했다. \"장점으로 남을 이길 뿐 아니라, 그 장점에 처하는 방식 또한 남보다 낫다.\"", ["비평", "재능"]], ["賞譽", 82, "王司州與殷中軍語，嘆云：「己之府奧，蚤已傾寫而見，殷陳勢浩汗，眾源未可得測。」", "왕사주(王司州, 왕호지)가 은호(殷浩)와 더불어 이야기를 나누고 탄식하여 말했다. \"나의 깊은 속내는 일찌감치 다 쏟아 내어 드러났으나, 은호의 펼치는 기세는 넓고 아득하여, 여러 근원을 아직 다 헤아릴 수가 없다.\"", ["비평", "청담"]], ["賞譽", 83, "王長史謂林公：「真長可謂金玉滿堂。」林公曰：「金玉滿堂，復何為簡選？」王曰：「非為簡選，直致言處自寡耳。」", "왕장사(王長史, 왕몽)가 임공(林公, 지둔)에게 말했다. \"진장(眞長, 유담)은 금옥이 집안에 가득하다 할 만합니다.\" 임공이 말했다. \"금옥이 집안에 가득하다면, 다시 무엇을 가려 뽑겠습니까?\" 왕장사가 말했다. \"가려 뽑는 것이 아니라, 다만 그가 말을 내는 곳이 절로 드물 따름입니다.\"", ["비평"]], ["賞譽", 84, "王長史道江道羣：「人可應有，乃不必有；人可應無，己必無。」", "왕장사(王長史, 왕몽)가 강도군(江道羣, 강관)을 평하여 말했다. \"남이 마땅히 가지고 있을 만한 것을 그는 도리어 반드시 가지고 있지는 않으며, 남이 마땅히 없을 만한 것을 그는 반드시 없다.\"", ["비평"]], ["賞譽", 85, "會稽孔沈、魏顗、虞球、虞存、謝奉，並是四族之儁，于時之傑。孫興公目之曰：「沈為孔家金，顗為魏家玉，虞為長、琳宗，謝為弘道伏。」", "회계(會稽)의 공침(孔沈), 위의(魏顗), 우구(虞球), 우존(虞存), 사봉(謝奉)은 모두 네 가문의 빼어난 인물이요 당대의 걸출한 자들이었다. 손작(孫綽)이 그들을 평하여 말했다. \"공침은 공씨 가문의 금이요, 위의는 위씨 가문의 옥이며, 두 우씨는 우씨 가문의 으뜸이요, 사봉은 도를 넓히는 데에 엎드린 자다.\"", ["비평", "재능"]], ["賞譽", 86, "王仲祖、劉真長造殷中軍談，談竟，俱載去。劉謂王曰：「淵源真可。」王曰：「卿故墮其雲霧中。」", "왕몽(王濛)과 유담(劉惔)이 은호(殷浩)를 찾아가 담론하였는데, 담론이 끝나자 함께 수레를 타고 돌아갔다. 유담이 왕몽에게 말했다. \"연원(淵源, 은호)은 참으로 훌륭하오.\" 왕몽이 말했다. \"그대가 그의 구름과 안개 속에 빠진 것이오.\"", ["비평", "청담"]], ["賞譽", 87, "劉尹每稱王長史云：「性至通，而自然有節。」", "유담(劉惔)이 늘 왕장사(王長史, 왕몽)를 일컬어 말했다. \"성품이 지극히 통달하면서도, 자연스럽게 절도가 있다.\"", ["비평"]], ["賞譽", 88, "王右軍道謝萬石「在林澤中，為自遒上」。歎林公「器朗神儁」。道祖士少「風領毛骨，恐沒世不復見如此人」。道劉真長「標雲柯而不扶疎」。", "왕희지(王羲之)가 사만(謝萬)을 평하여 \"산림과 못 속에 있어도 절로 굳세고 높다\"고 하였다. 임공(林公, 지둔)을 탄미하여 \"기량이 밝고 정신이 빼어나다\"고 하였다. 조사소(祖士少, 조약)를 평하여 \"풍채와 골격이 빼어나니, 죽을 때까지 다시는 이런 사람을 보지 못할까 두렵다\"고 하였다. 유담(劉惔)을 평하여 \"높이 구름까지 가지를 뻗었으되 가지가 흐트러지지 않았다\"고 하였다.", ["비평", "용모"]], ["賞譽", 89, "簡文目庾赤玉：「省率治除。」謝仁祖云：「庾赤玉胷中無宿物。」", "간문제(簡文帝)가 유적옥(庾赤玉, 유통)을 평하여 \"맑고 솔직하며 다스려져 깔끔하다\"고 하였다. 사상(謝尚)이 말했다. \"유적옥은 가슴속에 묵은 것이 없다.\"", ["비평"]], ["賞譽", 90, "殷中軍道韓太常曰：「康伯少自標置，居然是出羣器。及其發言遣辭，往往有情致。」", "은호(殷浩)가 한태상(韓太常, 한백)을 평하여 말했다. \"강백(康伯, 한백)은 어려서부터 스스로를 높이 세웠으니, 분명히 무리에서 빼어난 그릇이다. 그가 말을 내고 글을 지음에 이르러서는 종종 정취가 있다.\"", ["비평", "학문"]], ["賞譽", 91, "簡文道王懷祖：「才既不長，於榮利又不淡；直以真率少許，便足對人多多許。」", "간문제(簡文帝)가 왕회조(王懷祖, 왕술)를 평하여 말했다. \"재주가 뛰어나지도 않고 영리에 담박하지도 않다. 다만 약간의 진솔함만으로도 능히 남의 여러 장점을 상대할 만하다.\"", ["비평"]], ["賞譽", 92, "林公謂王右軍云：「長史作數百語，無非德音，如恨不苦。」王曰：「長史自不欲苦物。」", "임공(林公, 지둔)이 왕희지(王羲之)에게 말했다. \"장사(長史, 왕몽)가 수백 마디를 하였는데 덕스러운 말 아닌 것이 없었으나, 다만 매섭지 못한 것이 아쉽소.\" 왕희지가 말했다. \"장사는 본래 남을 매섭게 대하려 하지 않습니다.\"", ["비평", "청담"]], ["賞譽", 93, "殷中軍與人書，道謝萬「文理轉遒，成殊不易」。", "은호(殷浩)가 어떤 이에게 편지를 보내, 사만(謝萬)을 평하여 \"글의 이치가 갈수록 굳세어지니, 이루어 냄이 자못 쉽지 않다\"고 하였다.", ["비평", "학문"]], ["賞譽", 94, "王長史云：「江思悛思懷所通，不翅儒域。」", "왕장사(王長史, 왕몽)가 말했다. \"강사전(江思悛, 강관)의 사유가 통달한 바는 유가의 영역만이 아니다.\"", ["비평", "학문"]], ["賞譽", 95, "許玄度送母，始出都，人問劉尹：「玄度定稱所聞不？」劉曰：「才情過於所聞。」", "허순(許詢)이 어머니를 모셔 가려고 처음 도성으로 나오자, 어떤 이가 유담(劉惔)에게 물었다. \"허순은 과연 들리는 명성에 걸맞습니까?\" 유담이 말했다. \"재주와 정취가 들리는 것보다 낫다.\"", ["비평", "효"]], ["賞譽", 96, "阮光祿云：「王家有三年少：右軍、安期、長豫。」", "완광록(阮光祿, 완유)이 말했다. \"왕씨 집안에 세 젊은이가 있으니, 우군(右軍, 왕희지)과 안기(安期, 왕응지)와 장예(長豫, 왕열)다.\"", ["비평"]], ["賞譽", 97, "謝公道豫章：「若遇七賢，必自把臂入林。」", "사안(謝安)이 예장(豫章, 사곤)을 평하여 말했다. \"만약 죽림칠현을 만났더라면, 분명 스스로 팔을 끼고 죽림으로 들어갔을 것이다.\"", ["비평", "은둔"]], ["賞譽", 98, "王長史歎林公：「尋微之功，不減輔嗣。」", "왕장사(王長史, 왕몽)가 임공(林公, 지둔)을 탄미하여 말했다. \"미묘한 이치를 탐구하는 공부가 보사(輔嗣, 왕필)에 못지않다.\"", ["비평", "청담"]], ["賞譽", 99, "殷淵源在墓所幾十年。于時朝野以擬管、葛，起不起，以卜江左興亡。", "은연원(殷淵源, 은호)이 묘소에서 거의 십 년을 지냈다. 그때 조정과 재야에서 그를 관중(管仲)과 제갈량(諸葛亮)에 견주어, 그가 일어나느냐 일어나지 않느냐로 강좌(江左)의 흥망을 점쳤다.", ["비평", "은둔", "예언"]], ["賞譽", 100, "殷中軍道右軍：「清鑒貴要。」", "은호(殷浩)가 왕희지(王羲之)를 평하여 말했다. \"맑은 감식안이 귀하고 요긴하다.\"", ["비평", "지혜"]], ["賞譽", 101, "謝太傅為桓公司馬，桓詣謝，值謝梳頭，遽取衣幘，桓公云：「何煩此。」因下共語至暝。既去，謂左右曰：「頗曾見如此人不？」", "사안(謝安)이 환온(桓溫)의 사마(司馬)였을 때, 환온이 사안을 찾아갔는데 마침 사안이 머리를 빗고 있었다. 사안이 급히 옷과 두건을 가져오게 하자, 환온이 말했다. \"어찌 이리 번거롭게 하시오.\" 그리하여 함께 앉아 이야기를 나누다 날이 저물었다. 떠난 뒤 환온이 좌우에게 말했다. \"일찍이 이런 사람을 본 적이 있는가?\"", ["비평", "용모"]], ["賞譽", 102, "謝公作宣武司馬，屬門生數十人於田曹中郎趙悅子。悅子以告宣武，宣武云：「且為用半。」趙俄而悉用之，曰：「昔安石在東山，縉紳敦逼，恐不豫人事；況今自鄉選，反違之邪？」", "사안(謝安)이 환온(桓溫)의 사마(司馬)가 되었을 때, 문하생 수십 명을 전조중랑(田曹中郎) 조열자(趙悅子)에게 부탁하였다. 조열자가 이를 환온에게 아뢰니, 환온이 말했다. \"우선 절반만 쓰라.\" 조열자가 이윽고 그들을 모두 임용하고 말했다. \"옛날 사안이 동산(東山)에 있을 때, 사대부들이 간곡히 핍박하면서도 그가 인사에 관여하지 않을까 걱정하였다. 하물며 지금 스스로 향리에서 가려 뽑은 자들인데, 도리어 그 뜻을 어기겠는가?\"", ["비평", "권력", "도량"]], ["賞譽", 103, "桓宣武表云：「謝尚神懷挺率，少致民譽。」", "환온(桓溫)이 표문(表文)에서 말했다. \"사상(謝尚)은 정신과 마음이 빼어나고 솔직하여, 젊어서부터 백성의 칭송을 받았습니다.\"", ["비평", "권력"]], ["賞譽", 104, "世目謝尚為令達，阮遙集云：「清暢似達。」或云：「尚自然令上。」", "세상에서 사상(謝尚)을 평하여 영달(令達)하다 하였는데, 완요집(阮遙集, 완부)이 말했다. \"맑고 화창함이 통달한 듯하다.\" 어떤 이는 \"사상은 자연스러우면서도 뛰어나다\"고 하였다.", ["비평"]], ["賞譽", 105, "桓大司馬病。謝公往省病，從東門入。桓公遙望，嘆曰：「吾門中久不見如此人！」", "환온(桓溫)이 병이 들었다. 사안(謝安)이 문병을 가서 동쪽 문으로 들어왔다. 환온이 멀리서 바라보고 탄식하여 말했다. \"내 문중에 오래도록 이런 사람을 보지 못했다!\"", ["비평", "병과늙음"]], ["賞譽", 106, "簡文目敬豫為「朗豫」。", "간문제(簡文帝)가 경예(敬豫, 왕흡)를 평하여 \"밝고 화락하다\"고 하였다.", ["비평"]], ["賞譽", 107, "孫興公為庾公參軍，共遊白石山。衛君長在坐，孫曰：「此子神情都不關山水，而能作文。」庾公曰：「衛風韻雖不及卿諸人，傾倒處亦不近。」孫遂沐浴此言。", "손작(孫綽)이 유량(庾亮)의 참군(參軍)이었을 때, 함께 백석산(白石山)에서 노닐었다. 위군장(衛君長, 위영)이 자리에 있었는데, 손작이 말했다. \"이 사람은 정신과 정취가 도무지 산수와 관계가 없으면서도 능히 글을 짓는다.\" 유량이 말했다. \"위영의 풍운(風韻)은 비록 그대들 여러 사람에게 미치지 못하나, 그가 마음을 기울이는 경지 또한 가깝지 않다.\" 손작이 마침내 이 말을 깊이 음미하였다.", ["비평", "자연과산수"]], ["賞譽", 108, "王右軍目陳玄伯：「壘塊有正骨。」", "왕희지(王羲之)가 진현백(陳玄伯, 진태)을 평하여 말했다. \"가슴에 응어리가 있으되 바른 골격이 있다.\"", ["비평"]], ["賞譽", 109, "王長史云：「劉尹知我，勝我自知。」", "왕장사(王長史, 왕몽)가 말했다. \"유담(劉惔)이 나를 아는 것이, 내가 나 자신을 아는 것보다 낫다.\"", ["우정", "비평"]], ["賞譽", 110, "王、劉聽林公講，王語劉曰：「向高坐者，故是凶物。」復東聽，王又曰：「自是鉢釪後王，何人也。」", "왕몽(王濛)과 유담(劉惔)이 임공(林公, 지둔)의 강론을 들었는데, 왕몽이 유담에게 말했다. \"저 높은 자리에 앉은 자는 참으로 무서운 인물이오.\" 다시 동쪽에서 듣고 나서 왕몽이 또 말했다. \"이는 바리때 든 자들 뒤의 왕이니, 어떤 사람이겠소.\"", ["비평", "청담"]], ["賞譽", 111, "許玄度言：「琴賦所謂『非至精者，不能與之析理』，劉尹其人；『非淵靜者，不能與之閑止』，簡文其人。」", "허순(許詢)이 말했다. \"「금부(琴賦)」에 이른바 '지극히 정밀한 자가 아니면 더불어 이치를 분석할 수 없다'고 한 것은 유담(劉惔)이 그 사람이요, '깊고 고요한 자가 아니면 더불어 한가로이 머물 수 없다'고 한 것은 간문제(簡文帝)가 그 사람이다.\"", ["비평", "음악"]], ["賞譽", 112, "魏隱兄弟，少有學義，總角詣謝奉。奉與語，大說之，曰：「大宗雖衰，魏氏已復有人。」", "위은(魏隱) 형제가 어려서부터 학문과 의리가 있어, 어린 나이에 사봉(謝奉)을 찾아갔다. 사봉이 그들과 이야기를 나누고 크게 기뻐하며 말했다. \"종가가 비록 쇠하였으나, 위씨 가문에 이미 다시 인재가 나왔구나.\"", ["비평", "학문", "신동"]], ["賞譽", 113, "簡文云：「淵源語不超詣簡至；然經綸思尋處，故有局陳。」", "간문제(簡文帝)가 말했다. \"연원(淵源, 은호)의 말은 뛰어나게 지극히 간결하지는 않으나, 세상을 다스리는 사유를 탐구하는 곳에서는 참으로 짜임새가 있다.\"", ["비평", "청담"]], ["賞譽", 114, "初，法汰北來未知名，王領軍供養之。每與周旋，行來往名勝許，輒與俱。不得汰，便停車不行。因此名遂重。", "처음에 법태(法汰)가 북쪽에서 와 아직 이름이 알려지지 않았을 때, 영군(領軍) 왕흡(王洽)이 그를 공양하였다. 매번 그와 왕래하며 이름난 명사들의 모임에 오갈 때마다 늘 함께 데리고 다녔다. 법태를 데려가지 못하면 곧 수레를 멈추고 가지 않았다. 이로 인해 그의 명성이 마침내 무거워졌다.", ["우정", "비평"]], ["賞譽", 115, "王長史與大司馬書，道淵源「識致安處，足副時談。」", "왕장사(王長史, 왕몽)가 환온(桓溫)에게 편지를 보내, 연원(淵源, 은호)을 평하여 \"식견과 운치가 평안한 곳에 처하니, 당대의 담론에 걸맞을 만하다\"고 하였다.", ["비평", "청담"]], ["賞譽", 116, "謝公云：「劉尹語審細。」", "사안(謝安)이 말했다. \"유담(劉惔)의 말은 세밀하게 살펴 정밀하다.\"", ["비평", "청담"]], ["賞譽", 117, "桓公語嘉賓：「阿源有德有言，向使作令僕，足以儀刑百揆。朝廷用違其才耳。」", "환온(桓溫)이 가빈(嘉賓, 치초)에게 말했다. \"아원(阿源, 은호)은 덕도 있고 말솜씨도 있으니, 만약 상서령이나 복야로 삼았더라면 능히 모든 관리의 본보기가 되었을 것이다. 조정이 그의 재능을 잘못 썼을 따름이다.\"", ["비평", "권력"]], ["賞譽", 118, "簡文語嘉賓：「劉尹語末後亦小異，回復其言，亦乃無過。」", "간문제(簡文帝)가 가빈(嘉賓, 치초)에게 말했다. \"유담(劉惔)의 말은 끝에 가서 또한 조금 달라지는데, 그 말을 되짚어 보면 또한 허물이 없다.\"", ["비평", "청담"]], ["賞譽", 119, "孫興公、許玄度共在白樓亭，共商略先往名達。林公既非所關，聽訖云：「二賢故自有才情。」", "손작(孫綽)과 허순(許詢)이 함께 백루정(白樓亭)에 있으면서, 함께 앞서간 이름난 명사들을 헤아려 논평하였다. 임공(林公, 지둔)은 관여한 바가 아니었으나, 다 듣고 나서 말했다. \"두 현인은 참으로 재주와 정취가 있다.\"", ["비평", "풍류"]], ["賞譽", 120, "王右軍道東陽「我家阿林，章清太出」。", "왕희지(王羲之)가 동양(東陽, 사랑)을 평하여 말했다. \"우리 집안의 아림(阿林, 사랑)은 빛나고 맑음이 크게 빼어나다.\"", ["비평", "용모"]], ["賞譽", 121, "王長史與劉尹書，道淵源「觸事長易」。", "왕장사(王長史, 왕몽)가 유담(劉惔)에게 편지를 보내, 연원(淵源, 은호)을 평하여 \"일을 대함에 한결같이 평이하다\"고 하였다.", ["비평"]], ["賞譽", 122, "謝中郎云：「王脩載樂託之性，出自門風。」", "사중랑(謝中郎, 사만)이 말했다. \"왕수재(王脩載, 왕탄)의 즐겁고 트인 성품은 그 가문의 기풍에서 나온 것이다.\"", ["비평"]], ["賞譽", 123, "林公云：「王敬仁是超悟人。」", "임공(林公, 지둔)이 말했다. \"왕경인(王敬仁, 왕수)은 뛰어나게 깨달은 사람이다.\"", ["비평"]], ["賞譽", 124, "劉尹先推謝鎮西，謝後雅重劉曰：「昔嘗北面。」", "유담(劉惔)이 처음에 사진서(謝鎮西, 사상)를 추대하였는데, 사상이 뒤에 유담을 매우 존중하여 말했다. \"옛날 일찍이 그를 스승으로 섬겼다.\"", ["비평", "겸손"]], ["賞譽", 125, "謝太傅稱王脩齡曰：「司州可與林澤遊。」", "사안(謝安)이 왕수령(王脩齡, 왕호지)을 일컬어 말했다. \"사주(司州, 왕호지)는 더불어 산림과 못에서 노닐 만하다.\"", ["비평", "자연과산수"]], ["賞譽", 126, "諺曰：「楊州獨步王文度，後來出人郗嘉賓。」", "속담에 이런 말이 있다. \"양주에서 홀로 걸음을 하는 이는 왕문도(王文度, 왕탄지)요, 뒤에 나와 남을 능가하는 이는 치가빈(郗嘉賓, 치초)이다.\"", ["비평"]], ["賞譽", 127, "人問王長史江虨兄弟羣從，王答曰：「諸江皆復足自生活。」", "어떤 이가 왕장사(王長史, 왕몽)에게 강빈(江虨)의 형제와 일족에 대해 물으니, 왕몽이 답하여 말했다. \"여러 강씨들은 모두 다 스스로 살아갈 만하다.\"", ["비평"]], ["賞譽", 128, "謝太傅道安北：「見之乃不使人厭，然出戶去，不復使人思。」", "사안(謝安)이 안북(安北, 왕탄지)을 평하여 말했다. \"그를 보면 사람을 싫증나게 하지 않으나, 문을 나서 떠나고 나면 다시 사람을 그립게 하지는 않는다.\"", ["비평"]], ["賞譽", 129, "謝公云：「司州造勝遍決。」", "사안(謝安)이 말했다. \"사주(司州, 왕호지)는 빼어난 경지에 이르면 두루 단정한다.\"", ["비평"]], ["賞譽", 130, "劉尹云：「見何次道飲酒，使人欲傾家釀。」", "유담(劉惔)이 말했다. \"하차도(何次道, 하충)가 술 마시는 것을 보면, 사람으로 하여금 온 집안의 술을 다 기울이고 싶게 만든다.\"", ["비평", "술과취흥"]], ["賞譽", 131, "謝太傅語真長：「阿齡於此事，故欲太厲。」劉曰：「亦名士之高操者。」", "사안(謝安)이 유담(劉惔)에게 말했다. \"아령(阿齡, 왕호지)은 이 일에 있어 참으로 너무 매섭다.\" 유담이 말했다. \"또한 명사의 높은 지조요.\"", ["비평", "충직"]], ["賞譽", 132, "王子猷說：「世目士少為朗，我家亦以為徹朗。」", "왕휘지(王徽之)가 말했다. \"세상에서 사소(士少, 조약)를 평하여 밝다 하는데, 우리 집안에서도 그를 두루 밝다고 여긴다.\"", ["비평"]], ["賞譽", 133, "謝公云：「長史語甚不多，可謂有令音。」", "사안(謝安)이 말했다. \"장사(長史, 왕몽)는 말이 심히 많지 않으니, 아름다운 음성이 있다 할 만하다.\"", ["비평", "음악"]], ["賞譽", 134, "謝鎮西道敬仁「文學鏃鏃，無能不新」。", "사진서(謝鎮西, 사상)가 경인(敬仁, 왕수)을 평하여 말했다. \"문학이 빼어나고 빼어나서, 능히 새롭지 않은 것이 없다.\"", ["비평", "학문"]], ["賞譽", 135, "劉尹道江道羣「不能言而能不言」。", "유담(劉惔)이 강도군(江道羣, 강관)을 평하여 말했다. \"말을 잘하지는 못하나, 능히 말하지 않을 줄을 안다.\"", ["비평", "지혜"]], ["賞譽", 136, "林公云：「見司州警悟交至，使人不得住，亦終日忘疲。」", "임공(林公, 지둔)이 말했다. \"사주(司州, 왕호지)를 보면 민첩한 깨달음이 번갈아 이르러, 사람으로 하여금 멈출 수 없게 하고, 또한 종일토록 피곤함을 잊게 한다.\"", ["비평"]], ["賞譽", 137, "世稱：「苟子秀出，阿興清和。」", "세상에서 일컫기를 \"구자(苟子, 왕수)는 빼어나고, 아흥(阿興, 왕몽)은 맑고 온화하다\"고 하였다.", ["비평"]], ["賞譽", 138, "簡文云：「劉尹茗柯有實理。」", "간문제(簡文帝)가 말했다. \"유담(劉惔)은 차나무 줄기와 같으면서도 실한 이치가 있다.\"", ["비평"]], ["賞譽", 139, "謝胡兒作著作郎，嘗作王堪傳。不諳堪是何似人，咨謝公。謝公答曰：「世冑亦被遇。堪，烈之子，阮千里姨兄弟，潘安仁中外。安仁詩所謂『子親伊姑，我父唯舅』。是許允壻。」", "사호아(謝胡兒, 사랑)가 저작랑(著作郎)이 되어 일찍이 「왕감전(王堪傳)」을 지었다. 왕감(王堪)이 어떤 사람인지 알지 못해 사안(謝安)에게 물었다. 사안이 답하여 말했다. \"세족이면서 또한 대우를 받은 자다. 왕감은 왕열(王烈)의 아들이요, 완천리(阮千里, 완첨)의 이종형제이며, 반안인(潘安仁, 반악)과는 내외종간이다. 반악의 시에 이른바 '그대의 친족은 곧 고모요, 내 아버지는 오직 외삼촌이다'라고 한 것이 그것이다. 또 허윤(許允)의 사위다.\"", ["학문", "비평"]], ["賞譽", 140, "謝太傅重鄧僕射，常言「天地無知，使伯道無兒」。", "사안(謝安)이 등복야(鄧僕射, 등유)를 중히 여겨, 늘 말했다. \"천지가 무지하여, 백도(伯道, 등유)로 하여금 자식이 없게 하였구나.\"", ["비평", "죽음"]], ["賞譽", 141, "謝公與王右軍書曰：「敬和棲託好佳。」", "사안(謝安)이 왕희지(王羲之)에게 편지를 보내 말했다. \"경화(敬和, 왕흡)는 깃들어 의탁함이 매우 아름답습니다.\"", ["비평"]], ["賞譽", 142, "吳四姓舊目云：「張文、朱武、陸忠、顧厚。」", "오(吳) 땅 네 성씨에 대해 예부터 평하여 말했다. \"장씨는 문(文)이요, 주씨는 무(武)요, 육씨는 충(忠)이요, 고씨는 후(厚)다.\"", ["비평"]], ["賞譽", 143, "謝公語王孝伯：「君家藍田，舉體無常人事。」", "사안(謝安)이 왕효백(王孝伯, 왕공)에게 말했다. \"그대 집안의 남전(藍田, 왕술)은 온몸에 평범한 사람의 기색이 없다.\"", ["비평", "용모"]], ["賞譽", 144, "許掾嘗詣簡文，爾夜風恬月朗，乃共作曲室中語。襟情之詠，偏是許之所長。辭寄清婉，有逾平日。簡文雖契素，此遇尤相咨嗟。不覺造厀，共叉手語，達于將旦。既而曰：「玄度才情，故未易多有許。」", "허연(許掾, 허순)이 일찍이 간문제(簡文帝)를 찾아갔는데, 그날 밤 바람이 잔잔하고 달이 밝아 함께 깊숙한 방 안에서 이야기를 나누었다. 흉금과 정회를 읊는 것은 유독 허순이 잘하는 바였다. 말과 표현이 맑고 곱기가 평소보다 뛰어났다. 간문제가 비록 평소에도 마음이 맞았으나, 이번 만남에서는 더욱 감탄하였다. 어느새 무릎이 닿을 만큼 가까이 다가가 함께 손을 맞잡고 이야기를 나누다 동틀 무렵에 이르렀다. 이윽고 간문제가 말했다. \"허순의 재주와 정취는 참으로 그만큼 갖춘 자가 쉽지 않다.\"", ["청담", "풍류", "비평"]], ["賞譽", 145, "殷允出西，郗超與袁虎書云：「子思求良朋，託好足下，勿以開美求之。」世目袁為「開美」，故子敬詩曰：「袁生開美度。」", "은윤(殷允)이 서쪽으로 나갈 때, 치초(郗超)가 원호(袁虎, 원굉)에게 편지를 보내 말했다. \"자사(子思, 은윤)가 좋은 벗을 구하여 그대에게 우정을 의탁하니, 트인 아름다움으로만 그를 헤아리지 마시오.\" 세상에서 원굉을 평하여 \"트인 아름다움(開美)\"이라 하였으므로, 왕헌지(王獻之)의 시에 \"원생(袁生)은 트인 아름다움의 기량이 있다\"고 하였다.", ["우정", "비평"]], ["賞譽", 146, "謝車騎問謝公：「真長性至峭，何足乃重？」答曰：「是不見耳！阿見子敬，尚使人不能已。」", "사현(謝玄)이 사안(謝安)에게 물었다. \"진장(眞長, 유담)은 성품이 지극히 매서운데, 어찌 그리 중히 여길 만합니까?\" 사안이 답하여 말했다. \"이는 그를 보지 못해서다! 내가 자경(子敬, 왕헌지)을 보아도 오히려 마음을 멈출 수 없게 하느니라.\"", ["비평"]], ["賞譽", 147, "謝公領中書監，王東亭有事應同上省，王後至，坐促，王、謝雖不通，太傅猶斂厀容之。王神意閑暢，謝公傾目。還謂劉夫人曰：「向見阿瓜，故自未易有。雖不相關，正是使人不能已已。」", "사안(謝安)이 중서감(中書監)을 겸하였을 때, 왕동정(王東亭, 왕순)이 일이 있어 마땅히 함께 관청에 올라야 했다. 왕순이 뒤늦게 이르렀고 자리가 비좁았는데, 왕순과 사안이 비록 서로 왕래하는 사이는 아니었으나, 사안이 그래도 무릎을 거두어 그를 받아들였다. 왕순의 정신과 뜻이 한가롭고 화창하니, 사안이 눈을 기울여 바라보았다. 돌아와 유부인(劉夫人)에게 말했다. \"방금 아과(阿瓜, 왕순)를 보았는데, 참으로 쉽게 있을 만한 인물이 아니더이다. 비록 서로 관계는 없으나, 바로 사람으로 하여금 마음을 멈출 수 없게 합디다.\"", ["비평", "도량", "용모"]], ["賞譽", 148, "王子敬語謝公：「公故蕭灑。」謝曰：「身不蕭灑。君道身最得，身正自調暢。」", "왕헌지(王獻之)가 사안(謝安)에게 말했다. \"공께서는 참으로 소탈하고 시원하십니다.\" 사안이 말했다. \"나는 소탈하고 시원하지 않다. 그대가 나를 평한 것이 가장 잘 들어맞으니, 나는 다만 절로 조화롭고 화창할 뿐이다.\"", ["비평", "겸손"]], ["賞譽", 149, "謝車騎初見王文度曰：「見文度雖蕭灑相遇，其復愔愔竟夕。」", "사현(謝玄)이 처음 왕문도(王文度, 왕탄지)를 보고 말했다. \"문도(文度, 왕탄지)를 보니, 비록 소탈하고 시원하게 만났으나, 그가 다시 고요하고 그윽하기가 밤새 이어지더라.\"", ["비평"]], ["賞譽", 150, "范豫章謂王荊州：「卿風流儁望，真後來之秀。」王曰：「不有此舅，焉有此甥？」", "범예장(范豫章, 범녕)이 왕형주(王荊州, 왕침)에게 말했다. \"그대의 풍류와 빼어난 명망은 참으로 후대의 빼어난 인재다.\" 왕침이 말했다. \"이런 외삼촌이 없었다면 어찌 이런 생질이 있겠습니까?\"", ["비평", "풍류"]], ["賞譽", 151, "子敬與子猷書，道「兄伯蕭索寡會，遇酒則酣暢忘反，乃自可矜」。", "왕헌지(王獻之)가 왕휘지(王徽之)에게 편지를 보내, \"형 백(伯)은 쓸쓸하여 모임이 적으나, 술을 만나면 흠뻑 취하여 돌아갈 줄을 잊으니, 참으로 가상할 만하다\"고 하였다.", ["비평", "술과취흥", "은둔"]], ["賞譽", 152, "張天錫世雄涼州，以力弱詣京師，雖遠方殊類，亦邊人之桀也。聞皇京多才，欽羡彌至。猶在渚住，司馬著作往詣之。言容鄙陋，無可觀聽。天錫心甚悔來，以遐外可以自固。王彌有儁才美譽，當時聞而造焉。既至，天錫見其風神清令，言話如流，陳說古今，無不貫悉。又諳人物氏族，中來皆有證據。天錫訝服。", "장천석(張天錫)은 대대로 양주(涼州)에 웅거하였으나, 세력이 약해지자 경사(京師)에 나아갔다. 비록 먼 지방의 다른 부류였으나 또한 변방 사람 가운데 걸출한 자였다. 황도(皇都)에 인재가 많다는 말을 듣고 흠모함이 지극하였다. 아직 물가에 머물러 있을 때, 사마 저작(司馬著作)이 그를 찾아갔다. 그러나 말과 용모가 비루하여 보고 들을 만한 것이 없었다. 장천석은 마음속으로 온 것을 몹시 후회하며, 먼 변방이라면 스스로를 굳게 지킬 수 있었으리라 여겼다. 왕미(王彌)는 뛰어난 재주와 아름다운 명예가 있어, 당시에 소문을 듣고 그를 찾아왔다. 이르고 보니 장천석이 보기에 그 풍신(風神)이 맑고 빼어났으며, 말이 물 흐르듯 하고, 고금(古今)을 진술함에 꿰뚫지 못하는 것이 없었다. 또 인물과 씨족에 통달하여 내력마다 모두 증거가 있었다. 장천석이 놀라 탄복하였다.", ["비평", "용모", "재능"]], ["賞譽", 153, "王恭始與王建武甚有情，後遇袁悅之間，遂致疑隟。然每至興會，故有相思。時恭嘗行散至京口射堂，于時清露晨流，新桐初引，恭目之曰：「王大故自濯濯。」", "왕공(王恭)은 처음 왕건무(王建武)와 매우 정이 두터웠으나, 뒤에 원열(袁悅)의 이간을 만나 마침내 의심과 틈이 생겼다. 그러나 흥취가 일 때마다 여전히 서로 그리워하였다. 한번은 왕공이 행산(行散)하러 경구(京口)의 사당(射堂)에 이르렀는데, 이때 맑은 이슬이 새벽에 흐르고 새 오동나무가 막 잎을 피우니, 왕공이 그것을 보며 말하였다. \"왕대(王大)는 참으로 깨끗하고 빛나는구나.\"", ["우정", "비평", "질투"]], ["賞譽", 154, "司馬太傅為二王目曰：「孝伯亭亭直上，阿大羅羅清疎。」", "사마 태부(司馬太傅)가 두 왕씨를 평하여 말하였다. \"효백(孝伯)은 우뚝 솟아 곧게 올라가고, 아대(阿大)는 시원스럽고 맑고 성기다.\"", ["비평"]], ["賞譽", 155, "王恭有清辭簡旨，能敘說，而讀書少，頗有重出。有人道孝伯常有新意，不覺為煩。", "왕공(王恭)은 맑은 말과 간결한 뜻이 있어 능히 서술하였으나, 글을 적게 읽어 자못 거듭 나오는 데가 있었다. 어떤 사람이 \"효백(孝伯)은 늘 새로운 뜻이 있어 번거롭게 느껴지지 않는다\"고 하였다.", ["비평", "청담", "학문"]], ["賞譽", 156, "殷仲堪喪後，桓玄問仲文：「卿家仲堪，定是何似人？」仲文曰：「雖不能休明一世，足以映徹九泉。」", "은중감(殷仲堪)이 죽은 뒤, 환현(桓玄)이 중문(仲文)에게 물었다. \"그대 집안의 중감은 정녕 어떠한 사람이었소?\" 중문이 말하였다. \"비록 한 세상을 아름답고 밝게 빛내지는 못하였으나, 충분히 구천(九泉)을 환히 비출 만합니다.\"", ["비평", "죽음"]], ["品藻", 1, "汝南陳仲舉，潁川李元禮二人，共論其功德，不能定先後。蔡伯喈評之曰：「陳仲舉彊於犯上，李元禮嚴於攝下。犯上難，攝下易。」仲舉遂在三君之下，元禮居八俊之上。", "여남(汝南)의 진중거(陳仲擧)와 영천(潁川)의 이원례(李元禮) 두 사람을 두고, 함께 그 공덕을 논하였으나 우열을 정하지 못하였다. 채백개(蔡伯喈)가 이를 평하여 말하였다. \"진중거는 윗사람을 거스르는 데 강하고, 이원례는 아랫사람을 다스리는 데 엄하다. 윗사람을 거스르기는 어렵고, 아랫사람을 다스리기는 쉽다.\" 이에 진중거는 삼군(三君)의 아래에 있게 되고, 이원례는 팔준(八俊)의 위에 있게 되었다.", ["비평"]], ["品藻", 2, "龐士元至吳，吳人並友之。見陸績、顧劭、全琮而為之目曰：「陸子所謂駑馬有逸足之用，顧子所謂駑牛可以負重致遠。」或問：「如所目，陸為勝邪？」曰：「駑馬雖精速，能致一人耳。駑牛一日行百里，所致豈一人哉？」吳人無以難。「全子好聲名，似汝南樊子昭。」", "방사원(龐士元)이 오(吳)에 이르자 오 사람들이 모두 그와 사귀었다. 그가 육적(陸績), 고소(顧劭), 전종(全琮)을 보고 평하여 말하였다. \"육자(陸子)는 이른바 둔한 말이로되 빨리 달리는 발의 쓰임이 있고, 고자(顧子)는 이른바 둔한 소로되 무거운 짐을 지고 멀리 갈 수 있다.\" 어떤 이가 물었다. \"평한 대로라면 육적이 나은 것입니까?\" 방사원이 말하였다. \"둔한 말은 비록 정밀하고 빠르나 한 사람을 데려갈 뿐이다. 둔한 소는 하루에 백 리를 가니, 데려가는 것이 어찌 한 사람뿐이겠는가?\" 오 사람들이 반박하지 못하였다. \"전자(全子)는 명성을 좋아하니 여남의 번자소(樊子昭)와 비슷하다.\"", ["비평"]], ["品藻", 3, "顧劭嘗與龐士元宿語，問曰：「聞子名知人，吾與足下孰愈？」曰：「陶冶世俗，與時浮沈，吾不如子；論王霸之餘策，覽倚仗之要害，吾似有一日之長。」劭亦安其言。", "고소(顧劭)가 한번은 방사원(龐士元)과 함께 묵으며 이야기하다가 물었다. \"그대가 사람을 알아본다는 이름이 있다고 들었소. 나와 그대 중에 누가 낫소?\" 방사원이 말하였다. \"세속을 도야(陶冶)하고 시류와 부침(浮沈)하는 데는 내가 그대만 못하오. 그러나 왕도(王道)와 패도(覇道)의 남은 책략을 논하고, 의지하고 기댈 요해(要害)를 살피는 데는 내가 하루의 나음은 있는 듯하오.\" 고소도 그 말을 편안히 여겼다.", ["비평", "지혜"]], ["品藻", 4, "諸葛瑾弟亮及從弟誕，並有盛名，各在一國。于時以為「蜀得其龍，吳得其虎，魏得其狗」。誕在魏與夏侯玄齊名；瑾在吳，吳朝服其弘量。", "제갈근(諸葛瑾)의 아우 양(亮)과 사촌아우 탄(誕)은 모두 큰 명성이 있었고, 각각 한 나라에 있었다. 이때 사람들은 \"촉(蜀)은 그 용을 얻었고, 오(吳)는 그 범을 얻었으며, 위(魏)는 그 개를 얻었다\"고 하였다. 탄은 위에서 하후현(夏侯玄)과 명성이 나란하였고, 근은 오에서 오의 조정이 그 넓은 기량(器量)에 탄복하였다.", ["비평", "제갈씨"]], ["品藻", 5, "司馬文王問武陔：「陳玄伯何如其父司空？」陔曰：「通雅博暢，能以天下聲教為己任者，不如也。明練簡至，立功立事，過之。」", "사마 문왕(司馬文王)이 무해(武陔)에게 물었다. \"진현백(陳玄伯)은 그 아버지 사공(司空)에 비해 어떠한가?\" 무해가 말하였다. \"통달하고 우아하며 박식하고 막힘이 없어 천하의 명성과 교화를 자기 임무로 삼는 점은 미치지 못합니다. 그러나 밝게 단련되고 간결하며 지극하여, 공을 세우고 일을 이루는 점은 아버지를 넘어섭니다.\"", ["비평"]], ["品藻", 6, "正始中，人士比論，以五荀方五陳：荀淑方陳寔，荀靖方陳諶，荀爽方陳紀，荀彧方陳羣，荀顗方陳泰。又以八裴方八王：裴徽方王祥，裴楷方王夷甫，裴康方王綏，裴綽方王澄，裴瓚方王敦，裴遐方王導，裴頠方王戎，裴邈方王玄。", "정시(正始) 연간에 인사들이 비교하여 논할 때, 다섯 순씨(荀氏)를 다섯 진씨(陳氏)에 견주었다. 순숙(荀淑)은 진식(陳寔)에, 순정(荀靖)은 진심(陳諶)에, 순상(荀爽)은 진기(陳紀)에, 순욱(荀彧)은 진군(陳羣)에, 순의(荀顗)는 진태(陳泰)에 견주었다. 또 여덟 배씨(裴氏)를 여덟 왕씨(王氏)에 견주었다. 배휘(裴徽)는 왕상(王祥)에, 배해(裴楷)는 왕이보(王夷甫)에, 배강(裴康)은 왕수(王綏)에, 배작(裴綽)은 왕징(王澄)에, 배찬(裴瓚)은 왕돈(王敦)에, 배하(裴遐)는 왕도(王導)에, 배외(裴頠)는 왕융(王戎)에, 배막(裴邈)은 왕현(王玄)에 견주었다.", ["비평"]], ["品藻", 7, "冀州刺史楊淮二子喬與髦，俱總角為成器。淮與裴頠、樂廣友善，遣見之。頠性弘方，愛喬之有高韻，謂淮曰：「喬當及卿，髦小減也。」廣性清淳，愛髦之有神檢，謂淮曰：「喬自及卿，然髦尤精出。」淮笑曰：「我二兒之優劣，乃裴、樂之優劣。」論者評之：以為喬雖高韻，而檢不匝；樂言為得。然並為後出之儁。", "기주 자사(冀州刺史) 양회(楊淮)의 두 아들 교(喬)와 모(髦)는 모두 어린 나이에 큰 그릇을 이루었다. 양회는 배외(裴頠), 악광(樂廣)과 벗으로 친하여, 두 아들을 보내 그들을 만나게 하였다. 배외는 성품이 넓고 반듯하여 교가 높은 운치를 지닌 것을 사랑하여 양회에게 말하였다. \"교는 마땅히 그대에게 미칠 것이나, 모는 조금 못합니다.\" 악광은 성품이 맑고 순박하여 모가 신묘한 단속을 지닌 것을 사랑하여 양회에게 말하였다. \"교는 그대에게 미칠 것이나, 모는 더욱 정묘하고 빼어납니다.\" 양회가 웃으며 말하였다. \"내 두 아들의 우열이 곧 배씨와 악씨의 우열이로구나.\" 논하는 자들이 이를 평하여, 교는 비록 높은 운치가 있으나 단속이 두루 갖추어지지 못하였으니, 악광의 말이 옳다고 여겼다. 그러나 둘 다 후세에 나온 준재(儁才)였다.", ["비평", "신동", "재능"]], ["品藻", 8, "劉令言始入洛，見諸名士而歎曰：「王夷甫太解明，樂彥輔我所敬，張茂先我所不解，周弘武巧於用短，杜方叔拙於用長。」", "유영언(劉令言)이 처음 낙양(洛陽)에 들어가 여러 명사들을 보고 탄식하여 말하였다. \"왕이보(王夷甫)는 지나치게 명민하고, 악언보(樂彥輔)는 내가 공경하는 바이며, 장무선(張茂先)은 내가 이해하지 못하는 바이고, 주홍무(周弘武)는 단점을 쓰는 데 교묘하며, 두방숙(杜方叔)은 장점을 쓰는 데 졸렬하다.\"", ["비평"]], ["品藻", 9, "王夷甫云：「閭丘沖，優於滿奮、郝隆。此三人並是高才，沖最先達。」", "왕이보(王夷甫)가 말하였다. \"여구충(閭丘沖)은 만분(滿奮), 학륭(郝隆)보다 낫다. 이 세 사람은 모두 높은 재주를 지녔으나, 충이 가장 먼저 통달하였다.\"", ["비평"]], ["品藻", 10, "王夷甫以王東海比樂令，故王中郎作碑云：「當時標榜，為樂廣之儷。」", "왕이보(王夷甫)가 왕동해(王東海)를 악령(樂令)에 견주었으므로, 왕중랑(王中郎)이 비문을 지어 말하였다. \"당시에 표방하기를 악광(樂廣)의 짝이라 하였다.\"", ["비평"]], ["品藻", 11, "庾中郎與王平子鴈行。", "유중랑(庾中郎)은 왕평자(王平子)와 어깨를 나란히 하였다.", ["비평"]], ["品藻", 12, "王大將軍在西朝時，見周侯輒扇障面不得住。後度江左，不能復爾。王歎曰：「不知我進，伯仁退？」", "왕대장군(王大將軍)이 서조(西朝)에 있을 때, 주후(周侯)를 보면 곧 부채로 얼굴을 가려 가만히 있을 수가 없었다. 뒤에 강좌(江左)로 건너온 뒤에는 다시 그러지 않았다. 왕돈(王敦)이 탄식하여 말하였다. \"내가 나아간 것인지, 백인(伯仁)이 물러난 것인지 알 수가 없구나.\"", ["비평", "겸손", "도량"]], ["品藻", 13, "會稽虞，元皇時與桓宣武同俠，其人有才理勝望。王丞相嘗謂曰：「孔愉有公才而無公望，丁潭有公望而無公才，兼之者其在卿乎？」未達而喪。", "회계(會稽)의 우(虞) 아무개는 원황제(元皇帝) 때 환선무(桓宣武)와 함께 협객으로 어울렸는데, 그 사람은 재주와 이치(理), 그리고 뛰어난 명망이 있었다. 왕승상(王丞相)이 한번은 그에게 말하였다. \"공유(孔愉)는 공(公)의 재주는 있으나 공의 명망이 없고, 정담(丁潭)은 공의 명망은 있으나 공의 재주가 없으니, 이를 겸한 자는 아마 그대일 것이오.\" 그러나 영달하지 못하고 죽었다.", ["비평", "재능", "권력"]], ["品藻", 14, "明帝問周伯仁：「卿自謂何如郗鑒？」周曰：「鑒方臣，如有功夫。」復問郗。郗曰：「周顗比臣，有國士門風。」", "명제(明帝)가 주백인(周伯仁)에게 물었다. \"경은 스스로 치감(郗鑒)에 비해 어떠하다고 생각하오?\" 주의(周顗)가 말하였다. \"치감이 신(臣)에 비하면 공력이 더 있는 듯합니다.\" 다시 치감에게 물었다. 치감이 말하였다. \"주의가 신에 비하면 국사(國士)의 문풍(門風)이 있습니다.\"", ["비평"]], ["品藻", 15, "王大將軍下，庾公問：「卿有四友，何者是？」答曰：「君家中郎，我家太尉、阿平、胡毋彥國。阿平故當最劣。」庾曰：「似未肯劣。」庾又問：「何者居其右？」王曰：「自有人。」又問：「何者是？」王曰：「噫！其自有公論。」左右躡公，公乃止。", "왕대장군(王大將軍)이 도성으로 내려오자, 유공(庾公)이 물었다. \"그대에게 네 벗이 있다는데, 누구누구요?\" 답하여 말하였다. \"그대 집안의 중랑(中郎), 우리 집안의 태위(太尉), 아평(阿平), 호무언국(胡毋彥國)이오. 아평이 본디 가장 못할 것이오.\" 유공이 말하였다. \"못하다고는 수긍하지 않을 듯하오.\" 유공이 또 물었다. \"누가 그 윗자리에 있소?\" 왕돈이 말하였다. \"따로 사람이 있소.\" 또 물었다. \"누구요?\" 왕돈이 말하였다. \"아! 그것은 절로 공론(公論)이 있을 것이오.\" 좌우 사람이 유공을 밟아 말리니, 유공이 이에 그쳤다.", ["비평", "우정"]], ["品藻", 16, "人問丞相：「周侯何如和嶠？」答曰：「長輿嵯櫱。」", "어떤 사람이 승상(丞相)에게 물었다. \"주후(周侯)는 화교(和嶠)와 비교하면 어떠합니까?\" 답하여 말하였다. \"장여(長輿)는 우뚝 솟은 바위 같다.\"", ["비평"]], ["品藻", 17, "明帝問謝鯤：「君自謂何如庾亮？」答曰：「端委廟堂，使百僚準則，臣不如亮。一丘一壑，自謂過之。」", "명제(明帝)가 사곤(謝鯤)에게 물었다. \"그대는 스스로 유량(庾亮)에 비해 어떠하다고 생각하오?\" 답하여 말하였다. \"단정하게 예복을 갖추고 묘당(廟堂)에 서서 백관(百僚)의 본보기가 되는 데는 신이 유량만 못합니다. 그러나 한 언덕과 한 골짜기에서 노니는 데는 스스로 그를 넘는다고 생각합니다.\"", ["비평", "은둔"]], ["品藻", 18, "王丞相二弟不過江，曰頴，曰敞。時論以頴比鄧伯道，敞比溫忠武。議郎、祭酒者也。", "왕승상(王丞相)의 두 아우는 강을 건너지 않았으니, 영(頴)과 창(敞)이라 하였다. 당시의 논의는 영을 등백도(鄧伯道)에, 창을 온충무(溫忠武)에 견주었다. 의랑(議郎)과 좨주(祭酒)를 지낸 이들이다.", ["비평"]], ["品藻", 19, "明帝問周侯：「論者以卿比郗鑒，云何？」周曰：「陛下不須牽顗比。」", "명제(明帝)가 주후(周侯)에게 물었다. \"논하는 자들이 경을 치감(郗鑒)에 견주는데, 어떻소?\" 주의(周顗)가 말하였다. \"폐하께서는 굳이 저 주의를 끌어다 견주실 것 없습니다.\"", ["비평", "겸손"]], ["品藻", 20, "王丞相云：「頃下論以我比安期、千里。亦推此二人。唯共推太尉，此君特秀。」", "왕승상(王丞相)이 말하였다. \"근래 도성의 논의가 나를 안기(安期), 천리(千里)에 견준다. 또한 이 두 사람을 추켜세우는 것이다. 다만 함께 추켜세우는 것은 태위(太尉)이니, 이분이 유독 빼어나다.\"", ["비평"]], ["品藻", 21, "宋褘曾為王大將軍妾，後屬謝鎮西。鎮西問褘：「我何如王？」答曰：「王比使君，田舍、貴人耳！」鎮西妖冶故也。", "송위(宋褘)는 일찍이 왕대장군(王大將軍)의 첩이었다가, 뒤에 사진서(謝鎮西)에게 속하였다. 진서가 송위에게 물었다. \"나는 왕씨에 비해 어떠하냐?\" 답하여 말하였다. \"왕씨는 사군(使君)에 비하면 시골 농사꾼과 귀인(貴人)의 차이일 뿐입니다.\" 진서가 요염하고 곱게 꾸몄던 까닭이다.", ["비평", "용모"]], ["品藻", 22, "明帝問周伯仁：「卿自謂何如庾元規？」對曰：「蕭條方外，亮不如臣；從容廊廟，臣不如亮。」", "명제(明帝)가 주백인(周伯仁)에게 물었다. \"경은 스스로 유원규(庾元規)에 비해 어떠하다고 생각하오?\" 답하여 말하였다. \"세속 밖에서 소조(蕭條)히 노니는 데는 유량(庾亮)이 신만 못하나, 조정에서 종용(從容)히 처신하는 데는 신이 유량만 못합니다.\"", ["비평", "겸손"]], ["品藻", 23, "王丞相辟王藍田為掾，庾公問丞相：「藍田何似？」王曰：「真獨簡貴，不減父祖；然曠澹處，故當不如爾。」", "왕승상(王丞相)이 왕남전(王藍田)을 속관(掾)으로 불러들이자, 유공(庾公)이 승상에게 물었다. \"남전은 어떠합니까?\" 왕도(王導)가 말하였다. \"참되고 홀로 간결하고 귀한 점은 그 아버지와 할아버지에 못지않다. 그러나 트이고 담박한 점은 본디 그분들만 못할 것이다.\"", ["비평"]], ["品藻", 24, "卞望之云：「郗公體中有三反：方於事上，好下佞己，一反。治身清貞，大脩計校，二反。自好讀書，憎人學問，三反。」", "변망지(卞望之)가 말하였다. \"치공(郗公)의 됨됨이에는 세 가지 상반됨이 있다. 윗사람을 섬기는 데는 반듯하면서도 아랫사람이 자기에게 아첨하기를 좋아하니, 이것이 첫째 상반됨이다. 몸가짐은 맑고 곧으면서도 셈하고 따지기를 크게 하니, 이것이 둘째 상반됨이다. 스스로는 글 읽기를 좋아하면서도 남이 학문하는 것을 미워하니, 이것이 셋째 상반됨이다.\"", ["비평"]], ["品藻", 25, "世論溫太真，是過江第二流之高者。時名輩共說人物，第一將盡之間，溫常失色。", "세상에서는 온태진(溫太眞)을 강을 건너온 인물 가운데 둘째 부류의 높은 자라고 논하였다. 당시 이름난 무리들이 함께 인물을 논할 때, 첫째 부류가 거의 끝나갈 즈음이면 온태진은 늘 안색을 잃었다.", ["비평"]], ["品藻", 26, "王丞相云：「見謝仁祖恆令人得上。與何次道語，唯舉手指地曰：『正自爾馨！』」", "왕승상(王丞相)이 말하였다. \"사인조(謝仁祖)를 보면 늘 사람으로 하여금 마음이 고양되게 한다. 하차도(何次道)와 더불어 말할 때는, 다만 손을 들어 땅을 가리키며 '바로 이렇게 향기로울 뿐이다'라고 할 뿐이었다.\"", ["비평", "풍류"]], ["品藻", 27, "何次道為宰相，人有譏其信任不得其人。阮思曠慨然曰：「次道自不至此。但布衣超居宰相之位，可恨！唯此一條而已。」", "하차도(何次道)가 재상이 되었을 때, 어떤 사람이 그가 사람을 잘못 신임한다고 나무랐다. 완사광(阮思曠)이 개연히 말하였다. \"차도는 본디 이런 데 이르지 않는다. 다만 베옷 입은 처지에서 뛰어올라 재상의 자리에 오른 것이 한스러울 뿐이니, 오직 이 한 가지뿐이다.\"", ["비평", "권력"]], ["品藻", 28, "王右軍少時，丞相云：「逸少何緣復減萬安邪？」", "왕우군(王右軍)이 어렸을 때, 승상(丞相)이 말하였다. \"일소(逸少)가 무슨 까닭에 또 만안(萬安)만 못하겠는가?\"", ["비평"]], ["品藻", 29, "郗司空家有傖奴，知及文章，事事有意。王右軍向劉尹稱之。劉問「何如方回？」王曰：「此正小人有意向耳！何得便比方回？」劉曰：「若不如方回，故是常奴耳！」", "치사공(郗司空) 집에 거친 종이 있었는데, 식견이 문장에 이르렀고 일마다 뜻이 있었다. 왕우군(王右軍)이 유윤(劉尹)에게 그를 칭찬하였다. 유윤이 물었다. \"방회(方回)와 비교하면 어떻소?\" 왕희지(王羲之)가 말하였다. \"이는 그저 소인이 뜻을 향함이 있을 뿐이오. 어찌 곧바로 방회에 견주겠소?\" 유윤이 말하였다. \"만약 방회만 못하다면, 그저 보통 종일 뿐이오.\"", ["비평", "재능"]], ["品藻", 30, "時人道阮思曠：「骨氣不及右軍，簡秀不如真長，韶潤不如仲祖，思致不如淵源，而兼有諸人之美。」", "당시 사람들이 완사광(阮思曠)을 평하였다. \"골기(骨氣)는 우군(右軍)에 미치지 못하고, 간결하고 빼어남은 진장(眞長)만 못하며, 아름답고 윤택함은 중조(仲祖)만 못하고, 생각의 깊이는 연원(淵源)만 못하나, 여러 사람의 아름다움을 겸하여 지녔다.\"", ["비평"]], ["品藻", 31, "簡文云：「何平叔巧累於理，嵇叔夜儁傷其道。」", "간문제(簡文帝)가 말하였다. \"하평숙(何平叔)은 교묘함이 이치(理)를 해치고, 혜숙야(嵇叔夜)는 뛰어남이 그 도(道)를 해친다.\"", ["비평", "청담"]], ["品藻", 32, "時人共論晉武帝出齊王之與立惠帝，其失孰多？多謂立惠帝為重。桓溫曰：「不然，使子繼父業，弟承家祀，有何不可？」", "당시 사람들이 함께 논하기를, 진 무제(晉武帝)가 제왕(齊王)을 내보낸 것과 혜제(惠帝)를 세운 것 가운데 어느 잘못이 더 큰가 하였다. 대부분 혜제를 세운 것을 더 무겁다고 하였다. 환온(桓溫)이 말하였다. \"그렇지 않다. 아들이 아비의 업을 잇고 아우가 집안의 제사를 받드는 것이 무슨 안 될 것이 있겠는가?\"", ["비평", "권력"]], ["品藻", 33, "人問殷淵源：「當世王公以卿比裴叔道，云何？」殷曰：「故當以識通暗處。」", "어떤 사람이 은연원(殷淵源)에게 물었다. \"당세의 왕공(王公)들이 경을 배숙도(裴叔道)에 견주는데, 어떻소?\" 은호(殷浩)가 말하였다. \"본디 식견으로 어두운 데를 통하는 점 때문일 것이오.\"", ["비평"]], ["品藻", 34, "撫軍問殷浩：「卿定何如裴逸民？」良久答曰：「故當勝耳。」", "무군(撫軍)이 은호(殷浩)에게 물었다. \"경은 정녕 배일민(裴逸民)에 비해 어떠하오?\" 한참 만에 답하여 말하였다. \"본디 나을 것입니다.\"", ["비평", "오만"]], ["品藻", 35, "桓公少與殷侯齊名，常有競心。桓問殷：「卿何如我？」殷云：「我與我周旋久，寧作我。」", "환공(桓公)은 젊어서 은후(殷侯)와 명성이 나란하여 늘 경쟁심이 있었다. 환온(桓溫)이 은호(殷浩)에게 물었다. \"경은 나에 비해 어떠하오?\" 은호가 말하였다. \"나는 나 자신과 오래 어울려 왔으니, 차라리 나로 있겠소.\"", ["비평", "오만"]], ["品藻", 36, "撫軍問孫興公：「劉真長何如？」曰：「清蔚簡令。」「王仲祖何如？」曰：「溫潤恬和。」「桓溫何如？」曰：「高爽邁出。」「謝仁祖何如？」曰：「清易令達。」「阮思曠何如？」曰：「弘潤通長。」「袁羊何如？」曰：「洮洮清便。」「殷洪遠何如？」曰：「遠有致思。」「卿自謂何如？」曰：「下官才能所經，悉不如諸賢；至於斟酌時宜，籠罩當世，亦多所不及。然以不才，時復託懷玄勝，遠詠老、莊，蕭條高寄，不與時務經懷，自謂此心無所與讓也。」", "무군(撫軍)이 손흥공(孫興公)에게 물었다. \"유진장(劉眞長)은 어떠하오?\" 답하여 말하였다. \"맑고 무성하며 간결하고 아름답습니다.\" \"왕중조(王仲祖)는 어떠하오?\" 답하였다. \"온화하고 윤택하며 편안하고 화평합니다.\" \"환온(桓溫)은 어떠하오?\" 답하였다. \"높고 시원하며 빼어나게 솟았습니다.\" \"사인조(謝仁祖)는 어떠하오?\" 답하였다. \"맑고 편안하며 아름답고 통달하였습니다.\" \"완사광(阮思曠)은 어떠하오?\" 답하였다. \"넓고 윤택하며 두루 통하고 깁니다.\" \"원양(袁羊)은 어떠하오?\" 답하였다. \"넘실넘실 맑고 편안합니다.\" \"은홍원(殷洪遠)은 어떠하오?\" 답하였다. \"심원하여 정취 있는 생각이 있습니다.\" \"경은 스스로 어떠하다고 생각하오?\" 답하였다. \"제가 거쳐온 재능은 모두 여러 현인만 못합니다. 시의(時宜)를 헤아리고 당세를 아우르는 데도 미치지 못하는 바가 많습니다. 그러나 재주 없는 몸으로 때때로 다시 현묘하고 빼어난 것에 마음을 부쳐, 멀리 노자와 장자를 읊으며, 소조(蕭條)히 높은 데 뜻을 부치고, 세상일을 마음에 두지 않으니, 스스로 이 마음만은 누구에게도 양보할 바 없다고 여깁니다.\"", ["비평", "청담"]], ["品藻", 37, "桓大司馬下都，問真長曰：「聞會稽王語奇進，爾邪？」劉曰：「極進，然故是第二流中人耳！」桓曰：「第一流復是誰？」劉曰：「正是我輩耳！」", "환대사마(桓大司馬)가 도성으로 내려와 진장(眞長)에게 물었다. \"회계왕(會稽王)의 말이 놀랍게 진보하였다 들었는데, 그렇소?\" 유윤(劉惔)이 말하였다. \"지극히 진보하였으나, 본디 둘째 부류 가운데 사람일 뿐입니다.\" 환온(桓溫)이 말하였다. \"첫째 부류는 또 누구요?\" 유윤이 말하였다. \"바로 우리 무리일 뿐입니다.\"", ["비평", "오만"]], ["品藻", 38, "殷侯既廢，桓公語諸人曰：「少時與淵源共騎竹馬，我棄去，己輒取之，故當出我下。」", "은후(殷侯)가 폐출된 뒤, 환공(桓公)이 여러 사람에게 말하였다. \"어렸을 때 연원(淵源)과 함께 죽마(竹馬)를 탔는데, 내가 버리고 가면 그가 곧 그것을 주워 가졌으니, 본디 내 아래에 있어야 마땅하다.\"", ["비평", "권력"]], ["品藻", 39, "人問撫軍：「殷浩談竟何如？」答曰：「不能勝人，差可獻酬羣心。」", "어떤 사람이 무군(撫軍)에게 물었다. \"은호(殷浩)의 담론은 결국 어떠합니까?\" 대답하였다. \"남을 이기지는 못하나, 여러 사람의 마음을 그런대로 주고받을 만하다.\"", ["비평", "청담"]], ["品藻", 40, "簡文云：「謝安南清令不如其弟，學義不及孔巖，居然自勝。」", "간문제(簡文帝)가 말하였다. \"사안남(謝安南)의 맑고 아름다움은 그 아우만 못하고, 학문과 의리는 공암(孔巖)에 미치지 못하나, 분명 절로 그를 이기는 데가 있다.\"", ["비평", "학문"]], ["品藻", 41, "未廢海西公時，王元琳問桓元子：「箕子、比干，迹異心同，不審明公孰是孰非？」曰：「仁稱不異，寧為管仲。」", "해서공(海西公)이 아직 폐위되지 않았을 때, 왕원림(王元琳)이 환원자(桓元子)에게 물었다. \"기자(箕子)와 비간(比干)은 자취는 다르나 마음은 같았는데, 명공께서는 누가 옳고 누가 그르다 여기십니까?\" 대답하였다. \"어질다는 칭송은 다르지 않으나, 차라리 관중(管仲)이 되겠다.\"", ["비평", "충직"]], ["品藻", 42, "劉丹陽、王長史在瓦官寺集，桓護軍亦在坐，共商略西朝及江左人物。或問：「杜弘治何如衛虎？」桓答曰：「弘治膚清，衛虎奕奕神令。」王、劉善其言。", "유단양(劉丹陽)과 왕장사(王長史)가 와관사(瓦官寺)에 모였는데, 환호군(桓護軍)도 자리에 있었다. 함께 서조(西朝)와 강좌(江左)의 인물들을 평하였다. 누군가 물었다. \"두홍치(杜弘治)는 위호(衛虎)와 견주어 어떠한가?\" 환호군이 대답하였다. \"홍치는 살결이 맑고, 위호는 빛나는 신령스러움이 있다.\" 왕장사와 유단양이 그 말을 좋게 여겼다.", ["비평", "용모"]], ["品藻", 43, "劉尹撫王長史背曰：「阿奴比丞相，但有都長。」", "유윤(劉尹)이 왕장사(王長史)의 등을 어루만지며 말하였다. \"자네는 승상(丞相)에 견주어, 다만 도량 넓음(都)과 진중함(長)이 있을 뿐이다.\"", ["비평", "도량"]], ["品藻", 44, "劉尹、王長史同坐，長史酒酣起舞。劉尹曰：「阿奴今日不復減向子期。」", "유윤(劉尹)과 왕장사(王長史)가 함께 앉아 있었는데, 장사가 술이 거나해지자 일어나 춤을 추었다. 유윤이 말하였다. \"자네는 오늘 다시금 상자기(向子期)에 못지않다.\"", ["풍류", "비평", "음악"]], ["品藻", 45, "桓公問孔西陽：「安石何如仲文？」孔思未對，反問公曰：「何如？」答曰：「安石居然不可陵踐其處，故乃勝也。」", "환공(桓溫)이 공서양(孔西陽)에게 물었다. \"안석(謝安)은 중문(仲文)과 견주어 어떠한가?\" 공서양이 생각하며 미처 대답하지 못하고 도리어 환공에게 되물었다. \"어떻습니까?\" 대답하였다. \"안석은 분명 그 경지를 짓밟을 수 없으니, 그래서 이기는 것이다.\"", ["비평"]], ["品藻", 46, "謝公與時賢共賞說，遏、胡兒並在坐。公問李弘度曰：「卿家平陽，何如樂令？」於是李潸然流涕曰：「趙王篡逆，樂令親授璽綬。亡伯雅正，恥處亂朝，遂至仰藥。恐難以相比！此自顯於事實，非私親之言。」謝公語胡兒曰：「有識者果不異人意。」", "사공(謝安)이 당대의 현인들과 함께 평하며 이야기하는데, 알(遏)과 호아(胡兒)가 모두 자리에 있었다. 사공이 이홍도(李弘度)에게 물었다. \"그대 집안의 평양(平陽)은 악령(樂令)과 견주어 어떠한가?\" 이에 이홍도가 주르륵 눈물을 흘리며 말하였다. \"조왕(趙王)이 찬역하였을 때 악령은 친히 옥새와 인끈을 바쳤습니다. 돌아가신 백부는 단정하고 바르시어 어지러운 조정에 머무르기를 부끄러이 여겨 마침내 약을 마시기에 이르렀습니다. 아마도 서로 견주기 어려울 것입니다. 이는 절로 사실에 드러난 것이지 사사로이 친족을 두둔하는 말이 아닙니다.\" 사공이 호아에게 말하였다. \"식견 있는 자는 과연 사람들의 뜻과 다르지 않구나.\"", ["비평", "충직", "죽음"]], ["品藻", 47, "王脩齡問王長史：「我家臨川，何如卿家宛陵？」長史未答，脩齡曰：「臨川譽貴。」長史曰：「宛陵未為不貴。」", "왕수령(王脩齡)이 왕장사(王長史)에게 물었다. \"우리 집안의 임천(臨川)은 그대 집안의 완릉(宛陵)과 견주어 어떠한가?\" 장사가 미처 대답하기 전에 수령이 말하였다. \"임천은 명망이 귀하다.\" 장사가 말하였다. \"완릉도 귀하지 않은 것은 아니다.\"", ["비평"]], ["品藻", 48, "劉尹至王長史許清言，時苟子年十三，倚牀邊聽。既去，問父曰：「劉尹語何如尊？」長史曰：「韶音令辭，不如我；往輒破的，勝我。」", "유윤(劉尹)이 왕장사(王長史)의 거처에 이르러 청담(淸談)을 나누었는데, 당시 구자(苟子)는 나이 열셋으로 평상 가에 기대어 듣고 있었다. 유윤이 떠난 뒤 아버지에게 물었다. \"유윤의 담론은 아버님과 견주어 어떠합니까?\" 장사가 말하였다. \"고운 가락과 아름다운 말은 나만 못하나, 한번 나서면 곧 핵심을 꿰뚫으니 그 점은 나보다 낫다.\"", ["비평", "청담", "신동"]], ["品藻", 49, "謝萬壽春敗後，簡文問郗超：「萬自可敗，那得乃爾失士卒情？」超曰：「伊以率任之性，欲區別智勇。」", "사만(謝萬)이 수춘(壽春)에서 패한 뒤, 간문제(簡文帝)가 치초(郗超)에게 물었다. \"사만이 패할 만은 하나, 어찌하여 그토록 사졸의 마음을 잃었는가?\" 치초가 말하였다. \"그는 멋대로 하는 성품 때문에 지혜로운 자와 용맹한 자를 구별하려 한 것입니다.\"", ["비평", "권력"]], ["品藻", 50, "劉尹謂謝仁祖曰：「自吾有四友，門人加親。」謂許玄度曰：「自吾有由，惡言不及於耳。」二人皆受而不恨。", "유윤(劉尹)이 사인조(謝仁祖)에게 말하였다. \"내게 네 벗이 생긴 뒤로 문인들이 더욱 친애한다.\" 또 허현도(許玄度)에게 말하였다. \"내게 자로(由)가 있은 뒤로 험한 말이 귀에 들리지 않는다.\" 두 사람은 모두 그 말을 받아들이고 서운해하지 않았다.", ["우정", "비평"]], ["品藻", 51, "世目殷中軍：「思緯淹通，比羊叔子。」", "세상에서 은중군(殷浩)을 평하였다. \"사려가 깊고 두루 통하니, 양숙자(羊叔子)에 견줄 만하다.\"", ["비평"]], ["品藻", 52, "有人問謝安石、王坦之優劣於桓公。桓公停欲言，中悔曰：「卿喜傳人語，不能復語卿。」", "어떤 사람이 사안석(謝安)과 왕탄지(王坦之)의 우열을 환공(桓溫)에게 물었다. 환공이 말하려다 멈추고는 중간에 뉘우치며 말하였다. \"그대는 남의 말을 옮기기를 좋아하니, 다시는 그대에게 말하지 못하겠다.\"", ["비평", "거절"]], ["品藻", 53, "王中郎嘗問劉長沙曰：「我何如苟子？」劉答曰：「卿才乃當不勝苟子，然會名處多。」王笑曰：「癡！」", "왕중랑(王坦之)이 일찍이 유장사(劉長沙)에게 물었다. \"나는 구자(苟子)와 견주어 어떠한가?\" 유장사가 대답하였다. \"그대의 재주는 구자를 이기지 못할 것이나, 명망을 모으는 데는 나은 점이 많다.\" 왕중랑이 웃으며 말하였다. \"어리석은 자로다!\"", ["비평", "재능"]], ["品藻", 54, "支道林問孫興公：「君何如許掾？」孫曰：「高情遠致，弟子蚤已服膺；一吟一詠，許將北面。」", "지도림(支遁)이 손흥공(孫綽)에게 물었다. \"그대는 허연(許掾)과 견주어 어떠한가?\" 손흥공이 말하였다. \"높은 정취와 원대한 운치는 제가 일찍부터 마음으로 우러러 따랐고, 한 번 읊고 한 번 노래함에 있어서는 허연이 마땅히 저를 스승으로 모실 것입니다.\"", ["비평", "겸손"]], ["品藻", 55, "王右軍問許玄度：「卿自言何如安石？」許未答，王因曰：「安石故相為雄，阿萬當裂眼爭邪？」", "왕우군(王羲之)이 허현도(許玄度)에게 물었다. \"그대는 스스로 안석(謝安)과 견주어 어떠하다 여기는가?\" 허현도가 미처 대답하지 못하자, 왕우군이 이어 말하였다. \"안석은 본디 으뜸으로 군림하려 하니, 사만(阿萬)인들 눈을 부릅뜨고 다투겠는가?\"", ["비평", "오만"]], ["品藻", 56, "劉尹云：「人言江虨田舍，江乃自田宅屯。」", "유윤(劉尹)이 말하였다. \"사람들은 강반(江虨)을 시골뜨기라 하나, 강반은 오히려 스스로 밭과 집을 일구어 모으는 사람이다.\"", ["비평", "청빈"]], ["品藻", 57, "謝公云：「金谷中蘇紹最勝。」紹是石崇姊夫，蘇則孫，愉子也。", "사공(謝安)이 말하였다. \"금곡(金谷)의 무리 가운데 소소(蘇紹)가 가장 뛰어났다.\" 소소는 석숭(石崇)의 누이의 남편이며, 소칙(蘇則)의 손자이고 소유(蘇愉)의 아들이다.", ["비평"]], ["品藻", 58, "劉尹目庾中郎：「雖言不愔愔似道，突兀差可以擬道。」", "유윤(劉尹)이 유중랑(庾中郎)을 평하였다. \"비록 말은 조용하여 도(道)에 가까운 것 같지 않으나, 우뚝함이 그런대로 도에 견줄 만하다.\"", ["비평", "청담"]], ["品藻", 59, "孫承公云：「謝公清於無奕，潤於林道。」", "손승공(孫承公)이 말하였다. \"사공(謝安)은 무혁(無奕)보다 맑고, 임도(林道)보다 윤택하다.\"", ["비평"]], ["品藻", 60, "或問林公：「司州何如二謝？」林公曰：「故當攀安提萬。」", "누군가 임공(支遁)에게 물었다. \"사주(司州)는 두 사씨와 견주어 어떠합니까?\" 임공이 말하였다. \"진실로 안석(謝安)을 붙들고 사만(謝萬)을 이끌 만하다.\"", ["비평"]], ["品藻", 61, "孫興公、許玄度皆一時名流。或重許高情，則鄙孫穢行；或愛孫才藻，而無取於許。", "손흥공(孫綽)과 허현도(許玄度)는 모두 한 시대의 명사였다. 어떤 이는 허현도의 높은 정취를 중히 여겨 손흥공의 더러운 행실을 비루하다 여겼고, 어떤 이는 손흥공의 재주와 문장을 아끼되 허현도에게서는 취할 것이 없다 하였다.", ["비평", "재능"]], ["品藻", 62, "郗嘉賓道謝公：「造厀雖不深徹，而纏綿綸至。」又曰：「右軍詣嘉賓。」嘉賓聞之云：「不得稱詣，政得謂之朋耳！」謝公以嘉賓言為得。", "치가빈(郗嘉賓)이 사공(謝安)을 평하였다. \"이치에 다가감이 비록 깊이 투철하지는 않으나, 곡진하고 면면히 이른다.\" 또 말하였다. \"우군(王羲之)이 가빈에게 다가갔다(詣).\" 가빈이 이를 듣고 말하였다. \"다가갔다(詣) 할 수는 없고, 다만 벗(朋)이라 이를 수 있을 뿐이다.\" 사공은 가빈의 말이 옳다고 여겼다.", ["비평", "우정"]], ["品藻", 63, "庾道季云：「思理倫和，吾愧康伯；志力彊正，吾愧文度。自此以還，吾皆百之。」", "유도계(庾道季)가 말하였다. \"사려와 이치가 조화로운 점에서 나는 강백(康伯)에게 부끄럽고, 뜻과 힘이 굳세고 바른 점에서 나는 문도(文度)에게 부끄럽다. 이 밖의 일에서는 나는 모두 그들의 백 배가 된다.\"", ["비평", "겸손"]], ["品藻", 64, "王僧恩輕林公，藍田曰：「勿學汝兄，汝兄自不如伊。」", "왕승은(王僧恩)이 임공(支遁)을 가벼이 여기자, 남전(藍田)이 말하였다. \"네 형을 본받지 마라. 네 형이야말로 그만 못하다.\"", ["비평"]], ["品藻", 65, "簡文問孫興公：「袁羊何似？」答曰：「不知者不負其才；知之者無取其體。」", "간문제(簡文帝)가 손흥공(孫綽)에게 물었다. \"원양(袁羊)은 어떠한가?\" 대답하였다. \"그를 모르는 자는 그의 재주를 저버리지 않고, 그를 아는 자는 그의 됨됨이에서 취할 것이 없습니다.\"", ["비평"]], ["品藻", 66, "蔡叔子云：「韓康伯雖無骨榦，然亦膚立。」", "채숙자(蔡叔子)가 말하였다. \"한강백(韓康伯)은 비록 골격은 없으나, 그래도 살결로는 설 만하다.\"", ["비평"]], ["品藻", 67, "郗嘉賓問謝太傅曰：「林公談何如嵇公？」謝云：「嵇公勤著腳，裁可得去耳。」又問：「殷何如支？」謝曰：「正爾有超拔，支乃過殷。然亹亹論辯，恐口欲制支。」", "치가빈(郗嘉賓)이 사태부(謝安)에게 물었다. \"임공(支遁)의 담론은 혜공(嵇康)과 견주어 어떠합니까?\" 사안이 말하였다. \"혜공이 부지런히 발을 디뎌야 겨우 따라잡을 정도다.\" 또 물었다. \"은호(殷浩)는 지둔(支遁)과 견주어 어떠합니까?\" 사안이 말하였다. \"바로 빼어나게 솟구치는 점에서는 지둔이 은호를 능가한다. 그러나 면면히 변론하는 데서는 아마 말로는 지둔을 누를 것이다.\"", ["비평", "청담"]], ["品藻", 68, "庾道季云：「廉頗、藺相如雖千載上死人，懍懍恆如有生氣。曹蜍、李志雖見在，厭厭如九泉下人。人皆如此，便可結繩而治，但恐狐狸猯狢噉盡。」", "유도계(庾道季)가 말하였다. \"염파(廉頗)와 인상여(藺相如)는 비록 천 년 전에 죽은 사람이나, 늠름하여 늘 살아 있는 기운이 있는 듯하다. 조서(曹蜍)와 이지(李志)는 비록 지금 살아 있으나, 시들시들하여 황천 아래 사람 같다. 사람이 모두 이러하다면 곧 노끈을 묶어 다스릴 수 있겠으나, 다만 여우와 살쾡이, 너구리와 담비가 다 먹어치울까 두렵다.\"", ["비평", "죽음"]], ["品藻", 69, "衛君長是蕭祖周婦兄，謝公問孫僧奴：「君家道衛君長云何？」孫曰：「云是世業人。」謝曰：「殊不爾，衛自是理義人。」于時以比殷洪遠。", "위군장(衛君長)은 소조주(蕭祖周) 아내의 오빠인데, 사공(謝安)이 손승노(孫僧奴)에게 물었다. \"그대 집안에서는 위군장을 어떻게 말하는가?\" 손승노가 말하였다. \"대대로 가업을 잇는 사람이라 합니다.\" 사안이 말하였다. \"전혀 그렇지 않다. 위군장은 본디 이치와 의리에 밝은 사람이다.\" 당시 사람들은 그를 은홍원(殷洪遠)에 견주었다.", ["비평", "학문"]], ["品藻", 70, "王子敬問謝公：「林公何如庾公？」謝殊不受，答曰：「先輩初無論，庾公自足沒林公。」", "왕자경(王獻之)이 사공(謝安)에게 물었다. \"임공(支遁)은 유공(庾亮)과 견주어 어떠합니까?\" 사안이 전혀 받아들이지 않으며 대답하였다. \"선배들은 애초에 그런 논의를 하지 않았다. 유공이야말로 임공을 충분히 묻어버릴 만하다.\"", ["비평"]], ["品藻", 71, "謝遏諸人共道竹林優劣，謝公云：「先輩初不臧貶七賢。」", "사알(謝遏) 등 여러 사람이 함께 죽림(竹林)의 우열을 논하였는데, 사공(謝安)이 말하였다. \"선배들은 애초에 칠현(七賢)을 좋다 나쁘다 평하지 않았다.\"", ["비평"]], ["品藻", 72, "有人以王中郎比車騎，車騎聞之曰：「伊窟窟成就。」", "어떤 사람이 왕중랑(王坦之)을 거기장군(車騎將軍)에 견주자, 거기장군이 이를 듣고 말하였다. \"그는 애써 이룬 사람이다.\"", ["비평"]], ["品藻", 73, "謝太傅謂王孝伯：「劉尹亦奇自知，然不言勝長史。」", "사태부(謝安)가 왕효백(王孝伯)에게 말하였다. \"유윤(劉尹)도 자신을 잘 아니, 그러나 장사(王長史)를 이긴다고는 말하지 않았다.\"", ["비평"]], ["品藻", 74, "王黃門兄弟三人俱詣謝公，子猷、子重多說俗事，子敬寒溫而已。既出，坐客問謝公：「向三賢孰愈？」謝公曰：「小者最勝。」客曰：「何以知之？」謝公曰：「吉人之辭寡，躁人之辭多，推此知之。」", "왕황문(王徽之) 형제 세 사람이 함께 사공(謝安)을 찾아갔는데, 자유(子猷)와 자중(子重)은 속된 일을 많이 이야기하였고, 자경(子敬)은 안부 인사만 할 뿐이었다. 그들이 나간 뒤 자리에 있던 손님이 사공에게 물었다. \"방금 세 현인 가운데 누가 낫습니까?\" 사공이 말하였다. \"작은 이가 가장 낫다.\" 손님이 말하였다. \"어찌 그것을 아십니까?\" 사공이 말하였다. \"길한 사람은 말이 적고 조급한 사람은 말이 많으니, 이로 미루어 안 것이다.\"", ["비평", "지혜"]], ["品藻", 75, "謝公問王子敬：「君書何如君家尊？」答曰：「固當不同。」公曰：「外人論殊不爾。」王曰：「外人那得知？」", "사공(謝安)이 왕자경(王獻之)에게 물었다. \"그대의 글씨는 그대 부친과 견주어 어떠한가?\" 대답하였다. \"본디 같지 않습니다.\" 사공이 말하였다. \"세상 사람들의 평은 전혀 그렇지 않다.\" 왕자경이 말하였다. \"세상 사람들이 어찌 알겠습니까?\"", ["비평", "서화"]], ["品藻", 76, "王孝伯問謝太傅：「林公何如長史？」太傅曰：「長史韶興。」問：「何如劉尹？」謝曰：「噫！劉尹秀。」王曰：「若如公言，並不如此二人邪？」謝云：「身意正爾也。」", "왕효백(王孝伯)이 사태부(謝安)에게 물었다. \"임공(支遁)은 장사(王長史)와 견주어 어떠합니까?\" 태부가 말하였다. \"장사는 곱고 흥취가 있다.\" 물었다. \"유윤(劉尹)과는 어떠합니까?\" 사안이 말하였다. \"아! 유윤은 빼어나다.\" 왕효백이 말하였다. \"공의 말씀대로라면 임공은 이 두 사람만 못한 것입니까?\" 사안이 말하였다. \"내 뜻이 바로 그러하다.\"", ["비평"]], ["品藻", 77, "人有問太傅：「子敬可是先輩誰比？」謝曰：「阿敬近撮王、劉之標。」", "어떤 사람이 태부(謝安)에게 물었다. \"자경(子敬)은 선배 중 누구에 견줄 만합니까?\" 사안이 말하였다. \"자경(阿敬)은 왕몽(王濛)과 유담(劉惔)의 풍격을 가까이 모은 사람이다.\"", ["비평"]], ["品藻", 78, "謝公語孝伯：「君祖比劉尹，故為得逮。」孝伯云：「劉尹非不能逮，直不逮。」", "사공(謝安)이 효백(王孝伯)에게 말하였다. \"그대의 조부를 유윤(劉尹)에 견주면, 본디 미칠 수는 있다.\" 효백이 말하였다. \"유윤에게 미칠 수 없는 것이 아니라, 다만 미치지 못할 뿐입니다.\"", ["비평", "겸손"]], ["品藻", 79, "袁彥伯為吏部郎，子敬與郗嘉賓書曰：「彥伯已入，殊足頓興往之氣。故知捶撻自難為人，冀小卻，當復差耳。」", "원언백(袁彥伯)이 이부랑(吏部郎)이 되자, 자경(子敬)이 치가빈(郗嘉賓)에게 편지를 보내 말하였다. \"언백이 이미 들어왔으니, 자못 흥겨워 나서던 기운을 꺾기에 충분하다. 그러니 매질당하는 것이 절로 사람 노릇 하기 어려움을 알겠다. 조금 물러나기를 바라니, 그러면 다시 나아질 것이다.\"", ["비평", "권력"]], ["品藻", 80, "王子猷、子敬兄弟共賞高士傳人及贊。子敬賞井丹高潔，子猷云：「未若長卿慢世。」", "왕자유(王徽之)와 자경(子敬) 형제가 함께 『고사전(高士傳)』의 인물과 그 찬(贊)을 평하였다. 자경은 정단(井丹)의 고결함을 높이 평하였는데, 자유가 말하였다. \"장경(長卿)이 세상을 가벼이 여긴 것만은 못하다.\"", ["비평", "은둔"]], ["品藻", 81, "有人問袁侍中曰：「殷仲堪何如韓康伯？」答曰：「理義所得，優劣乃復未辨；然門庭蕭寂，居然有名士風流，殷不及韓。」故殷作誄云：「荊門晝掩，閑庭晏然。」", "어떤 사람이 원시중(袁侍中)에게 물었다. \"은중감(殷仲堪)은 한강백(韓康伯)과 견주어 어떠합니까?\" 대답하였다. \"이치와 의리에서 얻은 바는 우열을 아직 가릴 수 없으나, 문 앞 뜰의 그윽하고 고요함과 분명히 명사의 풍류가 있는 점에서는 은중감이 한강백에 미치지 못한다.\" 그래서 은중감이 지은 뇌문(誄)에 이르기를, \"형주의 문은 낮에도 닫혀 있고, 한가한 뜰은 편안하고 고요하다\"라고 하였다.", ["비평", "풍류"]], ["品藻", 82, "王子敬問謝公：「嘉賓何如道季？」答曰：「道季誠復鈔撮清悟，嘉賓故自上。」", "왕자경(王獻之)이 사공(謝安)에게 물었다. \"가빈(郗嘉賓)은 도계(庾道季)와 견주어 어떠합니까?\" 대답하였다. \"도계는 진실로 맑은 깨달음을 가려 모았으나, 가빈이 본디 더 위다.\"", ["비평"]], ["品藻", 83, "王珣疾，臨困，問王武岡曰：「世論以我家領軍比誰？」武岡曰：「世以比王北中郎。」東亭轉臥向壁，歎曰：「人固不可以無年！」", "왕순(王珣)이 병이 들어 임종에 이르렀을 때, 왕무강(王武岡)에게 물었다. \"세상의 평은 우리 집안의 영군(領軍)을 누구에 견주는가?\" 무강이 말하였다. \"세상에서는 왕북중랑(王北中郎)에 견줍니다.\" 동정(王珣)이 돌아누워 벽을 향하며 탄식하였다. \"사람은 진실로 수(壽)가 없어서는 안 되는구나!\"", ["비평", "죽음", "병과늙음"]], ["品藻", 84, "王孝伯道謝公：「濃至。」又曰：「長史虛，劉尹秀，謝公融。」", "왕효백(王孝伯)이 사공(謝安)을 평하였다. \"농후함이 지극하다.\" 또 말하였다. \"장사(王長史)는 비어 있고, 유윤(劉尹)은 빼어나며, 사공은 원융하다.\"", ["비평"]], ["品藻", 85, "王孝伯問謝公：「林公何如右軍？」謝曰：「右軍勝林公，林公在司州前亦貴徹。」", "왕효백(王孝伯)이 사공(謝安)에게 물었다. \"임공(支遁)은 우군(王羲之)과 견주어 어떠합니까?\" 사안이 말하였다. \"우군이 임공보다 낫다. 임공도 사주(司州) 앞에서는 역시 귀하고 투철하였다.\"", ["비평"]], ["品藻", 86, "桓玄為太傅，大會，朝臣畢集。坐裁竟，問王楨之曰：「我何如卿第七叔？」于時賓客為之咽氣。王徐徐答曰：「亡叔是一時之標，公是千載之英。」一坐懽然。", "환현(桓玄)이 태부(太傅)가 되어 큰 모임을 열자 조정 신하들이 다 모였다. 자리에 막 앉자마자 왕정지(王楨之)에게 물었다. \"나는 그대의 일곱째 숙부와 견주어 어떠한가?\" 그때 빈객들이 이 때문에 숨을 죽였다. 왕정지가 천천히 대답하였다. \"돌아가신 숙부는 한 시대의 표상이요, 공은 천 년의 영걸이십니다.\" 온 좌중이 기뻐하였다.", ["비평", "기지", "권력"]], ["品藻", 87, "桓玄問劉太常曰：「我何如謝太傅？」劉答曰：「公高，太傅深。」又曰：「何如賢舅子敬？」答曰：「樝、梨、橘、柚，各有其美。」", "환현(桓玄)이 유태상(劉太常)에게 물었다. \"나는 사태부(謝安)와 견주어 어떠한가?\" 유태상이 대답하였다. \"공은 높고, 태부는 깊습니다.\" 또 물었다. \"그대의 외숙 자경(子敬)과는 어떠한가?\" 대답하였다. \"풀명자, 배, 귤, 유자가 각기 그 아름다움이 있습니다.\"", ["비평", "권력"]], ["品藻", 88, "舊以桓謙比殷仲文。桓玄時，仲文入，桓於庭中望見之，謂同坐曰：「我家中軍，那得及此也！」", "예전에는 환겸(桓謙)을 은중문(殷仲文)에 견주었다. 환현(桓玄) 때에 중문이 들어오자, 환현이 뜰 가운데서 그를 바라보고 함께 앉은 이에게 말하였다. \"우리 집안의 중군(中軍)이 어찌 이에 미치겠는가!\"", ["비평"]], ["規箴", 1, "漢武帝乳母嘗於外犯事，帝欲申憲，乳母求救東方朔。朔曰：「此非脣舌所爭，爾必望濟者，將去時但當屢顧帝，慎勿言！此或可萬一冀耳。」乳母既至，朔亦侍側，因謂曰：「汝癡耳！帝豈復憶汝乳哺時恩邪？」帝雖才雄心忍，亦深有情戀，乃悽然愍之，即敕免罪。", "한무제(漢武帝)의 유모가 일찍이 바깥에서 죄를 지어, 무제가 법을 적용하려 하였다. 유모가 동방삭(東方朔)에게 도움을 청하니, 동방삭이 말하였다. \"이는 입과 혀로 다툴 일이 아니다. 그대가 반드시 구제되기를 바란다면, 떠나갈 때 다만 자주 황제를 돌아보되 부디 말은 하지 마시오. 이렇게 하면 만에 하나 바랄 수 있을 것이오.\" 유모가 이르렀을 때 동방삭도 곁에서 모시고 있다가, 이에 말하였다. \"너는 어리석구나! 황제께서 어찌 다시 너의 젖 먹이던 때의 은혜를 기억하시겠느냐?\" 무제가 비록 재주가 뛰어나고 마음이 모질었으나, 역시 깊은 정과 그리움이 있어 처연히 그를 가엾이 여기고는 곧 명을 내려 죄를 면해주었다.", ["기지", "술수", "권력"]], ["規箴", 2, "京房與漢元帝共論，因問帝：「幽、厲之君何以亡？所任何人？」答曰：「其任人不忠。」房曰：「知不忠而任之，何邪？」曰：「亡國之君，各賢其臣，豈知不忠而任之？」房稽首曰：「將恐今之視古，亦猶後之視今也。」", "경방(京房)이 한원제(漢元帝)와 함께 논하다가, 이어 황제에게 물었다. \"유왕(幽王)과 여왕(厲王)은 어찌하여 망하였으며, 어떤 사람을 등용하였습니까?\" 대답하였다. \"그들은 충성스럽지 못한 사람을 등용하였다.\" 경방이 말하였다. \"충성스럽지 못함을 알면서도 등용한 것은 어찌된 일입니까?\" 대답하였다. \"나라를 망친 임금은 각기 그 신하를 어질다 여겼으니, 어찌 충성스럽지 못함을 알면서 등용하였겠는가?\" 경방이 머리를 조아리며 말하였다. \"아마도 지금 사람이 옛일을 보는 것이, 또한 후세 사람이 지금을 보는 것과 같을까 두렵습니다.\"", ["간언", "권력", "지혜"]], ["規箴", 3, "陳元方遭父喪，哭泣哀慟，軀體骨立。其母愍之，竊以錦被蒙上。郭林宗弔而見之，謂曰：「卿海內之儁才，四方是則，如何當喪，錦被蒙上？孔子曰：『衣夫錦也，食夫稻也，於汝安乎？』吾不取也！」奮衣而去。自後賓客絕百所日。", "진원방(陳元方)이 부친상을 당하여 통곡하며 슬퍼한 나머지 몸이 야위어 뼈만 앙상하게 드러났다. 그 어머니가 가엾이 여겨 몰래 비단 이불을 덮어 주었다. 곽림종(郭泰)이 조문하러 왔다가 이를 보고 말하였다. \"그대는 천하의 빼어난 인재로 사방이 본받는 바이거늘, 어찌하여 상을 당하고도 비단 이불을 덮고 있는가? 공자께서 말씀하시기를 '저 비단옷을 입고 저 쌀밥을 먹는 것이 너에게 편안하냐'고 하셨으니, 나는 이를 취하지 않노라!\" 그러고는 옷을 떨치고 가버렸다. 그 뒤로 빈객이 백여 일 동안 끊어졌다.", ["효", "죽음", "간언"]], ["規箴", 4, "孫休好射雉，至其時則晨去夕反。羣臣莫不止諫：「此為小物，何足甚躭？」休曰：「雖為小物，耿介過人，朕所以好之。」", "손휴(孫休)가 꿩 사냥을 좋아하여, 그 철이 되면 새벽에 나갔다가 저녁에 돌아왔다. 신하들이 모두 만류하여 간하지 않는 이가 없었다. \"이는 작은 것이거늘 어찌 그토록 빠지실 만하옵니까?\" 손휴가 말하였다. \"비록 작은 것이나 그 곧고 굳셈이 남보다 뛰어나니, 짐이 이를 좋아하는 까닭이다.\"", ["충직", "간언", "권력"]], ["規箴", 5, "孫皓問丞相陸凱曰：「卿一宗在朝有幾人？」陸曰：「二相、五侯、將軍十餘人。」皓曰：「盛哉！」陸曰：「君賢臣忠，國之盛也。父慈子孝，家之盛也。今政荒民弊，覆亡是懼，臣何敢言盛！」", "손호(孫皓)가 승상 육개(陸凱)에게 물었다. \"경의 한 집안에서 조정에 든 자가 몇이나 되오?\" 육개가 답하였다. \"두 명의 재상, 다섯 명의 후(侯), 장군이 십여 명입니다.\" 손호가 말하였다. \"성대하구려!\" 육개가 말하였다. \"임금이 어질고 신하가 충성하는 것이 나라의 성대함입니다. 아비가 자애롭고 자식이 효도하는 것이 집안의 성대함입니다. 지금 정치는 황폐하고 백성은 피폐하여 멸망을 두려워하는 터인데, 신이 어찌 감히 성대하다 말하겠습니까!\"", ["충직", "간언", "겸손"]], ["規箴", 6, "何晏、鄧颺令管輅作卦，云：「不知位至三公不？」卦成，輅稱引古義，深以戒之。颺曰：「此老生之常談。」\n晏曰：「知幾其神乎！古人以為難。交疎吐誠，今人以為難。今君一面盡二難之道，可謂『明德惟馨』。詩不云乎：『中心藏之，何日忘之！』」", "하안(何晏)과 등양(鄧颺)이 관로(管輅)에게 점괘를 뽑게 하며 말하였다. \"우리가 삼공(三公)의 자리에 오를지 모르겠으니 보아 주시오.\" 점괘가 이루어지자 관로는 옛 뜻을 끌어다 깊이 경계하였다. 등양이 말하였다. \"이는 늙은 서생의 흔한 이야기로다.\" 하안이 말하였다. \"기미를 아는 것이 신묘함이런가! 옛사람도 어렵게 여겼소. 사귐이 성근데도 진심을 토로하는 것을 지금 사람들은 어렵게 여기오. 지금 그대는 한 번 만남에 이 두 가지 어려운 도를 다하였으니, 가히 '밝은 덕은 오직 향기롭다'고 할 만하오. 『시경(詩經)』에 이르지 않았소? '마음속에 간직하니, 어느 날인들 잊으리오!'\"", ["예언", "간언", "우정"]], ["規箴", 7, "晉武帝既不悟太子之愚，必有傳後意。諸名臣亦多獻直言。帝嘗在陵雲臺上坐，衛瓘在側，欲申其懷，因如醉跪帝前，以手撫牀曰：「此坐可惜。」帝雖悟，因笑曰：「公醉邪？」", "진(晉) 무제(司馬炎)는 태자의 어리석음을 깨닫지 못하였으니, 반드시 뒤를 잇게 하려는 뜻이 있었다. 여러 명신들도 직언을 많이 올렸다. 무제가 일찍이 능운대(陵雲臺) 위에 앉아 있고 위관(衛瓘)이 곁에 있었는데, 그 마음을 펴고자 취한 척하며 무제 앞에 무릎 꿇고 손으로 자리를 어루만지며 말하였다. \"이 자리가 아깝습니다.\" 무제는 비록 그 뜻을 알았으나 웃으며 말하였다. \"공이 취하였소?\"", ["간언", "권력", "술수"]], ["規箴", 8, "王夷甫婦郭泰寧女，才拙而性剛，聚斂無厭，干豫人事。夷甫患之而不能禁。時其鄉人幽州刺史李陽，京都大俠，猶漢之樓護，郭氏憚之。夷甫驟諫之，乃曰：「非但我言卿不可，李陽亦謂卿不可。」郭氏小為之損。", "왕이보(王衍)의 아내는 곽태녕(郭泰寧)의 딸로, 재주는 졸렬하고 성품은 굳세며, 재물을 모으는 데 만족할 줄 모르고 남의 일에 간섭하였다. 왕이보가 이를 근심하였으나 막을 수 없었다. 당시 그 고향 사람으로 유주자사(幽州刺史) 이양(李陽)은 경성의 큰 협객이라, 한나라의 누호(樓護)와 같은 인물이어서 곽씨가 그를 두려워하였다. 왕이보가 거듭 간하여 마침내 말하였다. \"나만 그대더러 옳지 않다고 하는 것이 아니라, 이양도 그대더러 옳지 않다고 하오.\" 그제야 곽씨가 다소 줄였다.", ["여인", "인색", "간언"]], ["規箴", 9, "王夷甫雅尚玄遠，常嫉其婦貪濁，口未嘗言「錢」字。婦欲試之，令婢以錢遶牀，不得行。夷甫晨起，見錢閡行，呼婢曰：「舉卻阿堵物。」", "왕이보(王衍)는 평소 현원(玄遠)을 숭상하여, 늘 그 아내의 탐욕스럽고 더러움을 싫어하여 입으로 '돈(錢)'이라는 글자를 말한 적이 없었다. 아내가 그를 시험하고자 계집종을 시켜 돈으로 침상을 둘러싸게 하여 다니지 못하게 하였다. 왕이보가 아침에 일어나 돈에 가로막혀 다닐 수 없자 계집종을 불러 말하였다. \"이 물건을 치워라.\"", ["청빈", "여인", "인색"]], ["規箴", 10, "王平子年十四、五，見王夷甫妻郭氏貪欲，令婢路上儋糞。平子諫之，並言不可。郭大怒，謂平子曰：「昔夫人臨終，以小郎囑新婦，不以新婦囑小郎！」急捉衣裾，將與杖。平子饒力，爭得脫，踰窗而走。", "왕평자(王澄)가 열네다섯 살 때 왕이보(王衍)의 아내 곽씨가 탐욕스러운 것을 보았는데, 계집종을 시켜 길에서 거름을 지게 하였다. 평자가 이를 간하며 아울러 옳지 않다고 말하였다. 곽씨가 크게 노하여 평자에게 말하였다. \"지난날 시어머니께서 임종하실 때 작은 도련님을 새 며느리에게 부탁하셨지, 새 며느리를 작은 도련님에게 부탁하지는 않으셨다!\" 그러고는 다급히 옷자락을 붙잡고 매를 치려 하였다. 평자는 힘이 세어 다투어 벗어나 창문을 넘어 달아났다.", ["간언", "여인", "분노"]], ["規箴", 11, "元帝過江猶好酒，王茂弘與帝有舊，常流涕諫。帝許之，命酌酒，一酣，從是遂斷。", "원제(元帝)가 강을 건넌 뒤에도 여전히 술을 좋아하니, 왕무홍(王導)이 황제와 옛 정이 있어 늘 눈물을 흘리며 간하였다. 황제가 이를 허락하여 술을 따르게 하더니, 한 번 흠뻑 마신 뒤로 마침내 끊었다.", ["간언", "술과취흥", "충직"]], ["規箴", 12, "謝鯤為豫章太守，從大將軍下至石頭。敦謂鯤曰：「余不得復為盛德之事矣。」鯤曰：「何為其然？但使自今已後，日亡日去耳！」敦又稱疾不朝，鯤諭敦曰：「近者，明公之舉，雖欲大存社稷，然四海之內，實懷未達。若能朝天子，使羣臣釋然，萬物之心，於是乃服。仗民望以從眾懷，盡沖退以奉主上，如斯，則勳侔一匡，名垂千載。」時人以為名言。", "사곤(謝鯤)이 예장태수(豫章太守)가 되어 대장군(왕돈)을 따라 석두(石頭)에 이르렀다. 왕돈(王敦)이 사곤에게 말하였다. \"나는 다시는 성대한 덕의 일을 할 수 없게 되었소.\" 사곤이 말하였다. \"어찌 그러하겠습니까? 다만 지금부터 날로 잘못을 없애고 날로 떨쳐버리시기만 하면 됩니다!\" 왕돈이 또 병을 핑계로 조정에 나아가지 않으니, 사곤이 왕돈을 깨우쳐 말하였다. \"근래에 명공(明公)의 거사는 비록 사직을 크게 보존하려는 것이었으나, 천하 안에서는 실로 그 뜻을 깨닫지 못한 마음을 품고 있습니다. 만약 천자께 조회하여 신하들을 안심케 하신다면 만물의 마음이 이에 비로소 복종할 것입니다. 백성의 기대에 기대어 뭇사람의 마음을 따르고, 겸허히 물러남을 다하여 주상을 받드신다면, 이와 같이 하면 공로는 한 번 바로잡음에 견줄 만하고 이름은 천 년에 드리울 것입니다.\" 당시 사람들이 이를 명언으로 여겼다.", ["간언", "충직", "권력"]], ["規箴", 13, "元皇帝時，廷尉張闓在小市居，私作都門，早閉晚開。羣小患之，詣州府訴，不得理，遂至檛登聞鼓，猶不被判。聞賀司空出，至破岡，連名詣賀訴。賀曰：「身被徵作禮官，不關此事。」羣小叩頭曰：「若府君復不見治，便無所訴。」賀未語，令且去，見張廷尉當為及之。張聞，即毀門，自至方山迎賀。賀出見辭之曰：「此不必見關，但與君門情，相為惜之。」張愧謝曰：「小人有如此，始不即知，蚤已毀壞。」", "원황제(元帝) 때 정위(廷尉) 장개(張闓)가 소시(小市)에 살면서 사사로이 큰 문을 만들어 일찍 닫고 늦게 열었다. 뭇 백성들이 이를 괴로워하여 주부(州府)에 나아가 호소하였으나 처리되지 않았고, 마침내 등문고(登聞鼓)를 치기에 이르렀으나 그래도 판결이 내려지지 않았다. 사공(司空) 하순(賀循)이 나온다는 말을 듣고 파강(破岡)에 이르자 이름을 잇대어 적어 하순에게 나아가 호소하였다. 하순이 말하였다. \"나는 부름을 받아 예관(禮官)이 되었으니 이 일과는 관계가 없소.\" 뭇 백성들이 머리를 조아리며 말하였다. \"만약 부군(府君)께서도 다스려 주지 않으시면 곧 호소할 데가 없습니다.\" 하순이 말하지 않고 우선 물러가게 하며, 장정위를 만나 마땅히 그 일을 언급하겠다고 하였다. 장개가 이를 듣고 즉시 문을 헐고 몸소 방산(方山)에 이르러 하순을 맞이하였다. 하순이 나와 그를 만나 사양하며 말하였다. \"이 일은 반드시 내가 관여할 바는 아니나, 다만 그대와의 가문의 정으로 그대를 위해 아껴서 그러는 것이오.\" 장개가 부끄러워 사죄하며 말하였다. \"소인이 이런 일이 있었으나 처음에 곧 알지 못하였으니, 이미 헐어 없앴습니다.\"", ["간언", "권력", "우정"]], ["規箴", 14, "郗太尉晚節好談，既雅非所經，而甚矜之。後朝覲，以王丞相末年多可恨，每見，必欲苦相規誡。王公知其意，每引作它言。臨還鎮，故命駕詣丞相。丞相翹須厲色，上坐便言：「方當乖別，必欲言其所見。」意滿口重，辭殊不流。王公攝其次曰：「後面未期，亦欲盡所懷，願公勿復談。」郗遂大瞋，冰衿而出，不得一言。", "치태위(郗鑒)가 만년에 담론을 좋아하였는데, 본디 그가 익힌 바가 아니었으나 매우 으스댔다. 뒷날 조정에 알현하면서, 왕승상(王導)이 말년에 못마땅한 점이 많다 하여, 만날 때마다 반드시 애써 규계(規誡)하고자 하였다. 왕공(王導)은 그 뜻을 알고 만날 때마다 다른 말로 끌어 돌렸다. 진(鎭)으로 돌아갈 무렵 일부러 수레를 명하여 승상에게 나아갔다. 승상은 수염을 곧추세우고 낯빛을 엄히 하였다. 윗자리에 앉자마자 곧 말하였다. \"이제 막 헤어지게 되었으니 반드시 그 본 바를 말하고자 하오.\" 뜻은 가득하고 말은 무거워 말이 도무지 매끄럽게 나오지 않았다. 왕공이 그 말 차례를 가로채어 말하였다. \"훗날 다시 만날 기약이 없으니 나 또한 품은 바를 다하고자 하오. 바라건대 공은 다시 담론하지 마시오.\" 치감은 마침내 크게 성내어, 얼어붙은 옷깃처럼 굳은 얼굴로 나가버려 한마디도 하지 못하였다.", ["간언", "청담", "분노"]], ["規箴", 15, "王丞相為揚州，遣八部從事之職。顧和時為下傳還，同時俱見。諸從事各奏二千石官長得失，至和獨無言。王問顧曰：「卿何所聞？」答曰：「明公作輔，寧使網漏吞舟，何緣采聽風聞，以為察察之政？」丞相咨嗟稱佳，諸從事自視缺然也。", "왕승상(王導)이 양주(揚州)를 맡았을 때 여덟 부(部)의 종사(從事)를 직임으로 파견하였다. 고화(顧和)가 이때 하전(下傳)이 되어 돌아와 함께 모두 알현하였다. 여러 종사들이 각기 이천석(二千石) 관장(官長)의 잘잘못을 아뢰는데, 고화에 이르러서는 홀로 아무 말이 없었다. 왕도가 고화에게 물었다. \"그대는 들은 바가 무엇이오?\" 답하였다. \"명공께서 재상을 맡으셨으니, 차라리 배를 삼킬 만한 큰 고기가 빠져나가게 그물을 성기게 두실지언정, 어찌 풍문을 주워듣고서 까다로운 정치로 삼겠습니까?\" 승상이 감탄하며 훌륭하다 칭찬하니, 여러 종사들이 스스로 부족하다 여겼다.", ["간언", "도량", "권력"]], ["規箴", 16, "蘇峻東征沈充，請吏部郎陸邁與俱。將至吳，密勑左右，令入閶門放火以示威。陸知其意，謂峻曰：「吳治平未久，必將有亂。若為亂階，請從我家始。」峻遂止。", "소준(蘇峻)이 동쪽으로 심충(沈充)을 정벌할 때 이부랑(吏部郎) 육매(陸邁)에게 청하여 함께 갔다. 오(吳)에 이르려 할 무렵 은밀히 좌우에게 명하여 창문(閶門)으로 들어가 불을 놓아 위엄을 보이게 하였다. 육매가 그 뜻을 알고 소준에게 말하였다. \"오 땅은 다스려져 평안해진 지 오래되지 않았으니 반드시 난리가 날 것입니다. 만약 난리의 단초로 삼으시려거든 청컨대 제 집에서부터 시작하소서.\" 소준이 마침내 그만두었다.", ["간언", "용기", "충직"]], ["規箴", 17, "陸玩拜司空，有人詣之，索美酒，得，便自起，瀉箸梁柱間地，祝曰：「當今乏才，以爾為柱石之用，莫傾人棟梁。」玩笑曰：「戢卿良箴。」", "육완(陸玩)이 사공(司空)에 임명되었을 때, 어떤 이가 그를 찾아와 좋은 술을 청하여 얻자, 곧 스스로 일어나 들보와 기둥 사이의 땅에 부으며 빌어 말하였다. \"지금 인재가 부족하여 그대를 기둥과 주춧돌의 쓰임으로 삼았으니, 사람의 마룻대와 들보를 기울게 하지 마소서.\" 육완이 웃으며 말하였다. \"그대의 좋은 경계의 말을 새겨 두겠소.\"", ["간언", "겸손", "기지"]], ["規箴", 18, "小庾在荊州，公朝大會，問諸僚佐曰：「我欲為漢高、魏武何如？」一坐莫答，長史江虨曰：「願明公為桓、文之事，不願作漢高、魏武也。」", "소유(小庾, 庾翼)가 형주(荊州)에 있을 때 공조(公朝)의 큰 모임에서 여러 막료들에게 물었다. \"내가 한나라 고조나 위나라 무제처럼 되고자 하는데 어떠한가?\" 자리에 있던 이들이 아무도 답하지 못하였는데, 장사(長史) 강분(江虨)이 말하였다. \"바라건대 명공께서는 제 환공이나 진 문공의 일을 하시고, 한 고조나 위 무제처럼 되시기를 바라지 않습니다.\"", ["간언", "권력", "충직"]], ["規箴", 19, "羅君章為桓宣武從事，謝鎮西作江夏，往檢校之。羅既至，初不問郡事；徑就謝數日，飲酒而還。桓公問有何事？君章云：「不審公謂謝尚何似人？」桓公曰：「仁祖是勝我許人。」君章云：「豈有勝公人而行非者，故一無所問。」桓公奇其意而不責也。", "나군장(羅君章)이 환선무(桓溫)의 종사(從事)가 되었을 때, 사진서(謝尚)가 강하(江夏)를 다스리고 있어 가서 검열하게 되었다. 나군장이 이르러서는 처음부터 군(郡)의 일은 묻지 않고, 곧장 사상에게 가서 며칠 동안 술만 마시고 돌아왔다. 환공이 무슨 일이 있더냐고 물으니, 나군장이 말하였다. \"공께서는 사상을 어떤 사람으로 여기시는지 모르겠습니다.\" 환공이 말하였다. \"인조(謝尚)는 나보다 나은 정도의 사람이오.\" 나군장이 말하였다. \"공보다 나은 사람이 그릇된 일을 행할 리가 있겠습니까. 그래서 하나도 묻지 않았습니다.\" 환공이 그 뜻을 기특히 여겨 책망하지 않았다.", ["비평", "지혜", "우정"]], ["規箴", 20, "王右軍與王敬仁、許玄度並善。二人亡後，右軍為論議更克。孔巖誡之曰：「明府昔與王、許周旋有情，及逝沒之後，無慎終之好，民所不取。」右軍甚愧。", "왕우군(王羲之)은 왕경인(王脩), 허현도(許詢)와 모두 사이가 좋았다. 두 사람이 죽은 뒤 우군이 논의를 더욱 각박하게 하였다. 공암(孔巖)이 그를 경계하여 말하였다. \"명부(明府)께서는 지난날 왕씨, 허씨와 교유하며 정이 있으셨는데, 그들이 죽고 난 뒤에 끝까지 삼가는 우의가 없으니, 제가 취하지 않는 바입니다.\" 우군이 매우 부끄러워하였다.", ["절교", "간언", "비평"]], ["規箴", 21, "謝中郎在壽春敗，臨奔走，猶求玉帖鐙。太傅在軍，前後初無損益之言。爾日猶云：「當今豈須煩此？」", "사중랑(謝萬)이 수춘(壽春)에서 패하여 달아날 즈음에도 여전히 옥으로 장식한 등자를 구하였다. 태부(謝安)가 군중에 있었는데, 앞뒤로 처음부터 보태거나 덜어내는 말이 없었다. 그날도 다만 이렇게 말하였다. \"지금 어찌 이런 것에 번거로워야 하겠는가?\"", ["도량", "비평", "오만"]], ["規箴", 22, "王大語東亭：「卿乃復論成不惡，那得與僧彌戲！」", "왕대(王忱)가 동정(왕순)에게 말하였다. \"그대가 도리어 논의함이 나쁘지 않으니, 어찌 승미(僧彌)와 더불어 겨룰 수 있겠는가!\"", ["비평", "청담"]], ["規箴", 23, "殷覬病困，看人政見半面。殷荊州興晉陽之甲，往與覬別，涕零，屬以消息所患。覬答曰：「我病自當差，正憂汝患耳！」", "은의(殷覬)가 병이 위중하여 사람을 보면 겨우 얼굴 반쪽만 알아볼 정도였다. 은형주(殷仲堪)가 진양(晉陽)의 군사를 일으키며 가서 은의와 작별하면서 눈물을 흘리고, 앓고 있는 병의 소식을 당부하였다. 은의가 답하였다. \"내 병은 저절로 나을 것이니, 다만 그대가 앓는 것이 걱정될 뿐이오!\"", ["병과늙음", "우정", "죽음"]], ["規箴", 24, "遠公在廬山中，雖老，講論不輟。弟子中或有墮者，遠公曰：「桑榆之光，理無遠照；但願朝陽之暉，與時並明耳。」執經登坐，諷誦朗暢，詞色甚苦。高足之徒，皆肅然增敬。", "원공(遠公, 慧遠)이 여산(廬山) 가운데 있을 때, 비록 늙었으나 강론을 그치지 않았다. 제자 가운데 더러 게으른 자가 있으니 원공이 말하였다. \"뽕나무 느릅나무 사이로 비치는 저녁빛은 이치상 멀리 비출 수 없다. 다만 바라건대 아침 해의 빛이 때와 더불어 함께 밝아지기를 바랄 뿐이다.\" 경전을 들고 자리에 올라 외고 읽는 것이 낭랑하고 막힘이 없으며, 말과 낯빛이 매우 간절하였다. 뛰어난 제자들이 모두 숙연히 공경을 더하였다.", ["학문", "병과늙음", "간언"]], ["規箴", 25, "桓南郡好獵，每田狩，車騎甚盛。五六十里中，旌旗蔽隰。騁良馬，馳擊若飛，雙甄所指，不避陵壑。或行陳不整，麏兔騰逸，參佐無不被繫束。桓道恭，玄之族也，時為賊曹參軍，頗敢直言。常自帶絳綿繩箸腰中，玄問「此何為？」答曰：「公獵，好縛人士，會當被縛，手不能堪芒也。」玄自此小差。", "환남군(桓玄)이 사냥을 좋아하여, 사냥할 때마다 거기(車騎)가 매우 성대하였다. 오륙십 리 안에 깃발이 진펄을 뒤덮었다. 좋은 말을 달려 나는 듯이 내달리며 치니, 양 날개가 가리키는 곳은 언덕이나 골짜기를 피하지 않았다. 혹 행렬이 가지런하지 않거나 노루와 토끼가 뛰어 달아나면 막료 가운데 묶이지 않는 이가 없었다. 환도공(桓道恭)은 환현(桓玄)의 일족으로, 당시 적조참군(賊曹參軍)이 되었는데, 자못 감히 직언하였다. 늘 진홍빛 솜 노끈을 띠처럼 허리에 차고 있으니, 환현이 \"이것은 무엇에 쓰는 것인가?\" 하고 물었다. 답하였다. \"공께서 사냥하실 때 인사(人士)를 묶기를 좋아하시니, 저도 마땅히 묶이게 될 터인데 손이 까끄라기를 견디지 못하기 때문입니다.\" 환현이 이로부터 다소 줄였다.", ["간언", "권력", "기지"]], ["規箴", 26, "王緒、王國寶相為脣齒，並上下權要。王大不平其如此，乃謂緒曰：「汝為此歘歘，曾不慮獄吏之為貴乎？」", "왕서(王緒)와 왕국보(王國寶)가 서로 입술과 이처럼 의지하여 함께 권력의 요직을 위아래로 차지하였다. 왕대(王忱)가 그러한 것을 못마땅히 여겨 왕서에게 말하였다. \"네가 이렇게 서둘러 날뛰면서, 옥리(獄吏)가 귀하게 되는 것은 일찍이 염려하지 않느냐?\"", ["권력", "간언", "예언"]], ["規箴", 27, "桓玄欲以謝太傅宅為營，謝混曰：「召伯之仁，猶惠及甘棠；文靖之德，更不保五畝之宅。」玄慙而止。", "환현(桓玄)이 사태부(謝安)의 집을 군영으로 삼고자 하니, 사혼(謝混)이 말하였다. \"소백(召伯)의 어짊은 그래도 은혜가 감당나무에까지 미쳤거늘, 문정공(謝安)의 덕은 도리어 다섯 묘의 집조차 보전하지 못한단 말입니까.\" 환현이 부끄러워 그만두었다.", ["간언", "권력", "충직"]], ["捷悟", 1, "楊德祖為魏武主簿，時作相國門，始搆榱桷，魏武自出看，使人題門，作「活」字，便去。楊見，即令壞之。既竟，曰：「門中『活』，『闊』字。王正嫌門大也。」", "양덕조(楊脩)가 위 무제(曹操)의 주부(主簿)였을 때, 마침 상국(相國)의 문을 짓느라 비로소 서까래를 얽는데, 위 무제가 몸소 나와 보고는 사람을 시켜 문에 '활(活)' 자를 쓰게 하고는 곧 가버렸다. 양수가 보고 즉시 그것을 헐게 하였다. 다 헐고 나서 말하였다. \"문(門) 가운데 '활(活)'은 '활(闊)' 자이니, 왕께서는 바로 문이 큰 것을 싫어하신 것이다.\"", ["기지", "지혜"]], ["捷悟", 2, "人餉魏武一桮酪，魏武噉少許，蓋頭上題「合」字以示眾。眾莫能解。次至楊脩，脩便噉，曰：「公教人噉一口也，復何疑？」", "어떤 사람이 위 무제(曹操)에게 한 잔의 유락(酪)을 바치니, 위 무제가 조금 맛보고는 뚜껑 위에 '합(合)' 자를 써서 여러 사람에게 보였다. 사람들이 아무도 풀지 못하였다. 차례가 양수(楊脩)에게 이르자 양수가 곧 먹으며 말하였다. \"공께서 사람마다 한 입씩(一口) 먹으라 하셨으니, 다시 무엇을 의심하리오?\"", ["기지", "지혜"]], ["捷悟", 3, "魏武嘗過曹娥碑下，楊脩從，碑背上見題作「黃絹幼婦，外孫臼」八字。魏武謂脩曰：「解不？」答曰：「解。」魏武曰：「卿未可言，待我思之。」行三十里，魏武乃曰：「吾已得。」令脩別記所知。脩曰：「黃絹，色絲也，於字為絕。幼婦，少女也，於字為妙。外孫，女子也，於字為好。臼，受辛也，於字為辭。所謂『絕妙好辭』也。」魏武亦記之，與脩同，乃歎曰：「我才不及卿，乃覺三十里。」", "위 무제(曹操)가 일찍이 조아비(曹娥碑) 아래를 지나는데 양수(楊脩)가 따랐다. 비석 뒷면에 '황견유부(黃絹幼婦), 외손제구(外孫臼)' 여덟 글자가 쓰여 있는 것을 보았다. 위 무제가 양수에게 말하였다. \"풀겠는가?\" 답하였다. \"풀었습니다.\" 위 무제가 말하였다. \"그대는 아직 말하지 말라. 내가 생각할 동안 기다리라.\" 삼십 리를 가서야 위 무제가 말하였다. \"내가 이미 알아냈다.\" 양수에게 아는 바를 따로 적게 하였다. 양수가 적었다. \"황견(黃絹)은 빛깔 있는 실(色絲)이니 글자로는 '절(絶)'이 됩니다. 유부(幼婦)는 어린 여자(少女)이니 글자로는 '묘(妙)'가 됩니다. 외손(外孫)은 딸의 자식(女子)이니 글자로는 '호(好)'가 됩니다. 구(臼)는 매운 것을 받는 것(受辛)이니 글자로는 '사(辭)'가 됩니다. 이른바 '절묘호사(絶妙好辭)'입니다.\" 위 무제도 적은 것이 양수와 같으니, 이에 탄식하며 말하였다. \"내 재주가 그대에게 미치지 못하니, 삼십 리나 가서야 깨달았구려.\"", ["기지", "지혜", "비평"]], ["捷悟", 4, "魏武征袁本初，治裝，餘有數十斛竹片，咸長數寸，眾云並不堪用，正令燒除。太祖思所以用之，謂可為竹椑楯，而未顯其言。馳使問主簿楊德祖。應聲答之，與帝心同。眾伏其辯悟。", "위무제(魏武帝)가 원본초(袁本初)를 정벌하러 행장을 꾸리는데, 대나무 조각 수십 곡이 남았으니 모두 길이가 몇 치였다. 사람들이 다 쓸모가 없다 하여 그저 태워 없애려 했다. 태조(太祖)는 그것을 쓸 방법을 생각하여 대나무 방패(竹椑楯)를 만들 만하다고 여겼으나 그 말을 드러내지 않았다. 사람을 급히 보내 주부(主簿) 양덕조(楊德祖)에게 물으니, 그가 즉시 대답한 것이 황제의 생각과 같았다. 사람들이 그의 분별과 깨우침에 탄복했다.", ["지혜", "재능"]], ["捷悟", 5, "王敦引軍垂至大桁，明帝自出中堂。溫嶠為丹陽尹，帝令斷大桁，故未斷，帝大怒，瞋目，左右莫不悚懼。召諸公來。嶠至不謝，但求酒炙。王導須臾至，徒跣下地，謝曰：「天威在顏，遂使溫嶠不容得謝。」嶠於是下謝，帝迺釋然。諸公共嘆王機悟名言。", "왕돈(王敦)이 군대를 이끌고 대항(大桁)에 거의 이르렀을 때, 명제(明帝)가 몸소 중당(中堂)으로 나왔다. 온교(溫嶠)가 단양윤(丹陽尹)이었는데, 황제가 그에게 대항을 끊으라 명했으나 일부러 끊지 않았다. 황제가 크게 노하여 눈을 부릅뜨니 좌우가 두려워하지 않는 이가 없었다. 여러 공을 불러오게 했다. 온교가 이르러 사죄하지 않고 다만 술과 안주를 구할 뿐이었다. 왕도(王導)가 잠시 후 이르러 맨발로 땅에 내려 사죄하며 말하기를 \"천자의 위엄이 얼굴에 서려 있어 마침내 온교로 하여금 사죄할 틈을 얻지 못하게 하였습니다\"라고 했다. 온교가 이에 내려와 사죄하니 황제가 비로소 노여움을 풀었다. 여러 공이 함께 왕도의 기지 있는 깨달음과 명언을 감탄했다.", ["기지", "도량", "권력"]], ["捷悟", 6, "郗司空在北府，桓宣武惡其居兵權。郗於事機素暗，遣牋詣桓：「方欲共獎王室，脩復園陵。」世子嘉賓出行，於道上聞信至，急取牋，視竟，寸寸毀裂，便回。還更作牋，自陳老病，不堪人間，欲乞閑地
