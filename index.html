림자를 두려워하는 자는 아직 마음을 잊지 못한 것이겠지요.\"", ["은둔", "기지", "풍류"]], ["政事", 1, "陳仲弓為太丘長，時吏有詐稱母病求假。事覺收之，令吏殺焉。主簿請付獄，考眾姦。仲弓曰：「欺君不忠，病母不孝。不忠不孝，其罪莫大。考求眾姦，豈復過此？」", "진중궁(陳仲弓, 진식陳寔)이 태구장(太丘長)으로 있을 때, 한 관리가 어머니의 병을 핑계로 거짓으로 휴가를 청하였다. 일이 발각되어 그를 잡아들이고, 관리에게 명하여 그를 죽이게 하였다. 주부(主簿)가 옥에 넘겨 여러 죄상을 캐물을 것을 청하였다. 중궁이 말했다. \"임금을 속이는 것은 불충(不忠)이요, 어머니를 병들었다 하는 것은 불효(不孝)이다. 불충과 불효보다 더 큰 죄는 없다. 다른 죄상을 캐묻는다 한들 어찌 이보다 더하겠는가?\"", ["충직", "효", "권력"]], ["政事", 2, "陳仲弓為太丘長，有劫賊殺財主主者，捕之。未至發所，道聞民有在草不起子者，回車往治之。主簿曰：「賊大，宜先按討。」仲弓曰：「盜殺財主，何如骨肉相殘？」", "진중궁(陳仲弓, 진식陳寔)이 태구장(太丘長)으로 있을 때, 도적이 재물의 주인을 죽인 사건이 있어 담당 관리가 그를 잡으러 갔다. 아직 사건 현장에 이르기 전에, 길에서 백성 중에 아이를 낳고도 거두지 않은 자가 있다는 말을 듣고는 수레를 돌려 그곳으로 가 그 일을 다스렸다. 주부(主簿)가 말했다. \"도적의 일이 크니 마땅히 먼저 추적하여 다스려야 합니다.\" 중궁이 말했다. \"도적이 재물의 주인을 죽인 것이 골육을 서로 해치는 것에 비하면 어떠하겠는가?\"", ["지혜", "권력", "효"]], ["政事", 3, "陳元方年十一時，候袁公。袁公問曰：「賢家君在太丘，遠近稱之，何所履行？」元方曰：「老父在太丘，彊者綏之以德，弱者撫之以仁，恣其所安，久而益敬。」袁公曰：「孤往者嘗為鄴令，正行此事。不知卿家君法孤？孤法卿父？」元方曰：「周公、孔子，異世而出，周旋動靜，萬里如一。周公不師孔子，孔子亦不師周公。」", "진원방(陳元方)이 열한 살 때 원공(袁公)을 찾아뵈었다. 원공이 물었다. \"그대의 부친께서 태구(太丘)에 계실 적에 원근에서 그를 칭송하였는데, 무슨 일을 행하셨는가?\" 원방이 말했다. \"제 아버님께서 태구에 계실 때 강한 자는 덕(德)으로 편안하게 하시고, 약한 자는 인(仁)으로 어루만지셨으며, 그들이 편안한 바를 마음대로 하게 하시니, 오래될수록 더욱 공경하였습니다.\" 원공이 말했다. \"내가 지난날 일찍이 업현(鄴縣)의 현령이 되어 바로 이런 일을 행하였소. 모르겠구려, 그대의 부친께서 나를 본받으신 것인지, 아니면 내가 그대의 부친을 본받은 것인지?\" 원방이 말했다. \"주공(周公)과 공자(孔子)는 다른 시대에 나셨으나, 그 행동거지가 만 리 밖에서도 한결같았습니다. 주공이 공자를 스승으로 삼지 않았고, 공자도 주공을 스승으로 삼지 않았습니다.\"", ["신동", "기지", "비평"]], ["政事", 4, "賀太傅作吳郡，初不出門。吳中諸強族輕之，乃題府門云：「會稽雞，不能啼。」賀聞故出行，至門反顧，索筆足之曰：「不可啼，殺吳兒！」於是至諸屯邸，檢校諸顧、陸役使官兵及藏逋亡，悉以事言上，罪者甚眾。陸抗時為江陵都督，故下請孫皓，然後得釋。", "하태부(賀太傅)가 오군(吳郡) 태수가 되었는데, 처음에 문밖을 나서지 않았다. 오 지방의 여러 세력 있는 일족들이 그를 가벼이 여겨, 관부의 문에 써 붙였다. \"회계(會稽)의 닭은 울 줄을 모른다.\" 하태부가 이를 듣고 일부러 나가 다니다가 문에 이르러 뒤돌아보며 붓을 찾아 그 글에 덧붙여 썼다. \"울 줄은 몰라도 오 땅의 놈들은 죽일 수 있다!\" 이에 여러 둔전과 저택에 이르러, 고씨(顧氏)와 육씨(陸氏)가 관병을 부린 것과 도망자를 숨긴 것을 조사하여, 모두 그 사실을 위에 아뢰니, 죄를 받은 자가 매우 많았다. 육항(陸抗)이 당시 강릉도독(江陵都督)으로 있었는데, 그 때문에 내려가 손호(孫皓)에게 청한 뒤에야 풀려날 수 있었다.", ["용기", "기지", "권력"]], ["政事", 5, "山公以器重朝望，年踰七十，猶知管時任。貴勝年少，若和、裴、王之徒，並共言詠。有署閣柱曰：「閣東，有大牛，和嶠鞅，裴楷鞦，王濟剔嬲不得休。」或云：潘尼作之。", "산공(山公, 산도山濤)은 기량(器量)이 무겁고 조정의 신망을 받았는데, 나이가 일흔을 넘기고도 여전히 당시의 인사 직무를 맡고 있었다. 귀하고 권세 있는 젊은이들, 이를테면 화교(和嶠)·배해(裴楷)·왕제(王濟) 같은 무리가 모두 함께 어울려 담론하고 읊조렸다. 어떤 사람이 누각 기둥에 써 붙였다. \"누각 동쪽에 큰 소가 있으니, 화교는 가슴걸이요 배해는 후릿걸이라, 왕제가 들쑤시고 휘저어 쉴 틈을 주지 않는구나.\" 혹자는 반니(潘尼)가 지었다고 한다.", ["비평", "권력", "풍류"]], ["政事", 6, "賈充初定律令，與羊祜共咨太傅鄭沖。沖曰：「皋陶嚴明之旨，非僕闇懦所探。」羊曰：「上意欲令小加弘潤。」沖乃粗下意。", "가충(賈充)이 처음 율령을 정할 때, 양호(羊祜)와 함께 태부(太傅) 정충(鄭沖)에게 자문하였다. 정충이 말했다. \"고요(皋陶)의 엄정하고 밝은 뜻은 어리석고 나약한 제가 헤아릴 바가 아닙니다.\" 양호가 말했다. \"위에서는 조금 넓히고 다듬어 주시기를 바라십니다.\" 그러자 정충이 대략 의견을 내려 주었다.", ["겸손", "권력", "학문"]], ["政事", 7, "山司徒前後選，殆周遍百官，舉無失才。凡所題目，皆如其言。唯用陸亮，是詔所用，與公意異，爭之不從。亮亦尋為賄敗。", "산사도(山司徒, 산도山濤)는 전후로 인재를 뽑으면서 거의 모든 관직을 두루 거쳐 가, 추천함에 인재를 놓침이 없었다. 무릇 그가 인물을 평한 것이 모두 그 말과 같았다. 다만 육량(陸亮)을 등용한 것은 조서로 임명된 것으로, 공의 뜻과 달라 다투었으나 따라지지 않았다. 육량은 과연 얼마 안 가 뇌물로 인해 패망하였다.", ["비평", "권력", "지혜"]], ["政事", 8, "嵇康被誅後，山公舉康子紹為秘書丞。紹咨公出處，公曰：「為君思之久矣！天地四時，猶有消息，而況人乎？」", "혜강(嵇康)이 처형된 뒤, 산공(山公, 산도山濤)이 혜강의 아들 혜소(嵇紹)를 비서승(秘書丞)으로 천거하였다. 혜소가 나아가야 할지 물러나야 할지를 산공에게 물으니, 산공이 말했다. \"내가 그대를 위해 생각한 지 오래되었네! 천지와 사시(四時)도 오히려 소멸하고 생장함이 있거늘, 하물며 사람이야 어떻겠는가?\"", ["지혜", "권력", "죽음"]], ["政事", 9, "王安期為東海郡，小吏盜池中魚，綱紀推之。王曰：「文王之囿，與眾共之。池魚復何足惜！」", "왕안기(王安期, 왕승王承)가 동해군(東海郡)을 다스릴 때, 하급 관리가 못의 물고기를 훔쳤는데, 강기(綱紀, 주부)가 그를 추궁하였다. 왕안기가 말했다. \"문왕(文王)의 동산도 백성과 함께 누렸거늘, 못의 물고기쯤 무엇이 아까우랴!\"", ["도량", "권력", "베풂"]], ["政事", 10, "王安期作東海郡，吏錄一犯夜人來。王問：「何處來？」云：「從師家受書還，不覺日晚。」王曰：「鞭撻甯越以立威名，恐非致理之本。」使吏送令歸家。", "왕안기(王安期, 왕승王承)가 동해군(東海郡)을 다스릴 때, 관리가 야간 통행 금지를 어긴 자를 잡아 왔다. 왕안기가 물었다. \"어디서 오는 길이냐?\" 그가 말했다. \"스승의 집에서 글을 배우고 돌아오는데, 날이 저문 줄을 몰랐습니다.\" 왕안기가 말했다. \"영월(甯越)을 매질하여 위엄과 명성을 세우는 것은, 아마도 다스림에 이르는 근본이 아닐 것이다.\" 그러고는 관리를 시켜 그를 집으로 데려다주게 하였다.", ["도량", "권력", "학문"]], ["政事", 11, "成帝在石頭，任讓在帝前戮侍中鍾雅，右衛將軍劉超。帝泣曰：「還我侍中！」讓不奉詔，遂斬超、雅。事平之後，陶公與讓有舊，欲宥之。許柳兒思妣者至佳，諸公欲全之。若全思妣，則不得不為陶全讓，於是欲并宥之。事奏，帝曰：「讓是殺我侍中者，不可宥！」諸公以少主不可違，并斬二人。", "성제(成帝)가 석두(石頭)에 계실 때, 임양(任讓)이 황제 앞에서 시중(侍中) 종아(鍾雅)와 우위장군(右衛將軍) 유초(劉超)를 죽였다. 황제가 울며 말했다. \"내 시중을 돌려다오!\" 임양은 조서를 받들지 않고 마침내 유초와 종아를 베었다. 난이 평정된 뒤, 도공(陶公, 도간陶侃)이 임양과 옛 정분이 있어 그를 용서하고자 하였다. 허류(許柳)의 아들 사비(思妣)가 매우 빼어나, 여러 공들이 그를 살려 주고자 하였다. 만약 사비를 살리려면 도공을 위해 임양도 살리지 않을 수 없으므로, 이에 둘 다 용서하려 하였다. 일을 아뢰니 황제가 말했다. \"임양은 내 시중을 죽인 자이니, 용서할 수 없다!\" 여러 공들은 어린 임금의 뜻을 어길 수 없어, 두 사람을 함께 베었다.", ["충직", "원한", "권력"]], ["政事", 12, "王丞相拜揚州，賓客數百人並加霑接，人人有說色。唯有臨海一客姓任及數胡人為未洽，公因便還到過任邊云：「君出，臨海便無復人。」任大喜說。因過胡人前彈指云：「蘭闍，蘭闍。」羣胡同笑，四坐並懽。", "왕승상(王丞相, 왕도王導)이 양주(揚州)에 부임하자, 빈객 수백 명에게 모두 골고루 은혜를 베푸니, 사람마다 기뻐하는 기색이 있었다. 오직 임해(臨海)의 한 손님으로 성이 임씨(任氏)인 자와 몇몇 호인(胡人)만이 흡족해하지 않았다. 공이 그 틈에 돌아오다가 임씨 곁을 지나며 말했다. \"그대가 떠나가면 임해에는 다시 인물이 없겠소.\" 임씨가 크게 기뻐하였다. 이어 호인들 앞을 지나며 손가락을 튕기며 말했다. \"란사(蘭闍), 란사.\" 여러 호인들이 함께 웃으니, 온 좌중이 다 즐거워하였다.", ["기지", "도량", "권력"]], ["政事", 13, "陸太尉詣王丞相咨事，過後輒翻異。王公怪其如此，後以問陸。陸曰：「公長民短，臨時不知所言，既後覺其不可耳。」", "육태위(陸太尉, 육완陸玩)가 왕승상(王丞相, 왕도王導)에게 일을 자문하러 갔는데, 다녀온 뒤에는 번번이 말을 뒤집곤 하였다. 왕공이 그가 이러는 것을 괴이하게 여겨, 나중에 육태위에게 물었다. 육태위가 말했다. \"공은 어른이고 저는 아랫사람이라, 그때는 무어라 말해야 할지 몰랐다가, 나중에야 그것이 옳지 않음을 깨달았을 따름입니다.\"", ["겸손", "비평"]], ["政事", 14, "丞相嘗夏月至石頭看庾公。庾公正料事，丞相云：「暑可小簡之。」庾公曰：「公之遺事，天下亦未以為允。」", "승상(丞相, 왕도王導)이 일찍이 여름에 석두(石頭)에 이르러 유공(庾公, 유량庾亮)을 찾아갔다. 유공이 마침 일을 처리하고 있었다. 승상이 말했다. \"더우니 좀 간략히 하시지요.\" 유공이 말했다. \"공께서 일을 소홀히 하시는 것을 천하 사람들도 온당하게 여기지 않습니다.\"", ["간언", "권력"]], ["政事", 15, "丞相末年，略不復省事，正封籙諾之。自歎曰：「人言我憒憒，後人當思此憒憒。」", "승상(丞相, 왕도王導)이 말년에는 거의 다시 일을 살피지 않고, 그저 봉함과 문서에 그렇다고 승낙할 뿐이었다. 스스로 탄식하여 말했다. \"사람들이 나더러 흐리멍덩하다 하나, 뒷사람들은 마땅히 이 흐리멍덩함을 그리워하리라.\"", ["도량", "권력"]], ["政事", 16, "陶公性檢厲，勤於事。作荊州時，敕船官悉錄鋸木屑，不限多少，咸不解此意。後正會，值積雪始晴，聽事前除雪後猶濕，於是悉用木屑覆之，都無所妨。官用竹皆令錄厚頭，積之如山。後桓宣武伐蜀，裝船，悉以作釘。又云：嘗發所在竹篙，有一官長連根取之，仍當足，乃超兩階用之。", "도공(陶公, 도간陶侃)은 성품이 단속하고 엄격하며 일에 부지런하였다. 형주(荊州)를 다스릴 때, 배를 맡은 관리에게 명하여 톱밥을 모두 모으게 하되 많고 적음을 따지지 말라 하니, 모두 그 뜻을 알지 못하였다. 뒷날 정월 모임 때 마침 쌓인 눈이 막 개었는데, 청사 앞 섬돌이 눈이 녹은 뒤에도 여전히 질척하였다. 이에 모아 둔 톱밥을 모두 덮으니, 전혀 거치적거림이 없었다. 관용으로 대나무를 쓸 때면 모두 그 두꺼운 밑동을 모으게 하여, 산처럼 쌓아 두었다. 뒤에 환선무(桓宣武, 환온桓溫)가 촉(蜀)을 칠 때 배를 꾸미면서, 그것을 모두 못으로 썼다. 또 이르기를, 일찍이 관할 지역의 대나무 삿대를 징발할 때, 한 관장(官長)이 뿌리째 뽑아 와 그것으로 발받침을 삼게 하니, 두 등급을 뛰어넘어 그를 등용하였다고 한다.", ["지혜", "권력", "재능"]], ["政事", 17, "何驃騎作會稽，虞存弟謇作郡主簿，以何見客勞損，欲白斷常客，使家人節量，擇可通者作白事成，以見存。存時為何上佐，正與謇共食，語云：「白事甚好，待我食畢作教。」食竟，取筆題白事後云：「若得門庭長如郭林宗者，當如所白。汝何處得此人？」謇於是止。", "하표기(何驃騎, 하충何充)가 회계(會稽)를 다스릴 때, 우존(虞存)의 아우 우건(虞謇)이 군의 주부(主簿)가 되었는데, 하충이 손님을 접대하느라 수고롭고 손해가 많은 것을 보고, 평소의 손님을 끊고 집안사람을 시켜 절약하게 하며, 통과시킬 만한 자만 가려 받자고 아뢰는 문서를 작성하여 우존에게 보였다. 우존은 당시 하충의 보좌관으로 있었는데, 마침 우건과 함께 식사하다가 말했다. \"아뢰는 글은 매우 좋다. 내가 식사를 마칠 때까지 기다려라, 결재를 해 줄 테니.\" 식사를 마치자 붓을 들어 아뢰는 글 뒤에 썼다. \"만약 곽임종(郭林宗, 곽태郭泰) 같은 문지기를 얻을 수 있다면 마땅히 아뢴 대로 하겠다. 네가 어디서 그런 사람을 얻겠느냐?\" 우건은 이에 그만두었다.", ["기지", "거절", "베풂"]], ["政事", 18, "王、劉與林公共看何驃騎，驃騎看文書不顧之。王謂何曰：「我今故與林公來相看，望卿擺撥常務，應對玄言，那得方低頭看此邪？」何曰：「我不看此，卿等何以得存？」諸人以為佳。", "왕씨(王氏, 왕몽王濛)와 유씨(劉氏, 유담劉惔)가 임공(林公, 지둔支遁)과 함께 하표기(何驃騎, 하충何充)를 보러 갔는데, 표기는 문서를 보느라 그들을 돌아보지 않았다. 왕몽이 하충에게 말했다. \"내가 오늘 일부러 임공과 함께 와서 그대를 보러 왔으니, 그대가 일상의 업무를 떨쳐 버리고 현언(玄言)에 응답해 주기를 바라는데, 어찌 도리어 고개 숙여 이것만 보고 있단 말인가?\" 하충이 말했다. \"내가 이것을 보지 않으면, 그대들이 어찌 살아갈 수 있겠소?\" 사람들이 훌륭한 말이라 여겼다.", ["청담", "권력", "기지"]], ["政事", 19, "桓公在荊州，全欲以德被江、漢，恥以威刑肅物。令史受杖，正從朱衣上過。桓式年少，從外來，云：「向從閣下過，見令史受杖，上捎雲根，下拂地足。」意譏不著。桓公云：「我猶患其重。」", "환공(桓公, 환온桓溫)이 형주(荊州)에 있을 때, 온전히 덕(德)으로 강수(江)와 한수(漢)의 땅을 덮으려 하고, 위엄과 형벌로 사람들을 숙연케 하는 것을 부끄럽게 여겼다. 영사(令史)가 곤장을 맞을 때면, 그저 붉은 옷 위를 스쳐 지나갈 뿐이었다. 환식(桓式)이 젊은 나이에 밖에서 들어와 말했다. \"방금 관청 아래를 지나다가 영사가 곤장 맞는 것을 보았는데, 위로는 구름 끝을 스치고 아래로는 땅 밑을 스치더이다.\" 그 뜻은 곤장이 닿지 않음을 빗댄 것이었다. 환공이 말했다. \"나는 오히려 그것이 무거울까 염려한다.\"", ["도량", "권력"]], ["政事", 20, "簡文為相，事動經年，然後得過。桓公甚患其遲，常加勸免。太宗曰：「一日萬機，那得速！」", "간문(簡文, 간문제)이 재상으로 있을 때, 일은 으레 한 해를 넘긴 뒤에야 처리되곤 하였다. 환공(桓公, 환온桓溫)이 그 더딤을 매우 걱정하여 늘 권하고 독려하였다. 태종(太宗, 간문제)이 말했다. \"하루에 만 가지 정사가 있으니, 어찌 빠를 수 있겠는가!\"", ["권력", "지혜"]], ["政事", 21, "山遐去東陽，王長史就簡文索東陽云：「承藉猛政，故可以和靜致治。」", "산하(山遐)가 동양(東陽)을 떠나자, 왕장사(王長史, 왕몽王濛)가 간문(簡文, 간문제)에게 동양을 청하며 말했다. \"가혹한 정치의 뒤를 이었으니, 화평하고 고요함으로 다스림에 이를 수 있겠습니다.\"", ["권력", "지혜"]], ["政事", 22, "殷浩始作揚州，劉尹行，日小欲晚，便使左右取襆，人問其故？荅曰：「刺史嚴，不敢夜行。」", "은호(殷浩)가 처음 양주(揚州)를 맡았을 때, 유윤(劉尹, 유담劉惔)이 길을 가다가 날이 조금 저물려 하자, 곧 좌우를 시켜 보따리를 가져오게 하였다. 사람들이 그 까닭을 물으니, 대답하였다. \"자사(刺史)가 엄하니, 감히 밤길을 다니지 못하오.\"", ["권력", "기지"]], ["政事", 23, "謝公時，兵厮逋亡，多近竄南塘，下諸舫中。或欲求一時搜索，謝公不許，云：「若不容置此輩，何以為京都？」", "사공(謝公, 사안謝安) 때에 병졸과 천한 노복들이 도망쳐, 대개 가까운 남당(南塘)으로 숨어들어 여러 배 안에 내려가 있었다. 어떤 이가 한꺼번에 수색하기를 청하자, 사공이 허락하지 않고 말했다. \"만약 이런 자들을 받아들여 둘 수 없다면, 어찌 경도(京都)라 하겠는가?\"", ["도량", "권력"]], ["政事", 24, "王大為吏部郎，嘗作選草，臨當奏，王僧彌來，聊出示之。僧彌得便以己意改易所選者近半，王大甚以為佳，更寫即奏。", "왕대(王大, 왕침王忱)가 이부랑(吏部郞)이 되어 일찍이 인선의 초안을 작성하였는데, 막 상주하려 할 때 왕승미(王僧彌, 왕민王珉)가 와서, 잠깐 꺼내어 보여 주었다. 승미가 그것을 받아 보고 자기 뜻대로 뽑은 인물의 거의 절반을 고쳤다. 왕대가 매우 훌륭하다 여겨, 다시 옮겨 쓴 뒤 곧바로 상주하였다.", ["재능", "도량", "비평"]], ["政事", 25, "王東亭與張冠軍善。王既作吳郡，人問小令曰：「東亭作郡，風政何似？」答曰：「不知治化何如，唯與張祖希情好日隆耳。」", "왕동정(王東亭, 왕순王珣)이 장관군(張冠軍)과 친하였다. 왕순이 오군(吳郡)을 맡게 되자, 사람들이 소령(小令)에게 물었다. \"동정이 군을 다스리는데 풍속과 정치가 어떠합니까?\" 대답하였다. \"다스림과 교화가 어떠한지는 모르겠으나, 다만 장조희(張祖希, 장현張玄)와의 정분이 날로 두터워질 뿐이오.\"", ["우정", "권력", "비평"]], ["政事", 26, "殷仲堪當之荊州，王東亭問曰：「德以居全為稱，仁以不害物為名。方今宰牧華夏，處殺戮之職，與本操將不乖乎？」殷答曰：「皋陶造刑辟之制，不為不賢；孔丘居司寇之任，未為不仁。」", "은중감(殷仲堪)이 형주(荊州)로 부임하려 할 때, 왕동정(王東亭, 왕순王珣)이 물었다. \"덕(德)은 온전함을 지키는 것으로 일컬어지고, 인(仁)은 만물을 해치지 않는 것으로 이름이 납니다. 이제 화하(華夏)를 다스리며 살육의 직무에 처하게 되었으니, 본래의 지조와 어긋나지 않겠습니까?\" 은중감이 대답했다. \"고요(皋陶)가 형벌의 제도를 만들었으나 어질지 않다 하지 않으며, 공구(孔丘, 공자)가 사구(司寇)의 직임에 있었으나 인하지 않다 하지 않습니다.\"", ["청담", "권력", "학문"]], ["文學", 1, "鄭玄在馬融門下，三年不得相見，高足弟子傳授而已。嘗算渾天不合，諸弟子莫能解。或言玄能者，融召令算，一轉便決，眾咸駭服。及玄業成，辭歸，既而融有「禮樂皆東」之歎。恐玄擅名而心忌焉。玄亦疑有追，乃坐橋下，在水上據屐。融果轉式逐之，告左右曰：「玄在土下水上而據木，此必死矣。」遂罷追，玄竟以得免。", "정현(鄭玄)이 마융(馬融)의 문하에 있었는데, 삼 년 동안 서로 만나지 못하고 뛰어난 제자가 전수해 줄 뿐이었다. 일찍이 혼천(渾天)의 계산이 맞지 않아 여러 제자들이 풀지 못하였다. 누군가 정현이 풀 수 있다고 하여, 마융이 불러 계산하게 하니, 한 번 굴려 곧 해결하였다. 사람들이 모두 놀라 탄복하였다. 정현이 학업을 이루고 작별하여 돌아가게 되자, 이윽고 마융은 \"예악(禮樂)이 모두 동쪽으로 가는구나\" 하고 탄식하였다. 정현이 명성을 독차지할까 두려워 마음으로 시기한 것이다. 정현 또한 추격이 있을까 의심하여, 다리 아래에 앉아 물 위에서 나막신을 디디고 있었다. 마융이 과연 식반(式盤)을 돌려 점쳐 그를 추격하면서 좌우에 일렀다. \"정현은 흙 아래 물 위에서 나무를 디디고 있으니, 이는 필시 죽었으리라.\" 마침내 추격을 그만두니, 정현은 결국 화를 면할 수 있었다.", ["학문", "질투", "예언"]], ["文學", 2, "鄭玄欲注春秋傳，尚未成時，行與服子慎遇宿客舍，先未相識，服在外車上與人說己注傳意。玄聽之良久，多與己同。玄就車與語曰：「吾久欲注，尚未了。聽君向言，多與吾同。今當盡以所注與君。」遂為服氏注。", "정현(鄭玄)이 『춘추전(春秋傳)』에 주를 달려 하였으나 아직 이루지 못하였을 때, 길을 가다가 복자신(服子愼, 복건服虔)과 객사에서 함께 묵게 되었다. 처음에는 서로 알지 못하였는데, 복건이 밖의 수레 위에서 남에게 자신이 『춘추전』에 주를 단 뜻을 이야기하였다. 정현이 한참을 들으니 자기와 같은 것이 많았다. 정현이 수레로 다가가 그와 말하였다. \"내가 오래전부터 주를 달고자 하였으나 아직 끝내지 못하였소. 그대가 방금 한 말을 들으니 나와 같은 것이 많구려. 이제 내가 주를 단 것을 모두 그대에게 드리겠소.\" 그리하여 그것이 복씨(服氏)의 주가 되었다.", ["학문", "겸손", "우정"]], ["文學", 3, "鄭玄家奴婢皆讀書。嘗使一婢，不稱旨，將撻之。方自陳說，玄怒，使人曳箸泥中。須臾，復有一婢來，問曰：「胡為乎泥中？」荅曰：「薄言往愬，逢彼之怒。」", "정현(鄭玄)의 집안 종들은 모두 글을 읽었다. 일찍이 한 계집종을 부렸는데 뜻에 맞지 않아 매질하려 하였다. 그 종이 막 변명하니 정현이 노하여, 사람을 시켜 진흙 속에 끌어다 두게 하였다. 잠시 후 또 다른 계집종이 와서 물었다. \"어찌하여 진흙 속에 있느냐?\" 그 종이 대답했다. \"잠깐 가서 하소연하다가, 그분의 노여움을 만났다오.\"", ["학문", "기지"]], ["文學", 4, "服虔既善春秋，將為注，欲參考同異，聞崔烈集門生講傳，遂匿姓名，為烈門人賃作食。每當至講時，輒竊聽戶壁間。既知不能踰己，稍共諸生敘其短長。烈聞，不測何人，然素聞虔名，意疑之。明蚤往，及未寤，便呼：「子慎！子慎！」虔不覺驚應，遂相與友善。", "복건(服虔)이 이미 『춘추』에 정통하여 주를 달려 할 때, 같고 다른 점을 참고하고자 하였다. 최열(崔烈)이 문생들을 모아 『춘추전』을 강론한다는 말을 듣고, 마침내 성명을 숨기고 최열의 문인들을 위해 품을 팔아 밥 짓는 일을 하였다. 강론할 때가 되면 번번이 문과 벽 사이에서 몰래 엿들었다. 최열이 자기를 능가하지 못함을 알고는, 차츰 여러 제자들과 더불어 그 장단점을 논하였다. 최열이 이를 듣고 어떤 사람인지 헤아리지 못하였으나, 평소 복건의 이름을 들었던 터라 마음으로 그를 의심하였다. 이튿날 새벽 일찍 가서, 복건이 아직 깨기 전에 불렀다. \"자신(子愼)! 자신!\" 복건이 저도 모르게 놀라 대답하니, 마침내 서로 벗으로 친하게 지냈다.", ["학문", "우정", "지혜"]], ["文學", 5, "鍾會撰四本論，始畢，甚欲使嵇公一見。置懷中，既定，畏其難，懷不敢出，於戶外遙擲，便回急走。", "종회(鍾會)가 「사본론(四本論)」을 지어 막 완성하자, 혜강(嵇康)에게 한번 보이고 싶어 무척이나 바랐다. 그것을 품속에 넣어 두었으나, 다 짓고 나서는 그의 논박이 두려워 품에서 감히 꺼내지 못하고, 문밖에서 멀리 던져 넣고는 곧 돌아서서 급히 달아났다.", ["학문", "비평", "용기"]], ["文學", 6, "何晏為吏部尚書，有位望，時談客盈坐，王弼未弱冠，往見之。晏聞弼名，因條向者勝理語弼曰：「此理僕以為極，可得復難不？」弼便作難，一坐人便以為屈，於是弼自為客主數番，皆一坐所不及。", "하안(何晏)이 이부상서(吏部尙書)로 있을 때 지위와 명망이 있어, 당시 청담(淸談)하는 객들이 자리를 가득 채웠다. 왕필(王弼)이 아직 약관도 되지 않았을 때 그를 찾아갔다. 하안이 왕필의 이름을 듣고는, 지난번에 펼쳤던 빼어난 이치(理)를 조목조목 들어 왕필에게 말하였다. \"이 이치를 나는 지극하다 여기는데, 다시 논박할 수 있겠소?\" 왕필이 곧 논박하니, 온 좌중이 그가 굴복하였다고 여겼다. 이에 왕필이 스스로 객과 주인의 양편을 여러 차례 맡아 논하니, 모두 온 좌중이 미칠 바가 아니었다.", ["청담", "신동", "학문"]], ["文學", 7, "何平叔注老子，始成，詣王輔嗣。見王注精奇，迺神伏曰：「若斯人，可與論天人之際矣！」因以所注為道德二論。", "하평숙(何晏)이 『노자(老子)』에 주석을 달아 막 완성하고는 왕보사(王弼)를 찾아갔다. 왕필의 주석이 정밀하고 빼어남을 보고는 마음으로 탄복하여 말하였다. \"이런 사람이라면 하늘과 사람의 관계를 함께 논할 만하다!\" 그리하여 자기가 주석한 것을 「도론(道論)」과 「덕론(德論)」 두 편으로 삼았다.", ["학문", "겸손", "청담"]], ["文學", 8, "王輔嗣弱冠詣裴徽，徽問曰：「夫無者，誠萬物之所資，聖人莫肯致言，而老子申之無已，何邪？」弼曰：「聖人體無，無又不可以訓，故言必及有；老、莊未免於有，恆訓，其所不足。」", "왕보사(王弼)가 약관의 나이에 배휘(裴徽)를 찾아가니, 배휘가 물었다. \"무릇 무(無)란 진실로 만물이 의지하는 바인데, 성인은 이에 대해 말하려 하지 않았고, 노자는 끊임없이 그것을 펼쳤으니 어찌된 일이오?\" 왕필이 말하였다. \"성인은 무(無)를 체득하였으나, 무란 또한 가르침으로 삼을 수 없는 까닭에 말은 반드시 유(有)에 미쳤습니다. 노자와 장자는 유에서 벗어나지 못한 까닭에 늘 그 부족한 바를 가르쳤던 것입니다.\"", ["청담", "학문", "신동"]], ["文學", 9, "傅嘏善言虛勝，荀粲談尚玄遠。每至共語，有爭而不相喻。裴冀州釋二家之義，通彼我之懷，常使兩情皆得，彼此俱暢。", "부하(傅嘏)는 허승(虛勝)을 논하기를 잘하였고, 순찬(荀粲)은 담론에서 현원(玄遠)을 숭상하였다. 매번 함께 이야기할 때마다 다툼이 있어 서로 이해하지 못하였다. 배기주(裴徽)가 두 사람의 뜻을 풀이하여 피차의 생각을 통하게 하니, 늘 양편의 정이 모두 흡족하고 피차가 함께 후련하게 하였다.", ["청담", "도량", "지혜"]], ["文學", 10, "何晏注老子未畢，見王弼自說注老子旨。何意多所短，不復得作聲，但應諾諾。遂不復注，因作道德論。", "하안(何晏)이 『노자(老子)』에 주석을 달다가 미처 끝내지 못하였을 때, 왕필(王弼)이 스스로 『노자』에 주석한 취지를 설명하는 것을 보았다. 하안은 자기 생각에 부족한 바가 많음을 깨닫고 다시 소리를 내지 못하고, 다만 \"그렇소, 그렇소\" 하고 응할 뿐이었다. 그리하여 다시는 주석을 달지 않고 「도덕론(道德論)」을 지었다.", ["청담", "학문", "겸손"]], ["文學", 11, "中朝時，有懷道之流，有詣王夷甫咨疑者。值王昨已語多，小極，不復相酬荅，乃謂客曰：「身今少惡，裴逸民亦近在此，君可往問。」", "중조(中朝) 시절, 도(道)를 품은 무리들이 있었는데, 왕이보(王衍)를 찾아가 의문을 묻는 자가 있었다. 마침 왕이보가 전날 이미 말을 많이 하여 조금 지친 터라 더는 응대하지 못하고, 이에 객에게 말하였다. \"내가 오늘은 좀 좋지 않소. 배일민(裴頠)도 가까이 이곳에 있으니, 그대는 가서 물어보시오.\"", ["청담", "비평"]], ["文學", 12, "裴成公作崇有論，時人攻難之，莫能折。唯王夷甫來，如小屈。時人即以王理難裴，理還復申。", "배성공(裴頠)이 「숭유론(崇有論)」을 지으니, 당시 사람들이 그것을 공박하였으나 아무도 꺾지 못하였다. 오직 왕이보(王衍)가 와서야 조금 굴복하는 듯하였다. 당시 사람들이 곧 왕이보의 이치(理)로 배성공을 논박하니, 그 이치가 도리어 다시 펼쳐졌다.", ["청담", "학문", "비평"]], ["文學", 13, "諸葛厷年少不肯學問。始與王夷甫談，便已超詣。王歎曰：「卿天才卓出，若復小加研尋，一無所愧。」厷後看莊、老，更與王語，便足相抗衡。", "제갈굉(諸葛厷)은 젊어서 학문하기를 즐기지 않았다. 처음 왕이보(王衍)와 담론할 때 이미 깊은 경지에 이르렀다. 왕이보가 감탄하여 말하였다. \"그대의 천재가 우뚝 빼어나니, 만약 조금만 더 연구하여 탐구한다면 부끄러울 바가 하나도 없겠소.\" 제갈굉이 뒤에 『장자(莊子)』와 『노자(老子)』를 보고 다시 왕이보와 이야기하니, 충분히 서로 맞설 만하였다.", ["청담", "학문", "재능", "제갈씨"]], ["文學", 14, "衛玠總角時問樂令「夢」，樂云：「是想。」衛曰：「形神所不接，而夢豈是想邪？」樂云：「因也。未嘗夢乘車入鼠穴，擣噉鐵杵，皆無想無因故也。」衛思因，經日不得，遂成病。樂聞，故命駕為剖析之。衛即小差。樂歎曰：「此兒胸中當必無膏肓之疾！」", "위개(衛玠)가 총각 때 악령(樂廣)에게 \"꿈\"에 대해 물으니, 악광이 말하였다. \"그것은 생각(想)이다.\" 위개가 말하였다. \"형체와 정신이 접하지 않는데, 꿈이 어찌 생각이겠습니까?\" 악광이 말하였다. \"인연(因) 때문이다. 일찍이 수레를 타고 쥐구멍에 들어가거나 쇠공이를 찧어 먹는 꿈을 꾸지 않는 것은, 모두 생각도 없고 인연도 없기 때문이다.\" 위개가 인연에 대해 생각하다가 며칠이 지나도록 풀지 못하여 마침내 병이 났다. 악광이 그것을 듣고는 일부러 수레를 명하여 가서 풀어 주니, 위개가 곧 조금 나았다. 악광이 감탄하여 말하였다. \"이 아이의 가슴속에는 분명 고황(膏肓)의 병은 없을 것이다!\"", ["청담", "지혜", "병과늙음"]], ["文學", 15, "庾子嵩讀莊子，開卷一尺許便放去，曰：「了不異人意。」", "유자숭(庾子嵩)이 『장자(莊子)』를 읽다가, 책을 한 자쯤 펼치고는 곧 내던지며 말하였다. \"내 생각과 조금도 다르지 않다.\"", ["청담", "학문", "오만"]], ["文學", 16, "客問樂令「旨不至」者，樂亦不復剖析文句，直以麈尾柄确几曰：「至不？」客曰：「至！」樂因又舉麈尾曰：「若至者，那得去？」於是客乃悟服。樂辭約而旨達，皆此類。", "어떤 객이 악령(樂廣)에게 \"뜻은 이르지 않는다(旨不至)\"는 명제를 물으니, 악광은 또한 문구를 따로 풀이하지 않고, 곧장 주미(麈尾)의 자루로 안석을 두드리며 말하였다. \"이르렀소, 안 이르렀소?\" 객이 말하였다. \"이르렀습니다!\" 악광이 이에 다시 주미를 들어 올리며 말하였다. \"만약 이르렀다면 어찌 떠날 수 있겠소?\" 이에 객이 깨닫고 탄복하였다. 악광은 말이 간략하면서도 뜻이 통하였으니, 모두 이와 같았다.", ["청담", "지혜", "기지"]], ["文學", 17, "初，注莊子者數十家，莫能究其旨要。向秀於舊注外為解義，妙析奇致，大暢玄風。唯秋水、至樂二篇未竟而秀卒。秀子幼，義遂零落，然猶有別本。郭象者，為人薄行，有儁才。見秀義不傳於世，遂竊以為己注。乃自注秋水、至樂二篇，又易馬蹄一篇，其餘眾篇，或定點文句而已。後秀義別本出，故今有向、郭二莊，其義一也。", "처음에 『장자(莊子)』에 주석을 단 자가 수십 가(家)였으나, 아무도 그 뜻의 요체를 궁구하지 못하였다. 향수(向秀)가 옛 주석 외에 따로 뜻풀이를 지어, 오묘하게 분석하고 기이한 정취를 드러내어 현풍(玄風)을 크게 떨치게 하였다. 다만 「추수(秋水)」와 「지락(至樂)」 두 편을 끝내지 못하고 향수가 죽었다. 향수의 아들이 어려 그 뜻풀이가 마침내 흩어졌으나, 그래도 따로 전하는 본(本)이 있었다. 곽상(郭象)이라는 자는 사람됨이 행실이 박하였으나 빼어난 재주가 있었다. 향수의 뜻풀이가 세상에 전해지지 않음을 보고는 마침내 몰래 자기 주석으로 삼았다. 이에 스스로 「추수」와 「지락」 두 편을 주석하고, 또 「마제(馬蹄)」 한 편을 고쳤으며, 그 나머지 여러 편은 혹 문구를 다듬는 데 그쳤을 뿐이다. 뒤에 향수의 뜻풀이 별본이 나왔으므로, 지금 향수와 곽상의 두 『장자』가 있으나, 그 뜻은 하나이다.", ["학문", "술수", "재능"]], ["文學", 18, "阮宣子有令聞，太尉王夷甫見而問曰：「老莊與聖教同異？」對曰：「將無同？」太尉善其言，辟之為掾。世謂「三語掾」。衛玠嘲之曰：「一言可辟，何假於三？」宣子曰：「苟是天下人望，亦可無言而辟，復何假一？」遂相與為友。", "완선자(阮宣子)는 좋은 명성이 있었는데, 태위(太尉) 왕이보(王衍)가 그를 보고 물었다. \"노장(老莊)과 성인의 가르침(聖敎)은 같은가 다른가?\" 대답하여 말하였다. \"아마도 같지 않겠습니까(將無同)?\" 태위가 그 말을 훌륭히 여겨 그를 불러 연(掾)으로 삼았다. 세상에서 이를 \"삼어연(三語掾)\"이라 일렀다. 위개(衛玠)가 그를 조롱하여 말하였다. \"한 마디로도 부를 만하거늘, 어찌 세 마디나 빌렸소?\" 완선자가 말하였다. \"진실로 천하 사람들이 우러르는 바라면, 또한 한 마디 없이도 부를 만하니, 다시 어찌 한 마디인들 빌리겠소?\" 그리하여 서로 벗이 되었다.", ["청담", "기지", "우정"]], ["文學", 19, "裴散騎娶王太尉女。婚後三日，諸壻大會，當時名士，王裴子弟悉集。郭子玄在坐，挑與裴談。子玄才甚豐瞻，始數交未快。郭陳張甚盛，裴徐理前語，理致甚微，四坐咨嗟稱快。王亦以為奇，謂諸人曰：「君輩勿為爾，將受困寡人女壻！」", "배산기(裴頠)가 왕태위(王衍)의 딸에게 장가들었다. 혼인한 지 사흘 뒤에 여러 사위가 크게 모였는데, 당시의 명사와 왕씨·배씨의 자제들이 모두 모였다. 곽자현(郭象)이 자리에 있다가 배산기에게 담론을 걸었다. 곽자현은 재주가 매우 풍부하여, 처음 몇 차례 주고받을 때는 시원치 않았다. 곽상이 펼쳐 놓은 것이 매우 성대하니, 배산기가 천천히 앞서의 말을 정리하는데 이치(理致)가 매우 정미하여, 온 좌중이 감탄하며 통쾌하다 칭찬하였다. 왕태위도 기이하게 여겨 여러 사람에게 말하였다. \"그대들은 그러지 마시오. 장차 내 사위에게 곤욕을 당할 것이오!\"", ["청담", "재능", "부부"]], ["文學", 20, "衛玠始度江，見王大將軍。因夜坐，大將軍命謝幼輿。玠見謝，甚說之，都不復顧王，遂達旦微言。王永夕不得豫。玠體素羸，恆為母所禁。爾夕忽極，於此病篤，遂不起。", "위개(衛玠)가 처음 강을 건너와 왕대장군(王敦)을 만났다. 밤에 앉아 있을 때 대장군이 사유여(謝鯤)를 불렀다. 위개가 사곤(謝鯤)을 보고 매우 기뻐하여 다시는 왕돈을 돌아보지 않고, 마침내 새벽이 되도록 미묘한 담론(微言)을 나누었다. 왕돈은 밤새도록 끼어들 수 없었다. 위개는 본래 몸이 허약하여 늘 어머니의 단속을 받았다. 그날 밤 갑자기 지쳐서 이로 인해 병이 위독해져 마침내 일어나지 못하였다.", ["청담", "죽음", "병과늙음"]], ["文學", 21, "舊云：王丞相過江左，止道聲無哀樂、養生、言盡意，三理而已。然宛轉關生，無所不入。", "예로부터 전하기를, 왕승상(王導)이 강좌(江左)로 건너온 뒤로는 다만 「성무애락(聲無哀樂)」·「양생(養生)」·「언진의(言盡意)」 세 가지 이치(理)만을 말하였을 뿐이라 한다. 그러나 이를 굴려 가며 생기(生機)와 결부시키니 들어가지 못하는 바가 없었다.", ["청담", "학문"]], ["文學", 22, "殷中軍為庾公長史，下都，王丞相為之集，桓公、王長史、王藍田、謝鎮西並在。丞相自起解帳帶麈尾，語殷曰：「身今日當與君共談析理。」既共清言，遂達三更。丞相與殷共相往反，其餘諸賢，略無所關。既彼我相盡，丞相乃歎曰：「向來語，乃竟未知理源所歸，至於辭喻不相負。正始之音，正當爾耳！」明旦，桓宣武語人曰：「昨夜聽殷、王清言甚佳，仁祖亦不寂寞，我亦時復造心，顧看兩王掾，輒翣如生母狗馨。」", "은중군(殷浩)이 유공(庾亮)의 장사(長史)로 있다가 도읍으로 내려오자, 왕승상(王導)이 그를 위해 모임을 마련하였는데, 환공(桓溫)·왕장사(王濛)·왕남전(王述)·사진서(謝尚)가 모두 자리에 있었다. 승상이 몸소 일어나 휘장 띠에서 주미(麈尾)를 풀어 들고 은호에게 말하였다. \"내 오늘 그대와 함께 이치(理)를 분석하여 담론하겠소.\" 이윽고 함께 청언(淸言)하여 마침내 삼경(三更)에 이르렀다. 승상과 은호가 함께 주고받으니, 그 나머지 여러 현인들은 거의 끼어들지 못하였다. 피차 서로 다 펼치고 나자, 승상이 이에 감탄하여 말하였다. \"방금의 담론은 끝내 이치의 근원이 돌아갈 바를 알지 못하였으나, 말과 비유에 있어서는 서로 못하지 않았소. 정시(正始)의 음(音)이 바로 이러하였을 따름이오!\" 이튿날 아침 환선무(桓溫)가 사람들에게 말하였다. \"어젯밤 은호와 왕도의 청언을 들으니 매우 훌륭하였고, 인조(謝尚) 또한 적막하지 않았으며, 나 또한 때때로 마음을 두었으나, 두 왕씨 연(掾)을 돌아보니 부채를 부치는 양 마치 새끼 밴 암캐 같은 꼴이더이다.\"", ["청담", "비평", "재능"]], ["文學", 23, "殷中軍見佛經云：「理亦應阿堵上。」", "은중군(殷浩)이 불경(佛經)을 보고 말하였다. \"이치(理) 또한 응당 이 안에 있을 것이다.\"", ["청담", "학문"]], ["文學", 24, "謝安年少時，請阮光祿道白馬論。為論以示謝，于時謝不即解阮語，重相咨盡。阮乃歎曰：「非但能言人不可得，正索解人亦不可得！」", "사안(謝安)이 젊었을 때, 완광록(阮裕)에게 「백마론(白馬論)」을 논해 달라 청하였다. 완광록이 논을 지어 사안에게 보였는데, 그때 사안이 완유(阮裕)의 말을 바로 이해하지 못하여 거듭 물어 다 파고들었다. 완유가 이에 감탄하여 말하였다. \"말을 잘하는 사람을 얻을 수 없을 뿐 아니라, 바로 풀이를 구하는 사람도 얻을 수 없구나!\"", ["청담", "학문"]], ["文學", 25, "褚季野語孫安國云：「北人學問，淵綜廣博。」孫答曰：「南人學問，清通簡要。」支道林聞之曰：「聖賢固所忘言。自中人以還，北人看書，如顯處視月；南人學問，如牖中窺日。」", "저계야(褚季野)가 손안국(孫綽)에게 말하였다. \"북방 사람의 학문은 깊고 종합적이며 넓고 해박하다.\" 손안국이 답하였다. \"남방 사람의 학문은 맑고 통달하며 간략하고 요체에 닿는다.\" 지도림(支遁)이 그 말을 듣고 말하였다. \"성현은 본래 말을 잊은 경지에 있다. 중간 정도 사람 이하로 말하자면, 북방 사람이 책을 보는 것은 마치 트인 곳에서 달을 보는 것과 같고, 남방 사람의 학문은 마치 들창 틈으로 해를 엿보는 것과 같다.\"", ["학문", "비평", "청담"]], ["文學", 26, "劉真長與殷淵源談，劉理如小屈，殷曰：「惡，卿不欲作將善雲梯仰攻。」", "유진장(劉惔)이 은연원(殷浩)과 담론할 때, 유진장의 이치(理)가 조금 굴복하는 듯하자, 은호가 말하였다. \"아니, 그대는 좋은 운제(雲梯)를 만들어 우러러 공격하려 들지 않는구려.\"", ["청담", "기지"]], ["文學", 27, "殷中軍云：「康伯未得我牙後慧。」", "은중군(殷浩)이 말하였다. \"강백(康伯)은 아직 내 입가의 지혜도 얻지 못하였다.\"", ["청담", "오만", "비평"]], ["文學", 28, "謝鎮西少時，聞殷浩能清言，故往造之。殷未過有所通，為謝標榜諸義，作數百語。既有佳致，兼辭條豐蔚，甚足以動心駭聽。謝注神傾意，不覺流汗交面。殷徐語左右：「取手巾與謝郎拭面。」", "사진서(謝尚)가 젊었을 때, 은호(殷浩)가 청언(淸言)을 잘한다는 말을 듣고 일부러 그를 찾아갔다. 은호는 미처 깊이 통하기도 전에 사상을 위해 여러 뜻을 내걸어 수백 마디를 늘어놓았다. 이미 빼어난 정취가 있는 데다 말과 조리가 풍부하고 무성하여, 마음을 움직이고 듣는 이를 놀라게 하기에 충분하였다. 사상이 정신을 쏟고 뜻을 기울이다가, 어느새 땀이 흘러 얼굴을 적시는 것도 깨닫지 못하였다. 은호가 천천히 좌우에게 말하였다. \"수건을 가져다 사랑(謝郞)의 얼굴을 닦아 드려라.\"", ["청담", "재능", "비평"]], ["文學", 29, "宣武集諸名勝講易，日說一卦。簡文欲聽，聞此便還。曰：「義自當有難易，其以一卦為限邪？」", "선무(桓溫)가 여러 명사를 모아 『주역(周易)』을 강(講)하면서, 하루에 한 괘씩 설명하였다. 간문(簡文)이 들으려 하다가 이 말을 듣고는 곧 돌아가며 말하였다. \"뜻에는 본래 어렵고 쉬움이 있는 법인데, 어찌 한 괘로 한도를 삼는단 말인가?\"", ["청담", "학문", "기지"]], ["文學", 30, "有北來道人好才理，與林公相遇於瓦官寺，講小品。于時竺法深、孫興公悉共聽。此道人語，屢設疑難，林公辯答清析，辭氣俱爽。此道人每輒摧屈。孫問深公：「上人當是逆風家，向來何以都不言？」深公笑而不答。林公曰：「白旃檀非不馥，焉能逆風？」深公得此義，夷然不屑。", "북쪽에서 온 어떤 도인(道人)이 재주와 이치(才理)를 좋아하였는데, 임공(支遁)과 와관사(瓦官寺)에서 만나 「소품(小品)」을 강(講)하였다. 그때 축법심(竺法深)과 손흥공(孫綽)이 모두 함께 들었다. 이 도인이 말하면서 자주 의문과 논란을 제기하면, 임공이 변론하여 답하는 것이 맑고 분명하여 말과 기개가 모두 시원하였다. 이 도인은 매번 꺾여 굴복하였다. 손흥공이 심공(竺法深)에게 물었다. \"상인(上人)께서는 마땅히 바람을 거스르는 분이실 텐데, 아까는 어찌하여 도무지 말씀이 없으셨습니까?\" 심공이 웃으며 답하지 않았다. 임공이 말하였다. \"흰 전단향(白旃檀)이 향기롭지 않은 것은 아니나, 어찌 바람을 거스를 수 있겠소?\" 심공은 이 말을 듣고도 태연히 개의치 않았다.", ["청담", "재능", "비평"]], ["文學", 31, "孫安國往殷中軍許共論，往反精苦，客主無間。左右進食，冷而復煗者數四。彼我奮擲麈尾，悉脫落滿餐飯中。賓主遂至莫忘食。殷乃語孫曰：「卿莫作強口馬，我當穿卿鼻。」孫曰：「卿不見決鼻牛，人當穿卿頰。」", "손안국(孫綽)이 은중군(殷浩)의 처소에 가서 함께 담론하였는데, 주고받음이 정밀하고 힘겨워 객과 주인 사이에 빈틈이 없었다. 좌우에서 음식을 올렸으나, 식었다가 다시 데우기를 네 차례나 하였다. 피차 주미(麈尾)를 떨치며 휘두르니, 모두 떨어져 나가 밥 위에 가득하였다. 손님과 주인이 마침내 저물도록 밥 먹기를 잊었다. 은호가 이에 손안국에게 말하였다. \"그대는 입 센 말 노릇 하지 마시오. 내 그대의 코를 꿰겠소.\" 손안국이 말하였다. \"그대는 코가 터진 소를 보지 못하였소? 사람이 마땅히 그대의 뺨을 꿰리다.\"", ["청담", "기지", "분노"]], ["文學", 32, "莊子逍遙篇，舊是難處，諸名賢所可鑽味而不能拔理於郭向之外。支道林在白馬寺中，將馮太常共語，因及逍遙。支卓然標新理於二家之表，立異義於眾賢之外，皆是諸名賢尋味之所不得。後遂用支理。", "『장자(莊子)』의 「소요(逍遙)」 편은 예로부터 어려운 곳이어서, 여러 명현(名賢)들이 파고들고 음미하였으나, 곽상과 향수의 풀이 밖으로 이치를 끌어내지 못하였다. 지도림(支遁)이 백마사(白馬寺)에 있을 때, 풍태상(馮太常)과 함께 이야기하다가 「소요」에 이르렀다. 지도림이 우뚝하게 두 가(家)의 밖으로 새로운 이치를 내세우고, 여러 현인의 밖으로 다른 뜻을 세우니, 모두 여러 명현이 음미하여도 얻지 못한 것이었다. 뒤에 마침내 지도림의 풀이를 따랐다.", ["청담", "학문", "지혜"]], ["文學", 33, "殷中軍嘗至劉尹所清言。良久，殷理小屈，遊辭不已，劉亦不復答。殷去後，乃云：「田舍兒，強學人作爾馨語。」", "은중군(殷浩)이 일찍이 유윤(劉惔)의 처소에 가서 청언(淸言)하였다. 한참 뒤에 은호의 이치(理)가 조금 굴복하였는데도 둘러대는 말을 그치지 않으니, 유윤도 다시 답하지 않았다. 은호가 떠난 뒤에 이에 말하였다. \"시골뜨기가 억지로 남을 흉내 내어 저따위 말을 짓는구나.\"", ["청담", "비평", "오만"]], ["文學", 34, "殷中軍雖思慮通長，然於才性偏精。忽言及四本，便苦湯池鐵城，無可攻之勢。", "은중군(殷浩)은 비록 사려가 통달하고 길었으나, 재성(才性)에 있어 특히 정밀하였다. 문득 「사본(四本)」에 말이 미치면, 끓는 못과 쇠로 된 성처럼 견고하여 공략할 만한 형세가 없었다.", ["청담", "재능", "학문"]], ["文學", 35, "支道林造即色論，論成，示王中郎。中郎都無言。支曰：「默而識之乎？」王曰：「既無文殊，誰能見賞？」", "지도림(支遁)이 「즉색론(卽色論)」을 지어 완성하고는 왕중랑(王坦之)에게 보였다. 중랑이 도무지 아무 말이 없었다. 지도림이 말하였다. \"묵묵히 마음에 새기는 것이오?\" 왕중랑이 말하였다. \"문수(文殊)도 없는데, 누가 알아주어 감상할 수 있겠소?\"", ["청담", "학문", "기지"]], ["文學", 36, "王逸少作會稽，初至，支道林在焉。孫興公謂王曰：「支道林拔新領異，胸懷所及，乃自佳，卿欲見不？」王本自有一往雋氣，殊自輕之。後孫與支共載往王許，王都領域，不與交言。須臾，支退，後正值王當行，車已在門。支語王曰：「君未可去，貧道與君小語。」因論莊子逍遙遊。支作數千言，才藻新奇，花爛映發。王遂披襟解帶，留連不能已。", "왕일소(王羲之)가 회계(會稽)의 직임을 맡아 처음 부임하였을 때, 지도림(支遁)이 그곳에 있었다. 손흥공(孫綽)이 왕희지에게 말하였다. \"지도림은 새로운 것을 끄집어내고 기이한 것을 거느려, 그 흉회(胸懷)가 미치는 바가 참으로 훌륭하오. 그대는 만나 보고 싶지 않소?\" 왕희지는 본래 한결같이 거침없는 기개가 있어, 자못 그를 가벼이 여겼다. 뒤에 손흥공이 지도림과 함께 수레를 타고 왕희지의 처소로 갔으나, 왕희지는 도무지 경계를 거두지 않고 말을 나누지 않았다. 잠시 뒤 지도림이 물러나려는데, 마침 왕희지가 외출하려 할 때라 수레가 이미 문에 와 있었다. 지도림이 왕희지에게 말하였다. \"그대는 아직 가지 마시오. 빈도(貧道)가 그대와 잠시 이야기하리다.\" 그리하여 『장자』의 「소요유(逍遙遊)」를 논하였다. 지도림이 수천 마디를 펴니, 재주와 문채가 새롭고 기이하여 꽃이 활짝 피어 빛을 발하는 듯하였다. 왕희지가 마침내 옷깃을 풀고 띠를 늦추며 머물러 떠나지 못하였다.", ["청담", "비평", "재능"]], ["文學", 37, "三乘佛家滯義，支道林分判，使三乘炳然。諸人在下坐聽，皆云可通。支下坐，自共說，正當得兩，入三便亂。今義弟子雖傳，猶不盡得。", "삼승(三乘)은 불가(佛家)의 막힌 뜻인데, 지도림(支遁)이 분별하여 풀이하니 삼승이 환히 밝아졌다. 여러 사람이 아래 자리에서 듣고는 모두 통할 만하다 하였다. 지도림이 자리에서 내려와 자기들끼리 이야기하니, 바로 두 가지(二乘)는 얻을 수 있었으나 셋째에 들어가면 곧 어지러워졌다. 지금 그 뜻을 제자들이 비록 전하기는 하나, 여전히 다 얻지는 못하였다.", ["청담", "학문"]], ["文學", 38, "許掾年少時，人以比王苟子，許大不平。時諸人士及於法師並在會稽西寺講，王亦在焉。許意甚忿，便往西寺與王論理，共決優劣。苦相折挫，王遂大屈。許復執王理，王執許理，更相覆疏；王復屈。許謂支法師曰：「弟子向語何似？」支從容曰：「君語佳則佳矣，何至相苦邪？豈是求理中之談哉！」", "허연(許詢)이 젊었을 때 사람들이 그를 왕구자(王苟子)에 견주니, 허연은 몹시 불평하였다. 그때 여러 명사와 우법사(于法師)가 모두 회계(會稽) 서사(西寺)에서 강론하고 있었는데, 왕구자도 그 자리에 있었다. 허연은 마음에 매우 분하여 곧 서사로 가서 왕구자와 이치(理)를 논하며 함께 우열을 가렸다. 갖은 방법으로 몰아붙이니 왕구자가 마침내 크게 굴복하였다. 허연이 다시 왕구자의 논리를 잡고 왕구자가 허연의 논리를 잡아 번갈아 뒤집어 따지니, 왕구자가 또 굴복하였다. 허연이 지법사(支遁)에게 말하기를 \"제자가 방금 한 말이 어떻습니까?\" 하니, 지둔이 조용히 말하였다. \"그대의 말이 훌륭하기는 훌륭하나, 어찌 서로 그토록 몰아붙이는 데까지 이르는가? 이것이 어찌 이치를 구하는 담론이겠는가!\"", ["청담", "비평", "분노"]], ["文學", 39, "林道人詣謝公，東陽時始總角，新病起，體未堪勞。與林公講論，遂至相苦。母王夫人在壁後聽之，再遣信令還，而太傅留之。王夫人因自出云：「新婦少遭家難，一生所寄，唯在此兒。」因流涕抱兒以歸。謝公語同坐曰：「家嫂辭情忼慨，致可傳述，恨不使朝士見。」", "임도인(支遁)이 사공(謝安)을 찾아갔는데, 동양(東陽, 사랑)이 그때 막 총각이었고 새로 병을 앓고 일어나 몸이 수고로움을 견디지 못하였다. 임공(支遁)과 강론을 벌이다 마침내 서로 몰아붙이는 지경에 이르렀다. 어머니 왕부인(王夫人)이 벽 뒤에서 그것을 듣고 두 번이나 사람을 보내 돌아오게 하였으나, 태부(謝安)가 그를 붙들었다. 왕부인이 이에 몸소 나와 말하였다. \"이 며느리가 젊어서 집안의 환난을 만나, 한평생을 의탁할 데가 오직 이 아이뿐입니다.\" 그러고는 눈물을 흘리며 아이를 안고 돌아갔다. 사공이 함께 앉은 이에게 말하였다. \"집안 형수의 말과 정이 강개하니 참으로 전할 만한데, 조정의 인사들에게 보이지 못함이 안타깝다.\"", ["청담", "효", "여인"]], ["文學", 40, "支道林、許掾諸人共在會稽王齋頭。支為法師，許為都講。支通一義，四坐莫不厭心。許送一難，眾人莫不抃舞。但共嗟詠二家之美，不辯其理之所在。", "지둔(支遁)과 허연(許詢) 등 여러 사람이 함께 회계왕(會稽王)의 서재에 있었다. 지둔이 법사가 되고 허연이 도강(都講)이 되었다. 지둔이 한 가지 이치를 풀이하면 사방에 둘러앉은 이들이 마음에 흡족해하지 않는 이가 없었고, 허연이 한 가지 논란을 제기하면 뭇사람이 손뼉 치며 춤추지 않는 이가 없었다. 다만 함께 두 사람의 아름다움을 감탄하여 읊을 뿐, 그 이치가 어디에 있는지는 가리지 못하였다.", ["청담", "비평"]], ["文學", 41, "謝車騎在安西艱中，林道人往就語，將夕乃退。有人道上見者問云：「公何處來？」答云：「今日與謝孝劇談一出來。」", "사거기(謝玄)가 안서(安西, 사혁)의 상중에 있을 때, 임도인(支遁)이 찾아가 이야기를 나누다가 저물녘에야 물러났다. 어떤 사람이 길에서 그를 보고 물었다. \"공께서는 어디서 오십니까?\" 임도인이 대답하였다. \"오늘 사효(謝孝, 사현)와 한바탕 격렬히 담론하고 오는 길이오.\"", ["청담", "죽음"]], ["文學", 42, "支道林初從東出，住東安寺中。王長史宿構精理，并撰其才藻，往與支語，不大當對。王敘致作數百語，自謂是名理奇藻。支徐徐謂曰：「身與君別多年，君義言了不長進。」王大慚而退。", "지둔(支遁)이 처음 동쪽에서 나와 동안사(東安寺)에 머물렀다. 왕장사(王濛)가 미리 정밀한 이치를 짜놓고 아울러 그 화려한 문사를 가다듬어, 지둔에게 가서 이야기를 나누었으나 별로 상대가 되지 못하였다. 왕몽이 수백 마디 말을 늘어놓고 스스로 명리(名理)의 빼어난 문사라 여겼다. 지둔이 천천히 말하였다. \"내가 그대와 헤어진 지 여러 해인데, 그대의 의론과 언변이 도무지 나아지지 않았구려.\" 왕몽이 크게 부끄러워하며 물러났다.", ["청담", "비평", "오만"]], ["文學", 43, "殷中軍讀小品，下二百籤，皆是精微，世之幽滯。嘗欲與支道林辯之，竟不得。今小品猶存。", "은중군(殷浩)이 『소품(小品)』을 읽으며 이백 곳에 표지를 붙였는데, 모두 정밀하고 미묘하여 세상에서 깊이 막힌 부분이었다. 일찍이 지둔(支遁)과 그것을 논변하고자 하였으나 끝내 이루지 못하였다. 지금도 그 『소품』이 남아 있다.", ["학문", "청담"]], ["文學", 44, "佛經以為袪練神明，則聖人可致。簡文云：「不知便可登峰造極不？然陶練之功，尚不可誣。」", "불경에서는 신명(神明)을 닦아 단련하면 성인에 이를 수 있다고 한다. 간문제(簡文帝)가 말하였다. \"바로 봉우리에 오르고 극치에 다다를 수 있을지는 알 수 없다. 그러나 닦아 단련하는 공부는 그래도 헛되다 할 수 없다.\"", ["청담", "학문"]], ["文學", 45, "于法開始與支公爭名，後情漸歸支，意甚不分，遂遁跡剡下。遣弟子出都，語使過會稽。于時支公正講小品。開戒弟子：「道林講，比汝至，當在某品中。」因示語攻難數十番，云：「舊此中不可復通。」弟子如言詣支公。正值講，因謹述開意。往反多時，林公遂屈。厲聲曰：「君何足復受人寄載來！」", "우법개(于法開)가 처음에 지공(支遁)과 명성을 다투었으나, 뒤에 인망이 점점 지둔에게 돌아가니 마음에 매우 불평하여 마침내 섬(剡) 땅으로 자취를 감추었다. 제자를 도성으로 보내면서 회계(會稽)를 들르게 하였다. 그때 지공이 마침 『소품』을 강하고 있었다. 우법개가 제자에게 일러두었다. \"도림(支遁)이 강할 적에 네가 도착할 무렵이면 마땅히 아무 품(品)에 이르렀을 것이다.\" 그러고는 공박할 논란 수십 차례를 일러주며 말하였다. \"예로부터 이 대목은 다시 통하게 할 수 없었다.\" 제자가 그 말대로 지공을 찾아갔다. 마침 강하는 중이라 삼가 우법개의 뜻을 진술하였다. 여러 차례 주고받은 끝에 임공(支遁)이 마침내 굴복하였다. 임공이 언성을 높여 말하였다. \"그대가 어찌 남에게 부탁받아 실려온 말을 다시 받겠는가!\"", ["청담", "질투", "비평"]], ["文學", 46, "殷中軍問：「自然無心於稟受，何以正善人少，惡人多？」諸人莫有言者。劉尹答曰：「譬如寫水著地，正自縱橫流漫，略無正方圓者。」一時絕歎，以為名通。", "은중군(殷浩)이 물었다. \"자연은 받아 태어나게 함에 무심한데, 어찌하여 바로 선한 사람은 적고 악한 사람은 많은가?\" 여러 사람 중에 말하는 이가 없었다. 유윤(劉惔)이 대답하였다. \"비유하자면 물을 땅에 쏟으면 그저 멋대로 가로세로로 흘러 퍼질 뿐, 거의 반듯하게 네모나거나 둥근 것이 없는 것과 같습니다.\" 그 자리에서 한꺼번에 극찬하며 명쾌한 풀이(名通)라 여겼다.", ["청담", "지혜"]], ["文學", 47, "康僧淵初過江，未有知者，恆周旋市肆，乞索以自營。忽往殷淵源許，值盛有賓客，殷使坐，麤與寒溫，遂及義理。語言辭旨，曾無愧色。領略麤舉，一往參詣。由是知之。", "강승연(康僧淵)이 처음 강을 건너왔을 때 아는 이가 없어, 늘 시장 가게를 돌아다니며 구걸하여 스스로 살아갔다. 어느 날 갑자기 은연원(殷浩)의 처소로 갔는데, 마침 손님이 가득한 차였다. 은호가 그를 앉히고 대충 인사를 나누다가 마침내 의리(義理)에 이르렀다. 그 언사와 뜻에 일찍이 부끄러운 기색이 없었으며, 요점을 두루 거론하고 한 번에 깊이 파고들었다. 이로 말미암아 그를 알게 되었다.", ["청담", "재능", "청빈"]], ["文學", 48, "殷謝諸人共集。謝因問殷：「眼往屬萬形，萬形來入眼不？」", "은호(殷浩)와 사안(謝安) 등 여러 사람이 함께 모였다. 사안이 은호에게 물었다. \"눈이 가서 온갖 형상에 닿는 것인가, 아니면 온갖 형상이 와서 눈에 들어오는 것인가?\"", ["청담", "지혜"]], ["文學", 49, "人有問殷中軍：「何以將得位而夢棺器，將得財而夢矢穢？」殷曰：「官本是臭腐，所以將得而夢棺屍；財本是糞土，所以將得而夢穢汙。」時人以為名通。", "어떤 사람이 은중군(殷浩)에게 물었다. \"어찌하여 벼슬을 얻으려 할 때면 관(棺)을 꿈꾸고, 재물을 얻으려 할 때면 똥과 더러운 것을 꿈꾸는가?\" 은호가 말하였다. \"벼슬은 본래 썩은 냄새 나는 것이라 얻으려 할 때 관과 시신을 꿈꾸는 것이요, 재물은 본래 똥과 흙이라 얻으려 할 때 더러운 것을 꿈꾸는 것이다.\" 당시 사람들이 명쾌한 풀이라 여겼다.", ["청담", "기지"]], ["文學", 50, "殷中軍被廢東陽，始看佛經。初視維摩詰，疑般若波羅密太多，後見小品，恨此語少。", "은중군(殷浩)이 폐출되어 동양(東陽)으로 옮겨가 비로소 불경을 읽었다. 처음 『유마힐경(維摩詰經)』을 보고는 반야바라밀(般若波羅密)이 너무 많다고 의심하였으나, 뒤에 『소품』을 보고는 이 말이 적은 것을 아쉬워하였다.", ["학문", "권력"]], ["文學", 51, "支道林、殷淵源俱在相王許。相王謂二人：「可試一交言。而才性殆是淵源崤函之固，君其慎焉！」支初作，改轍遠之，數四交，不覺入其玄中。相王撫肩笑曰：「此自是其勝場，安可爭鋒！」", "지둔(支遁)과 은연원(殷浩)이 함께 상왕(相王)의 처소에 있었다. 상왕이 두 사람에게 말하였다. \"한번 시험 삼아 담론을 나눠보시오. 다만 재성(才性)의 논의는 아마도 연원(殷浩)의 효함(崤函)처럼 견고한 진지일 터이니, 그대는 부디 조심하시오!\" 지둔이 처음에는 길을 바꾸어 멀리 돌아갔으나, 네 차례 정도 주고받다가 어느새 그 현묘한 가운데로 끌려 들어갔다. 상왕이 어깨를 어루만지며 웃으며 말하였다. \"이것이 본래 그의 장기인데, 어찌 칼끝을 다툴 수 있겠는가!\"", ["청담", "비평"]], ["文學", 52, "謝公因子弟集聚，問毛詩何句最佳？遏稱曰：「昔我往矣，楊柳依依；今我來思，雨雪霏霏。」公曰：「訏謨定命，遠猷辰告。」謂此句偏有雅人深致。", "사공(謝安)이 자제들이 모인 김에 물었다. \"『시경』에서 어느 구절이 가장 빼어난가?\" 알(遏, 사현)이 일컬어 말하였다. \"'지난날 내가 떠날 적엔 버드나무 하늘하늘하더니, 지금 내가 돌아옴에 진눈깨비 흩날리네.'\" 사공이 말하였다. \"'큰 계획으로 천명을 정하고, 원대한 도모를 때맞춰 알린다.'\" 이 구절에 유독 고아한 사람의 깊은 정취가 있다고 여긴 것이다.", ["학문", "비평"]], ["文學", 53, "張憑舉孝廉出都，負其才氣，謂必參時彥。欲詣劉尹，鄉里及同舉者共笑之。張遂詣劉。劉洗濯料事，處之下坐，唯通寒暑，神意不接。張欲自發無端。頃之，長史諸賢來清言。客主有不通處，張乃遙於末坐判之，言約旨遠，足暢彼我之懷，一坐皆驚。真長延之上坐，清言彌日，因留宿至曉。張退，劉曰：「卿且去，正當取卿共詣撫軍。」張還船，同侶問何處宿？張笑而不答。須臾，真長遣傳教覓張孝廉船，同侶惋愕。即同載詣撫軍。至門，劉前進謂撫軍曰：「下官今日為公得一太常博士妙選！」既前，撫軍與之話言，咨嗟稱善曰：「張憑勃窣為理窟。」即用為太常博士。", "장빙(張憑)이 효렴(孝廉)으로 천거되어 도성으로 나오는데, 자신의 재기를 자부하여 반드시 당대의 명사들과 어깨를 나란히 할 것이라 여겼다. 유윤(劉惔)을 찾아가려 하자, 마을 사람들과 함께 천거된 자들이 다 같이 비웃었다. 장빙은 마침내 유윤을 찾아갔다. 유윤은 몸을 씻고 일을 처리하면서 그를 말석에 앉히고 그저 안부만 묻고는 마음을 트지 않았다. 장빙은 스스로 펼쳐 보이고 싶었으나 단서가 없었다. 얼마 뒤 장사(劉惔)와 여러 현인이 와서 청담을 나누었다. 손님과 주인 사이에 통하지 않는 대목이 있자, 장빙이 멀리 말석에서 그것을 판단하니, 말이 간략하고 뜻이 원대하여 피차의 흉금을 충분히 풀어주매 온 좌중이 다 놀랐다. 진장(劉惔)이 그를 윗자리로 모셔 종일토록 청담하고, 그대로 묵게 하여 새벽에 이르렀다. 장빙이 물러가려 하자 유윤이 말하였다. \"그대는 잠시 가 있게. 마땅히 그대를 데리고 함께 무군(撫軍)을 뵙겠네.\" 장빙이 배로 돌아오자 동행이 어디서 묵었느냐고 물었으나, 장빙은 웃으며 답하지 않았다. 잠시 뒤 진장이 전령을 보내 장효렴의 배를 찾으니 동행이 놀라 어리둥절해하였다. 곧 함께 수레를 타고 무군을 찾아갔다. 문에 이르러 유윤이 앞으로 나아가 무군에게 말하였다. \"하관(下官)이 오늘 공을 위해 태상박사(太常博士)의 빼어난 인선 한 사람을 얻었습니다!\" 앞으로 나아가니 무군이 그와 더불어 이야기를 나누고 감탄하며 훌륭하다 칭찬하여 말하였다. \"장빙은 의젓하게 이치의 보고(寶庫)로다.\" 곧 그를 태상박사로 등용하였다.", ["청담", "재능", "권력"]], ["文學", 54, "汰法師云：「『六通』、『三明』同歸，正異名耳。」", "태법사(汰法師)가 말하였다. \"'육통(六通)'과 '삼명(三明)'은 같은 데로 돌아가니, 다만 이름만 다를 뿐이다.\"", ["청담", "학문"]], ["文學", 55, "支道林、許、謝盛德，共集王家。謝顧謂諸人：「今日可謂彥會，時既不可留，此集固亦難常。當共言詠，以寫其懷。」許便問主人，有莊子不？正得漁父一篇。謝看題，便各使四坐通。支道林先通，作七百許語，敘致精麗，才藻奇拔，眾咸稱善。於是四坐各言懷畢。謝問曰：「卿等盡不？」皆曰：「今日之言，少不自竭。」謝後麤難，因自敘其意，作萬餘語，才峰秀逸。既自難干，加意氣擬託，蕭然自得，四坐莫不厭心。支謂謝曰：「君一往奔詣，故復自佳耳。」", "지둔(支遁)과 허연(許詢), 사안(謝安) 등 큰 덕을 갖춘 이들이 함께 왕씨(王氏)의 집에 모였다. 사안이 여러 사람을 돌아보며 말하였다. \"오늘은 가히 명사들의 모임이라 할 만한데, 시간은 머무르게 할 수 없고 이런 모임도 본래 늘 있기 어렵소. 마땅히 함께 담론하고 읊어 그 회포를 풀어봅시다.\" 허연이 곧 주인에게 『장자』가 있느냐고 물어 마침 「어부(漁父)」 한 편을 얻었다. 사안이 제목을 보고는 곧 좌중에게 각자 풀이하게 하였다. 지둔이 먼저 풀이하여 칠백 마디쯤 되는 말을 지었는데, 서술이 정밀하고 화려하며 문사가 기발하여 뭇사람이 다 훌륭하다 칭찬하였다. 이에 좌중이 각자 회포를 다 말하였다. 사안이 물었다. \"그대들은 다 하였소?\" 모두 말하였다. \"오늘의 담론에 적게나마 스스로를 다하지 않은 것이 없습니다.\" 사안이 뒤에 대충 논란하고는 이어 스스로 그 뜻을 서술하여 만여 마디 말을 지으니, 재주의 봉우리가 빼어나고 뛰어났다. 본래 논박하기 어려운 데다 의기까지 실어 표현하니, 소탈하게 스스로 만족스러워하매 좌중에 마음 흡족해하지 않는 이가 없었다. 지둔이 사안에게 말하였다. \"그대가 단숨에 내달아 도달하니 참으로 절로 훌륭하구려.\"", ["청담", "풍류", "재능"]], ["文學", 56, "殷中軍、孫安國、王、謝能言諸賢，悉在會稽王許。殷與孫共論易象妙於見形。孫語道合，意氣干雲。一坐咸不安孫理，而辭不能屈。會稽王慨然歎曰：「使真長來，故應有以制彼。」既迎真長，孫意己不如。真長既至，先令孫自敘本理。孫麤說己語，亦覺殊不及向。劉便作二百許語，辭難簡切，孫理遂屈。一坐同時拊掌而笑，稱美良久。", "은중군(殷浩)과 손안국(孫綽), 왕씨와 사씨 등 말 잘하는 여러 현인이 모두 회계왕(會稽王)의 처소에 있었다. 은호와 손작이 함께 \"『주역』의 상(象)은 드러난 형상보다 묘하다\"를 논하였다. 손작의 말이 이치에 들어맞아 의기가 구름을 찌를 듯하였다. 좌중이 다 손작의 논리를 받아들이지 못하면서도 말로는 굴복시키지 못하였다. 회계왕이 개탄하며 말하였다. \"진장(劉惔)이 온다면 응당 저를 제압할 방법이 있으리라.\" 진장을 맞이하자 손작은 마음으로 이미 자신이 못 미치리라 여겼다. 진장이 도착하여 먼저 손작에게 본래의 논리를 진술하게 하였다. 손작이 자기 말을 대충 펼쳤으나 스스로도 앞서보다 훨씬 못함을 느꼈다. 유윤이 곧 이백 마디쯤 되는 말을 지으니, 논변이 간결하고 절실하여 손작의 논리가 마침내 굴복하였다. 좌중이 한꺼번에 손뼉 치며 웃고 오래도록 칭찬하였다.", ["청담", "비평", "재능"]], ["文學", 57, "僧意在瓦官寺中，王苟子來，與共語，便使其唱理。意謂王曰：「聖人有情不？」王曰：「無。」重問曰：「聖人如柱邪？」王曰：「如籌算，雖無情，運之者有情。」僧意云：「誰運聖人邪？」苟子不得答而去。", "승의(僧意)가 와관사(瓦官寺)에 있을 때 왕구자(王苟子)가 와서 함께 이야기하다가, 승의가 그에게 이치를 펼치게 하였다. 승의가 왕구자에게 말하였다. \"성인은 정(情)이 있습니까, 없습니까?\" 왕구자가 말하였다. \"없습니다.\" 다시 물었다. \"성인은 기둥과 같습니까?\" 왕구자가 말하였다. \"산가지와 같으니, 비록 정은 없으나 그것을 운용하는 자에게는 정이 있습니다.\" 승의가 말하였다. \"누가 성인을 운용합니까?\" 왕구자는 답하지 못하고 떠났다.", ["청담", "기지", "학문"]], ["文學", 58, "司馬太傅問謝車騎：「惠子其書五車，何以無一言入玄？」謝曰：「故當是其妙處不傳。」", "사마태부(司馬太傅)가 사거기(謝玄)에게 물었다. \"혜자(惠子)의 저서가 다섯 수레나 되는데, 어찌하여 한마디도 현묘한 데로 들어간 것이 없는가?\" 사현이 말하였다. \"본래 그 묘처는 전해지지 않은 것이겠지요.\"", ["청담", "학문"]], ["文學", 59, "殷中軍被廢，徙東陽，大讀佛經，皆精解。唯至「事數」處不解。遇見一道人，問所籤，便釋然。", "은중군(殷浩)이 폐출되어 동양(東陽)으로 옮겨가 불경을 많이 읽었는데 모두 정밀하게 이해하였다. 다만 '사수(事數)' 대목에 이르러서는 이해하지 못하였다. 마침 한 도인을 만나 표지해둔 곳을 물으니 곧 환하게 풀렸다.", ["학문", "청담"]], ["文學", 60, "殷仲堪精覈玄論，人謂莫不研究。殷乃歎曰：「使我解四本，談不翅爾。」", "은중개(殷仲堪)는 현묘한 논의를 정밀하게 따져, 사람들이 그가 연구하지 않은 것이 없다고 일컬었다. 그러나 은중개는 탄식하며 말하였다. \"내가 만약 사본론(四本論)을 깨우쳤다면 담론이 이뿐만은 아니었을 것이다.\"", ["청담", "학문", "겸손"]], ["文學", 61, "殷荊州曾問遠公：「易以何為體？」答曰：「易以感為體。」殷曰：「銅山西崩，靈鍾東應，便是易耶？」遠公笑而不答。", "은형주(殷仲堪)가 일찍이 원공(遠公)에게 물었다. \"『주역』은 무엇으로 체(體)를 삼습니까?\" 원공이 대답하였다. \"『주역』은 감응(感)으로 체를 삼습니다.\" 은중개가 말하였다. \"구리 광산이 서쪽에서 무너지자 신령한 종이 동쪽에서 응하였다는데, 그것이 바로 『주역』의 이치입니까?\" 원공은 웃으며 답하지 않았다.", ["청담", "학문", "기지"]], ["文學", 62, "羊孚弟娶王永言女。及王家見壻，孚送弟俱往。時永言父東陽尚在，殷仲堪是東陽女壻，亦在坐。孚雅善理義，乃與仲堪道齊物。殷難之，羊云：「君四番後，當得見同。」殷笑曰：「乃可得盡，何必相同？」乃至四番後一通。殷咨嗟曰：「僕便無以相異。」歎為新拔者久之。", "양부(羊孚)의 아우가 왕영언(王永言)의 딸에게 장가들었다. 왕씨 집안에서 사위를 보게 되자, 양부가 아우를 배웅하여 함께 갔다. 그때 왕영언의 부친 동양(東陽)이 아직 살아 있었고, 은중개(殷仲堪)가 동양의 사위라 역시 그 자리에 있었다. 양부는 평소 이치와 의론에 능하였는데, 이에 은중개와 「제물론(齊物論)」을 논하였다. 은중개가 그것을 논박하자 양부가 말하였다. \"그대가 네 차례를 주고받은 뒤면 마땅히 견해가 같아질 것입니다.\" 은중개가 웃으며 말하였다. \"다만 끝까지 다할 수는 있으나 어찌 반드시 같아지겠소?\" 마침내 네 차례를 주고받은 뒤 견해가 하나로 통하였다. 은중개가 감탄하여 말하였다. \"나는 더 이상 그대와 다를 것이 없소.\" 그러고는 새로 빼어난 인재라며 오래도록 감탄하였다.", ["청담", "학문", "비평"]], ["文學", 63, "殷仲堪云：「三日不讀道德經，便覺舌本間強。」", "은중개(殷仲堪)가 말하였다. \"사흘 동안 『도덕경』을 읽지 않으면 곧 혀뿌리가 뻣뻣해짐을 느낀다.\"", ["학문", "청담"]], ["文學", 64, "提婆初至，為東亭第講阿毗曇。始發講，坐裁半，僧彌便云：「都已曉。」即於坐分數四有意道人更就餘屋自講。提婆講竟，東亭問法岡道人曰：「弟子都未解，阿彌那得已解？所得云何？」曰：「大略全是，故當小未精覈耳。」", "제바(提婆)가 처음 이르러 동정(王珣)의 집에서 『아비담(阿毗曇)』을 강하였다. 강을 시작하여 자리가 겨우 절반쯤 지났을 때 승미(僧彌, 왕민)가 곧 말하였다. \"이미 다 깨우쳤습니다.\" 그러고는 그 자리에서 뜻을 이해한 도인 서너 명을 나누어, 따로 다른 방에서 스스로 강하게 하였다. 제바가 강을 마치자 동정이 법강도인(法岡道人)에게 물었다. \"제자는 도무지 이해하지 못하였는데, 아미(阿彌, 왕민)는 어찌 벌써 이해하였습니까? 그 얻은 바가 어떻습니까?\" 법강이 말하였다. \"대략은 전부 옳으나, 다만 조금 정밀하게 따지지 못하였을 뿐입니다.\"", ["신동", "학문", "청담"]], ["文學", 65, "桓南郡與殷荊州共談，每相攻難。年餘後，但一兩番。桓自歎才思轉退。殷云：「此乃是君轉解。」", "환남군(桓玄)이 은형주(殷仲堪)와 함께 담론하며 매번 서로 공박하였다. 한 해 남짓 뒤에는 다만 한두 차례만 주고받았다. 환현이 스스로 재주와 사고가 점점 퇴보한다고 탄식하였다. 은중개가 말하였다. \"이것은 도리어 그대의 이해가 깊어진 것이오.\"", ["청담", "비평", "학문"]], ["文學", 66, "文帝嘗令東阿王七步中作詩，不成者行大法。應聲便為詩曰：「煮豆持作羹，漉菽以為汁。萁在釜下然，豆在釜中泣。本自同根生，相煎何太急？」帝深有慚色。", "문제(文帝)가 일찍이 동아왕(東阿王, 조식)에게 일곱 걸음 안에 시를 짓게 하고, 짓지 못하면 큰 법으로 다스리겠다고 하였다. 동아왕이 말소리에 응하여 곧 시를 지었다. \"콩을 삶아 국을 만들고, 콩을 걸러 즙을 짜네. 콩깍지는 솥 아래서 타고, 콩은 솥 안에서 우는구나. 본래 같은 뿌리에서 났거늘, 서로 볶아댐이 어찌 이리 급한가?\" 문제는 깊이 부끄러운 기색을 띠었다.", ["신동", "재능", "원한"]], ["文學", 67, "魏朝封晉文王為公，備禮九錫，文王固讓不受。公卿將校當詣府敦喻。司空鄭沖馳遣信就阮籍求文。籍時在袁孝尼家，宿醉扶起，書札為之，無所點定，乃寫付使。時人以為神筆。", "위(魏) 조정이 진문왕(晉文王, 사마소)을 공(公)으로 봉하고 예를 갖추어 구석(九錫)을 내리자, 문왕이 굳이 사양하여 받지 않았다. 공경과 장교들이 마땅히 그 부(府)로 가서 간곡히 권하기로 하였다. 사공(司空) 정충(鄭沖)이 급히 사람을 보내 완적(阮籍)에게 글을 구하였다. 완적은 그때 원효니(袁孝尼)의 집에 있었는데, 간밤에 취한 채 부축을 받아 일어나 종이에 그것을 써 내려가니, 고치고 정정할 데가 없어 그대로 베껴 사자에게 주었다. 당시 사람들이 신묘한 붓이라 여겼다.", ["재능", "술과취흥", "서화"]], ["文學", 68, "左太沖作三都賦初成，時人互有譏訾，思意不愜。後示張公。張曰：「此二京可三，然君文未重於世，宜以經高名之士。」思乃詢求於皇甫謐。謐見之嗟歎，遂為作敘。於是先相非貳者，莫不斂袵讚述焉。", "좌태충(左太沖)이 「삼도부(三都賦)」를 처음 지었을 때 당시 사람들이 서로 헐뜯고 비난하니 좌사는 마음이 흡족하지 못하였다. 뒤에 장공(張公)에게 보였더니 장공이 말하였다. \"이것은 「이경부(二京賦)」와 더불어 삼부(三賦)라 할 만하오. 그러나 그대의 글이 아직 세상에서 중하게 여겨지지 못하니, 마땅히 명망 높은 선비를 거쳐야 할 것이오.\" 좌사가 이에 황보밀(皇甫謐)에게 물어 청하니, 황보밀이 그것을 보고 감탄하여 마침내 서문을 지어 주었다. 그러자 먼저 비난하고 두 마음을 품던 자들이 옷깃을 여미고 찬술하지 않는 이가 없었다.", ["학문", "비평", "재능"]], ["文學", 69, "劉伶著酒德頌，意氣所寄。", "유령(劉伶)이 「주덕송(酒德頌)」을 지었으니, 자기 뜻과 기개를 거기에 부친 것이었다.", ["술과취흥", "학문", "풍류"]], ["文學", 70, "樂令善於清言，而不長於手筆。將讓河南尹，請潘岳為表。潘云：「可作耳。要當得君意。」樂為述己所以為讓，標位二百許語。潘直取錯綜，便成名筆。時人咸云：「若樂不假潘之文，潘不取樂之旨，則無以成斯矣。」", "악령(樂廣, 樂令)은 청언(淸言)에 능하였으나 글 솜씨에는 뛰어나지 못하였다. 하남윤(河南尹)의 직을 사양하려 할 때 반악(潘岳)에게 표문을 지어 달라고 청하였다. 반악이 말하였다. \"지을 수는 있지만 반드시 그대의 뜻을 얻어야 하오.\" 악광이 자기가 사양하려는 까닭을 서술하여 이백여 마디로 그 요지를 세워 놓으니, 반악이 그것을 그대로 가져다 짜 맞추어 곧 이름난 글을 이루었다. 당시 사람들이 모두 말하였다. \"만약 악광이 반악의 글을 빌리지 않고, 반악이 악광의 요지를 취하지 않았다면 이를 이루지 못하였을 것이다.\"", ["재능", "청담", "거절"]], ["文學", 71, "夏侯湛作周詩成，示潘安仁。安仁曰：「此非徒溫雅，乃別見孝悌之性。」潘因此遂作家風詩。", "하후담(夏侯湛)이 「주시(周詩)」를 지어 반안인(潘安仁, 潘岳)에게 보였다. 안인이 말하였다. \"이는 한갓 온화하고 우아할 뿐 아니라 효제(孝悌)의 성품을 따로 드러내었구려.\" 반악이 이로 인하여 마침내 「가풍시(家風詩)」를 지었다.", ["학문", "효", "비평"]], ["文學", 72, "孫子荊除婦服，作詩以示王武子。王曰：「未知文生於情，情生於文。覽之悽然，增伉儷之重。」", "손자형(孫子荊)이 아내의 상복을 벗고 시를 지어 왕무자(王武子)에게 보였다. 왕무자가 말하였다. \"글이 정에서 생기는지 정이 글에서 생기는지는 알 수 없으나, 이를 보니 처연하여 부부의 정의 무거움이 더해지는구려.\"", ["부부", "죽음", "학문"]], ["文學", 73, "太叔廣甚辯給，而摯仲治長於翰墨，俱為列卿。每至公坐，廣談，仲治不能對。退著筆難廣，廣又不能答。", "태숙광(太叔廣)은 매우 말솜씨가 뛰어났고 지중치(摯仲治)는 글솜씨에 능하여 함께 열경(列卿)이 되었다. 매번 공적인 자리에 이르면 태숙광이 담론하니 지중치가 대응하지 못하였다. 그러나 물러나서는 글을 지어 태숙광을 논박하니 태숙광 또한 답하지 못하였다.", ["청담", "재능", "비평"]], ["文學", 74, "江左殷太常父子，並能言理，亦有辯訥之異。揚州口談至劇，太常輒云：「汝更思吾論。」", "강좌(江左)의 은태상(殷太常) 부자(父子)는 모두 이치(理)를 잘 논하였는데, 또한 말 잘함과 어눌함의 차이가 있었다. 양주(揚州)의 입담이 지극히 격렬할 때면 태상이 번번이 말하였다. \"너는 다시 내 논의를 생각해 보아라.\"", ["청담", "학문", "비평"]], ["文學", 75, "庾子嵩作意賦成，從子文康見，問曰：「若有意邪？非賦之所盡；若無意邪？復何所賦？」答曰：「正在有意無意之間。」", "유자숭(庾子嵩)이 「의부(意賦)」를 지어 마치니, 조카 문강(文康, 庾亮)이 보고 물었다. \"뜻이 있다고 한다면 부(賦)로 다 표현할 수 없을 것이요, 뜻이 없다고 한다면 또 무엇을 부로 짓겠습니까?\" 유자숭이 답하였다. \"바로 뜻이 있음과 없음의 사이에 있느니라.\"", ["학문", "기지", "청담"]], ["文學", 76, "郭景純詩云：「林無靜樹，川無停流。」阮孚云：「泓崢蕭瑟，實不可言。每讀此文，輒覺神超形越。」", "곽경순(郭景純)의 시에 이르기를 \"숲에는 고요한 나무가 없고, 냇물에는 멈춘 흐름이 없다\"라고 하였다. 완부(阮孚, 阮咸)가 말하였다. \"깊고 높고 쓸쓸하니 실로 말로 다할 수 없다. 매번 이 글을 읽을 때마다 정신이 초탈하고 형체가 벗어나는 듯한 느낌이 든다.\"", ["학문", "풍류", "은둔"]], ["文學", 77, "庾闡始作揚都賦，道溫庾云：「溫挺義之標，庾作民之望。方響則金聲，比德則玉亮。」庾公聞賦成，求看，兼贈貺之。闡更改「望」為「儁」，以「亮」為「潤」云。", "유천(庾闡)이 처음 「양도부(揚都賦)」를 지을 때 환온(桓溫)과 유량(庾亮)을 일컬어 말하였다. \"환온은 의(義)의 표준을 곧게 세웠고, 유량은 백성의 우러름이 되었다. 소리에 견주면 쇠 소리요, 덕에 견주면 옥의 밝음이라.\" 유량이 부가 완성되었다는 말을 듣고 보기를 청하며 아울러 선물을 보내었다. 유천은 곧 '망(望)'을 '준(儁)'으로 고치고 '량(亮)'을 '윤(潤)'으로 고쳤다고 한다.", ["학문", "비평", "권력"]], ["文學", 78, "孫興公作庾公誄。袁羊曰：「見此張緩。」于時以為名賞。", "손흥공(孫興公, 孫綽)이 「유공뢰(庾公誄)」를 지었다. 원양(袁羊)이 말하였다. \"이를 보니 펼치면 느슨해지는구나.\" 당시에 이를 이름난 평이라 여겼다.", ["학문", "비평"]], ["文學", 79, "庾仲初作揚都賦成，以呈庾亮。亮以親族之懷，大為其名價云：「可三二京，四三都。」於此人人競寫，都下紙為之貴。謝太傅云：「不得爾。此是屋下架屋耳，事事擬學，而不免儉狹。」", "유중초(庾仲初)가 「양도부(揚都賦)」를 지어 마치고 유량(庾亮)에게 바쳤다. 유량이 친족의 정으로 그 명성과 값을 크게 올려 말하였다. \"「이경부」와 더불어 삼부라 할 만하고, 「삼도부」와 더불어 사부라 할 만하다.\" 이에 사람마다 다투어 베껴 써서 도성의 종이값이 그 때문에 올랐다. 사태부(謝安)가 말하였다. \"그래서는 안 된다. 이는 집 아래에 또 집을 세운 격일 뿐이다. 일마다 모방하여 본떴으니 옹색함을 면하지 못한다.\"", ["학문", "비평"]], ["文學", 80, "習鑿齒史才不常，宣武甚器之，未三十，便用為荊州治中。鑿齒謝牋亦云：「不遇明公，荊州老從事耳！」後至都見簡文，返命，宣武問「見相王何如？」答云：「一生不曾見此人！」從此忤旨，出為衡陽郡，性理遂錯。於病中猶作漢晉春秋，品評卓逸。", "습착치(習鑿齒)는 사학(史學)의 재능이 비범하여 환온(宣武)이 그를 매우 아껴 서른이 되기도 전에 형주치중(荊州治中)으로 등용하였다. 습착치의 사례하는 편지에도 이렇게 적혀 있었다. \"명공(明公)을 만나지 못하였다면 형주의 늙은 종사(從事)에 그쳤을 것입니다!\" 뒷날 도성에 이르러 간문제(簡文帝)를 뵙고 돌아와 복명할 때, 환온이 \"상왕(相王)을 뵈니 어떠하던가?\" 하고 물었다. 답하기를 \"평생 이런 인물을 본 적이 없습니다!\" 하였다. 이로부터 환온의 뜻을 거슬러 형양군(衡陽郡)으로 좌천되니, 마음의 이치가 마침내 어지러워졌다. 그러나 병중에도 오히려 「한진춘추(漢晉春秋)」를 지었으니 그 품평이 탁월하였다.", ["재능", "학문", "권력", "비평"]], ["文學", 81, "孫興公云：「三都、二京，五經鼓吹。」", "손흥공(孫興公)이 말하였다. \"「삼도부」와 「이경부」는 오경(五經)의 고취(鼓吹, 반주)다.\"", ["학문", "비평"]], ["文學", 82, "謝太傅問主簿陸退「張憑何以作母誄而不作父誄？」退答曰：「故當是丈夫之德，表於事行；婦人之美，非誄不顯。」", "사태부(謝安)가 주부(主簿) 육퇴(陸退)에게 물었다. \"장빙(張憑)은 어찌하여 어머니의 뇌문(誄文)은 짓고 아버지의 뇌문은 짓지 않았는가?\" 육퇴가 답하였다. \"본래 장부의 덕은 행적에 드러나지만, 부인의 아름다움은 뇌문이 아니면 드러나지 않기 때문입니다.\"", ["학문", "기지", "비평"]], ["文學", 83, "王敬仁年十三，作賢人論。長史送示真長，真長答云：「見敬仁所作論，便足參微言。」", "왕경인(王敬仁, 王脩)이 열세 살에 「현인론(賢人論)」을 지었다. 부친 장사(長史)가 이를 진장(眞長, 劉惔)에게 보냈더니 진장이 답하였다. \"경인이 지은 논(論)을 보니 충분히 미묘한 말에 참여할 만하다.\"", ["신동", "학문", "비평"]], ["文學", 84, "孫興公云：「潘文爛若披錦，無處不善；陸文若排沙簡金，往往見寶。」", "손흥공(孫興公)이 말하였다. \"반악(潘岳)의 글은 비단을 펼친 듯 찬란하여 좋지 않은 데가 없고, 육기(陸機)의 글은 모래를 헤쳐 금을 가려내는 듯하여 이따금 보배가 보인다.\"", ["비평", "학문"]], ["文學", 85, "簡文稱許掾云：「玄度五言詩，可謂妙絕時人。」", "간문제(簡文帝)가 허연(許掾, 許詢)을 칭찬하여 말하였다. \"현도(玄度, 허순)의 오언시(五言詩)는 당시 사람들 가운데 절묘하기 그지없다고 할 만하다.\"", ["비평", "학문"]], ["文學", 86, "孫興公作天台賦成，以示范榮期，云：「卿試擲地，要作金石聲。」范曰：「恐子之金石，非宮商中聲！」然每至佳句，輒云：「應是我輩語。」", "손흥공(孫興公)이 「천태부(天台賦)」를 지어 마치고 범영기(范榮期)에게 보이며 말하였다. \"그대 한번 땅에 던져 보시오. 반드시 쇠와 돌 소리가 날 것이오.\" 범영기가 말하였다. \"그대의 쇠와 돌은 아마도 궁상(宮商)의 가락에 맞는 소리는 아닐 듯하오!\" 그러나 좋은 구절에 이를 때마다 번번이 말하였다. \"이는 응당 우리네 말이로구나.\"", ["학문", "비평", "재능"]], ["文學", 87, "桓公見謝安石作簡文謚議，看竟，擲與坐上諸客曰：「此是安石碎金。」", "환공(桓溫)이 사안석(謝安石, 謝安)이 지은 간문제의 시호 의론(謚議)을 보고, 다 읽고 나서 자리에 있던 여러 손님에게 던지며 말하였다. \"이는 안석의 부서진 금붙이로다.\"", ["비평", "학문"]], ["文學", 88, "袁虎少貧，嘗為人傭載運租。謝鎮西經船行，其夜清風朗月，聞江渚間估客船上有詠詩聲，甚有情致。所誦五言，又其所未嘗聞，歎美不能已。即遣委曲訊問，乃是袁自詠其所作詠史詩。因此相要，大相賞得。", "원호(袁虎, 袁宏)는 젊어서 가난하여 일찍이 남에게 고용되어 조세 운반선을 모는 일을 하였다. 사진서(謝鎮西, 謝尚)가 배를 타고 지나가는데, 그날 밤 맑은 바람에 달이 밝았다. 강가 모래톱의 상선 위에서 시를 읊는 소리가 들렸는데 매우 정취가 있었다. 읊는 오언시가 또한 일찍이 들어 보지 못한 것이어서 감탄해 마지않았다. 곧 사람을 보내어 자세히 물으니, 바로 원호가 자기가 지은 「영사시(詠史詩)」를 읊은 것이었다. 이로 인하여 그를 불러 맞이하고 크게 알아주었다.", ["학문", "청빈", "재능"]], ["文學", 89, "孫興公云：「潘文淺而淨，陸文深而蕪。」", "손흥공(孫興公)이 말하였다. \"반악(潘岳)의 글은 얕으나 깔끔하고, 육기(陸機)의 글은 깊으나 어수선하다.\"", ["비평", "학문"]], ["文學", 90, "裴郎作語林，始出，大為遠近所傳。時流年少，無不傳寫，各有一通。載王東亭作經王公酒壚下賦，甚有才情。", "배랑(裴郎, 裴啓)이 「어림(語林)」을 지으니, 처음 나오자 멀고 가까운 곳에서 크게 전해졌다. 당시의 명류와 젊은이들이 베껴 쓰지 않는 이가 없어 저마다 한 부씩 갖추었다. 거기에 왕동정(王東亭, 王珣)이 지은 「경왕공주로하부(經王公酒壚下賦)」가 실려 있었는데 매우 재기와 정취가 있었다.", ["학문", "재능", "비평"]], ["文學", 91, "謝萬作八賢論，與孫興公往反，小有利鈍。謝後出以示顧君齊，顧曰：「我亦作，知卿當無所名。」", "사만(謝萬)이 「팔현론(八賢論)」을 지어 손흥공(孫興公)과 더불어 주고받으며 논박하였는데 다소 우열이 있었다. 사만이 뒤에 이를 가지고 나가 고군제(顧君齊)에게 보이니, 고군제가 말하였다. \"나도 한번 지어 보겠소. 그러면 그대가 이름을 얻지 못할 것이오.\"", ["학문", "비평", "재능"]], ["文學", 92, "桓宣武命袁彥伯作北征賦，既成，公與時賢共看，咸嗟歎之。時王珣在坐云：「恨少一句，得寫字足韻，當佳。」袁即於坐攬筆益云：「感不絕於余心，泝流風而獨寫。」公謂王曰：「當今不得不以此事推袁。」", "환선무(桓溫, 桓宣武)가 원언백(袁彥伯, 袁宏)에게 「북정부(北征賦)」를 짓게 하였는데, 다 짓고 나니 환공이 당시의 현사들과 함께 보고 모두 감탄하였다. 그때 왕순(王珣)이 자리에 있다가 말하였다. \"한 구절이 부족함이 아쉽소. '사(寫)' 자를 써서 운(韻)을 채우면 좋을 것이오.\" 원호가 곧 자리에서 붓을 잡아 덧붙여 말하였다. \"감회가 내 마음에 끊이지 않으니, 흐르는 바람을 거슬러 홀로 펼쳐 보내노라.\" 환공이 왕순에게 말하였다. \"오늘날 이 일만은 원호에게 미루지 않을 수 없소.\"", ["재능", "학문", "비평"]], ["文學", 93, "孫興公道：「曹輔佐才如白地明光錦，裁為負版絝，非無文采，酷無裁製。」", "손흥공(孫興公)이 말하였다. \"조보좌(曹輔佐)의 재주는 백지명광금(白地明光錦, 흰 바탕의 광채 나는 비단) 같으니, 짐꾼의 바지로 마름질한다면 무늬와 채색이 없는 것은 아니나 마름질이 몹시 없는 것이다.\"", ["비평", "재능"]], ["文學", 94, "袁伯彥作名士傳成，見謝公。公笑曰：「我嘗與諸人道江北事，特作狡獪耳！」彥伯遂以箸書。", "원백언(袁伯彥, 袁宏)이 「명사전(名士傳)」을 지어 마치고 사공(謝安)을 찾아뵈었다. 사공이 웃으며 말하였다. \"내가 일찍이 여러 사람과 강북(江北)의 일을 이야기한 것은 그저 장난삼아 한 것일 뿐이었소!\" 그런데 백언이 마침내 그것을 글로 적어 책으로 만든 것이었다.", ["학문", "기지"]], ["文學", 95, "王東亭到桓公吏，既伏閣下，桓令人竊取其白事。東亭即於閣下更作，無復向一字。", "왕동정(王東亭, 王珣)이 환공(桓溫)의 관리로 부임하여 합문(閤門) 아래 엎드려 있을 때, 환온이 사람을 시켜 그가 올린 보고서를 몰래 가져오게 하였다. 동정은 곧 합문 아래에서 다시 지었는데 앞서 쓴 것과 한 글자도 같지 않았다.", ["재능", "학문"]], ["文學", 96, "桓宣武北征，袁虎時從，被責免官。會須露布文，喚袁倚馬前令作。手不輟筆，俄得七紙，殊可觀。東亭在側，極歎其才。袁虎云：「當令齒舌間得利。」", "환선무(桓宣武, 桓溫)가 북정(北征)할 때 원호(袁虎)가 그때 따라갔다가 견책을 받아 관직을 잃었다. 마침 노포문(露布文, 격문)이 필요하게 되어 원호를 불러 말 앞에 기대어 짓게 하였다. 손에서 붓을 놓지 않고 잠깐 사이에 일곱 장을 써내니 자못 볼 만하였다. 동정(王珣)이 곁에 있다가 그 재주를 몹시 감탄하였다. 원호가 말하였다. \"마땅히 입과 혀 사이에서 이득을 얻어야지요.\"", ["재능", "기지"]], ["文學", 97, "袁宏始作東征賦，都不道陶公。胡奴誘之狹室中，臨以白刃，曰：「先公勳業如是！君作東征賦，云何相忽略？」宏窘蹙無計，便答：「我大道公，何以云無？」因誦曰：「精金百鍊，在割能斷。功則治人，職思靖亂。長沙之勳，為史所讚。」", "원굉(袁宏)이 처음 「동정부(東征賦)」를 지을 때 도공(陶侃)에 대해서는 전혀 말하지 않았다. 호노(胡奴, 陶範)가 그를 좁은 방으로 꾀어 들여 시퍼런 칼을 들이대며 말하였다. \"선친의 공훈과 업적이 이러한데 그대가 「동정부」를 지으면서 어찌하여 소홀히 하셨소?\" 원굉이 궁지에 몰려 어찌할 도리가 없자 곧 답하였다. \"내가 도공을 크게 다루었거늘 어찌 없다고 하시오?\" 그러고는 읊었다. \"순금은 백 번 단련되어 자르면 능히 끊어지도다. 공으로는 사람을 다스리고, 직책으로는 난을 평정함을 생각하였네. 장사(長沙)의 공훈은 사서에 칭송되도다.\"", ["용기", "재능", "효"]], ["文學", 98, "或問顧長康：「君箏賦何如嵇康琴賦？」顧曰：「不賞者作後出相遺，深識者亦以高奇見貴。」", "어떤 이가 고장강(顧長康, 顧愷之)에게 물었다. \"그대의 「쟁부(箏賦)」는 혜강(嵇康)의 「금부(琴賦)」와 비하면 어떠하오?\" 고개지가 답하였다. \"감상할 줄 모르는 자는 나중에 나왔다 하여 버릴 것이나, 깊이 아는 자는 또한 높고 기이하다 하여 귀히 여길 것이오.\"", ["비평", "재능"]], ["文學", 99, "殷仲文天才宏贍，而讀書不甚廣，博亮歎曰：「若使殷仲文讀書半袁豹，才不減班固。」", "은중문(殷仲文)은 천부의 재능이 넓고 풍부하였으나 독서는 그리 폭넓지 못하였다. 부량(博亮)이 감탄하여 말하였다. \"만약 은중문이 원표(袁豹)의 절반만큼 책을 읽게 한다면 그 재주는 반고(班固)에 못지않을 것이다.\"", ["비평", "학문", "재능"]], ["文學", 100, "羊孚作雪贊云：「資清以化，乘氣以霏。遇象能鮮，即潔成輝。」桓胤遂以書扇。", "양부(羊孚)가 「설찬(雪贊)」을 지어 말하였다. \"맑음에 의지하여 화하고, 기운을 타고 흩날린다. 형상을 만나면 능히 선명해지고, 깨끗함에 나아가 빛을 이룬다.\" 환윤(桓胤)이 마침내 이를 부채에 써 넣었다.", ["재능", "학문"]], ["文學", 101, "王孝伯在京行散，至其弟王睹戶前，問：「古詩中何句為最？」睹思未答。孝伯詠「所遇無故物，焉得不速老」，此句為佳。", "왕효백(王孝伯, 王恭)이 도성에서 약을 먹고 거닐다가 그 아우 왕도(王睹)의 문 앞에 이르러 물었다. \"고시(古詩) 가운데 어느 구절이 가장 뛰어나냐?\" 왕도가 생각하느라 미처 답하지 못하였다. 효백이 \"만나는 것마다 옛 물건이 없으니 어찌 빨리 늙지 않으리\" 하고 읊으며, 이 구절이 가장 좋다고 하였다.", ["학문", "병과늙음", "풍류"]], ["文學", 102, "桓玄嘗登江陵城南樓云：「我今欲為王孝伯作誄。」因吟嘯良久，隨而下筆。一坐之間，誄以之成。", "환현(桓玄)이 일찍이 강릉성(江陵城) 남루(南樓)에 올라 말하였다. \"내가 지금 왕효백(王孝伯)을 위해 뇌문(誄文)을 지으려 한다.\" 그러고는 한참 동안 읊조리다가 이어 붓을 들었다. 한자리에 앉아 있는 사이에 뇌문이 그대로 완성되었다.", ["재능", "죽음"]], ["文學", 103, "桓玄初并西夏，領荊江二州，二府一國。于時始雪，五處俱賀，五版並入。玄在聽事上，版至即答。版後皆粲然成章，不相揉雜。", "환현(桓玄)이 처음 서하(西夏)를 병합하여 형주(荊州)와 강주(江州) 두 주를 거느렸으니, 두 막부(府)와 한 봉국(國)을 다스렸다. 그때 막 눈이 내려 다섯 곳에서 함께 하례하여 다섯 통의 글이 한꺼번에 들어왔다. 환현이 청사(廳事) 위에 있다가 글이 이르는 대로 곧바로 답하였는데, 답한 글이 모두 찬연히 문장을 이루어 서로 뒤섞이지 않았다.", ["재능", "권력"]], ["文學", 104, "桓玄下都，羊孚時為兗州別駕，從京來詣門，牋云：「自頃世故睽離，心事淪薀。明公啟晨光於積晦，澄百流以一源。」桓見牋，馳喚前，云：「子道，子道，來何遲？」即用為記室參軍。孟昶為劉牢之主簿，詣門謝，見云：「羊侯，羊侯，百口賴卿！」", "환현(桓玄)이 도성으로 내려올 때, 양부(羊孚)는 그때 연주별가(兗州別駕)로 있다가 경사(京師)에서 와서 문 앞에 이르러 편지를 올려 말하였다. \"근래 세상의 변고로 헤어지고 흩어져 마음속 일이 깊이 잠겨 있었습니다. 명공(明公)께서 쌓인 어둠 속에 새벽빛을 여시고, 온갖 흐름을 맑혀 하나의 근원으로 모으셨습니다.\" 환현이 편지를 보고 급히 불러 앞으로 나오게 하며 말하였다. \"자도(子道)여, 자도여, 어찌 이리 늦게 왔는가?\" 곧 그를 기실참군(記室參軍)으로 삼았다. 맹창(孟昶)은 유뇌지(劉牢之)의 주부(主簿)였는데, 문 앞에 이르러 사례하니 환현이 보고 말하였다. \"양후(羊侯)여, 양후여, 백 식구가 그대에게 달렸소!\"", ["기지", "권력", "재능"]], ["方正", 1, "陳太丘與友期行，期日中。過中不至，太丘舍去，去後乃至。元方時年七歲，門外戲。客問元方：「尊君在不？」答曰：「待君久不至，已去。」友人便怒曰：「非人哉！與人期行，相委而去。」元方曰：「君與家君期日中。日中不至，則是無信；對子罵父，則是無禮。」友人慚，下車引之。元方入門不顧。", "진태구(陳太丘, 陳寔)가 벗과 함께 가기로 약속하였는데, 정오로 기약하였다. 정오가 지나도 벗이 오지 않자 태구는 버려두고 떠났는데, 떠난 뒤에야 벗이 이르렀다. 원방(元方)이 그때 일곱 살이었는데 문밖에서 놀고 있었다. 손이 원방에게 물었다. \"춘부장께서 계시느냐?\" 원방이 답하였다. \"한참 기다리셔도 오시지 않아 이미 떠나셨습니다.\" 벗이 곧 노하여 말하였다. \"사람이 아니로구나! 남과 함께 가기로 약속하고서 버려두고 떠나다니.\" 원방이 말하였다. \"어른께서는 제 아버지와 정오로 약속하셨습니다. 정오에 오지 않으셨으니 이는 신의가 없는 것이요, 자식 앞에서 그 아비를 꾸짖으시니 이는 예의가 없는 것입니다.\" 벗이 부끄러워하며 수레에서 내려 그를 끌어당기려 하였으나, 원방은 문 안으로 들어가 돌아보지 않았다.", ["신동", "기지", "충직"]], ["方正", 2, "南陽宗世林，魏武同時，而甚薄其為人，不與之交。及魏武作司空，總朝政，從容問宗曰：「可以交未？」答曰：「松柏之志猶存。」世林既以忤旨見疏，位不配德。文帝兄弟每造其門，皆獨拜牀下，其見禮如此。", "남양(南陽)의 종세림(宗世林)은 위무제(魏武帝, 曹操)와 같은 시대 사람이었는데 그 사람됨을 몹시 가벼이 여겨 사귀려 하지 않았다. 위무제가 사공(司空)이 되어 조정의 정사를 총괄하게 되자, 조용히 종세림에게 물었다. \"이제는 사귈 수 있겠소?\" 종세림이 답하였다. \"송백(松柏)의 뜻이 아직 그대로 있소.\" 종세림은 이미 위무제의 뜻을 거슬러 멀리 배척당하여 지위가 덕에 걸맞지 못하였다. 문제(文帝, 曹丕) 형제가 매번 그의 문에 찾아갈 때마다 모두 홀로 평상 아래에서 절하였으니, 그가 받는 예우가 이와 같았다.", ["충직", "거절"]], ["方正", 3, "魏文帝受禪，陳羣有慼容。帝問曰：「朕應天受命，卿何以不樂？」羣曰：「臣與華歆，服膺先朝，今雖欣聖化，猶義形於色。」", "위문제(魏文帝, 曹丕)가 선양을 받자 진군(陳羣)이 근심하는 기색을 띠었다. 황제가 물었다. \"짐이 하늘에 응하여 천명을 받았거늘 경은 어찌 즐거워하지 않는가?\" 진군이 말하였다. \"신은 화흠(華歆)과 더불어 선조(先朝)를 마음에 새겨 받들었으니, 지금 비록 성상의 교화를 기뻐하나 의리가 오히려 얼굴빛에 드러나는 것입니다.\"", ["충직", "권력"]], ["方正", 4, "郭淮作關中都督，甚得民情，亦屢有戰庸。淮妻，太尉王凌之妹，坐凌事當并誅。使者徵攝甚急，淮使戒裝，克日當發。州府文武及百姓勸淮舉兵，淮不許。至期，遣妻，百姓號泣追呼者數萬人。行數十里，淮乃命左右追夫人還，於是文武奔馳，如徇身首之急。既至，淮與宣帝書曰：「五子哀戀，思念其母，其母既亡，則無五子。五子若殞，亦復無淮。」宣帝乃表，特原淮妻。", "곽회(郭淮)가 관중도독(關中都督)이 되어 백성의 마음을 크게 얻었고 또 여러 차례 전공을 세웠다. 곽회의 아내는 태위(太尉) 왕릉(王凌)의 누이였는데, 왕릉의 사건에 연좌되어 함께 주살되게 되었다. 사자가 매우 급하게 잡아들이려 하니, 곽회는 행장을 차리게 하고 날을 정하여 떠나보내기로 하였다. 주부(州府)의 문무관과 백성들이 곽회에게 군사를 일으키라 권하였으나 곽회는 허락하지 않았다. 정한 날이 되어 아내를 떠나보내니, 통곡하며 따라가 부르짖는 백성이 수만 명이었다. 수십 리를 갔을 때 곽회가 마침내 좌우에게 명하여 부인을 쫓아가 돌아오게 하니, 이에 문무관들이 내달려 마치 제 목숨을 구하려는 듯 급하였다. 부인이 돌아오자 곽회가 선제(宣帝, 司馬懿)에게 편지를 올려 말하였다. \"다섯 자식이 애처로이 그리워하며 그 어미를 사모하는데, 그 어미가 죽으면 다섯 자식이 없게 되고, 다섯 자식이 죽으면 또한 이 곽회도 없게 됩니다.\" 선제가 이에 표를 올려 특별히 곽회의 아내를 사면해 주었다.", ["도량", "부부", "권력"]], ["方正", 5, "諸葛亮之次渭濱，關中震動。魏明帝深懼晉宣王戰，乃遣辛毗為軍司馬。宣王既與亮對渭而陳，亮設誘譎萬方。宣王果大忿，將欲應之以重兵。亮遣間諜覘之，還曰：「有一老夫，毅然仗黃鉞，當軍門立，軍不得出。」亮曰：「此必辛佐治也。」", "제갈량(諸葛亮)이 위수(渭水) 가에 진을 치니 관중(關中)이 진동하였다. 위(魏) 명제(明帝)는 진(晉) 선왕(宣王)이 싸울까 깊이 두려워하여 신비(辛毗)를 군사마(軍司馬)로 보냈다. 선왕이 제갈량과 위수를 사이에 두고 진을 마주하자, 제갈량은 온갖 방법으로 유인하고 속였다. 선왕이 과연 크게 노하여 중병(重兵)으로 응하려 하였다. 제갈량이 첩자를 보내어 정탐하게 하니, 돌아와 말하기를 \"한 노인이 있어 굳세게 황월(黃鉞)을 짚고 군문(軍門)에 막아서니, 군대가 나오지 못합니다\"라고 하였다. 제갈량이 말하기를 \"이는 반드시 신좌치(辛佐治, 辛毗)일 것이다\"라고 하였다.", ["지혜", "술수", "예언", "제갈씨"]], ["方正", 6, "夏侯玄既被桎梏，時鍾毓為廷尉，鍾會先不與玄相知，因便狎之。玄曰：「雖復刑餘之人，未敢聞命！」考掠初無一言，臨刑東市，顏色不異。", "하후현(夏侯玄)이 차꼬와 수갑을 차게 되었을 때, 당시 종육(鍾毓)이 정위(廷尉)로 있었다. 종회(鍾會)는 전부터 하후현과 서로 알지 못하였는데, 이를 틈타 곧 그에게 함부로 굴었다. 하후현이 말하기를 \"비록 형벌을 받은 사람이라 하나, 그 명을 감히 받들 수 없소!\"라고 하였다. 고문을 받으면서도 처음부터 한 마디도 하지 않았고, 동시(東市)에서 형을 받을 때에도 안색이 변하지 않았다.", ["담대한죽음", "용기", "충직"]], ["方正", 7, "夏侯泰初與廣陵陳本善。本與玄在本母前宴飲，本弟騫行還，徑入，至堂戶。泰初因起曰：「可得同，不可得而雜。」", "하후태초(夏侯泰初, 夏侯玄)는 광릉(廣陵)의 진본(陳本)과 사이가 좋았다. 진본이 하후현과 함께 진본의 어머니 앞에서 연회를 열어 술을 마셨다. 진본의 아우 진건(陳騫)이 밖에서 돌아와 곧장 들어와 마루의 문에 이르렀다. 하후태초가 이에 일어나며 말하기를 \"함께 어울릴 수는 있으나, 뒤섞일 수는 없소\"라고 하였다.", ["충직", "비평"]], ["方正", 8, "高貴鄉公薨，內外諠譁。司馬文王問侍中陳泰曰：「何以靜之？」泰云：「唯殺賈充，以謝天下。」文王曰：「可復下此不？」對曰：「但見其上，未見其下。」", "고귀향공(高貴鄕公)이 죽으니 안팎이 떠들썩하였다. 사마문왕(司馬文王, 司馬昭)이 시중(侍中) 진태(陳泰)에게 물었다. \"무엇으로 이를 진정시키겠소?\" 진태가 말하기를 \"오직 가충(賈充)을 죽여 천하에 사죄하는 것뿐입니다\"라고 하였다. 문왕이 말하기를 \"그보다 한 단계 낮출 수는 없겠소?\"라고 하자, 대답하기를 \"다만 그보다 위만 보일 뿐, 그보다 아래는 보이지 않습니다\"라고 하였다.", ["충직", "간언", "권력"]], ["方正", 9, "和嶠為武帝所親重，語嶠曰：「東宮頃似更成進，卿試往看。」還問「何如？」答云：「皇太子聖質如初。」", "화교(和嶠)는 무제(武帝)의 친애와 중용을 받았는데, 무제가 화교에게 말하기를 \"동궁(東宮, 태자)이 요즘 더 진보한 듯하니, 경이 한번 가서 보시오\"라고 하였다. 돌아오자 \"어떠하던가?\"라고 물으니, 대답하기를 \"황태자의 성스러운 자질은 처음과 같습니다\"라고 하였다.", ["충직", "간언", "비평"]], ["方正", 10, "諸葛靚後入晉，除大司馬，召不起。以與晉室有讎，常背洛水而坐。與武帝有舊，帝欲見之而無由，乃請諸葛妃呼靚。既來，帝就太妃間相見。禮畢，酒酣，帝曰：「卿故復憶竹馬之好不？」靚曰：「臣不能吞炭漆身，今日復覩聖顏。」因涕泗百行。帝於是慚悔而出。", "제갈정(諸葛靚)은 뒤에 진(晉)에 들어와 대사마(大司馬)에 임명되었으나 부름을 받고도 나아가지 않았다. 진 왕실과 원한이 있었으므로 늘 낙수(洛水)를 등지고 앉았다. 무제(武帝)와는 옛 정분이 있어 무제가 그를 만나고자 하였으나 방법이 없자, 제갈비(諸葛妃)에게 청하여 제갈정을 부르게 하였다. 그가 오자 무제는 태비(太妃)의 처소에서 만났다. 예가 끝나고 술이 무르익자 무제가 말하기를 \"경은 아직도 죽마(竹馬) 타던 옛 정을 기억하시오?\"라고 하였다. 제갈정이 말하기를 \"신은 숯을 삼키고 몸에 옻칠을 하지 못하여, 오늘 다시 성스러운 얼굴을 뵙게 되었습니다\"라고 하며 눈물 콧물을 줄줄 흘렸다. 무제는 이에 부끄럽고 후회하며 나갔다.", ["충직", "원한", "죽음", "제갈씨"]], ["方正", 11, "武帝語和嶠曰：「我欲先痛罵王武子，然後爵之。」嶠曰：「武子儁爽，恐不可屈。」帝遂召武子，苦責之，因曰：「知愧不？」武子曰：「『尺布斗粟』之謠，常為陛下恥之！它人能令疎親，臣不能使親疎，以此愧陛下。」", "무제(武帝)가 화교(和嶠)에게 말하기를 \"내가 먼저 왕무자(王武子, 王濟)를 통렬히 꾸짖은 다음에 작위를 주려 하오\"라고 하였다. 화교가 말하기를 \"무자는 뛰어나고 기개가 있어 굽히지 않을까 합니다\"라고 하였다. 무제가 마침내 무자를 불러 호되게 책망하고는 \"부끄러운 줄 아는가?\"라고 하였다. 무자가 말하기를 \"'한 자 베와 한 말 곡식'이라는 노래를 늘 폐하를 위해 부끄럽게 여겼습니다! 다른 사람은 소원한 자를 친하게 만들 수 있으나, 신은 친한 자를 소원하게 만들지 못하니, 이로써 폐하께 부끄럽습니다\"라고 하였다.", ["충직", "간언", "용기"]], ["方正", 12, "杜預之荊州，頓七里橋，朝士悉祖。預少賤，好豪俠，不為物所許。楊濟既名氏，雄俊不堪，不坐而去。須臾，和長輿來，問：「楊右衛何在？」客曰：「向來，不坐而去。」長輿曰：「必大夏門下盤馬。」往大夏門，果大閱騎。長輿抱內車，共載歸，坐如初。", "두예(杜預)가 형주(荊州)로 가면서 칠리교(七里橋)에 머무니 조정의 인사들이 모두 전별하였다. 두예는 젊어 미천하였고 호협(豪俠)을 좋아하여 세상 사람들에게 인정받지 못하였다. 양제(楊濟)는 이미 명문가 출신으로 웅준하여 견디지 못하고, 앉지도 않고 떠났다. 잠시 후 화장여(和長輿, 和嶠)가 와서 묻기를 \"양우위(楊右衛, 楊濟)가 어디 있소?\"라고 하니, 손님이 말하기를 \"아까 왔다가 앉지 않고 떠났소\"라고 하였다. 장여가 말하기를 \"반드시 대하문(大夏門) 아래에서 말을 달리고 있을 것이오\"라고 하였다. 대하문으로 가니 과연 크게 말을 훈련시키고 있었다. 장여가 그를 끌어안아 수레에 태워 함께 타고 돌아와 처음처럼 앉게 하였다.", ["도량", "우정", "비평"]], ["方正", 13, "杜預拜鎮南將軍，朝士悉至，皆在連榻坐。時亦有裴叔則。羊穉舒後至，曰：「杜元凱乃復連榻坐客！」不坐便去。杜請裴追之，羊去數里住馬，既而俱還杜許。", "두예(杜預)가 진남장군(鎭南將軍)에 임명되자 조정의 인사들이 모두 이르러, 모두 잇닿은 평상에 앉았다. 그때 배숙칙(裴叔則, 裴楷)도 있었다. 양치서(羊穉舒)가 뒤늦게 이르러 말하기를 \"두원개(杜元凱, 杜預)가 이제는 손님을 잇닿은 평상에 앉히는구나!\"라고 하며, 앉지 않고 곧 떠났다. 두예가 배숙칙에게 청하여 그를 뒤쫓게 하니, 양치서는 몇 리를 가서 말을 멈추었고, 이윽고 함께 두예에게 돌아왔다.", ["오만", "도량", "겸손"]], ["方正", 14, "晉武帝時，荀勖為中書監，和嶠為令。故事，監、令由來共車。嶠性雅正，常疾勖諂諛。後公車來，嶠便登，正向前坐，不復容勖。勖方更覓車，然後得去。監、令各給車自此始。", "진 무제(晉武帝) 때, 순욱(荀勖)이 중서감(中書監)이 되고 화교(和嶠)가 중서령(中書令)이 되었다. 관례에 감과 영은 본래 수레를 함께 탔다. 화교는 성품이 단정하고 바르며 늘 순욱의 아첨을 미워하였다. 뒤에 관용 수레가 오자 화교는 곧 올라타 똑바로 앞쪽을 향해 앉아 다시는 순욱을 받아들이지 않았다. 순욱은 그제야 다시 수레를 찾은 다음에야 떠날 수 있었다. 감과 영에게 각기 수레를 지급한 것이 이로부터 비롯되었다.", ["충직", "오만", "권력"]], ["方正", 15, "山公大兒著短帢，車中倚。武帝欲見之，山公不敢辭，問兒，兒不肯行。時論乃云勝山公。", "산공(山公, 山濤)의 큰아들이 짧은 두건을 쓰고 수레 안에 기대어 있었다. 무제(武帝)가 그를 보고자 하니 산공은 감히 사양하지 못하고 아들에게 물었으나, 아들이 가려 하지 않았다. 당시 사람들의 평은 도리어 그가 산공보다 낫다고 하였다.", ["겸손", "비평"]], ["方正", 16, "向雄為河內主簿，有公事不及雄，而太守劉淮橫怒，遂與杖遣之。雄後為黃門郎，劉為侍中，初不交言。武帝聞之，敕雄復君臣之好，雄不得已，詣劉，再拜曰：「向受詔而來，而君臣之義絕，何如？」於是即去。武帝聞尚不和，乃怒問雄曰：「我令卿復君臣之好，何以猶絕？」雄曰：「古之君子，進人以禮，退人以禮；今之君子，進人若將加諸厀，退人若將墜諸淵。臣於劉河內，不為戎首，亦已幸甚，安復為君臣之好？」武帝從之。", "향웅(向雄)이 하내(河內)의 주부(主簿)가 되었는데, 어떤 공무에서 향웅에게 미칠 일이 아니었음에도 태수 유회(劉淮)가 함부로 노하여 마침내 곤장을 치고 내쫓았다. 향웅은 뒤에 황문랑(黃門郎)이 되고 유회는 시중(侍中)이 되었으나, 애초에 서로 말을 나누지 않았다. 무제(武帝)가 이를 듣고 향웅에게 군신(君臣)의 우호를 회복하라고 명하니, 향웅은 부득이하여 유회를 찾아가 두 번 절하고 말하기를 \"아까 조서를 받고 왔으나 군신의 의리는 끊어졌으니 어찌하겠습니까?\"라고 하고는 곧 떠났다. 무제는 여전히 화목하지 못하다는 것을 듣고 노하여 향웅에게 물었다. \"내가 경에게 군신의 우호를 회복하라 하였는데, 어찌 아직도 끊어져 있는가?\" 향웅이 말하기를 \"옛 군자는 사람을 등용함에 예로써 하고 사람을 물러나게 함에 예로써 하였습니다. 지금의 군자는 사람을 등용할 때는 무릎에 끌어안을 듯하고, 사람을 물러나게 할 때는 못에 빠뜨릴 듯합니다. 신이 유 하내(劉河內, 劉淮)에 대해 원수의 우두머리가 되지 않은 것만으로도 이미 매우 다행이거늘, 어찌 다시 군신의 우호를 맺겠습니까?\"라고 하였다. 무제가 그 말을 따랐다.", ["충직", "간언", "예언"]], ["方正", 17, "齊王冏為大司馬輔政，嵇紹為侍中，詣冏咨事。冏設宰會，召葛旟董艾等共論時宜。旟等白冏：「嵇侍中善於絲竹，公可令操之。」遂送樂器。紹推卻不受。冏曰：「今日共為歡，卿何卻邪？」紹曰：「公協輔皇室，令作事可法。紹雖官卑，職備常伯。操絲比竹，蓋樂官之事，不可以先王法服，為伶人之業。今逼高命，不敢苟辭，當釋冠冕，襲私服，此紹之心也。」旟等不自得而退。", "제왕(齊王) 사마경(司馬冏)이 대사마(大司馬)로서 정사를 보좌할 때, 혜소(嵇紹)가 시중(侍中)이 되어 사마경을 찾아가 일을 자문하였다. 사마경이 연회를 베풀고 갈여(葛旟)·동애(董艾) 등을 불러 함께 시정의 마땅함을 논하였다. 갈여 등이 사마경에게 아뢰기를 \"혜시중(嵇侍中, 嵇紹)은 음악에 능하니, 공께서 그에게 연주하게 하시지요\"라고 하고는 마침내 악기를 보냈다. 혜소가 물리치고 받지 않았다. 사마경이 말하기를 \"오늘 함께 즐기는데 경은 어찌 물리치는가?\"라고 하였다. 혜소가 말하기를 \"공께서는 황실을 협력하여 보좌하시니 하시는 일이 본보기가 될 만하여야 합니다. 제가 비록 관직은 낮으나 직책은 상백(常伯, 시중)을 갖추고 있습니다. 거문고를 타고 피리에 맞추는 것은 대개 악관(樂官)의 일이니, 선왕의 법복(法服)을 입고서 악공의 일을 해서는 안 됩니다. 지금 높으신 명에 핍박당하여 감히 구차하게 사양하지는 못하나, 마땅히 관과 면류관을 벗고 사복(私服)으로 갈아입겠습니다. 이것이 제 마음입니다\"라고 하였다. 갈여 등은 스스로 면목이 없어 물러났다.", ["충직", "거절", "음악"]], ["方正", 18, "盧志於眾坐，問陸士衡：「陸遜、陸抗，是君何物？」答曰：「如卿於盧毓、盧珽。」士龍失色。既出戶，謂兄曰：「何至如此，彼容不相知也？」士衡正色曰：「我父祖名播海內，寧有不知？鬼子敢爾！」議者疑二陸優劣，謝公以此定之。", "노지(盧志)가 여러 사람이 앉은 자리에서 육사형(陸士衡, 陸機)에게 물었다. \"육손(陸遜)·육항(陸抗)은 그대에게 어떤 사람이오?\" 대답하기를 \"경에게 노육(盧毓)·노정(盧珽)과 같은 사이요\"라고 하였다. 육사룡(陸士龍, 陸雲)이 낯빛을 잃었다. 문을 나선 뒤 형에게 말하기를 \"어찌 이렇게까지 하십니까, 그가 혹 몰라서 그랬을 수도 있는데요\"라고 하였다. 육사형이 정색하며 말하기를 \"우리 아버지와 할아버지의 이름이 천하에 퍼졌거늘 어찌 모를 리가 있겠느냐? 귀신의 자식이 감히 그러는 것이다!\"라고 하였다. 논하는 자들이 두 육씨의 우열을 의심하였는데, 사공(謝公, 謝安)은 이로써 판정하였다.", ["기지", "분노", "비평"]], ["方正", 19, "羊忱性甚貞烈。趙王倫為相國，忱為太傅長史，乃版以參相國軍事。使者卒至，忱深懼豫禍，不暇被馬，於是帖騎而避。使者追之，忱善射，矢左右發，使者不敢進，遂得免。", "양침(羊忱)은 성품이 매우 곧고 강렬하였다. 조왕(趙王) 사마륜(司馬倫)이 상국(相國)이 되었을 때, 양침이 태부(太傅)의 장사(長史)였는데, 그를 임명하여 상국의 군사(軍事)에 참여하게 하였다. 사자가 갑자기 이르니, 양침은 화에 연루될까 깊이 두려워하여 말에 안장을 얹을 겨를도 없이, 곧 맨말에 올라타 피하였다. 사자가 그를 뒤쫓으니, 양침은 활을 잘 쏘아 좌우로 화살을 쏘았다. 사자가 감히 나아가지 못하여 마침내 화를 면할 수 있었다.", ["용기", "충직", "술수"]], ["方正", 20, "王太尉不與庾子嵩交，庾卿之不置。王曰：「君不得為爾。」庾曰：「卿自君我，我自卿卿。我自用我法，卿自用卿法。」", "왕태위(王太尉, 王衍)는 유자숭(庾子嵩, 庾敳)과 사귀려 하지 않았는데, 유자숭은 그에게 '경(卿)'이라 부르기를 그치지 않았다. 왕연이 말하기를 \"그대는 그래서는 안 되오\"라고 하였다. 유자숭이 말하기를 \"경은 스스로 나를 '군(君)'이라 부르고, 나는 스스로 경을 '경(卿)'이라 부르겠소. 나는 내 법대로 하고, 경은 경의 법대로 하시오\"라고 하였다.", ["우정", "오만", "기지"]], ["方正", 21, "阮宣子伐社樹，有人止之。宣子曰：「社而為樹，伐樹則社亡；樹而為社，伐樹則社移矣。」", "완선자(阮宣子, 阮脩)가 사당의 나무를 베려 하니 어떤 사람이 그를 말렸다. 완선자가 말하기를 \"사당이면서 나무가 되었다면 나무를 베면 사당이 없어지고, 나무이면서 사당이 되었다면 나무를 베면 사당이 옮겨갈 뿐이오\"라고 하였다.", ["지혜", "기지", "청담"]], ["方正", 22, "阮宣子論鬼神有無者，或以人死有鬼，宣子獨以為無，曰：「今見鬼者，云箸生時衣服，若人死有鬼，衣服復有鬼邪？」", "완선자(阮宣子, 阮脩)가 귀신의 있고 없음을 논할 때, 어떤 이는 사람이 죽으면 귀신이 있다고 하였으나, 완선자만은 홀로 없다고 여기며 말하기를 \"지금 귀신을 본 자들이 살아 있을 때의 의복을 입고 있다고 하는데, 만약 사람이 죽어 귀신이 된다면 의복에도 귀신이 있단 말인가?\"라고 하였다.", ["청담", "지혜"]], ["方正", 23, "元皇帝既登阼，以鄭后之寵，欲舍明帝而立簡文。時議者咸謂：「舍長立少，既於理非倫，且明帝以聰亮英斷，益宜為儲副。」周、王諸公，並苦爭懇切。唯刁玄亮獨欲奉少主，以阿帝旨。元帝便欲施行，慮諸公不奉詔。於是先喚周侯、丞相入，然後欲出詔付刁。周、王既入，始至階頭，帝逆遣傳詔，遏使就東廂。周侯未悟，即卻略下階。丞相披撥傳詔，徑至御牀前曰：「不審陛下何以見臣。」帝默然無言，乃探懷中黃紙詔裂擲之。由此皇儲始定。周侯方慨然愧歎曰：「我常自言勝茂弘，今始知不如也！」", "원황제(元皇帝, 元帝)가 황위에 오른 뒤 정후(鄭后)에 대한 총애 때문에 명제(明帝)를 버리고 간문제(簡文帝)를 세우고자 하였다. 당시 논하는 자들이 모두 말하기를 \"맏이를 버리고 어린 이를 세우는 것은 이미 이치에 차례를 어기는 것이며, 게다가 명제는 총명하고 영민하며 결단력이 있으니 더욱 마땅히 태자가 되어야 합니다\"라고 하였다. 주의(周顗)·왕도(王導) 등 여러 공이 모두 간절히 다투었다. 오직 조현량(刁玄亮, 刁協)만이 홀로 어린 임금을 받들어 황제의 뜻에 아부하고자 하였다. 원제가 곧 시행하려 하였으나, 여러 공이 조서를 받들지 않을까 염려하였다. 이에 먼저 주후(周侯, 周顗)와 승상(丞相, 王導)을 불러들인 다음에 조서를 내어 조협에게 주려 하였다. 주의와 왕도가 들어와 막 계단 머리에 이르자, 황제가 미리 전조관(傳詔官)을 보내어 그들을 막아 동쪽 곁채로 가게 하였다. 주의는 깨닫지 못하고 곧 물러나 계단 아래로 내려왔다. 승상은 전조관을 밀치고 곧장 어상(御牀) 앞에 이르러 말하기를 \"폐하께서 무슨 일로 신을 부르셨는지 모르겠습니다\"라고 하였다. 황제는 잠자코 말이 없다가, 곧 품속의 황지 조서를 꺼내 찢어 던졌다. 이로써 황태자가 비로소 정해졌다. 주의는 그제야 개연히 부끄러워 탄식하며 말하기를 \"나는 늘 스스로 무홍(茂弘, 王導)보다 낫다고 여겼는데, 이제야 비로소 그만 못함을 알겠다!\"라고 하였다.", ["권력", "충직", "간언"]], ["方正", 24, "王丞相初在江左，欲結援吳人，請婚陸太尉。對曰：「培塿無松柏，薰蕕不同器。玩雖不才，義不為亂倫之始。」", "왕승상(王丞相, 王導)이 처음 강좌(江左)에 있을 때, 오(吳) 지방 사람들과 인연을 맺고자 하여 육태위(陸太尉, 陸玩)에게 혼인을 청하였다. 육현이 대답하기를 \"작은 언덕에는 소나무와 잣나무가 자라지 않고, 향초와 악취 나는 풀은 같은 그릇에 담지 못하는 법이오. 제가 비록 재주는 없으나, 의리상 인륜을 어지럽히는 시초가 되지는 않겠소\"라고 하였다.", ["거절", "부부", "충직"]], ["方正", 25, "諸葛恢大女適太尉庾亮兒，次女適徐州刺史羊忱兒。亮子被蘇峻害，改適江虨。恢兒娶鄧攸女。于時謝尚書求其小女婚。恢乃云：「羊、鄧是世婚，江家我顧伊，庾家伊顧我，不能復與謝裒兒婚。」及恢亡，遂婚。於是王右軍往謝家看新婦，猶有恢之遺法，威儀端詳，容服光整。王歎曰：「我在遣女裁得爾耳！」", "제갈회(諸葛恢)의 큰딸은 태위(太尉) 유량(庾亮)의 아들에게 시집갔고, 둘째 딸은 서주자사(徐州刺史) 양침(羊忱)의 아들에게 시집갔다. 유량의 아들이 소준(蘇峻)에게 살해되자, 다시 강빈(江虨)에게 시집갔다. 제갈회의 아들은 등유(鄧攸)의 딸을 맞이하였다. 그때 사 상서(謝尙書, 謝裒)가 그 막내딸과의 혼인을 청하였다. 제갈회가 이에 말하기를 \"양씨와 등씨는 대대로 혼인한 집안이고, 강씨 집안은 내가 그들을 돌보고, 유씨 집안은 그들이 나를 돌보았으나, 다시 사부(謝裒)의 아들과는 혼인할 수 없다\"라고 하였다. 제갈회가 죽은 뒤 마침내 혼인하였다. 이에 왕우군(王右軍, 王羲之)이 사씨 집에 가서 신부를 보니 아직도 제갈회가 남긴 법도가 있어, 위의가 단정하고 차림새와 의복이 빛나고 정연하였다. 왕희지가 탄식하며 말하기를 \"내가 딸을 시집보낼 때에도 겨우 이만큼이나 할 수 있었을 뿐이다!\"라고 하였다.", ["부부", "여인", "거절", "제갈씨"]], ["方正", 26, "周叔治作晉陵太守，周侯、仲智往別。叔治以將別，涕泗不止。仲智恚之曰：「斯人乃婦女，與人別唯啼泣！」便舍去。周侯獨留，與飲酒言話，臨別流涕，撫其背曰：「奴好自愛。」", "주숙치(周叔治, 周謨)가 진릉태수(晉陵太守)가 되자, 주후(周侯, 周顗)와 중지(仲智, 周嵩)가 작별하러 갔다. 주숙치는 곧 헤어지게 되었으므로 눈물 콧물을 그치지 못하였다. 중지가 이를 노여워하며 말하기를 \"이 사람은 부녀자로구나, 남과 헤어지는데 그저 울기만 하다니!\"라고 하고는 곧 버려두고 떠났다. 주후만 홀로 남아 함께 술을 마시며 이야기하고, 헤어질 즈음에 눈물을 흘리며 그 등을 어루만지고 말하기를 \"아우야, 부디 자신을 잘 아끼거라\"라고 하였다.", ["우정", "죽음", "분노"]], ["方正", 27, "周伯仁為吏部尚書，在省內夜疾危急。時刁玄亮為尚書令，營救備親好之至。良久小損。明旦，報仲智，仲智狼狽來。始入戶，刁下牀對之大泣，說伯仁昨危急之狀。仲智手批之，刁為辟易於戶側。既前，都不問病，直云：「君在中朝，與和長輿齊名，那與佞人刁協有情？」逕便出。", "주백인(周伯仁, 周顗)이 이부상서(吏部尙書)가 되었는데, 관청 안에서 밤에 병이 위급해졌다. 당시 조현량(刁玄亮, 刁協)이 상서령(尙書令)이었는데, 구완함에 친한 정의 지극함을 다하였다. 한참 지나 조금 차도가 있었다. 이튿날 아침 중지(仲智, 周嵩)에게 알리니, 중지가 허둥지둥 왔다. 막 문에 들어서자 조협이 평상에서 내려와 그를 마주하여 크게 울며, 백인이 어젯밤 위급하였던 상황을 이야기하였다. 중지가 손으로 그를 후려치니, 조협은 문 곁으로 비켜 물러났다. 중지는 앞으로 나아가서도 도무지 병에 대해 묻지 않고, 곧장 말하기를 \"형은 중조(中朝)에 있을 때 화장여(和長輿, 和嶠)와 명성이 나란했는데, 어찌 아첨꾼 조협(刁協)과 정분이 있단 말이오?\"라고 하고는 곧장 나가버렸다.", ["우정", "병과늙음", "분노"]], ["方正", 28, "王含作廬江郡，貪濁狼籍。王敦護其兄，故於眾坐稱：「家兄在郡定佳，廬江人士咸稱之！」時何充為敦主簿，在坐，正色曰：「充即廬江人，所聞異於此！」敦默然。旁人為之反側，充晏然，神意自若。", "왕함(王含)이 여강군(廬江郡)을 다스렸는데, 탐욕스럽고 혼탁하여 어지러웠다. 왕돈(王敦)이 그 형을 비호하여, 여러 사람이 앉은 자리에서 칭찬하기를 \"우리 형님이 군을 다스림이 참으로 훌륭하여, 여강의 인사들이 모두 칭송하오!\"라고 하였다. 당시 하충(何充)이 왕돈의 주부(主簿)로 그 자리에 있었는데, 정색하며 말하기를 \"저 하충이 바로 여강 사람인데, 들은 바는 이와 다릅니다!\"라고 하였다. 왕돈은 잠자코 있었다. 곁에 있던 사람들이 그를 위해 불안해하였으나, 하충은 태연히 신색이 자약하였다.", ["충직", "용기", "비평"]], ["方正", 29, "顧孟著嘗以酒勸周伯仁，伯仁不受。顧因移勸柱，而語柱曰：「詎可便作棟梁自遇。」周得之欣然，遂為衿契。", "고맹저(顧孟著)가 일찍이 주백인(周伯仁, 周顗)에게 술을 권하였으나 백인이 받지 않았다. 고맹저가 이에 기둥에게로 옮겨 권하며 기둥에게 말하기를 \"어찌 곧바로 동량(棟梁)으로 자처할 수 있겠는가\"라고 하였다. 백인이 이 말을 듣고 흔연히 여겨, 마침내 마음을 터놓는 벗이 되었다.", ["기지", "우정", "술과취흥"]], ["方正", 30, "明帝在西堂，會諸公飲酒，未大醉，帝問：「今名臣共集，何如堯、舜？」時周伯仁為僕射，因厲聲曰：「今雖同人主，復那得等於聖治！」帝大怒，還內，作手詔滿一黃紙，遂付廷尉令收，因欲殺之。後數日，詔出周，羣臣往省之。周曰：「近知當不死，罪不足至此。」", "명제(明帝)가 서당(西堂)에서 여러 공을 모아 술을 마실 때, 크게 취하기 전에 황제가 물었다. \"지금 명신들이 함께 모였으니, 요(堯)·순(舜)에 비하면 어떠한가?\" 당시 주백인(周伯仁, 周顗)이 복야(僕射)였는데, 이에 소리 높여 말하기를 \"지금 비록 같은 임금이라 하나, 어찌 성스러운 다스림에 견줄 수 있겠습니까!\"라고 하였다. 황제가 크게 노하여 안으로 돌아가 손수 조서를 황지 한 장 가득 써서, 마침내 정위(廷尉)에게 넘겨 그를 잡아들이게 하고 죽이려 하였다. 며칠 뒤 조서를 내려 주의를 풀어주니, 신하들이 가서 그를 위문하였다. 주의가 말하기를 \"근래에 죽지 않으리라는 것을 알았소, 죄가 이 지경에 이를 만하지는 않았으니\"라고 하였다.", ["충직", "용기", "담대한죽음"]], ["方正", 31, "王大將軍當下，時咸謂無緣爾。伯仁曰：「今主非堯、舜，何能無過？且人臣安得稱兵以向朝廷？處仲狼抗剛愎，王平子何在？」", "왕대장군(王大將軍, 王敦)이 군대를 거느리고 내려오려 할 때, 당시 모두 그럴 까닭이 없다고 하였다. 백인(伯仁, 周顗)이 말하기를 \"지금 임금이 요·순이 아니니 어찌 허물이 없을 수 있겠소? 그렇다 하더라도 신하된 자가 어찌 군대를 일으켜 조정으로 향할 수 있겠소? 처중(處仲, 王敦)은 사납고 강퍅하니, 왕평자(王平子, 王澄)는 어디 있는가?\"라고 하였다.", ["충직", "간언", "권력"]], ["方正", 32, "王敦既下，住船石頭，欲有廢明帝意。賓客盈坐，敦知帝聰明，欲以不孝廢之。每言帝不孝之狀，而皆云溫太真所說。溫嘗為東宮率，後為吾司馬，甚悉之。須臾，溫來，敦便奮其威容，問溫曰：「皇太子作人何似？」溫曰：「小人無以測君子。」敦聲色並厲，欲以威力使從己，乃重問溫：「太子何以稱佳？」溫曰：「鉤深致遠，蓋非淺識所測。然以禮侍親，可稱為孝。」", "왕돈(王敦)이 이미 강을 내려와 석두(石頭)에 배를 대고서, 명제(明帝)를 폐하려는 뜻을 품었다. 빈객이 자리에 가득했는데, 왕돈은 황제가 총명함을 알고서 불효를 명목으로 그를 폐하려 했다. 황제의 불효한 행실을 말할 때마다 모두 온태진(溫太眞, 溫嶠)이 말한 것이라 일컬었다. 온교(溫嶠)는 일찍이 동궁(東宮)의 솔(率)을 지냈고 뒤에 나의 사마(司馬)가 되었으니 그 일을 매우 잘 안다고 한 것이다. 잠시 뒤 온교가 오자 왕돈은 곧 그 위엄 있는 기색을 떨치며 온교에게 물었다. \"황태자의 사람됨은 어떠한가?\" 온교가 답했다. \"소인은 군자를 헤아릴 수 없습니다.\" 왕돈은 소리와 안색이 함께 사나워져 위력으로써 자기를 따르게 하려고 다시 온교에게 물었다. \"태자가 어찌하여 훌륭하다 일컬어지는가?\" 온교가 답했다. \"깊은 것을 캐내고 먼 것을 이르게 함은 대개 얕은 식견으로 헤아릴 바가 아닙니다. 그러나 예(禮)로써 어버이를 섬기니 효(孝)라 일컬을 만합니다.\"", ["충직", "기지", "권력"]], ["方正", 33, "王大將軍既反，至石頭，周伯仁往見之。謂周曰：「卿何以相負？」對曰：「公戎車犯正，下官忝率六軍，而王師不振，以此負公。」", "왕대장군(王大將軍, 王敦)이 이미 반란하여 석두(石頭)에 이르렀을 때, 주백인(周伯仁, 周顗)이 가서 그를 만났다. 왕돈이 주의(周顗)에게 말했다. \"그대는 어찌하여 나를 저버렸는가?\" 주의가 답했다. \"공께서 군사를 일으켜 바름을 범하셨고, 저는 외람되이 육군(六軍)을 거느렸으나 왕사(王師)가 떨치지 못하였으니, 이로써 공을 저버린 것입니다.\"", ["충직", "용기", "권력"]], ["方正", 34, "蘇峻既至石頭，百僚奔散，唯侍中鍾雅獨在帝側。或謂鍾曰：「見可而進，知難而退，古之道也。君性亮直，必不容於寇讎，何不用隨時之宜、而坐待其弊邪？」鍾曰：「國亂不能匡，君危不能濟，而各遜遁以求免，吾懼董狐將執簡而進矣！」", "소준(蘇峻)이 이미 석두(石頭)에 이르자 백관이 달아나 흩어지고, 오직 시중(侍中) 종아(鍾雅)만이 홀로 황제 곁에 있었다. 어떤 이가 종아에게 말했다. \"가능함을 보고 나아가고 어려움을 알고 물러남이 옛날의 도(道)입니다. 그대는 성품이 곧고 강직하여 반드시 적에게 용납되지 못할 터인데, 어찌 때에 따른 마땅함을 쓰지 않고 앉아서 그 화를 기다리려 하십니까?\" 종아가 말했다. \"나라가 어지러워도 바로잡지 못하고 임금이 위태로워도 구하지 못하면서 각자 달아나 화를 면하려 한다면, 나는 동호(董狐)가 장차 죽간을 들고 나아올까 두렵소!\"", ["충직", "용기", "담대한죽음"]], ["方正", 35, "庾公臨去，顧語鍾後事，深以相委。鍾曰：「棟折榱崩，誰之責邪？」庾曰：「今日之事，不容復言，卿當期克復之效耳！」鍾曰：「想足下不愧荀林父耳。」", "유공(庾公, 庾亮)이 떠날 즈음에 종아(鍾雅)를 돌아보며 뒷일을 부탁하고 깊이 그에게 맡겼다. 종아가 말했다. \"마룻대가 부러지고 서까래가 무너진다면 누구의 책임이겠소?\" 유량이 말했다. \"오늘의 일은 다시 말할 것이 못 되오. 그대는 마땅히 회복의 공효를 기약할 따름이오!\" 종아가 말했다. \"생각건대 그대가 순림보(荀林父)에게 부끄럽지 않기를 바랄 뿐이오.\"", ["충직", "간언", "권력"]], ["方正", 36, "蘇峻時，孔羣在橫塘為匡術所逼。王丞相保存術，因眾坐戲語，令術勸酒，以釋橫塘之憾。羣答曰：「德非孔子，厄同匡人。雖陽和布氣，鷹化為鳩，至於識者，猶憎其眼。」", "소준(蘇峻)의 난 때 공군(孔羣)이 횡당(橫塘)에서 광술(匡術)에게 핍박을 받았다. 왕승상(王丞相, 王導)이 광술을 보전해 주려고 여러 사람이 앉은 자리에서 농담 삼아 광술로 하여금 술을 권하게 하여 횡당의 원한을 풀게 하려 했다. 공군이 답했다. \"덕은 공자(孔子)가 아니나 곤액은 광인(匡人)에게 당한 것과 같소. 비록 따뜻한 봄기운이 퍼져 매가 변하여 비둘기가 된다 해도, 식견 있는 자에 이르러서는 오히려 그 눈을 미워하는 법이오.\"", ["원한", "거절", "기지"]], ["方正", 37, "蘇子高事平，王、庾諸公欲用孔廷尉為丹陽。亂離之後，百姓彫弊，孔慨然曰：「昔肅祖臨崩，諸君親升御牀，並蒙眷識，共奉遺詔。孔坦疎賤，不在顧命之列。既有艱難，則以微臣為先，今猶俎上腐肉，任人膾截耳！」於是拂衣而去，諸公亦止。", "소자고(蘇子高, 蘇峻)의 일이 평정된 뒤, 왕도(王導)·유량(庾亮) 등 여러 공이 공정위(孔廷尉, 孔坦)를 단양(丹陽) 태수로 쓰려 했다. 난리 뒤라 백성이 피폐했으므로 공탄(孔坦)이 개연히 말했다. \"옛날 숙조(肅祖)께서 임종하실 때 여러 분은 친히 어상(御牀)에 올라 모두 돌보심을 입고 함께 유조(遺詔)를 받들었소. 나 공탄은 미천하여 고명(顧命)의 반열에 들지 못했소. 그런데 어려움이 있으니 미천한 신하를 먼저 내세우는구려. 지금 도마 위의 썩은 고기와 같아 남이 마음대로 회 뜨고 자르게 맡길 따름이오!\" 그러고는 옷을 떨치고 떠나니 여러 공도 그만두었다.", ["거절", "충직", "권력"]], ["方正", 38, "孔車騎與中丞共行，在御道逢匡術，賓從甚盛，因往與車騎共語。中丞初不視，直云：「鷹化為鳩，眾鳥猶惡其眼。」術大怒，便欲刃之。車騎下車，抱術曰：「族弟發狂，卿為我宥之！」始得全首領。", "공거기(孔車騎, 孔愉)가 중승(中丞)과 함께 길을 가다가 어도(御道)에서 광술(匡術)을 만났는데, 빈객과 시종이 매우 성대했다. 광술이 가서 공거기와 함께 이야기를 나누었다. 중승은 처음부터 거들떠보지 않고 다만 말했다. \"매가 변하여 비둘기가 되어도 뭇 새들은 오히려 그 눈을 미워한다.\" 광술이 크게 노하여 곧 그를 칼로 베려 했다. 공거기가 수레에서 내려 광술을 끌어안으며 말했다. \"집안 아우가 미쳤으니 그대는 나를 보아 그를 용서하시오!\" 그제야 목숨을 온전히 할 수 있었다.", ["용기", "원한", "도량"]], ["方正", 39, "梅頤嘗有惠於陶公。後為豫章太守，有事，王丞相遣收之。侃曰：「天子富於春秋，萬機自諸侯出，王公既得錄，陶公何為不可放？」乃遣人於江口奪之。頤見陶公，拜，陶公止之。頤曰：「梅仲真厀，明日豈可復屈邪？」", "매이(梅頤)는 일찍이 도공(陶公, 陶侃)에게 은혜를 베푼 적이 있었다. 뒤에 매이가 예장(豫章) 태수가 되어 일이 생기자 왕승상(王丞相, 王導)이 사람을 보내 그를 잡아들이게 했다. 도간(陶侃)이 말했다. \"천자께서는 춘추가 어리시어 만기(萬機)가 제후에게서 나오고 있다. 왕공(王公)이 이미 권력을 잡았는데 도공이라 하여 어찌 풀어주지 못하겠는가?\" 그러고는 사람을 보내 강어귀에서 매이를 빼앗아 왔다. 매이가 도공을 뵙고 절하니 도공이 그것을 말렸다. 매이가 말했다. \"이 매중진(梅仲眞)의 무릎을 내일이라고 어찌 다시 굽힐 수 있겠습니까?\"", ["베풂", "충직", "권력"]], ["方正", 40, "王丞相作女伎，施設牀席。蔡公先在坐，不說而去，王亦不留。", "왕승상(王丞相, 王導)이 가기(歌妓)를 불러 노래하게 하고 자리와 깔개를 펼쳐 두었다. 채공(蔡公)이 먼저 자리에 있다가 기뻐하지 않고 떠났는데, 왕도도 만류하지 않았다.", ["거절", "음악"]], ["方正", 41, "何次道、庾季堅二人並為元輔。成帝初崩，于時嗣君未定，何欲立嗣子，庾及朝議以外寇方強，嗣子沖幼，乃立康帝。康帝登阼，會羣臣，謂何曰：「朕今所以承大業，為誰之議？」何答曰：「陛下龍飛，此是庾冰之功，非臣之力。于時用微臣之議，今不覩盛明之世。」帝有慚色。", "하차도(何次道)와 유계견(庾季堅, 庾冰) 두 사람이 함께 원보(元輔)가 되었다. 성제(成帝)가 막 붕어했을 때, 당시 후사가 정해지지 않았는데 하차도는 적자(嗣子)를 세우려 했으나, 유계견과 조정의 의론은 외적이 바야흐로 강성하고 적자가 어리다 하여 마침내 강제(康帝)를 세웠다. 강제가 즉위하여 뭇 신하를 모으고 하차도에게 말했다. \"짐이 지금 대업을 잇게 된 것은 누구의 의론에 의한 것인가?\" 하차도가 답했다. \"폐하께서 용처럼 날아오르신 것은 곧 유빙(庾冰)의 공이요 신의 힘이 아닙니다. 당시 미천한 신하의 의론을 썼다면 지금 성대하고 밝으신 세상을 보지 못했을 것입니다.\" 황제가 부끄러운 기색을 보였다.", ["겸손", "권력", "충직"]], ["方正", 42, "江僕射年少，王丞相呼與共棊。王手嘗不如兩道許，而欲敵道戲，試以觀之。江不即下。王曰：「君何以不行？」江曰：「恐不得爾。」傍有客曰：「此年少戲迺不惡。」王徐舉首曰：「此年少非唯圍棊見勝。」", "강복야(江僕射, 江虨)가 젊었을 때 왕승상(王丞相, 王導)이 그를 불러 함께 바둑을 두었다. 왕도의 솜씨가 일찍이 두어 길(道) 정도 미치지 못했으나, 호선(互先)으로 두며 한번 시험하여 그를 살펴보려 했다. 강복야가 곧바로 두지 않으니 왕도가 말했다. \"그대는 어찌하여 두지 않는가?\" 강복야가 말했다. \"그래서는 안 될 듯합니다.\" 곁에 있던 손님이 말했다. \"이 젊은이의 바둑이 자못 나쁘지 않습니다.\" 왕도가 천천히 고개를 들며 말했다. \"이 젊은이는 비단 바둑에서만 이기는 것이 아니다.\"", ["비평", "겸손", "재능"]], ["方正", 43, "孔君平疾篤，庾司空為會稽，省之，相問訊甚至，為之流涕。庾既下牀，孔慨然曰：「大丈夫將終，不問安國寧家之術，迺作兒女子相問！」庾聞，回謝之，請其話言。", "공군평(孔君平, 孔坦)이 병이 깊었을 때, 유사공(庾司空, 庾冰)이 회계(會稽) 태수로 있다가 그를 문병하러 와서 매우 정성껏 안부를 묻고 그를 위해 눈물을 흘렸다. 유사공이 평상에서 내려오자 공군평이 개연히 말했다. \"대장부가 죽으려 하는데 나라를 편안케 하고 집안을 안정시킬 방도는 묻지 않고, 도리어 아녀자처럼 안부나 묻는구려!\" 유사공이 이를 듣고 돌아와 사과하며 그의 가르침을 청했다.", ["충직", "죽음", "간언"]], ["方正", 44, "桓大司馬詣劉尹，臥不起。桓彎彈彈劉枕，丸迸碎牀褥間。劉作色而起曰：「使君如馨地，寧可鬬戰求勝？」桓甚有恨容。", "환대사마(桓大司馬, 桓溫)가 유윤(劉尹, 劉惔)을 찾아갔는데, 유담(劉惔)이 누워 일어나지 않았다. 환온이 탄궁을 당겨 유담의 베개를 쏘니 탄환이 평상의 이부자리 사이로 튀어 흩어졌다. 유담이 안색을 바꾸며 일어나 말했다. \"사군(使君)께서 이러시다니, 어찌 싸워서 이기기를 구하려 하십니까?\" 환온이 자못 한스러워하는 기색을 보였다.", ["오만", "분노"]], ["方正", 45, "後來年少，多有道深公者。深公謂曰：「黃吻年少，勿為評論宿士。昔嘗與元明二帝、王庾二公周旋。」", "후배 젊은이들이 심공(深公, 竺道潛)을 두고 이러쿵저러쿵 평하는 자가 많았다. 심공이 그들에게 말했다. \"젖내 나는 젊은이들은 노숙한 선비를 함부로 평론하지 말라. 나는 옛날 원제(元帝)·명제(明帝) 두 황제와 왕도(王導)·유량(庾亮) 두 공과 더불어 교유했느니라.\"", ["오만", "비평"]], ["方正", 46, "王中郎年少時，江虨為僕射領選，欲擬之為尚書郎。有語王者。王曰：「自過江來，尚書郎正用第二人，何得擬我？」江聞而止。", "왕중랑(王中郎, 王坦之)이 젊었을 때, 강반(江虨)이 복야(僕射)로서 인사를 맡고 있었는데 그를 상서랑(尙書郎)으로 추천하려 했다. 어떤 이가 왕중랑에게 그 일을 말하니 왕중랑이 말했다. \"강을 건너온 이래로 상서랑에는 바로 두 번째 가는 사람을 썼는데, 어찌 나를 거기에 추천한단 말인가?\" 강반이 이를 듣고 그만두었다.", ["겸손", "거절", "비평"]], ["方正", 47, "王述轉尚書令，事行便拜。文度曰：「故應讓杜許。」藍田云：「汝謂我堪此不？」文度曰：「何為不堪！但克讓自是美事，恐不可闕。」藍田慨然曰：「既云堪，何為復讓？人言汝勝我，定不如我。」", "왕술(王述)이 상서령(尙書令)으로 옮기게 되어 발령이 나자 곧바로 부임하려 했다. 문도(文度, 王坦之)가 말했다. \"마땅히 두허(杜許)에게 사양하셔야 합니다.\" 남전(藍田, 王述)이 말했다. \"너는 내가 이 자리를 감당할 만하다고 보느냐, 못하다고 보느냐?\" 문도가 말했다. \"어찌 감당하지 못하겠습니까! 다만 겸양은 본래 아름다운 일이니 빠뜨려서는 안 될 듯합니다.\" 남전이 개연히 말했다. \"이미 감당할 만하다고 했으면서 어찌 다시 사양하라 하느냐? 사람들이 네가 나보다 낫다고 하지만, 정말로 나만 못하구나.\"", ["겸손", "오만", "권력"]], ["方正", 48, "孫興公作庾公誄，文多託寄之辭。既成，示庾道恩。庾見，慨然送還之，曰：「先君與君，自不至於此。」", "손흥공(孫興公, 孫綽)이 유공(庾公, 庾亮)의 뇌문(誄文)을 지었는데, 글에 의탁하여 칭송하는 말이 많았다. 이미 완성하여 유도은(庾道恩, 庾羲)에게 보였다. 유도은이 보고는 개연히 그것을 돌려보내며 말했다. \"선군(先君)과 그대 사이가 본래 이런 정도에까지 이르지는 않았소.\"", ["충직", "죽음", "비평"]], ["方正", 49, "王長史求東陽，撫軍不用。後疾篤，臨終，撫軍哀歎曰：「吾將負仲祖於此，命用之。」長史曰：「人言會稽王癡，真癡。」", "왕장사(王長史, 王濛)가 동양(東陽)을 구했으나 무군(撫軍, 司馬昱)이 들어주지 않았다. 뒤에 병이 깊어 임종할 때 무군이 슬피 탄식하며 말했다. \"내가 이 일로 중조(仲祖, 王濛)를 저버렸구나. 그를 임명하도록 하라.\" 왕장사가 말했다. \"사람들이 회계왕(會稽王)을 어리석다 하더니, 정말로 어리석구나.\"", ["뉘우침", "죽음", "권력"]], ["方正", 50, "劉簡作桓宣武別駕，後為東曹參軍，頗以剛直見疏。嘗聽記，簡都無言。宣武問：「劉東曹何以不下意？」答曰：「會不能用。」宣武亦無怪色。", "유간(劉簡)이 환선무(桓宣武, 桓溫)의 별가(別駕)가 되었다가 뒤에 동조참군(東曹參軍)이 되었는데, 자못 강직함으로 인해 소원해졌다. 일찍이 공문서를 들을 때 유간이 도무지 말이 없었다. 환온이 물었다. \"유동조(劉東曹)는 어찌하여 의견을 내지 않는가?\" 유간이 답했다. \"어차피 쓰이지 못할 것이기 때문입니다.\" 환온도 이상하게 여기는 기색이 없었다.", ["충직", "오만"]], ["方正", 51, "劉真長、王仲祖共行，日旰未食。有相識小人貽其餐，肴案甚盛，真長辭焉。仲祖曰：「聊以充虛，何苦辭？」真長曰：「小人都不可與作緣。」", "유진장(劉眞長, 劉惔)과 왕중조(王仲祖, 王濛)가 함께 길을 가는데 날이 저물도록 밥을 먹지 못했다. 안면 있는 신분 낮은 사람이 음식을 보내왔는데 안주상이 매우 풍성했으나 유진장이 그것을 사양했다. 왕중조가 말했다. \"그저 허기나 채우면 될 텐데 어찌 굳이 사양하는가?\" 유진장이 말했다. \"소인배와는 도무지 인연을 맺어서는 안 되네.\"", ["거절", "청빈", "비평"]], ["方正", 52, "王脩齡嘗在東山甚貧乏。陶胡奴為烏程令，送一船米遺之，卻不肯取。直答語：「王脩齡若飢，自當就謝仁祖索食，不須陶胡奴米。」", "왕수령(王脩齡, 王胡之)이 일찍이 동산(東山)에 있을 때 매우 가난하고 궁핍했다. 도호노(陶胡奴, 陶範)가 오정(烏程) 현령으로 있으면서 쌀 한 배를 보내 주었으나 받으려 하지 않았다. 다만 답하여 말했다. \"왕수령이 만일 굶주리면 마땅히 사인조(謝仁祖, 謝尚)에게 가서 먹을 것을 구할 것이지, 도호노의 쌀은 필요 없소.\"", ["거절", "청빈", "오만"]], ["方正", 53, "阮光祿赴山陵，至都，不往殷、劉許，過事便還。諸人相與追之，阮亦知時流必當逐己，乃遄疾而去，至方山不相及。劉尹時為會稽，乃歎曰：「我入當泊安石渚下耳。不敢復近思曠傍，伊便能捉杖打人，不易。」", "완광록(阮光祿, 阮裕)이 산릉(山陵)의 장례에 가느라 도성에 이르렀으나 은호(殷浩)·유담(劉惔)의 처소에는 가지 않고 일을 마치자 곧 돌아갔다. 여러 사람이 함께 그를 뒤쫓았는데, 완유(阮裕)도 당시 명류(名流)들이 반드시 자기를 쫓아올 줄 알고서 곧 서둘러 빠르게 떠나니, 방산(方山)에 이르도록 따라잡지 못했다. 유윤(劉尹, 劉惔)이 당시 회계(會稽)에 있다가 탄식하여 말했다. \"내가 가서는 마땅히 안석(安石, 謝安)의 물가에나 배를 댈 것이다. 다시는 사광(思曠, 阮裕) 곁에 감히 가까이 가지 못하겠다. 그는 곧 지팡이를 잡고 사람을 칠 수도 있으니 쉽지 않다.\"", ["은둔", "거절", "오만"]], ["方正", 54, "王、劉與桓公共至覆舟山看。酒酣後，劉牽腳加桓公頸。桓公甚不堪，舉手撥去。既還，王長史語劉曰：「伊詎可以形色加人不？」", "왕몽(王濛)·유담(劉惔)이 환공(桓公, 桓溫)과 함께 복주산(覆舟山)에 가서 구경했다. 술이 거나해진 뒤 유담이 다리를 끌어다 환공의 목에 얹었다. 환공이 매우 참지 못하고 손을 들어 떨쳐 버렸다. 돌아온 뒤 왕장사(王長史, 王濛)가 유담에게 말했다. \"그가 어찌 안색이나 모양으로 남에게 함부로 굴 수 있는 사람이겠는가?\"", ["술과취흥", "오만", "비평"]], ["方正", 55, "桓公問桓子野：「謝安石料萬石必敗，何以不諫？」子野答曰：「故當出於難犯耳！」桓作色曰：「萬石撓弱凡才，有何嚴顏難犯？」", "환공(桓公, 桓溫)이 환자야(桓子野, 桓伊)에게 물었다. \"사안석(謝安石, 謝安)이 만석(萬石, 謝萬)이 반드시 패할 것을 헤아렸으면서 어찌하여 간하지 않았는가?\" 자야가 답했다. \"본래 범하기 어려운 데서 나온 것이지요.\" 환공이 안색을 바꾸며 말했다. \"만석은 나약하고 평범한 재주인데 무슨 엄한 얼굴이 있어 범하기 어렵단 말인가?\"", ["비평", "간언"]], ["方正", 56, "羅君章曾在人家，主人令與坐上客共語。答曰：「相識已多，不煩復爾。」", "나군장(羅君章, 羅含)이 일찍이 남의 집에 있었는데, 주인이 그로 하여금 자리에 앉은 손님과 함께 이야기를 나누게 했다. 그가 답했다. \"아는 사람이 이미 많으니 다시 그럴 것 없습니다.\"", ["거절", "오만"]], ["方正", 57, "韓康伯病，拄杖前庭消搖。見諸謝皆富貴，轟隱交路，歎曰：「此復何異王莽時？」", "한강백(韓康伯, 韓伯)이 병들어 지팡이를 짚고 앞뜰을 거닐었다. 여러 사씨(謝氏)들이 모두 부귀하여 수레가 우레처럼 요란하게 길에 오가는 것을 보고 탄식하여 말했다. \"이것이 다시 왕망(王莽) 때와 무엇이 다른가?\"", ["병과늙음", "비평", "사치"]], ["方正", 58, "王文度為桓公長史時，桓為兒求王女，王許咨藍田。既還，藍田愛念文度，雖長大猶抱著厀上。文度因言桓求己女婚。藍田大怒，排文度下厀曰：「惡見，文度已復癡，畏桓溫面？兵，那可嫁女與之！」文度還報云：「下官家中先得婚處。」桓公曰：「吾知矣，此尊府君不肯耳。」後桓女遂嫁文度兒。", "왕문도(王文度, 王坦之)가 환공(桓公, 桓溫)의 장사(長史)로 있을 때, 환공이 자기 아들을 위해 왕문도의 딸을 청하니 왕문도가 남전(藍田, 王述)에게 여쭈겠다고 허락했다. 돌아오니 남전이 문도를 아끼고 사랑하여, 다 컸는데도 여전히 무릎 위에 안고 있었다. 문도가 이에 환공이 자기 딸을 혼인으로 청한 일을 말했다. 남전이 크게 노하여 문도를 무릎에서 밀쳐 내며 말했다. \"꼴 보기 싫다, 문도가 또 어리석어졌구나. 환온의 얼굴이 두려우냐? 그 무인 놈에게 어찌 딸을 시집보낼 수 있단 말이냐!\" 문도가 돌아가 보고했다. \"제 집안에 이미 정해 둔 혼처가 있습니다.\" 환공이 말했다. \"내 알겠다. 이는 그대의 존부군(尊府君)께서 허락하지 않으신 게로구나.\" 뒤에 환공의 딸이 마침내 문도의 아들에게 시집갔다.", ["부부", "오만", "권력"]], ["方正", 59, "王子敬數歲時，嘗看諸門生樗蒲。見有勝負，因曰：「南風不競。」門生輩輕其小兒，迺曰：「此郎亦管中窺豹，時見一斑。」子敬瞋目曰：「遠慚荀奉倩，近愧劉真長！」遂拂衣而去。", "왕자경(王子敬, 王獻之)이 몇 살 때 일찍이 여러 문생(門生)들이 저포(樗蒲) 놀이 하는 것을 보았다. 승부가 갈리는 것을 보고 이에 말했다. \"남풍(南風)이 강하지 못하구나.\" 문생들이 그 어린아이를 가벼이 여겨 이에 말했다. \"이 도련님도 대롱 구멍으로 표범을 엿보아 때때로 한 점 무늬만 보는 격이로다.\" 자경이 눈을 부릅뜨고 말했다. \"멀리로는 순봉천(荀奉倩, 荀粲)에게 부끄럽고 가까이로는 유진장(劉眞長, 劉惔)에게 부끄럽다!\" 그러고는 옷을 떨치고 떠나갔다.", ["신동", "비평", "오만"]], ["方正", 60, "謝公聞羊綏佳，致意令來，終不肯詣。後綏為太學博士，因事見謝公，公即取以為主簿。", "사공(謝公, 謝安)이 양수(羊綏)가 훌륭하다는 말을 듣고 뜻을 전하여 오게 했으나, 끝내 찾아오려 하지 않았다. 뒤에 양수가 태학박사(太學博士)가 되어 일로 인해 사공을 뵈니, 사공이 곧 그를 취하여 주부(主簿)로 삼았다.", ["권력", "거절"]], ["方正", 61, "王右軍與謝公詣阮公，至門語謝：「故當共推主人。」謝曰：「推人正自難。」", "왕우군(王右軍, 王羲之)이 사공(謝公, 謝安)과 함께 완공(阮公, 阮裕)을 찾아갔는데, 문에 이르러 사공에게 말했다. \"마땅히 함께 주인을 추대해야 하오.\" 사공이 말했다. \"사람을 추대하는 것은 참으로 어려운 일이오.\"", ["비평", "우정"]], ["方正", 62, "太極殿始成，王子敬時為謝公長史，謝送版，使王題之。王有不平色，語信云：「可擲箸門外。」謝後見王曰：「題之上殿何若？昔魏朝韋誕諸人，亦自為也。」王曰：「魏阼所以不長。」謝以為名言。", "태극전(太極殿)이 막 완성되었을 때 왕자경(王子敬, 王獻之)이 당시 사공(謝公, 謝安)의 장사(長史)였는데, 사공이 현판을 보내 왕에게 글씨를 쓰게 했다. 왕이 불평하는 기색이 있어 심부름꾼에게 말했다. \"문밖에 던져 버려도 좋다.\" 사공이 뒤에 왕을 만나 말했다. \"현판에 글씨를 써서 전각에 올리는 것이 어떻겠소? 옛날 위(魏)나라 때 위탄(韋誕) 같은 이들도 스스로 했었소.\" 왕이 말했다. \"위나라의 국운이 길지 못했던 까닭이지요.\" 사공이 이를 명언으로 여겼다.", ["서화", "거절", "기지"]], ["方正", 63, "王恭欲請江盧奴為長史，晨往詣江，江猶在帳中。王坐，不敢即言。良久乃得及，江不應。直喚人取酒，自飲一盌，又不與王。王且笑且言：「那得獨飲？」江云：「卿亦復須邪？」更使酌與王，王飲酒畢，因得自解去。未出戶，江歎曰：「人自量，固為難。」", "왕공(王恭)이 강노노(江盧奴, 江績)를 장사(長史)로 청하고자 새벽에 강노노를 찾아갔는데, 강노노는 아직 장막 안에 있었다. 왕공이 앉아서 감히 곧바로 말을 꺼내지 못했다. 한참 만에야 말을 꺼냈으나 강노노는 응하지 않았다. 그저 사람을 불러 술을 가져오게 하여 스스로 한 잔을 마시고는 또 왕공에게 권하지도 않았다. 왕공이 웃으며 말했다. \"어찌 혼자만 드시오?\" 강노노가 말했다. \"그대도 또 마시려 하오?\" 다시 술을 따라 왕공에게 주게 하니, 왕공이 술을 다 마시고는 이에 스스로 물러나 떠날 수 있었다. 아직 문을 나서기도 전에 강노노가 탄식하여 말했다. \"사람이 스스로를 헤아리는 것은 참으로 어려운 일이다.\"", ["거절", "술과취흥", "도량"]], ["方正", 64, "孝武問王爽：「卿何如卿兄。」王答曰：「風流秀出，臣不如恭，忠孝亦何可以假人！」", "효무제(孝武帝)가 왕상(王爽)에게 물었다. \"그대는 그대의 형과 비교하면 어떠한가?\" 왕상이 답했다. \"풍류(風流)가 빼어남은 신이 왕공(王恭)만 못합니다만, 충효(忠孝)야 또한 어찌 남에게 양보할 수 있겠습니까!\"", ["비평", "충직", "겸손"]], ["方正", 65, "王爽與司馬太傅飲酒。太傅醉，呼王為「小子。」王曰：「亡祖長史，與簡文皇帝為布衣之交。亡姑、亡姊，伉儷二宮。何小子之有？」", "왕상(王爽)이 태부(太傅) 사마(司馬)와 더불어 술을 마셨다. 태부가 취하여 왕상을 \"애송이\"라 불렀다. 왕상이 말하였다. \"돌아가신 제 조부 장사(長史)께서는 간문황제(簡文皇帝)와 더불어 베옷의 사귐을 맺으셨고, 돌아가신 고모님과 돌아가신 누님께서는 두 궁궐에 짝이 되셨습니다. 어찌 애송이라 하십니까?\"", ["분노", "기지", "술과취흥"]], ["方正", 66, "張玄與王建武先不相識，後遇於范豫章許，范令二人共語。張因正坐斂衽，王孰視良久，不對。張大失望，便去。范苦譬留之，遂不肯住。范是王之舅，乃讓王曰：「張玄，吳士之秀，亦見遇於時，而使至於此，深不可解。」王笑曰：「張祖希若欲相識，自應見詣。」范馳報張，張便束帶造之。遂舉觴對語，賓主無愧色。", "장현(張玄)과 왕건무(王建武)는 본래 서로 알지 못하였는데, 뒤에 범예장(范豫章)의 처소에서 마주치자 범예장이 두 사람에게 함께 이야기를 나누게 하였다. 장현은 이에 바르게 앉아 옷깃을 여몄으나, 왕건무는 한참을 자세히 보기만 할 뿐 응대하지 않았다. 장현은 크게 실망하여 곧 떠나려 하였다. 범예장이 애써 타이르며 만류하였으나 끝내 머물려 하지 않았다. 범예장은 왕건무의 외삼촌이었는데, 이에 왕건무를 나무라며 말하였다. \"장현은 오(吳) 땅 선비의 빼어난 자로 당세에 인정받는 사람인데, 이 지경에 이르게 하니 도무지 이해할 수 없구나.\" 왕건무가 웃으며 말하였다. \"장조희(張祖希)가 만약 저와 알고자 한다면 마땅히 스스로 찾아와야지요.\" 범예장이 달려가 장현에게 알리니, 장현은 곧 띠를 매고 그를 찾아왔다. 마침내 잔을 들어 마주 이야기하니, 손님과 주인이 부끄러운 기색이 없었다.", ["오만", "비평", "우정"]], ["雅量", 1, "豫章太守顧邵，是雍之子。邵在郡卒，雍盛集僚屬，自圍棊。外啟信至，而無兒書，雖神氣不變，而心了其故。以爪掐掌，血流沾褥。賓客既散，方歎曰：「已無延陵之高，豈可有喪明之責？」於是豁情散哀，顏色自若。", "예장태수(豫章太守) 고소(顧邵)는 고옹(顧雍)의 아들이었다. 고소가 군에서 죽었는데, 고옹은 부하 관속들을 성대히 모아 놓고 직접 바둑을 두고 있었다. 밖에서 소식이 왔다고 아뢰는데 아들의 편지가 없으니, 비록 신기(神氣)는 변치 않았으나 마음으로 그 까닭을 알아차렸다. 손톱으로 손바닥을 찌르니 피가 흘러 깔개를 적셨다. 손님들이 흩어진 뒤에야 비로소 탄식하며 말하였다. \"이미 연릉(延陵)의 높은 덕은 없으니, 어찌 눈이 멀도록 슬퍼했다는 책망을 들을 수 있겠는가?\" 이에 마음을 풀고 슬픔을 흩어 안색이 태연하였다.", ["죽음", "도량", "담대한죽음"]], ["雅量", 2, "嵇中散臨刑東市，神氣不變。索琴彈之，奏廣陵散。曲終曰：「袁孝尼嘗請學此散，吾靳固不與，廣陵散於今絕矣！」太學生三千人上書，請以為師，不許。文王亦尋悔焉。", "혜중산(嵇中散, 혜강)이 동시(東市)에서 형을 받게 되었는데, 신기(神氣)가 변치 않았다. 거문고를 찾아 타며 광릉산(廣陵散)을 연주하였다. 곡이 끝나자 말하였다. \"원효니(袁孝尼)가 일찍이 이 곡을 배우기를 청하였으나 내 아껴 굳이 주지 않았더니, 광릉산이 이제 끊어지는구나!\" 태학생 삼천 명이 글을 올려 그를 스승으로 삼기를 청하였으나 허락되지 않았다. 문왕(文王, 사마소) 또한 머지않아 후회하였다.", ["담대한죽음", "음악", "죽음"]], ["雅量", 3, "夏侯太初嘗倚柱作書。時大雨，霹靂破所倚柱，衣服焦然，神色無變，書亦如故。賓客左右，皆跌蕩不得住。", "하후태초(夏侯太初, 하후현)가 일찍이 기둥에 기대어 글을 쓰고 있었다. 그때 큰비가 내리는데 벼락이 기대고 있던 기둥을 부수어 옷이 그을렸으나, 신색(神色)이 변치 않고 글 쓰기도 여전하였다. 손님과 좌우의 사람들은 모두 넘어지고 자빠져 가만히 있지 못하였다.", ["용기", "담대한죽음"]], ["雅量", 4, "王戎七歲，嘗與諸小兒遊。看道邊李樹多子折枝。諸兒競走取之，唯戎不動。人問之，答曰：「樹在道邊而多子，此必苦李。」取之，信然。", "왕융(王戎)이 일곱 살 때 여러 아이들과 더불어 놀았다. 길가의 오얏나무에 열매가 많이 달려 가지가 휘어진 것을 보았다. 여러 아이들이 다투어 달려가 그것을 따는데, 오직 왕융만이 움직이지 않았다. 사람들이 까닭을 물으니 대답하였다. \"나무가 길가에 있는데 열매가 많으니, 이는 분명 쓴 오얏일 것이다.\" 따 보니 과연 그러하였다.", ["신동", "지혜"]], ["雅量", 5, "魏明帝於宣武場上斷虎爪牙，縱百姓觀之。王戎七歲，亦往看。虎承閒攀欄而吼，其聲震地，觀者無不辟易顛仆。戎湛然不動，了無恐色。", "위(魏) 명제(明帝)가 선무장(宣武場)에서 범의 발톱과 이빨을 잘라 내고 백성들에게 구경하도록 풀어 놓았다. 왕융(王戎)이 일곱 살 때 또한 가서 구경하였다. 범이 틈을 타 난간을 붙들고 포효하니 그 소리가 땅을 울려, 구경하는 자들이 모두 놀라 물러나며 자빠지지 않는 이가 없었다. 그러나 왕융은 침착하게 움직이지 않고 조금도 두려워하는 기색이 없었다.", ["용기", "신동"]], ["雅量", 6, "王戎為侍中，南郡太守劉肇遺筒中箋布五端，戎雖不受，厚報其書。", "왕융(王戎)이 시중(侍中)이 되었을 때, 남군태수(南郡太守) 유조(劉肇)가 통(筒)에 담은 고운 베 다섯 단을 보냈다. 왕융은 비록 받지 않았으나, 그 편지에는 후하게 답하였다.", ["거절", "청빈"]], ["雅量", 7, "裴叔則被收，神氣無變，舉止自若。求紙筆作書。書成，救者多，乃得免。後位儀同三司。", "배숙칙(裴叔則, 배해)이 체포되었을 때 신기(神氣)가 변치 않고 거동이 태연하였다. 종이와 붓을 청하여 글을 썼다. 글이 완성되자 구원하는 자가 많아 마침내 면할 수 있었다. 뒤에 의동삼사(儀同三司)의 지위에 올랐다.", ["담대한죽음", "용기"]], ["雅量", 8, "王夷甫嘗屬族人事，經時未行，遇於一處飲燕，因語之曰：「近屬尊事，那得不行？」族人大怒，便舉樏擲其面。夷甫都無言，盥洗畢，牽王丞相臂，與共載去。在車中照鏡語丞相曰：「汝看我眼光，迺出牛背上。」", "왕이보(王夷甫, 왕연)가 일찍이 한 족인(族人)에게 일을 부탁하였는데, 때가 지나도록 행하지 않았다. 한 곳에서 연회 자리에서 마주치자 이에 말하였다. \"근래에 그대에게 일을 부탁하였는데 어찌 행하지 않는가?\" 족인이 크게 노하여 곧 음식 그릇을 들어 그의 얼굴에 던졌다. 왕이보는 도무지 말이 없었고, 씻기를 마치고는 왕승상(王丞相, 왕도)의 팔을 끌어 함께 수레에 타고 떠났다. 수레 안에서 거울을 비추며 승상에게 말하였다. \"그대 보게, 내 눈빛이 소 등 위에까지 미치네.\"", ["도량", "분노"]], ["雅量", 9, "裴遐在周馥所，馥設主人。遐與人圍棊，馥司馬行酒。遐正戲，不時為飲。司馬恚，因曳遐墜地。遐還坐，舉止如常，顏色不變，復戲如故。王夷甫問遐：「當時何得顏色不異？」答曰：「直是闇當故耳。」", "배하(裴遐)가 주복(周馥)의 처소에 있을 때 주복이 주인 노릇을 하였다. 배하가 다른 사람과 바둑을 두고 있는데 주복의 사마(司馬)가 술을 돌렸다. 배하는 한창 바둑을 두느라 제때에 마시지 못하였다. 사마가 화가 나 배하를 끌어당겨 땅에 넘어뜨렸다. 배하는 도로 앉아 거동이 평소와 같고 안색도 변치 않으며 다시 전처럼 바둑을 두었다. 왕이보(王夷甫, 왕연)가 배하에게 물었다. \"그때 어찌 안색이 달라지지 않을 수 있었는가?\" 대답하였다. \"그저 어렴풋이 받아 넘겼을 뿐입니다.\"", ["도량", "분노", "용기"]], ["雅量", 10, "劉慶孫在太傅府，于時人士，多為所構。唯庾子嵩縱心事外，無迹可閒。後以其性儉家富，說太傅令換千萬，冀其有吝，於此可乘。太傅於眾坐中問庾，庾時頹然已醉，幘墜几上，以頭就穿取，徐答云：「下官家故可有兩娑千萬，隨公所取。」於是乃服。後有人向庾道此，庾曰：「可謂以小人之慮，度君子之心。」", "유경손(劉慶孫)이 태부(太傅)의 부(府)에 있을 때, 당시 인사들이 그에게 모함당하는 일이 많았다. 오직 유자숭(庾子嵩)만은 마음을 세상 밖에 풀어 놓아 흠잡을 자취가 없었다. 뒤에 그가 성품이 검소하고 집이 부유함을 들어, 태부에게 천만 전을 빌려 달라고 청하게 권하니, 그가 인색하게 굴면 그 틈을 탈 수 있으리라 여겼다. 태부가 여러 사람이 모인 자리에서 유자숭에게 물으니, 유자숭은 그때 거나하게 이미 취하여 두건이 안석 위로 떨어졌는데, 머리를 갖다 대어 꿰어 쓰고는 천천히 대답하였다. \"제 집에는 본디 이천만쯤은 있으니, 공께서 가져가시는 대로 드리지요.\" 이에 모두 탄복하였다. 뒤에 어떤 사람이 유자숭에게 이 일을 말하니, 유자숭이 말하였다. \"소인의 헤아림으로 군자의 마음을 잰 것이라 할 만하군.\"", ["도량", "술수", "청빈"]], ["雅量", 11, "王夷甫與裴景聲志好不同。景聲惡欲取之，卒不能回。乃故詣王，肆言極罵，要王答己，欲以分謗。王不為動色，徐曰：「白眼兒遂作。」", "왕이보(王夷甫, 왕연)와 배경성(裴景聲)은 뜻과 좋아하는 바가 같지 않았다. 배경성은 그가 자기를 끌어들이려는 것이 싫었으나 끝내 돌이킬 수 없었다. 이에 일부러 왕이보를 찾아가 거리낌 없이 말하며 심하게 욕하여 왕이보가 자기에게 응수하게 하려 하였으니, 비방을 함께 나누고자 한 것이었다. 그러나 왕이보는 안색도 변치 않고 천천히 말하였다. \"백안의 아이가 끝내 이러는구나.\"", ["도량", "원한", "절교"]], ["雅量", 12, "王夷甫長裴成公四歲，不與相知。時共集一處，皆當時名士，謂王曰：「裴令令望何足計！」王便卿裴。裴曰：「自可全君雅志。」", "왕이보(王夷甫, 왕연)는 배성공(裴成公)보다 네 살 위였으나 서로 가까이 사귀지 않았다. 한때 한 곳에 함께 모였는데 모두 당시의 명사들이었다. 사람들이 왕이보에게 말하였다. \"배령(裴令)의 명망을 어찌 따질 것이 있겠습니까!\" 그러자 왕이보가 배성공을 '경(卿)'이라 불렀다. 배성공이 말하였다. \"그대의 고아한 뜻을 온전히 지키시구려.\"", ["오만", "비평", "도량"]], ["雅量", 13, "有往來者云庾公有東下意，或謂王公可潛稍嚴，以備不虞。王公曰：「我與元規雖俱王臣，本懷布衣之好，若其欲來，吾角巾徑還烏衣。」", "왕래하는 자가 와서 유공(庾公, 유량)이 동쪽으로 내려올 뜻이 있다고 말하니, 어떤 이가 왕공(王公, 왕도)에게 은밀히 차츰 경계를 갖추어 뜻밖의 사태에 대비하시라고 일렀다. 왕공이 말하였다. \"나와 원규(元規)는 비록 다 같이 임금의 신하이나, 본디 베옷의 사귐을 품고 있다. 만약 그가 오고자 한다면 나는 각건(角巾)을 쓰고 곧장 오의(烏衣)로 돌아가리라.\"", ["우정", "권력", "도량"]], ["雅量", 14, "王丞相主簿欲檢校帳下，公語主簿，欲與主簿周旋，無為知人几案間事。", "왕승상(王丞相, 왕도)의 주부(主簿)가 장하(帳下)를 검사하려 하니, 공이 주부에게 말하였다. \"나는 주부와 더불어 사이좋게 지내고자 하니, 남의 안석과 책상 사이의 일은 알려 하지 말게.\"", ["도량", "우정"]], ["雅量", 15, "祖士少好財，阮遙集好屐並恒自經營。同是一累而未判其得失。人有詣祖，見料視財物。客至，屏當未盡，餘兩小簏箸背後，傾身障之，意未能平。或有詣阮，見自吹火蠟屐，因歎曰：「未知一生當箸幾量屐？」神色閑暢。於是勝負始分。", "조사소(祖士少)는 재물을 좋아하고 완요집(阮遙集)은 나막신을 좋아하여, 둘 다 늘 직접 그것을 챙겼다. 똑같이 하나의 얽매임이나 그 우열은 가려지지 않았다. 어떤 사람이 조사소를 찾아가니, 재물을 헤아려 살피고 있었다. 손님이 이르자 미처 다 치우지 못하고 작은 대바구니 두 개를 등 뒤에 둔 채 몸을 기울여 가리는데, 마음이 평온치 못한 듯하였다. 어떤 사람이 완요집을 찾아가니, 직접 불을 불어 나막신에 밀랍을 먹이며 이에 탄식하여 말하였다. \"한평생에 나막신을 몇 켤레나 신게 될지 모르겠구나.\" 신색(神色)이 한가롭고 화창하였다. 이에 우열이 비로소 가려졌다.", ["비평", "청빈", "풍류"]], ["雅量", 16, "許侍中、顧司空俱作丞相從事，爾時已被遇，遊宴集聚，略無不同。嘗夜至丞相許戲，二人歡極，丞相便命使入己帳眠。顧至曉回轉，不得快孰。許上牀便咍臺大鼾。丞相顧諸客曰：「此中亦難得眠處。」", "허시중(許侍中)과 고사공(顧司空)이 함께 승상(丞相, 왕도)의 종사(從事)가 되었는데, 그때 이미 두터운 대우를 받아 노닐고 잔치하며 모이는 데에 거의 같지 않은 적이 없었다. 일찍이 밤에 승상의 처소에 이르러 즐기는데 두 사람이 몹시 즐거워하니, 승상이 곧 자기 장막에 들어가 자도록 하였다. 고사공은 새벽까지 이리저리 뒤척이며 편히 잠들지 못하였으나, 허시중은 침상에 오르자 곧 코를 크게 골며 잤다. 승상이 여러 손님을 돌아보며 말하였다. \"이 안도 잠자기 어려운 곳이로다.\"", ["우정", "도량", "풍류"]], ["雅量", 17, "庾太尉風儀偉長，不輕舉止，時人皆以為假。亮有大兒數歲，雅重之質，便自如此，人知是天性。溫太真嘗隱幔怛之，此兒神色恬然，乃徐跪曰：「君侯何以為此？」論者謂不減亮。蘇峻時遇害。或云：「見阿恭，知元規非假。」", "유태위(庾太尉, 유량)는 풍채와 거동이 훤칠하고 행동거지를 가벼이 하지 않으니, 당시 사람들은 모두 그것을 꾸민 것이라 여겼다. 유량에게 몇 살 된 큰아들이 있었는데, 점잖고 묵직한 바탕이 절로 이러하니, 사람들은 그것이 천성임을 알았다. 온태진(溫太眞, 온교)이 일찍이 휘장 뒤에 숨어 그 아이를 놀라게 하였으나, 이 아이는 신색(神色)이 태연하였고 이에 천천히 무릎 꿇으며 말하였다. \"군후(君侯)께서는 어찌하여 이러십니까?\" 평하는 자들은 유량에 못지않다 하였다. 소준(蘇峻)의 난 때 해를 입었다. 어떤 이가 말하였다. \"아공(阿恭)을 보면 원규(元規)가 꾸민 것이 아님을 알겠다.\"", ["용모", "비평", "담대한죽음"]], ["雅量", 18, "褚公於章安令遷太尉記室參軍，名字已顯而位微，人未多識。公東出，乘估客船，送故吏數人投錢唐亭住。爾時吳興沈充為縣令，當送客過浙江，客出，亭吏驅公移牛屋下。潮水至，沈令起彷徨，問：「牛屋下是何物人？」吏云：「昨有一傖父來寄亭中，有尊貴客，權移之。」令有酒色，因遙問「傖父欲食不？姓何等？可共語。」褚因舉手答曰：「河南褚季野。」遠近久承公名，令於是大遽，不敢移公，便於牛屋下脩刺詣公。更宰殺為饌，具於公前，鞭撻亭吏，欲以謝慚。公與之酌宴，言色無異，狀如不覺。令送公至界。", "저공(褚公)이 장안령(章安令)에서 태위기실참군(太尉記室參軍)으로 옮겼는데, 명성은 이미 드러났으나 지위는 낮아 사람들이 아직 많이 알지 못하였다. 공이 동쪽으로 나갈 때 장사꾼의 배를 타고, 전송하는 옛 아전 몇 사람과 더불어 전당정(錢唐亭)에 들어 묵었다. 그때 오흥(吳興)의 심충(沈充)이 현령이었는데, 손님을 전송하느라 절강(浙江)을 건너게 되었다. 손님이 나오자 정(亭)의 아전이 공을 몰아 소 외양간 아래로 옮겼다. 밀물이 이르자 심령이 일어나 서성이다가 물었다. \"소 외양간 아래 있는 자는 어떤 사람인가?\" 아전이 말하였다. \"어제 어떤 시골 사내가 와서 정에 묵었는데, 존귀한 손님이 계시기에 잠시 옮겼습니다.\" 심령은 술기운이 있어 멀리서 물었다. \"시골 사내는 먹겠는가? 성이 무엇인가? 함께 이야기할 만한가?\" 저공이 이에 손을 들어 답하였다. \"하남(河南)의 저계야(褚季野)요.\" 원근에서 오래도록 공의 이름을 들어 왔던지라 심령은 이에 크게 황급하여 감히 공을 옮기지 못하고, 곧 소 외양간 아래에서 명함을 갖추어 공을 뵈었다. 다시 짐승을 잡아 음식을 마련하여 공 앞에 갖추고, 정의 아전을 채찍질하여 부끄러움을 사죄하려 하였다. 공은 그와 더불어 술을 마시는데 말과 안색이 다름이 없어, 마치 아무것도 알아차리지 못한 듯하였다. 심령은 공을 경계까지 전송하였다.", ["도량", "기지", "권력"]], ["雅量", 19, "郗太傅在京口，遣門生與王丞相書，求女壻。丞相語郗信：「君往東廂，任意選之。」門生歸，白郗曰：「王家諸郎，亦皆可嘉，聞來覓壻，咸自矜持。唯有一郎，在東牀上坦腹臥，如不聞。」郗公云：「正此好！」訪之，乃是逸少，因嫁女與焉。", "치태부(郗太傅, 치감)가 경구(京口)에 있을 때, 문생을 보내 왕승상(王丞相, 왕도)에게 편지를 전하여 사위를 구하였다. 승상이 치감의 심부름꾼에게 말하였다. \"그대가 동쪽 곁채로 가서 마음대로 골라 보게.\" 문생이 돌아와 치감에게 아뢰었다. \"왕씨 집안의 여러 도련님들은 모두 훌륭하였으나, 사위를 구하러 왔다는 말을 듣고는 다들 스스로 점잔을 빼고 있었습니다. 오직 한 도련님만이 동쪽 평상 위에 배를 드러내고 누워 마치 못 들은 듯하였습니다.\" 치공이 말하였다. \"바로 그 사람이 좋다!\" 찾아보니 곧 일소(逸少, 왕희지)였다. 이에 딸을 그에게 시집보냈다.", ["부부", "풍류", "비평"]], ["雅量", 20, "過江初，拜官，輿飾供饌。羊曼拜丹陽尹，客來蚤者，並得佳設。日晏漸罄，不復及精，隨客早晚，不問貴賤。羊固拜臨海，竟日皆美供。雖晚至，亦獲盛饌。時論以固之豐華，不如曼之真率。", "강을 건너온 초기에는 관직에 임명되면 수레를 꾸미고 음식을 대접하였다. 양만(羊曼)이 단양윤(丹陽尹)에 임명되었을 때, 일찍 온 손님은 다 좋은 음식 대접을 받았다. 날이 저물어 점차 떨어지면 더는 좋은 음식이 미치지 못하니, 손님이 일찍 왔느냐 늦게 왔느냐에 따랐을 뿐 귀천을 묻지 않았다. 양고(羊固)가 임해(臨海)에 임명되었을 때는 온종일 모두 좋은 음식을 대접하여, 비록 늦게 이르러도 또한 성대한 음식을 얻었다. 당시의 평론은 양고의 풍성하고 화려함이 양만의 진솔함만 못하다고 하였다.", ["베풂", "비평"]], ["雅量", 21, "周仲智飲酒醉，瞋目還面謂伯仁曰：「君才不如弟，而橫得重名！」須臾，舉蠟燭火擲伯仁。伯仁笑曰：「阿奴火攻，固出下策耳！」", "주중지(周仲智)가 술을 마셔 취하자 눈을 부릅뜨고 얼굴을 돌려 백인(伯仁, 주의)에게 말하였다. \"그대는 재주가 아우만 못한데도 함부로 무거운 명성을 얻었구나!\" 잠시 후 밀랍 촛불을 들어 백인에게 던졌다. 백인이 웃으며 말하였다. \"아노(阿奴)의 화공이란 본디 하책에서 나온 것일 뿐이로구나!\"", ["술과취흥", "분노", "비평"]], ["雅量", 22, "顧和始為楊州從事。月旦當朝，未入頃，停車州門外。周侯詣丞相，歷和車邊。和覓蝨，夷然不動。周既過，反還，指顧心曰：「此中何所有？」顧搏蝨如故，徐應曰：「此中最是難測地。」周侯既入，語丞相曰：「卿州吏中有一令僕才。」", "고화(顧和)가 처음 양주(楊州)의 종사(從事)가 되었다. 초하루에 조회를 해야 하였는데, 아직 들어가기 전 잠시 주(州)의 문 밖에 수레를 세워 두었다. 주후(周侯, 주의)가 승상(丞相, 왕도)을 찾아가다가 고화의 수레 곁을 지났다. 고화는 이를 잡으며 태연히 움직이지 않았다. 주후가 지나갔다가 도로 돌아와 고화의 가슴을 가리키며 말하였다. \"이 안에 무엇이 들어 있는가?\" 고화는 전처럼 이를 잡으며 천천히 응하였다. \"이 안이 가장 헤아리기 어려운 곳이지요.\" 주후가 들어가서 승상에게 말하였다. \"그대 주의 아전 가운데 영복(令僕)의 재목이 하나 있더이다.\"", ["도량", "기지", "비평"]], ["雅量", 23, "庾太尉與蘇峻戰，敗，率左右十餘人，乘小船西奔。亂兵相剝掠，射誤中柂工，應弦而倒。舉船上咸失色分散，亮不動容，徐曰：「此手那可使箸賊！」眾迺安。", "유태위(庾太尉, 유량)가 소준(蘇峻)과 싸워 패하여, 좌우 십여 인을 거느리고 작은 배를 타고 서쪽으로 달아났다. 난병들이 서로 약탈하다가 화살이 잘못 키잡이를 맞히니, 시위 소리에 따라 쓰러졌다. 온 배의 사람들이 모두 안색이 변하여 흩어졌으나, 유량은 동요하는 기색 없이 천천히 말하였다. \"이런 솜씨로 어찌 적을 맞힐 수 있겠는가!\" 그러자 무리가 비로소 안정되었다.", ["용기", "도량"]], ["雅量", 24, "庾小征西嘗出未還。婦母阮是劉萬安妻，與女上安陵城樓上。俄頃翼歸，策良馬，盛輿衛。阮語女：「聞庾郎能騎，我何由得見？」婦告翼，翼便為於道開鹵簿盤馬，始兩轉，墜馬墮地，意色自若。", "유소정서(庾小征西, 유익)가 일찍이 나가 아직 돌아오지 않았다. 그 아내의 어머니 완씨(阮氏)는 유만안(劉萬安)의 아내인데, 딸과 함께 안릉성(安陵城) 누각 위에 올랐다. 잠시 후 유익이 돌아오는데, 좋은 말을 채찍질하며 성대한 의장과 호위를 갖추었다. 완씨가 딸에게 말하였다. \"유랑(庾郞)이 말을 잘 탄다고 들었는데, 내 어찌하면 볼 수 있겠느냐?\" 아내가 유익에게 알리니, 유익이 곧 길에서 의장 행렬을 벌이고 말을 빙빙 돌렸는데, 두 바퀴를 돌자마자 말에서 떨어져 땅에 굴렀으나, 마음과 안색이 태연하였다.", ["도량", "용모"]], ["雅量", 25, "宣武與簡文、太宰共載，密令人在輿前後鳴鼓大叫。鹵簿中驚擾，太宰惶怖求下輿。顧看簡文，穆然清恬。宣武語人曰：「朝廷間故復有此賢。」", "선무(宣武, 환온)가 간문(簡文), 태재(太宰)와 함께 수레를 탔는데, 은밀히 사람을 시켜 수레 앞뒤에서 북을 치며 크게 소리치게 하였다. 의장 행렬 가운데서 놀라 소란하니, 태재는 두려워 떨며 수레에서 내리기를 청하였다. 간문을 돌아보니 잠잠하고 맑고 편안하였다. 선무가 사람들에게 말하였다. \"조정 안에는 본디 이러한 현인이 또 있구나.\"", ["도량", "용기", "비평"]], ["雅量", 26, "王劭、王薈共詣宣武，正值收庾希家。薈不自安，逡巡欲去；劭堅坐不動，待收信還，得不定迺出。論者以劭為優。", "왕소(王劭)와 왕회(王薈)가 함께 선무(宣武, 환온)를 찾아갔는데, 마침 유희(庾希)의 집을 압수하는 때를 만났다. 왕회는 스스로 불안하여 머뭇거리며 떠나려 하였으나, 왕소는 굳게 앉아 움직이지 않고 압수의 소식이 돌아오기를 기다려 일이 안정된 뒤에야 나왔다. 평하는 자들은 왕소를 낫다 하였다.", ["도량", "비평"]], ["雅量", 27, "桓宣武與郗超議芟夷朝臣，條牒既定，其夜同宿。明晨起，呼謝安、王坦之入，擲疏示之。郗猶在帳內，謝都無言，王直擲還，云：多！宣武取筆欲除，郗不覺竊從帳中與宣武言。謝含笑曰：「郗生可謂入幕賓也。」", "환선무(桓宣武, 환온)가 치초(郗超)와 더불어 조정의 신하들을 베어 없앨 일을 의논하여, 명단이 정해지자 그날 밤 함께 묵었다. 이튿날 아침 일어나 사안(謝安)과 왕탄지(王坦之)를 불러들여 그 명단을 던져 보였다. 치초는 아직 장막 안에 있었다. 사안은 도무지 말이 없었고, 왕탄지는 곧장 던져 돌려주며 말하였다. \"많습니다!\" 선무가 붓을 들어 지우려 하자, 치초가 무심결에 몰래 장막 안에서 선무와 말을 주고받았다. 사안이 웃음을 머금고 말하였다. \"치생(郗生)은 장막에 든 손님이라 할 만하군.\"", ["술수", "도량", "권력"]], ["雅量", 28, "謝太傅盤桓東山時，與孫興公諸人汎海戲。風起浪涌，孫、王諸人色並遽，便唱使還。太傅神情方王，吟嘯不言。舟人以公貌閑意說，猶去不止。既風轉急，浪猛，諸人皆諠動不坐。公徐云：「如此，將無歸！」眾人即承響而回。於是審其量，足以鎮安朝野。", "사태부(謝安)가 동산(東山)에서 한가로이 지낼 때 손흥공(孫綽) 등 여러 사람과 바다에 배를 띄워 노닐었다. 바람이 일고 물결이 치솟자 손씨와 왕씨 등 여러 사람의 낯빛이 모두 다급해져서 곧 배를 돌리자고 소리쳤다. 그러나 태부는 신정(神情)이 한창 고조되어 시를 읊고 휘파람을 불며 말이 없었다. 사공이 공의 모습이 한가롭고 뜻이 즐거워 보이는지라 그대로 나아가 그치지 않았다. 이윽고 바람이 더욱 급해지고 물결이 사나워지자 사람들이 모두 떠들썩하게 동요하여 앉아 있지 못했다. 그제야 공이 천천히 말했다. \"이러하니, 돌아가야 하지 않겠는가!\" 사람들이 곧 그 말에 응하여 돌아갔다. 이에 그 기량(器量)을 헤아려 보니 조정과 재야를 진정시켜 안정시키기에 충분하였다.", ["도량", "자연과산수", "용기"]], ["雅量", 29, "桓公伏甲設饌，廣延朝士，因此欲誅謝安、王坦之。王甚遽，問謝曰：「當作何計？」謝神意不變，謂文度曰：「晉阼存亡，在此一行。」相與俱前。王之恐狀，轉見於色。謝之寬容，愈表於貌。望階趨席，方作洛生詠，諷「浩浩洪流」。桓憚其曠遠，乃趣解兵。王、謝舊齊名，於此始判優劣。", "환공(桓溫)이 갑사를 숨겨두고 잔치를 베풀어 조정의 인사들을 널리 초청하니, 이를 빌려 사안(謝安)과 왕탄지(王坦之)를 죽이고자 함이었다. 왕탄지는 몹시 다급하여 사안에게 물었다. \"어떻게 해야겠소?\" 사안은 신의(神意)가 변하지 않은 채 문도(왕탄지)에게 말했다. \"진(晉) 왕조의 존망이 이번 걸음에 달려 있소.\" 함께 나란히 앞으로 나아갔다. 왕탄지의 두려워하는 모습은 점점 낯빛에 드러났으나, 사안의 너그러운 모습은 더욱 얼굴에 드러났다. 섬돌을 바라보며 자리로 나아가 막 낙양 서생의 가락으로 「호호홍류(浩浩洪流)」를 읊었다. 환온이 그 현원(玄遠)한 모습을 꺼려 마침내 서둘러 군사를 물렸다. 왕탄지와 사안은 본래 명성이 나란하였으나, 이에 이르러 비로소 우열이 갈렸다.", ["도량", "용기", "비평", "권력"]], ["雅量", 30, "謝太傅與王文度共詣郗超，日旰未得前，王便欲去。謝曰：「不能為性命忍俄頃？」", "사태부(謝安)가 왕문도(王坦之)와 함께 치초(郗超)를 찾아갔는데, 날이 저물도록 만날 수 없자 왕탄지가 곧 떠나려 했다. 사안이 말했다. \"목숨을 위해서 잠깐을 참지 못하겠소?\"", ["도량", "기지"]], ["雅量", 31, "支道林還東，時賢並送於征虜亭。蔡子叔前至，坐近林公。謝萬石後來，坐小遠。蔡暫起，謝移就其處。蔡還，見謝在焉，因合褥舉謝擲地，自復坐。謝冠幘傾脫，乃徐起振衣就席，神意甚平，不覺瞋沮。坐定，謂蔡曰：「卿奇人，殆壞我面。」蔡答曰：「我本不為卿面作計。」其後，二人俱不介意。", "지도림(支遁)이 동쪽으로 돌아갈 때 당시의 명사들이 모두 정로정(征虜亭)에서 전송했다. 채자숙(蔡子叔)이 먼저 와서 지둔 가까이에 앉았고, 사만석(謝萬)이 뒤에 와서 조금 멀리 앉았다. 채자숙이 잠시 일어나자 사만이 그 자
