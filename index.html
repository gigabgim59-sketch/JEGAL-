. <em>무제(武帝)</em>다. 280년에 오(吳)를 멸해 천하를 통일했다. 한말의 분열이 비로소 매듭지어진 자리다. 그러나 무제 사후의 평화는 짧았다. 황후 <em>가남풍</em>의 농단과 종친 분봉의 후유증이 겹쳐 <em>팔왕(八王)의 난</em>(291~306)이 일어났다. 사마씨의 종친들이 서로의 목을 베며 천하를 부쉈다. 그 빈자리로 북방 <em>오호(五胡)</em>가 밀려들었다.\n\n311년의 <em>영가의 난(永嘉之亂)</em>에서 <em>유총(劉聰)</em>의 군이 낙양을 함락하고 <em>회제(懷帝)</em>를 사로잡았다. 316년 장안의 <em>민제(愍帝)</em>도 사로잡혔다. 종친의 대부분이 이때 죽거나 잡혔다. 한 황실이 한 세대 안에 한꺼번에 쓸려 나간 사건이다.\n\n다행히 강동에 <em>낭야왕 사마예(司馬睿)</em>가 있었다. <em>왕도(王導)</em>의 보좌로 건강(建康)에 자리 잡고, 317년 진왕(晉王)을 칭하다 이듬해 황제로 즉위했다. <em>동진(東晉)</em>의 <em>원제(元帝)</em>다. 이때부터 <em>왕여마공천하(王與馬, 共天下)</em>라 일컬어지는 황실과 <em>낭야 왕씨</em>의 공치(共治)가 시작되었다. 황권은 약했고, <em>왕돈의 난</em>·<em>소준의 난</em>을 거치며 더 약해졌다.\n\n그러나 가문은 <em>효무제(孝武帝)</em> 대(372~396)에 한 차례 빛을 되찾았다. <em>사안(謝安)</em>이 정사를, <em>사현</em>이 <em>북부병</em>을 맡아 383년 <em>비수대전</em>에서 <em>부견</em>의 백만 대군을 깨뜨렸다. 이 한낮의 빛 뒤로 효무제의 아우 <em>사마도자(司馬道子)</em>의 농단이 이어졌고, <em>손은의 난</em>과 <em>환현의 찬위</em>를 거치며 가문은 마침내 무너졌다. 420년, <em>유유(劉裕)</em>가 <em>공제(恭帝)</em>에게서 선양을 받아 송(宋)을 세웠다. 위진의 한 시대가 끝난 자리다. 『세설신어』의 무대는 이 가문이 세운 한 시대의 안쪽이며, 그 황실의 그늘에서 명사들의 한 줄 한 줄이 새겨졌다.", "storyCount": 0}, {"id": "clan.PeiGuoCao", "type": "clan", "han": "沛國曹氏", "ko": "", "sub": "패국 조씨", "title": "", "short": "조조의 가문. 후한 말 조조의 명성에서 일어나, 그 아들 <em>조비</em>가 220년 위(魏)를 세웠다. 위 황실. 그러나 명운이 짧아 조비·조예·조방 세 황제 만에 사실상 사마씨에게 권력이 넘어갔다.", "long": "沛國 曹氏는 <em>조조(曹操)</em>에서 일어선 가문이다. 본래 패국(沛國) 초현(譙縣)의 한 호족이었으나, 조조의 조부 <em>조등(曹騰)</em>이 후한 환제(桓帝) 때의 환관으로 황제 옹립에 공을 세우면서 가세가 처음 일어났다. 조등은 비록 환관이지만 사대부의 추천을 후하게 한 사람으로 일컬어졌고, 그가 거둔 양자 <em>조숭(曹嵩)</em>이 곧 조조의 아버지다. 그러므로 패국 조씨는 <em>명문의 혈통이 아니라 환관의 양자에서 솟아난 신흥 가문</em>이라는 한 약점을 늘 안고 있었다. 후대 <em>원소(袁紹)</em>가 조조를 <em>환관의 자손</em>이라 욕한 까닭이다.\n\n이 약점을 단숨에 뒤집은 사람이 조조다. 황건의 난을 평정하는 자리에 일찍이 나서고, 동탁(董卓) 토벌의 의군을 일으키고, <em>관도(官渡)</em>에서 원소를 깨뜨려 화북을 차지했다. 후한의 마지막 황제 <em>헌제(獻帝)</em>를 허(許)에 옹위하고 <em>천자를 끼고 제후를 호령</em>하는 자리에 섰다. 시·산문·병법에 모두 능했고, 스스로 <em>치세의 능신, 난세의 간웅</em>이라 일컬어졌다. 그의 한 인격에 패국 조씨의 한 시대가 응축되어 있다.\n\n220년, 조조가 죽자 그 아들 <em>조비(曹丕)</em>가 헌제의 선양을 받아 위(魏)를 세웠다. 후한 사백 년이 닫히고 <em>삼국</em>의 한가운데가 위 황실의 자리가 된 것이다. 조비 자신이 빼어난 문인이라 <em>건안문학(建安文學)</em>의 한 정점을 이루었고, 동생 <em>조식(曹植)</em>은 더욱 그러했다. 형제가 황위를 두고 다툰 <em>칠보시(七步詩)</em> 일화는 패국 조씨 안의 한 어두운 그림자다. 또 한 동생 <em>조창(曹彰)</em>은 무장으로, 막내 <em>조웅(曹熊)</em>은 일찍 죽었다. 한 아버지 아래 시·정사·무용이 갈라져 나간 형국이다.\n\n위 황실의 명운은 짧았다. 조비가 재위 7년 만에 죽고(226), 그 아들 <em>조예(曹叡)</em>가 명제(明帝)로 섰다. 조예 또한 십삼 년 만에 죽고(239), 어린 <em>조방(曹芳)</em>이 즉위했다. 이 세 황제 동안 패국 조씨의 종실은 차츰 야위어 갔다. 조비가 즉위 직후 동성(同姓)의 종실을 엄격히 견제한 정책이 한 까닭이다. 종실에게 실권을 주지 않은 결과, 황실을 지탱할 안 기둥이 없었다.\n\n249년, <em>고평릉의 정변</em>이 일어났다. <em>사마의(司馬懿)</em>가 <em>조상(曹爽)</em> 일파를 일거에 제거하면서, 위 황실의 실권이 사실상 <em>사마씨</em>에게 넘어갔다. 패국 조씨가 일어선 지 한 세대를 채 넘기지 못한 자리에서 그 한 시대가 닫힌 셈이다. 이 정변으로 <em>하안(何晏)</em>을 비롯한 정시(正始) 명사들이 한꺼번에 사라졌고, <em>현학</em>의 무대 또한 <em>죽림</em>으로 옮겨 갔다. 패국 조씨의 운명이 한 사상사의 굽이까지 함께 끌고 간 것이다.\n\n이후 <em>조모(曹髦)</em>가 사마소(司馬昭)에게 칼을 들고 <em>사마소의 마음은 길 가는 사람도 안다(司馬昭之心, 路人皆知)</em> 외치며 죽고(260), <em>조환(曹奐)</em>이 마지막 황제로 섰다가 265년 <em>사마염(司馬炎)</em>에게 선양했다. 패국 조씨의 위는 45년 만에 닫혔다. 후한이 자기에게 선양했던 그 자리에서 똑같이 사마씨에게 선양한 셈이니, 한 시대의 한 균형이다.\n\n『세설신어』에서 패국 조씨는 주로 <em>조조</em>의 일화(〈가휼〉·〈용지〉)와 <em>조비</em>·<em>조식</em> 형제의 일화(〈문학〉·〈상서〉·〈우회〉)로 등장한다. 〈가휼〉편의 조조, 〈문학〉편의 조식 — 위진 명사들의 한 시대가 그 환관의 양자에서 솟아난 한 가문에서 비롯되었음을 그 일화들이 조용히 일러 준다.", "storyCount": 0}, {"id": "clan.JiangNanSiDaXing", "type": "clan", "han": "江南四大姓", "ko": "", "sub": "강남 사대성 (顧·陸·朱·張)", "title": "", "short": "강좌의 토착 사대부 가문 넷. <em>고씨</em>는 고영(顧榮)·고화(顧和)·<em>고개지(顧愷之)</em>, <em>육씨</em>는 육기(陸機)·육운(陸雲), <em>주씨</em>는 주의(周顗)와 별개의 강좌 토착 周氏, <em>장씨</em>는 장한(張翰). 의관남도해 온 북방 사대부와 함께 동진 사회를 떠받쳤다. <em>왕도</em>의 정략으로 화해된 한 자리.", "long": "江南四大姓은 <em>고(顧)</em>·<em>육(陸)</em>·<em>주(朱)</em>·<em>장(張)</em> 네 가문을 함께 일컫는 말이다. <em>오군(吳郡)</em>을 중심으로 한 <em>강좌(江左)</em>의 토착 사대부 가문이며, 손오(孫吳) 시대부터 이 지역의 정사·문화를 떠받쳐 온 뿌리 깊은 명문이다. 의관남도해 온 북방 사대부와 더불어 동진 사회의 두 기둥을 이뤘다.\n\n먼저 <em>고씨</em>는 사대성 가운데 가장 일찍부터 두각을 드러냈다. 손오 때 승상을 지낸 <em>고옹(顧雍)</em>이 그 머리에 선다. 서진 말의 <em>고영(顧榮)</em>은 <em>팔왕의 난</em>의 한가운데에서 강남으로 물러나, 의관남도해 온 <em>왕도(王導)</em>가 강좌의 인심을 얻고자 할 때 가장 먼저 화해의 손을 잡은 인물이다. 고영의 한 마디로 오 지역 사대부의 의심이 풀렸다 한다. 동진에 들어와서는 <em>고화(顧和)</em>가 청담과 정사를 겸했고, 그 후예에서 <em>화가 고개지(顧愷之)</em>가 나왔다. 고개지의 절륜한 그림과 <em>치절(癡絶)</em>의 일화는 〈교예〉·〈배조〉편의 한 정점이다.\n\n<em>육씨</em>는 사대성 가운데 문학으로 가장 빛났다. 손오의 명장 <em>육손(陸遜)</em>·<em>육항(陸抗)</em>의 후예로, 오가 망한 뒤 <em>육기(陸機)</em>·<em>육운(陸雲)</em> 형제가 낙양에 올라가 <em>이륙입락(二陸入洛)</em>이라는 한 자리를 이루었다. 형 육기는 「文賦」와 「辨亡論」으로 한 시대 문장의 영수가 되었고, 동생 육운은 <em>청수(淸秀)</em>의 풍격으로 일컬어졌다. 〈문학〉·〈상예〉편에 형제의 모습이 거듭 보인다. 다만 <em>팔왕의 난</em>에 휘말려 두 형제가 함께 죽임을 당했고, 이 비극이 곧 <em>영가의 난</em> 직전 강좌 사대부의 한 슬픈 상징이 되었다.\n\n<em>주씨</em>는 강좌 토착의 朱氏다. 의관남도해 온 <em>여남 주씨</em>의 <em>주의(周顗)</em>와는 한자가 같되 별개의 가문이라는 점에 유의해야 한다. 강좌의 朱氏는 손오 때부터 무관과 호족으로 이름을 떨쳤고, <em>주환(朱桓)</em>·<em>주거(朱據)</em>가 그 머리에 든다. 동진에 들어와서는 무공보다 향리의 토착 세력으로서 지방을 떠받치는 자리에 섰다.\n\n<em>장씨</em>는 <em>오군 장씨</em>다. 가장 잘 알려진 인물이 <em>장한(張翰)</em>이다. 낙양에 벼슬해 있다가 가을바람이 일자 <em>고향의 순챗국과 농어회가 그립다(蓴鱸之思)</em> 하며 그 자리에서 벼슬을 버리고 강남으로 돌아간 일화가 〈식감〉·〈임탄〉편에 전한다. 한 끼의 향수로 벼슬을 던지는 그 풍격이 강좌 토착 사대부의 한 자기 정의가 되었다. 장씨 또한 손오 때부터 <em>장소(張昭)</em>·<em>장굉(張紘)</em>으로 이미 한 자리를 차지한 가문이다.\n\n이 네 가문이 한 자리에 모인 시대적 배경은 <em>영가의 난</em>(311) 직후의 강좌다. 북방에서 <em>낭야 왕씨</em>·<em>진군 사씨</em>·<em>초국 환씨</em> 등이 의관남도해 내려오자, 토착 사대부와의 충돌은 피할 수 없는 일이었다. 이 자리에서 <em>왕도</em>가 강좌 토착의 영수 <em>고영</em>·<em>하순(賀循)</em>에게 먼저 예를 갖춰 화해를 청한 것이, 곧 동진 정권의 정치적 출발점이다. <em>왕도</em>의 정략과 사대성의 응답이 만나, 동진 백 년의 <em>교우(僑寓)와 토착</em>의 공존이 비로소 가능해졌다.\n\n『세설신어』에서 사대성의 인물들은 〈언어〉·〈문학〉·〈식감〉·〈임탄〉·〈교예〉·〈배조〉편 곳곳에 흩어져 등장한다. 북방의 명문이 한낮의 빛이라면, 강남 사대성은 그 빛이 비추는 땅이었다.", "storyCount": 0}, {"id": "event.HuangJin", "type": "event", "han": "黃巾의 亂", "ko": "", "sub": "황건의 난 (184)", "title": "", "short": "후한 영제 광화 7년(184), <em>장각(張角)</em>이 太平道를 신앙으로 일으킨 농민 봉기. 누런 두건(黃巾)으로 상징을 삼았다. 한 황실의 권위를 사실상 무너뜨리고, 군웅이 천하를 나누는 단초가 되었다. <em>조조</em>·<em>유비</em>·<em>손견</em>의 모두가 이 난의 평정에서 일어났다.", "long": "<em>황건의 난(黃巾之亂)</em>은 후한 영제(靈帝) 광화(光和) 7년, 곧 <em>중평(中平) 원년(184)</em>에 일어난 거대한 종교적 농민 봉기다. 한 왕조 사백 년의 권위가 이 한 해를 분기로 사실상 무너졌고, 천하가 군웅의 손에 갈라지는 그 첫 자리가 곧 이 난이다. 위진(魏晉) 한 시대의 시계는 이 봉기에서부터 다시 매겨진다.\n\n배경. 후한 후기의 정사는 <em>외척</em>과 <em>환관</em>의 갈마든 농단으로 이미 한 세대 넘게 흔들리고 있었다. 영제 대(代)에 환관 <em>십상시(十常侍)</em>가 매관매직을 일삼아 군현의 수령 자리가 돈으로 거래되었고, 그 수령들은 본전을 뽑기 위해 백성을 짜냈다. 거기에 거듭된 가뭄과 황충(蝗蟲), 역병이 겹쳤다. <em>당고(黨錮)의 화</em>로 사대부의 정치적 입은 막혔다. 천하의 한 모서리도 성한 데가 없었다.\n\n이 답답함을 뚫고 거록(鉅鹿) 출신의 <em>장각(張角)</em>이 일어났다. 그는 <em>태평도(太平道)</em>라는 신앙을 세워 <em>부수(符水)</em>로 병을 치료한다 칭했고, 약 십여 년에 걸쳐 청주·서주·유주·기주·형주·양주·연주·예주 — 곧 천하의 여덟 주에 <em>수십만의 신도</em>를 모았다. 그가 가르친 <em>창천이 죽고 황천이 선다(蒼天已死, 黃天當立)</em>라는 참언은 한 왕조의 푸른 하늘이 끝나고 흙빛의 새 하늘이 온다는 <em>오덕종시설(五德終始說)</em>의 한 변주다. 누런 두건을 머리에 두른 것도 그 황천의 표지였다.\n\n거사는 본래 그해 3월 5일로 잡혀 있었다. 그러나 제자 <em>당주(唐周)</em>가 밀고해 낙양의 도내 조직이 먼저 잡히자, 장각이 급히 봉기 시기를 앞당겼다. 2월에 장각이 <em>천공장군(天公將軍)</em>, 동생 <em>장보(張寶)</em>가 <em>지공장군(地公將軍)</em>, <em>장량(張梁)</em>이 <em>인공장군(人公將軍)</em>을 칭하며 일제히 일어났다. 한 달이 못 되어 천하 여덟 주가 동시에 불탔다. <em>주군(州郡)이 막아내지 못했다</em>는 것이 그 기세였다.\n\n조정은 <em>당고</em>를 풀어 사대부를 다시 쓰고, <em>황보숭(皇甫嵩)</em>·<em>주준(朱儁)</em>·<em>노식(盧植)</em>을 좌·우·북중랑장(中郎將)으로 삼아 진압하게 했다. 동시에 각 주에 <em>모병의 권한</em>을 풀어 주었다. 이것이 결정적 한 수다. 호족과 군의 한미한 인물들이 모두 자기 군세를 일으켜 종군했다. 패국(沛國) 초현(譙縣)의 <em>조조(曹操)</em>가 기도위(騎都尉)로 영천(潁川)에서, 탁군(涿郡)의 <em>유비(劉備)</em>가 <em>관우</em>·<em>장비</em>와 함께 의용으로 유주에서, 오군(吳郡)의 <em>손견(孫堅)</em>이 좌군사마(佐軍司馬)로 회남에서 — 훗날 <em>삼국</em>의 세 주인공이 모두 이 한 해의 황건 진압에서 처음 군공을 세웠다. 위진의 모든 가닥이 이 한 자리에서 풀려 나간 셈이다.\n\n전황은 의외로 빨랐다. 그해 10월 장각이 병들어 죽고, 광종(廣宗)에서 장량이, 곡양(曲陽)에서 장보가 차례로 패해 죽었다. 봉기 자체는 한 해도 못 채워 진압되었다. 그러나 <em>잔여 황건</em>은 청주·흑산(黑山)에 흩어져 십수 년을 더 갔다. 청주의 황건 백만이 훗날 조조에게 흡수되어 <em>청주병(靑州兵)</em>이 된 것은 위(魏) 한 왕조의 군사적 기초다.\n\n진압은 끝났으나 한 왕조는 끝났다. <em>주(州)의 모병권</em>이 한 번 풀린 뒤로 다시 거두어들이지 못했고, <em>주목(州牧)</em>이 곧 군벌이 되었다. 5년 뒤 <em>영제</em>가 죽자 환관과 외척이 마지막 충돌을 벌이다 <em>동탁(董卓)</em>이 낙양에 들어와 한 황실을 손에 넣었고, 그 뒤로 <em>군웅할거</em>의 한 세상이 펼쳐졌다. <em>황건</em>은 한 황실을 직접 무너뜨리지는 않았으나, 무너질 수밖에 없는 자리로 한 왕조를 떠밀어 놓았다.\n\n『세설신어』는 황건 자체를 직접 다루지 않는다. 그러나 〈덕행〉·〈언어〉·〈식감〉편 첫머리의 <em>진번(陳蕃)</em>·<em>이응(李膺)</em>·<em>곽태(郭泰)</em> — <em>당고</em>의 명사들 — 의 그 결곡한 한 자리가 바로 황건의 폭풍 직전에 선 한 사대부 세대의 모습이다. 한 왕조의 푸른 하늘이 무너진 그 자리에서, <em>건안(建安)</em>의 시인들과 <em>정시(正始)</em>의 명사들과 <em>죽림(竹林)</em>의 일사들이 차례로 일어났다. 위진 한 시대의 첫 종이 곧 이 184년의 누런 두건이다.", "storyCount": 0}, {"id": "event.ShuWuDeath", "type": "event", "han": "蜀·吳 멸망", "ko": "", "sub": "촉·오 멸망 (263, 280)", "title": "", "short": "263년 위의 사마소가 등애(鄧艾)·<em>종회</em>를 보내 촉을 멸했다. 후주 유선이 항복함. 280년에는 진 무제 사마염이 <em>왕준(王濬)</em>에게 명해 오를 멸했다. 손호가 항복. 이로써 후한 말 이래 약 100년의 분립이 끝나고 진이 천하를 통일했다.", "long": "263년과 280년의 두 항복. 후한 말 군웅할거에서 시작된 약 100년의 분립이 이 두 해에 끝났다. <em>조위(曹魏)</em>가 <em>촉한(蜀漢)</em>을 거두고, 그 <em>위</em>를 이은 <em>서진(西晉)</em>이 다시 <em>손오(孫吳)</em>를 거두었다. 그 두 자리가 곧 위진 시대의 정치적 출발점이다.\n\n먼저 촉이다. 촉한은 <em>제갈량</em>의 사후로도 <em>비의</em>·<em>장완</em>·<em>강유</em>가 차례로 그 정사를 이끌었으나, 강유의 거듭된 북벌이 국력을 갉아먹었다. <em>후주(後主) 유선</em>은 <em>환관 황호</em>에게 정사를 맡기다시피 했고, 조정의 기강은 무너졌다. 이 틈을 노린 것이 <em>사마소(司馬昭)</em>다. 사마소는 <em>고평릉의 정변</em> 이래 위 황실을 사실상 장악해 온 <em>사마씨</em>의 영수로, 황제 자리를 향한 명분으로 <em>멸촉(滅蜀)</em>의 공을 세우려 했다.\n\n263년, 사마소는 <em>등애(鄧艾)</em>와 <em>종회(鍾會)</em>를 양 갈래로 보냈다. 종회가 한중(漢中)으로 정면을 치며 강유의 본대를 검각(劍閣)에 묶어 두는 사이, 등애가 음평(陰平)의 험로를 끊고 산을 넘어 성도(成都)의 코앞에 나타났다. 후주 유선은 싸우지 못하고 항복했다. 촉한은 그렇게 한순간에 사라졌다. 그러나 항복 이후가 더 어지러웠다. <em>종회</em>가 등애를 모함해 죽이고는, 항복한 <em>강유</em>와 손잡고 촉 땅에서 자립을 꾀하다 부하들에게 살해되었다. 사마소가 위 황실 안에서 <em>진왕(晉王)</em>에 오른 것이 곧 그 직후다.\n\n265년 사마소가 죽고, 그 아들 <em>사마염(司馬炎)</em>이 위 <em>원제(元帝, 조환)</em>의 선양을 받아 <em>진(晉)</em>을 세웠다. <em>서진</em>의 시작이다. 사마염, 곧 <em>진 무제(武帝)</em>는 한동안 천하 통일을 미뤘다. 강 너머의 <em>손오</em>는 산천이 험하고 수전(水戰)에 능했기 때문이다. 또 조정 안에서도 <em>가충</em>·<em>순욱</em> 등이 정벌의 시기를 두고 갈렸다. <em>양호(羊祜)</em>가 형주(荊州)에 진을 친 채 십수 년을 두고 오의 변경을 부드럽게 무마하며 <em>준비된 정벌</em>의 자리를 닦았다.\n\n오의 말기는 더 참혹했다. <em>손권</em>의 사후 후사가 거듭 어그러져, <em>손호(孫皓)</em>가 황제 자리에 올랐을 때 그 잔혹과 사치는 강남 사대부의 마음을 다 잃은 뒤였다. 양호가 죽으며 <em>두예(杜預)</em>를 후임으로 천거했고, 익주(益州)에서는 <em>왕준(王濬)</em>이 거대한 누선(樓船)을 십수 년에 걸쳐 만들어 두었다.\n\n280년, 진 무제가 마침내 영을 내렸다. <em>두예</em>가 강릉(江陵)을 치고, <em>왕준</em>의 누선 함대가 장강(長江)을 따라 동으로 내려갔다. 오는 강 위에 <em>철쇄(鐵鎖)</em>를 걸어 막으려 했으나, 왕준이 거대한 횃불 뗏목으로 쇠사슬을 태워 끊고 그대로 건업(建業)에 들이닥쳤다. <em>손호</em>는 관을 메고 항복했다. <em>왕준의 누선이 익주에서 내려오자, 금릉의 왕기가 가만히 거두어졌다(王濬樓船下益州, 金陵王氣黯然收)</em>는 후대 시구가 곧 그 자리다.\n\n이로써 후한 말 이래의 분립이 끝났다. 그러나 통일은 길지 않았다. <em>진 무제</em>가 죽고 <em>혜제(惠帝)</em>가 서자마자 <em>팔왕의 난</em>이 터졌고, 곧 <em>영가의 난</em>으로 <em>서진</em>은 무너진다. 통일을 이룬 그 사마씨가 그 통일을 한 세대도 지키지 못한 셈이다. 263과 280의 두 자리는 그래서 위진 시대의 <em>시작</em>이자, 곧 닥칠 <em>대분열</em>의 짧은 서막이기도 했다.", "storyCount": 0}, {"id": "event.JinFound", "type": "event", "han": "西晉 건국", "ko": "", "sub": "서진 건국 (265)", "title": "", "short": "위의 마지막 황제 조환이 <em>사마염</em>에게 양위해, 사마염이 진(晉)을 세움. 위→진의 양위는 220년 한→위의 양위와 같은 형식. <em>讓位(선양)</em>의 한 표준이 자리잡힌 자리이며, 후일 동진→송의 양위(420)도 같은 모형.", "long": "265년 12월, 위(魏)의 마지막 황제 <em>조환(曹奐)</em>이 <em>사마염(司馬炎)</em>에게 제위를 넘겼다. 사마염은 국호를 진(晉)으로 고치고 낙양에 도읍해 무제(武帝)로 즉위했다. 한 줄의 양위 조서로 위가 끝나고 진이 열렸다. 이로써 <em>조씨</em>의 사십육 년이 <em>사마씨</em>의 시대로 갈마들었다.\n\n이 양위가 갑작스러운 사건은 아니었다. 사마씨의 권력 장악은 이미 <em>사마의(司馬懿)</em>가 <em>249년 고평릉의 정변</em>에서 <em>조상(曹爽)</em>을 베어 죽이고 위 황실의 실권을 빼앗은 자리에서 시작되었다. 그 뒤를 <em>사마사(司馬師)</em>·<em>사마소(司馬昭)</em>가 차례로 이어, <em>甘露 5년(260)</em>에는 <em>조모(曹髦)</em>가 <em>사마소의 마음은 길 가는 사람도 안다(司馬昭之心, 路人所知)</em> 외치며 친히 칼을 들고 나섰다 시해되었다. <em>263년</em> 사마소가 <em>촉한</em>을 멸하고 진왕(晉王)에 봉해진 그 자리에서 사실상의 새 왕조가 굳어졌고, 265년 사마소가 죽자 그 아들 사마염이 마지막 한 걸음을 밟았을 뿐이다.\n\n양위의 형식은 <em>220년</em>의 <em>한→위</em>의 모형을 그대로 본떴다. 그때 <em>조비</em>가 <em>한 헌제</em>에게서 <em>수선대(受禪臺)</em>에서 옥새를 받았듯, 사마염도 같은 의례로 조환에게서 옥새를 받았다. 조서의 어구·제단의 의절·삼사양(三辭讓)의 절차가 모두 한 위의 그것을 본받았다. 그러므로 이 자리는 <em>한→위→진</em>으로 이어진 <em>선양(禪讓)의 한 표준</em>이 굳어진 자리이기도 했다. 이 모형은 뒤에 <em>420년 동진→송</em>, 그리고 그 뒤 남조의 <em>송→제→양→진</em>의 양위에 그대로 되풀이된다. 선양은 더 이상 <em>요순</em>의 옛 미덕이 아니라 <em>왕조 교체의 정형</em>이 되었다.\n\n진이 열린 뒤 사마염은 <em>함녕(咸寧)</em>·<em>태강(太康)</em> 연간에 <em>오(吳)</em>를 평정해(280) 삼국의 분열을 종식시켰다. 한대 이래 백 년 만의 통일이었다. 동시에 <em>구품중정제(九品中正制)</em>를 그대로 이어 받아 <em>문벌</em>의 자리를 굳혔고, <em>분봉(分封)</em>을 크게 베풀어 종실 <em>사마씨</em>를 각지의 왕으로 세웠다. 통일의 영광이 한쪽에서 빛나는 동안, 그 분봉이 곧 <em>팔왕의 난(八王之亂)</em>의 씨앗이 되리라는 것을 그때는 누구도 알지 못했다.\n\n사상의 자리도 새로 짜였다. <em>정시(正始)</em> 연간의 <em>하안</em>·<em>왕필</em>이 열어 둔 <em>현학(玄學)</em>이 <em>죽림칠현</em>의 시대를 거쳐 서진 낙양의 사대부 풍속으로 자리잡았다. <em>왕연</em>을 비롯한 명사들이 옥주미를 들고 청담의 자리에 모이는 풍경, 그 사상사적 한 마당이 곧 서진 건국 위에 세워졌다. 『세설신어』가 그리는 명사의 시대는 이 <em>265년</em>의 한 줄 양위에서 비로소 시간의 무대를 얻었다.\n\n그러나 통일의 영광은 길지 않았다. 무제가 죽고(290) 어리석은 <em>혜제(惠帝)</em>가 서자, 곧 <em>가후(賈后)</em>의 전횡과 <em>팔왕의 난</em>이 이어졌으며, 끝내 <em>永嘉의 난(311)</em>으로 낙양이 함락되어 서진이 무너진다. 건국에서 멸망까지 오십 년 남짓. 그 짧은 통일의 한가운데에서 <em>현학</em>과 <em>명사</em>의 풍속이 만개했고, 그것이 강을 건너 <em>동진</em>의 백 년을 채웠다. 서진 건국은 그러므로 한 왕조의 시작이자, 『세설신어』가 펼쳐질 시대의 첫 문이었다.", "storyCount": 0}, {"id": "event.DongJinFound", "type": "event", "han": "東晉 건국", "ko": "", "sub": "동진 건국 (317/318)", "title": "", "short": "영가의 난 후 살아남은 <em>사마예</em>가 강좌의 사대부와 <em>왕도</em>의 보좌를 받아 건강(建康)에서 즉위. 317년에 진왕(晉王)으로, 318년 정식 황제로 즉위. <em>왕여마 공천하</em>의 시작.", "long": "東晉 건국은 <em>영가의 난(永嘉之亂)</em>의 잿더미 위에서 강좌(江左) 한 모서리에 진(晉)의 종묘를 다시 세운 사건이다. <em>영가 5년(311)</em> 흉노 <em>유총</em>의 군이 낙양을 함락하고 <em>회제(懷帝)</em>를 사로잡았으며, 316년에는 장안마저 떨어져 <em>민제(愍帝)</em>가 <em>유요</em>에게 끌려갔다. 서진(西晉)의 황통이 끊어진 것이다. 중원의 의관(衣冠)이 무너지자, 살아남은 종실과 사대부가 일제히 강을 건넜다. 이것이 <em>의관남도(衣冠南渡)</em>다.\n\n이 남도의 한가운데에 <em>낭야왕 사마예(司馬睿)</em>가 있었다. 그는 사마의의 증손이지만 종실 안에서는 변두리의 한 인물에 지나지 않았다. 본래 영가 원년(307)에 <em>왕도</em>의 권유로 미리 <em>건업(建鄴)</em>에 건너와 안동장군(安東將軍)으로 강남을 다스리고 있었다. 중원이 무너질 줄을 왕도가 먼저 읽고, 사마예를 강 너머에 옮겨 둔 것이다. 이 한 수가 동진 한 왕조의 씨앗이 되었다.\n\n문제는 <em>강남의 사대부</em>가 북에서 내려온 사마예를 받아들이지 않는다는 점이었다. <em>고영</em>·<em>하순</em>·<em>기첨</em> 같은 <em>오(吳)의 명문</em>은 손오(孫吳) 멸망 이래의 한을 잊지 않은 터라, 남도해 온 종실을 곱게 보지 않았다. 사마예가 건업에 들어선 처음 한 달 동안 강남의 명사 누구도 그를 찾아오지 않았다. 이 한 자리를 푼 것이 곧 <em>왕도</em>다.\n\n3월 상사일(上巳日), 왕도가 사마예를 가마에 태워 거리에 나서게 했다. 사촌형 <em>왕돈(王敦)</em>과 북에서 따라온 명사들이 모두 말을 타고 가마 뒤를 따랐다. 그 위의(威儀)가 한 거리를 가득 메우자, 강남의 명사들이 그제야 길가에 나와 절했다. 그 자리에서 왕도가 <em>고영</em>을 찾아 손수 그를 청해 막부의 자리에 앉히고, <em>하순</em>·<em>기첨</em>을 차례로 끌어들였다. 북의 의관과 남의 사대부가 한 막부 안에서 마주 앉은 첫 자리였다.\n\n<em>건무 원년(317)</em> 3월, 민제 피살의 소식이 강을 건너오자 사마예가 <em>진왕(晉王)</em>에 즉위해 연호를 <em>건무(建武)</em>로 고쳤다. 이듬해 318년, 정식으로 황제에 즉위해 <em>원제(元帝)</em>가 되었다. 도읍은 건업의 이름을 <em>건강(建康)</em>으로 고쳤다. 민제의 휘 <em>업(鄴)</em>을 피한 것이다. 동진(東晉) 한 왕조가 비로소 섰다.\n\n즉위식의 한 장면이 한 시대를 압축한다. 원제가 어좌에 오르며 <em>왕도</em>에게 <em>함께 어좌에 오르자(升御床)</em> 청했다. 왕도가 세 번 사양했다. <em>해와 달이 어찌 만물과 자리를 나누오리까.</em> 그 한마디로 군신의 분(分)이 섰지만, 그 자리를 청한 마음 자체가 이미 한 시대의 모양을 정했다. 황제 한 사람이 아니라 <em>왕씨와 사마씨가 천하를 함께 한다(王與馬, 共天下)</em>는 것이 곧 동진 정사의 골격이었다.\n\n이 구조는 양날의 검이었다. 한편으로는 남도해 온 <em>낭야 왕씨</em>와 그 뒤를 잇는 <em>영천 유씨</em>·<em>초국 환씨</em>·<em>진군 사씨</em> 같은 <em>문벌(門閥)</em>이 황권을 떠받치며 동진을 지탱했다. 다른 한편으로는 그 문벌이 황권을 능가하면서 <em>왕돈의 난</em>·<em>소준의 난</em>·<em>환온의 위협</em>이 차례로 닥쳤다. 동진 한 세기의 정사가 곧 <em>문벌과 황권의 줄다리기</em>다.\n\n『세설신어』에서 이 건국의 자리는 〈언어〉편의 <em>신정대읍(新亭對泣)</em> — 남도한 사대부들이 신정에서 술자리를 갖다 <em>풍경은 비슷하나 산하가 다르구나</em> 탄식하며 눈물 흘리니 <em>왕도</em>가 정색하고 <em>마땅히 힘을 모아 신주(神州)를 되찾아야지 어찌 초수(楚囚)처럼 마주 울고만 있는가</em> 꾸짖은 한 장면 — 으로 응축된다. 동진 한 왕조는 그 눈물과 그 꾸짖음 사이에서 시작되었다.", "storyCount": 0}, {"id": "event.LanTing", "type": "event", "han": "蘭亭雅集", "ko": "", "sub": "난정 아집 (353)", "title": "", "short": "동진 永和 9년(353) 3월 3일, 회계 산음(山陰)의 <em>난정(蘭亭)</em>에서 <em>왕희지</em>가 주인이 되어 <em>사안</em>·<em>손작</em>·<em>허순</em> 등 41명의 명사가 모인 자리. 흐르는 물에 술잔을 띄워 시를 짓는 <em>유상곡수(流觴曲水)</em>. 왕희지가 머리말로 쓴 「난정서(蘭亭序)」가 천 년의 명필. 풍류와 무상감(無常感)이 한 자리에서 만난 위진 명사 문화의 한 정점.", "long": "영화(永和) 9년(353) 3월 3일, <em>상사일(上巳日)</em>이었다. 옛 풍속에 이 날에는 물가에 나가 몸을 씻고 한 해의 묵은 액을 흘려보내는 <em>계사(禊事)</em>를 행했다. 회계(會稽) 내사(內史)였던 <em>왕희지(王羲之)</em>가 이 날을 빌려 <em>산음(山陰)</em>의 <em>난정(蘭亭)</em>에 한 자리를 마련했다. 모인 사람이 41명이다. <em>사안(謝安)</em>·<em>사만</em>·<em>손작(孫綽)</em>·<em>허순(許詢)</em>·<em>지도림(支道林)</em>·왕희지의 아들 <em>왕응지</em>·<em>왕헌지</em> — 동진 한낮의 명사가 거의 다 모인 셈이다.\n\n자리의 형식은 <em>유상곡수(流觴曲水)</em>였다. 난정 곁의 시내를 굽이굽이 흐르게 두고, 그 굽이마다 사람들이 앉았다. 위쪽에서 <em>우상(羽觴)</em> — 새 모양의 가벼운 잔 — 에 술을 따라 띄워 보낸다. 잔이 자기 앞 굽이에 멎으면 그 사람이 한 수를 짓는다. 짓지 못하면 벌주 <em>세 잔</em>을 마신다. 풍속의 의례를 시(詩)의 자리로 다시 짠 것이며, 자연과 인문이 한 흐름에 얽힌 자리다.\n\n그 날 시를 지어 낸 사람이 26명, 짓지 못해 벌주를 마신 사람이 15명이었다 한다. 지은 시를 모아 한 권을 엮고, <em>왕희지</em>가 그 머리말을 썼다. 이것이 곧 <em>「난정서(蘭亭序)」</em>다. 28행 324자. 그 자리의 흥에 취해 단숨에 써 내려간 초고였는데, 뒷날 왕희지 자신이 맑은 정신으로 다시 써 보았으나 그 초고만 못해, 결국 그 흥의 한 장을 그대로 두었다는 일화가 전한다.\n\n「난정서」의 글은 흥에서 시작해 무상(無常)으로 끝난다. <em>날은 맑고 바람은 부드러우며(天朗氣淸 惠風和暢)</em> — 산수의 아름다움을 그린 앞머리는 한 폭의 그림이다. 그러나 글의 가운데로 들어가면 시선이 돌아선다. <em>우러러 우주의 큼을 보고 굽어 만물의 성함을 살피니, 마음과 눈이 다 즐겁다</em>. 그 즐거움이 이어지지 못한다. <em>지난 일을 돌아보면 잠깐 사이에 묵은 자취가 되니</em>, 한 자리의 흥도 한 사람의 목숨도 다 <em>부생(浮生)</em>일 뿐이다. <em>죽음과 삶을 하나로 보는 것이 헛소리이며, 팽조의 장수와 상자(殤子)의 요절을 같다 하는 것도 망령된 말이다(齊彭殤爲妄作)</em>. 이 한 구절이 무겁다. 『장자』의 <em>제물(齊物)</em>을 정면으로 거스르며, 풍류의 한가운데에서 <em>현학(玄學)</em>의 한 명제를 되묻고 있는 것이다.\n\n이 한 자리에 위진 명사 문화의 모든 것이 응축돼 있다. <em>계사</em>의 옛 풍속, <em>유상곡수</em>의 시회(詩會), <em>청담(淸談)</em>의 명사들, <em>왕희지</em>의 <em>서법(書法)</em>, <em>손작</em>과 <em>허순</em>의 시, <em>지도림</em>의 <em>격의불교(格義佛敎)</em>, 그리고 그 모든 흥의 끝에 놓인 <em>무상감</em>. 산수의 아름다움과 인생의 짧음이 한 자리에서 만난다.\n\n「난정서」 진본은 <em>당 태종(唐太宗)</em>이 사랑하여 무덤 <em>소릉(昭陵)</em>에 함께 묻혔다 전한다. 지금 남은 것은 <em>풍승소(馮承素)</em>의 모본(摹本)을 비롯한 당대 임모본(臨摹本)뿐이다. 진본이 사라져도 그 흥은 사라지지 않았다. 천 년 동안 동아시아 문인이 <em>上巳</em> 즈음이면 곡수의 자리를 다시 마련했고, 「난정서」를 임서(臨書)하지 않은 서가(書家)가 없다.\n\n『세설신어』의 〈기선(企羨)〉편이 <em>왕우군이 난정서를 지을 때</em>의 한 일화를 전하며, 〈언어〉·〈품조〉편 곳곳에 그 자리 사람들의 풍모가 그려진다. 동진의 한낮 한 자리에 명사 문화가 모였고, 그 자리의 빛으로 「난정서」 한 권이 남았다.", "storyCount": 0}, {"id": "thought.HanJingXue", "type": "thought", "han": "漢代經學", "ko": "", "sub": "한대 경학", "title": "", "short": "한대(漢代) 사대부 학문의 주축. 한 경전을 평생 들여 자구(字句)를 해석하고, 그 해석이 곧 학파를 이루었다. 금문(今文)과 고문(古文)의 대립, 정현(鄭玄)의 절충이 그 정점. 그러나 후한 말의 정치적 파탄과 더불어 답답함을 노출했고, 위진의 <em>현학</em>은 곧 그 답답함의 돌파다.", "long": "漢代經學은 한대(漢代) 사대부 학문의 주축이다. 오경(五經) — 『시(詩)』·『서(書)』·『예(禮)』·『역(易)』·『춘추(春秋)』 — 을 텍스트의 정점에 두고, 그 한 글자 한 구절을 평생 들여 풀어 가는 자구(字句) 주석학이다. 한 경전을 한 사람이 평생 잡고, 그 해석이 곧 한 학파(家法)를 이루며, 그 학파가 다시 부자(父子)와 사제(師弟)로 이어져 한대 사대부의 가문 자체와 겹쳐졌다.\n\n기원은 <em>전한(前漢)</em> 무제(武帝) 때다. <em>동중서(董仲舒)</em>의 건의로 <em>오경박사(五經博士)</em>가 세워지고, <em>공손홍(公孫弘)</em>이 그것을 관리 등용의 길과 연결시켰다. 경전을 익히는 일이 곧 출사의 길이 된 것이다. 이로써 <em>유가</em>가 한 왕조의 공식 학문이 되었고, <em>백가(百家)</em>의 자리는 점점 좁아졌다. 한 왕조의 통치 이념과 학문이 한 몸이 된 그 자리에서 경학이 자랐다.\n\n큰 대립이 곧 <em>금문(今文)</em>과 <em>고문(古文)</em>이다. 금문은 한대의 예서(隸書)로 적힌 텍스트로, 박사관(博士官)의 정통이었고 <em>재이설(災異說)</em>과 <em>참위(讖緯)</em>를 끌어들여 경전을 <em>천인감응(天人感應)</em>의 책으로 읽었다. 고문은 공자 옛집의 벽에서 나왔다는 옛 글씨의 텍스트로, <em>유흠(劉歆)</em>이 학관(學官)에 세우려 한 뒤로 민간에서 자랐고, 자구의 옛 뜻을 따져 <em>훈고(訓詁)</em>에 무게를 두었다. 두 갈래는 후한 내내 다투었다.\n\n절정은 <em>후한</em> 말의 <em>정현(鄭玄)</em>이다. 정현은 금문과 고문의 벽을 허물고 두 갈래의 주(注)를 한 몸으로 모아, 거의 모든 경전에 주를 달았다. 그의 주는 후대 천 년의 표준이 되었으며, <em>마융(馬融)</em>과 더불어 한대 경학의 마지막 영봉으로 일컬어진다. 한 사람이 평생 들여 한 경전을 풀어 가는 자구학의 미덕이 정현에 와서 정점에 이른 것이다.\n\n그러나 그 정점이 곧 막다른 길이기도 했다. 자구 주석이 쌓이고 쌓여 한 글자에 수십 가(家)의 해석이 붙고, <em>오경</em>을 다 외우려면 평생이 모자란다는 말이 돌았다. 후한 학자가 <em>『상서』 한 편에 백만 자의 주석이 있다</em> 탄식한 일이 전한다. 텍스트의 뜻은 자구에 묻혀 가고, <em>재이설</em>과 <em>참위</em>는 점점 황당해졌으며, <em>명교(名敎)</em>의 예법은 자구만큼이나 사람을 옥죄었다.\n\n후한 말 <em>황건의 난</em>과 군웅의 할거로 한 왕조 자체가 무너지면서, <em>경(經)이 답을 주지 않는다</em>는 의심이 사대부 사이에 깊이 박혔다. 천인감응의 틀로는 한 시대의 파탄이 풀리지 않았고, 자구의 산을 넘어도 우주와 인간의 큰 물음에 답이 닿지 않았다. 시대가 묻는 새 물음을 한대 경학의 틀로는 풀 수 없었다.\n\n이 답답함을 뚫고 솟은 것이 위진의 <em>현학(玄學)</em>이다. <em>하안(何晏)</em>과 <em>왕필(王弼)</em>이 <em>삼현(三玄)</em> — 노자·장자·주역 — 을 다시 들어, 자구 너머의 <em>체용(體用)</em>과 <em>언의(言意)</em>와 <em>명리(名理)</em>를 물었다. 왕필이 <em>뜻을 얻으면 말을 잊는다(得意忘言)</em> 한 그 한 마디가 곧 한대 자구학에 대한 사형 선고였다. 한 글자에 매여 한 평생을 보내던 학문이, 한 뜻을 얻으면 말을 잊는 학문으로 옮겨 간 것이다.\n\n그렇다고 경학이 사라진 것은 아니다. 동진(東晉)에서도 <em>사안(謝安)</em>과 <em>왕도(王導)</em>는 경전을 깊이 읽었고, <em>예학(禮學)</em>은 오히려 <em>왕조 의례</em>의 한 축으로 남았다. 다만 <em>명사</em>의 한가운데에 있던 자리를 현학에 내준 것이다. 한대 경학은 위진 명사 문화의 <em>전(前)사</em>이며, 동시에 그 명사 문화가 무엇을 넘어 어디로 가려 했는지를 비추는 거울이다. 『세설신어』의 한 자리 한 자리는 그 거울에 비추어 볼 때 비로소 깊이가 보인다.", "storyCount": 0}, {"id": "thought.YueDanPing", "type": "thought", "han": "月旦評", "ko": "", "sub": "월단평 — 인물 품평", "title": "", "short": "매월 초하루마다 한 자리에서 인물평을 발표하는 후한 말의 풍속. <em>허소(許劭)</em>가 그 영수로, 한 마디 평이 사람의 흥망을 가른다 했다. <em>명사(名士)</em>라는 새 인간형이 이 풍속에서 태어났으며, 『세설신어』 〈품조〉편의 직접적 원류.", "long": "月旦評은 후한(後漢) 말의 한 풍속이다. 매월 초하루(月旦)에 한자리를 정해 두고 당대 인물들을 한 마디씩 품평해 발표한다. <em>여남(汝南)</em>의 <em>허소(許劭)</em>와 그의 사촌형 <em>허정(許靖)</em>이 이 자리의 주인이었다. 두 사람은 매월 초하루마다 향리의 인물을 새로 골라 한 줄 평을 내었으므로, 사람들이 이를 <em>여남월단평(汝南月旦評)</em>이라 일컬었다.\n\n허소의 한 마디는 무거웠다 한다. 그가 <em>이 사람은 그릇이다</em> 하면 그 사람의 벼슬이 열렸고, <em>이 사람은 아니다</em> 하면 향리에서 자리를 얻지 못했다. 한 마디가 사람의 흥망을 가른다는 말이 이 풍속에서 나왔다. 그 때문에 인물들이 다투어 허소의 자리에 얼굴을 내밀고자 했고, 허소는 그 청을 다 받지 않았다. 마음에 들지 않는 인물에게는 끝내 한 마디를 내려 주지 않았다 한다.\n\n가장 유명한 일화는 <em>조조(曹操)</em>다. 젊은 조조가 허소를 찾아가 자기 평을 청했으나 허소가 응하지 않았다. 조조가 거듭 다그치고 끝내 협박에 가까운 청을 하자, 허소가 마지못해 한 마디를 던졌다. <em>그대는 치세(治世)의 능신(能臣)이요 난세(亂世)의 간웅(姦雄)이다.</em> 조조가 크게 웃고 자리를 떠났다 한다. 한 마디의 품평이 한 인물의 평생을 묶어 낸 자리로, 후대 사가들이 즐겨 인용해 왔다.\n\n月旦評이 가능했던 것은 후한 말의 <em>향거리선(鄕擧里選)</em> 제도와 맞물려 있었다. 중앙이 인재를 직접 시험하지 않고 향리의 평판을 받아 등용했으므로, 한 향리의 <em>명망가</em>가 누구를 어떻게 평하는가가 곧 인재 등용의 한 관문이었다. 허소 형제는 그 관문에 가장 가까이 선 사람들이었다. 月旦評은 따라서 한갓 사담이 아니라 <em>준(準) 인사 제도</em>에 가까웠다.\n\n그러나 이 풍속의 의의는 제도의 차원에 머무르지 않는다. 인물을 <em>한 줄 평으로 압축한다</em>는 행위 자체가 새 인간 관찰의 방식을 열었다. <em>행적</em>보다 <em>풍격</em>을, <em>공적</em>보다 <em>기상</em>을, <em>덕목</em>보다 <em>그릇</em>을 보는 시선. 이 시선이 곧 위진(魏晉) <em>명사(名士)</em> 문화의 한 척추가 된다. 허소의 <em>치세의 능신, 난세의 간웅</em>이 그 전형이다. 한 사람을 한 마디로 꿰뚫는 그 <em>지인지감(知人之鑑)</em>이 곧 명사의 한 자격이 되었다.\n\n조위(曹魏)에 들어 月旦評의 자리는 <em>구품관인법(九品官人法)</em>에 흡수되었다. <em>중정관(中正官)</em>이 각 향리의 인물을 아홉 등급으로 나누어 평하는 제도가 그 직접적 계승이다. 그러나 제도화된 품평은 곧 가문의 등급을 기록하는 행정으로 굳어졌고, 月旦評 본래의 <em>살아 있는 한 마디</em>는 다른 자리로 흘러 들어갔다. 그것이 곧 위진 청담(淸談)의 자리에서 펼쳐지는 <em>인물 품조(品藻)</em>다.\n\n『세설신어』 〈품조〉편은 이 月旦評의 직접적 후예다. <em>왕도가 누구를 어떻게 평했는가</em>, <em>환온이 은호를 어떻게 보았는가</em>, <em>사안이 왕탄지의 그릇을 어떻게 가렸는가</em> — 한 줄 한 줄이 모두 月旦評의 정신을 이어 받은 한 마디들이다. 〈식감〉·〈상예〉편도 같은 뿌리에서 자랐다. 月旦評을 모르면, 위진 명사들이 어찌하여 그토록 <em>한 마디 평</em>에 목숨을 걸었는지를 알 수 없다.", "storyCount": 0}, {"id": "thought.ThirtySixChapters", "type": "thought", "han": "三十六篇", "ko": "", "sub": "삼십육편의 분류", "title": "", "short": "『세설신어』 자체의 분류 체계. 〈덕행〉으로 열어 〈구극(원한)〉으로 닫는다. <em>덕(德)</em>에서 <em>원한</em>까지, 인물의 결을 36방향에서 풀어 본다. 사건의 기록이 아니라 <em>인물 품평</em>의 분류로, 후한 말의 月旦評 풍속이 위진을 거쳐 <em>유의경</em>에게 와 결정화된 형식이다.", "long": "三十六篇은 『세설신어』 자체의 편목 구성이다. <em>유의경(劉義慶)</em>이 한 권의 책에 위진(魏晉) 한 시대의 인물 일화 1130여 칙(則)을 모으면서, 그것을 36개의 결로 갈라 차례를 매겼다. 〈덕행(德行)〉으로 첫 편을 열고 〈구극(仇隙)〉으로 마지막 편을 닫는다. <em>덕</em>에서 <em>원한</em>까지의 36방향. 그 사이에 한 시대가 인간을 어떻게 보았는지가 통째로 들어 있다.\n\n상권(上卷)은 넷이다. 〈덕행〉·〈언어(言語)〉·〈정사(政事)〉·〈문학(文學)〉. 이 넷은 한대(漢代)의 <em>공문사과(孔門四科)</em>에서 그대로 이어진 차례다. 유가의 인간 분류의 옛 골격을 책의 머리에 모셔 두고 시작한 셈이다. 다만 그 안에 담긴 인물이 더 이상 한대의 효렴(孝廉) 후보가 아니라 위진의 명사(名士)들이다. 같은 그릇에 다른 술을 따른 것이 『세설신어』의 한 묘미다.\n\n중권(中卷)은 아홉이다. 〈방정(方正)〉·〈아량(雅量)〉·〈식감(識鑒)〉·〈상예(賞譽)〉·〈품조(品藻)〉·〈규잠(規箴)〉·〈첩오(捷悟)〉·〈숙혜(夙慧)〉·〈호상(豪爽)〉. 여기서부터가 위진 특유의 결이다. <em>아량</em>은 <em>사안</em>이 비수의 첩보 앞에서 바둑판을 떠나지 않은 그 결을, <em>식감</em>은 <em>왕도</em>가 어린 <em>환온</em>을 알아본 그 눈을, <em>상예</em>는 한 명사가 다른 명사의 풍격에 보내는 한 줄 찬사를, <em>품조</em>는 둘을 견주어 어느 쪽이 위인가를 따져 묻는 자리를 모은다. 인간을 <em>덕</em>만이 아니라 <em>결</em>과 <em>그릇</em>과 <em>빠르기</em>로 가르는 새 시선이 여기서 활짝 열린다.\n\n하권(下卷)은 스물셋이다. 〈용지(容止)〉·〈자신(自新)〉·〈기선(企羨)〉·〈상서(傷逝)〉·〈서일(棲逸)〉·〈현원(賢媛)〉·〈술해(術解)〉·〈교예(巧藝)〉·〈총례(寵禮)〉·〈임탄(任誕)〉·〈간오(簡傲)〉·〈배조(排調)〉·〈경저(輕詆)〉·〈가휼(假譎)〉·〈출면(黜免)〉·〈검색(儉嗇)〉·〈태치(汰侈)〉·〈분견(忿狷)〉·〈참험(讒險)〉·〈우회(尤悔)〉·〈비루(紕漏)〉·〈혹닉(惑溺)〉·〈구극〉. <em>용지</em>에서 풍모를 보고 <em>임탄</em>에서 <em>죽림칠현</em>의 호방을, <em>간오</em>에서 명사의 거만을, <em>배조</em>에서 농담의 칼을, 끝의 <em>혹닉</em>과 <em>구극</em>에서 사랑에 빠지고 원한을 품는 인간의 마지막 결까지 모은다. 덕에서 시작해 원한으로 닫는 그 36의 차례 자체가 한 인간학이다.\n\n이 분류 의식의 뿌리는 후한 말의 <em>월단평(月旦評)</em>에 있다. <em>허소(許劭)</em>가 매달 초하루 인물을 품평한 그 풍속이 위진을 거치며 <em>식감</em>과 <em>품조</em>의 자리로 정밀해졌고, 또 그것이 <em>구품관인법(九品官人法)</em>의 <em>중정관(中正官)</em>이 인물을 등급 짓는 실무와 맞물려 한 시대의 <em>인물학</em>을 이뤘다. <em>유소(劉劭)</em>의 『인물지(人物志)』가 그 인물학의 이론서라면, 『세설신어』 三十六篇은 그 인물학의 사례집인 셈이다. 한 사람을 <em>덕행</em>에 둘 것인가 <em>방정</em>에 둘 것인가 <em>간오</em>에 둘 것인가 — 그 분류가 곧 한 사람을 본 한 시대의 시선이다.\n\n그러므로 三十六篇은 단순한 차례가 아니다. 사건사가 아니라 <em>인물품평</em>의 분류이며, 시간순이 아니라 <em>결순</em>이다. 한 인물을 시대순으로 따라가는 대신, 36의 결마다 인물들을 갈라 세워 <em>덕행</em>의 자리에서 한 번, <em>아량</em>의 자리에서 또 한 번, <em>임탄</em>의 자리에서 다시 한 번 마주치게 한다. <em>사안</em>은 17편에 걸쳐, <em>왕도</em>는 20여 편에 걸쳐 다시 나타나고, 그때마다 다른 결로 보인다. 한 인간이 36의 각도에서 빛난다. 序說의 첫 章이 이 책을 <em>인물을 36의 결로 가르는 한 권</em>이라 부른 까닭이 여기에 있다.", "storyCount": 0}, {"id": "institution.MenFa", "type": "institution", "han": "門閥", "ko": "", "sub": "문벌 — 세족 제도", "title": "", "short": "위진남북조 사회의 골격. <em>九品官人法</em>을 통해 사대부 가문이 향품(鄕品)을 독점하고, 그 향품이 관직을 보장하면서 형성된 세습 권력 구조. <em>상품에는 한문이 없고, 하품에는 세족이 없다</em>는 말이 그 본질. 낭야 왕씨·진군 사씨 등 대문벌이 위진의 정치적 주역.", "long": "위진남북조 사회의 골격을 이룬 세족(世族) 지배 체제. <em>九品官人法</em>의 작용으로 사대부 가문이 향품(鄕品)을 사실상 세습하면서, 한 가문이 대를 이어 권력을 잇는 구조가 굳어졌다. 그 결과 <em>상품에는 한문이 없고 하품에는 세족이 없다(上品無寒門, 下品無勢族)</em>는 말이 곧 정설이 되었다. 이 한 문장이 위진 사회의 본질을 가장 단적으로 보여 준다.\n\n문벌의 형성은 후한 말로 거슬러 올라간다. 후한 후기 환관·외척의 전횡 속에서 <em>명사(名士)</em>의 자리가 일어나고, 이름 있는 사대부 가문이 <em>청류(淸流)</em>로 자처하며 자기들끼리 <em>품평</em>하고 통혼하는 풍속이 굳어졌다. 위에서 <em>九品官人法</em>이 시행되자, 이 풍속이 곧 <em>제도화된 가문 위계</em>로 굳어졌다. 한 가문이 대대로 같은 향품을 받으면 같은 위계의 관직을 잇게 된다. 그러므로 <em>가문이 곧 관직</em>이고 <em>관직이 곧 가문</em>인 구조가 자리잡혔다.\n\n동진(東晉)에 이르러 문벌은 정점에 이른다. <em>낭야 왕씨</em>·<em>진군 사씨</em>·<em>초국 환씨</em>·<em>태원 왕씨</em>·<em>고평 치씨</em>가 정사의 한가운데 자리하며 황실 사마씨와 어깨를 나란히 했다. <em>왕씨와 사마씨가 천하를 함께 한다(王與馬, 共天下)</em>는 말이 그 단적인 표현이다. 강좌의 토착 호족인 <em>고씨·육씨·주씨·장씨</em>도 정권 안에 자기 자리를 잡았다. 의관남도해 온 북방 사대부의 위계와 강남 토착 호족의 위계가 <em>僑郡</em> 같은 장치를 통해 함께 정돈된 것이 동진 정권의 사회적 골격이다.\n\n문벌의 작동은 통혼(通婚)·관직·향품·교유(交遊)의 네 자리에서 동시에 이뤄진다. 가문끼리만 통혼하고, 같은 위계끼리만 교유하며, 그것이 향품으로 굳어져 관직을 결정한다. 한문(寒門) 출신은 아무리 재주가 있어도 일류의 자리에 오르지 못했다. <em>환온</em>과 <em>유유</em>가 <em>상대적으로 한문에서 무력으로 일어선 자</em>로 일컬어진 일이 <em>예외적</em>이었다는 사실 자체가 문벌의 강고함을 보여 준다.\n\n『세설신어』의 인물 품평과 가문 이야기는 모두 이 골격 위에서 펼쳐진다. 〈품조〉편의 두 사람 우열을 가리는 평이 그 단적인 예다. 누구의 가문이 위인가 — 이 질문이 곧 두 인물의 위계를 가르는 한 척도가 된다.\n\n문벌은 隋·唐의 과거제도가 도입되면서 점차 무너졌다. 그러나 본격적으로 형해화되기까지 약 400년이 걸렸다. 그 400년 동안 동아시아 사회의 인재 등용과 정치 권력의 분배를 지배한 사회 제도가 곧 문벌이다.", "storyCount": 0}, {"id": "institution.QiaoJun", "type": "institution", "han": "僑郡", "ko": "", "sub": "교군 — 의관남도 사대부의 안치", "title": "", "short": "동진 초 <em>왕도</em>의 정략. 의관남도해 온 북방 사대부들에게 그들이 원래 살던 고향의 군명(郡名)을 그대로 가져와 강좌에 <em>僑郡(교군)</em>·<em>僑縣</em>을 두고 호적·신분·향품을 그대로 보전한 제도. 동진 사대부 사회가 자기 위계를 보전한 핵심 장치.", "long": "<em>僑郡(교군)</em>은 동진(東晉) 초 <em>왕도</em>가 펼친 정략의 한 핵심 장치다. <em>영가의 난(311)</em>과 그 뒤를 잇는 <em>의관남도(衣冠南渡)</em> 속에서 북방의 사대부들이 가솔과 노복을 거느리고 강을 건너 강좌(江左)로 내려왔다. 그러나 새 땅에는 새 호적도 새 향품도 없었다. 한문(寒門)도 아닌 일류 사대부가 한순간에 <em>근본 없는 자</em>가 될 위기였다.\n\n이에 왕도는 한 가지 묘책을 냈다. 의관남도해 온 사대부들에게 <em>원래 살던 고향의 군명(郡名)을 그대로 가져와</em> 강좌의 토지에 <em>僑郡</em>·<em>僑縣</em>을 설치한 것이다. 가령 <em>낭야군(琅琊郡)</em> 출신의 사대부들이 강남에 새로 정착한 자리를 다시 <em>낭야군</em>이라 칭하고, 그 안에 <em>교낭야 임기현(僑琅琊臨沂縣)</em> 식의 행정 단위를 두었다. 가호(家戶)의 호적 또한 <em>교적(僑籍)</em>이라 하여 남방 토착민의 호적과 구분했다.\n\n이 장치의 의의는 깊다. 첫째, 사대부의 향품(鄕品)이 그대로 보전되었다. 한 가문이 영가 이전에 향품 一品이었다면 강좌에 와서도 一品을 유지했다. 그러므로 <em>문벌</em>의 위계가 흔들리지 않았다. 둘째, 의관남도해 온 사대부와 강남 토착 호족 사이의 <em>위계 충돌</em>이 행정적으로 분리되어 완화되었다. 셋째, 새 정권 곧 동진의 <em>사회적 정통성</em>이 <em>낙양에서 그대로 옮겨 왔다</em>는 명분 위에 자리잡혔다.\n\n그러나 시간이 지나면서 부작용이 드러났다. 僑郡의 사대부들은 <em>교적</em>에 등록되어 세금과 부역을 면제받았는데, 강남 토착민의 부담이 그만큼 가중되었다. 또한 僑郡의 행정 경계가 모호해 토지의 분쟁이 끊이지 않았다. 이에 동진 중기부터 <em>토단법(土斷法)</em>이 시행되었다. <em>토단</em>이란 <em>현재의 거주지를 기준으로 호적을 다시 잡는다</em>는 뜻이다. <em>환온</em>이 364년에 시행한 <em>경술토단(庚戌土斷)</em>이 대표적이다. 이로써 僑郡의 일부는 정식 군현으로 흡수되었으나, 사대부의 위계는 여전히 보전되었다.\n\n『세설신어』에 직접 <em>僑郡</em>을 다룬 일화는 많지 않지만, 그 그림자는 의관남도 이후 모든 사대부 이야기의 배경에 깔려 있다. 의관남도해 온 <em>陳郡 謝氏</em>가 <em>진군</em>이라는 가호를 그대로 유지하며 한 세대 만에 동진 일류의 명문으로 올라선 일, <em>琅琊 王氏</em>가 <em>낭야</em>의 위계를 강좌에서 그대로 유지한 일 — 모두 이 제도 위에서 가능했다.", "storyCount": 0}, {"id": "institution.BeiFuBing", "type": "institution", "han": "北府兵", "ko": "", "sub": "북부병", "title": "", "short": "동진 후기의 정예 부대. <em>사현</em>이 광릉(廣陵) 일대 망명민으로 구성해 길러 둔 무력. 비수대전에서 <em>부견</em>의 백만 대군을 격파한 그 8만이 곧 이 군. 후일 <em>유유</em>가 이 군에서 일어나 동진을 닫고 송(劉宋)을 세웠다.", "long": "<em>北府兵</em>은 동진(東晉) 후기에 <em>사현(謝玄)</em>이 길러 비수대전을 승리로 이끈 정예 부대다. <em>북부(北府)</em>는 동진 시기 광릉(廣陵, 지금의 江蘇省 揚州)을 중심으로 한 군사 지역의 별칭으로, <em>남부(南府)</em>에 대응한다. 이 지역에 <em>영가의 난</em> 이후 북방에서 내려온 망명민이 많이 자리 잡고 있었기에, 이들이 곧 북부병의 인적 자원이 되었다.\n\n성립은 두 단계다. 첫 번째는 <em>치감(郗鑒)</em>이 약 320년경 동진 초의 위기 가운데 망명민을 조직해 군을 일으킨 자리다. 이때부터 광릉 일대에 무력의 핵이 자리잡혔다. 그러나 본격적인 <em>북부병</em>의 성립은 <em>사안</em>이 환온의 찬위 무산 직후 정권을 이끌면서 조카 <em>사현</em>에게 군의 재편을 맡긴 데서다. 사현은 <em>유뇌지(劉牢之)</em>·<em>하무기(何無忌)</em>·<em>고소지(高素)</em> 등 망명민 출신의 무장들을 모아 8만의 정예를 길렀다(약 377년).\n\n이 군의 강점은 두 가지다. 첫째, 병사 대부분이 <em>고향을 잃은 망명민</em>으로, 북방에 대한 적개심이 강했다. 부견이 동진을 침공해 오자 <em>고향을 되찾는다</em>는 명분으로 결의가 굳었다. 둘째, 무장들이 <em>문벌의 정통 권력 바깥에서 일어선 자</em>로, 정치적 야망보다 군사적 충성이 컸다. 사현이 그들의 자질을 알아보고 발탁한 식견이 결정적이었다.\n\n비수대전(383)이 결과를 보였다. <em>부견</em>의 백만 대군에 맞선 8만이 곧 북부병이다. 사현의 묘책으로 부견이 군을 물리다 무너졌고, 북부병이 강을 건너 추격해 부견의 군을 거의 전멸시켰다. 동진이 멸망의 직전에서 <em>백년의 평화</em>로 간 그 결정적 한 순간을 떠받친 것이 이 군이다.\n\n그러나 군세는 점차 정치적 자원이 되어 갔다. 사안 死後 사마도자의 무리가 정사를 어그러뜨리자 <em>왕공</em>이 북부병을 등에 업고 두 차례 거병했고(397, 398), 그 사이 <em>유뇌지</em>가 배반해 왕공이 죽었다. 결정적으로 <em>유유(劉裕)</em>가 북부병의 한 무장에서 일어나 <em>환현</em>을 토벌하고(404), 후에 동진을 닫고 <em>송(劉宋)</em>을 세웠다(420).\n\n그러므로 북부병은 동진 후기를 <em>살린 군</em>이자 동시에 <em>닫은 군</em>이다. 한 군대의 성격이 정권의 운명을 가른 자리.", "storyCount": 0}, {"id": "institution.JiuXi", "type": "institution", "han": "九錫", "ko": "", "sub": "구석 — 황제 외 신하의 최고 예우", "title": "", "short": "황제가 신하에게 내릴 수 있는 가장 큰 예우 아홉 가지(車馬·衣服·樂則·朱戶·納陛·虎賁·斧鉞·弓矢·秬鬯). 본디 한대의 예제였으나 위진에 와서는 <em>황위 찬탈 직전의 단계</em>로 굳어졌다. 조조·사마소·환온·<em>환현</em>·<em>유유</em>가 모두 이를 받았거나 받으려 했다.", "long": "<em>九錫</em>은 황제가 신하에게 내릴 수 있는 최고의 예우 아홉 가지를 가리킨다. 구체적으로는 <em>車馬(거마)·衣服(의복)·樂則(악기)·朱戶(붉은 문)·納陛(궁 안 계단)·虎賁(호위병)·斧鉞(부월)·弓矢(궁시)·秬鬯(검은 기장의 술)</em>이다. 본디 <em>『禮記』</em>·<em>『公羊傳』</em> 등에 출전을 둔 고대의 예제로, 천자가 큰 공이 있는 제후에게 베푸는 <em>천자의 격에 준하는 의례</em>를 뜻했다. 즉 형식은 신하의 예우이나, 실질은 <em>황제에 준하는 자리에 올린다</em>는 표지였다.\n\n위진(魏晉) 이후 이 제도가 굳어진 자리는 완전히 새로운 의미로 옮겨졌다. <em>황위 찬탈 직전의 마지막 단계</em>가 된 것이다. 한 신하가 <em>구석</em>을 받았다면, 그것은 곧 <em>다음 단계는 양위(讓位)</em>라는 정치적 신호였다.\n\n이 모형의 시조가 <em>조조(曹操)</em>다. 후한 헌제(獻帝)가 213년 조조에게 위공(魏公)을 봉하고 구석을 내렸다. 조조 자신은 끝내 한 황제를 폐하지 않았으나, 그 아들 <em>조비</em>가 220년 양위를 받아 위(魏)를 세웠으니, 조조의 구석은 곧 황위 교체의 전제 단계가 되었다.\n\n이 모형이 곧 위진남북조 약 400년의 <em>황위 교체 표준</em>이 되었다. <em>사마소(司馬昭)</em>가 263년 위로부터 구석을 받았고, 그 아들 <em>사마염</em>이 265년 양위를 받아 진(西晉)을 세웠다. 이 두 단계의 간격이 <em>조조-조비</em>의 모형 그대로다. 후일 <em>환온</em>도 죽기 직전 구석을 요구했으나 <em>사안</em>과 <em>왕탄지</em>의 지연으로 이루지 못했고(373), 그 막내아들 <em>환현</em>이 401년 구석을 받고 403년 양위를 받아 <em>초(楚)</em>를 세웠다(곧 <em>유유</em>에게 토벌됨). 마지막으로 <em>유유</em> 자신도 416년 구석을 받고 420년 동진의 양위를 받아 <em>송</em>을 세웠다.\n\n그러므로 구석은 <em>황제 예우의 한 형식</em>이 아니라 <em>황위 찬탈의 마지막 한 단계</em>가 되었다. 그 의례의 무게가 인물의 정치적 운명을 가른 자리.\n\n『세설신어』에서 구석은 환온의 만년 일화로 자주 등장한다. 그가 임종 직전 <em>상소문이 마땅한가 다시 한 번 보아 달라</em>는 왕탄지의 청에 시간을 끌다 죽은 일은 〈언어〉·〈방정〉편에 전한다.", "storyCount": 0}, {"id": "institution.FuZheng", "type": "institution", "han": "輔政", "ko": "", "sub": "보정 — 어린 황제의 보좌", "title": "", "short": "황제가 어려서 즉위할 때 임명되는 보정 대신. 위의 사마의·조상, 동진의 <em>왕도</em>·<em>유량</em>·<em>사안</em>이 모두 보정의 자리에 있었다. 위진 정사의 <em>형식</em>이 황제 친정이라면, 그 <em>실질</em>은 거의 언제나 보정 체제. 이 자리가 곧 권력의 중심.", "long": "<em>輔政</em>은 어린 황제나 정사를 보지 못하는 황제를 보좌해 실질적 정사를 잡는 대신의 자리다. 한대(漢代)부터 <em>대장군</em>·<em>승상</em>·<em>태부(太傅)</em>가 그 자리에 자주 임명되었으나, 위진(魏晉)에 이르러서는 <em>황실의 친·인척과 명사의 두세 대신이 합의해 정사를 잡는 형식</em>으로 굳어졌다.\n\n위의 첫 보정이 곧 <em>사마의</em>와 <em>조상</em>의 두 대신이다. 위 명제(明帝)가 239년 일찍 죽고 어린 <em>조방</em>이 즉위하자, 종친 조상과 노장 사마의가 함께 보정 대신이 되었다. 처음에는 조상이 사마의를 <em>태부</em>로 받들어 한 발 물러나게 했다. 그러나 곧 두 사람의 권력 다툼이 시작되었고, 249년 <em>고평릉의 정변</em>으로 끝났다. 이 첫 사례가 곧 <em>보정이 곧 쿠데타의 자리</em>임을 보였다.\n\n서진(西晉)에 들어 보정의 권력은 <em>八王의 亂</em>으로 비극을 맞았다. 어리석은 <em>혜제</em>를 보정한다는 명분으로 사마씨 종친 여덟 왕이 차례로 거사했다 차례로 죽었다. 보정이 사사로운 권력 다툼의 빌미가 된 자리다.\n\n동진(東晉)에 와서 보정은 <em>명사 정치의 한 형식</em>이 되었다. <em>왕도</em>가 元帝·明帝·成帝 세 황제의 보정 대신이었고, 그가 죽은 뒤 <em>유량</em>이 成帝의 보정이 되었다. 후일 <em>사안</em>이 효무제의 보정 자리에 사실상 있었고, <em>비수대전</em>의 응전을 보정의 자리에서 지휘했다. 동진 100년의 정사가 사실상 보정 대신의 손에 있었다 해도 과언이 아니다.\n\n이 형식의 특징은 <em>황제 친정</em>이 형식이고 <em>보정</em>이 실질이라는 점이다. 어린 황제가 형식적 정통성을 가지되, 실제 결정과 책임은 보정 대신이 진다. 그러므로 보정 대신의 인격과 식견이 곧 정권의 무게가 된다. <em>왕도</em>의 정략, <em>사안</em>의 아량, <em>유량</em>의 강경이 모두 그 자리에서 펼쳐졌다.\n\n『세설신어』의 정사 일화는 거의 모두 이 보정의 자리를 배경으로 한다. 〈정사〉편의 왕도 일화, 〈아량〉편의 사안 일화, 〈언어〉편의 유량 일화 — 모두 보정 대신으로서의 처신을 보인 자리들이다. 보정의 자리가 곧 명사가 <em>정치하는 자세</em>를 시험받은 자리다.", "storyCount": 0}, {"id": "institution.FuMa", "type": "institution", "han": "駙馬", "ko": "", "sub": "부마 — 황실의 사위", "title": "", "short": "황녀와 혼인한 자에게 주는 칭호(駙馬都尉). 위진에서는 곧 정치적 인척 관계의 한 핵심. <em>하안</em>은 조조의 가문에서 자라 부마, <em>혜강</em>은 위 황실의 부마, <em>환온</em>은 명제의 부마. 부마의 자리는 정치적 입장을 거의 결정짓는다.", "long": "<em>駙馬</em>는 황녀(공주)와 혼인한 자에게 주는 칭호다. 본디 <em>駙馬都尉</em>라는 한대(漢代)의 관직 이름에서 유래했다. <em>駙</em>는 <em>천자의 거가(車駕)에 곁따라 가는 마차</em>를 가리키니, 부마도위는 본디 <em>천자의 행차에 곁따라 가는 마차를 관리하는 자리</em>였다. 한 무제(漢武帝)가 이 자리에 황녀의 남편을 임명한 데서 <em>부마=공주의 남편</em>이라는 뜻이 굳어졌다. 위진 이후로는 거의 의례적 칭호가 되었다.\n\n위진의 부마 자리가 정치적으로 무거웠던 까닭은 <em>황실과의 인척 관계가 곧 정치 권력의 한 자리</em>였기 때문이다. 위진의 정사 형식이 <em>황실의 친·인척과 명사의 합의</em>로 이뤄졌으므로, 부마는 <em>황실 안에 자기 발판을 가진 명사</em>가 되었다. 그러므로 부마의 자리에 누가 앉느냐가 곧 한 가문의 정치적 위계를 좌우했다.\n\n『세설신어』에서 가장 자주 호명되는 부마들이 그 점을 보인다. <em>하안</em>은 조조의 가문에서 자라며 조조의 딸 <em>금향공주</em>와 혼인했다. 부마이자 조씨의 친속으로 정시 명사의 영수가 되었다. <em>혜강</em>은 위 황실의 <em>장락정주(長樂亭主)</em>와 혼인해 부마가 되었고, 그 때문에 사마씨에게 끝내 출사하지 않을 정치적 자리에 있었다 — 그의 정치적 입장이 곧 그 혼인에서 결정된 셈이다. 동진의 <em>환온</em>은 明帝의 사위로 <em>남강공주(南康公主)</em>와 혼인했다. 부친 <em>환이(桓彝)</em>의 절사와 함께 부마의 자리가 그를 동진 정사의 한가운데로 이끌었다.\n\n부마의 자리는 또한 사사로운 일화의 한 자리이기도 했다. <em>환온</em>과 <em>남강공주</em> 사이의 일화는 〈혹닉〉편에 전한다. 환온이 촉을 정복한 후 <em>이세(李勢)</em>의 누이를 비(妃)로 들이자, 남강공주가 칼을 들고 그녀의 방에 쳐들어갔다. 그러나 그녀가 <em>나는 본디 고국이 무너졌으니 사는 것이 죽음만 못합니다. 그러나 부군께서 측은히 여기시어 거두어 주셨으니 어쩌랴</em> 하고 머리를 빗으며 태연하니, 남강공주가 칼을 내려놓고 <em>나도 너를 사랑할 수밖에 없겠다</em> 하고 함께 잘 지냈다는 일화다.\n\n그러므로 부마는 <em>황실 안에 자리한 명사</em>의 또 다른 이름이다. 그 한 자리가 한 인물의 정치적 입장·사사로운 결·후대의 평까지 결정한 자리다.", "storyCount": 0}, {"id": "institution.RangWei", "type": "institution", "han": "讓位", "ko": "", "sub": "양위 — 선양의 제도화", "title": "", "short": "한→위(220), 위→진(265), 동진→송(420)에 모두 적용된 제도적 절차. 형식은 <em>덕 있는 자에게 양보한다</em>이나 실질은 무력에 의한 황위 이전. 위진남북조 약 400년 동안 황위 교체의 표준 형식이 되었다.", "long": "<em>讓位</em>는 황제가 자기 자리를 다른 사람에게 <em>양보하는</em> 형식이다. 한자 <em>讓</em>은 <em>물러나 주다</em>는 뜻으로, 본디 <em>『書經』</em>의 요(堯)가 순(舜)에게, 순이 우(禹)에게 황위를 <em>덕으로 물려준</em> 고사에서 출전을 둔다. 이를 <em>선양(禪讓)</em>이라 한다. 위진남북조에 와서는 이 <em>덕에 의한 양위</em>의 형식이 <em>무력에 의한 황위 교체의 표준</em>으로 굳어졌다.\n\n이 모형이 처음 펼쳐진 자리가 220년 <em>한 헌제(獻帝)가 조비에게 양위</em>한 일이다. 후한 말의 정치적 파탄 속에서 <em>조조</em>가 사실상 권력을 잡았으나, 그는 끝내 자기를 황제라 칭하지 않았다. 그 아들 <em>조비</em>가 부친 사후 한 헌제에게 <em>양위</em>를 받아 위(魏)를 세웠다. 형식은 한 황제가 <em>덕 있는 자에게 자리를 물려준다</em>는 것이었고, 실질은 무력 위의 정치적 합의였다. 한 헌제는 일종의 강제된 의례로 양위 조서를 내렸다. 그 후 <em>진사왕(陳思王) 조식</em>이 <em>위의 정통성을 비탄한</em> 일화가 따라온다.\n\n이 모형이 곧 위진남북조의 황위 교체 표준이 되었다. 위 →진(西晉, 265년 사마염), 동진 → 송(420년 유유), 송 → 제(齊, 479년 소도성), 제 → 양(梁, 502년 소연), 양 → 진(陳, 557년 진패선) — 모두 <em>양위</em>의 형식으로 이뤄졌다. 약 340년 동안 이 의례가 작동했다.\n\n양위의 절차는 점점 정형화되었다. 첫째, 새 정권의 수장이 <em>구석(九錫)</em>을 받는다. 둘째, <em>왕(王)</em>이나 <em>공(公)</em>에 봉해진다. 셋째, <em>공로</em>가 누적되어 <em>천자에 비길 만하다</em>는 상소가 올라온다. 넷째, <em>양위 조서</em>가 내려진다. 다섯째, 사양과 권고가 세 차례 거듭된 뒤 <em>마지못해</em> 받아들인다. 이 다섯 단계의 의례가 빠짐없이 진행되어야 새 정권의 정통성이 인정되었다.\n\n『세설신어』에서 양위는 <em>桓玄</em>의 일화에서 가장 짙게 그려진다. 그가 안제(安帝)에게 양위를 받아 <em>초(楚)</em>를 세운 자리는 〈언어〉·〈경저〉편에 전한다. 환현의 시도는 곧 <em>유유</em>에게 토벌되었지만, 그 의례 자체는 정형화된 형식 그대로였다.\n\n양위는 그러므로 <em>덕의 형식</em>과 <em>무력의 실질</em>이 만나는 자리다. 한 시대의 끝이 다른 시대의 시작으로 <em>부드럽게</em> 옮겨 가는 의례 — 그러나 그 부드러움의 뒤에 늘 칼이 있었다.", "storyCount": 0}, {"id": "thing.YuZhuWei", "type": "thing", "han": "玉麈尾", "ko": "", "sub": "옥주미 — 청담의 상징", "title": "", "short": "麈(고라니의 한 종류)의 꼬리털을 옥 손잡이에 끼운 일종의 부채. <em>청담</em>의 자리에서 <em>주(主)</em>가 들고 명제를 세웠다 <em>객(客)</em>에게 넘기며 토론하는 그 <em>발언권의 상징</em>. 하안·왕연·은호의 옥주미가 명품으로 전해졌다. 〈용지〉편에 그 모습이 자주 등장.", "long": "<em>玉麈尾</em>는 <em>청담(淸談)</em>의 자리에서 <em>주(主)</em>가 들고 명제(命題)를 세웠다 <em>객(客)</em>에게 넘기는 일종의 부채형 도구다. <em>麈</em>는 고라니(鹿)의 한 종류로 <em>큰 사슴</em>을 가리키는데, 무리 가운데 가장 큰 한 마리가 꼬리를 흔들어 무리를 이끈다는 풍속이 있어 <em>麈尾</em>가 곧 <em>영수의 표지</em>로 여겨졌다. 그 꼬리털을 옥(玉) 또는 상아·뿔의 손잡이에 끼워 만든 것이 <em>玉麈尾</em>다. 부채 모양이지만 부치는 도구가 아니라 <em>발언권의 상징</em>이었다.\n\n청담의 자리는 일종의 지적 경기였다. 옥주미를 든 사람이 한 명제를 세운다. <em>지인이 산을 좋아한다(知者樂山)</em>든가 <em>無에서 有가 난다</em>든가 하는 <em>명리(名理)</em>의 한 자리를 들어 보인다. 듣는 이가 응답한다. <em>그렇다면 어찌 어찌하지 않은가</em> 반례를 들고, <em>이렇게 본다면 어찌 어찌하지 않은가</em> 새 자리를 든다. 그렇게 <em>주</em>와 <em>객</em>이 갈마들며 한 명리를 끝까지 따져 묻는다. 진 사람이 옷을 벗어 옥주미를 넘긴다.\n\n이 자리에서 옥주미는 단순히 발언권의 표시가 아니라 <em>명사 됨</em>의 표지였다. <em>하안</em>의 옥주미가 명품으로 일컬어졌고, <em>왕연</em>이 옥주미를 들 때 옥의 빛깔과 그의 손이 구분되지 않을 만큼 살결이 희었다 한다. <em>손작</em>은 옥주미를 정성껏 다듬어 들고 명리를 논할 때 그 풍모가 한 자리의 빛이 되었다. 옥주미를 <em>어떻게 드는가</em>까지가 곧 명사의 식견을 가르는 한 자리였다.\n\n옥주미의 보존도 한 일화다. 명사가 죽으면 옥주미를 무덤에 함께 넣었다. 사후에 자기 시대의 청담을 가지고 가는 셈이다. <em>왕몽(王濛)</em>이 임종 직전 자기 옥주미를 어루만지며 <em>이것이 다 무엇이었던가</em> 탄식한 일이 〈상서〉편에 전한다. 한 시대 청담의 풍속이 그 한 도구에 응축된 자리.\n\n서진(西晉)에 들어 청담이 <em>명사라면 응당 해야 하는 사교 의례</em>에 가까워지자 옥주미도 <em>명사의 표지품</em>으로 일상화되었다. 동진(東晉)에 와서 <em>왕도</em>·<em>은호</em>·<em>지도림</em>·<em>사안</em>이 모두 옥주미를 들고 청담의 자리에 섰다. <em>지도림</em>은 옥주미를 들고 인도에서 들어온 <em>반야학</em>을 노장의 옷을 입혀 가르쳤다. 옥주미가 곧 <em>현학</em>과 <em>격의불교</em>의 경계에 함께 서 있었던 것이다.\n\n『세설신어』에서 옥주미는 〈용지〉·〈문학〉·〈상예〉편 곳곳에 등장한다. 그 도구를 모르면 청담의 풍경이 보이지 않는다.", "storyCount": 0}, {"id": "thing.GuangLingSan", "type": "thing", "han": "廣陵散", "ko": "", "sub": "광릉산 — 혜강의 마지막 곡", "title": "", "short": "고대의 거문고 곡. 본디 <em>섭정(聶政)</em>이 한왕(韓王)을 시해한 고사를 담은 격렬한 곡이라 전한다. <em>혜강</em>이 형장에서 한 곡을 타고는 <em>광릉산이 오늘로 끊어지는구나(廣陵散於今絕矣)</em> 탄식하고 죽었다. 후일 <em>袁孝尼</em>가 이 곡을 청해 배웠으나 끝내 가르치지 않은 것이 한이라 했다.", "long": "<em>廣陵散</em>은 고대 중국의 거문고(琴) 곡이다. 본디 <em>섭정(聶政)</em>이 한왕(韓王)을 시해한 전국시대의 고사를 담은 격렬한 곡이라 전해진다. 섭정은 부친의 원수를 갚기 위해 한 왕을 죽이고 자기 얼굴을 칼로 베어 누구도 알아보지 못하게 한 뒤 자살한 자다. 그 의기와 비극이 곡조에 담겼다고 한다. <em>광릉(廣陵)</em>은 그 일이 일어난 지역의 이름이고, <em>散</em>은 일종의 큰 곡조의 형식이다. 그러므로 광릉산은 <em>영웅의 의기</em>와 <em>고독한 죽음</em>의 두 색이 함께 가는 곡이다.\n\n이 곡이 위진(魏晉)의 한 명사 손에 들어와 한 시대의 정수가 되었다. 그가 <em>혜강(嵇康)</em>이다. 혜강은 거문고에 정통해 <em>광릉산</em>을 누구보다 잘 탔다. <em>광릉산을 잘 탄 자가 곧 혜중산</em>이라는 평이 있을 정도였다. 일찍이 친구 <em>원효니(袁孝尼)</em>가 이 곡을 배우고자 했으나 혜강은 끝내 가르치지 않았다. <em>너에게 가르치면 천하에 풀어지리라. 천하에 풀어지면 곡의 한 자리가 가벼워지리라</em> 한 까닭이다.\n\n263년, <em>종회(鍾會)</em>의 참소로 사마소가 혜강을 잡아 죽이라 명했다. 태학생 삼천 명이 그를 스승으로 모시고자 청원했으나 받아들여지지 않았다. 형장에 들어선 그는 햇그림자를 보고 아직 시간이 있음을 알고는, 형 <em>嵇喜</em>에게 일러 거문고를 가져오게 했다. 그러고는 <em>광릉산</em>을 한 곡 천천히 탔다. 한 곡을 마친 뒤 거문고를 옆에 놓고 말했다. <em>원효니가 일찍이 이 곡을 배우고자 했으나 내가 가르치지 않았다. 광릉산이 오늘로 끊어지는구나(廣陵散於今絕矣).</em> 그러고는 죽었다.\n\n그러나 광릉산은 <em>오늘로 끊어진</em> 것이 아니었다. 후세에 <em>광릉산</em>이라 일컬어지는 곡이 여럿 전해져 내려왔다. 唐代 이후 여러 <em>광릉산</em>의 악보가 만들어졌고, 明代의 『神奇秘譜』에 <em>광릉산</em>이 수록되어 지금까지 연주된다. 그러나 그것이 혜강이 형장에서 탄 <em>그 광릉산</em>인지는 아무도 모른다. 그러므로 <em>광릉산이 끊어졌다</em>는 혜강의 한 마디는 곡 자체가 아니라 <em>내가 탄 광릉산은 끊어졌다</em>는 자기 인격의 한 표현이다.\n\n『세설신어』〈아량〉·〈서일〉편에서 혜강의 죽음은 그 광릉산과 함께 그려진다. 한 곡이 한 사람의 죽음과 한 시대의 끝을 함께 담은 자리. 위진 명사 문화의 가장 깊은 비극이 거기에 있다.", "storyCount": 0}, {"id": "thing.LanTingXu", "type": "thing", "han": "蘭亭序", "ko": "", "sub": "난정서 — 왕희지의 명필", "title": "", "short": "<em>왕희지</em>가 353년 蘭亭 雅集의 시 모음에 붙인 머리말. 행서(行書)의 가장 빛난 한 표본. 28행 324자. <em>우주의 큼을 우러러보고 만물의 풍성함을 굽어본다</em>로 시작해 <em>그 사이 죽음이 다가오니 어찌 통탄하지 않으랴</em>로 무상감에 이른다. 진본은 唐 太宗과 함께 묻혔다 전한다.", "long": "<em>蘭亭序</em>는 <em>왕희지(王羲之)</em>가 동진 永和 9년(353) 3월 3일, 회계(會稽) 산음(山陰)의 난정(蘭亭)에서 열린 <em>유상곡수(流觴曲水)</em>의 모임 뒤 그날 지어진 시 모음에 붙인 머리말이다. 28행 324자. 행서(行書)의 가장 빛난 한 표본이며, 후일 <em>천하제일행서</em>라 일컬어진다. 글의 문장 또한 위진 청담의 무상감과 풍류를 한 자리에 응축한 명문이다.\n\n그날의 모임은 <em>상사일(上巳日)</em>의 풍속이다. 흐르는 물에 술잔을 띄워, 잔이 자기 앞에 멈춘 사람은 시 한 수를 짓고, 짓지 못한 사람은 술을 마신다. 41명의 명사가 모였다 — 왕희지가 주인이고, <em>사안</em>·<em>손작</em>·<em>허순</em>·<em>지도림</em> 등이 함께였다. 그날 지어진 시 37수를 모아 한 권의 시집이 만들어졌고, 왕희지가 머리말을 썼다.\n\n글의 시작은 풍류의 자리다. <em>영화 9년… 회계 산음의 난정에 모여 계제사(禊祭祀)를 지냈으니, 다 큰 어진 이가 모이고 어린 이와 늙은 이가 함께 모였더라. 이곳은 깊은 산과 큰 산림이 있고, 푸른 대와 우뚝한 소나무가 있으며, 또한 맑은 물과 격렬한 여울이 좌우에 둘러 있어 흐르는 물에 술잔을 띄워 차례로 앉을 만하니, 비록 정악(絲竹管弦)의 성대함이 없으나 한 잔에 한 시구가 또한 그윽한 정을 충분히 펼 만하다.</em> 그러고는 <em>우주의 큼을 우러러보고 만물의 풍성함을 굽어본다. 시야가 닿는 곳마다 회포를 누비니, 듣고 보는 즐거움이 다하지 못함이 어찌 아니 즐겁겠는가</em> 한다.\n\n그러나 글의 후반부는 갑자기 짙은 무상감으로 돌아선다. <em>사람의 사귐이 한 세상에 머물며, 혹은 회포를 끄집어내 한 방 안에서 마음을 나누고, 혹은 의탁한 바를 따라 형해(形骸) 바깥에서 자유로이 놀거니와, 비록 마음의 처소가 만 가지로 다르고 고요함과 시끄러움이 같지 않으나, 만나는 바를 기뻐하다 한순간에 자기를 잊고는 늙음이 다가옴을 알지 못한다… 그 사이 죽음이 다가오니 어찌 통탄하지 않겠는가(豈不痛哉).</em> 풍류와 죽음이 한 자리에서 만나는 위진 명사 문화의 정서가 이 한 글에 응축되었다.\n\n서법(書法)의 자리에서 보자면 蘭亭序는 <em>왕희지의 일생 가운데 가장 즉흥적이고 자유로운 한 글</em>로 평가된다. 그는 후일 술이 깬 뒤 같은 글을 여러 번 다시 써 보았으나, 그날 그 자리에서 쓴 것의 결을 결코 다시 잡지 못했다 한다. 唐 太宗 李世民이 蘭亭序를 사랑해 <em>변상지(辯才) 스님</em>에게서 그것을 <em>빼앗아</em> 자기 무덤(昭陵)에 함께 묻었다 전한다. 그러므로 우리가 보는 蘭亭序는 모두 후대의 <em>모본(摹本)</em>과 <em>임본(臨本)</em>이며, 唐代의 <em>馮承素 神龍本</em>이 가장 진본에 가깝다고 일컬어진다.\n\n『세설신어』에서 蘭亭의 모임은 〈문학〉·〈언어〉편에 그려지고, 蘭亭序 자체는 위진 명사 문화의 <em>마지막 풍경</em>의 표지로 후대 천 년 동안 인용되었다.", "storyCount": 0}, {"id": "thing.WeiQi", "type": "thing", "han": "圍棋", "ko": "", "sub": "위기 — 바둑", "title": "", "short": "위진 명사들이 즐긴 <em>지적 경기</em>. 청담과 더불어 명사 사교의 한 축. <em>사안</em>이 비수대전의 첩보를 받고도 바둑을 계속 두며 <em>아이들이 도적을 부수었다</em> 한 일화가 〈아량〉편의 백미. 〈교예(巧蓺)〉편에 명사들의 바둑 일화 다수.", "long": "<em>圍棋</em>는 위진(魏晉) 명사들이 즐긴 지적 경기다. <em>바둑</em>의 한자 이름. <em>위(圍)</em>는 둘러쌈을, <em>기(棋)</em>는 알을 가리키니, <em>알로 자리를 둘러싸는 경기</em>라는 뜻이다. 한대(漢代)부터 사대부 사이에 보급되었으나, 위진에 와서 <em>청담</em>과 함께 명사 사교의 두 축이 되었다.\n\n위진의 바둑은 단순한 놀이가 아니라 <em>인격을 비추는 거울</em>로 여겨졌다. 한 사람의 사고 결, 결단의 자리, 위기 대응 — 모두 바둑판 위에서 드러난다는 것이다. 그러므로 <em>바둑을 어떻게 두는가</em>가 곧 그 사람의 됨됨이를 가르는 한 자리가 되었다. 〈교예(巧蓺)〉편에 명사들의 바둑 일화가 여럿 전한다.\n\n가장 유명한 바둑 일화가 곧 <em>사안</em>의 비수전 첩보 자리다. 383년 <em>부견</em>의 백만 대군에 맞선 <em>비수대전</em>이 시작되었을 때, 동진 측의 총책임은 <em>사안</em>이었다. 결전의 첩보가 도착한 그 순간, 사안은 손님과 <em>바둑</em>을 두고 있었다. 한 손님이 누구였는지에 대해 자료에 따라 다르나, 사현의 한 사신이 비수의 승전을 보고하러 왔다. 사안은 그 첩보문을 무심히 옆에 놓고는 바둑을 계속 두었다. 손님이 <em>어찌 되었느냐</em> 묻자, 사안이 한참 뒤에야 <em>아이들이 도적을 부수었소(小兒輩遂已破賊)</em> 한마디만 했다. 그러고는 손님이 돌아간 뒤, 그제야 안쪽으로 들어가다 문지방을 넘다 신발의 굽이 부러지는 줄도 몰랐다. 안에서 기쁨이 그렇게 새어 나온 것이다. 〈아량〉편의 백미이며, 위진 명사 문화의 한 정점이다.\n\n또 다른 바둑 일화로 <em>왕탄지</em>와 <em>환온</em>의 자리가 있다. 환온이 왕탄지에게 바둑을 청해 <em>나에게 이기면 한 자리를 주마</em> 했다. 왕탄지가 <em>내가 이긴다 한들 한 자리가 무슨 소용이며, 진다 한들 무엇을 잃겠는가</em> 답하고는 태연히 바둑을 둬 이겼다 한다. 〈배조〉편에 전한다.\n\n<em>고개지(顧愷之)</em>의 그림에 바둑 두는 명사가 자주 등장한다. <em>난정의 모임</em>에도 시뿐 아니라 바둑 두는 자리가 있었다는 기록이 있다. 그러므로 위진 명사 문화에서 바둑은 <em>청담의 자매</em>이자 <em>풍류의 한 표현</em>이었다.\n\n바둑은 위진 이후로도 동아시아 명사 문화의 한 축으로 이어졌으나, 위진 시기의 바둑이 가장 <em>인격을 비추는 거울</em>로서의 자리가 두드러진다. 사안이 신발 굽이 부러지는 줄도 모르고 안으로 들어간 그 한 장면 — 거기에 위진 바둑의 본질이 있다.", "storyCount": 0}, {"id": "thing.TieRuYi", "type": "thing", "han": "鐵如意", "ko": "", "sub": "철여의 — 석숭의 도구", "title": "", "short": "如意는 본디 손가락처럼 휘어진 등 긁개. 그러나 사대부 손에서는 권위와 풍류의 상징이 되어 옥·금·철 등으로 만들었다. <em>석숭</em>이 <em>왕개</em>의 산호수를 <em>철여의</em>로 부수고 더 큰 산호수를 내보인 일화가 〈태치〉편의 표상.", "long": "<em>鐵如意</em>는 위진(魏晉) 명사들이 손에 들고 다닌 일종의 등 긁개로, 본디 <em>如意</em>는 <em>뜻과 같다</em>는 뜻의 한자에서 나왔다. <em>如</em>는 <em>같다</em>, <em>意</em>는 <em>뜻</em>이니, <em>뜻대로 닿는다</em>는 의미다. 본래 인도에서 들어온 <em>간타카(羯陀迦, ghantaka)</em>라는 도구가 그 원형으로, 손이 닿지 않는 등의 한 자리까지 정확히 긁어 <em>뜻대로</em> 가려운 곳을 풀어 준다는 데서 이름이 왔다. 처음에는 실용 도구였으나, 사대부 손에 들어와 <em>권위와 풍류의 상징</em>이 되었다.\n\n위진의 <em>如意</em>는 옥(玉)·금(金)·철(鐵)·뿔(角)·대(竹) 등 여러 재질로 만들어졌고, 손잡이 끝의 머리 모양은 영지(靈芝)·구름·연꽃 등 다양한 형상을 했다. 손잡이는 한두 자(尺)에 이르렀고, 무게가 있었다. 그러므로 <em>如意를 들고 있는 자세</em>가 곧 명사의 풍모를 드러내는 한 자리가 되었다. <em>옥주미</em>가 청담의 발언권 표지였다면, <em>如意</em>는 일상의 동작 가운데 <em>내가 곧 명사</em>임을 보이는 도구였다.\n\n『세설신어』에서 <em>鐵如意</em>가 가장 유명한 자리는 〈태치(汰侈)〉편의 <em>석숭과 왕개의 산호수 자랑</em>이다. 진 무제 시기 외척 <em>왕개</em>가 두 자(尺) 남짓한 산호수를 자랑하니, <em>석숭</em>이 <em>철여의</em>로 그것을 단번에 부숴 버렸다. 왕개가 분노해 <em>물건을 부쉈으니 어떻게 변상할 것인가</em> 따지자, 석숭이 <em>마음에 두지 마시오. 내 집에 더 좋은 것이 있으니</em> 하고는 자기 집의 산호수를 여럿 내보였다. 가장 작은 것이 세 자였고, 가장 큰 것은 다섯 자(尺)에 이르러 왕개가 말을 잊었다 한다. <em>철여의</em>가 곧 그 사치 다툼의 도구이자 <em>부의 위세</em>를 한순간에 보인 자리.\n\n그러나 如意의 자리는 사치뿐 아니라 풍류의 자리이기도 했다. <em>환온</em>이 술자리에서 如意를 들고 <em>탁자를 두드리며</em> 「短歌行」을 노래하다 如意의 머리가 부서졌다는 일화가 있다. <em>왕돈</em>도 술 마시고 <em>唾壺(타호, 침 뱉는 그릇)</em>를 如意로 두드리며 노래하다 타호가 깨졌다 한다 — 〈호상〉편의 한 정점.\n\n唐·宋 이후에도 如意는 사대부 사이에서 이어졌으나, 위진처럼 <em>명사 일상의 표지</em>로서의 무게는 차츰 가벼워졌다. 위진 시기의 如意, 특히 <em>鐵如意</em>는 <em>권위와 풍속</em>이 한 도구에 응축된 자리로 후대에 회상되었다.", "storyCount": 0}, {"id": "thing.SanHuShu", "type": "thing", "han": "珊瑚樹", "ko": "", "sub": "산호수", "title": "", "short": "바다에서 자라는 산호의 큰 가지. 옛 중국에서는 <em>서역에서 들여오는 보배</em>. <em>석숭</em>과 <em>왕개</em>의 부 자랑에서 그 크기를 다투던 도구. 왕개의 두 자(尺) 산호수를 석숭이 부수고는 자기 집에서 세 자·네 자짜리 산호수를 여럿 내보였다 한다.", "long": "<em>珊瑚樹</em>는 바다 속에서 자라는 산호의 큰 가지다. 본래 살아 있는 <em>산호충(珊瑚蟲)</em>의 군체가 만든 석회질의 골격으로, <em>나무</em>처럼 가지가 펼쳐진다. 옛 중국에서는 <em>서역에서 들여오는 보배</em>로 여겨졌고, 특히 <em>큰 산호수</em>는 부의 표지이자 진귀한 보물로 일컬어졌다. 위진(魏晉) 사대부 가운데 이를 소장한 자들이 그 <em>크기</em>를 자랑하는 풍속이 있었다.\n\n가장 유명한 자리가 〈태치〉편의 <em>석숭과 왕개의 부 자랑</em>이다. 진 무제(晉武帝)의 외삼촌 <em>왕개</em>는 외척으로서 큰 부를 누렸고, 자기 집에 두 자(尺) 남짓한 산호수가 있어 천하의 일품으로 자랑했다. 한편 <em>석숭</em>은 형주자사로 부임해 <em>지방관</em>의 자리에서 <em>약탈에 가까운 방식</em>으로 큰 부를 모은 자였다. 두 사람의 부 자랑이 곧 서진 풍속의 정점이 되었다.\n\n어느 날 왕개가 석숭을 자기 집에 초대해 산호수를 보였다. 석숭은 그것을 가만히 보다 곁의 <em>철여의(鐵如意)</em>를 들어 단번에 부숴 버렸다. 왕개가 분노해 <em>물건을 부쉈으니 어떻게 변상할 것인가</em> 따지자, 석숭이 <em>마음에 두지 마시오. 내 집에 더 좋은 것이 있으니 그것으로 변상하리이다</em> 했다. 그러고는 사람을 보내 자기 집의 산호수를 가져오게 했다. 가장 작은 것이 세 자(尺)였고, 가장 큰 것은 네 자·다섯 자에 이르러 <em>광채가 방을 밝힐 정도</em>였다 한다. 왕개가 말을 잊었다.\n\n이 한 장면이 서진 풍속의 정수다. <em>부의 자랑</em>이 단순히 재물의 많음을 다투는 것이 아니라, <em>상대를 압도하는 한 장면을 연출하는</em> 것이 되었다. 석숭이 <em>철여의</em>로 왕개의 산호수를 부순 그 한 행동이 — 단지 부수는 것이 아니라 <em>동시에 더 큰 것을 내보이는</em> 그 한 호흡이 — 곧 서진 사치의 한 표현이다. 〈태치〉편이 그리는 다른 일화들 — <em>자색 비단으로 사십 리의 길을 덮은 일</em>, <em>황실의 진열을 흉내 낸 정원</em>, <em>손님 한 사람에게 미녀 백 명을 시중들게 한 일</em> — 모두 같은 결이다.\n\n석숭은 결국 <em>팔왕의 난</em> 중 <em>조왕(趙王) 사마륜</em>의 측근 <em>손수(孫秀)</em>에게 미움을 사 일족과 함께 처형되었다(300). 그가 죽기 전 <em>너희가 내 재산을 탐낸 것이 아니냐</em> 묻자 잡으러 온 자가 <em>재산이 화근이었지요</em> 답했다. 석숭은 <em>그렇다면 일찍이 나누어 주었을 것을</em> 탄식했다 한다. 그의 산호수는 모두 사마륜의 손에 들어갔다.\n\n『세설신어』가 〈태치〉편에서 이런 일화들을 모은 까닭은 단순한 사치 비판이 아니다. 한 시대의 풍속이 어떻게 한 가문의 멸망으로 이어졌는가의 <em>경각</em>이다. 산호수는 그 경각의 한 표지다.", "storyCount": 0}, {"id": "thing.QingYanBaiYan", "type": "thing", "han": "靑眼·白眼", "ko": "", "sub": "청안·백안 — 완적의 사람 가르기", "title": "", "short": "<em>완적</em>이 사람을 보는 두 방식. 마음에 맞으면 <em>푸른 눈동자(靑眼)</em>로 마주 보고, 그렇지 않으면 <em>흰자위(白眼)</em>로 흘겨 본다. 그가 모친의 상중에 嵇喜가 조문 오니 白眼으로 흘겨 보고, 嵇康이 거문고를 들고 오니 靑眼으로 마주 봤다는 일화가 〈간오(簡傲)〉편.", "long": "<em>靑眼</em>과 <em>白眼</em>은 <em>완적(阮籍)</em>이 사람을 보는 두 방식이다. 마음에 맞으면 <em>푸른 눈동자(靑眼)</em>로 마주 보고, 마음에 들지 않으면 <em>흰자위(白眼)</em>로 흘겨 본다. 한 사람을 어떻게 보는가의 자세가 곧 그 사람에 대한 평가의 표시였다. 〈간오(簡傲)〉편의 한 정수.\n\n가장 유명한 일화가 <em>혜강의 형 嵇喜와 동생 嵇康의 자리</em>다. 완적은 죽림칠현의 영수이자 <em>명교</em>에 거의 노골적으로 등을 돌린 자였다. 그의 모친이 죽었을 때, 예법상의 의식 절차를 거의 따르지 않고 술과 음식을 든 채 상중에 임했다. 그러나 <em>어머니의 죽음</em>에 대한 <em>진정한 슬픔</em>은 도리어 깊었다. 어느 자리에서 그는 갑자기 한 사발의 술을 토하고 피를 토하며 정신을 잃을 만큼 슬퍼했다.\n\n그 상중에 두 사람이 조문하러 왔다. 먼저 <em>혜희(嵇喜)</em>가 왔다. 그는 <em>명교</em>의 예법을 잘 지키는 점잖은 사람이었다. 완적은 그를 <em>白眼</em>으로 흘겨 보았다. 혜희는 영문도 모르고 곤혹스러워하다 돌아갔다. 그러고는 동생 <em>혜강</em>이 술과 거문고를 가지고 왔다. 완적은 그를 보고는 <em>靑眼</em>으로 마주 보며 함께 술을 나누었다.\n\n이 한 일화의 의의가 깊다. 첫째, 완적은 <em>예법을 비웃은</em> 자세 자체로 명사의 한 결을 보였다. 모친의 상중에 어찌 술을 드는가, 어찌 음식을 드는가 — 이런 <em>명교</em>의 물음에 그는 <em>白眼</em>으로 답했다. 그러나 동시에 그의 <em>진정한 슬픔</em>은 <em>명교</em>가 미치지 못하는 깊이에 있었다. 둘째, 그는 <em>사람을 보는 한 자세</em>로 <em>명교와 자연</em>의 갈림길을 표현했다. 명교를 지키는 자에게는 白眼을, 자연을 따르는 자에게는 靑眼을 — 한 사람의 한 자세 자체가 곧 사상의 한 표현이 된 자리다.\n\n후대에 <em>靑眼</em>은 <em>환영의 자세</em>를, <em>白眼</em>은 <em>경멸의 자세</em>를 가리키는 일반어가 되었다. <em>내가 너를 靑眼으로 본다</em>는 것은 <em>내가 너를 환영한다</em>는 뜻이며, <em>白眼視</em>는 <em>경멸의 눈빛</em>이다. 우리말의 <em>백안시</em>도 여기서 왔다. 한 사람의 한 일화가 약 1800년 동안 두 한자어의 의미를 결정해 온 자리다.\n\n『세설신어』의 〈간오〉편과 〈임탄〉편에 완적의 <em>白眼</em> 일화가 두루 전한다. 이 한 도구가 — 사실은 도구가 아니라 <em>눈</em>이지만 — 곧 <em>명교에 맞선 자연</em>의 가장 짙은 표현이 되었다.", "storyCount": 0}, {"id": "thing.HeMaE", "type": "thing", "han": "鶴·馬·鵝", "ko": "", "sub": "학·말·거위 — 명사의 애완", "title": "", "short": "<em>지도림</em>의 학(鶴), <em>왕희지</em>의 거위(鵝), <em>환이</em>의 말(馬). 각기 <em>神駿함</em>과 <em>고요함</em>과 <em>풍류</em>의 상징. 지도림이 학의 날개를 꺾어 길렀다 <em>너는 하늘의 새인데 어찌 사람의 노리개가 되리오</em> 풀어 준 일화, 왕희지가 도사에게 거위를 받으려 『도덕경』을 써 준 일화 — 모두 명사 풍속의 정수.", "long": "<em>鶴·馬·鵝</em> — 학·말·거위는 위진(魏晉) 명사들이 사랑한 세 짐승이다. 각기 <em>지도림(支道林)</em>의 학, <em>환이(桓伊)</em>의 말, <em>왕희지</em>의 거위로 일컬어진다. 명사가 한 짐승을 어떻게 대하는가의 결이 곧 인격의 한 표현이 되었다.\n\n<em>지도림의 학</em>. 지도림은 동진의 고승으로 청담과 노장·반야학에 두루 통했다. 그가 학(鶴)을 사랑해 두 마리를 길렀다. 그러나 학이 본디 하늘을 나는 새이니 그것을 지면에 두고 기르는 것은 학의 본성을 거스르는 일이었다. 학이 점차 야위어 가고 날개의 깃이 빠졌다. 지도림은 이를 보고 깨달았다. <em>너는 본래 하늘의 새인데, 어찌 사람을 위해 노리개가 되리오(汝既冲天之物, 寧為人作耳目近玩)</em> 한 뒤, 학의 날개가 다시 자라기를 기다려 놓아주었다. 학이 날개를 회복하자 멀리 날아갔다.\n\n이 일화의 결이 깊다. 학을 <em>얻고 잃은</em> 일이 아니라, <em>짐승의 본성을 알아본</em> 자리다. <em>내가 사랑하는 것을 가두는 것이 곧 그것을 그르치는 것</em>이라는 깨달음. 이것이 곧 노장의 <em>자연(自然)</em> 이념의 한 표현이며, 동시에 불교의 <em>방생(放生)</em>의 자리이기도 하다. 두 사상이 한 행동에서 만나는 자리.\n\n<em>환이의 말</em>. 환이(桓伊)는 동진 후기의 무장이자 음악의 명인. 비수대전에도 참전했다. 그가 <em>말을 기르는 까닭</em>을 묻자 <em>그 신준(神駿)함을 사랑할 따름이라(愛其神駿)</em> 답했다. 말을 <em>타기 위해서</em>나 <em>공로를 세우기 위해서</em>가 아니라, <em>그 짐승 자체의 빛</em>을 사랑한다는 자세. 짐승을 <em>도구</em>가 아니라 <em>그 자체로</em> 보는 자리다.\n\n<em>왕희지의 거위</em>. 왕희지는 거위(鵝)를 깊이 사랑했다. 일찍이 한 도사(道士)가 빼어난 거위 떼를 기르고 있다는 말을 듣고 그것을 보러 갔다. 그가 받기를 원하자 도사가 답하기를 <em>왕희지께서 「도덕경」을 한 부 정성껏 써 주시면 거위 떼를 다 드리겠소</em> 했다. 왕희지는 그 자리에서 정성껏 「도덕경」을 한 부 써 주고는 거위 떼를 새장에 넣어 돌아갔다. <em>그가 즐거워한 것이 이와 같았다(其任率如此)</em> 한다. 〈임탄〉편의 한 정수.\n\n왕희지가 거위를 사랑한 까닭은 단순한 애완이 아니다. 거위의 <em>목 움직임</em>에서 <em>서법의 결</em>을 보았다 한다. 거위가 목을 휘어 깃털을 다듬는 그 우아한 곡선이 곧 행서(行書)의 한 자리라는 깨달음. 그러므로 거위는 단지 <em>애완 동물</em>이 아니라 <em>서법의 스승</em>이었다.\n\n세 짐승의 일화가 모두 한 결을 보인다. <em>명사가 짐승을 대하는 자세는 곧 그가 사물을 대하는 자세</em>다. 짐승을 <em>내 즐거움의 도구</em>로 보는 것이 아니라 <em>그 자체의 결</em>로 보는 자리. 위진 풍속의 한 깊이가 거기에 있다.", "storyCount": 0}, {"id": "thing.MajorWorks", "type": "thing", "han": "名士의 주요 저작", "ko": "", "sub": "주요 저작 일람", "title": "", "short": "위진 명사의 글로 후대에 전한 것: 何晏 「論語集解」·「無名論」, 王弼 「老子注」·「周易注」, 嵇康 「養生論」·「聲無哀樂論」·「與山巨源絕交書」, 阮籍 「詠懷詩 八十二首」·「達莊論」, 劉伶 「酒德頌」, 向秀·郭象 「莊子注」, 王羲之 「蘭亭序」, 顧愷之 「畫雲台山記」 등. 玄學·풍류·서법의 한 정점들.", "long": "위진(魏晉) 명사의 글로 후대에 전한 주요 저작 일람. 한 시대의 사상과 풍류가 이 저작들에 응축되어 있다.\n\n*<em>현학(玄學)의 정전(正典)</em><em> — </em>하안<em>의 『논어집해(論語集解)』는 노장의 시각으로 공자를 다시 읽은 자리. 『노자도덕론(老子道德論)』·「無名論」·「無爲論」 같은 단편이 함께 전한다. </em>왕필<em>의 『노자주(老子注)』와 『주역주(周易注)』는 후대 천 년의 표준이 되었다. 그가 십대에 쓴 글이 그대로 위진 玄學의 골격이 되었다. 향수와 곽상의 『장자주(莊子注)』 — 곽상의 </em>獨化<em>와 </em>自爾<em> 개념은 노장 사상의 가장 정밀한 위진적 재해석으로, 후대의 모든 『장자』 해석의 출발점이 되었다.\n\n</em><em>죽림의 글</em><em> — </em>혜강<em>의 「양생론(養生論)」은 도가의 양생술을 체계화한 사상서. 「성무애락론(聲無哀樂論)」은 </em>소리 자체에는 슬픔이나 즐거움이 없으며, 그것을 듣는 자의 마음에서 정이 일어난다<em>는 음악 철학으로, 위진 사상의 가장 정심한 한 자리. 「난자연호학론(難自然好學論)」은 </em>학문이 자연이 아니라 명교의 산물<em>이라 주장한 격렬한 글. 「산거원에게 보내는 절교서(與山巨源絕交書)」는 출사 거부의 명문이자 </em>명교<em>와 </em>자연<em>의 결별 선언. </em>완적<em>의 「영회시(詠懷詩)」 82수는 위진 시(詩)의 한 정점이며, 시대의 어두움을 우회한 자리. 「달장론(達莊論)」 또한 노장 사상의 위진적 표현. </em>유령<em>의 「주덕송(酒德頌)」은 술의 자유를 노래한 짧고 빛난 글로, </em>내가 곧 술이요 술이 곧 나다<em>의 한 정수.\n\n</em><em>위진의 시문</em><em> — </em>건안칠자(建安七子)<em>의 시 — 공융(孔融)·예형(禰衡)·왕찬(王粲)·진림(陳琳)·완우(阮瑀)·서간(徐幹)·유정(劉楨) — 가 위진 시문의 출발. 조비(曹丕)의 「典論」, 조식(曹植)의 「洛神賦」와 「七步詩」(후대 정착), </em>손작<em>의 「유천태산부(遊天台山賦)」 — </em>땅에 던지면 쇠와 옥의 소리가 나리라<em> 자랑한 글, </em>허순<em>의 玄言詩, </em>지도림<em>의 시·문이 동진 문학의 한 정수.\n\n</em><em>서법(書法)과 그림</em><em> — </em>왕희지<em>의 「난정서(蘭亭序)」는 천 년의 행서 표준. 「快雪時晴帖」·「奉橘帖」 등의 척독(尺牘)도 함께 전한다. 아들 </em>왕헌지(王獻之)<em>의 글씨도 부친에 못지않다. </em>고개지(顧愷之)<em>의 그림과 「화운대산기(畫雲台山記)」가 동진 그림의 한 정점. 그의 「여사잠도(女史箴圖)」·「낙신부도(洛神賦圖)」가 후세에 전한다.\n\n</em><em>역사와 박물(博物)</em><em> — </em>황보밀(皇甫謐)<em>의 『高士傳』은 후한~위 시기의 은사(隱士)들의 일대기를 모은 책. 「寒食散論」에서 五石散의 위험을 일찍 경고한 자. </em>간보(干寶)<em>의 『搜神記』는 동진의 박물지(博物志)이자 지괴(志怪) 소설의 시조. </em>유의경*의 『세설신어』가 그 모든 흐름의 끝에 자리한다.\n\n이 저작들이 곧 위진 사상사·문학사·서법사의 골격이다. 한 명사가 한 권을 남기면 그 권이 한 시대의 한 자리를 떠받친 자리.", "storyCount": 0}, {"id": "thing.WuShiSan", "type": "thing", "han": "五石散", "ko": "", "sub": "오석산 — 위진 명사의 약물", "title": "", "short": "五石散은 위진 명사들 사이에 크게 유행한 한 약물이다. 다섯 가지 광물 — <em>자석영(紫石英)</em>·<em>백석영(白石英)</em>·<em>적석지(赤石脂)</em>·<em>종유(鍾乳)</em>·<em>석황(石黃)</em> (자료에 따라 약간씩 다르다) — 을 가루로 빻아 섞은 산제(散劑)이며, 별칭으로 <em>한식산(寒食散)</em>이라고도 한다. 본래 동한(東漢) 말의 의서 『神農本草經』·『傷寒論』 계열에 <em>상한(傷寒, 일종의 열병)</em>을 다스리는 처방으로 등장하나, 위진에 와서 <em>건강을 증진하고 정신을 맑게 한다</em>는 명목으로 명사 사이에 확산되었다.\n\n이 약을 위진 명사 문화 안으로 들여놓은 사람...", "long": "五石散은 위진 명사들 사이에 크게 유행한 한 약물이다. 다섯 가지 광물 — <em>자석영(紫石英)</em>·<em>백석영(白石英)</em>·<em>적석지(赤石脂)</em>·<em>종유(鍾乳)</em>·<em>석황(石黃)</em> (자료에 따라 약간씩 다르다) — 을 가루로 빻아 섞은 산제(散劑)이며, 별칭으로 <em>한식산(寒食散)</em>이라고도 한다. 본래 동한(東漢) 말의 의서 『神農本草經』·『傷寒論』 계열에 <em>상한(傷寒, 일종의 열병)</em>을 다스리는 처방으로 등장하나, 위진에 와서 <em>건강을 증진하고 정신을 맑게 한다</em>는 명목으로 명사 사이에 확산되었다.\n\n이 약을 위진 명사 문화 안으로 들여놓은 사람이 곧 <em>하안(何晏)</em>이다. 그는 <em>五石散을 복용하니 정신이 곧 명민해진다(服五石散, 非唯治病, 亦覺神明開朗)</em>라 자랑했다 한다. 한대까지 의약품이었던 것이 그의 손에서 <em>정신을 일깨우는 풍속</em>이 되었다. 정시(正始) 명사들이 따랐고, 곧 죽림에서 동진까지 위진 약 200년의 사대부 사회가 이 약을 복용했다.\n\n복용 후의 반응이 곧 <em>행산(行散)</em>이다. 약효가 돌면 몸에 강한 열이 솟았다. 이를 <em>發散</em>이라 한다. 발산이 시작되면 두꺼운 옷을 견디지 못해 <em>얇은 비단옷</em>을 입고 <em>찬바람을 쐬며</em> <em>찬 음식</em>을 먹어야 했다. <em>한식산</em>이라는 별칭이 여기서 왔다. 또 행산 중에는 가만히 앉아 있을 수 없어 끊임없이 걸어야 했다. <em>산보(散步)</em>라는 말이 곧 이 <em>行散</em>에서 왔다고 보는 설이 유력하다. 위진의 명사들이 산수를 거닐며 청담을 나누는 그 풍속의 한 신체적 배경이 이 약이다.\n\n부작용도 컸다. 행산 중에는 피부가 매우 민감해져 <em>옷자락이 살에 닿는 것조차 견디지 못했다</em>고 한다. 또한 약의 독성으로 피부가 희고 투명해 보였다. 한여름에도 곱고 흰 얼굴을 유지한 <em>하안</em>이 <em>분을 발랐는가</em> 의심받았으나 실은 분이 아니라 五石散의 부작용이라는 후대의 해석이 유력하다. <em>위개(衛玠)</em>가 <em>옥인(玉人)</em>이라 일컬어진 그 흰 얼굴도 같은 맥락이다. 위진 명사의 <em>희고 깨끗한 미모</em>가 풍속의 한 특징이 된 데에는 이 약의 그늘이 있다.\n\n장기 복용의 부작용은 더 심각했다. 신경 흥분으로 분노와 불안을 자주 일으켰고, 피부의 종기와 궤양이 따라왔다. <em>발산이 잘못되면 죽음에 이른다</em>는 인식이 동시대부터 있었다. 동진 후기의 명사 가운데 五石散의 부작용으로 죽은 자들의 명단이 길게 전해진다. 황보밀(皇甫謐)은 「寒食散論」에서 이 약의 위험을 일찍이 경고했고, <em>손사막(孫思邈)</em>은 唐代에 이르러 <em>복용을 절대 권하지 않는다</em>고 단언했다.\n\n그러나 위진 사대부 사이에서 이 약은 <em>명사의 표지</em>에 가까웠다. 五石散을 복용한다는 것은 곧 <em>내가 명사이며 정신의 명민을 갈고닦는다</em>는 사회적 표시였다. 그러므로 이 약의 유행은 단순한 의학사가 아니라, <em>현학(玄學)</em>과 <em>청담(淸談)</em>과 더불어 위진 명사 문화의 한 신체적·물질적 기반이다. 청담의 자리에서 옥주미를 들고 명리를 논하는 그 <em>명민한 정신</em>의 뒤에는, 五石散으로 흥분된 신경계가 있었다.\n\n『세설신어』에서는 직접 五石散을 다룬 일화가 많지 않으나, 〈용지〉편의 <em>희고 깨끗한 얼굴</em>과 <em>옥인</em>에 관한 모든 평, 〈상예〉편의 <em>명민한 정신</em>에 관한 평들이 모두 그 그림자다. 또한 <em>진녹원(秦菉)</em>이 <em>五石散을 복용하고 곧 명민해졌다</em>는 일화나, <em>지도림</em>이 <em>五石散을 복용하다 부작용을 입었다</em>는 일화 등이 단편적으로 전한다. 이 약을 모르면 위진 명사의 미모와 흰 얼굴과 청담의 명민이 풍속의 한 차원에서 설명되지 않는다.\n\n위진의 끝과 함께 五石散은 점차 자취를 감추었다. 唐代에는 이미 <em>옛 풍속의 한 폐단</em>으로 회상되었다. 그러나 약 200년에 걸쳐 한 시대의 사대부 사회를 떠받친 그 약은, 명사 문화의 한 <em>물질적 척추</em>로서 위진 사상사·풍속사의 한가운데 자리한다.", "storyCount": 0}, {"id": "institution.JiuPinGuanRenFa", "type": "institution", "han": "九品官人法", "ko": "", "sub": "구품관인법 — 위진 인사의 근간", "title": "", "short": "九品官人法은 위(魏) 文帝 조비(曹丕)가 220년 즉위 직후 시행한 인재 등용 제도이며, 그 골격이 위진남북조 약 400년에 걸쳐 작동했다. 줄여서 <em>구품관인(九品官人)</em>, <em>구품중정제(九品中正制)</em>라고도 한다. 그 발안자는 <em>진군(陳群)</em>으로, 한대의 <em>향거리선제(鄕擧里選制)</em>가 후한 말 환관·외척의 농단으로 무너진 자리에 새로운 인재 추천 체제를 세우려는 시도였다.\n\n제도의 골격. 중앙에서 각 군(郡)에 <em>중정(中正)</em>이라는 관리를 두었다. 중정은 그 군의 사람으로, 출신·재능·인품에 대한 명망이 두터운 자가 임명되었다. 중정은...", "long": "九品官人法은 위(魏) 文帝 조비(曹丕)가 220년 즉위 직후 시행한 인재 등용 제도이며, 그 골격이 위진남북조 약 400년에 걸쳐 작동했다. 줄여서 <em>구품관인(九品官人)</em>, <em>구품중정제(九品中正制)</em>라고도 한다. 그 발안자는 <em>진군(陳群)</em>으로, 한대의 <em>향거리선제(鄕擧里選制)</em>가 후한 말 환관·외척의 농단으로 무너진 자리에 새로운 인재 추천 체제를 세우려는 시도였다.\n\n제도의 골격. 중앙에서 각 군(郡)에 <em>중정(中正)</em>이라는 관리를 두었다. 중정은 그 군의 사람으로, 출신·재능·인품에 대한 명망이 두터운 자가 임명되었다. 중정은 자기 군 출신의 사대부 모두를 <em>상상(上上)</em>에서 <em>하하(下下)</em>까지 아홉 등급(九品)으로 평가했다. 이를 <em>향품(鄕品)</em>이라 한다. 향품이 결정되면 중앙의 이부(吏部)가 그 향품에 상응하는 관직을 부여했다. 향품 一品이면 가장 높은 관직에서 시작하고, 향품 九品이면 가장 낮은 관직에서 시작했다.\n\n이 제도의 핵심은 <em>향품의 평가가 그 사람의 평생 위계를 사실상 결정한다</em>는 점이었다. 한 번 받은 향품은 좀처럼 바뀌지 않았고, 향품의 위계가 곧 관직의 상한선이 되었다. 그러므로 <em>중정의 손에 사대부의 운명이 달려 있다</em>는 말이 돌았다.\n\n문제는 곧 드러났다. 위가 西晉으로 넘어가고 사회가 안정되면서, 중정이 인물 평가의 객관성을 잃고 <em>문벌(門閥)</em>에 기울었다. 같은 능력이어도 명문 출신은 높은 향품을, 한문(寒門) 출신은 낮은 향품을 받았다. <em>상품(上品)에는 한문이 없고, 하품(下品)에는 세족이 없다(上品無寒門, 下品無勢族)</em>는 말이 곧 정설이 되었다. 이 한 문장이 위진 사회의 골격을 가장 단적으로 보여 준다.\n\n이 골격이 곧 <em>문벌제도</em>다. 향품을 통해 관직을 독점한 사대부 가문이 대를 이어 권력을 잇는 사회 — 그것이 위진남북조 사회의 본질이다. <em>낭야 왕씨</em>·<em>진군 사씨</em>·<em>초국 환씨</em>·<em>태원 왕씨</em> 같은 이름이 책의 곳곳에 <em>그냥 등장</em>하는 이유는, 그 가문이 곧 권력의 상속자이기 때문이다. 가문의 명망 자체가 향품을 보장하고, 향품이 관직을 보장했다.\n\n『세설신어』에서 이 제도가 직접 언급되는 자리는 많지 않으나, 그 그림자는 모든 일화에 깔려 있다. <em>왕도</em>가 강좌 정권을 세울 때 <em>교군(僑郡)</em>을 두어 의관남도해 온 북방 사대부의 향품을 보전한 일, <em>왕희지</em>가 우군장군으로 출사할 때 자기의 향품을 자랑하지 않은 일, <em>환온</em>이 평민에 가까운 출신에서 권력에 오른 일이 <em>예외적</em>으로 일컬어지는 일 — 모두 이 제도의 작동을 전제로 한 자리다.\n\n특히 <em>環溫</em>과 <em>劉裕</em>가 <em>문벌의 정상에서 권력을 잡은 자</em>가 아니라 <em>상대적으로 한문에서 무력으로 일어선 자</em>라는 점이 위진 정사를 이해하는 한 단서다. 사대부 문벌의 정통 권력 바깥에서 무력으로 권력을 거머쥔 자들이, 정통 사대부와 어떻게 경쟁하고 어떻게 좌절하고 어떻게 결국 자기를 정통화시키는가 — 이것이 환온의 찬위 시도와 유유의 동진 멸망이 보여 주는 흐름이다.\n\n東晉이 망하고 송(劉宋)이 들어선 뒤로도 九品官人法은 계속 작동했다. 그러나 그것이 본격적으로 무너지기 시작한 것은 隋·唐의 <em>과거제도</em>가 도입되면서다. 隋 文帝가 587년 선거(選擧)의 자리에서 과거의 첫 시험을 베푼 일이 그 시초이며, 그 후 唐代에 가서 과거제가 본격화하면서 九品官人法은 점차 형해화되었다. 그러므로 이 제도는 약 380년간 동아시아 사회의 인재 등용을 지배한, 위진남북조의 핵심 사회 제도다.", "storyCount": 0}];

// Phase 4-B: objectByName 確張 — aliases를 最先 순회
// ════════════════════════════════════════════════════════════════════
const _objectByName_original = objectByName;
objectByName = function(name) {
  if (!name) return null;
  const n = name.trim();
  for (const o of OBJECTS) {
    if (o.aliases && o.aliases.includes(n)) return o.id;
  }
  return _objectByName_original(n);
};

// Phase 4-D: 검색 입력 이벤트 (document 위임)
// ════════════════════════════════════════════════════════════════════
document.addEventListener('keydown', function(e) {
  const t = e.target;
  if (!t || !t.classList || !t.classList.contains('liumen-search-input')) return;
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const q = (t.value || "").trim();
  if (!q) return;
  const objid = objectByName(q);
  if (objid) {
    jumpToObject(objid);
  } else {
    t.classList.add('miss');
    setTimeout(() => t.classList.remove('miss'), 700);
  }
});

// Phase 5-D: 진단 도구 — window.glassReport()
// ════════════════════════════════════════════════════════════════════
window.glassReport = function() {
  const r = {
    totalObjects: OBJECTS.length,
    byType: {},
    duplicateIds: [],
    duplicateHan: [],
    aliasConflicts: [],
    missingSub: [],
    missingPersonTitle: [],
    missingAliases: [],
  };
  const seenIds = new Set();
  const seenHan = new Map();
  const aliasMap = new Map();
  for (const o of OBJECTS) {
    r.byType[o.type] = (r.byType[o.type] || 0) + 1;
    if (seenIds.has(o.id)) r.duplicateIds.push(o.id);
    seenIds.add(o.id);
    if (seenHan.has(o.han)) {
      r.duplicateHan.push(`${o.han} (${seenHan.get(o.han)} ↔ ${o.id})`);
    } else {
      seenHan.set(o.han, o.id);
    }
    if (!o.sub) r.missingSub.push(o.id);
    if (o.type === "person" && !o.title) r.missingPersonTitle.push(o.id);
    if (!o.aliases || o.aliases.length === 0) r.missingAliases.push(o.id);
    for (const a of (o.aliases || [])) {
      if (aliasMap.has(a) && aliasMap.get(a) !== o.id) {
        r.aliasConflicts.push(`"${a}" → ${aliasMap.get(a)} ↔ ${o.id}`);
      } else {
        aliasMap.set(a, o.id);
      }
    }
  }
  console.group("%c[世說 自販機 정합성 진단]", "color:#a52; font-weight:bold");
  console.log("총 항목:", r.totalObjects);
  console.table(r.byType);
  if (r.duplicateIds.length)        console.warn("중복 id:", r.duplicateIds);
  if (r.duplicateHan.length)        console.warn("중복 han:", r.duplicateHan);
  if (r.aliasConflicts.length)      console.warn("alias 충돌:", r.aliasConflicts);
  if (r.missingSub.length)          console.info("sub 누락:", r.missingSub);
  if (r.missingPersonTitle.length)  console.info("人物 title 누락:", r.missingPersonTitle);
  if (r.missingAliases.length)      console.info("aliases 없음:", r.missingAliases);
  if (!r.duplicateIds.length && !r.duplicateHan.length && !r.aliasConflicts.length) {
    console.log("%c✓ 중대 충돌 없음", "color:#272");
  }
  console.groupEnd();
  return r;
};
console.log("%c[改修 패치 適用 완료] glassReport() 호출로 정합성 진단 가능", "color:#666");

const CHAPTER_GUIDES={"德行": "이 책의 첫 편이며, 곧 編者의 입장을 보인다. <em>德</em>은 명사의 출발선이다. 후한 청류 사대부의 도덕적 기준 ― <em>진중거(陳仲擧)</em>가 자리가 따뜻해질 겨를도 없이 어진 이부터 찾은 자세, <em>황숙도</em>의 <em>천 길의 큰 호수</em> 같은 도량 ― 가 위진 명사로 옮아가는 결을 보인다. <em>왕도</em>의 종묘 우선의 충절, <em>사안</em>의 진중함 또한 여기서 빛난다. 序說 3章·9章·12章을 곁들여 읽으면 후한에서 동진까지 한 흐름이 보인다. 〈언어〉편이 <em>말</em>의 자리라면, 〈덕행〉편은 <em>몸</em>의 자리다.", "言語": "편 수가 가장 큰 자리 중 하나(108편). <em>한 마디로 사람의 기량을 드러낸다</em>는 후한 <em>月旦評</em>의 풍속이 위진에 그대로 살아 있다. <em>사안</em>·<em>왕희지</em>·<em>간문제</em>·<em>지도림</em>·<em>은호</em>의 한 마디가 한 자리에서 빛난다. <em>신정(新亭)</em>의 일화, <em>왕도</em>의 <em>함께 힘을 다해 왕실을 도울 일</em>이 곧 여기에 있다. 序說 3章 月旦評의 풍속이 어떻게 이 편으로 흘렀는지 짚으며 읽으면, 한 마디의 무게가 한결 깊어진다.", "政事": "명사의 정치적 자리에서의 처신. 정치 자체가 아니라 <em>정치하는 명사의 자세</em>가 초점이다. <em>왕도</em>가 강좌 정권을 정략으로 다잡은 자리, <em>사안</em>이 환온의 위협 속에서도 흔들리지 않은 자리, <em>은호</em>의 청담과 실패가 모두 여기에 있다. 序說 9章·11章·12章의 정치적 맥락을 함께 보면 한 일화의 정사적 무게가 자리잡힌다.", "文學": "<em>學</em>과 <em>藝</em>의 자리. <em>현학(玄學)</em>의 청담 논변, 서법·시문·『장자』 주의 논쟁이 풍부하다. <em>하안</em>·<em>왕필</em>의 정시 명사가 출발이고, <em>은호</em>·<em>지도림</em>의 『장자』 〈소요유〉 새 해석이 절정이며, <em>손작</em>·<em>허순</em>의 玄言詩가 후반이다. 序說 5章 현학의 발생과 11章 격의불교의 자리를 함께 보면 이 편의 한 줄 한 줄이 사상사의 한 점으로 잡힌다.", "方正": "곧음과 절개의 자리. 굴하지 않는 자세. <em>주의(周顗)</em>가 왕돈에게 <em>내가 비록 죽더라도 너희를 위해 무릎 꿇지 않는다</em> 한 일, <em>왕탄지</em>가 환온의 칼잡이 앞에서도 의연했던 일, <em>사안</em>이 풍랑 속에 <em>그럼 돌아가지</em> 한 일 ― 모두 이 편의 결이다. <em>명교</em>와 <em>자연</em>의 갈림길에서 명교 쪽의 한 정수를 보인다. 序說 9章·12章을 곁들여 읽으면 시대의 무게가 따른다.", "雅量": "큰 도량과 평정심 ― 위진 명사 문화의 한 정점. <em>사안</em>이 비수전 첩보를 받고도 바둑을 계속 둔 일, 풍랑 속에 <em>그럼 돌아가지</em> 한 일, 환온의 칼잡이 앞에서 노래를 청한 일이 모두 여기에 모였다. <em>기쁨도 안에서 통어한다</em>의 미학. <em>왕융</em>·<em>혜강</em>의 풍채 또한 곁든다. 序說 12章의 사안 시대를 곁들여 읽으면 그가 <em>왜 한 시대의 한낮인가</em>가 잡힌다.", "識鑒": "사람과 일을 알아보는 안목. <em>산도</em>가 인재를 천거함이 정밀해 <em>산공계사</em>라 일컬어진 자리, <em>왕도</em>가 신진 사대부의 기량을 한 눈에 짚은 자리 ― 모두 여기에 있다. <em>식감</em>은 <em>상예</em>·<em>품조</em>와 짝을 이루는 인물 보는 세 자리 가운데 하나. 序說 6章 죽림과 9章 왕도의 정략을 곁들여 읽으면 <em>사람을 보는 일이 곧 정사를 보는 일</em>임이 잡힌다.", "賞譽": "인물에 대한 칭송. <em>옥인</em>, <em>외로운 소나무</em>, <em>봄날 강가의 버들</em> ― 위진 명사 평의 결정체. <em>왕공</em>의 학(鶴) 깃옷, <em>위개</em>의 옥인 같은 풍채, <em>사안</em>의 <em>동산 송백</em> 평이 모두 여기에 있다. 후한 <em>月旦評</em>이 위진에 살아 남은 자리. 序說 3章을 곁들이며 보면 청류 사대부의 풍속이 위진 명사 문화에 어떻게 흘렀는지 짚인다.", "品藻": "인물의 우열 비교 ― <em>두 사람 중 누가 위인가</em>의 평. 36편 중 인물 평의 가장 핵심 자리. <em>환온</em>과 <em>은호</em>의 우열, <em>왕희지</em>와 <em>왕헌지</em>의 부자 사이, <em>사안</em>과 <em>왕도</em>의 시대 사이 ― 모두 여기서 가려진다. 한 마디 평이 가문의 위계까지 좌우하던 위진 사회의 풍속이 농축된 편. 序說 3章 月旦評의 풍속과 함께 읽으면 깊다.", "規箴": "권고와 충고. 명사가 명사에게 한 마디를 일러 주는 자리. <em>왕도</em>가 <em>주의</em>의 충성을 뒤늦게 알고 통곡한 일, <em>환이</em>가 효무제 앞에서 거문고를 타며 <em>충정</em>을 일깨운 일이 모두 이 편의 결이다. 정사의 곡진한 권유. <em>간언(諫言)</em>의 한 결.", "捷悟": "빠른 깨달음. 한순간에 사물의 결을 짚어 내는 명민함. <em>조조</em>와 <em>양수</em>의 <em>계륵(鷄肋)</em> 일화, <em>왕탄지</em>의 어린 시절 일화가 여기 있다. <em>현학</em>의 <em>명리(名理)</em> 가르기가 일상의 자리에서 펼쳐진 모습.", "夙惠": "어린아이의 영민. <em>한강백</em>이 한겨울에 <em>다리는 짧고 머리는 뜨겁다</em>고 어머니를 위로한 일, <em>왕필</em>이 어려서 노장을 논한 일, <em>공융</em>의 어린 시절 일화가 여기 있다. 위진 사회의 <em>어린 명사</em>에 대한 기대와 사랑.", "豪爽": "호방함과 시원함. <em>환온</em>의 거리낌 없는 행동, <em>왕돈</em>이 술 마시고 唾壺를 두드리며 노래해 唾壺가 깨진 일, <em>환이</em>의 피리 ― 모두 이 결. 위진 명사 가운데 <em>무인적</em> 결을 가진 이들의 자리. 序說 10章 환온 시대를 곁들여 읽으면 그 호방함의 정치적 무게가 잡힌다.", "容止": "풍채와 용모. <em>하안</em>의 흰 얼굴(<em>분을 발랐는가</em> 의심받음), <em>위개</em>의 옥인, <em>왕희지</em>의 <em>동상에서 배 드러내고 누움</em>, <em>사안</em>의 동산 송백 같은 풍모 ― 모두 여기에 있다. 序說의 <em>五石散</em>(외층 物門)과 함께 읽으면 그 흰 얼굴의 신체적 배경이 잡힌다.", "自新": "잘못을 깨닫고 새로워짐. 짧은 편이지만 <em>명사도 잘못한다, 그리고 새로워질 수 있다</em>는 인식을 보인다. 〈우회〉편의 깊은 후회와 짝.", "企羡": "우러러보고 부러워함. 짧은 편. 명사가 명사를 <em>부러워하는</em> 자리. 〈상예〉편과 짝을 이루되 좀 더 사사로운 결.", "傷逝": "죽음과 애도. <em>눈물</em>과 <em>그리움</em>이 모인 자리 ― 위진 명사 문화의 한 짙은 색조. <em>왕희지</em>가 〈난정서〉에 쓴 <em>그 사이 죽음이 다가오리니 어찌 통탄하지 않겠는가</em>의 무상감, <em>사안</em>이 죽은 사람을 그리워한 일, <em>환이</em>가 <em>사안</em>의 영전에서 <em>대장부의 친구가 갔다</em> 한 일이 모두 여기에 있다. 풍류와 죽음이 함께 가는 시대의 정서.", "棲逸": "은거. <em>사안</em>이 회계 동산에 사십 가까이 은거한 자리, 산림에 숨은 이들의 일화. 序說 12章 사안과 외층 <em>동산</em> 카드를 곁들여 읽으면 <em>은거가 곧 출사의 다른 얼굴</em>이라는 위진의 자세가 잡힌다.", "賢媛": "어진 부인들. <em>사도온(謝道蘊)</em>의 <em>솜 같은 눈</em>의 시구, <em>왕연</em>의 아내가 자는 그를 동전으로 둘러싼 일, <em>위개</em>의 어머니가 아들의 죽음을 안 후 <em>내가 안다</em>고 한 한 마디. 위진 사회의 명사 부인들 또한 명사임을 보인다. 〈언어〉편과 짝을 이루는 <em>여성의 말의 무게</em>.", "術解": "술수와 풀이. 점복·의술·음악·풍수 등의 실용지(實用知). <em>순욱</em>의 향내 일화, <em>환이</em>의 음악, <em>지도림</em>의 학 일화. 위진 명사가 단지 청담만 한 것이 아니라 <em>기예와 풀이</em>에도 관통한다는 자리.", "巧蓺": "정교한 기예. <em>서법</em>과 <em>그림</em>과 <em>바둑</em>. <em>왕희지</em>의 서법, <em>고개지</em>의 인물화, <em>위부인(衛夫人)</em>의 서법 일화. 序說 11章 蘭亭과 12章 비수의 <em>바둑</em> 일화 또한 이 편의 결. 외층 <em>蘭亭序</em>·<em>圍棋</em> 카드와 함께 보면 깊다.", "寵禮": "황제의 사랑과 예우. 짧은 편. <em>왕희지</em>가 거위를 도사에게 받기 위해 『도덕경』을 써 준 일, 황제가 명사를 부른 자리의 일화들.", "任誕": "분방함 ― <em>명교(名敎)</em>에 맞선 <em>자연</em>의 한 갈래 표현. <em>죽림칠현</em>의 일화가 가장 많이 모인 자리. <em>유령</em>의 알몸과 <em>천지가 내 옷</em>, <em>완적</em>의 모친 상중 술과 백안, <em>왕희지</em>의 <em>동상</em>, <em>환이</em>의 피리. 序說 6章 죽림과 외층 <em>竹林七賢</em>·<em>風流와 任誕</em> 카드를 곁들이며 읽으면 그 분방함의 사상적 뿌리가 잡힌다.", "簡傲": "거만함. 사람을 가볍게 보는 자세. <em>혜강</em>이 <em>종회</em>를 거들떠보지 않은 일, <em>환현</em>의 거만, <em>손작</em>의 자부심. 그러나 단순한 거만이 아니라 <em>명사 됨</em>에 대한 자긍의 한 표현 ― 그래서 비난과 함께 약간의 부러움도 담겨 있다.", "排調": "농담과 익살 ― 명사들의 <em>우스개</em>의 정수. <em>환이</em>의 농, <em>왕도</em>의 농, <em>사현</em>의 <em>솜 같은 눈</em>에 대한 <em>왕희지</em>의 농담. 위진 명사의 한 자리가 진지함이라면, 또 한 자리는 이 가벼움이다. 인격의 양면을 함께 본다.", "輕詆": "가벼이 헐뜯음. 가벼운 비난과 빈정거림. 〈품조〉의 정색한 평과 달리 <em>가볍게 던지는 한 마디</em>. 그러나 그 한 마디가 인물의 한 결을 보이기에 이 자리에 모았다.", "假譎": "거짓과 속임. <em>조조</em>의 다면적 모습이 가장 짙게 그려진 편. <em>분을 발랐는가</em> 시험, 흉노 사신을 접견할 때 <em>최염</em>을 세운 일, <em>계륵</em>과 <em>양수</em>의 죽음. <em>기지</em>와 <em>권모</em>가 분리되지 않는 자리.", "黜免": "좌천과 파면. <em>은호</em>의 <em>咄咄怪事</em>가 가장 유명한 일화. <em>왕연</em>이 영가의 난 중 죽은 일, <em>사만</em>의 폐서인. 권력의 자리에서 떨어진 명사가 어떻게 자기를 추스리는가의 결.", "儉嗇": "검소와 인색. 죽림칠현의 <em>왕융</em>이 좋은 자두를 팔 때 씨에 송곳으로 구멍을 뚫었다는 일화가 여기에 있다. 죽림에서 출사로 흘러간 한 명사의 그늘. <em>청빈</em>과 <em>인색</em>의 미세한 차이.", "汰侈": "사치. <em>석숭</em>과 <em>왕개</em>의 부 자랑이 정수. 산호수, 자색 비단 장막, 황궁의 진열을 흉내 낸 정원. 외층 <em>산호수</em>·<em>鐵如意</em> 카드와 함께 보면 그 풍속의 물적 자리가 잡힌다. 序說 7章 서진의 사치를 곁들여 읽으면 깊다.", "忿狷": "분노와 노여움. 명사들도 화를 낸다. 그 화의 <em>결</em>을 본다. <em>왕남(王藍)</em>의 분노, <em>환온</em>의 화. 〈아량〉편의 평정과 짝을 이루는 <em>명사도 사람</em>이라는 자리.", "讒險": "참소와 험담. <em>종회</em>가 <em>혜강</em>을 사마소에게 참소해 죽인 일이 가장 큰 일화. 권력에 가까운 명사가 다른 명사를 모함하는 자리. 序說 6章을 곁들이며 보면 그 죽음의 무게가 깊다.", "尤悔": "깊은 후회. <em>왕도</em>가 <em>주의</em>의 충성을 뒤늦게 알고 통곡한 <em>내가 백인을 죽인 것은 아니나, 백인은 나로 인해 죽었다</em>가 정수. 〈자신〉편이 <em>고치는 새로워짐</em>이라면 이 편은 <em>이미 늦었으나 아프다</em>의 자리.", "紕漏": "실수와 흠. 명사도 잘못한다. 사소한 흠을 모은 자리이나, 도리어 그 흠이 인물을 다정하게 만든다. <em>사안</em>의 친구 일화, <em>왕연</em>의 자기 부정 등.", "惑溺": "빠지고 휩쓸림. 사랑과 미혹의 일화. <em>순찬(荀粲)</em>이 아내가 죽은 뒤 슬픔에 빠져 곧 따라 죽은 일, <em>환충</em>이 부인에게 깊이 빠진 일. 명사의 사사로운 정의 결을 보인다. 〈상서〉편의 죽음과 짝.", "仇隟": "원한과 다툼. 이 책의 마지막 편. <em>덕</em>에서 시작해 <em>원한</em>에서 닫는 36편의 결. <em>유의경</em>이 인물의 결을 <em>최고선부터 최악까지</em> 골고루 풀어 보인 그 분류 의도가 마지막에서 드러난다. 序說 14章을 다시 펴 보면 첫 편과 끝 편이 함께 비친다."};

const NUM_HAN=["","一","二","三","四","五","六","七","八","九","十"];
function hanNum(n){
  if(n<=10) return NUM_HAN[n];
  if(n<20) return "十"+(n%10?NUM_HAN[n%10]:"");
  const t=Math.floor(n/10),o=n%10;
  return NUM_HAN[t]+"十"+(o?NUM_HAN[o]:"");
}
function chKo(c){return CH_KO[c]||"";}
function chKoShort(c){return (CH_KO[c]||"").split(" — ")[0];}
function sample(arr,k){
  const a=arr.slice(),out=[];
  for(let i=0;i<k&&a.length;i++){const j=Math.floor(Math.random()*a.length);out.push(a[j]);a.splice(j,1);}
  return out;
}
const BY_CHAPTER=(()=>{const m={};STORIES.forEach((s,i)=>{(m[s[0]]=m[s[0]]||[]).push(i);});return m;})();
function pickDifferent(){
  const chs=sample(CHAPTER_ORDER.filter(c=>BY_CHAPTER[c]&&BY_CHAPTER[c].length),3);
  return chs.map(c=>sample(BY_CHAPTER[c],1)[0]);
}
function pickSimilar(){
  const elig=CHAPTER_ORDER.filter(c=>(BY_CHAPTER[c]?BY_CHAPTER[c].length:0)>=3);
  const c=sample(elig,1)[0];
  return sample(BY_CHAPTER[c],3);
}

function searchTopic(){
  const inp=document.getElementById("topicInput");
  const raw=inp?inp.value:"";
  const t=normalizeTopic(raw);
  const msg=document.getElementById("topicMsg");
  if(t){ if(msg) msg.textContent=""; drawFromTopic(t); return; }
  const han=(typeof normalizePerson==="function")?normalizePerson(raw):null;
  if(han){ if(msg) msg.textContent=""; view="person"; drawFromPerson(han); return; }
  if(msg) msg.textContent="‘"+raw+"’에 해당하는 주제를 찾지 못했소. 비슷한 말로 다시 시도해 보시오.";

function normalizePerson(w){
  w=(w||'').trim();
  if(!w) return null;
  if(PEOPLE_KO[w]) return w;
  if(PEOPLE_SYN[w]) return PEOPLE_SYN[w];
  for(const k in PEOPLE_SYN){ if(w.indexOf(k)>=0) return PEOPLE_SYN[k]; }
  for(const p of PEOPLE_LIST){ if(w.indexOf(p)>=0) return p; }
  return null;
}

function turnIntoParas(text){
  if(!text) return "";
  return text.split(/\n\n+/).map(p=>`<p>${p.trim()}</p>`).join("");
}
function objectByName(name){
  if(!name) return null;
  name=name.trim();
  for(const o of OBJECTS){ if(o.han===name) return o.id; }
  for(const han of Object.keys(PEOPLE_KO)){ if(PEOPLE_KO[han]===name) return "person."+han; }
  if(typeof PEOPLE_SYN!=="undefined" && PEOPLE_SYN[name]){
    const han=PEOPLE_SYN[name];
    for(const o of OBJECTS){ if(o.type==="person" && o.han===han) return o.id; }
  }
  for(const o of OBJECTS){
    if(!o.sub) continue;
    const m=o.sub.match(/^([^(—\-]+?)\s*(?:[(—\-]|$)/);
    if(m && m[1].trim()===name) return o.id;
  }
  return null;
}
function linkifyEm(html){
  if(!html) return "";
  return html.replace(/<em>([^<]+)<\/em>/g,(full,content)=>{
    let objid=objectByName(content);
    if(objid) return `<a class="ref" data-objid="${esc(objid)}">${content}</a>`;
    const paren=content.match(/^([^()]+)\(([^()]+)\)/);
    if(paren){
      objid=objectByName(paren[2].trim()) || objectByName(paren[1].trim());
      if(objid) return `<a class="ref" data-objid="${esc(objid)}">${content}</a>`;
    }
    return full;
  });
}

/* ─── PHASE6 적용: sub 필드 재구성 + ko 보정 ─── */
(function applyPhase6Names(){
  const buildSub = (cfg) => {
    const [ko, label, jaHan, jaKo, dates, aliasHan, aliasKo] = cfg;
    const parts = [ko];
    if (label && jaHan) {
      // 한자와 한글이 같은 경우(예: 사마도자) 한글 생략
      const jaPart = (jaKo && jaKo !== ko) ? `${jaHan}(${jaKo})` : jaHan;
      parts.push(`${label} ${jaPart}`);
    }
    if (dates) parts.push(dates);
    if (aliasHan) {
      const aliasPart = aliasKo ? `${aliasHan}(${aliasKo})` : aliasHan;
      parts.push(aliasPart);
    }
    return parts.join(" · ");
  };

  let updated = 0;
  OBJECTS.forEach(obj => {
    if (obj.type !== "person") return;
    const cfg = PHASE6_PERSON_NAMES[obj.id];
    if (!cfg) return;
    const newSub = buildSub(cfg);
    obj.sub = newSub;
    // ko 필드가 비어 있으면 한글 이름으로 채움
    if (!obj.ko || obj.ko === "") {
      obj.ko = cfg[0];
    }
    updated++;
  });
  console.log(`[Phase 6] ${updated}명의 인물 식별자(sub) 표준화 완료`);
})();
