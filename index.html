<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世說新語</title>
<style>

:root{
  --paper:#f4ecd8;
  --paper-2:#efe5cc;
  --ink:#26211a;
  --ink-soft:#5a5044;
  --seal:#9e2b25;
  --line:#cdbf9e;
  --serif:'Noto Serif KR','Apple SD Gothic Neo','Malgun Gothic','Noto Serif TC',serif;
  --tc:'Noto Serif TC','Noto Serif KR','Apple SD Gothic Neo','Malgun Gothic',serif;
}
*{box-sizing:border-box;}
.wrap{
  font-family:var(--serif);
  color:var(--ink);
  background:
    radial-gradient(circle at 20% 10%, rgba(255,255,255,.35), transparent 40%),
    repeating-linear-gradient(0deg, transparent, transparent 26px, rgba(120,100,60,.04) 27px),
    var(--paper);
  min-height:100vh;
  padding:36px 22px 56px;
  max-width:860px;
  margin:0 auto;
}
.masthead{
  display:flex; align-items:center; gap:16px;
  border-bottom:3px double var(--ink);
  padding-bottom:18px; margin-bottom:8px;
}
.title-block h1{
  font-family:var(--tc);
  font-size:30px; font-weight:700; margin:0; letter-spacing:.06em;
}
.sub{ margin:4px 0 0; font-size:13px; color:var(--ink-soft); letter-spacing:.02em;}
.controls{ margin:24px 0 8px; }
.random-sub{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; margin:14px 0 4px; max-width:640px; }
.random-sub .draw{ width:100%; padding:14px 12px; font-size:15.5px; letter-spacing:.12em; }
@media (min-width:900px){ .random-sub{ grid-template-columns:repeat(4,minmax(0,1fr)); max-width:none; } }
.modes{ display:inline-flex; border:1.5px solid var(--ink); border-radius:2px; overflow:hidden; }
.mode-btn{
  font-family:var(--serif); font-size:14px; padding:9px 18px;
  background:transparent; border:none; cursor:pointer; color:var(--ink-soft);
  transition:.18s; letter-spacing:.03em;
}
.mode-btn+.mode-btn{ border-left:1.5px solid var(--ink); }
.mode-btn.on{ background:var(--ink); color:var(--paper); }
.mode-hint{ font-size:12.5px; color:var(--ink-soft); margin:12px 0 16px; font-style:italic;}
.draw{
  font-family:var(--tc); font-size:17px; font-weight:700;
  padding:12px 34px; cursor:pointer; letter-spacing:.16em;
  color:var(--paper); background:var(--seal);
  border:none; border-radius:2px;
  box-shadow:2px 2px 0 rgba(40,30,20,.55);
  transition:.12s;
}
.draw:hover{ transform:translate(-1px,-1px); box-shadow:3px 3px 0 rgba(40,30,20,.55); }
.draw:active{ transform:translate(1px,1px); box-shadow:1px 1px 0 rgba(40,30,20,.55); }
.draw.on{ background:#5a1812; box-shadow:inset 2px 2px 0 rgba(0,0,0,.35), 2px 2px 0 rgba(40,30,20,.55); }
.story-list{ display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:8px; margin:18px 0 6px; }
.story-item{ font-family:var(--serif); font-size:13px; padding:9px 11px; cursor:pointer; background:rgba(255,255,255,.42); border:1px solid var(--line); border-left:3px solid var(--seal); border-radius:2px; text-align:left; color:var(--ink); transition:.13s; line-height:1.5; word-break:keep-all; }
.story-item:hover{ background:#fff; border-left-color:#8a241f; transform:translateY(-1px); }
.story-item .si-ord{ font-family:var(--tc); font-size:12px; color:var(--seal); font-weight:700; letter-spacing:.06em; display:block; margin-bottom:3px; }
.story-item .si-prev{ font-family:var(--tc); color:var(--ink); font-size:13px; line-height:1.55; }
.list-back{ display:inline-block; background:transparent; border:1.5px solid var(--ink); padding:7px 14px; font-family:var(--serif); font-size:13px; color:var(--ink); cursor:pointer; border-radius:2px; letter-spacing:.02em; margin:0 0 4px; }
.list-back:hover{ background:rgba(0,0,0,.04); }
.list-tools{ display:flex; align-items:center; gap:14px; margin:14px 0 4px; flex-wrap:wrap; }
.list-rand{ padding:8px 16px !important; font-size:13.5px !important; letter-spacing:.04em; }
.list-count{ font-family:var(--tc); font-size:12.5px; color:var(--seal); letter-spacing:.05em; }
.theme-tag{
  margin:22px 0 4px; font-family:var(--tc); font-size:15px; letter-spacing:.08em;
  color:var(--seal); border-left:3px solid var(--seal); padding-left:10px;
}
.theme-ko{ font-family:var(--serif); font-size:13px; color:var(--ink-soft); letter-spacing:0; margin-left:6px; }

.index{ margin:30px 0 4px; border-top:1px solid var(--line); padding-top:20px; }
.index-head{ font-family:var(--tc); font-size:14.5px; letter-spacing:.08em; color:var(--ink); margin-bottom:14px; }
.index-hint{ font-family:var(--serif); font-size:12px; color:var(--ink-soft); letter-spacing:0; font-style:italic; }
.index-grid{
  display:grid; grid-template-columns:repeat(6,1fr); gap:7px;
}
.ix-item{
  display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:8px 4px 7px; cursor:pointer;
  background:rgba(255,255,255,.32);
  border:1px solid var(--line); border-radius:2px;
  transition:.13s; font-family:inherit;
}
.ix-item:hover{ background:#fff; border-color:var(--seal); transform:translateY(-1px); }
.ix-item.on{ background:var(--seal); border-color:var(--seal); }
.ix-han{ font-family:var(--tc); font-size:16px; font-weight:700; letter-spacing:.06em; color:var(--ink); }
.ix-ko{ font-size:10.5px; color:var(--ink-soft); letter-spacing:.02em; }
.ix-item.on .ix-han, .ix-item.on .ix-ko{ color:var(--paper); }
.empty{ margin-top:44px; text-align:center; color:var(--ink-soft); font-size:15px; line-height:1.9;}
.cards{ display:flex; flex-direction:column; gap:22px; margin-top:24px; }
.card{
  background:linear-gradient(180deg, var(--paper-2), var(--paper));
  border:1px solid var(--line);
  border-left:4px solid var(--seal);
  border-radius:2px;
  padding:22px 24px 24px;
  box-shadow:0 1px 0 rgba(255,255,255,.5) inset, 2px 3px 10px rgba(60,45,20,.10);
  animation:rise .5s ease both;
}
@keyframes rise{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;} }
.card-head{ display:flex; align-items:baseline; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
.chap{ font-family:var(--tc); font-size:20px; font-weight:700; letter-spacing:.1em; }
.chap-ko{ font-size:13px; color:var(--ink-soft); letter-spacing:.01em; }
.chap-ord{ font-family:var(--tc); font-size:12.5px; color:var(--ink-soft); margin-left:auto; }
.orig{
  font-family:var(--tc); font-size:18px; line-height:2.05; margin:0;
  text-align:justify; letter-spacing:.01em;
}
.divider{ display:flex; align-items:center; margin:18px 0 14px; }
.divider span{ flex:1; height:1px; background:repeating-linear-gradient(90deg,var(--line),var(--line) 4px,transparent 4px,transparent 8px); }
.trans{ font-size:15.5px; line-height:1.95; margin:0; color:var(--ink); text-align:justify; }
.muted{ font-size:14px; color:var(--ink-soft); margin:0; font-style:italic; }
.muted.err{ color:var(--seal); }
.foot{ margin-top:44px; padding-top:16px; border-top:1px solid var(--line);
  font-size:11.5px; color:var(--ink-soft); text-align:center; letter-spacing:.04em; }
@media(max-width:560px){
  .title-block h1{font-size:24px;}
  .orig{font-size:16.5px;}
  .index-grid{ grid-template-columns:repeat(4,1fr); }
  .ix-han{ font-size:15px; }
}

/* 바닐라 래퍼: 원본은 .wrap 에 패딩/배경. body 중앙정렬 */
html,body{margin:0;background:#e9ddc2;}

.topic-search{display:flex;gap:8px;margin:6px 0 12px;}
.topic-search input{flex:1;font-family:var(--serif);font-size:15px;padding:9px 12px;border:1.5px solid var(--line);border-radius:2px;background:rgba(255,255,255,.5);color:var(--ink);}
.topic-search input:focus{outline:none;border-color:var(--seal);}
.topic-search .draw{padding:9px 22px;font-size:15px;letter-spacing:.08em;}
.topic-msg{font-size:13px;color:var(--seal);margin:0 0 10px;min-height:0;}

.ix-item.jega{background:var(--seal);border-color:var(--seal);box-shadow:1px 1px 0 rgba(40,30,20,.4);}
.ix-item.jega .ix-han,.ix-item.jega .ix-ko{color:var(--paper);}
.ix-item.jega:hover{background:#8a241f;border-color:#8a241f;}
.ix-item.jega.on{background:#7a1f1a;}
.byline{margin:6px 0 0;font-family:var(--tc);font-size:12.5px;font-weight:700;letter-spacing:.06em;color:var(--seal);}

.navbar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:22px 0 18px;}
.nav-btn{font-family:var(--serif);font-size:12.5px;padding:11px 3px;cursor:pointer;background:transparent;border:1.5px solid var(--ink);border-radius:2px;color:var(--ink-soft);letter-spacing:.005em;transition:.15s;text-align:center;word-break:keep-all;line-height:1.3;}
.nav-btn:hover{background:rgba(0,0,0,.04);}
.nav-btn.on{background:var(--ink);color:var(--paper);}

.entry{border:1px solid var(--line);padding:44px 40px 40px;text-align:center;font-family:var(--serif);}
.entry-title{font-family:var(--tc);font-size:38px;font-weight:700;letter-spacing:.26em;text-indent:.26em;margin:0 0 16px;color:var(--ink);}

.eq-han{font-family:var(--tc);font-size:14px;line-height:2;color:var(--seal);margin:0;letter-spacing:.08em;font-weight:700;}
.eq-ko{font-size:14.5px;line-height:1.95;color:var(--ink);margin:0 auto 16px;max-width:460px;text-align:center;letter-spacing:.01em;}
.eq-src{font-family:var(--tc);font-size:12.5px;color:var(--ink-soft);margin:14px 0 0;letter-spacing:.05em;}
.entry-body{display:inline-block;text-align:left;border-left:2px solid var(--line);padding-left:22px;margin:0 0 30px;}
.entry-body p{font-family:var(--serif);font-size:14.5px;line-height:2.05;color:var(--ink);margin:0 0 16px;text-align:left;font-weight:500;}

.entry-rule{width:36px;height:2px;background:var(--seal);margin:0 auto 30px;}
.eb-call{text-align:center;color:var(--ink);font-family:var(--tc);font-size:15px;line-height:1.9;letter-spacing:.04em;margin:0 0 22px;}
.entry .draw{font-size:16px;padding:12px 50px;letter-spacing:.2em;}

.seal-btn{background:transparent;border:none;padding:0;cursor:pointer;border-radius:4px;transition:.15s;}
.seal-btn:hover{transform:translateY(-1px);box-shadow:0 0 0 2px var(--line);}
.seal-btn:active{transform:translateY(0);}
.byline-chapters{font-family:var(--tc);font-size:11px;line-height:1.7;letter-spacing:.12em;color:var(--ink-soft);margin:6px 0 0;word-break:keep-all;opacity:.78;}

.mencius-full{margin:46px auto 0;max-width:560px;padding-top:34px;border-top:1px solid var(--line);text-align:center;}
.mf-title{font-family:var(--tc);font-size:25px;font-weight:700;color:var(--seal);letter-spacing:.34em;margin:0 0 24px;text-indent:.34em;}
.mf-cols{display:flex;gap:26px;align-items:center;justify-content:center;}
.mf-han{font-family:var(--tc);font-size:13.5px;line-height:2.15;color:var(--seal);font-weight:700;letter-spacing:.1em;text-align:right;border-right:2px solid var(--line);padding-right:26px;}
.mf-ko{font-size:12.5px;line-height:2.15;color:var(--ink-soft);text-align:left;}
.mf-src{font-family:var(--tc);font-size:11.5px;color:var(--ink-soft);letter-spacing:.1em;margin:22px 0 0;}
.mencius-mini{margin:40px auto 0;text-align:center;}
.mm-seal{font-family:var(--tc);font-size:15px;font-weight:700;color:var(--seal);letter-spacing:.18em;}
.mm-ko{font-size:11.5px;color:var(--ink-soft);letter-spacing:.02em;}

.entry-case{max-width:600px;margin:0 auto;padding:18px;}
.entry-case-in{border:1px solid var(--seal);padding:5px;}
.entry-body p:last-child{margin-bottom:0;}
.eb-call{font-family:var(--serif);text-align:center;color:var(--ink-soft);font-size:14px;line-height:2;letter-spacing:.03em;margin:0 0 26px;}

.person-card{
  background:rgba(255,255,255,.42);
  border:1px solid var(--line);
  border-top:3px double var(--ink);
  border-radius:2px;
  padding:18px 22px 20px;
  margin:0 0 18px;
  animation:rise .5s ease both;
}
.person-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:2px;}
.person-han{font-family:var(--tc);font-size:22px;font-weight:700;letter-spacing:.08em;color:var(--ink);}
.person-ko{font-size:13.5px;color:var(--ink-soft);letter-spacing:.02em;}
.person-life{font-family:var(--tc);font-size:12px;color:var(--ink-soft);margin-left:auto;letter-spacing:.05em;}
.person-meta{font-family:var(--tc);font-size:12.5px;color:var(--seal);margin:2px 0 0;letter-spacing:.06em;font-weight:700;}
.person-bio{font-size:14.5px;line-height:1.95;margin:11px 0 0;color:var(--ink);text-align:justify;letter-spacing:.005em;}
@media(max-width:560px){
  .nav-btn{font-size:11.5px;padding:10px 3px;letter-spacing:0;}
  .navbar{grid-template-columns:repeat(4,1fr);gap:6px;}
  .person-han{font-size:19px;}
  .person-bio{font-size:13.5px;line-height:1.9;}
}

.preface{ font-family:var(--serif); color:var(--ink); max-width:720px; margin:0 auto; }
.preface-head{ text-align:center; margin:8px 0 22px; }
.preface-head h2{ font-family:var(--tc); font-size:22px; font-weight:700; letter-spacing:.15em; margin:0 0 6px; color:var(--ink); }
.preface-head .preface-sub{ font-size:13px; color:var(--ink-soft); font-style:italic; letter-spacing:.02em; }
.preface-toc{ background:rgba(255,255,255,.45); border:1px solid var(--line); border-radius:2px; padding:18px 22px 16px; margin:0 0 34px; }
.preface-toc h4{ font-family:var(--tc); font-size:13.5px; font-weight:700; letter-spacing:.18em; color:var(--ink); margin:0 0 14px; text-align:center; }
.preface-toc ol{ margin:0; padding:0; list-style:none; columns:2; column-gap:28px; font-size:13.5px; line-height:1.95; color:var(--ink-soft); }
.preface-toc ol li{ break-inside:avoid; padding:1px 0; }
.preface-toc a{ color:var(--ink-soft); text-decoration:none; transition:.15s; }
.preface-toc a:hover{ color:var(--seal); text-decoration:underline; }
.preface-chap{ margin:38px 0 0; animation:rise .5s ease both; }
.preface-chap h3{ font-family:var(--tc); font-size:18.5px; font-weight:700; letter-spacing:.05em; color:var(--ink); border-left:3px solid var(--seal); padding-left:13px; margin:0 0 18px; scroll-margin-top:18px; cursor:pointer; transition:.15s; }
.preface-chap h3:hover{ color:var(--seal); background:rgba(158,43,37,.05); }
.preface-chap h3:hover::after{ content:" ↑ 목차"; font-family:var(--serif); font-size:11.5px; font-weight:400; color:var(--ink-soft); letter-spacing:.04em; margin-left:8px; }
.preface-chap p{ font-size:15px; line-height:1.95; margin:0 0 13px; color:var(--ink); text-align:justify; letter-spacing:.005em; }
.preface-chap em{ font-style:normal; font-weight:700; color:var(--seal); letter-spacing:.02em; }
.preface-divider{ text-align:center; margin:46px 0 0; color:var(--ink-soft); font-family:var(--tc); font-size:13px; letter-spacing:.3em; }
.preface-divider::before, .preface-divider::after{ content:"❖"; margin:0 14px; opacity:.5; }
.preface-appendix{ margin:36px 0 0; }
.preface-appendix-head{ text-align:center; margin:0 0 28px; }
.preface-appendix-head h3{ font-family:var(--tc); font-size:18px; font-weight:700; letter-spacing:.12em; color:var(--ink); margin:0 0 5px; }
.preface-appendix-head .preface-sub{ font-size:12.5px; color:var(--ink-soft); font-style:italic; letter-spacing:.02em; }
.app-group{ margin:0 0 30px; }
.app-group-head{ display:flex; align-items:baseline; gap:10px; margin:0 0 14px; padding-bottom:6px; border-bottom:1px dashed var(--line); }
.app-group-key{ font-family:var(--tc); font-size:18px; font-weight:700; letter-spacing:.1em; color:var(--seal); }
.app-group-label{ font-size:13px; color:var(--ink-soft); letter-spacing:.04em; }
.app-cards{ display:block; }
.app-card{ background:none; border:0; border-radius:0; padding:0; margin:0 0 14px; }
.app-card-head{ display:inline; margin:0; }
.app-card-name{ font-family:var(--tc); font-size:15.5px; font-weight:700; letter-spacing:.06em; color:var(--seal); margin-right:6px; }
.app-card-sub{ font-size:12px; color:var(--ink-soft); letter-spacing:.02em; margin-right:8px; }
.app-card-body{ display:inline; font-size:14px; line-height:1.95; margin:0; color:var(--ink); text-align:justify; }
.app-card-body::before{ content:"— "; color:var(--ink-soft); }
.app-card-body em{ font-style:normal; font-weight:700; color:var(--seal); }
@media(max-width:560px){
  .preface{ font-size:14.5px; }
  .preface-toc ol{ columns:1; }
  .preface-chap h3{ font-size:17px; }
  .preface-chap p{ font-size:14.5px; line-height:1.9; }
  .app-card-name{ font-size:14.5px; }
}

.liumen{ max-width:840px; margin:0 auto; }
.liumen-head{ text-align:center; margin:0 0 24px; }
.liumen-head h2{ font-family:var(--tc); font-size:22px; font-weight:700; letter-spacing:.18em; margin:0 0 6px; color:var(--ink); }
.liumen-head .liumen-sub{ font-size:13px; color:var(--ink-soft); font-style:italic; letter-spacing:.02em; }
.liumen-tabs{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; margin:0 0 26px; }
.liumen-tab{ font-family:var(--tc); font-size:17px; font-weight:700; letter-spacing:.08em; padding:13px 6px 11px; border:1.5px solid var(--ink); border-radius:2px; background:transparent; cursor:pointer; transition:.15s; color:var(--ink-soft); text-align:center; line-height:1.2; }
.liumen-tab:hover{ background:rgba(0,0,0,.04); }
.liumen-tab.on{ background:var(--ink); color:var(--paper); }
.liumen-tab-sub{ display:block; font-family:var(--serif); font-size:11px; font-weight:normal; letter-spacing:.02em; margin-top:3px; opacity:.7; }
.liumen-cards{ display:flex; flex-direction:column; gap:14px; }
.liumen-card{ background:rgba(255,255,255,.42); border:1px solid var(--line); border-left:3px solid var(--seal); border-radius:2px; padding:15px 17px 16px; animation:rise .35s ease both; }
.liumen-card-head{ display:flex; align-items:baseline; gap:10px; margin:0 0 7px; flex-wrap:wrap; }
.liumen-card-name{ font-family:var(--tc); font-size:18px; font-weight:700; letter-spacing:.06em; color:var(--ink); }
.liumen-card-sub{ font-size:12.5px; color:var(--ink-soft); letter-spacing:.02em; }
.liumen-card-title{ font-family:var(--tc); font-size:12.5px; color:var(--seal); margin-left:auto; font-weight:700; letter-spacing:.05em; }
.liumen-card-short{ font-size:14px; line-height:1.85; margin:0; color:var(--ink); text-align:justify; letter-spacing:.005em; }
.liumen-card-short em{ font-style:normal; font-weight:700; color:var(--seal); }
.liumen-card-meta{ font-size:11.5px; color:var(--ink-soft); margin:8px 0 0; font-style:italic; letter-spacing:.02em; }
.liumen-expand{ display:inline-block; background:transparent; border:none; color:var(--seal); font-family:var(--serif); font-size:12.5px; cursor:pointer; padding:9px 0 0; letter-spacing:.05em; font-weight:700; }
.liumen-expand:hover{ text-decoration:underline; }
.liumen-card-long{ display:none; font-size:13.5px; line-height:1.95; margin:12px 0 0; padding:14px 0 0; border-top:1px dashed var(--line); color:var(--ink); text-align:justify; letter-spacing:.005em; }
.liumen-card-long em{ font-style:normal; font-weight:700; color:var(--seal); }
.liumen-card-long p{ margin:0 0 11px; }
.liumen-card-long p:last-child{ margin-bottom:0; }
.liumen-card.on .liumen-card-long{ display:block; animation:rise .35s ease both; }
.liumen-card.flash{ animation: flash 1.8s ease; }
@keyframes flash{
  0%{ box-shadow:0 0 0 0 rgba(160,30,30,.5), inset 0 0 0 0 rgba(160,30,30,0); background:rgba(255,240,235,.7); }
  50%{ box-shadow:0 0 0 6px rgba(160,30,30,.15); }
  100%{ box-shadow:0 0 0 0 rgba(160,30,30,0); background:rgba(255,255,255,.42); }
}
a.ref{
  color:var(--seal);
  text-decoration:none;
  font-weight:700;
  border-bottom:1px dotted rgba(160,30,30,.45);
  cursor:pointer;
  transition:.15s;
  padding:0 1px;
}
a.ref:hover{ background:rgba(160,30,30,.08); border-bottom-color:var(--seal); }

.chap-guide{
  background:rgba(255,255,255,.42);
  border:1px solid var(--line);
  border-top:3px double var(--ink);
  border-radius:2px;
  padding:18px 22px 20px;
  margin:0 0 18px;
  animation:rise .5s ease both;
}
.chap-guide-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:2px;}
.chap-guide-han{font-family:var(--tc);font-size:22px;font-weight:700;letter-spacing:.08em;color:var(--ink);}

.scroll-view{ max-width:none; margin:0 -22px; }
.scroll-head{ text-align:center; margin:0 22px 18px; }
.scroll-head h2{ font-family:var(--tc); font-size:22px; font-weight:700; letter-spacing:.18em; margin:0 0 6px; color:var(--ink); }
.scroll-head .scroll-sub{ font-size:13px; color:var(--ink-soft); font-style:italic; }
.scroll-tip{ text-align:center; font-size:12px; color:var(--ink-soft); margin:0 22px 14px; letter-spacing:.02em; }
.scroll-wrap-v{ overflow-x:auto; overflow-y:visible; padding:10px 0 18px; background:rgba(255,255,255,.35); border-top:1px solid var(--line); border-bottom:1px solid var(--line); -webkit-overflow-scrolling:touch; }
.scroll-svg-v{ display:block; width:100%; max-width:1100px; min-width:1000px; height:auto; margin:0 auto; }
.scroll-svg-v text{ font-family:var(--tc); fill:var(--ink); user-select:none; }
.scroll-svg-v .axis-line{ stroke:var(--ink); stroke-width:.5; opacity:.3; }
.scroll-svg-v .axis-tick{ stroke:var(--ink); stroke-width:.7; opacity:.4; }
.scroll-svg-v .axis-label{ font-size:11px; fill:var(--ink-soft); }
.scroll-svg-v .col-header{ font-family:var(--tc); font-size:15px; font-weight:700; fill:var(--ink); letter-spacing:.18em; }
.scroll-svg-v .dynasty-band{ opacity:.9; }
.scroll-svg-v .dynasty-label{ font-weight:700; fill:#fff; letter-spacing:.05em; }
.scroll-svg-v .event-line{ stroke:var(--seal); stroke-width:.8; opacity:.35; }
.scroll-svg-v .event-leader{ stroke:var(--ink-soft); stroke-width:.5; stroke-dasharray:2,2; opacity:.55; }
.scroll-svg-v .event-dot{ fill:var(--seal); cursor:pointer; transition:.15s; }
.scroll-svg-v .event-dot:hover{ r:6; }
.scroll-svg-v .event-label{ font-size:13px; fill:var(--ink); cursor:pointer; font-weight:700; }
.scroll-svg-v .event-label:hover{ fill:var(--seal); }
.scroll-svg-v .event-year{ font-size:10.5px; fill:var(--ink-soft); }
/* 인물: 더 진하고 두꺼운 막대 + 더 큰 흰 글씨로 가독성 확보 */
.scroll-svg-v .person-bar{ fill:#4d3f2c; opacity:.92; cursor:pointer; transition:.18s; rx:2; }
.scroll-svg-v .person-bar:hover{ opacity:1; fill:var(--seal); }
.scroll-svg-v .person-label-v{ font-size:13.5px; fill:#fff; pointer-events:none; font-weight:700; letter-spacing:.02em; }
.scroll-svg-v .person-label-outside{ font-size:11.5px; fill:var(--ink); pointer-events:none; font-weight:700; }
.scroll-svg-v .person-ko-label{ font-size:9.5px; fill:var(--ink-soft); pointer-events:none; letter-spacing:.02em; }
/* 사상: 띠를 더 굵고 진하게, 큰 한자 + 한글 부제 */
.scroll-svg-v .thought-band{ opacity:.78; cursor:pointer; transition:.15s; }
.scroll-svg-v .thought-band:hover{ opacity:1; }
.scroll-svg-v .thought-label{ font-size:18px; font-weight:700; fill:#fff; cursor:pointer; letter-spacing:.03em; }
.scroll-svg-v .thought-ko{ font-size:10.5px; fill:#fff; opacity:.92; pointer-events:none; letter-spacing:.02em; }
.thought-legend{ display:flex; flex-wrap:wrap; justify-content:center; gap:6px 22px; margin:0 22px 14px; font-family:var(--serif); }
.thought-legend .tl-item{ display:inline-flex; align-items:baseline; gap:6px; padding:4px 10px; border:.5px solid var(--line); border-radius:14px; background:rgba(255,255,255,.5); font-size:12.5px; cursor:pointer; transition:.15s; }
.thought-legend .tl-item:hover{ background:rgba(255,255,255,.9); border-color:var(--ink-soft); }
.thought-legend .tl-swatch{ width:10px; height:10px; border-radius:2px; display:inline-block; align-self:center; }
.thought-legend .tl-han{ font-family:var(--tc); font-weight:700; color:var(--ink); letter-spacing:.04em; }
.thought-legend .tl-ko{ color:var(--ink); opacity:.78; }
.thought-legend .tl-period{ color:var(--ink-soft); font-size:11px; font-variant-numeric:tabular-nums; }
.scroll-toggle{ display:inline-block; background:transparent; border:1.5px solid var(--ink); padding:8px 16px; font-family:var(--serif); font-size:13px; color:var(--ink); cursor:pointer; transition:.15s; margin:0 22px 14px; border-radius:2px; letter-spacing:.02em; }
.scroll-toggle:hover{ background:rgba(0,0,0,.04); }
.preface-actions{ text-align:center; margin:6px 0 10px; }
/* 카테고리 안 3편 무작위 뽑기 / 목록 토글 버튼 */
.pick-three-btn{ display:inline-block; background:var(--seal); color:var(--paper); border:none; padding:9px 18px; font-family:var(--tc); font-size:14px; font-weight:700; letter-spacing:.12em; cursor:pointer; border-radius:2px; box-shadow:2px 2px 0 rgba(40,30,20,.45); transition:.12s; margin:6px 0 4px; }
.pick-three-btn:hover{ transform:translate(-1px,-1px); box-shadow:3px 3px 0 rgba(40,30,20,.45); }
.pick-three-btn:active{ transform:translate(1px,1px); box-shadow:1px 1px 0 rgba(40,30,20,.45); }
.pick-row{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin:14px 0 2px; }
.pick-row .pick-hint{ font-size:12.5px; color:var(--ink-soft); font-style:italic; }
.rand-back{ display:inline-block; background:transparent; border:1.5px solid var(--ink); padding:7px 14px; font-family:var(--serif); font-size:13px; color:var(--ink); cursor:pointer; border-radius:2px; letter-spacing:.02em; margin:0 0 12px; }
.rand-back:hover{ background:rgba(0,0,0,.04); }
@media(max-width:560px){
  .scroll-head h2{ font-size:19px; }
  .scroll-svg-v{ min-width:880px; }
  .scroll-view{ margin:0 -16px; }
  .scroll-svg-v .thought-label{ font-size:15px; }
  .scroll-svg-v .person-label-v{ font-size:12px; }
}
@media(max-width:560px){
  .liumen-tabs{ grid-template-columns:repeat(3,1fr); gap:5px; }
  .liumen-tab{ font-size:15px; padding:10px 4px 9px; }

  .liumen-card-name{ font-size:16px; }
  .liumen-card-short{ font-size:13.5px; line-height:1.8; }
  .liumen-card-long{ font-size:13px; line-height:1.85; }
}

/* ── 人物·事件 關係圖 ── */
.relmap-view{ margin:0; }
.relmap-view .scroll-head{ text-align:center; margin:0 0 12px; }
.relmap-view .scroll-head h2{ font-family:var(--tc); font-size:22px; font-weight:700; letter-spacing:.18em; margin:0 0 6px; color:var(--ink); }
.relmap-view .scroll-head .scroll-sub{ font-size:13px; color:var(--ink-soft); font-style:italic; }
.relmap-tip{ font-size:12.5px; color:var(--ink-soft); text-align:center; margin:0 0 18px; line-height:1.75; letter-spacing:.02em; }
.relmap-tip b{ color:var(--seal); }
.relmap-grid{ display:grid; grid-template-columns:minmax(220px,300px) 1fr; gap:22px; align-items:start; }
@media(max-width:720px){ .relmap-grid{ grid-template-columns:1fr; gap:16px; } }
.rm-h{ font-family:var(--tc); font-size:15px; letter-spacing:.12em; color:var(--ink); margin:0 0 12px; padding-bottom:7px; border-bottom:1px solid var(--line); font-weight:700; }
.rm-h-ko{ font-family:var(--serif); font-size:11.5px; color:var(--ink-soft); letter-spacing:.02em; font-weight:400; margin-left:8px; }

/* 左 ─ 事件 목록 */
.relmap-events{ position:sticky; top:14px; }
@media(max-width:720px){ .relmap-events{ position:static; } }
.rm-ev-list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:5px; }
.rm-ev{ display:grid; grid-template-columns:46px 1fr auto; align-items:center; gap:8px;
  padding:8px 10px; background:rgba(255,255,255,.42); border:1px solid var(--line);
  border-left:3px solid var(--line); border-radius:2px; cursor:pointer; transition:.14s; font-family:var(--serif); }
.rm-ev:hover{ background:#fff; border-left-color:var(--seal); transform:translateX(1px); }
.rm-ev-year{ font-family:var(--tc); font-size:12.5px; font-weight:700; color:var(--seal); letter-spacing:.04em; }
.rm-ev-name{ font-family:var(--tc); font-size:14px; color:var(--ink); letter-spacing:.04em; }
.rm-ev-cnt{ font-family:var(--serif); font-size:10.5px; color:var(--ink-soft); letter-spacing:.02em; }
.rm-ev.on{ background:var(--seal); border-color:var(--seal); border-left-color:#5a1812; box-shadow:1px 1px 0 rgba(40,30,20,.4); }
.rm-ev.on .rm-ev-year, .rm-ev.on .rm-ev-name, .rm-ev.on .rm-ev-cnt{ color:var(--paper); }
.relmap-view.rm-active .rm-ev:not(.on){ opacity:.42; }
.rm-clear{ margin-top:14px; font-family:var(--serif); font-size:12px; padding:6px 12px; background:transparent;
  border:1px solid var(--line); color:var(--ink-soft); border-radius:2px; cursor:pointer; letter-spacing:.04em; transition:.13s; }
.rm-clear:hover{ background:rgba(0,0,0,.04); color:var(--ink); border-color:var(--ink-soft); }

/* 右 ─ 클러스터 카드 */
.rm-clusters{ display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:12px; }
.rm-cluster{ background:rgba(255,255,255,.42); border:1px solid var(--line); border-top:3px solid var(--ink-soft);
  border-radius:2px; padding:12px 13px 13px; transition:.18s; }
.rm-cluster-head{ display:flex; align-items:baseline; gap:7px; margin-bottom:9px; padding-bottom:7px; border-bottom:1px dotted var(--line); flex-wrap:wrap; }
.rm-cluster-han{ font-family:var(--tc); font-size:15px; font-weight:700; letter-spacing:.06em; color:var(--ink); }
.rm-cluster-ko{ font-family:var(--serif); font-size:11px; color:var(--ink-soft); letter-spacing:.02em; }
.rm-cluster-people{ display:flex; flex-wrap:wrap; gap:5px; }
.rm-person{ font-family:var(--tc); font-size:13px; font-weight:700; padding:5px 10px;
  background:rgba(255,255,255,.7); border:1px solid var(--line); color:var(--ink); border-radius:2px;
  cursor:pointer; transition:.13s; letter-spacing:.04em; }
.rm-person:hover{ border-color:var(--ink-soft); background:#fff; }
.rm-cluster.has-hot{ border-top-color:var(--seal); background:rgba(255,250,240,.55); box-shadow:1px 1px 0 rgba(40,30,20,.18); }
.rm-person.hot{ background:var(--seal); color:var(--paper); border-color:var(--seal); box-shadow:1px 1px 0 rgba(40,30,20,.35); }
.rm-person.warm{ background:#f6e6cf; border-color:#d6b88a; color:var(--ink); }
.rm-person.on{ outline:2px solid #5a1812; outline-offset:1px; }
.relmap-view.rm-active .rm-person:not(.hot):not(.warm){ opacity:.32; }
.relmap-view.rm-active .rm-cluster:not(.has-hot){ opacity:.5; }

/* 범례 */
.rm-legend{ margin:22px 0 0; padding-top:14px; border-top:1px dotted var(--line); font-size:11.5px; color:var(--ink-soft); text-align:center; letter-spacing:.03em; line-height:1.9; }
.rm-lg{ display:inline-block; width:12px; height:12px; border-radius:2px; vertical-align:-2px; border:1px solid var(--line); margin-right:3px; }
.rm-lg-hot{ background:var(--seal); border-color:var(--seal); }
.rm-lg-warm{ background:#f6e6cf; border-color:#d6b88a; }
.rm-lg-dim{ background:rgba(255,255,255,.6); opacity:.45; }

<script>
const STORIES=[["德行", 1, "陳仲舉言，為士則行為世範，登車攬轡，有澄清天下之志。為豫章太守，至便問，徐孺子所在，欲先看之。主簿白：「羣情欲府君先入廨。」陳曰：「武王式商容之閭，席不暇煗。吾之禮賢，有何不可！」", "진중거(陳仲擧)는 말이 선비의 본보기가 되고 행실이 세상의 규범이 되었으니, 수레에 올라 고삐를 잡으면 천하를 깨끗이 다스리려는 뜻을 품었다. 예장(豫章)태수가 되어 부임하자마자 서유자(徐孺子)가 있는 곳을 물어 먼저 그를 찾아보고자 하였다. 주부(主簿)가 아뢰었다. \"여러 사람의 뜻은 부군(府君)께서 먼저 관사에 드시기를 바랍니다.\" 진중거가 말하였다. \"무왕(武王)은 상용(商容)의 마을에서 수레의 가로대에 몸을 굽혀 예를 표하느라 자리가 따뜻해질 겨를도 없었다. 내가 어진 이에게 예를 다하는 것이 무슨 안 될 일이 있겠는가!\"", ["겸손", "비평", "권력"]], ["德行", 2, "周子居常云：「吾時月不見黃叔度，則鄙吝之心已復生矣。」", "주자거(周子居)가 늘 말하였다. \"내가 한동안 황숙도(黃叔度)를 보지 못하면 비루하고 인색한 마음이 어느새 다시 생겨난다.\"", ["비평", "겸손", "우정"]], ["德行", 3, "郭林宗至汝南造袁奉高，車不停軌，鸞不輟軛。詣黃叔度，乃彌日信宿。人問其故，林宗曰：「叔度汪汪如萬頃之陂。澄之不清，擾之不濁，其器深廣，難測量也。」", "곽임종(郭林宗)이 여남(汝南)에 이르러 원봉고(袁奉高)를 찾아갔을 때는 수레가 바퀴 자국을 멈추지 않고 방울도 멍에에서 그치지 않았다. 그러나 황숙도(黃叔度)를 찾아가서는 온종일 머물며 이틀 밤을 묵었다. 사람들이 그 까닭을 묻자 곽임종이 말하였다. \"숙도는 넓고 깊기가 만 이랑의 못과 같아서, 맑게 하려 해도 더 맑아지지 않고 흐리게 하려 해도 흐려지지 않으니, 그 기량(器量)이 깊고 넓어 헤아리기 어렵다.\"", ["비평", "도량"]], ["德行", 4, "李元禮風格秀整，高自標持，欲以天下名教是非為己任。後進之士，有升其堂者，皆以為登龍門。", "이원례(李元禮)는 풍격이 빼어나고 단정하여 스스로 높이 지조를 지켰으며, 천하의 명교(名敎)와 시비를 자기의 임무로 삼고자 하였다. 후진 선비들 가운데 그의 당(堂)에 오른 자는 모두 용문(龍門)에 올랐다고 여겼다.", ["비평", "학문"]], ["德行", 5, "李元禮嘗歎荀淑、鍾皓曰：「荀君清識難尚，鍾君至德可師。」", "이원례(李元禮)가 일찍이 순숙(荀淑)과 종호(鍾皓)를 칭찬하여 말하였다. \"순군(荀君)의 맑은 식견은 따르기 어렵고, 종군(鍾君)의 지극한 덕(德)은 스승으로 삼을 만하다.\"", ["비평", "겸손"]], ["德行", 6, "陳太丘詣荀朗陵，貧儉無僕役。乃使元方將車，季方持杖後從。長文尚小，載箸車中。既至，荀使叔慈應門，慈明行酒，餘六龍下食。文若亦小，坐箸厀前。于時太史奏：「真人東行。」", "진태구(陳太丘)가 순랑릉(荀朗陵)을 찾아갈 때 가난하고 검소하여 종이나 부리는 이가 없었다. 그래서 원방(元方)에게 수레를 몰게 하고 계방(季方)에게 지팡이를 들고 뒤따르게 하였다. 장문(長文)은 아직 어려서 수레 안에 태웠다. 도착하자 순랑릉은 숙자(叔慈)에게 문을 맞이하게 하고 자명(慈明)에게 술을 돌리게 하였으며, 나머지 여섯 아들이 음식을 차렸다. 문약(文若)도 아직 어려서 무릎 앞에 앉혔다. 이때 태사(太史)가 아뢰었다. \"진인(眞人)이 동쪽으로 가고 있습니다.\"", ["청빈", "신동", "비평"]], ["德行", 7, "客有問陳季方：「足下家君太丘，有何功德，而荷天下重名？」季方曰：「吾家君譬如桂樹生泰山之阿，上有萬仞之高，下有不測之深；上為甘露所霑，下為淵泉所潤。當斯之時，桂樹焉知泰山之高，淵泉之深，不知有功德與無也！」", "어떤 손님이 진계방(陳季方)에게 물었다. \"그대의 부친 태구(太丘)께서는 무슨 공덕이 있어 천하의 큰 명성을 짊어지셨소?\" 계방이 말하였다. \"우리 부친은 비유하자면 태산(泰山)의 모퉁이에서 자란 계수나무와 같으니, 위로는 만 길의 높이가 있고 아래로는 헤아릴 수 없는 깊이가 있으며, 위로는 단 이슬에 젖고 아래로는 깊은 샘물에 적셔집니다. 이러한 때에 계수나무가 어찌 태산의 높이와 깊은 샘의 깊이를 알겠습니까. 공덕이 있는지 없는지도 알지 못합니다!\"", ["기지", "비평", "효"]], ["德行", 8, "陳元方子長文有英才，與季方子孝先，各論其父功德，爭之不能決，咨於太丘。太丘曰：「元方難為兄，季方難為弟。」", "진원방(陳元方)의 아들 장문(長文)은 뛰어난 재주가 있었는데, 계방(季方)의 아들 효선(孝先)과 각기 자기 아버지의 공덕을 논하다가 다투어도 결판이 나지 않자 태구(太丘)에게 물었다. 태구가 말하였다. \"원방을 형이라 하기도 어렵고, 계방을 아우라 하기도 어렵다.\"", ["비평", "기지", "신동"]], ["德行", 9, "荀巨伯遠看友人疾，值胡賊攻郡，友人語巨伯曰：「吾今死矣，子可去！」巨伯曰：「遠來相視，子令吾去；敗義以求生，豈荀巨伯所行邪？」賊既至，謂巨伯曰：「大軍至，一郡盡空，汝何男子，而敢獨止？」巨伯曰：「友人有疾，不忍委之，寧以我身代友人命。」賊相謂曰：「我輩無義之人，而入有義之國！」遂班軍而還，一郡並獲全。", "순거백(荀巨伯)이 멀리 친구의 병문안을 갔다가 마침 오랑캐 도적이 군(郡)을 공격하는 때를 만났다. 친구가 거백에게 말하였다. \"나는 이제 죽을 것이니, 그대는 떠나시오!\" 거백이 말하였다. \"멀리서 그대를 보러 왔는데 그대가 나더러 떠나라 하니, 의리를 저버리고 삶을 구하는 것이 어찌 순거백이 할 일이겠는가?\" 도적이 이르러 거백에게 말하였다. \"대군이 이르러 온 군이 텅 비었거늘, 너는 어떤 사내이기에 감히 홀로 남아 있느냐?\" 거백이 말하였다. \"친구가 병이 있어 차마 버리지 못하니, 차라리 내 몸으로 친구의 목숨을 대신하겠소.\" 도적들이 서로 말하였다. \"우리는 의리 없는 자들인데 의리 있는 나라에 들어왔구나!\" 마침내 군대를 돌려 돌아가니, 온 군이 모두 온전함을 얻었다.", ["우정", "용기", "충직"]], ["德行", 10, "華歆遇子弟甚整，雖閒室之內，嚴若朝典。陳元方兄弟恣柔愛之道，而二門之裏，兩不失雍熙之軌焉。管寧、華歆共園中鋤菜，見地有片金，管揮鋤與瓦石不異，華捉而擲去之。又嘗同席讀書，有乘軒冕過門者，寧讀如故，歆廢書出看。寧割席分坐曰：「子非吾友也。」", "화흠(華歆)은 자제를 대함이 매우 엄정하여, 한가한 방 안에서도 조정의 의례처럼 엄숙하였다. 진원방(陳元方) 형제는 부드럽고 자애로운 도를 마음껏 폈으나, 두 집안 모두 화목한 법도를 잃지 않았다. 관녕(管寧)과 화흠이 함께 밭에서 채소를 매다가 땅에 금 조각이 있는 것을 보았는데, 관녕은 호미질을 기와나 돌과 다름없이 하였고 화흠은 그것을 집었다가 내던졌다. 또 일찍이 한자리에서 함께 글을 읽는데, 수레와 면류관을 갖춘 자가 문 앞을 지나가자 관녕은 전과 다름없이 글을 읽었으나 화흠은 책을 덮고 나가 구경하였다. 관녕이 자리를 잘라 따로 앉으며 말하였다. \"그대는 나의 벗이 아니다.\"", ["절교", "청빈", "비평"]], ["德行", 11, "王朗每以識度推華歆。歆蜡日嘗集子姪燕飲，王亦學之。有人向張華說此事，張曰：「王之學華，皆是形骸之外，去之所以更遠。」", "왕랑(王朗)은 늘 식견과 도량으로 화흠(華歆)을 추켜세웠다. 화흠이 납일(蜡日)에 자질(子姪)을 모아 잔치를 벌이자 왕랑도 그것을 따라 하였다. 어떤 이가 장화(張華)에게 이 일을 이야기하자 장화가 말하였다. \"왕랑이 화흠을 본받는 것은 모두 겉모습일 뿐이니, 그래서 더욱 멀어지는 것이다.\"", ["비평", "오만"]], ["德行", 12, "華歆、王朗俱乘船避難，有一人欲依附，歆輒難之。朗曰：「幸尚寬，何為不可？」後賊追至，王欲舍所攜人。歆曰：「本所以疑，正為此耳。既已納其自託，寧可以急相棄邪？」遂攜拯如初。世以此定華、王之優劣。", "화흠(華歆)과 왕랑(王朗)이 함께 배를 타고 난을 피하는데, 어떤 사람이 의탁하려 하자 화흠은 곧 난색을 보였다. 왕랑이 말하였다. \"다행히 아직 자리가 넉넉하니 어찌 안 되겠소?\" 뒤에 도적이 쫓아오자 왕랑은 데려온 사람을 버리려 하였다. 화흠이 말하였다. \"애초에 내가 망설였던 것은 바로 이 때문이오. 이미 그의 의탁을 받아들였으니 어찌 위급하다 하여 버릴 수 있겠소?\" 마침내 처음처럼 데리고 구해 주었다. 세상에서는 이로써 화흠과 왕랑의 우열을 정하였다.", ["도량", "충직", "비평"]], ["德行", 13, "王祥事後母朱夫人甚謹，家有一李樹，結子殊好，母恆使守之。時風雨忽至，祥抱樹而泣。祥嘗在別牀眠，母自往闇斫之。值祥私起，空斫得被。既還，知母憾之不已，因跪前請死。母於是感悟，愛之如己子。", "왕상(王祥)은 계모 주부인(朱夫人)을 매우 삼가 섬겼다. 집에 자두나무 한 그루가 있어 열매가 유독 좋았는데, 계모는 늘 그에게 그것을 지키게 하였다. 한번은 비바람이 갑자기 닥치자 왕상은 나무를 끌어안고 울었다. 왕상이 일찍이 다른 침상에서 자고 있을 때 계모가 직접 가서 몰래 그를 베려 하였는데, 마침 왕상이 볼일을 보러 일어난 터라 빈 이불만 베었다. 돌아온 뒤 왕상은 계모가 자기를 미워함이 그치지 않음을 알고는, 무릎 꿇고 앞에 나아가 죽기를 청하였다. 계모가 이에 감동하여 깨닫고 그를 친자식처럼 사랑하였다.", ["효", "원한", "도량"]], ["德行", 14, "晉文王稱阮嗣宗至慎，每與之言，言皆玄遠，未嘗臧否人物。", "진(晉) 문왕(文王)이 완사종(阮嗣宗, 阮籍)을 일러 지극히 신중하다 하였으니, 그와 더불어 이야기할 때마다 말이 모두 현원(玄遠)하여 인물을 두고 좋다 나쁘다 평한 적이 없었다.", ["겸손", "청담", "비평"]], ["德行", 15, "王戎云：「與嵇康居二十年，未嘗見其喜慍之色。」", "왕융(王戎)이 말하였다. \"혜강(嵇康)과 이십 년을 함께 지냈으나 그가 기뻐하거나 성내는 기색을 본 적이 없다.\"", ["도량", "비평"]], ["德行", 16, "王戎、和嶠同時遭大喪，俱以孝稱。王雞骨支牀，和哭泣備禮。武帝謂劉仲雄曰：「卿數省王、和不？聞和哀苦過禮，使人憂之。」仲雄曰：「和嶠雖備禮，神氣不損；王戎雖不備禮，而哀毀骨立。臣以和嶠生孝，王戎死孝。陛下不應憂嶠，而應憂戎。」", "왕융(王戎)과 화교(和嶠)가 동시에 큰 상(喪)을 당하여 모두 효성으로 일컬어졌다. 왕융은 닭 뼈처럼 야위어 침상에 의지할 지경이었고, 화교는 곡읍하며 예를 다 갖추었다. 무제(武帝)가 유중웅(劉仲雄)에게 말하였다. \"경은 왕융과 화교를 자주 살피는가? 화교가 슬픔으로 괴로워함이 예를 넘는다 하니 사람으로 하여금 근심하게 하네.\" 중웅이 답하였다. \"화교는 비록 예를 다 갖추었으나 신기(神氣)는 상하지 않았고, 왕융은 비록 예를 다 갖추지 못했으나 슬픔으로 야위어 뼈만 앙상합니다. 신은 화교를 산 효(孝), 왕융을 죽는 효(孝)라 여깁니다. 폐하께서는 화교를 근심하실 것이 아니라 왕융을 근심하셔야 합니다.\"", ["효", "죽음", "비평"]], ["德行", 17, "梁王、趙王，國之近屬，貴重當時。裴令公歲請二國租錢數百萬，以恤中表之貧者。或譏之曰：「何以乞物行惠？」裴曰：「損有餘，補不足，天之道也。」", "양왕(梁王)과 조왕(趙王)은 나라의 가까운 친속으로 당시에 귀하고 존중받았다. 배령공(裴令公, 裴楷)이 해마다 두 나라의 조세 수백만 전을 청하여 가난한 내외 친척을 구휼하였다. 어떤 이가 그를 비난하여 말하였다. \"어찌하여 물건을 빌어다가 은혜를 베푸시오?\" 배령공이 말하였다. \"남는 것을 덜어 부족한 것을 메우는 것이 하늘의 도(道)이다.\"", ["베풂", "권력"]], ["德行", 18, "王戎云：「太保居在正始中，不在能言之流。及與之言，理中清遠，將無以德掩其言！」", "왕융(王戎)이 말하였다. \"태보(太保)께서는 정시(正始) 연간에 계셨으나 말 잘하는 부류에는 들지 못하셨다. 그러나 그와 더불어 이야기해 보면 이치가 맑고 원대하니, 아마도 덕(德)이 그 말솜씨를 가린 것이리라!\"", ["비평", "겸손", "청담"]], ["德行", 19, "王安豐遭艱，至性過人。裴令往弔之，曰：「若使一慟果能傷人，濬沖必不免滅性之譏。」", "왕안풍(王安豐, 王戎)이 상(喪)을 당하였는데 지극한 성품이 남보다 뛰어났다. 배령(裴令, 裴楷)이 가서 조문하며 말하였다. \"만약 한 번의 통곡이 정말로 사람을 상하게 할 수 있다면, 준충(濬沖, 王戎)은 반드시 성품을 해친다는 비판을 면치 못할 것이다.\"", ["죽음", "효", "비평"]], ["德行", 20, "王戎父渾有令名，官至涼州刺史。渾薨，所歷九郡義故，懷其德惠，相率致賻數百萬，戎悉不受。", "왕융(王戎)의 아버지 혼(渾)은 아름다운 명성이 있어 벼슬이 양주(涼州)자사에 이르렀다. 혼이 죽자 그가 거쳐 간 아홉 군(郡)의 옛 부하와 지인들이 그의 덕과 은혜를 그리워하여, 서로 이끌어 부의(賻儀) 수백만 전을 보냈으나 왕융은 모두 받지 않았다.", ["거절", "청빈", "죽음"]], ["德行", 21, "劉道真嘗為徒，扶風王駿以五百疋布贖之，既而用為從事中郎。當時以為美事。", "유도진(劉道眞)이 일찍이 도형(徒刑)을 사는 처지였는데, 부풍왕(扶風王) 준(駿)이 베 오백 필로 그를 속량하고는 곧 종사중랑(從事中郎)으로 삼았다. 당시 사람들이 아름다운 일로 여겼다.", ["베풂", "권력"]], ["德行", 22, "王平子、胡毋彥國諸人，皆以任放為達，或有裸體者。樂廣笑曰：「名教中自有樂地，何為乃爾也！」", "왕평자(王平子)와 호무언국(胡毋彦國) 등은 모두 거리낌 없이 방종함을 통달(達)로 여겼으며, 더러는 알몸을 드러내는 자도 있었다. 악광(樂廣)이 웃으며 말하였다. \"명교(名敎) 안에도 절로 즐거운 경지가 있거늘, 어찌하여 이러는가!\"", ["오만", "비평", "술과취흥"]], ["德行", 23, "郗公值永嘉喪亂，在鄉里甚窮餒。鄉人以公名德，傳共飴之。公常攜兄子邁及外生周翼二小兒往食。鄉人曰：「各自饑困，以君之賢，欲共濟君耳，恐不能兼有所存。」公於是獨往，食輒含飯箸兩頰邊，還吐與二兒。後並得存，同過江。郗公亡，翼為剡縣，解職歸，席苫於公靈牀頭，心喪終三年。", "치공(郗公, 郗鑒)이 영가(永嘉)의 난리를 만나 향리에서 매우 궁핍하고 굶주렸다. 향리 사람들이 공의 명성과 덕을 보아 돌아가며 함께 그를 먹였다. 공은 늘 형의 아들 매(邁)와 누이의 아들 주익(周翼) 두 어린아이를 데리고 가서 함께 먹었다. 향리 사람들이 말하였다. \"각자 굶주리고 곤궁하나, 그대의 어짊을 보아 함께 그대를 구하고자 할 뿐, 함께 더 거두기는 어려울 듯하오.\" 공은 이에 홀로 가서, 먹을 때마다 밥을 양 볼에 머금었다가 돌아와 두 아이에게 뱉어 주었다. 뒤에 두 아이 모두 살아남아 함께 강을 건넜다. 치공이 죽자 주익은 섬현(剡縣)의 수령이었는데, 직책을 내려놓고 돌아와 공의 영상(靈牀) 머리맡에 거적을 깔고 마음의 상복을 입어 삼 년을 마쳤다.", ["베풂", "효", "죽음"]], ["德行", 24, "顧榮在洛陽，嘗應人請，覺行炙人有欲炙之色，因輟己施焉。同坐嗤之。榮曰：「豈有終日執之，而不知其味者乎？」後遭亂渡江，每經危急，常有一人左右己，問其所以，乃受炙人也。", "고영(顧榮)이 낙양(洛陽)에 있을 때, 일찍이 남의 초대에 응하였다가 고기를 나르는 사람이 그 고기를 먹고 싶어 하는 기색을 알아채고는 자기 몫을 떼어 주었다. 같이 앉은 이들이 비웃자 고영이 말하였다. \"어찌 종일토록 고기를 들고 있으면서 그 맛을 모르는 자가 있겠소?\" 뒤에 난을 만나 강을 건널 때, 위급한 일을 겪을 때마다 늘 한 사람이 곁에서 자기를 도왔는데, 그 까닭을 물으니 바로 고기를 받았던 사람이었다.", ["베풂", "지혜", "도량"]], ["德行", 25, "祖光祿少孤貧，性至孝，常自為母炊爨作食。王平北聞其佳名，以兩婢餉之，因取為中郎。有人戲之者曰：「奴價倍婢。」祖云：「百里奚亦何必輕於五羖之皮邪？」", "조광록(祖光祿)은 어려서 아비를 여의고 가난하였으나 성품이 지극히 효성스러워, 늘 손수 어머니를 위해 밥을 짓고 음식을 만들었다. 왕평북(王平北)이 그의 아름다운 명성을 듣고 계집종 둘을 보내 주고는 그를 데려다 중랑(中郎)으로 삼았다. 어떤 이가 그를 놀려 말하였다. \"사내종 값이 계집종의 곱절이로군.\" 조광록이 말하였다. \"백리해(百里奚)인들 어찌 다섯 마리 검은 양 가죽보다 가볍겠는가?\"", ["효", "청빈", "기지"]], ["德行", 26, "周鎮罷臨川郡還都，未及上住，泊青溪渚。王丞相往看之。時夏月，暴雨卒至，舫至狹小，而又大漏，殆無復坐處。王曰：「胡威之清，何以過此！」即啟用為吳興郡。", "주진(周鎭)이 임천군(臨川郡)을 그만두고 도성으로 돌아왔는데, 미처 부임지에 머물지 못하고 청계(靑溪) 물가에 배를 댔다. 왕승상(王丞相, 王導)이 그를 보러 갔다. 때는 여름철이라 폭우가 갑자기 쏟아졌는데, 배는 매우 좁은 데다 또 크게 새어 거의 다시 앉을 자리도 없을 지경이었다. 왕승상이 말하였다. \"호위(胡威)의 청렴함인들 어찌 이보다 더하겠는가!\" 곧 아뢰어 오흥군(吳興郡)에 기용하였다.", ["청빈", "권력", "비평"]], ["德行", 27, "鄧攸始避難，於道中棄己子，全弟子。既過江，取一妾，甚寵愛。歷年後訊其所由，妾具說，是北人遭亂，憶父母姓名，乃攸之甥也。攸素有德業，言行無玷，聞之哀恨終身，遂不復畜妾。", "등유(鄧攸)가 처음 난을 피할 때 도중에서 자기 자식을 버리고 아우의 자식을 온전히 하였다. 강을 건넌 뒤 첩 하나를 들여 매우 총애하였다. 여러 해가 지나 그 내력을 물으니, 첩이 자세히 말하기를 자기는 북쪽 사람으로 난을 만나 떠돌았다 하며 부모의 성명을 기억해 냈는데, 바로 등유의 생질이었다. 등유는 평소 덕업이 있어 언행에 흠이 없었으나, 이를 듣고 슬퍼하며 한스러워함이 평생토록 이어졌고, 마침내 다시는 첩을 두지 않았다.", ["뉘우침", "도량", "효"]], ["德行", 28, "王長豫為人謹順，事親盡色養之孝。丞相見長豫輒喜，見敬豫輒嗔。長豫與丞相語，恒以慎密為端。丞相還臺，及行，未嘗不送至車後。恒與曹夫人併當箱篋。長豫亡後，丞相還臺，登車後，哭至臺門。曹夫人作簏，封而不忍開。", "왕장예(王長豫)는 사람됨이 삼가고 온순하여 어버이를 섬김에 얼굴빛을 살펴 봉양하는 효(孝)를 다하였다. 승상(丞相, 王導)은 장예를 보면 곧 기뻐하고 경예(敬豫)를 보면 곧 노여워하였다. 장예는 승상과 이야기할 때 늘 신중하고 빈틈없음을 으뜸으로 삼았다. 승상이 대(臺, 관청)로 돌아갈 때면, 떠날 때마다 수레 뒤까지 배웅하지 않은 적이 없었다. 늘 조부인(曹夫人)과 함께 상자를 정돈하였다. 장예가 죽은 뒤 승상은 대로 돌아가며 수레에 오른 뒤 대문(臺門)에 이르도록 곡하였다. 조부인은 그가 쓰던 대바구니를 봉해 두고 차마 열지 못하였다.", ["효", "죽음", "겸손"]], ["德行", 29, "桓常侍聞人道深公者，輒曰：「此公既有宿名，加先達知稱，又與先人至交，不宜說之。」", "환상시(桓常侍, 桓伊)는 사람들이 심공(深公)을 이야기하는 것을 들으면 곧 말하였다. \"이분은 본디 오랜 명성이 있고, 게다가 선배들이 알아주고 칭찬하였으며, 또 돌아가신 분과 지극한 교분이 있었으니, 함부로 평해서는 안 된다.\"", ["비평", "겸손"]], ["德行", 30, "庾公乘馬有的盧，或語令賣去。庾云：「賣之必有買者，即復害其主。寧可不安己而移於他人哉？昔孫叔敖殺兩頭蛇以為後人，古之美談，效之，不亦達乎！」", "유공(庾公, 庾亮)이 타는 말 가운데 적로(的盧)가 있었는데, 어떤 이가 팔아 버리라고 권하였다. 유공이 말하였다. \"이것을 팔면 반드시 사는 자가 있을 것이고, 그러면 다시 그 주인을 해칠 것이다. 어찌 내가 불안하다 하여 그것을 남에게 옮기겠는가? 옛날 손숙오(孫叔敖)가 머리 둘 달린 뱀을 죽여 뒷사람을 위한 일은 옛날의 아름다운 이야기이니, 그것을 본받는 것이 또한 통달함이 아니겠는가!\"", ["도량", "지혜"]], ["德行", 31, "阮光祿在剡，曾有好車，借者無不皆給。有人葬母，意欲借而不敢言。阮後聞之，嘆曰：「吾有車而使人不敢借，何以車為？」遂焚之。", "완광록(阮光祿, 阮裕)이 섬(剡)에 있을 때 좋은 수레를 가지고 있었는데, 빌리려는 자에게는 모두 내주지 않은 적이 없었다. 어떤 사람이 어머니를 장사 지내려 수레를 빌리고 싶어 했으나 감히 말하지 못하였다. 완광록이 뒤에 이를 듣고 탄식하여 말하였다. \"내게 수레가 있는데도 사람으로 하여금 감히 빌리지 못하게 하였으니, 수레를 둔들 무엇하겠는가?\" 마침내 그것을 불태워 버렸다.", ["베풂", "도량"]], ["德行", 32, "謝奕作剡令，有一老翁犯法，謝以醇酒罰之，乃至過醉，而猶未已。太傅時年七、八歲，箸青布絝，在兄厀邊坐，諫曰：「阿兄！老翁可念，何可作此。」奕於是改容曰：「阿奴欲放去邪？」遂遣之。", "사혁(謝奕)이 섬현(剡縣)의 수령이 되었을 때, 한 노인이 법을 어기자 사혁은 독한 술로 벌하여 지나치게 취하게 하고도 여전히 그치지 않았다. 태부(太傅, 謝安)는 그때 일고여덟 살이었는데, 푸른 베 바지를 입고 형의 무릎 옆에 앉아 있다가 간하였다. \"형님! 노인이 가엾으니 어찌 이렇게 하실 수 있습니까.\" 사혁이 이에 얼굴빛을 고치고 말하였다. \"네가 풀어 주고 싶은 게냐?\" 그러고는 그를 보내 주었다.", ["간언", "신동"]], ["德行", 33, "謝太傅絕重褚公，常稱：「褚季野雖不言，而四時之氣亦備。」", "사태부(謝太傅, 謝安)는 저공(褚公)을 매우 존중하여 늘 칭찬하였다. \"저계야(褚季野)는 비록 말은 하지 않으나, 사계절의 기운을 두루 갖추었다.\"", ["비평", "겸손"]], ["德行", 34, "劉尹在郡，臨終綿惙，聞閣下祠神鼓舞。正色曰：「莫得淫祀！」外請殺車中牛祭神。真長答曰：「丘之禱久矣，勿復為煩。」", "유윤(劉尹, 劉惔)이 군(郡)에 있을 때, 임종에 이르러 기운이 다해 가는데 관아 아래에서 신에게 제사 지내며 북 치고 춤추는 소리를 들었다. 정색하며 말하였다. \"함부로 제사 지내지 말라!\" 바깥에서 수레 끄는 소를 잡아 신에게 제사 지내기를 청하니, 진장(眞長)이 답하였다. \"나의 기도는 오래되었으니, 다시 번거롭게 하지 말라.\"", ["담대한죽음", "죽음"]], ["德行", 35, "謝公夫人教兒，問太傅：「那得初不見君教兒？」答曰：「我常自教兒。」", "사공(謝公, 謝安)의 부인이 아들들을 가르치며 태부에게 물었다. \"어찌하여 당신이 아이들 가르치는 것을 도무지 본 적이 없습니까?\" 태부가 답하였다. \"나는 늘 스스로 아이들을 가르치고 있소.\"", ["학문", "효"]], ["德行", 36, "晉簡文為撫軍時，所坐牀上塵不聽拂，見鼠行跡，視以為佳。有參軍見鼠白日行，以手板批殺之，撫軍意色不說，門下起彈。教曰：「鼠被害，尚不能忘懷，今復以鼠損人，無乃不可乎？」", "진(晉) 간문제(簡文帝)가 무군장군(撫軍)이던 때, 앉는 평상 위의 먼지를 털지 못하게 하였고, 쥐가 지나간 자국을 보면 그것을 좋게 여겼다. 한 참군(參軍)이 쥐가 대낮에 다니는 것을 보고 수판(手板)으로 쳐 죽이자, 무군장군은 마음과 안색이 언짢았고 문하(門下)에서 탄핵을 일으켰다. 그가 교(敎)를 내려 말하였다. \"쥐가 해를 입은 것도 오히려 마음에서 잊지 못하거늘, 이제 다시 쥐 때문에 사람을 해친다면 옳지 못한 일이 아니겠는가?\"", ["도량", "베풂"]], ["德行", 37, "范宣年八歲，後園挑菜，誤傷指，大啼。人問：「痛邪？」答曰：「非為痛，身體髮膚，不敢毀傷，是以啼耳！」宣潔行廉約，韓豫章遺絹百匹，不受。減五十匹，復不受。如是減半，遂至一匹，既終不受。韓後與范同載，就車中裂二丈與范，云：「人寧可使婦無邪？」范笑而受之。", "범선(范宣)은 여덟 살 때 뒤뜰에서 나물을 캐다가 잘못하여 손가락을 다쳐 크게 울었다. 누군가 물었다. \"아프냐?\" 그가 대답하였다. \"아파서가 아니라, 몸과 머리털과 살갗은 감히 헐거나 다치게 해서는 안 되는 것이라, 그래서 우는 것일 뿐입니다!\" 범선은 행실이 깨끗하고 검소하였다. 한예장(韓豫章)이 비단 백 필을 보냈으나 받지 않았다. 오십 필로 줄였으나 또 받지 않았다. 이처럼 반씩 줄여 마침내 한 필에 이르렀으나 끝내 받지 않았다. 한예장이 뒤에 범선과 함께 수레를 탔는데, 수레 안에서 두 장(丈)을 찢어 범선에게 주며 말하였다. \"사람이 어찌 아내로 하여금 속옷이 없게 하겠소?\" 범선은 웃으며 그것을 받았다.", ["효", "청빈", "거절"]], ["德行", 38, "王子敬病篤，道家上章應首過，問子敬「由來有何異同得失？」子敬云：「不覺有餘事，唯憶與郗家離婚。」", "왕자경(王獻之)의 병이 위독해지자, 도가(道家)에서 장(章)을 올려 마땅히 잘못을 고하게 되었다. 자경에게 물었다. \"여태껏 무슨 잘잘못이 있었습니까?\" 자경이 말하였다. \"다른 일은 떠오르지 않고, 오직 치씨(郗氏) 집안과 이혼한 일만 기억납니다.\"", ["뉘우침", "부부", "병과늙음"]], ["德行", 39, "殷仲堪既為荊州，值水儉，食常五盌，外無餘肴。飯粒脫落盤席閒，輒拾以噉之。雖欲率物，亦緣其性真素。每語子弟云：「勿以我受任方州，云我豁平昔時意。今吾處之不易。貧者士之常，焉得登枝而捐其本？爾曹其存之！」", "은중감(殷仲堪)이 형주(荊州)를 다스리게 되었는데, 마침 수해로 흉년이 들어 식사로 늘 다섯 그릇뿐이었고 그 밖에 다른 안주가 없었다. 밥알이 소반과 자리 사이에 떨어지면 곧 주워서 먹었다. 비록 사람들을 거느려 모범을 보이고자 함이었으나, 또한 그 천성이 참되고 소박한 데서 말미암은 것이었다. 늘 자제들에게 일러 말하였다. \"내가 한 주(州)의 소임을 맡았다 하여, 내가 평소의 뜻을 풀어버렸다고 여기지 말라. 지금 내가 이 자리에 처하기를 쉽게 여기지 않는다. 가난함은 선비의 떳떳함이니, 어찌 가지에 올랐다 하여 그 뿌리를 버리겠느냐? 너희는 이를 마음에 새겨두어라!\"", ["청빈", "간언"]], ["德行", 40, "初桓南郡、楊廣共說殷荊州，宜奪殷覬南蠻以自樹。覬亦即曉其旨，嘗因行散，率爾去下舍，便不復還。內外無預知者，意色蕭然，遠同鬬生之無慍。時論以此多之。", "처음에 환남군(桓玄)과 양광(楊廣)이 함께 은형주(殷仲堪)에게 권하기를, 마땅히 은의(殷覬)의 남만(南蠻) 직임을 빼앗아 자신의 세력을 세워야 한다고 하였다. 은의도 곧 그 뜻을 알아차리고, 한번은 산행(散行)하던 길에 무심한 듯 처소를 떠나 다시는 돌아오지 않았다. 안팎에서 미리 안 자가 없었다. 뜻과 낯빛이 소탈하여, 멀리 투생(鬬生)이 노여워하지 않던 것과 같았다. 당시의 여론은 이로써 그를 높이 평가하였다.", ["도량", "은둔", "권력"]], ["德行", 41, "王僕射在江州，為殷、桓所逐，奔竄豫章，存亡未測。王綏在都，既憂戚在貌，居處飲食，每事有降。時人謂為試守孝子。", "왕복야(王僕射)가 강주(江州)에 있을 때 은씨(殷氏)와 환씨(桓氏)에게 쫓겨 예장(豫章)으로 달아나 숨었는데, 살았는지 죽었는지 알 수 없었다. 왕수(王綏)는 도성에 있으면서 근심과 슬픔이 낯빛에 드러났고, 거처와 음식이 매사에 줄어들었다. 당시 사람들은 그를 시험 삼아 효자 노릇을 한다고 일컬었다.", ["효", "충직"]], ["德行", 42, "桓南郡既破殷荊州，收殷將佐十許人，咨議羅企生亦在焉。桓素待企生厚，將有所戮，先遣人語云：「若謝我，當釋罪。」企生荅曰：「為殷荊州吏，今荊州奔亡，存亡未判，我何顏謝桓公？」既出市，桓又遣人問欲何言？答曰：「昔晉文王殺嵇康，而嵇紹為晉忠臣。從公乞一弟以養老母。」桓亦如言宥之。桓先曾以一羔裘與企生母胡，胡時在豫章，企生問至，即日焚裘。", "환남군(桓玄)이 은형주(殷仲堪)를 깨뜨린 뒤, 은씨의 장수와 막료 열 명 남짓을 잡아들였는데, 자의(咨議) 나기생(羅企生)도 그 가운데 있었다. 환현은 평소 나기생을 후하게 대접하였으므로, 죽이려 하면서 먼저 사람을 보내 일러 말하였다. \"만약 나에게 사죄하면 마땅히 죄를 풀어주겠다.\" 나기생이 대답하였다. \"은형주의 관리가 되었는데, 지금 형주가 달아나 살았는지 죽었는지 가려지지 않았으니, 내가 무슨 낯으로 환공(桓玄)에게 사죄하겠는가?\" 형장으로 끌려나가자 환현이 또 사람을 보내 무슨 말을 하고 싶은지 물었다. 그가 대답하였다. \"옛날 진(晉) 문왕(文王)이 혜강(嵇康)을 죽였으나 혜소(嵇紹)는 진의 충신이 되었습니다. 공께 동생 하나를 빌어 늙은 어머니를 봉양케 해주십시오.\" 환현도 그 말대로 동생을 용서하였다. 환현은 앞서 양가죽 갖옷 하나를 나기생의 어머니 호씨(胡氏)에게 준 적이 있었다. 호씨는 그때 예장에 있었는데, 나기생의 부고가 이르자 그날로 갖옷을 불태웠다.", ["충직", "담대한죽음", "효"]], ["德行", 43, "王恭從會稽還，王大看之。見其坐六尺簟，因語恭：「卿東來，故應有此物，可以一領及我。」恭無言。大去後，即舉所坐者送之。既無餘席，便坐薦上。後大聞之甚驚，曰：「吾本謂卿多，故求耳。」對曰：「丈人不悉恭，恭作人無長物。」", "왕공(王恭)이 회계(會稽)에서 돌아오자 왕대(王大)가 그를 찾아왔다. 그가 여섯 자짜리 대자리(簟)에 앉아 있는 것을 보고 왕공에게 말하였다. \"그대가 동쪽에서 왔으니 응당 이런 물건이 있을 터, 한 장을 나에게 줄 수 있겠는가?\" 왕공은 아무 말이 없었다. 왕대가 떠난 뒤 곧 자기가 앉았던 자리를 들어 보냈다. 그러고는 남은 자리가 없어 거적 위에 앉았다. 뒤에 왕대가 이를 듣고 몹시 놀라 말하였다. \"나는 본래 그대에게 많이 있는 줄 알았기에 청했을 뿐이오.\" 왕공이 대답하였다. \"어른께서 저를 잘 모르시는군요. 저는 사람됨에 여분의 물건(長物)이 없습니다.\"", ["청빈", "거절", "도량"]], ["德行", 44, "吳郡陳遺，家至孝，母好食鐺底焦飯。遺作郡主簿，恒裝一囊，每煮食，輒貯錄焦飯，歸以遺母。後值孫恩賊出吳郡，袁府君即日便征，遺已聚斂得數斗焦飯，未展歸家，遂帶以從軍。戰於滬瀆，敗。軍人潰散，逃走山澤，皆多饑死，遺獨以焦飯得活。時人以為純孝之報也。", "오군(吳郡)의 진유(陳遺)는 집안이 지극히 효성스러웠다. 그의 어머니는 솥 밑바닥의 누룽지 먹기를 좋아하였다. 진유가 군의 주부(主簿)가 되어, 늘 자루 하나를 차고 다니며 밥을 지을 때마다 누룽지를 모아 담아두었다가 돌아가 어머니께 드렸다. 뒤에 손은(孫恩)의 도적 무리가 오군에 쳐들어오자, 원부군(袁府君)이 그날로 곧 출정하게 되었다. 진유는 이미 누룽지 몇 말을 모아두었으나 집으로 돌아갈 겨를이 없어 그대로 그것을 차고 종군하였다. 호독(滬瀆)에서 싸웠으나 패하였다. 군사들이 무너져 흩어져 산과 못으로 도망쳐 달아났는데, 대개 굶어 죽는 자가 많았으나 진유만은 누룽지 덕분에 살아남았다. 당시 사람들은 이를 순수한 효성에 대한 보답이라 여겼다.", ["효", "베풂"]], ["德行", 45, "孔僕射為孝武侍中，豫蒙眷接烈宗山陵。孔時為太常，形素羸瘦，著重服，竟日涕泗流漣，見者以為真孝子。", "공복야(孔僕射)는 효무제(孝武帝)의 시중(侍中)이 되어, 일찍이 임금의 은총과 대접을 받았다. 열종(烈宗)의 산릉(山陵, 장례) 때 공씨는 마침 태상(太常)이 되어 있었는데, 본래 몸이 야위고 약하였으나 무거운 상복을 입고 종일 눈물과 콧물을 줄줄 흘리니, 보는 자들이 그를 참된 효자라 여겼다.", ["효", "죽음"]], ["德行", 46, "吳道助、附子兄弟，居在丹陽郡。後遭母童夫人艱，朝夕哭臨。及思至，賓客弔省，號踊哀絕，路人為之落淚。韓康伯時為丹陽尹，母殷在郡，每聞二吳之哭，輒為悽惻。語康伯曰：「汝若為選官，當好料理此人。」康伯亦甚相知。韓後果為吏部尚書。大吳不免哀制，小吳遂大貴達。", "오도조(吳道助)와 부자(附子) 형제는 단양군(丹陽郡)에 살았다. 뒤에 어머니 동부인(童夫人)의 상을 당하여 아침저녁으로 곡을 하였다. 슬픔이 사무칠 때면 조문하러 온 빈객들 앞에서 부르짖으며 뛰고 애통해 기절할 지경이어서, 길 가던 사람들도 그 때문에 눈물을 떨구었다. 한강백(韓康伯)이 그때 단양윤(丹陽尹)이었는데, 어머니 은씨(殷氏)가 군에 함께 있으면서, 두 오씨의 곡소리를 들을 때마다 곧 슬프고 측은해하였다. 강백에게 일러 말하였다. \"네가 만약 인재를 뽑는 벼슬아치가 되거든 마땅히 이 사람들을 잘 보살펴 주어라.\" 강백 또한 그들을 매우 알아주었다. 한강백은 뒤에 과연 이부상서(吏部尙書)가 되었다. 큰 오씨는 상복 중에 슬픔을 이기지 못하고 죽었으나, 작은 오씨는 마침내 크게 귀하고 현달하였다.", ["효", "죽음", "비평"]], ["言語", 1, "邊文禮見袁奉高，失次序。奉高曰：「昔堯聘許由，面無怍色，先生何為顛倒衣裳？」文禮答曰：「明府初臨，堯德未彰，是以賤民顛倒衣裳耳。」", "변문례(邊文禮)가 원봉고(袁奉高)를 만났을 때 차례를 잃었다. 봉고가 말했다. \"옛날 요(堯)임금이 허유(許由)를 초빙했을 때에도 얼굴에 부끄러운 빛이 없었거늘, 선생은 어찌하여 옷을 거꾸로 입고 허둥대시오?\" 문례가 대답했다. \"명부(明府)께서 갓 부임하시어 요의 덕이 아직 드러나지 않은 까닭에, 천한 백성이 옷을 거꾸로 입게 된 것일 뿐입니다.\"", ["기지", "비평"]], ["言語", 2, "徐孺子年九歲，嘗月下戲。人語之曰：「若令月中無物，當極明邪？」徐曰：「不然，譬如人眼中有瞳子，無此必不明。」", "서유자(徐孺子)가 아홉 살 때 일찍이 달 아래에서 놀았다. 어떤 사람이 그에게 말했다. \"만약 달 속에 아무것도 없다면 더없이 밝아지지 않겠느냐?\" 서유자가 말했다. \"그렇지 않습니다. 비유컨대 사람의 눈 속에 눈동자가 있는 것과 같아, 이것이 없으면 반드시 밝지 못할 것입니다.\"", ["신동", "기지"]], ["言語", 3, "孔文舉年十歲，隨父到洛。時李元禮有盛名，為司隸校尉，詣門者皆儁才清稱，及中表親戚乃通。文舉至門，謂吏曰：「我是李府君親。」既通，前坐。元禮問曰：「君與僕有何親？」對曰：「昔先君仲尼與君先人伯陽，有師資之尊，是僕與君奕世為通好也。」元禮及賓客莫不奇之。太中大夫陳韙後至，人以其語語之。韙曰：「小時了了，大未必佳！」文舉曰：「想君小時，必當了了！」韙大踧踖。", "공문거(孔文擧)가 열 살 때 아버지를 따라 낙양(洛陽)에 이르렀다. 그때 이원례(李元禮)는 명성이 높아 사예교위(司隸校尉)로 있었는데, 그 문에 찾아오는 자는 모두 뛰어난 인재이거나 청망 있는 인물이며 내외 친척이라야 들여보냈다. 문거가 문에 이르러 문지기에게 말했다. \"나는 이부군(李府君)의 친척이오.\" 들어가서 앞에 앉았다. 원례가 물었다. \"그대는 나와 무슨 친척이 되는가?\" 대답했다. \"옛날 저의 선조 중니(仲尼)와 그대의 선조 백양(伯陽)께서 스승과 제자의 높은 관계가 있었으니, 이는 저와 그대가 대대로 좋은 사이를 이어온 것입니다.\" 원례와 손님들이 모두 그를 기특하게 여기지 않는 이가 없었다. 태중대부(太中大夫) 진위(陳韙)가 뒤늦게 이르자 사람들이 그 말을 그에게 전했다. 진위가 말했다. \"어려서 영특한 자가 커서 반드시 훌륭한 것은 아니지!\" 문거가 말했다. \"생각건대 그대는 어려서 반드시 영특하셨겠습니다!\" 진위가 크게 어쩔 줄 몰라 했다.", ["신동", "기지"]], ["言語", 4, "孔文舉有二子，大者六歲，小者五歲。晝日父眠，小者牀頭盜酒飲之。大兒謂曰：「何以不拜？」荅曰：「偷，那得行禮！」", "공문거(孔文擧)에게 두 아들이 있었으니, 큰 아이는 여섯 살, 작은 아이는 다섯 살이었다. 한낮에 아버지가 잠들자 작은 아이가 평상 머리에서 술을 훔쳐 마셨다. 큰 아이가 말했다. \"어찌 절을 하지 않느냐?\" 대답했다. \"훔치는 것인데 어찌 예를 차리겠소!\"", ["신동", "기지"]], ["言語", 5, "孔融被收，中外惶怖。時融兒大者九歲，小者八歲。二兒故琢釘戲，了無遽容。融謂使者曰：「冀罪止於身，二兒可得全不？」兒徐進曰：「大人豈見覆巢之下，復有完卵乎？」尋亦收至。", "공융(孔融)이 체포되자 안팎이 두려움에 떨었다. 그때 공융의 아이들 중 큰 아이는 아홉 살, 작은 아이는 여덟 살이었다. 두 아이는 여전히 못 박기 놀이를 하며 조금도 당황한 기색이 없었다. 공융이 사자에게 말했다. \"부디 죄가 제 한 몸에 그치고 두 아이는 온전히 보전될 수 있겠습니까?\" 아이가 천천히 나아가 말했다. \"어른께서는 어찌 뒤집힌 둥지 아래에 다시 온전한 알이 있는 것을 보셨습니까?\" 이윽고 아이들을 잡으러 오는 자도 이르렀다.", ["신동", "담대한죽음", "기지"]], ["言語", 6, "潁川太守髠陳仲弓。客有問元方：「府君何如？」元方曰：「高明之君也。」「足下家君何如？」曰：「忠臣孝子也。」客曰：「易稱『二人同心，其利斷金；同心之言，其臭如蘭。』何有高明之君而刑忠臣孝子者乎？」元方曰：「足下言何其謬也！故不相荅。」客曰：「足下但因傴為恭不能答。」元方曰：「昔高宗放孝子孝己，尹吉甫放孝子伯奇，董仲舒放孝子符起。唯此三君，高明之君；唯此三子，忠臣孝子。」客慚而退。", "영천태수(潁川太守)가 진중궁(陳仲弓)에게 곤형(髡刑)을 내렸다. 어떤 손님이 원방(元方)에게 물었다. \"부군(府君)은 어떤 사람인가?\" 원방이 말했다. \"높고 밝은 임금이십니다.\" \"그대의 아버님은 어떤 분인가?\" 말했다. \"충신이며 효자이십니다.\" 손님이 말했다. \"『주역(周易)』에 이르기를 '두 사람이 마음을 함께하면 그 날카로움이 쇠를 끊고, 마음을 함께하는 말은 그 향기가 난초와 같다'고 했네. 어찌 높고 밝은 임금이 충신과 효자에게 형벌을 내릴 수 있겠는가?\" 원방이 말했다. \"그대의 말이 어찌 그리 그릇되었는가! 그러므로 대답하지 않겠소.\" 손님이 말했다. \"그대는 다만 곱사등이를 핑계 삼아 공손한 척하며 대답하지 못하는 것이로다.\" 원방이 말했다. \"옛날 고종(高宗)은 효자 효기(孝己)를 내쫓았고, 윤길보(尹吉甫)는 효자 백기(伯奇)를 내쫓았으며, 동중서(董仲舒)는 효자 부기(符起)를 내쫓았소. 오직 이 세 임금은 높고 밝은 임금이었고, 오직 이 세 아들은 충신이며 효자였소.\" 손님이 부끄러워하며 물러갔다.", ["기지", "효", "충직"]], ["言語", 7, "荀慈明與汝南袁閬相見，問潁川人士，慈明先及諸兄。閬笑曰：「士但可因親舊而已乎？」慈明曰：「足下相難，依據者何經？」閬曰：「方問國士而及諸兄，是以尤之耳。」慈明曰：「昔者祁奚內舉不失其子，外舉不失其讎，以為至公。公旦文王之詩，不論堯舜之德，而頌文武者，親親之義也。春秋之義，內其國而外諸夏。且不愛其親而愛他人者，不為悖德乎？」", "순자명(荀慈明)이 여남(汝南)의 원랑(袁閬)과 만나 영천(潁川)의 인물을 묻자, 자명이 먼저 여러 형들을 거론했다. 원랑이 웃으며 말했다. \"인물이란 다만 친척과 옛 인연을 따라서만 거론할 수 있는 것인가?\" 자명이 말했다. \"그대가 나를 따지는데, 그 근거로 삼는 것은 어느 경전인가?\" 원랑이 말했다. \"나라의 빼어난 선비를 물었는데 여러 형들을 거론하니, 이 때문에 탓하는 것일 뿐이오.\" 자명이 말했다. \"옛날 기해(祁奚)는 안으로 천거하되 그 아들을 빠뜨리지 않았고, 밖으로 천거하되 그 원수를 빠뜨리지 않아 지극히 공정하다 여겨졌소. 주공 단(旦)이 문왕(文王)을 노래한 시에서 요순(堯舜)의 덕을 논하지 않고 문왕과 무왕을 기린 것은 친한 이를 친히 여기는 뜻이오. 『춘추(春秋)』의 뜻은 자기 나라를 안으로 삼고 여러 제후국을 밖으로 삼는 것이오. 또한 그 친족을 사랑하지 않고 남을 사랑하는 것은 덕을 거스르는 일이 아니겠소?\"", ["비평", "기지", "학문"]], ["言語", 8, "禰衡被魏武謫為鼓吏，正月半試鼓。衡揚枹為漁陽摻撾，淵淵有金石聲，四坐為之改容。孔融曰：「禰衡罪同胥靡，不能發明王之夢。」魏武慚而赦之。", "예형(禰衡)이 위 무제(魏武帝)에게 벌을 받아 북치는 관리가 되었다. 정월 보름에 북을 시험하는데, 예형이 북채를 들어 「어양삼과(漁陽摻撾)」를 연주하니, 깊고 깊어 쇠와 돌 같은 소리가 나서, 좌중이 모두 낯빛을 고쳤다. 공융(孔融)이 말했다. \"예형의 죄는 서미(胥靡)와 같으나, 영명한 임금의 꿈을 일깨우지는 못합니다.\" 위 무제가 부끄러워하며 그를 사면했다.", ["음악", "기지", "용기"]], ["言語", 9, "南郡龐士元聞司馬德操在潁川，故二千里候之。至，遇德操采桑，士元從車中謂曰：「吾聞丈夫處世，當帶金佩紫，焉有屈洪流之量，而執絲婦之事。」德操曰：「子且下車，子適知邪徑之速，不慮失道之迷。昔伯成耦耕，不慕諸侯之榮；原憲桑樞，不易有官之宅。何有坐則華屋，行則肥馬，侍女數十，然後為奇。此乃許、父所以忼慨，夷、齊所以長歎。雖有竊秦之爵，千駟之富，不足貴也！」士元曰：「僕生出邊垂，寡見大義。若不一叩洪鍾，伐雷鼓，則不識其音響也。」", "남군(南郡)의 방사원(龐士元)이 사마덕조(司馬德操)가 영천(潁川)에 있다는 말을 듣고, 일부러 이천 리 길을 가서 그를 찾아갔다. 이르러 보니 덕조가 뽕을 따고 있었다. 사원이 수레 안에서 말했다. \"제가 듣건대 대장부가 세상에 처할 때에는 마땅히 금인(金印)을 차고 자색 인끈을 매야 한다는데, 어찌 큰 강물 같은 도량을 굽혀 실을 잣는 아낙의 일을 하십니까?\" 덕조가 말했다. \"그대는 우선 수레에서 내리시오. 그대는 다만 지름길이 빠른 것만 알고 길을 잃고 헤맬 것은 생각하지 못하는구려. 옛날 백성(伯成)은 짝지어 밭을 갈며 제후의 영화를 흠모하지 않았고, 원헌(原憲)은 뽕나무로 지도리를 한 집에 살며 관직 있는 자의 집과 바꾸지 않았소. 어찌 앉으면 화려한 집, 다니면 살진 말, 시녀가 수십이라야 비로소 뛰어난 것이겠소. 이것이야말로 허유와 소부(巢父)가 개탄한 까닭이며, 백이와 숙제가 길이 탄식한 까닭이오. 비록 진(秦)을 훔친 작위와 사천 마리 말의 부를 가졌다 한들 귀히 여길 것이 못 되오!\" 사원이 말했다. \"저는 변방에 나서 자라 큰 도리를 본 것이 적습니다. 만약 큰 종을 한번 두드리고 우레 같은 북을 쳐보지 않았더라면 그 음향을 알지 못했을 것입니다.\"", ["은둔", "청빈", "비평"]], ["言語", 10, "劉公幹以失敬罹罪，文帝問曰：「卿何以不謹於文憲？」楨荅曰：「臣誠庸短，亦由陛下綱目不疏。」", "유공간(劉公幹)이 불경한 죄에 걸리자, 문제(文帝)가 물었다. \"경은 어찌하여 법령을 삼가지 않았는가?\" 유정(劉楨)이 대답했다. \"신이 진실로 어리석고 모자란 탓이오나, 또한 폐하의 기강과 법망이 성기지 않은 데에도 연유합니다.\"", ["기지", "권력"]], ["言語", 11, "鍾毓、鍾會少有令譽。年十三，魏文帝聞之，語其父鍾繇曰：「可令二子來。」於是敕見。毓面有汗，帝曰：「卿面何以汗？」毓對曰：「戰戰惶惶，汗出如漿。」復問會：「卿何以不汗？」對曰：「戰戰慄慄，汗不敢出。」", "종육(鍾毓)과 종회(鍾會)는 어려서부터 좋은 명성이 있었다. 나이 열셋 때, 위 문제(魏文帝)가 이를 듣고 그 아버지 종요(鍾繇)에게 말했다. \"두 아이를 오게 하라.\" 이에 명을 내려 만났다. 종육은 얼굴에 땀이 있었다. 황제가 말했다. \"경은 얼굴에 어찌 땀이 났는가?\" 종육이 대답했다. \"두렵고 두려워, 땀이 물처럼 흘러나옵니다.\" 다시 종회에게 물었다. \"경은 어찌하여 땀이 나지 않는가?\" 대답했다. \"떨리고 떨려, 땀이 감히 나오지 못합니다.\"", ["신동", "기지", "용기"]], ["言語", 12, "鍾毓兄弟小時，值父晝寢，因共偷服藥酒。其父時覺，且託寐以觀之。毓拜而後飲，會飲而不拜。既而問毓何以拜，毓曰：「酒以成禮，不敢不拜。」又問會何以不拜，會曰：「偷本非禮，所以不拜。」", "종육(鍾毓) 형제가 어렸을 때, 아버지가 낮잠을 자는 틈을 타 함께 약술을 훔쳐 마셨다. 그 아버지가 그때 깨어 있었으나, 잠든 척하며 그들을 살폈다. 종육은 절을 한 뒤에 마셨고, 종회(鍾會)는 마시되 절을 하지 않았다. 이윽고 종육에게 어찌 절을 했는지 묻자, 종육이 말했다. \"술은 예를 이루는 것이니, 감히 절하지 않을 수 없었습니다.\" 또 종회에게 어찌 절하지 않았는지 묻자, 종회가 말했다. \"훔치는 것은 본래 예가 아니므로, 절하지 않은 것입니다.\"", ["신동", "기지", "술과취흥"]], ["言語", 13, "魏明帝為外祖母築館於甄氏。既成，自行視，謂左右曰：「館當以何為名？」侍中繆襲曰：「陛下聖思齊於哲王；罔極過於曾、閔。此館之興，情鍾舅氏，宜以『渭陽』為名。」", "위 명제(魏明帝)가 외조모를 위해 견씨(甄氏)의 땅에 관(館)을 지었다. 완성되자 몸소 가서 둘러보고 좌우에게 말했다. \"이 관을 무엇이라 이름해야 하겠는가?\" 시중(侍中) 무습(繆襲)이 말했다. \"폐하의 성스러운 생각은 명철한 임금과 나란하고, 끝없는 효심은 증삼과 민자건보다 지나치십니다. 이 관을 세우심은 정이 외가에 모인 까닭이니, 마땅히 '위양(渭陽)'으로 이름함이 좋겠습니다.\"", ["효", "권력"]], ["言語", 14, "何平叔云：「服五石散，非唯治病，亦覺神明開朗。」", "하평숙(何平叔)이 말했다. \"오석산(五石散)을 복용하면 병을 다스릴 뿐 아니라, 또한 정신이 맑게 열리고 밝아짐을 느낀다.\"", ["병과늙음"]], ["言語", 15, "嵇中散語趙景真：「卿瞳子白黑分明，有白起之風，恨量小狹。」趙云：「尺表能審璣衡之度，寸管能測往復之氣；何必在大，但問識如何耳！」", "혜중산(嵇中散)이 조경진(趙景眞)에게 말했다. \"그대의 눈동자는 흑백이 분명하여 백기(白起)의 풍모가 있으나, 다만 도량이 좁은 것이 안타깝네.\" 조경진이 말했다. \"한 자짜리 해시계로도 천체의 운행 도수를 살필 수 있고, 한 치짜리 율관으로도 오가는 기운을 측정할 수 있습니다. 어찌 반드시 큰 데에 있겠습니까, 다만 식견이 어떠한가를 물을 따름입니다!\"", ["기지", "비평", "용모"]], ["言語", 16, "司馬景王東征，取上黨李喜，以為從事中郎。因問喜曰：「昔先公辟君不就，今孤召君，何以來？」喜對曰：「先公以禮見待，故得以禮進退；明公以法見繩，喜畏法而至耳！」", "사마경왕(司馬景王)이 동쪽을 정벌할 때, 상당(上黨)의 이희(李喜)를 데려와 종사중랑(從事中郞)으로 삼았다. 이에 이희에게 물었다. \"옛날 선친께서 그대를 불렀으나 나아오지 않았는데, 이제 내가 그대를 부르니 어찌하여 왔는가?\" 이희가 대답했다. \"선공께서는 예로써 대하셨으므로 예로써 나아가고 물러날 수 있었고, 명공께서는 법으로써 얽으시므로 저는 법을 두려워하여 왔을 따름입니다!\"", ["기지", "권력"]], ["言語", 17, "鄧艾口喫，語稱艾艾。晉文王戲之曰：「卿云艾艾，定是幾艾？」對曰：「鳳兮鳳兮，故是一鳳。」", "등애(鄧艾)는 말을 더듬어 자신을 일컬을 때 \"애애(艾艾)\"라고 했다. 진 문왕(晉文王)이 그를 놀려 말했다. \"경이 '애애'라 하니 도대체 몇 명의 애(艾)인가?\" 대답했다. \"'봉이여 봉이여(鳳兮鳳兮)' 하여도 본래 한 마리 봉(鳳)일 따름입니다.\"", ["기지", "병과늙음"]], ["言語", 18, "嵇中散既被誅，向子期舉郡計入洛，文王引進，問曰：「聞君有箕山之志，何以在此？」對曰：「巢、許狷介之士，不足多慕。」王大咨嗟。", "혜중산(嵇中散)이 이미 처형된 뒤, 향자기(向子期)가 군의 회계 보고를 가지고 낙양(洛陽)에 들어가니, 문왕(文王)이 그를 불러들여 물었다. \"듣건대 그대는 기산(箕山)의 뜻이 있다 하던데, 어찌하여 여기에 있는가?\" 대답했다. \"소부(巢父)와 허유(許由)는 고집스럽고 편협한 선비이니, 그다지 흠모할 만하지 못합니다.\" 문왕이 크게 감탄했다.", ["기지", "은둔", "권력"]], ["言語", 19, "晉武帝始登阼，探策得「一」。王者世數，繫此多少。帝既不說，羣臣失色，莫能有言者。侍中裴楷進曰：「臣聞天得一以清，地得一以寧，侯王得一以為天下貞。」帝說，羣臣歎服。", "진 무제(晉武帝)가 처음 즉위하여 점대를 뽑으니 '일(一)'을 얻었다. 왕조의 대수가 이 수의 많고 적음에 달려 있었다. 황제가 기뻐하지 않으니 신하들이 낯빛을 잃고 아무도 말하지 못했다. 시중(侍中) 배해(裴楷)가 나아가 말했다. \"신이 듣건대 하늘은 일(一)을 얻어 맑고, 땅은 일을 얻어 안정되며, 제후와 왕은 일을 얻어 천하를 바르게 한다 하였습니다.\" 황제가 기뻐하고 신하들이 탄복했다.", ["기지", "예언", "권력"]], ["言語", 20, "滿奮畏風。在晉武帝坐，北窗作琉璃屏，實密似疎，奮有難色。帝笑之。奮荅曰：「臣猶吳牛，見月而喘。」", "만분(滿奮)은 바람을 두려워했다. 진 무제(晉武帝)의 자리에 있을 때, 북쪽 창에 유리 병풍을 둘렀는데, 실제로는 빽빽하나 성긴 것처럼 보였다. 만분이 난처한 기색을 보이자 황제가 그를 비웃었다. 만분이 대답했다. \"신은 마치 오(吳) 땅의 소가 달을 보고도 헐떡이는 것과 같습니다.\"", ["기지", "용기"]], ["言語", 21, "諸葛靚在吳，於朝堂大會。孫皓問：「卿字仲思，為何所思？」對曰：「在家思孝，事君思忠，朋友思信，如斯而已。」", "제갈정(諸葛靚)이 오(吳)에 있을 때, 조정의 큰 모임에서 손호(孫皓)가 물었다. \"경의 자는 중사(仲思)인데, 무엇을 생각하는가?\" 대답했다. \"집에 있으면 효(孝)를 생각하고, 임금을 섬기면 충(忠)을 생각하며, 벗에게는 신(信)을 생각하니, 이와 같을 따름입니다.\"", ["기지", "충직", "효", "제갈씨"]], ["言語", 22, "蔡洪赴洛，洛中人問曰：「幕府初開，羣公辟命，求英奇於仄陋，采賢儁於巖穴。君吳楚之士，亡國之餘，有何異才，而應斯舉？」蔡荅曰：「夜光之珠，不必出於孟津之河；盈握之璧，不必采於崑崙之山。大禹生於東夷，文王生於西羌，聖賢所出，何必常處。昔武王伐紂，遷頑民於洛邑，得無諸君是其苗裔乎？」", "채홍(蔡洪)이 낙양(洛陽)에 가니, 낙양 사람이 물었다. \"막부(幕府)가 처음 열려 여러 공이 인재를 불러 명을 내려, 외지고 미천한 곳에서 빼어난 인재를 구하고 바위굴에서 어진 준재를 캐고 있소. 그대는 오초(吳楚)의 선비요 망한 나라의 남은 자인데, 무슨 남다른 재주가 있어 이 부름에 응하였소?\" 채홍이 대답했다. \"밤에 빛나는 구슬이 반드시 맹진(孟津)의 강에서 나오는 것은 아니며, 손에 가득 찰 만한 옥이 반드시 곤륜(崑崙)의 산에서 캐어지는 것은 아니오. 큰 우(禹)임금은 동이(東夷)에서 났고 문왕(文王)은 서강(西羌)에서 났으니, 성현이 나는 곳이 어찌 반드시 일정한 곳이겠소. 옛날 무왕(武王)이 주(紂)를 치고 완고한 백성을 낙읍(洛邑)으로 옮겼는데, 아마도 그대들이 그 후예가 아니겠소?\"", ["기지", "비평"]], ["言語", 23, "諸名士共至洛水戲。還，樂令問王夷甫曰：「今日戲樂乎？」王曰：「裴僕射善談名理，混混有雅致；張茂先論史漢，靡靡可聽；我與王安豐說延陵、子房，亦超超玄箸。」", "여러 명사가 함께 낙수(洛水)에 가서 노닐었다. 돌아오자 악령(樂令)이 왕이보(王夷甫)에게 물었다. \"오늘 노는 것이 즐거웠는가?\" 왕이보가 말했다. \"배복야(裴僕射)는 명리(名理)를 잘 논하여 도도히 흘러 우아한 운치가 있었고, 장무선(張茂先)은 『사기(史記)』와 『한서(漢書)』를 논하는데 거침없이 흘러 들을 만했으며, 나는 왕안풍(王安豐)과 더불어 연릉(延陵)과 자방(子房)을 이야기했는데, 또한 뛰어나게 현묘하였소.\"", ["청담", "비평", "풍류"]], ["言語", 24, "王武子、孫子荊、各言其土地人物之美。王云：「其地坦而平，其水淡而清，其人廉且貞。」孫云：「其山嶵巍以嵯峨，其水渫而揚波，其人磊呵而英多。」", "왕무자(王武子)와 손자형(孫子荊)이 각기 자기 고장의 산천과 인물의 아름다움을 말했다. 왕무자가 말했다. \"그 땅은 넓고 평평하며, 그 물은 맑고 깨끗하고, 그 사람들은 청렴하고 곧소.\" 손자형이 말했다. \"그 산은 우뚝 높이 솟아 험준하고, 그 물은 콸콸 흘러 물결을 일으키며, 그 사람들은 우뚝하고 호방하여 뛰어난 자가 많소.\"", ["비평", "자연과산수", "풍류"]], ["言語", 25, "樂令女適大將軍成都王穎。王兄長沙王執權於洛，遂構兵相圖。長沙王親近小人，遠外君子，凡在朝者，人懷危懼。樂令既允朝望，加有婚親，羣小讒於長沙。長沙嘗問樂令，樂令神色自若，徐荅曰：「豈以五男易一女？」由是釋然，無復疑慮。", "악령(樂令)의 딸이 대장군 성도왕(成都王) 영(穎)에게 시집갔다. 영의 형 장사왕(長沙王)이 낙양(洛陽)에서 권력을 잡고 있었는데, 마침내 군사를 일으켜 서로를 도모했다. 장사왕은 소인을 가까이하고 군자를 멀리하니, 무릇 조정에 있는 자가 사람마다 위태로움과 두려움을 품었다. 악령은 조정의 신망을 받고 있었던 데다가 혼인의 인연까지 있었으므로, 소인 무리가 장사왕에게 그를 참소했다. 장사왕이 일찍이 악령에게 묻자, 악령은 신색(神色)이 태연하여 천천히 대답했다. \"어찌 다섯 아들로써 딸 하나를 바꾸겠습니까?\" 이로 말미암아 의심이 풀려 다시는 의혹이 없었다.", ["도량", "여인", "권력"]], ["言語", 26, "陸機詣王武子，武子前置數斛羊酪，指以示陸曰：「卿江東何以敵此？」陸云：「有千里蓴羹，但未下鹽豉耳！」", "육기(陸機)가 왕무자(王武子)를 찾아갔는데, 왕무자가 앞에 양젖 치즈 몇 곡(斛)을 두고 그것을 가리키며 육기에게 보이며 말했다. \"그대의 강동(江東)에는 무엇으로 이것에 맞설 수 있겠소?\" 육기가 말했다. \"천 리에 이름난 순챗국이 있으니, 다만 소금과 콩장을 넣지 않았을 뿐이오!\"", ["기지", "비평"]], ["言語", 27, "中朝有小兒，父病，行乞藥。主人問病，曰：「患瘧也。」主人曰：「尊侯明德君子，何以病瘧？」荅曰：「來病君子，所以為瘧耳。」", "중조(中朝)에 한 아이가 있었는데, 아버지가 병들어 약을 구하러 다녔다. 주인이 병을 묻자 말했다. \"학질을 앓으십니다.\" 주인이 말했다. \"네 부친은 밝은 덕을 지닌 군자이신데 어찌하여 학질을 앓으시는가?\" 대답했다. \"군자에게 와서 병을 일으키니, 그래서 학질(虐)이라 하는 것입니다.\"", ["신동", "기지", "효"]], ["言語", 28, "崔正熊詣都郡。都郡將姓陳，問正熊：「君去崔杼幾世？」荅曰：「民去崔杼，如明府之去陳恆。」", "최정웅(崔正熊)이 도군(都郡)에 갔다. 도군의 장관은 성이 진(陳)이었는데, 정웅에게 물었다. \"그대는 최저(崔杼)와 몇 대나 떨어졌는가?\" 대답했다. \"제가 최저와 떨어진 것은, 명부(明府)께서 진항(陳恆)과 떨어진 것과 같습니다.\"", ["기지", "비평"]], ["言語", 29, "元帝始過江，謂顧驃騎曰：「寄人國土，心常懷慚。」榮跪對曰：「臣聞王者以天下為家，是以耿、亳無定處，九鼎遷洛邑。願陛下勿以遷都為念。」", "원제(元帝)가 처음 강을 건넜을 때 고표기(顧驃騎)에게 말했다. \"남의 나라 땅에 의탁하니 마음에 늘 부끄러움을 품는다.\" 고영(顧榮)이 꿇어앉아 대답했다. \"신이 듣건대 왕 된 자는 천하를 집으로 삼는다 하니, 그러므로 경(耿)과 박(亳)에도 정해진 곳이 없었고 구정(九鼎)도 낙읍(洛邑)으로 옮겨졌습니다. 바라건대 폐하께서는 도읍을 옮긴 것을 마음에 두지 마소서.\"", ["기지", "권력", "충직"]], ["言語", 30, "庾公造周伯仁。伯仁曰：「君何所欣說而忽肥？」庾曰：「君復何所憂慘而忽瘦？」伯仁曰：「吾無所憂，直是清虛日來，滓穢日去耳。」", "유공(庾亮)이 주백인(周顗)을 찾아갔다. 백인이 말하였다. \"그대는 무엇이 그리 기쁘고 즐거워 갑자기 살이 쪘소?\" 유공이 말하였다. \"그대야말로 무엇이 그리 근심스럽고 슬퍼서 갑자기 야위었소?\" 백인이 말하였다. \"나는 근심하는 바가 없소. 다만 맑고 빈 기운(淸虛)이 날로 다가오고, 찌꺼기와 더러움이 날로 떠나갈 뿐이오.\"", ["청담", "비평", "용모"]], ["言語", 31, "過江諸人，每至美日，輒相邀新亭，藉卉飲宴。周侯中坐而歎曰：「風景不殊，正自有山河之異！」皆相視流淚。唯王丞相愀然變色曰：「當共勠力王室，克復神州，何至作楚囚相對？」", "강을 건너온 사람들은 좋은 날이 될 때마다 서로 신정(新亭)으로 불러 모여 풀밭에 자리를 깔고 술자리를 베풀었다. 주후(周顗)가 좌중에서 탄식하며 말하였다. \"풍경은 다르지 않은데, 다만 산하의 다름이 있을 뿐이로구나!\" 모두 서로 바라보며 눈물을 흘렸다. 오직 왕승상(王導)만이 정색하며 안색을 바꾸어 말하였다. \"마땅히 함께 왕실을 위해 힘을 다하여 신주(神州)를 되찾아야 할 것이거늘, 어찌 초나라 포로처럼 서로 마주하고만 있는가?\"", ["충직", "죽음", "권력"]], ["言語", 32, "衛洗馬初欲渡江，形神慘顇，語左右云：「見此芒芒，不覺百端交集。苟未免有情，亦復誰能遣此！」", "위세마(衛玠)가 처음 강을 건너려 할 적에, 모습과 정신이 참담하고 초췌하였는데, 곁의 사람들에게 말하였다. \"이 아득함을 보니, 나도 모르게 온갖 감회가 한데 얽힌다. 진실로 정(情)을 면치 못한다면, 또한 누구인들 이를 떨쳐낼 수 있겠는가!\"", ["용모", "풍류", "죽음"]], ["言語", 33, "顧司空未知名，詣王丞相。丞相小極，對之疲睡。顧思所以叩會之，因謂同坐曰：「昔每聞元公道公協贊中宗，保全江表，體小不安，令人喘息。」丞相因覺，謂顧曰：「此子珪璋特達，機警有鋒。」", "고사공(顧愷之)이 아직 이름이 알려지지 않았을 때, 왕승상(王導)을 찾아갔다. 승상은 조금 피곤하여 그를 마주하고 졸았다. 고씨는 그를 깨워 어울릴 방도를 생각하여, 같이 앉은 이에게 일러 말하였다. \"예전에 늘 듣건대 원공(元公)께서 공이 중종(中宗)을 도와 강표(江表)를 보전하셨다고 하셨는데, 몸이 조금 편치 않으시니 사람을 숨 막히게 하는구려.\" 승상이 이에 깨어나 고씨에게 말하였다. \"이 사람은 규장(珪璋)처럼 특출하고, 기민하며 날카로움이 있구나.\"", ["기지", "비평", "권력"]], ["言語", 34, "會稽賀生，體識清遠，言行以禮。不徒東南之美，實為海內之秀。", "회계(會稽)의 하생(賀生)은 식견이 맑고 원대하며, 언행이 예(禮)에 맞았다. 한갓 동남 지방의 빼어난 인물일 뿐 아니라, 실로 천하의 빼어난 인물이었다.", ["비평", "용모"]], ["言語", 35, "劉琨雖隔閡寇戎，志存本朝，謂溫嶠曰：「班彪識劉氏之復興，馬援知漢光之可輔。今晉阼雖衰，天命未改。吾欲立功於河北，使卿延譽於江南。子其行乎？」溫曰：「嶠雖不敏，才非昔人，明公以桓、文之姿，建匡立之功，豈敢辭命！」", "유곤(劉琨)은 비록 오랑캐 군사에 의해 막혀 있었으나, 뜻은 본조(本朝)에 있었다. 온교(溫嶠)에게 말하였다. \"반표(班彪)는 유씨(劉氏)가 다시 일어날 것을 알아보았고, 마원(馬援)은 한 광무제를 도울 만함을 알았소. 지금 진(晉)의 황위가 비록 쇠하였으나 천명은 아직 바뀌지 않았소. 나는 하북에서 공을 세우고, 그대로 하여금 강남에서 명성을 떨치게 하고자 하오. 그대는 가겠소?\" 온교가 말하였다. \"제가 비록 영민하지 못하고 재주가 옛사람만 못하나, 명공께서 환공·문공의 자질로 바로잡아 세우는 공을 세우려 하시니, 어찌 감히 명을 사양하겠습니까!\"", ["충직", "권력", "우정"]], ["言語", 36, "溫嶠初為劉琨使來過江。于時江左營建始爾，綱紀未舉。溫新至，深有諸慮。既詣王丞相，陳主上幽越，社稷焚滅，山陵夷毀之酷，有黍離之痛。溫忠慨深烈，言與泗俱，丞相亦與之對泣。敘情既畢，便深自陳結，丞相亦厚相酬納。既出，懽然言曰：「江左自有管夷吾，此復何憂？」", "온교(溫嶠)가 처음 유곤(劉琨)의 사신이 되어 강을 건너왔다. 이때 강좌(江左)에서 막 나라를 세우기 시작하던 무렵이라, 기강이 아직 서지 못하였다. 온교가 갓 도착하여 깊이 여러 근심을 품었다. 왕승상(王導)을 찾아가서, 임금이 유폐되고 사직이 불타 멸하며 산릉이 헐어 무너진 참혹함을 진술하니, 망국을 슬퍼하는 「서리(黍離)」의 아픔이 있었다. 온교는 충성스러운 강개함이 깊고 격렬하여, 말과 눈물이 함께 쏟아졌고, 승상 또한 그와 마주하여 울었다. 정을 다 펴고 나서 곧 깊이 스스로 마음을 맺어 의탁하니, 승상 또한 두텁게 그를 받아들였다. 나오고 나서 기뻐하며 말하였다. \"강좌에 절로 관이오(管夷吾)가 있으니, 다시 무엇을 근심하겠는가?\"", ["충직", "권력", "죽음"]], ["言語", 37, "王敦兄含為光祿勳。敦既逆謀，屯據南州，含委職奔姑孰。王丞相詣闕謝。司徒、丞相、揚州官僚問訊，倉卒不知何辭。顧司空時為揚州別駕，援翰曰：「王光祿遠避流言，明公蒙塵路次，羣下不寧，不審尊體起居何如？」", "왕돈(王敦)의 형 왕함(王含)이 광록훈(光祿勳)이 되었다. 왕돈이 이미 반역을 꾀하여 남주(南州)에 진을 치고 점거하자, 왕함은 직책을 버리고 고숙(姑孰)으로 달아났다. 왕승상(王導)이 궁궐에 나아가 사죄하였다. 사도(司徒)·승상·양주(揚州)의 관료들이 안부를 물으려는데, 창졸간이라 무슨 말을 해야 할지 몰랐다. 고사공(顧愷之)이 그때 양주별가(揚州別駕)였는데, 붓을 잡고 적었다. \"왕광록(王含)께서는 멀리 떠도는 말을 피하셨고, 명공께서는 길가에서 풍진을 무릅쓰시니, 아랫사람들이 편안치 못합니다. 살피지 못하겠으니 존체의 기거가 어떠하신지요?\"", ["기지", "권력", "충직"]], ["言語", 38, "郗太尉拜司空，語同坐曰：「平生意不在多，值世故紛紜，遂至台鼎。朱博翰音，實愧於懷。」", "치태위(郗鑒)가 사공(司空)에 임명되자, 같이 앉은 이에게 말하였다. \"평생 뜻이 많은 데 있지 않았는데, 세상의 변고가 어지러운 때를 만나 마침내 삼공(三公)의 자리에 이르렀소. 주박(朱博)의 '날개 소리뿐인 명성'처럼 실로 마음에 부끄럽소.\"", ["겸손", "권력"]], ["言語", 39, "高坐道人不作漢語，或問此意，簡文曰：「以簡應對之煩。」", "고좌도인(高坐道人)은 한어(漢語)를 쓰지 않았는데, 누군가 그 까닭을 묻자, 간문제(簡文帝)가 말하였다. \"응대의 번거로움을 줄이려는 것이오.\"", ["기지", "겸손"]], ["言語", 40, "周僕射雍容好儀形，詣王公，初下車，隱數人，王公含笑看之。既坐，傲然嘯詠。王公曰：「卿欲希嵇、阮邪？」荅曰：「何敢近舍明公，遠希嵇、阮！」", "주복야(周顗)는 의젓하고 풍채가 좋았다. 왕공(王導)을 찾아갔는데, 막 수레에서 내려 몇 사람에게 기대고 있었고, 왕공은 미소 지으며 그를 바라보았다. 자리에 앉고 나서 오만하게 휘파람을 불며 시를 읊었다. 왕공이 말하였다. \"그대는 혜강(嵇康)·완적(阮籍)을 사모하려는 것이오?\" 대답하였다. \"어찌 감히 가까이 계신 명공을 버려두고, 멀리 혜강·완적을 사모하겠습니까!\"", ["오만", "용모", "기지"]], ["言語", 41, "庾公嘗入佛圖，見臥佛，曰：「此子疲於津梁。」于時以為名言。", "유공(庾亮)이 일찍이 절에 들어가 누운 부처상을 보고 말하였다. \"이 사람은 중생을 건네주는 일에 지쳤구나.\" 당시에 이를 명언이라 여겼다.", ["기지", "풍류"]], ["言語", 42, "摯瞻曾作四郡太守，大將軍戶曹參軍，復出作內史，年始二十九。嘗別王敦，敦謂瞻曰：「卿年未三十，已為萬石，亦太蚤。」瞻曰：「方於將軍，少為太蚤；比之甘羅，已為太老。」", "지첨(摯瞻)은 일찍이 네 군의 태수와 대장군 호조참군(戶曹參軍)을 지내고, 다시 나가 내사(內史)가 되었는데, 나이가 겨우 스물아홉이었다. 일찍이 왕돈(王敦)과 작별할 적에, 왕돈이 지첨에게 말하였다. \"그대는 나이 서른도 안 되어 이미 만석(萬石)에 이르렀으니, 또한 너무 이르오.\" 지첨이 말하였다. \"장군에 견주면 다소 너무 이르나, 감라(甘羅)에 비기면 이미 너무 늙었습니다.\"", ["기지", "권력", "오만"]], ["言語", 43, "梁國楊氏子，九歲，甚聰惠。孔君平詣其父，父不在，乃呼兒出，為設果。果有楊梅，孔指以示兒曰：「此是君家果。」兒應聲荅曰：「未聞孔雀是夫子家禽。」", "양(梁)나라의 양씨네 아들이 아홉 살인데 매우 총명하였다. 공군평(孔君平)이 그 아버지를 찾아갔으나 아버지가 없자, 아이를 불러 내오게 하니, 아이가 과일을 차려 내었다. 과일 중에 양매(楊梅)가 있었는데, 공군평이 그것을 가리켜 아이에게 보이며 말하였다. \"이것은 너희 집안의 과일이로구나.\" 아이가 말소리에 응하여 대답하였다. \"공작(孔雀)이 선생님 집안의 새라는 말은 들어보지 못했습니다.\"", ["신동", "기지"]], ["言語", 44, "孔廷尉以裘與從弟沈，沈辭不受。廷尉曰：「晏平仲之儉，祠其先人，豚肩不掩豆，猶狐裘數十年，卿復何辭此？」於是受而服之。", "공정위(孔廷尉)가 종제(從弟)인 침(沈)에게 갖옷을 주었으나, 침이 사양하며 받지 않았다. 정위가 말하였다. \"안평중(晏平仲)은 검소하여 그 선조를 제사 지낼 때 돼지 어깨살이 제기를 덮지 못할 정도였으나, 그래도 여우 갖옷을 수십 년이나 입었거늘, 그대는 또 무엇 때문에 이를 사양하는가?\" 이에 받아서 입었다.", ["거절", "청빈", "베풂"]], ["言語", 45, "佛圖澄與諸石遊，林公曰：「澄以石虎為海鷗鳥。」", "불도징(佛圖澄)이 여러 석씨(石氏)와 어울렸는데, 임공(支遁)이 말하였다. \"불도징은 석호(石虎)를 바닷가의 갈매기로 여긴 것이다.\"", ["비평", "지혜"]], ["言語", 46, "謝仁祖年八歲，謝豫章將送客，爾時語已神悟，自參上流。諸人咸共歎之曰：「年少一坐之顏回。」仁祖曰：「坐無尼父，焉別顏回？」", "사인조(謝尚)가 여덟 살 때, 사예장(謝鯤)이 손님을 배웅하려 하였다. 그때 사상은 말이 이미 신묘하게 깨달아, 스스로 상류 인물들 사이에 끼어 있었다. 사람들이 모두 함께 그를 탄복하여 말하였다. \"나이 어린 좌중의 안회(顏回)로구나.\" 사상이 말하였다. \"좌중에 공자(尼父)가 없으니, 어찌 안회를 알아보겠습니까?\"", ["신동", "기지"]], ["言語", 47, "陶公疾篤，都無獻替之言，朝士以為恨。仁祖聞之曰：「時無豎刁，故不貽陶公話言。」時賢以為德音。", "도공(陶侃)이 병이 깊었는데, 도무지 정사를 보필할 말을 남기지 않으니, 조정의 인사들이 이를 한스럽게 여겼다. 사인조(謝尚)가 이를 듣고 말하였다. \"이 시대에 수조(豎刁) 같은 자가 없었던 까닭에, 도공이 남길 말을 끼치지 않은 것이다.\" 당시의 현인들이 이를 덕스러운 말이라 여겼다.", ["죽음", "비평", "지혜"]], ["言語", 48, "竺法深在簡文坐，劉尹問：「道人何以游朱門？」荅曰：「君自見其朱門，貧道如游蓬戶。」或云卞令。", "축법심(竺法深)이 간문제(簡文帝)의 자리에 있었는데, 유윤(劉惔)이 물었다. \"도인은 어찌하여 붉은 대문(권문세가)을 드나드시오?\" 대답하였다. \"그대 스스로 그것을 붉은 대문으로 보는 것이지, 빈도(貧道)에게는 쑥대 사립문을 드나드는 것과 같소.\" 혹은 변령(卞令)이라고도 한다.", ["기지", "은둔", "청빈"]], ["言語", 49, "孫盛為庾公記室參軍，從獵，將其二兒俱行。庾公不知，忽於獵場見齊莊，時年七八歲。庾謂曰：「君亦復來邪？」應聲荅曰：「所謂『無小無大，從公于邁』。」", "손성(孫盛)이 유공(庾亮)의 기실참군(記室參軍)이 되어 사냥을 따라갔는데, 그 두 아들을 데리고 함께 갔다. 유공은 그것을 몰랐다가, 문득 사냥터에서 제장(齊莊)을 보았는데, 그때 나이가 일고여덟이었다. 유공이 일러 말하였다. \"너도 또한 왔느냐?\" 말소리에 응하여 대답하였다. \"이른바 '작은 이도 큰 이도 없이, 공을 따라 가도다'라는 것입니다.\"", ["신동", "기지"]], ["言語", 50, "孫齊由、齊莊二人小時詣庾公，公問：「齊由何字？」荅曰：「字齊由。」公曰：「欲何齊邪？」曰：「齊許由。」「齊莊何字？」荅曰：「字齊莊。」公曰：「欲何齊？」曰：「齊莊周。」公曰：「何不慕仲尼而慕莊周？」對曰：「聖人生知，故難企慕。」庾公大喜小兒對。", "손제유(孫齊由)·손제장(孫齊莊) 두 사람이 어렸을 때 유공(庾亮)을 찾아갔다. 유공이 물었다. \"제유의 자(字)는 무엇이냐?\" 대답하였다. \"자가 제유입니다.\" 유공이 말하였다. \"무엇과 나란히 하려는 것이냐?\" 말하였다. \"허유(許由)와 나란히 하려는 것입니다.\" \"제장의 자는 무엇이냐?\" 대답하였다. \"자가 제장입니다.\" 유공이 말하였다. \"무엇과 나란히 하려는 것이냐?\" 말하였다. \"장주(莊周)와 나란히 하려는 것입니다.\" 유공이 말하였다. \"어찌 중니(仲尼)를 사모하지 않고 장주를 사모하느냐?\" 대답하였다. \"성인(聖人)은 나면서부터 아는 분이라, 우러러 사모하기 어렵습니다.\" 유공은 어린아이의 대답을 크게 기뻐하였다.", ["신동", "기지", "은둔"]], ["言語", 51, "張玄之、顧敷，是顧和中外孫，皆少而聰惠。和並知之，而常謂顧勝，親重偏至，張頗不懕。于時張年九歲，顧年七歲，和與俱至寺中。見佛般泥洹像，弟子有泣者，有不泣者，和以問二孫。玄謂「被親故泣，不被親故不泣」。敷曰：「不然，當由忘情故不泣，不能忘情故泣。」", "장현지(張玄之)와 고부(顧敷)는 고화(顧和)의 안팎 외손자인데, 모두 어리면서도 총명하였다. 고화는 둘 다 알아주었으나, 늘 고부가 낫다고 여겨 친애하고 소중히 여김이 한쪽으로 치우쳤으므로, 장현지는 자못 흡족해하지 않았다. 그때 장현지는 아홉 살, 고부는 일곱 살이었는데, 고화가 그들과 함께 절에 이르렀다. 부처가 열반(般泥洹)에 드는 상을 보니, 제자 중에 우는 자도 있고 울지 않는 자도 있었다. 고화가 두 손자에게 이를 물었다. 장현지는 \"사랑을 받았으므로 울고, 사랑을 받지 못했으므로 울지 않는 것입니다\"라고 하였다. 고부가 말하였다. \"그렇지 않습니다. 마땅히 정(情)을 잊었으므로 울지 않고, 정을 잊지 못했으므로 우는 것입니다.\"", ["신동", "지혜", "청담"]], ["言語", 52, "庾法畼造庾太尉，握麈尾至佳，公曰：「此至佳，那得在？」法畼曰：「廉者不求，貪者不與，故得在耳。」", "유법창(庾法畼)이 유태위(庾亮)를 찾아갔는데, 잡고 있던 주미(麈尾)가 매우 훌륭하였다. 유공이 말하였다. \"이것이 매우 훌륭한데, 어찌하여 아직 남아 있소?\" 법창이 말하였다. \"청렴한 자는 구하지 않고, 탐욕스러운 자에게는 주지 않으므로, 남아 있을 수 있는 것입니다.\"", ["기지", "청빈"]], ["言語", 53, "庾穉恭為荊州，以毛扇上武帝。武帝疑是故物。侍中劉劭曰：「柏梁雲構，工匠先居其下；管弦繁奏，鍾夔先聽其音。穉恭上扇，以好不以新。」庾後聞之曰：「此人宜在帝左右。」", "유치공(庾翼)이 형주(荊州)에 있을 때, 깃털 부채를 무제(武帝)에게 바쳤다. 무제는 그것이 헌 물건이 아닌가 의심하였다. 시중(侍中) 유소(劉劭)가 말하였다. \"백량대(柏梁臺)가 구름까지 솟은 누각도 공장(工匠)이 먼저 그 아래에 거하였고, 관현악이 번다하게 연주됨에도 종(鍾)과 기(夔)가 먼저 그 소리를 들었습니다. 치공이 부채를 바친 것은 좋은 까닭이지 새것이라서가 아닙니다.\" 유치공이 뒤에 이를 듣고 말하였다. \"이 사람은 마땅히 임금의 곁에 있어야 한다.\"", ["기지", "비평", "권력"]], ["言語", 54, "何驃騎亡後，徵褚公入。既至石頭，王長史、劉尹同詣褚。褚曰：「真長何以處我？」真長顧王曰：「此子能言。」褚因視王，王曰：「國自有周公。」", "하표기(何驃騎)가 죽은 뒤, 저공(褚公)을 불러들였다. 석두(石頭)에 이르자, 왕장사(王濛)와 유윤(劉惔)이 함께 저공을 찾아갔다. 저공이 말하였다. \"진장(劉惔)은 나를 어떻게 처우하겠소?\" 진장이 왕몽을 돌아보니, 저공은 \"이 사람이 말을 잘하오\"라고 하였다. 저공이 이에 왕몽을 바라보니, 왕몽이 말하였다. \"나라에 절로 주공(周公)이 있습니다.\"", ["비평", "기지"]], ["言語", 55, "桓公北征經金城，見前為琅邪時種柳，皆已十圍，慨然曰：「木猶如此，人何以堪！」攀枝執條，泫然流淚。", "환공(桓溫)이 북정(北征)에 나서 금성(金城)을 지나다가, 전에 낭야(琅邪)에 있을 때 심었던 버드나무가 모두 이미 열 아름이나 된 것을 보고, 감개하여 말하였다. \"나무가 이러하거늘, 사람이 어찌 견디겠는가!\" 가지를 잡고 줄기를 만지며 줄줄 눈물을 흘렸다.", ["풍류", "병과늙음", "자연과산수"]], ["言語", 56, "簡文作撫軍時，嘗與桓宣武俱入朝，更相讓在前。宣武不得已而先之，因曰：「伯也執殳，為王前驅。」簡文曰：「所謂『無小無大，從公于邁』。」", "간문제(簡文帝)가 무군(撫軍)으로 있을 때, 일찍이 환선무(桓溫)와 함께 입조하면서, 서로 앞에 서기를 양보하였다. 환선무가 부득이하여 먼저 나아가며 말하였다. \"형이 창을 잡고 임금의 선봉이 되도다.\" 간문제가 말하였다. \"이른바 '작은 이도 큰 이도 없이, 공을 따라 가도다'라는 것이오.\"", ["겸손", "기지", "권력"]], ["言語", 57, "顧悅與簡文同年，而髮蚤白。簡文曰：「卿何以先白？」對曰：「蒲柳之姿，望秋而落；松柏之質，經霜彌茂。」", "고열(顧悅)은 간문제(簡文帝)와 같은 나이였으나 머리가 일찍 세었다. 간문제가 말하였다. \"그대는 어찌하여 먼저 세었소?\" 대답하였다. \"갯버들의 자태는 가을을 바라보고 잎이 떨어지지만, 소나무·잣나무의 자질은 서리를 겪고도 더욱 무성합니다.\"", ["기지", "병과늙음", "비평"]], ["言語", 58, "桓公入峽，絕壁天懸，騰波迅急。迺歎曰：「既為忠臣，不得為孝子，如何？」", "환공(桓溫)이 협곡에 들어가니, 깎아지른 벼랑이 하늘에 매달린 듯하고 출렁이는 물결이 세차고 급하였다. 이에 탄식하여 말하였다. \"이미 충신이 되었으니 효자가 될 수 없구나. 어찌하랴?\"", ["충직", "효", "자연과산수"]], ["言語", 59, "初，熒惑入太微，尋廢海西。簡文登阼，復入太微，帝惡之。時郗超為中書在直。引超入曰：「天命脩短，故非所計，政當無復近日事不？」超曰：「大司馬方將外固封疆，內鎮社稷，必無若此之慮。臣為陛下以百口保之。」帝因誦庾仲初詩曰：「志士痛朝危，忠臣哀主辱。」聲甚悽厲。郗受假還東，帝曰：「致意尊公，家國之事，遂至於此！由是身不能以道匡衛，思患預防，愧歎之深，言何能喻？」因泣下流襟。", "처음에 형혹성(熒惑星)이 태미원(太微垣)에 들어가더니, 얼마 안 되어 해서공(海西公)이 폐위되었다. 간문제(簡文帝)가 즉위하자 다시 형혹성이 태미원에 들어가니, 임금이 이를 싫어하였다. 그때 치초(郗超)가 중서(中書)로 당직을 서고 있었다. 치초를 불러들여 말하였다. \"천명의 길고 짧음은 본디 헤아릴 바가 아니지만, 정말 다시 근래의 일(폐위) 같은 것은 없겠소?\" 치초가 말하였다. \"대사마(桓溫)는 바야흐로 밖으로는 변경을 굳건히 하고 안으로는 사직을 진정시키려 하니, 반드시 그러한 염려는 없을 것입니다. 신이 폐하를 위해 온 집안 백 식구를 걸고 보증하겠습니다.\" 임금이 이에 유중초(庾仲初)의 시를 읊었다. \"뜻있는 선비는 조정의 위태로움을 아파하고, 충신은 임금의 욕됨을 슬퍼하노라.\" 그 소리가 매우 처량하고 격렬하였다. 치초가 휴가를 받아 동쪽으로 돌아가게 되니, 임금이 말하였다. \"존공(尊公)께 내 뜻을 전하시오. 나라와 집안의 일이 마침내 이 지경에 이르렀소! 이로 말미암아 이 몸이 도(道)로써 바로잡아 지키지 못하고, 환난을 미리 헤아려 막지 못하였으니, 부끄럽고 한탄스러움이 깊어 말로 어찌 다 표현하겠소?\" 그러고는 눈물이 옷깃을 적시며 흘러내렸다.", ["예언", "충직", "권력"]], ["言語", 60, "簡文在暗室中坐，召宣武。宣武至，問上何在？簡文曰：「某在斯。」時人以為能。", "간문제(簡文帝)가 어두운 방 안에 앉아서 환선무(桓溫)를 불렀다. 환선무가 와서 임금이 어디 계신지 물었다. 간문제가 말하였다. \"아무개가 여기 있소.\" 당시 사람들이 이를 능하다고 여겼다.", ["기지", "권력"]], ["言語", 61, "簡文入華林園，顧謂左右曰：「會心處，不必在遠。翳然林水，便自有濠、濮閒想也。覺鳥獸禽魚，自來親人。」", "간문제(簡文帝)가 화림원(華林園)에 들어가, 곁의 사람들을 돌아보며 말하였다. \"마음에 드는 곳은 반드시 먼 데 있는 것이 아니다. 그윽한 숲과 물이 있으면 저절로 호수(濠水)·복수(濮水)에서의 상상이 떠오른다. 새와 짐승, 물고기가 절로 와서 사람을 친근히 함을 깨닫는다.\"", ["자연과산수", "은둔", "풍류"]], ["言語", 62, "謝太傅語王右軍曰：「中年傷於哀樂，與親友別，輒作數日惡。」王曰：「年在桑榆，自然至此，正賴絲竹陶寫。恆恐兒輩覺，損欣樂之趣。」", "사태부(謝安)가 왕우군(王羲之)에게 말하였다. \"중년에는 슬픔과 즐거움에 상하여, 친한 벗과 작별하면 번번이 며칠을 언짢게 지내게 되오.\" 왕우군이 말하였다. \"나이가 늘그막(桑榆)에 이르면 자연히 이러한 지경에 이르니, 다만 음악에 기대어 마음을 풀어낼 뿐이오. 늘 아이들이 알아채어 즐거워하는 흥취를 덜까 두렵소.\"", ["우정", "음악", "병과늙음"]], ["言語", 63, "支道林常養數匹馬。或言，道人畜馬不韻，支曰：「貧道重其神駿。」", "지도림(支遁)이 늘 말 몇 마리를 길렀다. 누군가 말하기를, 도인이 말을 기르는 것은 운치가 없다고 하니, 지도림이 말하였다. \"빈도(貧道)는 그 신묘한 준마됨을 소중히 여기는 것이오.\"", ["풍류", "비평"]], ["言語", 64, "劉尹與桓宣武共聽講禮記。桓云：「時有入心處，便覺咫尺玄門。」劉曰：「此未關至極，自是金華殿之語。」", "유윤(劉惔)이 환선무(桓溫)와 함께 『예기(禮記)』 강의를 들었다. 환선무가 말하였다. \"때로 마음에 와닿는 곳이 있으니, 곧 현묘한 문(玄門)이 지척에 있는 듯하오.\" 유윤이 말하였다. \"이는 지극한 경지에는 미치지 못하니, 본디 금화전(金華殿)의 이야기일 뿐이오.\"", ["청담", "비평"]], ["言語", 65, "羊秉為撫軍參軍，少亡，有令譽。夏侯孝若為之敘，極相讚悼。羊權為黃門侍郎，侍簡文坐。帝問曰：「夏侯湛作羊秉敘絕可想。是卿何物？有後不？」權潸然對曰：「亡伯令問夙彰，而無有繼嗣。雖名播天聽，然胤絕聖世。」帝嗟慨久之。", "양병(羊秉)이 무군참군(撫軍參軍)이 되었는데, 젊어서 죽었으나 아름다운 명성이 있었다. 하후효약(夏侯孝若)이 그를 위해 서문을 지어 지극히 칭송하고 애도하였다. 양권(羊權)이 황문시랑(黃門侍郎)이 되어 간문제(簡文帝)의 자리를 모시고 있었다. 임금이 물었다. \"하후담(夏侯湛)이 지은 양병의 서문은 매우 흠모할 만하오. 그는 그대에게 무슨 사이요? 후사가 있소?\" 양권이 눈물을 흘리며 대답하였다. \"돌아가신 백부의 아름다운 명망은 일찍이 드러났으나 후사를 잇지 못하였습니다. 비록 이름이 하늘(임금)의 귀에까지 퍼졌으나, 성스러운 시대에 자손이 끊어졌습니다.\" 임금이 한참 동안 탄식하고 슬퍼하였다.", ["죽음", "비평", "권력"]], ["言語", 66, "王長史與劉真長別後相見，王謂劉曰：「卿更長進。」荅曰：「此若天之自高耳。」", "왕장사(王濛)가 유진장(劉惔)과 작별한 뒤 서로 만났을 때, 왕장사가 유진장에게 말하였다. \"그대는 더욱 진보하였소.\" 대답하였다. \"이는 마치 하늘이 절로 높은 것과 같을 뿐이오.\"", ["비평", "겸손"]], ["言語", 67, "劉尹云：「人想王荊產佳，此想長松下當有清風耳。」", "유윤(劉惔)이 말하였다. \"사람들은 왕형산(王荊産)이 훌륭하다고 상상하는데, 이는 키 큰 소나무 아래에는 마땅히 맑은 바람이 있으리라 상상하는 것일 뿐이오.\"", ["비평", "풍류"]], ["言語", 68, "王仲祖聞蠻語不解，茫然曰：「若使介葛盧來朝，故當不昧此語。」", "왕중조(王濛)가 만족(蠻族)의 말을 듣고 알아듣지 못하자 멍하니 말하였다. \"만약 개갈로(介葛盧)를 시켜 조회하러 오게 한다면, 응당 이 말에 어둡지는 않을 것이다.\"", ["기지", "학문"]], ["言語", 69, "劉真長為丹陽尹，許玄度出都就劉宿。牀帷新麗，飲食豐甘。許曰：「若保全此處，殊勝東山。」劉曰：「卿若知吉凶由人，吾安得不保此！」王逸少在坐曰：「令巢、許遇稷、契，當無此言。」二人並有愧色。", "유진장(劉惔)이 단양윤(丹陽尹)이 되었을 때, 허현도(許詢)가 도성으로 나와 유진장에게 가서 묵었다. 침상의 휘장이 새로 곱고, 음식이 풍성하고 맛있었다. 허현도가 말하였다. \"만약 이런 곳을 늘 누릴 수 있다면, 동산(東山)보다 훨씬 낫겠소.\" 유진장이 말하였다. \"그대가 길흉이 사람에게 달려 있음을 안다면, 내 어찌 이를 누리지 못하겠소!\" 왕일소(王羲之)가 자리에 있다가 말하였다. \"소부(巢父)와 허유(許由)로 하여금 직(稷)과 설(契)을 만나게 하였다면, 응당 이런 말은 없었을 것이오.\" 두 사람은 모두 부끄러운 기색이 있었다.", ["은둔", "사치", "비평"]], ["言語", 70, "王右軍與謝太傅共登冶城。謝悠然遠想，有高世之志。王謂謝曰：「夏禹勤王，手足胼胝；文王旰食，日不暇給。今四郊多壘，宜人人自效。而虛談廢務，浮文妨要，恐非當今所宜。」謝荅曰：「秦任商鞅，二世而亡，豈清言致患邪？」", "왕우군(王羲之)이 사태부(謝安)와 함께 야성(冶城)에 올랐다. 사안이 유연히 멀리 생각에 잠겨, 세상을 초월하려는 뜻이 있었다. 왕우군이 사안에게 말하였다. \"하우(夏禹)는 나랏일에 힘써 손발에 못이 박이도록 하였고, 문왕(文王)은 해가 기울도록 먹지 못하며 날이 모자랄 지경이었소. 지금 사방 교외에 보루가 많으니, 마땅히 사람마다 스스로 힘을 바쳐야 할 것이오. 그런데 헛된 담론으로 일을 폐하고 부화한 문사로 요체를 그르치니, 아마도 지금에 마땅한 바가 아닐 것이오.\" 사안이 대답하였다. \"진(秦)나라가 상앙(商鞅)을 등용하고도 이세(二世)에 망하였으니, 어찌 청언(淸言)이 화를 부른 것이겠소?\"", ["청담", "간언", "은둔"]], ["言語", 71, "謝太傅寒雪日內集，與兒女講論文義。俄而雪驟，公欣然曰：「白雪紛紛何所似？」兄子胡兒曰：「撒鹽空中差可擬。」兄女曰：「未若柳絮因風起。」公大笑樂。即公大兄無奕女，左將軍王凝之妻也。", "사태부(謝安)가 추운 눈 내리는 날 집안 식구를 모아 자녀들과 글의 뜻을 강론하였다. 이윽고 눈이 갑자기 쏟아지자, 공이 흔연히 말하였다. \"흰 눈이 흩날리는 것이 무엇과 닮았느냐?\" 형의 아들 호아(胡兒)가 말하였다. \"공중에 소금을 뿌린 것에 비길 만합니다.\" 형의 딸이 말하였다. \"버들개지가 바람을 타고 일어나는 것만 못합니다.\" 공이 크게 웃으며 즐거워하였다. 그가 바로 공의 큰형 무혁(無奕)의 딸이요, 좌장군(左將軍) 왕응지(王凝之)의 아내였다.", ["신동", "기지", "여인"]], ["言語", 72, "王中郎令伏玄度、習鑿齒論青、楚人物。臨成，以示韓康伯。康伯都無言，王曰：「何故不言？」韓曰：「無可無不可。」", "왕중랑(王坦之)이 복현도(伏玄度)와 습착치(習鑿齒)에게 청주(靑州)와 초(楚) 지방의 인물을 논하게 하였다. 거의 완성되었을 때, 그것을 한강백(韓康伯)에게 보여주었다. 한강백이 도무지 아무 말도 없자, 왕중랑이 말하였다. \"무슨 까닭에 말이 없소?\" 한강백이 말하였다. \"좋다고도 할 수 없고 나쁘다고도 할 수 없소.\"", ["비평", "기지"]], ["言語", 73, "劉尹云：「清風朗月，輒思玄度。」", "유윤(劉惔)이 말하였다. \"맑은 바람과 밝은 달을 보면 문득 현도(許詢)가 생각난다.\"", ["우정", "풍류", "자연과산수"]], ["言語", 74, "荀中郎在京口，登北固望海云：「雖未覩三山，便自使人有凌雲意。若秦、漢之君，必當褰裳濡足。」", "순중랑(荀中郎)이 경구(京口)에 있을 때, 북고산(北固山)에 올라 바다를 바라보며 말하였다. \"비록 삼산(三山)을 보지는 못하였으나, 절로 사람으로 하여금 구름을 능가하려는 뜻을 갖게 한다. 만약 진(秦)·한(漢)의 임금이었다면, 반드시 옷자락을 걷고 발을 적셨을 것이다.\"", ["자연과산수", "풍류"]], ["言語", 75, "謝公云：「賢聖去人，其間亦邇。」子姪未之許。公歎曰：「若郗超聞此語，必不至河漢。」", "사공(謝安)이 말하였다. \"성현과 보통 사람의 거리는 그 사이가 또한 가깝다.\" 자질들이 이를 인정하지 않았다. 공이 탄식하며 말하였다. \"만약 치초(郗超)가 이 말을 들었다면, 반드시 황당하다 여기지는 않았을 것이다.\"", ["비평", "학문"]], ["言語", 76, "支公好鶴，住剡東山。有人遺其雙鶴，少時翅長欲飛。支意惜之，乃鎩其翮。鶴軒翥不復能飛，乃反顧翅，垂頭視之，如有懊喪意。林曰：「既有凌霄之姿，何肯為人作耳目近玩？」養令翮成，置使飛去。", "지공(支遁)이 학을 좋아하여 섬(剡)의 동산(東山)에 살았다. 어떤 이가 그에게 학 한 쌍을 주었는데, 얼마 지나지 않아 날개가 자라 날려고 하였다. 지공은 마음으로 그것이 아까워, 이에 깃촉을 잘랐다. 학이 날개를 펼쳐도 다시 날 수가 없자, 이에 날개를 돌아보고 고개를 숙여 그것을 바라보니, 마치 낙담한 뜻이 있는 듯하였다. 지공이 말하였다. \"이미 하늘을 능가하는 자태를 지녔거늘, 어찌 사람의 눈요깃거리가 되려 하겠는가?\" 깃이 다 자라도록 길러서, 놓아주어 날아가게 하였다.", ["풍류", "도량"]], ["言語", 77, "謝中郎經曲阿後湖，問左右：「此是何水？」荅曰：「曲阿湖。」謝曰：「故當淵注渟著，納而不流。」", "사중랑(謝萬)이 곡아(曲阿)의 후호(後湖)를 지나다가 좌우에게 물었다. \"이것은 무슨 물인가?\" 대답하였다. \"곡아호(曲阿湖)입니다.\" 사중랑이 말하였다. \"과연 깊이 모여 고여 있어, 받아들이되 흘려보내지 않는구나.\"", ["비평", "자연과산수"]], ["言語", 78, "晉武帝每餉山濤恒少。謝太傅以問子弟，車騎荅曰：「當由欲者不多，而使與者忘少。」", "진(晉) 무제(武帝)가 매번 산도(山濤)에게 하사하는 것이 늘 적었다. 사태부(謝安)가 이를 자제들에게 물으니, 거기장군(車騎將軍, 謝玄)이 대답하였다. \"바라는 자가 많이 바라지 않으니, 주는 자로 하여금 적게 줌을 잊게 한 것입니다.\"", ["기지", "비평"]], ["言語", 79, "謝胡兒語庾道季：「諸人莫當就卿談，可堅城壘。」庾曰：「若文度來，我以偏師待之；康伯來，濟河焚舟。」", "사호아(謝胡兒)가 유도계(庾道季)에게 말하였다. \"여러 사람이 그대에게 와서 담론하지는 못할 터이니, 성루를 견고히 할 만하오.\" 유도계가 말하였다. \"만약 문도(王坦之)가 온다면 나는 편사(偏師)로 그를 대하고, 강백(韓康伯)이 온다면 황하를 건너 배를 불사를 것이오.\"", ["청담", "비평"]], ["言語", 80, "李弘度常歎不被遇。殷揚州知其家貧，問：「君能屈志百里不？」李荅曰：「北門之歎，久已上聞。窮猿奔林，豈暇擇木！」遂授剡縣。", "이홍도(李弘度)가 늘 인정받지 못함을 탄식하였다. 은양주(殷浩)가 그 집이 가난함을 알고 물었다. \"그대는 뜻을 굽혀 백리(百里, 현령)의 직임을 맡을 수 있겠소?\" 이홍도가 대답하였다. \"북문(北門)의 탄식은 오래전에 이미 위에 알려졌습니다. 궁지에 몰린 원숭이가 숲으로 달려가는데, 어느 겨를에 나무를 가리겠습니까!\" 마침내 섬현(剡縣)을 제수받았다.", ["청빈", "권력", "기지"]], ["言語", 81, "王司州至吳興印渚中看。歎曰：「非唯使人情開滌，亦覺日月清朗。」", "왕사주(王司州)가 오흥(吳興)의 인저(印渚)에 이르러 구경하였다. 감탄하며 말하였다. \"사람의 마음을 열어 씻어줄 뿐만 아니라, 또한 해와 달이 맑고 밝아짐을 느끼게 한다.\"", ["자연과산수", "풍류"]], ["言語", 82, "謝萬作豫州都督，新拜，當西之都邑，相送累日，謝疲頓。於是高侍中往，徑就謝坐，因問：「卿今仗節方州，當疆理西蕃，何以為政？」謝粗道其意。高便為謝道形勢，作數百語。謝遂起坐。高去後，謝追曰：「阿酃故麤有才具。」謝因此得終坐。", "사만(謝萬)이 예주도독(豫州都督)이 되어, 새로 임명되어 서쪽 도읍으로 가게 되니, 여러 날을 두고 전송하여 사만이 지치고 고단해졌다. 이에 고시중(高侍中)이 가서 곧장 사만의 자리로 나아가 물었다. \"그대가 이제 부절을 잡고 방주(方州)를 맡아 마땅히 서쪽 변방을 다스리게 되었으니, 무엇으로 정사를 펴려 하오?\" 사만이 그 뜻을 대략 말하였다. 고시중이 곧 사만을 위해 형세를 논하여 수백 마디 말을 하였다. 사만은 마침내 일어나 앉았다. 고시중이 떠난 뒤 사만이 추억하여 말하였다. \"아령(阿酃)은 과연 자못 재능을 갖추었구나.\" 사만은 이로 인해 끝까지 앉아 있을 수 있었다.", ["권력", "재능", "비평"]], ["言語", 83, "袁彥伯為謝安南司馬，都下諸人送至瀨鄉。將別，既自悽惘，歎曰：「江山遼落，居然有萬里之勢。」", "원언백(袁彥伯)이 사안남(謝安南)의 사마(司馬)가 되었을 때, 도성의 여러 사람이 뇌향(瀨鄉)까지 전송하였다. 작별하려 하니 절로 처량하고 서글퍼, 탄식하며 말하였다. \"강산이 아득히 넓어, 의연히 만 리의 기세가 있구나.\"", ["자연과산수", "우정", "풍류"]], ["言語", 84, "孫綽賦遂初，築室畎川，自言見止足之分。齋前種一株松，恒自手壅治之。高世遠時亦鄰居，語孫曰：「松樹子非不楚楚可憐，但永無棟梁用耳！」孫曰：「楓柳雖合抱，亦何所施？」", "손작(孫綽)이 「수초부(遂初賦)」를 짓고 견천(畎川)에 집을 짓고는, 스스로 멈추고 만족할 분수를 알았다고 말하였다. 서재 앞에 소나무 한 그루를 심고 늘 손수 북돋우어 가꾸었다. 고세원(高世遠)이 그때 또한 이웃에 살았는데 손작에게 말하였다. \"소나무가 곱고 사랑스럽지 않은 것은 아니나, 다만 영영 동량(棟梁)으로 쓰일 일이 없을 따름이오!\" 손작이 말하였다. \"단풍나무와 버드나무가 비록 아름드리라 한들, 또한 어디에 쓰겠소?\"", ["은둔", "청담", "비평"]], ["言語", 85, "桓征西治江陵城甚麗，會賓僚出江津望之，云：「若能目此城者有賞。」顧長康時為客，在坐，目曰：「遙望層城，丹樓如霞。」桓即賞以二婢。", "환정서(桓溫)가 강릉성(江陵城)을 매우 화려하게 수축하고, 빈객과 막료들을 모아 강나루로 나가 그것을 바라보며 말하였다. \"만약 이 성을 잘 형용할 수 있는 자가 있으면 상을 주겠다.\" 고장강(顧愷之)이 그때 객으로 자리에 있다가 형용하였다. \"멀리 층층한 성을 바라보니, 붉은 누각이 노을과 같구나.\" 환정서가 곧 두 시비(侍婢)를 상으로 주었다.", ["서화", "재능", "사치"]], ["言語", 86, "王子敬語王孝伯曰：「羊叔子自復佳耳，然亦何與人事？」故不如銅雀臺上妓。」", "왕자경(王獻之)이 왕효백(王恭)에게 말하였다. \"양숙자(羊叔子, 羊祜)도 본디 또한 훌륭하나, 그것이 또한 사람의 일과 무슨 상관이 있겠소? 그러니 동작대(銅雀臺) 위의 기녀만 못하오.\"", ["비평", "풍류"]], ["言語", 87, "林公見東陽長山曰：「何其坦迤！」", "임공(支遁)이 동양(東陽)의 장산(長山)을 보고 말하였다. \"어쩌면 그리도 평탄하게 뻗어 있는가!\"", ["자연과산수", "풍류"]], ["言語", 88, "顧長康從會稽還，人問山川之美，顧云：「千巖競秀，萬壑爭流，草木蒙籠其上，若雲興霞蔚。」", "고장강(顧愷之)이 회계(會稽)에서 돌아오니, 사람들이 산천의 아름다움을 물었다. 고장강이 말하였다. \"천 봉우리가 다투어 빼어나고, 만 골짜기가 다투어 흐르며, 초목이 그 위에 무성히 우거져, 마치 구름이 일고 노을이 피어나는 듯하였소.\"", ["자연과산수", "풍류"]], ["言語", 89, "簡文崩，孝武年十餘歲立，至暝不臨。左右啟「依常應臨」。帝曰：「哀至則哭，何常之有！」", "간문제(簡文帝)가 붕어하자, 효무제(孝武帝)는 나이 십여 세에 즉위하였는데, 날이 저물도록 곡림(哭臨)하지 않았다. 좌우에서 \"관례대로 마땅히 곡림하셔야 합니다\"라고 아뢰었다. 황제가 말하였다. \"슬픔이 이르면 곡하는 것이니, 무슨 관례가 있겠는가!\"", ["효", "죽음", "기지"]], ["言語", 90, "孝武將講孝經，謝公兄弟與諸人私庭講習。車武子難苦問謝，謂袁羊曰：「不問則德音有遺，多問則重勞二謝。」袁曰：「必無此嫌。」車曰：「何以知爾？」袁曰：「何嘗見明鏡疲於屢照，清流憚於惠風。」", "효무제(孝武帝)가 『효경(孝經)』을 강하려 할 때, 사공(謝安) 형제와 여러 사람이 사사로이 뜰에서 강습하였다. 거무자(車武子)가 사씨에게 어려운 점을 거듭 묻기 곤란하여 원양(袁羊)에게 말하였다. \"묻지 않으면 좋은 가르침을 빠뜨리게 되고, 많이 물으면 두 사씨를 거듭 수고롭게 합니다.\" 원양이 말하였다. \"반드시 그런 꺼림은 없을 것이오.\" 거무자가 말하였다. \"무엇으로 그러함을 아오?\" 원양이 말하였다. \"밝은 거울이 자주 비추기를 지겨워하고, 맑은 물이 부드러운 바람을 꺼리는 것을 어찌 본 적이 있겠소.\"", ["학문", "기지", "비평"]], ["言語", 91, "王子敬云：「從山陰道上行，山川自相映發，使人應接不暇。若秋冬之際，尤難為壞。」", "왕자경(王獻之)이 말하였다. \"산음(山陰)의 길을 따라 가다 보면, 산천이 절로 서로 비추어 빛나, 사람으로 하여금 응접할 겨를이 없게 한다. 만약 가을과 겨울의 무렵이라면, 더욱 형언하기 어렵다.\"", ["자연과산수", "풍류"]], ["言語", 92, "謝太傅問諸子姪：「子弟亦何預人事，而正欲使其佳？」諸人莫有言者，車騎荅曰：「譬如芝蘭玉樹，欲使其生於階庭耳。」", "사태부(謝安)가 여러 자질에게 물었다. \"자제들이 또한 어찌 세상일에 관여하겠는가마는, 그저 그들이 훌륭하기를 바라는 것은 어째서인가?\" 여러 사람이 아무도 말하는 이가 없었는데, 거기장군(謝玄)이 대답하였다. \"비유컨대 지초(芝)와 난초(蘭)와 옥수(玉樹)가 섬돌과 뜰에 자라기를 바라는 것과 같습니다.\"", ["기지", "비평", "겸손"]], ["言語", 93, "道壹道人好整飾音辭，從都下還東山，經吳中。已而會雪下，未甚寒。諸道人問在道所經。壹公曰：「風霜固所不論，乃先集其慘澹。郊邑正自飄瞥，林岫便已皓然。」", "도일(道壹) 도인은 음운과 문사를 정연히 꾸미기를 좋아하였다. 도성에서 동산(東山)으로 돌아오다가 오중(吳中)을 지났다. 이윽고 눈이 내렸으나 그리 춥지는 않았다. 여러 도인이 길에서 지나온 바를 물었다. 도일공이 말하였다. \"바람과 서리는 본디 논할 것도 없고, 먼저 그 처량하고 어둑한 기운이 모였소. 교외와 고을에는 막 눈발이 흩날리는데, 숲과 봉우리는 이미 새하얗게 되어 있었소.\"", ["풍류", "자연과산수", "기지"]], ["言語", 94, "張天錫為涼州刺史，稱制西隅。既為符堅所禽，用為侍中。後於壽陽俱敗，至都，為孝武所器。每入言論，無不竟日。頗有嫉己者，於坐問張：「北方何物可貴？」張曰：「桑椹甘香，鴟鴞革響。淳酪養性，人無嫉心。」", "장천석(張天錫)이 양주자사(涼州刺史)가 되어 서쪽 변방에서 황제의 권한을 칭하였다. 부견(符堅)에게 사로잡힌 뒤 시중(侍中)으로 등용되었다. 그 뒤 수양(壽陽)에서 함께 패하여 도성에 이르니, 효무제(孝武帝)에게 중용되었다. 매번 들어가 담론하면 종일토록 그치지 않는 일이 없었다. 자못 자기를 시기하는 자가 있어, 자리에서 장천석에게 물었다. \"북방에 무슨 물건이 귀하오?\" 장천석이 말하였다. \"오디는 달고 향기로우며, 올빼미는 그 소리를 바꾸오. 진한 우유는 성품을 기르고, 사람은 시기하는 마음이 없소.\"", ["기지", "질투", "비평"]], ["言語", 95, "顧長康拜桓宣武墓，作詩云：「山崩溟海竭，魚鳥將何依。」人問之曰：「卿憑重桓乃爾，哭之狀其可見乎？」顧曰：「鼻如廣莫長風，眼如懸河決溜。」或曰：「聲如震雷破山，淚如傾河注海。」", "고장강(顧愷之)이 환선무(桓溫)의 묘에 절하고 시를 지어 말하였다. \"산이 무너지고 큰 바다가 마르니, 물고기와 새는 장차 무엇에 의지하리.\" 사람들이 그에게 물었다. \"그대가 환공(桓溫)을 그토록 의지하고 중히 여겼으니, 그를 곡하는 모습을 볼 수 있겠소?\" 고장강이 말하였다. \"코는 넓은 사막의 긴 바람 같고, 눈은 매달린 강물이 터져 흐르는 것 같았소.\" 어떤 이는 말하였다. \"소리는 우레가 진동하여 산을 깨뜨리는 것 같고, 눈물은 강물을 기울여 바다에 쏟아붓는 것 같았다.\"", ["죽음", "풍류", "비평"]], ["言語", 96, "毛伯成既負其才氣，常稱：「寧為蘭摧玉折，不作蕭敷艾榮。」", "모백성(毛伯成)이 자기의 재기를 자부하여, 늘 일컬었다. \"차라리 난초가 꺾이고 옥이 부러질지언정, 쑥대가 무성히 피어나는 것은 되지 않으리라.\"", ["충직", "오만", "비평"]], ["言語", 97, "范甯作豫章，八日請佛有板。眾僧疑，或欲作荅。有小沙彌在坐末曰：「世尊默然，則為許可。眾從其義。", "범녕(范甯)이 예장(豫章)의 수령이 되어, 팔일(八日)에 부처께 공양을 청하는 글을 올렸다. 여러 승려가 의아해하여, 더러는 답을 하려 하였다. 자리 끝에 있던 어린 사미(沙彌)가 말하였다. \"세존(世尊)께서 묵묵히 계시면 곧 허락하신 것입니다.\" 여러 사람이 그 뜻을 따랐다.", ["신동", "기지", "지혜"]], ["言語", 98, "司馬太傅齋中夜坐，于時天月明淨，都無纖翳。太傅歎以為佳。謝景重在坐，荅曰：「意謂乃不如微雲點綴。」太傅因戲謝曰：「卿居心不淨，乃復強欲滓穢太清邪？」", "사마태부(司馬太傅)가 서재에서 밤에 앉아 있었는데, 그때 하늘의 달이 밝고 맑아 도무지 가느다란 가림조차 없었다. 태부가 감탄하며 아름답다 하였다. 사경중(謝景重)이 자리에 있다가 대답하였다. \"제 생각에는 도리어 옅은 구름이 점점이 수놓아진 것만 못한 듯합니다.\" 태부가 이에 사경중을 놀려 말하였다. \"그대가 마음 둠이 깨끗하지 못하니, 도리어 굳이 맑은 하늘을 더럽히려 하는 게요?\"", ["기지", "자연과산수", "풍류"]], ["言語", 99, "王中郎甚愛張天錫，問之曰：「卿觀過江諸人經緯，江左軌轍，有何偉異？後來之彥，復何如中原？」張曰：「研求幽邃，自王何以還；因時脩制，荀樂之風。」王曰：「卿知見有餘，何故為符堅所制？」荅曰：「陽消陰息，故天步屯蹇；否剝成象，豈足多譏？」", "왕중랑(王坦之)이 장천석(張天錫)을 매우 아껴 그에게 물었다. \"그대가 보기에 강을 건너온 여러 사람들의 경륜과 강좌(江左)를 다스린 자취에 무슨 위대하고 뛰어난 점이 있소? 그리고 후대의 뛰어난 인물들은 또 중원(中原)에 비하면 어떠하오?\" 장천석이 말하였다. \"그윽하고 깊은 이치를 연구함은 왕필(王弼)·하안(何晏) 이래로 그러하고, 때에 따라 제도를 닦음은 순욱(荀)·악광(樂)의 풍모입니다.\" 왕중랑이 말하였다. \"그대는 식견이 넉넉한데, 무슨 까닭으로 부견(符堅)에게 제압당하였소?\" 대답하였다. \"양(陽)이 스러지고 음(陰)이 자라나 천운이 험난해지고, 비괘(否卦)와 박괘(剝卦)가 형상을 이룬 것이니, 어찌 많이 비웃을 만하겠습니까?\"", ["청담", "비평", "권력"]], ["言語", 100, "謝景重女適王孝伯兒，二門公甚相愛美。謝為太傅長史，被彈；王即取作長史，帶晉陵郡。太傅已構嫌孝伯，不欲使其得謝，還取作咨議。外示縶維，而實以乖閒之。及孝伯敗後，太傅繞東府城行散，僚屬悉在南門要望候拜，時謂謝曰：「王甯異謀，云是卿為其計。」謝曾無懼色，斂笏對曰：「樂彥輔有言：『豈以五男易一女？』」太傅善其對，因舉酒勸之曰：「故自佳！故自佳！」", "사경중(謝景重)의 딸이 왕효백(王恭)의 아들에게 시집가, 두 집안의 어른이 서로 매우 사랑하고 아름답게 여겼다. 사경중이 태부(司馬太傅)의 장사(長史)가 되었다가 탄핵을 당하자, 왕효백이 곧바로 데려다 장사로 삼고 진릉군(晉陵郡)을 겸하게 하였다. 태부는 이미 왕효백과 틈이 벌어진 터라, 그가 사경중을 얻게 하고 싶지 않아 도로 데려다 자의(咨議)로 삼았다. 겉으로는 붙잡아 두는 척하였으나 실은 둘 사이를 갈라놓으려는 것이었다. 왕효백이 패망한 뒤 태부가 동부성(東府城)을 돌며 산보하니, 막료들이 모두 남문(南門)에서 기다리며 절하였는데, 그때 사경중에게 말하였다. \"왕녕(王甯)의 모반은 그대가 그 계책을 세웠다 하던데, 어떻소.\" 사경중은 조금도 두려운 기색이 없이 홀(笏)을 거두고 대답하였다. \"악언보(樂彥輔)가 말하기를, '어찌 다섯 아들로 한 딸을 바꾸겠는가?'라 하였습니다.\" 태부가 그 대답을 훌륭히 여겨, 술을 들어 권하며 말하였다. \"과연 훌륭하다! 과연 훌륭하다!\"", ["기지", "용기", "권력"]], ["言語", 101, "桓玄義興還後，見司馬太傅，太傅已醉，坐上多客，問人云：「桓溫來欲作賊，如何？」桓玄伏不得起。謝景重時為長史，舉板荅曰：「故宣武公黜昏暗，登聖明，功超伊、霍。紛紜之議，裁之聖鑒。」太傅曰：「我知！我知！」即舉酒云：「桓義興，勸卿酒。」桓出謝過。", "환현(桓玄)이 의흥(義興)에서 돌아온 뒤 사마태부(司馬太傅)를 뵈었는데, 태부는 이미 취해 있었고 자리에 손님이 많았다. 사람들에게 물었다. \"환온(桓溫)이 와서 역적이 되려 하였으니, 어떠한가?\" 환현은 엎드려 일어나지 못하였다. 사경중(謝景重)이 그때 장사(長史)였는데, 홀(笏)을 들고 대답하였다. \"돌아가신 선무공(桓溫)께서는 어둡고 혼미한 임금을 폐하고 성명한 임금을 세우셨으니, 그 공이 이윤(伊尹)·곽광(霍光)을 능가합니다. 분분한 의론은 성상의 밝으신 통찰로 재단하실 일입니다.\" 태부가 말하였다. \"내가 안다! 내가 안다!\" 곧 술을 들고 말하였다. \"환의흥(桓玄), 그대에게 술을 권하노라.\" 환현이 나아가 사죄하였다.", ["기지", "용기", "권력"]], ["言語", 102, "宣武移鎮南州，制街衢平直。人謂王東亭曰：「丞相初營建康，無所因承，而制置紆曲，方此為劣。」東亭曰：「此丞相乃所以為巧。江左地促，不如中國；若使阡陌條畼，則一覽而盡。故紆餘委曲，若不可測。」", "선무(桓溫)가 진영을 남주(南州)로 옮겨, 거리를 평평하고 곧게 만들었다. 사람들이 왕동정(王珣)에게 말하였다. \"승상(王導)께서 처음 건강(建康)을 경영하실 때, 따를 바가 없었음에도 굽이지게 배치하셨으니, 이에 비하면 못합니다.\" 동정이 말하였다. \"이것이 바로 승상께서 교묘하게 하신 까닭이오. 강좌(江左)는 땅이 비좁아 중원(中原)만 못한데, 만약 길을 곧게 트이게 하였다면 한눈에 다 보였을 것이오. 그러므로 구불구불 굽이지게 하여, 마치 헤아릴 수 없는 듯하게 한 것이오.\"", ["지혜", "비평", "권력"]], ["言語", 103, "桓玄詣殷荊州，殷在妾房晝眠，左右辭不之通。桓後言及此事，殷云：「初不眠，縱有此，豈不以『賢賢易色』也。」", "환현(桓玄)이 은형주(殷仲堪)를 찾아갔는데, 은형주가 첩의 방에서 낮잠을 자고 있어 좌우에서 통할 수 없다고 거절하였다. 환현이 나중에 이 일을 언급하니, 은형주가 말하였다. \"애초에 잠든 것이 아니오. 설령 그런 일이 있었다 한들, 어찌 '어진 이를 어질게 여겨 여색과 바꾼다'는 것이 아니겠소.\"", ["기지", "거절", "여인"]], ["言語", 104, "桓玄問羊孚：「何以共重吳聲？」羊曰：「當以其妖而浮。」", "환현(桓玄)이 양부(羊孚)에게 물었다. \"무엇 때문에 다들 오(吳) 지방의 노래를 중히 여기오?\" 양부가 말하였다. \"응당 그것이 요염하고 가벼운 까닭일 것입니다.\"", ["음악", "비평", "기지"]], ["言語", 105, "謝混問羊孚：「何以器舉瑚璉？」羊曰：「故當以為接神之器。」", "사혼(謝混)이 양부(羊孚)에게 물었다. \"무엇 때문에 그릇 가운데 호련(瑚璉)을 으뜸으로 꼽소?\" 양부가 말하였다. \"본디 신령을 접하는 그릇으로 여기기 때문입니다.\"", ["기지", "비평"]], ["言語", 106, "桓玄既篡位，後御牀微陷，羣臣失色。侍中殷仲文進曰：「當由聖德淵重，厚地所以不能載。」時人善之。", "환현(桓玄)이 제위를 찬탈한 뒤, 어상(御牀)이 약간 꺼지자 신하들이 낯빛을 잃었다. 시중(侍中) 은중문(殷仲文)이 나아가 말하였다. \"이는 성덕(聖德)이 깊고 무거운 까닭에, 두터운 대지가 능히 싣지 못한 것입니다.\" 당시 사람들이 이를 훌륭히 여겼다.", ["기지", "권력", "오만"]], ["言語", 107, "桓玄既篡位，將改置直館，問左右：「虎賁中郎省，應在何處？」有人荅曰：「無省。」當時殊忤旨。問：「何以知無？」荅曰：「潘岳秋興賦敘曰：『余兼虎賁中郎將，寓直散騎之省。』玄咨嗟稱善。", "환현(桓玄)이 제위를 찬탈한 뒤 숙직하는 관사를 고쳐 두려고 좌우에 물었다. \"호분중랑성(虎賁中郎省)은 마땅히 어디에 두어야 하겠는가?\" 어떤 사람이 대답했다. \"그런 관청은 없습니다.\" 당시 그 대답은 자못 뜻을 거스르는 것이었다. 환현이 물었다. \"무슨 근거로 없다는 것을 아는가?\" 그가 대답했다. \"반악(潘岳)의 「추흥부(秋興賦)」 서문에 이르기를 '나는 호분중랑장을 겸하여 산기성(散騎省)에 임시로 숙직하였다'고 하였습니다.\" 환현이 감탄하며 훌륭하다고 칭찬하였다.", ["학문", "기지", "권력"]], ["言語", 108, "謝靈運好戴曲柄笠，孔隱士謂曰：「卿欲希心高遠，何不能遺曲蓋之貌？」謝荅曰：「將不畏影者，未能忘懷。」", "사령운(謝靈運)은 굽은 자루가 달린 삿갓 쓰기를 좋아하였다. 공씨 은사(隱士)가 그에게 말했다. \"그대가 마음을 고원(高遠)한 데 두고자 한다면, 어찌 굽은 일산 같은 그 모습을 버리지 못하는가?\" 사령운이 대답했다. \"아마도 그
