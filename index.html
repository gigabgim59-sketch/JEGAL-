도(山濤)·유령(劉伶)이 죽림에서 흥겹게 술을 마시는데, 왕융(王戎)이 뒤늦게 왔다. 보병(步兵, 완적)이 말하였다. \"속물이 또 와서 사람의 흥을 깨뜨리는구나!\" 왕융이 웃으며 말하였다. \"그대들의 흥취도 깨뜨릴 수 있는 것이오?\"", ["기지", "술과취흥"]], ["排調", 5, "晉武帝問孫皓：「聞南人好作爾汝歌，頗能為不？」皓正飲酒，因舉觴勸帝而言曰：「昔與汝為鄰，今與汝為臣。上汝一桮酒，令汝壽萬春。」帝悔之。", "진(晉) 무제(司馬炎)가 손호(孫皓)에게 물었다. \"듣자니 남방 사람들은 '너나(爾汝)' 노래를 즐겨 짓는다는데, 그대도 좀 지을 수 있는가?\" 손호는 마침 술을 마시던 차라 잔을 들어 무제에게 권하며 말하였다. \"옛날엔 너와 이웃이었더니, 이제는 너와 임금과 신하가 되었네. 너에게 한 잔 술을 올리니, 너로 하여금 만년토록 살게 하리라.\" 무제는 그 말을 후회하였다.", ["기지", "권력"]], ["排調", 6, "孫子荊年少時欲隱，語王武子「當枕石漱流」，誤曰「漱石枕流」。王曰：「流可枕，石可漱乎？」孫曰：「所以枕流，欲洗其耳；所以漱石，欲礪其齒。」", "손자형(孫子荊)이 젊었을 때 은거하고자 하여 왕무자(王武子)에게 \"마땅히 돌을 베고 흐르는 물에 양치질하겠다(枕石漱流)\"고 말하려다가 잘못하여 \"돌로 양치질하고 흐르는 물을 베겠다(漱石枕流)\"고 하였다. 왕무자가 말하였다. \"흐르는 물을 벨 수 있고, 돌로 양치질할 수 있단 말인가?\" 손자형이 말하였다. \"흐르는 물을 베려는 까닭은 귀를 씻으려 함이요, 돌로 양치질하려는 까닭은 이를 갈아 단단히 하려 함이오.\"", ["기지", "은둔"]], ["排調", 7, "頭責秦子羽云：「子曾不如太原溫顒、潁川荀、范陽張華、士卿劉許、義陽鄒湛、河南鄭詡。此數子者，或謇喫無宮商，或尪陋希言語，或淹伊多姿態，或讙譁少智諝，或口如含膠飴，或頭如巾齏杵。而猶以文采可觀，意思詳序，攀龍附鳳，並登天府。」", "머리(頭)가 진자우(秦子羽)를 꾸짖어 말하였다. \"그대는 태원(太原)의 온옹(溫顒), 영천(潁川)의 순씨(荀氏), 범양(范陽)의 장화(張華), 사경(士卿)의 유허(劉許), 의양(義陽)의 추담(鄒湛), 하남(河南)의 정후(鄭詡)만도 못하다. 이 몇 사람은, 혹은 말을 더듬어 가락이 없고, 혹은 비쩍 마르고 누추하여 말이 적으며, 혹은 머뭇거리며 자태만 많고, 혹은 떠들썩하기만 하고 지혜는 적으며, 혹은 입이 엿을 머금은 듯하고, 혹은 머리가 절구공이 같다. 그런데도 오히려 문채가 볼 만하고 생각이 자상하고 조리가 있어, 용을 잡고 봉황에 붙어 모두 조정(天府)에 올랐다.\"", ["비평", "기지"]], ["排調", 8, "王渾與婦鍾氏共坐，見武子從庭過，渾欣然謂婦曰：「生兒如此，足慰人意。」婦笑曰：「若使新婦得配參軍，生兒故可不啻如此！」", "왕혼(王渾)이 아내 종씨(鍾氏)와 함께 앉아 있다가 무자(武子)가 뜰을 지나가는 것을 보고, 왕혼이 흐뭇하여 아내에게 말하였다. \"이런 아들을 낳았으니 족히 사람의 마음을 위로하오.\" 아내가 웃으며 말하였다. \"만약 제가 시동생인 참군(參軍)과 짝을 맺었더라면, 낳은 아들이 이만 못하지는 않았을 것입니다!\"", ["기지", "여인"]], ["排調", 9, "荀鳴鶴、陸士龍二人未相識，俱會張茂先坐。張令共語。以其並有大才，可勿作常語。陸舉手曰：「雲間陸士龍。」荀答曰：「日下荀鳴鶴。」陸曰：「既開青雲覩白雉，何不張爾弓，布爾矢？」荀答曰：「本謂雲龍騤騤，定是山鹿野麋。獸弱弩彊，是以發遲。」張乃撫掌大笑。", "순명학(荀鳴鶴)과 육사룡(陸士龍) 두 사람은 서로 면식이 없었는데, 함께 장무선(張茂先)의 자리에 모였다. 장무선이 둘에게 더불어 이야기하게 하면서, 둘 다 큰 재주가 있으니 평범한 말은 하지 말라고 하였다. 육사룡이 손을 들어 말하였다. \"구름 사이의 육사룡(雲間陸士龍)이오.\" 순명학이 대답하였다. \"해 아래의 순명학(日下荀鳴鶴)이오.\" 육사룡이 말하였다. \"이미 푸른 구름이 열려 흰 꿩을 보았으니, 어찌 그대의 활을 당기고 그대의 화살을 메기지 않으시오?\" 순명학이 대답하였다. \"본래 구름 속의 용이 힘차게 달리는 줄 알았더니, 알고 보니 산속의 사슴이요 들녘의 고라니로다. 짐승이 약하고 쇠뇌가 강하니, 그래서 쏘기를 늦추는 것이오.\" 장무선이 이에 손뼉을 치며 크게 웃었다.", ["기지", "재능"]], ["排調", 10, "陸太尉詣王丞相，王公食以酪。陸還遂病。明日與王牋云：「昨食酪小過，通夜委頓。民雖吳人，幾為傖鬼。」", "육태위(陸太尉)가 왕승상(王導)을 찾아갔는데, 왕공이 그에게 유제품(酪)을 먹였다. 육태위는 돌아와 마침내 병이 났다. 이튿날 왕공에게 편지를 보내어 말하였다. \"어제 유제품을 조금 과하게 먹었더니 밤새 노곤하였습니다. 제가 비록 오(吳) 사람이나 하마터면 촌놈 귀신이 될 뻔했습니다.\"", ["기지", "병과늙음"]], ["排調", 11, "元帝皇子生，普賜羣臣。殷洪喬謝曰：「皇子誕育，普天同慶。臣無勳焉，而猥頒厚賚。」中宗笑曰：「此事豈可使卿有勳邪？」", "원제(元帝)의 황자가 태어나자 신하들에게 두루 상을 내렸다. 은홍교(殷洪喬)가 사양하여 말하였다. \"황자께서 태어나심은 온 천하가 함께 경하할 일입니다. 신은 아무 공이 없는데도 외람되이 후한 하사를 받았습니다.\" 중종(中宗, 元帝)이 웃으며 말하였다. \"이 일이 어찌 그대로 하여금 공을 세우게 할 수 있는 일이겠는가?\"", ["거절", "겸손"]], ["排調", 12, "諸葛令、王丞相共爭姓族先後，王曰：「何不言葛、王，而云王、葛？」令曰：「譬言驢馬，不言馬驢，驢寧勝馬邪？」", "제갈령(諸葛令)과 왕승상(王導)이 함께 성씨의 선후를 다투었다. 왕도가 말하였다. \"어찌 갈왕(葛王)이라 하지 않고 왕갈(王葛)이라 하는가?\" 제갈령이 말하였다. \"비유컨대 '나귀와 말(驢馬)'이라 하지 '말과 나귀(馬驢)'라 하지 않으니, 나귀가 어찌 말보다 낫겠소?\"", ["기지", "비평", "제갈씨"]], ["排調", 13, "劉真長始見王丞相，時盛暑之月，丞相以腹熨彈棊局，曰：「何乃渹？」劉既出，人問：「見王公云何？」劉曰：「未見他異，唯聞作吳語耳！」", "유진장(劉惔)이 처음 왕승상(王導)을 뵈었는데, 그때는 한여름이었다. 왕도가 배를 탄기국(彈棊局, 탄기판)에 대고 말하였다. \"어찌 이리 시원한고(渹)?\" 유진장이 나오자 사람들이 물었다. \"왕공을 뵙고 뭐라 하시던가?\" 유진장이 말하였다. \"별다른 점은 보지 못했고, 오직 오(吳) 지방 말을 하는 것만 들었을 뿐이오!\"", ["기지"]], ["排調", 14, "王公與朝士共飲酒，舉瑠璃盌謂伯仁曰：「此盌腹殊空，謂之寶器，何邪？」答曰：「此盌英英，誠為清徹，所以為寶耳！」", "왕공(王導)이 조정의 선비들과 함께 술을 마시다가 유리잔을 들어 백인(伯仁, 周顗)에게 말하였다. \"이 잔은 속이 텅 비었는데도 보배로운 그릇이라 하니, 어찌된 일이오?\" 백인이 대답하였다. \"이 잔은 영롱하고 참으로 맑고 투명하니, 그래서 보배가 되는 것이오!\"", ["기지", "청담"]], ["排調", 15, "謝幼輿謂周侯曰：「卿類社樹，遠望之，峨峨拂青天；就而視之，其根則羣狐所託，下聚溷而已！」答曰：「枝條拂青天，不以為高；羣狐亂其下，不以為濁；聚溷之穢，卿之所保，何足自稱？」", "사유여(謝幼輿)가 주후(周顗)에게 말하였다. \"그대는 사당의 나무(社樹)와 같소. 멀리서 바라보면 우뚝 솟아 푸른 하늘을 스치지만, 가까이 가서 보면 그 뿌리는 여우 떼가 깃든 곳이요, 아래에는 더러운 것만 모여 있을 뿐이오!\" 주후가 대답하였다. \"가지가 푸른 하늘을 스쳐도 높다 여기지 않고, 여우 떼가 그 아래 어지러워도 흐리다 여기지 않소. 더러운 것이 모인 그 추함은 그대가 지키는 바이거늘, 어찌 스스로 일컬을 만하겠소?\"", ["비평", "기지"]], ["排調", 16, "王長豫幼便和令，丞相愛恣甚篤。每共圍棊，丞相欲舉行，長豫按指不聽。丞相笑曰：「詎得爾？相與似有瓜葛。」", "왕장예(王長豫)는 어려서부터 온화하고 어질어 승상(王導)이 매우 두텁게 사랑하고 마음대로 하게 두었다. 매번 함께 바둑을 두는데, 승상이 한 수를 두려 하면 장예가 손가락을 눌러 두지 못하게 하였다. 승상이 웃으며 말하였다. \"이래도 되느냐? 너와 나는 친척의 인연(瓜葛)이 있는 듯하구나.\"", ["우정", "도량"]], ["排調", 17, "明帝問周伯仁：「真長何如人？」答曰：「故是千斤犗特。」王公笑其言。伯仁曰：「不如捲角牸，有盤辟之好。」", "명제(明帝)가 주백인(周顗)에게 물었다. \"진장(劉惔)은 어떤 사람인가?\" 주백인이 대답하였다. \"실로 천 근짜리 거세한 황소(犗特)입니다.\" 왕공(王導)이 그 말을 듣고 웃었다. 주백인이 말하였다. \"뿔 굽은 암소(牸)가 빙빙 도는 재주를 부리는 것만은 못하지요.\"", ["비평", "기지"]], ["排調", 18, "王丞相枕周伯仁厀，指其腹曰：「卿此中何所有？」答曰：「此中空洞無物，然容卿輩數百人。」", "왕승상(王導)이 주백인(周顗)의 무릎을 베고 그의 배를 가리키며 말하였다. \"그대의 이 속에는 무엇이 들었소?\" 주백인이 대답하였다. \"이 속은 텅 비어 아무것도 없으나, 그래도 그대 같은 사람 수백 명은 담을 수 있소.\"", ["기지", "도량"]], ["排調", 19, "干寶向劉真長敘其搜神記，劉曰：「卿可謂鬼之董狐。」", "간보(干寶)가 유진장(劉惔)에게 그의 『수신기(搜神記)』를 들려주자, 유진장이 말하였다. \"그대는 귀신의 동호(董狐)라 할 만하오.\"", ["비평", "학문"]], ["排調", 20, "許文思往顧和許，顧先在帳中眠。許至，便徑就牀角枕共語。既而喚顧共行，顧乃命左右取枕上新衣，易己體上所著。許笑曰：「卿乃復有行來衣乎？」", "허문사(許文思)가 고화(顧和)의 처소로 갔는데, 고화가 먼저 휘장 안에서 자고 있었다. 허문사가 이르러 곧장 침상 모서리에 나아가 베개를 베고 함께 이야기하였다. 이윽고 고화를 불러 함께 나가자 하니, 고화가 좌우에게 명하여 베개 위의 새 옷을 가져오게 하여 제 몸에 입고 있던 것을 갈아입었다. 허문사가 웃으며 말하였다. \"그대는 외출용 옷이 따로 있구려?\"", ["기지", "오만"]], ["排調", 21, "康僧淵目深而鼻高，王丞相每調之。僧淵曰：「鼻者面之山，目者面之淵。山不高則不靈，淵不深則不清。」", "강승연(康僧淵)은 눈이 깊고 코가 높았는데, 왕승상(王導)이 늘 그를 놀렸다. 강승연이 말하였다. \"코는 얼굴의 산이요, 눈은 얼굴의 못이오. 산이 높지 않으면 신령하지 못하고, 못이 깊지 않으면 맑지 못한 법이오.\"", ["기지", "용모"]], ["排調", 22, "何次道往瓦官寺禮拜甚勤。阮思曠語之曰：「卿志大宇宙，勇邁終古。」何曰：「卿今日何故忽見推？」阮曰：「我圖數千戶郡，尚不能得；卿迺圖作佛，不亦大乎！」", "하차도(何次道)가 와관사(瓦官寺)에 가서 예배를 매우 부지런히 드렸다. 완사광(阮思曠)이 그에게 말하였다. \"그대의 뜻은 우주보다 크고, 그 용맹은 만고를 뛰어넘소.\" 하차도가 말하였다. \"그대는 오늘 무슨 까닭으로 갑자기 나를 이리 추켜세우시오?\" 완사광이 말하였다. \"나는 수천 호의 고을을 도모하여도 오히려 얻지 못하는데, 그대는 부처가 되기를 도모하니 또한 크지 않소!\"", ["기지", "비평"]], ["排調", 23, "庾征西大舉征胡，既成行，止鎮襄陽。殷豫章與書，送一折角如意以調之。庾答書曰：「得所致，雖是敗物，猶欲理而用之。」", "유정서(庾翼)가 크게 군사를 일으켜 오랑캐를 치려고 출정 채비를 마쳤으나, 양양(襄陽)에 머무르며 지켰다. 은예장(殷豫章)이 그에게 편지를 보내면서 뿔이 부러진 여의(如意)를 하나 보내어 놀렸다. 유정서가 답장하여 말하였다. \"보내 주신 것을 받았소. 비록 망가진 물건이나, 그래도 손질하여 쓰고 싶소.\"", ["기지", "권력"]], ["排調", 24, "桓大司馬乘雪欲獵，先過王、劉諸人許。真長見其裝束單急，問：「老賊欲持此何作？」桓曰：「我若不為此，卿輩亦那得坐談？」", "환대사마(桓溫)가 눈 내린 날 사냥을 가려고 먼저 왕씨·유씨 등 여러 사람의 처소를 들렀다. 진장(劉惔)이 그가 가볍고 날렵하게 차림한 것을 보고 물었다. \"늙은 도적이 이 차림으로 무엇을 하려 하오?\" 환온이 말하였다. \"내가 이런 일을 하지 않으면 그대들이 또한 어찌 앉아서 담론할 수 있겠소?\"", ["기지", "권력"]], ["排調", 25, "褚季野問孫盛：「卿國史何當成？」孫云：「久應竟，在公無暇，故至今日。」褚曰：「古人『述而不作』，何必在蠶室中？」", "저계야(褚季野)가 손성(孫盛)에게 물었다. \"그대의 국사(國史)는 언제 완성되오?\" 손성이 말하였다. \"진작에 마쳤어야 했으나, 공무에 겨를이 없어 오늘에 이르렀소.\" 저계야가 말하였다. \"옛사람은 '서술하되 짓지는 않는다(述而不作)'고 하였으니, 어찌 굳이 잠실(蠶室) 안에 있을 필요가 있겠소?\"", ["기지", "학문"]], ["排調", 26, "謝公在東山，朝命屢降而不動。後出為桓宣武司馬，將發新亭，朝士咸出瞻送。高靈時為中丞，亦往相祖。先時，多少飲酒，因倚如醉，戲曰：「卿屢違朝旨，高臥東山，諸人每相與言：『安石不肯出，將如蒼生何？』今亦蒼生將如卿何？」謝笑而不答。", "사공(謝安)이 동산(東山)에 있을 때 조정의 부름이 여러 번 내려왔으나 움직이지 않았다. 뒤에 나아가 환선무(桓溫)의 사마(司馬)가 되어 신정(新亭)에서 떠나려 하자, 조정의 선비들이 모두 나와 전송하였다. 고령(高靈)이 그때 중승(中丞)으로 있었는데, 역시 가서 전별하였다. 그에 앞서 술을 얼마간 마신 터라 취한 척 비스듬히 기대어 농하여 말하였다. \"그대는 여러 번 조정의 뜻을 어기고 동산에 높이 누워 있었소. 사람들이 매번 서로 말하기를 '안석(謝安)이 나오려 하지 않으니, 장차 백성(蒼生)을 어찌할 것인가?' 하였소. 이제 백성이 장차 그대를 어찌해야 하겠소?\" 사안은 웃기만 하고 답하지 않았다.", ["은둔", "권력", "기지"]], ["排調", 27, "初，謝安在東山居，布衣，時兄弟已有富貴者，翕集家門，傾動人物。劉夫人戲謂安曰：「大丈夫不當如此乎？」謝乃捉鼻曰：「但恐不免耳！」", "처음에 사안(謝安)이 동산(東山)에 살며 벼슬 없는 선비(布衣)로 지낼 때, 형제 가운데 이미 부귀를 누리는 이가 있어 집안에 사람들이 모여들어 인물들을 휩쓸었다. 유부인(劉夫人)이 사안에게 농담으로 말하였다. \"대장부라면 마땅히 이래야 하지 않겠습니까?\" 사안이 이에 코를 잡으며 말하였다. \"다만 이를 면치 못할까 두려울 뿐이오!\"", ["은둔", "기지", "권력"]], ["排調", 28, "支道林因人就深公買印山，深公答曰：「未聞巢、由買山而隱。」", "지도림(支遁)이 사람을 통하여 심공(深公)에게 인산(印山)을 사려 하였다. 심공이 대답하였다. \"소부(巢父)나 허유(許由)가 산을 사서 은거했다는 말은 듣지 못했소.\"", ["은둔", "거절", "기지"]], ["排調", 29, "王、劉每不重蔡公。二人嘗詣蔡，語良久，乃問蔡曰：「公自言何如夷甫？」答曰：「身不如夷甫。」王、劉相目而笑曰：「公何處不如？」答曰：「夷甫無君輩客！」", "왕씨와 유씨(王濛·劉惔)는 매번 채공(蔡公)을 중하게 여기지 않았다. 두 사람이 일찍이 채공을 찾아가 한참 동안 이야기하다가 채공에게 물었다. \"공께서는 스스로 이보(夷甫, 王衍)와 견주어 어떻다고 여기시오?\" 채공이 대답하였다. \"나는 이보만 못하오.\" 왕씨와 유씨가 서로 바라보며 웃고 말하였다. \"공께서는 어느 점이 못하시오?\" 채공이 대답하였다. \"이보에게는 그대들 같은 손님이 없었소!\"", ["기지", "비평"]], ["排調", 30, "張吳興年八歲，虧齒，先達知其不常，故戲之曰：「君口中何為開狗竇？」張應聲答曰：「正使君輩從此中出入！」", "장오흥(張吳興)이 여덟 살 때 이가 빠져 있었다. 한 선배가 그가 범상치 않음을 알고 일부러 놀려 말하였다. \"그대의 입 안에 어찌 개구멍(狗竇)이 열렸는가?\" 장오흥이 소리 나는 대로 대답하였다. \"바로 그대 같은 분이 이곳으로 드나들게 하려는 것이오!\"", ["신동", "기지"]], ["排調", 31, "郝隆七月七日出日中仰臥。人問其故？答曰：「我曬書。」", "학륭(郝隆)이 칠월 칠일에 나가 햇볕 속에 벌렁 누웠다. 사람들이 그 까닭을 물으니 대답하였다. \"내 책을 볕에 말리는 것이오.\"", ["기지", "학문"]], ["排調", 32, "謝公始有東山之志，後嚴命屢臻，勢不獲已，始就桓公司馬。于時人有餉桓公藥草，中有「遠志」。公取以問謝：「此藥又名『小草』，何一物而有二稱？」謝未即答。時郝隆在坐，應聲答曰：「此甚易解：處則為遠志，出則為小草。」謝甚有愧色。桓公目謝而笑曰：「郝參軍此過乃不惡，亦極有會。」", "사공(謝安)이 처음에는 동산(東山)에 은거할 뜻이 있었으나, 뒤에 엄한 부름이 여러 번 이르러 형세상 어쩔 수 없이 비로소 환공(桓溫)의 사마(司馬)가 되었다. 그때 어떤 사람이 환공에게 약초를 보냈는데, 그 가운데 '원지(遠志)'가 있었다. 환공이 그것을 집어 사안에게 물었다. \"이 약초는 또 '소초(小草)'라고도 하는데, 어찌 한 물건에 두 이름이 있소?\" 사안이 미처 대답하지 못했다. 그때 학륭(郝隆)이 자리에 있다가 소리 나는 대로 대답하였다. \"이것은 풀이하기가 아주 쉽습니다. 산속에 있으면(處) 원지가 되고, 세상에 나오면(出) 소초가 되는 것입니다.\" 사안은 몹시 부끄러운 빛을 띠었다. 환공이 사안을 바라보며 웃고 말하였다. \"학참군의 이 말이 나쁘지 않을뿐더러 또한 매우 들어맞는구려.\"", ["기지", "은둔", "권력"]], ["排調", 33, "庾園客詣孫監，值行，見齊莊在外，尚幼，而有神意。庾試之曰：「孫安國何在？」即答曰：「庾穉恭家。」庾大笑曰：「諸孫大盛，有兒如此！」又答曰：「未若諸庾之翼翼。」還，語人曰：「我故勝，得重喚奴父名。」", "유원객(庾園客)이 손감(孫監)을 찾아갔는데 마침 외출 중이었다. 제장(齊莊)이 밖에 있는 것을 보니 아직 어렸으나 신묘한 기색이 있었다. 유원객이 그를 시험하여 물었다. \"손안국(孫安國)은 어디 계시냐?\" 제장이 곧 대답하였다. \"유치공(庾穉恭)의 집에 계십니다.\" 유원객이 크게 웃으며 말하였다. \"손씨 집안이 크게 번성하여 이런 아이가 있구나!\" 제장이 또 대답하였다. \"여러 유씨 집안의 번창함만은 못합니다.\" 유원객이 돌아가 사람들에게 말하였다. \"내가 그래도 이겼다. 그 종놈의 아비 이름을 거듭 부를 수 있었으니.\"", ["신동", "기지"]], ["排調", 34, "范玄平在簡文坐，談欲屈，引王長史曰：「卿助我。」王曰：「此非拔山力所能助！」", "범현평(范玄平)이 간문제(簡文帝)의 자리에서 담론하다가 막히려 하자, 왕장사(王濛)를 끌어들여 말하였다. \"그대가 나를 도와주시오.\" 왕장사가 말하였다. \"이것은 산을 뽑는 힘으로도 도울 수 있는 것이 아니오!\"", ["기지", "청담"]], ["排調", 35, "郝隆為桓公南蠻參軍，三月三日會，作詩。不能者，罰酒三升。隆初以不能受罰，既飲，攬筆便作一句云：「娵隅躍清池。」桓問：「娵隅是何物？」答曰：「蠻名魚為娵隅。」桓公曰：「作詩何以作蠻語？」隆曰：「千里投公，始得蠻府參軍，那得不作蠻語也？」", "학륭(郝隆)이 환공(桓公, 환온)의 남만참군(南蠻參軍)이 되었는데, 삼월 삼일 모임에서 시를 짓게 되었다. 짓지 못하는 자는 벌주 석 되를 마셔야 했다. 학륭은 처음에 짓지 못하여 벌을 받았는데, 마신 다음 붓을 잡고 곧 한 구절을 지어 이르기를 \"추우(娵隅)가 맑은 못에서 뛰노네\"라 하였다. 환공이 \"추우란 무슨 물건인가?\"라고 묻자, 대답하기를 \"만족(蠻族)은 물고기를 추우라 부릅니다\"라고 하였다. 환공이 \"시를 짓는데 어찌 만족의 말을 쓰는가?\"라고 하니, 학륭이 \"천 리를 와서 공에게 의탁하여 겨우 만부(蠻府)의 참군이 되었거늘, 어찌 만족의 말을 쓰지 않을 수 있겠습니까?\"라고 하였다.", ["기지", "권력", "술과취흥"]], ["排調", 36, "袁羊嘗詣劉恢，恢在內眠未起。袁因作詩調之曰：「角枕粲文茵，錦衾爛長筵。」劉尚晉明帝女，主見詩，不平曰：「袁羊，古之遺狂！」", "원양(袁羊)이 일찍이 유회(劉恢)를 찾아갔는데, 유회가 안에서 자고 아직 일어나지 않았다. 원양이 이에 시를 지어 그를 놀려 이르기를 \"각진 베개는 무늬 자리에 찬란하고, 비단 이불은 긴 자리에 눈부시네\"라고 하였다. 유회는 진(晉) 명제(明帝)의 딸을 아내로 맞았는데, 공주가 이 시를 보고 언짢아하며 \"원양은 옛적부터 내려온 미치광이로구나!\"라고 하였다.", ["기지", "부부"]], ["排調", 37, "殷洪遠答孫興公詩云：「聊復放一曲。」劉真長笑其語拙，問曰：「君欲云那放？」殷曰：「臘亦放，何必其鎗鈴邪？」", "은홍원(殷洪遠)이 손흥공(孫興公, 손작)의 시에 답하여 이르기를 \"잠시 다시 한 곡조를 놓아 보네(放)\"라고 하였다. 유진장(劉眞長, 유담)이 그 말이 졸렬함을 비웃으며 묻기를 \"그대는 어떻게 놓는다는 말인가?\"라고 하였다. 은홍원이 \"섣달에도 또한 놓거늘, 어찌 반드시 쟁쟁 울리는 소리뿐이겠는가?\"라고 하였다.", ["기지", "비평", "음악"]], ["排調", 38, "桓公既廢海西，立簡文，侍中謝公見桓公拜。桓驚笑曰：「安石，卿何事至爾？」謝曰：「未有君拜於前，臣立於後！」", "환공(桓公, 환온)이 이미 해서공(海西公)을 폐하고 간문제(簡文帝)를 세우자, 시중(侍中) 사공(謝公, 사안)이 환공을 뵙고 절을 하였다. 환온이 놀라 웃으며 \"안석(安石)이여, 그대는 무슨 일로 이렇게까지 하는가?\"라고 하였다. 사안이 \"임금이 앞에서 절하고 신하가 뒤에 서 있는 일은 아직 없었습니다!\"라고 하였다.", ["충직", "기지", "권력"]], ["排調", 39, "郗重熙與謝公書，道：「王敬仁聞一年少懷問鼎。不知桓公德衰，為復後生可畏？」", "치중희(郗重熙)가 사공(謝公, 사안)에게 보낸 편지에서 말하기를 \"왕경인(王敬仁, 왕몽)이 듣자니 한 젊은이가 솥의 무게를 묻는 야심을 품었다 합니다. 환공(桓公, 환온)의 덕이 쇠한 것인지, 아니면 또한 후생을 두려워할 만한 것인지 모르겠습니다\"라고 하였다.", ["권력", "비평"]], ["排調", 40, "張蒼梧是張憑之祖，嘗語憑父曰：「我不如汝。」憑父未解所以。蒼梧曰：「汝有佳兒。」憑時年數歲，歛手曰：「阿翁，詎宜以子戲父？」", "장창오(張蒼梧)는 장빙(張憑)의 조부인데, 일찍이 장빙의 아버지에게 \"나는 너만 못하다\"라고 하였다. 장빙의 아버지가 그 까닭을 알지 못하자, 장창오가 \"너에게는 훌륭한 아들이 있다\"라고 하였다. 장빙은 그때 나이 몇 살이었는데, 손을 모으고 \"할아버지, 어찌 아들로 아버지를 희롱하는 것이 마땅하겠습니까?\"라고 하였다.", ["신동", "기지", "겸손"]], ["排調", 41, "習鑿齒、孫興公未相識，同在桓公坐。桓語孫「可與習參軍共語。」孫云：「『蠢爾蠻荊』，敢與大邦為讐？」習云：「『薄伐獫狁』，至于太原。」", "습착치(習鑿齒)와 손흥공(孫興公, 손작)은 서로 알지 못했는데, 함께 환공(桓公, 환온)의 자리에 있었다. 환온이 손흥공에게 \"습참군과 더불어 이야기를 나눌 만하다\"라고 하였다. 손흥공이 \"'꿈틀거리는 저 만형(蠻荊)이여', 감히 큰 나라와 원수가 되려는가?\"라고 하니, 습착치가 \"'험윤(獫狁)을 가벼이 쳐서', 태원(太原)에까지 이르렀노라\"라고 하였다.", ["기지", "학문"]], ["排調", 42, "桓豹奴是王丹陽外生，形似其舅，桓甚諱之。宣武云：「不恆相似，時似耳！恆似是形，時似是神。」桓逾不說。", "환표노(桓豹奴)는 왕단양(王丹陽)의 생질로 외삼촌을 닮았는데, 환표노는 이를 몹시 꺼렸다. 선무(宣武, 환온)가 말하기를 \"늘 닮은 것이 아니라 때때로 닮을 뿐이다! 늘 닮은 것은 형상이요, 때때로 닮은 것은 정신이다\"라고 하였다. 환표노는 더욱 기뻐하지 않았다.", ["용모", "비평"]], ["排調", 43, "王子猷詣謝萬，林公先在坐，瞻矚甚高。王曰：「若林公鬚髮並全，神情當復勝此不？」謝曰：「脣齒相須，不可以偏亡。鬚髮何關於神明？」林公意甚惡。曰：「七尺之軀，今日委君二賢。」", "왕자유(王子猷, 왕휘지)가 사만(謝萬)을 찾아갔는데, 임공(林公, 지둔)이 먼저 자리에 있었고 그 우러르는 기상이 매우 높았다. 왕자유가 \"만약 임공의 수염과 머리털이 다 갖추어졌다면, 신정(神情)이 이보다 더 나았겠습니까?\"라고 하니, 사만이 \"입술과 이는 서로 의지하니 어느 하나도 없어서는 안 되거니와, 수염과 머리털이 신명(神明)과 무슨 상관이 있겠는가?\"라고 하였다. 임공의 마음이 매우 언짢아져 \"일곱 자의 몸을 오늘 그대 두 현인에게 맡기노라\"라고 하였다.", ["용모", "기지", "비평"]], ["排調", 44, "郗司空拜北府，王黃門詣郗門拜，云：「應變將略，非其所長。」驟詠之不已。郗倉謂嘉賓曰：「公今日拜，子猷言語殊不遜，深不可容！」嘉賓曰：「此是陳壽作諸葛評。人以汝家比武侯，復何所言？」", "치사공(郗司空, 치감)이 북부(北府)에 임명되자, 왕황문(王黃門, 왕휘지)이 치공의 문에 찾아가 절하며 \"임기응변과 장수의 책략은 그가 잘하는 바가 아니다\"라고 하면서, 거듭 이를 읊기를 그치지 않았다. 치창(郗倉)이 가빈(嘉賓, 치초)에게 이르기를 \"공이 오늘 임명되었는데, 자유(子猷, 왕휘지)의 말이 너무도 불손하니 결코 용납할 수 없습니다!\"라고 하였다. 가빈이 \"이는 진수(陳壽)가 제갈량(諸葛亮)을 평한 말이다. 사람들이 우리 집안을 무후(武侯, 제갈량)에 견주었으니, 더 무슨 말을 하겠느냐?\"라고 하였다.", ["기지", "비평", "권력", "제갈씨"]], ["排調", 45, "王子猷詣謝公，謝曰：「云何七言詩？」子猷承問，答曰：「昂昂若千里之駒，汎汎若水中之鳧。」", "왕자유(王子猷, 왕휘지)가 사공(謝公, 사안)을 찾아가니, 사공이 \"칠언시(七言詩)란 무엇인가?\"라고 하였다. 자유가 물음을 받고 답하기를 \"기운차기는 천 리를 달리는 망아지 같고, 떠다니기는 물 가운데 오리 같습니다\"라고 하였다.", ["기지", "학문"]], ["排調", 46, "王文度、范榮期俱為簡文所要。范年大而位小，王年小而位大。將前，更相推在前。既移久，王遂在范後。王因謂曰：「簸之揚之，穅秕在前。」范曰：「洮之汰之，沙礫在後。」", "왕문도(王文度, 왕탄지)와 범영기(范榮期)가 함께 간문제(簡文帝)의 부름을 받았다. 범영기는 나이가 많으나 지위가 낮았고, 왕문도는 나이가 적으나 지위가 높았다. 나아가려 할 때 서로 앞서 가라고 양보하였다. 한참을 그러다가 왕문도가 마침내 범영기 뒤에 서게 되었다. 왕문도가 이에 \"까불러 날리면 쭉정이와 겨가 앞에 가는 법이오\"라고 하니, 범영기가 \"일어 가려내면 모래와 자갈이 뒤에 남는 법이오\"라고 하였다.", ["기지", "겸손"]], ["排調", 47, "劉遵祖少為殷中軍所知，稱之於庾公。庾公甚忻然，便取為佐。既見，坐之獨榻上與語。劉爾日殊不稱，庾小失望，遂名之為「羊公鶴」。昔羊叔子有鶴善舞，嘗向客稱之。客試使驅來，氃氋而不肯舞。故稱比之。", "유준조(劉遵祖)는 젊어서 은중군(殷中軍, 은호)에게 인정받았는데, 은호가 그를 유공(庾公, 유량)에게 칭찬하였다. 유공이 매우 기뻐하며 곧 그를 보좌로 삼았다. 막상 만나서는 그를 따로 평상 위에 앉혀 더불어 이야기하였다. 유준조는 그날 도무지 기대에 미치지 못하여 유공이 다소 실망하였고, 마침내 그를 \"양공(羊公)의 학\"이라 이름하였다. 옛날 양숙자(羊叔子)에게 춤을 잘 추는 학이 있어 일찍이 손님에게 그것을 자랑하였다. 손님이 시험삼아 몰아오게 하였더니, 깃털만 부풀린 채 춤추려 하지 않았다. 그래서 그를 이에 빗댄 것이다.", ["비평", "재능"]], ["排調", 48, "魏長齊雅有體量，而才學非所經。初宦當出，虞存嘲之曰：「與卿約法三章：談者死，文筆者刑，商略抵罪。」魏怡然而笑，無忤於色。", "위장제(魏長齊)는 평소 체통과 기량(器量)이 있었으나 재주와 학문은 그가 익힌 바가 아니었다. 처음 벼슬길에 나가게 되었을 때, 우존(虞存)이 그를 놀려 이르기를 \"그대와 법 세 가지를 약속하겠소. 청담(淸談)하는 자는 죽이고, 글 짓는 자는 형벌을 주며, 평론하고 따지는 자는 죄로 다스리겠소\"라고 하였다. 위장제는 부드럽게 웃을 뿐 얼굴에 거슬리는 기색이 없었다.", ["도량", "겸손", "청담"]], ["排調", 49, "郗嘉賓書與袁虎，道戴安道、謝居士云：「恆任之風，當有所弘耳。」以袁無恆，故以此激之。", "치가빈(郗嘉賓, 치초)이 원호(袁虎)에게 보낸 편지에서 대안도(戴安道, 대규)와 사거사(謝居士)를 말하여 이르기를 \"한결같이 맡기는 풍모는 마땅히 넓혀야 할 바가 있을 것이오\"라고 하였다. 원호가 한결같음이 없었기에 이로써 그를 격려한 것이다.", ["우정", "간언", "비평"]], ["排調", 50, "范啟與郗嘉賓書曰：「子敬舉體無饒縱，掇皮無餘潤。」郗答曰：「舉體無餘潤，何如舉體非真者？」范性矜假多煩，故嘲之。", "범계(范啟)가 치가빈(郗嘉賓, 치초)에게 보낸 편지에서 \"자경(子敬, 왕헌지)은 온몸에 너그러이 풀어진 데가 없고, 껍질을 벗겨도 윤기라곤 남아 있지 않소\"라고 하였다. 치가빈이 답하기를 \"온몸에 윤기가 남아 있지 않은 것이, 온몸이 진실하지 못한 것에 비하면 어떻소?\"라고 하였다. 범계는 성품이 거짓 꾸밈과 번거로움이 많았던 까닭에 그를 놀린 것이다.", ["비평", "기지"]], ["排調", 51, "二郗奉道，二何奉佛，皆以財賄。謝中郎云：「二郗諂於道，二何佞於佛。」", "두 치씨(郗氏)는 도교(道敎)를 받들고 두 하씨(何氏)는 불교(佛敎)를 받들었는데, 모두 재물로써 하였다. 사중랑(謝中郎, 사만)이 이르기를 \"두 치씨는 도교에 아첨하고, 두 하씨는 불교에 아부한다\"라고 하였다.", ["비평", "기지"]], ["排調", 52, "王文度在西州，與林法師講，韓、孫諸人並在坐。林公理每欲小屈，孫興公曰：「法師今日如著弊絮在荊棘中，觸地挂閡。」", "왕문도(王文度, 왕탄지)가 서주(西州)에 있을 때 임법사(林法師, 지둔)와 더불어 강론하였는데, 한씨(韓氏)와 손씨(孫氏) 등 여러 사람이 함께 자리에 있었다. 임공(林公, 지둔)의 이치(理)가 매번 다소 굽히려 할 때마다 손흥공(孫興公, 손작)이 \"법사께서 오늘은 마치 해진 솜옷을 입고 가시덤불 속에 있는 것 같아 가는 곳마다 걸리는구려\"라고 하였다.", ["청담", "비평", "기지"]], ["排調", 53, "范榮期見郗超俗情不淡，戲之曰：「夷、齊、巢、許，一詣垂名。何必勞神苦形，支策據梧邪？」郗未答。韓康伯曰：「何不使遊刃皆虛？」", "범영기(范榮期)가 치초(郗超)의 속된 정이 담박하지 못함을 보고 그를 놀려 이르기를 \"백이(伯夷)·숙제(叔齊)와 소부(巢父)·허유(許由)는 한번 나아가 이름을 드리웠소. 어찌 반드시 정신을 수고롭게 하고 몸을 괴롭히며 지팡이에 기대고 오동나무에 의지하겠소?\"라고 하였다. 치초가 미처 답하지 못하자, 한강백(韓康伯)이 \"어찌하여 칼날이 노니는 곳이 모두 빈 곳이게 하지 않으시오?\"라고 하였다.", ["청담", "기지", "비평"]], ["排調", 54, "簡文在殿上行，右軍與孫興公在後。右軍指簡文語孫曰：「此噉名客！」簡文顧曰：「天下自有利齒兒。」後王光祿作會稽，謝車騎出曲阿祖之。王孝伯罷秘書丞在坐，謝言及此事，因視孝伯曰：「王丞齒似不鈍。」王曰：「不鈍，頗亦驗。」", "간문제(簡文帝)가 궁전 위를 거닐 때, 우군(右軍, 왕희지)과 손흥공(孫興公, 손작)이 뒤에 있었다. 우군이 간문제를 가리키며 손흥공에게 \"저이는 명예를 탐하는 객이오\"라고 하였다. 간문제가 돌아보며 \"천하에는 본래 날카로운 이를 가진 자가 있는 법이지\"라고 하였다. 뒤에 왕광록(王光祿)이 회계(會稽)의 자사가 되어 떠날 때, 사거기(謝車騎, 사현)가 곡아(曲阿)로 나와 전송하였다. 왕효백(王孝伯, 왕공)이 비서승(秘書丞)에서 물러나 자리에 있었는데, 사현이 이 일을 언급하다가 효백을 보며 \"왕승(王丞)의 이도 무딘 것 같지 않구려\"라고 하였다. 효백이 \"무디지 않을 뿐 아니라 자못 효험도 있지요\"라고 하였다.", ["기지", "비평"]], ["排調", 55, "謝遏夏月嘗仰臥，謝公清晨卒來，不暇著衣，跣出屋外，方躡履問訊。公曰：「汝可謂前倨而後恭。」", "사알(謝遏, 사현)이 여름철에 일찍이 반듯이 누워 있었는데, 사공(謝公, 사안)이 이른 새벽에 갑자기 오니, 옷 입을 겨를도 없이 맨발로 방 밖으로 나가서야 비로소 신을 신고 문안을 올렸다. 사공이 \"너는 가히 앞서는 거만하다가 뒤에는 공손하다 할 만하구나\"라고 하였다.", ["오만", "겸손", "기지"]], ["排調", 56, "顧長康作殷荊州佐，請假還東。爾時例不給布颿，顧苦求之，乃得發。至破冢，遭風大敗。作牋與殷云：「地名破冢，真破冢而出。行人安穩，布颿無恙。」", "고장강(顧長康, 고개지)이 은형주(殷荊州, 은중감)의 보좌가 되었다가 휴가를 청하여 동쪽으로 돌아가게 되었다. 그때 관례상 베 돛을 지급하지 않았는데, 고장강이 애써 청하여 비로소 출발할 수 있었다. 파총(破冢)에 이르렀을 때 바람을 만나 크게 낭패를 보았다. 은형주에게 편지를 지어 이르기를 \"지명이 파총인데, 참으로 무덤을 부수고 나온 격이었습니다. 그러나 가는 사람은 무사하고 베 돛도 탈이 없습니다\"라고 하였다.", ["기지", "풍류"]], ["排調", 57, "符朗初過江，王咨議大好事，問中國人物及風土所生，終無極已。朗大患之。次復問奴婢貴賤，朗云：「謹厚有識，中者，乃至十萬；無意為奴婢，問者，止數千耳。」", "부랑(符朗)이 처음 강을 건너왔을 때, 왕자의(王咨議)가 매우 호기심이 많아 중원의 인물과 풍토·산물을 물어 끝내 그칠 줄 몰랐다. 부랑이 이를 몹시 괴로워하였다. 다음에는 또 노비의 값을 물으니, 부랑이 \"삼가고 두터우며 식견 있는 자는 중간치라도 십만에 이르고, 노비 노릇할 뜻이 없으면서 캐묻기나 하는 자는 겨우 수천에 그치지요\"라고 하였다.", ["기지", "오만"]], ["排調", 58, "東府客館是版屋。謝景重詣太傅，時賓客滿中，初不交言，直仰視云：「王乃復西戎其屋。」", "동부(東府)의 객관(客館)은 널빤지로 지은 집이었다. 사경중(謝景重)이 태부(太傅, 사안)를 찾아갔을 때 마침 빈객이 가득 차 있었는데, 처음에는 말을 나누지 않고 곧장 천장을 올려다보며 \"왕(王)이 또 그 집을 서융(西戎)처럼 지었구나\"라고 하였다.", ["기지", "비평"]], ["排調", 59, "顧長康噉甘蔗，先食尾。人問所以，云：「漸至佳境。」", "고장강(顧長康, 고개지)이 사탕수수를 먹을 때 먼저 끝부분부터 먹었다. 사람들이 그 까닭을 물으니, \"점점 좋은 경지에 이르려는 것이오\"라고 하였다.", ["기지", "풍류"]], ["排調", 60, "孝武屬王珣求女壻，曰：「王敦、桓溫，磊砢之流，既不可復得，且小如意，亦好豫人家事，酷非所須。正如真長、子敬比，最佳。」珣舉謝混。後袁山松欲擬謝婚，王曰：「卿莫近禁臠。」", "효무제(孝武帝)가 왕순(王珣)에게 사위를 구하라고 부탁하며 말하기를 \"왕돈(王敦)·환온(桓溫) 같은 우뚝한 무리는 이미 다시 얻을 수 없거니와, 게다가 조금만 뜻에 맞으면 남의 집안일에 끼어들기를 좋아하니 결코 필요한 바가 아니오. 다만 진장(眞長, 유담)·자경(子敬, 왕헌지) 같은 자라면 가장 좋겠소\"라고 하였다. 왕순이 사혼(謝混)을 천거하였다. 뒤에 원산송(袁山松)이 사씨와 혼인을 맺으려 하니, 왕순이 \"그대는 금련(禁臠, 임금이 정해 둔 사위감)에 가까이 가지 마시오\"라고 하였다.", ["권력", "부부", "비평"]], ["排調", 61, "桓南郡與殷荊州語次，因共作了語。顧愷之曰：「火燒平原無遺燎。」桓曰：「白布纏棺豎旒旐。」殷曰：「投魚深淵放飛鳥。」次復作危語。桓曰：「矛頭淅米劍頭炊。」殷曰：「百歲老翁攀枯枝。」顧曰：「井上轆轤臥嬰兒。」殷有一參軍在坐，云：「盲人騎瞎馬，夜半臨深池。」殷曰：「咄咄逼人！」仲堪眇目故也。", "환남군(桓南郡, 환현)이 은형주(殷荊州, 은중감)와 이야기를 나누던 차에 함께 '끝맺는 말(了語)'을 짓게 되었다. 고개지(顧愷之)가 \"불이 평원을 태우니 남은 불씨가 없네\"라고 하였다. 환현이 \"흰 베로 관을 감으니 명정(銘旌)이 곧추서네\"라고 하였다. 은중감이 \"물고기를 깊은 못에 던지고 나는 새를 놓아주네\"라고 하였다. 다음에는 다시 '위태로운 말(危語)'을 지었다. 환현이 \"창끝에서 쌀을 일고 칼끝에서 밥을 짓네\"라고 하였다. 은중감이 \"백 살 늙은이가 마른 가지에 매달렸네\"라고 하였다. 고개지가 \"우물 위 도르래에 갓난아이가 누웠네\"라고 하였다. 은중감의 한 참군이 자리에 있다가 \"눈먼 사람이 눈먼 말을 타고 한밤중에 깊은 못가에 이르렀네\"라고 하였다. 은중감이 \"아아, 사람을 핍박하는구나!\"라고 하였으니, 중감(仲堪)이 한쪽 눈이 멀었던 까닭이다.", ["기지", "재능", "풍류"]], ["排調", 62, "桓玄出射，有一劉參軍與周參軍朋賭，垂成，唯少一破。劉謂周曰：「卿此起不破，我當撻卿。」周曰：「何至受卿撻！」劉曰：「伯禽之貴，尚不免撻，而況於卿？」周殊無忤色。桓語庾伯鸞曰：劉參軍宜停讀書，周參軍且勤學問。」", "환현(桓玄)이 활쏘기를 나갔는데, 한 유참군(劉參軍)이 주참군(周參軍)과 짝을 지어 내기를 하였다. 거의 이길 무렵에 다만 한 발만 모자랐다. 유참군이 주참군에게 \"그대가 이번에 맞히지 못하면 내가 그대를 매질하겠소\"라고 하니, 주참군이 \"어찌 그대의 매질을 받겠소!\"라고 하였다. 유참군이 \"백금(伯禽)의 귀함으로도 매질을 면치 못했거늘, 하물며 그대이겠소?\"라고 하였다. 주참군은 전혀 거슬리는 기색이 없었다. 환현이 유백란(庾伯鸞)에게 이르기를 \"유참군은 마땅히 책 읽기를 멈추어야 하고, 주참군은 또한 학문에 힘써야겠소\"라고 하였다.", ["기지", "학문", "비평"]], ["排調", 63, "桓南郡與道曜講老子，王侍中為主簿在坐。桓曰：「王主簿，可顧名思義。」王未答，且大笑。桓曰：「王思道能作大家兒笑。」", "환남군(桓南郡, 환현)이 도요(道曜)와 더불어 『노자(老子)』를 강론할 때, 왕시중(王侍中)이 주부(主簿)로서 자리에 있었다. 환현이 \"왕주부, 이름을 돌아보고 뜻을 생각해 볼 만하오\"라고 하였다. 왕시중은 미처 답하지 못하고 그저 크게 웃었다. 환현이 \"왕사도(王思道)는 능히 큰 집안 자제다운 웃음을 짓는구나\"라고 하였다.", ["청담", "기지"]], ["排調", 64, "祖廣行恒縮頭。詣桓南郡，始下車，桓曰：「天甚晴朗，祖參軍如從屋漏中來。」", "조광(祖廣)은 걸음을 걸을 때 늘 목을 움츠렸다. 환남군(桓南郡, 환현)을 찾아가 막 수레에서 내리자, 환현이 \"하늘이 매우 맑고 환한데, 조참군은 마치 비 새는 집 안에서 나온 것 같구려\"라고 하였다.", ["기지", "용모"]], ["排調", 65, "桓玄素輕桓崖，崖在京下有好桃，玄連就求之，遂不得佳者。玄與殷仲文書，以為嗤笑曰：「德之休明，肅慎貢其楛矢；如其不爾，籬壁間物，亦不可得也。」", "환현(桓玄)은 평소 환애(桓崖)를 가벼이 여겼는데, 환애가 서울에 좋은 복숭아를 가지고 있어 환현이 연거푸 청하였으나 끝내 좋은 것을 얻지 못하였다. 환현이 은중문(殷仲文)에게 보낸 편지에서 이를 비웃어 이르기를 \"덕이 아름답고 밝으면 숙신(肅愼)이 호시(楛矢)를 바치거니와, 만약 그렇지 못하면 울타리나 담장 사이의 물건조차도 얻을 수 없구려\"라고 하였다.", ["기지", "오만"]], ["輕詆", 1, "王太尉問眉子：「汝叔名士，何以不相推重？」眉子曰：「何有名士終日妄語？」", "왕태위(王太尉, 왕연)가 미자(眉子)에게 \"네 숙부는 명사(名士)인데 어찌하여 그를 떠받들어 중히 여기지 않느냐?\"라고 물었다. 미자가 \"어찌 명사가 종일토록 망령된 말을 하는 일이 있겠습니까?\"라고 하였다.", ["비평", "기지"]], ["輕詆", 2, "庾元規語周伯仁：「諸人皆以君方樂。」周曰：「何樂？謂樂毅邪？」庾曰：「不爾。樂令耳！」周曰：「何乃刻畫無鹽，以唐突西子也。」", "유원규(庾元規, 유량)가 주백인(周伯仁, 주의)에게 \"사람들이 모두 그대를 악(樂)에 견주오\"라고 하였다. 주의가 \"어느 악이오? 악의(樂毅)를 말하는 것이오?\"라고 하였다. 유량이 \"그렇지 않소. 악령(樂令, 악광)이오!\"라고 하였다. 주의가 \"어찌 추한 무염(無鹽)을 그려서 미인 서시(西子)에게 함부로 빗대는 것이오\"라고 하였다.", ["비평", "기지"]], ["輕詆", 3, "深公云：「人謂庾元規名士，胷中柴棘三斗許。」", "심공(深公)이 이르기를 \"사람들이 유원규(庾元規, 유량)를 명사(名士)라 하지만, 가슴속에는 가시덤불이 서 말쯤 들어 있다\"라고 하였다.", ["비평"]], ["輕詆", 4, "庾公權重，足傾王公。庾在石頭，王在冶城坐。大風揚塵，王以扇拂塵曰：「元規塵汙人！」", "유공(庾公, 유량)은 권세가 무거워 왕공(王公, 왕도)을 기울일 만하였다. 유공이 석두(石頭)에 있고 왕공이 야성(冶城)에 앉아 있을 때, 큰 바람이 먼지를 일으키니 왕공이 부채로 먼지를 떨치며 \"원규(元規)의 먼지가 사람을 더럽히는구나!\"라고 하였다.", ["권력", "분노", "비평"]], ["輕詆", 5, "王右軍少時甚澀訥，在大將軍許，王、庾二公後來，右軍便起欲去。大將軍留之曰：「爾家司空、元規，復可所難？」", "왕우군(王右軍, 왕희지)이 젊었을 때 매우 어눌하여 말을 더듬었는데, 대장군(大將軍, 왕돈)의 처소에 있을 때 왕공(王公, 왕도)과 유공(庾公, 유량) 두 분이 뒤따라 오자 우군이 곧 일어나 떠나려 하였다. 대장군이 그를 만류하며 \"네 집안의 사공(司空, 왕도)과 원규(元規, 유량)이거늘, 무엇이 어렵겠느냐?\"라고 하였다.", ["용모", "우정"]], ["輕詆", 6, "王丞相輕蔡公，曰：「我與安期、千里共遊洛水邊，何處聞有蔡充兒？」", "왕승상(王丞相, 왕도)이 채공(蔡公)을 가벼이 여겨 \"나는 안기(安期)·천리(千里)와 더불어 낙수(洛水) 가에서 함께 노닐었는데, 어디서 채충(蔡充)의 아들이 있다는 말을 들어 보았겠는가?\"라고 하였다.", ["오만", "비평"]], ["輕詆", 7, "褚太傅初渡江，嘗入東，至金昌亭。吳中豪右，燕集亭中。褚公雖素有重名，于時造次不相識別。敕左右多與茗汁，少箸粽，汁盡輒益，使終不得食。褚公飲訖，徐舉手共語云：「褚季野！」於是四座驚散，無不狼狽。", "저태부(褚太傅)가 처음 강을 건넜을 때 일찍이 동쪽으로 들어가 금창정(金昌亭)에 이르렀다. 오중(吳中)의 호족들이 정자 안에서 연회를 베풀고 있었다. 저공(褚公)은 비록 평소 높은 명성이 있었으나, 그때는 황망 중이라 서로 알아보지 못하였다. 좌우에 명하여 차 즙은 많이 주고 떡은 조금만 놓게 하며, 즙이 다하면 곧 더 채워 끝내 먹지 못하게 하였다. 저공이 다 마시고 천천히 손을 들어 함께 말하기를 \"저계야(褚季野)요\"라고 하였다. 이에 온 자리가 놀라 흩어지며 낭패하지 않는 자가 없었다.", ["기지", "도량"]], ["輕詆", 8, "王右軍在南，丞相與書，每歎子姪不令。云：「虎、虎犢，還其所如。」", "왕승상(王丞相, 왕도)이 남쪽에 있을 때, 승상이 보낸 편지에서 매번 자질(子姪)들이 변변치 못함을 탄식하여 이르기를 \"호(虎)와 호독(虎犢)이 각기 제 본바탕대로 돌아가는구나\"라고 하였다.", ["비평"]], ["輕詆", 9, "褚太傅南下，孫長樂於船中視之。言次，及劉真長死，孫流涕，因諷詠曰：「人之云亡，邦國殄瘁。」褚大怒曰：「真長平生，何嘗相比數，而卿今日作此面向人！」孫回泣向褚曰：「卿當念我！」時咸笑其才而性鄙。", "저(褚) 태부가 남쪽으로 내려갈 적에, 손작(孫綽)이 배 안으로 그를 찾아보았다. 이야기를 나누던 중에 유진장(劉眞長)이 죽은 일에 미치자, 손작이 눈물을 흘리며 이내 읊조렸다. \"사람이 죽으니, 나라가 시들고 병들었도다.\" 저 태부가 크게 노하여 말하였다. \"진장이 평생에 언제 그대를 동렬에 견주어 셈한 적이 있었기에, 그대가 오늘 이런 얼굴을 하고 남을 대하는가!\" 손작이 울음을 거두고 저 태부를 향하여 말하였다. \"그대는 마땅히 나를 생각해 주시오!\" 당시 사람들은 모두 그의 재주는 인정하되 그 성품이 비루함을 비웃었다.", ["죽음", "분노", "비평"]], ["輕詆", 10, "謝鎮西書與殷揚州，為真長求會稽。殷答曰：「真長標同伐異，俠之大者。常謂使君降階為甚，乃復為之驅馳邪？」", "진서장군(鎭西將軍) 사상(謝尚)이 양주자사 은호(殷浩)에게 편지를 보내, 진장(眞長, 유담)을 위해 회계(會稽)를 청하였다. 은호가 답하였다. \"진장은 같은 편을 내세우고 다른 편을 치니, 협객 중에서도 큰 자입니다. 늘 사군(使君)께서 지위를 낮추는 것조차 지나치다 여겼거늘, 도리어 또 그를 위해 분주히 애써야겠습니까?\"", ["비평", "권력"]], ["輕詆", 11, "桓公入洛，過淮、泗，踐北境，與諸僚屬登平乘樓，眺矚中原，慨然曰：「遂使神州陸沈，百年丘墟，王夷甫諸人，不得不任其責！」袁虎率爾對曰：「運自有廢興，豈必諸人之過？」桓公懍然作色，顧謂四坐曰：「諸君頗聞劉景升不？有大牛重千斤，噉芻豆十倍於常牛，負重致遠，曾不若一羸牸。魏武入荊州，烹以饗士卒，于時莫不稱快。」意以況袁。四坐既駭，袁亦失色。", "환공(桓溫)이 낙양(洛陽)으로 들어가, 회수와 사수를 지나 북쪽 경계를 밟고서, 여러 막료와 부하들과 함께 평승루(平乘樓)에 올라 중원을 바라보며 개탄하여 말하였다. \"마침내 신주(神州)를 가라앉게 하고 백 년의 세월을 폐허로 만들었으니, 왕이보(王夷甫, 왕연) 등 여러 사람이 그 책임을 지지 않을 수 없다!\" 원호(袁虎)가 경솔하게 대답하였다. \"운수에는 절로 흥망이 있으니, 어찌 반드시 여러 사람의 잘못이겠습니까?\" 환공이 정색하며 두려운 기색으로 좌중을 돌아보며 말하였다. \"여러분은 유경승(劉景升)에 대해 좀 들어보았소? 천 근이나 되는 큰 소가 있어 보통 소보다 열 배나 되는 꼴과 콩을 먹었으나, 무거운 짐을 지고 멀리 가는 데는 일찍이 여윈 암소 한 마리만도 못하였소. 위 무제(魏武帝)가 형주(荊州)에 들어와 그것을 삶아 병졸들을 먹이니, 그때 통쾌해하지 않는 이가 없었소.\" 그 뜻은 원호를 빗댄 것이었다. 좌중이 모두 놀랐고, 원호 또한 낯빛을 잃었다.", ["권력", "비평", "용기"]], ["輕詆", 12, "袁虎、伏滔同在桓公府。桓公每遊燕，輒命袁、伏，袁甚恥之，恆歎曰：「公之厚意，未足以榮國士！與伏滔比肩，亦何辱如之？」", "원호(袁虎)와 복도(伏滔)가 함께 환공(桓溫)의 막부에 있었다. 환공이 잔치를 베풀 때마다 번번이 원호와 복도를 불렀는데, 원호는 그것을 몹시 부끄러워하여 늘 탄식하며 말하였다. \"공의 두터운 뜻이 국사(國士)를 영예롭게 하기에는 부족하구나! 복도와 어깨를 나란히 하게 되니, 또한 이만한 욕됨이 어디 있겠는가?\"", ["비평", "오만"]], ["輕詆", 13, "高柔在東，甚為謝仁祖所重。既出，不為王、劉所知。仁祖曰：「近見高柔，大自敷奏，然未有所得。」真長云：「故不可在偏地居，輕在角中，為人作議論。」高柔聞之，云：「我就伊無所求。」人有向真長學此言者，真長曰：「我寔亦無可與伊者。」然遊燕猶與諸人書：「可要安固？」安固者，高柔也。", "고유(高柔)가 동쪽에 있을 때는 사인조(謝仁祖, 사상)에게 몹시 중히 여겨졌다. 그러나 그곳을 떠난 뒤로는 왕(왕몽)과 유(유담)에게 인정받지 못하였다. 사인조가 말하였다. \"근래에 고유를 만났는데, 자기 뜻을 크게 늘어놓았으나 얻은 바는 없더군.\" 진장(眞長, 유담)이 말하였다. \"본디 외진 곳에 거하면 안 되니, 한 모퉁이에 가벼이 처하면 남에게 이러쿵저러쿵 의론거리가 되는 법이지.\" 고유가 이를 듣고 말하였다. \"나는 그들에게서 구하는 바가 없소.\" 어떤 사람이 진장에게 가서 이 말을 알리니, 진장이 말하였다. \"나 역시 실로 그에게 줄 만한 것이 없소.\" 그러나 잔치를 열 때면 여전히 여러 사람에게 편지를 보내 \"안고(安固)를 청해도 되겠소?\"라고 하였다. 안고란 곧 고유였다.", ["비평", "우정", "도량"]], ["輕詆", 14, "劉尹、江虨、王叔虎、孫興公同坐，江、王有相輕色。虨以手歙叔虎云：「酷吏！」詞色甚彊。劉尹顧謂：「此是瞋邪？非特是醜言聲，拙視瞻。」", "유윤(劉尹, 유담)과 강빈(江虨), 왕숙호(王叔虎), 손흥공(孫興公, 손작)이 함께 앉아 있었는데, 강빈과 왕숙호 사이에 서로 경시하는 기색이 있었다. 강빈이 손으로 숙호를 가리키며 말하였다. \"혹독한 관리로다!\" 그 말과 낯빛이 몹시 강경하였다. 유윤이 돌아보며 말하였다. \"이것은 성낸 것인가? 다만 말소리가 추할 뿐만 아니라 보는 눈매도 졸렬하구나.\"", ["비평", "분노", "오만"]], ["輕詆", 15, "孫綽作列仙商丘子贊曰：「所牧何物？殆非真豬。儻遇風雲，為我龍攄。」時人多以為能。王藍田語人云：「近見孫家兒作文，道何物、真豬也。」", "손작(孫綽)이 「열선상구자찬(列仙商丘子贊)」을 지어 말하였다. \"무엇을 치는가? 아마도 진짜 돼지는 아니리라. 혹 풍운을 만난다면, 나를 위해 용으로 솟구치리.\" 당시 사람들은 대부분 그것을 뛰어나다 여겼다. 왕남전(王藍田, 왕술)이 사람들에게 말하였다. \"근래에 손씨 집 아이가 글 짓는 것을 보았는데, '무엇이며 진짜 돼지로다'라고 하더군.\"", ["비평", "서화", "재능"]], ["輕詆", 16, "桓公欲遷都，以張拓定之業。孫長樂上表，諫此議甚有理。桓見表心服，而忿其為異，令人致意孫云：「君何不尋遂初賦，而彊知人家國事？」", "환공(桓溫)이 도읍을 옮겨 천하를 평정한 업적을 넓히고자 하였다. 손작(孫綽)이 표를 올려 이 의론을 간하였는데 매우 이치에 맞았다. 환공이 표를 보고 속으로는 탄복하였으나 그가 다른 의견을 낸 것을 분히 여겨, 사람을 시켜 손작에게 뜻을 전하게 하였다. \"그대는 어찌하여 「수초부(遂初賦)」나 헤아리지 않고, 억지로 남의 나라 일을 알려 드는가?\"", ["간언", "권력", "분노"]], ["輕詆", 17, "孫長樂兄弟就謝公宿，言至款雜。劉夫人在壁後聽之，具聞其語。謝公明日還，問：「昨客何似？」劉對曰：「亡兄門，未有如此賓客！」謝深有愧色。", "손작(孫綽) 형제가 사공(謝公, 사안)을 찾아가 묵었는데, 이야기가 매우 정성스러우면서도 잡스러웠다. 유부인(劉夫人)이 벽 뒤에서 듣고 그 말을 다 들었다. 사공이 이튿날 돌아오자 물었다. \"어제 손님들은 어떠하였소?\" 유부인이 대답하였다. \"돌아가신 오라버니 문하에는 이런 빈객이 있지 않았습니다!\" 사공은 깊이 부끄러운 기색을 띠었다.", ["비평", "여인", "오만"]], ["輕詆", 18, "簡文與許玄度共語，許云：「舉君、親以為難。」簡文便不復答。許去後而言曰：「玄度故可不至於此！」", "간문제(簡文帝)가 허현도(許玄度, 허순)와 함께 이야기를 나누는데, 허순이 말하였다. \"임금과 어버이를 들어 따지는 것은 어려운 일입니다.\" 간문제는 이내 더 대답하지 않았다. 허순이 떠난 뒤에 말하였다. \"현도가 본디 이 정도까지는 이르지 않을 만한데.\"", ["청담", "비평"]], ["輕詆", 19, "謝萬壽春敗後，還，書與王右軍云：「慙負宿顧。」右軍推書曰：「此禹、湯之戒。」", "사만(謝萬)이 수춘(壽春)에서 패한 뒤 돌아와, 왕우군(王右軍, 왕희지)에게 편지를 보내 말하였다. \"평소의 보살핌을 저버려 부끄럽습니다.\" 우군이 편지를 밀쳐내며 말하였다. \"이것은 우(禹)와 탕(湯)의 경계로다.\"", ["권력", "비평", "간언"]], ["輕詆", 20, "蔡伯喈睹睞笛椽，孫興公聽妓，振且擺折。王右軍聞，大嗔曰：「三祖壽樂器，虺瓦弔，孫家兒打折。」", "채백개(蔡伯喈, 채옹)가 살펴보던 피리 서까래로, 손흥공(孫興公, 손작)이 기녀의 연주를 듣다가 흔들어 꺾어버렸다. 왕우군(王右軍, 왕희지)이 이를 듣고 크게 노하여 말하였다. \"세 선조의 수악(壽樂) 악기인데, 살무사와 기와의 조상으로 여겨, 손씨 집 아이가 쳐서 꺾어버렸구나.\"", ["분노", "음악", "원한"]], ["輕詆", 21, "王中郎與林公絕不相得。王謂林公詭辯，林公道王云：「箸膩顏帢，布單衣，挾左傳，逐鄭康成車後，問是何物塵垢囊！」", "왕중랑(王中郎, 왕탄지)과 임공(林公, 지둔)은 전혀 서로 맞지 않았다. 왕탄지는 임공을 궤변이라 여겼고, 임공은 왕탄지를 두고 말하였다. \"기름때 묻은 얼굴 두건을 쓰고, 베 홑옷을 입고, 『좌전(左傳)』을 끼고서, 정강성(鄭康成, 정현)의 수레 뒤를 좇아가는, 저 무슨 먼지 때 주머니란 말인가!\"", ["비평", "절교", "청담"]], ["輕詆", 22, "孫長樂作王長史誄云：「余與夫子，交非勢利，心猶澄水，同此玄味。」王孝伯見曰：「才士不遜，亡祖何至與此人周旋！」", "손작(孫綽)이 왕장사(王長史, 왕몽)의 뇌문을 지어 말하였다. \"내가 부자(夫子)와 사귄 것은 권세와 이익 때문이 아니라, 마음은 맑은 물과 같이 이 현묘한 정취를 함께하였노라.\" 왕효백(王孝伯, 왕공)이 이를 보고 말하였다. \"재사가 겸손치 못하구나. 돌아가신 조부께서 어찌 이런 사람과 더불어 교유하셨겠는가!\"", ["비평", "겸손", "우정"]], ["輕詆", 23, "謝太傅謂子姪曰：「中郎始是獨有千載！」車騎曰：「中郎衿抱未虛，復那得獨有？」", "사태부(謝太傅, 사안)가 자제와 조카들에게 말하였다. \"중랑(中郎)이야말로 비로소 천 년에 홀로 우뚝한 이로다!\" 거기장군(車騎將軍, 사현)이 말하였다. \"중랑은 가슴속이 아직 비어 있지 못한데, 어찌 홀로 우뚝할 수 있겠습니까?\"", ["비평", "겸손"]], ["輕詆", 24, "庾道季詫謝公曰：「裴郎云：『謝安謂裴郎乃可不惡，何得為復飲酒？』裴郎又云：『謝安目支道林，如九方臯之相馬，略其玄黃，取其儁逸。』」謝公云：「都無此二語，裴自為此辭耳！」庾意甚不以為好，因陳東亭經酒壚下賦。讀畢，都不下賞裁，直云：「君乃復作裴氏學！」於此語林遂廢。今時有者，皆是先寫，無復謝語。", "유도계(庾道季)가 사공(謝公, 사안)에게 자랑하여 말하였다. \"배랑(裴郞)이 이르기를 '사안이 배랑은 그래도 나쁘지 않다고 했다는데, 어찌하여 또 술을 마시는가?' 하더이다. 배랑이 또 이르기를 '사안이 지도림(支道林, 지둔)을 평하기를, 구방고(九方臯)가 말을 보는 것과 같아서, 그 검고 누런 빛깔은 생략하고 그 준일함만을 취한다고 했다'고 하더이다.\" 사공이 말하였다. \"도무지 이 두 마디 말을 한 적이 없으니, 배랑이 스스로 이 말을 지어낸 것일 뿐이오!\" 유도계는 마음으로 몹시 좋게 여기지 않더니, 이내 동정(東亭, 왕순)이 술집을 지나며 지은 부를 늘어놓았다. 다 읽고 나서도 사공은 도무지 칭찬하거나 평하지 않고, 다만 말하였다. \"그대가 이제 또 배씨의 학문을 하는구려!\" 이로부터 『어림(語林)』은 마침내 폐기되었다. 지금 전하는 것은 모두 앞서 베껴 둔 것으로, 더는 사공의 말이 실려 있지 않다.", ["비평", "술수", "학문"]], ["輕詆", 25, "王北中郎不為林公所知，乃箸論沙門不得為高士論。大略云：「高士必在於縱心調暢，沙門雖云俗外，反更束於教，非情性自得之謂也。」", "왕북중랑(王北中郎, 왕탄지)은 임공(林公, 지둔)에게 인정받지 못하여, 「사문은 고사가 될 수 없다는 논(沙門不得爲高士論)」을 지었다. 그 대략은 이러하였다. \"고사(高士)는 반드시 마음을 자유로이 놓아 조화롭게 펴는 데 있다. 사문은 비록 세속 밖에 있다 하나, 도리어 교법에 얽매이니, 본성과 정을 스스로 얻는 것이 아니다.\"", ["비평", "은둔", "학문"]], ["輕詆", 26, "人問顧長康：「何以不作洛生詠？」答曰：「何至作老婢聲！」", "어떤 사람이 고장강(顧長康, 고개지)에게 물었다. \"어찌하여 낙양 선비의 읊조림을 하지 않소?\" 그가 답하였다. \"어찌 늙은 종년의 소리를 내겠소!\"", ["기지", "비평"]], ["輕詆", 27, "殷顗、庾恆並是謝鎮西外孫。殷少而率悟，庾每不推。嘗俱詣謝公，謝公熟視殷曰：「阿巢故似鎮西。」於是庾下聲語曰：「定何似？」謝公續復云：「巢頰似鎮西。」庾復云：「頰似，足作健不？」", "은의(殷顗)와 유항(庾恆)은 모두 진서장군 사상(謝尚)의 외손이었다. 은의는 어려서부터 솔직하고 영민하였는데, 유항은 늘 그를 인정하지 않았다. 일찍이 함께 사공(謝公, 사안)을 찾아가니, 사공이 은의를 가만히 살펴보고 말하였다. \"아소(阿巢, 은의)는 본디 진서장군을 닮았구나.\" 이에 유항이 목소리를 낮추어 말하였다. \"대체 어디가 닮았다는 거요?\" 사공이 이어서 다시 말하였다. \"아소의 뺨이 진서장군을 닮았다네.\" 유항이 다시 말하였다. \"뺨이 닮았다 한들, 그것으로 큰 인물이 되기에 족하겠소?\"", ["비평", "신동", "질투"]], ["輕詆", 28, "舊目韓康伯：將肘無風骨。", "예로부터 한강백(韓康伯)을 평하여, \"장차 팔꿈치는 될지언정 풍골(風骨)은 없다\"고 하였다.", ["비평", "용모"]], ["輕詆", 29, "符宏叛來歸國。謝太傅每加接引，宏自以有才，多好上人，坐上無折之者。適王子猷來，太傅使共語。子猷直孰視良久，回語太傅云：「亦復竟不異人！」宏大慚而退。", "부홍(符宏)이 반란하여 나라로 귀순해 왔다. 사태부(謝太傅, 사안)가 늘 그를 접대하고 끌어주었는데, 부홍은 스스로 재주가 있다 여겨 흔히 남을 누르기를 좋아하였으나, 자리에서 그를 꺾을 자가 없었다. 마침 왕자유(王子猷, 왕휘지)가 오자, 태부가 함께 이야기하게 하였다. 자유가 그저 한참을 뚫어지게 바라보다가, 태부를 돌아보며 말하였다. \"역시 끝내 남과 다를 게 없군요!\" 부홍은 크게 부끄러워하며 물러났다.", ["비평", "오만"]], ["輕詆", 30, "支道林入東，見王子猷兄弟。還，人問：「見諸王何如？」答曰：「見一羣白頸烏，但聞喚啞啞聲。」", "지도림(支道林, 지둔)이 동쪽으로 가서 왕자유(王子猷, 왕휘지) 형제를 만났다. 돌아오자 어떤 사람이 물었다. \"여러 왕씨를 만나보니 어떻습디까?\" 그가 답하였다. \"한 무리의 흰 목 까마귀를 보았는데, 다만 깍깍거리는 소리만 들립디다.\"", ["비평", "용모"]], ["輕詆", 31, "王中郎舉許玄度為吏部郎。郗重熙曰：「相王好事，不可使阿訥在坐頭。」", "왕중랑(王中郎, 왕탄지)이 허현도(許玄度, 허순)를 이부랑(吏部郎)으로 천거하였다. 치중희(郗重熙)가 말하였다. \"상왕(相王)께서 일 벌이기를 좋아하시나, 아눌(阿訥)을 윗자리에 앉게 해서는 안 되오.\"", ["비평", "권력"]], ["輕詆", 32, "王興道謂：謝望蔡霍霍如失鷹師。", "왕흥도(王興道)가 말하였다. \"사망채(謝望蔡)는 허둥지둥하는 것이 매를 잃은 매잡이 같다.\"", ["비평"]], ["輕詆", 33, "桓南郡每見人不快，輒嗔云：「君得哀家梨，當復不烝食不？」", "환남군(桓南郡, 환현)은 마음에 들지 않는 사람을 볼 때마다 번번이 성내어 말하였다. \"그대는 애가(哀家)의 배를 얻고도 또 쪄서 먹지 않겠는가?\"", ["분노", "오만"]], ["假譎", 1, "魏武少時，嘗與袁紹好為游俠，觀人新婚，因潛入主人園中，夜叫呼云：「有偷兒賊！」青廬中人皆出觀，魏武乃入，抽刃劫新婦與紹還出，失道，墜枳棘中，紹不能得動，復大叫云：「偷兒在此！」紹遑迫自擲出，遂以俱免。", "위 무제(魏武帝, 조조)가 젊었을 때 일찍이 원소(袁紹)와 더불어 협객 노릇 하기를 즐겨, 남의 혼례를 구경하다가 몰래 주인집 동산으로 들어가, 밤중에 소리쳐 외쳤다. \"도둑이 들었다!\" 푸른 차일 안의 사람들이 모두 나와 구경하자, 위 무제가 들어가 칼을 뽑아 신부를 위협해 데리고 원소와 함께 나왔는데, 길을 잃고 탱자 가시덤불 속에 떨어져 원소가 움직이지 못하였다. 위 무제가 다시 크게 외쳤다. \"도둑이 여기 있다!\" 원소가 다급하여 스스로 몸을 던져 빠져나오니, 마침내 둘 다 화를 면하였다.", ["술수", "기지", "용기"]], ["假譎", 2, "魏武行役，失汲道，軍皆渴，乃令曰：「前有大梅林，饒子，甘酸，可以解渴。」士卒聞之，口皆出水，乘此得及前源。", "위 무제(魏武帝, 조조)가 군사를 이끌고 행군하다가 물 길을 잃어 군사들이 모두 목말라하니, 이에 명을 내려 말하였다. \"앞에 큰 매실 숲이 있는데, 열매가 풍성하여 달고 시니 갈증을 풀 만하다.\" 병졸들이 이를 듣자 입안에 모두 침이 고였고, 이를 틈타 앞의 샘에 이를 수 있었다.", ["기지", "지혜", "술수"]], ["假譎", 3, "魏武常言：「人欲危己，己輒心動。」因語所親小人曰：「汝懷刃密來我側，我必說心動。執汝使行刑，汝但勿言其使，無他，當厚相報！」執者信焉，不以為懼，遂斬之。此人至死不知也。左右以為實，謀逆者挫氣矣。", "위 무제(魏武帝, 조조)가 늘 말하였다. \"남이 나를 해치려 하면, 나는 번번이 가슴이 두근거린다.\" 그러고는 가까이 부리는 어떤 자에게 일러 말하였다. \"너는 칼을 품고 몰래 내 곁으로 오너라. 그러면 내가 반드시 가슴이 두근거린다고 말할 것이다. 너를 붙잡아 처형하게 할 터이나, 너는 다만 누가 시켰다고 말하지 말라. 다른 일은 없을 것이며, 마땅히 후하게 보답하리라!\" 붙잡힌 자는 그 말을 믿고 두려워하지 않았는데, 마침내 그를 베어버렸다. 그 사람은 죽을 때까지도 알지 못하였다. 좌우의 사람들은 그것을 사실로 여겼고, 반역을 꾀하던 자들은 기세가 꺾였다.", ["술수", "담대한죽음", "권력"]], ["假譎", 4, "魏武常云：「我眠中不可妄近，近便斫人，亦不自覺，左右宜深慎此！」後陽眠，所幸一人竊以被覆之，因便斫殺。自爾每眠，左右莫敢近者。", "위 무제(魏武帝, 조조)가 늘 말하였다. \"나는 잠잘 때 함부로 가까이 와서는 안 된다. 가까이 오면 곧 사람을 베는데, 나 또한 스스로 깨닫지 못하니, 좌우는 마땅히 이를 깊이 삼가라!\" 뒷날 거짓으로 잠든 척하니, 총애하던 한 사람이 몰래 이불을 덮어 주자, 이내 베어 죽여버렸다. 그 뒤로 잠잘 때마다 좌우의 누구도 감히 가까이 가지 못하였다.", ["술수", "권력"]], ["假譎", 5, "袁紹年少時，曾遣人夜以劍擲魏武，少下，不著。魏武揆之，其後來必高，因帖臥牀上。劍至果高。", "원소(袁紹)가 젊었을 때, 일찍이 사람을 보내 밤에 칼을 위 무제(魏武帝, 조조)에게 던지게 하였는데, 조금 낮게 던져져 맞지 않았다. 위 무제가 헤아리기를, 그 뒤에 던지는 것은 반드시 높을 것이라 하여, 이내 침상에 몸을 바싹 붙이고 누웠다. 칼이 날아오니 과연 높았다.", ["지혜", "용기", "원한"]], ["假譎", 6, "王大將軍既為逆，頓軍姑孰。晉明帝以英武之才，猶相猜憚，乃著戎服，騎巴賨馬，齎一金馬鞭，陰察軍形勢。未至十餘里，有一客姥，居店賣食。帝過愒之，謂姥曰：「王敦舉兵圖逆，猜害忠良，朝廷駭懼，社稷是憂。故劬勞晨夕，用相覘察，恐形迹危露，或致狼狽。追迫之日，姥其匿之。」便與客姥馬鞭而去。行敦營匝而出，軍士覺，曰：「此非常人也！」敦臥心動，曰：「此必黃須鮮卑奴來！」命騎追之，已覺多許里，追士因問向姥：「不見一黃須人騎馬度此邪？」姥曰：「去已久矣，不可復及。」於是騎人息意而反。", "대장군 왕돈(王敦)이 이미 반역하여 군사를 고숙(姑孰)에 주둔시켰다. 진 명제(晉明帝)는 영특하고 무용을 갖춘 인재였으나, 여전히 그를 의심하고 두려워하여, 이에 군복을 입고 파종마(巴賨馬)를 타고 금으로 된 말채찍 하나를 지니고서, 몰래 군세를 살폈다. 십여 리에 채 못 미친 곳에 한 객지의 노파가 있어 가게를 열고 음식을 팔고 있었다. 명제가 들러 쉬며 노파에게 말하였다. \"왕돈이 군사를 일으켜 반역을 꾀하고 충량한 신하들을 시기해 해쳐, 조정이 놀라 두려워하고 사직을 근심하고 있소. 그래서 새벽부터 저녁까지 수고로이 이를 살피러 다니는 것이오. 행적이 위태로이 드러나 혹 낭패를 당할까 두려우니, 뒤쫓아 다급해지는 날에는, 노파께서 나를 숨겨 주시오.\" 그러고는 객지의 노파에게 말채찍을 주고 떠났다. 왕돈의 군영을 한 바퀴 돌고 나오니, 군사들이 알아채고 말하였다. \"저자는 보통 사람이 아니다!\" 왕돈이 누워 있다가 가슴이 두근거려 말하였다. \"이것은 필시 누런 수염의 선비(鮮卑) 종놈이 온 것이다!\" 기병에게 명하여 뒤쫓게 하였는데, 이미 여러 리나 떨어진 것을 알아챘다. 뒤쫓던 군사가 이내 그 노파에게 물었다. \"누런 수염의 사람이 말을 타고 여기를 지나는 것을 보지 못하였소?\" 노파가 말하였다. \"떠난 지 이미 오래되었으니, 다시 따라잡을 수 없으리다.\" 이에 기병들은 마음을 접고 돌아갔다.", ["용기", "지혜", "기지", "권력"]], ["假譎", 7, "王右軍年減十歲時，大將軍甚愛之，恆置帳中眠。大將軍嘗先出，右軍猶未起。須臾，錢鳳入，屏人論事，都忘右軍在帳中，便言逆節之謀。右軍覺，既聞所論，知無活理，乃剔吐汙頭面被褥，詐孰眠。敦論事造半，方意右軍未起，相與大驚曰：「不得不除之！」及開帳，乃見吐唾從橫，信其實孰眠，於是得全。于時稱其有智。", "왕우군(王右軍, 왕희지)이 열 살이 채 안 되었을 때, 대장군(왕돈)이 그를 몹시 아껴 늘 휘장 안에 두고 함께 잤다. 대장군이 일찍이 먼저 나갔는데 우군은 아직 일어나지 않았다. 잠시 뒤 전봉(錢鳳)이 들어와 사람을 물리고 일을 의논하면서, 우군이 휘장 안에 있는 것을 까맣게 잊고 이내 반역의 모의를 이야기하였다. 우군이 깨어 그 의논하는 바를 듣고는, 살아남을 도리가 없음을 알고, 이에 토하여 머리와 얼굴과 이불을 더럽히고 거짓으로 깊이 잠든 체하였다. 왕돈이 의논을 절반쯤 진행하다가 비로소 우군이 아직 일어나지 않았음을 깨닫고는, 서로 크게 놀라며 말하였다. \"제거하지 않을 수 없다!\" 휘장을 열고 보니 토한 침이 어지러이 널려 있는지라, 정말 깊이 잠든 것으로 믿었다. 이에 목숨을 보전할 수 있었다. 당시 사람들이 그가 지혜를 지녔다고 칭찬하였다.", ["지혜", "기지", "용기"]], ["假譎", 8, "陶公自上流來，赴蘇峻之難，令誅庾公。謂必戮庾，可以謝峻。庾欲奔竄，則不可；欲會，恐見執，進退無計。溫公勸庾詣陶，曰：「卿但遙拜，必無它。我為卿保之。」庾從溫言詣陶。至，便拜。陶自起止之，曰：「庾元規何緣拜陶士衡？」畢，又降就下坐。陶又自要起同坐。坐定，庾乃引咎責躬，深相遜謝。陶不覺釋然。", "도공(陶公, 도간)이 상류로부터 내려와 소준(蘇峻)의 난에 달려와서는, 유공(庾公, 유량)을 처단하라고 명하였다. 반드시 유량을 죽여야 소준에게 사죄할 수 있다고 여긴 것이다. 유량은 달아나 숨고자 하니 그럴 수 없었고, 만나고자 하니 붙잡힐까 두려워, 나아가고 물러섬에 대책이 없었다. 온공(溫公, 온교)이 유량에게 도간을 찾아가라 권하며 말하였다. \"그대는 다만 멀리서 절하기만 하시오. 반드시 별일 없을 것이오. 내가 그대를 위해 보증하리다.\" 유량이 온교의 말을 좇아 도간을 찾아갔다. 이르러서는 곧 절하였다. 도간이 스스로 일어나 그것을 만류하며 말하였다. \"유원규(庾元規, 유량)가 무슨 까닭으로 도사형(陶士衡, 도간)에게 절을 하는가?\" 절이 끝나자 유량은 또 자리를 낮추어 아랫자리에 앉았다. 도간이 또 스스로 청하여 일어나 함께 앉게 하였다. 자리가 정해지자, 유량은 이내 허물을 끌어다 자신을 책망하며 깊이 겸손하게 사죄하였다. 도간은 자기도 모르게 마음이 풀렸다.", ["도량", "겸손", "권력"]], ["假譎", 9, "溫公喪婦，從姑劉氏，家值亂離散，唯有一女，甚有姿慧，姑以屬公覓婚。公密有自婚意，答云：「佳壻難得，但如嶠比云何？」姑云：「喪敗之餘，乞粗存活，便足慰吾餘年，何敢希汝比？」卻後少日，公報姑云：「已覓得婚處，門地粗可，壻身名宦，盡不減嶠。」因下玉鏡臺一枚。姑大喜。既婚，交禮，女以手披紗扇，撫掌大笑曰：「我固疑是老奴，果如所卜！」玉鏡臺，是公為劉越石長史，北征劉聰所得。", "온교(溫嶠)가 아내를 잃었는데, 그의 종고모 유씨(劉氏)는 집안이 난리를 만나 뿔뿔이 흩어지고 오직 딸 하나만 남아 있었다. 그 딸은 매우 자색이 있고 총명하였다. 종고모가 온교에게 부탁하여 혼처를 구하게 하였다. 온교는 은밀히 자기가 그 딸을 맞을 뜻이 있었기에 이렇게 대답하였다. \"좋은 사위는 얻기 어렵습니다만, 그저 저 온교 정도라면 어떻겠습니까?\" 종고모가 말하였다. \"난리에 망하고 남은 처지에, 그저 거칠게나마 살아남기를 바랄 뿐이니, 그것만으로도 내 여생을 위로하기에 족하다. 어찌 감히 너 같은 사람을 바라겠느냐?\" 며칠 뒤 온교가 종고모에게 알렸다. \"이미 혼처를 구했는데, 가문과 지체가 그런대로 괜찮고, 사위 될 사람의 명성과 관직도 모두 저 온교에 못지않습니다.\" 그러고는 옥경대(玉鏡臺) 하나를 예물로 내려놓았다. 종고모가 크게 기뻐하였다. 혼인이 이루어져 예를 갖추는 자리에서, 신부가 손으로 비단 부채를 헤치고는 손뼉을 치며 크게 웃으며 말하였다. \"나는 본디 이 늙은 종놈이 아닐까 의심했더니, 과연 점친 대로구나!\" 옥경대는 온교가 유월석(劉越石)의 장사(長史)로 있을 때 북으로 유총(劉聰)을 정벌하여 얻은 것이었다.", ["부부", "술수", "여인"]], ["假譎", 10, "諸葛令女，庾氏婦，既寡，誓云：「不復重出！」此女性甚正彊，無有登車理。恢既許江思玄婚，乃移家近之。初，誑女云：「宜徙。」於是家人一時去，獨留女在後。比其覺，已不復得出。江郎莫來，女哭詈彌甚，積日漸歇。江虨暝入宿，恆在對牀上。後觀其意轉帖，虨乃詐厭，良久不悟，聲氣轉急。女乃呼婢云：「喚江郎覺！」江於是躍來就之曰：「我自是天下男子，厭，何預卿事而見喚邪？既爾相關，不得不與人語。」女默然而慙，情義遂篤。", "제갈령(諸葛令)의 딸은 유씨(庾氏)의 며느리였는데, 과부가 된 뒤 맹세하여 말하였다. \"다시는 재가하지 않으리라!\" 이 딸은 성품이 매우 곧고 굳세어 수레에 오를 까닭이 없었다. 제갈회(諸葛恢)는 강사현(江思玄)에게 혼인을 허락하고는, 집을 그의 곁으로 옮겼다. 처음에 딸을 속여 말하였다. \"이사하는 것이 좋겠다.\" 그리하여 집안사람들이 일시에 떠나고 딸만 홀로 뒤에 남겨졌다. 그녀가 깨달았을 때는 이미 빠져나갈 수 없게 되었다. 강랑(江郎)이 저녁에 들어오자, 딸은 곡하며 욕하기를 더욱 심하게 하였으나, 날이 갈수록 점차 그쳤다. 강반(江虨)은 밤에 들어와 묵으면서 늘 맞은편 침상 위에 있었다. 뒤에 그녀의 마음이 점차 누그러지는 것을 보고는, 강반이 거짓으로 가위눌린 척하며 오래도록 깨어나지 못하니 숨소리가 점점 급해졌다. 딸이 마침내 계집종을 불러 말하였다. \"강랑을 깨워라!\" 강반이 이에 벌떡 일어나 그녀에게 다가가 말하였다. \"나는 본디 천하의 남자인데, 가위눌린 것이 그대와 무슨 상관이 있어 깨우게 한단 말이오? 이미 이렇게 서로 관계하였으니, 그대와 말을 나누지 않을 수 없겠소.\" 딸은 잠자코 부끄러워하였고, 이로써 정의(情義)가 마침내 두터워졌다.", ["부부", "술수", "충직", "여인", "제갈씨"]], ["假譎", 11, "愍度道人始欲過江，與一傖道人為侶，謀曰：「用舊義往江東，恐不辦得食。」便共立「心無義」。既而此道人不成渡，愍度果講義積年。後有傖人來，先道人寄語云：「為我致意愍度，無義那可立？治此計，權救饑爾！無為遂負如來也。」", "민도(愍度) 도인이 처음 강을 건너려 할 때, 한 창(傖) 지방 도인과 짝이 되어 의논하였다. \"옛 의리(義理)를 가지고 강동(江東)으로 가면 아마 먹을 것을 마련하지 못할 듯하오.\" 그러고는 함께 '심무의(心無義)'를 세웠다. 그런데 이 도인은 끝내 강을 건너지 못하였고, 민도는 과연 여러 해 동안 그 의리를 강론하였다. 뒤에 창 지방 사람이 오는데, 먼저의 도인이 말을 전하게 하였다. \"나를 위해 민도에게 뜻을 전해 주시오. 무의(無義)를 어찌 세울 수 있겠소? 이 계책을 세운 것은 잠시 굶주림을 면하려 함이었을 뿐이오! 끝내 여래(如來)를 저버리지는 마시오.\"", ["술수", "학문", "청담"]], ["假譎", 12, "王文度弟阿智，惡乃不翅，當年長而無人與婚。孫興公有一女，亦僻錯，又無嫁娶理。因詣文度，求見阿智。既見，便陽言：「此定可，殊不如人所傳，那得至今未有婚處？我有一女，乃不惡，但吾寒士，不宜與卿計，欲令阿智娶之。」文度欣然而啟藍田云：「興公向來，忽言欲與阿智婚。」藍田驚喜。既成婚，女之頑嚚，欲過阿智。方知興公之詐。", "왕문도(王坦之)의 아우 아지(阿智)는 못남이 이루 말할 수 없을 정도여서, 나이가 들도록 혼인하겠다는 사람이 없었다. 손흥공(孫綽)에게 딸 하나가 있었는데, 또한 비뚤어지고 흠이 많아 시집보낼 도리가 없었다. 그래서 손흥공이 왕문도를 찾아가 아지를 보기를 청하였다. 만나 보고 나서는 거짓으로 말하였다. \"이 아이는 정말 괜찮구려. 사람들이 전하는 바와는 전혀 다르오. 어찌 지금까지 혼처가 없었단 말이오? 내게 딸이 하나 있는데 나쁘지 않소. 다만 나는 한미한 선비라 그대와 따질 처지가 못 되니, 아지에게 시집보내고 싶소.\" 왕문도가 기뻐하며 남전(藍田, 왕술)에게 아뢰었다. \"흥공이 조금 전에 와서 갑자기 아지와 혼인하고 싶다 하더이다.\" 남전이 놀라며 기뻐하였다. 혼인이 이루어진 뒤, 딸의 어리석고 사나움이 아지를 능가할 정도였다. 그제야 흥공의 속임수를 알게 되었다.", ["술수", "부부", "뉘우침"]], ["假譎", 13, "范玄平為人，好用智數，而有時以多數失會。嘗失官居東陽，桓大司馬在南州，故往投之。桓時方欲招起屈滯，以傾朝廷；且玄平在京，素亦有譽，桓謂遠來投己，喜躍非常。比入至庭，傾身引望，語笑歡甚。顧謂袁虎曰：「范公且可作太常卿。」范裁坐，桓便謝其遠來意。范雖實投桓，而恐以趨時損名，乃曰：「雖懷朝宗，會有亡兒瘞在此，故來省視。」桓悵然失望，向之虛佇，一時都盡。", "범현평(范玄平)은 사람됨이 지모와 술수 쓰기를 좋아하였으나, 때로는 꾀가 많은 탓에 기회를 잃기도 하였다. 일찍이 관직을 잃고 동양(東陽)에 살았는데, 환대사마(桓溫)가 남주(南州)에 있었으므로 일부러 가서 그에게 의탁하려 하였다. 환온은 그때 마침 묻혀 있던 인재들을 불러 일으켜 조정을 기울이려 하던 참이었고, 또 현평이 서울에 있을 때 평소 명성이 있었으므로, 환온은 그가 멀리서 자기에게 의탁하러 온 것이라 여겨 기뻐 날뛰기가 보통이 아니었다. 그가 뜰에 이르자, 환온은 몸을 기울여 바라보며 담소하기를 매우 즐거워하였다. 원호(袁虎)를 돌아보며 말하였다. \"범공은 우선 태상경(太常卿)으로 삼을 만하오.\" 범현평이 막 자리에 앉자, 환온이 그가 멀리서 와 준 뜻에 사례하였다. 범현평은 실은 환온에게 의탁하러 온 것이었으나, 시류에 영합하여 명성을 손상할까 두려워 이렇게 말하였다. \"비록 조정에 마음을 두고 있으나, 마침 죽은 아들을 이곳에 묻은 일이 있어 살펴보러 왔습니다.\" 환온은 서운하여 실망하였고, 조금 전의 헛된 기대가 한꺼번에 다 사라져 버렸다.", ["술수", "권력", "뉘우침"]], ["假譎", 14, "謝遏年少時，好著紫羅香囊，垂覆手。太傅患之，而不欲傷其意，乃譎與賭，得即燒之。", "사알(謝玄)이 젊었을 때 자줏빛 비단 향낭을 차고 손수건을 늘어뜨리기를 좋아하였다. 태부(謝安)가 이를 걱정하였으나 그의 마음을 상하게 하고 싶지 않아, 꾀를 내어 그와 내기를 하여 그것을 얻고는 곧 태워 버렸다.", ["풍류", "지혜"]], ["黜免", 1, "諸葛厷在西朝，少有清譽，為王夷甫所重，時論亦以擬王。後為繼母族黨所讒，誣之為狂逆。將遠徙，友人王夷甫之徒，詣檻車與別。厷問：「朝廷何以徙我？」王曰：「言卿狂逆。」厷曰：「逆則應殺，狂何所徙？」", "제갈횡(諸葛厷)은 서조(西朝, 서진)에서 젊어서부터 청아한 명성이 있어 왕이보(王衍)에게 존중받았고, 당시 여론도 그를 왕연에 견주었다. 뒤에 계모의 친족 무리에게 참소를 당하여 미친 역적이라 무고당하였다. 멀리 유배되려 할 때, 벗인 왕이보의 무리가 죄수 호송 수레로 찾아와 작별하였다. 횡이 물었다. \"조정이 무엇 때문에 나를 유배 보내는가?\" 왕연이 말하였다. \"그대가 미친 역적이라 하더이다.\" 횡이 말하였다. \"역적이라면 마땅히 죽여야 할 것이요, 미쳤다면 어찌 유배를 보내는가?\"", ["기지", "질투", "권력", "제갈씨"]], ["黜免", 2, "桓公入蜀，至三峽中，部伍中有得猨子者。其母緣岸哀號，行百餘里不去，遂跳上船，至便即絕。破視其腹中，腸皆寸寸斷。公聞之，怒，命黜其人。", "환공(桓溫)이 촉(蜀)에 들어가 삼협(三峽) 가운데에 이르렀을 때, 부대 안에 새끼 원숭이를 잡은 자가 있었다. 그 어미가 강기슭을 따라 슬피 울부짖으며 백여 리를 가도 떠나지 않더니, 마침내 배 위로 뛰어올랐는데 오르자마자 곧 숨이 끊어졌다. 그 배를 갈라 뱃속을 보니 창자가 모두 마디마디 끊어져 있었다. 환공이 이를 듣고 노하여 그 사람을 내쫓으라 명하였다.", ["분노", "죽음"]], ["黜免", 3, "殷中軍被廢，在信安，終日恆書空作字。揚州吏民尋義逐之，竊視，唯作「咄咄怪事」四字而已。", "은중군(殷浩)이 파면되어 신안(信安)에 있을 때, 종일토록 늘 허공에 글자를 쓰곤 하였다. 양주(揚州)의 관리와 백성들이 그 뜻을 알아내려고 뒤따라가 몰래 엿보니, 다만 '돌돌괴사(咄咄怪事, 괴이하고 괴이한 일이로다)'라는 네 글자만 쓸 뿐이었다.", ["권력", "분노"]], ["黜免", 4, "桓公坐有參軍椅烝薤不時解，共食者又不助，而椅終不放，舉坐皆笑。桓公曰：「同盤尚不相助，況復危難乎？」敕令免官。", "환공(桓溫)의 자리에 한 참군(參軍)이 찐 부추를 집으려는데 잘 떼어지지 않았고, 함께 먹던 자들도 도와주지 않았는데, 그 참군은 끝내 놓지 않으니 온 자리가 모두 웃었다. 환공이 말하였다. \"같은 소반에서 먹으면서도 서로 돕지 않거늘, 하물며 위난(危難)에서야 어떠하겠는가?\" 그러고는 그를 면직하라 명하였다.", ["분노", "권력"]], ["黜免", 5, "殷中軍廢後，恨簡文曰：「上人著百尺樓上，儋梯將去。」", "은중군(殷浩)이 파면된 뒤 간문제(簡文帝)를 원망하여 말하였다. \"사람을 백 척 누각 위에 올려놓고 사다리를 치워 버리고 가 버렸구나.\"", ["원한", "권력"]], ["黜免", 6, "鄧竟陵免官後赴山陵，過見大司馬桓公。公問之曰：「卿何以更瘦？」鄧曰：「有愧於叔達，不能不恨於破甑！」", "등경릉(鄧竟陵)이 면직된 뒤 산릉(山陵)에 가서 대사마 환공(桓溫)을 찾아뵈었다. 환공이 그에게 물었다. \"그대는 어찌하여 더 야위었소?\" 등씨가 말하였다. \"숙달(叔達)에게 부끄러우니, 깨진 시루를 두고 한스러워하지 않을 수 없습니다!\"", ["권력", "뉘우침"]], ["黜免", 7, "桓宣武既廢太宰父子，仍上表曰：「應割近情，以存遠計。若除太宰父子，可無後憂。」簡文手答表曰：「所不忍言，況過於言？」宣武又重表，辭轉苦切。簡文更答曰：「若晉室靈長，明公便宜奉行此詔。如大運去矣，請避賢路！」桓公讀詔，手戰流汗，於此乃止。太宰父子，遠徙新安。", "환선무(桓溫)가 태재(太宰) 부자를 폐한 뒤, 이어 표를 올려 말하였다. \"마땅히 가까운 정을 끊고 먼 계책을 보존해야 합니다. 만약 태재 부자를 제거한다면 뒷날의 근심이 없을 것입니다.\" 간문제가 손수 표에 답하여 말하였다. \"차마 말할 수 없는 바인데, 하물며 말보다 더한 것이야 어떠하겠소?\" 환선무가 다시 거듭 표를 올리니, 말이 점점 절박하고 간절해졌다. 간문제가 다시 답하였다. \"만약 진(晉) 왕실의 운수가 길이 이어진다면 명공(明公)은 마땅히 이 조서를 받들어 행하시오. 만약 큰 운수가 다하였다면, 청컨대 어진 이의 길을 비켜 주겠소!\" 환공이 조서를 읽고는 손을 떨며 땀을 흘리더니, 이에 그만두었다. 태재 부자는 멀리 신안(新安)으로 유배되었다.", ["권력", "충직", "간언"]], ["黜免", 8, "桓玄敗後，殷仲文還為大司馬咨議，意似二三，非復往日。大司馬府聽前，有一老槐，甚扶疎。殷因月朔，與眾在聽，視槐良久，嘆曰：「槐樹婆娑，無復生意！」", "환현(桓玄)이 패한 뒤, 은중문(殷仲文)은 돌아와 대사마의 자의(咨議)가 되었는데, 마음이 두세 갈래로 갈린 듯하여 다시는 지난날 같지 않았다. 대사마부의 청사(聽事) 앞에 늙은 회화나무 한 그루가 있어 매우 무성하였다. 은중문이 초하룻날을 맞아 여러 사람과 청사에 있다가, 회화나무를 한참 바라보며 탄식하였다. \"회화나무가 무성히 너울거리나, 다시는 살려는 뜻이 없구나!\"", ["권력", "죽음"]], ["黜免", 9, "殷仲文既素有名望，自謂必當阿衡朝政。忽作東陽太守，意甚不平。及之郡，至富陽，慨然歎曰：「看此山川形勢，當復出一孫伯符！」", "은중문(殷仲文)은 본디 명망이 있어 스스로 반드시 조정의 정사를 도맡아 보필하리라 여겼다. 그런데 갑자기 동양(東陽) 태수가 되니 마음이 매우 불평하였다. 임지로 가다가 부양(富陽)에 이르러 개연히 탄식하였다. \"이 산천의 형세를 보니, 마땅히 다시 한 사람의 손백부(孫伯符)가 나오겠구나!\"", ["권력", "오만", "원한"]], ["儉嗇", 1, "和嶠性至儉，家有好李，王武子求之，與不過數十。王武子因其上直，率將少年能食之者，持斧詣園，飽共噉畢，伐之，送一車枝與和公。問曰：「何如君李？」和既得，唯笑而已。", "화교(和嶠)는 성품이 지극히 인색하였다. 집에 좋은 자두나무가 있었는데, 왕무자(王濟)가 그것을 청하니 수십 개를 넘기지 않았다. 왕무자가 그가 숙직하러 간 틈을 타, 잘 먹는 젊은이들을 거느리고 도끼를 들고 정원으로 가서, 실컷 함께 먹어 치운 뒤 나무를 베어 버리고는, 가지 한 수레를 화공에게 보냈다. 그러고는 물었다. \"그대의 자두나무에 견주어 어떻소?\" 화교는 가지를 받고서 그저 웃을 뿐이었다.", ["인색", "기지"]], ["儉嗇", 2, "王戎儉吝，其從子婚，與一單衣，後更責之。", "왕융(王戎)은 인색하였다. 그의 조카가 혼인하자 홑옷 한 벌을 주었는데, 뒤에 다시 그것을 돌려받았다.", ["인색"]], ["儉嗇", 3, "司徒王戎，既貴且富，區宅僮牧，膏田水碓之屬，洛下無比。契疏鞅掌，每與夫人燭下散籌算計。", "사도(司徒) 왕융(王戎)은 귀하고도 부유하여, 저택과 종복, 기름진 밭과 물방아 따위가 낙양(洛陽)에 견줄 만한 것이 없었다. 문서와 장부가 분주하니, 늘 부인과 함께 촛불 아래에서 산가지를 펼쳐 셈을 하였다.", ["인색", "사치"]], ["儉嗇", 4, "王戎有好李，賣之，恐人得其種，恆鑽其核。", "왕융(王戎)에게 좋은 자두나무가 있어 그 자두를 팔았는데, 남이 그 종자를 얻을까 두려워 늘 그 씨에 구멍을 뚫었다.", ["인색"]], ["儉嗇", 5, "王戎女適裴頠，貸錢數萬。女歸，戎色不說。女遽還錢，乃釋然。", "왕융(王戎)의 딸이 배외(裴頠)에게 시집가면서 돈 수만 전을 빌려 갔다. 딸이 친정에 돌아왔을 때 왕융의 얼굴빛이 기쁘지 않았다. 딸이 서둘러 돈을 갚자 비로소 풀어졌다.", ["인색"]], ["儉嗇", 6, "衛江州在尋陽，有知舊人投之，都不料理，唯餉「王不留行」一斤。此人得餉，便命駕。李弘範聞之曰：「家舅刻薄，乃復驅使草木。」", "위강주(衛江州)가 심양(尋陽)에 있을 때, 옛 친지가 그를 찾아왔으나 전혀 대접하지 않고, 다만 '왕불류행(王不留行)' 한 근만 선물로 주었다. 이 사람은 선물을 받고는 곧 수레를 채비하여 떠났다. 이홍범(李弘範)이 이를 듣고 말하였다. \"외삼촌이 각박하시어, 이제는 초목까지 부려 먹으시는구나.\"", ["인색", "비평"]], ["儉嗇", 7, "王丞相儉節，帳下甘果，盈溢不散。涉春爛敗，都督白之，公令舍去。曰：「慎不可令大郎知。」", "왕승상(王導)은 검소하고 절약하였다. 휘하에 단 과일이 가득 차고 넘쳐 흩어 주지 않았다. 봄이 되어 다 썩어 버리자 도독(都督)이 그것을 아뢰니, 왕공이 버리라 명하면서 말하였다. \"부디 큰아들에게는 알리지 말라.\"", ["청빈", "인색"]], ["儉嗇", 8, "蘇峻之亂，庾太尉南奔見陶公。陶公雅相賞重。陶性儉吝，及食，噉薤，庾因留白。陶問：「用此何為？」庾云：「故可種。」於是大歎庾非唯風流，兼有治實。", "소준(蘇峻)의 난 때, 유태위(庾亮)가 남으로 달아나 도공(陶侃)을 만났다. 도공은 평소 그를 매우 칭찬하고 중히 여겼다. 도공은 성품이 검소하고 인색하였는데, 식사할 때 부추를 먹으면서 유량은 그 흰 밑동을 남겨 두었다. 도공이 물었다. \"이것을 무엇에 쓰려 하시오?\" 유량이 말하였다. \"심을 수 있기 때문입니다.\" 이에 도공은 유량이 풍류(風流)가 있을 뿐만 아니라 실무를 다스리는 재능도 겸했다고 크게 감탄하였다.", ["청빈", "재능", "비평"]], ["儉嗇", 9, "郗公大聚歛，有錢數千萬。嘉賓意甚不同，常朝旦問訊。郗家法：子弟不坐。因倚語移時，遂及財貨事。郗公曰：「汝正當欲得吾錢耳！」迺開庫一日，令任意用。郗公始正謂損數百萬許。嘉賓遂一日乞與親友，周旋略盡。郗公聞之，驚怪不能已已。", "치공(郗鑒)은 재물을 크게 긁어모아 돈이 수천만 전이나 있었다. 가빈(郗超)은 마음으로 매우 못마땅히 여겨, 늘 아침마다 문안을 드렸다. 치씨 집안의 법도로는 자제가 앉지 않게 되어 있었다. 그래서 기대어 한참 이야기를 나누다가 마침내 재물에 관한 일에 이르렀다. 치공이 말하였다. \"너는 다만 내 돈을 얻고 싶을 따름이로구나!\" 그러고는 하루 동안 창고를 열어 마음대로 쓰게 하였다. 치공은 처음에 그저 수백만 전쯤 축날 것이라 여겼다. 그런데 가빈은 하루 만에 친지와 벗들에게 베풀어 두루 거의 다 써 버렸다. 치공이 이를 듣고 놀라고 괴이하게 여겨 마지않았다.", ["베풂", "청빈", "인색"]], ["汰侈", 1, "石崇每要客燕集，常令美人行酒。客飲酒不盡者，使黃門交斬美人。王丞相與大將軍嘗共詣崇。丞相素不能飲，輒自勉彊，至於沈醉。每至大將軍，固不飲，以觀其變。已斬三人，顏色如故，尚不肯飲。丞相讓之，大將軍曰：「自殺伊家人，何預卿事！」", "석숭(石崇)은 손님을 청하여 잔치를 열 때마다 늘 미인에게 술을 따르게 하였다. 손님이 술을 다 마시지 않으면 환관을 시켜 차례로 미인을 베어 죽였다. 왕승상(王導)이 대장군(王敦)과 함께 석숭을 찾아간 적이 있었다. 왕승상은 본디 술을 잘 마시지 못하였으나 늘 억지로 힘써 마셔 만취에 이르렀다. 대장군은 차례가 올 때마다 한사코 마시지 않고 그 변고를 지켜보았다. 이미 세 사람을 베었는데도 얼굴빛이 그대로였고, 여전히 마시려 하지 않았다. 왕승상이 그를 나무라자 대장군이 말하였다. \"제 집안 사람을 제가 죽이는 것이니, 그대와 무슨 상관이오!\"", ["사치", "담대한죽음", "오만"]], ["汰侈", 2, "石崇廁，常有十餘婢侍列，皆麗服藻飾。置甲煎粉、沈香汁之屬，無不畢備。又與新衣著令出，客多羞不能如廁。王大將軍往，脫故衣，著新衣，神色傲然。羣婢相謂曰：「此客必能作賊。」", "석숭(石崇)의 변소에는 늘 열 명 남짓한 계집종이 시중들며 늘어서 있었는데, 모두 화려한 옷을 입고 곱게 꾸몄다. 갑전분(甲煎粉)과 침향즙(沈香汁) 따위를 갖추어 두어, 빠짐없이 다 마련되어 있었다. 또 새 옷을 주어 입고 나가게 하니, 손님들은 대부분 부끄러워하여 변소에 가지 못하였다. 왕대장군(王敦)이 가서는 헌 옷을 벗고 새 옷을 입으며 신색이 오만하였다. 계집종들이 서로 말하였다. \"이 손님은 틀림없이 반역을 일으킬 사람이다.\"", ["사치", "오만", "예언"]], ["汰侈", 3, "武帝嘗降王武子家，武子供饌，並用瑠璃器。婢子百餘人，皆綾羅絝，以手擎飲食。烝肥美，異於常味。帝怪而問之，答曰：「以人乳飲。」帝甚不平，食未畢，便去。王、石所未知作。", "무제(武帝, 사마염)가 일찍이 왕무자(王濟)의 집에 행차한 적이 있었다. 왕무자가 음식을 차리는데 모두 유리 그릇을 썼다. 계집종 백여 명이 다 능라 비단 바지를 입고 손으로 음식을 받쳐 들었다. 찐 돼지고기가 살지고 맛있어 보통 맛과 달랐다. 무제가 이상히 여겨 까닭을 묻자 대답하였다. \"사람의 젖을 먹여 길렀습니다.\" 무제가 매우 못마땅히 여겨, 식사를 다 마치지도 않고 곧 떠나 버렸다. 이는 왕개(王愷)와 석숭(石崇)도 일찍이 할 줄 몰랐던 일이었다.", ["사치", "권력", "비평"]], ["汰侈", 4, "王君夫以糒澳釜，石季倫用蠟燭作炊。君夫作紫絲布步障碧綾裹四十里，石崇作錦步障五十里以敵之。石以椒為泥，王以赤石脂泥壁。", "왕군부(王愷)는 엿기름으로 솥을 닦았고, 석계륜(石崇)은 밀랍 초로 밥을 지었다. 왕군부가 자줏빛 명주 휘장에 푸른 비단으로 가장자리를 두른 보장(步障)을 사십 리나 만들자, 석숭은 비단 보장 오십 리를 만들어 그것에 맞섰다. 석숭이 산초를 진흙처럼 발라 벽을 칠하자, 왕군부는 적석지(赤石脂)로 벽을 발랐다.", ["사치"]], ["汰侈", 5, "石崇為客作豆粥，咄嗟便辦。恆冬天得韭蓱。又牛形狀氣力不勝王愷牛，而與愷出遊，極晚發，爭入洛城，崇牛數十步後，迅若飛禽，愷牛絕走不能及。每以此三事為搤腕。乃密貨崇帳下都督及御車人，問所以。都督曰：「豆至難煮，唯豫作熟末，客至，作白粥以投之。韭蓱是搗韭根，雜以麥苗爾。」復問馭人牛所以駛。馭人云：「牛本不遲，由將車人不及制之爾。急時聽偏轅，則駛矣。」愷悉從之，遂爭長。石崇後聞，皆殺告者。", "석숭(石崇)은 손님을 위해 콩죽을 만드는데 순식간에 마련해 냈다. 또 늘 겨울철에도 부추절임을 마련하였다. 또 그의 소는 생김새와 기력이 왕개(王愷)의 소만 못하였으나, 왕개와 함께 나들이를 나갈 때 매우 늦게 출발하고도 다투어 낙양성에 들어갈 때면, 석숭의 소가 수십 보 뒤처졌다가도 나는 새처럼 빨라, 왕개의 소가 죽을힘을 다해 달려도 따라잡지 못하였다. 왕개는 늘 이 세 가지 일을 두고 분해하였다. 이에 몰래 석숭 휘하의 도독과 수레 모는 사람을 매수하여 그 까닭을 물었다. 도독이 말하였다. \"콩은 지극히 삶기 어려우므로, 오직 미리 익혀 가루로 만들어 두었다가, 손님이 오면 흰죽을 끓여 거기에 넣을 따름입니다. 부추절임은 부추 뿌리를 찧어 보리 싹을 섞은 것일 뿐입니다.\" 다시 마부에게 소가 빠른 까닭을 물었다. 마부가 말하였다. \"소는 본디 느리지 않은데, 수레 모는 사람이 제대로 제어하지 못하기 때문일 뿐입니다. 급할 때 한쪽 멍에를 풀어 주면 빨라집니다.\" 왕개가 이를 모두 따랐더니 마침내 우열을 다투게 되었다. 석숭은 뒤에 이를 듣고 일러바친 자들을 모두 죽였다.", ["술수", "사치", "원한"]], ["汰侈", 6, "王君夫有牛，名「八百里駮」，常瑩其蹄角。王武子語君夫：「我射不如卿，今指賭卿牛，以千萬對之。」君夫既恃手快，且謂駿物無有殺理，便相然可。令武子先射。武子一起便破的，卻據胡牀，叱左右：「速探牛心來！」須臾，炙至，一臠便去。", "왕군부(王愷)에게는 소 한 마리가 있었는데 이름을 '팔백리박(八百里駮)'이라 하였고, 늘 그 발굽과 뿔을 윤이 나게 닦았다. 왕무자(王濟)가 군부에게 말하였다. \"내 활솜씨가 그대만 못하니, 이제 그대의 소를 걸고 천만(千萬)으로 그에 맞서겠소.\" 군부는 자기 활솜씨가 빠른 것을 믿었고, 또 준수한 짐승을 잡을 리가 없다고 여겨 곧 그러자고 허락하였다. 무자에게 먼저 쏘게 하니, 무자는 한 번 일어나 활을 쏘아 곧 과녁을 맞혔다. 그러고는 물러나 호상(胡牀)에 걸터앉아 좌우를 꾸짖었다. \"속히 소의 심장을 꺼내 오너라!\" 잠시 후 구운 것이 이르자, 한 점만 먹고는 떠났다.", ["오만", "재능", "사치"]], ["汰侈", 7, "王君夫嘗責一人無服餘衵，因直內著曲閤重閨裏，不聽人將出。遂饑經日，迷不知何處去。後因緣相為垂死，迺得出。", "왕군부(王愷)가 일찍이 어떤 사람이 여벌 속옷도 없는 것을 꾸짖어, 곧장 굽이진 협실 안 깊은 안방으로 들여보내고 남이 데리고 나오는 것을 허락하지 않았다. 마침내 며칠을 굶었으며, 어디로 가야 할지를 알지 못해 헤맸다. 뒤에 인연 있는 자가 그를 위해 애써 거의 죽게 된 끝에야 비로소 나올 수 있었다.", ["인색", "분노"]], ["汰侈", 8, "石崇與王愷爭豪，並窮綺麗，以飾輿服。武帝，愷之甥也，每助愷。嘗以一珊瑚樹，高二尺許賜愷。枝柯扶疎，世罕其比。愷以示崇。崇視訖，以鐵如意擊之，應手而碎。愷既惋惜，又以為疾己之寶，聲色甚厲。崇曰：「不足恨，今還卿。」乃命左右悉取珊瑚樹，有三尺四尺，條榦絕世，光彩溢目者六七枚，如愷許比甚眾。愷惘然自失。", "석숭(石崇)과 왕개(王愷)가 호사를 다투어 둘 다 화려함을 극진히 하여 수레와 의복을 꾸몄다. 무제(司馬炎)는 왕개의 생질이라 매번 왕개를 도왔다. 일찍이 높이가 두 자쯤 되는 산호수 하나를 왕개에게 내렸는데, 가지가 무성하게 뻗어 세상에 그에 견줄 것이 드물었다. 왕개가 그것을 석숭에게 보였다. 석숭은 다 보고 나서 쇠 여의(如意)로 그것을 쳐서 손이 닿는 대로 부수어 버렸다. 왕개는 애석해하면서, 또 자기의 보물을 시기하는 것이라 여겨 음성과 낯빛이 몹시 사나웠다. 석숭이 말하였다. \"한할 것 없소, 이제 그대에게 돌려주리다.\" 이에 좌우에게 명하여 산호수를 모두 가져오게 하니, 석 자 넉 자 되는 것에 가지와 줄기가 세상에 둘도 없고 광채가 눈에 넘치는 것이 예닐곱 그루였으며, 왕개의 것만 한 것은 매우 많았다. 왕개는 멍하니 넋을 잃었다.", ["사치", "비평", "질투"]], ["汰侈", 9, "王武子被責，移第北邙下。于時人多地貴，濟好馬射，買地作埒，編錢匝地竟埒。時人號曰「金溝」。", "왕무자(王濟)가 책망을 받아 집을 북망(北邙) 아래로 옮겼다. 당시 사람이 많고 땅값이 비쌌는데, 왕제는 말 타고 활쏘기를 좋아하여 땅을 사서 활터를 만들고, 돈을 엮어 땅을 둘러 활터를 두루 채웠다. 당시 사람들이 그것을 '금구(金溝)'라 불렀다.", ["사치", "권력"]], ["汰侈", 10, "石崇每與王敦入學戲，見顏、原象而嘆曰：「若與同升孔堂，去人何必有間！」王曰：「不知餘人云何？子貢去卿差近。」石正色云：「士當令身名俱泰，何至以甕牖語人！」", "석숭(石崇)이 매번 왕돈(王敦)과 함께 학궁에 들어가 놀다가, 안회(顏回)와 원헌(原憲)의 상(象)을 보고 탄식하여 말하였다. \"만약 이들과 함께 공자(孔子)의 당(堂)에 올랐다면 남과 무슨 차이가 있었겠는가!\" 왕돈이 말하였다. \"다른 사람은 어떨지 모르나, 자공(子貢)이라면 그대와의 거리가 좀 가깝겠소.\" 석숭이 낯빛을 바로하며 말하였다. \"선비란 마땅히 몸과 명성이 함께 안락해야 하거늘, 어찌 옹유(甕牖)의 가난을 들어 남에게 말한단 말이오!\"", ["오만", "비평", "청빈"]], ["汰侈", 11, "彭城王有快牛，至愛惜之。王太尉與射，賭得之。彭城王曰：「君欲自乘則不論；若欲噉者，當以二十肥者代之。既不廢噉，又存所愛。」王遂殺噉。", "팽성왕(彭城王)에게 빠른 소가 있었는데 매우 아꼈다. 왕태위(王衍)가 그와 활쏘기로 내기하여 그것을 얻었다. 팽성왕이 말하였다. \"그대가 직접 타려는 것이라면 따지지 않겠소. 그러나 만약 잡아먹으려는 것이라면, 마땅히 살진 소 스무 마리로 그것을 대신하겠소. 그러면 먹는 일도 폐하지 않고, 아끼는 바도 보존할 수 있소.\" 그러나 왕연은 결국 그것을 잡아먹었다.", ["오만", "분노"]], ["汰侈", 12, "王右軍少時，在周侯末坐，割牛心噉之。於此改觀。", "왕우군(王羲之)이 젊었을 때 주후(周顗)의 자리 끝에 앉아 소의 심장을 잘라 먹었다. 이로 인해 사람들이 그를 다시 보게 되었다.", ["용기", "비평"]], ["忿狷", 1, "魏武有一妓，聲最清高，而情性酷惡。欲殺則愛才，欲置則不堪。於是選百人一時俱教。少時，果有一人聲及之，便殺惡性者。", "위무제(魏武帝)에게 가기(歌妓) 하나가 있었는데, 목소리가 가장 맑고 높았으나 성정이 몹시 사나웠다. 죽이려 하자니 그 재주가 아까웠고, 그대로 두자니 견딜 수가 없었다. 이에 백 명을 뽑아 한꺼번에 가르쳤다. 얼마 후 과연 한 사람의 목소리가 그에 미치자, 곧 성질 사나운 자를 죽였다.", ["분노", "음악", "재능"]], ["忿狷", 2, "王藍田性急。嘗食雞子，以筯刺之，不得，便大怒，舉以擲地。雞子於地圓轉未止，仍下地以屐齒蹍之，又不得，瞋甚，復於地取內口中，齧破即吐之。王右軍聞而大笑曰：「使安期有此性，猶當無一豪可論，況藍田邪？」", "왕남전(王述)은 성미가 급했다. 일찍이 계란을 먹는데 젓가락으로 찔러 집히지 않자 곧 크게 노하여 들어서 땅에 던졌다. 계란이 땅에서 빙빙 돌며 멈추지 않자, 이어 땅에 내려가 나막신 굽으로 그것을 밟았으나 또 잡지 못하니, 몹시 성을 내어 다시 땅에서 집어 입에 넣고 깨물어 부순 뒤 곧 뱉어 버렸다. 왕우군(王羲之)이 이를 듣고 크게 웃으며 말하였다. \"설령 안기(王述의 부친 王承)가 이런 성미였더라도 오히려 한 가지도 논할 만한 것이 없었을 터인데, 하물며 남전이랴?\"", ["분노", "비평"]], ["忿狷", 3, "王司州嘗乘雪往王螭許。司州言氣少有牾逆於螭，便作色不夷。司州覺惡，便輿牀就之，持其臂曰：「汝詎復足與老兄計？」螭撥其手曰：「冷如鬼手馨，彊來捉人臂！」", "왕사주(王胡之)가 일찍이 눈을 무릅쓰고 왕리(王恬)에게 갔다. 사주의 말투에 왕리에게 거슬리는 데가 조금 있자, 왕리는 곧 낯빛을 짓고 언짢아하였다. 사주가 좋지 않음을 느끼고는 곧 평상을 옮겨 그에게 다가가 그의 팔을 잡으며 말하였다. \"네가 어찌 다시 이 늙은 형과 따질 만하단 말이냐?\" 왕리가 그 손을 뿌리치며 말하였다. \"귀신의 손처럼 차가운데, 억지로 와서 남의 팔을 잡는구나!\"", ["분노", "우정"]], ["忿狷", 4, "桓宣武與袁彥道樗蒱，袁彥道齒不合，遂厲色擲去五木。溫太真云：「見袁生遷怒，知顏子為貴。」", "환선무(桓溫)가 원언도(袁耽)와 저포(樗蒱) 놀이를 하는데, 원언도가 패가 맞지 않자 마침내 낯빛을 사납게 하여 다섯 나무패를 던져 버렸다. 온태진(溫嶠)이 말하였다. \"원생이 노여움을 옮기는 것을 보니, 안자(顏回)가 귀한 까닭을 알겠다.\"", ["분노", "비평"]], ["忿狷", 5, "謝無奕性麤彊。以事不相得，自往數王藍田，肆言極罵。王正色面壁不敢動，半日。謝去良久，轉頭問左右小吏曰：「去未？」答云：「已去。」然後復坐。時人嘆其性急而能有所容。", "사무혁(謝奕)은 성품이 거칠고 강했다. 어떤 일로 사이가 틀어져, 스스로 왕남전(王述)에게 가서 그 허물을 따지며 거리낌 없이 모진 욕을 퍼부었다. 왕술은 낯빛을 바로하고 벽을 향하여 반나절을 감히 움직이지 않았다. 사혁이 떠난 지 한참 뒤에야 고개를 돌려 곁의 어린 아전에게 물었다. \"갔느냐?\" \"이미 갔습니다\"라고 대답하자, 그제야 다시 자리에 앉았다. 당시 사람들이 그가 성미가 급하면서도 능히 용납하는 바가 있음을 감탄하였다.", ["도량", "분노", "겸손"]], ["忿狷", 6, "王令詣謝公，值習鑿齒已在坐，當與併榻。王徙倚不坐，公引之與對榻。去後，語胡兒曰：「子敬實自清立，但人為爾多矜咳，殊足損其自然。」", "왕헌지(王獻之)가 사공(謝安)을 찾아갔는데, 마침 습착치(習鑿齒)가 이미 자리에 있어 마땅히 평상을 함께 써야 했다. 왕헌지는 머뭇거리며 앉지 않으니, 사공이 그를 이끌어 맞은편 평상에 앉게 하였다. 그가 떠난 뒤 사공이 호아(謝朗)에게 말하였다. \"자경(王獻之)은 참으로 맑고 의젓하나, 다만 사람됨이 그처럼 잘난 체하는 기색이 많으니, 그 자연스러움을 자못 손상시킬 만하다.\"", ["오만", "비평"]], ["忿狷", 7, "王大、王恭嘗俱在何僕射坐。恭時為丹陽尹，大始拜荊州。訖將乖之際，大勸恭酒。恭不為飲，大逼彊之，轉苦，便各以帬帶繞手。恭府近千人，悉呼入齋，大左右雖少，亦命前，意便欲相殺。射無計，因起排坐二人之間，方得分散。所謂勢利之交，古人羞之。", "왕대(王忱)와 왕공(王恭)이 일찍이 함께 하복야(何澄)의 자리에 있었다. 왕공은 당시 단양윤(丹陽尹)이었고, 왕대는 막 형주(荊州) 자사에 임명되었다. 자리가 끝나 헤어지려 할 즈음, 왕대가 왕공에게 술을 권하였다. 왕공이 마시지 않자 왕대가 억지로 강권하여 점점 거세지니, 곧 각자 치마끈을 손에 감았다. 왕공의 부(府)에는 거의 천 명이 가까웠는데 모두 불러 재실로 들이고, 왕대의 측근은 비록 적었으나 또한 앞으로 불러 곧 서로 죽이려 하였다. 하복야가 어찌할 도리가 없어 일어나 두 사람 사이를 비집고 앉으니, 비로소 갈라놓을 수 있었다. 이른바 세력과 이익으로 맺은 사귐이란 옛사람이 부끄러워한 바이다.", ["분노", "절교", "권력"]], ["忿狷", 8, "桓南郡小兒時，與諸從兄弟各養鵝共鬬。南郡鵝每不如，甚以為忿。迺夜往鵝欄間，取諸兄弟鵝悉殺之。既曉，家人咸以驚駭，云是變怪，以白車騎。車騎曰：「無所致怪，當是南郡戲耳！」問，果如之。", "환남군(桓玄)이 어렸을 때 여러 사촌 형제들과 각자 거위를 길러 함께 싸움을 붙였다. 남군의 거위가 매번 이기지 못하자 몹시 분하게 여겼다. 이에 밤에 거위 우리로 가서 형제들의 거위를 모조리 죽여 버렸다. 날이 밝자 집안사람들이 모두 놀라며 괴이한 변고라 하여 거기장군(桓沖)에게 아뢰었다. 거기장군이 말하였다. \"괴이한 일이 일어날 까닭이 없으니, 분명 남군의 장난일 것이다!\" 물어보니 과연 그러하였다.", ["분노", "신동", "술수"]], ["讒險", 1, "王平子形甚散朗，內實勁俠。", "왕평자(王澄)는 외모가 매우 시원스럽고 명랑했으나, 속은 실로 굳세고 협기가 있었다.", ["용모", "용기", "비평"]], ["讒險", 2, "袁悅有口才，能短長說，亦有精理。始作謝玄參軍，頗被禮遇。後丁艱，服除還都，唯齎戰國策而已。語人曰：「少年時讀論語、老子，又看莊、易，此皆是病痛事，當何所益邪？天下要物，正有戰國策。」既下，說司馬孝文王，大見親待，幾亂機軸。俄而見誅。", "원열(袁悅)은 말재주가 있어 종횡(短長)의 변설을 잘하였고, 또 정밀한 이치(理)도 있었다. 처음에 사현(謝玄)의 참군(參軍)이 되어 자못 예우를 받았다. 뒤에 부모상을 당하여 복상을 마치고 도성으로 돌아올 때 오직 『전국책(戰國策)』만을 가지고 왔다. 사람들에게 말하였다. \"젊을 때 『논어(論語)』와 『노자(老子)』를 읽고, 또 『장자(莊子)』와 『주역(周易)』을 보았으나, 이것들은 모두 병통이 되는 일이니 무슨 이로움이 있겠는가? 천하의 요긴한 물건은 바로 『전국책』뿐이다.\" 도성에 내려와 사마효문왕(司馬道子)에게 유세하여 크게 가까이 대우받아, 거의 정사의 기틀을 어지럽힐 뻔하였다. 그러나 얼마 안 되어 주살당하였다.", ["술수", "권력", "학문"]], ["讒險", 3, "孝武甚親敬王國寶、王雅。雅薦王珣於帝，帝欲見之。嘗夜與國寶、雅相對，帝微有酒色，令喚珣。垂至，已聞卒傳聲，國寶自知才出珣下，恐傾奪其寵，因曰：「王珣當今名流，陛下不宜有酒色見之，自可別詔也。」帝然其言，心以為忠，遂不見珣。", "효무제(孝武帝)는 왕국보(王國寶)와 왕아(王雅)를 매우 친애하고 공경하였다. 왕아가 왕순(王珣)을 황제에게 천거하니, 황제가 그를 만나보고자 하였다. 일찍이 밤에 국보, 왕아와 마주 앉아 있을 때 황제에게 약간 술기운이 있었는데, 왕순을 불러오게 하였다. 거의 이를 즈음 이미 종졸이 전하는 소리가 들리자, 국보는 자기 재주가 왕순의 아래에 있음을 스스로 알아 그 총애를 빼앗길까 두려워하여 이렇게 말하였다. \"왕순은 지금의 명류(名流)이니, 폐하께서는 술기운을 띤 채 그를 만나심이 마땅치 않습니다. 따로 부르심이 좋겠습니다.\" 황제가 그 말을 옳게 여기고 마음으로 충성스럽다 여겨, 마침내 왕순을 만나지 않았다.", ["질투", "권력", "비평"]], ["讒險", 4, "王緒數讒殷荊州於王國寶，殷甚患之，求術於王東亭。曰：「卿但數詣王緒，往輒屏人，因論它事，如此，則二王之好離矣。」殷從之。國寶見王緒問曰：「比與仲堪屏人何所道？」緒云：「故是常往來，無它所論。」國寶謂緒於己有隱，果情好日疎，讒言以息。", "왕서(王緒)가 여러 차례 은형주(殷仲堪)를 왕국보(王國寶)에게 참소하니, 은중감이 이를 몹시 근심하여 왕동정(王珣)에게 방책을 구하였다. 왕순이 말하였다. \"그대는 다만 자주 왕서를 찾아가되, 갈 때마다 사람들을 물리치고 다른 일을 논하시오. 이렇게 하면 두 왕씨의 사이가 갈라질 것이오.\" 은중감이 그대로 하였다. 국보가 왕서를 보고 물었다. \"요즈음 중감과 사람을 물리치고 무엇을 이야기하였는가?\" 왕서가 말하였다. \"그저 늘 오가는 것일 뿐, 다른 논할 만한 것은 없었습니다.\" 국보는 왕서가 자기에게 무언가 숨기는 것이라 여겨, 과연 정과 우의가 날로 멀어지고 참소하는 말도 그치게 되었다.", ["술수", "절교", "권력"]], ["尤悔", 1, "魏文帝忌弟任城王驍壯。因在卞太后閤共圍棊，並噉棗，文帝以毒置諸棗蔕中。自選可食者而進，王弗悟，遂雜進之。既中毒，太后索水救之。帝預敕左右毀缾罐，太后徒跣趨井，無以汲。須臾，遂卒。復欲害東阿，太后曰：「汝已殺我任城，不得復殺我東阿。」", "위문제(魏文帝)는 아우 임성왕(任城王)이 날래고 굳센 것을 꺼렸다. 변태후(卞太后)의 처소에서 함께 바둑을 두고 아울러 대추를 먹는 틈을 타, 문제는 독을 대추 꼭지 속에 넣어 두었다. 자기는 먹을 만한 것을 골라 먹었으나 임성왕은 이를 깨닫지 못하고 마침내 섞어서 먹었다. 독에 중독되자 태후가 물을 찾아 그를 구하려 하였다. 문제가 미리 좌우에게 명하여 병과 항아리를 깨뜨려 두었으므로, 태후가 맨발로 우물로 달려갔으나 물을 길을 것이 없었다. 잠시 후 마침내 죽었다. 문제가 다시 동아왕(東阿王)을 해치려 하자, 태후가 말하였다. \"네가 이미 내 임성왕을 죽였으니, 다시 내 동아왕을 죽일 수는 없다.\"", ["술수", "원한", "죽음"]], ["尤悔", 2, "王渾後妻，琅邪顏氏女。王時為徐州刺史，交禮拜訖，王將答拜，觀者咸曰：「王侯州將，新婦州民，恐無由答拜。」王乃止。武子以其父不答拜，不成禮，恐非夫婦；不為之拜，謂為顏妾。顏氏恥之。以其門貴，終不敢離。", "왕혼(王渾)의 후처는 낭야(琅邪) 안씨(顏氏)의 딸이었다. 왕혼은 당시 서주(徐州) 자사였는데, 혼례의 절을 다 마치고 왕혼이 답배하려 하자, 보던 자들이 모두 말하였다. \"왕후(王侯)는 주(州)의 장관이요 새 신부는 주의 백성이니, 답배할 까닭이 없을 듯합니다.\" 왕혼이 이에 그만두었다. 왕무자(王濟)는 아버지가 답배하지 않아 예가 이루어지지 않았으니 부부가 아닐까 염려하여, 그 어머니에게 절하지 않고 안첩(顏妾)이라 불렀다. 안씨가 이를 부끄러워하였으나, 그 가문이 귀하였으므로 끝내 감히 떠나지 못하였다.", ["부부", "예언", "권력"]], ["尤悔", 3, "陸平原河橋敗，為盧志所讒，被誅。臨刑歎曰：「欲聞華亭鶴唳，可復得乎！」", "육평원(陸機)이 하교(河橋)에서 패하고 노지(盧志)의 참소를 받아 주살당하였다. 형장에 임하여 탄식하며 말하였다. \"화정(華亭)의 학 울음소리를 듣고자 한들, 다시 들을 수 있겠는가!\"", ["죽음", "원한", "뉘우침"]], ["尤悔", 4, "劉琨善能招延，而拙於撫御。一日雖有數千人歸投，其逃散而去亦復如此。所以卒無所建。", "유곤(劉琨)은 사람을 잘 불러 모았으나, 다스리고 거느리는 데는 서툴렀다. 하루에 비록 수천 명이 귀순해 오더라도, 달아나 흩어져 가는 것 또한 이와 같았다. 그래서 끝내 이룬 바가 없었다.", ["비평", "권력"]], ["尤悔", 5, "王平子始下，丞相語大將軍：「不可復使羌人東行。」平子面似羌。", "왕평자(王澄)가 처음 부임지로 내려갈 때, 승상(王導)이 대장군(王敦)에게 말하였다. \"다시는 강인(羌人)을 동쪽으로 가게 해서는 안 되오.\" 평자의 얼굴이 강인을 닮았던 것이다.", ["용모", "비평"]], ["尤悔", 6, "王大將軍起事，丞相兄弟詣闕謝。周侯深憂諸王，始入，甚有憂色。丞相呼周侯曰：「百口委卿！」周直過不應。既入，苦相存救。既釋，周大說，飲酒。及出，諸王故在門。周曰：「今年殺諸賊奴，當取金印如斗大繫肘後。」大將軍至石頭，問丞相曰：「周侯可為三公不？」丞相不答。又問：「可為尚書令不？」又不應。因云：「如此，唯當殺之耳！」復默然。逮周侯被害，丞相後知周侯救己，歎曰：「我不殺周侯，周侯由我而死。幽冥中負此人！」", "왕대장군(王敦)이 거사하자, 승상(王導)의 형제가 대궐로 나아가 사죄하였다. 주후(周顗)는 여러 왕씨를 깊이 근심하여, 처음 들어갈 때 몹시 근심하는 기색이 있었다. 승상이 주후를 불러 말하였다. \"백 명 식솔을 그대에게 맡기오!\" 주후는 그대로 지나치며 응하지 않았다. 안에 들어가서는 애써 그들을 구원하였다. 죄가 풀리자 주후는 크게 기뻐하며 술을 마셨다. 나올 적에 여러 왕씨가 여전히 문 앞에 있었다. 주후가 말하였다. \"올해 역적 놈들을 베어 죽이고, 마땅히 말[斗]만 한 금인(金印)을 얻어 팔꿈치 뒤에 차리라.\" 대장군이 석두(石頭)에 이르러 승상에게 물었다. \"주후를 삼공(三公)으로 삼을 만한가?\" 승상이 대답하지 않았다. 또 물었다. \"상서령(尙書令)으로 삼을 만한가?\" 또 응하지 않았다. 이에 말하였다. \"이러하다면 죽일 수밖에 없겠소!\" 승상은 또 잠자코 있었다. 주후가 해를 당함에 이르러, 승상이 뒤에 주후가 자기를 구원한 것을 알고 탄식하며 말하였다. \"내가 주후를 죽이지는 않았으나, 주후는 나로 말미암아 죽었구나. 저승에서 이 사람을 저버렸도다!\"", ["우정", "죽음", "뉘우침"]], ["尤悔", 7, "王導、溫嶠俱見明帝，帝問溫前世所以得天下之由。溫未答。頃，王曰：「溫嶠年少未諳，臣為陛下陳之。」王迺具敘宣王創業之始，誅夷名族，寵樹同己。及文王之末，高貴鄉公事。明帝聞之，覆面著牀曰：「若如公言，祚安得長！」", "왕도(王導)와 온교(溫嶠)가 함께 명제(明帝)를 뵈었는데, 명제가 온교에게 선대(先代)가 천하를 얻게 된 까닭을 물었다. 온교가 미처 대답하지 못하였다. 잠시 후 왕도가 말하였다. \"온교는 나이가 어려 잘 알지 못합니다. 신이 폐하를 위하여 아뢰겠습니다.\" 왕도는 이에 선왕(司馬懿)이 창업한 처음부터 명망 있는 가문을 베어 없애고 자기와 뜻을 같이하는 자를 총애하여 세운 일과, 문왕(司馬昭) 말년의 고귀향공(高貴鄕公) 사건에 이르기까지 모두 자세히 늘어놓았다. 명제가 이를 듣고 얼굴을 가리고 평상에 엎드리며 말하였다. \"공의 말과 같다면 왕조의 복록이 어찌 길 수 있겠소!\"", ["권력", "충직", "술수"]], ["尤悔", 8, "王大將軍於眾坐中曰：「諸周由來未有作三公者。」有人答曰：「唯周侯邑五馬領頭而不克。」大將軍曰：「我與周洛下相遇，一面頓盡。值世紛紜，遂至於此！」因為流涕。", "왕대장군(王敦)이 여러 사람이 모인 자리에서 말하였다. \"주씨(周氏)들 가운데 지금까지 삼공(三公)이 된 자가 없었다.\" 어떤 사람이 대답하였다. \"오직 주후(周顗)가 다섯 말[馬]의 우두머리에 봉해질 뻔하였으나 이루지 못하였습니다.\" 대장군이 말하였다. \"나는 주후와 낙양(洛陽)에서 만나, 한 번 보고 곧바로 마음을 다 터놓았소. 세상이 어지러운 때를 만나 마침내 이 지경에 이르렀구나!\" 그러고는 눈물을 흘렸다.", ["우정", "죽음", "권력"]], ["尤悔", 9, "溫公初受劉司空使勸進，母崔氏固駐之，嶠絕裾而去。迄於崇貴，鄉品猶不過也。每爵皆發詔。", "온공(溫嶠)이 처음 유사공(劉琨)의 명을 받아 즉위를 권하는 사절로 떠날 때, 어머니 최씨(崔氏)가 한사코 그를 만류하였으나 온교는 옷자락을 끊고 떠났다. 그 뒤 높은 자리에 오르기까지, 향리의 품평(鄕品)은 여전히 더 높아지지 않았다. 작위를 받을 때마다 모두 따로 조서를 내려야 했다.", ["효", "충직", "권력"]], ["尤悔", 10, "庾公欲起周子南，子南執辭愈固。庾每詣周，庾從南門入，周從後門出。庾嘗一往奄至，周不及去，相對終日。庾從周索食，周出蔬食，庾亦彊飯，極歡；并語世故，約相推引，同佐世之任。既仕，至將軍二千石，而不稱意。中宵慨然曰：「大丈夫乃為庾元規所賣！」一嘆，遂發背而卒。", "유공(庾亮)이 주자남(周邵)을 벼슬길에 나오게 하려 하였으나, 자남은 더욱 굳게 사양하였다. 유량이 주자남을 찾아갈 때마다 유량이 남문으로 들어가면 주자남은 뒷문으로 나가곤 하였다. 유량이 한번은 별안간 들이닥쳐 주자남이 미처 피하지 못하고 종일 마주 앉게 되었다. 유량이 주자남에게 먹을 것을 청하니, 주자남이 채소 음식을 내왔고, 유량도 억지로 밥을 먹으며 더할 나위 없이 즐거워하였다. 아울러 세상사를 이야기하며 서로 이끌어 주어 함께 세상을 돕는 소임을 맡기로 언약하였다. 벼슬길에 나아간 뒤 장군 이천석(二千石)에 이르렀으나 뜻에 맞지 않았다. 한밤중에 비분강개하여 말하였다. \"대장부가 도리어 유원규(庾亮)에게 팔렸구나!\" 한 번 탄식하고는 마침내 등창이 나서 죽었다.", ["거절", "은둔", "권력"]], ["尤悔", 11, "阮思曠奉大法，敬信甚至。大兒年未弱冠，忽被篤疾。兒既是偏所愛重，為之祈請三寶，晝夜不懈。謂至誠有感者，必當蒙祐。而兒遂不濟。於是結恨釋氏，宿命都除。", "완사광(阮裕)은 불법(大法)을 받들어 공경과 믿음이 매우 지극하였다. 큰아들이 나이 채 스물도 되지 않았는데 갑자기 위중한 병에 걸렸다. 아들은 본디 유독 사랑하고 소중히 여기던 터라, 그를 위해 삼보(三寶)에 기도하기를 밤낮으로 게을리하지 않았다. 지극한 정성에는 감응이 있어 반드시 가호를 입으리라 여겼다. 그러나 아들은 끝내 살아나지 못하였다. 이에 불가(釋氏)에 원한을 맺고, 숙명(宿命)의 가르침을 모조리 버렸다.", ["죽음", "원한", "효"]], ["尤悔", 12, "桓宣武對簡文帝，不甚得語。廢海西後，宜自申敘，乃豫撰數百語，陳廢立之意。既見簡文，簡文便泣下數十行。宣武矜愧，不得一言。", "환온(桓溫)이 간문제(簡文帝)를 마주하면 그다지 말을 잘 풀어내지 못하였다. 해서공(海西公)을 폐위한 뒤, 마땅히 스스로 사정을 펴야 했으므로 미리 수백 마디를 지어 두고 폐위하고 옹립한 뜻을 진술하려 하였다. 막상 간문제를 뵙자 간문제가 곧 눈물을 수십 줄기나 흘렸다. 환온은 황공하고 부끄러워 한 마디도 하지 못하였다.", ["권력", "뉘우침"]], ["尤悔", 13, "桓公臥語曰：「作此寂寂，將為文、景所笑！」既而屈起坐曰：「既不能流芳後世，亦不足復遺臭萬載邪？」", "환공(桓溫)이 누워서 말하였다. \"이렇게 적막하게 지내다가는 장차 문제(文帝)와 경제(景帝)의 웃음거리가 되겠구나!\" 그러더니 몸을 일으켜 일어나 앉으며 말하였다. \"이미 후세에 꽃다운 이름을 흘릴 수 없다면, 또한 만년토록 더러운 이름이라도 남길 만하지 않겠는가?\"", ["권력", "오만"]], ["尤悔", 14, "謝太傅於東船行，小人引船，或遲或速，或停或待，又放船從橫，撞人觸岸。公初不呵譴。人謂公常無嗔喜。曾送兄征西葬還，日莫雨駛，小人皆醉，不可處分。公乃於車中，手取車柱撞馭人，聲色甚厲。夫以水性沈柔，入隘奔激。方之人情，固知迫隘之地，無得保其夷粹。", "사안(謝安)이 동쪽에서 배를 타고 갈 때, 뱃사공이 배를 끄는데 더디기도 하고 빠르기도 하며 멈추기도 하고 기다리기도 하며, 또 배를 멋대로 놓아 가로세로로 흘려 사람을 부딪고 강기슭에 닿게 하였다. 사안은 처음부터 꾸짖지 않았다. 사람들은 그가 늘 노여움도 기쁨도 없다고 여겼다. 일찍이 형 정서장군(征西將軍)의 장례를 보내고 돌아올 때, 날이 저물고 비가 거세게 내리는데 뱃사공들이 모두 취하여 일을 처리할 수 없었다. 사안이 이에 수레 안에서 손수 수레 기둥을 잡아 마부를 치니 소리와 낯빛이 매우 사나웠다. 무릇 물의 성질은 가라앉고 부드럽지만 좁은 곳에 들어가면 세차게 솟구친다. 이를 사람의 정에 견주어 보면, 궁박하고 좁은 처지에서는 그 평정하고 순수함을 지킬 수 없음을 진실로 알 수 있다.", ["도량", "분노", "비평"]], ["尤悔", 15, "簡文見田稻不識，問是何草？左右答是稻。簡文還，三日不出，云：「寧有賴其末，而不識其本？」", "간문제(簡文帝)가 논에 자란 벼를 보고 알아보지 못하여 \"이것이 무슨 풀인가?\" 하고 물었다. 좌우에서 벼라고 답하였다. 간문제는 돌아와 사흘 동안 나오지 않으며 말하였다. \"어찌 그 끝의 것에 의지하면서 그 근본을 알지 못한단 말인가?\"", ["뉘우침", "학문"]], ["尤悔", 16, "桓車騎在上明畋獵。東信至，傳淮上大捷。語左右云：「羣謝年少，大破賊。」因發病薨。談者以為此死，賢於讓揚之荊。", "거기장군(車騎將軍) 환충(桓沖)이 상명(上明)에서 사냥을 하고 있었다. 동쪽에서 소식이 와 회수(淮水) 가에서의 대승을 전하였다. 좌우에게 말하였다. \"사씨(謝氏) 집안의 젊은이들이 적을 크게 깨뜨렸구나.\" 그러고는 병이 나 죽었다. 평하는 이들은 이 죽음이 양주(揚州)를 사양하고 형주(荊州)로 간 것보다 낫다고 여겼다.", ["죽음", "비평", "권력"]], ["尤悔", 17, "桓公初報破殷荊州，曾講論語，至「富與貴，是人之所欲，不以其道得之，不處」。玄意色甚惡。", "환현(桓玄)이 형주(荊州)의 은중감(殷仲堪)을 깨뜨렸다는 보고를 처음 받았을 때, 일찍이 『논어(論語)』를 강론하다가 \"부귀는 사람이 바라는 바이나 정당한 도리로 얻은 것이 아니면 거기에 머무르지 않는다\"는 대목에 이르렀다. 환현은 뜻과 낯빛이 매우 좋지 않았다.", ["권력", "뉘우침"]], ["紕漏", 1, "王敦初尚主，如廁，見漆箱盛乾棗，本以塞鼻，王謂廁上亦下果，食遂至盡。既還，婢擎金澡盤盛水，瑠璃盌盛澡豆，因倒箸水中而飲之，謂是乾飯。羣婢莫不掩口而笑之。", "왕돈(王敦)이 처음 공주에게 장가들었을 때, 측간에 갔다가 옻칠한 상자에 마른 대추가 담긴 것을 보았다. 본래 코를 막는 데 쓰는 것이었으나, 왕돈은 측간에도 과일을 내놓는다고 여겨 다 먹어 치웠다. 나오자 계집종이 금 대야에 물을 담고 유리 그릇에 조두(澡豆)를 담아 받쳐 들었는데, 이를 물에 쏟아 넣고 마셔 버리며 마른밥인 줄 알았다. 여러 계집종이 입을 가리고 비웃지 않는 이가 없었다.", ["오만", "사치"]], ["紕漏", 2, "元皇初見賀司空，言及吳時事，問：「孫皓燒鋸截一賀頭，是誰？」司空未得言，元皇自憶曰：「是賀劭。」司空流涕曰：「臣父遭遇無道，創巨痛深，無以仰答明詔。」元皇愧慙，三日不出。", "원황제(元皇帝)가 처음 사공(司空) 하순(賀循)을 보고 오(吳)나라 때의 일을 언급하다가 물었다. \"손호(孫皓)가 톱을 달구어 한 하씨(賀氏)의 머리를 잘랐다는데, 그것이 누구인가?\" 사공이 미처 말하기 전에 원황제가 스스로 떠올려 말하였다. \"하소(賀劭)였구나.\" 사공이 눈물을 흘리며 말하였다. \"신의 아비가 무도한 자를 만나 상처가 크고 아픔이 깊으니, 밝으신 분부에 우러러 답할 길이 없습니다.\" 원황제는 부끄러워 사흘 동안 나오지 않았다.", ["죽음", "뉘우침", "효"]], ["紕漏", 3, "蔡司徒渡江，見彭蜞，大喜曰：「蟹有八足，加以二螯。」令烹之。既食，吐下委頓，方知非蟹。後向謝仁祖說此事，謝曰：「卿讀爾雅不熟，幾為勸學死。」", "사도(司徒) 채모(蔡謨)가 강을 건너왔을 때 방게를 보고 크게 기뻐하며 말하였다. \"게는 다리가 여덟에 거기에 집게발 둘이 더해진다.\" 그러고는 삶게 하였다. 먹고 나서 토하고 설사하여 몹시 지치고 나서야 게가 아닌 줄 알았다. 뒤에 사상(謝尚)에게 이 일을 이야기하니 사상이 말하였다. \"그대가 『이아(爾雅)』를 익숙하게 읽지 못하여 하마터면 학문을 권하다가 죽을 뻔하였소.\"", ["학문", "뉘우침", "기지"]], ["紕漏", 4, "任育長年少時，甚有令名。武帝崩，選百二十挽郎，一時之秀彥，育長亦在其中。王安豐選女壻，從挽郎搜其勝者，且擇取四人，任猶在其中。童少時神明可愛，時人謂育長影亦好。自過江，便失志。王丞相請先度時賢共至石頭迎之，猶作疇日相待，一見便覺有異。坐席竟，下飲，便問人云：「此為茶？為茗？」覺有異色，乃自申明云：「向問飲為熱，為冷耳。」嘗行從棺邸下度，流涕悲哀。王丞相聞之曰：「此是有情癡。」", "임첨(任瞻)은 젊었을 때 매우 아름다운 명성이 있었다. 무제(武帝)가 붕어하자 만가(挽歌)를 부를 만랑(挽郎) 백스무 명을 뽑았는데, 한 시대의 빼어난 인재들이었고 임첨도 그 가운데 있었다. 안풍후(安豐侯) 왕융(王戎)이 사위를 고를 때 만랑들 가운데서 뛰어난 자를 찾아 우선 네 사람을 가렸는데, 임첨이 여전히 그 가운데 있었다. 어릴 적 그는 신명함이 사랑스러웠고, 당시 사람들은 임첨은 그림자조차 좋다고 하였다. 강을 건너온 뒤로는 곧 정신을 잃었다. 승상(丞相) 왕도(王導)가 먼저 건너온 당시의 현인들을 청하여 함께 석두(石頭)에 이르러 그를 맞이하며 여전히 옛날처럼 대접하려 하였으나, 한 번 보자 곧 달라졌음을 느꼈다. 자리가 정해지고 차를 내오자 곧 사람에게 물었다. \"이것은 차(茶)인가, 명(茗)인가?\" 좌중에 이상한 기색이 있음을 느끼자 스스로 해명하여 말하였다. \"방금 마실 것이 뜨거운지 찬지를 물었을 뿐이오.\" 일찍이 길을 가다가 관(棺) 파는 집 아래를 지나며 눈물을 흘리고 슬퍼하였다. 승상 왕도가 이를 듣고 말하였다. \"이는 정이 지나친 어리석음이로다.\"", ["비평", "병과늙음", "용모"]], ["紕漏", 5, "謝虎子嘗上屋熏鼠。胡兒既無由知父為此事，聞人道「癡人有作此者」。戲笑之。時道此非復一過。太傅既了己之不知，因其言次，語胡兒曰：「世人以此謗中郎，亦言我共作此。」胡兒懊熱，一月日閉齋不出。太傅虛託引己之過，以相開悟，可謂德教。", "사호자(謝虎子)가 일찍이 지붕에 올라 쥐를 연기로 잡은 적이 있었다. 호아(胡兒, 사랑謝朗)는 아비가 이런 일을 한 줄 알 길이 없었는데, 사람들이 \"어리석은 자 중에 이런 짓을 하는 이가 있다\"고 말하는 것을 듣고 그것을 비웃었다. 당시 이를 말한 것이 한 번만이 아니었다. 태부(太傅) 사안(謝安)은 호아가 모르는 줄 알고서, 그 말끝에 호아에게 말하였다. \"세상 사람들이 이것으로 중랑(中郎)을 비방하고, 또 나도 함께 그런 짓을 했다고 말하더구나.\" 호아는 괴로워 한 달 동안 서재에 틀어박혀 나오지 않았다. 태부가 짐짓 자기 허물을 끌어대어 그를 깨우쳐 준 것이니, 덕으로 가르친 것이라 할 만하다.", ["도량", "간언", "뉘우침"]], ["紕漏", 6, "殷仲堪父病虛悸，聞牀下蟻動，謂是牛鬬。孝武不知是殷公，問仲堪「有一殷，病如此不？」仲堪流涕而起曰：「臣進退唯谷。」", "은중감(殷仲堪)의 아버지가 병으로 허약하고 잘 놀랐는데, 침상 아래 개미가 움직이는 소리를 듣고 소가 싸우는 소리라 여겼다. 효무제(孝武帝)는 그가 은공(殷公)인 줄 모르고 물었다. \"한 은씨(殷氏)가 병이 이러하다는데 그러한가?\" 은중감이 눈물을 흘리며 일어나 말하였다. \"신은 나아가도 물러가도 막다른 골짜기에 든 듯합니다.\"", ["효", "병과늙음", "기지"]], ["紕漏", 7, "虞嘯父為孝武侍中，帝從容問曰：「卿在門下，初不聞有所獻替。」虞家富春，近海，謂帝望其意氣，對曰：「天時尚煗，魚蝦未可致，尋當有所上獻。」帝撫掌大笑。", "우소부(虞嘯父)가 효무제(孝武帝)의 시중(侍中)이 되었는데, 황제가 한가로이 물었다. \"경이 문하(門下)에 있으면서 애초에 어떤 진언이나 간언을 하였다는 말을 듣지 못하였소.\" 우씨는 부춘(富春)에 살아 바다와 가까웠으므로, 황제가 자기 의기를 바란다고 여겨 대답하였다. \"날씨가 아직 따뜻하여 물고기와 새우를 잡을 수 없으나, 머지않아 바칠 것이 있을 것입니다.\" 황제가 손뼉을 치며 크게 웃었다.", ["기지", "권력"]], ["紕漏", 8, "王大喪後，朝論或云「國寶應作荊州」。國寶主簿夜函白事，云：「荊州事已行。」國寶大喜，而夜開閤，喚綱紀話勢，雖不及作荊州，而意色甚恬。曉遣參問，都無此事。即喚主簿數之曰：「卿何以誤人事邪？」", "왕침(王忱)이 죽은 뒤, 조정의 의론에서 어떤 이가 \"왕국보(王國寶)가 형주(荊州)를 맡아야 한다\"고 하였다. 국보의 주부(主簿)가 밤에 봉함한 문서로 아뢰기를 \"형주 일이 이미 결정되었습니다\" 하니, 국보가 크게 기뻐하여 밤에 합문을 열고 막료들을 불러 형세를 이야기하였는데, 비록 형주를 맡는 데까지는 이르지 못했으나 뜻과 낯빛이 매우 흡족하였다. 새벽에 사람을 보내 알아보니 도무지 그런 일이 없었다. 곧 주부를 불러 꾸짖어 말하였다. \"네가 어찌 남의 일을 그르치느냐?\"", ["술수", "권력", "오만"]], ["惑溺", 1, "魏甄后惠而有色，先為袁熙妻，甚獲寵。曹公之屠鄴也，令疾召甄，左右白：「五官中郎已將去。」公曰：「今年破賊正為奴。」", "위(魏)나라 견후(甄后)는 어질고도 미색이 있었으니, 앞서 원희(袁熙)의 아내가 되어 매우 총애를 받았다. 조공(曹公)이 업(鄴)을 함락할 때, 급히 견씨를 불러오게 하니 좌우에서 아뢰었다. \"오관중랑(五官中郎)이 이미 데려갔습니다.\" 조공이 말하였다. \"올해 적을 깨뜨린 것은 바로 그 녀석을 위함이었구나.\"", ["여인", "용모", "권력"]], ["惑溺", 2, "荀奉倩與婦至篤，冬月婦病熱，乃出中庭自取冷，還以身熨之。婦亡，奉倩後少時亦卒。以是獲譏於世。奉倩曰：「婦人德不足稱，當以色為主。」裴令聞之曰：「此乃是興到之事，非盛德言，冀後人未昧此語。」", "순찬(荀粲)은 아내와 더없이 도탑게 지냈는데, 겨울에 아내가 열병을 앓자 마당으로 나가 스스로 차게 한 뒤 돌아와 제 몸으로 식혀 주었다. 아내가 죽자 순찬도 얼마 뒤 죽었다. 이로써 세상의 비웃음을 받았다. 순찬은 일찍이 말하였다. \"부인은 덕을 일컬을 만한 것이 못 되니, 마땅히 색(色)을 으뜸으로 삼아야 한다.\" 상서령(尙書令) 배해(裴楷)가 이를 듣고 말하였다. \"이는 흥에 겨워 한 말이지 성대한 덕을 말한 것이 아니니, 부디 후세 사람들이 이 말에 어두워지지 않기를 바란다.\"", ["부부", "죽음", "여인"]], ["惑溺", 3, "賈公閭後妻郭氏酷妒，有男兒名黎民，生載周，充自外還，乳母抱兒在中庭，兒見充喜踊，充就乳母手中嗚之。郭遙望見，謂充愛乳母，即殺之。兒悲思啼泣，不飲它乳，遂死。郭後終無子。", "가충(賈充)의 후처 곽씨(郭氏)는 모질게 질투하였다. 여민(黎民)이라는 사내아이가 있었는데, 태어난 지 막 돌이 되었을 때 가충이 밖에서 돌아오니 유모가 아이를 안고 마당에 있었다. 아이가 가충을 보고 기뻐 뛰자 가충이 유모의 품에 다가가 아이에게 입을 맞추었다. 곽씨가 멀리서 바라보고 가충이 유모를 사랑한다고 여겨 곧 유모를 죽였다. 아이는 슬피 그리워하며 울고 다른 젖은 빨지 않아 마침내 죽었다. 곽씨는 끝내 자식이 없었다.", ["질투", "죽음", "여인"]], ["惑溺", 4, "孫秀降晉，晉武帝厚存寵之，妻以姨妹蒯氏，室家甚篤。妻嘗妒，乃罵秀為「貉子」。秀大不平，遂不復入。蒯氏大自悔責，請救於帝。時大赦，羣臣咸見。既出，帝獨留秀，從容謂曰：「天下曠蕩，蒯夫人可得從其例不？」秀免冠而謝，遂為夫婦如初。", "손수(孫秀)가 진(晉)에 항복하자, 진 무제(武帝)는 그를 후하게 보살피고 총애하여 이종사촌 누이 괴씨(蒯氏)를 아내로 주니 부부가 매우 도타웠다. 아내가 일찍이 질투하여 손수를 \"오랑캐 자식(貉子)\"이라 욕하였다. 손수가 크게 불평하여 마침내 다시 들어가지 않았다. 괴씨가 크게 뉘우치고 자책하며 황제에게 구원을 청하였다. 그때 큰 사면이 있어 신하들이 모두 알현하였다. 알현이 끝나자 황제는 홀로 손수를 머물게 하고 한가로이 말하였다. \"천하가 너그럽게 풀리니, 괴부인도 그 사면의 예에 따를 수 있겠는가?\" 손수가 관을 벗고 사죄하니, 마침내 처음처럼 부부가 되었다.", ["부부", "질투", "뉘우침"]], ["惑溺", 5, "韓壽美姿容，賈充辟以為掾。充每聚會，賈女於青璅中看，見壽，說之。恆懷存想，發於吟詠。後婢往壽家，具述如此，并言女光麗。壽聞之心動，遂請婢潛修音問。及期往宿。壽蹻捷絕人，踰牆而入，家中莫知。自是充覺女盛自拂拭，說暢有異於常。後會諸吏，聞壽有奇香之氣，是外國所貢，一著人，則歷月不歇。充計武帝唯賜己及陳騫，餘家無此香，疑壽與女通，而垣牆重密，門閤急峻，何由得爾？乃託言有盜，令人修牆。使反曰：「其餘無異，唯東北角如有人跡。而牆高，非人所踰。」充乃取女左右婢考問，即以狀對。充秘之，以女妻壽。", "한수(韓壽)는 자태와 용모가 아름다워 가충(賈充)이 불러 속관으로 삼았다. 가충이 자주 모임을 열 때, 가충의 딸이 푸른 격자창 안에서 내다보다가 한수를 보고 그를 좋아하게 되었다. 늘 그리는 마음을 품어 읊조림으로 드러내었다. 뒤에 계집종이 한수의 집에 가서 이러한 사정을 다 전하고 아울러 딸의 곱고 아름다움을 말하였다. 한수가 이를 듣고 마음이 동하여 마침내 계집종에게 청해 몰래 소식을 주고받았다. 약속한 날에 가서 묵었다. 한수는 날래기가 남보다 뛰어나 담을 넘어 들어갔으나 집안에서는 아무도 알지 못하였다. 이때부터 가충은 딸이 한껏 단장하고 즐거워하는 모습이 평소와 다름을 느꼈다. 뒤에 여러 관속을 모았을 때, 한수에게서 기이한 향기가 나는 것을 맡았는데, 이는 외국에서 바친 것으로 한 번 몸에 배면 여러 달이 지나도 가시지 않는 것이었다. 가충은 무제가 자기와 진건(陳騫)에게만 내렸을 뿐 다른 집에는 이 향이 없음을 헤아려, 한수가 딸과 정을 통한 것이 아닌가 의심하였다. 그러나 담장이 겹겹이 빽빽하고 문이 험하고 엄한데 어찌 그럴 수 있겠는가 하여, 도둑이 들었다고 핑계하여 사람을 시켜 담을 수리하게 하였다. 보낸 자가 돌아와 말하였다. \"다른 곳은 이상이 없으나, 오직 동북쪽 모퉁이에 사람 자취가 있는 듯합니다. 그런데 담이 높아 사람이 넘을 만한 곳이 아닙니다.\" 가충이 이에 딸의 시중드는 계집종을 잡아 심문하니 곧 사실대로 답하였다. 가충은 이를 비밀에 부치고 딸을 한수에게 시집보냈다.", ["부부", "용모", "술수"]], ["惑溺", 6, "王安豐婦，常卿安豐。安豐曰：「婦人卿壻，於禮為不敬，後勿復爾。」婦曰：「親卿愛卿，是以卿卿；我不卿卿，誰當卿卿？」遂恆聽之。", "안풍후(安豐侯) 왕융(王戎)의 아내가 늘 왕융을 \"경(卿)\"이라 불렀다. 왕융이 말하였다. \"부인이 남편을 경이라 부르는 것은 예에 공경스럽지 못하니, 앞으로는 다시 그러지 마시오.\" 아내가 말하였다. \"경을 친애하고 경을 사랑하기에 경을 경이라 부르는 것이오. 내가 경을 경이라 부르지 않으면 누가 경을 경이라 부르겠소?\" 그리하여 늘 그렇게 부르도록 내버려 두었다.", ["부부", "여인", "기지"]], ["惑溺", 7, "王丞相有幸妾姓雷，頗預政事納貨。蔡公謂之「雷尚書」。", "승상(丞相) 왕도(王導)에게 뇌(雷)씨 성을 가진 총애하는 첩이 있었는데, 자못 정사에 관여하고 뇌물을 받았다. 채공(蔡公)이 그를 \"뇌상서(雷尙書)\"라 일컬었다.", ["여인", "권력", "비평"]], ["仇隟", 1, "孫秀既恨石崇不與綠珠，又憾潘岳昔遇之不以禮。後秀為中書令，岳省內見之，因喚曰：「孫令，憶疇昔周旋不？」秀曰：「中心藏之，何日忘之？」岳於是始知必不免。後收石崇、歐陽堅石，同日收岳。石先送市，亦不相知。潘後至，石謂潘曰：「安仁，卿亦復爾邪？」潘曰：「可謂『白首同所歸』。」潘金谷集詩云：「投分寄石友，白首同所歸。」乃成其讖。", "손수(孫秀)는 석숭(石崇)이 녹주(綠珠)를 주지 않은 것을 한하였고, 또 반악(潘岳)이 옛날 자기를 예로써 대하지 않은 것을 원망하였다. 뒤에 손수가 중서령(中書令)이 되자, 반악이 성내(省內)에서 그를 보고 불러 말하였다. \"손령(孫令), 옛날 함께 어울리던 일을 기억하시오?\" 손수가 말하였다. \"마음속에 간직하였으니, 어느 날엔들 잊었겠소?\" 반악은 이에 비로소 화를 면치 못할 줄 알았다. 뒤에 석숭과 구양건(歐陽建)을 잡아들였는데, 같은 날 반악도 잡아들였다. 석숭이 먼저 형장으로 끌려갔는데 서로 알지 못하였다. 반악이 뒤에 이르자 석숭이 반악에게 말하였다. \"안인(安仁), 그대도 이리 되었는가?\" 반악이 말하였다. \"이른바 '흰머리에 같은 곳으로 돌아간다'는 것이로구나.\" 반악이 금곡(金谷)의 모임에서 지은 시에 \"정분을 나누어 석우(石友)에게 부치니, 흰머리에 같은 곳으로 돌아가리라\" 하였으니, 마침내 그 예언이 들어맞았다.", ["원한", "죽음", "예언"]], ["仇隟", 2, "劉璵兄弟少時為王愷所憎，嘗召二人宿，欲默除之。令作阬，阬畢，垂加害矣。石崇素與璵、琨善，聞就愷宿，知當有變，便夜往詣愷，問二劉所在？愷卒迫不得諱，答云：「在後齋中眠。」石便徑入，自牽出，同車而去。語曰：「少年，何以輕就人宿？」", "유여(劉璵) 형제가 젊었을 때 왕개(王愷)에게 미움을 받았다. 일찍이 두 사람을 불러 묵게 하고는 몰래 없애려 하였다. 구덩이를 파게 하여 구덩이가 다 되자 곧 해치려 하였다. 석숭(石崇)은 평소 유여, 유곤(劉琨)과 친하였는데, 그들이 왕개에게 가서 묵는다는 것을 듣고 변고가 있으리라 짐작하여 밤에 왕개를 찾아가 두 유씨가 어디 있느냐고 물었다. 왕개는 갑작스러워 숨기지 못하고 답하였다. \"뒤채에서 자고 있소.\" 석숭이 곧장 들어가 손수 끌어내어 함께 수레에 태우고 떠나며 말하였다. \"젊은이들이여, 어찌 함부로 남에게 가서 묵는가?\"", ["술수", "우정", "용기"]], ["仇隟", 3, "王大將軍執司馬愍王，夜遣世將載王於車而殺之，當時不盡知也。雖愍王家，亦未之皆悉，而無忌兄弟皆稺。王胡之與無忌，長甚相暱，胡之嘗共遊，無忌入告母，請為饌。母流涕曰：「王敦昔肆酷汝父，假手世將。吾所以積年不告汝者，王氏門彊，汝兄弟尚幼，不欲使此聲著，蓋以避禍耳！」無忌驚號，抽刃而出，胡之去已遠。", "대장군 왕돈(王敦)이 민왕(愍王) 사마승(司馬承)을 붙잡아, 밤에 왕이세장(王世將)을 보내 왕을 수레에 실어 죽이게 하였으나, 당시에는 이를 다 알지 못하였다. 비록 민왕의 집안에서도 다 알지는 못하였고, 무기(無忌) 형제는 모두 어렸다. 왕호지(王胡之)는 무기와 자라며 매우 친밀하였는데, 호지가 일찍이 함께 놀러 왔다가 무기가 안에 들어가 어머니께 고하여 음식을 차려 달라 청하였다. 어머니가 눈물을 흘리며 말하였다. \"왕돈이 옛날 네 아버지에게 모질게 굴어 세장의 손을 빌렸다. 내가 여러 해 동안 네게 말하지 않은 까닭은, 왕씨 가문이 강성하고 너희 형제가 아직 어려 이 소문이 드러나지 않게 하여 화를 피하려 함이었다.\" 무기가 놀라 부르짖으며 칼을 빼들고 나갔으나, 호지는 이미 멀리 떠난 뒤였다.", ["원한", "죽음", "용기"]], ["仇隟", 4, "應鎮南作荊州，王脩載、譙王子無忌同至新亭與別，坐上賓甚多，不悟二人俱到。有一客道：「譙王丞致禍，非大將軍意，正是平南所為耳。」無忌因奪直兵參軍刀，便欲斫。脩載走投水，舸上人接取，得免。", "진남장군(鎭南將軍) 응첨(應詹)이 형주(荊州)를 맡았을 때, 왕수재(王脩載)와 초왕(譙王)의 아들 무기(無忌)가 함께 신정(新亭)에 이르러 작별하였는데, 자리에 손님이 매우 많아 두 사람이 함께 온 줄 깨닫지 못하였다. 한 손님이 말하였다. \"초왕승(譙王丞)이 화를 입은 것은 대장군의 뜻이 아니라 바로 평남장군(平南將軍)이 한 일일 뿐이오.\" 무기가 이에 직병참군(直兵參軍)의 칼을 빼앗아 곧 베려 하였다. 수재가 달아나 물에 뛰어들었으나 배 위의 사람이 받아 건져 내어 화를 면하였다.", ["원한", "분노", "용기"]], ["仇隟", 5, "王右軍素輕藍田，藍田晚節論譽轉重，右軍尤不平。藍田於會稽丁艱，停山陰治喪。右軍代為郡，屢言出弔，連日不果。後詣門自通，主人既哭，不前而去，以陵辱之。於是彼此嫌隟大構。後藍田臨揚州，右軍尚在郡，初得消息，遣一參軍詣朝廷，求分會稽為越州，使人受意失旨，大為時賢所笑。藍田密令從事數其郡諸不法，以先有隟，令自為其宜。右軍遂稱疾去郡，以憤慨致終。", "우군장군(右軍將軍) 왕희지(王羲之)는 평소 남전후(藍田侯) 왕술(王述)을 가볍게 여겼는데, 왕술이 만년에 평판과 명예가 점점 높아지자 왕희지는 더욱 마음이 평하지 못하였다. 왕술이 회계(會稽)에서 부모상을 당하여 산음(山陰)에 머물며 상을 치렀다. 왕희지가 대신 그 군(郡)을 맡게 되었는데, 누차 가서 조문하겠다고 말하면서도 며칠이 지나도록 실행하지 않았다. 뒤에 문 앞에 가서 스스로 통보하였으나, 주인이 곡을 시작하자 들어가지 않고 떠나 버려 그를 능멸하였다. 이에 피차의 미움과 틈이 크게 얽혔다. 뒤에 왕술이 양주(揚州)를 다스리게 되었을 때 왕희지는 아직 군에 있었는데, 처음 그 소식을 듣고 한 참군(參軍)을 조정에 보내 회계를 나누어 월주(越州)로 삼아 달라고 청하였으나, 보낸 사람이 뜻을 잘못 받아 취지를 그르치니 당시 현인들에게 크게 비웃음을 샀다. 왕술이 은밀히 종사(從事)에게 명하여 그 군의 온갖 불법을 헤아리게 하였는데, 먼저 틈이 있었으므로 스스로 알아서 처리하도록 하였다. 왕희지는 마침내 병을 핑계하여 군을 떠났고, 분개하다가 죽음에 이르렀다.", ["원한", "질투", "병과늙음", "권력"]], ["仇隟", 6, "王東亭與孝伯語，後漸異。孝伯謂東亭曰：「卿便不可復測！」答曰：「王陵廷爭，陳平從默，但問克終云何耳。」", "왕동정(王珣)이 효백(王恭)과 이야기를 나누었는데, 뒤에 점차 사이가 벌어졌다. 효백이 동정에게 말하였다. \"그대는 도무지 헤아릴 수가 없구려!\" 동정이 대답하였다. \"왕릉(王陵)은 조정에서 간쟁하였고 진평(陳平)은 잠자코 따랐으나, 다만 끝맺음을 어떻게 하였는지를 물을 따름이오.\"", ["우정", "절교", "비평"]], ["仇隟", 7, "王孝伯死，縣其首於大桁。司馬太傅命駕出至標所，孰視首，曰：「卿何故趣，欲殺我邪？」", "왕효백(王恭)이 죽자 그 머리를 대항(大桁)에 매달았다. 사마태부(司馬太傅)가 수레를 명하여 나아가 그 표시된 곳에 이르러 머리를 한참 들여다보고 말하였다. \"그대는 무슨 까닭으로 서둘러 나를 죽이려 하였는가?\"", ["죽음", "원한", "권력"]], ["仇隟", 8, "桓玄將篡，桓脩欲因玄在脩母許襲之。庾夫人云：「汝等近，過我餘年，我養之，不忍見行此事。」", "환현(桓玄)이 장차 황위를 찬탈하려 할 때, 환수(桓脩)가 환현이 자기 어머니의 처소에 있는 틈을 타 그를 습격하고자 하였다. 유부인(庾夫人)이 말하였다. \"너희들은 가까운 사이이고, 또 내 남은 생을 함께 지내왔으며, 내가 그를 길렀으니, 차마 이런 일을 행하는 것을 볼 수 없다.\"", ["술수", "권력", "여인"]]];

const PEOPLE_DESC={"謝安": {"style": "안석(安石)", "life": "320~385", "title": "동진의 명재상", "bio": "동산(東山)에 사십 가까이 은거하다 출사하여 동진의 명재상이 됨. 비수대전(淝水之戰)에서 조카 사현(謝玄)과 환이(桓伊)를 보내 부견(苻堅)의 백만 대군을 격파, 강좌(江左)를 구해냄. 청담의 종장(宗匠)이자 풍류의 표상이며, 풍문에 놀라지 않는 진중함과 도량으로 일컬어짐."}, "桓溫": {"style": "원자(元子)", "life": "312~373", "title": "동진의 명장이자 권신", "bio": "형주자사로서 촉(蜀)을 멸하고 세 차례 북벌(北伐)하여 명성을 떨침. 후일 황제 폐립을 단행하고 찬위(簒位)를 꿈꿨으나 사안·왕탄지의 견제로 뜻을 이루지 못하고 병사. 거울을 보며 \"기왕에 흐름을 남기지 못한다면 만세에 악취라도 남기리라\"고 한 호언으로 유명. 호방함과 야심이 한 몸에 어우러진 인물."}, "劉惔": {"style": "진장(眞長)", "life": "약 311~347", "title": "청담의 영수", "bio": "단양윤(丹陽尹)을 지내어 유윤(劉尹)으로도 일컬어짐. 청담의 영수이자 인물 품평의 일가로, 한 마디 평이 곧 우열을 가름. 환온의 동서로, 환온이 그의 식견을 두려워하였다고 함. 일찍 죽었으나 명사들 사이에서 그 자취는 길게 남음."}, "王導": {"style": "무홍(茂弘)", "life": "276~339", "title": "동진 건국의 으뜸 공신", "bio": "낭야 왕씨의 영수. 사마예(司馬睿)를 보좌해 강좌 정권을 안정시키니, 사람들이 \"왕씨와 사마씨가 천하를 함께한다(王與馬, 共天下)\"라 일컬음. 三朝의 승상으로 동진 초기 정국을 다스림. 사촌형 왕돈의 반란에 대해서도 종묘의 안위를 우선해 처신, 죽음을 무릅쓰고 충절을 지킴."}, "支遁": {"style": "도림(道林)", "life": "314~366", "title": "동진의 고승, 청담의 명사", "bio": "임공(林公)·지공(支公)으로도 불림. 청담과 노장·반야학에 두루 정통하여 사대부와 깊이 교유. 학을 사랑하여 풀어 날려보낸 일화, 말을 기른 까닭을 묻자 \"그 神駿함을 사랑할 따름\"이라 답한 일화로 유명. 즉색종(卽色宗)의 종장이며, 사안·왕희지와 막역."}, "簡文帝": {"style": "도만(道萬)", "life": "320~372", "title": "동진의 풍류 황제", "bio": "휘 욱(昱). 환온이 옹립한 풍류제왕으로, 본래 회계왕(會稽王)이었다가 즉위. 청담을 즐기고 명사들과 어울려 그 자신이 한 사람의 名士. 황제로서의 권위는 미약했으나 인격과 식견은 깊은 존경을 받음. 환온이 위협하자 \"진실로 종묘를 잇는 자라면 어찌 두려워하랴\" 하며 의연."}, "王濛": {"style": "중조(仲祖)", "life": "309~347", "title": "동진 초의 풍류 명사", "bio": "사도좌장사(司徒左長史)를 지내어 왕장사(王長史)로 불림. 용모가 빼어나고 청담에 능함. 빈천하면서도 거문고와 시를 즐긴 풍류 명사. 사위가 사안의 동생 사만(謝萬). 일찍 죽으니 유담이 그의 영전에서 슬피 울고는 \"인보(人寶)가 갔다\"고 함."}, "庾亮": {"style": "원규(元規)", "life": "289~340", "title": "동진 명제 시기의 권신", "bio": "명제(明帝)의 황후의 오빠로 외척. 명제 사후 조정을 농단하여 그의 강경책이 소준(蘇峻)의 난을 부름. 풍채가 헌앙(軒昂)하여 \"달이 구름을 헤치고 나온 듯\"이라는 평을 들음. 후일 형주자사로 한 지방을 거점 삼아 활약. 휘하의 노복이 그를 \"군자의 풍이 있다\" 평."}, "王敦": {"style": "처중(處仲)", "life": "266~324", "title": "동진 초의 대장군, 반란의 주역", "bio": "왕도의 사촌형. 동진 건국 공신이자 대장군. 후일 권력을 다투어 두 차례 반란(王敦之亂)을 일으킴. 호방·강맹하나 의심 많고 잔혹. 술 마시면 조조의 「귀수수(龜雖壽)」를 唾壺를 두드리며 노래, 손에 든 唾壺가 모두 깨짐. 결국 병중에 패해 죽음."}, "殷浩": {"style": "심원(深源)", "life": "303~356", "title": "청담의 영수, 환온의 호적수", "bio": "중군장군(中軍將軍). 청담의 영수로 환온과 쌍벽을 이룸. 사람들이 두 사람을 두고 우열을 가리기 어렵다 함. 북벌에 실패해 폐서인되어, 손가락으로 허공에 \"돌돌괴사(咄咄怪事)\" 네 글자를 종일 쓰며 한탄. 환온이 다시 부르고자 했으나 회답이 빈 봉투로 가, 끝내 부름을 받지 못함."}, "王衍": {"style": "이보(夷甫)", "life": "256~311", "title": "서진의 태위, 청담의 으뜸", "bio": "옥주미(玉麈尾)를 들고 명리(名理)를 논하니 듣는 이가 황홀. 미모와 청담의 으뜸으로 일컬어짐. 평생 \"전(錢)\"이라는 글자를 입에 올리지 않을 만큼 청고함을 자처. 영가의 난 중 석륵(石勒)에게 사로잡혀 \"내가 비록 헛된 말로 천하를 그르쳤으나 어찌 처벌받지 않으랴\" 탄식하며 살해됨."}, "王羲之": {"style": "일소(逸少)", "life": "303~361", "title": "동진의 서성(書聖)", "bio": "우군장군(右軍將軍)을 지내어 왕우군이라 불림. 「난정서(蘭亭序)」를 지어 千古의 명작을 남김. 왕도의 조카뻘이며 사안과 친교. 도교에 깊이 빠짐. 거위를 사랑하여 도사에게 거위를 받기 위해 『도덕경』을 써 주기도. 동상(東床)에서 배를 드러내고 누워 있던 사위가 곧 그."}, "王戎": {"style": "준충(濬沖)", "life": "234~305", "title": "죽림칠현 중 최연소", "bio": "어려서 신동으로 일컬어졌고, 일곱 살에 호랑이 우리 앞에서도 동요치 않아 위 명제의 칭찬을 받음. 후일 사도(司徒)에 오름. 그러나 재물에 인색하기로 이름나, 좋은 자두를 팔 때 씨에서 종자를 얻을까 봐 송곳으로 모두 구멍을 뚫었다는 일화. 청담과 인색이 한 몸에 깃듦."}, "孫綽": {"style": "흥공(興公)", "life": "314~371", "title": "동진의 문장가", "bio": "산수문학과 현언시(玄言詩)의 대표. 「유천태산부(遊天台山賦)」를 짓고는 친구에게 \"땅에 던지면 쇠와 옥의 소리가 나리라\" 자랑. 다소 자부심이 강해 동료들과 우열을 다툼. 인물 품평에도 한 마디씩 곁들이는 일이 잦아 사람들에게 핀잔을 사기도."}, "周顗": {"style": "백인(伯仁)", "life": "269~322", "title": "동진 초의 명신", "bio": "시중(侍中)을 지냄. 호주가(好酒家)이며 우스개를 좋아함. 왕돈의 난 때 왕도의 일족 구명을 청 받았으나 겉으로 답하지 않고 안에서 상소로 변호함. 왕도가 이를 모르고 왕돈에게 그의 처벌을 묵인하니, 그가 죽임을 당함. 후에 진상을 안 왕도가 \"내가 백인을 죽인 것은 아니나 백인은 나로 인해 죽었다\" 탄식."}, "王恭": {"style": "효백(孝伯)", "life": "?~398", "title": "동진 후기의 청고한 외척", "bio": "효무제의 처남. 청고한 풍모로 이름나, 사람들이 \"이 사람은 봄날 강가의 버들 같다\" 평. 학(鶴) 깃으로 된 갖옷을 입고 눈길을 거니니, 맹창(孟昶)이 담 너머로 보고 \"이는 곧 신선이다\" 함. 사마도자의 전횡에 반발해 거병했다 패해 처형됨."}, "桓玄": {"style": "경도(敬道)", "life": "369~404", "title": "동진 말의 찬역자", "bio": "환온의 막내아들. 동진 말기 권력을 잡고 황위를 찬탈해 초(楚)를 세움. 곧 유유(劉裕)에게 토벌되어 패사. 서화에 조예가 있고 자부심이 매우 강함. 명사들의 글씨와 그림을 좋아하여 거두어 모음. 어수룩한 고개지를 자주 속임."}, "郗超": {"style": "가빈(嘉賓)", "life": "336~378", "title": "환온의 모주(謀主)", "bio": "권모와 변재로 환온의 패업을 보좌. 불교에 깊이 귀의. 부친 치음(郗愔)이 충성스러웠음에도 환온을 도와 정변을 꾸미니, 부자 사이가 어그러짐. 사안과의 관계는 미묘하여, 사안이 그의 식견은 인정하면서도 거리를 둠. 죽음을 앞두고는 부친에게 환온과의 밀의를 적은 문서를 보여 사후의 누를 덜게 함."}, "殷仲堪": {"style": "중감(仲堪)", "life": "?~399", "title": "동진 후기의 형주자사", "bio": "형주자사를 지냄. 청담과 현학에 두루 능함. 효성이 지극하여 부친의 병에 손가락을 잘라 약에 섞었다는 일화. 한 눈을 잃었으나 단호함을 잃지 않음. 정세의 격동 속에 환현(桓玄)과 다투다 패해 자살. 그 부지런함과 검소함이 사대부 사이에 회자됨."}, "嵇康": {"style": "숙야(叔夜)", "life": "223~262", "title": "죽림칠현의 영수", "bio": "중산대부(中散大夫)를 지내 혜중산이라 불림. 사마씨에게 출사를 거부하다 종회의 참소로 사형됨. 형장에서 광릉산(廣陵散)을 타며 \"광릉산이 오늘부터 끊어졌도다\" 탄식. 「양생론(養生論)」과 「산거원(山巨源)에게 보낸 절교서」의 저자. 풍채가 우뚝하여 \"외로운 소나무가 홀로 선 듯\"이라 평."}, "山濤": {"style": "거원(巨源)", "life": "205~283", "title": "죽림칠현, 후일의 사도(司徒)", "bio": "칠현 중 연장자. 후에 출사하여 이부상서·사도(司徒) 역임. 인재 천거가 공정하고 정밀하여 산공계사(山公啓事)로 일컬어짐. 혜강이 그에게 절교서를 보냈으나, 산도는 혜강의 아들 혜소를 거두어 정성껏 길러 출사시킴. 도량이 깊은 군자."}, "阮籍": {"style": "사종(嗣宗)", "life": "210~263", "title": "죽림칠현의 또 한 영수", "bio": "보병교위(步兵校尉)를 지내 완보병이라 불림. 청안(靑眼)·백안(白眼)으로 사람을 가려 대함. 예법의 사대부를 만나면 흰자위로 흘기고, 마음 맞는 이에게는 푸른 눈동자로 봄. 모친 상중에도 술을 마시고 슬픔에 피를 토하는 등 형식을 비웃으면서도 정의 본질에 도달. 「영회시(詠懷詩)」 82수를 남김."}, "曹操": {"style": "맹덕(孟德)", "life": "155~220", "title": "위(魏)의 무제(武帝)", "bio": "한 헌제를 끼고 천하를 호령. 시문에도 능한 영걸로 「단가행(短歌行)」 등이 전함. 『세설신어』에서는 가휼(假譎)·도량·잔혹 등 다면적 인물상으로 그려짐. 양수(楊脩)와의 \"鷄肋\" 일화, 흉노 사신을 접견할 때 자신 대신 최염을 세우고 자신은 도부수로 곁에 섰던 일화로 유명."}, "謝萬": {"style": "만석(萬石)", "life": "320~361", "title": "사안의 동생, 청담 명사", "bio": "풍자(風姿)와 청담에 능함. 그러나 자부심이 지나치고 군사들을 돌보지 않아 북벌 중 군이 무너져 폐서인됨. 출정 전 사안이 \"장수가 되어 어찌 한 번도 사졸을 위로하지 않는가\" 충고. 패주 직전, 사안이 사졸을 일일이 다독여 화를 면하게 함. 출세 외에는 늘 형의 그늘에 있음."}, "王獻之": {"style": "자경(子敬)", "life": "344~386", "title": "왕희지의 일곱째 아들, 서가", "bio": "부친의 서법을 잇고 일가를 이루어 부친과 함께 \"이왕(二王)\"으로 병칭됨. 풍채와 재기가 빼어남. 효무제·사안의 총애를 받음. 부인 치도무(郗道茂)와 강제로 헤어진 후 평생을 슬퍼함. 어려서 부친이 뒤에서 붓을 빼앗으려 했으나 잡힌 붓이 빠지지 않으니, 부친이 \"이 아이가 큰 명필이 될 것이다\" 함."}, "顧愷之": {"style": "장강(長康)", "life": "약 344~405", "title": "동진의 화가, 삼절(三絶)", "bio": "인물화에 신묘하여 \"재절(才絶)·화절(畵絶)·치절(癡絶)\"의 삼절이라 불림. 사람을 그릴 때 수 년간 눈동자를 찍지 않으면서, \"전신(傳神)은 바로 이 속에 있다\" 함. 배해의 광대뼈에 털 세 가닥을 더 그려 신령함을 살림. 어수룩한 면이 많아 환현에게 자주 속음."}, "王澄": {"style": "평자(平子)", "life": "269~312", "title": "광달(曠達)의 명사", "bio": "왕연의 동생. 광달한 풍모로 일찍부터 명성. 청담과 음주를 즐기고, 옷을 풀어헤친 채 나무에 올라 우는 까치 새끼를 손에 쥐는 등 거리낌이 없음. 형주자사로 나갔다가 왕돈에게 시기당해 살해됨. 형 왕연이 \"우리 아우의 사람됨은 헤아릴 수 없다\" 평."}, "裴楷": {"style": "숙칙(叔則)", "life": "237~291", "title": "서진의 명사, 옥인(玉人)", "bio": "용모가 빼어나 \"옥인(玉人)\"이라 일컬어짐. 청담과 현담에 능함. 화교(和嶠)·왕융과 함께 인물 품평의 일가. 사람을 보면 그 진면목을 한 마디로 짚어내, 한 번 평가하면 그것이 곧 정평이 됨. 풍모만으로도 사람의 마음을 움직였다고 함."}, "韓康伯": {"style": "강백(康伯)", "life": "332~380", "title": "동진의 청담가·현학가", "bio": "이름은 백(伯), 자가 강백(康伯). 『주역(周易)』 계사전의 주(注)로 유명. 어려서 추운 겨울에 어머니가 한 벌의 옷밖에 못 지어 주자 \"다리는 짧고 머리는 뜨거우니 옷은 더 필요 없습니다\"라 하여 모친을 감동시킴. 모친 은씨(殷氏) 또한 현명한 부인으로 알려짐."}, "石崇": {"style": "계륜(季倫)", "life": "249~300", "title": "서진의 거부(巨富)", "bio": "형주자사 시절 상인을 약탈해 천하의 재산을 모음. 왕개(王愷)와 부 자랑을 다툰 산호수 일화로 유명. 진무제의 외숙 왕개가 자랑하는 두 자(尺) 산호를 철여의(鐵如意)로 부수고 더 크고 화려한 것을 내보임. 애첩 녹주(綠珠) 때문에 손수(孫秀)에게 미움받아 일족과 함께 처형됨."}, "王坦之": {"style": "문도(文度)", "life": "330~375", "title": "동진의 명신", "bio": "사안과 함께 환온의 찬위 시도를 막아내고 효무제를 옹위. 강직하고 효심이 깊음. 자작 「폐장론(廢莊論)」으로 청담을 비판하기도. 부친 왕술(王述)이 그에게 노할 때면 늙은 부친의 무릎에 앉음, 사십이 되어서도 그러함. 환온이 그를 두려워해 \"왕문도(王文度)는 만만치 않다\" 함."}, "鍾會": {"style": "사계(士季)", "life": "225~264", "title": "위 말의 모사(謀士)", "bio": "사마씨의 모주. 일찍이 혜강을 찾아갔으나 혜강이 무시하니 원한을 품어, 후에 사마소에게 참소하여 혜강을 죽임. 후일 등애(鄧艾)와 함께 촉을 정벌, 그 공으로 거만해져 모반을 꾀하다 살해됨. 재기와 모략이 비상하나 인격은 비방을 면치 못함."}, "蘇峻": {"style": "자고(子高)", "life": "?~328", "title": "소준의 난(蘇峻之亂)의 주역", "bio": "역양태수(歷陽太守). 동진 명제 사후 유량(庾亮)의 강경한 견제 정책에 반발, 조약(祖約)과 함께 거병. 건강(建康)을 함락하고 횡포를 부리다, 도간(陶侃)·온교(溫嶠)에게 토벌됨. 그의 난으로 동진 초의 명사들이 큰 곤욕을 치름."}, "何晏": {"style": "평숙(平叔)", "life": "?~249", "title": "위의 현학가, 청담의 비조", "bio": "조조의 양자. 위(魏)의 명사이자 현학의 비조. 노장학을 일으켜 청담의 종을 엶. 분(粉)을 발라 미모를 가꾼 풍속의 시조로, 한여름에도 곱고 흰 얼굴에 사람들이 \"분을 바른 것인가\" 의심. 사마의의 정변(高平陵之變) 때 처형됨. 『논어집해(論語集解)』를 편찬."}, "劉伶": {"style": "백륜(伯倫)", "life": "약 221~300", "title": "죽림칠현의 호주가", "bio": "호주가(好酒家) 중의 호주가. 「주덕송(酒德頌)」을 지음. 사슴이 끄는 작은 수레에 술병을 싣고, 종에게 삽을 메고 따르게 하며 \"내가 죽거든 그 자리에 묻으라\" 함. 알몸으로 집에 누워 있다가 객이 비웃자 \"천지가 내 옷, 집이 내 속옷이니, 그대들은 왜 내 속옷 안에 들어왔는가\" 답."}, "阮咸": {"style": "중용(仲容)", "life": "?~?", "title": "죽림칠현의 음률가", "bio": "완적의 조카로 죽림칠현의 일원. 음률에 통달, 비파의 일종 완함(阮咸)이 그의 이름에서 유래. 7월 7일 사대부들이 비단옷을 햇볕에 너는 날, 그는 깁고 낡은 잠방이를 장대에 걸고 \"풍속을 면치 못한다\" 농함. 부친 상중에도 형수의 호인을 따라잡으러 나귀를 타고 쫓아간 일화."}, "向秀": {"style": "자기(子期)", "life": "약 227~272", "title": "죽림칠현, 『장자』 주의 대가", "bio": "혜강의 절친. 혜강이 죽은 뒤 옛 거처를 지나며 이웃에서 울리는 피리 소리에 「사구부(思舊賦)」를 지어 그를 추모. 『장자』 주(注)에 정심하여, 후에 곽상(郭象)이 그 주를 거의 그대로 자기 것으로 삼음. 사마씨의 부름에 마지못해 출사하니, 종회가 \"기산(箕山)의 뜻은 어찌 되었는가\" 농함."}};
