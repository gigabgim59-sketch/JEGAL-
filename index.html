한 변경을 다스리는 자리에 머물렀다.\n\n함화(咸和) 2년(327), <em>소준(蘇峻)</em>과 <em>조약(祖約)</em>이 <em>유량</em>의 집정에 항거해 군사를 일으켰다. 이른바 <em>소준의 난</em>이다. 소준의 군세가 도성 건강(建康)을 함락하고 성제(成帝)를 협박해 권력을 장악하자, 강남의 군진(軍鎭)이 잇따라 무너졌다. 이 때 선성에 있던 환이는 <em>유량</em>과의 사사로운 우의로 보아도, <em>왕도</em>의 조용한 권유를 따라 보아도, 일단 군을 거두고 형세를 살피는 것이 옳았다. 그러나 환이는 그 길을 가지 않았다.\n\n그는 <em>나는 나라의 외임을 받은 신하다. 어찌 적의 형세가 성하다 하여 군을 거두랴</em> 답하고, 선성의 작은 군세로 소준의 대군에 맞섰다. 부장들이 한 번 물러나 후일을 도모하기를 권했으나 듣지 않았다. 함화 3년(328), 선성이 함락되고 환이는 끝내 사로잡혀 죽었다. <em>절사(節死)</em>다. 한 변방 태수가 도성의 천자를 위해 끝까지 군을 버리지 않은 그 한 자리가 곧 동진 초의 한 충절의 표지가 되었다.\n\n난이 평정된 뒤 조정은 환이의 절사를 표창했다. 그 표창이 곧 <em>환씨 가문</em>의 정치적 자산이 되었다. 환이의 아들 <em>환온(桓溫)</em>이 그 충절을 등에 업고 출사해 사마(駙馬)가 되고, 형주(荊州)를 손에 넣고, 세 차례 북벌을 일으키며 동진 후반기의 한 권신으로 일어선 그 출발점이 바로 부친의 죽음이었다. 환온의 아들 <em>환현(桓玄)</em>이 마침내 동진의 황위를 찬탈하는 데까지 이른 그 한 갈래의 시작도, 거슬러 올라가면 선성의 한 죽음에 닿는다.\n\n『세설신어』에서 환이는 〈품조〉·〈상예〉·〈방정〉편의 한 자리에 그 풍모와 식감과 절의가 나뉘어 그려진다. 강좌팔달의 한 풍류객이 한 변방의 절사로 끝맺는 그 결이, 동진 초의 한 시대의 한 단면이다.", "storyCount": 0}, {"id": "person.JianWenDi", "type": "person", "han": "簡文帝", "ko": "", "sub": "간문제 (320~372), 이름 司馬昱", "title": "", "short": "동진의 황제. 원제의 막내아들. 본디 회계왕(會稽王)이었다 환온이 폐제 사마혁을 폐하고 옹립. 청담과 풍류를 즐긴 풍류 제왕. 환온의 위협 아래에서도 <em>진실로 종묘를 잇는 자라면 어찌 두려워하랴</em> 의연했다 한다.", "long": "簡文帝는 자가 도만(道萬)이며, 이름은 사마욱(司馬昱)이다. <em>원제(元帝) 사마예</em>의 막내아들이다. 어려서 회계왕(會稽王)에 봉해져 오랫동안 <em>회계왕</em>으로 일컬어졌다. 형 <em>명제</em>와 그 아들 <em>성제</em>·<em>강제</em>, 그리고 <em>목제</em>·<em>애제</em>·<em>폐제 사마혁</em>에 이르기까지, 사마욱은 다섯 황제의 시대를 종실의 어른으로 지나왔다. 그 긴 세월의 자리가 그의 인격을 만들었다.\n\n사마욱은 어려서부터 <em>총오(聰悟)</em>로 알려졌다. <em>원제</em>가 그를 안고 <em>유량</em>에게 보이며 <em>이 아이가 우리 가문의 그릇이라</em> 했다 한다. 자라서는 <em>현학</em>과 <em>청담</em>에 깊이 들어, <em>유담(劉惔)</em>·<em>왕몽(王濛)</em>·<em>은호(殷浩)</em>·<em>손작</em>·<em>허순</em>·<em>지도림</em>과 한자리에 앉아 명리를 논했다. 그가 회계왕부(會稽王府)에 명사들을 모은 자리가 곧 동진 중기 청담의 한 본거지였다. 〈문학〉편과 〈상예〉편의 적지 않은 일화가 이 자리에서 나왔다.\n\n<em>유담</em>이 그를 <em>청언(淸言)으로는 회계왕이 으뜸이라</em> 평했다 전한다. 사마욱이 옥주미를 들고 명제를 세우면, 그 자리에 응대할 자가 드물었다고 한다. 그러나 그는 <em>명리에 빠져 정사를 가벼이 한다</em>는 비판도 함께 들었다. <em>환온</em>이 일찍이 <em>회계왕은 청담에는 으뜸이나 일을 맡기면 흔들린다</em> 평한 것이 〈품조〉편에 전한다. 이 평이 후일 그의 자리를 짚는 한 복선이 되었다.\n\n목제 이후의 정사를 그가 종실의 어른으로서 거들었다. <em>은호</em>를 발탁해 <em>환온</em>의 군세를 견제하려 한 것이 그의 손이다. 그러나 은호가 북벌에 실패해 폐서인되자(354년), 환온의 권세를 막을 자가 조정 안에 사라졌다. 사마욱은 그 뒤로 환온의 그늘 아래 종실의 자리를 지킬 수밖에 없었다. <em>애제</em>가 단약(丹藥)에 중독되어 죽고(365년), 그 아우 <em>폐제 사마혁</em>이 즉위했으나, 환온이 <em>혁에게는 남자의 일이 없다</em>는 풍문을 빌미로 폐위했다(371년).\n\n환온이 그 자리에 옹립한 사람이 곧 사마욱이다. 쉰둘의 나이에 그는 황제가 되었다. 환온의 손에 세워진 황제였다. 즉위 첫날, 환온이 폐위와 옹립의 전말을 아뢰자 사마욱이 흐느껴 그치지 않았다 한다. 그러나 그는 옷깃을 여미고 종묘의 자리에 섰다. 환온이 한때 도성에 들어와 압박했을 때, 좌중이 모두 떨었으나 간문제만 태연히 <em>진실로 종묘를 잇는 자라면 어찌 두려워하랴</em> 했다는 일화가 〈아량〉편에 전한다. 청담의 회계왕이 한순간 황제의 자리에 선 자리.\n\n재위는 짧았다. 즉위 이듬해 가을(372년), 그는 병이 들었다. 임종 자리에서 환온에게 <em>그대가 마땅하다 여기면 스스로 취하라</em> 적은 유조(遺詔)를 보였다 전한다. <em>왕탄지</em>가 그 자리에서 붓을 들어 <em>어린 태자를 보필하라</em>로 고쳐 썼다 한다. 그렇게 <em>효무제</em>가 즉위했고, 사마욱은 향년 53세로 세상을 떠났다. 환온의 찬위가 끝내 무산된 한 분기점이 곧 이 자리였다.\n\n『세설신어』에서 간문제는 〈언어〉·〈문학〉·〈방정〉·〈아량〉·〈상예〉·〈품조〉·〈첩오〉·〈배조〉 등 여러 편에 등장한다. 그는 <em>황제로서의 사적</em>보다 <em>명사로서의 풍모</em>로 기억되는 드문 황제다. 동진의 한낮이 <em>사안</em>에게서 무르익기 직전, 그 그늘에서 청담의 빛으로 종묘를 지킨 한 풍류 제왕의 자리가 거기 있다.", "storyCount": 0}, {"id": "person.SunChuo", "type": "person", "han": "孫綽", "ko": "", "sub": "손작 (314~371)", "title": "", "short": "동진의 문장가. 자는 흥공(興公). 회계 산수의 명사 가운데 한 사람으로 <em>현언시(玄言詩)</em>의 대표. 「유천태산부(遊天台山賦)」를 짓고 <em>땅에 던지면 쇠와 옥의 소리가 나리라</em> 자랑한 일화로 〈문학〉편에 등장.", "long": "孫綽은 자가 흥공(興公)이다. 태원(太原) 중도(中都)의 손씨 출신으로, 조부 <em>손초(孫楚)</em>가 서진의 문장으로 이름난 집안의 한 자손이다. 영가의 난 뒤에 강남으로 내려와 회계(會稽)에 자리를 잡았다. 동진 중기 <em>왕희지</em>·<em>사안</em>·<em>허순(許詢)</em>·<em>지도림</em>과 어울려 산수와 청담과 시문을 함께한 회계 명사 무리의 한 사람이다.\n\n손작의 한 자리는 무엇보다 <em>현언시(玄言詩)</em>에 있다. 현언시는 동진 전·중기 시단의 한 큰 흐름으로, <em>현학</em>의 명리를 그대로 시의 언어로 옮긴 시다. 산수를 그리는 듯하면서 그 산수에 <em>道</em>와 <em>無爲</em>와 <em>逍遙</em>의 한 자리를 비춰 보이는 형식이다. <em>허순</em>과 손작이 이 흐름의 두 영수로 일컬어졌고, 당시 사람들이 <em>허·손(許孫)</em>으로 묶어 불렀다. 후대 <em>종영(鍾嶸)</em>의 『시품(詩品)』은 현언시를 <em>담호과미(淡乎寡味)</em> — 맑되 맛이 옅다 — 라 평했지만, 그 <em>옅음</em> 자체가 곧 玄學의 시적 표지였다.\n\n그의 가장 이름난 작이 「유천태산부(遊天台山賦)」다. 천태산(天台山)을 직접 오른 뒤 지은 것이 아니라, 산의 형상을 마음으로 그려 지은 부(賦)다. 仙·道·佛의 한 풍경이 한 폭에 담겼다. 부를 완성하자 손작이 벗 <em>범영기(范榮期)</em>에게 보이며 <em>그대가 이것을 땅에 던져 보라, 쇠와 옥의 소리가 나리라(卿試擲地, 當作金石聲)</em> 자랑했다 한다. 범영기가 처음에는 웃다가 읽고 나서는 과연 그렇다 인정했다는 일화가 〈문학〉편에 전한다. <em>척지금성(擲地金聲)</em>이라는 성어가 여기서 나왔다.\n\n문장에 대한 자부심은 이 한 자리에 그치지 않았다. 그는 사람을 평하는 일에도 부지런해, 당대의 명사들을 한 줄 평으로 자리매김하기를 즐겼다. <em>왕몽(王濛)</em>·<em>유담(劉惔)</em>·<em>환온</em>에 대한 그의 품평이 〈품조〉편 곳곳에 흩어져 있다. 다만 같은 자리에 선 <em>왕희지</em>가 손작의 문장을 두고 <em>과장이 지나치다</em>고 평한 일도 전한다. 손작의 문체는 화려한 쪽으로 기울었고, 회계 명사 가운데 <em>수식의 손작</em>과 <em>담박의 허순</em>이 한 짝으로 대비되었다.\n\n벼슬길도 적지 않았다. 정위경(廷尉卿)·산기상시(散騎常侍)를 거쳤다. 그러나 그의 무게는 관직보다 문장과 청담에 있었다. <em>환온</em>이 낙양 천도를 추진하자 손작이 「간이도낙양소(諫移都洛陽疏)」를 올려 강하게 반대했다. 강남에 뿌리내린 의관남도의 후예들이 다시 북으로 옮기는 것은 백성과 사대부 모두를 흔들리라는 논지였다. 환온이 그 소(疏)를 보고 <em>손작의 붓이 또 일을 그르치는가</em> 노여워했다 전한다. 그러나 결국 천도는 무산되었다.\n\n회계의 산수에서 그가 <em>왕희지</em>·<em>사안</em>과 어울린 자리는 또 한 풍경이다. <em>난정(蘭亭)</em>의 모임(353)에 손작도 참여해 시를 남겼고, 「난정후서(蘭亭後序)」를 지어 <em>왕희지</em>의 「난정서」와 짝을 이루게 했다 한다. <em>사안</em>과 함께 배를 타고 바다에 나갔다가 풍랑에 다른 사람들이 다 낯빛이 변하는데 사안만 태연하자 <em>어찌 돌아가지 않으십니까</em> 다그친 사람이 곧 손작이다. 그 한 자리가 〈아량〉편의 명장면이다.\n\n371년에 죽었다. 향년 58세였다. 그의 부와 시는 당대에 이미 <em>허순과 함께 한 시대를 덮었다</em>는 평을 받았으나, 현언시 자체가 후대 <em>도연명</em>·<em>사령운</em>의 산수시에 자리를 내주면서 그의 이름도 차츰 옅어졌다. 그러나 위진 명사가 산수에서 시를 짓고 청담을 나누던 그 한낮의 풍경은 손작 없이 그려지지 않는다.\n\n『세설신어』에서 손작은 〈문학〉·〈품조〉·〈아량〉·〈배조〉·〈경저(輕詆)〉편 등에 거듭 등장한다. <em>척지금성</em>의 자부와 「유천태산부」의 한 자락이 곧 동진 문단의 한 표지이며, 序說 11章에서 회계 산수의 명사 무리를 헤아릴 때 그의 이름은 <em>왕희지</em>·<em>사안</em>·<em>허순</em>·<em>지도림</em> 사이에 반드시 한 자리를 차지한다.", "storyCount": 0}, {"id": "person.XuXun", "type": "person", "han": "許詢", "ko": "", "sub": "허순 (?~?)", "title": "", "short": "동진의 명사. 자는 玄度. 회계 산수의 명사 가운데 한 사람. 손작과 더불어 玄言詩의 정점. 평생 출사하지 않고 청담과 산수에 머무른 진정한 <em>處士</em>.", "long": "허순(許詢)은 자가 현도(玄度)다. 고양(高陽) 허씨로, 일찍 강남으로 내려와 회계(會稽)에 머물렀다. 동진의 명사 가운데 평생 한 번도 출사하지 않은 <em>처사(處士)</em>로, 그 한 자리에서 그의 이름이 다른 명사들과 갈린다.\n\n어려서부터 재주가 일컬어졌다. 사람들이 그를 두고 <em>총명함이 神에 가깝다</em>고 평했다 한다. 조정에서 여러 차례 불렀으나 모두 사양했다. <em>사안</em>이 동산에 있을 무렵, <em>왕희지</em>·<em>손작</em>·<em>지도림</em>과 더불어 회계의 산수를 함께 노닐던 그 자리에 허순이 있었다. 산음(山陰)의 난정(蘭亭) 모임에도 그의 이름이 보인다. 명사들이 모두 한 번은 조정의 문턱을 넘은 것과 달리, 허순만은 끝내 그 문턱을 넘지 않았다.\n\n청담의 자리에서 그의 솜씨는 <em>손작</em>과 나란히 일컬어졌다. <em>지도림</em>과 마주 앉아 <em>장자</em>의 「소요유(逍遙遊)」를 따져 묻던 일화가 〈문학〉편에 전한다. 지도림이 새 풀이를 내놓자 좌중이 모두 감복했는데, 허순이 그 자리에서 한 자리를 잡아 응답하니 다시 자리가 환해졌다 한다. <em>옥주미</em>를 들고 명리(名理)를 가르는 자리에서 그가 <em>주(主)</em>가 되든 <em>객(客)</em>이 되든, 그 풍모가 한결같이 맑았다고 전한다.\n\n특히 그의 <em>현언시(玄言詩)</em>는 동진 한 시대의 한 정점이다. 동진의 시는 <em>손작</em>과 허순에 이르러 노장(老莊)의 명리를 시의 한가운데에 두는 새 결을 얻었다. <em>손작</em>이 명리를 굳건히 세우는 쪽이라면, 허순은 그 명리를 산수의 한 풍경에 녹여 풀어 놓는 쪽이었다. 두 사람의 시가 한 시대를 함께 이끌었다 하여 <em>손허(孫許)</em>로 병칭되었다. 다만 후대의 <em>종영(鍾嶸)</em>은 현언시 전체를 <em>담박하여 맛이 적다</em>고 평했고, 그 평이 허순의 시에도 함께 걸렸다.\n\n그의 <em>처사</em> 됨은 단순한 은거가 아니었다. <em>사안</em>조차 마흔까지 동산에 머물다 마침내 환온의 막부에 들어갔으나, 허순은 끝내 그 한 발을 떼지 않았다. <em>간문제(簡文帝)</em>가 보위에 오르기 전부터 그를 흠모해 자주 청담의 자리에 불렀고, 즉위 뒤에도 거듭 벼슬을 권했으나 허순은 산수로 돌아갔다. 간문제가 <em>현도(玄度)가 오지 않으니 자리가 비었다</em>고 한 말이 〈언어〉편에 전한다. 황제가 한 명사의 부재를 한탄한 자리.\n\n만년에 그는 <em>영흥(永興)</em>의 산중에 집을 짓고 살았다. 손수 띠를 엮어 지붕을 이고, 시내를 끼고 글을 읽었다. 죽은 해는 분명치 않다. 마흔 전후에 일찍 갔다는 설도, 더 오래 살았다는 설도 함께 전한다. 자식과 후사에 관한 기록도 거의 남지 않았다. 마치 청담의 자리에서 명리 한 자리를 던지고 조용히 옥주미를 내려놓듯, 그렇게 사라졌다.\n\n『세설신어』에서 허순은 〈언어〉·〈문학〉·〈상예〉·〈품조〉·〈서일〉편 곳곳에 등장한다. 동진 명사의 한 전형 — <em>출사를 거부하고, 산수에 머물며, 청담과 시로써 한 시대의 한 자리를 채운</em> — 이 곧 허현도다.", "storyCount": 0}, {"id": "person.ChiJian", "type": "person", "han": "郗鑒", "ko": "", "sub": "치감 (269~339)", "title": "", "short": "고평 치씨의 영수. 동진 초의 명신. 〈언어〉·〈방정〉편에 등장. <em>동상에서 배를 드러내고 누운 왕희지</em>를 사위로 고른 <em>동상쾌서(東床快壻)</em> 일화의 그 치감.", "long": "郗鑒은 자가 도휘(道徽)다. 고평(高平) 금향(金鄉) 사람으로, <em>고평 치씨(高平 郗氏)</em>의 영수다. 한미한 가문은 아니었으나 <em>낭야 왕씨</em>나 <em>진군 사씨</em>에 견줄 일류는 아니었던 이 가문이 동진 초의 명문 반열에 든 것은 거의 치감 한 사람의 공이다.\n\n서진 말, 그는 <em>영가의 난(永嘉之亂)</em>을 산동의 현지에서 겪었다. 향리 사람 천여 호를 이끌고 <em>추산(鄒山)</em>에 의지해 자위했다 한다. 곡식이 떨어지자 도토리와 풀뿌리를 나눠 먹으며 버텼고, 따르는 무리가 수만에 이르렀다. 북쪽의 한 떼는 <em>석륵</em>에게로, 한 떼는 <em>유요</em>에게로 흩어졌으나 치감의 무리는 끝까지 흩어지지 않았다. 이 시기의 행적이 그의 일생에 <em>향당(鄕黨)의 우두머리</em>라는 한 색을 남겼다. 명사이면서 동시에 <em>유민의 영수</em>였던 셈이다.\n\n남도 후 <em>원제</em>가 그를 불러 연주자사(兗州刺史)에 임명했다. 강북에 머물며 <em>조적</em>의 뒤를 이어 회수 일대를 지킨 것이 그의 또 한 자리다. <em>왕돈의 난</em>이 일어나자 명제(明帝)의 부름에 응해 도성으로 들어와 토벌의 한 축을 맡았다. <em>왕도</em>가 종실의 한가운데에 서고 <em>온교</em>가 군사를 통솔하고 치감이 외번의 무력을 합칠 때, 동진 초의 위기가 비로소 가라앉았다. 이어 327년의 <em>소준의 난</em>에서도 그는 광릉(廣陵)에서 군사를 일으켜 <em>도간</em>·<em>온교</em>와 함께 도성을 회복했다.\n\n이 공으로 그는 <em>태위(太尉)</em>에 올라 <em>경구(京口)</em>에 진수했다. 경구는 도성의 동쪽 관문이자 강북 유민이 모이는 자리였다. 치감이 이곳을 다스리며 유민을 호적에 편입하고 군사로 길렀다. 뒤에 <em>사현</em>이 길러 <em>비수대전</em>에서 부견을 부순 <em>북부병</em>의 한 모태가 곧 치감 시절의 경구병이다. 그가 길러 둔 것을 사씨가 거두어 쓴 셈이다.\n\n정사에서 그의 자리는 <em>왕도</em>와 <em>유량</em> 사이의 <em>조정자</em>였다. 두 사람의 권력 다툼이 도성을 둘로 가르려 할 때마다 치감이 외번의 무게로 중간에 섰다. <em>왕도가 너무 너그럽고 유량이 너무 엄하니, 그 사이에 한 사람이 있어야 한다</em>는 것이 당시의 평이었다 한다. <em>방정</em>편에 그가 두 사람을 두고 <em>각자 한 그릇이나 천하를 함께 담기에는 좁다</em> 한 자리가 전한다.\n\n가장 유명한 일화는 사윗감을 고른 자리다. 치감이 <em>왕도</em>의 집에 사람을 보내 사위를 골랐다. 왕씨 자제들이 모두 의관을 정제하고 단정히 앉아 <em>뽑히기를</em> 기다렸는데, 한 사람만이 동쪽 평상(東床)에서 배를 드러내고 누워 떡을 먹고 있었다. 사람이 돌아와 그대로 전하니 치감이 <em>바로 그 아이다</em> 하고 그를 사위로 골랐다. 그가 곧 <em>왕희지</em>다. 이 자리에서 <em>동상쾌서(東床快壻)</em>라는 말이 나왔다. 〈아량〉·〈방정〉편의 한 명장면이며, 사람의 풍격을 의관이 아니라 그 <em>태연함</em>에서 보는 치감의 안목을 한 줄로 보여 준다.\n\n만년에 그는 <em>유량</em>의 북벌 강행에 반대해 <em>지금은 지킬 때이지 칠 때가 아니다</em>라 간했다. 그의 말이 받아들여진 덕에 동진은 한 번의 큰 실패를 면했다 전한다. 339년에 죽었다. 향년 71세. 사후 <em>문성(文成)</em>의 시호를 받았다.\n\n『세설신어』에서 치감은 〈언어〉·〈방정〉·〈아량〉·〈상예〉·〈품조〉편에 두루 등장한다. 도성의 청담 자리에 그가 자주 보이지는 않으나, 그가 경구에 진수하지 않았다면 그 청담의 자리 자체가 없었다. 동진 초의 한 세대를 떠받친 무게 있는 한 기둥이며, 序說 11章에서 <em>왕도·유량·치감</em>의 세 자리가 만드는 삼각의 한 꼭짓점이 곧 이 사람이다.", "storyCount": 0}, {"id": "person.XiaoWuDi", "type": "person", "han": "孝武帝", "ko": "", "sub": "효무제 (362~396), 이름 司馬曜", "title": "", "short": "동진의 황제. 사안의 보좌 아래 즉위. 비수대전을 거치며 동진의 한낮을 살았으나, 사안 死後 사마도자 등의 무리에게 정사를 맡기고 자신은 술과 풍류에 빠졌다. 결국 후궁의 손에 일찍 죽음(396).", "long": "효무제(孝武帝)는 동진의 아홉 번째 황제다. 이름은 사마요(司馬曜), 자는 창명(昌明)이다. 간문제(簡文帝) 사마욱(司馬昱)의 셋째 아들로, 어머니는 후궁 <em>이릉용(李陵容)</em>이다. 흥녕(興寧) 원년(362)에 태어났다. 그가 황제가 되는 자리에 <em>환온(桓溫)</em>의 그림자가 짙다.\n\n간문제는 환온이 <em>폐립(廢立)</em>의 권세를 휘둘러 <em>해서공(海西公)</em> 사마혁을 폐위한 뒤 그 자리에 옹립한 황제였다. 즉위한 지 한 해도 못 되어 죽으니, 환온은 자신에게 <em>구석(九錫)</em>과 <em>선양(禪讓)</em>이 떨어지기를 기다렸다. 그러나 <em>왕탄지(王坦之)</em>와 <em>사안(謝安)</em>이 유조(遺詔)를 손에 쥐고 환온의 야망을 막아섰다. 그 사이에 어린 사마요가 황제 자리에 올랐다(372년). 열한 살이었다.\n\n이듬해 환온이 죽었다. 사안이 <em>상서복야(尙書僕射)</em>로서 정사를 잡았고, 어린 황제는 사안의 그늘에서 자라났다. 사안은 효무제를 정성껏 가르쳤다 한다. 황제가 글을 좋아하고 청담의 자리도 즐겨, <em>명사</em>의 풍모를 어느 정도 갖추었다고 일컬어졌다. 〈언어〉편에 그가 어린 시절 <em>해가 가까운가 장안이 가까운가</em>에 대답한 일화의 변주처럼, 어전의 한마디 한마디가 한 자리를 이루곤 했다.\n\n383년, <em>부견(苻堅)</em>의 백만 대군이 남하했다. <em>비수대전(淝水大戰)</em>이다. 효무제는 도성에 앉아 있었고, 전선은 사안이 총괄해 <em>사석</em>·<em>사현</em>·<em>사염</em>·<em>환이</em>에게 맡겨졌다. 동진이 8만의 군세로 전진의 대군을 무찌른 그 첩보가 건강(建康)에 닿았을 때, 황제는 스물둘이었다. 비수의 승전은 황제 한 사람의 공이 아니었으나, 그것이 <em>효무제 치세</em>로 기록되었음은 사실이다. 동진의 한낮이 그의 머리 위에서 정오를 가리켰다.\n\n그러나 한낮의 빛은 길지 않았다. 사안이 <em>사마도자(司馬道子)</em> 일파의 견제에 시달리다 광릉으로 물러나 죽고(385년), 정사의 무게가 황제와 그의 동생 사마도자에게 넘어왔다. 효무제는 사안 같은 후견을 두지 못한 자신을, 동생을 <em>회계왕(會稽王)</em>에 봉해 <em>녹상서사(錄尙書事)</em>로 삼아 메우려 했다. 그러나 사마도자는 사안이 아니었다. 그의 무리 — <em>왕국보(王國寶)</em>가 그 전형 — 가 정사를 어지럽혔고, 황제 자신도 <em>환온의 호적수</em>였던 사안이 없는 조정의 적막을 술로 메웠다.\n\n효무제는 술을 매우 즐겼다. 밤낮으로 <em>후궁</em>과 <em>예인</em>들 사이에서 술자리를 벌였다 한다. 정사는 점차 사마도자에게 떠넘겨졌고, 형제 사이에도 술기운의 다툼이 잦아졌다. <em>명사</em>의 풍모로 시작한 군주가 <em>주광(酒狂)</em>으로 기울어 가는 모습이 동시대 사람들의 한숨을 자아냈다. 그러는 사이에 <em>환현(桓玄)</em> — 환온의 아들 — 이 형주에서 자라고 있었고, 북부병의 군권은 점차 <em>왕공(王恭)</em>과 <em>유뢰지(劉牢之)</em>에게 넘어가, 다음 시대의 화근이 이미 묻혔다.\n\n태원(太元) 21년(396) 9월, 효무제가 후궁 <em>장귀인(張貴人)</em>과 술자리에서 농을 던진 것이 화근이 되었다. <em>너도 이미 늙어 폐해야 마땅하다</em>는 농을 들은 장귀인이 그날 밤 황제가 취해 잠든 사이에 이불로 덮어 질식시켰다 전한다. 황제의 죽음이 후궁 한 사람의 손에 묻혔는데도, 사마도자의 조정은 이를 묻고 자연사로 처리했다. 향년 35세였다. 동진의 가을이 이로써 본격적으로 시작되었다.\n\n『세설신어』에서 효무제는 〈언어〉·〈품조〉·〈아량〉·〈숙혜〉편에 어린 군주의 모습으로, 또 사안과의 군신 관계의 한 자리로 등장한다. 그의 한낮은 곧 사안의 한낮이었고, 그의 황혼은 곧 동진의 황혼이었다. 序說 12·13章이 짚는 <em>비수의 빛과 그 뒤의 그늘</em>이 곧 그의 한평생이다.", "storyCount": 0}, {"id": "person.SiMaDaoZi", "type": "person", "han": "司馬道子", "ko": "", "sub": "사마도자 (364~403)", "title": "", "short": "효무제의 동생. 회계왕(會稽王)이었다 효무제 후기에 정사를 잡고 측근 王國寶 등과 더불어 농단. 사안만 한 그릇이 못 됐다. 환현에게 사로잡혀 살해됨.", "long": "司馬道子는 자가 도자(道子)이다. <em>간문제(簡文帝)</em> 사마욱의 막내아들로, 형 <em>효무제(孝武帝)</em> 사마요(司馬曜)와는 한 어머니에게서 났다. 어려서 낭야왕(琅邪王)에 봉해졌다 회계왕(會稽王)으로 옮겨졌으므로, 흔히 <em>회계왕</em>으로 일컬어진다.\n\n<em>사안(謝安)</em>이 살아 있는 동안 사마도자의 자리는 그리 크지 않았다. <em>비수대전</em> 직후 사안이 <em>사마도자</em> 측의 견제로 도성을 떠나 광릉(廣陵)으로 출진한 것이 그 출발이다. 사안이 385년에 죽자, 효무제는 종실에 권력을 다시 모으려 했고, 그 한가운데 동생 사마도자를 세웠다. 사도(司徒)·녹상서사(錄尙書事)를 거쳐 양주자사(揚州刺史)에까지 이르며, 효무제 후기의 정사를 사실상 도자가 잡았다.\n\n문제는 그릇이었다. 사안만 한 도량과 식견이 그에게 없었다. 청담의 자리에는 곧잘 끼었으나 <em>명리(名理)</em>를 끝까지 따져 묻는 깊이가 없었고, 정사의 자리에서는 측근의 말에 끌려다녔다. 그 측근의 우두머리가 <em>왕국보(王國寶)</em>다. 왕국보는 <em>왕탄지(王坦之)</em>의 아들이지만, 아버지의 방정한 풍과는 거리가 멀었다. 또 <em>원열(袁悅)</em> 같은 무리가 도자의 곁에서 정사를 농단했다. 술자리가 길어지고 뇌물이 오갔다. 효무제가 형으로서 동생을 누르려 하면, 도자가 술기운으로 형에게 대들었다 한다. 형제의 사이가 차츰 식어 갔다.\n\n396년, 효무제가 후궁의 손에 갑작스레 죽고 <em>안제(安帝)</em>가 즉위했다. 안제는 어려서 사리를 분간하지 못한 황제로 전한다. 그러므로 정사는 온전히 숙부 사마도자의 손에 떨어졌다. 그러나 이 무렵부터 외방의 군진(軍鎭)이 도자의 농단을 견디지 못하고 일어섰다. <em>왕공(王恭)</em>이 <em>북부병(北府兵)</em>을 끼고 경구(京口)에서 일어나 왕국보의 머리를 요구했고, 도자는 끝내 왕국보를 죽여 일을 무마했다. 한 번으로는 끝나지 않았다. 397년 다시 왕공이 일어났고, 형주의 <em>은중감(殷仲堪)</em>·<em>환현(桓玄)</em>이 호응했다.\n\n이때 도자는 아들 <em>사마원현(司馬元顯)</em>에게 정사를 넘겨 맡겼다. 원현은 어린 나이에 부친보다 더 사납고 더 조급했다. 북부병의 <em>유뢰지(劉牢之)</em>를 매수해 왕공을 죽이고, 한때 일을 진정시키는 듯했다. 그러나 그 진정은 잠깐이었다. 401년 <em>손은(孫恩)</em>의 난이 강남을 뒤흔들었고, 그 틈을 타 형주의 환현이 동으로 내려왔다.\n\n402년, 환현이 도성에 들어왔다. 사마원현은 사로잡혀 죽임을 당했다. 도자는 안성(安成)으로 유배되었다 이듬해(403) 환현이 보낸 사람의 손에 독주를 받고 죽었다. 향년 마흔이었다. 한 종실이 한 시대의 정사를 잡았으나, 그 한 사람의 가벼움이 동진의 마지막 한 자락을 함께 끌어내렸다.\n\n『세설신어』에서 사마도자의 모습은 〈품조〉·〈우회〉·〈경저〉 편 곳곳에 흩어져 전한다. <em>사안</em>이 떠난 자리를 그 그릇으로는 메우지 못했다는 한 시대의 평이 그 일화들에 짙다. 序說 13章에서 동진의 가을이 깊어 가는 풍경의 한가운데 그가 서 있다.", "storyCount": 0}, {"id": "person.LiuLaoZhi", "type": "person", "han": "劉牢之", "ko": "", "sub": "유뇌지 (?~402)", "title": "", "short": "동진 후기의 무장. 북부병의 핵심. 처음 王恭을 따랐으나 두 번째 거병 때 환현 측에 붙어 왕공을 죽게 했고, 후일 환현에게 다시 배반당해 자살. <em>세 번 배반한 자</em>로 후대에 평이 좋지 않다.", "long": "劉牢之는 자가 도견(道堅)이다. 팽성(彭城)의 유씨로, 대대로 무장을 낸 집안이다. 조부 유희(劉羲)가 <em>석륵(石勒)</em> 휘하에서 벗어나 진(晉)에 귀부한 이래, 유씨는 강북 무인의 한 계보로 자리잡았다. 유뇌지의 얼굴은 검붉고 눈이 깊었으며, 말수가 적고 활을 잘 쏘았다 한다. 그 풍모가 곧 <em>명사</em>의 풍모와는 거리가 먼, 전형적인 <em>북부(北府)</em>의 무인이었다.\n\n그가 역사의 무대로 올라온 것은 <em>사현(謝玄)</em>의 <em>북부병(北府兵)</em> 창설을 통해서다. <em>사안</em>이 강북의 유민(流民)을 모아 정예를 길러 두라 명한 그 군이다. 사현이 광릉(廣陵)에서 군을 편성할 때, 유뇌지가 그 가운데 가장 사납고 가장 용맹한 한 사람으로 뽑혔다. <em>참군(參軍)</em>으로 들어가 곧 정로장군(精銳)의 한 부장이 되었고, 휘하의 부대는 <em>북부병 안의 북부병</em>으로 일컬어졌다.\n\n383년 <em>비수대전</em>에서 그의 이름이 처음 천하에 알려졌다. <em>부견(苻堅)</em>의 선봉이 낙간(洛澗)에 진을 쳤을 때, 사현이 유뇌지에게 5천을 주어 야습하게 했다. 그가 강을 건너 단숨에 적장 <em>양성(梁成)</em>을 베고 1만여 명을 무너뜨렸다. 이 <em>낙간의 일격</em>이 부견 군의 사기를 단번에 꺾어 비수의 대패로 이어졌다. <em>사안</em>이 바둑판 옆에서 <em>아이들이 도적을 부수었소</em> 한 그 <em>아이들</em>의 한가운데에 유뇌지가 있었다.\n\n비수 이후 사현이 죽고 <em>사씨</em>가 정사의 중심에서 물러나자, 북부병의 실권은 유뇌지의 손에 들어갔다. 그러나 그는 명문의 가풍도 청담의 식견도 갖추지 못한 무장이었다. 동진 후기의 정사가 <em>효무제</em>와 <em>사마도자(司馬道子)</em>의 갈등, 그리고 <em>왕공(王恭)</em>·<em>은중감</em>·<em>환현(桓玄)</em>의 외번(外藩) 삼각 구도로 흘러갈 때, 그는 어디에 발을 디딜지를 스스로 정하지 못했다.\n\n처음 그는 <em>왕공</em>을 따랐다. 왕공이 사마도자의 무리를 치려 거병하자(397), 유뇌지가 선봉을 맡았다. 그러나 이듬해 왕공이 두 번째로 거병했을 때, 조정 측이 유뇌지에게 <em>왕공의 자리를 네게 주리라</em> 회유하자 그가 군을 돌려 도리어 왕공을 쳤다. 왕공이 사로잡혀 죽었다. <em>첫 번째 배반</em>이다. 사대부들이 그를 <em>무인의 무신(無信)</em>이라 한 것이 이때부터다.\n\n이어 <em>환현</em>이 형주에서 일어나 도성으로 내려올 때(402), 조정이 다시 유뇌지에게 환현을 막게 했다. 그러나 그는 환현의 사자 <em>하목지</em>의 설득을 듣고 또 군을 돌려 환현 측에 붙었다. <em>두 번째 배반</em>이다. 환현이 도성에 들어가 정권을 잡자, 유뇌지의 <em>세 번째</em>를 두려워해 그의 병권을 빼앗고 회계내사(會稽內史)로 좌천시켰다. 자기가 배반의 이로움으로 얻은 자리를 자기가 잃는 자리에 선 셈이다.\n\n군을 빼앗긴 유뇌지가 다시 거병해 환현을 치려 했으나, 휘하 장수들이 이미 그를 떠난 뒤였다. <em>참군</em> 유습(劉襲)이 <em>세상에 차마 못 할 일이 셋이 있으니, 임금을 배반함이요, 아비를 배반함이요, 친구를 배반함이라. 장군은 이를 다 했으니 누가 따르겠소</em> 한마디 하고 자리를 떴다 한다. 그날 밤 유뇌지가 신주(新洲)에서 목을 매 죽었다(402년). 시체는 환현이 거두어 저잣거리에 내걸었다.\n\n『세설신어』에서 그는 무인이라 청담의 자리에 모습을 거의 보이지 않는다. 다만 〈식감〉·〈우회〉편의 한 모퉁이에 그의 이름이 스친다. 비수의 영광을 만든 한 칼이 <em>세 번 배반한 자</em>로 끝난 자리 — 동진의 가을이 깊어 가는 한 풍경이며, 곧 <em>환현의 찬위</em>와 <em>유유(劉裕)의 흥기</em>로 이어지는 한 길목이다.", "storyCount": 0}, {"id": "person.LiuYu", "type": "person", "han": "劉裕", "ko": "", "sub": "유유 (363~422)", "title": "", "short": "동진 말의 무장. 평민에 가까운 출신이나 북부병에서 일어났다. 404년 환현을 토벌하고 동진을 형식상 회복시킨 뒤, 사실상 권력을 잡았다. 420년 안제의 동생 공제에게 양위받아 <em>송(劉宋)</em>을 세우며 동진을 닫았다.", "long": "劉裕는 자가 덕여(德輿), 어릴 적 이름이 기노(寄奴)다. 팽성(彭城)에서 흘러나온 한미한 집안 출신으로, 어머니가 그를 낳고 곧 죽어 가난한 외가에서 자랐다. 어려서는 짚신을 삼아 팔고 노름판을 떠돌았다 한다. 동진의 한낮을 빛낸 <em>사안</em>·<em>왕희지</em>의 가문이 의관남도(衣冠南渡)해 온 일류 사족이었던 것과 견주면, 그의 출신은 명사 문화의 바깥에 가까웠다. 그러나 그가 일어선 자리가 곧 동진 말의 한 결정적 자리였다.\n\n그가 솟은 무대는 <em>북부병(北府兵)</em>이다. 비수대전(383)의 영광을 만든 그 정예 부대는, 사안과 <em>사현</em>이 떠난 뒤에도 경구(京口) 일대에 그대로 머물러 있었다. 사족의 손에서 벗어난 이 군대는 점차 무인들의 세계가 되었고, 유유는 그 안에서 <em>유뢰지(劉牢之)</em>의 휘하 하급 군관으로 시작했다. 손은(孫恩)의 난(399~)을 토벌하면서 그의 이름이 알려졌다. 적은 수로 큰 무리를 쪼개는 결단과 사졸과 함께 굶고 함께 자는 검박함이 군중에 퍼졌다.\n\n402년, <em>환현(桓玄)</em>이 도성에 들어와 동진의 정사를 손에 쥐었다. 환현은 곧 안제(安帝)를 폐하고 스스로 <em>초(楚)</em>를 세웠다(403). <em>환온</em>이 끝내 이루지 못한 찬위를 그 아들 대(代)가 이룬 셈이다. 사족 중심의 동진 정치 질서가 무너진 자리에서, 유유는 북부병의 잔여 동지들과 경구에서 거병했다(404). 한 달이 지나지 않아 환현을 격파하고 도성을 회복했다. 환현은 서쪽으로 달아나다 베였다. 안제를 다시 모셔 동진을 형식상 살려 놓은 자가 곧 유유다.\n\n이때부터 동진의 마지막 16년은 사실상 유유의 시대다. 그는 도성에 오래 머무르지 않고 끊임없이 밖으로 나가 군공을 쌓았다. 남쪽으로 <em>노순(盧循)</em>의 난을 평정하고, 서쪽으로 형주의 <em>유의(劉毅)</em>를 베고, <em>사마휴지(司馬休之)</em>를 쫓아냈다. 동진 내부의 군벌을 차례로 정리한 자리에서 그는 곧 북을 바라보았다.\n\n두 차례의 북벌이 그의 절정이다. 첫 북벌(409~410)에서 <em>남연(南燕)</em>을 멸해 산동을 거두었다. 두 번째 북벌(416~417)이 더 컸다. <em>후진(後秦)</em>을 쳐 <em>요홍(姚泓)</em>을 사로잡고 장안(長安)을 되찾았다. 영가의 난(311) 이래 한족의 손을 떠나 있던 옛 서경(西京)이 한 세기를 훌쩍 넘겨 다시 남조의 깃발 아래 들어온 것이다. 동진 일대의 어떤 명사도, <em>조적(祖逖)</em>도 <em>환온</em>도 끝내 이르지 못한 자리였다. 다만 유유가 도성으로 돌아간 뒤 장안은 다시 잃었다. 그 자신이 노리는 자리가 북이 아니라 <em>건강(建康)</em>이었기 때문이다.\n\n418년, 그는 안제를 시해하고 그 동생 <em>공제(恭帝)</em>를 세웠다. 420년, 공제에게 양위를 받아 <em>송(劉宋)</em>을 세웠다. 동진 104년이 그 한 양위로 닫혔다. 의관남도 이래 동진을 떠받쳤던 <em>왕(王)</em>·<em>사(謝)</em>·<em>환(桓)</em>·<em>유(庾)</em>의 사족 문벌 정치가, 짚신을 삼던 한 무인의 손에 끝난 것이다. 이듬해 공제도 죽임을 당했다. 위진 일대 <em>선양(禪讓)</em>의 형식이 가장 무겁게 작동한 한 자리였다.\n\n황제가 된 그는 검박을 그대로 가지고 갔다 한다. 침전에 베 휘장을 치고 토기 그릇을 썼으며, 옛날 짚신 삼던 시절의 도구를 곁에 두고 자손에게 보였다 전한다. 그러나 그 검박이 한 왕조의 풍속이 되지는 못했다. 그가 죽은(422) 뒤 송 황실은 곧 골육의 칼부림으로 흔들렸다.\n\n『세설신어』의 시야는 본디 동진의 사족 명사 세계에 머무르므로, 유유 본인은 책 안에 거의 등장하지 않는다. 그러나 그의 그림자는 책의 끝에 깊이 깔려 있다. 〈아량〉·〈품조〉·〈서일〉편의 한낮을 살던 명사들의 세계가 어떻게 닫혔는가를 묻는 자리에 그가 있다. 동진의 가을은 <em>사안</em>이 떠나며 시작되었고, 동진의 겨울은 유유가 닫았다.", "storyCount": 0}, {"id": "clan.琅琊王氏", "type": "clan", "han": "琅琊王氏", "ko": "", "sub": "낭야 왕씨", "title": "", "short": "동진 초의 으뜸 명문. 후한 말부터 일어났고 죽림칠현의 <em>왕융</em>도 이 가문. 동진에서는 <em>왕도</em>가 정략의 중심, <em>왕돈</em>이 군의 중심. <em>왕희지</em>·왕연·왕징·왕헌지·왕헌도 모두 이 가문. <em>왕씨와 사마씨가 천하를 함께 한다(王與馬, 共天下)</em>는 말이 이 가문에 붙은 평.", "long": "琅琊王氏는 동진 초의 으뜸 명문이다. 산동(山東) 낭야군(琅琊郡) 임기(臨沂)를 본관으로 하며, 한대(漢代) 말부터 일어나 위진(魏晉)을 거치며 일류 사족으로 자리 잡았다. 동진 초에 이르러서는 <em>진군 사씨</em>보다도 앞서 황실과 <em>천하를 함께 한다</em>는 말까지 들었다.\n\n가문의 자취는 후한 말의 <em>왕상(王祥)</em>과 <em>왕람(王覽)</em> 형제로부터 또렷해진다. 왕상은 <em>와빙구리(臥氷求鯉)</em>의 효행으로 일컬어져 〈덕행〉편의 첫머리에 놓였고, 위·진 교체기에 태보(太保)에 올라 가문의 격을 단숨에 올렸다. 그 동생 왕람의 후예에서 동진의 <em>왕도</em>와 <em>왕돈</em>이 났으니, 가문의 두 축이 이 한 형제에게서 갈라졌다.\n\n위에서 진으로 넘어가는 자리에는 <em>죽림칠현</em>의 한 사람인 <em>왕융(王戎)</em>이 있다. 그는 칠현 중 가장 어렸고, 또 가장 정치에 깊이 들어간 인물이다. <em>왕연(王衍)</em>은 그의 종제(從弟)로, 서진 말의 청담을 이끈 <em>옥주미</em>의 영수였다. 그러나 왕연이 정사의 책임을 지지 않고 청담에 머문 것이 <em>영가의 난</em>에 동진 사람들의 회한을 산다. <em>왕연이 천하를 그르쳤다</em>는 평이 후대까지 따라다녔다.\n\n서진이 무너지고 <em>영가 5년(311)</em> 낙양이 함락되자, 낭야 왕씨는 일찍이 <em>낭야왕 사마예(司馬睿)</em>를 받들어 강남으로 옮겨 갔다. <em>의관남도(衣冠南渡)</em>의 한가운데에 이 가문이 있었다. 사마예를 건강(建康)으로 모셔 <em>동진</em>을 세운 정략의 중심이 <em>왕도(王導)</em>요, 군의 중심이 그의 종형 <em>왕돈(王敦)</em>이었다. 사마예가 즉위하던 날 왕도를 자기 자리 옆에 함께 앉히려 했다는 일화가 〈총례〉편에 전한다. <em>왕씨와 사마씨가 천하를 함께 한다(王與馬, 共天下)</em>는 말이 그래서 나왔다.\n\n그러나 군권을 쥔 왕돈이 322년과 324년 두 차례 반(叛)을 일으키며 가문은 한 번 큰 시험을 거쳤다. 왕도가 도성에 남아 황실 편에 서서 종형의 군대를 막았고, 왕돈이 병으로 죽은 뒤 가문의 화는 왕도의 <em>아량</em>과 정략으로 봉합되었다. <em>왕도의 진정함이 가문을 살렸다</em>는 것이 당시의 평이다.\n\n가문의 다음 세대는 청담·서법·문예의 한 정점에 섰다. <em>왕희지(王羲之)</em>가 회계에서 <em>난정(蘭亭)</em>의 자리를 열어 천 년 서법의 표준을 세웠고, 그의 아들 <em>왕헌지(王獻之)</em>가 아버지의 글씨를 이어 <em>이왕(二王)</em>으로 일컬어졌다. <em>왕몽(王濛)</em>·<em>왕술(王述)</em>·<em>왕탄지(王坦之)</em>가 청담과 정사의 자리에 차례로 섰고, 후기에는 <em>왕순(王珣)</em>·<em>왕민(王珉)</em> 형제가 <em>사안</em>과 어깨를 나란히 했다.\n\n『세설신어』를 펼치면 거의 모든 편에 왕씨의 누군가가 등장한다. 〈덕행〉의 <em>왕상</em>, 〈언어〉·〈정사〉의 <em>왕도</em>, 〈호상〉·〈규잠〉의 <em>왕돈</em>, 〈아량〉·〈품조〉의 <em>왕연</em>, 〈교예〉·〈서일〉의 <em>왕희지</em>, 〈상서〉의 <em>왕몽</em>, 〈배조〉의 <em>왕헌지</em>에 이르기까지. 동진의 한낮을 <em>사안</em>이 떠받쳤다면, 동진의 새벽을 떠받친 것은 이 가문이었다.", "storyCount": 0}, {"id": "clan.陳郡謝氏", "type": "clan", "han": "陳郡謝氏", "ko": "", "sub": "진군 사씨", "title": "", "short": "본디 그리 두드러지지 않다 <em>사안</em> 한 사람으로 단숨에 일류 명문이 된 가문. 비수대전을 이끈 사현·사석·사염이 모두 사안의 형제·조카. 동생 사만, 외손 <em>사도온(謝道蘊)</em>도 이 가문. 4세기 후반의 동진 정치·문화의 한가운데.", "long": "陳郡謝氏는 진군(陳郡) 양하(陽夏)를 본관으로 하는 사대부 가문이다. <em>낭야 왕씨</em>나 <em>영천 유씨</em>처럼 한대(漢代)부터 이름난 구족(舊族)은 아니었다. 위(魏)·서진(西晉)을 거치며 비로소 사환(仕宦)의 길에 들어선, 말하자면 늦깎이 가문이다. 그러나 동진(東晉) 중반에 이르러 단숨에 일류 명문의 자리에 올랐다. 그 까닭의 거의 전부가 <em>사안(謝安)</em> 한 사람에게 있다.\n\n가문의 첫 발판은 <em>사곤(謝鯤)</em>이 놓았다. 사곤은 서진 말의 <em>팔달(八達)</em> 가운데 한 사람으로, 청담과 방달(放達)의 풍속을 즐겨 <em>왕돈</em>의 막부에 들어 이름이 났다. 그러나 그 대(代)까지의 진군 사씨는 일류라 부르기에 부족했다. 사곤의 아들 <em>사상(謝尙)</em>이 동진에서 정사의 중심에 가까이 가고, 사곤의 조카 항렬에 <em>사혁</em>·사안·<em>사만</em>·<em>사석(謝石)</em> 형제가 줄지어 자라면서 비로소 가문의 윤곽이 잡혔다.\n\n형 사혁이 일찍 출사해 가문의 한 기둥을 세웠고, 동생 사만이 그 뒤를 이어 북벌의 한 자리를 맡았다. 그러나 사만이 북벌 중에 군세를 잃고 폐서인되면서 가문이 흔들렸다. <em>동산(東山)</em>에 은거해 있던 사안이 이때 마흔이 되어서야 비로소 출사한 까닭이 여기에 있다. <em>사안석이 동산에서 나오지 않으면 창생을 어찌하랴(安石不出, 如蒼生何)</em>는 그때의 한마디다.\n\n사안이 <em>환온</em>의 막부를 거쳐 도성의 정사를 잡은 뒤, 진군 사씨는 동진 정치의 한가운데에 섰다. <em>낭야 왕씨</em>가 <em>왕도</em>로 동진 초의 한낮을 이끌었다면, 진군 사씨는 사안으로 동진 중반의 한낮을 이끌었다. <em>왕씨와 사씨가 함께 천하를 다스린다(王與謝共天下)</em>는 말이 이때 굳어졌다.\n\n가문의 무력은 다음 세대에서 빛났다. 사안의 조카 <em>사현(謝玄)</em>이 <em>북부병(北府兵)</em>을 길러 정예로 키웠고, 사안의 동생 사석과 조카 <em>사염(謝琰)</em>이 군의 한 자리를 맡았다. 383년 <em>비수대전</em>에서 <em>부견</em>의 백만 대군을 8만으로 맞아 부수어 보낸 것이 바로 이 사씨 형제·숙질의 손이다. 한 가문이 한 전쟁의 거의 전부를 떠맡은 예가 동진사에 다시 없다.\n\n문화의 자리에서도 진군 사씨는 한 봉우리를 이뤘다. 사안 자신이 <em>왕희지</em>·<em>손작</em>·<em>지도림</em>과 어울려 산수와 청담과 시문의 한 정점을 보였고, 그 풍속이 집안 안쪽에까지 스몄다. 사혁의 딸 <em>사도온(謝道蘊)</em>은 어려서 <em>버들개지가 바람에 일어남에 견주리(未若柳絮因風起)</em>라는 한 구로 사안을 놀라게 한 재녀로, <em>왕희지</em>의 아들 <em>왕응지</em>에게 시집갔다. 〈언어〉·〈현원〉·〈현원〉편의 한 자리가 그의 것이다.\n\n사안이 죽고(385) 사현이 곧 뒤를 따르자 가문의 무력은 한풀 꺾였다. 그러나 문화의 흐름은 끊기지 않았다. 5세기에 들어 송(宋)의 <em>사령운(謝靈運)</em>과 제(齊)의 <em>사조(謝朓)</em>가 산수시(山水詩)의 두 봉우리를 이룬 것이 모두 이 가문의 후예다. <em>대사(大謝)</em>와 <em>소사(小謝)</em>로 일컬어지며 후대 천 년 시사(詩史)의 한 원류가 되었다.\n\n『세설신어』에서 진군 사씨의 인물은 거의 모든 편에 흩어져 있다. 사안·사혁·사만·사상·사현·사염·사도온의 한 줄 한 줄이 곧 동진 중후반의 풍경이다. 가문이 시대를 만들고, 시대가 가문을 비춘 한 드문 자리.", "storyCount": 0}, {"id": "clan.譙國桓氏", "type": "clan", "han": "譙國桓氏", "ko": "", "sub": "초국 환씨", "title": "", "short": "환이(桓彝)가 소준의 난에 절사하여 동진 정권의 인정을 받고, 그 아들 <em>환온</em>이 형주를 거점으로 군권을 쥔 뒤 동진 후기의 한 축을 이루었다. <em>환충(桓沖)</em>·<em>환이(桓伊)</em>도 이 가문. 결국 환온의 막내아들 <em>환현</em>이 황위를 찬탈하나 곧 유유에게 토벌된다.", "long": "譙國 桓氏는 동진 후기의 한 축을 이룬 무가(武家)이자 명문이다. 본래 초국(譙國) 용항(龍亢) 출신으로, 의관남도 이전 위·서진(西晉) 시기에는 그리 두드러진 가문이 아니었다. 동진에 와서 한 사람의 절사(節死)와 한 사람의 군공(軍功)으로 단숨에 일류로 올라섰고, 다시 한 사람의 찬위(篡位)로 무너진 가문이다. 그 부침이 곧 동진 한 세기의 한 거울이다.\n\n가문의 자리를 세운 이가 <em>환이(桓彝)</em>다. 그는 <em>왕도</em>의 인정을 받아 정사의 한 자리에 섰고, 강주(江州)의 자사로 나갔다. 함화(咸和) 2년(327) <em>소준의 난</em>이 일어나자 환이는 선성(宣城)에서 외로이 막아 서다 성이 함락되자 절사했다. 이 죽음으로 초국 환씨는 <em>동진의 절신(節臣)</em>이라는 인장을 얻었다. 가문의 시작이 곧 한 죽음이었던 셈이다.\n\n그 절사의 그늘에서 자란 맏아들이 <em>환온(桓溫)</em>이다. 환온은 어려서 아버지의 원수를 손수 갚은 일로 일찍부터 이름이 났다. 명제(明帝)의 부마가 되어 종실과 결합했고, 형주(荊州) 자사로 나가 <em>서쪽 군권</em>을 손에 쥐었다. 영화(永和) 3년(347) 성한(成漢)을 멸해 사천(四川)을 거두고, 이후 세 차례 <em>북벌</em>을 감행하며 동진의 군사적 무게중심이 되었다. 도성의 <em>사안</em>·<em>왕탄지</em>와 길항하던 그 한복판이 곧 동진 중기의 정사다. 환온이 <em>기왕에 흐름을 남기지 못한다면 만세에 악취라도 남기리라</em> 호언한 자리는 그의 야망과 동진 사대부의 경계심을 함께 보여 준다.\n\n환온이 죽은 뒤(373) 가문의 무게를 이은 이가 동생 <em>환충(桓沖)</em>이다. 환충은 형의 야심과 달리 <em>사안</em>과 손잡아 도성과 형주의 균형을 지켰다. 383년 <em>비수대전</em>의 전야에 형주의 군세로 서쪽 전선을 막아 준 것이 그였다. 같은 항렬의 <em>환이(桓伊)</em>는 비수의 결전에 출전했고, 또 피리의 명인으로 〈임탄〉·〈술해〉편의 한 자리를 차지한다. <em>왕휘지</em>를 위해 길 위에서 세 곡을 불어 주고 말없이 헤어진 일화가 그것이다. 같은 가문 안에 <em>야심의 환온</em>과 <em>균형의 환충</em>과 <em>풍류의 환이</em>가 나란히 있었다.\n\n그러나 가문의 끝은 환온의 막내아들 <em>환현(桓玄)</em>에서 왔다. 환현은 아버지의 형주 거점을 되찾아 군권을 쥐었고, 도성으로 들어가 안제(安帝)를 폐했다. 403년 스스로 황위에 올라 국호를 <em>초(楚)</em>라 했다. 그러나 곧 <em>유유(劉裕)</em>의 토벌을 받아 이듬해 패주 중에 죽었다. 초국 환씨도 그와 함께 무너졌다. 절사로 일어선 가문이 찬위로 끝난 것이다.\n\n『세설신어』에서 이 가문은 〈호상〉·〈아량〉·〈배조〉·〈임탄〉·〈언어〉편 곳곳에 짙은 그림자를 드리운다. 환온의 호기, 환충의 절제, 환이의 피리, 그리고 환현의 끝 — 동진의 한낮과 그 황혼이 함께 이 한 가문 안에 있다.", "storyCount": 0}, {"id": "clan.太原王氏", "type": "clan", "han": "太原王氏", "ko": "", "sub": "태원 왕씨", "title": "", "short": "낭야 왕씨와는 다른 또 하나의 왕씨 명문. <em>왕몽</em>·<em>왕탄지</em>·<em>왕공</em>이 대표 인물. 동진 중후기 청담과 풍류의 한 축. 왕몽은 풍류 명사로, 왕탄지는 환온의 찬위를 막은 강직한 신하로, 왕공은 청고한 외척으로 각기 일가를 이뤘다.", "long": "太原 <em>왕씨(王氏)</em>는 동진의 또 하나의 왕씨 명문이다. <em>낭야 왕씨</em>가 <em>왕도(王導)</em>·<em>왕돈(王敦)</em>을 앞세워 동진의 개국을 떠받쳤다면, 태원 왕씨는 한 박자 늦게 일어나 동진 중후기의 <em>청담</em>과 풍류, 그리고 외척 정치의 한 축이 되었다. 본관은 태원 진양(晉陽)이며, 위진 사이에 사대부 가문으로 자리를 잡았으나 일류 문벌의 반열에 든 것은 <em>왕몽(王濛)</em> 대(代)에 이르러서다.\n\n<em>왕몽</em>은 자가 중조(仲祖)다. 동진 중기 청담의 한 영수로, 풍모가 빼어나 <em>얼굴빛이 옥과 같다</em>는 평을 들었다 한다. 옥주미를 들고 명리를 논하는 자리에서 그의 한 마디가 좌중을 가른다 했고, <em>유담(劉惔)</em>과 짝을 이뤄 <em>왕유(王劉)</em>로 일컬어졌다. 풍류로는 일가를 이뤘으나 정사의 무게는 가볍게 두었다. 임종 직전 자기 <em>옥주미</em>를 어루만지며 <em>이것이 다 무엇이었던가</em> 탄식한 일화가 〈상서〉편에 전한다. 그 한 탄식이 곧 한 시대 청담의 자기 회의다.\n\n<em>왕탄지(王坦之)</em>는 왕몽의 아들이다. 자는 문도(文度)다. 아버지의 풍류를 잇기보다 강직과 식견으로 한 길을 갔다. <em>사안</em>과 나란히 <em>환온</em>의 막부에 불려 가 칼잡이를 곁에 둔 자리에 앉았을 때, 사안이 태연했던 것과 달리 왕탄지는 손에 든 홀(笏)을 거꾸로 쥐었다 한다. 그러나 환온이 죽기 직전 <em>구석(九錫)</em>을 청하는 표문(表文)을 끝내 미루고 미뤄 그 찬위를 무산시킨 것은 <em>사안</em>과 더불어 왕탄지의 공이다. 풍류 가문의 아들이 정사의 한복판에서 가장 강직한 신하가 된 자리, 그것이 태원 왕씨의 두 번째 얼굴이다.\n\n<em>왕공(王恭)</em>은 왕몽의 손자다. 자는 효백(孝伯)이다. 풍의(風儀)가 맑고 차가워 <em>봄날의 버드나무 같다(濯濯如春月柳)</em>는 평을 들었다 한다. 효무제(孝武帝)의 황후 <em>왕법혜</em>가 그의 누이여서 외척의 자리에 올랐고, 청고함을 무기로 <em>사마도자</em>의 무리를 끊임없이 견제했다. 그러나 끝내 거병의 길에 들어섰다 패해 죽었다(398년). 임형(臨刑)의 자리에서 머리카락을 단정히 빗고 <em>나는 뜻만은 굽히지 않았다</em>는 한 마디를 남겼다 전한다. 청담의 풍류가 비극의 정치로 닫힌 한 자리다.\n\n태원 왕씨와 낭야 왕씨는 같은 <em>왕</em>을 쓰되 결이 다르다. 낭야가 <em>왕도</em>의 균형 감각과 <em>왕희지</em>의 서법으로 동진 한낮의 가장 부드러운 광채를 이뤘다면, 태원은 <em>왕몽</em>의 풍류, <em>왕탄지</em>의 강직, <em>왕공</em>의 청고로 동진 가을의 차고 맑은 빛을 이뤘다. 『세설신어』에서 이 세 사람은 〈언어〉·〈상예〉·〈품조〉·〈방정〉·〈아량〉·〈상서〉편 곳곳에 흩어져 있다. 동진의 늦은 빛이 그 가문의 세 얼굴에 모여 있다.", "storyCount": 0}, {"id": "clan.高平郗氏", "type": "clan", "han": "高平郗氏", "ko": "", "sub": "고평 치씨", "title": "", "short": "<em>치감(郗鑒)</em>이 동진 초의 명문으로 자리 잡았다. 그가 왕희지를 사위로 골랐다는 <em>동상쾌서</em>의 일화로 유명. 그의 손자 <em>치초(郗超)</em>는 환온의 모주(謀主)로 권모의 한가운데 있었다. 부친 치음(郗愔)과의 갈등 또한 한 일화.", "long": "高平 郗氏는 산동(山東) 고평 금향(金鄕)을 본관으로 하는 가문이다. 후한 말 <em>치려(郗慮)</em>가 어사대부를 지냈으나 그 뒤로는 두드러진 자취가 없었다. <em>영가의 난</em>으로 의관남도하면서 비로소 다시 일어났다. 동진 초에 가문을 일류로 끌어올린 사람이 <em>치감(郗鑒)</em>이다.\n\n치감은 자가 도휘(道徽)다. 영가의 어지러움 속에 향리에서 유민 수천 가(家)를 거느리고 <em>역양(嶧陽)</em>에 자리 잡아 가까스로 굶주림을 면했다 한다. 그가 거느린 그 무리가 곧 뒷날 그의 군사적 기반이 된다. 강남으로 건너온 뒤 <em>왕도</em>와 손을 잡고 <em>원제</em>를 옹위했고, <em>왕돈</em>의 난과 <em>소준의 난</em>을 차례로 평정하는 한가운데에 섰다. 특히 소준의 난에서 그가 <em>경구(京口)</em>에 진을 치고 유민병을 다잡아 도성을 구한 일이 결정적이었다. 그 공으로 태위(太尉)에 올랐고, 경구를 거점으로 삼는 군사적 기반은 이후 <em>북부병</em>의 한 원형이 되었다.\n\n치감을 일류 명사 가문으로 못 박은 또 한 자리가 <em>동상쾌서(東床快壻)</em>의 일화다. 치감이 사윗감을 구하려고 <em>왕도</em>의 집에 사람을 보냈다. 왕씨 자제들이 모두 옷매무새를 다듬고 단정히 앉았는데, 한 사람만 동쪽 평상 위에 배를 드러내고 누워 떡을 베어 먹고 있었다. 사자의 보고를 들은 치감이 <em>바로 그 사람이다</em> 하고 사위로 골랐다. 그 사람이 곧 <em>왕희지</em>다. 〈아량〉·〈배조〉편에 전하는 이 한 자리로, 치씨와 <em>낭야 왕씨</em>는 혼맥의 끈을 맺었다.\n\n치감의 아들이 <em>치음(郗愔)</em>과 <em>치담(郗曇)</em>이다. 치음은 자가 방회(方回)로, 노장(老莊)을 좋아하고 도술(道術)에 기울어 정사에는 뜻이 옅었다. 부친이 다져 둔 경구의 군세를 그대로 이어받았으나, 그것을 휘두를 줄을 몰랐다. 이 점이 곧 가문에 그늘을 드리운다.\n\n치음의 아들이 <em>치초(郗超)</em>다. 자는 가빈(嘉賓), 일찍부터 <em>환온</em>의 막부에 들어가 모주(謀主)가 되었다. 환온의 <em>제3차 북벌</em>과 <em>폐립(廢立)</em>의 한가운데에 치초의 계책이 있었고, <em>해서공(海西公)</em>을 폐하고 <em>간문제</em>를 세우는 한 정치적 결단이 곧 그의 손에서 짜였다 한다. 〈문학〉·〈첩오〉편에 그의 영민함이 거듭 그려진다.\n\n부친과 아들의 길이 갈라진 한 일화가 있다. 환온이 치음에게서 경구의 군권을 가져가려 할 때, 치음은 그런 줄도 모르고 자기가 북벌의 한 자리를 맡고 싶다는 글을 환온에게 보내려 했다. 그 글을 치초가 먼저 보고 찢어, 대신 <em>늙고 병들어 군권을 환공께 맡기겠다</em>는 사직의 글로 고쳐 보냈다 한다. 부친의 손에서 가문의 군사 기반이 환온에게 넘어가는 자리를, 그 아들이 손수 매듭지은 셈이다.\n\n치초는 환온이 죽은 뒤 얼마 못 가 일찍 세상을 떴다. 그가 죽자 부친 치음이 그제야 아들이 환온의 모주였음을 알리는 한 상자의 문서를 보고 격노해 <em>이놈이 일찍 죽은 것이 다행이다</em> 했다는 일화가 전한다. 한 가문 안에 <em>현담의 부친</em>과 <em>권모의 아들</em>이 갈라선 자리를 이만큼 보여 주는 일도 드물다.\n\n고평 치씨는 치초 뒤로 차츰 쇠했다. 그러나 동진 초의 정변을 평정한 <em>치감</em>의 무공, <em>동상쾌서</em>로 왕씨와 맺은 혼맥, <em>치초</em>의 권모가 한 가문 안에 응축된 점에서, 치씨는 <em>낭야 왕씨</em>·<em>진군 사씨</em>·<em>초국 환씨</em>의 그늘에 가려지지 않는 한 자리를 차지한다. 『세설신어』의 〈아량〉·〈배조〉·〈문학〉·〈첩오〉·〈규잠〉편이 그 자리를 증언한다.", "storyCount": 0}, {"id": "clan.河南庾氏", "type": "clan", "han": "河南庾氏", "ko": "", "sub": "하남 유씨", "title": "", "short": "<em>유량(庾亮)</em>을 중심으로 한 외척 가문. 명제의 황후의 친정이다. 명제·성제 시기 권력 중심에 있었으나, 그의 강경책이 <em>소준의 난</em>을 부르며 위신이 흔들렸다. 동생 유빙(庾冰)·유익(庾翼) 또한 정사의 중심에 있었다. 사안 이전 외척 정치의 한 단면.", "long": "河南 <em>유씨(庾氏)</em>는 동진 전기를 흔든 외척 가문이다. 본관은 하남 영천(潁川) 언릉(鄢陵)으로, 한위(漢魏) 이래 군현의 한 사족이었으나 강을 건너 <em>의관남도(衣冠南渡)</em>한 뒤에 <em>유량(庾亮)</em> 한 사람을 통해 단숨에 일류 문벌로 올라섰다. 그 흐름은 <em>왕도(王導)</em>의 <em>낭야 왕씨</em>와 함께 동진 초의 두 기둥을 이뤘고, 또 그 두 기둥의 갈등이 곧 동진 전기 정치사의 한 축이 되었다.\n\n가문이 정치의 중심으로 들어선 것은 <em>유량</em>의 누이가 <em>명제(明帝, 사마소)</em>의 황후가 되면서부터다. 황후 <em>유문군(庾文君)</em>은 단정하고 식견이 있어 명제의 신임을 얻었고, 명제가 일찍 죽고 어린 <em>성제(成帝, 사마연)</em>가 즉위하자 황태후로서 임조청정했다. 외척인 <em>유량</em>이 자연스레 정사의 중심에 섰다. <em>왕도</em>가 <em>공화(共和)</em>의 부드러운 정치로 강남의 호족과 북래(北來) 사대부를 아우른 데 비해, 유량은 <em>법도(法度)</em>와 <em>명분(名分)</em>을 곧게 세우려 했다. 두 사람의 결은 처음부터 달랐다.\n\n유량은 자가 원규(元規)다. 풍채가 빼어나고 청담에도 능했다 한다. 〈용지〉편에 그의 풍모를 일컬은 자리가 여럿 있다. <em>온교(溫嶠)</em>가 그를 <em>원규의 풍모는 가을 달과 같다</em> 평한 일도 그 한 자리다. 그러나 그의 강직함은 종종 융통을 잃었다. 유주자사 <em>소준(蘇峻)</em>이 변경의 정예를 거느리고 있는 것을 위협으로 보고, 그를 조정으로 불러올려 병권을 거두려 했다. <em>왕도</em>가 <em>소준이 흉한 사람이니 자극하지 말라</em> 만류했으나 유량은 듣지 않았다.\n\n그것이 <em>소준의 난</em>(328)이다. 소준이 <em>조약(祖約)</em>과 손잡고 도성으로 쳐들어와 황궁을 불태우고 황태후 유문군을 욕보였다. 유문군은 그 치욕 중에 죽었다. 유량은 단신으로 도망쳐 <em>온교</em>·<em>도간(陶侃)</em>에게 의탁했고, 이듬해 도간의 군세로 난이 평정되었으나 가문의 위신은 크게 흔들렸다. 그 뒤로 유량은 도성을 떠나 무창(武昌)에 진수하며 북벌의 뜻을 품었으나 끝내 이루지 못하고 340년에 죽었다.\n\n유량의 뒤를 동생 <em>유빙(庾冰)</em>과 <em>유익(庾翼)</em>이 이었다. 유빙은 도성에 남아 중서감(中書監)으로서 성제·강제(康帝)의 정사를 맡았고, 유익은 형의 자리를 이어 형주(荊州)에 진수하며 북벌을 도모했다. 형제 셋이 안과 밖, 도성과 변진을 갈라 맡은 모습이 한 시기의 풍경이 되었다. 그러나 유익도 북벌의 준비 중에 병으로 죽었고(345), 형주의 자리는 곧 <em>환온(桓溫)</em>에게 넘어갔다. 유씨의 시대가 환씨의 시대로 바뀌는 자리였다.\n\n유씨의 정치는 <em>외척</em>이라는 자리의 한계를 끝내 넘지 못했다. <em>왕씨</em>가 <em>왕도</em>의 <em>공화</em>로 사족 전체의 동의를 얻은 데 비해, 유씨는 황후의 친정이라는 자리에서 시작해 그 자리에 갇혔다. 강경한 법도가 <em>소준의 난</em>을 불렀고, 형제 분점의 구도가 <em>환온</em>의 등장으로 무너졌으며, 그 뒤로는 다시 일어서지 못했다. 그 빈자리에 한 세대 뒤 <em>진군 사씨</em>의 <em>사안</em>이 들어선다. 동진 외척 정치의 한 단면이자 한 실패의 자리.\n\n『세설신어』에서 <em>유량</em>은 〈용지〉·〈방정〉·〈규잠〉·〈상예〉편에 두루 등장하고, <em>유빙</em>·<em>유익</em>도 〈정사〉·〈식감〉편에 그 모습이 비친다. 가문의 흥과 쇠가 그 짧은 일화들 사이에 응축되어 있다.", "storyCount": 0}, {"id": "thought.玄學", "type": "thought", "han": "玄學", "ko": "", "sub": "현학", "title": "", "short": "한대 경학의 자구 주석학에 대한 반동으로 솟아난 위진의 사상. <em>노자(老子)</em>·<em>장자(莊子)</em>·<em>주역(周易)</em>의 <em>삼현(三玄)</em>을 중심으로, 사물의 자구가 아니라 그 <em>근본(本)</em>과 <em>그 너머(玄)</em>를 묻는다. 무위·자연·도·무명을 도구 삼아 우주와 인간을 다시 설명한다. 정시 연간(240~249)이 정점.", "long": "玄學은 위진 시대의 새 사상 흐름이다. 한대(漢代) 경학(經學)의 자구 주석학에 대한 반동으로, 노자(老子)·장자(莊子)·주역(周易)의 <em>삼현(三玄)</em>을 중심에 두고 우주와 인간을 다시 묻는 학풍이다. 그러므로 <em>경학과의 단절</em>과 <em>道家로의 회귀</em>가 그 시대적 표지이며, 동시에 그것을 위진 사대부 특유의 <em>명사(名士)</em> 문화로 표현한 것이 특색이다.\n\n배경. 한대 경학은 경전의 한 글자도 함부로 고치지 않는 자구 주석학의 시대였다. 한 경전을 평생 들여 해석하고, 그 해석이 곧 학파를 이루었다. 그러나 후한 말의 정치적 파탄과 황건의 난, 그리고 위 황실의 성립을 거치며, <em>경(經)이 답을 주지 않는다</em>는 의심이 사대부 사이에 퍼졌다. 시대가 묻는 새 물음을 한대 경학의 틀로는 풀 수 없었다.\n\n이 답답함을 뚫고 솟아난 것이 <em>삼현</em>의 재발견이다. <em>노자</em>는 <em>無爲</em>와 <em>自然</em>과 <em>道</em>의 본체론을, <em>장자</em>는 <em>逍遙</em>와 <em>齊物</em>의 자기 해방을, <em>주역</em>은 <em>변화의 원리</em>와 <em>상수(象數)</em>의 사유를 제공했다. 이 셋이 곧 玄學의 척추다.\n\n정점은 위 정시(正始, 240~249) 연간 낙양에서 왔다. <em>하안(何晏)</em>과 <em>왕필(王弼)</em>이 이 시기 두 영수다. 하안은 『논어집해(論語集解)』를 편찬해 노장의 시각으로 공자를 다시 읽었고, 「無名論」·「無爲論」에서 <em>근본은 無이며 만물은 그 無에서 생긴다(以無爲本)</em>는 본체론을 정립했다. 왕필은 그보다 한참 어렸으나 십대에 노자와 주역의 주(注)를 지어 후대 천 년의 표준이 되었다. 특히 왕필의 노자 주는 <em>체(體)와 용(用)의 구분</em>, <em>언(言)과 의(意)의 관계</em>, <em>무(無)와 유(有)의 관계</em>를 정밀하게 분석해 위진 사상의 한 정점을 이뤘다.\n\n이 두 사람을 중심으로 정시 연간의 낙양에는 <em>명리(名理)</em>를 가르는 토론의 자리가 무수히 펼쳐졌다. 이것이 곧 <em>청담(淸談)</em>이며, 玄學의 표현 형식이다. 옥주미를 든 사람이 명제를 세우면 그 명제가 무너지는 자리까지 따져 묻고, 또 다른 명제로 응답하고, 그렇게 <em>주(主)</em>와 <em>객(客)</em>이 갈마들며 토론한다.\n\n249년 <em>고평릉의 정변</em>으로 하안과 정시 명사들이 한꺼번에 사라지자, 玄學의 무대는 옮겨졌다. <em>죽림칠현</em>의 시대(약 250~263)다. 혜강(嵇康)과 완적(阮籍)이 영수로, <em>명교(名敎, 유가적 예법)</em>와 <em>자연(自然)</em>의 대립을 사상사의 한가운데에 두었다. <em>명교에 갇히지 않고 자연을 따른다(越名敎而任自然)</em>는 혜강의 명제가 그 핵심이다. 향수(向秀)와 곽상(郭象)의 『장자』 주는 그 후 위진 玄學의 또 한 정점이며, 특히 곽상의 <em>獨化</em>와 <em>自爾</em> 개념은 노장 사상의 가장 정밀한 위진적 재해석이다.\n\n서진(西晉)에 들어 玄學은 <em>풍속화</em>되었다. 정치의 책임을 지지 않고 청담에 머무르는 명사들 — <em>왕연</em>이 그 전형 — 이 늘면서, 玄學은 깊이의 사상에서 사교의 의례로 변해 갔다. 그것이 <em>팔왕의 난</em>과 <em>영가의 난</em>으로 이어지는 한 정치적 무력의 한 사상적 원인이라는 비판이 동시대부터 나왔다.\n\n동진(東晉)에 와서 玄學은 두 갈래로 갈라졌다. 한 갈래는 청담의 풍속을 그대로 잇는 길로, <em>왕도</em>·<em>은호</em>·<em>손작</em>·<em>왕희지</em>·<em>사안</em>에 이어졌다. 또 한 갈래는 <em>불교</em>와 결합하는 길로, 인도에서 들어온 <em>반야학(般若學)</em>이 노장의 옷을 입고 <em>공(空)을 무(無)로, 반야를 명리로, 진여를 도로</em> 풀어 가르치는 <em>격의불교(格義佛敎)</em>가 펼쳐졌다. <em>지도림(支道林)</em>이 그 한가운데서 청담과 불교를 동시에 이끌었다.\n\n玄學의 의의는 무엇인가. 첫째, 한대 경학의 답답함을 뚫고 사상의 자유를 되찾았다. 둘째, <em>체용(體用)</em>·<em>언의(言意)</em>·<em>명실(名實)</em>·<em>명교(名敎)와 자연</em>의 개념틀을 후대 천 년의 동아시아 사상에 남겼다. 셋째, <em>명사(名士)</em>라는 새 인간형 — 정사·청담·시문·서법·산수를 한 인격에 통일하는 — 을 만들어 냈다. 『세설신어』는 그 명사들의 한 줄 한 줄을 기록한 책이며, 그 모든 일화의 사상적 배경에 玄學이 있다.", "storyCount": 0}, {"id": "thought.淸談", "type": "thought", "han": "淸談", "ko": "", "sub": "청담", "title": "", "short": "현학의 명제를 <em>주(主)</em>와 <em>객(客)</em>이 갈마들며 토론하는 위진 명사들의 지적 사교. 옥주미(玉麈尾)를 든 사람이 명제를 세우고, 듣는 이가 반례를 들고, 그렇게 한 자리에서 명리(名理)를 가르는 <em>지적 경기</em>다. 진 사람은 옷을 벗어 옥주미를 넘긴다. 단순한 한담이 아니다.", "long": "淸談은 위진 명사가 <em>현학(玄學)</em>의 명리(名理)를 <em>주(主)</em>와 <em>객(客)</em>으로 갈마들며 따져 묻던 지적 경기다. 한가한 잡담을 가리키는 말이 아니다. <em>옥주미(玉麈尾)</em>를 든 사람이 한 명제를 세우면, 듣는 이가 반례를 들고, 다시 새 명제로 응답하며, 한 자리의 끝까지 명리를 가른다. 진 사람은 옷을 벗어 옥주미를 넘긴다. 위진 사대부의 사상·언어·인격이 한자리에 모이는 형식이 곧 청담이다.\n\n기원은 후한 말의 <em>청의(淸議)</em>에 있다. 향당과 태학에서 사대부가 인물을 품평하고 시정을 비판하던 풍속이 청의다. <em>허소(許劭)</em>의 <em>월단평(月旦評)</em>이 그 한 정점이다. 그러나 위 황실의 성립과 <em>당고(黨錮)의 화</em>를 거치며 시정 비판이 위험한 길이 되자, 사대부의 입은 정사에서 사상으로, 인물 비평에서 <em>명리</em> 분석으로 옮겨 갔다. 청의가 청담으로 굽이쳐 든 것이다.\n\n정점은 위 정시(正始, 240~249) 연간 낙양에 왔다. <em>하안(何晏)</em>과 <em>왕필(王弼)</em>이 그 두 영수다. 하안의 집에 명사가 모여 노장(老莊)과 주역(周易)을 따져 묻는 자리가 곧 청담의 한 원형이다. 십대의 왕필이 그 자리에 들어가 하안이 <em>이미 다했다</em> 한 자리를 한 번 더 뒤집어 일좌가 모두 탄복했다 한다. <em>체용(體用)</em>·<em>언의(言意)</em>·<em>유무(有無)</em>가 이 자리에서 후대 천 년의 동아시아 사상에 남을 개념으로 다듬어졌다.\n\n청담의 형식은 정밀하다. 옥주미를 든 사람이 <em>주</em>가 되어 한 명제를 세운다. <em>지인이 산을 좋아한다</em>든가 <em>성인이 정(情)을 가지는가</em>든가 하는 한 자리다. <em>객</em>이 반례를 든다. 주가 다시 응답하고, 객이 다시 묻는다. 이것이 한 <em>번(番)</em>이다. 한 명리를 두고 수십 번이 오가는 일도 흔했다. <em>은호(殷浩)</em>와 <em>손성(孫盛)</em>이 한 자리에서 밥을 잊고 따져 묻다 <em>손성의 머리 위로 파리가 모이는 줄도 몰랐다</em>는 일화가 〈문학〉편에 전한다. 진 사람은 곧 자기가 졌음을 인정하고 옥주미를 넘긴다. 이기고 짐이 인격의 깊이를 가르는 한 자리였다.\n\n249년 <em>고평릉의 정변</em>으로 하안과 정시의 명사들이 한꺼번에 사라지자, 청담의 무대는 <em>죽림(竹林)</em>으로 옮겨졌다. <em>혜강(嵇康)</em>·<em>완적(阮籍)</em>을 영수로 한 <em>죽림칠현</em>이 <em>명교(名敎)</em>와 <em>자연(自然)</em>의 대립을 청담의 중심 명제로 끌어올렸다. 정시의 청담이 우주의 본체를 따졌다면, 죽림의 청담은 인간의 자유를 따졌다. 청담의 무게중심이 본체론에서 인생론으로 옮겨 간 것이다.\n\n서진(西晉)에 들어 청담은 <em>풍속화</em>되었다. <em>왕연(王衍)</em>이 그 전형이다. 그는 옥주미를 들고 명리를 가르는 일에만 마음을 두고 정사를 돌보지 않았다. <em>청담이 나라를 망쳤다(淸談誤國)</em>는 후대의 비판이 이 무렵의 풍속에서 나왔다. 청담이 사상의 자리에서 사교의 자리로 가벼워진 것이다.\n\n동진(東晉)에 와서 청담은 다시 깊어졌다. <em>왕도(王導)</em>가 강을 건너온 직후 <em>성인유정무정(聖人有情無情)</em>을 명제로 삼아 한 자리를 이끈 일이 그 시작이다. <em>은호</em>가 한낮의 청담을 이끌었고, <em>손작(孫綽)</em>·<em>허순(許詢)</em>·<em>왕희지(王羲之)</em>·<em>사안(謝安)</em>이 <em>난정(蘭亭)</em>과 <em>동산(東山)</em>의 자리에서 청담을 이었다. 특히 <em>지도림(支道林)</em>이 인도에서 들어온 <em>반야학(般若學)</em>을 노장의 옷을 입혀 청담의 자리에 끌어들이면서, 청담은 <em>격의불교(格義佛敎)</em>의 통로가 되었다. <em>소요유(逍遙遊)</em>를 두고 지도림이 곽상(郭象)의 옛 해석을 뒤집어 새 해석을 내놓자 일좌가 모두 탄복했다는 일화가 〈문학〉편의 백미다.\n\n청담의 자리에는 그 자리만의 예법이 있었다. 옷매무새, 옥주미를 드는 손의 자태, 말의 빠르기, 침묵의 길이까지가 명사의 식견을 가르는 한 자리였다. <em>왕몽(王濛)</em>과 <em>유담(劉惔)</em>이 한 자리를 마치고 나오며 <em>오늘의 자리는 한 글자도 헛되지 않았다</em> 평했다 한다. 청담은 말의 경기였으나 동시에 인격 전체의 경기였다.\n\n『세설신어』의 〈문학〉편은 사실상 청담의 기록집이다. 〈언어〉·〈품조〉·〈상예〉·〈배조〉편에도 청담의 한 장면이 곳곳에 박혀 있다. 청담을 모르면 위진 명사의 하루가 보이지 않고, 위진의 사상사가 한 줄도 읽히지 않는다. 청담은 곧 위진의 호흡이었다.", "storyCount": 0}, {"id": "thought.名敎와 自然", "type": "thought", "han": "名敎와 自然", "ko": "", "sub": "명교와 자연", "title": "", "short": "유가의 <em>예법(名敎)</em>과 노장의 <em>자연</em>을 어떻게 조화시킬 것인가의 물음. 위진 사상의 한가운데에 자리한 대립이다. 죽림칠현 가운데 혜강·완적은 명교를 비판하고 자연을 택했고, 산도·왕융은 출사해 명교를 살았다. <em>명교가 곧 자연</em>이라는 절충도 후일 등장한다.", "long": "名敎와 自然의 대립은 위진 사상의 한가운데에 자리한 물음이다. <em>명교(名敎)</em>란 이름(名)으로 가르침(敎)을 세우는 일, 곧 군신·부자·부부의 위계와 그것을 떠받치는 예법(禮法)의 체계를 가리킨다. <em>자연(自然)</em>은 그 반대편에서 스스로 그러함, 곧 인위의 그물에 걸리지 않은 본래의 결을 가리킨다. 한쪽은 <em>유가</em>의 자리이고, 한쪽은 <em>노장</em>의 자리다. 위진 사대부가 이 둘 사이에서 어떻게 자기를 세우느냐가 곧 그 사람의 사상이며 인격이었다.\n\n물음의 뿌리는 한말(漢末)에 있다. 한대 사회를 떠받치던 <em>예교(禮敎)</em>가 후한 말의 <em>당고의 화</em>와 황건의 난을 거치며 그 권위를 잃었다. 명교의 이름 아래 권문(權門)이 사사로움을 가렸고, 효(孝)의 이름 아래 위선이 자랐다. <em>명실(名實)이 어긋난 시대</em>라는 자각이 사대부 사이에 깊었다. <em>현학(玄學)</em>이 <em>삼현</em>을 다시 든 것은 이 명교의 위선을 <em>자연</em>으로 씻어 내려는 시도였다.\n\n정시(正始) 연간의 <em>하안</em>과 <em>왕필</em>은 이 둘을 조심스럽게 엮으려 했다. 왕필은 <em>명교는 자연에서 난다(名敎本於自然)</em>고 보았다. 자연이 본(本)이고 명교가 말(末)이라는 구도다. 그러므로 예법을 부정하지는 않되, 그 뿌리에 자연을 두어 예법의 형식주의를 풀어 내려 했다. 이것이 위진 玄學의 첫 종합이다.\n\n대립이 가장 첨예해진 것은 <em>죽림칠현</em>의 시대다. <em>혜강(嵇康)</em>은 「석사론(釋私論)」과 「난자연호학론」에서 <em>명교를 넘어서 자연에 맡긴다(越名敎而任自然)</em>고 외쳤다. 명교 자체가 인간의 본래성을 옥죄는 그물이라는 격렬한 부정이다. <em>완적</em>은 그보다 우회적이었으나, 어머니 상중에 술을 마시고 고기를 먹어 <em>예법파</em>의 <em>하증(何曾)</em>에게 탄핵당한 일이 곧 그의 자리를 드러낸다. 다른 한편 같은 <em>죽림</em>의 <em>산도</em>와 <em>왕융</em>은 출사해 명교의 자리에 섰다. 한 무리 안에서도 <em>명교</em>와 <em>자연</em>은 이렇게 갈라졌다. 혜강이 끝내 <em>사마소</em>에게 죽임을 당한 것도, 그가 자연 쪽으로 너무 멀리 갔기 때문이다.\n\n서진(西晉)에 들어 <em>향수</em>와 <em>곽상</em>의 『장자』 주가 새 종합을 내놓았다. 곽상은 <em>명교가 곧 자연이다(名敎卽自然)</em>라 했다. 군신·부자의 자리도 그 자체가 <em>스스로 그러한 것</em>이며, 성인(聖人)은 <em>조정의 한가운데 있으면서도 산림에 있는 것과 다르지 않다</em>. 출사와 은일이, 예법과 소요가 한자리에서 만난다. 죽림의 격렬한 부정을 거둬들이고 사대부가 출사하면서도 자연을 잃지 않을 한 길을 연 셈이다. 이 종합이 <em>서진 명사</em>의 사상적 안식처가 되었다.\n\n동진(東晉)에 와서 이 종합은 곧 명사들의 삶 그 자체가 되었다. <em>왕도</em>가 재상 자리에 앉아 청담을 즐기고, <em>사안</em>이 동산에 은거하다 출사해 비수전을 지휘하고, <em>왕희지</em>가 회계의 산수에서 난정의 모임을 연 자리가 모두 <em>명교 속의 자연</em>이었다. <em>지도림</em>은 여기에 <em>반야</em>를 더해 자연을 <em>공(空)</em>으로 다시 풀었다.\n\n『세설신어』의 〈덕행〉·〈방정〉·〈임탄〉·〈간오〉·〈서일〉편은 곧 이 물음의 다채로운 답안지다. 한 사람이 어디까지 명교를 지키고 어디부터 자연을 따랐는가 — 위진 명사의 인격은 그 한 자리에서 갈렸다.", "storyCount": 0}, {"id": "thought.竹林七賢", "type": "thought", "han": "竹林七賢", "ko": "", "sub": "죽림칠현", "title": "", "short": "고평릉의 정변(249) 이후 정치에서 벗어나 산양의 죽림에 모인 일곱 명사. <em>혜강</em>·<em>완적</em>·<em>산도</em>·<em>왕융</em>·<em>유령</em>·<em>향수</em>·<em>완함</em>. 술과 거문고와 노장을 즐겼다. 후일 산도·왕융은 결국 출사하고, 혜강은 사마씨에게 죽는다. 명교-자연 대립의 한 결정체.", "long": "竹林七賢은 위(魏) 정시(正始) 말에서 경원(景元) 연간(약 250~263)에 걸쳐 <em>산양(山陽)</em>의 죽림에 모여 술과 거문고와 <em>노장(老莊)</em>을 즐긴 일곱 명사다. <em>혜강(嵇康)</em>·<em>완적(阮籍)</em>·<em>산도(山濤)</em>·<em>왕융(王戎)</em>·<em>유령(劉伶)</em>·<em>향수(向秀)</em>·<em>완함(阮咸)</em> 일곱이다. 일곱이 늘 같은 자리에 있었던 것은 아니지만, 그 한 시기 한 산양의 한 죽림이 곧 <em>현학(玄學)</em>의 두 번째 정점이 되었다.\n\n배경에는 <em>고평릉의 정변(高平陵之變)</em>이 있다. 249년 <em>사마의</em>가 <em>조상(曹爽)</em> 일파를 일거에 쓸어버리면서, <em>하안(何晏)</em>과 정시 명사들이 함께 사라졌다. 위(魏)의 황실은 형식만 남고 실권은 <em>사마씨</em>에게 넘어갔다. 이로써 <em>경학</em>도 <em>정시 현학</em>도 답을 줄 수 없는 자리가 열렸다. 출사하면 사마씨의 찬위에 협력하는 셈이 되고, 항거하면 목숨을 잃는다. 이 막다른 자리에서 일곱 사람은 <em>죽림</em>으로 들어갔다.\n\n영수는 <em>혜강</em>과 <em>완적</em>이다. 혜강은 조위(曹魏) 황실의 인척이어서 사마씨에게 굽힐 자리가 아니었다. 그가 <em>명교(名敎)에 갇히지 않고 자연(自然)을 따른다(越名敎而任自然)</em> 한 명제는 죽림의 사상적 기치였다. <em>명교</em>란 곧 유가적 예법 — 군신·부자·부부의 자리 — 인데, 그것이 사마씨의 찬위를 미화하는 도구로 동원되던 시대였다. 자연을 따른다 함은 그 도구를 거부한다는 정치적 선언이기도 했다. 완적은 <em>영회시(詠懷詩)</em> 팔십 수에 그 답답함을 풀어 놓았고, 술에 잠겨 청안(靑眼)과 백안(白眼)으로 사람을 가렸다. 자기 어머니의 상중에도 술을 마셨다는 일화가 〈임탄〉편에 전한다.\n\n<em>유령</em>은 술의 사람이다. 늘 수레에 한 동이 술을 싣고, 종에게 삽을 메고 따르게 하며 <em>내가 죽거든 그 자리에 묻으라</em> 했다 한다. 「酒德頌」 한 편이 그의 사상이다. <em>완함</em>은 완적의 조카로 거문고와 비파의 사람이다. <em>향수</em>는 학문의 사람으로 『장자』 주를 지었는데, 후에 <em>곽상(郭象)</em>이 그것을 이어 완성한 것이 위진 현학의 한 정점이 된다. <em>산도</em>는 일곱 중 맏이 격이고, <em>왕융</em>은 막내로 어렸을 적부터 영민함이 일컬어졌다.\n\n죽림의 자리는 <em>청담(淸談)</em>의 자리이자 <em>술</em>의 자리, <em>거문고</em>의 자리, <em>기행(奇行)</em>의 자리였다. 그러나 그 기행은 단순한 방탕이 아니다. 사마씨의 명교에 협력하지 않겠다는 한 자리의 의사 표시였다. 유령이 옷을 벗고 집 안에 앉아 있다가 손님에게 <em>천지가 내 집이고 집이 내 옷인데 그대가 어찌 내 바지 속에 들어왔는가</em> 했다는 일화가 그 한 결을 보여 준다.\n\n그러나 죽림은 오래가지 않았다. <em>산도</em>가 먼저 사마씨에게 출사했다. 그가 자기 자리를 <em>혜강</em>에게 물려주려 하자, 혜강은 <em>산거원에게 절교를 알리는 글(與山巨源絕交書)</em>을 보내 그 길을 끊었다. <em>나는 일곱 가지를 견디지 못하고 두 가지를 할 수 없다</em> 적은 그 글이 곧 죽림 절교의 표지다. 그러고 얼마 안 되어 혜강은 <em>여안(呂安) 사건</em>에 얽혀 사마소(司馬昭)의 손에 죽었다(263). 형장에서 거문고로 〈廣陵散〉을 한 번 타고 <em>광릉산이 이제 끊긴다</em> 한 그 자리가 죽림의 끝이다.\n\n혜강이 죽자 죽림은 흩어졌다. <em>완적</em>은 그 이듬해 죽었고, <em>향수</em>는 끝내 출사해 낙양으로 갔다. 향수가 옛 죽림의 자리를 지나며 이웃집의 피리 소리를 듣고 지은 「思舊賦」가 그 시대 회한의 한 절창이다. <em>산도</em>는 사마씨의 중신이 되었고, <em>왕융</em>은 서진(西晉)의 <em>삼공</em>에까지 올라 인색한 부자로 비웃음을 샀다. 일곱 중 죽림의 자리에 끝까지 머문 자는 <em>유령</em> 하나뿐인 셈이다.\n\n竹林七賢의 의의는 그 <em>불완전한 결말</em>에 있다. 명교를 거부하고 자연을 따르려 했으나, 절반은 죽고 절반은 결국 명교의 자리로 돌아갔다. 그 분열이 곧 <em>명교와 자연</em>의 긴장이 한 시대의 인간 안에서 어떻게 찢어지는가를 그대로 보여 준다. 후대의 <em>왕연</em>·<em>왕도</em>·<em>사안</em>은 모두 이 자리를 한 번 거쳐서야 자기 길을 찾았다. 『세설신어』에서 일곱은 〈덕행〉·〈언어〉·〈문학〉·〈방정〉·〈아량〉·〈임탄〉·〈간오〉·〈서일〉·〈용지〉편 곳곳에 흩어져 있다. 그 흩어진 일화들을 한 자리에 모으면 곧 죽림의 한 한낮이 재구성된다.", "storyCount": 0}, {"id": "thought.格義佛敎", "type": "thought", "han": "格義佛敎", "ko": "", "sub": "격의불교", "title": "", "short": "동진 시기 인도에서 들어온 불교가 노장의 개념으로 풀려 사대부에게 전해진 흐름. <em>공(空)</em>은 <em>무(無)</em>로, <em>반야(般若)</em>는 <em>명리</em>로, <em>진여(眞如)</em>는 <em>도(道)</em>로 풀어 가르쳤다. <em>지도림</em>(支遁)이 그 한가운데. 후일 더 정밀한 불교 해석으로 발전하지만, 첫 만남의 흥분은 이 시대가 가장 컸다.", "long": "格義佛敎는 동진 시기에 인도에서 들어온 불교가 <em>노장(老莊)</em>의 개념을 빌려 사대부에게 풀려 전해진 한 흐름이다. <em>격(格)</em>은 <em>맞춘다</em>는 뜻이고 <em>의(義)</em>는 <em>뜻</em>이니, 곧 <em>낯선 뜻을 익은 개념에 맞춰 푼다</em>는 말이다. 인도 불전의 한 개념을 그에 가장 가까운 <em>현학(玄學)</em>의 한 개념에 짝지어 가르치는 방식이다.\n\n배경. 불교가 한대(漢代)에 이미 중국에 들어왔지만, 후한·삼국까지는 주로 <em>역경(譯經)</em>과 <em>민간의 신앙</em>에 머물렀다. 사대부의 사상의 자리에 불교가 정식으로 오른 것은 동진(東晉)에 들어와서다. 마침 <em>현학</em>이 <em>체용(體用)</em>·<em>언의(言意)</em>·<em>유무(有無)</em>의 개념틀을 완성해 둔 참이었으니, 인도에서 새로 들어온 <em>반야학(般若學)</em>이 그 틀에 절묘하게 맞아 들어갔다. <em>공(空)</em>은 <em>무(無)</em>로, <em>반야(般若)</em>는 <em>명리(名理)</em>로, <em>진여(眞如)</em>는 <em>도(道)</em>로, <em>열반(涅槃)</em>은 <em>무위(無爲)</em>로 풀렸다.\n\n짝지음의 시초는 <em>축법아(竺法雅)</em>에게 돌린다. <em>축법아</em>가 제자들에게 불경을 가르치다, 외전(外典) — 곧 노장과 주역 — 의 개념을 가져와 불경의 한 뜻에 짝지어 풀이한 것이 격의의 첫 자리였다 전한다. 이 방식이 곧 한 시대의 학풍이 되었다.\n\n정점은 <em>지도림(支道林)</em>이다. 본명은 <em>지둔(支遁)</em>이고 자가 도림이다. 그는 <em>옥주미</em>를 들고 청담의 자리에 서서 <em>반야</em>를 <em>현학</em>의 옷으로 풀었다. 특히 『장자』 「소요유」를 새로 주해해 <em>지인의 소요</em>를 <em>물(物)에 매이지 않는 자의 마음</em>으로 해석한 자리는, 본디 장자의 풀이로 일컬어졌으나 그 바닥에는 반야의 <em>공</em>이 깔려 있었다. <em>왕희지</em>가 회계에서 그를 처음 만나 <em>지도림이 「소요유」를 새로 풀었다</em>는 말을 듣고 종일 그와 담론했다는 일화가 〈문학〉편에 전한다. <em>사안</em>·<em>손작</em>·<em>허순</em>도 모두 그와 어울려 노장과 반야를 한 자리에서 논했다.\n\n격의의 풍속화. <em>공</em>에 대해서도 여러 갈래의 해석이 솟아났다. <em>본무종(本無宗)</em>은 <em>공</em>을 <em>근본은 無다</em>로 풀고, <em>즉색종(卽色宗)</em>은 <em>색(色)이 곧 공</em>임을 풀고, <em>심무종(心無宗)</em>은 <em>마음에서 物을 비운다</em>고 풀었다. 이른바 <em>육가칠종(六家七宗)</em>이 이 시기에 갈마들며 다투었다. 모두 <em>현학</em>의 개념틀을 매개로 <em>반야</em>를 푸는 갈래들이다.\n\n그러나 한계도 분명했다. <em>공</em>은 <em>無</em>가 아니다. <em>공</em>은 <em>유와 무를 함께 끊는 자리</em>이지, <em>無를 본체로 세우는 자리</em>가 아니다. 노장의 <em>무</em>에 <em>공</em>을 가두면, <em>반야</em>의 진면목이 가려진다. 이 한계를 정면으로 뚫은 이가 곧 후진(後秦)의 <em>구마라집(鳩摩羅什)</em>과 그의 제자 <em>승조(僧肇)</em>다. 승조의 「肇論」이 격의를 넘어 <em>반야</em>를 그 자체로 풀어 보인 한 정점이다. 격의는 이로써 한 단계 닫혔다.\n\n그럼에도 동진의 격의는 <em>첫 만남</em>의 흥분을 가장 깊이 간직한 자리였다. 한 사상이 다른 사상의 옷을 빌려 입을 때만 가능한 한 종류의 빛이 그때 있었다. 사대부의 청담과 인도의 반야가 한 자리에서 만났고, 그 만남의 풍경이 곧 동진 <em>명사</em> 문화의 한 깊이다. 『세설신어』 〈문학〉·〈언어〉·〈상예〉·〈품조〉편에 <em>지도림</em>이 거듭 등장하는 까닭이 여기에 있다.", "storyCount": 0}, {"id": "thought.風流와 任誕", "type": "thought", "han": "風流와 任誕", "ko": "", "sub": "풍류와 임탄", "title": "", "short": "예법에 매이지 않고 자기의 정에 충실한 위진 명사의 분방한 행실. 풍랑 속에서도 태연한 사안, 알몸으로 누운 유령, 동상에서 배를 드러낸 왕희지, 모친 상중에 술을 마신 완적 ― 이런 모습들이 모두 한 갈래. 〈임탄(任誕)〉편이 그 정수를 모은다. <em>명교-자연</em>의 자연 쪽 표현.", "long": "風流와 任誕은 위진 명사 문화의 두 얼굴이다. 풍류(風流)는 자기 안의 격조와 흥취를 자연스레 흘려보내는 자리, 임탄(任誕)은 그 흘려보냄이 예법의 둑을 넘어 거리낌 없이 쏟아지는 자리다. 한 줄기에서 갈라진 두 가닥이며, 그 뿌리에는 <em>현학(玄學)</em>의 <em>명교(名敎)와 자연(自然)</em>의 한 자리가 있다. <em>명교에 갇히지 않고 자연을 따른다</em>는 <em>혜강(嵇康)</em>의 명제가 그 사상적 척추다.\n\n배경은 정시(正始)에서 죽림(竹林)으로 이어지는 시대의 굴절이다. <em>고평릉의 정변</em>으로 <em>하안</em>과 정시 명사들이 사라진 뒤, <em>사마씨</em>의 정권이 <em>명교</em>를 앞세워 사대부를 옭아매자, 명교의 빈 자리를 견딜 수 없었던 이들이 <em>자연</em>으로 달아났다. 그 달아남이 술과 알몸과 무례와 통곡으로 표현된 것이 곧 임탄의 풍속이다. <em>죽림칠현</em>이 그 첫 자리다.\n\n전형의 인물들이 있다. <em>완적(阮籍)</em>은 어머니의 상중에 술과 고기를 끊지 않고 손님을 맞았다. 그러다 손님이 돌아간 뒤 피를 몇 되나 토했다. 겉의 무례가 속의 통곡보다 얕다는 것을 모르는 사람만이 그를 무도하다 했다. <em>유령(劉伶)</em>은 집 안에서 알몸으로 누워 있다 손님이 나무라자 <em>나는 천지를 집으로 삼고 집을 옷으로 삼는데, 그대는 어찌 내 옷 속에 들어왔는가</em> 답했다. <em>완함(阮咸)</em>은 한여름에 베잠방이를 장대에 걸고 <em>내가 풍속을 좇아 본다</em> 웃었다. <em>왕희지(王羲之)</em>가 동상에 누워 배를 드러내 보인 일도 한 자리, <em>치감(郗鑒)</em>의 사윗감 고르기에 그 모습이 도리어 안목에 들었다 한다.\n\n동진(東晉)에 오면 임탄은 한층 부드러워지면서 <em>풍류</em>와 가까워진다. <em>왕휘지(王徽之)</em>가 눈 내린 밤 <em>대규(戴逵)</em>가 그리워 밤새 배를 저어 갔다가 그 집 문 앞에서 돌아오며 <em>흥이 다해 돌아오니, 어찌 꼭 만나야 하랴</em> 한 일이 그 정점이다. 만남이 목적이 아니라 흥이 목적이다. <em>환이(桓伊)</em>가 길에서 <em>왕휘지</em>를 만나 수레에서 내려 호가(胡笳) 세 곡을 불어 주고 말 한마디 없이 갈라진 자리도 같은 결이다.\n\n풍류와 임탄이 같은 뿌리에서 갈라진다는 것은 <em>사안(謝安)</em>의 한 자리에서 가장 잘 보인다. 풍랑 속에서도 태연히 시를 읊은 사안의 <em>아량</em>은 임탄의 거침을 안으로 거둔 풍류의 모습이며, <em>비수</em>의 첩보를 받고도 바둑을 계속 둔 그의 무심함도 그러하다. 임탄이 밖으로 터지는 자연이라면, 풍류는 안으로 가라앉은 자연이다.\n\n그러나 임탄에는 위험이 있었다. 자연을 빙자한 방종, 명교를 멸시하는 사교의 의례 ― 서진의 <em>왕연</em>류가 그 한 예다. 청담과 임탄이 <em>팔왕의 난</em>과 <em>영가의 난</em>의 사상적 무력으로 비판받은 까닭이 여기에 있다. 동진의 식자들도 그것을 알고 있었다. <em>왕도(王導)</em>가 임탄의 풍속을 한편으로 너그러이 보면서도 정사의 책임을 놓지 않은 것이 그 균형이다.\n\n『세설신어』 〈임탄(任誕)〉편이 이 풍속의 정수를 모은다. 〈덕행〉이 명교의 한 자리라면 〈임탄〉은 자연의 한 자리이며, 그 사이에 〈아량〉·〈간오(簡傲)〉·〈서일(棲逸)〉이 놓인다. 위진의 인간형은 이 두 자리 사이에서 흔들리며 자기를 빚었다.", "storyCount": 0}, {"id": "event.黨錮의 禍", "type": "event", "han": "黨錮의 禍", "ko": "", "sub": "당고의 화 (166, 169)", "title": "", "short": "후한 후기 환관과 외척의 전횡에 맞서 일어선 청류 사대부들을 환관들이 <em>당인</em>으로 몰아 종신 금고한 두 차례의 사건. 이원례(李膺)·진중거(陳蕃) 등 수백 명이 정치 밖으로 밀려났다. 역설적으로 이 압박 속에서 사대부들이 서로를 <em>품평</em>하는 풍속이 생겨, <em>명사</em>라는 새 인간형이 태어났다.", "long": "黨錮의 禍는 후한(後漢) 후기, <em>환관(宦官)</em>의 전횡에 맞서 일어선 <em>청류(淸流)</em> 사대부들이 <em>당인(黨人)</em>으로 몰려 종신 금고(禁錮)에 처해진 두 차례의 사건이다. 1차는 환제(桓帝) 연희(延熹) 9년(166), 2차는 영제(靈帝) 건녕(建寧) 2년(169)에 일어났다. 후한의 정치적 파산을 알리는 종소리이자, 동시에 <em>명사(名士)</em>라는 새 인간형이 태어난 자리이기도 하다.\n\n배경. 후한 중기 이후 어린 황제가 잇따라 즉위하면서, 정사는 <em>외척(外戚)</em>과 <em>환관</em>의 손에 떨어졌다. 외척이 정권을 잡으면 황제가 자라 환관의 힘을 빌려 외척을 치고, 그러면 다시 환관이 권력을 쥐는 식이었다. 두 세력의 갈마듦 속에서 <em>경학(經學)</em>으로 자기를 닦은 사대부들은 점점 정치 밖으로 밀려났다. 이들이 서로를 <em>청류</em>라 부르고, 환관의 무리를 <em>탁류(濁流)</em>라 일컬으며 도덕적으로 자기를 구분했다.\n\n청류의 영수는 <em>이원례(李膺)</em>·<em>진중거(陳蕃)</em>·<em>두무(竇武)</em>였다. 특히 사례교위(司隷校尉) <em>이원례</em>는 환관의 친속이라도 법을 어기면 가차 없이 처단해 그 위명이 천하를 흔들었다. 태학(太學)의 삼만 학생이 그를 우러러 <em>天下楷模李元禮</em>라 일컬었다. 그의 문에 한 번 오르는 것을 <em>용문(龍門)에 오른다</em>고 했다.\n\n1차(166). 환관이 이원례를 <em>당인을 짜서 조정을 비방한다</em>고 무고했다. 환제가 격노해 이원례 등 200여 인을 잡아 가두었다. 진중거가 직간(直諫)해 풀려났으나, 풀려난 자들은 모두 <em>종신 금고</em> — 곧 평생 벼슬길에서 추방되는 — 처분을 받았다. 정치에서 청류가 한꺼번에 사라진 것이다.\n\n2차(169)는 훨씬 참혹했다. 환제가 죽고 영제가 즉위하자 외척 <em>두무</em>와 <em>진중거</em>가 환관을 일소하려 했으나, 도리어 환관의 역습으로 두 사람이 죽임을 당했다. 그 뒤를 이은 환관의 보복으로 <em>이원례</em>·<em>두밀(杜密)</em>·<em>범방(范滂)</em> 등 100여 인이 옥사하고, 연좌된 사대부 600~700인이 또 금고되었다. <em>범방</em>이 어머니에게 절하고 형장으로 가며 <em>효도와 충의를 다 이루지 못함이 한이옵니다</em> 하니 그 어머니가 <em>이름을 얻고 또 목숨을 얻기를 어찌 함께 바라겠느냐</em> 답한 일이 천하를 울렸다 한다.\n\n황건의 난(184)이 일어나자 조정은 비로소 당고를 풀었다. 그러나 그 사이 한 세대의 사대부가 정치에서 끊겼고, 후한 황실은 회생할 힘을 잃었다. 그 공백 위에 <em>동탁(董卓)</em>이 들어오고, 군웅이 갈라서며, 곧 <em>삼국(三國)</em>의 시대로 넘어간다.\n\n역설은 다른 데에 있다. 정치 밖으로 밀려난 청류들은 향리에서 서로를 <em>품평(品評)</em>하기 시작했다. <em>여남(汝南)</em>의 <em>허소(許劭)</em>가 매달 초하루에 인물을 한 줄로 평한 <em>月旦評</em>이 그 한 정점이다. 누가 누구를 <em>팔준(八俊)</em>·<em>팔고(八顧)</em>·<em>팔급(八及)</em>에 든다 일컬으니, 이 <em>호(號)</em>가 곧 그 사람의 됨됨이를 천하에 새겼다. <em>조조</em>가 청년 시절 허소에게서 <em>치세의 능신, 난세의 간웅</em>이라는 평을 얻은 일이 유명하다.\n\n이 품평의 풍속이 곧 <em>명사</em>라는 새 인간형의 모태다. 벼슬의 높낮이가 아니라 <em>식견</em>과 <em>풍격</em>과 <em>언행</em>으로 사람을 가르는 안목 — 이것이 위진(魏晉)에 와서 <em>청담</em>과 <em>현학</em>의 자리로 자라난다. 『세설신어』 〈덕행〉·〈품조〉편의 첫머리에 후한 말의 인물들이 줄지어 등장하는 까닭이 여기에 있다. 黨錮의 禍는 한 왕조의 종소리였지만, 동시에 한 새 시대의 첫 종소리이기도 했다.", "storyCount": 0}, {"id": "event.高平陵之變", "type": "event", "han": "高平陵之變", "ko": "", "sub": "고평릉의 정변 (249)", "title": "", "short": "위 황제 조방이 고평릉으로 행차한 사이, 병들었다 칭한 <em>사마의</em>가 일으킨 쿠데타. 보정 대신 <em>조상</em>과 그 측근 <em>하안</em>·<em>하후현</em>·<em>이풍</em>·<em>등양</em>·<em>정밀</em>이 한꺼번에 처형되었다. 정시 명사 문화가 단숨에 꺾이고, 청담은 <em>위험한 것</em>이 되었다. 살아남은 명사들이 죽림으로 모여드는 계기.", "long": "高平陵之變은 위 조방(齊王芳) 정시(正始) 10년(249) 정월에 일어났다. 위 황실은 사실상 명운이 거의 다해 가던 때다. 조비(文帝)와 조예(明帝)가 잇따라 일찍 죽고 어린 조방이 즉위하자, 두 명의 보정 대신이 정사를 잡았다. 종친 <em>조상(曹爽)</em>과 사마씨의 노장 <em>사마의(司馬懿)</em>다.\n\n조상은 처음에는 사마의를 받들어 <em>태부(太傅)</em>로 추숭하고 한 발 물러나게 했다. 그러나 점차 자기 무리를 등용하면서 사마의를 권력에서 배제해 갔다. 조상의 핵심 측근이 곧 정시 명사들이다 — <em>하안</em>·<em>하후현</em>·<em>이풍</em>·<em>등양</em>·<em>정밀</em>. 모두 청담의 영수이자 신진 사상가들이다. 그들이 조상의 정권을 사상적으로 떠받치며 새 정사를 펼쳤다.\n\n사마의는 병들었다 칭하고 물러나 있었다. 시중을 든 자가 보기에도 정말로 늙고 무력해 보였다. 그러나 그는 이미 자기 두 아들 <em>사마사(司馬師)</em>·<em>사마소(司馬昭)</em>에게 사병 삼천을 비밀리에 길러 두게 했다. 결정적 순간을 기다리고 있었던 것이다.\n\n249년 정월, 어린 황제 조방이 종묘에 제사 지내러 낙양 남쪽 90리 밖의 <em>고평릉(高平陵)</em>으로 행차했다. 조상과 그의 형제들 — 조희(曹羲)·조훈(曹訓)·조언(曹彦) — 도 모두 황제를 따라 떠났다. 도성에 권력 핵심이 비어 있는 자리에서, 사마의가 거사를 일으켰다. 사병 삼천이 단숨에 낙양의 무기고와 궁성을 장악했다. <em>영녕태후(永寧太后)</em>의 이름으로 조상의 죄를 묻고 그의 직위를 박탈한다는 조서를 내렸다.\n\n조상은 황제를 모시고 고평릉에서 돌아오는 길에 이 소식을 들었다. 막부의 환범(桓範)이 황제를 모시고 허창(許昌)으로 가서 격문을 보내 사방의 군을 모으자고 권했다. 그러면 사마의의 도성 장악은 무효가 되고 천하의 싸움으로 갈 수 있었다. 그러나 조상은 결단을 내리지 못했다. 사마의가 보낸 사신이 <em>직위는 박탈하되 부귀는 보전하리라</em> 약속하니, 조상은 이를 믿고 도성으로 돌아갔다. 환범은 <em>너희 형제는 송아지에 불과하다</em>며 통탄했다 한다.\n\n도성에 돌아간 조상은 사마의의 조처를 따라 자기 집에 연금되었다. 며칠 뒤, 사마의는 약속을 뒤집고 조상과 그 형제, 그리고 측근들을 모반죄로 기소했다. <em>하안</em>·<em>하후현</em>·<em>이풍</em>·<em>등양</em>·<em>정밀</em>·<em>환범</em> 등이 모두 종족과 함께 처형되었다. 죽은 자가 수백 명이었다. 정시 명사 문화의 한 세대가 한꺼번에 사라진 것이다.\n\n이 정변의 의의는 다층적이다. 첫째, 위 정권의 실권이 사마씨에게 넘어간 결정적 순간이다. 이로부터 16년 뒤(265) 사마의의 손자 <em>사마염</em>이 위에서 받아 진(西晉)을 세우는 그 첫걸음이 곧 이 정변이다. 둘째, 위진 사상사의 한 시대가 잘렸다. <em>현학</em>을 일으킨 하안과 <em>명리</em>의 자리를 세운 정시 명사들이 함께 죽으면서, 청담은 갑자기 <em>위험한 것</em>이 되었다. 셋째, 살아남은 명사들이 두 길로 갈렸다. 한 길은 사마씨에게 고개를 숙이고 출사하는 길(<em>혜소</em>의 부친 <em>혜강</em>은 거부했으나 후일 산도가 택한 길), 다른 한 길은 정치에서 멀리 벗어나 은거하는 길이다(<em>죽림칠현</em>의 출발). 셋째의 갈래가 곧 〈임탄〉편이 그리는 위진 풍속의 정신적 뿌리가 된다.\n\n『세설신어』에서는 직접 이 정변을 다룬 편명은 없지만, 그 그림자가 죽림 시기의 모든 일화에 깔려 있다. 혜강이 형장에서 광릉산을 탄 일, 완적이 청안과 백안으로 사람을 가린 일, 산도가 이부상서로서 인재를 천거한 일 — 모두 이 정변 이후의 자리에서 일어난 일이다.", "storyCount": 0}, {"id": "event.八王의 亂", "type": "event", "han": "八王의 亂", "ko": "", "sub": "팔왕의 난 (291~306)", "title": "", "short": "서진 혜제 시기, 황후 <em>가씨</em>의 농단에서 시작된 사마씨 종친 여덟 왕의 16년 내전. 여남왕 량·초왕 위·조왕 윤·제왕 경·장사왕 예·성도왕 영·하간왕 옹·동해왕 월이 차례로 일어났다 차례로 죽었다. 그 결과 황실은 텅 비고 군대는 흩어졌으며, 변방의 이민족이 차츰차츰 들어왔다. <em>영가의 난</em>의 직접적 배경.", "long": "八王의 亂은 서진(西晉)의 황실이 스스로를 갉아먹은 16년의 내전이다. 291년 황후 <em>가남풍(賈南風)</em>의 정변에서 비롯되어 306년 <em>동해왕 사마월(司馬越)</em>이 마지막 한 사람으로 남기까지, <em>사마씨</em> 종친의 여덟 왕이 차례로 일어나 차례로 죽었다. 그 자리에 <em>서진</em>의 군대가 다 흩어졌고, 그 빈자리로 변방의 이민족이 천천히 들어왔다. <em>영가의 난</em>과 <em>의관남도(衣冠南渡)</em>의 직접적 배경이 곧 이 난이다.\n\n발단은 황실 내부의 구조에 있었다. <em>무제(武帝) 사마염</em>은 위(魏)가 종실의 힘을 누른 탓에 <em>사마씨</em> 자신에게 빼앗긴 것을 거울 삼아, 종친들에게 봉지(封地)와 군대를 두텁게 주었다. 종친 왕들이 각자 도독(都督)으로 한 지역의 군권을 쥐었다. 그러나 그 뒤를 이은 <em>혜제(惠帝) 사마충</em>은 어리석기로 이름난 황제였다. <em>백성이 굶는다</em>는 보고에 <em>어찌하여 고기죽을 먹지 않느냐</em> 되물었다는 일화가 그의 자리를 보여 준다. 황제가 비어 있으니, 종친의 군권이 곧 빈 옥좌를 둘러싼 칼이 되었다.\n\n먼저 황후 <em>가남풍</em>이 외척 <em>양준(楊駿)</em>을 무너뜨리려 <em>여남왕 사마량</em>과 <em>초왕 사마위</em>를 도성으로 불러들였다(291). 양준이 죽자 가후는 다시 사마위를 시켜 사마량을 죽이고, 이어 사마위마저 <em>조서를 사칭했다</em> 하여 처형했다. 한 해 안에 두 왕이 사라졌다. 이후 가후가 8년간 조정을 농단하다 <em>태자 사마휼</em>을 폐하여 죽이자, 이를 명분으로 <em>조왕 사마윤(司馬倫)</em>이 일어나 가후를 죽이고 스스로 황제를 칭했다(301).\n\n조왕의 찬위가 곧 전면전의 신호였다. <em>제왕 사마경</em>·<em>성도왕 사마영</em>·<em>하간왕 사마옹</em>이 연합해 사마윤을 무너뜨렸다. 그러나 승리한 세 왕은 곧 서로를 향해 칼을 돌렸다. 사마경이 도성을 잡자 <em>장사왕 사마예</em>가 그를 죽이고, 다시 사마영과 사마옹이 연합해 사마예를 죽였다. 마지막으로 <em>동해왕 사마월</em>이 사마영과 사마옹마저 차례로 무너뜨렸다(306). 여덟 왕 가운데 일곱이 죽고, 끝까지 남은 한 사람이 곧 사마월이다. 그 사이 황제 <em>혜제</em>는 칼 잡힌 손에서 칼 잡힌 손으로 옮겨 다니다 306년에 독살된 것으로 전한다.\n\n손실은 황실의 인명에 그치지 않았다. 종친들이 사병(私兵)을 모자라게 여겨 변방의 <em>흉노</em>·<em>선비</em>·<em>갈</em> 부족을 용병으로 끌어들였다. <em>성도왕 사마영</em>이 <em>흉노</em> 좌현왕 <em>유연(劉淵)</em>을 휘하에 두었고, <em>왕준(王浚)</em>이 <em>선비</em>의 기병을 끌어들였다. 내전이 끝났을 때 중원의 정예는 흩어지고, 끌어들였던 이민족 수령들은 각자 자기 군대를 가진 채 중원의 텅 빈 자리를 들여다보게 되었다. 304년 <em>유연</em>이 이미 <em>한(漢)</em>을 일컬어 자립했으니, 팔왕의 난이 끝나기도 전에 다음 시대가 이미 시작된 셈이다.\n\n311년 <em>영가 5년</em>, <em>유연</em>의 아들 <em>유총(劉聰)</em>의 군이 낙양을 함락하고 <em>회제(懷帝)</em>를 사로잡았다(<em>영가의 난</em>). 316년 장안마저 떨어지며 서진은 끝났다. 살아남은 종실과 사대부가 강을 건너 <em>건강(建康)</em>에 <em>동진(東晉)</em>을 세웠다. 그 한 줄기 흐름의 첫 단추가 곧 팔왕의 난이다.\n\n『세설신어』는 이 16년을 정면으로 그리지 않는다. 그러나 그 시대를 살아낸 <em>왕연</em>·<em>악광</em>·<em>배해</em>·<em>위개</em>의 일화가 〈언어〉·〈상예〉·〈품조〉편에 흩어져 있고, <em>왕연이 석륵 앞에서 변명하다 죽은 자리</em>가 〈경저〉편에 전한다. 청담의 옥주미가 끝내 칼을 막지 못한 자리. 동진 명사들이 강을 건너 <em>신정(新亭)</em>에 모여 <em>풍경은 다르지 않으나 산하가 다르다</em> 울던 그 통한의 뿌리가 모두 이 난에 있다.", "storyCount": 0}, {"id": "event.永嘉의 亂", "type": "event", "han": "永嘉의 亂", "ko": "", "sub": "영가의 난 (311)", "title": "", "short": "흉노 출신의 <em>유총(劉聰)</em>이 낙양을 함락하고 회제(懷帝)를 잡아간 사건. 종묘는 불타고 사대부들은 흙비처럼 잡혀가거나 흩어졌다. 청담의 영수 <em>왕연</em>이 <em>내가 비록 헛된 말로 천하를 그르쳤으나, 이런 일에 이를 줄 알았겠는가</em> 탄식하며 죽은 것이 이때. 서진의 종말.", "long": "永嘉之亂은 서진 회제(懷帝) 영가 5년(311) 6월, 흉노 출신의 <em>유총(劉聰)</em>이 낙양을 함락하고 황제를 잡아간 사건이다. 그러나 그 한 사건은 16년에 걸친 <em>팔왕의 난</em>과 그 뒤를 이은 <em>오호(五胡)</em>의 봉기가 누적된 결과이며, 결과적으로 서진의 멸망과 <em>동진 건국</em>·<em>의관남도</em>·<em>오호십육국</em> 시대의 개막을 모두 하나로 묶는 거대한 분기점이 되었다.\n\n배경은 깊다. 진 무제(武帝)는 280년 천하를 통일했으나 후계 결정에서 어그러졌다. 어리석은 둘째 아들 <em>사마충(司馬衷, 후의 惠帝)</em>을 세웠고, 그의 황후 <em>가씨(賈氏)</em>가 농단을 부려 종친들과 충돌했다. 291년 가후가 시아버지의 사촌형 사마량을 죽이는 일에서 시작된 <em>팔왕의 난</em>이 16년에 걸쳐 황실을 갉아먹었다. 여덟 명의 사마씨 종친이 차례로 일어났다 차례로 죽었고, 종묘는 비고 군대는 흩어졌다.\n\n이 틈에 변방의 이민족이 들어왔다. <em>흉노</em> 출신의 <em>유연(劉淵)</em>은 304년 산서(山西)에서 <em>한(漢, 후일 前趙)</em>을 세웠다. 그는 자기를 한 황실의 후예라 칭하고 한의 정통을 잇는다는 명분을 세웠다(흉노 가운데 한 황실과 혼인 관계가 있어 <em>유</em>씨를 칭한 가문이었다). 308년에 그가 자칭 황제가 되고, 310년에 그가 죽자 그의 아들 <em>유총</em>이 위를 이었다.\n\n311년 4월, 유총이 군을 일으켜 낙양으로 향했다. 사마월(司馬越, 八王 중 마지막 권력자)이 이미 죽고, 도성을 지키던 군이 와해되었다. 6월, 유총의 군이 낙양을 함락했다. 회제가 사로잡혀 평양(平陽)으로 끌려갔다. 종묘는 불타고, 황태자와 비빈, 사대부 수만 명이 죽거나 잡혀갔다. 자료에 따라 다르나 약 <em>3만의 사대부와 백성이 학살되었다</em>고 한다. 낙양은 폐허가 되었다.\n\n이때 잡혀간 가운데 가장 유명한 한 사람이 <em>왕연</em>이다. <em>석륵(石勒)</em>이 그를 데리고 <em>천하가 어찌 이 지경에 이르렀는가</em> 묻자 왕연이 자기는 어려서부터 일에 관여한 적이 없다 답하고 도리어 석륵에게 <em>공이 천하를 다스리라</em> 권했다. 석륵이 노해 <em>이름이 사해에 떨치고 자리가 삼공에 이른 자가 어찌 일에 관여한 적이 없다 하느냐. 천하를 그르친 자가 곧 네가 아니냐</em> 꾸짖고, 그날 밤 군사들에게 담을 무너뜨려 그를 깔려 죽이게 했다. 청담의 영수가 그 청담의 무책임을 자기 죽음으로 증언한 자리다.\n\n서진은 형식상 회제의 조카 <em>민제(愍帝)</em>가 장안에서 잠시 이었다. 그러나 316년 그마저 한에 잡혀가니, 서진은 완전히 끝났다. 살아남은 사마씨 종친 가운데 서남쪽 강동에 자리 잡고 있던 <em>사마예(司馬睿)</em> — 그가 <em>왕도</em>의 보좌를 받고 있던 낭야왕이다 — 가 318년 건강(建康)에서 즉위해 <em>동진</em>을 열었다.\n\n이 과정에서 한 거대한 인구 이동이 일어났다. 북방의 사대부들이 가솔과 노복을 거느리고 강을 건너 강남으로 내려왔다. 이것이 <em>의관남도(衣冠南渡)</em>다. 짧게는 영가의 난 직후 몇 해, 길게는 그 후 수십 년에 걸쳐 수십만이 남도했다. 강좌(江左)의 정치 지형은 단숨에 바뀌었고, 동진의 사대부 사회는 이 이주민들의 사회였다.\n\n한편 북방에는 흉노·갈·선비·저·강 다섯 종족이 차례로 정권을 세웠다 무너뜨리며 100여 년의 <em>오호십육국</em> 시대가 이어진다. 그 가운데 가장 강성한 세력이 <em>부견</em>의 <em>전진</em>이며, 그가 동진을 침공한 것이 후일의 <em>비수대전</em>이다.\n\n『세설신어』에서 영가의 난은 〈언어〉·〈품조〉·〈규잠〉 등에서 직접 다뤄지며, 특히 의관남도의 사대부들이 <em>신정(新亭)</em>에서 <em>풍경은 옛과 다르지 않은데 산하는 다 바뀌었구나</em>라 탄식하니 <em>왕도</em>가 <em>마땅히 함께 힘을 다해 왕실을 도울 일이지 어찌 초나라 포로처럼 눈물만 흘리랴</em>라 다잡은 일화가 가장 유명하다.", "storyCount": 0}, {"id": "event.衣冠南渡", "type": "event", "han": "衣冠南渡", "ko": "", "sub": "의관남도", "title": "", "short": "영가의 난 전후, 북방 사대부들이 가솔과 노복을 거느리고 강을 건너 강남으로 내려온 인구 이동. <em>의관</em>은 곧 사대부를 일컫는 말. 짧게는 영가의 난 직후 몇 해, 길게는 그 후 수십 년에 걸쳐 수십만이 남도(南渡)했다. 동진 강좌 정권의 인구·문화적 기반이 되었다.", "long": "衣冠南渡는 <em>영가의 난(永嘉之亂)</em> 전후 북방의 사대부와 그 가솔이 일제히 강을 건너 강남으로 내려온 대규모 인구 이동이다. <em>衣冠</em>은 의관을 갖춰 입은 사람, 곧 사대부를 일컫는 말이다. 짧게는 영가의 난 직후 몇 해, 길게는 그 후 수십 년에 걸쳐 수십만의 사대부와 노복이 회수(淮水)와 장강(長江)을 차례로 건넜다. 이 한 이동이 곧 <em>동진(東晉)</em> 정권의 인구·문화적 기반이며, 위진남북조 후반 삼백 년의 남북 분열을 결정지은 사건이다.\n\n배경은 서진(西晉) 말의 파탄이다. <em>팔왕의 난</em>이 종실끼리의 살육으로 십육 년을 끌면서 중원의 군사력과 호구(戶口)가 무너졌다. 그 틈을 <em>흉노</em>·<em>갈</em>·<em>선비</em>·<em>저</em>·<em>강</em>의 다섯 무리가 파고들어, <em>永嘉 5년(311)</em> 흉노의 <em>유요(劉曜)</em>와 <em>석륵(石勒)</em>이 낙양을 함락하고 <em>회제(懷帝)</em>를 사로잡았다. 이것이 <em>영가의 난</em>이다. 6년 뒤 장안마저 무너지며 <em>민제(愍帝)</em>가 항복했고, 서진은 사실상 끝났다. 중원의 사대부에게는 <em>남으로 가지 않으면 죽는다</em>는 한 길만 남았다.\n\n그러나 남도는 영가의 난과 함께 비로소 시작된 것이 아니다. 먼저 흐름을 잡은 사람이 <em>낭야왕(瑯琊王) 사마예(司馬睿)</em>와 그를 보좌한 <em>왕도(王導)</em>다. 두 사람은 난이 깊어지기 전인 <em>永嘉 원년(307)</em>경에 이미 건업(建鄴, 뒷날의 건강)으로 내려와 강좌(江左)의 경영을 시작했다. <em>왕도</em>가 그 일을 두고 <em>중원이 무너지거든 강좌가 한 자리를 받쳐야 한다</em>는 뜻을 일찍 세웠다 한다. 영가 이후의 큰 물결은 이미 마련된 그 자리로 흘러든 셈이다.\n\n남도의 행렬은 한두 해의 일이 아니다. 첫 물결은 311~317년의 사이, 낙양·장안 함락의 직격을 피해 내려온 무리다. <em>왕도</em>의 <em>낭야 왕씨</em>, <em>유량</em>의 <em>영천 유씨</em>, <em>치감</em>의 <em>고평 치씨</em>, <em>환이</em>의 조부 <em>환씨</em>, <em>유곤</em>의 친속, 그리고 뒷날 <em>진군 사씨</em>가 이 시기에 차례로 강을 건넜다. 둘째 물결은 <em>조적(祖逖)</em>의 북벌이 좌절된 뒤(약 320년대) 회수 이북에 남았던 호족들이 마저 내려오는 흐름이다. 셋째 물결은 <em>후조(後趙)</em>의 <em>석륵</em>·<em>석호</em>의 폭정을 피해 4세기 중엽까지 끊임없이 이어진 작은 행렬들이다. 합치면 수십만 호, 백만 단위의 사람이 움직였다 전한다.\n\n남도한 사대부는 강남의 토착 호족과 한 자리에 서야 했다. 그 조정의 솜씨가 곧 <em>왕도</em>의 정사다. 왕도는 <em>고영(顧榮)</em>·<em>하순(賀循)</em> 같은 강남 명족의 영수를 불러내 <em>사마예</em>에게 절하게 하고, 거꾸로 북에서 내려온 명사에게는 강남의 풍속을 존중하게 했다. 이 <em>교(僑)와 구(舊)의 균형</em>이 동진 정권의 한 축이다. 북에서 내려온 무리를 <em>교성(僑姓)</em>, 본래의 강남 호족을 <em>오성(吳姓)</em>이라 불렀다. 교성의 <em>왕(王)·사(謝)·원(袁)·소(蕭)</em>와 오성의 <em>주(朱)·장(張)·고(顧)·육(陸)</em>이 그 대표다.\n\n행정의 자리에서는 <em>교주(僑州)</em>·<em>교군(僑郡)</em>·<em>교현(僑縣)</em>의 제도가 만들어졌다. 본래 청주(靑州)에서 내려온 무리를 강남의 한 자리에 모아 그 자리를 <em>남청주(南靑州)</em>라 일컫는 식이다. 호적은 따로 <em>백적(白籍)</em>에 올려 <em>황적(黃籍)</em>의 토착민과 구분했고, 백적의 무리에게는 한동안 부역을 면해 주었다. 이 제도가 한 시대 동진의 인구 기반이며, 동시에 뒷날 <em>환온</em>·<em>유유</em>가 단행한 <em>토단(土斷)</em>의 대상이 된다.\n\n문화적으로 의관남도는 한 시대의 단절이자 이식(移植)이다. 낙양의 <em>현학(玄學)</em>과 <em>청담(淸談)</em>의 풍속이 통째로 건강에 옮겨 심겼다. <em>왕연</em>의 옥주미가 떨어진 그 자리에서 <em>왕도</em>의 옥주미가 다시 들렸고, 정시(正始)의 명리(名理)가 강좌의 누각에서 다시 토론되었다. <em>왕희지</em>의 서법, <em>고개지</em>의 그림, <em>지도림</em>의 <em>격의불교</em>가 모두 이 옮겨진 토양에서 자랐다. <em>비수대전</em>의 승리도 따지고 보면 남도한 <em>진군 사씨</em>의 <em>사안</em>과 <em>사현</em>이 <em>북부병</em>을 이끌어 이룬 일이다.\n\n그러나 남도는 영광만이 아니었다. 강을 건넌 명사들은 자주 <em>신정(新亭)</em>의 자리에 모여 북쪽 하늘을 바라보며 울었다. <em>풍경은 다르지 않은데 산하만 달라졌구나(風景不殊, 正自有山河之異)</em>라는 <em>주의(周顗)</em>의 한탄에, <em>왕도</em>가 정색하고 <em>마땅히 함께 왕실을 도와 중원을 회복할 것이지 어찌 초수(楚囚)처럼 마주 울기만 하느냐</em> 꾸짖은 일이 〈언어〉편의 한 자리다. 의관남도가 곧 <em>고향 상실</em>과 <em>북벌의 숙제</em>를 함께 동진 사대부에게 지운 셈이다.\n\n『세설신어』의 거의 모든 일화는 의관남도 이후의 강좌(江左)를 배경으로 한다. <em>왕도</em>의 정사, <em>사안</em>의 아량, <em>환온</em>의 야심, <em>지도림</em>의 청담, <em>왕희지</em>의 서법, <em>고개지</em>의 그림이 모두 강을 건너온 한 무리의 풍속이다. 그러므로 의관남도를 모르면 〈언어〉·〈정사〉·〈품조〉·〈상서〉편의 풍경이 보이지 않는다. 한 강을 건넌 일이 한 시대의 모든 풍경을 정한 셈이다.", "storyCount": 0}, {"id": "event.王敦의 亂", "type": "event", "han": "王敦의 亂", "ko": "", "sub": "왕돈의 난 (322~324)", "title": "", "short": "낭야 왕씨의 한 축으로 형주의 군권을 쥐고 있던 <em>왕돈</em>이 사마예의 견제에 반발해 일으킨 거병. 한때 건강을 함락했으나 곧 병들었고, 명제가 즉위해 격파했다. 이 난의 한가운데서 <em>주의(周顗)</em>가 사촌 왕도를 구명하려다 죽은 일이 <em>내가 백인을 죽인 것이 아니나…</em>의 출전이다.", "long": "<em>왕돈(王敦)의 난</em>은 동진(東晉) 초의 한 큰 정치적 파탄이다. <em>낭야 왕씨</em>가 <em>사마예(司馬睿)</em>를 받쳐 강남에 새 조정을 세운 직후, 그 옹립의 한 축인 왕돈이 도리어 도성을 친 사건이다. <em>왕여마공천하(王與馬共天下)</em>라 일컬어진 동진 초의 권력 구도가 한 번에 드러난 자리이며, 동시에 그 구도가 한 번에 무너질 뻔한 자리이기도 하다.\n\n배경은 이렇다. <em>영가의 난</em>으로 서진이 무너지고 <em>사마예</em>가 건강(建康)에 자리를 잡을 때, 종실의 위세는 미약했고 강남의 토호는 북에서 내려온 황실을 가벼이 보았다. 이 자리를 <em>왕도(王導)</em>가 안에서 정사로 받치고 사촌형 <em>왕돈</em>이 밖에서 군권으로 받쳤다. 왕돈은 형주(荊州)에 자리잡아 장강 중상류의 군세를 모두 쥐었다. 사마예가 황제(元帝)로 즉위할 때 왕도가 <em>공히 어좌에 오르소서</em> 권유받았다는 일화가 〈총례〉편에 전하니, 그 권세가 어느 정도였는지 짐작된다.\n\n사마예는 이 구도가 답답했다. 황제로서 황제의 권한을 쥐고 싶었고, 그러려면 왕씨의 군권을 덜어내야 했다. <em>유외(劉隗)</em>와 <em>조협(刁協)</em>을 측근으로 들여 <em>왕돈을 견제하라</em> 명했다. 두 사람은 왕씨 일족을 차례로 외직으로 돌리고 형주의 군세를 깎으려 했다. 왕돈이 이를 두고 보지 않았다.\n\n영창(永昌) 원년(322), 왕돈이 무창(武昌)에서 거병했다. <em>간신 유외·조협을 친다</em>는 명분이었다. 황제를 친다 하지 않고 <em>간신 청제(淸帝側)</em>를 표방한 것이 그의 한 셈이었다. 군이 동으로 내려오자 건강이 흔들렸다. 사마예가 친히 갑옷을 입고 나섰으나 막지 못했다. 왕돈의 군이 도성에 들었고, 유외는 후조(後趙)로 도망쳤으며 조협은 잡혀 죽었다. 사마예는 <em>그가 황제가 되고자 한다면 짐이 물러나리라</em> 한탄했다 전한다. 그해 윤월에 사마예가 울분 속에 죽었다.\n\n이 난의 한가운데에 <em>주의(周顗)</em>의 죽음이 있다. 왕돈이 거병한 직후 <em>왕도</em>가 일족을 거느리고 궐 앞에 무릎을 꿇어 처분을 기다렸다. 마침 주의가 입궐하기에 왕도가 <em>백인(伯仁), 우리 일족 백구의 목숨을 그대에게 맡기오</em> 청했다. 주의는 못 들은 듯 지나쳤다. 그러나 안에 들어가서는 황제에게 <em>왕도는 충신이오니 결코 죽이지 마소서</em> 간곡히 변호한 표를 올렸다. 왕도는 그것을 몰랐다. 뒤에 왕돈이 도성에 들어 <em>주의를 어찌할까</em> 묻자, 왕도가 침묵했다. 그 침묵 한 자리에 주의가 죽었다. 뒤에 왕도가 궁중 문서에서 주의가 자기를 변호한 표를 발견하고 통곡하며 <em>내가 백인을 죽인 것이 아니나, 백인이 나로 인해 죽었다(吾雖不殺伯仁, 伯仁由我而死)</em> 했다. 〈우회〉편의 한 정점이다.\n\n왕돈은 도성에 오래 머무르지 못하고 다시 무창으로 돌아갔다. 그 사이 <em>명제(明帝, 사마소)</em>가 즉위했다. 명제는 부친과 달리 단호했고 군사에 밝았다. 태령(太寧) 2년(324), 왕돈이 다시 거병할 채비를 차리는 중에 병이 깊어졌다. 명제는 그 틈을 놓치지 않고 <em>온교(溫嶠)</em>·<em>유량(庾亮)</em>·<em>도간(陶侃)</em>에게 토벌을 명했다. 명제 자신이 미복으로 왕돈의 진영을 정탐하고 돌아왔다는 일화가 〈가휼〉편에 전한다. 왕돈의 군은 그의 병상에서 명령이 끊긴 채 격파되었고, 왕돈은 분기 끝에 죽었다. 그의 시신은 부관참시되었다.\n\n난이 끝난 뒤에도 <em>왕도</em>는 도성에 그대로 있었다. 명제가 왕도를 치지 않은 것은 그의 충정을 알고 있었기 때문이며, 또 왕씨를 완전히 무너뜨리면 동진 자체가 흔들린다는 판단이었다. <em>왕여마공천하</em>의 구도는 형태를 바꾸어 그대로 이어졌고, 다만 그 한가운데에 <em>주의의 그림자</em>가 길게 남았다. 『세설신어』〈우회〉·〈방정〉·〈가휼〉·〈상서〉편 곳곳에 이 난의 잔향이 흐른다. 동진의 한 시작이 곧 한 파탄으로 시험받은 자리, 그것이 왕돈의 난이다.", "storyCount": 0}, {"id": "event.蘇峻의 亂", "type": "event", "han": "蘇峻의 亂", "ko": "", "sub": "소준의 난 (327~328)", "title": "", "short": "외척 <em>유량</em>의 강경한 견제에 반발한 역양 무장 <em>소준</em>이 <em>조약</em>과 함께 일으킨 반란. 건강을 함락하고 어린 성제를 인질로 잡았으며, 황궁을 약탈했다. <em>도간</em>·<em>온교</em>·<em>곽묵</em>이 군을 일으켜 평정했다. 동진 초기 정권의 가장 큰 위기 가운데 하나.", "long": "<em>소준(蘇峻)의 난</em>은 동진 성제(成帝) 함화(咸和) 2년(327) 11월에 일어나 이듬해 9월에 평정된 반란이다. <em>왕돈(王敦)의 난</em>을 겨우 진압한 동진 조정이 그 후속으로 다시 한 번 무너질 뻔한 위기였다. 도성 <em>건강(建康)</em>이 함락되고 어린 황제가 인질로 잡혔으며, 황궁이 약탈당한 동진 초기 최악의 사건이다.\n\n배경은 외척 정치에 있다. 명제(明帝)가 일찍 죽고 어린 성제가 즉위하자, 황태후의 오라비 <em>유량(庾亮)</em>이 <em>왕도(王導)</em>와 함께 보정(輔政)에 들어갔다. 왕도가 부드러운 <em>진무(鎭撫)</em>의 정치로 강남의 호족과 의관남도(衣冠南渡)의 사대부를 함께 다독이려 한 데 비해, 유량은 <em>강경한 통제</em>를 골랐다. 외번(外藩)에 흩어진 무장들을 도성으로 불러들여 병권을 거두려 한 것이 그 핵심이다.\n\n표적이 된 무장이 <em>역양(歷陽)</em>에 주둔한 <em>소준</em>이었다. 소준은 <em>영가의 난</em> 무렵 산동에서 유민을 이끌고 남하한 <em>유민수(流民帥)</em> 출신이다. <em>왕돈의 난</em>을 평정하는 데 공을 세워 역양에 자리를 잡았고, 사납고 잘 단련된 <em>유민병</em>을 거느리고 있었다. 유량이 그를 <em>대사농(大司農)</em>으로 부르며 사실상의 무장 해제를 요구하자, 소준은 <em>조정에 들어가면 살아 나오지 못한다</em>고 판단했다 한다. <em>왕도</em>가 거듭 만류하고 <em>온교(溫嶠)</em>도 강하게 반대했으나, 유량이 끝내 밀어붙였다.\n\n327년 11월, 소준이 군을 일으켰다. <em>수춘(壽春)</em>의 <em>조약(祖約)</em> — <em>조적(祖逖)</em>의 동생으로, 형의 북벌 유산을 받았으나 조정의 홀대에 원한이 깊었다 — 이 호응해 함께 반기를 들었다. <em>함화의 난(咸和之亂)</em>이라고도 부른다. 두 군이 장강을 따라 동쪽으로 내려오자 유량이 친히 막으려 했으나 <em>우저(牛渚)</em>에서 대패했다. 328년 2월, 소준의 군이 <em>건강</em>에 들이닥쳤다. 황궁이 약탈당하고 후궁이 욕을 보았으며, 일곱 살의 <em>성제</em>는 <em>석두성(石頭城)</em>으로 옮겨져 인질이 되었다. 유량은 <em>온교</em>에게로 달아났다.\n\n평정은 외번의 손에서 왔다. <em>온교</em>가 <em>심양(尋陽)</em>에서 격문을 띄우고, <em>형주(荊州)</em>의 <em>도간(陶侃)</em>에게 맹주가 되어 줄 것을 청했다. 도간은 본디 유량에게 원망이 있어 망설였으나, <em>온교</em>가 <em>지금 군신의 큰 의(義)를 두고 사사로운 한을 따질 때가 아닙니다</em> 설득하자 마침내 군을 일으켰다 전한다. <em>곽묵(郭默)</em>·<em>조윤(趙胤)</em>이 합류했고, 강주(江州)와 형주의 병이 장강을 거슬러 동쪽으로 모였다.\n\n석두성 아래의 공방이 반년을 끌었다. 한때 군량이 끊겨 의군이 흩어질 뻔하자 도간이 <em>내가 늙어 다시는 이런 일을 하지 않으리라</em> 탄식했으나 온교가 끝내 붙들었다 한다. 328년 9월, 진중에서 소준이 말에서 떨어져 죽었다. 그의 아우 <em>소일(蘇逸)</em>이 뒤를 이었으나 곧 무너졌고, <em>조약</em>은 <em>후조(後趙)</em> 석륵(石勒)에게 달아났다가 일족이 도륙되었다.\n\n난이 끝난 뒤 <em>왕도</em>가 정사를 다시 거두었다. <em>유량</em>은 자청해 외번으로 나가 <em>예주(豫州)</em>에 머물렀다. 도성은 폐허에 가까웠고 황실의 위엄은 땅에 떨어졌다. 그러나 이 평정의 경험에서 <em>외번의 강병이 도성을 지킨다</em>는 동진 특유의 군사 구도가 굳어졌다. 뒤에 <em>환온(桓溫)</em>이 형주를, <em>사현(謝玄)</em>이 <em>북부병(北府兵)</em>을 거느리는 그 구도가 여기서 비롯되었다.\n\n『세설신어』에서 이 난의 흔적은 곳곳에 흩어져 있다. 〈방정〉·〈아량〉·〈언어〉편에 <em>왕도</em>가 인질의 자리에서도 의젓했던 일, <em>온교</em>가 도간을 설득하던 한마디, <em>유량</em>이 패주 길에 보인 부끄러움이 점점이 박혀 있다. 동진의 한 봄이 채 오기 전, 그 가장 추운 겨울이 이 난이었다.", "storyCount": 0}, {"id": "event.三次 北伐", "type": "event", "han": "三次 北伐", "ko": "", "sub": "환온의 세 차례 북벌 (354, 356, 369)", "title": "", "short": "<em>환온</em>이 형주의 군세를 발판으로 시도한 세 차례의 북방 정벌. 첫 번째에서 장안에 다가갔고, 두 번째에서 한때 낙양을 회복했으나, 세 번째에서 패주했다. 정치적으로는 환온의 명성을 키워 후일 <em>간문제</em> 옹립과 찬위 시도의 발판이 되었다.", "long": "三次 北伐은 <em>환온(桓溫)</em>이 형주(荊州)의 군세를 기반으로 영화 10년(354), 영화 12년(356), 태화 4년(369) 세 차례에 걸쳐 일으킨 북방 정벌이다. 표면적으로는 <em>영가(永嘉)의 난</em> 이래 잃어버린 중원과 옛 도읍 <em>낙양</em>·<em>장안</em>을 회복한다는 명분이었지만, 실제로는 환온 한 사람의 정치적 무게를 키우는 길이기도 했다. 동진 한 세대의 군사·정치·인사가 이 세 번의 출정에 얽혀 있다.\n\n배경은 환온의 출세에서 시작된다. 그는 <em>명제</em>의 부마였고, 영화 2년(346) 형주자사로서 <em>촉(蜀)</em>의 <em>성한(成漢)</em>을 멸해 일거에 강남 제일의 무장이 되었다. 그러나 도성의 <em>은호(殷浩)</em>가 그를 견제하기 위해 먼저 북벌을 맡았다가 영화 9년(353) 요양(姚襄)의 배반으로 대패했다. 은호가 폐서인되자 북벌의 명분과 권한이 한꺼번에 환온에게 돌아왔다. 첫 출정은 그 다음 해다.\n\n第一次 北伐(354)은 <em>전진(前秦)</em>의 <em>부건(苻健)</em>을 친 싸움이다. 환온이 보병·기병 4만으로 양양에서 무관(武關)을 지나 관중에 들어가 <em>백록원(白鹿原)</em>에 진을 쳤다. 장안이 멀리 보이는 자리였다. 관중의 부로(父老)들이 <em>어찌 오늘에야 관군을 다시 뵙는가</em> 울며 맞았다 한다. 그러나 환온은 군량이 다하기를 기다렸다가 보리를 거두려 했고, 부건이 미리 보리를 베어 들여 들판을 비웠다. 결국 군량이 끊겨 철군했고, 돌아오는 길에 추격을 받아 큰 손실을 입었다. <em>왕맹(王猛)</em>이 갈옷을 입고 환온을 찾아와 시국을 논한 자리, 환온이 그를 데려가려 했으나 왕맹이 끝내 따르지 않은 일화가 이 출정에서 나왔다.\n\n第二次 北伐(356)은 강을 건너 <em>낙양</em>을 친 싸움이다. 강수(姜水)에서 <em>요양</em>을 격파하고 옛 도읍에 들어가 <em>서진(西晉)</em>의 <em>오릉(五陵)</em>을 알현하고 능을 수리했다. 한 세대 만의 회복이었다. 환온이 도성을 <em>낙양으로 옮기자</em> 표를 올렸으나, 강남에 뿌리내린 사대부들이 응하지 않았다. 결국 수비병만 두고 환온은 형주로 돌아갔고, 낙양은 몇 해 뒤 다시 잃었다. <em>명분의 회복</em>과 <em>실리의 부재</em>가 한 출정에서 함께 드러난 셈이다.\n\n第三次 北伐(369)은 환온의 야망이 가장 직접 드러난 출정이다. 그는 <em>전연(前燕)</em>을 치기 위해 5만 보병을 이끌고 <em>지수(枝水)</em>에서 <em>황하</em>로 통하는 운하를 파며 <em>방두(枋頭)</em>까지 올라갔다. 그러나 <em>모용수(慕容垂)</em>가 환온의 보급선을 끊자, 군량이 다해 회군했고, 모용수의 추격에 <em>양읍(襄邑)</em>에서 대패했다. 사망자가 3만에 이르렀다 전한다. 환온의 군사적 명성에 결정적 흠집이 난 자리였다.\n\n세 차례 북벌의 정치적 무게는 군사적 결과보다 무거웠다. 제1·2차의 명성으로 환온은 <em>대사마(大司馬)</em>에 올라 도성 위의 권력이 되었고, 제3차의 패배를 만회하기 위해 도리어 도성으로 들어가는 길을 택했다. 그것이 곧 폐립(廢立)의 사건이다. 환온은 패전의 책임을 도성으로 돌려 <em>해서공(海西公)</em>을 폐하고 <em>간문제(簡文帝)</em>를 세웠다(371). <em>기왕에 흐름을 남기지 못한다면 만세에 악취라도 남기리라</em>는 그의 호언이 이 무렵의 말이다. 다행히 간문제가 일찍 죽고 <em>사안</em>·<em>왕탄지</em>가 그의 찬위를 부드럽게 막아 동진 황실은 보존되었다.\n\n『세설신어』 〈언어〉·〈품조〉·〈호상〉편에는 북벌길의 환온이 자주 등장한다. 옛 <em>유곤</em>이 심은 버드나무가 자란 것을 보고 <em>나무도 이리 변하는데 사람이 어찌 견디랴</em> 울먹인 자리, 백록원에서 왕맹과 시국을 논한 자리가 모두 이 세 출정의 한 갈피다. 三次 北伐은 한 무장의 야망이 한 왕조의 회복 의지와 어떻게 겹쳐지고 또 어긋났는가를 보여 주는 동진 한 세대의 거울이다.", "storyCount": 0}, {"id": "event.淝水大戰", "type": "event", "han": "淝水大戰", "ko": "", "sub": "비수대전 (383)", "title": "", "short": "전진의 <em>부견</em>이 백만 대군으로 동진을 침공해 <em>비수</em>에서 결전. 동진 측은 8만에 불과했으나 <em>사현</em>의 청에 부견이 군을 물리다 <em>동진 군이 강을 건너 추격해 왔다</em>는 헛소문에 무너졌다. 부견은 단신으로 도망쳐 <em>風聲鶴唳</em> 했다. <em>사안</em>이 첩보를 받고도 바둑을 계속 둔 일화가 〈아량〉편의 백미다.", "long": "淝水大戰은 동진 효무제 태원(太元) 8년(383) 10~11월, 전진(前秦)의 <em>부견</em>과 동진의 <em>사현</em>이 회수(淮水)의 지류 <em>비수(淝水)</em>에서 결전한 전투다. 동진 사대부 사회의 운명을 가른 한 판이며, 동진의 100년 동안 가장 빛난 한순간이다.\n\n배경. 376년경 부견은 화북을 거의 통일했다. 저족(氐族) 출신으로 <em>전진</em>의 황제가 된 그는 양주(凉州)·전연(前燕)·대(代)를 차례로 멸하고 북방을 한 손에 쥐었다. 명재상 <em>왕맹(王猛)</em>의 보좌가 그 성공의 절반이었다. 왕맹은 임종 직전 부견에게 <em>동진이 아직 정통의 자리에 있고 사대부의 명망이 깊으니 가벼이 침공하지 마소서</em>라 간곡히 권했다(375년). 그러나 부견은 왕맹의 死後 그 권고를 잊고, 동진 정복을 끊임없이 도모했다.\n\n383년 8월, 부견은 마침내 모든 군세를 동원했다. 흔히 <em>백만 대군</em>이라 한다(실제로는 보병 60만, 기병 27만, 도합 87만 정도로 추정). 부견 자신이 친정하고, 동생 부융(苻融)이 선봉이 되어 남하했다. 동진의 형주·예주·서주의 군이 차례로 무너졌다. 11월 초, 부융의 군이 수춘(壽春)을 함락하고 비수의 북안에 진을 쳤다.\n\n동진의 응전. 막부의 총책임은 <em>사안</em>이었다. 그는 동생 <em>사석</em>을 정토대장군으로, 조카 <em>사현</em>을 전봉도독으로, <em>사염</em>을 보군장군으로, <em>환이(桓伊)</em>를 보좌로 삼아 응전케 했다. 동진 측 군세는 <em>북부병(北府兵)</em> 8만 — <em>사현</em>이 광릉에서 길러 둔 정예다. 사현은 백전 노장이 아니라 명사의 자제로, 본래 풍류와 청담의 사람이었다. 그러나 비수전의 그날, 그가 보인 식견은 <em>고금에 다시 없을 묘책</em>이라 불린다.\n\n11월 8일, 결전. 사현이 부견에게 사신을 보내 <em>서로 강을 사이에 두고 대치하면 결전이 없습니다. 조금만 군을 물려 주시면 우리가 강을 건너 결전하리이다</em> 청했다. 부견은 <em>적의 군세가 한심하다</em>고 깔보고 이를 받아들였다. 그러나 <em>물러나라</em>는 명령이 백만 대군의 후방에 전해지자 일이 어그러졌다. 군이 너무 컸고, 후방의 사졸들은 자기들이 왜 후퇴하는지 알지 못했다. 어딘가에서 <em>동진 군이 강을 건너 우리를 쫓아온다</em>는 헛소문이 퍼지자, 전군이 무너지며 패주가 시작되었다. 부융 자신이 패주를 멈추려다 말에서 떨어져 죽었다. 부견은 단신으로 도망쳤다. 도망 길에 바람 소리와 학 울음만 들어도 동진 군이 따라오는 듯해 <em>風聲鶴唳, 草木皆兵</em>했다 한다.\n\n대전의 첩보가 건강의 사안에게 전해진 그 순간, 그는 손님과 <em>바둑</em>을 두고 있었다. 그는 첩보를 받은 뒤 무심히 옆에 놓고는 바둑을 계속 두었다. 손님이 <em>어찌 되었느냐</em> 묻자 <em>아이들이 도적을 부수었소(小兒輩遂已破賊)</em> 한마디만 했다. 그러고는 손님이 돌아간 뒤, 그제야 안쪽으로 들어가다 문지방을 넘다 신발의 굽이 부러지는 줄도 몰랐다. 안에서 안도와 기쁨이 그렇게 새어 나온 것이다. 〈아량〉편의 백미이며, 사안의 인격을 가장 완전히 드러낸 한 장면이다.\n\n결과. 부견의 백만 대군이 거의 다 흩어졌다. 부견 자신이 살아 돌아갔으나 위신은 완전히 무너졌다. 그가 통일했던 화북이 곧 갈라졌다. 모용수(慕容垂)가 <em>후연(後燕)</em>을, 요장(姚萇)이 <em>후진(後秦)</em>을 세웠고, 385년 부견은 요장에게 살해되었다. <em>오호십육국</em>의 분열기가 더 깊어진 것이다. 동진은 이 한 판으로 <em>멸망의 직전</em>에서 <em>백 년의 평화</em>로 갔다.\n\n『세설신어』에서 비수대전은 〈아량〉·〈배조〉·〈자신〉 등에 직접 등장하며, 사안의 바둑·신발 굽 일화는 두 자리에서 약간씩 다른 결로 전한다.", "storyCount": 0}, {"id": "event.桓玄 簒位", "type": "event", "han": "桓玄 簒位", "ko": "", "sub": "환현의 찬위 (403~404)", "title": "", "short": "환온의 막내아들 <em>환현</em>이 형주에서 일어나 도성을 장악하고, 안제(安帝)에게 양위를 받아 국호를 <em>초(楚)</em>로 한 사건. 동진은 형식상 끝났으나, 곧 사안의 <em>북부병</em>에서 자라난 <em>유유(劉裕)</em>가 광릉에서 거병해 환현을 격파했다(404). 동진은 이름만 16년 더 이어지다 420년 유유에게 양위된다.", "long": "<em>환현(桓玄)</em>의 찬위는 동진(東晉) 한 왕조의 형식적 종지부다. 403년 12월, 환현이 <em>안제(安帝)</em>에게서 양위를 받아 국호를 <em>초(楚)</em>로 세웠다. 그 한 해 남짓의 짧은 왕조가 무너지며 동진은 이름만 다시 일어났지만, 그 실권은 이미 <em>유유(劉裕)</em>에게 넘어가 있었다. 한 시대의 끝과 한 시대의 시작이 이 사건의 앞뒤에 맞물려 있다.\n\n환현은 <em>환온(桓溫)</em>의 막내아들이다. 환온이 죽을 무렵 그는 다섯 살에 지나지 않았다. 환온의 찬위가 <em>사안(謝安)</em>의 응대로 무산된 뒤, 환씨 일문은 <em>형주(荊州)</em>를 근거로 그대로 남았다. 환현은 자라며 아버지의 못다 한 뜻을 자기 한 몸에 새겼다. 사람됨이 거만하고 문재(文才)와 글씨에 능했으나, 그 거만이 곧 그의 한 결점이었다. <em>왕공(王恭)</em>과 <em>은중감(殷仲堪)</em>이 <em>사마도자(司馬道子)</em> 부자(父子)에 맞서 거병한 <em>융안(隆安)</em> 연간의 혼란을 틈타 환현이 형주의 군사를 손에 넣었다.\n\n도성의 정사는 이미 무너져 있었다. <em>효무제</em>가 술자리에서 후궁의 손에 살해된 뒤, 안제는 <em>바보 천자(白癡)</em>로 일컬어졌고, 사마도자와 그 아들 <em>사마원현(司馬元顯)</em>이 권력을 잡아 부패가 극에 달했다. 그 위에 <em>손은(孫恩)의 난</em>이 강남을 뒤흔들었다. 사마원현이 환현을 토벌하려 군을 일으키자, 환현이 도리어 동쪽으로 내려와 도성 <em>건강(建康)</em>을 장악했다(402). 사마원현과 사마도자가 차례로 죽었다.\n\n이듬해 403년 말, 환현이 안제의 양위 조서를 받아 <em>초(楚)</em>를 세웠다. 안제는 <em>심양(尋陽)</em>으로 옮겨졌다. 형식상 동진은 끝났다. 그러나 환현의 새 조정은 곧 무너질 자리에 서 있었다. 즉위하자마자 사치가 늘었고, 종실의 능을 헐어 자기 능침을 쌓는다는 풍문이 돌았다. 사대부 가운데 그를 마음으로 따른 이가 적었다. 명문 <em>진군 사씨(陳郡謝氏)</em>와 <em>낭야 왕씨(琅邪王氏)</em>가 거리를 두었고, 도성의 인심도 곧 식었다.\n\n이 한 해 동안 그를 무너뜨릴 한 사람이 <em>광릉(廣陵)</em>에서 일어났다. <em>유유(劉裕)</em>다. 그는 한미한 출신이었으나 일찍이 <em>북부병(北府兵)</em>에 들어가 손은의 난을 평정하는 데 공을 세웠다. 북부병이 곧 사안이 <em>사현(謝玄)</em>에게 길러 두게 한, <em>비수대전</em>의 그 정예 부대다. 사안이 죽은 뒤 한 세대 만에 그 부대에서 한 영웅이 자라난 것이다. 404년 2월, 유유가 광릉에서 거병해 <em>유의(劉毅)</em>·<em>하무기(何無忌)</em>와 함께 도성으로 내려갔다. 환현은 단숨에 무너져 형주로 달아나다 도중에 살해되었다. 즉위로부터 채 다섯 달이 못 되었다.\n\n유유가 안제를 다시 세웠다. 동진은 이름만 16년 더 이어졌다. 그러나 그 16년의 실권은 모두 유유의 것이었다. <em>유의</em>를 치고, 후진(後秦)을 쳐 <em>장안</em>까지 들어갔다 돌아오고, 두 황제를 세웠다 폐하며 자기 자리를 닦았다. 420년 6월, 유유가 <em>공제(恭帝)</em>에게 양위를 받아 <em>송(宋)</em>을 세웠다. 환현이 한 번 끊은 그 자리를 유유가 마저 끊은 셈이다.\n\n환현의 찬위는 그러므로 동진의 한 끝이 아니라 동진의 한 <em>예고(豫告)</em>다. 환온이 못다 한 자리를 그 아들이 한 번 차지했다 잃었고, 사안이 길러 둔 한 부대에서 또 한 사람이 일어나 끝내 그 자리를 가졌다. 『세설신어』 속 명사 시대의 한낮은 이 사건의 앞에서 이미 저물었고, 〈우회(尤悔)〉·〈출면(黜免)〉편 끝자락에 그 그림자가 길게 누워 있다.", "storyCount": 0}, {"id": "person.王弼", "type": "person", "han": "王弼", "ko": "", "sub": "왕필 (226~249)", "title": "", "short": "정시 명사의 또 한 봉우리. 하안보다 한참 어렸으나 천재였다. 십대에 노자와 주역의 주(注)를 지어 후대 천 년의 표준이 되었다. 그의 노자 주는 지금도 가장 권위 있는 주의 하나로 읽힌다. 그러나 스물셋에 요절했다. <em>내가 죽으면 또 누가 노자를 알아 주랴</em>는 탄식이 따라왔다.", "long": "王弼은 자가 보사(輔嗣)다. 산양(山陽) 고평(高平) 사람으로, 226년에 났다. 할아버지뻘 되는 <em>왕찬(王粲)</em>은 <em>건안칠자</em>의 한 사람으로 일세를 풍미한 문장가였다. 왕필은 그 가풍을 이은 사람이지만, 그가 디딘 자리는 문장이 아니라 <em>명리(名理)</em>였다.\n\n어려서부터 빼어났다. 열 살 남짓에 <em>노자</em>를 좋아해 깊이 이해했고, <em>변(辯)</em>과 <em>논(論)</em>에 능했다. 그가 십대에 이미 낙양의 청담 자리에 끼어 <em>하안(何晏)</em>과 더불어 <em>명리</em>를 따졌다 한다. 하안은 그 때 이미 사십을 바라보는 정시 명사의 영수였다. 그런 하안이 어린 왕필을 마주하고 <em>후생가외</em>라 탄식하며 <em>공자가 후생을 두려워한다 한 것이 곧 이런 자리를 두고 한 말이다</em> 했다 전한다. 또 하안이 <em>나는 늘 노자의 어느 구절을 풀지 못해 답답했는데, 보사를 만나 비로소 풀렸다</em> 했다는 일화도 〈문학〉편에 남는다.\n\n그의 가장 큰 업적은 두 권의 주(注)다. <em>『노자주(老子注)』</em>와 <em>『주역주(周易注)』</em>다. 십대 후반에서 이십대 초에 이른 사이에 지었다 한다. 이 두 주는 후대 천 년의 동아시아에서 <em>노자</em>와 <em>주역</em>의 표준 주가 되었다. 당대(唐代) 공영달이 『주역정의』의 저본으로 삼은 것이 곧 왕필 주이며, 송명(宋明)의 성리학자들이 노자와 주역을 읽을 때 거친 첫 문이 또한 왕필 주였다.\n\n그 핵심은 무엇인가. 첫째, <em>체용(體用)</em>의 정립이다. <em>근본은 무(無)이며, 만물은 그 무에서 생긴다(以無爲本)</em>는 명제를 정밀하게 풀어, <em>무</em>는 만물의 본체이고 <em>유</em>는 그 작용이라는 <em>체용의 구분</em>을 정립했다. 둘째, <em>언의지변(言意之辨)</em>이다. <em>말은 뜻을 다하지 못하나, 뜻을 얻으면 말을 잊어야 한다(得意忘言)</em>. 이 명제가 그의 주역 주 「명상(明象)」에 나오며, 위진 <em>현학</em>의 인식론 한가운데에 섰다. 셋째, <em>명교와 자연의 화해</em>다. 그는 <em>명교</em>를 부정하지 않고, 그것이 <em>자연</em>의 한 자연스러운 펼침임을 논했다. 후에 <em>혜강</em>이 <em>명교를 넘어 자연에 맡긴다</em> 한 것과는 자리가 다르다. 왕필의 자리가 정시 명사의 한 봉우리라면, 혜강의 자리는 죽림의 또 한 봉우리다.\n\n그의 청담은 한 자리의 명품이었다. <em>하안</em>과의 대국에서 하안이 한 명제를 세우면 왕필이 그 자리에서 풀고, 다시 그 풀이의 빈틈을 자기가 들어 보이고, 또 그것을 풀었다. <em>주(主)와 객(客)이 한 사람에게 갈마든다</em> 할 만한 자리였다. 좌중이 모두 그를 우러러보았으나, 왕필 자신은 <em>남을 가벼이 보는 버릇</em>이 있어 사람들이 꺼리는 바도 있었다 한다. 천재의 한 그늘이다.\n\n249년 <em>고평릉의 정변</em>으로 <em>조상(曹爽)</em>과 <em>하안</em>이 한꺼번에 사라졌다. 왕필은 정변에 직접 연좌되지는 않았으나, 그의 보호자였던 하안이 죽으면서 그도 관직에서 물러났다. 그 해 가을, 돌림병에 걸려 죽었다. 향년 스물넷이다. 그가 죽었다는 소식이 전해지자 <em>하후현</em>이 <em>내가 죽으면 또 누가 노자를 알아 주랴</em> 탄식했다 전한다. 또는 그 탄식이 왕필 본인의 임종 자리에서 나온 것이라고도 한다.\n\n스물넷에 떠난 사람이 천 년의 노자 주를 남겼다. 위진 <em>현학</em>의 정시 한낮은 곧 <em>하안</em>과 왕필의 한낮이며, 두 사람이 같은 해 같은 사건의 그늘 아래 사라지면서 정시의 빛이 꺼졌다. 『세설신어』의 〈문학〉편 첫머리가 왕필의 일화로 열린 것은 우연이 아니다. 현학을 말하려면 왕필부터 말해야 한다는 <em>유의경</em>의 한 결단이 거기 있다.", "storyCount": 0}, {"id": "person.司馬懿", "type": "person", "han": "司馬懿", "ko": "", "sub": "사마의 (179~251)", "title": "", "short": "하내 사마씨. 조조 막부의 모사로 출사해 위 문제·명제·소제의 세 황제를 보좌하며 권력의 중심으로 다가갔다. 249년 <em>고평릉의 정변</em>으로 조상 일족을 일소하고 위의 실권을 쥐었다. 그의 아들 사마소·사마염이 그 발판 위에서 진(西晉)을 세웠으니, 위진 교체의 비조가 곧 그다.", "long": "司馬懿는 자가 중달(仲達)이다. 하내(河內) 온현(溫縣)의 사마씨 출신이다. 하내 사마씨는 한대 이래 이천석(二千石)의 관록을 이어 온 중간 가문이었으나, 사마의 한 대(代)에서 천하의 무게가 그 집안으로 넘어갔다. 위진 교체의 비조가 곧 그다.\n\n어려서부터 <em>총명하고 큰 절조를 지녔다</em>는 평을 들었다. 형 <em>사마랑(司馬朗)</em>이 이미 <em>조조</em> 막부에 들어가 있었으나, 사마의는 출사를 늦췄다. 조조가 사마의를 부르자 그는 <em>풍비(風痹)</em>가 들었다 칭하고 자리에 누웠다. 조조가 자객을 보내 진위를 살피게 했는데, 자객이 칼을 들이대도 그는 눈도 깜박이지 않고 누워 있었다 한다. 끝내 조조가 다시 강하게 부르며 <em>오지 않으면 가두라</em> 했고, 그제야 그는 무거운 걸음으로 막부에 들어갔다. 출사의 한 첫 자리부터 <em>깊이를 보이지 않는 사람</em>의 인상이 새겨졌다.\n\n조조의 막부에서 그는 <em>문학연(文學掾)</em>으로 시작해 조비(曹丕)의 <em>세자사우(世子四友)</em>의 한 자리에 들었다. 조조가 일찍이 그를 보고 <em>낭고지상(狼顧之相)이라, 큰 일을 맡겨서는 안 된다</em>고 경계했다 한다. 늑대처럼 몸을 돌리지 않고도 고개만 뒤로 돌려 본다는 그 관상이 곧 <em>야심을 안으로 감춘 자</em>의 표지였다. 그러나 조비는 그를 깊이 신뢰했고, 그 신뢰가 곧 사마씨가 위의 핵심으로 들어가는 통로가 되었다.\n\n위 <em>문제(文帝, 조비)</em>가 즉위하자 사마의는 <em>상서(尙書)</em>·<em>독군(督軍)</em>을 거치며 정사와 군사 양쪽에 뿌리를 내렸다. 문제가 임종하며 <em>명제(明帝, 조예)</em>를 그에게 부탁했고, 명제 또한 임종하며 <em>소제(少帝, 조방)</em>를 <em>조상(曹爽)</em>과 함께 그에게 맡겼다. 세 황제의 고명을 잇달아 받은 신하란 위 한 조정에서 오직 그 하나였다.\n\n군사적 자취도 만만치 않다. 서쪽으로는 <em>제갈량(諸葛亮)</em>의 북벌을 막아 <em>오장원(五丈原)</em>에서 끝내 제갈량을 지치게 했다. 정면 결전을 피하고 진지를 굳혀 시일을 끄는 그의 전법을 두고 제갈량이 <em>부인의 두건</em>을 보내 도발했으나, 사마의는 웃으며 받았다 전한다. 동쪽으로는 <em>공손연(公孫淵)</em>의 <em>요동(遼東)</em>을 단숨에 평정했다. 그가 <em>기다리는 자</em>인 동시에 <em>결단할 때는 누구보다 빠른 자</em>임을 두 전장이 함께 보여 주었다.\n\n명제 사후, <em>조상</em>이 어린 소제를 끼고 권력을 독점하며 사마의를 <em>태부(太傅)</em>로 밀어 올려 실권에서 떼어 놓았다. 사마의는 다시 칭병해 자리에 누웠다. 조상의 사람이 문병을 오자 그는 죽을 흘리며 말도 제대로 못 하는 모습을 보였고, <em>이 늙은이는 곧 죽을 것이다</em> 보고가 올라갔다. 그 보고가 곧 조상의 마지막 안심이었다.\n\n249년 정월, 조상이 소제를 모시고 <em>고평릉(高平陵)</em>에 성묘하러 나간 틈을 타 사마의가 일어났다. 도성을 닫고 <em>곽태후(郭太后)</em>의 영을 받아 조상 일족을 모두 잡아들였다. 조상은 <em>후(侯)의 자리만은 지킬 수 있으리라</em>는 약속을 믿고 항복했으나, 사마의는 일족을 <em>삼족(三族)</em>까지 멸했다. <em>고평릉의 정변</em>이다. 정변 한 번에 위 황실의 무게가 사마씨로 넘어갔다. <em>하안</em>·<em>등양</em>·<em>정밀</em> 등 정시(正始) 명사의 한 줄기가 이 자리에서 함께 사라졌으니, 사상사에서는 <em>정시 현학</em>의 끝이기도 했다.\n\n정변 후 2년, 251년에 그는 죽었다. 향년 73세였다. 아들 <em>사마사(司馬師)</em>·<em>사마소(司馬昭)</em>가 그 자리를 이어 위의 실권을 굳혔고, 손자 <em>사마염(司馬炎)</em>이 265년에 위를 받아 <em>진(西晉)</em>을 세우니, 사마의는 사후에 <em>선제(宣帝)</em>로 추존되었다.\n\n『세설신어』 안에서 그는 자주 등장하는 인물은 아니나, 〈식감〉·〈가휼〉편의 한 뿌리에 그가 있다. 위진의 한 시대 전체가 <em>그의 한 평생의 인내가 한 새벽에 결단으로 터진 자리</em> 위에 서 있다.", "storyCount": 0}, {"id": "person.苻堅", "type": "person", "han": "苻堅", "ko": "", "sub": "부견 (338~385)", "title": "", "short": "전진(前秦)의 황제. 저족 출신으로 화북을 통일했다(379). 383년 백만 대군을 동원해 동진을 침공해 왔으나 <em>비수대전</em>에서 처참하게 패했다. 단신으로 도망쳐 <em>風聲鶴唳</em>했다. 패전 2년 뒤(385) 강족의 요장에게 살해되며 전진도 무너졌다. 비수의 패배 한 번이 한 시대의 운명을 갈랐다.", "long": "苻堅은 자가 영고(永固)이며 <em>전진(前秦)</em>의 제3대 황제다. <em>저족(氐族)</em> 출신으로, 백부 <em>부홍</em>과 종형 <em>부생</em>의 뒤를 이어 357년 황위에 올랐다. 즉위 당시 그의 나이 열아홉이었다. 종형 부생이 잔혹한 폭군이었던 까닭에, 부견의 즉위는 한 줄기 빛으로 받아들여졌다.\n\n부견의 가장 큰 행운은 <em>왕맹(王猛)</em>을 얻은 것이다. 왕맹은 한족 출신의 빈한한 선비였으나, 부견이 그를 보고 <em>물고기가 물을 만난 듯하다(如魚得水)</em> 했다 한다. <em>유비</em>와 <em>제갈량</em>의 옛 자리를 그대로 잇는 한 자리였다. 부견은 호족 출신 황제이면서도 왕맹의 한화(漢化) 정책을 끝까지 밀어 주었다. 호족 귀족의 횡포를 꺾고, 학교를 세우고, 농상(農桑)을 권하고, 법을 엄하게 세웠다. 십수 년 사이에 <em>장안</em>은 다시 화북의 한 중심이 되었다.\n\n군사적으로도 부견은 한 시대의 영걸이었다. 370년 <em>전연(前燕)</em>을 멸하고, 373년 <em>촉(蜀)</em>을 거두고, 376년 <em>전량(前涼)</em>과 <em>대(代)</em>를 차례로 무너뜨려, 379년 화북 통일을 이뤘다. <em>오호십육국</em> 시대를 통틀어 화북을 온전히 한 손에 쥔 것은 부견 한 사람뿐이다. 그가 통치하는 영역의 인구가 동진의 몇 배에 달했다. <em>천하의 절반</em>이 그의 손에 있었다.\n\n그러나 통일의 그날, <em>왕맹</em>은 이미 세상에 없었다. 375년 왕맹은 임종에서 부견의 손을 잡고 <em>진(晉)은 비록 작으나 정통이며 군신이 화목하니, 신이 죽은 뒤 결코 진을 도모하지 마소서</em> 거듭 당부했다. 또 <em>선비(鮮卑)와 강(羌)이 우리의 깊은 우환이니 점차 제거하소서</em> 했다. 부견은 그 자리에서는 끄덕였으나, 끝내 두 유언을 모두 어겼다.\n\n383년, 부견은 마침내 <em>동진</em> 정벌의 군을 일으켰다. 호적 한 호당 한 명, 보병 60여만, 기병 27만이 동원되었다 한다. 깃발이 천 리에 이어졌고, 부견 스스로 <em>내 군사로 채찍을 던지면 강의 흐름을 끊을 수 있다(投鞭斷流)</em> 호언했다. 조정 안에서 <em>부융</em>과 일부 신하가 거듭 만류했으나 듣지 않았다. 동진의 군세는 8만, <em>사안</em>이 조정에 앉고 <em>사현</em>·<em>사석</em>·<em>환이</em>가 <em>북부병(北府兵)</em>을 이끌고 마주 섰다.\n\n결전은 <em>비수(淝水)</em>에서 벌어졌다. 사현이 부견의 진영에 사람을 보내 <em>조금만 물러나 우리 군이 강을 건너 결판을 내게 하라</em> 청했다. 부견은 <em>건너는 중에 치면 끝난다</em> 여겨 허락했다. 그러나 백만 대군은 한 번 물러서기 시작하자 멈출 줄 몰랐다. <em>진(秦)이 진다</em>는 외침이 뒤에서 일었고, 군이 자기들끼리 짓밟히며 무너졌다. 부견은 화살에 맞은 채 단신으로 도망쳤고, <em>바람 소리와 학의 울음(風聲鶴唳)</em>마저 추격병으로 들렸다 한다. <em>초목개병(草木皆兵)</em>의 고사가 여기서 났다.\n\n비수의 패배 한 번이 모든 것을 갈랐다. 화북의 호족들이 일제히 등을 돌렸다. <em>모용수</em>가 후연(後燕)을 세웠고, <em>모용충</em>이 군을 일으켰고, <em>요장(姚萇)</em>이 후진(後秦)을 일으켰다. 부견은 장안에서 쫓겨나 오장산(五將山)으로 달아났다. 385년 8월, 옛 부하였던 강족의 <em>요장</em>이 사람을 보내 그를 목매 죽였다. 향년 48세였다. 요장이 옥새를 요구하자 부견이 <em>오호의 운수에 너 같은 강족 도적의 차례는 없다</em> 꾸짖고 죽었다 전한다.\n\n부견은 패자였으나 단순한 패자가 아니다. 그는 <em>호한융합(胡漢融合)</em>의 한 이상을 실제로 시도한 첫 군주였고, 그 이상이 <em>너무 일렀기에</em> 비수에서 무너진 것이라는 평이 후대에 따랐다. 패한 호족 포로들을 죽이지 않고 작위를 주어 곁에 두었던 그의 관후(寬厚)가 곧 그를 죽인 칼이 되었다. <em>왕맹</em>의 유언을 지켰더라면, 하는 한숨이 천 년을 따랐다.\n\n『세설신어』에서 부견은 적국의 군주로 등장한다. 〈아량〉편의 사안이 바둑판 앞에서 <em>아이들이 도적을 부수었소</em> 한 그 <em>도적</em>이 곧 부견이며, 〈언어〉·〈식감〉편 곳곳의 <em>부씨</em>·<em>저적(氐賊)</em>이 모두 그를 가리킨다. 그가 비수에서 무너지지 않았다면 동진의 한낮도, 사안의 한낮도, 『세설신어』가 그리는 그 한 시대의 풍경도 끝났을 것이다. 한 사람의 패배가 한 시대를 살린 드문 자리.", "storyCount": 0}, {"id": "person.劉義慶", "type": "person", "han": "劉義慶", "ko": "", "sub": "유의경 (403~444)", "title": "", "short": "본 책의 편자. 송 무제 <em>유유</em>의 조카로 임천왕(臨川王)에 봉해진 종친. 정치보다 문학과 학술을 사랑해 자기 막부에 사대부와 문인을 모아 책을 엮었다. 그 가운데 한 권이 『세설신어』. 그가 살았던 시대는 한 세대 전 동진이 막 저물 무렵으로, <em>영광이 끝난 어제</em>를 자기 세대를 위해 묶었다.", "long": "劉義慶은 자가 계백(季伯)이다. 팽성(彭城) 유씨, 곧 <em>송 무제(宋武帝)</em> 유유(劉裕)의 한 가지에서 났다. 아버지 <em>유도련(劉道憐)</em>은 무제의 동생으로 장사왕(長沙王)이었으나, 의경은 백부 <em>유도규(劉道規)</em>의 양자로 들어가 그 작위를 이었다. 열세 살에 남군공(南郡公), 뒤에 <em>임천왕(臨川王)</em>에 봉해졌다. 그러므로 그는 송 황실의 한가운데에 선 종친이며, 동시에 황권의 직계가 아닌 한 자리 비낀 종친이었다.\n\n이 <em>비낀 자리</em>가 그의 한평생을 정했다. 송 무제가 죽고 <em>문제(文帝)</em> 유의륭(劉義隆)의 치세가 열리자, 종친에 대한 의심이 깊어졌다. 형제와 종형제들이 차례로 의심을 받아 폐해지거나 죽었다. 의경은 그 칼끝을 피하는 길로 <em>문학</em>과 <em>학술</em>을 택했다. 일찍이 무제가 그를 두고 <em>이 아이는 우리 집안의 풍골(風骨)이다</em> 칭찬했다 한다. 그러나 자라며 그는 무공의 길을 피해 책의 길로 들어섰다.\n\n스물 무렵부터 그는 외직을 맡았다. 형주(荊州)·강주(江州)·남연주(南兗州)의 자사로 차례로 부임했다. 형주는 동진 이래 가장 큰 외번이고, 강주는 <em>여산(廬山)</em>의 <em>혜원(慧遠)</em> 이래 청담과 불교의 한 거점이며, 남연주는 <em>경구(京口)</em> — <em>북부병</em>의 옛 본거지 — 를 끼고 있다. 의경의 막부가 곧 한 세대 전 동진의 풍속이 흘러든 자리가 된 까닭이다. 그는 임지마다 사대부와 문인을 후하게 대접해 막부로 불러들였다. <em>원숙(袁淑)</em>·<em>육전(陸展)</em>·<em>하장유(何長瑜)</em>·<em>포조(鮑照)</em>가 모두 그의 막부에 한때 있었다.\n\n이 막부가 곧 한 <em>편찬의 자리</em>가 되었다. 그 자신이 글을 잘 짓는 사람이었으나, 한 사람의 손으로 쓰는 책이 아니라 <em>여러 손이 모여 옛 일화를 가려 묶는</em> 책을 그는 좋아했다. 『<em>유명록(幽明錄)</em>』 — 귀신과 영험의 일화집 — 과 『<em>선험기(宣驗記)</em>』 — 불교 영험기 — 가 그 막부에서 나왔다. 그리고 그 가운데 한 권이 곧 『세설신어』다. 원래의 이름은 『<em>세설(世說)</em>』 또는 『<em>세설신서(世說新書)</em>』였다 전한다.\n\n『세설』이 다룬 시대는 후한 말부터 동진 말까지 약 이백 년. 의경 자신의 시대가 아니라, <em>한 세대 전</em>의 시대다. <em>왕도</em>와 <em>사안</em>과 <em>왕희지</em>와 <em>지도림</em>이 살았던 그 한낮은, 의경이 태어났을 무렵에는 이미 저문 뒤였다. 그가 태어난 403년은 <em>환현(桓玄)</em>이 동진의 황위를 찬탈하던 해이며, 그 이듬해 그의 백부 유유가 군을 일으켜 환현을 쳤다. 곧 동진의 마지막과 송의 시작이 그의 어린 시절이었다. 동진의 명사 풍속은 그가 태어났을 때 이미 <em>영광이 끝난 어제</em>였다.\n\n그러므로 『세설』은 <em>추억의 책</em>이다. 의경과 그의 막부 사람들은, 자기 세대가 다시 살 수 없는 한 풍속 — 청담과 옥주미와 아량과 임탄(任誕) — 을 한 토막 한 토막의 일화로 가려 묶어 두었다. 그것은 단순한 향수가 아니라, 송대 사대부가 자기를 비추어 볼 한 <em>거울</em>을 세우는 일이었다. 〈덕행〉에서 〈구극(仇隙)〉까지 36편, 1130여 토막. 한 토막이 짧으면 한 줄, 길어야 한 단락이지만, 그 한 토막마다 한 사람의 풍골이 살아 있다.\n\n만년의 의경은 병이 잦았다. 강주에서 신이(神異)에 더욱 마음을 기울이고, 사문(沙門)을 가까이했다 한다. 문제(文帝)가 그를 도성으로 불러올렸으나, 元嘉 21년(444) 정월에 마흔둘로 죽었다. 시호는 강왕(康王). 송 황실의 칼끝을 끝내 피해 책 한 권을 남기고 떠난 셈이다.\n\n『세설신어』가 없었다면, 우리는 <em>왕융이 살구를 팔며 씨에 구멍을 뚫었다</em>는 한 줄도, <em>사안이 바둑을 두다 첩보를 받았다</em>는 한 자리도 알 수 없었을 것이다. 의경의 한 생애는 정사(政事)에서 한 자리 비낀 종친이었으나, 그 비낀 자리에서 그는 위진 이백 년의 <em>명사</em>들을 후대에 넘겼다. 본 책의 모든 章, 모든 일화는 곧 그의 막부의 한 손길을 거쳐 오늘에 이른다.", "storyCount": 0}, {"id": "clan.HeNeiSiMa", "type": "clan", "han": "河內司馬氏", "ko": "", "sub": "하내 사마씨", "title": "", "short": "위의 보정 대신 <em>사마의</em>로부터 일어난 가문. 그의 아들 사마사·사마소가 위의 실권을 쥐고, 손자 <em>사마염</em>이 위에서 받아 <em>진(西晉)</em>을 세웠다(265). 영가의 난으로 종친 대부분이 죽고, 강동에 있던 <em>사마예</em>가 <em>동진</em>을 세움. 위진 약 150년의 황실 가문.", "long": "河內司馬氏는 위진 약 150년의 황실 가문이다. 본관은 사주(司州) <em>하내군(河內郡)</em> 온현(溫縣)이다. 후한 말의 한 지방 명문에 지나지 않던 이 가문이, 한 인물의 깊은 인내와 그 뒤를 잇는 두 세대의 권력 장악을 거쳐, 마침내 위(魏)의 선양을 받아 한 왕조를 세웠다. 그러나 그 왕조는 한 세대를 채우지 못해 무너졌고, 강을 건너 다시 일어났다 또 한 세대 만에 흔들렸다. 위진의 한 시대가 곧 이 가문의 그림자 안에 있다.\n\n가문의 기틀은 <em>사마의(司馬懿)</em>가 놓았다. 그는 조조(曹操)의 부름을 거듭 사양하다 마침내 출사한 뒤, <em>조비</em>·<em>조예</em> 두 대를 섬기며 군사·정사의 중심에 섰다. <em>제갈량</em>의 북벌을 막아 낸 일과 요동의 <em>공손연</em>을 친 일이 그의 군공의 두 정점이다. 그러나 그의 진짜 무기는 <em>인내</em>였다. 249년 <em>고평릉의 정변</em>에서 그는 조상(曹爽)의 무리를 한꺼번에 베었다. <em>하안</em>·<em>등양</em>·<em>정밀</em> 등 정시(正始) 명사들이 이때 함께 사라졌다. 위의 실권이 사마씨로 옮겨 간 자리다.\n\n사마의의 두 아들 <em>사마사(司馬師)</em>와 <em>사마소(司馬昭)</em>가 그 권력을 굳혔다. 사마사는 <em>위 폐제(齊王 芳)</em>를 폐하고, 사마소는 <em>고귀향공(高貴鄕公)</em>을 죽이고서도 <em>사마소의 마음은 길 가는 사람도 안다(司馬昭之心, 路人所知)</em>는 말을 듣고도 그 자리를 굳혔다. <em>혜강(嵇康)</em>이 죽은 것이 그의 손이다. 사상사의 한 정점이 한 정치적 칼날에 부러진 자리다.\n\n265년, 사마소의 아들 <em>사마염(司馬炎)</em>이 위의 <em>원제(元帝)</em>에게서 선양을 받아 <em>서진(西晉)</em>을 세웠다
